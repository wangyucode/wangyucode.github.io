<!DOCTYPE html><html lang="zh-CN"><head><meta charSet="utf-8"/><title>王郁的小站</title><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/><meta name="next-head-count" content="3"/><link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml"/><meta name="description" content="欢迎光临王郁的小站"/><meta property="og:image" content="https://og-image.vercel.app/%E7%8E%8B%E9%83%81%E7%9A%84%E5%B0%8F%E7%AB%99.png?theme=light&amp;md=0&amp;fontSize=75px&amp;images=https%3A%2F%2Fassets.vercel.com%2Fimage%2Fupload%2Ffront%2Fassets%2Fdesign%2Fnextjs-black-logo.svg"/><meta name="og:title" content="王郁的小站"/><meta name="twitter:card" content="summary_large_image"/><link rel="preload" href="/_next/static/css/804786de35d6ea9b.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/804786de35d6ea9b.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-6af0e3c12b874bb0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-e14092e0d084b50d.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-bc0074f0f8514a28.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-f249e8934ba43001.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/358-09e70898ee89de63.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/673-dd16adde3fc920b7.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/index-343e3754dceb17bd.js" defer="" crossorigin=""></script><script src="/_next/static/NDkQWnMtEcy0IDQqDGEkS/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/NDkQWnMtEcy0IDQqDGEkS/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"ai","file":"ai.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://assets.datamation.com/uploads/2023/05/dm-how-to-use-chatgpt-696x464.png\" alt=\"chatgpt\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天是2024年10月30日，自从ChatGPT在2022年11月发布以来，人工智能（以下简称AI）的热度持续上升，它被认为是第四次工业革命的重要推动力。但也有人说AI是泡沫，做到实质性落地并且收益的公司屈指可数。这篇文章会结合历史，最新的前沿进展，分享一下目前我自己的观察和思考。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://assets.datamation.com/uploads/2023/05/dm-how-to-use-chatgpt-696x464.png\" alt=\"chatgpt\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天是2024年10月30日，自从ChatGPT在2022年11月发布以来，人工智能（以下简称AI）的热度持续上升，它被认为是第四次工业革命的重要推动力。但也有人说AI是泡沫，做到实质性落地并且收益的公司屈指可数。这篇文章会结合历史，最新的前沿进展，分享一下目前我自己的观察和思考。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e回顾历史\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e历史总是惊人的相似\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e目前的AI浪潮，和20世纪90年代末的互联网浪潮非常相似。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e90年代互联网浪潮\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e90年代互联网开始商业化，经济方面1994年到1995年，为了防止经济过热，美联储连续加息7次，将联邦利率提高至6%，然而在这样的背景下，1995年到1998年，纳斯达克指数上涨了168%，这里面的重要原因就是互联网的出现。如今的互联网巨头都是在那个时候创立的，谷歌亚马逊是1995年左右，百度，腾讯，阿里99年左右。随后的2000年互联网泡沫破裂，大量公司破产倒闭，行业重新洗牌。普通人站在当时1999年的时间点上，也是看不清未来互联网能做什么。但是现在我们知道这些互联网公司不仅活下来了，而且成为了目前市值最高的互联网巨头。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当时的互联网，可以落地的应用并不多，无非就是浏览器，电子邮件。直到2000年互联网泡沫破裂后，我们才真正看清了互联网能做什么。2002年，我还在上学，当时的同班同学谁会注册QQ，谁就是交际花。2003年《梦幻西游》发布，2004年《魔兽世界》发布，2005年QQ空间发布。这时候互联网才开始真正进入大众视野。随着2007年，乔布斯掏出初代Iphone，又开启了移动互联网时代，互联网创造了无数新的工作岗位并实现了生产力的巨大飞跃。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e再看看现在的AI，和90年代末的互联网非常相似。经济方面，美联储从2022年3月到2023年6月加息11次，但是以英伟达为首的科技巨头股价却屡创新高。站在当下的时间点上，目前的AI和2000年的搜索引擎非常相似。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e人工智能和搜索引擎\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e现在的人工智能应用还处于非常早期的阶段，目前使用最普遍的还是聊天机器人，比如\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eChatGPT\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGemini\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eClaude\u003c/code\u003e, \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e文心一言\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e通义千问\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e豆包\u003c/code\u003e等等。他们都很强，但是对于很多人而言，你把ChatGPT摆到他面前，他也问不出什么有价值的问题，这个问题或者叫提示词（prompt）的质量决定了AI给你回复的质量，这个和早些年的搜索引擎其实是一样的，会百度一下，和Google一下, 以及关键词的选取，得到的结果质量是完全不同的。也说句不好听的，人与人之间使用搜索引擎的能力差距比人和猴子的差距还大。放到AI的时代还是一样。AI和搜索引擎都是8个字\u003cstrong\u003e遇强则强，遇弱则弱\u003c/strong\u003e。当然了，搜索引擎不是互联网的全部，聊天机器人也不是AI应用的全部。未来肯定会有更多面向更大众化的应用。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eAI能否替代程序员\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e先说结论，AI无法代替程序员，但是会让很多程序员失业。从最早的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGithub Copilot\u003c/code\u003e以及国内的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBaidu Comate\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMarscode\u003c/code\u003e, \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTONGYI lingma\u003c/code\u003e到现在的AI 编辑器\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCursor\u003c/code\u003e, 对于效率的提升是非常明显的。第一次使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGithub Copilot\u003c/code\u003e，看到它真的明白我的业务，和并且给出符合我自己风格的代码提示的时候，让我有种“伯牙摔琴”，找到知己的感觉。这感觉是直冲天灵盖的那种震撼。这样的工具对于一些CURD工程师，调库侠，是巨大的威胁。特别是当你使用的语言和框架比较老而且非常普遍的话，这种冲击会更加明显。但是，如果你做的是真正的前沿创新，更高一级的抽象，大型应用的架构设计，AI永远无法替代你。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e目前的状态\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20241030_mmlu.png\" alt=\"mmlu\" class=\"mx-auto max-h-80\"\u003e\n从目前的趋势来看，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eScaling Law\u003c/code\u003e没有问题，大模型就是参数越大，能力越强。但是由于大模型训练的算力需求巨大，可以预见的未来都是少数巨头和独角兽公司有能力自己训练，比如谷歌，meta，百度，阿里，OpenAI，月之暗面，清华智谱等。所以普通人小公司就没有机会了吗？并不是。先看下大模型的缺陷和痛点。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003etoB的痛点\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e目前大模型无法解决以下问题：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e知识局限性：通用的模型对于实时的，未公开的，私域的，离线的，无能为力。因为大模型一旦训练好它的知识库就锁定了。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e复杂业务场景： 现实中的业务场景非常复杂，比如金融，医疗，法律，教育等特定领域。它们往往拥有已经在使用的传统系统，目前的对话大模型无法对接这些复杂的系统和业务场景。\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003eRAG和Agent\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e解决大模型的以上两个问题我们需要：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003eRAG（Retrieval Augmented Generation） 检索增强生成。原理就是给大模型外挂一个数据库，让它从数据库中检索出相关的信息。再总结生成回答。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eAgent：类似与中间层，通过一个或多个Agent来构建一个workflow连接现有系统构和大模型。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e基于以上的方向，目前看到的toC的应用是\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e知识库管理系统，例如Google的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNotebookLM\u003c/code\u003e， \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eObsidian\u003c/code\u003e等。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e问答引擎：例如\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ePerplexity\u003c/code\u003e等。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e这些东西目前还都是一些极客在用，离大众化还有很长一段路要走。其实和所有的技术革新浪潮一样，刚出来的时候都是比较“小众”。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eAI和智能手机\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003etoC很重要的一个方向就是智能手机和AI的结合，目前的大模型和现有的智能手机还在进一步融合，将来AI一定是系统级的，可以在任何时候无感使用。而不是像现在一样，需要安装一个APP然后尬聊。所以可以预见的将来，还会有新一波的换机潮，现在的所谓“智能手机”在和AI高度集成的手机面前，就跟以前的诺基亚一样。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e学术研究的进展\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eAI在学术领域的帮助，可以说是带来了一种全新的研究范式。为什么这么说呢？自从2017年那片神级的论文“Attention is all you need”，基于Transformer的新发现层出不穷，2024年诺贝尔物理学奖颁给人工神经网络，化学奖颁给了Deepmind用人工神经网络破解蛋白质结构的团队。在这之前还有研究团队用机器学习取得了在可控核聚变领域的进展，最近这几天还有团队利用Transformer发现了16万种新病毒。以前的学术研究是先提出设想，排除其它干扰做实验验证，然后得出结论。而结合AI的学术研究是直接面对混沌的现实世界得出理论和规律。这种改变是根本性的，并且跨学科的。而且未来的新技术还能和AI结合，例如量子计算，元宇宙，机器人，Web3.0。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e那么回到开头的问题，你还怀疑AI是泡沫吗？\u003c/p\u003e\n","content":"\n![chatgpt](https://assets.datamation.com/uploads/2023/05/dm-how-to-use-chatgpt-696x464.png)\n\n\u003e 今天是2024年10月30日，自从ChatGPT在2022年11月发布以来，人工智能（以下简称AI）的热度持续上升，它被认为是第四次工业革命的重要推动力。但也有人说AI是泡沫，做到实质性落地并且收益的公司屈指可数。这篇文章会结合历史，最新的前沿进展，分享一下目前我自己的观察和思考。\n\n\u003c!--more--\u003e\n## 回顾历史\n\n\u003e 历史总是惊人的相似\n\n目前的AI浪潮，和20世纪90年代末的互联网浪潮非常相似。\n\n### 90年代互联网浪潮\n\n90年代互联网开始商业化，经济方面1994年到1995年，为了防止经济过热，美联储连续加息7次，将联邦利率提高至6%，然而在这样的背景下，1995年到1998年，纳斯达克指数上涨了168%，这里面的重要原因就是互联网的出现。如今的互联网巨头都是在那个时候创立的，谷歌亚马逊是1995年左右，百度，腾讯，阿里99年左右。随后的2000年互联网泡沫破裂，大量公司破产倒闭，行业重新洗牌。普通人站在当时1999年的时间点上，也是看不清未来互联网能做什么。但是现在我们知道这些互联网公司不仅活下来了，而且成为了目前市值最高的互联网巨头。\n\n当时的互联网，可以落地的应用并不多，无非就是浏览器，电子邮件。直到2000年互联网泡沫破裂后，我们才真正看清了互联网能做什么。2002年，我还在上学，当时的同班同学谁会注册QQ，谁就是交际花。2003年《梦幻西游》发布，2004年《魔兽世界》发布，2005年QQ空间发布。这时候互联网才开始真正进入大众视野。随着2007年，乔布斯掏出初代Iphone，又开启了移动互联网时代，互联网创造了无数新的工作岗位并实现了生产力的巨大飞跃。\n\n再看看现在的AI，和90年代末的互联网非常相似。经济方面，美联储从2022年3月到2023年6月加息11次，但是以英伟达为首的科技巨头股价却屡创新高。站在当下的时间点上，目前的AI和2000年的搜索引擎非常相似。\n\n## 人工智能和搜索引擎\n\n现在的人工智能应用还处于非常早期的阶段，目前使用最普遍的还是聊天机器人，比如`ChatGPT`，`Gemini`，`Claude`, `文心一言`，`通义千问`，`豆包`等等。他们都很强，但是对于很多人而言，你把ChatGPT摆到他面前，他也问不出什么有价值的问题，这个问题或者叫提示词（prompt）的质量决定了AI给你回复的质量，这个和早些年的搜索引擎其实是一样的，会百度一下，和Google一下, 以及关键词的选取，得到的结果质量是完全不同的。也说句不好听的，人与人之间使用搜索引擎的能力差距比人和猴子的差距还大。放到AI的时代还是一样。AI和搜索引擎都是8个字**遇强则强，遇弱则弱**。当然了，搜索引擎不是互联网的全部，聊天机器人也不是AI应用的全部。未来肯定会有更多面向更大众化的应用。\n\n## AI能否替代程序员\n\n先说结论，AI无法代替程序员，但是会让很多程序员失业。从最早的`Github Copilot`以及国内的`Baidu Comate`，`Marscode`, `TONGYI lingma`到现在的AI 编辑器`Cursor`, 对于效率的提升是非常明显的。第一次使用`Github Copilot`，看到它真的明白我的业务，和并且给出符合我自己风格的代码提示的时候，让我有种“伯牙摔琴”，找到知己的感觉。这感觉是直冲天灵盖的那种震撼。这样的工具对于一些CURD工程师，调库侠，是巨大的威胁。特别是当你使用的语言和框架比较老而且非常普遍的话，这种冲击会更加明显。但是，如果你做的是真正的前沿创新，更高一级的抽象，大型应用的架构设计，AI永远无法替代你。\n\n## 目前的状态\n\n![mmlu](/images/20241030_mmlu.png)\n从目前的趋势来看，`Scaling Law`没有问题，大模型就是参数越大，能力越强。但是由于大模型训练的算力需求巨大，可以预见的未来都是少数巨头和独角兽公司有能力自己训练，比如谷歌，meta，百度，阿里，OpenAI，月之暗面，清华智谱等。所以普通人小公司就没有机会了吗？并不是。先看下大模型的缺陷和痛点。\n\n### toB的痛点\n\n目前大模型无法解决以下问题：\n\n1. 知识局限性：通用的模型对于实时的，未公开的，私域的，离线的，无能为力。因为大模型一旦训练好它的知识库就锁定了。\n2. 复杂业务场景： 现实中的业务场景非常复杂，比如金融，医疗，法律，教育等特定领域。它们往往拥有已经在使用的传统系统，目前的对话大模型无法对接这些复杂的系统和业务场景。\n\n### RAG和Agent\n\n解决大模型的以上两个问题我们需要：\n1. RAG（Retrieval Augmented Generation） 检索增强生成。原理就是给大模型外挂一个数据库，让它从数据库中检索出相关的信息。再总结生成回答。\n2. Agent：类似与中间层，通过一个或多个Agent来构建一个workflow连接现有系统构和大模型。\n\n基于以上的方向，目前看到的toC的应用是\n\n- 知识库管理系统，例如Google的`NotebookLM`， `Obsidian`等。\n- 问答引擎：例如`Perplexity`等。\n\n这些东西目前还都是一些极客在用，离大众化还有很长一段路要走。其实和所有的技术革新浪潮一样，刚出来的时候都是比较“小众”。\n\n## AI和智能手机\n\ntoC很重要的一个方向就是智能手机和AI的结合，目前的大模型和现有的智能手机还在进一步融合，将来AI一定是系统级的，可以在任何时候无感使用。而不是像现在一样，需要安装一个APP然后尬聊。所以可以预见的将来，还会有新一波的换机潮，现在的所谓“智能手机”在和AI高度集成的手机面前，就跟以前的诺基亚一样。\n\n## 学术研究的进展\n\nAI在学术领域的帮助，可以说是带来了一种全新的研究范式。为什么这么说呢？自从2017年那片神级的论文“Attention is all you need”，基于Transformer的新发现层出不穷，2024年诺贝尔物理学奖颁给人工神经网络，化学奖颁给了Deepmind用人工神经网络破解蛋白质结构的团队。在这之前还有研究团队用机器学习取得了在可控核聚变领域的进展，最近这几天还有团队利用Transformer发现了16万种新病毒。以前的学术研究是先提出设想，排除其它干扰做实验验证，然后得出结论。而结合AI的学术研究是直接面对混沌的现实世界得出理论和规律。这种改变是根本性的，并且跨学科的。而且未来的新技术还能和AI结合，例如量子计算，元宇宙，机器人，Web3.0。\n\n那么回到开头的问题，你还怀疑AI是泡沫吗？\n","data":{"title":"这一波AI浪潮是否是泡沫？","date":"2024-10-30","tags":["AI"],"category":"Story"},"isEmpty":false,"excerpt":"\n![chatgpt](https://assets.datamation.com/uploads/2023/05/dm-how-to-use-chatgpt-696x464.png)\n\n\u003e 今天是2024年10月30日，自从ChatGPT在2022年11月发布以来，人工智能（以下简称AI）的热度持续上升，它被认为是第四次工业革命的重要推动力。但也有人说AI是泡沫，做到实质性落地并且收益的公司屈指可数。这篇文章会结合历史，最新的前沿进展，分享一下目前我自己的观察和思考。\n\n"},{"id":"caddy","file":"caddy.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://caddyserver.com/old/resources/images/caddy-logo.svg\" alt=\"Caddy\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e之前一直使用Nginx作为反向代理和静态网站服务，Caddy作为替代，有诸多好处，比如：配置简单，支持API，Caddyfile, JSON多种配置方式；支持自动HTTPS，自动更新TLS证书；内置支持HTTP1, HTTP2, HTTP3, Websocket。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章安装和配置Caddy的全流程\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://caddyserver.com/old/resources/images/caddy-logo.svg\" alt=\"Caddy\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e之前一直使用Nginx作为反向代理和静态网站服务，Caddy作为替代，有诸多好处，比如：配置简单，支持API，Caddyfile, JSON多种配置方式；支持自动HTTPS，自动更新TLS证书；内置支持HTTP1, HTTP2, HTTP3, Websocket。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章安装和配置Caddy的全流程\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e安装Caddy\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e当前安装最简单的方式当然是通过Docker了，这是docker-compose文件\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-yml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eservices:\n  caddy:\n    image: caddy:2.8\n    container_name: caddy\n    restart: unless-stopped\n    ports:\n      - \"80:80\"\n      - \"443:443\"\n      - \"443:443/udp\"\n    volumes:\n      -./caddy/Caddyfile:/etc/caddy/Caddyfile:ro\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edocker compose up -d\u003c/code\u003e命令启动容器即可\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e配置Caddy\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e以下是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewycode.cn\u003c/code\u003e 的 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCaddyfile\u003c/code\u003e 配置。可以看到比nginx的配置简单了很多。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003ewycode.cn {\n\n    encode zstd gzip\n\n    handle_path /upload/* {\n        root * /srv/upload\n        file_server browse\n    }\n\n    handle_path /swagger-ui/* {\n        root * /srv/swagger-ui\n        file_server\n    }\n\n    handle /api/v1/* {\n        reverse_proxy \"http://deno:8083\"\n    }\n\n    handle /mongo/* {\n        reverse_proxy \"http://mongo-express:8081\"\n    }\n\n    handle {\n        root * /srv/wycode\n        try_files {path} /{path}.html {path}/ /404.html\n        file_server\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eHTTP Content压缩：\u003c/strong\u003e \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eencode zstd gzip\u003c/code\u003e 启用zstd和gzip压缩\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eupload目录：\u003c/strong\u003e \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehandle_path /upload/*\u003c/code\u003e 配置静态文件服务，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eroot * /srv/upload\u003c/code\u003e 表示将 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/upload\u003c/code\u003e 目录映射到 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/srv/upload\u003c/code\u003e 目录\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eSwagger UI：\u003c/strong\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehandle_path /swagger-ui/*\u003c/code\u003e 配置静态文件服务，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eroot * /srv/swagger-ui\u003c/code\u003e 表示将 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/swagger-ui\u003c/code\u003e 目录映射到 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/srv/swagger-ui\u003c/code\u003e 目录\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eDeno API：\u003c/strong\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehandle /api/v1/*\u003c/code\u003e 配置反向代理，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereverse_proxy \"http://deno:8083\"\u003c/code\u003e 表示将 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/api/v1\u003c/code\u003e 映射到 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttp://deno:8083\u003c/code\u003e 服务\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eMongoDB WebUI：\u003c/strong\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehandle /mongo/*\u003c/code\u003e 配置反向代理，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereverse_proxy \"http://mongo-express:8081\"\u003c/code\u003e 表示将 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/mongo\u003c/code\u003e 映射到 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttp://mongo-express:8081\u003c/code\u003e 服务\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eNextJs主站：\u003c/strong\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehandle\u003c/code\u003e 配置静态文件服务，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eroot * /srv/wycode\u003c/code\u003e 表示将 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/\u003c/code\u003e 目录映射到 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/srv/wycode\u003c/code\u003e 目录，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etry_files {path} /{path}.html {path}/ /404.html\u003c/code\u003e 表示如果请求的路径不存在，则尝试查找 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/\u003c/code\u003e 目录下的文件，如果文件不存在，则返回 404 错误。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e本文原始发表于 \u003ca href=\"https://wycode.cn/blog/caddy\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://wycode.cn/blog/caddy\u003c/a\u003e，转载请注明出处\u003c/p\u003e\n","content":"\n![Caddy](https://caddyserver.com/old/resources/images/caddy-logo.svg)\n\n\u003e 之前一直使用Nginx作为反向代理和静态网站服务，Caddy作为替代，有诸多好处，比如：配置简单，支持API，Caddyfile, JSON多种配置方式；支持自动HTTPS，自动更新TLS证书；内置支持HTTP1, HTTP2, HTTP3, Websocket。\n\n这篇文章安装和配置Caddy的全流程\n\n\u003c!--more--\u003e\n\n## 安装Caddy\n\n当前安装最简单的方式当然是通过Docker了，这是docker-compose文件\n\n```yml\nservices:\n  caddy:\n    image: caddy:2.8\n    container_name: caddy\n    restart: unless-stopped\n    ports:\n      - \"80:80\"\n      - \"443:443\"\n      - \"443:443/udp\"\n    volumes:\n      -./caddy/Caddyfile:/etc/caddy/Caddyfile:ro\n```\n\n通过`docker compose up -d`命令启动容器即可\n\n\n## 配置Caddy\n\n以下是`wycode.cn` 的 `Caddyfile` 配置。可以看到比nginx的配置简单了很多。\n\n```\nwycode.cn {\n\n    encode zstd gzip\n\n    handle_path /upload/* {\n        root * /srv/upload\n        file_server browse\n    }\n\n    handle_path /swagger-ui/* {\n        root * /srv/swagger-ui\n        file_server\n    }\n\n    handle /api/v1/* {\n        reverse_proxy \"http://deno:8083\"\n    }\n\n    handle /mongo/* {\n        reverse_proxy \"http://mongo-express:8081\"\n    }\n\n    handle {\n        root * /srv/wycode\n        try_files {path} /{path}.html {path}/ /404.html\n        file_server\n    }\n}\n```\n\n- **HTTP Content压缩：** `encode zstd gzip` 启用zstd和gzip压缩\n- **upload目录：** `handle_path /upload/*` 配置静态文件服务，`root * /srv/upload` 表示将 `/upload` 目录映射到 `/srv/upload` 目录\n- **Swagger UI：**`handle_path /swagger-ui/*` 配置静态文件服务，`root * /srv/swagger-ui` 表示将 `/swagger-ui` 目录映射到 `/srv/swagger-ui` 目录\n- **Deno API：**`handle /api/v1/*` 配置反向代理，`reverse_proxy \"http://deno:8083\"` 表示将 `/api/v1` 映射到 `http://deno:8083` 服务\n- **MongoDB WebUI：**`handle /mongo/*` 配置反向代理，`reverse_proxy \"http://mongo-express:8081\"` 表示将 `/mongo` 映射到 `http://mongo-express:8081` 服务\n- **NextJs主站：**`handle` 配置静态文件服务，`root * /srv/wycode` 表示将 `/` 目录映射到 `/srv/wycode` 目录，`try_files {path} /{path}.html {path}/ /404.html` 表示如果请求的路径不存在，则尝试查找 `/` 目录下的文件，如果文件不存在，则返回 404 错误。\n\n本文原始发表于 \u003chttps://wycode.cn/blog/caddy\u003e，转载请注明出处","data":{"title":"Caddy的安装和使用","date":"2024-09-24","tags":["Linux","Docker"],"category":"Linux"},"isEmpty":false,"excerpt":"\n![Caddy](https://caddyserver.com/old/resources/images/caddy-logo.svg)\n\n\u003e 之前一直使用Nginx作为反向代理和静态网站服务，Caddy作为替代，有诸多好处，比如：配置简单，支持API，Caddyfile, JSON多种配置方式；支持自动HTTPS，自动更新TLS证书；内置支持HTTP1, HTTP2, HTTP3, Websocket。\n\n这篇文章安装和配置Caddy的全流程\n\n"},{"id":"vite","file":"vite.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://vitejs.cn/vite3-cn/logo-with-shadow.png\" alt=\"Vite\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch1\u003e使用 Vite 构建 React 项目\u003c/h1\u003e\n\u003cp class=\"mb-4\"\u003e在前端开发领域，构建工具一直是不可或缺的一部分。Vite 是一个快速、简单的构建工具，它可以帮助我们快速搭建 React 项目并提供出色的开发体验。本文将介绍如何使用 Vite 构建 React 项目，包括 Vite 的简介、项目搭建步骤以及适配老版本浏览器的方法。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://vitejs.cn/vite3-cn/logo-with-shadow.png\" alt=\"Vite\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch1\u003e使用 Vite 构建 React 项目\u003c/h1\u003e\n\u003cp class=\"mb-4\"\u003e在前端开发领域，构建工具一直是不可或缺的一部分。Vite 是一个快速、简单的构建工具，它可以帮助我们快速搭建 React 项目并提供出色的开发体验。本文将介绍如何使用 Vite 构建 React 项目，包括 Vite 的简介、项目搭建步骤以及适配老版本浏览器的方法。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e什么是 Vite\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ca href=\"https://vitejs.dev/\" class=\"text-sky-500 hover:text-sky-400\"\u003eVite\u003c/a\u003e 是一个由 Evan You（Vue.js 的创始人）创建的构建工具，它的目标是提供快速的开发体验。Vite 不仅支持 Vue.js，还可以用于构建 React、Preact，Svelte 和其他前端框架的项目。它采用了 ES 模块的方式加载模块，因此在开发过程中非常快速。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e项目搭建步骤\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e要使用 Vite 构建 React 项目，首先确保你已经安装了 \u003ca href=\"https://nodejs.org/\" class=\"text-sky-500 hover:text-sky-400\"\u003eNode.js\u003c/a\u003e。接下来，按照以下步骤进行操作：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003e初始化项目\u003c/strong\u003e：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enpm create vite@latest web-vite --template react\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003e进入项目文件夹\u003c/strong\u003e: \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecd web-vite\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003e安装依赖\u003c/strong\u003e: \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enpm install\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003e启动开发服务器\u003c/strong\u003e: \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enpm run dev\u003c/code\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e至此，你可以在代码编辑器中修改 React 组件并实时查看更改。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e构建发布项目：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e当项目准备好发布时，运行以下命令构建项目：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enpm run build\u003c/code\u003e, 构建后的文件将存储在 dist 文件夹中，可以用于部署到生产环境。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e配置静态资源公共基础路径\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e为了让build可以在任何目录下部署，这里将资源路径改为相对路径\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eexport default defineConfig({\n    base: \"./\",\n});\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e适配老版本浏览器\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e默认情况下，Vite 构建的项目将会生成适用于现代浏览器的代码。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eChrome \u003e=87\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eFirefox \u003e=78\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eSafari \u003e=14\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eEdge \u003e=88\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e如果你需要支持老版本浏览器，你可以按照以下步骤进行操作：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003e安装插件\u003c/strong\u003e: \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enpm i -D @vitejs/plugin-legacy\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003e配置插件\u003c/strong\u003e:\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e这里假设需要支持chrome52\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eimport { defineConfig } from \"vite\";\nimport react from \"@vitejs/plugin-react\";\nimport legacy from \"@vitejs/plugin-legacy\";\n\n// https://vitejs.dev/config/\nexport default defineConfig({\n  base: \"./\",\n  plugins: [\n    react(),\n    legacy({\n      targets: [\"chrome 52\"],\n    }),\n  ]\n});\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e现在，你的 Vite React 项目应该可以在老版本浏览器中正常运行了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e使用 Vite 构建 React 项目是一种快速而愉快的开发体验，同时还能够通过简单的配置适配老版本浏览器。希望这篇博客对你有所帮助，让你更轻松地开始构建 React 应用程序。\u003c/p\u003e\n","content":"\n![Vite](https://vitejs.cn/vite3-cn/logo-with-shadow.png)\n\n\n# 使用 Vite 构建 React 项目\n\n在前端开发领域，构建工具一直是不可或缺的一部分。Vite 是一个快速、简单的构建工具，它可以帮助我们快速搭建 React 项目并提供出色的开发体验。本文将介绍如何使用 Vite 构建 React 项目，包括 Vite 的简介、项目搭建步骤以及适配老版本浏览器的方法。\n\n\u003c!--more--\u003e\n\n## 什么是 Vite\n\n[Vite](https://vitejs.dev/) 是一个由 Evan You（Vue.js 的创始人）创建的构建工具，它的目标是提供快速的开发体验。Vite 不仅支持 Vue.js，还可以用于构建 React、Preact，Svelte 和其他前端框架的项目。它采用了 ES 模块的方式加载模块，因此在开发过程中非常快速。\n\n## 项目搭建步骤\n\n要使用 Vite 构建 React 项目，首先确保你已经安装了 [Node.js](https://nodejs.org/)。接下来，按照以下步骤进行操作：\n\n1. **初始化项目**：`npm create vite@latest web-vite --template react`\n2. **进入项目文件夹**: `cd web-vite`\n3. **安装依赖**: `npm install`\n4. **启动开发服务器**: `npm run dev`\n\n至此，你可以在代码编辑器中修改 React 组件并实时查看更改。\n\n## 构建发布项目：\n\n当项目准备好发布时，运行以下命令构建项目：`npm run build`, 构建后的文件将存储在 dist 文件夹中，可以用于部署到生产环境。\n\n## 配置静态资源公共基础路径\n\n为了让build可以在任何目录下部署，这里将资源路径改为相对路径\n\n```js\nexport default defineConfig({\n    base: \"./\",\n});\n\n```\n\n## 适配老版本浏览器\n\n默认情况下，Vite 构建的项目将会生成适用于现代浏览器的代码。\n\n- Chrome \u003e=87\n- Firefox \u003e=78\n- Safari \u003e=14\n- Edge \u003e=88\n\n如果你需要支持老版本浏览器，你可以按照以下步骤进行操作：\n\n1. **安装插件**: `npm i -D @vitejs/plugin-legacy`\n2. **配置插件**:\n\n这里假设需要支持chrome52\n\n```js\nimport { defineConfig } from \"vite\";\nimport react from \"@vitejs/plugin-react\";\nimport legacy from \"@vitejs/plugin-legacy\";\n\n// https://vitejs.dev/config/\nexport default defineConfig({\n  base: \"./\",\n  plugins: [\n    react(),\n    legacy({\n      targets: [\"chrome 52\"],\n    }),\n  ]\n});\n```\n\n现在，你的 Vite React 项目应该可以在老版本浏览器中正常运行了。\n\n使用 Vite 构建 React 项目是一种快速而愉快的开发体验，同时还能够通过简单的配置适配老版本浏览器。希望这篇博客对你有所帮助，让你更轻松地开始构建 React 应用程序。\n\n\n\n\n","data":{"title":"使用Vite构建React项目","date":"2023-11-11","tags":["React","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![Vite](https://vitejs.cn/vite3-cn/logo-with-shadow.png)\n\n\n# 使用 Vite 构建 React 项目\n\n在前端开发领域，构建工具一直是不可或缺的一部分。Vite 是一个快速、简单的构建工具，它可以帮助我们快速搭建 React 项目并提供出色的开发体验。本文将介绍如何使用 Vite 构建 React 项目，包括 Vite 的简介、项目搭建步骤以及适配老版本浏览器的方法。\n\n"},{"id":"ssh-key","file":"ssh-key.md","excerptHtml":"","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://1000marcas.net/wp-content/uploads/2021/06/Git-Logo-1280x800.png\" alt=\"git\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003egit在远端pull或者push时报：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003einvalid format git@github.com: Permission denied (publickey).\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e问题场景：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003ewindows上把private key的内容复制到文本编辑器时会出现。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e根本原因：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e私钥的换行是单字符\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLF\u003c/code\u003e，但windows的默认换行符是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCRLF\u003c/code\u003e，所以导致git读取私钥报格式错误。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e解决办法：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用文本编辑器修改换行符，例如VSCODE中状态栏点击\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCRLF\u003c/code\u003e，然后切换成\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLF\u003c/code\u003e。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e笔记：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003essh -vT git@github.com\u003c/code\u003e 可以查看详细的ssh log，来排查ssh的问题。\n出现如下log说明ssh key已经正常配置：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eHi wangyucode! You've successfully authenticated, but GitHub does not provide shell access.\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![git](https://1000marcas.net/wp-content/uploads/2021/06/Git-Logo-1280x800.png)\n\ngit在远端pull或者push时报：\n\n```\ninvalid format git@github.com: Permission denied (publickey).\n```\n\n## 问题场景：\n\nwindows上把private key的内容复制到文本编辑器时会出现。\n\n## 根本原因：\n\n私钥的换行是单字符`LF`，但windows的默认换行符是`CRLF`，所以导致git读取私钥报格式错误。\n\n## 解决办法：\n\n使用文本编辑器修改换行符，例如VSCODE中状态栏点击`CRLF`，然后切换成`LF`。\n\n## 笔记：\n\n通过`ssh -vT git@github.com` 可以查看详细的ssh log，来排查ssh的问题。\n出现如下log说明ssh key已经正常配置：\n```\nHi wangyucode! You've successfully authenticated, but GitHub does not provide shell access.\n```\n","data":{"title":"解决 invalid format git@github.com: Permission denied (publickey).","date":"2023-09-11","tags":["Linux","Git"],"category":"Linux"},"isEmpty":false,"excerpt":""},{"id":"chat-gpt","file":"chat-gpt.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://cdn.openai.com/chatgpt/draft-20221129c/ChatGPT_Diagram.svg\" alt=\"ChatGPT\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eChatGPT是OpenAI在2022年11月推出的新一代由人工智能技术推动的自然语言处理模型。ChatGPT公布没多久，各大搜索引擎厂商都宣布正在开发自己的新版NPL模型，也是因为他们感受到了来自ChatGPT的压力。它能够理解并生成人类语言，能够回答问题，撰写文案，写诗歌，编故事，写代码，做Excel表格，它拥有上下文对话能力，在典型的使用场景下难以分辨是真人还是机器。ChatGPT被认为是下一代的搜索引，将会引起新一轮的技术革新浪潮。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本文介绍ChatGPT背后的工作原理和训练过程。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://cdn.openai.com/chatgpt/draft-20221129c/ChatGPT_Diagram.svg\" alt=\"ChatGPT\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eChatGPT是OpenAI在2022年11月推出的新一代由人工智能技术推动的自然语言处理模型。ChatGPT公布没多久，各大搜索引擎厂商都宣布正在开发自己的新版NPL模型，也是因为他们感受到了来自ChatGPT的压力。它能够理解并生成人类语言，能够回答问题，撰写文案，写诗歌，编故事，写代码，做Excel表格，它拥有上下文对话能力，在典型的使用场景下难以分辨是真人还是机器。ChatGPT被认为是下一代的搜索引，将会引起新一轮的技术革新浪潮。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本文介绍ChatGPT背后的工作原理和训练过程。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e罗马不是一天建成的\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eChatGPT脱胎于InstructGPT，而InstructGPT的前身是GPT-3，GPT-3的诞生就已经引起了业界的轰动，它的模型参数达到了1750亿，这比谷歌的BERT模型3.7亿参数大了400多倍。并且GPT-3可以使用很小的数据集来训练。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eGPT-3的缺陷：由于GPT-3使用使用互联网上巨大的数据集训练来预测下一个词，而不是去符合用户的期待，所以它难免会输出不可信的，或者有害的信息，负面的情绪等。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eInstructGPT的改进：通过基于人类反馈的强化学习（RLHF - reinforcement learning from human feedback），通过人类对模型的输出进行评分反馈来优化模型的行为。这使得模型更倾向于听人话而不是胡说八道。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eInstructGPT的训练过程\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e使用人工生成的示例 + 监督学习 + GPT-3训练一个模型出来\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e然后不同模型生成多种输出 + 人工标记 训练一个奖励模型\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e通过奖励模型 + 强化学习 + PPO算法 训练一开始的模型\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e由于步骤2要使用人工标记，这与预训练的模型数据量相比还不到2%，尽管对比GPT-3已经有了很大改进，InstructGPT也并不是完全安全的，它仍然会生成有偏见的输出，撒谎，输出有毒的内容。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eOpenAI也提到，目前训练的数据基于讲英语的社会价值观，最终需要更负责任和包容的选择。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eChatGPT更进一步\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eChatGPT的基础模型来自于训练GPT-3.5, 这个GPT-3.5是由一个代码补全模型，经InstructGPT优化而来。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e训练人员通过扮演用户和AI助手来生成模板对话，并将这些数据混合到InstructGPT的数据集中，然后将模型变成了一种对话的格式。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e和InstructGPT一样地，通过对模型的输出进行随机采样和人工评分。然后用得到的奖励模型，使用强化学习对初始模型进行训练。并对这个过程进行数次迭代。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e持续进化\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eChatGPT也不是完美的，但是它在持续进化，OpenAI做了一个网页聊天室\u003ca href=\"https://chat.openai.com/\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://chat.openai.com/\u003c/a\u003e，让ChatGPT接受来自更多用户的测试和评价。\n此外集成了ChatGPT的新版Bing在公测中。\nOpenAI肯定会基于收集的大量测试数据和用户反馈来升级和更新模型。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e真正的通用人工智能，或是有自由意识的人工智能还有多远，我们拭目以待。\u003c/p\u003e\n","content":"\n![ChatGPT](https://cdn.openai.com/chatgpt/draft-20221129c/ChatGPT_Diagram.svg)\n\nChatGPT是OpenAI在2022年11月推出的新一代由人工智能技术推动的自然语言处理模型。ChatGPT公布没多久，各大搜索引擎厂商都宣布正在开发自己的新版NPL模型，也是因为他们感受到了来自ChatGPT的压力。它能够理解并生成人类语言，能够回答问题，撰写文案，写诗歌，编故事，写代码，做Excel表格，它拥有上下文对话能力，在典型的使用场景下难以分辨是真人还是机器。ChatGPT被认为是下一代的搜索引，将会引起新一轮的技术革新浪潮。\n\n本文介绍ChatGPT背后的工作原理和训练过程。\n\n\u003c!--more--\u003e\n\n## 罗马不是一天建成的\n\nChatGPT脱胎于InstructGPT，而InstructGPT的前身是GPT-3，GPT-3的诞生就已经引起了业界的轰动，它的模型参数达到了1750亿，这比谷歌的BERT模型3.7亿参数大了400多倍。并且GPT-3可以使用很小的数据集来训练。\n\nGPT-3的缺陷：由于GPT-3使用使用互联网上巨大的数据集训练来预测下一个词，而不是去符合用户的期待，所以它难免会输出不可信的，或者有害的信息，负面的情绪等。\n\nInstructGPT的改进：通过基于人类反馈的强化学习（RLHF - reinforcement learning from human feedback），通过人类对模型的输出进行评分反馈来优化模型的行为。这使得模型更倾向于听人话而不是胡说八道。\n\n## InstructGPT的训练过程\n\n1. 使用人工生成的示例 + 监督学习 + GPT-3训练一个模型出来\n2. 然后不同模型生成多种输出 + 人工标记 训练一个奖励模型\n3. 通过奖励模型 + 强化学习 + PPO算法 训练一开始的模型\n\n由于步骤2要使用人工标记，这与预训练的模型数据量相比还不到2%，尽管对比GPT-3已经有了很大改进，InstructGPT也并不是完全安全的，它仍然会生成有偏见的输出，撒谎，输出有毒的内容。\n\nOpenAI也提到，目前训练的数据基于讲英语的社会价值观，最终需要更负责任和包容的选择。\n\n## ChatGPT更进一步\n\n- ChatGPT的基础模型来自于训练GPT-3.5, 这个GPT-3.5是由一个代码补全模型，经InstructGPT优化而来。\n- 训练人员通过扮演用户和AI助手来生成模板对话，并将这些数据混合到InstructGPT的数据集中，然后将模型变成了一种对话的格式。\n- 和InstructGPT一样地，通过对模型的输出进行随机采样和人工评分。然后用得到的奖励模型，使用强化学习对初始模型进行训练。并对这个过程进行数次迭代。\n\n## 持续进化\n\nChatGPT也不是完美的，但是它在持续进化，OpenAI做了一个网页聊天室\u003chttps://chat.openai.com/\u003e，让ChatGPT接受来自更多用户的测试和评价。\n此外集成了ChatGPT的新版Bing在公测中。\nOpenAI肯定会基于收集的大量测试数据和用户反馈来升级和更新模型。\n\n真正的通用人工智能，或是有自由意识的人工智能还有多远，我们拭目以待。\n\n\n\n\n","data":{"title":"ChatGPT是如何被训练出来的","date":"2022-12-01","tags":["ChatGPT"],"category":"AI"},"isEmpty":false,"excerpt":"\n![ChatGPT](https://cdn.openai.com/chatgpt/draft-20221129c/ChatGPT_Diagram.svg)\n\nChatGPT是OpenAI在2022年11月推出的新一代由人工智能技术推动的自然语言处理模型。ChatGPT公布没多久，各大搜索引擎厂商都宣布正在开发自己的新版NPL模型，也是因为他们感受到了来自ChatGPT的压力。它能够理解并生成人类语言，能够回答问题，撰写文案，写诗歌，编故事，写代码，做Excel表格，它拥有上下文对话能力，在典型的使用场景下难以分辨是真人还是机器。ChatGPT被认为是下一代的搜索引，将会引起新一轮的技术革新浪潮。\n\n本文介绍ChatGPT背后的工作原理和训练过程。\n\n"}],"pageCount":16,"postTitles":[["ai","这一波AI浪潮是否是泡沫？"],["caddy","Caddy的安装和使用"],["vite","使用Vite构建React项目"],["ssh-key","解决 invalid format git@github.com: Permission denied (publickey)."],["chat-gpt","ChatGPT是如何被训练出来的"],["http3","升级到HTTP3"],["esm-node-ts","esModule + NodeJS + TypeScript 的工程配置"],["the-crowd","《乌合之众：大众心理研究》热门标注"],["auto-deploy","基于Docker的自动化部署"],["rust-ownership","理解Rust语言的所有权以及借用、引用、切片。"],["docker-mongodb","备份和还原Docker容器中的MongoDB数据"],["github-action","使用Github Action进行持续集成"],["chicken-dinner-tesla","用数学期望计算《和平精英》特斯拉（玛莎拉蒂）到底要多少钱？"],["websocket","使用WebSocket和STOMP协议开发一个匿名聊天室"],["docker-spring","使用Docker容器部署SpringBoot项目"],["virtualbox-network","VirtualBox的虚拟机网络配置"],["ngrok","实现内网穿透的最新姿势"],["h2-password","H2数据库修改密码"],["raspberrypi-fish","用树莓派4B做一个鱼缸水位报警"],["raspberrypi","树莓派4B系统安装及配置"],["rich-dad","《富爸爸，穷爸爸》热门标注"],["flutter-web","使用Flutter开发Web应用"],["swagger-auth","SpringBoot工程为SwaggerUI添加认证"],["spring-error","SpringBoot工程自定义错误JSON字段"],["oauth","OAuth2.0四种模式完整时序图"],["ant-design-pro","学习和拆解Ant-Design-Pro"],["email","使用SpringBoot发送SSL邮件"],["comments-sql","从0开始开发一个评论系统"],["travis-ci","使用TravisCI进行持续集成"],["nginx-redirect","NGINX配置重定向"],["flutter","使用Flutter开发跨平台应用"],["netty-function","使用Netty和阿里云函数写一个低成本的“梯子”"],["netty","使用Netty开发高性能的网络服务应用"],["web-flux","理解Spring WebFlux框架中的响应式类型"],["nginx","Ubuntu16.04安装配置NGINX服务"],["springboot-static-content","SpringBoot配置Jar外部静态资源"],["many-to-many","Spring JPA框架中的@ManyToMany多对多关系的理解和使用"],["tomcat","SwaggerUI GET请求中文乱码问题解决"],["data-structures03","数据结构与算法学习笔记03"],["react-native","React Native源码解析（Android篇）"],["data-structures02","数据结构与算法学习笔记02"],["data
