cript><script src="/_next/static/NDkQWnMtEcy0IDQqDGEkS/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"post":{"id":"springboot-static-content","file":"springboot-static-content.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180623_springboot.jpg\" alt=\"springboot\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e我们知道SpringBoot内置了tomcat服务器，从而一个jar包就能实现web服务。但有时我们又想像传统tomcat那样部署一些外部的静态资源，虽然静态资源放在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eresource\u003c/code\u003e文件夹的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estatic\u003c/code\u003e就能解决问题，但是static文件夹的内容会作为jar的一部分，要替换的话只能替换整个jar包，极为不便。能不能配置jar包外部的文件夹作为静态资源目录呢。当然是可以的...\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e以下示例代码基于SpringBoot 2.0.3，采用Kotlin语言实现：\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180623_springboot.jpg\" alt=\"springboot\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e我们知道SpringBoot内置了tomcat服务器，从而一个jar包就能实现web服务。但有时我们又想像传统tomcat那样部署一些外部的静态资源，虽然静态资源放在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eresource\u003c/code\u003e文件夹的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estatic\u003c/code\u003e就能解决问题，但是static文件夹的内容会作为jar的一部分，要替换的话只能替换整个jar包，极为不便。能不能配置jar包外部的文件夹作为静态资源目录呢。当然是可以的...\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e以下示例代码基于SpringBoot 2.0.3，采用Kotlin语言实现：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eWebMvcConfigurer\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e新版Spring利用了Java8新特性，interface可以有default关键字，从而接口方法不用全部实现。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\nclass WebConfiguration : WebMvcConfigurer {\n\n    override fun addResourceHandlers(registry: ResourceHandlerRegistry) {\n        super.addResourceHandlers(registry)\n        registry.addResourceHandler(\"/**\")\n                .addResourceLocations(\"file:static/\")\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@Configuration\u003c/code\u003e注解表明这是一个配置类，会被Spring框架识别并管理。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebConfiguration\u003c/code\u003e类实现\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebMvcConfigurer\u003c/code\u003e接口，并复写\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eaddResourceHandlers\u003c/code\u003e方法。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eaddResourceHandler(\"/**\")\u003c/code\u003e添加路由到服务器根目录。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.addResourceLocations(\"file:static/\")\u003c/code\u003e添加外部静态资源，这里路径表示和jar包同目录的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estatic\u003c/code\u003e文件夹。这样能想tomcat一样在static文件夹中部署静态资源了。而且不用重启SpringBoot服务\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n![springboot](/images/20180623_springboot.jpg)\n\n\u003e 我们知道SpringBoot内置了tomcat服务器，从而一个jar包就能实现web服务。但有时我们又想像传统tomcat那样部署一些外部的静态资源，虽然静态资源放在`resource`文件夹的`static`就能解决问题，但是static文件夹的内容会作为jar的一部分，要替换的话只能替换整个jar包，极为不便。能不能配置jar包外部的文件夹作为静态资源目录呢。当然是可以的...\n\n以下示例代码基于SpringBoot 2.0.3，采用Kotlin语言实现：\n\n\u003c!--more--\u003e\n\n## WebMvcConfigurer\n\n\u003e 新版Spring利用了Java8新特性，interface可以有default关键字，从而接口方法不用全部实现。\n\n```kotlin\n@Configuration\nclass WebConfiguration : WebMvcConfigurer {\n\n    override fun addResourceHandlers(registry: ResourceHandlerRegistry) {\n        super.addResourceHandlers(registry)\n        registry.addResourceHandler(\"/**\")\n                .addResourceLocations(\"file:static/\")\n    }\n}\n```\n\n- `@Configuration`注解表明这是一个配置类，会被Spring框架识别并管理。\n- `WebConfiguration`类实现`WebMvcConfigurer`接口，并复写`addResourceHandlers`方法。\n- `addResourceHandler(\"/**\")`添加路由到服务器根目录。\n- `.addResourceLocations(\"file:static/\")`添加外部静态资源，这里路径表示和jar包同目录的`static`文件夹。这样能想tomcat一样在static文件夹中部署静态资源了。而且不用重启SpringBoot服务\n","data":{"title":"SpringBoot配置Jar外部静态资源","date":"2018-06-23","tags":["Spring","Java"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![springboot](/images/20180623_springboot.jpg)\n\n\u003e 我们知道SpringBoot内置了tomcat服务器，从而一个jar包就能实现web服务。但有时我们又想像传统tomcat那样部署一些外部的静态资源，虽然静态资源放在`resource`文件夹的`static`就能解决问题，但是static文件夹的内容会作为jar的一部分，要替换的话只能替换整个jar包，极为不便。能不能配置jar包外部的文件夹作为静态资源目录呢。当然是可以的...\n\n以下示例代码基于SpringBoot 2.0.3，采用Kotlin语言实现：\n\n"}},"__N_SSG":true},"page":"/blog/[pid]","query":{"pid":"springboot-static-content"},"buildId":"NDkQWnMtEcy0IDQqDGEkS","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
