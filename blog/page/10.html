-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"rxjava","file":"rxjava.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://cdn-ssl-devio-img.classmethod.jp/wp-content/uploads/2021/08/ReactoveX.png\" alt=\"ReactiveX\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eRxJava是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e的Java分支，除了Java版，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e响应式编程\u003c/code\u003e，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLambda\u003c/code\u003e表达式和链式编程，让程序变得更加简洁优雅。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://cdn-ssl-devio-img.classmethod.jp/wp-content/uploads/2021/08/ReactoveX.png\" alt=\"ReactiveX\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eRxJava是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e的Java分支，除了Java版，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e响应式编程\u003c/code\u003e，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLambda\u003c/code\u003e表达式和链式编程，让程序变得更加简洁优雅。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e看完了RactiveX的简介，觉得用它来封装一个网络请求框架应该是再好不过了，但是当我真正开始封装网络请求时，我发现：RxJava给的答案是，你并不需要去封装，而是\u003cstrong\u003e直接使用\u003c/strong\u003e就好了。实例代码如下。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHello RxJava\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\tpublic void onClick(View v) {\n        Observable.create((ObservableOnSubscribe\u0026#x3C;String\u003e) emitter -\u003e emitter.onNext(httpRequest()))  //1.\n                .subscribeOn(Schedulers.io())  //2.\n                .observeOn(AndroidSchedulers.mainThread())  //3.\n                .subscribe(s -\u003e textView.setText(s));  //4.\n    }\n    \n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e核心代码就是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOnClick\u003c/code\u003e方法中的四行。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e步骤如下：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecreate\u003c/code\u003e函数创建\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eObservable\u003c/code\u003e对象\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e订阅调度到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSchedulers.io()\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eio\u003c/code\u003e是一个有线程缓存的新线程调度器\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e将事件消费调度到Android的主线程上\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e消费者（观察者）代码\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttpRequest()\u003c/code\u003e没用到任何复杂的框架，就用原生的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHttpURLConnection\u003c/code\u003e做一个网络请求，返回请求结果的String，代码如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\tprivate String httpRequest() throws Exception {\n        URL url = new URL(\"http://wycode.cn/\");\n        HttpURLConnection urlConnection = (HttpURLConnection) url.openConnection();\n        String result;\n        try {\n            BufferedInputStream in = new BufferedInputStream(urlConnection.getInputStream());\n            result = readStream(in);\n        } finally {\n            urlConnection.disconnect();\n        }\n        return result;\n    }\n\n    private String readStream(BufferedInputStream in) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(in));\n        StringBuilder sb = new StringBuilder();\n        String line;\n        try {\n            while ((line = reader.readLine()) != null) {\n                sb.append(line).append(\"\\n\");\n            }\n        } catch (IOException e) {\n            e.printStackTrace();\n        } finally {\n            try {\n                in.close();\n            } catch (IOException e) {\n                e.printStackTrace();\n            }\n        }\n        return sb.toString();\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e变换操作\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通常的，我们在请求网络后要对服务器返回的字符串进行解析，这时我们可以使用RxJava的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTransforming\u003c/code\u003e操作，在返回前将JSON String转为实体类。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eObservable.create((ObservableOnSubscribe\u0026#x3C;String\u003e) emitter -\u003e emitter.onNext(httpRequest(\"https://wycode.cn/web/api/public/hello?message=Hello\"))) //1.\n                .map(s -\u003e JSON.parseObject(s,Message.class)) //解析JSON\n                .subscribeOn(Schedulers.io()) //2.\n                .observeOn(AndroidSchedulers.mainThread()) //3.\n                .subscribe(message -\u003e textView.setText(message.message)); //4.\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e可以看到在原有代码几乎没变的情况下，加上1行代码就实现了将Json转为实体再处理的需求。这就是RxJava的魅力。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e完整源码在这里：\u003ca href=\"https://github.com/wangyucode/rxjava\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/rxjava\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而以上也仅仅用到了RxJava的冰山一角，还有各种各样的函数来满足各种各样的需求。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e函数列表在这里：\u003ca href=\"http://reactivex.io/documentation/operators.html\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttp://reactivex.io/documentation/operators.html\u003c/a\u003e\u003c/p\u003e\n","content":"\n![ReactiveX](https://cdn-ssl-devio-img.classmethod.jp/wp-content/uploads/2021/08/ReactoveX.png)\n\n\u003e RxJava是`ReactiveX`的Java分支，除了Java版，`ReactiveX`还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\n\n\n\u003e ReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为`响应式编程`，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上`Lambda`表达式和链式编程，让程序变得更加简洁优雅。\n\n\u003c!--more--\u003e\n\n\n看完了RactiveX的简介，觉得用它来封装一个网络请求框架应该是再好不过了，但是当我真正开始封装网络请求时，我发现：RxJava给的答案是，你并不需要去封装，而是**直接使用**就好了。实例代码如下。\n\n## Hello RxJava\n\n```Java\n\tpublic void onClick(View v) {\n        Observable.create((ObservableOnSubscribe\u003cString\u003e) emitter -\u003e emitter.onNext(httpRequest()))  //1.\n                .subscribeOn(Schedulers.io())  //2.\n                .observeOn(AndroidSchedulers.mainThread())  //3.\n                .subscribe(s -\u003e textView.setText(s));  //4.\n    }\n    \n```\n\n核心代码就是`OnClick`方法中的四行。\n\n步骤如下：\n\n\n1. 通过`create`函数创建`Observable`对象\n2. 订阅调度到`Schedulers.io()`，`io`是一个有线程缓存的新线程调度器\n3. 将事件消费调度到Android的主线程上\n4. 消费者（观察者）代码\n\n`httpRequest()`没用到任何复杂的框架，就用原生的`HttpURLConnection`做一个网络请求，返回请求结果的String，代码如下：\n\n```Java\n\tprivate String httpRequest() throws Exception {\n        URL url = new URL(\"http://wycode.cn/\");\n        HttpURLConnection urlConnection = (HttpURLConnection) url.openConnection();\n        String result;\n        try {\n            BufferedInputStream in = new BufferedInputStream(urlConnection.getInputStream());\n            result = readStream(in);\n        } finally {\n            urlConnection.disconnect();\n        }\n        return result;\n    }\n\n    private String readStream(BufferedInputStream in) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(in));\n        StringBuilder sb = new StringBuilder();\n        String line;\n        try {\n            while ((line = reader.readLine()) != null) {\n                sb.append(line).append(\"\\n\");\n            }\n        } catch (IOException e) {\n            e.printStackTrace();\n        } finally {\n            try {\n                in.close();\n            } catch (IOException e) {\n                e.printStackTrace();\n            }\n        }\n        return sb.toString();\n    }\n```\n\n## 变换操作\n\n通常的，我们在请求网络后要对服务器返回的字符串进行解析，这时我们可以使用RxJava的`Transforming`操作，在返回前将JSON String转为实体类。\n\n```Java\nObservable.create((ObservableOnSubscribe\u003cString\u003e) emitter -\u003e emitter.onNext(httpRequest(\"https://wycode.cn/web/api/public/hello?message=Hello\"))) //1.\n                .map(s -\u003e JSON.parseObject(s,Message.class)) //解析JSON\n                .subscribeOn(Schedulers.io()) //2.\n                .observeOn(AndroidSchedulers.mainThread()) //3.\n                .subscribe(message -\u003e textView.setText(message.message)); //4.\n```\n\n可以看到在原有代码几乎没变的情况下，加上1行代码就实现了将Json转为实体再处理的需求。这就是RxJava的魅力。\n\n完整源码在这里：https://github.com/wangyucode/rxjava\n\n而以上也仅仅用到了RxJava的冰山一角，还有各种各样的函数来满足各种各样的需求。\n\n函数列表在这里：http://reactivex.io/documentation/operators.html\n","data":{"title":"RxJava入门","date":"2018-01-20","tags":["RxJava","Java"],"category":"Languages"},"isEmpty":false,"excerpt":"\n![ReactiveX](https://cdn-ssl-devio-img.classmethod.jp/wp-content/uploads/2021/08/ReactoveX.png)\n\n\u003e RxJava是`ReactiveX`的Java分支，除了Java版，`ReactiveX`还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\n\n\n\u003e ReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为`响应式编程`，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上`Lambda`表达式和链式编程，让程序变得更加简洁优雅。\n\n"},{"id":"react","file":"react.md","excerptHtml":"","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eReact框架的整体思路是将DOM元素彻底改为由JS代码渲染，通过组件(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e)的层层嵌套，最终由\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactDOM.render()\u003c/code\u003e渲染到页面上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003eReact框架的核心概念：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e元素(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eElement\u003c/code\u003e) Recat认为元素是不可变的，创建后不能修改。React使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJSX\u003c/code\u003e技术将HTML代码直接作为常量使用。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e组件(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e) 组件是对元素的封装。拥有自身的生命周期函数。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e属性(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eProps\u003c/code\u003e) 属性可以看作常量，用于构建特定的组件。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e状态(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eState\u003c/code\u003e) 组件通过状态维护自身变化。组件通过调用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esetState()\u003c/code\u003e方法重新渲染。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eReact的理念是采取\u003ca href=\"https://en.wikipedia.org/wiki/Single_responsibility_principle\" title=\"Wiki\" class=\"text-sky-500 hover:text-sky-400\"\u003e单一责任原则\u003c/a\u003e，自顶向下设计，一层层的拆分成只做一件事的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在做一个实际的项目时，采取先使用假数据画页面的方式，这个过程中只需要关心数据模型和页面。而不去关心逻辑交互。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e为什么要分成\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eProps\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eState\u003c/code\u003e就显而易见了，做页面时只关心\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eProps\u003c/code\u003e，做交互时只关心\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eState\u003c/code\u003e。\u003c/p\u003e\n","content":"\n![React](/images/20180213_react.png)\n\n\u003e React框架的整体思路是将DOM元素彻底改为由JS代码渲染，通过组件(`Component`)的层层嵌套，最终由`ReactDOM.render()`渲染到页面上。\n\nReact框架的核心概念：\n\n- 元素(`Element`) Recat认为元素是不可变的，创建后不能修改。React使用`JSX`技术将HTML代码直接作为常量使用。\n- 组件(`Component`) 组件是对元素的封装。拥有自身的生命周期函数。\n- 属性(`Props`) 属性可以看作常量，用于构建特定的组件。\n- 状态(`State`) 组件通过状态维护自身变化。组件通过调用`setState()`方法重新渲染。\n\nReact的理念是采取[单一责任原则](https://en.wikipedia.org/wiki/Single_responsibility_principle \"Wiki\")，自顶向下设计，一层层的拆分成只做一件事的`Component`。\n\n在做一个实际的项目时，采取先使用假数据画页面的方式，这个过程中只需要关心数据模型和页面。而不去关心逻辑交互。\n\n此时`Component`为什么要分成`Props`和`State`就显而易见了，做页面时只关心`Props`，做交互时只关心`State`。","data":{"title":"React框架原理的思考","date":"2018-01-06","tags":["React","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":""},{"id":"angular","file":"angular.md","excerptHtml":"","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.brunobrito.net.br/content/images/2018/07/angular-logo-1.png\" alt=\"Angular\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eAngular框架的整体思路，很像Spring这样的后台框架。一层层的分解、解耦，天下框架莫不如此。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003eAngular有3个重要概念：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e模块(Module)\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e组件(Component)\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e路由(Router)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eAngular通过将大型项目分割成一个个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e模块\u003c/code\u003e，松耦合，便于扩展和维护。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e所谓\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e组件\u003c/code\u003e，就是一个MVC块，每个模块会有很多组件，组件代表了一个页面，可以嵌套，因此可以更加细分下去，通过元数据做双向绑定。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e所谓\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e路由\u003c/code\u003e，就是一个分发器，不同的路径加载不同的模块或组件即可。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e所谓\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e元数据\u003c/code\u003e，就是Java注解。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eSpring那套，控制反转（IOC）依赖注入（DI）也被引入进来。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e将业务逻辑封装到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eService\u003c/code\u003e里，然后注入到各个组件中使用。业务代码就彻底被隔离到Service里了，不会侵入框架整体设计。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e关于Webpack：Webpack在打包Web工程时，可以找到资源之间的引用，最小化压缩合并CSS，JavaScript文件。\u003c/p\u003e\n","content":"\n![Angular](https://www.brunobrito.net.br/content/images/2018/07/angular-logo-1.png)\n\n\u003e Angular框架的整体思路，很像Spring这样的后台框架。一层层的分解、解耦，天下框架莫不如此。\n\nAngular有3个重要概念：\n\n- 模块(Module)\n- 组件(Component)\n- 路由(Router)\n\nAngular通过将大型项目分割成一个个`模块`，松耦合，便于扩展和维护。\n\n所谓`组件`，就是一个MVC块，每个模块会有很多组件，组件代表了一个页面，可以嵌套，因此可以更加细分下去，通过元数据做双向绑定。\n\n所谓`路由`，就是一个分发器，不同的路径加载不同的模块或组件即可。\n\n所谓`元数据`，就是Java注解。\n\nSpring那套，控制反转（IOC）依赖注入（DI）也被引入进来。\n\n将业务逻辑封装到`Service`里，然后注入到各个组件中使用。业务代码就彻底被隔离到Service里了，不会侵入框架整体设计。\n\n关于Webpack：Webpack在打包Web工程时，可以找到资源之间的引用，最小化压缩合并CSS，JavaScript文件。","data":{"title":"Angular框架原理的思考","date":"2017-12-28","tags":["Angular","TypeScript","HTML"],"category":"Frontend"},"isEmpty":false,"excerpt":""},{"id":"jwt","file":"jwt.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://ts1.cn.mm.bing.net/th/id/R-C.db4d0c221a205b33b6296fe6412bfe91?rik=%2fIH2gS%2fgcubddQ\u0026#x26;riu=http%3a%2f%2fordina-jworks.github.io%2fimg%2fJWT%2fjwt-logo.png\u0026#x26;ehk=jeV7Iwj5nNSP9Pl927GxkmOei90QHBPvQtKMY5A0KrM%3d\u0026#x26;risl=\u0026#x26;pid=ImgRaw\u0026#x26;r=0\u0026#x26;sres=1\u0026#x26;sresct=1\" alt=\"jwt\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e为使用前后端分离的后端管理框架做准备，使用JWT目前看来是最佳选择。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e知其然\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e无状态\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e服务化\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e移动、web统统支持，后端提供相关接口即可\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e知其所以然\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e认证：通过调用登录接口，服务器颁发一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJWT\u003c/code\u003e（JSON Web Token）给客户端。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e鉴权：客户端每个请求携带\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJWT\u003c/code\u003e，后端使用一个请求过滤器，从请求头中解析\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJWT\u003c/code\u003e，为本次请求授予相关权限\u003c/li\u003e\n\u003c/ol\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://ts1.cn.mm.bing.net/th/id/R-C.db4d0c221a205b33b6296fe6412bfe91?rik=%2fIH2gS%2fgcubddQ\u0026#x26;riu=http%3a%2f%2fordina-jworks.github.io%2fimg%2fJWT%2fjwt-logo.png\u0026#x26;ehk=jeV7Iwj5nNSP9Pl927GxkmOei90QHBPvQtKMY5A0KrM%3d\u0026#x26;risl=\u0026#x26;pid=ImgRaw\u0026#x26;r=0\u0026#x26;sres=1\u0026#x26;sresct=1\" alt=\"jwt\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e为使用前后端分离的后端管理框架做准备，使用JWT目前看来是最佳选择。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e知其然\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e无状态\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e服务化\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e移动、web统统支持，后端提供相关接口即可\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e知其所以然\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e认证：通过调用登录接口，服务器颁发一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJWT\u003c/code\u003e（JSON Web Token）给客户端。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e鉴权：客户端每个请求携带\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJWT\u003c/code\u003e，后端使用一个请求过滤器，从请求头中解析\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJWT\u003c/code\u003e，为本次请求授予相关权限\u003c/li\u003e\n\u003c/ol\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e导入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eio.jsonwebtoken:jjwt\u003c/code\u003e\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ejjwt\u003c/code\u003e提供了JWT主要功能的Java版本实现，目前版本是0.9.0\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edependencies {\n    compile 'io.jsonwebtoken:jjwt:0.9.0'\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e生成token\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eprivate String generateToken(Map\u0026#x3C;String, Object\u003e claims) {\n        return Jwts.builder()\n                .setClaims(claims) //自定义声明\n                .setExpiration(generateExpirationDate()) //过期时间\n                .signWith(SignatureAlgorithm.HS512, secret) //加密\n                .compact();\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e解析token\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eprivate Claims getClaimsFromToken(String token) {\n        Claims claims;\n        try {\n            claims = Jwts.parser()\n                    .setSigningKey(secret)\n                    .parseClaimsJws(token)\n                    .getBody();\n        } catch (Exception e) {\n            claims = null;\n        }\n        return claims;\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e鉴权过滤器\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode.web.config.security;\n\nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.beans.factory.annotation.Value;\nimport org.springframework.security.authentication.UsernamePasswordAuthenticationToken;\nimport org.springframework.security.core.context.SecurityContextHolder;\nimport org.springframework.security.core.userdetails.UserDetails;\nimport org.springframework.security.core.userdetails.UserDetailsService;\nimport org.springframework.security.web.authentication.WebAuthenticationDetailsSource;\nimport org.springframework.stereotype.Component;\nimport org.springframework.web.filter.OncePerRequestFilter;\n\nimport javax.servlet.FilterChain;\nimport javax.servlet.ServletException;\nimport javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\nimport java.io.IOException;\n\n\n@Component\npublic class JwtAuthenticationTokenFilter extends OncePerRequestFilter {\n\n    @Autowired\n    private UserDetailsService userDetailsService;\n\n    @Autowired\n    private JwtTokenUtil jwtTokenUtil;\n\n    @Value(\"${jwt.header}\")\n    private String tokenHeader;\n\n    @Value(\"${jwt.tokenHead}\")\n    private String tokenHead;\n\n    @Override\n    protected void doFilterInternal(\n            HttpServletRequest request,\n            HttpServletResponse response,\n            FilterChain chain) throws ServletException, IOException {\n\n        String authHeader = request.getHeader(this.tokenHeader);\n        if (authHeader != null \u0026#x26;\u0026#x26; authHeader.startsWith(tokenHead)) {\n            final String authToken = authHeader.substring(tokenHead.length()); // The part after \"Bearer \"\n            String account = jwtTokenUtil.getUsernameFromToken(authToken);\n\n            logger.info(\"checking authentication \" + account);\n\n            if (account != null \u0026#x26;\u0026#x26; SecurityContextHolder.getContext().getAuthentication() == null) {\n                UserDetails userDetails = this.userDetailsService.loadUserByUsername(account);\n\n                if (jwtTokenUtil.validateToken(authToken, userDetails)) {\n                    UsernamePasswordAuthenticationToken authentication = new UsernamePasswordAuthenticationToken(\n                            userDetails, null, userDetails.getAuthorities());\n                    authentication.setDetails(new WebAuthenticationDetailsSource().buildDetails(\n                            request));\n                    logger.info(\"authenticated user \" + account + \", setting security context\");\n                    SecurityContextHolder.getContext().setAuthentication(authentication);\n                }\n            }\n        }\n\n        chain.doFilter(request, response);\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e配置Spring security\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e    httpSecurity.addFilterBefore(authenticationTokenFilterBean(),UsernamePasswordAuthenticationFilter.class);\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![jwt](https://ts1.cn.mm.bing.net/th/id/R-C.db4d0c221a205b33b6296fe6412bfe91?rik=%2fIH2gS%2fgcubddQ\u0026riu=http%3a%2f%2fordina-jworks.github.io%2fimg%2fJWT%2fjwt-logo.png\u0026ehk=jeV7Iwj5nNSP9Pl927GxkmOei90QHBPvQtKMY5A0KrM%3d\u0026risl=\u0026pid=ImgRaw\u0026r=0\u0026sres=1\u0026sresct=1)\n\n为使用前后端分离的后端管理框架做准备，使用JWT目前看来是最佳选择。\n\n## 知其然\n\n- 无状态\n- 服务化\n- 移动、web统统支持，后端提供相关接口即可\n\n## 知其所以然\n\n1. 认证：通过调用登录接口，服务器颁发一个`JWT`（JSON Web Token）给客户端。\n2. 鉴权：客户端每个请求携带`JWT`，后端使用一个请求过滤器，从请求头中解析`JWT`，为本次请求授予相关权限\n\n\u003c!--more--\u003e\n\n## 导入`io.jsonwebtoken:jjwt`\n\n`jjwt`提供了JWT主要功能的Java版本实现，目前版本是0.9.0\n\n```json\ndependencies {\n    compile 'io.jsonwebtoken:jjwt:0.9.0'\n}\n```\n\n### 生成token\n\n```java\nprivate String generateToken(Map\u003cString, Object\u003e claims) {\n        return Jwts.builder()\n                .setClaims(claims) //自定义声明\n                .setExpiration(generateExpirationDate()) //过期时间\n                .signWith(SignatureAlgorithm.HS512, secret) //加密\n                .compact();\n    }\n```\n\n### 解析token\n\n```java\nprivate Claims getClaimsFromToken(String token) {\n        Claims claims;\n        try {\n            claims = Jwts.parser()\n                    .setSigningKey(secret)\n                    .parseClaimsJws(token)\n                    .getBody();\n        } catch (Exception e) {\n            claims = null;\n        }\n        return claims;\n    }\n```\n\n\n## 鉴权过滤器\n\n```java\npackage cn.wycode.web.config.security;\n\nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.beans.factory.annotation.Value;\nimport org.springframework.security.authentication.UsernamePasswordAuthenticationToken;\nimport org.springframework.security.core.context.SecurityContextHolder;\nimport org.springframework.security.core.userdetails.UserDetails;\nimport org.springframework.security.core.userdetails.UserDetailsService;\nimport org.springframework.security.web.authentication.WebAuthenticationDetailsSource;\nimport org.springframework.stereotype.Component;\nimport org.springframework.web.filter.OncePerRequestFilter;\n\nimport javax.servlet.FilterChain;\nimport javax.servlet.ServletException;\nimport javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\nimport java.io.IOException;\n\n\n@Component\npublic class JwtAuthenticationTokenFilter extends OncePerRequestFilter {\n\n    @Autowired\n    private UserDetailsService userDetailsService;\n\n    @Autowired\n    private JwtTokenUtil jwtTokenUtil;\n\n    @Value(\"${jwt.header}\")\n    private String tokenHeader;\n\n    @Value(\"${jwt.tokenHead}\")\n    private String tokenHead;\n\n    @Override\n    protected void doFilterInternal(\n            HttpServletRequest request,\n            HttpServletResponse response,\n            FilterChain chain) throws ServletException, IOException {\n\n        String authHeader = request.getHeader(this.tokenHeader);\n        if (authHeader != null \u0026\u0026 authHeader.startsWith(tokenHead)) {\n            final String authToken = authHeader.substring(tokenHead.length()); // The part after \"Bearer \"\n            String account = jwtTokenUtil.getUsernameFromToken(authToken);\n\n            logger.info(\"checking authentication \" + account);\n\n            if (account != null \u0026\u0026 SecurityContextHolder.getContext().getAuthentication() == null) {\n                UserDetails userDetails = this.userDetailsService.loadUserByUsername(account);\n\n                if (jwtTokenUtil.validateToken(authToken, userDetails)) {\n                    UsernamePasswordAuthenticationToken authentication = new UsernamePasswordAuthenticationToken(\n                            userDetails, null, userDetails.getAuthorities());\n                    authentication.setDetails(new WebAuthenticationDetailsSource().buildDetails(\n                            request));\n                    logger.info(\"authenticated user \" + account + \", setting security context\");\n                    SecurityContextHolder.getContext().setAuthentication(authentication);\n                }\n            }\n        }\n\n        chain.doFilter(request, response);\n    }\n}\n```\n\n### 配置Spring security\n\n```java\n    httpSecurity.addFilterBefore(authenticationTokenFilterBean(),UsernamePasswordAuthenticationFilter.class);\n```\n","data":{"title":"使用JWT和Spring Security结合开发一套认证鉴权系统","date":"2017-11-17","tags":["Spring","JWT","JSON","OAuth"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![jwt](https://ts1.cn.mm.bing.net/th/id/R-C.db4d0c221a205b33b6296fe6412bfe91?rik=%2fIH2gS%2fgcubddQ\u0026riu=http%3a%2f%2fordina-jworks.github.io%2fimg%2fJWT%2fjwt-logo.png\u0026ehk=jeV7Iwj5nNSP9Pl927GxkmOei90QHBPvQtKMY5A0KrM%3d\u0026risl=\u0026pid=ImgRaw\u0026r=0\u0026sres=1\u0026sresct=1)\n\n为使用前后端分离的后端管理框架做准备，使用JWT目前看来是最佳选择。\n\n## 知其然\n\n- 无状态\n- 服务化\n- 移动、web统统支持，后端提供相关接口即可\n\n## 知其所以然\n\n1. 认证：通过调用登录接口，服务器颁发一个`JWT`（JSON Web Token）给客户端。\n2. 鉴权：客户端每个请求携带`JWT`，后端使用一个请求过滤器，从请求头中解析`JWT`，为本次请求授予相关权限\n\n"},{"id":"vue","file":"vue.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://tse4-mm.cn.bing.net/th/id/OIP-C.CPDIH8BWrGipHRJ6o6E2VwHaEc?pid=ImgDet\u0026#x26;rs=1\" alt=\"vue\"
