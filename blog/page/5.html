-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"flutter-web","file":"flutter-web.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://flutter.dev/assets/flutter-lockup-4cb0ee072ab312e59784d9fbf4fb7ad42688a7fdaea1270ccf6bbf4f34b7e03f.svg\" alt=\"flutter\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在Google IO 2019开发者大会上，Flutter和Dart发表了超越移动端，为iOS，Android，ChromeOS和Web构建应用的主题演讲。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e时至今日，想必Flutter已经可以开发Web应用了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我们知道Flutter是使用叫\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSkia\u003c/code\u003e的C++库来渲染UI，但是Web上是使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDom\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCanvas\u003c/code\u003e，以及\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebGL\u003c/code\u003e，那么Flutter到底会采用哪种方式呢？\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章带你对Flutter for web做一个了解和实践：\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://flutter.dev/assets/flutter-lockup-4cb0ee072ab312e59784d9fbf4fb7ad42688a7fdaea1270ccf6bbf4f34b7e03f.svg\" alt=\"flutter\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在Google IO 2019开发者大会上，Flutter和Dart发表了超越移动端，为iOS，Android，ChromeOS和Web构建应用的主题演讲。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e时至今日，想必Flutter已经可以开发Web应用了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我们知道Flutter是使用叫\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSkia\u003c/code\u003e的C++库来渲染UI，但是Web上是使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDom\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCanvas\u003c/code\u003e，以及\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebGL\u003c/code\u003e，那么Flutter到底会采用哪种方式呢？\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章带你对Flutter for web做一个了解和实践：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e架构设计\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://flutter.dev/images/Dart-framework-v-browser-framework.png\" alt=\"Architecture\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e原理\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e目前联合了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDOM\u003c/code\u003e, \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCanvas\u003c/code\u003e, \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCSS\u003c/code\u003e来进行渲染，将\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDart\u003c/code\u003e代码编译为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJavaScript\u003c/code\u003e来执行，这跟\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTypescript\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eKotlin\u003c/code\u003e都是一样的。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e目前进度\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e截至今天（2019年7月25日）Flutter for Web还处于技术预览的阶段，还很不稳定。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e开发团队创建了一个\u003ca href=\"https://github.com/flutter/flutter_web\" class=\"text-sky-500 hover:text-sky-400\"\u003eFrok\u003c/a\u003e，但最终这些代码将会被merge到\u003ca href=\"https://github.com/flutter/flutter\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/flutter/flutter\u003c/a\u003e中。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e环境安装\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003cdel\u003e安装\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDart\u003c/code\u003e\u003c/del\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e安装\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFlutter\u003c/code\u003e，Flutter 1.5 以上就可以支持以web作为target平台，我这里安装的是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e1.7.8\u003c/code\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e安装\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewebdev\u003c/code\u003e，通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eflutter pub global active webdev\u003c/code\u003e全局安装\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewebdev\u003c/code\u003e工具包。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e为了能够全局执行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewebdev\u003c/code\u003e命令，建议将\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eflutter/.pub-cache/bin\u003c/code\u003e目录添加到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epath\u003c/code\u003e环境变量中。\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHello World\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e克隆\u003ca href=\"https://github.com/flutter/flutter_web\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/flutter/flutter_web\u003c/a\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$cd examples/hello_world/\n$flutter pub upgrade\n$webdev serve\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e打开\u003ca href=\"http://localhost:8080\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttp://localhost:8080\u003c/a\u003e，你就能看到红色的HelloWorld\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e经过测试，在Edge浏览器会报错，目前只在Chrome中支持比较好。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e新建一个项目\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e虽然未来的目标是用同一套代码来生成移动端和Web端，但目前的开发使用了不同的命名空间，所以还无法同时进行移动端和web端开发。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e新建的Flutter工程最简单的方式是使用IDE\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eVScode： 使用View-\u003eCommand Paltte-\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFlutter: New Web Project\u003c/code\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eIntelliJ：新建Dart项目，选择\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFlutter for web\u003c/code\u003e模板。\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n![flutter](https://flutter.dev/assets/flutter-lockup-4cb0ee072ab312e59784d9fbf4fb7ad42688a7fdaea1270ccf6bbf4f34b7e03f.svg)\n\n在Google IO 2019开发者大会上，Flutter和Dart发表了超越移动端，为iOS，Android，ChromeOS和Web构建应用的主题演讲。\n\n时至今日，想必Flutter已经可以开发Web应用了。\n\n我们知道Flutter是使用叫`Skia`的C++库来渲染UI，但是Web上是使用`Dom`，`Canvas`，以及`WebGL`，那么Flutter到底会采用哪种方式呢？\n\n这篇文章带你对Flutter for web做一个了解和实践：\n\u003c!--more--\u003e\n\n## 架构设计\n\n![Architecture](https://flutter.dev/images/Dart-framework-v-browser-framework.png)\n\n## 原理\n\n目前联合了`DOM`, `Canvas`, `CSS`来进行渲染，将`Dart`代码编译为`JavaScript`来执行，这跟`Typescript`，`Kotlin`都是一样的。\n\n## 目前进度\n\n截至今天（2019年7月25日）Flutter for Web还处于技术预览的阶段，还很不稳定。\n\n开发团队创建了一个[Frok](https://github.com/flutter/flutter_web)，但最终这些代码将会被merge到\u003chttps://github.com/flutter/flutter\u003e中。\n\n## 环境安装\n\n1. ~~安装`Dart`~~\n2. 安装`Flutter`，Flutter 1.5 以上就可以支持以web作为target平台，我这里安装的是`1.7.8`。\n3. 安装`webdev`，通过`flutter pub global active webdev`全局安装`webdev`工具包。\n4. 为了能够全局执行`webdev`命令，建议将`flutter/.pub-cache/bin`目录添加到`path`环境变量中。\n\n## Hello World\n\n克隆\u003chttps://github.com/flutter/flutter_web\u003e\n\n```bash\n$cd examples/hello_world/\n$flutter pub upgrade\n$webdev serve\n```\n\n打开\u003chttp://localhost:8080\u003e，你就能看到红色的HelloWorld\n\n经过测试，在Edge浏览器会报错，目前只在Chrome中支持比较好。\n\n## 新建一个项目\n\n虽然未来的目标是用同一套代码来生成移动端和Web端，但目前的开发使用了不同的命名空间，所以还无法同时进行移动端和web端开发。\n\n新建的Flutter工程最简单的方式是使用IDE\n\n- VScode： 使用View-\u003eCommand Paltte-\u003e`Flutter: New Web Project`。\n- IntelliJ：新建Dart项目，选择`Flutter for web`模板。","data":{"title":"使用Flutter开发Web应用","date":"2019-07-25","tags":["Flutter","Dart"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![flutter](https://flutter.dev/assets/flutter-lockup-4cb0ee072ab312e59784d9fbf4fb7ad42688a7fdaea1270ccf6bbf4f34b7e03f.svg)\n\n在Google IO 2019开发者大会上，Flutter和Dart发表了超越移动端，为iOS，Android，ChromeOS和Web构建应用的主题演讲。\n\n时至今日，想必Flutter已经可以开发Web应用了。\n\n我们知道Flutter是使用叫`Skia`的C++库来渲染UI，但是Web上是使用`Dom`，`Canvas`，以及`WebGL`，那么Flutter到底会采用哪种方式呢？\n\n这篇文章带你对Flutter for web做一个了解和实践：\n"},{"id":"swagger-auth","file":"swagger-auth.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://swagger.io/swagger/media/assets/images/swagger_logo.svg\" alt=\"swagger\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当API添加了鉴权后，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eswagger\u003c/code\u003e如何进行调试呢，比如需要在请求头\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eheader\u003c/code\u003e中添加类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etoken\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAuthorization\u003c/code\u003e之类的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring\u003c/code\u003e中进行如下简单的配置就可以了。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://swagger.io/swagger/media/assets/images/swagger_logo.svg\" alt=\"swagger\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当API添加了鉴权后，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eswagger\u003c/code\u003e如何进行调试呢，比如需要在请求头\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eheader\u003c/code\u003e中添加类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etoken\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAuthorization\u003c/code\u003e之类的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring\u003c/code\u003e中进行如下简单的配置就可以了。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\n@EnableSwagger2\nclass SwaggerConfig {\n\n    @Bean\n    fun generateDocket(): Docket {\n        return Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .apis(RequestHandlerSelectors.withClassAnnotation(Api::class.java))\n                .build()\n                .securityContexts(listOf(securityContext())) // #1\n                .securitySchemes(listOf(apiKey())) // #2\n                .apiInfo(apiInfo())\n    }\n\n    private fun securityContext(): SecurityContext {\n        return SecurityContext.builder()\n                .securityReferences(defaultAuth())\n                .forPaths(PathSelectors.regex(\"/api/public/admin/.*\"))\n                .build()\n    }\n\n    fun defaultAuth(): List\u0026#x3C;SecurityReference\u003e {\n        val authorizationScope = AuthorizationScope(\"global\", \"accessEverything\")\n        val authorizationScopes = arrayOf(authorizationScope)\n        return listOf(SecurityReference(\"token\", authorizationScopes))\n    }\n\n\n    fun apiKey(): ApiKey {\n        return ApiKey(\"token\", \"X-Auth-Token\", \"header\")\n    }\n\n\n    private fun apiInfo(): ApiInfo {\n        return ApiInfo(\"王郁的API文档\",\n                \"用于App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                Contact(\"王郁\", \"wycode.cn\", \"wangyu@wycode.cn\"),\n                \"wycode.cn All Right Reserved\",\n                \"https://wycode.cn\",\n                emptyList())\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e关键配置就是上面包含#1和#2注释的两行配置\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e配置安全上下文，我这里配置了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/api/public/admin/.*\u003c/code\u003e下的接口需要添加。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e配置鉴权类型，我这里使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eApiKey\u003c/code\u003e。\u003c/li\u003e\n\u003c/ol\u003e\n","content":"\n![swagger](https://swagger.io/swagger/media/assets/images/swagger_logo.svg)\n\n当API添加了鉴权后，`swagger`如何进行调试呢，比如需要在请求头`header`中添加类似`token`或者`Authorization`之类的。\n\n在`Spring`中进行如下简单的配置就可以了。\n\n\u003c!--more--\u003e\n\n```kotlin\n@Configuration\n@EnableSwagger2\nclass SwaggerConfig {\n\n    @Bean\n    fun generateDocket(): Docket {\n        return Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .apis(RequestHandlerSelectors.withClassAnnotation(Api::class.java))\n                .build()\n                .securityContexts(listOf(securityContext())) // #1\n                .securitySchemes(listOf(apiKey())) // #2\n                .apiInfo(apiInfo())\n    }\n\n    private fun securityContext(): SecurityContext {\n        return SecurityContext.builder()\n                .securityReferences(defaultAuth())\n                .forPaths(PathSelectors.regex(\"/api/public/admin/.*\"))\n                .build()\n    }\n\n    fun defaultAuth(): List\u003cSecurityReference\u003e {\n        val authorizationScope = AuthorizationScope(\"global\", \"accessEverything\")\n        val authorizationScopes = arrayOf(authorizationScope)\n        return listOf(SecurityReference(\"token\", authorizationScopes))\n    }\n\n\n    fun apiKey(): ApiKey {\n        return ApiKey(\"token\", \"X-Auth-Token\", \"header\")\n    }\n\n\n    private fun apiInfo(): ApiInfo {\n        return ApiInfo(\"王郁的API文档\",\n                \"用于App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                Contact(\"王郁\", \"wycode.cn\", \"wangyu@wycode.cn\"),\n                \"wycode.cn All Right Reserved\",\n                \"https://wycode.cn\",\n                emptyList())\n    }\n}\n\n```\n关键配置就是上面包含#1和#2注释的两行配置\n\n1. 配置安全上下文，我这里配置了`/api/public/admin/.*`下的接口需要添加。\n2. 配置鉴权类型，我这里使用`ApiKey`。","data":{"title":"SpringBoot工程为SwaggerUI添加认证","date":"2019-07-19","tags":["OAuth","Java","Kotlin","Spring","Swagger"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![swagger](https://swagger.io/swagger/media/assets/images/swagger_logo.svg)\n\n当API添加了鉴权后，`swagger`如何进行调试呢，比如需要在请求头`header`中添加类似`token`或者`Authorization`之类的。\n\n在`Spring`中进行如下简单的配置就可以了。\n\n"},{"id":"spring-error","file":"spring-error.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180623_springboot.jpg\" alt=\"springboot\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e通常我们为了统一，和前端方便处理，写的API返回JSON会有固定的结构，比如下面这种：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n    \"code\":200,\n    \"message\":\"hello world!\",\n    \"data\":{\n        \"user\":{}\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e但是当返回码为非200时，比如接口不存在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e404\u003c/code\u003e，服务器错误\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e500\u003c/code\u003e，Spring默认会返回一个类似这样的结构：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n  \"timestamp\": \"2019-07-19 10:23:47\",\n  \"status\": 403,\n  \"error\": \"Forbidden\",\n  \"message\": \"没有权限\",\n  \"path\": \"/web/api/public/admin/dota/version\"\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e下面进行简单配置即可实现这个JSON结构的自定义：\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180623_springboot.jpg\" alt=\"springboot\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e通常我们为了统一，和前端方便处理，写的API返回JSON会有固定的结构，比如下面这种：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n    \"code\":200,\n    \"message\":\"hello world!\",\n    \"data\":{\n        \"user\":{}\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e但是当返回码为非200时，比如接口不存在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e404\u003c/code\u003e，服务器错误\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e500\u003c/code\u003e，Spring默认会返回一个类似这样的结构：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n  \"timestamp\": \"2019-07-19 10:23:47\",\n  \"status\": 403,\n  \"error\": \"Forbidden\",\n  \"message\": \"没有权限\",\n  \"path\": \"/web/api/public/admin/dota/version\"\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e下面进行简单配置即可实现这个JSON结构的自定义：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eimport cn.wycode.web.DEV\nimport org.springframework.boot.web.servlet.error.DefaultErrorAttributes\nimport org.springframework.stereotype.Component\nimport org.springframework.web.context.request.WebRequest\n\n@Component\nclass WyErrorAttributes : DefaultErrorAttributes(DEV) { // #1\n    override fun getErrorAttributes(webRequest: WebRequest?, includeStackTrace: Boolean): MutableMap\u0026#x3C;String, Any\u003e {\n        val errorAttributes = super.getErrorAttributes(webRequest, includeStackTrace) // #2\n        errorAttributes[\"success\"] = false // #3\n        errorAttributes[\"error\"] = errorAttributes[\"message\"] // #4\n        errorAttributes[\"data\"] = errorAttributes[\"exception\"]  // #5\n        return errorAttributes\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003eSpring默认的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDefaultErrorAttributes\u003c/code\u003e就写的挺好，我们继承并扩展一下就可以了，当然你也可以删除或者完全替换里面的结构。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e先使用默认的方法构建一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eerrorAttributes\u003c/code\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esuccess\u003c/code\u003e属性，既然是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eErrorAttributes\u003c/code\u003e当然是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003efalse\u003c/code\u003e了。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e覆盖\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eerror\u003c/code\u003e属性，改为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emessage\u003c/code\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edata\u003c/code\u003e属性，在DEV环境时会添加错误的类信息。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e做了这个配置之后，错误信息的JSON会变成下面这样：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n  \"timestamp\": \"2019-07-19 16:56:41\",\n  \"status\": 500,\n  \"error\": \"/ by zero\",\n  \"exception\": \"java.lang.ArithmeticException\",\n  \"message\": \"/ by zero\",\n  \"path\": \"/web/api/public/admin/dota/version\",\n  \"success\": false,\n  \"data\": \"java.lang.ArithmeticException\"\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![springboot](/images/20180623_springboot.jpg)\n\n通常我们为了统一，和前端方便处理，写的API返回JSON会有固定的结构，比如下面这种：\n```json\n{\n    \"code\":200,\n    \"message\":\"hello world!\",\n    \"data\":{\n        \"user\":{}\n    }\n}\n```\n但是当返回码为非200时，比如接口不存在`404`，服务器错误`500`，Spring默认会返回一个类似这样的结构：\n\n```json\n{\n  \"timestamp\": \"2019-07-19 10:23:47\",\n  \"status\": 403,\n  \"error\": \"Forbidden\",\n  \"message\": \"没有权限\",\n  \"path\": \"/web/api/public/admin/dota/version\"\n}\n```\n\n下面进行简单配置即可实现这个JSON结构的自定义：\n\u003c!--more--\u003e\n\n```kotlin\nimport cn.wycode.web.DEV\nimport org.springframework.boot.web.servlet.error.DefaultErrorAttributes\nimport org.springframework.stereotype.Component\nimport org.springframework.web.context.request.WebRequest\n\n@Component\nclass WyErrorAttributes : DefaultErrorAttributes(DEV) { // #1\n    override fun getErrorAttributes(webRequest: WebRequest?, includeStackTrace: Boolean): MutableMap\u003cString, Any\u003e {\n        val errorAttributes = super.getErrorAttributes(webRequest, includeStackTrace) // #2\n        errorAttributes[\"success\"] = false // #3\n        errorAttributes[\"error\"] = errorAttributes[\"message\"] // #4\n        errorAttributes[\"data\"] = errorAttributes[\"exception\"]  // #5\n        return errorAttributes\n    }\n}\n```\n\n1. Spring默认的`DefaultErrorAttributes`就写的挺好，我们继承并扩展一下就可以了，当然你也可以删除或者完全替换里面的结构。\n2. 先使用默认的方法构建一个`errorAttributes`。\n3. 添加一个`success`属性，既然是`ErrorAttributes`当然是`false`了。\n4. 覆盖`error`属性，改为`message`。\n5. 添加`data`属性，在DEV环境时会添加错误的类信息。\n\n做了这个配置之后，错误信息的JSON会变成下面这样：\n\n```json\n{\n  \"timestamp\": \"2019-07-19 16:56:41\",\n  \"status\": 500,\n  \"error\": \"/ by zero\",\n  \"exception\": \"java.lang.ArithmeticException\",\n  \"message\": \"/ by zero\",\n  \"path\": \"/web/api/public/admin/dota/version\",\n  \"success\": false,\n  \"data\": \"java.lang.ArithmeticException\"\n}\n```","data":{"title":"SpringBoot工程自定义错误JSON字段","date":"2019-07-15","tags":["Java","Kotlin","Spring"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![springboot](/images/20180623_springboot.jpg)\n\n通常我们为了统一，和前端方便处理，写的API返回JSON会有固定的结构，比如下面这种：\n```json\n{\n    \"code\":200,\n    \"message\":\"hello world!\",\n    \"data\":{\n        \"user\":{}\n    }\n}\n```\n但是当返回码为非200时，比如接口不存在`404`，服务器错误`500`，Spring默认会返回一个类似这样的结构：\n\n```json\n{\n  \"timestamp\": \"2019-07-19 10:23:47\",\n  \"status\": 403,\n  \"error\": \"Forbidden\",\n  \"message\": \"没有权限\",\n  \"path\": \"/web/api/public/admin/dota/version\"\n}\n```\n\n下面进行简单配置即可实现这个JSON结构的自定义：\n"},{"id":"oauth","file":"oauth.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e关于认证和授权，最权威的流程就是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOAuth2.0\u003c/code\u003e了，涵盖了用户认证授权的方方面面，现代的大型网站几乎都是基于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOauth2.0\u003c/code\u003e协议开发认证鉴权功能。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOAuth2.0\u003c/code\u003e被写入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRFC6749\u003c/code\u003e，RFC中的流程图看了还是不明白的话，可以看看下面这张图，展示了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOAuth2.0\u003c/code\u003e四种模式的完整流程。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e关于认证和授权，最权威的流程就是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOAuth2.0\u003c/code\u003e了，涵盖了用户认证授权的方方面面，现代的大型网站几乎都是基于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOauth2.0\u003c/code\u003e协议开发认证鉴权功能。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOAuth2.0\u003c/code\u003e被写入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRFC6749\u003c/code\u003e，RFC中的流程图看了还是不明白的话，可以看看下面这张图，展示了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOAuth2.0\u003c/code\u003e四种模式的完整流程。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20190614_oauth.png\" alt=\"OAuth\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","content":"\n关于认证和授权，最权威的流程就是`OAuth2.0`了，涵盖了用户认证授权的方方面面，现代的大型网站几乎都是基于`Oauth2.0`协议开发认证鉴权功能。\n\n`OAuth2.0`被写入`RFC6749`，RFC中的流程图看了还是不明白的话，可以看看下面这张图，展示了`OAuth2.0`四种模式的完整流程。\n\n\u003c!--more--\u003e\n\n![OAuth](/images/20190614_oauth.png)\n\n","data":{"title":"OAuth2.0四种模式完整时序图","date":"2019-06-14","tags":["OAuth"],"category":"Backend"},"isEmpty":false,"excerpt":"\n关于认证和授权，最权威的流程就是`OAuth2.0`了，涵盖了用户认证授权的方方面面，现代的大型网站几乎都是基于`Oauth2.0`协议开发认证鉴权功能。\n\n`OAuth2.0`被写入`RFC6749`，RFC中的流程图看了还是不明白的话，可以看看下面这张图，展示了`OAuth2.0`四种模式的完整流程。\n\n"},{"id":"ant-design-pro","file":"ant-design-pro.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg\" alt=\"ant-design\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design\u003c/strong\u003e由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e和 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAngular\u003c/code\u003e组件实现，用于开发和服务于企业级中后台产品。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design-Pro\u003c/strong\u003e是基于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAnt-Design\u003c/code\u003e的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e：现代化的JavaScript界面库\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edva\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRedux\u003c/code\u003e的数据流、状态管理框架\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUmiJS\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enextJS\u003c/code\u003e的react应用框架\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e本文从基础使用开始，逐步解析里面用到的技术细节。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg\" alt=\"ant-design\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design\u003c/strong\u003e由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e和 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAngular\u003c/code\u003e组件实现，用于开发和服务于企业级中后台产品。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design-Pro\u003c/strong\u003e是基于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAnt-Design\u003c/code\u003e的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e：现代化的JavaScript界面库\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edva\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRedux\u003c/code\u003e的数据流、状态管理框架\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUmiJS\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enextJS\u003c/code\u003e的react应用框架\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e本文从基础使用开始，逐步解析里面用到的技术细节。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e安装及启动在官网有说明，生成的基础工程目录结结构如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e├── config                   # umi 配置，包含路由，构建等配置\n├── mock                     # 本地模拟数据\n├── public                   # 公共资源目录\n│   └── favicon.png          # Favicon\n├── src                      # 代码目录\n│   ├── assets               # 本地静态资源\n│   ├── components           # 业务通用组件\n│   ├── e2e                  # 集成测试用例\n│   ├── layouts              # 通用布局\n│   ├── models               # 全局 dva model\n│   ├── pages                # 业务页面入口和常用模板\n│   ├── services             # 后台接口服务\n│   ├── utils                # 工具库\n│   ├── locales              # 国际化资源\n│   ├── global.less          # 全局样式\n│   └── global.js            # 全局 JS\n├── tests                    # 测试工具\n├── README.md                # readme\n└── package.json             # npm管理的清单\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于哈希路由\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e现代的前端框架都是单页面的(single-page application)，即用户访问的永远是根目录的index.html，这时网页地址如何展现就是一个问题。解决方案有2个：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e前端解决：使用哈希路由，即用户看到的地址栏URL是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e#\u003c/code\u003e分割的，如\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttps://wycode.cn/admin/#/users/123\u003c/code\u003e，实际访问仍然是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUmiJS\u003c/code\u003e配置如下\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eexport default {\n    ···\n    history: 'hash'\n    ···\n} as IConfig;  \n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e后端解决：使用重定向，即访问index以外的其它地址，都重定向到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enginx\u003c/code\u003e配置如下:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-nginx px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003elocation / {\n    try_files $uri $uri/ /index.html;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eUmiJS非根目录部署\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e如果工程不是部署在根目录，UmiJS的config做如下配置即可：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eexport default {\n    ···\n    base: 'admin'\n    ···\n} as IConfig;  \n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e**但是：**当配置为hash路由时且非根目录部署时，有可能你希望的首页是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttps://wycode.cn/admin/#/\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/users\u003c/code\u003e页是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttps://wycode.cn/admin/#/users\u003c/code\u003e则需要进行如下配置：\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eexport default {\n    ···\n    history: 'hash',\n    publicPath: '/admin/'\n    ···\n} as IConfig;\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于HTML模版\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eumi默认使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esrc/pages/document.ejs\u003c/code\u003e这个模版，采用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eEJS\u003c/code\u003e渲染，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFavicon\u003c/code\u003e的路径改为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;%= context.publicPath %\u003efavicon.png\u003c/code\u003e可以修复Favicon路径不对的问题。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于区块\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eblock\u003c/code\u003e\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e区块可以理解为页面模板，这个模板是在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eant-design-pro\u003c/code\u003e的预览网站中，如果你看中了某个功能，（默认创建的工程是空白的，只有一个Welcome页面）点击右下角的下载按钮，会弹出一个命令，执行这个命令就能将这个页面加入到你自己的工程中，非常方便。其实质是执行了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003egit clone\u003c/code\u003e克隆预览工程的部分文件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e比如：添加一个类似预览工程的404页面\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpx umi block add Exception404  --path=/exception/404\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e经过尝试，我发现目前区块引入时，并不是合并文件，而是创建一个目录，里面包括了这个页面用到的所有组件，甚至是国际化文本都是单独的一套。不管你工程内有没有这些组件，它都会重新创建一套。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e比如刚加入了404页面又想加入403页面，本已经存在的Exception组件，会在403文件夹再创建一份一模一样的副本，这点，我觉得是不可接受的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这样的话我更倾向与参考block的实现手动加入需要的文件，而不是使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eumi block add\u003c/code\u003e功能，官方的block在这里：\u003ca href=\"https://github.com/ant-design/pro-blocks\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/ant-design/pro-blocks\u003c/a\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e菜单处理\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e菜单是由路由自动生成，刚刚引入的404页面出现在了菜单栏，它是一个异常页，并不需要在菜单展示，我们只需在路由配置中加入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehideInMenu: true\u003c/code\u003e，即可隐藏。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e404页面\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e输入一个不存在的地址，并不能跳转到刚刚加入的404页面。\n我们需要将在路由配置中将404的其它配置项删除，仅保留\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecomponent: './exception/404'\u003c/code\u003e，并将其挪到数组的最后，这样当路由无法匹配时，就会加载404这个组件了。\u003c/p\u003e\n","content":"\n![ant-design](https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg)\n\n**Ant-Design**由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量`React`和 `Angular`组件实现，用于开发和服务于企业级中后台产品。\n\n**Ant-Design-Pro**是基于`Ant-Design`的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\n\n- `React`：现代化的JavaScript界面库\n- `dva`：类似`Redux`的数据流、状态管理框架\n- `UmiJS`：类似`nextJS`的react应用框架\n\n本文从基础使用开始，逐步解析里面用到的技术细节。\n\n\u003c!--more--\u003e\n\n安装及启动在官网有说明，生成的基础工程目录结结构如下：\n\n```\n├── config                   # umi 配置，包含路由，构建等配置\n├── mock                     # 本地模拟数据\n├── public                   # 公共资源目录\n│   └── favicon.png          # Favicon\n├── src                      # 代码目录\n│   ├── assets               # 本地静态资源\n│   ├── components           # 业务通用组件\n│   ├── e2e                  # 集成测试用例\n│   ├── layouts              # 通用布局\n│   ├── models               # 全局 dva model\n│   ├── pages                # 业务页面入口和常用模板\n│   ├── services             # 后台接口服务\n│   ├── utils                # 工具库\n│   ├── locales              # 国际化资源\n│   ├── global.less          # 全局样式\n│   └── global.js            # 全局 JS\n├── tests                    # 测试工具\n├── README.md                # readme\n└── package.json             # npm管理的清单\n```\n\n## 关于哈希路由\n\n现代的前端框架都是单页面的(single-page application)，即用户访问的永远是根目录的index.html，这时网页地址如何展现就是一个问题。解决方案有2个：\n\n- 前端解决：使用哈希路由，即用户看到的地址栏URL是`#`分割的，如`https://wycode.cn/admin/#/users/123`，实际访问仍然是`index.html`。`UmiJS`配置如下\n\n```js\nexport default {\n    ···\n    history: 'hash'\n    ···\n} as IConfig;  \n```\n\n- 后端解决：使用重定向，即访问index以外的其它地址，都重定向到`index.html`。`nginx`配置如下:\n\n```nginx\nlocation / {\n    try_files $uri $uri/ /index.html;\n}\n```\n## UmiJS非根目录部署\n\n如果工程不是部署在根目录，UmiJS的config做如下配置即可：\n\n```js\nexport default {\n    ···\n    base: 'admin'\n    ···\n} as IConfig;  \n```\n\n\u003e **但是：**当配置为hash路由时且非根目录部署时，有可能你希望的首页是`https://wycode.cn/admin/#/`，`/users`页是`https://wycode.cn/admin/#/users`则需要进行如下配置：\n\n```js\nexport default {\n    ···\n    history: 'hash',\n    publicPath: '/admin/'\n    ···\n} as IConfig;\n```\n\n## 关于HTML模版\n\numi默认使用`src/pages/document.ejs`这个模版，采用`EJS`渲染，`Favicon`的路径改为`\u003c%= context.publicPath %\u003efavicon.png`可以修复Favicon路径不对的问题。\n\n\n## 关于区块`block`\n\n区块可以理解为页面模板，这个模板是在`ant-design-pro`的预览网站中，如果你看中了某个功能，（默认创建的工程是空白的，只有一个Welcome页面）点击右下角的下载按钮，会弹出一个命令，执行这个命令就能将这个页面加入到你自己的工程中，非常方便。其实质是执行了`git clone`克隆预览工程的部分文件。\n\n比如：添加一个类似预览工程的404页面\n\n```bash\nnpx umi block add Exception404  --path=/exception/404\n```\n\n经过尝试，我发现目前区块引入时，并不是合并文件，而是创建一个目录，里面包括了这个页面用到的所有组件，甚至是国际化文本都是单独的一套。不管你工程内有没有这些组件，它都会重新创建一套。\n\n比如刚加入了404页面又想加入403页面，本已经存在的Exception组件，会在403文件夹再创建一份一模一样的副本，这点，我觉得是不可接受的。\n\n这样的话我更倾向与参考block的实现手动加入需要的文件，而不是使用`umi block add`功能，官方的block在这里：https://github.com/ant-design/pro-blocks\n\n## 菜单处理\n\n菜单是由路由自动生成，刚刚引入的404页面出现在了菜单栏，它是一个异常页，并不需要在菜单展示，我们只需在路由配置中加入`hideInMenu: true`，即可隐藏。\n\n## 404页面\n\n输入一个不存在的地址，并不能跳转到刚刚加入的404页面。\n我们需要将在路由配置中将404的其它配置项删除，仅保留`component: './exception/404'`，并将其挪到数组的最后，这样当路由无法匹配时，就会加载404这个组件了。\n\n","data":{"title":"学习和拆解Ant-Design-Pro","date":"2019-06-09","tags":["TypeScript","JavaScript","NodeJS","React"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![ant-design](https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg)\n\n**Ant-Design**由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量`React`和 `Angular`组件实现，用于开发和服务于企业级中后台产品。\n\n**Ant-Design-Pro**是基于`Ant-Design`的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\n\n- `React`：现代化的JavaScript界面库\n- `dva`：类似`Redux`的数据流、状态管理框架\n- `UmiJS`：类似`nextJS`的react应用框架\n\n本文从基础使用开始，逐步解析里面用到的技术细节。\n\n"}],"page":5,"total":16},"__N_SSG":true},"page":"/blog/page/[page]","query":{"page":"5"},"buildId":"uFO1FMOoBQ2X-GM8G4ZfF","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
