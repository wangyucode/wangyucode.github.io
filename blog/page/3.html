-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"docker-spring","file":"docker-spring.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://d1q6f0aelx0por.cloudfront.net/product-logos/644d2f15-c5db-4731-a353-ace6235841fa-registry.png\" alt=\"docker\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eDocker容器化技术，使得部署变得平滑。再也不需要维护软件运行所需的复杂环境。Docker和现代化的微服务，敏捷开发，快速迭代和交付的要求非常匹配。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章实践从安装Docker开始，到将一个SpringBoot项目部署到Docker容器中。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://d1q6f0aelx0por.cloudfront.net/product-logos/644d2f15-c5db-4731-a353-ace6235841fa-registry.png\" alt=\"docker\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eDocker容器化技术，使得部署变得平滑。再也不需要维护软件运行所需的复杂环境。Docker和现代化的微服务，敏捷开发，快速迭代和交付的要求非常匹配。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章实践从安装Docker开始，到将一个SpringBoot项目部署到Docker容器中。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e安装Docker CE(Community edition)\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e我这里使用的环境是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUbuntu18.04\u003c/code\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ curl -fsSL https://get.docker.com -o get-docker.sh\n$ sudo sh get-docker.sh\n$ systemctl enable docker\n$ systemctl start docker\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e准备SpringBoot工程\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这里我使用Spring官方的Docker示例项目\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003egit clone https://github.com/spring-guides/gs-spring-boot-docker.git\u003c/code\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eDockerfile\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eSpringBoot的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDockerfile\u003c/code\u003e有两种\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e简单版的如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eFROM openjdk:8-jdk-alpine\nVOLUME /tmp\nARG JAR_FILE\nCOPY ${JAR_FILE} app.jar\nENTRYPOINT [\"java\",\"-jar\",\"/app.jar\"]\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这是典型的SpringBoot项目启动方式\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e复杂版的如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eFROM openjdk:8-jdk-alpine\nVOLUME /tmp\nARG DEPENDENCY=target/dependency\nCOPY ${DEPENDENCY}/BOOT-INF/lib /app/lib\nCOPY ${DEPENDENCY}/META-INF /app/META-INF\nCOPY ${DEPENDENCY}/BOOT-INF/classes /app\nENTRYPOINT [\"java\",\"-cp\",\"app:app/lib/*\",\"hello.Application\"]\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这是将lib和src分离的方式，有点像展开的jar\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我这里选择上面简单版的，简洁和性能之间我选简洁！\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e基于maven构建Docker镜像\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用Maven的话有Spotify构建的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edockerfile-maven-plugin\u003c/code\u003e插件\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-xml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;!-- tag::plugin[] --\u003e\n\u0026#x3C;plugin\u003e\n    \u0026#x3C;groupId\u003ecom.spotify\u0026#x3C;/groupId\u003e\n    \u0026#x3C;artifactId\u003edockerfile-maven-plugin\u0026#x3C;/artifactId\u003e\n    \u0026#x3C;version\u003e1.4.9\u0026#x3C;/version\u003e\n    \u0026#x3C;executions\u003e\n        \u0026#x3C;execution\u003e\n            \u0026#x3C;id\u003edefault\u0026#x3C;/id\u003e\n            \u0026#x3C;phase\u003einstall\u0026#x3C;/phase\u003e\n            \u0026#x3C;goals\u003e\n                \u0026#x3C;goal\u003ebuild\u0026#x3C;/goal\u003e\n                \u0026#x3C;goal\u003epush\u0026#x3C;/goal\u003e\n            \u0026#x3C;/goals\u003e\n        \u0026#x3C;/execution\u003e\n    \u0026#x3C;/executions\u003e\n    \u0026#x3C;configuration\u003e\n        \u0026#x3C;repository\u003e${docker.image.prefix}/${project.artifactId}\u0026#x3C;/repository\u003e\n        \u0026#x3C;buildArgs\u003e\n            \u0026#x3C;JAR_FILE\u003e${project.build.finalName}.jar\u0026#x3C;/JAR_FILE\u003e\n        \u0026#x3C;/buildArgs\u003e\n    \u0026#x3C;/configuration\u003e\n\u0026#x3C;/plugin\u003e\n\u0026#x3C;!-- end::plugin[] --\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e添加了两个maven任务，build用户构建docker镜像，push用于推送docker镜像。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加了构建参数\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ebuildArgs\u003c/code\u003e\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJAR_FILE\u003c/code\u003e传递给Dockerfile。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加了版本号作为镜像tag\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e打包Docker镜像本身是需要docker环境的，于是有一种方法是开启remote API\n到这里其实就已经可以发布程序到DockerHub了，但实际项目中，我们不想发布私人镜像到DockerHub，那么我们需要建立私人的Docker仓库。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e开启remote API远程构建镜像\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eDocker是CS模式，Docker的服务是支持通过Http远程访问的。通过开启remote API即可远程进行访问。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eExecStart=/usr/bin/dockerd -H fd:// -H tcp://0.0.0.0:2376\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e但要注意的remote API是需要进行TSL加密的。否则存在未授权访问漏洞，会被黑客利用，植入挖矿程序（别问我怎么知道的）。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e建立Docker私人仓库（Docker Registry）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e具体方式是添加一个仓库镜像\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ docker run -d -p 5000:5000 --restart always --name registry registry:2\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e然后就可以：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ docker pull ubuntu\n$ docker tag ubuntu localhost:5000/ubuntu\n$ docker push localhost:5000/ubuntu\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e为了安全，创建的私有仓库也要添加Https\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e总结\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用docker部署SpringBoot工程时，正规的流程应该是：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e为工程编写Dockerfile\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加Docker插件，构建Docker镜像\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003epush到公共或私有Docker仓库\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e拉取最新镜像并运行\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e本地无法构建时，应使用某种持续集成方法让编译机去负责出包和推送，不应该使用remote API这不是常规做法，而且有安全风险。\n此外Docker官方提供了安全的私有Docker仓库，少量使用是免费的。\u003c/p\u003e\n","content":"\n![docker](https://d1q6f0aelx0por.cloudfront.net/product-logos/644d2f15-c5db-4731-a353-ace6235841fa-registry.png)\n\nDocker容器化技术，使得部署变得平滑。再也不需要维护软件运行所需的复杂环境。Docker和现代化的微服务，敏捷开发，快速迭代和交付的要求非常匹配。\n\n这篇文章实践从安装Docker开始，到将一个SpringBoot项目部署到Docker容器中。\n\n\u003c!--more--\u003e\n\n## 安装Docker CE(Community edition)\n\n我这里使用的环境是`Ubuntu18.04`\n\n```bash\n$ curl -fsSL https://get.docker.com -o get-docker.sh\n$ sudo sh get-docker.sh\n$ systemctl enable docker\n$ systemctl start docker\n```\n\n## 准备SpringBoot工程\n\n这里我使用Spring官方的Docker示例项目\n\n`git clone https://github.com/spring-guides/gs-spring-boot-docker.git`\n\n## Dockerfile\n\nSpringBoot的`Dockerfile`有两种\n\n简单版的如下：\n```\nFROM openjdk:8-jdk-alpine\nVOLUME /tmp\nARG JAR_FILE\nCOPY ${JAR_FILE} app.jar\nENTRYPOINT [\"java\",\"-jar\",\"/app.jar\"]\n```\n这是典型的SpringBoot项目启动方式\n\n复杂版的如下：\n```\nFROM openjdk:8-jdk-alpine\nVOLUME /tmp\nARG DEPENDENCY=target/dependency\nCOPY ${DEPENDENCY}/BOOT-INF/lib /app/lib\nCOPY ${DEPENDENCY}/META-INF /app/META-INF\nCOPY ${DEPENDENCY}/BOOT-INF/classes /app\nENTRYPOINT [\"java\",\"-cp\",\"app:app/lib/*\",\"hello.Application\"]\n```\n这是将lib和src分离的方式，有点像展开的jar\n\n我这里选择上面简单版的，简洁和性能之间我选简洁！\n\n## 基于maven构建Docker镜像\n\n使用Maven的话有Spotify构建的`dockerfile-maven-plugin`插件\n```xml\n\u003c!-- tag::plugin[] --\u003e\n\u003cplugin\u003e\n    \u003cgroupId\u003ecom.spotify\u003c/groupId\u003e\n    \u003cartifactId\u003edockerfile-maven-plugin\u003c/artifactId\u003e\n    \u003cversion\u003e1.4.9\u003c/version\u003e\n    \u003cexecutions\u003e\n        \u003cexecution\u003e\n            \u003cid\u003edefault\u003c/id\u003e\n            \u003cphase\u003einstall\u003c/phase\u003e\n            \u003cgoals\u003e\n                \u003cgoal\u003ebuild\u003c/goal\u003e\n                \u003cgoal\u003epush\u003c/goal\u003e\n            \u003c/goals\u003e\n        \u003c/execution\u003e\n    \u003c/executions\u003e\n    \u003cconfiguration\u003e\n        \u003crepository\u003e${docker.image.prefix}/${project.artifactId}\u003c/repository\u003e\n        \u003cbuildArgs\u003e\n            \u003cJAR_FILE\u003e${project.build.finalName}.jar\u003c/JAR_FILE\u003e\n        \u003c/buildArgs\u003e\n    \u003c/configuration\u003e\n\u003c/plugin\u003e\n\u003c!-- end::plugin[] --\u003e\n```\n\n- 添加了两个maven任务，build用户构建docker镜像，push用于推送docker镜像。\n- 添加了构建参数`buildArgs`\u003e`JAR_FILE`传递给Dockerfile。\n- 添加了版本号作为镜像tag\n\n\u003e 打包Docker镜像本身是需要docker环境的，于是有一种方法是开启remote API\n\u003e 到这里其实就已经可以发布程序到DockerHub了，但实际项目中，我们不想发布私人镜像到DockerHub，那么我们需要建立私人的Docker仓库。\n\n## 开启remote API远程构建镜像\n\nDocker是CS模式，Docker的服务是支持通过Http远程访问的。通过开启remote API即可远程进行访问。\n```\nExecStart=/usr/bin/dockerd -H fd:// -H tcp://0.0.0.0:2376\n```\n但要注意的remote API是需要进行TSL加密的。否则存在未授权访问漏洞，会被黑客利用，植入挖矿程序（别问我怎么知道的）。\n\n## 建立Docker私人仓库（Docker Registry）\n\n具体方式是添加一个仓库镜像\n\n```bash\n$ docker run -d -p 5000:5000 --restart always --name registry registry:2\n```\n\n然后就可以：\n\n```bash\n$ docker pull ubuntu\n$ docker tag ubuntu localhost:5000/ubuntu\n$ docker push localhost:5000/ubuntu\n```\n\n\u003e 为了安全，创建的私有仓库也要添加Https\n\n## 总结\n\n使用docker部署SpringBoot工程时，正规的流程应该是：\n1. 为工程编写Dockerfile\n2. 添加Docker插件，构建Docker镜像\n3. push到公共或私有Docker仓库\n4. 拉取最新镜像并运行\n\n本地无法构建时，应使用某种持续集成方法让编译机去负责出包和推送，不应该使用remote API这不是常规做法，而且有安全风险。\n此外Docker官方提供了安全的私有Docker仓库，少量使用是免费的。","data":{"title":"使用Docker容器部署SpringBoot项目","date":"2019-11-20","tags":["Linux","Docker","Spring Boot"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![docker](https://d1q6f0aelx0por.cloudfront.net/product-logos/644d2f15-c5db-4731-a353-ace6235841fa-registry.png)\n\nDocker容器化技术，使得部署变得平滑。再也不需要维护软件运行所需的复杂环境。Docker和现代化的微服务，敏捷开发，快速迭代和交付的要求非常匹配。\n\n这篇文章实践从安装Docker开始，到将一个SpringBoot项目部署到Docker容器中。\n\n"},{"id":"virtualbox-network","file":"virtualbox-network.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.virtualbox.org/graphics/vbox_logo2_gradient.png\" alt=\"virtual-box\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eVirtualBox是著名的开源虚拟机软件，最初由Sun公司出品。后来Sun公司被Oracle收购。Sun公司的包括Java和VirtualBox，现在都是Oracle公司的软件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e配置虚拟机时，对于如何选择网络类型一直是一头雾水，这篇文章将VirtualBox的7种网络模式全部都总结一下。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e不同模式的原理，也适用于VMWare。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.virtualbox.org/graphics/vbox_logo2_gradient.png\" alt=\"virtual-box\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eVirtualBox是著名的开源虚拟机软件，最初由Sun公司出品。后来Sun公司被Oracle收购。Sun公司的包括Java和VirtualBox，现在都是Oracle公司的软件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e配置虚拟机时，对于如何选择网络类型一直是一头雾水，这篇文章将VirtualBox的7种网络模式全部都总结一下。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e不同模式的原理，也适用于VMWare。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eNot attached\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这个模式会向虚拟机报告有网卡，但没有物理连接。\n就像拔网线一个效果。\n对于通知虚拟机重新配置网络很有用。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eNetwork Address Translation (NAT)\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e如果你只是想在虚拟机内访问互联网，这个模式就足够了。\n这种模式有很多限制，比如无法ping通。不支持UDP广播。除了TCP和UDP之外的协议不支持。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eNAT Network\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e和NAT差不多，NAT网络就像虚拟机在一个路由器后面一样。外部访问需要设置端口转发。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eBridged Networking\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e即桥接，虚拟机将直接链接某个宿主机物理网卡，而不用通过宿主机操作系统的网络。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eInternal networking\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这种网络仅在虚拟机内部可见，宿主机及外部不可见。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHost-only networking\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这种可以创建一个虚拟的网络组，包含宿主机和虚拟机，宿主机上会有一个虚拟的网卡，提供和虚拟机之间的连接。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eGeneric networking\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这种相当于自定义，可以自由选择网卡驱动，一般情况下用不着这个。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e各种模式可访问性：\u003c/h2\u003e\n\u003ctable class=\"mb-4\"\u003e\n\u003cthead class=\"bg-sky-200 dark:bg-sky-900\"\u003e\n\u003ctr\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e模式\u003c/th\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e虚拟机→宿主机\u003c/th\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e宿主机→虚拟机\u003c/th\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e虚拟机A→虚拟机B\u003c/th\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e虚拟机→互联网\u003c/th\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e互联网→虚拟机\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eHost-only\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eInternal\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eBridged\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eNAT\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e端口转发\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e端口转发\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eNATservice\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e端口转发\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e端口转发\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e总结\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e绝大多数情况下，我们需要虚拟机可以上网，这时设置一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNAT\u003c/code\u003e的模式。\n然后我们还需要主机可以访问虚拟机的服务，这时我们可以为虚拟机再加一个网卡设置为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHost-only\u003c/code\u003e模式。\u003c/p\u003e\n","content":"\n![virtual-box](https://www.virtualbox.org/graphics/vbox_logo2_gradient.png)\n\nVirtualBox是著名的开源虚拟机软件，最初由Sun公司出品。后来Sun公司被Oracle收购。Sun公司的包括Java和VirtualBox，现在都是Oracle公司的软件。\n\n配置虚拟机时，对于如何选择网络类型一直是一头雾水，这篇文章将VirtualBox的7种网络模式全部都总结一下。\n\n不同模式的原理，也适用于VMWare。\n\n\u003c!--more--\u003e\n\n## Not attached\n\n这个模式会向虚拟机报告有网卡，但没有物理连接。\n就像拔网线一个效果。\n对于通知虚拟机重新配置网络很有用。\n\n## Network Address Translation (NAT)\n\n如果你只是想在虚拟机内访问互联网，这个模式就足够了。\n这种模式有很多限制，比如无法ping通。不支持UDP广播。除了TCP和UDP之外的协议不支持。\n\n## NAT Network\n\n和NAT差不多，NAT网络就像虚拟机在一个路由器后面一样。外部访问需要设置端口转发。\n\n## Bridged Networking\n\n即桥接，虚拟机将直接链接某个宿主机物理网卡，而不用通过宿主机操作系统的网络。\n\n## Internal networking\n\n这种网络仅在虚拟机内部可见，宿主机及外部不可见。\n\n## Host-only networking\n\n这种可以创建一个虚拟的网络组，包含宿主机和虚拟机，宿主机上会有一个虚拟的网卡，提供和虚拟机之间的连接。\n\n## Generic networking\n\n这种相当于自定义，可以自由选择网卡驱动，一般情况下用不着这个。\n\n## 各种模式可访问性：\n\n| 模式 | 虚拟机→宿主机 | 宿主机→虚拟机 | 虚拟机A→虚拟机B | 虚拟机→互联网 | 互联网→虚拟机 |\n| ------ | ------------ | ------------ | -------------- | ------------ | ------------ |\n| Host-only | √ | √ | √ | X | X |\n| Internal | X | X | √ | X | X |\n| Bridged | √ | √ | √ | √ | √ |\n| NAT | √ | 端口转发 | X | √ | 端口转发 |\n| NATservice | √ | 端口转发 | √ | √ | 端口转发 |\n\n## 总结\n\n绝大多数情况下，我们需要虚拟机可以上网，这时设置一个`NAT`的模式。\n然后我们还需要主机可以访问虚拟机的服务，这时我们可以为虚拟机再加一个网卡设置为`Host-only`模式。","data":{"title":"VirtualBox的虚拟机网络配置","date":"2019-09-20","tags":["VirtualBox"],"category":"Linux"},"isEmpty":false,"excerpt":"\n![virtual-box](https://www.virtualbox.org/graphics/vbox_logo2_gradient.png)\n\nVirtualBox是著名的开源虚拟机软件，最初由Sun公司出品。后来Sun公司被Oracle收购。Sun公司的包括Java和VirtualBox，现在都是Oracle公司的软件。\n\n配置虚拟机时，对于如何选择网络类型一直是一头雾水，这篇文章将VirtualBox的7种网络模式全部都总结一下。\n\n不同模式的原理，也适用于VMWare。\n\n"},{"id":"ngrok","file":"ngrok.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.howtogeek.com/thumbcache/2/200/b47f24b18abd7d5411b75447849e04ff/wp-content/uploads/2017/03/why-is-a-network-tunnel-called-a-tunnel-00.jpg\" alt=\"Network\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当我们需要在外网访问处于内网的服务时，就需要内网穿透这个技术了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本文介绍实现内网穿透的多种方式\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.howtogeek.com/thumbcache/2/200/b47f24b18abd7d5411b75447849e04ff/wp-content/uploads/2017/03/why-is-a-network-tunnel-called-a-tunnel-00.jpg\" alt=\"Network\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当我们需要在外网访问处于内网的服务时，就需要内网穿透这个技术了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本文介绍实现内网穿透的多种方式\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e有外网IP\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e如果你的宽带接入是有外网IP的，那很简单，只需要设置路由器的端口转发就可以了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e查看自己是不是有外网IP也很简单，查看路由器获取到的IP和真实的外网IP是否一致就知道了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e真实外网IP，通过搜索引擎搜索IP即可获取。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e由于现在小区宽带都是接入到服务商的大路由上，IPV4的资源也很珍贵，所以基本都是没有外网IP的，本文重点讨论没有外网IP的情况。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e付费方案\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ca href=\"https://www.oray.com\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://www.oray.com\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e花生壳提供软件解决方案，同时他们也提供能够实现穿透的硬件方案。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当然还有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNAT123\u003c/code\u003e，但是他们的官网就像是上个世纪的网站，还是算了吧。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003engrok\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://camo.githubusercontent.com/f2d698991e6a0411680413ebcc15a6460b8beda3/68747470733a2f2f6e67726f6b2e636f6d2f7374617469632f696d672f6f766572766965772e706e67\" alt=\"Network\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003engrok1.x是开源的，地址在这：\u003ca href=\"https://github.com/inconshreveable/ngrok\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/inconshreveable/ngrok\u003c/a\u003e\nngrok2.x是闭源的，官网在这：\u003ca href=\"https://ngrok.com\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://ngrok.com\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003engrok商业化之后估计1.x就很少维护了，2.x目前是有限制的免费。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003efrp\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://github.com/fatedier/frp/raw/master/doc/pic/architecture.png\" alt=\"Network\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003efrp\u003c/code\u003e是一个开源的内网穿透的反向代理应用，支持 tcp, udp 协议。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ca href=\"https://github.com/fatedier/frp\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/fatedier/frp\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e用户通过访问一个装有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003efrps\u003c/code\u003e的公网服务器，由服务器代理访问处于内网，并安装了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003efrpc\u003c/code\u003e的内网服务\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e配置方式，请参考他们的github仓库\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003ev2ray\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ev2ray\u003c/code\u003e通常用于科学上网，但是由于一个 V2Ray 进程可并发支持多个入站和出站协议，所以它也可以用于内网穿透。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e反向代理的大致工作原理如下:\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e假设在主机 A 中有一个网页服务器，这台主机没有公网 IP，无法在公网上直接访问。另有一台主机 B，它可以由公网访问。现在我们需要把 B 作为入口，把流量从 B 转发到 A。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e在主机 A 中配置一个 V2Ray，称为bridge，在 B 中也配置一个 V2Ray，称为portal。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003ebridge会向portal主动建立连接，此连接的目标地址可以自行设定。portal会收到两种连接，一是由bridge发来的连接，二是公网用户发来的连接。portal会自动将两类连接合并。于是bridge就可以收到公网流量了。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003ebridge在收到公网流量之后，会将其原封不动地发给主机 A 中的网页服务器。当然，这一步需要路由的协作。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003ebridge会根据流量的大小进行动态的负载均衡。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e具体配置请参考官网及github\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ca href=\"https://www.v2ray.com\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://www.v2ray.com\u003c/a\u003e\n\u003ca href=\"https://github.com/V2Ray/v2ray-core\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/V2Ray/v2ray-core\u003c/a\u003e\u003c/p\u003e\n","content":"\n![Network](https://www.howtogeek.com/thumbcache/2/200/b47f24b18abd7d5411b75447849e04ff/wp-content/uploads/2017/03/why-is-a-network-tunnel-called-a-tunnel-00.jpg)\n\n当我们需要在外网访问处于内网的服务时，就需要内网穿透这个技术了。\n\n本文介绍实现内网穿透的多种方式\n\n\u003c!--more--\u003e\n\n## 有外网IP\n\n如果你的宽带接入是有外网IP的，那很简单，只需要设置路由器的端口转发就可以了。\n\n查看自己是不是有外网IP也很简单，查看路由器获取到的IP和真实的外网IP是否一致就知道了。\n\n真实外网IP，通过搜索引擎搜索IP即可获取。\n\n由于现在小区宽带都是接入到服务商的大路由上，IPV4的资源也很珍贵，所以基本都是没有外网IP的，本文重点讨论没有外网IP的情况。\n\n## 付费方案\n\n[https://www.oray.com](https://www.oray.com)\n\n花生壳提供软件解决方案，同时他们也提供能够实现穿透的硬件方案。\n\n当然还有`NAT123`，但是他们的官网就像是上个世纪的网站，还是算了吧。\n\n## ngrok\n\n![Network](https://camo.githubusercontent.com/f2d698991e6a0411680413ebcc15a6460b8beda3/68747470733a2f2f6e67726f6b2e636f6d2f7374617469632f696d672f6f766572766965772e706e67)\n\nngrok1.x是开源的，地址在这：[https://github.com/inconshreveable/ngrok](https://github.com/inconshreveable/ngrok)\nngrok2.x是闭源的，官网在这：[https://ngrok.com](https://ngrok.com)\n\nngrok商业化之后估计1.x就很少维护了，2.x目前是有限制的免费。\n\n## frp\n\n![Network](https://github.com/fatedier/frp/raw/master/doc/pic/architecture.png)\n\n`frp`是一个开源的内网穿透的反向代理应用，支持 tcp, udp 协议。\n\n[https://github.com/fatedier/frp](https://github.com/fatedier/frp)\n\n用户通过访问一个装有`frps`的公网服务器，由服务器代理访问处于内网，并安装了`frpc`的内网服务\n\n配置方式，请参考他们的github仓库\n\n## v2ray\n\n`v2ray`通常用于科学上网，但是由于一个 V2Ray 进程可并发支持多个入站和出站协议，所以它也可以用于内网穿透。\n\n反向代理的大致工作原理如下:\n\n- 假设在主机 A 中有一个网页服务器，这台主机没有公网 IP，无法在公网上直接访问。另有一台主机 B，它可以由公网访问。现在我们需要把 B 作为入口，把流量从 B 转发到 A。\n- 在主机 A 中配置一个 V2Ray，称为bridge，在 B 中也配置一个 V2Ray，称为portal。\n- bridge会向portal主动建立连接，此连接的目标地址可以自行设定。portal会收到两种连接，一是由bridge发来的连接，二是公网用户发来的连接。portal会自动将两类连接合并。于是bridge就可以收到公网流量了。\n- bridge在收到公网流量之后，会将其原封不动地发给主机 A 中的网页服务器。当然，这一步需要路由的协作。\n- bridge会根据流量的大小进行动态的负载均衡。\n\n具体配置请参考官网及github\n\n[https://www.v2ray.com](https://www.v2ray.com)\n[https://github.com/V2Ray/v2ray-core](https://github.com/V2Ray/v2ray-core)","data":{"title":"实现内网穿透的最新姿势","date":"2019-09-02","tags":["Linux"],"category":"Linux"},"isEmpty":false,"excerpt":"\n![Network](https://www.howtogeek.com/thumbcache/2/200/b47f24b18abd7d5411b75447849e04ff/wp-content/uploads/2017/03/why-is-a-network-tunnel-called-a-tunnel-00.jpg)\n\n当我们需要在外网访问处于内网的服务时，就需要内网穿透这个技术了。\n\n本文介绍实现内网穿透的多种方式\n\n"},{"id":"h2-password","file":"h2-password.md","excerptHtml":"","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.h2database.com/html/images/h2-logo-2.png\" alt=\"H2\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e使用中的H2数据库如何修改用户名密码呢？执行下面的SQL就可以了：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-sql px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003ealter user wayne set password '*****password*****'\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![H2](https://www.h2database.com/html/images/h2-logo-2.png)\n\n使用中的H2数据库如何修改用户名密码呢？执行下面的SQL就可以了：\n\n```sql\nalter user wayne set password '*****password*****'\n```","data":{"title":"H2数据库修改密码","date":"2019-08-14","tags":["SQL"],"category":"Backend"},"isEmpty":false,"excerpt":""},{"id":"raspberrypi-fish","file":"raspberrypi-fish.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e因为最近要出门一段时间，鱼缸没人照顾，树莓派的第一个实用需求出现了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e准备做一个液位报警仪，当鱼缸水位低于报警水位，发一封邮件给我，我就能在微信上收到通知，从而远程控制给鱼缸加水，防止鱼缸循环泵烧坏。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cvideo src=\"/images/20190807_raspberrypi_fish.mp4\" controls width=\"70%\" style=\"margin:24px auto;display: block;\"\u003e\u003c/video\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e使用GPIO接口控制硬件和接收传感器的数据，实现过程如下：\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e因为最近要出门一段时间，鱼缸没人照顾，树莓派的第一个实用需求出现了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e准备做一个液位报警仪，当鱼缸水位低于报警水位，发一封邮件给我，我就能在微信上收到通知，从而远程控制给鱼缸加水，防止鱼缸循环泵烧坏。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cvideo src=\"/images/20190807_raspberrypi_fish.mp4\" controls width=\"70%\" style=\"margin:24px auto;display: block;\"\u003e\u003c/video\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e使用GPIO接口控制硬件和接收传感器的数据，实现过程如下：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eGPIO介绍\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e树莓派的一个强大功能是沿着电路板顶部边缘的一排\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGPIO\u003c/code\u003e（general-purpose input/output）引脚。 树莓派4B板上有一排40针GPIO接头。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://technicalustad.com/wp-content/uploads/2018/02/Raspberry-Pi-GPIO-Explained.png\" alt=\"GPIO\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e主板上有两个5V引脚和两个3V3引脚，以及一些不可配置的接地引脚（0V）。 其余引脚均为通用3V3引脚，意味着输出设置为3V3，输入为3V3容差。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e输出\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e指定为输出引脚的GPIO引脚可以设置为高（3V3）或低（0V）。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e输入\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e指定为输入引脚的GPIO引脚可以读为高（3V3）或低（0V）。 使用内部上拉或下拉电阻可以更轻松地实现这一点。 引脚GPIO2和GPIO3具有固定的上拉电阻，但对于其他引脚，可以使用软件配置。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e其它\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e除了简单的输入和输出设备外，GPIO引脚还可以使用多种替代功能，一些可用于所有引脚，另一些则可用于特定引脚。如：PWM、SPI、I2C、串行\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e装备\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e面包板：用于免焊接线，边上两排是竖向连接的，中间是横向连接的。用杜邦线插入孔中就可以便捷接线了。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"http://www.taichi-maker.com/wp-content/uploads/2017/03/breadboard.jpg\" alt=\"面包板\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eGPIO扩展版：可以方便地将所有GPIO接到面包板上\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"http://g.search1.alicdn.com/img/bao/uploaded/i4/i3/TB1jpt3LXXXXXbnXpXXXXXXXXXX_!!0-item_pic.jpg_200x200.jpg\" alt=\"面包板\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eLED二极管：用于展示状态\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"http://file.youboy.com/a/83/81/74/5/9777755.jpg\" alt=\"二极管\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e干簧管液位计：用于监测液位，其原理是浮球中有磁铁，可以磁化干簧管，从而短路电路\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"http://i01.yizimg.com/uploads_old/351305/2015112223270383_old.jpg\" alt=\"液位计\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e接线\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eLED一端接GPIO17号引脚，一端接地。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e液位开关一端接GPIO2号引脚，一端接地。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20190807_fish.jpg\" alt=\"接线\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e编程\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这里我使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGPIO Zero\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这是一个Python的GPIO库，树莓派默认已经安装了，可以直接使用。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e核心脚本如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-python px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003efrom gpiozero import LED\nfrom gpiozero import Button\nfrom time import sleep\n\nled = LED(17) #1\nbutton = Button(2) #2\nwhile True:\n    sleep(0.5) #3\n    if button.is_pressed: #4\n        led.on()\n    else:\n        led.off()\n\u003c/code\u003e\u003c/pre\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e创建一个LED模式的GPIO口用于展示状态\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e创建一个Button模式的GPIO口\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e每0.5秒检测一次\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e开关打开则点亮LED，否则关闭LED\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003ePython发送邮件\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-python px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e#coding=utf-8\nfrom email.mime.text import MIMEText\nfrom email.header import Header\nfrom smtplib import SMTP_SSL\nimport time\n\n\n#邮箱smtp服务器\nhost_server = 'smtp.exmail.qq.com'\n#sender用户名\nsender_user = 'wangyu@wycode.cn'\n#邮箱登录密码\nsender_pwd = '**********'\n#发件人的邮箱\nsender_mail = sender_user\n#收件人邮箱\nreceiver = sender_user\n\n#邮件的正文内容\nmail_content = '【水位警报】过低\\n时间：'+time.strftime( '%Y-%m-%d %X', time.localtime())\n#邮件标题\nmail_title = '【水位警报】过低'\n\n#ssl登录\nsmtp = SMTP_SSL(host_server)\n#set_debuglevel()是用来调试的。参数值为1表示开启调试模式，参数值为0关闭调试模式\nsmtp.set_debuglevel(1)\nsmtp.ehlo(host_server)\nsmtp.login(sender_user, sender_pwd)\n\nmsg = MIMEText(mail_content, \"plain\", 'utf-8')\nmsg[\"Subject\"] = Header(mail_title, 'utf-8')\nmsg[\"From\"] = sender_mail\nmsg[\"To\"] = receiver\nsmtp.sendmail(sender_mail, receiver, msg.as_string())\nsmtp.quit()\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n因为最近要出门一段时间，鱼缸没人照顾，树莓派的第一个实用需求出现了。\n\n准备做一个液位报警仪，当鱼缸水位低于报警水位，发一封邮件给我，我就能在微信上收到通知，从而远程控制给鱼缸加水，防止鱼缸循环泵烧坏。\n\n\u003cvideo src=\"/images/20190807_raspberrypi_fish.mp4\" controls=\"controls\"  width=\"70%\" style=\"margin:24px auto;display: block;\"\u003e\u003c/video\u003e\n\n使用GPIO接口控制硬件和接收传感器的数据，实现过程如下：\n\u003c!--more--\u003e\n\n## GPIO介绍\n\n树莓派的一个强大功能是沿着电路板顶部边缘的一排`GPIO`（general-purpose input/output）引脚。 树莓派4B板上有一排40针GPIO接头。\n\n![GPIO](https://technicalustad.com/wp-content/uploads/2018/02/Raspberry-Pi-GPIO-Explained.png)\n\n主板上有两个5V引脚和两个3V3引脚，以及一些不可配置的接地引脚（0V）。 其余引脚均为通用3V3引脚，意味着输出设置为3V3，输入为3V3容差。\n\n### 输出\n\n指定为输出引脚的GPIO引脚可以设置为高（3V3）或低（0V）。\n\n### 输入\n\n指定为输入引脚的GPIO引脚可以读为高（3V3）或低（0V）。 使用内部上拉或下拉电阻可以更轻松地实现这一点。 引脚GPIO2和GPIO3具有固定的上拉电阻，但对于其他引脚，可以使用软件配置。\n\n### 其它\n\n除了简单的输入和输出设备外，GPIO引脚还可以使用多种替代功能，一些可用于所有引脚，另一些则可用于特定引脚。如：PWM、SPI、I2C、串行\n\n## 装备\n\n- 面包板：用于免焊接线，边上两排是竖向连接的，中间是横向连接的。用杜邦线插入孔中就可以便捷接线了。\n\n![面包板](http://www.taichi-maker.com/wp-content/uploads/2017/03/breadboard.jpg)\n\n- GPIO扩展版：可以方便地将所有GPIO接到面包板上\n\n![面包板](http://g.search1.alicdn.com/img/bao/uploaded/i4/i3/TB1jpt3LXXXXXbnXpXXXXXXXXXX_!!0-item_pic.jpg_200x200.jpg)\n\n- LED二极管：用于展示状态\n\n![二极管](http://file.youboy.com/a/83/81/74/5/9777755.jpg)\n\n- 干簧管液位计：用于监测液位，其原理是浮球中有磁铁，可以磁化干簧管，从而短路电路\n\n![液位计](http://i01.yizimg.com/uploads_old/351305/2015112223270383_old.jpg)\n\n## 接线\n\nLED一端接GPIO17号引脚，一端接地。\n\n液位开关一端接GPIO2号引脚，一端接地。\n\n![接线](/images/20190807_fish.jpg)\n\n## 编程\n\n这里我使用`GPIO Zero`\n\n这是一个Python的GPIO库，树莓派默认已经安装了，可以直接使用。\n\n核心脚本如下：\n\n```python\nfrom gpiozero import LED\nfrom gpiozero import Button\nfrom time import sleep\n\nled = LED(17) #1\nbutton = Button(2) #2\nwhile True:\n    sleep(0.5) #3\n    if button.is_pressed: #4\n        led.on()\n    else:\n        led.off()\n```\n1. 创建一个LED模式的GPIO口用于展示状态\n2. 创建一个Button模式的GPIO口\n3. 每0.5秒检测一次\n4. 开关打开则点亮LED，否则关闭LED\n\n## Python发送邮件\n\n```python\n#coding=utf-8\nfrom email.mime.text import MIMEText\nfrom email.header import Header\nfrom smtplib import SMTP_SSL\nimport time\n\n\n#邮箱smtp服务器\nhost_server = 'smtp.exmail.qq.com'\n#sender用户名\nsender_user = 'wangyu@wycode.cn'\n#邮箱登录密码\nsender_pwd = '**********'\n#发件人的邮箱\nsender_mail = sender_user\n#收件人邮箱\nreceiver = sender_user\n\n#邮件的正文内容\nmail_content = '【水位警报】过低\\n时间：'+time.strftime( '%Y-%m-%d %X', time.localtime())\n#邮件标题\nmail_title = '【水位警报】过低'\n\n#ssl登录\nsmtp = SMTP_SSL(host_server)\n#set_debuglevel()是用来调试的。参数值为1表示开启调试模式，参数值为0关闭调试模式\nsmtp.set_debuglevel(1)\nsmtp.ehlo(host_server)\nsmtp.login(sender_user, sender_pwd)\n\nmsg = MIMEText(mail_content, \"plain\", 'utf-8')\nmsg[\"Subject\"] = Header(mail_title, 'utf-8')\nmsg[\"From\"] = sender_mail\nmsg[\"To\"] = receiver\nsmtp.sendmail(sender_mail, receiver, msg.as_string())\nsmtp.quit()\n```\n\n","data":{"title":"用树莓派4B做一个鱼缸水位报警","date":"2019-08-07","tags":["RaspberryPi","Linux","Python"],"category":"Linux"},"isEmpty":false,"excerpt":"\n因为最近要出门一段时间，鱼缸没人照顾，树莓派的第一个实用需求出现了。\n\n准备做一个液位报警仪，当鱼缸水位低于报警水位，发一封邮件给我，我就能在微信上收到通知，从而远程控制给鱼缸加水，防止鱼缸循环泵烧坏。\n\n\u003cvideo src=\"/images/20190807_raspberrypi_fish.mp4\" controls=\"controls\"  width=\"70%\" style=\"margin:24px auto;display: block;\"\u003e\u003c/video\u003e\n\n使用GPIO接口控制硬件和接收传感器的数据，实现过程如下：\n"}],"page":3,"total":15},"__N_SSG":true},"page":"/blog/page/[page]","query":{"page":"3"},"buildId":"KYANdil3ljfaQ9_rbwOmo","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
