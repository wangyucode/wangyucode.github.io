<!DOCTYPE html><html lang="zh-CN"><head><meta charSet="utf-8"/><title>王郁的小站</title><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/><meta name="next-head-count" content="3"/><link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml"/><meta name="description" content="欢迎光临王郁的小站"/><meta property="og:image" content="https://og-image.vercel.app/%E7%8E%8B%E9%83%81%E7%9A%84%E5%B0%8F%E7%AB%99.png?theme=light&amp;md=0&amp;fontSize=75px&amp;images=https%3A%2F%2Fassets.vercel.com%2Fimage%2Fupload%2Ffront%2Fassets%2Fdesign%2Fnextjs-black-logo.svg"/><meta name="og:title" content="王郁的小站"/><meta name="twitter:card" content="summary_large_image"/><link rel="preload" href="/_next/static/css/804786de35d6ea9b.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/804786de35d6ea9b.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-6af0e3c12b874bb0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-e14092e0d084b50d.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-bc0074f0f8514a28.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-80e5bb06d977ddb5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/358-09e70898ee89de63.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/889-d516db97bb2485e1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/blog/page/%5Bpage%5D-0b41e9c2dec44a07.js" defer="" crossorigin=""></script><script src="/_next/static/uFO1FMOoBQ2X-GM8G4ZfF/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/uFO1FMOoBQ2X-GM8G4ZfF/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"github-action","file":"github-action.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.wangbase.com/blogimg/asset/201909/bg2019091201.jpg\" alt=\"Github Action\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGithub Actions\u003c/code\u003e是由Github发布的持续集成(CI)/持续交付(CD)服务，对于公开的仓库是免费使用的。之前我们使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTravisCI\u003c/code\u003e，现在用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGithub Actions\u003c/code\u003e更方便了。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.wangbase.com/blogimg/asset/201909/bg2019091201.jpg\" alt=\"Github Action\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGithub Actions\u003c/code\u003e是由Github发布的持续集成(CI)/持续交付(CD)服务，对于公开的仓库是免费使用的。之前我们使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTravisCI\u003c/code\u003e，现在用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGithub Actions\u003c/code\u003e更方便了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eActions\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通常一个持续集成的工作流通常包含很多的步骤，这个步骤做的事，称为一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAction\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我们会写很多的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAction\u003c/code\u003e（配环境，拉代码，安装依赖，编译，测试，打包，部署），然后将它们组合到一起工作。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eGithub Marketplace\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e组合可以是多种多样的，但是这些\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAction\u003c/code\u003e通常都是类似的。所以Github利用自己开源的特点，所有人都可以将自己的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAction\u003c/code\u003e发布到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGithub Marketplace\u003c/code\u003e中，供他人使用。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这意味着，你能想到的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAction\u003c/code\u003e几乎都已经被写好了，直接拿来用就行了，不用重复造轮子。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当然自己再造一个轮子也是很简单的。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e一个典型的workflow\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-yml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003ename: Node.js CI\n\non: [push] # push代码时执行\n\njobs:\n  build: # jobs名称\n\n    runs-on: ubuntu-latest # 操作系统\n\n    strategy:\n      matrix:\n        node-version: [8.x, 10.x, 12.x] # node版本\n\n    steps:\n    - uses: actions/checkout@v2 # 引用action：拉代码\n    - name: Use Node.js ${{ matrix.node-version }} # 引用action：配置node环境\n      uses: actions/setup-node@v1\n      with:\n        node-version: ${{ matrix.node-version }}\n    - run: npm install # 跑命令：安装依赖\n    - run: npm run build --if-present # 跑命令：安装依赖\n    - run: npm test # 跑命令：执行测试\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用密码参数\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e当我们要部署时，有时会用到服务器密码，我们不能直接配置在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eworkflow\u003c/code\u003e脚本中。这时就要使用密码参数。\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e在仓库设置（Settings）页面\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加密码（Add a new secret）\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e${{secrets.NAME}}\u003c/code\u003e 引用密码（替换\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNAME\u003c/code\u003e为你设置的密码名称）\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e举个例子:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-yml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e  # Deploy\n  - name: SFTP uploader\n    uses: wangyucode/sftp-upload-action@v1.1\n    with:\n      host: 'wycode.cn'\n      port: 22 # optional, default is 22 \n      username: ${{ secrets.SERVER_USERNAME }} # optional, default is root\n      password: ${{ secrets.SERVER_PASSWORD }} \n      localDir: 'dist'\n      remoteDir: '/var/www/dealer/'\n      dryRun: false # optional\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e注意： 不要使用命令传递密码，应使用环境变量或action的输入。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e自定义Action（造轮子）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e可以使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDocker\u003c/code\u003e或\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJavaScript\u003c/code\u003e\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e创建一个仓库\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e编写action定义文件\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e发布action\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e我写的sftp部署action的例子：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-yml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003ename: 'SFTP uploader'\ncolor: 'green'\nicon: 'upload'\ndescription: 'upload files to server via SFTP'\ninputs:\n  host:\n    required: true\n  port:\n    required: false\n    default: 22\n  username:\n    required: false\n    default: 'root'\n  password:\n    required: true\n  localDir:\n    required: true\n  remoteDir:\n    required: true\n  dryRun:\n    required: false\n    default: false\nruns:\n  using: 'node12'\n  main: 'dist/index.js'\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e完整例子\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ca href=\"https://github.com/wangyucode/dealer/blob/master/.github/workflows/main.yml\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/dealer/blob/master/.github/workflows/main.yml\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这是一个《谁是卧底发牌员》的网页应用，使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAngularJS\u003c/code\u003e，线上地址：\u003ca href=\"https://wycode.cn/dealer/\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://wycode.cn/dealer/\u003c/a\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e提交代码后，Github Action会自动编译部署到线上。\u003c/p\u003e\n","content":"\n![Github Action](https://www.wangbase.com/blogimg/asset/201909/bg2019091201.jpg)\n\n\u003e `Github Actions`是由Github发布的持续集成(CI)/持续交付(CD)服务，对于公开的仓库是免费使用的。之前我们使用`TravisCI`，现在用`Github Actions`更方便了。\n\n\u003c!--more--\u003e\n\n## Actions\n\n通常一个持续集成的工作流通常包含很多的步骤，这个步骤做的事，称为一个`Action`。\n\n我们会写很多的`Action`（配环境，拉代码，安装依赖，编译，测试，打包，部署），然后将它们组合到一起工作。\n\n## Github Marketplace\n\n组合可以是多种多样的，但是这些`Action`通常都是类似的。所以Github利用自己开源的特点，所有人都可以将自己的`Action`发布到`Github Marketplace`中，供他人使用。\n\n这意味着，你能想到的`Action`几乎都已经被写好了，直接拿来用就行了，不用重复造轮子。\n\n当然自己再造一个轮子也是很简单的。\n\n## 一个典型的workflow\n\n```yml\nname: Node.js CI\n\non: [push] # push代码时执行\n\njobs:\n  build: # jobs名称\n\n    runs-on: ubuntu-latest # 操作系统\n\n    strategy:\n      matrix:\n        node-version: [8.x, 10.x, 12.x] # node版本\n\n    steps:\n    - uses: actions/checkout@v2 # 引用action：拉代码\n    - name: Use Node.js ${{ matrix.node-version }} # 引用action：配置node环境\n      uses: actions/setup-node@v1\n      with:\n        node-version: ${{ matrix.node-version }}\n    - run: npm install # 跑命令：安装依赖\n    - run: npm run build --if-present # 跑命令：安装依赖\n    - run: npm test # 跑命令：执行测试\n```\n\n## 使用密码参数\n\n当我们要部署时，有时会用到服务器密码，我们不能直接配置在`workflow`脚本中。这时就要使用密码参数。\n\n1. 在仓库设置（Settings）页面\n2. 添加密码（Add a new secret）\n3. 使用 `${{secrets.NAME}}` 引用密码（替换`NAME`为你设置的密码名称）\n\n举个例子:\n\n```yml\n  # Deploy\n  - name: SFTP uploader\n    uses: wangyucode/sftp-upload-action@v1.1\n    with:\n      host: 'wycode.cn'\n      port: 22 # optional, default is 22 \n      username: ${{ secrets.SERVER_USERNAME }} # optional, default is root\n      password: ${{ secrets.SERVER_PASSWORD }} \n      localDir: 'dist'\n      remoteDir: '/var/www/dealer/'\n      dryRun: false # optional\n```\n\n\u003e 注意： 不要使用命令传递密码，应使用环境变量或action的输入。\n\n## 自定义Action（造轮子）\n\n可以使用`Docker`或`JavaScript`\n\n1. 创建一个仓库\n2. 编写action定义文件\n3. 发布action\n\n我写的sftp部署action的例子：\n\n```yml\nname: 'SFTP uploader'\ncolor: 'green'\nicon: 'upload'\ndescription: 'upload files to server via SFTP'\ninputs:\n  host:\n    required: true\n  port:\n    required: false\n    default: 22\n  username:\n    required: false\n    default: 'root'\n  password:\n    required: true\n  localDir:\n    required: true\n  remoteDir:\n    required: true\n  dryRun:\n    required: false\n    default: false\nruns:\n  using: 'node12'\n  main: 'dist/index.js'\n```\n\n## 完整例子\n\n\u003chttps://github.com/wangyucode/dealer/blob/master/.github/workflows/main.yml\u003e\n\n这是一个《谁是卧底发牌员》的网页应用，使用`AngularJS`，线上地址：\u003chttps://wycode.cn/dealer/\u003e。\n\n提交代码后，Github Action会自动编译部署到线上。\n","data":{"title":"使用Github Action进行持续集成","date":"2020-10-28","tags":["Github","NodeJS","SFTP"],"category":"CI CD"},"isEmpty":false,"excerpt":"\n![Github Action](https://www.wangbase.com/blogimg/asset/201909/bg2019091201.jpg)\n\n\u003e `Github Actions`是由Github发布的持续集成(CI)/持续交付(CD)服务，对于公开的仓库是免费使用的。之前我们使用`TravisCI`，现在用`Github Actions`更方便了。\n\n"},{"id":"chicken-dinner-tesla","file":"chicken-dinner-tesla.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://game.gtimg.cn/images/gp/ingame/a20200724tslcar/intor_6.png\" alt=\"tesela\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e今天我们用数学期望来计算一下《和平精英》的特斯拉（玛莎拉蒂）到底要多少钱？怎么抽最划算？\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://game.gtimg.cn/images/gp/ingame/a20200724tslcar/intor_6.png\" alt=\"tesela\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e今天我们用数学期望来计算一下《和平精英》的特斯拉（玛莎拉蒂）到底要多少钱？怎么抽最划算？\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e规则\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e扭蛋等级概率：\u003c/p\u003e\n\u003ctable class=\"mb-4\"\u003e\n\u003cthead class=\"bg-sky-200 dark:bg-sky-900\"\u003e\n\u003ctr\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e2星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e3星\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e82%\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e17%\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp class=\"mb-4\"\u003e保护追加不会降低扭蛋等级，并且追加三次必定能提升扭蛋等级；保护追加需要消耗一定的幸运币，扭蛋等级越高，保护追加消耗的幸运币数量越多。\u003c/p\u003e\n\u003ctable class=\"mb-4\"\u003e\n\u003cthead class=\"bg-sky-200 dark:bg-sky-900\"\u003e\n\u003ctr\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e2星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e3星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e4星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e5星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e6星\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e6\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e17\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e51\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e153\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e430\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e827\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e保底法/碎片兑换\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e抽1次的碎片期望 = 12 * 82% + 36 * 17% + 54 * 1% = 16.5碎片\n兑换一辆特斯拉需要 2880 碎片\n所以需要抽 2880/16.5 ≈ 175次\n175 * 6 = 1047点劵\n紫色 * 3 = 3141点券\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e免费追加法\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e成功期望 = 20% * 82% + 20% * 17% * 2 + 20% * 1% * 3 = 0.238\n失败期望 = 80% * 75% * -1 + 80% * 75% * -2 =  -1.8\n免费追加期望为-1.56星\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e保护追加法\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e一次成功概率 = 20%\n两次成功概率 = 20% * 20% = 4%\n其余都需要3次 即 76% 需要抽3次\n每升一个星需要的次数 = 20% + 4% * 2 + 76% * 3 = 2.56次\n每次升级的星星期望 = 82% * 1 + 17% * 2 + 1% * 3 = 1.19星\n升到6星总共需要 = 5.04次 即大概率需要升星5次\n\u003c/code\u003e\u003c/pre\u003e\n\u003ctable class=\"mb-4\"\u003e\n\u003cthead class=\"bg-sky-200 dark:bg-sky-900\"\u003e\n\u003ctr\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1星→2星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e2星→3星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e3星→4星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e4星→5星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e5星→6星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e6星→7星\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e15.36\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e43.52\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e130.56\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e391.68\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1100.8\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1681.92\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e所以6星 = 15.36 + 43.52 + 130.56 + 391.68 + 1100.8 = 1681.92点劵\n所以7星 = 15.36 + 43.52 + 130.56 + 391.68 + 1100.8 + 1681.92= 3363.84点劵\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e运气爆棚和脸最黑的情况\u003c/h2\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e保底法：\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e因为保底法需要操作175次，基本会接近期望数字。\n\u003cstrong\u003e基本不存在\u003c/strong\u003e175次全3星和175次全1星的情况（小于一亿分之一），即基本没有运气爆棚的情况，和脸黑的情况。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e免费追加法：\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e免费升星法最好的情况（6元提车）只需要操作两次，所以幸存者偏差会\u003cstrong\u003e特别大\u003c/strong\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e那么传说中6元提车的概率是多少呢：\u003c/p\u003e\n\u003ctable class=\"mb-4\"\u003e\n\u003cthead class=\"bg-sky-200 dark:bg-sky-900\"\u003e\n\u003ctr\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e可能的抽法\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e排列可能\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e概率\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e3,3组合\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1种\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e0.0000004\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1,2,3组合\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e6种\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e0.000066912\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1,1,1,1,2组合\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e5种\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e0.00361697\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1,1,2,2组合\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e6种\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e0.00018655\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e2,2,2组合\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1种\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e0.000039304\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1,1,1,1,1,1组合\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1种\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e0.000019456\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp class=\"mb-4\"\u003e合计约千分之4，即你每尝试250次可能才能成功1次。\n当你尝试250次的时候 你已经花了1500点券了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e至于最坏的情况，你可能要永远转下去了。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e保护追加法：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e和免费追加一样，最好的情况只需操作2次，概率也是一样的。\n不同之处在于最坏的情况，因为有保护，不至于一直转下去：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e( 6 + 17 + 51 + 153 + 430 ) * 3 = 1971\n七星需要再 + 827 * 3 = 4452\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e总结：虽然保底法期望花费最少，但是很多人都忍不住去赌一把，原因就在于人性是喜爱赌博的。最后希望各位根据自己的实力，理性消费。\u003c/p\u003e\n\u003c/blockquote\u003e\n","content":"\n![tesela](https://game.gtimg.cn/images/gp/ingame/a20200724tslcar/intor_6.png)\n\n今天我们用数学期望来计算一下《和平精英》的特斯拉（玛莎拉蒂）到底要多少钱？怎么抽最划算？\n\n\u003c!--more--\u003e\n\n## 规则\n\n扭蛋等级概率：\n\n|  1星 | 2星  | 3星 |\n| :-: | :-: | :-: |\n| 82% | 17% | 1% |\n\n保护追加不会降低扭蛋等级，并且追加三次必定能提升扭蛋等级；保护追加需要消耗一定的幸运币，扭蛋等级越高，保护追加消耗的幸运币数量越多。\n\n|  1星 | 2星  | 3星 | 4星 | 5星 | 6星 |\n| :-: | :-: | :-: | :-: | :-: | :-: |\n| 6 | 17 | 51 | 153 | 430 | 827 |\n\n## 保底法/碎片兑换\n\n```bash\n抽1次的碎片期望 = 12 * 82% + 36 * 17% + 54 * 1% = 16.5碎片\n兑换一辆特斯拉需要 2880 碎片\n所以需要抽 2880/16.5 ≈ 175次\n175 * 6 = 1047点劵\n紫色 * 3 = 3141点券\n```\n\n## 免费追加法\n\n```bash\n成功期望 = 20% * 82% + 20% * 17% * 2 + 20% * 1% * 3 = 0.238\n失败期望 = 80% * 75% * -1 + 80% * 75% * -2 =  -1.8\n免费追加期望为-1.56星\n```\n\n## 保护追加法\n\n```bash\n一次成功概率 = 20%\n两次成功概率 = 20% * 20% = 4%\n其余都需要3次 即 76% 需要抽3次\n每升一个星需要的次数 = 20% + 4% * 2 + 76% * 3 = 2.56次\n每次升级的星星期望 = 82% * 1 + 17% * 2 + 1% * 3 = 1.19星\n升到6星总共需要 = 5.04次 即大概率需要升星5次\n```\n\n|  1星→2星 | 2星→3星 | 3星→4星 | 4星→5星 | 5星→6星 | 6星→7星 |\n| :-: | :-: | :-: | :-: | :-: | :-: |\n| 15.36 | 43.52 | 130.56 | 391.68 | 1100.8 | 1681.92 |\n\n```bash\n所以6星 = 15.36 + 43.52 + 130.56 + 391.68 + 1100.8 = 1681.92点劵\n所以7星 = 15.36 + 43.52 + 130.56 + 391.68 + 1100.8 + 1681.92= 3363.84点劵\n```\n\n## 运气爆棚和脸最黑的情况\n\n### 保底法：\n\n因为保底法需要操作175次，基本会接近期望数字。\n**基本不存在**175次全3星和175次全1星的情况（小于一亿分之一），即基本没有运气爆棚的情况，和脸黑的情况。\n\n### 免费追加法：\n\n免费升星法最好的情况（6元提车）只需要操作两次，所以幸存者偏差会**特别大**。\n\n那么传说中6元提车的概率是多少呢：\n\n| 可能的抽法 | 排列可能 | 概率 |\n| :-: | :-: | :-: |\n| 3,3组合 | 1种 | 0.0000004 |\n| 1,2,3组合 | 6种 | 0.000066912 |\n| 1,1,1,1,2组合 | 5种 | 0.00361697 |\n| 1,1,2,2组合 | 6种 | 0.00018655 |\n| 2,2,2组合 | 1种 | 0.000039304 |\n| 1,1,1,1,1,1组合 | 1种 | 0.000019456 |\n\n合计约千分之4，即你每尝试250次可能才能成功1次。\n当你尝试250次的时候 你已经花了1500点券了。\n\n至于最坏的情况，你可能要永远转下去了。\n\n## 保护追加法：\n\n和免费追加一样，最好的情况只需操作2次，概率也是一样的。\n不同之处在于最坏的情况，因为有保护，不至于一直转下去：\n\n```bash\n( 6 + 17 + 51 + 153 + 430 ) * 3 = 1971\n七星需要再 + 827 * 3 = 4452\n```\n\n\u003e 总结：虽然保底法期望花费最少，但是很多人都忍不住去赌一把，原因就在于人性是喜爱赌博的。最后希望各位根据自己的实力，理性消费。\n","data":{"title":"用数学期望计算《和平精英》特斯拉（玛莎拉蒂）到底要多少钱？","date":"2020-07-24","tags":null,"category":"Story"},"isEmpty":false,"excerpt":"\n![tesela](https://game.gtimg.cn/images/gp/ingame/a20200724tslcar/intor_6.png)\n\n今天我们用数学期望来计算一下《和平精英》的特斯拉（玛莎拉蒂）到底要多少钱？怎么抽最划算？\n\n"},{"id":"websocket","file":"websocket.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/apps/chat2.png\" alt=\"chat\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e有时候就想和其他人安全地聊个天，它需要有这些特征：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e基于web技术，只需一个网页，无需下载任何App，易于转发。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e无需注册，使用简单，基于邀请码加入聊天，邀请码定时刷新。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e完全匿名。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e消息只保留在内存中，超时自动删除。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e进行在线人数统计，能设置最大人数上限。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e用户上下线和邀请码刷新时有系统提示。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eWeb连接必然是不稳定的，所以断线必须能够重连。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e线上Demo演示请直接访问: \u003ca href=\"https://wycode.cn/lab/chat\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://wycode.cn/lab/chat\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e技术方面：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebSocket\u003c/code\u003e协议提供Web上的全双工通信支持。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSTOMP\u003c/code\u003e作为上层协议，它基于帧(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFrame\u003c/code\u003e)，和Http请求很类似，提供了一种发布订阅的模式，很适合需求的群聊模式。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e后端采用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eKotlin\u003c/code\u003e + \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpringBoot\u003c/code\u003e，前端采用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTypescript\u003c/code\u003e + \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAngular\u003c/code\u003e + \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAntDesign\u003c/code\u003e，均使用最新版本。\u003c/li\u003e\n\u003c/ul\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/apps/chat2.png\" alt=\"chat\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e有时候就想和其他人安全地聊个天，它需要有这些特征：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e基于web技术，只需一个网页，无需下载任何App，易于转发。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e无需注册，使用简单，基于邀请码加入聊天，邀请码定时刷新。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e完全匿名。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e消息只保留在内存中，超时自动删除。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e进行在线人数统计，能设置最大人数上限。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e用户上下线和邀请码刷新时有系统提示。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eWeb连接必然是不稳定的，所以断线必须能够重连。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e线上Demo演示请直接访问: \u003ca href=\"https://wycode.cn/lab/chat\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://wycode.cn/lab/chat\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e技术方面：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebSocket\u003c/code\u003e协议提供Web上的全双工通信支持。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSTOMP\u003c/code\u003e作为上层协议，它基于帧(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFrame\u003c/code\u003e)，和Http请求很类似，提供了一种发布订阅的模式，很适合需求的群聊模式。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e后端采用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eKotlin\u003c/code\u003e + \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpringBoot\u003c/code\u003e，前端采用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTypescript\u003c/code\u003e + \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAngular\u003c/code\u003e + \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAntDesign\u003c/code\u003e，均使用最新版本。\u003c/li\u003e\n\u003c/ul\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e准备SpringBoot工程\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e在SpringBoot中使用WebSocket和STOMP很简单，添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003espring-boot-starter-websocket\u003c/code\u003e这个starter依赖就可以开始了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e工程基于Gradle初始化，核心的几个依赖如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eimplementation(\"org.springframework.boot:spring-boot-starter-websocket\")\nimplementation(\"org.jetbrains.kotlin:kotlin-reflect\")\nimplementation(\"org.jetbrains.kotlin:kotlin-stdlib-jdk8\")\nimplementation(\"com.fasterxml.jackson.module:jackson-module-kotlin:2.10.+\")\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e配置WebSocket和STOMP\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e添加这么一个类：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\n@EnableWebSocketMessageBroker\nclass WebSocketConfig(val chatService: ChatService, val taskScheduler: TaskScheduler) : WebSocketMessageBrokerConfigurer {\n\n\n    override fun configureMessageBroker(config: MessageBrokerRegistry) {\n        config.enableSimpleBroker(\"/topic/\", \"/queue/\") // 1.\n                .setTaskScheduler(taskScheduler) // 2.\n        config.setApplicationDestinationPrefixes(\"/app\") // 3.\n    }\n\n\n    override fun registerStompEndpoints(registry: StompEndpointRegistry) {\n        registry.addEndpoint(\"/stomp\") // 4.\n                .setAllowedOrigins(\"*\") // 5.\n    }\n\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里配置了很多端点(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eendpoint\u003c/code\u003e)，很多时候容易搞混：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e可以理解为是一些频道\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e用于定时心跳，设置了taskSchedule才能启用心跳（对于没有启用SockJS的项目），不开启心跳的话，不管是客户端还是服务器都很容易断开连接。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/app\u003c/code\u003e端点是应用的接收前缀，以app开头的路径会进入后端程序处理\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/stomp\u003c/code\u003e端点是用来握手的，所以前端connect时连接的是这个端点\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e启用任意远程访问，防止前端出现跨域问题，易于调试，对于生产环境，可以删除\u003c/li\u003e\n\u003c/ol\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e需要提到的是，官方文档上仍然启用了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSockJS\u003c/code\u003e，其实已经不需要了，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSockJS\u003c/code\u003e是对于不支持\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebSocket\u003c/code\u003e的Polyfill，对于现在的浏览器，其实已经不需要了，参考这个地址：\u003ca href=\"https://caniuse.com/#search=websockets\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://caniuse.com/#search=websockets\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e邀请码鉴权\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e主要思路：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e配置客户端入口Channel的interceptor。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003econfigureClientInboundChannel()\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e在握手阶段，取header。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eaccessor.getNativeHeader(\"code\")\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003ecode合法就赋予一个用户。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eaccessor.user = ChatUser()\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e出错时，设置一个sessionAttributes。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eaccessor.sessionAttributes!![\"error\"] = \"邀请码错误！\"\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这里我尝试了多种办法直接在握手阶段返回错误，但是都失败了，所以最终通过sessionAttributes来标记错误，在下一次通信时返回错误信息。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e此处除了鉴权还做了三件事\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e对于本身分配了id的用户握手时，应当视为重连，而不是新用户，这是断线重连实现的关键。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e新用户进入时要进行人数上限的判断，人满时也报错。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e因为只有进入聊天室的人才能看到邀请码，所以这里还判断了一个超级用户码，用户以超级用户码进入时，会把当前的邀请码以错误码的形式返回。这样管理员就能方便的知道当前的邀请码了。\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e主要接口\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003econtroller\u003c/code\u003e只需要两个接口\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e用来查询当前状态，用户刚进入时会调用，此时会如果有鉴权时的错误信息，会返回错误。如果正常会返回房间的基本信息，以及所有的聊天记录。同时发送系统信息。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@MessageMapping(\"/status\")\n@SendToUser(\"/queue/status\")\nfun status(accessor: SimpMessageHeaderAccessor): CommonMessage\u0026#x3C;*\u003e {\n    return if (accessor.user != null) {\n        chatService.sendSystemMessage(200, accessor.user!!.name)\n        CommonMessage.success(InitData(accessor.user!!.name.toInt(), chatService.users.size, chatService.messages, chatService.code,GEN_CODE_TIME_IN_MINUTES, REMOVE_MESSAGE_TIME_IN_MINUTES))\n    } else {\n        CommonMessage.fail(accessor.sessionAttributes!![\"error\"] as String)\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003col start=\"2\" class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e发送消息，添加到聊天记录即可。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@MessageMapping(\"/all\")\nfun all(message: String, user: Principal): CommonMessage\u0026#x3C;ChatMessage\u003e {\n    val msg = ChatMessage(user.name.toInt(), Date(), message, 0)\n    chatService.messages.add(msg)\n    return CommonMessage.success(msg)\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e定时服务及系统消息\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eChatService\u003c/code\u003e中要维护所有用户、历史消息记录、邀请码\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e所有用户是一个HashSet，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003evar users =  HashSet\u0026#x3C;ChatUser\u003e()\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eChatUser\u003c/code\u003e使用id作为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehashcode\u003c/code\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e更新邀请码的频率较高，所以会同时检查过期消息并移除\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003efun generateCode() {\n    this.code = randomString(16)\n    logger.info(\"${Date().toLocaleString()}: $code\")\n    this.sendSystemMessage(100, this.code)\n    removeOutdatedMessage()\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003col start=\"3\" class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e移除过期消息，消息列表是一个队列，如果队列头部的消息已过期，需要递归检查下一个\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003efun removeOutdatedMessage() {\n    logger.info(\"${Date().toLocaleString()}: removeOutdatedMessage\")\n    if (messages.size \u003e 0) {\n        val message = messages[0]\n        if (Date().time - message.time.time \u003e REMOVE_MESSAGE_TIME_IN_MINUTES * 60L * 1000) {\n            messages.removeAt(0)\n            removeOutdatedMessage()\n        }\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e至此，后端核心技术要点已介绍完毕，最后放上github仓库，完整代码：\u003ca href=\"https://github.com/wangyucode/chatroom-spring-websocket-stomp\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/chatroom-spring-websocket-stomp\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e线上完整项目演示请直接访问: \u003ca href=\"https://wycode.cn/lab/chat\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://wycode.cn/lab/chat\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e基于Angular的前端项目将在下篇博客介绍。\u003c/p\u003e\n","content":"\n![chat](/apps/chat2.png)\n\n有时候就想和其他人安全地聊个天，它需要有这些特征：\n\n- 基于web技术，只需一个网页，无需下载任何App，易于转发。\n- 无需注册，使用简单，基于邀请码加入聊天，邀请码定时刷新。\n- 完全匿名。\n- 消息只保留在内存中，超时自动删除。\n- 进行在线人数统计，能设置最大人数上限。\n- 用户上下线和邀请码刷新时有系统提示。\n- Web连接必然是不稳定的，所以断线必须能够重连。\n\n线上Demo演示请直接访问: \u003chttps://wycode.cn/lab/chat\u003e\n\n技术方面：\n\n- 使用`WebSocket`协议提供Web上的全双工通信支持。\n- 使用`STOMP`作为上层协议，它基于帧(`Frame`)，和Http请求很类似，提供了一种发布订阅的模式，很适合需求的群聊模式。\n- 后端采用`Kotlin` + `SpringBoot`，前端采用`Typescript` + `Angular` + `AntDesign`，均使用最新版本。\n\n\u003c!--more--\u003e\n\n## 准备SpringBoot工程\n\n在SpringBoot中使用WebSocket和STOMP很简单，添加`spring-boot-starter-websocket`这个starter依赖就可以开始了。\n\n工程基于Gradle初始化，核心的几个依赖如下：\n\n```java\nimplementation(\"org.springframework.boot:spring-boot-starter-websocket\")\nimplementation(\"org.jetbrains.kotlin:kotlin-reflect\")\nimplementation(\"org.jetbrains.kotlin:kotlin-stdlib-jdk8\")\nimplementation(\"com.fasterxml.jackson.module:jackson-module-kotlin:2.10.+\")\n```\n\n## 配置WebSocket和STOMP\n\n添加这么一个类：\n\n```kotlin\n@Configuration\n@EnableWebSocketMessageBroker\nclass WebSocketConfig(val chatService: ChatService, val taskScheduler: TaskScheduler) : WebSocketMessageBrokerConfigurer {\n\n\n    override fun configureMessageBroker(config: MessageBrokerRegistry) {\n        config.enableSimpleBroker(\"/topic/\", \"/queue/\") // 1.\n                .setTaskScheduler(taskScheduler) // 2.\n        config.setApplicationDestinationPrefixes(\"/app\") // 3.\n    }\n\n\n    override fun registerStompEndpoints(registry: StompEndpointRegistry) {\n        registry.addEndpoint(\"/stomp\") // 4.\n                .setAllowedOrigins(\"*\") // 5.\n    }\n\n}\n```\n这里配置了很多端点(`endpoint`)，很多时候容易搞混：\n\n1. 可以理解为是一些频道\n2. 用于定时心跳，设置了taskSchedule才能启用心跳（对于没有启用SockJS的项目），不开启心跳的话，不管是客户端还是服务器都很容易断开连接。\n3. 这里`/app`端点是应用的接收前缀，以app开头的路径会进入后端程序处理\n4. 这里`/stomp`端点是用来握手的，所以前端connect时连接的是这个端点\n5. 启用任意远程访问，防止前端出现跨域问题，易于调试，对于生产环境，可以删除\n\n\u003e 需要提到的是，官方文档上仍然启用了`SockJS`，其实已经不需要了，`SockJS`是对于不支持`WebSocket`的Polyfill，对于现在的浏览器，其实已经不需要了，参考这个地址：https://caniuse.com/#search=websockets\n\n## 邀请码鉴权\n\n主要思路：\n\n- 配置客户端入口Channel的interceptor。`configureClientInboundChannel()`\n- 在握手阶段，取header。`accessor.getNativeHeader(\"code\")`\n- code合法就赋予一个用户。`accessor.user = ChatUser()`\n- 出错时，设置一个sessionAttributes。`accessor.sessionAttributes!![\"error\"] = \"邀请码错误！\"`\n\n\u003e 这里我尝试了多种办法直接在握手阶段返回错误，但是都失败了，所以最终通过sessionAttributes来标记错误，在下一次通信时返回错误信息。\n\n此处除了鉴权还做了三件事\n\n1. 对于本身分配了id的用户握手时，应当视为重连，而不是新用户，这是断线重连实现的关键。\n2. 新用户进入时要进行人数上限的判断，人满时也报错。\n3. 因为只有进入聊天室的人才能看到邀请码，所以这里还判断了一个超级用户码，用户以超级用户码进入时，会把当前的邀请码以错误码的形式返回。这样管理员就能方便的知道当前的邀请码了。\n\n## 主要接口\n\n`controller`只需要两个接口\n\n1. 用来查询当前状态，用户刚进入时会调用，此时会如果有鉴权时的错误信息，会返回错误。如果正常会返回房间的基本信息，以及所有的聊天记录。同时发送系统信息。\n\n```kotlin\n@MessageMapping(\"/status\")\n@SendToUser(\"/queue/status\")\nfun status(accessor: SimpMessageHeaderAccessor): CommonMessage\u003c*\u003e {\n    return if (accessor.user != null) {\n        chatService.sendSystemMessage(200, accessor.user!!.name)\n        CommonMessage.success(InitData(accessor.user!!.name.toInt(), chatService.users.size, chatService.messages, chatService.code,GEN_CODE_TIME_IN_MINUTES, REMOVE_MESSAGE_TIME_IN_MINUTES))\n    } else {\n        CommonMessage.fail(accessor.sessionAttributes!![\"error\"] as String)\n    }\n}\n```\n\n2. 发送消息，添加到聊天记录即可。\n\n```kotlin\n@MessageMapping(\"/all\")\nfun all(message: String, user: Principal): CommonMessage\u003cChatMessage\u003e {\n    val msg = ChatMessage(user.name.toInt(), Date(), message, 0)\n    chatService.messages.add(msg)\n    return CommonMessage.success(msg)\n}\n```\n\n## 定时服务及系统消息\n\n`ChatService`中要维护所有用户、历史消息记录、邀请码\n\n1. 所有用户是一个HashSet，`var users =  HashSet\u003cChatUser\u003e()`，`ChatUser`使用id作为`hashcode`。\n2. 更新邀请码的频率较高，所以会同时检查过期消息并移除\n\n```kotlin\nfun generateCode() {\n    this.code = randomString(16)\n    logger.info(\"${Date().toLocaleString()}: $code\")\n    this.sendSystemMessage(100, this.code)\n    removeOutdatedMessage()\n}\n```\n3. 移除过期消息，消息列表是一个队列，如果队列头部的消息已过期，需要递归检查下一个\n\n```kotlin\nfun removeOutdatedMessage() {\n    logger.info(\"${Date().toLocaleString()}: removeOutdatedMessage\")\n    if (messages.size \u003e 0) {\n        val message = messages[0]\n        if (Date().time - message.time.time \u003e REMOVE_MESSAGE_TIME_IN_MINUTES * 60L * 1000) {\n            messages.removeAt(0)\n            removeOutdatedMessage()\n        }\n    }\n}\n```\n\n至此，后端核心技术要点已介绍完毕，最后放上github仓库，完整代码：\u003chttps://github.com/wangyucode/chatroom-spring-websocket-stomp\u003e\n\n线上完整项目演示请直接访问: \u003chttps://wycode.cn/lab/chat\u003e\n\n基于Angular的前端项目将在下篇博客介绍。\n\n","data":{"title":"使用WebSocket和STOMP协议开发一个匿名聊天室","date":"2020-03-09","tags":["WebSocket","Spring Boot","Kotlin"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![chat](/apps/chat2.png)\n\n有时候就想和其他人安全地聊个天，它需要有这些特征：\n\n- 基于web技术，只需一个网页，无需下载任何App，易于转发。\n- 无需注册，使用简单，基于邀请码加入聊天，邀请码定时刷新。\n- 完全匿名。\n- 消息只保留在内存中，超时自动删除。\n- 进行在线人数统计，能设置最大人数上限。\n- 用户上下线和邀请码刷新时有系统提示。\n- Web连接必然是不稳定的，所以断线必须能够重连。\n\n线上Demo演示请直接访问: \u003chttps://wycode.cn/lab/chat\u003e\n\n技术方面：\n\n- 使用`WebSocket`协议提供Web上的全双工通信支持。\n- 使用`STOMP`作为上层协议，它基于帧(`Frame`)，和Http请求很类似，提供了一种发布订阅的模式，很适合需求的群聊模式。\n- 后端采用`Kotlin` + `SpringBoot`，前端采用`Typescript` + `Angular` + `AntDesign`，均使用最新版本。\n\n"},{"id":"docker-spring","file":"docker-spring.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://d1q6f0aelx0por.cloudfront.net/product-logos/644d2f15-c5db-4731-a353-ace6235841fa-registry.png\" alt=\"docker\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eDocker容器化技术，使得部署变得平滑。再也不需要维护软件运行所需的复杂环境。Docker和现代化的微服务，敏捷开发，快速迭代和交付的要求非常匹配。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章实践从安装Docker开始，到将一个SpringBoot项目部署到Docker容器中。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://d1q6f0aelx0por.cloudfront.net/product-logos/644d2f15-c5db-4731-a353-ace6235841fa-registry.png\" alt=\"docker\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eDocker容器化技术，使得部署变得平滑。再也不需要维护软件运行所需的复杂环境。Docker和现代化的微服务，敏捷开发，快速迭代和交付的要求非常匹配。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章实践从安装Docker开始，到将一个SpringBoot项目部署到Docker容器中。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e安装Docker CE(Community edition)\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e我这里使用的环境是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUbuntu18.04\u003c/code\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ curl -fsSL https://get.docker.com -o get-docker.sh\n$ sudo sh get-docker.sh\n$ systemctl enable docker\n$ systemctl start docker\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e准备SpringBoot工程\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这里我使用Spring官方的Docker示例项目\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003egit clone https://github.com/spring-guides/gs-spring-boot-docker.git\u003c/code\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eDockerfile\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eSpringBoot的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDockerfile\u003c/code\u003e有两种\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e简单版的如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eFROM openjdk:8-jdk-alpine\nVOLUME /tmp\nARG JAR_FILE\nCOPY ${JAR_FILE} app.jar\nENTRYPOINT [\"java\",\"-jar\",\"/app.jar\"]\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这是典型的SpringBoot项目启动方式\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e复杂版的如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eFROM openjdk:8-jdk-alpine\nVOLUME /tmp\nARG DEPENDENCY=target/dependency\nCOPY ${DEPENDENCY}/BOOT-INF/lib /app/lib\nCOPY ${DEPENDENCY}/META-INF /app/META-INF\nCOPY ${DEPENDENCY}/BOOT-INF/classes /app\nENTRYPOINT [\"java\",\"-cp\",\"app:app/lib/*\",\"hello.Application\"]\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这是将lib和src分离的方式，有点像展开的jar\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我这里选择上面简单版的，简洁和性能之间我选简洁！\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e基于maven构建Docker镜像\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用Maven的话有Spotify构建的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edockerfile-maven-plugin\u003c/code\u003e插件\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-xml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;!-- tag::plugin[] --\u003e\n\u0026#x3C;plugin\u003e\n    \u0026#x3C;groupId\u003ecom.spotify\u0026#x3C;/groupId\u003e\n    \u0026#x3C;artifactId\u003edockerfile-maven-plugin\u0026#x3C;/artifactId\u003e\n    \u0026#x3C;version\u003e1.4.9\u0026#x3C;/version\u003e\n    \u0026#x3C;executions\u003e\n        \u0026#x3C;execution\u003e\n            \u0026#x3C;id\u003edefault\u0026#x3C;/id\u003e\n            \u0026#x3C;phase\u003einstall\u0026#x3C;/phase\u003e\n            \u0026#x3C;goals\u003e\n                \u0026#x3C;goal\u003ebuild\u0026#x3C;/goal\u003e\n                \u0026#x3C;goal\u003epush\u0026#x3C;/goal\u003e\n            \u0026#x3C;/goals\u003e\n        \u0026#x3C;/execution\u003e\n    \u0026#x3C;/executions\u003e\n    \u0026#x3C;configuration\u003e\n        \u0026#x3C;repository\u003e${docker.image.prefix}/${project.artifactId}\u0026#x3C;/repository\u003e\n        \u0026#x3C;buildArgs\u003e\n            \u0026#x3C;JAR_FILE\u003e${project.build.finalName}.jar\u0026#x3C;/JAR_FILE\u003e\n        \u0026#x3C;/buildArgs\u003e\n    \u0026#x3C;/configuration\u003e\n\u0026#x3C;/plugin\u003e\n\u0026#x3C;!-- end::plugin[] --\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e添加了两个maven任务，build用户构建docker镜像，push用于推送docker镜像。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加了构建参数\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ebuildArgs\u003c/code\u003e\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJAR_FILE\u003c/code\u003e传递给Dockerfile。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加了版本号作为镜像tag\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e打包Docker镜像本身是需要docker环境的，于是有一种方法是开启remote API\n到这里其实就已经可以发布程序到DockerHub了，但实际项目中，我们不想发布私人镜像到DockerHub，那么我们需要建立私人的Docker仓库。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e开启remote API远程构建镜像\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eDocker是CS模式，Docker的服务是支持通过Http远程访问的。通过开启remote API即可远程进行访问。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eExecStart=/usr/bin/dockerd -H fd:// -H tcp://0.0.0.0:2376\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e但要注意的remote API是需要进行TSL加密的。否则存在未授权访问漏洞，会被黑客利用，植入挖矿程序（别问我怎么知道的）。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e建立Docker私人仓库（Docker Registry）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e具体方式是添加一个仓库镜像\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ docker run -d -p 5000:5000 --restart always --name registry registry:2\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e然后就可以：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ docker pull ubuntu\n$ docker tag ubuntu localhost:5000/ubuntu\n$ docker push localhost:5000/ubuntu\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e为了安全，创建的私有仓库也要添加Https\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e总结\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用docker部署SpringBoot工程时，正规的流程应该是：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e为工程编写Dockerfile\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加Docker插件，构建Docker镜像\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003epush到公共或私有Docker仓库\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e拉取最新镜像并运行\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e本地无法构建时，应使用某种持续集成方法让编译机去负责出包和推送，不应该使用remote API这不是常规做法，而且有安全风险。\n此外Docker官方提供了安全的私有Docker仓库，少量使用是免费的。\u003c/p\u003e\n","content":"\n![docker](https://d1q6f0aelx0por.cloudfront.net/product-logos/644d2f15-c5db-4731-a353-ace6235841fa-registry.png)\n\nDocker容器化技术，使得部署变得平滑。再也不需要维护软件运行所需的复杂环境。Docker和现代化的微服务，敏捷开发，快速迭代和交付的要求非常匹配。\n\n这篇文章实践从安装Docker开始，到将一个SpringBoot项目部署到Docker容器中。\n\n\u003c!--more--\u003e\n\n## 安装Docker CE(Community edition)\n\n我这里使用的环境是`Ubuntu18.04`\n\n```bash\n$ curl -fsSL https://get.docker.com -o get-docker.sh\n$ sudo sh get-docker.sh\n$ systemctl enable docker\n$ systemctl start docker\n```\n\n## 准备SpringBoot工程\n\n这里我使用Spring官方的Docker示例项目\n\n`git clone https://github.com/spring-guides/gs-spring-boot-docker.git`\n\n## Dockerfile\n\nSpringBoot的`Dockerfile`有两种\n\n简单版的如下：\n```\nFROM openjdk:8-jdk-alpine\nVOLUME /tmp\nARG JAR_FILE\nCOPY ${JAR_FILE} app.jar\nENTRYPOINT [\"java\",\"-jar\",\"/app.jar\"]\n```\n这是典型的SpringBoot项目启动方式\n\n复杂版的如下：\n```\nFROM openjdk:8-jdk-alpine\nVOLUME /tmp\nARG DEPENDENCY=target/dependency\nCOPY ${DEPENDENCY}/BOOT-INF/lib /app/lib\nCOPY ${DEPENDENCY}/META-INF /app/META-INF\nCOPY ${DEPENDENCY}/BOOT-INF/classes /app\nENTRYPOINT [\"java\",\"-cp\",\"app:app/lib/*\",\"hello.Application\"]\n```\n这是将lib和src分离的方式，有点像展开的jar\n\n我这里选择上面简单版的，简洁和性能之间我选简洁！\n\n## 基于maven构建Docker镜像\n\n使用Maven的话有Spotify构建的`dockerfile-maven-plugin`插件\n```xml\n\u003c!-- tag::plugin[] --\u003e\n\u003cplugin\u003e\n    \u003cgroupId\u003ecom.spotify\u003c/groupId\u003e\n    \u003cartifactId\u003edockerfile-maven-plugin\u003c/artifactId\u003e\n    \u003cversion\u003e1.4.9\u003c/version\u003e\n    \u003cexecutions\u003e\n        \u003cexecution\u003e\n            \u003cid\u003edefault\u003c/id\u003e\n            \u003cphase\u003einstall\u003c/phase\u003e\n            \u003cgoals\u003e\n                \u003cgoal\u003ebuild\u003c/goal\u003e\n                \u003cgoal\u003epush\u003c/goal\u003e\n            \u003c/goals\u003e\n        \u003c/execution\u003e\n    \u003c/executions\u003e\n    \u003cconfiguration\u003e\n        \u003crepository\u003e${docker.image.prefix}/${project.artifactId}\u003c/repository\u003e\n        \u003cbuildArgs\u003e\n            \u003cJAR_FILE\u003e${project.build.finalName}.jar\u003c/JAR_FILE\u003e\n        \u003c/buildArgs\u003e\n    \u003c/configuration\u003e\n\u003c/plugin\u003e\n\u003c!-- end::plugin[] --\u003e\n```\n\n- 添加了两个maven任务，build用户构建docker镜像，push用于推送docker镜像。\n- 添加了构建参数`buildArgs`\u003e`JAR_FILE`传递给Dockerfile。\n- 添加了版本号作为镜像tag\n\n\u003e 打包Docker镜像本身是需要docker环境的，于是有一种方法是开启remote API\n\u003e 到这里其实就已经可以发布程序到DockerHub了，但实际项目中，我们不想发布私人镜像到DockerHub，那么我们需要建立私人的Docker仓库。\n\n## 开启remote API远程构建镜像\n\nDocker是CS模式，Docker的服务是支持通过Http远程访问的。通过开启remote API即可远程进行访问。\n```\nExecStart=/usr/bin/dockerd -H fd:// -H tcp://0.0.0.0:2376\n```\n但要注意的remote API是需要进行TSL加密的。否则存在未授权访问漏洞，会被黑客利用，植入挖矿程序（别问我怎么知道的）。\n\n## 建立Docker私人仓库（Docker Registry）\n\n具体方式是添加一个仓库镜像\n\n```bash\n$ docker run -d -p 5000:5000 --restart always --name registry registry:2\n```\n\n然后就可以：\n\n```bash\n$ docker pull ubuntu\n$ docker tag ubuntu localhost:5000/ubuntu\n$ docker push localhost:5000/ubuntu\n```\n\n\u003e 为了安全，创建的私有仓库也要添加Https\n\n## 总结\n\n使用docker部署SpringBoot工程时，正规的流程应该是：\n1. 为工程编写Dockerfile\n2. 添加Docker插件，构建Docker镜像\n3. push到公共或私有Docker仓库\n4. 拉取最新镜像并运行\n\n本地无法构建时，应使用某种持续集成方法让编译机去负责出包和推送，不应该使用remote API这不是常规做法，而且有安全风险。\n此外Docker官方提供了安全的私有Docker仓库，少量使用是免费的。","data":{"title":"使用Docker容器部署SpringBoot项目","date":"2019-11-20","tags":["Linux","Docker","Spring Boot"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![docker](https://d1q6f0aelx0por.cloudfront.net/product-logos/644d2f15-c5db-4731-a353-ace6235841fa-registry.png)\n\nDocker容器化技术，使得部署变得平滑。再也不需要维护软件运行所需的复杂环境。Docker和现代化的微服务，敏捷开发，快速迭代和交付的要求非常匹配。\n\n这篇文章实践从安装Docker开始，到将一个SpringBoot项目部署到Docker容器中。\n\n"},{"id":"virtualbox-network","file":"virtualbox-network.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.virtualbox.org/graphics/vbox_logo2_gradient.png\" alt=\"virtual-box\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eVirtualBox是著名的开源虚拟机软件，最初由Sun公司出品。后来Sun公司被Oracle收购。Sun公司的包括Java和VirtualBox，现在都是Oracle公司的软件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e配置虚拟机时，对于如何选择网络类型一直是一头雾水，这篇文章将VirtualBox的7种网络模式全部都总结一下。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e不同模式的原理，也适用于VMWare。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.virtualbox.org/graphics/vbox_logo2_gradient.png\" alt=\"virtual-box\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eVirtualBox是著名的开源虚拟机软件，最初由Sun公司出品。后来Sun公司被Oracle收购。Sun公司的包括Java和VirtualBox，现在都是Oracle公司的软件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e配置虚拟机时，对于如何选择网络类型一直是一头雾水，这篇文章将VirtualBox的7种网络模式全部都总结一下。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e不同模式的原理，也适用于VMWare。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eNot attached\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这个模式会向虚拟机报告有网卡，但没有物理连接。\n就像拔网线一个效果。\n对于通知虚拟机重新配置网络很有用。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eNetwork Address Translation (NAT)\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e如果你只是想在虚拟机内访问互联网，这个模式就足够了。\n这种模式有很多限制，比如无法ping通。不支持UDP广播。除了TCP和UDP之外的协议不支持。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eNAT Network\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e和NAT差不多，NAT网络就像虚拟机在一个路由器后面一样。外部访问需要设置端口转发。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eBridged Networking\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e即桥接，虚拟机将直接链接某个宿主机物理网卡，而不用通过宿主机操作系统的网络。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eInternal networking\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这种网络仅在虚拟机内部可见，宿主机及外部不可见。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHost-only networking\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这种可以创建一个虚拟的网络组，包含宿主机和虚拟机，宿主机上会有一个虚拟的网卡，提供和虚拟机之间的连接。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eGeneric networking\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这种相当于自定义，可以自由选择网卡驱动，一般情况下用不着这个。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e各种模式可访问性：\u003c/h2\u003e\n\u003ctable class=\"mb-4\"\u003e\n\u003cthead class=\"bg-sky-200 dark:bg-sky-900\"\u003e\n\u003ctr\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e模式\u003c/th\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e虚拟机→宿主机\u003c/th\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e宿主机→虚拟机\u003c/th\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e虚拟机A→虚拟机B\u003c/th\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e虚拟机→互联网\u003c/th\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e互联网→虚拟机\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eHost-only\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eInternal\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eBridged\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eNAT\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e端口转发\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e端口转发\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eNATservice\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e端口转发\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e端口转发\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e总结\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e绝大多数情况下，我们需要虚拟机可以上网，这时设置一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNAT\u003c/code\u003e的模式。\n然后我们还需要主机可以访问虚拟机的服务，这时我们可以为虚拟机再加一个网卡设置为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHost-only\u003c/code\u003e模式。\u003c/p\u003e\n","content":"\n![virtual-box](https://www.virtualbox.org/graphics/vbox_logo2_gradient.png)\n\nVirtualBox是著名的开源虚拟机软件，最初由Sun公司出品。后来Sun公司被Oracle收购。Sun公司的包括Java和VirtualBox，现在都是Oracle公司的软件。\n\n配置虚拟机时，对于如何选择网络类型一直是一头雾水，这篇文章将VirtualBox的7种网络模式全部都总结一下。\n\n不同模式的原理，也适用于VMWare。\n\n\u003c!--more--\u003e\n\n## Not attached\n\n这个模式会向虚拟机报告有网卡，但没有物理连接。\n就像拔网线一个效果。\n对于通知虚拟机重新配置网络很有用。\n\n## Network Address Translation (NAT)\n\n如果你只是想在虚拟机内访问互联网，这个模式就足够了。\n这种模式有很多限制，比如无法ping通。不支持UDP广播。除了TCP和UDP之外的协议不支持。\n\n## NAT Network\n\n和NAT差不多，NAT网络就像虚拟机在一个路由器后面一样。外部访问需要设置端口转发。\n\n## Bridged Networking\n\n即桥接，虚拟机将直接链接某个宿主机物理网卡，而不用通过宿主机操作系统的网络。\n\n## Internal networking\n\n这种网络仅在虚拟机内部可见，宿主机及外部不可见。\n\n## Host-only networking\n\n这种可以创建一个虚拟的网络组，包含宿主机和虚拟机，宿主机上会有一个虚拟的网卡，提供和虚拟机之间的连接。\n\n## Generic networking\n\n这种相当于自定义，可以自由选择网卡驱动，一般情况下用不着这个。\n\n## 各种模式可访问性：\n\n| 模式 | 虚拟机→宿主机 | 宿主机→虚拟机 | 虚拟机A→虚拟机B | 虚拟机→互联网 | 互联网→虚拟机 |\n| ------ | ------------ | ------------ | -------------- | ------------ | ------------ |\n| Host-only | √ | √ | √ | X | X |\n| Internal | X | X | √ | X | X |\n| Bridged | √ | √ | √ | √ | √ |\n| NAT | √ | 端口转发 | X | √ | 端口转发 |\n| NATservice | √ | 端口转发 | √ | √ | 端口转发 |\n\n## 总结\n\n绝大多数情况下，我们需要虚拟机可以上网，这时设置一个`NAT`的模式。\n然后我们还需要主机可以访问虚拟机的服务，这时我们可以为虚拟机再加一个网卡设置为`Host-only`模式。","data":{"title":"VirtualBox的虚拟机网络配置","date":"2019-09-20","tags":["VirtualBox"],"category":"Linux"},"isEmpty":false,"excerpt":"\n![virtual-box](https://www.virtualbox.org/graphics/vbox_logo2_gradient.png)\n\nVirtualBox是著名的开源虚拟机软件，最初由Sun公司出品。后来Sun公司被Oracle收购。Sun公司的包括Java和VirtualBox，现在都是Oracle公司的软件。\n\n配置虚拟机时，对于如何选择网络类型一直是一头雾水，这篇文章将VirtualBox的7种网络模式全部都总结一下。\n\n不同模式的原理，也适用于VMWare。\n\n"}],"page":3,"total":16},"__N_SSG":true},"page":"/blog/page/[page]","query":{"page":"3"},"buildId":"uFO1FMOoBQ2X-GM8G4ZfF","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
