-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"web-framework","file":"web-framework.md","excerptHtml":"\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eSpring Boot能够创建独立的Spring应用程序，在云计算，分布式流行的今天，它提供了一种非常契合目前web开发需求的解决方案，是Java开发web应用的不二选择。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eSpring Security是一款功能强大，可定制的身份验证和访问控制框架。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eH2数据库是一个轻量级的数据库引擎，开源，快速，它可以嵌入到Java程序中，作为内存数据库，也可以持久化，并提供了一个web程序，可以可视化操作数据。使用H2的还有一个重要原因是我的服务器只有512M内存，我无法使用MySQL这样的重量级数据库。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eThymeleaf是一个后台模版引擎，它是JSP的完美替代品，在快速渲染网页的基础上，它不会改变HTML代码结构，从而前端工程师仍然可以用假数据预览。Demo页面可以给后台人员直接使用。（当然并没有前端工程师，不过后期我会使用Vue做一个前后端分离的系统）\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n","contentHtml":"\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eSpring Boot能够创建独立的Spring应用程序，在云计算，分布式流行的今天，它提供了一种非常契合目前web开发需求的解决方案，是Java开发web应用的不二选择。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eSpring Security是一款功能强大，可定制的身份验证和访问控制框架。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eH2数据库是一个轻量级的数据库引擎，开源，快速，它可以嵌入到Java程序中，作为内存数据库，也可以持久化，并提供了一个web程序，可以可视化操作数据。使用H2的还有一个重要原因是我的服务器只有512M内存，我无法使用MySQL这样的重量级数据库。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eThymeleaf是一个后台模版引擎，它是JSP的完美替代品，在快速渲染网页的基础上，它不会改变HTML代码结构，从而前端工程师仍然可以用假数据预览。Demo页面可以给后台人员直接使用。（当然并没有前端工程师，不过后期我会使用Vue做一个前后端分离的系统）\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e先偷个懒吧，直接上github仓库。。。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ca href=\"https://github.com/wangyucode/WebFramework\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/WebFramework\u003c/a\u003e\u003c/p\u003e\n","content":"\n- Spring Boot能够创建独立的Spring应用程序，在云计算，分布式流行的今天，它提供了一种非常契合目前web开发需求的解决方案，是Java开发web应用的不二选择。\n\n- Spring Security是一款功能强大，可定制的身份验证和访问控制框架。\n\n- H2数据库是一个轻量级的数据库引擎，开源，快速，它可以嵌入到Java程序中，作为内存数据库，也可以持久化，并提供了一个web程序，可以可视化操作数据。使用H2的还有一个重要原因是我的服务器只有512M内存，我无法使用MySQL这样的重量级数据库。\n\n- Thymeleaf是一个后台模版引擎，它是JSP的完美替代品，在快速渲染网页的基础上，它不会改变HTML代码结构，从而前端工程师仍然可以用假数据预览。Demo页面可以给后台人员直接使用。（当然并没有前端工程师，不过后期我会使用Vue做一个前后端分离的系统）\n\n\u003c!--more--\u003e\n\n\n先偷个懒吧，直接上github仓库。。。\n\n[https://github.com/wangyucode/WebFramework](https://github.com/wangyucode/WebFramework)\n","data":{"title":"Spring Boot + Spring Security + H2 + Thymeleaf做一个后台管理系统","date":"2017-10-26","tags":["Spring","Java","Thymeleaf"],"category":"Backend"},"isEmpty":false,"excerpt":"\n- Spring Boot能够创建独立的Spring应用程序，在云计算，分布式流行的今天，它提供了一种非常契合目前web开发需求的解决方案，是Java开发web应用的不二选择。\n\n- Spring Security是一款功能强大，可定制的身份验证和访问控制框架。\n\n- H2数据库是一个轻量级的数据库引擎，开源，快速，它可以嵌入到Java程序中，作为内存数据库，也可以持久化，并提供了一个web程序，可以可视化操作数据。使用H2的还有一个重要原因是我的服务器只有512M内存，我无法使用MySQL这样的重量级数据库。\n\n- Thymeleaf是一个后台模版引擎，它是JSP的完美替代品，在快速渲染网页的基础上，它不会改变HTML代码结构，从而前端工程师仍然可以用假数据预览。Demo页面可以给后台人员直接使用。（当然并没有前端工程师，不过后期我会使用Vue做一个前后端分离的系统）\n\n"},{"id":"swagger","file":"swagger.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e创建SwaggerUI渲染需要的JSON\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e首先为项目添加生成JSON的库：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edependencies {\n    compile \"io.springfox:springfox-swagger2:2.7.0\"\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSwaggerConfig\u003c/code\u003e类\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\n@EnableSwagger2\npublic class SwaggerConfig {\n\n    @Bean\n    public Docket generateDocket(){\n        return new Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .paths(paths()) // and by paths\n                .build()\n                .apiInfo(apiInfo());\n    }\n\n\n    //Here is an example where we select any api that matches one of these paths\n    private Predicate\u0026#x3C;String\u003e paths() {\n        return input -\u003e input.matches(\".api.*\");\n    }\n\n\n    private ApiInfo apiInfo() {\n        return new ApiInfo(\"王郁的API文档\",\n                \"提供App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                new Contact(\"王郁\",\"wycode.cn\",\"wangyu0503@gmail.com\"),\n                \"wycode.cn All Right Reserved\",\n                \"http://wycode.cn\",\n                new ArrayList\u0026#x3C;\u003e());\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e访问\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttp://localhost:8080/v2/api-docs\u003c/code\u003e可以看到JSON即说明配置成功：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-JSON px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n    \"swagger\": \"2.0\",\n    \"info\": {\n        \"description\": \"提供App测试及独立APP研发\",\n        \"version\": \"2.0\",\n        \"title\": \"王郁的API文档\",\n        \"termsOfService\": \"http://wycode.cn\",\n        \"contact\": {},\n        \"license\": {}\n    },\n    \"host\": \"localhost:8080\",\n    \"basePath\": \"/\",\n    \"tags\": [],\n    \"paths\": {\n        \"/api/hello\": {\n            \"get\": {},\n            \"head\": {},\n            \"post\": {},\n            \"put\": {},\n            \"delete\": {},\n            \"options\": {},\n            \"patch\": {}\n        }\n    },\n    \"definitions\": {}\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e添加SwaggerUI包\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e从\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSwaggerUI\u003c/code\u003e的github上下载最新版，将里面的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edist\u003c/code\u003e文件夹，放入我们工程的静态页面目录\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e因为我们要修改\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e，所以不能使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewebjars\u003c/code\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e对\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e的常量\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eui\u003c/code\u003e做如下更改\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-JavaScript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e// Build a system\n  const ui = SwaggerUIBundle({\n    url: \"/v2/api-docs\", //API的JSON地址\n    dom_id: '#swagger-ui',\n    deepLinking: true,\n    presets: [\n      SwaggerUIBundle.presets.apis,\n      SwaggerUIStandalonePreset\n    ],\n    plugins: [\n      SwaggerUIBundle.plugins.DownloadUrl\n    ],\n    layout: \"StandaloneLayout\"\n  })\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e大功告成！\u003c/h2\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e添加文档注释\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实体注解\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@ApiModel(value = \"Hello 消息\",description = \"Hello接口返回的消息实体\")\npublic class Hello {\n\n    @ApiModelProperty(\"消息\")\n    private String message;\n\n    ...\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e接口注解\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Api(value = \"Hello\", description = \"第一个api\",tags = \"Hello\")\n@RestController\npublic class HelloController {\n\n    @ApiOperation(value = \"Say Hello\", produces = \"application/json \")\n    @RequestMapping(\"/api/hello\")\n    public Hello hello(@ApiParam(value = \"消息\",defaultValue = \"Hello World!\") @RequestParam(name = \"message\",defaultValue = \"Hello World!\")String message){\n        return  new Hello(\"message is : \"+ message);\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e 本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\n\n\u003c!--more--\u003e\n## 创建SwaggerUI渲染需要的JSON\n- 首先为项目添加生成JSON的库：\n\n```\ndependencies {\n    compile \"io.springfox:springfox-swagger2:2.7.0\"\n}\n```\n- 添加`SwaggerConfig`类\n\n```java\n@Configuration\n@EnableSwagger2\npublic class SwaggerConfig {\n\n    @Bean\n    public Docket generateDocket(){\n        return new Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .paths(paths()) // and by paths\n                .build()\n                .apiInfo(apiInfo());\n    }\n\n\n    //Here is an example where we select any api that matches one of these paths\n    private Predicate\u003cString\u003e paths() {\n        return input -\u003e input.matches(\".api.*\");\n    }\n\n\n    private ApiInfo apiInfo() {\n        return new ApiInfo(\"王郁的API文档\",\n                \"提供App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                new Contact(\"王郁\",\"wycode.cn\",\"wangyu0503@gmail.com\"),\n                \"wycode.cn All Right Reserved\",\n                \"http://wycode.cn\",\n                new ArrayList\u003c\u003e());\n    }\n}\n```\n\n- 访问`http://localhost:8080/v2/api-docs`可以看到JSON即说明配置成功：\n\n```JSON\n{\n    \"swagger\": \"2.0\",\n    \"info\": {\n        \"description\": \"提供App测试及独立APP研发\",\n        \"version\": \"2.0\",\n        \"title\": \"王郁的API文档\",\n        \"termsOfService\": \"http://wycode.cn\",\n        \"contact\": {},\n        \"license\": {}\n    },\n    \"host\": \"localhost:8080\",\n    \"basePath\": \"/\",\n    \"tags\": [],\n    \"paths\": {\n        \"/api/hello\": {\n            \"get\": {},\n            \"head\": {},\n            \"post\": {},\n            \"put\": {},\n            \"delete\": {},\n            \"options\": {},\n            \"patch\": {}\n        }\n    },\n    \"definitions\": {}\n}\n```\n\n- 添加SwaggerUI包\n\n从`SwaggerUI`的github上下载最新版，将里面的`dist`文件夹，放入我们工程的静态页面目录\n\n\u003e 因为我们要修改`index.html`，所以不能使用`webjars`\n\n对`index.html`的常量`ui`做如下更改\n\n```JavaScript\n// Build a system\n  const ui = SwaggerUIBundle({\n    url: \"/v2/api-docs\", //API的JSON地址\n    dom_id: '#swagger-ui',\n    deepLinking: true,\n    presets: [\n      SwaggerUIBundle.presets.apis,\n      SwaggerUIStandalonePreset\n    ],\n    plugins: [\n      SwaggerUIBundle.plugins.DownloadUrl\n    ],\n    layout: \"StandaloneLayout\"\n  })\n```\n\n\n## 大功告成！\n\n## 添加文档注释\n\n- 实体注解\n\n```Java\n@ApiModel(value = \"Hello 消息\",description = \"Hello接口返回的消息实体\")\npublic class Hello {\n\n    @ApiModelProperty(\"消息\")\n    private String message;\n\n    ...\n}\n```\n\n- 接口注解\n\n```java\n@Api(value = \"Hello\", description = \"第一个api\",tags = \"Hello\")\n@RestController\npublic class HelloController {\n\n    @ApiOperation(value = \"Say Hello\", produces = \"application/json \")\n    @RequestMapping(\"/api/hello\")\n    public Hello hello(@ApiParam(value = \"消息\",defaultValue = \"Hello World!\") @RequestParam(name = \"message\",defaultValue = \"Hello World!\")String message){\n        return  new Hello(\"message is : \"+ message);\n    }\n}\n```\n","data":{"title":"使用swagger为Spring REST API生成在线文档","date":"2017-10-23","tags":["Spring","Java","Swagger","JavaScript"],"category":"Backend"},"isEmpty":false,"excerpt":"\n\u003e 本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\n\n"},{"id":"android-dp","file":"android-dp.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e有关dpi、dp、px、sp、设计规范等等。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e有关dpi、dp、px、sp、设计规范等等。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003ePixel density (dpi)\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e像素密度，表示每英寸的长度上有多少像素\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edpi = sqrt(像素宽度^2+像素高度^2)/屏幕尺寸\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以下是常见手机的dpi\u003c/p\u003e\n\u003ctable class=\"mb-4\"\u003e\n\u003cthead class=\"bg-sky-200 dark:bg-sky-900\"\u003e\n\u003ctr\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e屏幕尺寸\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e720*1280\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1080*1920\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1440*2560\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e5寸\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e293.7\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u00 \n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003eScreen resolution\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003edpi\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003ePixel ratio\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003eImage size (pixels)\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003exxxhdpi\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e640\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e4.0\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e400 x 400\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003exxhdpi\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e480\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e3.0\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e300 x 300\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003exhdpi\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e320\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e2.0\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e200 x 200\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003ehdpi\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e240\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1.5\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e150 x 150\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003emdpi\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e160\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1.0\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e100 x 100\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eScaleable pixels (sp)\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003esp和dp差不多只是用于字体\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e14sp为标准大小\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170904_sp.png\" alt=\"sp\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ctable class=\"mb-4\"\u003e\n\u003cthead class=\"bg-sky-200 dark:bg-sky-900\"\u003e\n\u003ctr\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003exx_small\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003ex_small\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003esmall\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003emedium\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003elarge\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003ex_large\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003exx_large\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003exxx_large\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e8sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e10sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e12sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e14sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e16sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e18sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e20sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e22sp\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e基准网络\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e所有组件都与间隔为 8dp 的基准网格对齐。排版/文字（Type）与间隔为 4dp 的基准网格对齐。在工具条中的图标同样与间隔为 4dp 的基准网格对齐。这些规则适用于移动设备、平板设备以及桌面应用程序。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170905_layout-metrics-baselinegrids.png\" alt=\"baselinegrids\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","content":"\n\u003e 有关dpi、dp、px、sp、设计规范等等。\n\n\u003c!--more--\u003e\n## Pixel density (dpi)\n\n像素密度，表示每英寸的长度上有多少像素\n\n`dpi = sqrt(像素宽度^2+像素高度^2)/屏幕尺寸`\n\n以下是常见手机的dpi\n\n|  屏幕尺寸 | 720*1280  | 1080*1920  |  1440*2560 |\n| :------------: | :------------: | :------------: | :------------: |\n| 5寸  | 293.7  |  440.6 |  587.4|\n| 5.5寸  | 267.0  | 400.5  |  534.0 |\n| 6寸 | 244.8  |  367.2 |  489.5 |\n\n## Density-independent pixels (dp)\n\n引入dpi的概念就是为了使用像素无关的单位`dp`，从而使不同分辨率和尺寸的手机上达到一样的观感\n\n`dp = 像素*160/dpi`\n\n160dpi的手机上，1px=1dp\n\n### 图片缩放\n\n|Screen resolution |dpi|Pixel ratio|Image size (pixels)|\n| :------------: | :------------: |:------------: | :------------:|\n|xxxhdpi|640|4.0|400 x 400|\n|xxhdpi|480|3.0|300 x 300|\n|xhdpi|320|2.0|200 x 200|\n|hdpi|240|1.5|150 x 150|\n|mdpi|160|1.0|100 x 100|\n\n## Scaleable pixels (sp)\n\nsp和dp差不多只是用于字体\n\n14sp为标准大小\n\n![sp](/images/20170904_sp.png)\n\n|xx_small |x_small|small|medium|large|x_large|xx_large|xxx_large|\n| :------------: | :------------:| :------------:| :------------:|:------------:|:------------:|:------------:|:------------:|\n|8sp|10sp|12sp|14sp|16sp|18sp|20sp|22sp|\n\n## 基准网络\n\n所有组件都与间隔为 8dp 的基准网格对齐。排版/文字（Type）与间隔为 4dp 的基准网格对齐。在工具条中的图标同样与间隔为 4dp 的基准网格对齐。这些规则适用于移动设备、平板设备以及桌面应用程序。\n\n![baselinegrids](/images/20170905_layout-metrics-baselinegrids.png)\n","data":{"title":"Android度量设计规范","date":"2017-09-04","tags":["Android","Material Design"],"category":"Android"},"isEmpty":false,"excerpt":"\n\u003e 有关dpi、dp、px、sp、设计规范等等。\n\n"},{"id":"gradle-build","file":"gradle-build.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e构建变体是 Gradle 按照特定规则集合进行打包，以生成适应不同需求的Apk包。\n例如，需要生成dev版，测试版、以及release版，它们的服务器地址，版本号，图标各不相同，以及多渠道打包等等。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e构建变体是 Gradle 按照特定规则集合进行打包，以生成适应不同需求的Apk包。\n例如，需要生成dev版，测试版、以及release版，它们的服务器地址，版本号，图标各不相同，以及多渠道打包等等。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eproductFlavors\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e可以定义多个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eproductFlavors\u003c/code\u003e版本，其继承覆盖所有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edefaultConfig\u003c/code\u003e中的字段\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e主要的使用手段有一下几种\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e覆盖\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edefaultConfig\u003c/code\u003e默认字段(包名、版本名等)\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e往\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAndroidManifast.xml\u003c/code\u003e文件注入编译变量\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e修改包名，支持前后缀\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ebuildConfigField\u003c/code\u003e动态改变编译时常量\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eresValue\u003c/code\u003e动态注入字符串资源\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e示例\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eandroid {\n    ...\n    defaultConfig {\n        versionCode 200\n        versionName 'V2.0.0'\n        manifestPlaceholders = [\n                scheme: \"FindAR\"\n                id    : \"1565483848\"\n        ]\n        buildConfigField \"String\", \"ROOT_FOLDER_NAME\", '\"FindAR\"'\n    }\n\n    productFlavors{\n       dev{\n           versionName 'V2.0.0 Dev'\n           resValue \"string\", \"user_id\", \"001\" //user id\n       }\n\n       production{\n           versionName 'V2.0.0 Release'\n           resValue \"string\", \"user_id\", \"002\" //user id\n       }\n   }\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e 构建变体是 Gradle 按照特定规则集合进行打包，以生成适应不同需求的Apk包。\n例如，需要生成dev版，测试版、以及release版，它们的服务器地址，版本号，图标各不相同，以及多渠道打包等等。\n\n\u003c!--more--\u003e\n## productFlavors\n\n可以定义多个`productFlavors`版本，其继承覆盖所有`defaultConfig`中的字段\n\n主要的使用手段有一下几种\n\n- 覆盖`defaultConfig`默认字段(包名、版本名等)\n- 往`AndroidManifast.xml`文件注入编译变量\n- 修改包名，支持前后缀\n- 使用`buildConfigField`动态改变编译时常量\n- 使用`resValue`动态注入字符串资源\n\n\n## 示例\n```\nandroid {\n    ...\n    defaultConfig {\n        versionCode 200\n        versionName 'V2.0.0'\n        manifestPlaceholders = [\n                scheme: \"FindAR\"\n                id    : \"1565483848\"\n        ]\n        buildConfigField \"String\", \"ROOT_FOLDER_NAME\", '\"FindAR\"'\n    }\n\n    productFlavors{\n       dev{\n           versionName 'V2.0.0 Dev'\n           resValue \"string\", \"user_id\", \"001\" //user id\n       }\n\n       production{\n           versionName 'V2.0.0 Release'\n           resValue \"string\", \"user_id\", \"002\" //user id\n       }\n   }\n}\n```\n","data":{"title":"Gradle构建变种版本（多渠道打包）","date":"2017-09-04","tags":["Gradle","Android"],"category":"Android"},"isEmpty":false,"excerpt":"\n\u003e 构建变体是 Gradle 按照特定规则集合进行打包，以生成适应不同需求的Apk包。\n例如，需要生成dev版，测试版、以及release版，它们的服务器地址，版本号，图标各不相同，以及多渠道打包等等。\n\n"},{"id":"kotlin-learn","file":"kotlin-learn.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e在Google I/O 2017上Google正式宣布Kotlin成为Android开发的官方新语言，Kotlin得到了Google的背书，随着Android O和Android Studio3.0的正式发布，Kotlin语言的春天可能马上就要来临了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170815_kotlin.png\" alt=\"Kotlin\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e在Google I/O 2017上Google正式宣布Kotlin成为Android开发的官方新语言，Kotlin得到了Google的背书，随着Android O和Android Studio3.0的正式发布，Kotlin语言的春天可能马上就要来临了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170815_kotlin.png\" alt=\"Kotlin\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eKotlin\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eKotlin是基于JVM，静态类型的跨平台语言，在Java语言的基础上引入了很多现代语言的新特性。支持后台Server端、JavaScript前后端、及移动Android端开发。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e新特性\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eNull Safety\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eKotlin解决了Java错误量最多的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNullPointerException\u003c/code\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003evar a: String = \"abc\"\na = null // error！对于常量，编译时就不能为空，否则编译出错\n\nvar b: String? = \"abc\" //String? 可为空的 String 类型\nb = null // ok！\n\nval l = b.length // error: variable 'b' can be null\n\n//除了传统的if(b!=null)判空后再调用之外还有安全引用方式\n\nb?.length //\n\n//对于以下操作\nval l: Int = if (b != null) b.length else -1\n//可以简写为 ?: （Elvis Operator）后面也可以跟reture和throw语句\nval l = b?.length ?: -1\n\n//安全转型\nval aInt: Int? = a as? Int\n\n//可以为空的数组，以及非空筛选\nval nullableList: List\u0026#x3C;Int?\u003e = listOf(1, 2, null, 4)\nval intList: List\u0026#x3C;Int\u003e = nullableList.filterNotNull()\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003e基础数据类型没有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCharacter\u003c/code\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eChar\u003c/code\u003e被单独处理，不是数字，不能和数字进行比较，可以使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etoInt()\u003c/code\u003e函数\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003e没有8进制\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003e数组类型不可变，不能将\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eArray\u0026#x3C;String\u003e\u003c/code\u003e赋给\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eArray\u0026#x3C;Any\u003e\u003c/code\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003e以下是位运算，只支持\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eInt\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLong\u003c/code\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eshl(bits) – signed shift left (Java's \u0026#x3C;\u0026#x3C;)\nshr(bits) – signed shift right (Java's \u003e\u003e)\nushr(bits) – unsigned shift right (Java's \u003e\u003e\u003e)\nand(bits) – bitwise and\nor(bits) – bitwise or\nxor(bits) – bitwise xor\ninv() – bitwise inversion\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e没有静态方法，可以使用 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eobject declaration\u003c/code\u003e替代\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n\u003e 在Google I/O 2017上Google正式宣布Kotlin成为Android开发的官方新语言，Kotlin得到了Google的背书，随着Android O和Android Studio3.0的正式发布，Kotlin语言的春天可能马上就要来临了。\n\n![Kotlin](/images/20170815_kotlin.png)\n\n\u003c!--more--\u003e\n\n## Kotlin\n\nKotlin是基于JVM，静态类型的跨平台语言，在Java语言的基础上引入了很多现代语言的新特性。支持后台Server端、JavaScript前后端、及移动Android端开发。\n\n## 新特性\n\n- Null Safety\n\nKotlin解决了Java错误量最多的`NullPointerException`\n\n```\nvar a: String = \"abc\"\na = null // error！对于常量，编译时就不能为空，否则编译出错\n\nvar b: String? = \"abc\" //String? 可为空的 String 类型\nb = null // ok！\n\nval l = b.length // error: variable 'b' can be null\n\n//除了传统的if(b!=null)判空后再调用之外还有安全引用方式\n\nb?.length //\n\n//对于以下操作\nval l: Int = if (b != null) b.length else -1\n//可以简写为 ?: （Elvis Operator）后面也可以跟reture和throw语句\nval l = b?.length ?: -1\n\n//安全转型\nval aInt: Int? = a as? Int\n\n//可以为空的数组，以及非空筛选\nval nullableList: List\u003cInt?\u003e = listOf(1, 2, null, 4)\nval intList: List\u003cInt\u003e = nullableList.filterNotNull()\n```\n\n- 基础数据类型没有`Character`\n\n- `Char`被单独处理，不是数字，不能和数字进行比较，可以使用`toInt()`函数\n\n- 没有8进制\n\n- 数组类型不可变，不能将`Array\u003cString\u003e`赋给`Array\u003cAny\u003e`\n\n- 以下是位运算，只支持`Int`和`Long`\n\n```kotlin\nshl(bits) – signed shift left (Java's \u003c\u003c)\nshr(bits) – signed shift right (Java's \u003e\u003e)\nushr(bits) – unsigned shift right (Java's \u003e\u003e\u003e)\nand(bits) – bitwise and\nor(bits) – bitwise or\nxor(bits) – bitwise xor\ninv() – bitwise inversion\n```\n- 没有静态方法，可以使用 `object declaration`替代\n","data":{"title":"Kotlin入门","date":"2017-07-27","tags":["Kotlin"],"category":"Languages"},"isEmpty":false,"excerpt":"\n\u003e 在Google I/O 2017上Google正式宣布Kotlin成为Android开发的官方新语言，Kotlin得到了Google的背书，随着Android O和Android Studio3.0的正式发布，Kotlin语言的春天可能马上就要来临了。\n\n![Kotlin](/images/20170815_kotlin.png)\n\n"}],"page":11,"total":15},"__N_SSG":true},"page":"/blog/page/[page]","query":{"page":"11"},"buildId":"7YMuoTtyITfiinBiv1T76","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
