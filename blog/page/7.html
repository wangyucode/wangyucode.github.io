<!DOCTYPE html><html lang="zh-CN"><head><meta charSet="utf-8"/><title>王郁的小站</title><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/><meta name="next-head-count" content="3"/><link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml"/><meta name="description" content="欢迎光临王郁的小站"/><meta property="og:image" content="https://og-image.vercel.app/%E7%8E%8B%E9%83%81%E7%9A%84%E5%B0%8F%E7%AB%99.png?theme=light&amp;md=0&amp;fontSize=75px&amp;images=https%3A%2F%2Fassets.vercel.com%2Fimage%2Fupload%2Ffront%2Fassets%2Fdesign%2Fnextjs-black-logo.svg"/><meta name="og:title" content="王郁的小站"/><meta name="twitter:card" content="summary_large_image"/><link rel="preload" href="/_next/static/css/8a367d4b0f561ee4.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/8a367d4b0f561ee4.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-6af0e3c12b874bb0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-467b11a89995b152.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-75bdb96a41ba80f4.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-7a9af0eb34ed0a8f.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/205-2ea451b8c35b24ac.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/889-b501beaef0bf85fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/blog/page/%5Bpage%5D-ccf448f21ff35b7f.js" defer="" crossorigin=""></script><script src="/_next/static/KYANdil3ljfaQ9_rbwOmo/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/KYANdil3ljfaQ9_rbwOmo/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"nginx","file":"nginx.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://nginx.org/nginx.png\" alt=\"NGINX\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当我们需要在Ubuntu上部署SpringBoot服务时，通常正式环境需要将监听端口切换到80端口，或443端口，但是Ubuntu为了安全起见，普通用户是不能监听1024以下端口的。另外我们需要同时支持HTTP和HTTPS，貌似SpringBoot只支持监听1个端口，这时有很多解决方案。比如使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esudo\u003c/code\u003e提升运行权限，也可以通过Linux防火墙iptables配置端口转发，把80端口转发到8080端口上等方式。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e但是...这都不是最优的解决方案，既然用到了端口转发，不如直接安装一个NGINX服务器，做反向代理，同时也能提供静态服务能力，未来还能简单地配置升级到集群，做负载均衡。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eNGINX是一款高性能Web服务器。配置简单，易扩展，并发能力强，可用于Web服务器，反向代理，负载均衡，邮件等。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://nginx.org/nginx.png\" alt=\"NGINX\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当我们需要在Ubuntu上部署SpringBoot服务时，通常正式环境需要将监听端口切换到80端口，或443端口，但是Ubuntu为了安全起见，普通用户是不能监听1024以下端口的。另外我们需要同时支持HTTP和HTTPS，貌似SpringBoot只支持监听1个端口，这时有很多解决方案。比如使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esudo\u003c/code\u003e提升运行权限，也可以通过Linux防火墙iptables配置端口转发，把80端口转发到8080端口上等方式。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e但是...这都不是最优的解决方案，既然用到了端口转发，不如直接安装一个NGINX服务器，做反向代理，同时也能提供静态服务能力，未来还能简单地配置升级到集群，做负载均衡。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eNGINX是一款高性能Web服务器。配置简单，易扩展，并发能力强，可用于Web服务器，反向代理，负载均衡，邮件等。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e安装NGINX\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$sudo apt install nginx\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e使用这一行命令，其实就可以了。\n这时直接访问我们的服务器ip，能看到NGINX的欢迎页面，就说明安装成功。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e配置nginx\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/etc/nginx/\u003c/code\u003e目录下有这么几个重要文件\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003enginx.conf 是NGINX的配置文件，里面有一些基本配置，网上很多教程是直接修改这个文件配置服务什么的，看这个文件结构include了conf.d目录的所有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.conf\u003c/code\u003e文件，我们自定义的配置应该写在conf.d目录中\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003esite-enabled 是当前启用的服务配置文件，里面有个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edefault\u003c/code\u003e链接到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esite-available\u003c/code\u003e目录里。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003esite-available 是备选的服务器配置文件\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e从注释和目录结构，我们可以看到其良苦用心，不应该直接修改nginx.conf文件，而是将需要添加的服务器配置文件放到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esite-available\u003c/code\u003e目录中。然后在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esite-enabled\u003c/code\u003e目录创建要启用服务的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esymbolic link\u003c/code\u003e到刚刚创建的配置文件。这样配置才能更方便，更具扩展性。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e示例\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e我这里配置了\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e静态网站服务：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eserver {\n\tlisten 80;\n\tlisten [::]:80;\n\n\tserver_name wycode.cn www.wycode.cn;\n\n\troot /var/www/wycode.cn;\n\tindex index.html;\n\n\tlocation / {\n\t\ttry_files $uri $uri/ =404;\n\t}\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003eSpringBoot 后台api反向代理\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eserver {\n\tlisten 80;\n\tlisten [::]:80;\n\n\tserver_name wycode.cn www.wycode.cn;\n\n\tlocation /api {\n\t\tproxy_pass http://127.0.0.1:8080/api/;\n\t\tproxy_set_header   Host             $host;\n\t\tproxy_set_header   X-Real-IP        $remote_addr;\n\t\tproxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;\n\t}\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请联系作者!\u003c/p\u003e\n","content":"\n![NGINX](https://nginx.org/nginx.png)\n\n当我们需要在Ubuntu上部署SpringBoot服务时，通常正式环境需要将监听端口切换到80端口，或443端口，但是Ubuntu为了安全起见，普通用户是不能监听1024以下端口的。另外我们需要同时支持HTTP和HTTPS，貌似SpringBoot只支持监听1个端口，这时有很多解决方案。比如使用`sudo`提升运行权限，也可以通过Linux防火墙iptables配置端口转发，把80端口转发到8080端口上等方式。\n\n但是...这都不是最优的解决方案，既然用到了端口转发，不如直接安装一个NGINX服务器，做反向代理，同时也能提供静态服务能力，未来还能简单地配置升级到集群，做负载均衡。\n\n\u003e NGINX是一款高性能Web服务器。配置简单，易扩展，并发能力强，可用于Web服务器，反向代理，负载均衡，邮件等。\n\n\u003c!--more--\u003e\n\n## 安装NGINX\n\n```bash\n$sudo apt install nginx\n```\n\n使用这一行命令，其实就可以了。\n这时直接访问我们的服务器ip，能看到NGINX的欢迎页面，就说明安装成功。\n\n\n## 配置nginx\n\n`/etc/nginx/`目录下有这么几个重要文件\n\n- nginx.conf 是NGINX的配置文件，里面有一些基本配置，网上很多教程是直接修改这个文件配置服务什么的，看这个文件结构include了conf.d目录的所有`.conf`文件，我们自定义的配置应该写在conf.d目录中\n\n- site-enabled 是当前启用的服务配置文件，里面有个`default`链接到`site-available`目录里。\n\n- site-available 是备选的服务器配置文件\n\n从注释和目录结构，我们可以看到其良苦用心，不应该直接修改nginx.conf文件，而是将需要添加的服务器配置文件放到`site-available`目录中。然后在`site-enabled`目录创建要启用服务的`symbolic link`到刚刚创建的配置文件。这样配置才能更方便，更具扩展性。\n\n## 示例\n\n我这里配置了\n\n静态网站服务：\n\n```\nserver {\n\tlisten 80;\n\tlisten [::]:80;\n\n\tserver_name wycode.cn www.wycode.cn;\n\n\troot /var/www/wycode.cn;\n\tindex index.html;\n\n\tlocation / {\n\t\ttry_files $uri $uri/ =404;\n\t}\n}\n```\nSpringBoot 后台api反向代理\n\n\n```\nserver {\n\tlisten 80;\n\tlisten [::]:80;\n\n\tserver_name wycode.cn www.wycode.cn;\n\n\tlocation /api {\n\t\tproxy_pass http://127.0.0.1:8080/api/;\n\t\tproxy_set_header   Host             $host;\n\t\tproxy_set_header   X-Real-IP        $remote_addr;\n\t\tproxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;\n\t}\n}\n```\n\n\n以上，转载请联系作者!","data":{"title":"Ubuntu16.04安装配置NGINX服务","date":"2018-06-23","tags":["Linux","NGINX"],"category":"Linux"},"isEmpty":false,"excerpt":"\n![NGINX](https://nginx.org/nginx.png)\n\n当我们需要在Ubuntu上部署SpringBoot服务时，通常正式环境需要将监听端口切换到80端口，或443端口，但是Ubuntu为了安全起见，普通用户是不能监听1024以下端口的。另外我们需要同时支持HTTP和HTTPS，貌似SpringBoot只支持监听1个端口，这时有很多解决方案。比如使用`sudo`提升运行权限，也可以通过Linux防火墙iptables配置端口转发，把80端口转发到8080端口上等方式。\n\n但是...这都不是最优的解决方案，既然用到了端口转发，不如直接安装一个NGINX服务器，做反向代理，同时也能提供静态服务能力，未来还能简单地配置升级到集群，做负载均衡。\n\n\u003e NGINX是一款高性能Web服务器。配置简单，易扩展，并发能力强，可用于Web服务器，反向代理，负载均衡，邮件等。\n\n"},{"id":"springboot-static-content","file":"springboot-static-content.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180623_springboot.jpg\" alt=\"springboot\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e我们知道SpringBoot内置了tomcat服务器，从而一个jar包就能实现web服务。但有时我们又想像传统tomcat那样部署一些外部的静态资源，虽然静态资源放在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eresource\u003c/code\u003e文件夹的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estatic\u003c/code\u003e就能解决问题，但是static文件夹的内容会作为jar的一部分，要替换的话只能替换整个jar包，极为不便。能不能配置jar包外部的文件夹作为静态资源目录呢。当然是可以的...\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e以下示例代码基于SpringBoot 2.0.3，采用Kotlin语言实现：\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180623_springboot.jpg\" alt=\"springboot\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e我们知道SpringBoot内置了tomcat服务器，从而一个jar包就能实现web服务。但有时我们又想像传统tomcat那样部署一些外部的静态资源，虽然静态资源放在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eresource\u003c/code\u003e文件夹的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estatic\u003c/code\u003e就能解决问题，但是static文件夹的内容会作为jar的一部分，要替换的话只能替换整个jar包，极为不便。能不能配置jar包外部的文件夹作为静态资源目录呢。当然是可以的...\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e以下示例代码基于SpringBoot 2.0.3，采用Kotlin语言实现：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eWebMvcConfigurer\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e新版Spring利用了Java8新特性，interface可以有default关键字，从而接口方法不用全部实现。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\nclass WebConfiguration : WebMvcConfigurer {\n\n    override fun addResourceHandlers(registry: ResourceHandlerRegistry) {\n        super.addResourceHandlers(registry)\n        registry.addResourceHandler(\"/**\")\n                .addResourceLocations(\"file:static/\")\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@Configuration\u003c/code\u003e注解表明这是一个配置类，会被Spring框架识别并管理。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebConfiguration\u003c/code\u003e类实现\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebMvcConfigurer\u003c/code\u003e接口，并复写\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eaddResourceHandlers\u003c/code\u003e方法。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eaddResourceHandler(\"/**\")\u003c/code\u003e添加路由到服务器根目录。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.addResourceLocations(\"file:static/\")\u003c/code\u003e添加外部静态资源，这里路径表示和jar包同目录的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estatic\u003c/code\u003e文件夹。这样能想tomcat一样在static文件夹中部署静态资源了。而且不用重启SpringBoot服务\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n![springboot](/images/20180623_springboot.jpg)\n\n\u003e 我们知道SpringBoot内置了tomcat服务器，从而一个jar包就能实现web服务。但有时我们又想像传统tomcat那样部署一些外部的静态资源，虽然静态资源放在`resource`文件夹的`static`就能解决问题，但是static文件夹的内容会作为jar的一部分，要替换的话只能替换整个jar包，极为不便。能不能配置jar包外部的文件夹作为静态资源目录呢。当然是可以的...\n\n以下示例代码基于SpringBoot 2.0.3，采用Kotlin语言实现：\n\n\u003c!--more--\u003e\n\n## WebMvcConfigurer\n\n\u003e 新版Spring利用了Java8新特性，interface可以有default关键字，从而接口方法不用全部实现。\n\n```kotlin\n@Configuration\nclass WebConfiguration : WebMvcConfigurer {\n\n    override fun addResourceHandlers(registry: ResourceHandlerRegistry) {\n        super.addResourceHandlers(registry)\n        registry.addResourceHandler(\"/**\")\n                .addResourceLocations(\"file:static/\")\n    }\n}\n```\n\n- `@Configuration`注解表明这是一个配置类，会被Spring框架识别并管理。\n- `WebConfiguration`类实现`WebMvcConfigurer`接口，并复写`addResourceHandlers`方法。\n- `addResourceHandler(\"/**\")`添加路由到服务器根目录。\n- `.addResourceLocations(\"file:static/\")`添加外部静态资源，这里路径表示和jar包同目录的`static`文件夹。这样能想tomcat一样在static文件夹中部署静态资源了。而且不用重启SpringBoot服务\n","data":{"title":"SpringBoot配置Jar外部静态资源","date":"2018-06-23","tags":["Spring","Java"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![springboot](/images/20180623_springboot.jpg)\n\n\u003e 我们知道SpringBoot内置了tomcat服务器，从而一个jar包就能实现web服务。但有时我们又想像传统tomcat那样部署一些外部的静态资源，虽然静态资源放在`resource`文件夹的`static`就能解决问题，但是static文件夹的内容会作为jar的一部分，要替换的话只能替换整个jar包，极为不便。能不能配置jar包外部的文件夹作为静态资源目录呢。当然是可以的...\n\n以下示例代码基于SpringBoot 2.0.3，采用Kotlin语言实现：\n\n"},{"id":"many-to-many","file":"many-to-many.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJPA是Java Persistence API的简称是Java的ORM规范，实现这个规范的有著名的Hibernate等ORM框架。JDK 5.0注解或XML描述对象－关系表的映射关系，并将运行期的实体对象持久化到数据库中。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180419_spring_framework.svg\" alt=\"Spring\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e多对多关系是关联关系中最复杂的。本文使用Spring JPA框架总结多对多关系及\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e注解的详细使用。明白了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e,其它\n\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@OneToMany\u003c/code\u003e 和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@OneToOne\u003c/code\u003e就简单很多了。\u003c/p\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJPA是Java Persistence API的简称是Java的ORM规范，实现这个规范的有著名的Hibernate等ORM框架。JDK 5.0注解或XML描述对象－关系表的映射关系，并将运行期的实体对象持久化到数据库中。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180419_spring_framework.svg\" alt=\"Spring\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e多对多关系是关联关系中最复杂的。本文使用Spring JPA框架总结多对多关系及\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e注解的详细使用。明白了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e,其它\n\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@OneToMany\u003c/code\u003e 和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@OneToOne\u003c/code\u003e就简单很多了。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eJava和JPA中的多对多关系\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e根据维基百科定义：Java中的多对多关系是指源对象具有目标对象集合的属性，并且（如果存在的话）这个目标对象与原对象具有反向关系，则它也将成为多对多关系。需要注意的是：Java和JPA中的所有关系都是单向的，因为存在源对象引用目标对象的情况下，也不能保证目标对象也与原对象有关系。这与关系数据库不同，在关系数据库中，通过外键定义并查询，使得反向查询总是存在的。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJPA还定义了一个OneToMany关系，它与ManyToMany关系类似，但反向关系（如果已定义）是ManyToOne关系。 OneToMany与JPA中ManyToMany关系的主要区别在于，ManyToMany总是使用中间关系连接表来存储关系，OneToMany可以使用连接表或者目标对象的表引用中的外键源对象表的主键。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e传统项目开发，会有一个设计表的过程，然后由DBA写一大堆\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecreate table ***\u003c/code\u003e。很麻烦也很慢。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eJPA框架在运行时，会根据实体定义自动创建表，自动更新表字段，使用JPA可以说一行SQL都不用写，甚至不用关心底层数据库到底是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMySQL\u003c/code\u003e还是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOracle\u003c/code\u003e还是其它。以下例子中我不定义表名，列名，所以没有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@Column\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@Table\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@JoinTable\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@JoinColumn\u003c/code\u003e等。由JPA框架自动根据实体名称生成表名，列名。我觉得Hibernate生成的表名和列名挺好也符合规范。就不多此一举了。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e@ManyToMany 注解\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e在JPA中使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e注解表示多对多关系。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e学生和老师，典型的多对多关系:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Entity\npublic class Student {\n    @Id\n    private String id;\n    @ManyToMany\n    private List\u0026#x3C;Teacher\u003e teachers;\n}\n\n@Entity\npublic class Teacher {\n    @Id\n    private String id;\n    @ManyToMany\n    private List\u0026#x3C;Student\u003e students;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e上面例子中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e即表示了老师和学生的多对多关系。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e注解可以用在字段或方法上。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e但这样做是有问题的，生成的中间表有两个，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTEACHER_STUDENTS\u003c/code\u003e表和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSTUDENT_TEACHERS\u003c/code\u003e。原因是这里的多对多关系正是维基百科提到的单向原则。老师和学生虽然分别定义了自己的多对多关系，但这个关系都是单向的，要使关系成为双向。就需要下面的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emappedBy\u003c/code\u003e属性。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003emappedBy 属性\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emappedBy\u003c/code\u003e是OneToOne、OneToMany和ManyToMany这三种关联关系的属性。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e用来标注\u003cstrong\u003e拥有\u003c/strong\u003e这种关系的字段。 除非关系是单向的，否则是必需的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e那么什么叫拥有关联关系呢，假设是双向一对一的话，那么拥有关系的这一方有建立、解除和更新与另一方关系的能力。而另一方没有，只能被动管理。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e由于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJoinTable\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJoinColumn\u003c/code\u003e一般定义在拥有关系的这一端，而\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emappedBy\u003c/code\u003e一定是定义在关系的被拥有方（the owned side），也就是跟定义\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJoinTable\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJoinColumn\u003c/code\u003e互斥的一方，它的值指向拥有方中关于被拥有方的字段，可能是一个对象（\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOneToMany\u003c/code\u003e），也可能是一个对象集合（\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eManyToMany\u003c/code\u003e）。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e上面的例子中，维护老师和学生的多对多关系，明显只需要一张中间表就可以了，我们假设老师是维护关系（拥有关系）的一端，则实体定义修改如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Entity\npublic class Student {\n    @Id\n    private String id;\n    @ManyToMany(mappedBy = \"students\")\n    private List\u0026#x3C;Teacher\u003e teachers;\n}\n\n@Entity\npublic class Teacher {\n    @Id\n    private String id;\n    @ManyToMany\n    private List\u0026#x3C;Student\u003e students;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这时中间表只有一张\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTEACHER_STUDENTS\u003c/code\u003e，关联关系也变成了我们想要的双向关系。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eCascade 级联关系\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e实际业务中，我们通常会遇到以下情况：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e用户和用户的收货地址是一对多关系，当用户被删除时，这个用户的所有收货地址也应该一并删除。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e订单和订单中的商品也是一对多关系，但订单被删除时，订单所关联的商品肯定不能被删除。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e此时只要配置正确的级联关系，就能达到想要的效果。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e级联关系类型：\u003c/h3\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eCascadeType.REFRESH：级联刷新，当多个用户同时作操作一个实体，为了用户取到的数据是实时的，在用实体中的数据之前就可以调用一下refresh()方法\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eCascadeType.REMOVE：级联删除，当调用remove()方法删除Order实体时会先级联删除OrderItem的相关数据\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eCascadeType.MERGE：级联更新，当调用了Merge()方法，如果Order中的数据改变了会相应的更新OrderItem中的数据\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eCascadeType.ALL：包含以上所有级联属性\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eCascadeType.PERSIST：级联保存，当调用了Persist() 方法，会级联保存相应的数据\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e需要注意的是，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCascadeType.ALL\u003c/code\u003e要谨慎使用，为了达到数据同步，很多人喜欢用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCascadeType.ALL\u003c/code\u003e来实现。但上面订单和商品的例子就不适用。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e以上\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e未经同意禁止转载！\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e不对的地方欢迎指正！\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n\u003e JPA是Java Persistence API的简称是Java的ORM规范，实现这个规范的有著名的Hibernate等ORM框架。JDK 5.0注解或XML描述对象－关系表的映射关系，并将运行期的实体对象持久化到数据库中。\n\n![Spring](/images/20180419_spring_framework.svg)\n\n多对多关系是关联关系中最复杂的。本文使用Spring JPA框架总结多对多关系及`@ManyToMany`注解的详细使用。明白了`@ManyToMany`,其它\n`@OneToMany` 和`@OneToOne`就简单很多了。\n\n\u003c!--more--\u003e\n\n## Java和JPA中的多对多关系\n\n\u003e 根据维基百科定义：Java中的多对多关系是指源对象具有目标对象集合的属性，并且（如果存在的话）这个目标对象与原对象具有反向关系，则它也将成为多对多关系。需要注意的是：Java和JPA中的所有关系都是单向的，因为存在源对象引用目标对象的情况下，也不能保证目标对象也与原对象有关系。这与关系数据库不同，在关系数据库中，通过外键定义并查询，使得反向查询总是存在的。\n\n\u003e JPA还定义了一个OneToMany关系，它与ManyToMany关系类似，但反向关系（如果已定义）是ManyToOne关系。 OneToMany与JPA中ManyToMany关系的主要区别在于，ManyToMany总是使用中间关系连接表来存储关系，OneToMany可以使用连接表或者目标对象的表引用中的外键源对象表的主键。\n\n传统项目开发，会有一个设计表的过程，然后由DBA写一大堆`create table ***`。很麻烦也很慢。\n\nJPA框架在运行时，会根据实体定义自动创建表，自动更新表字段，使用JPA可以说一行SQL都不用写，甚至不用关心底层数据库到底是`MySQL`还是`Oracle`还是其它。以下例子中我不定义表名，列名，所以没有`@Column`、`@Table`、`@JoinTable`、`@JoinColumn`等。由JPA框架自动根据实体名称生成表名，列名。我觉得Hibernate生成的表名和列名挺好也符合规范。就不多此一举了。\n\n## @ManyToMany 注解\n\n在JPA中使用`@ManyToMany`注解表示多对多关系。\n\n学生和老师，典型的多对多关系:\n\n```java\n@Entity\npublic class Student {\n    @Id\n    private String id;\n    @ManyToMany\n    private List\u003cTeacher\u003e teachers;\n}\n\n@Entity\npublic class Teacher {\n    @Id\n    private String id;\n    @ManyToMany\n    private List\u003cStudent\u003e students;\n}\n```\n\n上面例子中的`@ManyToMany`即表示了老师和学生的多对多关系。`@ManyToMany`注解可以用在字段或方法上。\n\n但这样做是有问题的，生成的中间表有两个，`TEACHER_STUDENTS`表和`STUDENT_TEACHERS`。原因是这里的多对多关系正是维基百科提到的单向原则。老师和学生虽然分别定义了自己的多对多关系，但这个关系都是单向的，要使关系成为双向。就需要下面的`mappedBy`属性。\n\n## mappedBy 属性\n\n`mappedBy`是OneToOne、OneToMany和ManyToMany这三种关联关系的属性。\n\n用来标注**拥有**这种关系的字段。 除非关系是单向的，否则是必需的。\n\n那么什么叫拥有关联关系呢，假设是双向一对一的话，那么拥有关系的这一方有建立、解除和更新与另一方关系的能力。而另一方没有，只能被动管理。\n\n由于`JoinTable`和`JoinColumn`一般定义在拥有关系的这一端，而`mappedBy`一定是定义在关系的被拥有方（the owned side），也就是跟定义`JoinTable`和`JoinColumn`互斥的一方，它的值指向拥有方中关于被拥有方的字段，可能是一个对象（`OneToMany`），也可能是一个对象集合（`ManyToMany`）。\n\n上面的例子中，维护老师和学生的多对多关系，明显只需要一张中间表就可以了，我们假设老师是维护关系（拥有关系）的一端，则实体定义修改如下：\n\n```java\n@Entity\npublic class Student {\n    @Id\n    private String id;\n    @ManyToMany(mappedBy = \"students\")\n    private List\u003cTeacher\u003e teachers;\n}\n\n@Entity\npublic class Teacher {\n    @Id\n    private String id;\n    @ManyToMany\n    private List\u003cStudent\u003e students;\n}\n```\n\n这时中间表只有一张`TEACHER_STUDENTS`，关联关系也变成了我们想要的双向关系。\n\n## Cascade 级联关系\n\n实际业务中，我们通常会遇到以下情况：\n\n1. 用户和用户的收货地址是一对多关系，当用户被删除时，这个用户的所有收货地址也应该一并删除。\n2. 订单和订单中的商品也是一对多关系，但订单被删除时，订单所关联的商品肯定不能被删除。\n\n此时只要配置正确的级联关系，就能达到想要的效果。\n\n### 级联关系类型：\n\n- CascadeType.REFRESH：级联刷新，当多个用户同时作操作一个实体，为了用户取到的数据是实时的，在用实体中的数据之前就可以调用一下refresh()方法\n- CascadeType.REMOVE：级联删除，当调用remove()方法删除Order实体时会先级联删除OrderItem的相关数据\n- CascadeType.MERGE：级联更新，当调用了Merge()方法，如果Order中的数据改变了会相应的更新OrderItem中的数据\n- CascadeType.ALL：包含以上所有级联属性\n- CascadeType.PERSIST：级联保存，当调用了Persist() 方法，会级联保存相应的数据\n\n需要注意的是，`CascadeType.ALL`要谨慎使用，为了达到数据同步，很多人喜欢用`CascadeType.ALL`来实现。但上面订单和商品的例子就不适用。\n\n## 以上\n\n- 未经同意禁止转载！\n- 不对的地方欢迎指正！\n","data":{"title":"Spring JPA框架中的@ManyToMany多对多关系的理解和使用","date":"2018-04-19","tags":["Spring","JPA","Java"],"category":"Backend"},"isEmpty":false,"excerpt":"\n\u003e JPA是Java Persistence API的简称是Java的ORM规范，实现这个规范的有著名的Hibernate等ORM框架。JDK 5.0注解或XML描述对象－关系表的映射关系，并将运行期的实体对象持久化到数据库中。\n\n![Spring](/images/20180419_spring_framework.svg)\n\n多对多关系是关联关系中最复杂的。本文使用Spring JPA框架总结多对多关系及`@ManyToMany`注解的详细使用。明白了`@ManyToMany`,其它\n`@OneToMany` 和`@OneToOne`就简单很多了。\n\n"},{"id":"tomcat","file":"tomcat.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180411_tomcat.png\" alt=\"Tomcat\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180411_tomcat.png\" alt=\"Tomcat\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eTomcat的Server配置\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eTomcat\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003econf\u003c/code\u003e目录下的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eserver.xml\u003c/code\u003e（Linux系统可能在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/etc/tomcat/\u003c/code\u003e下）定义了服务器的相关配置信息。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e根据官方文档，这里的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eServer\u003c/code\u003e指的是整个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCatalina servlet\u003c/code\u003e容器。它的属性代表整个servlet容器的特性。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e常见的如：服务器端口，根项目路径等。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eConnector属性\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e除了配置端口，协议版本，还可以配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eURIEncoding\u003c/code\u003e，默认值是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eISO8859-1\u003c/code\u003e所以不支持中文，我们改成\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUTF-8\u003c/code\u003e即可。即：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-xml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;Connector port=\"80\" protocol=\"HTTP/1.1\"\n               connectionTimeout=\"20000\"\n               redirectPort=\"443\"\n\t           URIEncoding=\"UTF-8\"/\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHTTPS\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通常在配置了HTTPS的服务器上，我们会把80端口转发到443端口上，此时我们要对443端口的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eConnector\u003c/code\u003e也配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eURIEncoding=\"UTF-8\"\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我的问题就出在这。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以上...\u003c/p\u003e\n","content":"\n\n\u003e 今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\n\n![Tomcat](/images/20180411_tomcat.png)\n\n\u003c!--more--\u003e\n\n## Tomcat的Server配置\n\nTomcat`conf`目录下的`server.xml`（Linux系统可能在`/etc/tomcat/`下）定义了服务器的相关配置信息。\n\n根据官方文档，这里的`Server`指的是整个`Catalina servlet`容器。它的属性代表整个servlet容器的特性。\n\n常见的如：服务器端口，根项目路径等。\n\n## Connector属性\n\n除了配置端口，协议版本，还可以配置`URIEncoding`，默认值是`ISO8859-1`所以不支持中文，我们改成`UTF-8`即可。即：\n\n```xml\n\u003cConnector port=\"80\" protocol=\"HTTP/1.1\"\n               connectionTimeout=\"20000\"\n               redirectPort=\"443\"\n\t           URIEncoding=\"UTF-8\"/\u003e\n```\n\n## HTTPS\n\n通常在配置了HTTPS的服务器上，我们会把80端口转发到443端口上，此时我们要对443端口的`Connector`也配置`URIEncoding=\"UTF-8\"`\n\n\n我的问题就出在这。\n\n\n以上...\n\n\n\n\n\n","data":{"title":"SwaggerUI GET请求中文乱码问题解决","date":"2018-04-11","tags":["Swagger","Spring","Tomcat"],"category":"Backend"},"isEmpty":false,"excerpt":"\n\n\u003e 今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\n\n![Tomcat](/images/20180411_tomcat.png)\n\n"},{"id":"data-structures03","file":"data-structures03.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e树状结构的基础是二叉树，二叉树即度为2的树。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e二叉树的链表结构\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-c px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003etypedef struct TNode *Position;\ntypedef Position BinTree; /* 二叉树类型 */\nstruct TNode{ /* 树结点定义 */\n    ElementType Data; /* 结点数据 */\n    BinTree Left;     /* 指向左子树 */\n    BinTree Right;    /* 指向右子树 */\n};\n\u003c/code\u003e\u003c/pre\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e树状结构的基础是二叉树，二叉树即度为2的树。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e二叉树的链表结构\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-c px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003etypedef struct TNode *Position;\ntypedef Position BinTree; /* 二叉树类型 */\nstruct TNode{ /* 树结点定义 */\n    ElementType Data; /* 结点数据 */\n    BinTree Left;     /* 指向左子树 */\n    BinTree Right;    /* 指向右子树 */\n};\n\u003c/code\u003e\u003c/pre\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业1：树的同构\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e给定两棵树T1和T2。如果T1可以通过若干次左右孩子互换就变成T2，则我们称两棵树是“同构”的。例如图1给出的两棵树就是同构的，因为我们把其中一棵树的结点A、B、G的左右孩子互换后，就得到另外一棵树。而图2就不是同构的。\n图1：\n\u003cimg src=\"/images/20180326_data_structures03_1.png\" alt=\"图1\" class=\"mx-auto max-h-80\"\u003e\n图2：\n\u003cimg src=\"/images/20180326_data_structures03_2.png\" alt=\"图2\" class=\"mx-auto max-h-80\"\u003e\n现给定两棵树，请你判断它们是否是同构的。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e输入格式:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e输入给出2棵二叉树树的信息。对于每棵树，首先在一行中给出一个非负整数N (≤10)，即该树的结点数（此时假设结点从0到N−1编号）；随后N行，第i行对应编号第i个结点，给出该结点中存储的1个英文大写字母、其左孩子结点的编号、右孩子结点的编号。如果孩子结点为空，则在相应位置上给出\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e-\u003c/code\u003e。给出的数据间用一个空格分隔。注意：题目保证每个结点中存储的字母是不同的。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e输出格式:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e如果两棵树是同构的，输出\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eYes\u003c/code\u003e，否则输出\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNo\u003c/code\u003e。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e输入样例1（对应图1）：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e8\nA 1 2\nB 3 4\nC 5 -\nD - -\nE 6 -\nG 7 -\nF - -\nH - -\n8\nG - 4\nB 7 6\nF - -\nA 5 1\nH - -\nC 0 -\nD - -\nE 2 -\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e输出样例1:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eYes\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e输入样例2（对应图2）：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e8\nB 5 7\nF - -\nA 0 3\nC 6 -\nH - -\nD - -\nG 4 -\nE 1 -\n8\nD 6 -\nB 5 -\nE - -\nH - -\nC 0 2\nG - 3\nF - -\nA 1 4\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e输出样例2:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eNo\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epublic class Main {\n    public static void main(String args[]) throws IOException {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n        //读第一个树节点\n        int n_a = 0;\n        n_a = Integer.parseInt(reader.readLine());\n\n        String[] inputs_a = new String[n_a];\n        List\u0026#x3C;Node\u003e nodes_a = new ArrayList\u0026#x3C;\u003e(n_a);\n\n        for (int i = 0; i \u0026#x3C; n_a; i++) {\n            inputs_a[i] = reader.readLine();\n        }\n\n\n        int n_b = 0;\n        n_b = Integer.parseInt(reader.readLine());\n\n        String[] inputs_b = new String[n_b];\n        List\u0026#x3C;Node\u003e nodes_b = new ArrayList\u0026#x3C;\u003e(n_b);\n\n        for (int i = 0; i \u0026#x3C; n_b; i++) {\n            inputs_b[i] = reader.readLine();\n        }\n\n        if (n_a != n_b) {\n            System.out.println(\"No\");\n            return;\n        }\n\n        addNodes(inputs_a, nodes_a);\n        addNodes(inputs_b, nodes_b);\n\n        if(inputs_a.length==1\u0026#x26;\u0026#x26;!Objects.equals(nodes_a.get(0).data,nodes_b.get(0).data)){\n            System.out.println(\"No\");\n            return;\n        }\n\n        for (Node node_a : nodes_a) {\n            for (Node node_b : nodes_b) {\n                if (Objects.equals(node_a.data, node_b.data)) {\n                    if (!((Objects.equals(node_a.left, node_b.left) \u0026#x26;\u0026#x26; Objects.equals(node_a.right, node_b.right))\n                            || (Objects.equals(node_a.left, node_b.right) \u0026#x26;\u0026#x26; Objects.equals(node_a.right, node_b.left)))) {\n                        System.out.println(\"No\");\n                        return;\n                    }\n                }\n            }\n        }\n\n        System.out.println(\"Yes\");\n    }\n\n\n    private static void addNodes(String[] inputs, List\u0026#x3C;Node\u003e nodes) {\n        for (String input : inputs) {\n            Node n = new Node();\n            String[] lineArg = input.split(\" \");\n            n.data = lineArg[0];\n            if (!Objects.equals(\"-\", lineArg[1])) {\n                int left_num = Integer.parseInt(lineArg[1]);\n                n.left = inputs[left_num].split(\" \")[0];\n            }\n            if (!Objects.equals(\"-\", lineArg[2])) {\n                int right_num = Integer.parseInt(lineArg[2]);\n                n.right = inputs[right_num].split(\" \")[0];\n            }\n            nodes.add(n);\n        }\n    }\n\n    static class Node {\n        String data;\n        String left;\n        String right;\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结:\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e利用二叉树的数据结构可以解决这个问题。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里我采用了投机取巧的办法，并没有建立树状结构，而是把每个节点进行比较，唯一需要处理的特例就是同唯一父节点值不同的情况。\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业2：List Leaves（25 分）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eGiven a tree, you are supposed to list all the leaves in the order of top down, and left to right.\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eInput Specification:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eEach input file contains one test case. For each case, the first line gives a positive integer N (≤10) which is the total number of nodes in the tree -- and hence the nodes are numbered from 0 to N−1. Then N lines follow, each corresponds to a node, and gives the indices of the left and right children of the node. If the child does not exist, a \"-\" will be put at the position. Any pair of children are separated by a space.\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eOutput Specification:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eFor each test case, print in one line all the leaves' indices in the order of top down, and left to right. There must be exactly one space between any adjacent numbers, and no extra space at the end of the line.\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eSample Input:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e8\n1 -\n- -\n0 -\n2 7\n- -\n- -\n5 -\n4 6\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003eSample Output:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e4 1 5\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epublic class Main {\n    public static void main(String args[]) throws IOException {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n\n        int sum;\n        sum = Integer.parseInt(reader.readLine());\n\n        String[] inputs = new String[sum];\n\n        for (int i = 0; i \u0026#x3C; sum; i++) {\n            inputs[i] = reader.readLine();\n        }\n\n        int root_num = findRoot(inputs);\n        StringBuilder sb = new StringBuilder();\n        Queue\u0026#x3C;Node\u003e nodes = new LinkedList\u0026#x3C;\u003e();\n\n        Node root =  getNode(root_num,inputs[root_num]);\n        nodes.add(root);\n        checkTree(nodes, sb, inputs);\n        if (sb.length() \u003e 0) {\n            sb.deleteCharAt(sb.length() - 1);\n        }\n        System.out.println(sb.toString());\n    }\n\n    private static Node getNode(int root_num, String input) {\n        Node node = new Node();\n        node.data = root_num;\n        String[] lineArg = input.split(\" \");\n        if (!Objects.equals(\"-\", lineArg[0])) {\n            node.left = Integer.parseInt(lineArg[0]);\n        }\n        if (!Objects.equals(\"-\", lineArg[1])) {\n            node.right = Integer.parseInt(lineArg[1]);\n        }\n        return node;\n    }\n\n    private static void checkTree(Queue\u0026#x3C;Node\u003e nodes, StringBuilder sb, String[] inputs) {\n        while (!nodes.isEmpty()) {\n            Node node = nodes.poll();\n            if (node.left\u0026#x3C;0 \u0026#x26;\u0026#x26; node.right\u0026#x3C;0) {\n                sb.append(node.data);\n                sb.append(' ');\n            }\n            if (node.left\u003e=0) {\n                Node n_l = getNode(node.left,inputs[node.left]);\n                nodes.add(n_l);\n            }\n            if (node.right\u003e=0) {\n                Node n_r = getNode(node.right,inputs[node.right]);\n                nodes.add(n_r);\n            }\n        }\n    }\n\n\n    private static int findRoot(String[] inputs) {\n        int[] link = new int[inputs.length];\n        for (String input : inputs) {\n            String[] lineArg = input.split(\" \");\n            if (!Objects.equals(\"-\", lineArg[0])) {\n                int left_num = Integer.parseInt(lineArg[0]);\n                link[left_num] = 1;\n            }\n            if (!Objects.equals(\"-\", lineArg[1])) {\n                int right_num = Integer.parseInt(lineArg[1]);\n                link[right_num] = 1;\n            }\n        }\n        int i;\n        for (i = 0; i \u0026#x3C; link.length; i++) {\n            if (link[i] == 0) {\n                break;\n            }\n        }\n\n        return i;\n    }\n\n    static class Node{\n        int data =-1;\n        int left = -1;\n        int right = -1;\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结：\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e树的遍历最基本的方法是采用递归；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用堆栈可以免递归遍历树，每个对象有3次访问机会，调整访问时机可以分别实现前序、中序及后序遍历；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e采用队列可以层级遍历树，此题采用层级遍历。\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业3：Tree Traversals Again（25 分）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eAn inorder binary tree traversal can be implemented in a non-recursive way with a stack. For example, suppose that when a 6-node binary tree (with the keys numbered from 1 to 6) is traversed, the stack operations are: push(1); push(2); push(3); pop(); pop(); push(4); pop(); pop(); push(5); push(6); pop(); pop(). Then a unique binary tree (shown in Figure 1) can be generated from this sequence of operations. Your task is to give the postorder traversal sequence of this tree.\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eFigure 1\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180327_data_structures03_3.png\" alt=\"Figure 1\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eInput Specification:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eEach input file contains one test case. For each case, the first line contains a positive integer N (≤30) which is the total number of nodes in a tree (and hence the nodes are numbered from 1 to N). Then 2N lines follow, each describes a stack operation in the format: \"Push X\" where X is the index of the node being pushed onto the stack; or \"Pop\" meaning to pop one node from the stack.\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eOutput Specification:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eFor each test case, print the postorder traversal sequence of the corresponding tree in one line. A solution is guaranteed to exist. All the numbers must be separated by exactly one space, and there must be no extra space at the end of the line.\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eSample Input:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e6\nPush 1\nPush 2\nPush 3\nPop\nPop\nPush 4\nPop\nPop\nPush 5\nPush 6\nPop\nPop\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eSample Output:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e3 4 2 6 5 1\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode;\n\nimport java.io.BufferedReader;\nimport java.io.InputStreamReader;\nimport java.util.ArrayList;\nimport java.util.LinkedList;\nimport java.util.Objects;\nimport java.util.Stack;\n\npublic class Main {\n    public static void main(String args[]) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n        //读第一行\n        String[] line1Array = getStringArray(reader);\n        String firstAddress = line1Array[0];\n        int count = Integer.parseInt(line1Array[1]);\n        int k = Integer.parseInt(line1Array[2]);\n\n        //读取所有节点\n        ArrayList\u0026#x3C;Node\u003e nodes = new ArrayList\u0026#x3C;\u003e(count);\n        for (int i = 0; i \u0026#x3C; count; i++) {\n            String[] lineArray = getStringArray(reader);\n            Node node = new Node();\n            node.address = lineArray[0];\n            node.data = Integer.parseInt(lineArray[1]);\n            node.nextAddress = lineArray[2];\n            nodes.add(node);\n        }\n\n\n        //按链表顺序加入队列\n        LinkedList\u0026#x3C;Node\u003e queue = new LinkedList\u0026#x3C;\u003e();\n        String address = firstAddress;\n        while (!address.equals(\"-1\")) {\n            for (int i = 0; i \u0026#x3C; nodes.size(); i++) { //循环匹配地址\n                Node n = nodes.get(i);\n                if (Objects.equals(address, n.address)) { //找到则加入队列\n                    queue.add(n);\n                    address = n.nextAddress; //查找地址赋值为当前节点的下一个地址\n                    nodes.remove(n); //处理完的移出节点数组，减少循环量\n                    break;\n                }\n            }\n        }\n\n        Stack\u0026#x3C;Node\u003e stack = new Stack\u0026#x3C;\u003e();\n        boolean isCanConvert = queue.size() \u003e= k; //是否够反转\n        while (!queue.isEmpty()) { //循环出队列\n            Node n = queue.remove();\n            if (isCanConvert) { //够反转则压入堆栈\n                stack.push(n);\n                if (stack.size() == k) { //压够反转数量就全部输出\n                    isCanConvert = queue.size() \u003e= k; //再次检查是否够反转\n                    while (!stack.isEmpty()) {\n                        //重新赋值next\n                        Node nStack = stack.pop();\n                        if (stack.isEmpty()) { //如果栈里没了，地址就等于队列的下一个\n                            if (queue.isEmpty()) { //队列也没了，地址等于-1\n                                nStack.nextAddress = \"-1\";\n                            } else {\n                                //如果剩下的还能反转\n                                if (isCanConvert) {\n                                    nStack.nextAddress = queue.get(k - 1).address;\n                                } else {\n                                    nStack.nextAddress = queue.peek().address;\n                                }\n                            }\n                        } else {\n                            nStack.nextAddress = stack.peek().address;\n                        }\n                        print(nStack);\n                    }\n                }\n            } else { //不够反转 直接输出节点\n                print(n);\n            }\n        }\n\n    }\n\n\n    private static void print(Node n) {\n        System.out.println(n.address + \" \" + n.data + \" \" + n.nextAddress);\n    }\n\n    private static String[] getStringArray(BufferedReader reader) {\n        String line1 = null;\n        try {\n            line1 = reader.readLine();\n        } catch (Exception ignore) {\n        }\n        return line1.split(\" \");\n    }\n\n    static class Node {\n        String address;\n        int data;\n        String nextAddress;\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结：\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e利用队列和栈解决顺序问题\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业2：Pop Sequence（25 分）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eGiven a stack which can keep M numbers at most. Push N numbers in the order of 1, 2, 3, ..., N and pop randomly. You are supposed to tell if a given sequence of numbers is a possible pop sequence of the stack. For example, if M is 5 and N is 7, we can obtain 1, 2, 3, 4, 5, 6, 7 from the stack, but not 3, 2, 1, 7, 5, 6, 4.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eInput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eEach input file contains one test case. For each case, the first line contains 3 numbers (all no more than 1000): M (the maximum capacity of the stack), N (the length of push sequence), and K (the number of pop sequences to be checked). Then K lines follow, each contains a pop sequence of N numbers. All the numbers in a line are separated by a space.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eOutput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eFor each pop sequence, print in one line \"YES\" if it is indeed a possible pop sequence of the stack, or \"NO\" if not.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eSample Input:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e5 7 5\n1 2 3 4 5 6 7\n3 2 1 7 5 6 4\n7 6 5 4 3 2 1\n5 6 4 3 7 2 1\n1 7 6 5 4 3 2\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003eSample Output:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eYES\nNO\nNO\nYES\nNO\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epublic class Main {\n    public static void main(String args[]) throws IOException {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n\n        int sum;\n        sum = Integer.parseInt(reader.readLine());\n\n        String[] inputs = new String[sum*2];\n\n        for (int i = 0; i \u0026#x3C; inputs.length; i++) {\n            inputs[i] = reader.readLine();\n        }\n\n        StringBuilder sb = new StringBuilder();\n\n        //Build Tree\n        Node root = buildTree(inputs);\n        //后序遍历打印\n        traversalsTree(root,sb);\n        \n\n        if (sb.length() \u003e 0) {\n            sb.deleteCharAt(sb.length() - 1);\n        }\n        System.out.println(sb.toString());\n    }\n\n\n    private static Node buildTree(String[] inputs) {\n        Node root =null;\n\n        Stack\u0026#x3C;Node\u003e nodes = new Stack\u0026#x3C;\u003e();\n        final String PUSH = \"Push\";\n        final String POP = \"Pop\";\n        Node lastPush = null;\n        Node lastPop = null;\n        String lastOperation = null;\n        int level = 0;\n        for (String input : inputs) {\n            String[] lineArg = input.split(\" \");\n            if (Objects.equals(lineArg[0], PUSH)) {\n                Node node = new Node();\n                node.data = Integer.parseInt(lineArg[1]);\n                node.level = level;\n                nodes.push(node);\n                if (lastOperation == null) {\n                    root = node;\n                } else if (Objects.equals(lastOperation, PUSH)) {\n                    lastPush.left = node;\n                } else if (Objects.equals(lastOperation, POP)) {\n                    lastPop.right = node;\n                }\n                lastPush = node;\n                lastOperation = PUSH;\n                level++;\n            } else {\n                lastPop = nodes.pop();\n                lastOperation = POP;\n                level--;\n            }\n        }\n        return root;\n    }\n\n    private static void traversalsTree(Node root, StringBuilder sb) {\n            if(root!=null) {\n                traversalsTree(root.left, sb);\n                traversalsTree(root.right, sb);\n                sb.append(root.data);\n                sb.append(' ');\n            }\n    }\n\n    static class Node {\n        int data = -1;\n        Node left;\n        Node right;\n        int level = 0;\n\n        @Override\n        public String toString() {\n            return \"Node{\" +\n                    \"data=\" + data +\n                    \", left=\" + (left==null?\"null\":left.data) +\n                    \", right=\" + (right==null?\"null\":right.data)+\n                    \", level=\" + level +\n                    '}';\n        }\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结：\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e通过先构建出原始树再后序遍历的方法解决了问题。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e优化方向：将后序遍历的递归方式改为非递归方式。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e此题应该可以在构建树时直接输出正确答案。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e非递归算法核心：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e首先要搞清楚先序、中序、后序的非递归算法共同之处：用栈来保存先前走过的路径，以便可以在访问完子树后,可以利用栈中的信息,回退到当前节点的双亲节点,进行下一步操作。\n后序遍历的非递归算法是三种顺序中最复杂的，原因在于，后序遍历是先访问左、右子树,再访问根节点，而在非递归算法中，利用栈回退到时，并不知道是从左子树回退到根节点，还是从右子树回退到根节点，如果从左子树回退到根节点，此时就应该去访问右子树，而如果从右子树回退到根节点，此时就应该访问根节点。所以相比前序和后序，必须得在压栈时添加信息，以便在退栈时可以知道是从左子树返回，还是从右子树返回进而决定下一步的操作。\u003c/p\u003e\n","content":"\n\n\u003e 树状结构的基础是二叉树，二叉树即度为2的树。\n\n## 二叉树的链表结构\n\n```c\ntypedef struct TNode *Position;\ntypedef Position BinTree; /* 二叉树类型 */\nstruct TNode{ /* 树结点定义 */\n    ElementType Data; /* 结点数据 */\n    BinTree Left;     /* 指向左子树 */\n    BinTree Right;    /* 指向右子树 */\n};\n```\n\n\n\u003c!--more--\u003e\n\n## 作业1：树的同构\n\n给定两棵树T1和T2。如果T1可以通过若干次左右孩子互换就变成T2，则我们称两棵树是“同构”的。例如图1给出的两棵树就是同构的，因为我们把其中一棵树的结点A、B、G的左右孩子互换后，就得到另外一棵树。而图2就不是同构的。\n图1：\n![图1](/images/20180326_data_structures03_1.png)\n图2：\n![图2](/images/20180326_data_structures03_2.png)\n现给定两棵树，请你判断它们是否是同构的。\n\n- 输入格式:\n\n输入给出2棵二叉树树的信息。对于每棵树，首先在一行中给出一个非负整数N (≤10)，即该树的结点数（此时假设结点从0到N−1编号）；随后N行，第i行对应编号第i个结点，给出该结点中存储的1个英文大写字母、其左孩子结点的编号、右孩子结点的编号。如果孩子结点为空，则在相应位置上给出`-`。给出的数据间用一个空格分隔。注意：题目保证每个结点中存储的字母是不同的。\n\n- 输出格式:\n\n如果两棵树是同构的，输出`Yes`，否则输出`No`。\n\n- 输入样例1（对应图1）：\n\n```bash\n8\nA 1 2\nB 3 4\nC 5 -\nD - -\nE 6 -\nG 7 -\nF - -\nH - -\n8\nG - 4\nB 7 6\nF - -\nA 5 1\nH - -\nC 0 -\nD - -\nE 2 -\n```\n\n- 输出样例1:\n\n```bash\nYes\n```\n- 输入样例2（对应图2）：\n\n```bash\n8\nB 5 7\nF - -\nA 0 3\nC 6 -\nH - -\nD - -\nG 4 -\nE 1 -\n8\nD 6 -\nB 5 -\nE - -\nH - -\nC 0 2\nG - 3\nF - -\nA 1 4\n```\n- 输出样例2:\n\n```bash\nNo\n```\n\n- 实现：\n\n```java\npublic class Main {\n    public static void main(String args[]) throws IOException {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n        //读第一个树节点\n        int n_a = 0;\n        n_a = Integer.parseInt(reader.readLine());\n\n        String[] inputs_a = new String[n_a];\n        List\u003cNode\u003e nodes_a = new ArrayList\u003c\u003e(n_a);\n\n        for (int i = 0; i \u003c n_a; i++) {\n            inputs_a[i] = reader.readLine();\n        }\n\n\n        int n_b = 0;\n        n_b = Integer.parseInt(reader.readLine());\n\n        String[] inputs_b = new String[n_b];\n        List\u003cNode\u003e nodes_b = new ArrayList\u003c\u003e(n_b);\n\n        for (int i = 0; i \u003c n_b; i++) {\n            inputs_b[i] = reader.readLine();\n        }\n\n        if (n_a != n_b) {\n            System.out.println(\"No\");\n            return;\n        }\n\n        addNodes(inputs_a, nodes_a);\n        addNodes(inputs_b, nodes_b);\n\n        if(inputs_a.length==1\u0026\u0026!Objects.equals(nodes_a.get(0).data,nodes_b.get(0).data)){\n            System.out.println(\"No\");\n            return;\n        }\n\n        for (Node node_a : nodes_a) {\n            for (Node node_b : nodes_b) {\n                if (Objects.equals(node_a.data, node_b.data)) {\n                    if (!((Objects.equals(node_a.left, node_b.left) \u0026\u0026 Objects.equals(node_a.right, node_b.right))\n                            || (Objects.equals(node_a.left, node_b.right) \u0026\u0026 Objects.equals(node_a.right, node_b.left)))) {\n                        System.out.println(\"No\");\n                        return;\n                    }\n                }\n            }\n        }\n\n        System.out.println(\"Yes\");\n    }\n\n\n    private static void addNodes(String[] inputs, List\u003cNode\u003e nodes) {\n        for (String input : inputs) {\n            Node n = new Node();\n            String[] lineArg = input.split(\" \");\n            n.data = lineArg[0];\n            if (!Objects.equals(\"-\", lineArg[1])) {\n                int left_num = Integer.parseInt(lineArg[1]);\n                n.left = inputs[left_num].split(\" \")[0];\n            }\n            if (!Objects.equals(\"-\", lineArg[2])) {\n                int right_num = Integer.parseInt(lineArg[2]);\n                n.right = inputs[right_num].split(\" \")[0];\n            }\n            nodes.add(n);\n        }\n    }\n\n    static class Node {\n        String data;\n        String left;\n        String right;\n    }\n}\n\n```\n\n- 总结:\n\n1. 利用二叉树的数据结构可以解决这个问题。\n2. 这里我采用了投机取巧的办法，并没有建立树状结构，而是把每个节点进行比较，唯一需要处理的特例就是同唯一父节点值不同的情况。\n\n## 作业2：List Leaves（25 分）\n\nGiven a tree, you are supposed to list all the leaves in the order of top down, and left to right.\n\n- Input Specification:\n\nEach input file contains one test case. For each case, the first line gives a positive integer N (≤10) which is the total number of nodes in the tree -- and hence the nodes are numbered from 0 to N−1. Then N lines follow, each corresponds to a node, and gives the indices of the left and right children of the node. If the child does not exist, a \"-\" will be put at the position. Any pair of children are separated by a space.\n\n- Output Specification:\n\nFor each test case, print in one line all the leaves' indices in the order of top down, and left to right. There must be exactly one space between any adjacent numbers, and no extra space at the end of the line.\n\n- Sample Input:\n\n```bash\n8\n1 -\n- -\n0 -\n2 7\n- -\n- -\n5 -\n4 6\n```\nSample Output:\n\n\n```bash\n4 1 5\n```\n\n- 实现：\n\n```java\npublic class Main {\n    public static void main(String args[]) throws IOException {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n\n        int sum;\n        sum = Integer.parseInt(reader.readLine());\n\n        String[] inputs = new String[sum];\n\n        for (int i = 0; i \u003c sum; i++) {\n            inputs[i] = reader.readLine();\n        }\n\n        int root_num = findRoot(inputs);\n        StringBuilder sb = new StringBuilder();\n        Queue\u003cNode\u003e nodes = new LinkedList\u003c\u003e();\n\n        Node root =  getNode(root_num,inputs[root_num]);\n        nodes.add(root);\n        checkTree(nodes, sb, inputs);\n        if (sb.length() \u003e 0) {\n            sb.deleteCharAt(sb.length() - 1);\n        }\n        System.out.println(sb.toString());\n    }\n\n    private static Node getNode(int root_num, String input) {\n        Node node = new Node();\n        node.data = root_num;\n        String[] lineArg = input.split(\" \");\n        if (!Objects.equals(\"-\", lineArg[0])) {\n            node.left = Integer.parseInt(lineArg[0]);\n        }\n        if (!Objects.equals(\"-\", lineArg[1])) {\n            node.right = Integer.parseInt(lineArg[1]);\n        }\n        return node;\n    }\n\n    private static void checkTree(Queue\u003cNode\u003e nodes, StringBuilder sb, String[] inputs) {\n        while (!nodes.isEmpty()) {\n            Node node = nodes.poll();\n            if (node.left\u003c0 \u0026\u0026 node.right\u003c0) {\n                sb.append(node.data);\n                sb.append(' ');\n            }\n            if (node.left\u003e=0) {\n                Node n_l = getNode(node.left,inputs[node.left]);\n                nodes.add(n_l);\n            }\n            if (node.right\u003e=0) {\n                Node n_r = getNode(node.right,inputs[node.right]);\n                nodes.add(n_r);\n            }\n        }\n    }\n\n\n    private static int findRoot(String[] inputs) {\n        int[] link = new int[inputs.length];\n        for (String input : inputs) {\n            String[] lineArg = input.split(\" \");\n            if (!Objects.equals(\"-\", lineArg[0])) {\n                int left_num = Integer.parseInt(lineArg[0]);\n                link[left_num] = 1;\n            }\n            if (!Objects.equals(\"-\", lineArg[1])) {\n                int right_num = Integer.parseInt(lineArg[1]);\n                link[right_num] = 1;\n            }\n        }\n        int i;\n        for (i = 0; i \u003c link.length; i++) {\n            if (link[i] == 0) {\n                break;\n            }\n        }\n\n        return i;\n    }\n\n    static class Node{\n        int data =-1;\n        int left = -1;\n        int right = -1;\n    }\n}\n\n```\n\n- 总结：\n\n1. 树的遍历最基本的方法是采用递归；\n2. 使用堆栈可以免递归遍历树，每个对象有3次访问机会，调整访问时机可以分别实现前序、中序及后序遍历；\n3. 采用队列可以层级遍历树，此题采用层级遍历。\n\n## 作业3：Tree Traversals Again（25 分）\n\nAn inorder binary tree traversal can be implemented in a non-recursive way with a stack. For example, suppose that when a 6-node binary tree (with the keys numbered from 1 to 6) is traversed, the stack operations are: push(1); push(2); push(3); pop(); pop(); push(4); pop(); pop(); push(5); push(6); pop(); pop(). Then a unique binary tree (shown in Figure 1) can be generated from this sequence of operations. Your task is to give the postorder traversal sequence of this tree.\n\n- Figure 1\n\n![Figure 1](/images/20180327_data_structures03_3.png)\n\n- Input Specification:\n\nEach input file contains one test case. For each case, the first line contains a positive integer N (≤30) which is the total number of nodes in a tree (and hence the nodes are numbered from 1 to N). Then 2N lines follow, each describes a stack operation in the format: \"Push X\" where X is the index of the node being pushed onto the stack; or \"Pop\" meaning to pop one node from the stack.\n\n- Output Specification:\n\nFor each test case, print the postorder traversal sequence of the corresponding tree in one line. A solution is guaranteed to exist. All the numbers must be separated by exactly one space, and there must be no extra space at the end of the line.\n\n- Sample Input:\n\n```bash\n6\nPush 1\nPush 2\nPush 3\nPop\nPop\nPush 4\nPop\nPop\nPush 5\nPush 6\nPop\nPop\n```\n- Sample Output:\n\n```bash\n3 4 2 6 5 1\n```\n\n- 实现：\n\n```java\npackage cn.wycode;\n\nimport java.io.BufferedReader;\nimport java.io.InputStreamReader;\nimport java.util.ArrayList;\nimport java.util.LinkedList;\nimport java.util.Objects;\nimport java.util.Stack;\n\npublic class Main {\n    public static void main(String args[]) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n        //读第一行\n        String[] line1Array = getStringArray(reader);\n        String firstAddress = line1Array[0];\n        int count = Integer.parseInt(line1Array[1]);\n        int k = Integer.parseInt(line1Array[2]);\n\n        //读取所有节点\n        ArrayList\u003cNode\u003e nodes = new ArrayList\u003c\u003e(count);\n        for (int i = 0; i \u003c count; i++) {\n            String[] lineArray = getStringArray(reader);\n            Node node = new Node();\n            node.address = lineArray[0];\n            node.data = Integer.parseInt(lineArray[1]);\n            node.nextAddress = lineArray[2];\n            nodes.add(node);\n        }\n\n\n        //按链表顺序加入队列\n        LinkedList\u003cNode\u003e queue = new LinkedList\u003c\u003e();\n        String address = firstAddress;\n        while (!address.equals(\"-1\")) {\n            for (int i = 0; i \u003c nodes.size(); i++) { //循环匹配地址\n                Node n = nodes.get(i);\n                if (Objects.equals(address, n.address)) { //找到则加入队列\n                    queue.add(n);\n                    address = n.nextAddress; //查找地址赋值为当前节点的下一个地址\n                    nodes.remove(n); //处理完的移出节点数组，减少循环量\n                    break;\n                }\n            }\n        }\n\n        Stack\u003cNode\u003e stack = new Stack\u003c\u003e();\n        boolean isCanConvert = queue.size() \u003e= k; //是否够反转\n        while (!queue.isEmpty()) { //循环出队列\n            Node n = queue.remove();\n            if (isCanConvert) { //够反转则压入堆栈\n                stack.push(n);\n                if (stack.size() == k) { //压够反转数量就全部输出\n                    isCanConvert = queue.size() \u003e= k; //再次检查是否够反转\n                    while (!stack.isEmpty()) {\n                        //重新赋值next\n                        Node nStack = stack.pop();\n                        if (stack.isEmpty()) { //如果栈里没了，地址就等于队列的下一个\n                            if (queue.isEmpty()) { //队列也没了，地址等于-1\n                                nStack.nextAddress = \"-1\";\n                            } else {\n                                //如果剩下的还能反转\n                                if (isCanConvert) {\n                                    nStack.nextAddress = queue.get(k - 1).address;\n                                } else {\n                                    nStack.nextAddress = queue.peek().address;\n                                }\n                            }\n                        } else {\n                            nStack.nextAddress = stack.peek().address;\n                        }\n                        print(nStack);\n                    }\n                }\n            } else { //不够反转 直接输出节点\n                print(n);\n            }\n        }\n\n    }\n\n\n    private static void print(Node n) {\n        System.out.println(n.address + \" \" + n.data + \" \" + n.nextAddress);\n    }\n\n    private static String[] getStringArray(BufferedReader reader) {\n        String line1 = null;\n        try {\n            line1 = reader.readLine();\n        } catch (Exception ignore) {\n        }\n        return line1.split(\" \");\n    }\n\n    static class Node {\n        String address;\n        int data;\n        String nextAddress;\n    }\n}\n\n```\n\n\n- 总结：\n\n1. 利用队列和栈解决顺序问题\n\n## 作业2：Pop Sequence（25 分）\n\n\nGiven a stack which can keep M numbers at most. Push N numbers in the order of 1, 2, 3, ..., N and pop randomly. You are supposed to tell if a given sequence of numbers is a possible pop sequence of the stack. For example, if M is 5 and N is 7, we can obtain 1, 2, 3, 4, 5, 6, 7 from the stack, but not 3, 2, 1, 7, 5, 6, 4.\n\nInput Specification:\n\nEach input file contains one test case. For each case, the first line contains 3 numbers (all no more than 1000): M (the maximum capacity of the stack), N (the length of push sequence), and K (the number of pop sequences to be checked). Then K lines follow, each contains a pop sequence of N numbers. All the numbers in a line are separated by a space.\n\nOutput Specification:\n\nFor each pop sequence, print in one line \"YES\" if it is indeed a possible pop sequence of the stack, or \"NO\" if not.\n\nSample Input:\n```bash\n5 7 5\n1 2 3 4 5 6 7\n3 2 1 7 5 6 4\n7 6 5 4 3 2 1\n5 6 4 3 7 2 1\n1 7 6 5 4 3 2\n```\nSample Output:\n```bash\nYES\nNO\nNO\nYES\nNO\n```\n\n- 实现\n\n```java\npublic class Main {\n    public static void main(String args[]) throws IOException {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n\n        int sum;\n        sum = Integer.parseInt(reader.readLine());\n\n        String[] inputs = new String[sum*2];\n\n        for (int i = 0; i \u003c inputs.length; i++) {\n            inputs[i] = reader.readLine();\n        }\n\n        StringBuilder sb = new StringBuilder();\n\n        //Build Tree\n        Node root = buildTree(inputs);\n        //后序遍历打印\n        traversalsTree(root,sb);\n        \n\n        if (sb.length() \u003e 0) {\n            sb.deleteCharAt(sb.length() - 1);\n        }\n        System.out.println(sb.toString());\n    }\n\n\n    private static Node buildTree(String[] inputs) {\n        Node root =null;\n\n        Stack\u003cNode\u003e nodes = new Stack\u003c\u003e();\n        final String PUSH = \"Push\";\n        final String POP = \"Pop\";\n        Node lastPush = null;\n        Node lastPop = null;\n        String lastOperation = null;\n        int level = 0;\n        for (String input : inputs) {\n            String[] lineArg = input.split(\" \");\n            if (Objects.equals(lineArg[0], PUSH)) {\n                Node node = new Node();\n                node.data = Integer.parseInt(lineArg[1]);\n                node.level = level;\n                nodes.push(node);\n                if (lastOperation == null) {\n                    root = node;\n                } else if (Objects.equals(lastOperation, PUSH)) {\n                    lastPush.left = node;\n                } else if (Objects.equals(lastOperation, POP)) {\n                    lastPop.right = node;\n                }\n                lastPush = node;\n                lastOperation = PUSH;\n                level++;\n            } else {\n                lastPop = nodes.pop();\n                lastOperation = POP;\n                level--;\n            }\n        }\n        return root;\n    }\n\n    private static void traversalsTree(Node root, StringBuilder sb) {\n            if(root!=null) {\n                traversalsTree(root.left, sb);\n                traversalsTree(root.right, sb);\n                sb.append(root.data);\n                sb.append(' ');\n            }\n    }\n\n    static class Node {\n        int data = -1;\n        Node left;\n        Node right;\n        int level = 0;\n\n        @Override\n        public String toString() {\n            return \"Node{\" +\n                    \"data=\" + data +\n                    \", left=\" + (left==null?\"null\":left.data) +\n                    \", right=\" + (right==null?\"null\":right.data)+\n                    \", level=\" + level +\n                    '}';\n        }\n    }\n}\n\n```\n\n- 总结：\n\n1. 通过先构建出原始树再后序遍历的方法解决了问题。\n2. 优化方向：将后序遍历的递归方式改为非递归方式。\n3. 此题应该可以在构建树时直接输出正确答案。\n\n- 非递归算法核心：\n\n首先要搞清楚先序、中序、后序的非递归算法共同之处：用栈来保存先前走过的路径，以便可以在访问完子树后,可以利用栈中的信息,回退到当前节点的双亲节点,进行下一步操作。\n后序遍历的非递归算法是三种顺序中最复杂的，原因在于，后序遍历是先访问左、右子树,再访问根节点，而在非递归算法中，利用栈回退到时，并不知道是从左子树回退到根节点，还是从右子树回退到根节点，如果从左子树回退到根节点，此时就应该去访问右子树，而如果从右子树回退到根节点，此时就应该访问根节点。所以相比前序和后序，必须得在压栈时添加信息，以便在退栈时可以知道是从左子树返回，还是从右子树返回进而决定下一步的操作。","data":{"title":"数据结构与算法学习笔记03","date":"2018-03-26","tags":["C"],"category":"Computer Science"},"isEmpty":false,"excerpt":"\n\n\u003e 树状结构的基础是二叉树，二叉树即度为2的树。\n\n## 二叉树的链表结构\n\n```c\ntypedef struct TNode *Position;\ntypedef Position BinTree; /* 二叉树类型 */\nstruct TNode{ /* 树结点定义 */\n    ElementType Data; /* 结点数据 */\n    BinTree Left;     /* 指向左子树 */\n    BinTree Right;    /* 指向右子树 */\n};\n```\n\n\n"}],"page":7,"total":15},"__N_SSG":true},"page":"/blog/page/[page]","query":{"page":"7"},"buildId":"KYANdil3ljfaQ9_rbwOmo","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
