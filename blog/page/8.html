b-4\"\u003e这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactInstanceManager\u003c/code\u003e有点长，通过一系列方法调用，最后通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecreateReactContext()\u003c/code\u003e方法创建了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactApplicationContext\u003c/code\u003e的实例，并创建了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCatalystInstance\u003c/code\u003e用于初始化\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereactContext\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在初始化\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereactContext\u003c/code\u003e之前又调用了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecatalystInstance.runJSBundle();\u003c/code\u003e，猜想这里是调用JS代码的入口，这里的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCatalystInstance\u003c/code\u003e是个接口，我们要查看\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCatalystInstanceImpl\u003c/code\u003e来看看具体实现。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e核心类CatalystInstanceImpl\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\n···\n\n/**\n * This provides an implementation of the public CatalystInstance instance.  It is public because\n * it is built by XReactInstanceManager which is in a different package.\n */\n@DoNotStrip\npublic class CatalystInstanceImpl implements CatalystInstance {\n  \n  ···\n\n  public static class PendingJSCall {\n\n    ···\n\n    void call(CatalystInstanceImpl catalystInstance) {\n      NativeArray arguments = mArguments != null ? mArguments : new WritableNativeArray();\n      catalystInstance.jniCallJSFunction(mModule, mMethod, arguments);\n    }\n\n    ···\n  }\n\n  ···\n\n  private native void jniSetSourceURL(String sourceURL);\n  private native void jniRegisterSegment(int segmentId, String path);\n  private native void jniLoadScriptFromAssets(AssetManager assetManager, String assetURL, boolean loadSynchronously);\n  private native void jniLoadScriptFromFile(String fileName, String sourceURL, boolean loadSynchronously);\n\n  @Override\n  public void runJSBundle() {\n    static {\n      ReactBridge.staticInit();\n    }\n    ···\n    mJSBundleLoader.loadScript(CatalystInstanceImpl.this);\n\n    synchronized (mJSCallsPendingInitLock) {\n\n      // Loading the bundle is queued on the JS thread, but may not have\n      // run yet.  It's safe to set this here, though, since any work it\n      // gates will be queued on the JS thread behind the load.\n      mAcceptCalls = true;\n\n      for (PendingJSCall function : mJSCallsPendingInit) {\n        function.call(this);\n      }\n      mJSCallsPendingInit.clear();\n      mJSBundleHasLoaded = true;\n    }\n\n    ···\n  }\n\n  private native void jniCallJSFunction(\n    String module,\n    String method,\n    NativeArray arguments);\n\n  ···\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emJSBundleLoader.loadScript()\u003c/code\u003e去加载js，然后把js函数构建为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ePendingJSCall\u003c/code\u003e放到一个列表里逐个执行，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ePendingJSCall\u003c/code\u003e的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecall()\u003c/code\u003e方法最终调用了C++层的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ejniCallJSFunction()\u003c/code\u003e函数。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e文件开头使用静态代码块\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactBridge.staticInit()\u003c/code\u003e装载了名为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereactnativejni\u003c/code\u003e的so文件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e至此java层源码就追完了，我们接着看c++层源码\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eC++层\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-c++ px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e···\n\nnamespace facebook {\nnamespace react {\n\n···\n\nvoid CatalystInstanceImpl::initializeBridge(\n    jni::alias_ref\u0026#x3C;ReactCallback::javaobject\u003e callback,\n    // This executor is actually a factory holder.\n    JavaScriptExecutorHolder* jseh,\n    jni::alias_ref\u0026#x3C;JavaMessageQueueThread::javaobject\u003e jsQueue,\n    jni::alias_ref\u0026#x3C;JavaMessageQueueThread::javaobject\u003e nativeModulesQueue,\n    jni::alias_ref\u0026#x3C;jni::JCollection\u0026#x3C;JavaModuleWrapper::javaobject\u003e::javaobject\u003e javaModules,\n    jni::alias_ref\u0026#x3C;jni::JCollection\u0026#x3C;ModuleHolder::javaobject\u003e::javaobject\u003e cxxModules) {\n  // TODO mhorowitz: how to assert here?\n  // Assertions.assertCondition(mBridge == null, \"initializeBridge should be called once\");\n  moduleMessageQueue_ = std::make_shared\u0026#x3C;JMessageQueueThread\u003e(nativeModulesQueue);\n\n  // This used to be:\n  //\n  // Java CatalystInstanceImpl -\u003e C++ CatalystInstanceImpl -\u003e Bridge -\u003e Bridge::Callback\n  // --weak--\u003e ReactCallback -\u003e Java CatalystInstanceImpl\n  //\n  // Now the weak ref is a global ref.  So breaking the loop depends on\n  // CatalystInstanceImpl#destroy() calling mHybridData.resetNative(), which\n  // should cause all the C++ pointers to be cleaned up (except C++\n  // CatalystInstanceImpl might be kept alive for a short time by running\n  // callbacks). This also means that all native calls need to be pre-checked\n  // to avoid NPE.\n\n  // See the comment in callJSFunction.  Once js calls switch to strings, we\n  // don't need jsModuleDescriptions any more, all the way up and down the\n  // stack.\n\n  moduleRegistry_ = std::make_shared\u0026#x3C;ModuleRegistry\u003e(\n    buildNativeModuleList(\n       std::weak_ptr\u0026#x3C;Instance\u003e(instance_),\n       javaModules,\n       cxxModules,\n       moduleMessageQueue_));\n\n  instance_-\u003einitializeBridge(\n    folly::make_unique\u0026#x3C;JInstanceCallback\u003e(\n    callback,\n    moduleMessageQueue_),\n    jseh-\u003egetExecutorFactory(),\n    folly::make_unique\u0026#x3C;JMessageQueueThread\u003e(jsQueue),\n    moduleRegistry_);\n}\n\n···\n\nvoid CatalystInstanceImpl::jniCallJSFunction(std::string module, std::string method, NativeArray* arguments) {\n  // We want to share the C++ code, and on iOS, modules pass module/method\n  // names as strings all the way through to JS, and there's no way to do\n  // string -\u003e id mapping on the objc side.  So on Android, we convert the\n  // number to a string, here which gets passed as-is to JS.  There, they they\n  // used as ids if isFinite(), which handles this case, and looked up as\n  // strings otherwise.  Eventually, we'll probably want to modify the stack\n  // from the JS proxy through here to use strings, too.\n  instance_-\u003ecallJSFunction(std::move(module),\n                            std::move(method),\n                            arguments-\u003econsume());\n}\n\n···\n\n}}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e在这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCatalystInstanceImpl.cpp\u003c/code\u003e中可以发现c++对于js的调用。以及非常棒的两段注释。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eReact Navtive 通过C++层去解释执行JS，从而达到一个比较好的性能。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e总结\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通过此文算是搞明白了，Android系统是怎么样去执行JavaScript代码的。\n但React Native又是如何将JS中的组件渲染成Android原生组件的仍然是个疑问。\n以后再研究吧...\u003c/p\u003e\n","content":"\n![React](/images/20180213_react.png)\n\n\u003e Facebook的React Native是比基于WebView更先进的跨平台解决方案。实现了只编写一次JavaScript代码即可同时生成Android及iOS应用，并且同时拥有原生控件的性能。此篇文章我将从React Native Android端源码中探究它到底是如何做到的。以及实现的思路，架构的设计等。\n\n\n\u003c!--more--\u003e\n\n## 核心类ReactActivity\n\n使用`react-native-cli`生成工程文件，打开工程目录，发现有一个入口Activity：`MainActivity`继承自`ReactActivity`抽象类。这个`ReactActivity`是React Native项目的唯一一个Activity，可以猜想其采用了单Activity的架构。回想Unity,LibGDX这样的游戏引擎，也是采用了这样的模式。\n\n```java\n...\n\n/**\n * Base Activity for React Native applications.\n */\npublic abstract class ReactActivity extends Activity\n    implements DefaultHardwareBackBtnHandler, PermissionAwareActivity {\n\n  private final ReactActivityDelegate mDelegate;\n\n  protected ReactActivity() {\n    mDelegate = createReactActivityDelegate();\n  }\n\n  ...\n\n  @Override\n  protected void onCreate(Bundle savedInstanceState) {\n    super.onCreate(savedInstanceState);\n    mDelegate.onCreate(savedInstanceState);\n  }\n...\n```\n\n可以发现在Android框架创建`ReactActivity`实例的同时会创建一个`ReactActivityDelegate`对象。\n\n然后`ReactActivity`将Activity的生命周期方法和一些回调方法注入到这个`ReactActivityDelegate`对象中。\n\n看看这个`ReactActivityDelegate`都在干啥。\n\n\n## 核心类ReactActivityDelegate\n\n```java\n...\n\n/**\n * Delegate class for {@link ReactActivity} and {@link ReactFragmentActivity}. You can subclass this\n * to provide custom implementations for e.g. {@link #getReactNativeHost()}, if your Application\n * class doesn't implement {@link ReactApplication}.\n */\npublic class ReactActivityDelegate {\n\n  ···\n\n  private @Nullable ReactRootView mReactRootView;\n\n  ...\n\n  protected void onCreate(Bundle savedInstanceState) {\n    if (mMainComponentName != null) {\n      loadApp(mMainComponentName);\n    }\n    mDoubleTapReloadRecognizer = new DoubleTapReloadRecognizer();\n  }\n\n  protected void loadApp(String appKey) {\n    if (mReactRootView != null) {\n      throw new IllegalStateException(\"Cannot loadApp while app is already running.\");\n    }\n    mReactRootView = createRootView();\n    mReactRootView.startReactApplication(\n      getReactNativeHost().getReactInstanceManager(),\n      appKey,\n      getLaunchOptions());\n    getPlainActivity().setContentView(mReactRootView);\n  }\n\n  ...\n}\n\n```\n\n\n`ReactActivityDelegate`在`OnCreate`方法中调用`loadApp`方法，然后创建了一个`ReactRootView`,并调用了`ReactRootView`的`startReactApplication`方法，最后将这个`ReactRootView`作为Activity的根View显示。\n\n继续看这个`ReactRootView`。\n\n## 核心类ReactRootView\n\n```java\n\n···\n\npublic class ReactRootView extends SizeMonitoringFrameLayout\n    implements RootView, MeasureSpecProvider {\n\n  ···\n\n  /**\n   * Schedule rendering of the react component rendered by the JS application from the given JS\n   * module (@{param moduleName}) using provided {@param reactInstanceManager} to attach to the\n   * JS context of that manager. Extra parameter {@param launchOptions} can be used to pass initial\n   * properties for the react component.\n   */\n  public void startReactApplication(\n      ReactInstanceManager reactInstanceManager,\n      String moduleName,\n      @Nullable Bundle initialProperties) {\n      \n      ···\n\n      if (!mReactInstanceManager.hasStartedCreatingInitialContext()) {\n        mReactInstanceManager.createReactContextInBackground();\n      }\n      \n      ···\n  }\n\n  ···\n}\n\n```\n\n这个`startReactApplication()`方法，最终调用了`ReactInstanceManager`对象的`createReactContextInBackground()`方法。\n\n继续追这个`ReactInstanceManager`。\n\n## 核心类ReactInstanceManager\n\n```java\n···\n\n@ThreadSafe\npublic class ReactInstanceManager {\n\n  ···\n\n  @ThreadConfined(UI)\n  public void createReactContextInBackground() {\n    ···\n    recreateReactContextInBackgroundInner();\n  }\n\n  ···\n\n  \n  @ThreadConfined(UI)\n  public void recreateReactContextInBackground() {\n    ···\n    recreateReactContextInBackgroundInner();\n  }\n\n  @ThreadConfined(UI)\n  private void recreateReactContextInBackgroundInner() {\n    ···\n    recreateReactContextInBackgroundFromBundleLoader();\n  }\n\n  @ThreadConfined(UI)\n  private void recreateReactContextInBackgroundFromBundleLoader() {\n    ···\n    recreateReactContextInBackground(mJavaScriptExecutorFactory, mBundleLoader);\n  }\n\n  ···\n\n  @ThreadConfined(UI)\n  private void recreateReactContextInBackground(\n    JavaScriptExecutorFactory jsExecutorFactory,\n    JSBundleLoader jsBundleLoader) {\n    ···\n      runCreateReactContextOnNewThread(initParams);\n    ···\n  }\n\n  @ThreadConfined(UI)\n  private void runCreateReactContextOnNewThread(final ReactContextInitParams initParams) {\n    ···\n    mCreateReactContextThread =\n        new Thread(\n            new Runnable() {\n              @Override\n              public void run() {\n                ···\n                \n                  final ReactApplicationContext reactApplicationContext =\n                      createReactContext(\n                          initParams.getJsExecutorFactory().create(),\n                          initParams.getJsBundleLoader());\n\n                 ···\n                  Runnable setupReactContextRunnable =\n                      new Runnable() {\n                        @Override\n                        public void run() {\n                          try {\n                            setupReactContext(reactApplicationContext);\n                          } catch (Exception e) {\n                            mDevSupportManager.handleException(e);\n                          }\n                        }\n                      };\n\n                  reactApplicationContext.runOnNativeModulesQueueThread(setupReactContextRunnable);\n                 ···\n              }\n            });\n    ···\n    mCreateReactContextThread.start();\n  }\n\n  ···\n\n  /**\n   * @return instance of {@link ReactContext} configured a {@link CatalystInstance} set\n   */\n  private ReactApplicationContext createReactContext(\n      JavaScriptExecutor jsExecutor,\n      JSBundleLoader jsBundleLoader) {\n    ···\n    final ReactApplicationContext reactContext = new ReactApplicationContext(mApplicationContext);\n\n    ···\n    CatalystInstanceImpl.Builder catalystInstanceBuilder = new CatalystInstanceImpl.Builder()\n      .setReactQueueConfigurationSpec(ReactQueueConfigurationSpec.createDefault())\n      .setJSExecutor(jsExecutor)\n      .setRegistry(nativeModuleRegistry)\n      .setJSBundleLoader(jsBundleLoader)\n      .setNativeModuleCallExceptionHandler(exceptionHandler);\n\n    ···\n      catalystInstance = catalystInstanceBuilder.build();\n    \n    ···\n    catalystInstance.runJSBundle();\n    reactContext.initializeWithInstance(catalystInstance);\n\n    return reactContext;\n  }\n\n  ···\n}\n\n```\n\n这个`ReactInstanceManager`有点长，通过一系列方法调用，最后通过`createReactContext()`方法创建了`ReactApplicationContext`的实例，并创建了`CatalystInstance`用于初始化`reactContext`。\n\n在初始化`reactContext`之前又调用了`catalystInstance.runJSBundle();`，猜想这里是调用JS代码的入口，这里的`CatalystInstance`是个接口，我们要查看`CatalystInstanceImpl`来看看具体实现。\n\n## 核心类CatalystInstanceImpl\n\n```java\n\n···\n\n/**\n * This provides an implementation of the public CatalystInstance instance.  It is public because\n * it is built by XReactInstanceManager which is in a different package.\n */\n@DoNotStrip\npublic class CatalystInstanceImpl implements CatalystInstance {\n  \n  ···\n\n  public static class PendingJSCall {\n\n    ···\n\n    void call(CatalystInstanceImpl catalystInstance) {\n      NativeArray arguments = mArguments != null ? mArguments : new WritableNativeArray();\n      catalystInstance.jniCallJSFunction(mModule, mMethod, arguments);\n    }\n\n    ···\n  }\n\n  ···\n\n  private native void jniSetSourceURL(String sourceURL);\n  private native void jniRegisterSegment(int segmentId, String path);\n  private native void jniLoadScriptFromAssets(AssetManager assetManager, String assetURL, boolean loadSynchronously);\n  private native void jniLoadScriptFromFile(String fileName, String sourceURL, boolean loadSynchronously);\n\n  @Override\n  public void runJSBundle() {\n    static {\n      ReactBridge.staticInit();\n    }\n    ···\n    mJSBundleLoader.loadScript(CatalystInstanceImpl.this);\n\n    synchronized (mJSCallsPendingInitLock) {\n\n      // Loading the bundle is queued on the JS thread, but may not have\n      // run yet.  It's safe to set this here, though, since any work it\n      // gates will be queued on the JS thread behind the load.\n      mAcceptCalls = true;\n\n      for (PendingJSCall function : mJSCallsPendingInit) {\n        function.call(this);\n      }\n      mJSCallsPendingInit.clear();\n      mJSBundleHasLoaded = true;\n    }\n\n    ···\n  }\n\n  private native void jniCallJSFunction(\n    String module,\n    String method,\n    NativeArray arguments);\n\n  ···\n}\n\n```\n\n这里通过`mJSBundleLoader.loadScript()`去加载js，然后把js函数构建为`PendingJSCall`放到一个列表里逐个执行，`PendingJSCall`的`call()`方法最终调用了C++层的`jniCallJSFunction()`函数。\n\n文件开头使用静态代码块`ReactBridge.staticInit()`装载了名为`reactnativejni`的so文件。\n\n至此java层源码就追完了，我们接着看c++层源码\n\n## C++层\n\n```c++\n···\n\nnamespace facebook {\nnamespace react {\n\n···\n\nvoid CatalystInstanceImpl::initializeBridge(\n    jni::alias_ref\u003cReactCallback::javaobject\u003e callback,\n    // This executor is actually a factory holder.\n    JavaScriptExecutorHolder* jseh,\n    jni::alias_ref\u003cJavaMessageQueueThread::javaobject\u003e jsQueue,\n    jni::alias_ref\u003cJavaMessageQueueThread::javaobject\u003e nativeModulesQueue,\n    jni::alias_ref\u003cjni::JCollection\u003cJavaModuleWrapper::javaobject\u003e::javaobject\u003e javaModules,\n    jni::alias_ref\u003cjni::JCollection\u003cModuleHolder::javaobject\u003e::javaobject\u003e cxxModules) {\n  // TODO mhorowitz: how to assert here?\n  // Assertions.assertCondition(mBridge == null, \"initializeBridge should be called once\");\n  moduleMessageQueue_ = std::make_shared\u003cJMessageQueueThread\u003e(nativeModulesQueue);\n\n  // This used to be:\n  //\n  // Java CatalystInstanceImpl -\u003e C++ CatalystInstanceImpl -\u003e Bridge -\u003e Bridge::Callback\n  // --weak--\u003e ReactCallback -\u003e Java CatalystInstanceImpl\n  //\n  // Now the weak ref is a global ref.  So breaking the loop depends on\n  // CatalystInstanceImpl#destroy() calling mHybridData.resetNative(), which\n  // should cause all the C++ pointers to be cleaned up (except C++\n  // CatalystInstanceImpl might be kept alive for a short time by running\n  // callbacks). This also means that all native calls need to be pre-checked\n  // to avoid NPE.\n\n  // See the comment in callJSFunction.  Once js calls switch to strings, we\n  // don't need jsModuleDescriptions any more, all the way up and down the\n  // stack.\n\n  moduleRegistry_ = std::make_shared\u003cModuleRegistry\u003e(\n    buildNativeModuleList(\n       std::weak_ptr\u003cInstance\u003e(instance_),\n       javaModules,\n       cxxModules,\n       moduleMessageQueue_));\n\n  instance_-\u003einitializeBridge(\n    folly::make_unique\u003cJInstanceCallback\u003e(\n    callback,\n    moduleMessageQueue_),\n    jseh-\u003egetExecutorFactory(),\n    folly::make_unique\u003cJMessageQueueThread\u003e(jsQueue),\n    moduleRegistry_);\n}\n\n···\n\nvoid CatalystInstanceImpl::jniCallJSFunction(std::string module, std::string method, NativeArray* arguments) {\n  // We want to share the C++ code, and on iOS, modules pass module/method\n  // names as strings all the way through to JS, and there's no way to do\n  // string -\u003e id mapping on the objc side.  So on Android, we convert the\n  // number to a string, here which gets passed as-is to JS.  There, they they\n  // used as ids if isFinite(), which handles this case, and looked up as\n  // strings otherwise.  Eventually, we'll probably want to modify the stack\n  // from the JS proxy through here to use strings, too.\n  instance_-\u003ecallJSFunction(std::move(module),\n                            std::move(method),\n                            arguments-\u003econsume());\n}\n\n···\n\n}}\n\n```\n\n在这个`CatalystInstanceImpl.cpp`中可以发现c++对于js的调用。以及非常棒的两段注释。\n\nReact Navtive 通过C++层去解释执行JS，从而达到一个比较好的性能。\n\n\n## 总结\n\n通过此文算是搞明白了，Android系统是怎么样去执行JavaScript代码的。\n但React Native又是如何将JS中的组件渲染成Android原生组件的仍然是个疑问。\n以后再研究吧...","data":{"title":"React Native源码解析（Android篇）","date":"2018-03-19","tags":["Android","React Native","React","iOS"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![React](/images/20180213_react.png)\n\n\u003e Facebook的React Native是比基于WebView更先进的跨平台解决方案。实现了只编写一次JavaScript代码即可同时生成Android及iOS应用，并且同时拥有原生控件的性能。此篇文章我将从React Native Android端源码中探究它到底是如何做到的。以及实现的思路，架构的设计等。\n\n\n"},{"id":"data-structures02","file":"data-structures02.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg\" alt=\"浙江大学\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e线性结构的基础是数组和链表，由数组和链表可以扩展出堆栈和队列。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg\" alt=\"浙江大学\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e线性结构的基础是数组和链表，由数组和链表可以扩展出堆栈和队列。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e实验1：计算表达式的值\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e将中缀表达式转换为后缀表达式，并计算表达式的值。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eimport java.util.Stack;\n\npublic class Test05 {\n\n    public static void main(String[] args) {\n        String s = \"2*(6/3+4)-5\";\n        System.out.println(\"中缀表达式：\"+s);\n        s= covert(s);\n        System.out.println(\"转换为后缀表达式：\"+s);\n        int i = calculate(s);\n        System.out.println(\"计算后缀表达式：\"+i);\n\n    }\n\n    private static int calculate(String s) {\n\n        Stack\u0026#x3C;Integer\u003e stack = new Stack\u0026#x3C;\u003e();\n        for (char c : s.toCharArray()) { //从左到右遍历，如果是数字压入堆栈，如果是操作符，从堆栈中pop出两个数字计算，并将结果压入堆栈\n            if(c=='+') {\n                stack.push(stack.pop() + stack.pop());\n            }else if(c=='*') {\n                stack.push(stack.pop() * stack.pop());\n            }else if(c=='-') {\n                int b = stack.pop();\n                int a = stack.pop();\n                stack.push(a - b);\n            }else if(c=='/'){\n                int b = stack.pop();\n                int a = stack.pop();\n                stack.push(a / b);\n            }else{\n                stack.push(Character.getNumericValue(c));\n            }\n        }\n\n        return stack.pop(); //循环结束时，栈顶的数字就是后缀表达式结果\n\n    }\n\n    private static String covert(String s) {\n        StringBuilder sb = new StringBuilder();\n        Stack\u0026#x3C;Character\u003e stack = new Stack\u0026#x3C;\u003e();\n        for (char c : s.toCharArray()) {\n            if (c \u003e= '0' \u0026#x26;\u0026#x26; c \u0026#x3C;= '9') { //如果是数字直接输出\n                sb.append(c);\n            } else if (c == '(') { //如果是左括号，压入操作堆栈\n                stack.push(c);\n            } else if (c == ')') { //如果是右括号\n                while (true) { //寻找左括号\n                    c = stack.pop();\n                    if (c == '(') { //找到直接结束循环\n                        break;\n                    } else { //不是左括号直接输出操作符\n                        sb.append(c);\n                    }\n                }\n            } else { //如果是+ - * /\n\n                while (true) {  //寻找栈顶比当前操作优先级低的操作符\n                    if (stack.isEmpty()) { //如果是空栈，直接压入操作符\n                        stack.push(c);\n                        break;\n                    }\n                    char cInStack = stack.peek();\n                    if (isStackPriority(cInStack, c)) { //如果栈顶操作符优先级高或相同，直接出栈并输出\n                        sb.append(stack.pop());\n                    } else {\n                        stack.push(c); //找到优先级低的地方，把当前操作符push进去\n                        break;\n                    }\n                }\n            }\n            //System.out.println(stack.size());\n        }\n        while (!stack.isEmpty()){ //最后将栈里的操作符全部输出\n            sb.append(stack.pop());\n        }\n        return sb.toString();\n    }\n\n    private static boolean isStackPriority(char cInStack, char c2) {\n        return cInStack != '(' \u0026#x26;\u0026#x26; (cInStack == '*' || cInStack == '/' || c2 != '*' \u0026#x26;\u0026#x26; c2 != '/');\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e输出：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e中缀表达式：2*(6/3+4)-5\n转换为后缀表达式：263/4+*5-\n计算后缀表达式：7\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结:\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e利用堆栈可以很优雅的解决表达式运算的问题\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e以上程序有3个缺陷：不能计算小数；不能计算负数；只能计算个位数的运算\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e改进方向：使用浮点型计算；后缀转换时要添加对于多位数、小数、负数的处理；将结果直接保存到堆栈里，堆栈内保存数字和操作符\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业1：一元多项式的乘法与加法运算（20 分）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e设计函数分别求两个一元多项式的乘积与和。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输入格式:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输入分2行，每行分别先给出多项式非零项的个数，再以指数递降方式输入一个多项式非零项系数和指数（绝对值均为不超过1000的整数）。数字间以空格分隔。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输出格式:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输出分2行，分别以指数递降方式输出乘积多项式以及和多项式非零项的系数和指数。数字间以空格分隔，但结尾不能有多余空格。零多项式应输出0 0。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输入样例:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e5 3 4 -5 2  6 1  -2 0 0 0\n5 5 20  -7 4  3 1 0 0 3 0\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e输出样例:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e15 24 -25 22 30 21 -10 20 -21 8 35 6 -33 5 14 4 -15 3 18 2 -6 1\n5 20 -4 4 -5 2 9 1 -2 0\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epublic class Main {\n\n    public static void main(String[] args) {\n        Scanner scanner = new Scanner(System.in);\n        PolyNode first1 = getInput(scanner);\n        PolyNode first2 = getInput(scanner);\n        PolyNode result1 = add(first1, first2);\n        PolyNode result2 = multiply(first1, first2);\n        print(result2);\n        print(result1);\n\n    }\n\n    /**\n     * 逐项插入算法\n     *\n     * @param first1\n     * @param first2\n     * @return\n     */\n    private static PolyNode multiply(PolyNode first1, PolyNode first2) {\n        PolyNode p1 = first1;\n        PolyNode p2 = first2;\n\n        PolyNode first = new PolyNode(); //结果，先构造一个空的头节点\n        PolyNode rear = first; //将尾部指向这个头\n        while (p2 != null) { //先用第一项乘以p2构造一个初始多项式\n            PolyNode next = new PolyNode(); //构造一个新节点\n            next.coef = p1.coef * p2.coef; //系数相乘\n            next.expon = p1.expon + p2.expon; //指数相加\n            rear.next = next; //尾部指针指向新的节点\n            rear = next; //新尾部等于新添加的节点\n            p2 = p2.next; //移动p2指针\n        }\n        p1 = p1.next; //把p1指针向后挪1位\n        while (p1 != null) {\n            p2 = first2; //将p2指针归位\n            rear = first; //尾部指针归位\n            while (p2 != null) {\n                int e = p1.expon + p2.expon; //指数相加\n                int c = p1.coef * p2.coef; //系数相乘\n                while (rear.next != null \u0026#x26;\u0026#x26; rear.next.expon \u003e e) { //寻找比当前指数小或者等的位置\n                    rear = rear.next; //rear 往后挪\n                }\n                if (rear.next != null \u0026#x26;\u0026#x26; rear.next.expon == e) { //挪了之后如果下一项存在，且指数相等，则合并系数\n                    if (rear.next.coef + c == 0) { //和下一项系数相加等于0，则删掉这一项\n                        rear.next = rear.next.next;\n                    } else { //系数相加不为0，就要合并系数\n                        rear.next.coef += c;\n                    }\n                } else { //指数不等，需要创建一个新节点插入\n                    PolyNode newPoly = new PolyNode(); //构造一个新节点\n                    newPoly.coef = c;\n                    newPoly.expon = e;\n                    newPoly.next = rear.next;//新插入的节点下一个=当前尾部的下一个\n                    rear.next = newPoly; //当前尾部的下一个等于新节点\n                }\n\n                p2 = p2.next;//p2处理完毕，将p2挪到下一个\n            }\n            p1 = p1.next;//p2遍历完毕，将p1往后挪\n        }\n        first = first.next; //将头部挪到真实的头部位置，Java会自动回收没有引用的头节点\n\n        return first;\n    }\n\n    private static void print(PolyNode result) {\n        PolyNode p = result;\n        StringBuilder sb = new StringBuilder();\n        if (p == null) { //零多项式输出0 0\n            sb.append(\"0 0\");\n        }\n        boolean isFirst = true;\n        while (p != null) {\n            if (!isFirst)\n                sb.append(' ');\n            sb.append(p.coef);\n            sb.append(' ');\n            sb.append(p.expon);\n            p = p.next;\n            isFirst = false;\n        }\n        System.out.println(sb.toString());\n    }\n\n    private static PolyNode add(PolyNode first1, PolyNode first2) {\n        PolyNode p1 = first1;\n        PolyNode p2 = first2;\n\n        PolyNode first = new PolyNode(); //结果，先构造一个空的头节点\n        PolyNode rear = first; //将尾部指向这个头\n        while (p1 != null \u0026#x26;\u0026#x26; p2 != null) { //当两个指针都不为空时\n            if (p1.coef == 0) { //系数为0,直接省略\n                p1 = p1.next;\n            } else if (p2.coef == 0) {\n                p2 = p2.next;\n            } else if (p1.expon == p2.expon) { //指数相等，则系数相加后串到后面\n                int coef = p1.coef + p2.coef;  //系数相加\n                if (coef != 0) {\n                    PolyNode next = new PolyNode(); //构造一个新节点\n                    next.coef = coef;\n                    next.expon = p1.expon;\n                    rear.next = next; //尾部指针指向新的节点\n                    rear = next; //新尾部等于新添加的节点\n                }\n                p1 = p1.next; //移动指针\n                p2 = p2.next;\n            } else if (p1.expon \u003e p2.expon) {//指数大的串到后面\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p1.coef;\n                next.expon = p1.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n                p1 = p1.next; //移动指针\n            } else {\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p2.coef;\n                next.expon = p2.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n                p2 = p2.next; //移动指针\n            }\n        }\n\n        while (p1 != null) { //p1没完，把所有p1追加到后面\n            if (p1.coef != 0) { //系数不为0才，添加，否则继续找因为后面可以能还有系数不为0的\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p1.coef;\n                next.expon = p1.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n            }\n            p1 = p1.next; //移动指针\n        }\n\n        while (p2 != null \u0026#x26;\u0026#x26; p2.coef != 0) { //p2没完，把所有p2追加到后面\n            if (p2.coef != 0) { //系数不为0才，添加，否则继续找因为后面可以能还有系数不为0的\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p2.coef;\n                next.expon = p2.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n            }\n            p2 = p2.next; //移动指针\n        }\n        first = first.next; //将头部挪到真实的头部位置，Java会自动回收没有引用的头节点\n        return first;\n    }\n\n    private static PolyNode getInput(Scanner scanner) {\n        int count = scanner.nextInt(); //得到总项数\n        PolyNode first = new PolyNode(); //构造一个空的头\n        PolyNode rear = first; //构造一个尾部的指针\n        while (count \u003e 0) {\n            PolyNode next = new PolyNode(); //读取一个节点\n            next.coef = scanner.nextInt();\n            next.expon = scanner.nextInt();\n            rear.next = next; //将尾部的指针指向读到的这个节点\n            rear = next; //将尾部指针挪到新添加的节点\n            count--; //循环\n        }\n        first = first.next; //将头部挪到真实的头部位置，Java会自动回收没有引用的头节点\n        return first;\n    }\n\n\n    static class PolyNode {\n        int coef;\n        int expon;\n        PolyNode next;\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结：\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e逐项插值算法；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e单个对象保存一个当前类的引用可以当作链表来使用；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e原输入的链表不要取修改它的内部对象引用或者变量值；\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业1：Reversing Linked List（25 分）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eGiven a constant K and a singly linked list L, you are supposed to reverse the links of every K elements on L. For example, given L being 1→2→3→4→5→6, if K=3, then you must output 3→2→1→6→5→4; if K=4, you must output 4→3→2→1→5→6.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eInput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eEach input file contains one test case. For each case, the first line contains the address of the first node, a positive N (≤10\n​5\n​​ ) which is the total number of nodes, and a positive K (≤N) which is the length of the sublist to be reversed. The address of a node is a 5-digit nonnegative integer, and NULL is represented by -1.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eThen N lines follow, each describes a node in the format:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAddress Data Next\u003c/code\u003e\nwhere \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAddress\u003c/code\u003e is the position of the node, \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eData\u003c/code\u003e is an integer, and \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNext\u003c/code\u003e is the position of the next node.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eOutput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eFor each case, output the resulting ordered linked list. Each node occupies a line, and is printed in the same format as in the input.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eSample Input:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e00100 8 4\n00000 4 99999\n00100 1 12309\n68237 6 77777\n33218 3 00000\n77777 7 88888\n99999 5 68237\n12309 2 33218\n88888 8 -1\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003eSample Output:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e00000 4 33218\n33218 3 12309\n12309 2 00100\n00100 1 99999\n99999 5 68237\n68237 6 -1\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode;\n\nimport java.io.BufferedReader;\nimport java.io.InputStreamReader;\nimport java.util.ArrayList;\nimport java.util.LinkedList;\nimport java.util.Objects;\nimport java.util.Stack;\n\npublic class Main {\n    public static void main(String args[]) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n        //读第一行\n        String[] line1Array = getStringArray(reader);\n        String firstAddress = line1Array[0];\n        int count = Integer.parseInt(line1Array[1]);\n        int k = Integer.parseInt(line1Array[2]);\n\n        //读取所有节点\n        ArrayList\u0026#x3C;Node\u003e nodes = new ArrayList\u0026#x3C;\u003e(count);\n        for (int i = 0; i \u0026#x3C; count; i++) {\n            String[] lineArray = getStringArray(reader);\n            Node node = new Node();\n            node.address = lineArray[0];\n            node.data = Integer.parseInt(lineArray[1]);\n            node.nextAddress = lineArray[2];\n            nodes.add(node);\n        }\n\n\n        //按链表顺序加入队列\n        LinkedList\u0026#x3C;Node\u003e queue = new LinkedList\u0026#x3C;\u003e();\n        String address = firstAddress;\n        while (!address.equals(\"-1\")) {\n            for (int i = 0; i \u0026#x3C; nodes.size(); i++) { //循环匹配地址\n                Node n = nodes.get(i);\n                if (Objects.equals(address, n.address)) { //找到则加入队列\n                    queue.add(n);\n                    address = n.nextAddress; //查找地址赋值为当前节点的下一个地址\n                    nodes.remove(n); //处理完的移出节点数组，减少循环量\n                    break;\n                }\n            }\n        }\n\n        Stack\u0026#x3C;Node\u003e stack = new Stack\u0026#x3C;\u003e();\n        boolean isCanConvert = queue.size() \u003e= k; //是否够反转\n        while (!queue.isEmpty()) { //循环出队列\n            Node n = queue.remove();\n            if (isCanConvert) { //够反转则压入堆栈\n                stack.push(n);\n                if (stack.size() == k) { //压够反转数量就全部输出\n                    isCanConvert = queue.size() \u003e= k; //再次检查是否够反转\n                    while (!stack.isEmpty()) {\n                        //重新赋值next\n                        Node nStack = stack.pop();\n                        if (stack.isEmpty()) { //如果栈里没了，地址就等于队列的下一个\n                            if (queue.isEmpty()) { //队列也没了，地址等于-1\n                                nStack.nextAddress = \"-1\";\n                            } else {\n                                //如果剩下的还能反转\n                                if (isCanConvert) {\n                                    nStack.nextAddress = queue.get(k - 1).address;\n                                } else {\n                                    nStack.nextAddress = queue.peek().address;\n                                }\n                            }\n                        } else {\n                            nStack.nextAddress = stack.peek().address;\n                        }\n                        print(nStack);\n                    }\n                }\n            } else { //不够反转 直接输出节点\n                print(n);\n            }\n        }\n\n    }\n\n\n    private static void print(Node n) {\n        System.out.println(n.address + \" \" + n.data + \" \" + n.nextAddress);\n    }\n\n    private static String[] getStringArray(BufferedReader reader) {\n        String line1 = null;\n        try {\n            line1 = reader.readLine();\n        } catch (Exception ignore) {\n        }\n        return line1.split(\" \");\n    }\n\n    static class Node {\n        String address;\n        int data;\n        String nextAddress;\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结：\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e利用队列和栈解决顺序问题\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业2：Pop Sequence（25 分）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eGiven a stack which can keep M numbers at most. Push N numbers in the order of 1, 2, 3, ..., N and pop randomly. You are supposed to tell if a given sequence of numbers is a possible pop sequence of the stack. For example, if M is 5 and N is 7, we can obtain 1, 2, 3, 4, 5, 6, 7 from the stack, but not 3, 2, 1, 7, 5, 6, 4.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eInput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eEach input file contains one test case. For each case, the first line contains 3 numbers (all no more than 1000): M (the maximum capacity of the stack), N (the length of push sequence), and K (the number of pop sequences to be checked). Then K lines follow, each contains a pop sequence of N numbers. All the numbers in a line are separated by a space.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eOutput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eFor each pop sequence, print in one line \"YES\" if it is indeed a possible pop sequence of the stack, or \"NO\" if not.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eSample Input:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e5 7 5\n1 2 3 4 5 6 7\n3 2 1 7 5 6 4\n7 6 5 4 3 2 1\n5 6 4 3 7 2 1\n1 7 6 5 4 3 2\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003eSample Output:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eYES\nNO\nNO\nYES\nNO\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![浙江大学](https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg)\n\n\u003e 线性结构的基础是数组和链表，由数组和链表可以扩展出堆栈和队列。\n\n\n\u003c!--more--\u003e\n\n## 实验1：计算表达式的值\n\n将中缀表达式转换为后缀表达式，并计算表达式的值。\n\n- 实现：\n\n```java\nimport java.util.Stack;\n\npublic class Test05 {\n\n    public static void main(String[] args) {\n        String s = \"2*(6/3+4)-5\";\n        System.out.println(\"中缀表达式：\"+s);\n        s= covert(s);\n        System.out.println(\"转换为后缀表达式：\"+s);\n        int i = calculate(s);\n        System.out.println(\"计算后缀表达式：\"+i);\n\n    }\n\n    private static int calculate(String s) {\n\n        Stack\u003cInteger\u003e stack = new Stack\u003c\u003e();\n        for (char c : s.toCharArray()) { //从左到右遍历，如果是数字压入堆栈，如果是操作符，从堆栈中pop出两个数字计算，并将结果压入堆栈\n            if(c=='+') {\n                stack.push(stack.pop() + stack.pop());\n            }else if(c=='*') {\n                stack.push(stack.pop() * stack.pop());\n            }else if(c=='-') {\n                int b = stack.pop();\n                int a = stack.pop();\n                stack.push(a - b);\n            }else if(c=='/'){\n                int b = stack.pop();\n                int a = stack.pop();\n                stack.push(a / b);\n            }else{\n                stack.push(Character.getNumericValue(c));\n            }\n        }\n\n        return stack.pop(); //循环结束时，栈顶的数字就是后缀表达式结果\n\n    }\n\n    private static String covert(String s) {\n        StringBuilder sb = new StringBuilder();\n        Stack\u003cCharacter\u003e stack = new Stack\u003c\u003e();\n        for (char c : s.toCharArray()) {\n            if (c \u003e= '0' \u0026\u0026 c \u003c= '9') { //如果是数字直接输出\n                sb.append(c);\n            } else if (c == '(') { //如果是左括号，压入操作堆栈\n                stack.push(c);\n            } else if (c == ')') { //如果是右括号\n                while (true) { //寻找左括号\n                    c = stack.pop();\n                    if (c == '(') { //找到直接结束循环\n                        break;\n                    } else { //不是左括号直接输出操作符\n                        sb.append(c);\n                    }\n                }\n            } else { //如果是+ - * /\n\n                while (true) {  //寻找栈顶比当前操作优先级低的操作符\n                    if (stack.isEmpty()) { //如果是空栈，直接压入操作符\n                        stack.push(c);\n                        break;\n                    }\n                    char cInStack = stack.peek();\n                    if (isStackPriority(cInStack, c)) { //如果栈顶操作符优先级高或相同，直接出栈并输出\n                        sb.append(stack.pop());\n                    } else {\n                        stack.push(c); //找到优先级低的地方，把当前操作符push进去\n                        break;\n                    }\n                }\n            }\n            //System.out.println(stack.size());\n        }\n        while (!stack.isEmpty()){ //最后将栈里的操作符全部输出\n            sb.append(stack.pop());\n        }\n        return sb.toString();\n    }\n\n    private static boolean isStackPriority(char cInStack, char c2) {\n        return cInStack != '(' \u0026\u0026 (cInStack == '*' || cInStack == '/' || c2 != '*' \u0026\u0026 c2 != '/');\n    }\n}\n```\n\n\n\n- 输出：\n\n```bash\n中缀表达式：2*(6/3+4)-5\n转换为后缀表达式：263/4+*5-\n计算后缀表达式：7\n```\n\n- 总结:\n\n1. 利用堆栈可以很优雅的解决表达式运算的问题\n2. 以上程序有3个缺陷：不能计算小数；不能计算负数；只能计算个位数的运算\n3. 改进方向：使用浮点型计算；后缀转换时要添加对于多位数、小数、负数的处理；将结果直接保存到堆栈里，堆栈内保存数字和操作符\n\n## 作业1：一元多项式的乘法与加法运算（20 分）\n\n设计函数分别求两个一元多项式的乘积与和。\n\n输入格式:\n\n输入分2行，每行分别先给出多项式非零项的个数，再以指数递降方式输入一个多项式非零项系数和指数（绝对值均为不超过1000的整数）。数字间以空格分隔。\n\n输出格式:\n\n输出分2行，分别以指数递降方式输出乘积多项式以及和多项式非零项的系数和指数。数字间以空格分隔，但结尾不能有多余空格。零多项式应输出0 0。\n\n输入样例:\n```bash\n5 3 4 -5 2  6 1  -2 0 0 0\n5 5 20  -7 4  3 1 0 0 3 0\n```\n输出样例:\n```bash\n15 24 -25 22 30 21 -10 20 -21 8 35 6 -33 5 14 4 -15 3 18 2 -6 1\n5 20 -4 4 -5 2 9 1 -2 0\n```\n\n- 实现：\n\n```java\npublic class Main {\n\n    public static void main(String[] args) {\n        Scanner scanner = new Scanner(System.in);\n        PolyNode first1 = getInput(scanner);\n        PolyNode first2 = getInput(scanner);\n        PolyNode result1 = add(first1, first2);\n        PolyNode result2 = multiply(first1, first2);\n        print(result2);\n        print(result1);\n\n    }\n\n    /**\n     * 逐项插入算法\n     *\n     * @param first1\n     * @param first2\n     * @return\n     */\n    private static PolyNode multiply(PolyNode first1, PolyNode first2) {\n        PolyNode p1 = first1;\n        PolyNode p2 = first2;\n\n        PolyNode first = new PolyNode(); //结果，先构造一个空的头节点\n        PolyNode rear = first; //将尾部指向这个头\n        while (p2 != null) { //先用第一项乘以p2构造一个初始多项式\n            PolyNode next = new PolyNode(); //构造一个新节点\n            next.coef = p1.coef * p2.coef; //系数相乘\n            next.expon = p1.expon + p2.expon; //指数相加\n            rear.next = next; //尾部指针指向新的节点\n            rear = next; //新尾部等于新添加的节点\n            p2 = p2.next; //移动p2指针\n        }\n        p1 = p1.next; //把p1指针向后挪1位\n        while (p1 != null) {\n            p2 = first2; //将p2指针归位\n            rear = first; //尾部指针归位\n            while (p2 != null) {\n                int e = p1.expon + p2.expon; //指数相加\n                int c = p1.coef * p2.coef; //系数相乘\n                while (rear.next != null \u0026\u0026 rear.next.expon \u003e e) { //寻找比当前指数小或者等的位置\n                    rear = rear.next; //rear 往后挪\n                }\n                if (rear.next != null \u0026\u0026 rear.next.expon == e) { //挪了之后如果下一项存在，且指数相等，则合并系数\n                    if (rear.next.coef + c == 0) { //和下一项系数相加等于0，则删掉这一项\n                        rear.next = rear.next.next;\n                    } else { //系数相加不为0，就要合并系数\n                        rear.next.coef += c;\n                    }\n                } else { //指数不等，需要创建一个新节点插入\n                    PolyNode newPoly = new PolyNode(); //构造一个新节点\n                    newPoly.coef = c;\n                    newPoly.expon = e;\n                    newPoly.next = rear.next;//新插入的节点下一个=当前尾部的下一个\n                    rear.next = newPoly; //当前尾部的下一个等于新节点\n                }\n\n                p2 = p2.next;//p2处理完毕，将p2挪到下一个\n            }\n            p1 = p1.next;//p2遍历完毕，将p1往后挪\n        }\n        first = first.next; //将头部挪到真实的头部位置，Java会自动回收没有引用的头节点\n\n        return first;\n    }\n\n    private static void print(PolyNode result) {\n        PolyNode p = result;\n        StringBuilder sb = new StringBuilder();\n        if (p == null) { //零多项式输出0 0\n            sb.append(\"0 0\");\n        }\n        boolean isFirst = true;\n        while (p != null) {\n            if (!isFirst)\n                sb.append(' ');\n            sb.append(p.coef);\n            sb.append(' ');\n            sb.append(p.expon);\n            p = p.next;\n            isFirst = false;\n        }\n        System.out.println(sb.toString());\n    }\n\n    private static PolyNode add(PolyNode first1, PolyNode first2) {\n        PolyNode p1 = first1;\n        PolyNode p2 = first2;\n\n        PolyNode first = new PolyNode(); //结果，先构造一个空的头节点\n        PolyNode rear = first; //将尾部指向这个头\n        while (p1 != null \u0026\u0026 p2 != null) { //当两个指针都不为空时\n            if (p1.coef == 0) { //系数为0,直接省略\n                p1 = p1.next;\n            } else if (p2.coef == 0) {\n                p2 = p2.next;\n            } else if (p1.expon == p2.expon) { //指数相等，则系数相加后串到后面\n                int coef = p1.coef + p2.coef;  //系数相加\n                if (coef != 0) {\n                    PolyNode next = new PolyNode(); //构造一个新节点\n                    next.coef = coef;\n                    next.expon = p1.expon;\n                    rear.next = next; //尾部指针指向新的节点\n                    rear = next; //新尾部等于新添加的节点\n                }\n                p1 = p1.next; //移动指针\n                p2 = p2.next;\n            } else if (p1.expon \u003e p2.expon) {//指数大的串到后面\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p1.coef;\n                next.expon = p1.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n                p1 = p1.next; //移动指针\n            } else {\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p2.coef;\n                next.expon = p2.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n                p2 = p2.next; //移动指针\n            }\n        }\n\n        while (p1 != null) { //p1没完，把所有p1追加到后面\n            if (p1.coef != 0) { //系数不为0才，添加，否则继续找因为后面可以能还有系数不为0的\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p1.coef;\n                next.expon = p1.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n            }\n            p1 = p1.next; //移动指针\n        }\n\n        while (p2 != null \u0026\u0026 p2.coef != 0) { //p2没完，把所有p2追加到后面\n            if (p2.coef != 0) { //系数不为0才，添加，否则继续找因为后面可以能还有系数不为0的\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p2.coef;\n                next.expon = p2.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n            }\n            p2 = p2.next; //移动指针\n        }\n        first = first.next; //将头部挪到真实的头部位置，Java会自动回收没有引用的头节点\n        return first;\n    }\n\n    private static PolyNode getInput(Scanner scanner) {\n        int count = scanner.nextInt(); //得到总项数\n        PolyNode first = new PolyNode(); //构造一个空的头\n        PolyNode rear = first; //构造一个尾部的指针\n        while (count \u003e 0) {\n            PolyNode next = new PolyNode(); //读取一个节点\n            next.coef = scanner.nextInt();\n            next.expon = scanner.nextInt();\n            rear.next = next; //将尾部的指针指向读到的这个节点\n            rear = next; //将尾部指针挪到新添加的节点\n            count--; //循环\n        }\n        first = first.next; //将头部挪到真实的头部位置，Java会自动回收没有引用的头节点\n        return first;\n    }\n\n\n    static class PolyNode {\n        int coef;\n        int expon;\n        PolyNode next;\n    }\n}\n\n```\n\n- 总结：\n\n1. 逐项插值算法；\n2. 单个对象保存一个当前类的引用可以当作链表来使用；\n3. 原输入的链表不要取修改它的内部对象引用或者变量值；\n\n## 作业1：Reversing Linked List（25 分）\n\nGiven a constant K and a singly linked list L, you are supposed to reverse the links of every K elements on L. For example, given L being 1→2→3→4→5→6, if K=3, then you must output 3→2→1→6→5→4; if K=4, you must output 4→3→2→1→5→6.\n\nInput Specification:\n\nEach input file contains one test case. For each case, the first line contains the address of the first node, a positive N (≤10\n​5\n​​ ) which is the total number of nodes, and a positive K (≤N) which is the length of the sublist to be reversed. The address of a node is a 5-digit nonnegative integer, and NULL is represented by -1.\n\nThen N lines follow, each describes a node in the format:\n\n`Address Data Next`\nwhere `Address` is the position of the node, `Data` is an integer, and `Next` is the position of the next node.\n\nOutput Specification:\n\nFor each case, output the resulting ordered linked list. Each node occupies a line, and is printed in the same format as in the input.\n\nSample Input:\n```bash\n00100 8 4\n00000 4 99999\n00100 1 12309\n68237 6 77777\n33218 3 00000\n77777 7 88888\n99999 5 68237\n12309 2 33218\n88888 8 -1\n```\nSample Output:\n```bash\n00000 4 33218\n33218 3 12309\n12309 2 00100\n00100 1 99999\n99999 5 68237\n68237 6 -1\n```\n\n- 实现：\n\n```java\npackage cn.wycode;\n\nimport java.io.BufferedReader;\nimport java.io.InputStreamReader;\nimport java.util.ArrayList;\nimport java.util.LinkedList;\nimport java.util.Objects;\nimport java.util.Stack;\n\npublic class Main {\n    public static void main(String args[]) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n        //读第一行\n        String[] line1Array = getStringArray(reader);\n        String firstAddress = line1Array[0];\n        int count = Integer.parseInt(line1Array[1]);\n        int k = Integer.parseInt(line1Array[2]);\n\n        //读取所有节点\n        ArrayList\u003cNode\u003e nodes = new ArrayList\u003c\u003e(count);\n        for (int i = 0; i \u003c count; i++) {\n            String[] lineArray = getStringArray(reader);\n            Node node = new Node();\n            node.address = lineArray[0];\n            node.data = Integer.parseInt(lineArray[1]);\n            node.nextAddress = lineArray[2];\n            nodes.add(node);\n        }\n\n\n        //按链表顺序加入队列\n        LinkedList\u003cNode\u003e queue = new LinkedList\u003c\u003e();\n        String address = firstAddress;\n        while (!address.equals(\"-1\")) {\n            for (int i = 0; i \u003c nodes.size(); i++) { //循环匹配地址\n                Node n = nodes.get(i);\n                if (Objects.equals(address, n.address)) { //找到则加入队列\n                    queue.add(n);\n                    address = n.nextAddress; //查找地址赋值为当前节点的下一个地址\n                    nodes.remove(n); //处理完的移出节点数组，减少循环量\n                    break;\n                }\n            }\n        }\n\n        Stack\u003cNode\u003e stack = new Stack\u003c\u003e();\n        boolean isCanConvert = queue.size() \u003e= k; //是否够反转\n        while (!queue.isEmpty()) { //循环出队列\n            Node n = queue.remove();\n            if (isCanConvert) { //够反转则压入堆栈\n                stack.push(n);\n                if (stack.size() == k) { //压够反转数量就全部输出\n                    isCanConvert = queue.size() \u003e= k; //再次检查是否够反转\n                    while (!stack.isEmpty()) {\n                        //重新赋值next\n                        Node nStack = stack.pop();\n                        if (stack.isEmpty()) { //如果栈里没了，地址就等于队列的下一个\n                            if (queue.isEmpty()) { //队列也没了，地址等于-1\n                                nStack.nextAddress = \"-1\";\n                            } else {\n                                //如果剩下的还能反转\n                                if (isCanConvert) {\n                                    nStack.nextAddress = queue.get(k - 1).address;\n                                } else {\n                                    nStack.nextAddress = queue.peek().address;\n                                }\n                            }\n                        } else {\n                            nStack.nextAddress = stack.peek().address;\n                        }\n                        print(nStack);\n                    }\n                }\n            } else { //不够反转 直接输出节点\n                print(n);\n            }\n        }\n\n    }\n\n\n    private static void print(Node n) {\n        System.out.println(n.address + \" \" + n.data + \" \" + n.nextAddress);\n    }\n\n    private static String[] getStringArray(BufferedReader reader) {\n        String line1 = null;\n        try {\n            line1 = reader.readLine();\n        } catch (Exception ignore) {\n        }\n        return line1.split(\" \");\n    }\n\n    static class Node {\n        String address;\n        int data;\n        String nextAddress;\n    }\n}\n\n```\n\n\n- 总结：\n\n1. 利用队列和栈解决顺序问题\n\n## 作业2：Pop Sequence（25 分）\n\n\nGiven a stack which can keep M numbers at most. Push N numbers in the order of 1, 2, 3, ..., N and pop randomly. You are supposed to tell if a given sequence of numbers is a possible pop sequence of the stack. For example, if M is 5 and N is 7, we can obtain 1, 2, 3, 4, 5, 6, 7 from the stack, but not 3, 2, 1, 7, 5, 6, 4.\n\nInput Specification:\n\nEach input file contains one test case. For each case, the first line contains 3 numbers (all no more than 1000): M (the maximum capacity of the stack), N (the length of push sequence), and K (the number of pop sequences to be checked). Then K lines follow, each contains a pop sequence of N numbers. All the numbers in a line are separated by a space.\n\nOutput Specification:\n\nFor each pop sequence, print in one line \"YES\" if it is indeed a possible pop sequence of the stack, or \"NO\" if not.\n\nSample Input:\n```bash\n5 7 5\n1 2 3 4 5 6 7\n3 2 1 7 5 6 4\n7 6 5 4 3 2 1\n5 6 4 3 7 2 1\n1 7 6 5 4 3 2\n```\nSample Output:\n```bash\nYES\nNO\nNO\nYES\nNO\n```","data":{"title":"数据结构与算法学习笔记02","date":"2018-03-16","tags":["C"],"category":"Computer Science"},"isEmpty":false,"excerpt":"\n![浙江大学](https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg)\n\n\u003e 线性结构的基础是数组和链表，由数组和链表可以扩展出堆栈和队列。\n\n\n"}],"page":8,"total":16},"__N_SSG":true},"page":"/blog/page/[page]","query":{"page":"8"},"buildId":"uFO1FMOoBQ2X-GM8G4ZfF","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
