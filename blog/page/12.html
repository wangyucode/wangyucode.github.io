-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"spring-cors","file":"spring-cors.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJavaScript在跨域请求时会碰到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNo 'Access-Control-Allow-Origin' header is present on the requested resource.\u003c/code\u003e。是因为服务器不支持\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCross-origin resource sharing (CORS)\u003c/code\u003e这篇教程教你如何为Java Spring后台配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCORS\u003c/code\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJavaScript在跨域请求时会碰到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNo 'Access-Control-Allow-Origin' header is present on the requested resource.\u003c/code\u003e。是因为服务器不支持\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCross-origin resource sharing (CORS)\u003c/code\u003e这篇教程教你如何为Java Spring后台配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCORS\u003c/code\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@CrossOrigin\u003c/code\u003e注解\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e注解相关方法即可。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e全局配置\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\npublic class MyConfiguration {\n\n    @Bean\n    public WebMvcConfigurer corsConfigurer() {\n        return new WebMvcConfigurerAdapter() {\n            @Override\n            public void addCorsMappings(CorsRegistry registry) {\n                registry.addMapping(\"/api/**\");\n            }\n        };\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e JavaScript在跨域请求时会碰到`No 'Access-Control-Allow-Origin' header is present on the requested resource.`。是因为服务器不支持`Cross-origin resource sharing (CORS)`这篇教程教你如何为Java Spring后台配置`CORS`\n\n\u003c!--more--\u003e\n\n## 使用`@CrossOrigin`注解\n\n注解相关方法即可。\n\n## 全局配置\n\n```java\n@Configuration\npublic class MyConfiguration {\n\n    @Bean\n    public WebMvcConfigurer corsConfigurer() {\n        return new WebMvcConfigurerAdapter() {\n            @Override\n            public void addCorsMappings(CorsRegistry registry) {\n                registry.addMapping(\"/api/**\");\n            }\n        };\n    }\n}\n```\n","data":{"title":"Spring中启用CORS","date":"2017-07-27","tags":["Spring","Java","CORS"],"category":"Backend"},"isEmpty":false,"excerpt":"\n\u003e JavaScript在跨域请求时会碰到`No 'Access-Control-Allow-Origin' header is present on the requested resource.`。是因为服务器不支持`Cross-origin resource sharing (CORS)`这篇教程教你如何为Java Spring后台配置`CORS`\n\n"},{"id":"unity2android","file":"unity2android.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e在某些情况下，我们需要使用原生代码来做一些事，比如集成一些第三方原生SDK，\n以下这种方式介绍了如何将Unity导出成Android Studio工程，从而添加Android代码。\n之后的教程中我还将介绍如何将Android写好的代码导回到Unity工程中。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e在某些情况下，我们需要使用原生代码来做一些事，比如集成一些第三方原生SDK，\n以下这种方式介绍了如何将Unity导出成Android Studio工程，从而添加Android代码。\n之后的教程中我还将介绍如何将Android写好的代码导回到Unity工程中。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eUnity工程导出为Android工程\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e在Unity菜单中选择：File——Build Settings\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e为了能在Android Studio中更好的运行，构建系统选择Gradle\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e选中Export Project选项\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e选择你喜欢的目录导出\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eUnity发生了改动时，只需导出后替换asset文件夹内容即可\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170726_export.png\" alt=\"Export\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eUnity调用Android方法\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-csharp px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eprivate void sendMessageToAndroid(string method,params object[] args)\n    {\n        AndroidJavaClass jc = new AndroidJavaClass(\"com.unity3d.player.UnityPlayer\");\n        AndroidJavaObject jo = jc.GetStatic\u0026#x3C;AndroidJavaObject\u003e(\"currentActivity\");\n        jo.Call(method, args);\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e在UnityPlayerActivity中准备好Unity要调用的方法\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e调用上面的方法，传入方法名（不带括号），及参数（多参，也可不传）即可。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eAndroid调用Unity方法\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eUnityPlayer.UnitySendMessage(\"GameObject\", \"message\", \"args\");\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e相当于调用了Unity中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esendMessage()\u003c/code\u003e。\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n\u003e 在某些情况下，我们需要使用原生代码来做一些事，比如集成一些第三方原生SDK，\n以下这种方式介绍了如何将Unity导出成Android Studio工程，从而添加Android代码。\n之后的教程中我还将介绍如何将Android写好的代码导回到Unity工程中。\n\n\u003c!--more--\u003e\n\n## Unity工程导出为Android工程\n\n1. 在Unity菜单中选择：File——Build Settings\n2. 为了能在Android Studio中更好的运行，构建系统选择Gradle\n3. 选中Export Project选项\n4. 选择你喜欢的目录导出\n5. Unity发生了改动时，只需导出后替换asset文件夹内容即可\n\n![Export](/images/20170726_export.png)\n\n## Unity调用Android方法\n\n```csharp\nprivate void sendMessageToAndroid(string method,params object[] args)\n    {\n        AndroidJavaClass jc = new AndroidJavaClass(\"com.unity3d.player.UnityPlayer\");\n        AndroidJavaObject jo = jc.GetStatic\u003cAndroidJavaObject\u003e(\"currentActivity\");\n        jo.Call(method, args);\n    }\n```\n\n- 在UnityPlayerActivity中准备好Unity要调用的方法\n- 调用上面的方法，传入方法名（不带括号），及参数（多参，也可不传）即可。\n\n## Android调用Unity方法\n\n```java\nUnityPlayer.UnitySendMessage(\"GameObject\", \"message\", \"args\");\n```\n\n- 相当于调用了Unity中的`sendMessage()`。","data":{"title":"在Unity中使用Android原生代码","date":"2017-07-26","tags":["Android","Unity"],"category":"Unity"},"isEmpty":false,"excerpt":"\n\u003e 在某些情况下，我们需要使用原生代码来做一些事，比如集成一些第三方原生SDK，\n以下这种方式介绍了如何将Unity导出成Android Studio工程，从而添加Android代码。\n之后的教程中我还将介绍如何将Android写好的代码导回到Unity工程中。\n\n"},{"id":"wave-progress","file":"wave-progress.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天碰到个需求，要求以波浪进度填充自定义透明形状，废话不多说，直接上最终效果图\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170724_wave_progress.gif\" alt=\"波浪效果\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天碰到个需求，要求以波浪进度填充自定义透明形状，废话不多说，直接上最终效果图\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170724_wave_progress.gif\" alt=\"波浪效果\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e思路\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通过判断\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBitmap\u003c/code\u003e对象的像素颜色，对非透明像素进行颜色更改。波浪曲线采用sin曲线π到2π区间段，和将时间取余并和x坐标相加得到波浪y轴坐标，再加上百分比*Bitmap高度。核心算法如下:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170724_sin.png\" alt=\"sin\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e    private int getWaveY(int x) {\n        double sinX = Math.PI + (((((System.currentTimeMillis() / (1000 / waveSpeed)) + x) % waveLength)) / (double) waveLength * Math.PI);\n        int waveHeight = (int) (waveHeightMax * (Math.sin(sinX) + 1));\n        int y = (int) ((100 - progress) / 100f * bitmap.getHeight());\n        y -= waveHeight;\n        return y;\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewaveSpeed\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewaveLength\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewaveHeightMax\u003c/code\u003e均定义成全局变量，可以很方便的定制波浪移动速度、波浪长度、波浪高度。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用SurfaceView\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e为了达到比较好的性能，使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSurfaceView\u003c/code\u003e在子线程绘图。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e性能优化\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e因为这里涉及逐个像素操作，所以遍历的运算量很大，一定要对遍历的量进行控制，否则会很卡。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我这里采用控制图片大小的方式\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e***\n    bitmap = setBitmapSize(bitmap, calculateSize * bitmap.getWidth() / bitmap.getHeight(), calculateSize);\n\n***\n    /**\n     * 缩放图片\n     *\n     * @param bitmap    原图片\n     * @param newWidth\n     * @param newHeight\n     * @return\n     */\n    private Bitmap setBitmapSize(Bitmap bitmap, int newWidth, int newHeight) {\n        int width = bitmap.getWidth();\n        int height = bitmap.getHeight();\n        float scaleWidth = (newWidth * 1.0f) / width;\n        float scaleHeight = (newHeight * 1.0f) / height;\n        Matrix matrix = new Matrix();\n        matrix.postScale(scaleWidth, scaleHeight);\n        return Bitmap.createBitmap(bitmap, 0, 0, width, height, matrix, true);\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecalculateSize\u003c/code\u003e控制循环次数在有限的范围内，并在最终绘制Bitmap时使用区域绘制函数：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e    private void draw() {\n        Canvas canvas = mHolder.lockCanvas();\n        canvas.drawBitmap(bitmap, rectBitmap, rectCanvas, mPaint);\n        mHolder.unlockCanvasAndPost(canvas);\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e注意事项\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e为了达到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSurfaceView\u003c/code\u003e透明效果，需要加入以下两句代码\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003esetZOrderOnTop(true);\nmHolder.setFormat(TRANSLUCENT);\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e从\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDrawable\u003c/code\u003e中得到的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBitmap\u003c/code\u003e不能直接\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esetPixel()\u003c/code\u003e，必须重新\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBitmap.createBitmap()\u003c/code\u003e，或\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBitmap.copy()\u003c/code\u003e，使得\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eisMutable\u003c/code\u003e属性为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etrue\u003c/code\u003e，得到新的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBitmap\u003c/code\u003e对象才能操作像素，否则会报\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIllegalStateException\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e完整源码:\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ca href=\"https://github.com/wangyucode/WaveProgress\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/WaveProgress\u003c/a\u003e\u003c/p\u003e\n","content":"\n\u003e 今天碰到个需求，要求以波浪进度填充自定义透明形状，废话不多说，直接上最终效果图\n\n![波浪效果](/images/20170724_wave_progress.gif)\n\n\u003c!--more--\u003e\n\n## 思路\n\n通过判断`Bitmap`对象的像素颜色，对非透明像素进行颜色更改。波浪曲线采用sin曲线π到2π区间段，和将时间取余并和x坐标相加得到波浪y轴坐标，再加上百分比*Bitmap高度。核心算法如下:\n\n![sin](/images/20170724_sin.png)\n\n```java\n    private int getWaveY(int x) {\n        double sinX = Math.PI + (((((System.currentTimeMillis() / (1000 / waveSpeed)) + x) % waveLength)) / (double) waveLength * Math.PI);\n        int waveHeight = (int) (waveHeightMax * (Math.sin(sinX) + 1));\n        int y = (int) ((100 - progress) / 100f * bitmap.getHeight());\n        y -= waveHeight;\n        return y;\n    }\n```\n这里的`waveSpeed`、`waveLength`、`waveHeightMax`均定义成全局变量，可以很方便的定制波浪移动速度、波浪长度、波浪高度。\n\n\n## 使用SurfaceView\n\n为了达到比较好的性能，使用`SurfaceView`在子线程绘图。\n\n## 性能优化\n\n因为这里涉及逐个像素操作，所以遍历的运算量很大，一定要对遍历的量进行控制，否则会很卡。\n\n我这里采用控制图片大小的方式\n```java\n***\n    bitmap = setBitmapSize(bitmap, calculateSize * bitmap.getWidth() / bitmap.getHeight(), calculateSize);\n\n***\n    /**\n     * 缩放图片\n     *\n     * @param bitmap    原图片\n     * @param newWidth\n     * @param newHeight\n     * @return\n     */\n    private Bitmap setBitmapSize(Bitmap bitmap, int newWidth, int newHeight) {\n        int width = bitmap.getWidth();\n        int height = bitmap.getHeight();\n        float scaleWidth = (newWidth * 1.0f) / width;\n        float scaleHeight = (newHeight * 1.0f) / height;\n        Matrix matrix = new Matrix();\n        matrix.postScale(scaleWidth, scaleHeight);\n        return Bitmap.createBitmap(bitmap, 0, 0, width, height, matrix, true);\n    }\n```\n\n\n通过`calculateSize`控制循环次数在有限的范围内，并在最终绘制Bitmap时使用区域绘制函数：\n\n```java\n    private void draw() {\n        Canvas canvas = mHolder.lockCanvas();\n        canvas.drawBitmap(bitmap, rectBitmap, rectCanvas, mPaint);\n        mHolder.unlockCanvasAndPost(canvas);\n    }\n```\n\n## 注意事项\n\n- 为了达到`SurfaceView`透明效果，需要加入以下两句代码\n```java\nsetZOrderOnTop(true);\nmHolder.setFormat(TRANSLUCENT);\n```\n\n- 从`Drawable`中得到的`Bitmap`不能直接`setPixel()`，必须重新`Bitmap.createBitmap()`，或`Bitmap.copy()`，使得`isMutable`属性为`true`，得到新的`Bitmap`对象才能操作像素，否则会报`IllegalStateException`\n\n\n## 完整源码:\n\n[https://github.com/wangyucode/WaveProgress](https://github.com/wangyucode/WaveProgress)\n","data":{"title":"自定义形状波浪进度","date":"2017-07-24","tags":["Android"],"category":"Android"},"isEmpty":false,"excerpt":"\n\u003e 今天碰到个需求，要求以波浪进度填充自定义透明形状，废话不多说，直接上最终效果图\n\n![波浪效果](/images/20170724_wave_progress.gif)\n\n"},{"id":"blender-learn","file":"blender-learn.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eBlender 是一款开源的跨平台全能三维动画制作软件，永久免费。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170717_blender_logo.png\" alt=\"Blender\" class=\"mx-auto max-h-80\"\u003e\n在这篇文章中你将学到Blender 3D建模入门。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eBlender官方中文手册：\u003ca href=\"https://docs.blender.org/manual/zh.cn/dev/\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://docs.blender.org/manual/zh.cn/dev/\u003c/a\u003e\u003c/p\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eBlender 是一款开源的跨平台全能三维动画制作软件，永久免费。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170717_blender_logo.png\" alt=\"Blender\" class=\"mx-auto max-h-80\"\u003e\n在这篇文章中你将学到Blender 3D建模入门。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eBlender官方中文手册：\u003ca href=\"https://docs.blender.org/manual/zh.cn/dev/\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://docs.blender.org/manual/zh.cn/dev/\u003c/a\u003e\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e用户界面\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170718_blender_interface.jpg\" alt=\"用户界面\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eT\u003c/code\u003e打开、关闭工具栏（左侧）\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eN\u003c/code\u003e打开、关闭属性栏（右侧）\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eShift\u003c/code\u003e+\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpace\u003c/code\u003e最大化当前窗口\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e设置为中文\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFile\u003c/code\u003e-\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUser preferences\u003c/code\u003e-\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSystem\u003c/code\u003e勾选\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eInternational Fonts\u003c/code\u003e，并选择下方的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eInterface\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTooltips\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e选择\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e在Blender中\u003cstrong\u003e右键\u003c/strong\u003e是选择物体\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e可以在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFile\u003c/code\u003e-\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUser preferences\u003c/code\u003e-\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eInput\u003c/code\u003e中切换成左键或右键选择\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e导航\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e按住\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e鼠标中键\u003c/code\u003e移动鼠标可以旋转视角\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e按住\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e鼠标中键\u003c/code\u003e+\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eShift\u003c/code\u003e可以上下左右移动（不旋转）\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eShift\u003c/code\u003e+\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eF\u003c/code\u003e可以进入飞行模式，可以使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eW\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eA\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eS\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eD\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eQ\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eE\u003c/code\u003e移动视角\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e鼠标滚轮\u003c/code\u003e缩放视角\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n\u003e Blender 是一款开源的跨平台全能三维动画制作软件，永久免费。\n\n![Blender](/images/20170717_blender_logo.png)\n在这篇文章中你将学到Blender 3D建模入门。\n\nBlender官方中文手册：[https://docs.blender.org/manual/zh.cn/dev/](https://docs.blender.org/manual/zh.cn/dev/)\n\n\u003c!--more--\u003e\n\n## 用户界面\n![用户界面](/images/20170718_blender_interface.jpg)\n- `T`打开、关闭工具栏（左侧）\n- `N`打开、关闭属性栏（右侧）\n- `Shift`+`Space`最大化当前窗口\n\n## 设置为中文\n\n- 在`File`-`User preferences`-`System`勾选`International Fonts`，并选择下方的`Interface`和`Tooltips`\n\n## 选择\n\n- 在Blender中**右键**是选择物体\n- 可以在`File`-`User preferences`-`Input`中切换成左键或右键选择\n\n## 导航\n\n- 按住`鼠标中键`移动鼠标可以旋转视角\n- 按住`鼠标中键`+`Shift`可以上下左右移动（不旋转）\n- `Shift`+`F`可以进入飞行模式，可以使用`W`、`A`、`S`、`D`、`Q`、`E`移动视角\n- `鼠标滚轮`缩放视角\n","data":{"title":"Blender建模入门","date":"2017-07-18","tags":["Blender"],"category":"3D"},"isEmpty":false,"excerpt":"\n\u003e Blender 是一款开源的跨平台全能三维动画制作软件，永久免费。\n\n![Blender](/images/20170717_blender_logo.png)\n在这篇文章中你将学到Blender 3D建模入门。\n\nBlender官方中文手册：[https://docs.blender.org/manual/zh.cn/dev/](https://docs.blender.org/manual/zh.cn/dev/)\n\n"},{"id":"unity-json","file":"unity-json.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJSON是一种应用广泛的数据交换格式。可用于和Web服务器交互，以及用于对象序列化。Unity使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJsonUtility\u003c/code\u003e类提供JSON文本和对象互转。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e下面将基本的使用总结如下：\u003c/p\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJSON是一种应用广泛的数据交换格式。可用于和Web服务器交互，以及用于对象序列化。Unity使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJsonUtility\u003c/code\u003e类提供JSON文本和对象互转。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e下面将基本的使用总结如下：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSerializable\u003c/code\u003e标记对象\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-csharp px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e[Serializable]\npublic class WyResultGameScore{\n\n    public int code;//(integer, optional): code: 返回代码，1表示OK，其它的都有对应问题 ,\n    public List\u0026#x3C;GameScore\u003e data;//(Array[GameScore], optional): data : code为1时返回结果集 ,\n    public string message;//(string, optional): message : code!=1时的错误信息\n\n}\n\n[Serializable]\npublic class GameScore\n{\n    public int gameId;//(integer, optional): 游戏id 1=滚蛋吧 ,\n    public int id;//(integer, optional): 分数id ,\n    public string name;//(string, optional): 昵称 ,\n    public string platform;//(string, optional): 游戏平台 ,\n    public int score;//(integer, optional): 分数 ,\n    public string userId;//(string, optional): userId\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eJSON string转Object\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-csharp px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003estring json = \"{\"code\":1,\"message\":\"成功\",\"data\":[{\"id\":2,\"name\":\"游客9527\",\"score\":10,\"platform\":\"iOS\",\"userId\":\"1\",\"gameId\":1}]}\";\nWyResultGameScore result = JsonUtility.FromJson\u0026#x3C;WyResultGameScore\u003e(json);\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eObject转JSON string\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-csharp px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003estring json = JsonUtility.ToJson(myObject);\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e JSON是一种应用广泛的数据交换格式。可用于和Web服务器交互，以及用于对象序列化。Unity使用`JsonUtility`类提供JSON文本和对象互转。\n\n下面将基本的使用总结如下：\n\n\u003c!--more--\u003e\n\n## 使用 `Serializable`标记对象\n\n```csharp\n[Serializable]\npublic class WyResultGameScore{\n\n    public int code;//(integer, optional): code: 返回代码，1表示OK，其它的都有对应问题 ,\n    public List\u003cGameScore\u003e data;//(Array[GameScore], optional): data : code为1时返回结果集 ,\n    public string message;//(string, optional): message : code!=1时的错误信息\n\n}\n\n[Serializable]\npublic class GameScore\n{\n    public int gameId;//(integer, optional): 游戏id 1=滚蛋吧 ,\n    public int id;//(integer, optional): 分数id ,\n    public string name;//(string, optional): 昵称 ,\n    public string platform;//(string, optional): 游戏平台 ,\n    public int score;//(integer, optional): 分数 ,\n    public string userId;//(string, optional): userId\n}\n```\n## JSON string转Object\n\n```csharp\nstring json = \"{\"code\":1,\"message\":\"成功\",\"data\":[{\"id\":2,\"name\":\"游客9527\",\"score\":10,\"platform\":\"iOS\",\"userId\":\"1\",\"gameId\":1}]}\";\nWyResultGameScore result = JsonUtility.FromJson\u003cWyResultGameScore\u003e(json);\n```\n\n## Object转JSON string\n\n```csharp\nstring json = JsonUtility.ToJson(myObject);\n```","data":{"title":"Unity中的JSON解析","date":"2017-07-12","tags":["Unity","CSharp","JSON"],"category":"Unity"},"isEmpty":false,"excerpt":"\n\u003e JSON是一种应用广泛的数据交换格式。可用于和Web服务器交互，以及用于对象序列化。Unity使用`JsonUtility`类提供JSON文本和对象互转。\n\n下面将基本的使用总结如下：\n\n"}],"page":12,"total":15},"__N_SSG":true},"page":"/blog/page/[page]","query":{"page":"12"},"buildId":"7YMuoTtyITfiinBiv1T76","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
