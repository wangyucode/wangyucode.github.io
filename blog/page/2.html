<!DOCTYPE html><html lang="zh-CN"><head><meta charSet="utf-8"/><title>王郁的小站</title><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/><meta name="next-head-count" content="3"/><link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml"/><meta name="description" content="欢迎光临王郁的小站"/><meta property="og:image" content="https://og-image.vercel.app/%E7%8E%8B%E9%83%81%E7%9A%84%E5%B0%8F%E7%AB%99.png?theme=light&amp;md=0&amp;fontSize=75px&amp;images=https%3A%2F%2Fassets.vercel.com%2Fimage%2Fupload%2Ffront%2Fassets%2Fdesign%2Fnextjs-black-logo.svg"/><meta name="og:title" content="王郁的小站"/><meta name="twitter:card" content="summary_large_image"/><link rel="preload" href="/_next/static/css/804786de35d6ea9b.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/804786de35d6ea9b.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-6af0e3c12b874bb0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-e14092e0d084b50d.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-bc0074f0f8514a28.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-80e5bb06d977ddb5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/358-09e70898ee89de63.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/889-d516db97bb2485e1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/blog/page/%5Bpage%5D-0b41e9c2dec44a07.js" defer="" crossorigin=""></script><script src="/_next/static/uFO1FMOoBQ2X-GM8G4ZfF/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/uFO1FMOoBQ2X-GM8G4ZfF/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"esm-node-ts","file":"esm-node-ts.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.w3cschool.cn/attachments/image/20170808/1502178281486445.png\" alt=\"nodejs\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eJavaScript的模块化方案经历了长时间的发展，最终于2015年在ES6实现了语言层面的标准化，即esModule（以下简称esm）, 现在JS社区开始拥抱esm，很多npm包仅采用esm发布。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而NodeJS一直依赖采用CommonJS的模块化方案，在最近发布的版本中也开始支持ems, 由于巨大的历史包袱，NodeJS并没有抛弃CommonJS，所以在NodeJS中实际支持两种模块化方式，esm和CommonJS.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此外，现在很多前端工程使用TypeScript开发，而TS的模块解析方式也需要进行一些配置，在这3者结合的过程中有很多坑，本文介绍将三者完美结合的最佳实践。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.w3cschool.cn/attachments/image/20170808/1502178281486445.png\" alt=\"nodejs\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eJavaScript的模块化方案经历了长时间的发展，最终于2015年在ES6实现了语言层面的标准化，即esModule（以下简称esm）, 现在JS社区开始拥抱esm，很多npm包仅采用esm发布。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而NodeJS一直依赖采用CommonJS的模块化方案，在最近发布的版本中也开始支持ems, 由于巨大的历史包袱，NodeJS并没有抛弃CommonJS，所以在NodeJS中实际支持两种模块化方式，esm和CommonJS.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此外，现在很多前端工程使用TypeScript开发，而TS的模块解析方式也需要进行一些配置，在这3者结合的过程中有很多坑，本文介绍将三者完美结合的最佳实践。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e同时引入CommonJS包和ESM包\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e为了测试我们同时引入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elodash\u003c/code\u003e的CommonJS版本和ESM版本\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpm i lodash-es lodash\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e在NodeJS中，模块作者除非显示指定使用esm方式加载模块：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.mjs\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epackage.json\u003c/code\u003e中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etype\u003c/code\u003e字段指定为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodule\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e--input-type\u003c/code\u003e标记\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e否则默认加载方式为CommonJS。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而上面的例子中\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elodash-es\u003c/code\u003e的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epackage.json\u003c/code\u003e中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etype\u003c/code\u003e就是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodule\u003c/code\u003e。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用CommonJS包\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e创建一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.js\u003c/code\u003e文件：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003econst _ = require('lodash');\nconsole.log(_.VERSION); // print '4.17.21'\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e以上是CommonJS的写法，很习以为常，能够正确打印。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用esm包\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e创建一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eesm.js\u003c/code\u003e文件：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eimport _ from 'lodash-es';\nconsole.log(_.VERSION);\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e第1个坑出现了, 报语法错误：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSyntaxError: Cannot use import statement outside a module\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e说无法在模块外部使用import语句，一旦一个文件有顶级(top-level)的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eimport\u003c/code\u003e或\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eexport\u003c/code\u003e，它会被当作一个模块，否则是一个脚本文件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e所以我们需要把这个文件变成esm，两种方式：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e重命名文件，修改扩展名为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.mjs\u003c/code\u003e;\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epackage.json\u003c/code\u003e中添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\"type\": \"module\"\u003c/code\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e但如果采用选项2，第2个坑就会出现了, 回去运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.js\u003c/code\u003e报错：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReferenceError: require is not defined in ES module scope, you can use import instead\u003c/code\u003e。\n说\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003erequire\u003c/code\u003e在esm中不支持，此时可以重命名\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.js\u003c/code\u003e后缀为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.cjs\u003c/code\u003e，告诉模块加载器，此文件以CommonJS加载。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e引入Typescript\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e安装TS：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpm i typescript ts-node -D\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003ets-node 可以在nodejs中直接运行ts文件而无需编译\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e然后将刚才的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eesm.js\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.cjs\u003c/code\u003e扩展名改为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.ts\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ets-node\u003c/code\u003e命令直接运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eesm.ts\u003c/code\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpx ts-node esm.ts\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e第3个坑出现了，扩展名不支持：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTypeError [ERR_UNKNOWN_FILE_EXTENSION]: Unknown file extension \".ts\" for xxx\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这是因为esm的默认扩展名是js而不是ts，此时我们需要：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ets-node --esm\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\"ts-node\": {\"esm\": true}\u003c/code\u003e到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etsconfig.json\u003c/code\u003e。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e如果采用方案1，第4个坑出现了，无法找到模块：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eerror TS7016: Could not find a declaration file for module 'lodash-es'\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时添加配置: \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\"esModuleInterop\": true\u003c/code\u003e到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etsconfig.json\u003c/code\u003e的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecompilerOptions\u003c/code\u003e中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e添加完成后第5个坑出现了，引用错误：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReferenceError: exports is not defined in ES module scope\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时添加配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodule\": \"ESNext\"\u003c/code\u003e到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etsconfig.json\u003c/code\u003e的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecompilerOptions\u003c/code\u003e中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e添加完成后第6个坑出现了，找不到模块：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReferenceError: exports is not defined in ES module scope\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时配置模块的解析方式为最新的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\"moduleResolution\": \"Node16\"\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e到此终于可以成功运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eesm.ts\u003c/code\u003e了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e返回去运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.ts\u003c/code\u003e:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpx ts-node common-js.ts\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e第7个坑出现了，它把我们的CommonJS模块当esm了：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReferenceError: require is not defined in ES module scope, you can use import instead\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时处于鱼和熊掌不可兼得，因为我们设置了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodule\": \"ESNext\"\u003c/code\u003e， 所以ts的编译结果会添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eexport {}\u003c/code\u003e，所以如果要在纯esm的工程中仍然要使用CommonJS，则使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.cjs\u003c/code\u003e作为扩展名即可。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e完整的代码在这里：\u003ca href=\"https://github.com/wangyucode/esm-node-ts\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/esm-node-ts\u003c/a\u003e\u003c/p\u003e\n","content":"\n![nodejs](https://www.w3cschool.cn/attachments/image/20170808/1502178281486445.png)\n\nJavaScript的模块化方案经历了长时间的发展，最终于2015年在ES6实现了语言层面的标准化，即esModule（以下简称esm）, 现在JS社区开始拥抱esm，很多npm包仅采用esm发布。\n\n而NodeJS一直依赖采用CommonJS的模块化方案，在最近发布的版本中也开始支持ems, 由于巨大的历史包袱，NodeJS并没有抛弃CommonJS，所以在NodeJS中实际支持两种模块化方式，esm和CommonJS.\n\n此外，现在很多前端工程使用TypeScript开发，而TS的模块解析方式也需要进行一些配置，在这3者结合的过程中有很多坑，本文介绍将三者完美结合的最佳实践。\n\n\u003c!--more--\u003e\n\n## 同时引入CommonJS包和ESM包\n\n为了测试我们同时引入`lodash`的CommonJS版本和ESM版本\n\n```bash\nnpm i lodash-es lodash\n```\n\n在NodeJS中，模块作者除非显示指定使用esm方式加载模块：\n\n- 使用`.mjs`\n- 在`package.json`中的`type`字段指定为`module`\n- 使用`--input-type`标记\n\n否则默认加载方式为CommonJS。\n\n而上面的例子中`lodash-es`的`package.json`中的`type`就是`module`。\n\n## 使用CommonJS包\n\n创建一个`common-js.js`文件：\n\n```javascript\nconst _ = require('lodash');\nconsole.log(_.VERSION); // print '4.17.21'\n```\n\n以上是CommonJS的写法，很习以为常，能够正确打印。\n\n## 使用esm包\n\n创建一个`esm.js`文件：\n\n```javascript\nimport _ from 'lodash-es';\nconsole.log(_.VERSION);\n```\n\n第1个坑出现了, 报语法错误：`SyntaxError: Cannot use import statement outside a module`\n\n说无法在模块外部使用import语句，一旦一个文件有顶级(top-level)的`import`或`export`，它会被当作一个模块，否则是一个脚本文件。\n\n所以我们需要把这个文件变成esm，两种方式：\n\n1. 重命名文件，修改扩展名为`.mjs`;\n2. 在`package.json`中添加`\"type\": \"module\"`\n\n但如果采用选项2，第2个坑就会出现了, 回去运行`common-js.js`报错：`ReferenceError: require is not defined in ES module scope, you can use import instead`。\n说`require`在esm中不支持，此时可以重命名`common-js.js`后缀为`.cjs`，告诉模块加载器，此文件以CommonJS加载。\n\n## 引入Typescript\n\n安装TS：\n\n```bash\nnpm i typescript ts-node -D\n```\n\n\u003e ts-node 可以在nodejs中直接运行ts文件而无需编译\n\n然后将刚才的`esm.js`和`common-js.cjs`扩展名改为`.ts`\n\n使用`ts-node`命令直接运行`esm.ts`\n\n```bash\nnpx ts-node esm.ts\n```\n\n第3个坑出现了，扩展名不支持：`TypeError [ERR_UNKNOWN_FILE_EXTENSION]: Unknown file extension \".ts\" for xxx`\n\n这是因为esm的默认扩展名是js而不是ts，此时我们需要：\n\n1. `ts-node --esm`\n2. 添加 `\"ts-node\": {\"esm\": true}`到`tsconfig.json`。\n\n如果采用方案1，第4个坑出现了，无法找到模块：`error TS7016: Could not find a declaration file for module 'lodash-es'`。\n\n此时添加配置: `\"esModuleInterop\": true`到`tsconfig.json`的`compilerOptions`中。\n\n添加完成后第5个坑出现了，引用错误：`ReferenceError: exports is not defined in ES module scope`\n\n此时添加配置`module\": \"ESNext\"`到`tsconfig.json`的`compilerOptions`中。\n\n添加完成后第6个坑出现了，找不到模块：`ReferenceError: exports is not defined in ES module scope`\n\n此时配置模块的解析方式为最新的`\"moduleResolution\": \"Node16\"`。\n\n到此终于可以成功运行`esm.ts`了。\n\n返回去运行`common-js.ts`:\n\n```bash\nnpx ts-node common-js.ts\n```\n\n第7个坑出现了，它把我们的CommonJS模块当esm了：`ReferenceError: require is not defined in ES module scope, you can use import instead`\n\n此时处于鱼和熊掌不可兼得，因为我们设置了`module\": \"ESNext\"`， 所以ts的编译结果会添加`export {}`，所以如果要在纯esm的工程中仍然要使用CommonJS，则使用`.cjs`作为扩展名即可。\n\n完整的代码在这里：https://github.com/wangyucode/esm-node-ts","data":{"title":"esModule + NodeJS + TypeScript 的工程配置","date":"2022-09-22","tags":["JavaScript","TypeScript","NodeJS"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![nodejs](https://www.w3cschool.cn/attachments/image/20170808/1502178281486445.png)\n\nJavaScript的模块化方案经历了长时间的发展，最终于2015年在ES6实现了语言层面的标准化，即esModule（以下简称esm）, 现在JS社区开始拥抱esm，很多npm包仅采用esm发布。\n\n而NodeJS一直依赖采用CommonJS的模块化方案，在最近发布的版本中也开始支持ems, 由于巨大的历史包袱，NodeJS并没有抛弃CommonJS，所以在NodeJS中实际支持两种模块化方式，esm和CommonJS.\n\n此外，现在很多前端工程使用TypeScript开发，而TS的模块解析方式也需要进行一些配置，在这3者结合的过程中有很多坑，本文介绍将三者完美结合的最佳实践。\n\n"},{"id":"the-crowd","file":"the-crowd.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://p1.qhimg.com/t016f1e762c0161d220.jpg\" alt=\"The Crowd\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e闻有吏虽乱而有独善之民，不闻有乱民而有独治之吏\n—《韩非子·外储说》\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e《乌合之众：大众心理研究》是一本研究大众心理学的著作。是法国社会心理学家古斯塔夫·勒庞创作的社会心理学著作，首次出版于1895年。勒庞指出：个人一旦融入群体，他们的个性将会被湮灭，群体的思想便会占据统治地位，而与此同时群体的行为也会变现为排斥异议、极端化、情绪化低智商化等特点，进而对社会产生破坏性的影响。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e读了此书，你会明白过去、现在、以及将来全世界发生的各种群体事件背后的直接原因。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本文摘抄了《乌合之众：大众心理研究》在Kindle电子书中的热门标注：\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://p1.qhimg.com/t016f1e762c0161d220.jpg\" alt=\"The Crowd\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e闻有吏虽乱而有独善之民，不闻有乱民而有独治之吏\n—《韩非子·外储说》\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e《乌合之众：大众心理研究》是一本研究大众心理学的著作。是法国社会心理学家古斯塔夫·勒庞创作的社会心理学著作，首次出版于1895年。勒庞指出：个人一旦融入群体，他们的个性将会被湮灭，群体的思想便会占据统治地位，而与此同时群体的行为也会变现为排斥异议、极端化、情绪化低智商化等特点，进而对社会产生破坏性的影响。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e读了此书，你会明白过去、现在、以及将来全世界发生的各种群体事件背后的直接原因。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本文摘抄了《乌合之众：大众心理研究》在Kindle电子书中的热门标注：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e热门标注\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e自觉的个性的消失，以及感情和思想转向一个不同的方向，就是要变成组织化群体的人所表现出的首要特征。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e无意识现象不但在有机体的生活中，而且在智力活动中，都发挥着一种完全压倒性的作用。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体在智力上总是低于孤立的个人，但是感情及其激起的行动这个角度看，群体可以比个人表现的更好或更差，全看环境如何。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e孤立的个人具有主宰自己的反应的能力，群体则缺乏这种能力。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e大凡能够成就大业的领袖人物，他最重要的品质不是博学多识，而是必须“具备强大而持久的意志力”，这是一种“极为罕见、极为强大的品质，它足以征服一切。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体要想成为历史变迁的主角，它必须多多少少“为信仰而战”，也就是说，它的形成必须是为了某些简单而明确的信仰。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e在观念简单化效应的作用下，凡是有抱着怀疑的精神、相信在政治和社会问题上极不易发现“确定性真理”的人，尤其是一个习惯于用推理和讨论的方式说明问题的人，在群体中是没有地位的；当面对群情激奋时，他尤其会生出苍白无力的感觉：因为他意识到他要与之作对的，不仅仅是一种错误的行为，而且还有“多数的力量”，还有贯彻这种行为时的偏执态度。我们更能理解，所谓专业精英，不管他智力多么高强，他陈明利害得失的理性努力，面对被空洞的观念冲昏了头脑的群体，反而会产生一种自己十分迂腐的无聊感觉。更为可悲的是，面对群众的荒谬与狂热，明智之士更有可能根本不会作出这样的努力，而是同群体一起陷入其中，事后又惊叹于自己连常识都已忘却的愚蠢。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e因此在同人类的各种作为文明动力的感情——“譬如尊严、自我牺牲、宗教信仰、爱国主义以及对荣誉的爱”——的对抗中，理性在大多数时候都不是赢家。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体只知道简单而极端的感情；提供给他们的各种意见、想法和信念，他们或者全盘接受，或者一概拒绝；将其视为绝对真理或绝对谬论。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e进入了群体的个人，在“集体潜意识”机制的作用下，在心理上会产生一种本质性的变化。就像“动物、痴呆、社会主义者、幼儿和原始人”一样，这样的个人会不由自主地失去自我意识，完全变成另一种智力水平十分低下的生物。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e自法国大革命以来，由领袖、意识形态和勒庞意义上的群体所组成的这种新的三位一体，便取代了宗教与皇权，成为一切民主宪政架构之外政治合法性运动的要件，尤其在勒庞之后的一百年里，这种新的三位一体更是上演了一幕幕规模宏大而惨烈的悲剧。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e社会组织就像一切生命有机体一样复杂，我们还不具备强迫它们在突然之间发生深刻变革的智力”。因此他反对一个民族热衷于重大的政治和社会变革，他认为，这种变革的计划从理论上说无论多么出色，都不会使民族气质即刻出现变化（因为“只有时间具备这样的力量”）。采用激进的方式，借助于抽象的原则贯彻一种社会改造的蓝图，只会“使一个高度精致的文明倒退到社会进化更早期的阶段”\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e人们在智力上差异最大，但他们却有着非常相似的本能和情感。在属于情感领域的每一种事情上——宗教、政治、道德、爱憎等等，最杰出的人士很少能比凡夫俗子高明多少。从智力上说，一个伟大的数学家和他的鞋匠之间可能有天壤之别，但是从性格的角度看，他们可能差别甚微或根本没有差别。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e在集体心理中，个人的才智被削弱了，从而他们的个性也被削弱了。异质性被同质性所吞没，无意识的品质占了上风。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体是个无名氏，因此也不必承担责任。这样一来，总是约束着个人的责任感便彻底消失了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e有意识人格的消失，无意识人格的得势，思想和感情因暗示和相互传染作用而转向一个共同的方向，以及立刻把暗示的观念转化为行动的倾向，是组成群体的个人所表现出来的主要特点。他不再是他自己，他变成了一个不再受自己意志支配的玩偶。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体中的个人不但在行动上和他本人有着本质的差别，甚至在完全失去独立性之前，他的思想和感情就已经发生了变化，这种变化是如此深刻，它可以让一个守财奴变得挥霍无度，把怀疑论者改造成信徒，把老实人变成罪犯，把懦夫变成豪杰。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体可以转瞬之间就从最血腥的狂热变成最极端的宽宏大量和英雄主义。群体很容易做出刽子手的举动，同样也很容易慷慨赴义。正是群体，为每一种信仰的胜利而不惜血流成河。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体因为夸大自己的感情，因此它只会被极端感情所打动。希望感动群体的演说家，必须出言不逊，信誓旦旦。夸大其辞、言之凿凿、不断重复，绝对不以说理的方式证明任何事情\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体只知道简单而极端的感情；提供给他们的各种意见、想法和信念，他们或者全盘接受，或者一概拒绝；将其视为绝对真理或绝对谬论。用暗示的办法加以诱导而不是作出合理解释的信念，历来都是如此。与宗教信仰有关的偏执及其对人们的头脑实行的专制统治，早就为大家所知。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e在公众集会上，演说者哪怕作出最轻微的反驳，立刻就会招来怒吼和粗野的叫骂。在一片嘘声和驱逐声中，演说者很快就会败下阵来。当然，假如现场缺少当权者的代表这种约束性因素，反驳者往往会被打死。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体可以杀人放火，无恶不作，但是也能表现出极崇高的献身、牺牲和不计名利的举动，即孤立的个人根本做不到的极崇高的行为。以名誉、光荣和爱国主义作为号召，最有可能影响到组成群体的个人，而且经常可以达到使他慷慨赴死的地步。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体推理的特点，是把彼此不同、只在表面上相似的事物搅在一起，并且立刻把具体的事物普遍化。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e影响民众想象力的，并不是事实本身，而是它们发生和引起注意的方式。如果让我表明看法的话，我会说，必须对它们进行浓缩加工，它们才会形成一种令人瞠目结舌的惊人形象。掌握了影响群众想象力的艺术，也就掌握了统治他们的艺术。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e一切政治、神学或社会信条，要想在群众中扎根，都必须采取宗教的形式——能够把危险的讨论排除在外的形式。即便有可能使群众接受无神论，这种信念也会表现出宗教情感中所有的偏执狂，它很快就会表现为一种崇拜。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e词语的威力与它们所唤醒的形象有关，同时又独立于它们的真实含义。最不明确的词语，有时反而影响最大。例如像民主、社会主义、平等、自由等等，它们的含义极为模糊，即使一大堆专著也不足以确定它们的所指。然而这区区几个词语的确有着神奇的威力，它们似乎是解决一切问题的灵丹妙药。各种极不相同的潜意识中的抱负及其实现的希望，全被它们集于一身。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e信徒们总是穷凶极恶地打碎他们以前神灵的塑像。\u003c/p\u003e\n\u003c/blockquote\u003e\n","content":"\n![The Crowd](https://p1.qhimg.com/t016f1e762c0161d220.jpg)\n\n\u003e 闻有吏虽乱而有独善之民，不闻有乱民而有独治之吏 \n                    —《韩非子·外储说》\n\n《乌合之众：大众心理研究》是一本研究大众心理学的著作。是法国社会心理学家古斯塔夫·勒庞创作的社会心理学著作，首次出版于1895年。勒庞指出：个人一旦融入群体，他们的个性将会被湮灭，群体的思想便会占据统治地位，而与此同时群体的行为也会变现为排斥异议、极端化、情绪化低智商化等特点，进而对社会产生破坏性的影响。\n\n读了此书，你会明白过去、现在、以及将来全世界发生的各种群体事件背后的直接原因。\n\n本文摘抄了《乌合之众：大众心理研究》在Kindle电子书中的热门标注：\n\n\u003c!--more--\u003e\n\n## 热门标注\n\n\u003e 自觉的个性的消失，以及感情和思想转向一个不同的方向，就是要变成组织化群体的人所表现出的首要特征。\n\n\u003e 无意识现象不但在有机体的生活中，而且在智力活动中，都发挥着一种完全压倒性的作用。\n\n\u003e 群体在智力上总是低于孤立的个人，但是感情及其激起的行动这个角度看，群体可以比个人表现的更好或更差，全看环境如何。\n\n\u003e 孤立的个人具有主宰自己的反应的能力，群体则缺乏这种能力。\n\n\u003e 大凡能够成就大业的领袖人物，他最重要的品质不是博学多识，而是必须“具备强大而持久的意志力”，这是一种“极为罕见、极为强大的品质，它足以征服一切。\n\n\u003e 群体要想成为历史变迁的主角，它必须多多少少“为信仰而战”，也就是说，它的形成必须是为了某些简单而明确的信仰。\n\n\u003e 在观念简单化效应的作用下，凡是有抱着怀疑的精神、相信在政治和社会问题上极不易发现“确定性真理”的人，尤其是一个习惯于用推理和讨论的方式说明问题的人，在群体中是没有地位的；当面对群情激奋时，他尤其会生出苍白无力的感觉：因为他意识到他要与之作对的，不仅仅是一种错误的行为，而且还有“多数的力量”，还有贯彻这种行为时的偏执态度。我们更能理解，所谓专业精英，不管他智力多么高强，他陈明利害得失的理性努力，面对被空洞的观念冲昏了头脑的群体，反而会产生一种自己十分迂腐的无聊感觉。更为可悲的是，面对群众的荒谬与狂热，明智之士更有可能根本不会作出这样的努力，而是同群体一起陷入其中，事后又惊叹于自己连常识都已忘却的愚蠢。\n\n\u003e 因此在同人类的各种作为文明动力的感情——“譬如尊严、自我牺牲、宗教信仰、爱国主义以及对荣誉的爱”——的对抗中，理性在大多数时候都不是赢家。\n\n\u003e 群体只知道简单而极端的感情；提供给他们的各种意见、想法和信念，他们或者全盘接受，或者一概拒绝；将其视为绝对真理或绝对谬论。\n\n\u003e 进入了群体的个人，在“集体潜意识”机制的作用下，在心理上会产生一种本质性的变化。就像“动物、痴呆、社会主义者、幼儿和原始人”一样，这样的个人会不由自主地失去自我意识，完全变成另一种智力水平十分低下的生物。\n\n\u003e 自法国大革命以来，由领袖、意识形态和勒庞意义上的群体所组成的这种新的三位一体，便取代了宗教与皇权，成为一切民主宪政架构之外政治合法性运动的要件，尤其在勒庞之后的一百年里，这种新的三位一体更是上演了一幕幕规模宏大而惨烈的悲剧。\n\n\u003e 社会组织就像一切生命有机体一样复杂，我们还不具备强迫它们在突然之间发生深刻变革的智力”。因此他反对一个民族热衷于重大的政治和社会变革，他认为，这种变革的计划从理论上说无论多么出色，都不会使民族气质即刻出现变化（因为“只有时间具备这样的力量”）。采用激进的方式，借助于抽象的原则贯彻一种社会改造的蓝图，只会“使一个高度精致的文明倒退到社会进化更早期的阶段”\n\n\u003e 人们在智力上差异最大，但他们却有着非常相似的本能和情感。在属于情感领域的每一种事情上——宗教、政治、道德、爱憎等等，最杰出的人士很少能比凡夫俗子高明多少。从智力上说，一个伟大的数学家和他的鞋匠之间可能有天壤之别，但是从性格的角度看，他们可能差别甚微或根本没有差别。\n\n\u003e 在集体心理中，个人的才智被削弱了，从而他们的个性也被削弱了。异质性被同质性所吞没，无意识的品质占了上风。\n\n\u003e 群体是个无名氏，因此也不必承担责任。这样一来，总是约束着个人的责任感便彻底消失了。\n\n\u003e 有意识人格的消失，无意识人格的得势，思想和感情因暗示和相互传染作用而转向一个共同的方向，以及立刻把暗示的观念转化为行动的倾向，是组成群体的个人所表现出来的主要特点。他不再是他自己，他变成了一个不再受自己意志支配的玩偶。\n\n\u003e 群体中的个人不但在行动上和他本人有着本质的差别，甚至在完全失去独立性之前，他的思想和感情就已经发生了变化，这种变化是如此深刻，它可以让一个守财奴变得挥霍无度，把怀疑论者改造成信徒，把老实人变成罪犯，把懦夫变成豪杰。\n\n\u003e 群体可以转瞬之间就从最血腥的狂热变成最极端的宽宏大量和英雄主义。群体很容易做出刽子手的举动，同样也很容易慷慨赴义。正是群体，为每一种信仰的胜利而不惜血流成河。\n\n\u003e 群体因为夸大自己的感情，因此它只会被极端感情所打动。希望感动群体的演说家，必须出言不逊，信誓旦旦。夸大其辞、言之凿凿、不断重复，绝对不以说理的方式证明任何事情\n\n\u003e 群体只知道简单而极端的感情；提供给他们的各种意见、想法和信念，他们或者全盘接受，或者一概拒绝；将其视为绝对真理或绝对谬论。用暗示的办法加以诱导而不是作出合理解释的信念，历来都是如此。与宗教信仰有关的偏执及其对人们的头脑实行的专制统治，早就为大家所知。\n\n\u003e 在公众集会上，演说者哪怕作出最轻微的反驳，立刻就会招来怒吼和粗野的叫骂。在一片嘘声和驱逐声中，演说者很快就会败下阵来。当然，假如现场缺少当权者的代表这种约束性因素，反驳者往往会被打死。\n\n\u003e 群体可以杀人放火，无恶不作，但是也能表现出极崇高的献身、牺牲和不计名利的举动，即孤立的个人根本做不到的极崇高的行为。以名誉、光荣和爱国主义作为号召，最有可能影响到组成群体的个人，而且经常可以达到使他慷慨赴死的地步。\n\n\u003e 群体推理的特点，是把彼此不同、只在表面上相似的事物搅在一起，并且立刻把具体的事物普遍化。\n\n\u003e 影响民众想象力的，并不是事实本身，而是它们发生和引起注意的方式。如果让我表明看法的话，我会说，必须对它们进行浓缩加工，它们才会形成一种令人瞠目结舌的惊人形象。掌握了影响群众想象力的艺术，也就掌握了统治他们的艺术。\n\n\u003e 一切政治、神学或社会信条，要想在群众中扎根，都必须采取宗教的形式——能够把危险的讨论排除在外的形式。即便有可能使群众接受无神论，这种信念也会表现出宗教情感中所有的偏执狂，它很快就会表现为一种崇拜。\n\n\u003e 词语的威力与它们所唤醒的形象有关，同时又独立于它们的真实含义。最不明确的词语，有时反而影响最大。例如像民主、社会主义、平等、自由等等，它们的含义极为模糊，即使一大堆专著也不足以确定它们的所指。然而这区区几个词语的确有着神奇的威力，它们似乎是解决一切问题的灵丹妙药。各种极不相同的潜意识中的抱负及其实现的希望，全被它们集于一身。\n\n\u003e 信徒们总是穷凶极恶地打碎他们以前神灵的塑像。\n","data":{"title":"《乌合之众：大众心理研究》热门标注","date":"2021-07-22","tags":null,"category":"Story"},"isEmpty":false,"excerpt":"\n![The Crowd](https://p1.qhimg.com/t016f1e762c0161d220.jpg)\n\n\u003e 闻有吏虽乱而有独善之民，不闻有乱民而有独治之吏 \n                    —《韩非子·外储说》\n\n《乌合之众：大众心理研究》是一本研究大众心理学的著作。是法国社会心理学家古斯塔夫·勒庞创作的社会心理学著作，首次出版于1895年。勒庞指出：个人一旦融入群体，他们的个性将会被湮灭，群体的思想便会占据统治地位，而与此同时群体的行为也会变现为排斥异议、极端化、情绪化低智商化等特点，进而对社会产生破坏性的影响。\n\n读了此书，你会明白过去、现在、以及将来全世界发生的各种群体事件背后的直接原因。\n\n本文摘抄了《乌合之众：大众心理研究》在Kindle电子书中的热门标注：\n\n"},{"id":"auto-deploy","file":"auto-deploy.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20200512_auto_deploy.png\" alt=\"flow\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e之前写过一篇文章关于\u003ca href=\"/2020-10-28-github-action.html\" class=\"text-sky-500 hover:text-sky-400\"\u003e使用Github Action进行持续集成\u003c/a\u003e。\n但是如何将构建好的软件包，分发到运行环境？托付给自动化服务后如何保证服务器安全？Docker化部署的话，服务器上的Docker引擎如何自动检查、拉取、运行最新的镜像？\n本文介绍如何解决这些问题。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20200512_auto_deploy.png\" alt=\"flow\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e之前写过一篇文章关于\u003ca href=\"/2020-10-28-github-action.html\" class=\"text-sky-500 hover:text-sky-400\"\u003e使用Github Action进行持续集成\u003c/a\u003e。\n但是如何将构建好的软件包，分发到运行环境？托付给自动化服务后如何保证服务器安全？Docker化部署的话，服务器上的Docker引擎如何自动检查、拉取、运行最新的镜像？\n本文介绍如何解决这些问题。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e镜像分发\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e对于Docker构建的镜像，我们可以将其推送到Docker hub之类的镜像仓库。\n然后在服务器上运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edocker pull \u0026#x3C;Image Name\u003e\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edocker-compose pull \u0026#x3C;Service\u003e\u003c/code\u003e就可以将镜像拉下来。\n然后再重新运行就可以了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这种方式解决了服务器的安全问题。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e但是如何将这一套流程自动化呢。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e自动检查镜像更新和重新运行\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e一个思路就是专门写一个守护程序，在接收到某种API请求时，执行以上的操作。但是这样它就脱离了Docker的管理，而且其本身也是需要维护和部署的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e但是如果将它也作为Docker镜像的话，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eContainer\u003c/code\u003e又如何控制宿主机中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDocker Engine\u003c/code\u003e呢？\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这也有办法，我们只需要将\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHost\u003c/code\u003e的Docker域套接字(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUNIX domain socket\u003c/code\u003e)，挂载到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eContainer\u003c/code\u003e中：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edocker run ... -v /var/run/docker.sock:/var/run/docker.sock\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e因为Docker是CS模式，这样\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eContainer\u003c/code\u003e就可以控制宿主机的Docker引擎，以实现上述操作了。有人将其称为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDocker in Docker\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而以上这个思路已经有人造好轮子了。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eWatchtower\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eWatchtower本身就是一个Docker镜像，支持定时、或者API Hook等方式触发检查，在发现有更新的镜像时，它会停止当前运行的容器，自动拉取镜像，重新以之前运行的参数重启容器，完美解决我们的需求。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e最终的流程参考文章开头的流程图。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这样一来，我们只需要push代码，Github Action会自动构建Docker镜像并push到Docker hub，然后curl一下我们的watchtower，它就会自动帮我们拉取并运行最新的镜像了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e省了不少时间，最重要的：\u003cstrong\u003e不要内卷，要work-life balance\u003c/strong\u003e\u003c/p\u003e\n","content":"\n![flow](/images/20200512_auto_deploy.png)\n\n\u003e 之前写过一篇文章关于[使用Github Action进行持续集成](/2020-10-28-github-action.html)。\n但是如何将构建好的软件包，分发到运行环境？托付给自动化服务后如何保证服务器安全？Docker化部署的话，服务器上的Docker引擎如何自动检查、拉取、运行最新的镜像？\n本文介绍如何解决这些问题。\n\n\u003c!--more--\u003e\n\n## 镜像分发\n\n对于Docker构建的镜像，我们可以将其推送到Docker hub之类的镜像仓库。\n然后在服务器上运行`docker pull \u003cImage Name\u003e`或者`docker-compose pull \u003cService\u003e`就可以将镜像拉下来。\n然后再重新运行就可以了。\n\n这种方式解决了服务器的安全问题。\n\n但是如何将这一套流程自动化呢。\n\n## 自动检查镜像更新和重新运行\n\n一个思路就是专门写一个守护程序，在接收到某种API请求时，执行以上的操作。但是这样它就脱离了Docker的管理，而且其本身也是需要维护和部署的。\n\n但是如果将它也作为Docker镜像的话，`Container`又如何控制宿主机中的`Docker Engine`呢？\n\n这也有办法，我们只需要将`Host`的Docker域套接字(`UNIX domain socket`)，挂载到`Container`中：\n\n```bash\ndocker run ... -v /var/run/docker.sock:/var/run/docker.sock\n```\n\n因为Docker是CS模式，这样`Container`就可以控制宿主机的Docker引擎，以实现上述操作了。有人将其称为`Docker in Docker`。\n\n而以上这个思路已经有人造好轮子了。\n\n## Watchtower\n\nWatchtower本身就是一个Docker镜像，支持定时、或者API Hook等方式触发检查，在发现有更新的镜像时，它会停止当前运行的容器，自动拉取镜像，重新以之前运行的参数重启容器，完美解决我们的需求。\n\n最终的流程参考文章开头的流程图。\n\n这样一来，我们只需要push代码，Github Action会自动构建Docker镜像并push到Docker hub，然后curl一下我们的watchtower，它就会自动帮我们拉取并运行最新的镜像了。\n\n省了不少时间，最重要的：**不要内卷，要work-life balance**\n","data":{"title":"基于Docker的自动化部署","date":"2021-05-09","tags":["Watchtower","Docker","NodeJS"],"category":"CI CD"},"isEmpty":false,"excerpt":"\n![flow](/images/20200512_auto_deploy.png)\n\n\u003e 之前写过一篇文章关于[使用Github Action进行持续集成](/2020-10-28-github-action.html)。\n但是如何将构建好的软件包，分发到运行环境？托付给自动化服务后如何保证服务器安全？Docker化部署的话，服务器上的Docker引擎如何自动检查、拉取、运行最新的镜像？\n本文介绍如何解决这些问题。\n\n"},{"id":"rust-ownership","file":"rust-ownership.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.rust-lang.org/static/images/rust-logo-blk.svg\" alt=\"Rust\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eRust由Mozilla基金会开发，没有虚拟机和垃圾回收，却又提供了内存安全，有着媲美C/C++的性能，又同时支持命令式函数式编程以及泛型等便利。优雅（上层抽象）和高性能（底层控制）往往是鱼和熊掌不可兼得，但Rust试图挑战这一矛盾。允许你做带垃圾回收的语言（例如Java）做不到的事，比如控制底层。而同时又避免了比如空指针，野指针在内的（例如C/C++）的问题。它被用于开发浏览器引擎(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eServo\u003c/code\u003e)，操作系统(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRedox OS\u003c/code\u003e)，并且特别适合开发\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebAssembly\u003c/code\u003e和嵌入式，以及高性能的Web服务。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍Rust语言中和其它语言相比一个非常重要的特性\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e所有权(Ownership)\u003c/code\u003e以及其相关的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e借用(Borrowing)\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e引用(References)\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e切片(Slice)\u003c/code\u003e的理解和使用。这个特性保证了Rust不需要垃圾回收以及强大的内存安全，同时还能在多线程编程中带来好处。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.rust-lang.org/static/images/rust-logo-blk.svg\" alt=\"Rust\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eRust由Mozilla基金会开发，没有虚拟机和垃圾回收，却又提供了内存安全，有着媲美C/C++的性能，又同时支持命令式函数式编程以及泛型等便利。优雅（上层抽象）和高性能（底层控制）往往是鱼和熊掌不可兼得，但Rust试图挑战这一矛盾。允许你做带垃圾回收的语言（例如Java）做不到的事，比如控制底层。而同时又避免了比如空指针，野指针在内的（例如C/C++）的问题。它被用于开发浏览器引擎(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eServo\u003c/code\u003e)，操作系统(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRedox OS\u003c/code\u003e)，并且特别适合开发\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebAssembly\u003c/code\u003e和嵌入式，以及高性能的Web服务。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍Rust语言中和其它语言相比一个非常重要的特性\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e所有权(Ownership)\u003c/code\u003e以及其相关的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e借用(Borrowing)\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e引用(References)\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e切片(Slice)\u003c/code\u003e的理解和使用。这个特性保证了Rust不需要垃圾回收以及强大的内存安全，同时还能在多线程编程中带来好处。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e所有权(Ownership)\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e废话不多说，先看代码:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Rust px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003elet a = 5;\nlet b = a;\nprintln!(\"a-\u003e{}, b-\u003e{}\", a, b);\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e上面的代码会打印出\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ea-\u003e5, b-\u003e5\u003c/code\u003e，和直觉（其它语言）相同。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ea\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eb\u003c/code\u003e是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ei32\u003c/code\u003e类型，属于基础数据类型，存储在\u003cstrong\u003e栈\u003c/strong\u003e上。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e当把\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eb\u003c/code\u003e赋值给\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ea\u003c/code\u003e时，会进行拷贝。所以在栈上会有两个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e5\u003c/code\u003e。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e但是：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Rust px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003elet s1 = String::from(\"hello\");\nlet s2 = s1;\nprintln!(\"s1-\u003e{}, s2-\u003e{}\", s1, s2);\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e上面的代码无法通过编译。因为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es1\u003c/code\u003e的\u003cstrong\u003e所有权\u003c/strong\u003e发生了转移(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emove\u003c/code\u003e)。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e在把\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es1\u003c/code\u003e赋值给\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es2\u003c/code\u003e之后，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es1\u003c/code\u003e就无法再使用了。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es1\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es2\u003c/code\u003e被存储在\u003cstrong\u003e栈\u003c/strong\u003e上，但是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehello\u003c/code\u003e这个字符串存储在\u003cstrong\u003e堆\u003c/strong\u003e上\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es1\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es2\u003c/code\u003e是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eString\u003c/code\u003e类型，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eString\u003c/code\u003e类型不是基础数据类型，它是实际字符串的基本信息，包含了指向堆内存的指针、长度、容量信息。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e赋值时，栈上的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eString\u003c/code\u003e即指针，长度、容量被拷贝了，但堆上的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehello\u003c/code\u003e没有被拷贝。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这样就保证了堆上的内存始终只有一个所有者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eowner\u003c/code\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eRust会在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOwner\u003c/code\u003e离开作用域后自动释放\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDrop\u003c/code\u003e它所指向的堆内存。同时避免二次释放带来的内存问题和安全漏洞。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://doc.rust-lang.org/book/img/trpl04-04.svg\" alt=\"Move\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e引用(References)和借用(Borrowing)\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e再看一个函数的例子：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Rust px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003efn main() {\n    let s1 = String::from(\"hello\");\n    let length = get_length(s1);\n    println!(\"{}\",s1);\n}\n\nfn get_length(str: String) -\u003e usize {\n    str.len()\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e上面的代码无法通过编译，因为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es1\u003c/code\u003e的\u003cstrong\u003e所有权\u003c/strong\u003e被转移到了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eget_length\u003c/code\u003e函数里面。并在出了函数之后就被释放了。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e其中一个解决方案是让\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eget_length\u003c/code\u003e通过元组\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etuple\u003c/code\u003e同时返回\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estr\u003c/code\u003e。此时可以用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es1\u003c/code\u003e继续接收\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estr\u003c/code\u003e，即隐藏\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eshadowing\u003c/code\u003e。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e我们也可以通过传递\u003cstrong\u003e引用\u003c/strong\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReferences\u003c/code\u003e来解决这个问题：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Rust px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003efn main() {\n    let s1 = String::from(\"hello\");\n    let len = get_length(\u0026#x26;s1);\n    println!(\"The length of '{}' is {}.\", s1, len);\n}\n\nfn get_length(str: \u0026#x26;String) -\u003e usize {\n    str.len()\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e将获取引用作为函数参数称为\u003cstrong\u003e借用\u003c/strong\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eborrowing\u003c/code\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e可变引用（Mutable References）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e如果要在函数内修改\u003cstrong\u003e借用的值\u003c/strong\u003e则必须使用可变引用：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Rust px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003efn main() {\n    let mut s = String::from(\"hello\");\n\n    change(\u0026#x26;mut s);\n}\n\nfn change(some_string: \u0026#x26;mut String) {\n    some_string.push_str(\", world\");\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eRust中所有的变量默认是不可变的，不可变代表了安全。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e同一作用域中，不可变引用可以有多个，即多个\u003cstrong\u003e读引用\u003c/strong\u003e是ok的。但是不能同时存在可变引用和不可变引用。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e同一作用域中，可变引用只能有一个，即\u003cstrong\u003e写引用\u003c/strong\u003e只能有一个。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e这些规则保证了Rust不可能出现\u003cstrong\u003e悬垂指针\u003c/strong\u003e（dangling pointer）或\u003cstrong\u003e空指针\u003c/strong\u003e（null pointer）异常。\n也减轻了多线程中的\u003cstrong\u003e竞争状态\u003c/strong\u003e（Race conditions）和\u003cstrong\u003e死锁\u003c/strong\u003e（Deadlocks）问题\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e切片(Slice)\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e三句话说清楚切片\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSlice\u003c/code\u003e：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e切片没有所有权，因为它是对数组或者字符串等集合某个区间的不可变引用。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e它的作用是，我们想使用集合中某个数据，又怕其他人对集合做了修改（比如清空了集合的元素）时能够提前发现bug。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e原理是上一节提到的，同一作用域不能同时存在可变引用和不可变引用。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eRust的缺点\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e目前发现Rust最大的缺点就是：想写一个能够编译通过的代码实在是太难了，哈哈。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e但正是因为Rust拥有强大的编译器，它能够提前把bug扼杀在摇篮里，在编译阶段就拒绝各种各样的bug，从而同时保证程序的性能和安全。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这也是为什么Typescript，敏捷开发，TDD，会火的原因了。\u003cstrong\u003e尽可能早的发现和解决问题。\u003c/strong\u003e\u003c/p\u003e\n","content":"\n![Rust](https://www.rust-lang.org/static/images/rust-logo-blk.svg)\n\n\u003e Rust由Mozilla基金会开发，没有虚拟机和垃圾回收，却又提供了内存安全，有着媲美C/C++的性能，又同时支持命令式函数式编程以及泛型等便利。优雅（上层抽象）和高性能（底层控制）往往是鱼和熊掌不可兼得，但Rust试图挑战这一矛盾。允许你做带垃圾回收的语言（例如Java）做不到的事，比如控制底层。而同时又避免了比如空指针，野指针在内的（例如C/C++）的问题。它被用于开发浏览器引擎(`Servo`)，操作系统(`Redox OS`)，并且特别适合开发`WebAssembly`和嵌入式，以及高性能的Web服务。\n\n\u003e 本文介绍Rust语言中和其它语言相比一个非常重要的特性`所有权(Ownership)`以及其相关的`借用(Borrowing)`，`引用(References)`，`切片(Slice)`的理解和使用。这个特性保证了Rust不需要垃圾回收以及强大的内存安全，同时还能在多线程编程中带来好处。\n\n\u003c!--more--\u003e\n\n## 所有权(Ownership)\n\n废话不多说，先看代码:\n\n```Rust\nlet a = 5;\nlet b = a;\nprintln!(\"a-\u003e{}, b-\u003e{}\", a, b);\n```\n- 上面的代码会打印出`a-\u003e5, b-\u003e5`，和直觉（其它语言）相同。\n- `a`和`b`是`i32`类型，属于基础数据类型，存储在**栈**上。\n- 当把`b`赋值给`a`时，会进行拷贝。所以在栈上会有两个`5`。\n\n但是：\n\n```Rust\nlet s1 = String::from(\"hello\");\nlet s2 = s1;\nprintln!(\"s1-\u003e{}, s2-\u003e{}\", s1, s2);\n```\n\n- 上面的代码无法通过编译。因为`s1`的**所有权**发生了转移(`move`)。\n- 在把`s1`赋值给`s2`之后，`s1`就无法再使用了。\n- `s1`和`s2`被存储在**栈**上，但是`hello`这个字符串存储在**堆**上\n- `s1`和`s2`是`String`类型，`String`类型不是基础数据类型，它是实际字符串的基本信息，包含了指向堆内存的指针、长度、容量信息。\n- 赋值时，栈上的`String`即指针，长度、容量被拷贝了，但堆上的`hello`没有被拷贝。\n- 这样就保证了堆上的内存始终只有一个所有者`owner`。\n- Rust会在`Owner`离开作用域后自动释放`Drop`它所指向的堆内存。同时避免二次释放带来的内存问题和安全漏洞。\n\n![Move](https://doc.rust-lang.org/book/img/trpl04-04.svg)\n\n## 引用(References)和借用(Borrowing)\n\n再看一个函数的例子：\n\n```Rust\nfn main() {\n    let s1 = String::from(\"hello\");\n    let length = get_length(s1);\n    println!(\"{}\",s1);\n}\n\nfn get_length(str: String) -\u003e usize {\n    str.len()\n}\n```\n- 上面的代码无法通过编译，因为`s1`的**所有权**被转移到了`get_length`函数里面。并在出了函数之后就被释放了。\n- 其中一个解决方案是让`get_length`通过元组`tuple`同时返回`str`。此时可以用`s1`继续接收`str`，即隐藏`shadowing`。\n\n我们也可以通过传递**引用**`References`来解决这个问题：\n\n```Rust\nfn main() {\n    let s1 = String::from(\"hello\");\n    let len = get_length(\u0026s1);\n    println!(\"The length of '{}' is {}.\", s1, len);\n}\n\nfn get_length(str: \u0026String) -\u003e usize {\n    str.len()\n}\n```\n\n将获取引用作为函数参数称为**借用**`borrowing`\n\n## 可变引用（Mutable References）\n\n如果要在函数内修改**借用的值**则必须使用可变引用：\n\n```Rust\nfn main() {\n    let mut s = String::from(\"hello\");\n\n    change(\u0026mut s);\n}\n\nfn change(some_string: \u0026mut String) {\n    some_string.push_str(\", world\");\n}\n```\n\n- Rust中所有的变量默认是不可变的，不可变代表了安全。\n- 同一作用域中，不可变引用可以有多个，即多个**读引用**是ok的。但是不能同时存在可变引用和不可变引用。\n- 同一作用域中，可变引用只能有一个，即**写引用**只能有一个。\n\n这些规则保证了Rust不可能出现**悬垂指针**（dangling pointer）或**空指针**（null pointer）异常。\n也减轻了多线程中的**竞争状态**（Race conditions）和**死锁**（Deadlocks）问题\n\n## 切片(Slice)\n\n三句话说清楚切片`Slice`：\n\n- 切片没有所有权，因为它是对数组或者字符串等集合某个区间的不可变引用。\n- 它的作用是，我们想使用集合中某个数据，又怕其他人对集合做了修改（比如清空了集合的元素）时能够提前发现bug。\n- 原理是上一节提到的，同一作用域不能同时存在可变引用和不可变引用。\n\n## Rust的缺点\n\n目前发现Rust最大的缺点就是：想写一个能够编译通过的代码实在是太难了，哈哈。\n\n但正是因为Rust拥有强大的编译器，它能够提前把bug扼杀在摇篮里，在编译阶段就拒绝各种各样的bug，从而同时保证程序的性能和安全。\n\n这也是为什么Typescript，敏捷开发，TDD，会火的原因了。**尽可能早的发现和解决问题。**\n","data":{"title":"理解Rust语言的所有权以及借用、引用、切片。","date":"2021-01-23","tags":["Rust"],"category":"Languages"},"isEmpty":false,"excerpt":"\n![Rust](https://www.rust-lang.org/static/images/rust-logo-blk.svg)\n\n\u003e Rust由Mozilla基金会开发，没有虚拟机和垃圾回收，却又提供了内存安全，有着媲美C/C++的性能，又同时支持命令式函数式编程以及泛型等便利。优雅（上层抽象）和高性能（底层控制）往往是鱼和熊掌不可兼得，但Rust试图挑战这一矛盾。允许你做带垃圾回收的语言（例如Java）做不到的事，比如控制底层。而同时又避免了比如空指针，野指针在内的（例如C/C++）的问题。它被用于开发浏览器引擎(`Servo`)，操作系统(`Redox OS`)，并且特别适合开发`WebAssembly`和嵌入式，以及高性能的Web服务。\n\n\u003e 本文介绍Rust语言中和其它语言相比一个非常重要的特性`所有权(Ownership)`以及其相关的`借用(Borrowing)`，`引用(References)`，`切片(Slice)`的理解和使用。这个特性保证了Rust不需要垃圾回收以及强大的内存安全，同时还能在多线程编程中带来好处。\n\n"},{"id":"docker-mongodb","file":"docker-mongodb.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20201204_mongodb.svg\" alt=\"MongoDB\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何使用两行简单的命令来执行备份和还原Docker容器中MongoDB的数据库数据。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20201204_mongodb.svg\" alt=\"MongoDB\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何使用两行简单的命令来执行备份和还原Docker容器中MongoDB的数据库数据。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e备份\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e备份MongoDB有多种方法，其中比较简单的就是使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emongodump\u003c/code\u003e。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edocker exec -i \u0026#x3C;CONTAINER_NAME\u003e mongodump -d \u0026#x3C;DATABASE\u003e --archive \u003e ./mongo/collections.archive\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e以上命令会将\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;CONTAINER_NAME\u003e\u003c/code\u003e容器中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;DATABASE\u003e\u003c/code\u003e数据库dump到host机器的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecollections.archive\u003c/code\u003e文件中。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e--archive\u003c/code\u003e会dump所有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecollection\u003c/code\u003e到一个文件。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emongodump\u003c/code\u003e命令不提供目标路径的话会将dump结果输出到标准输出，这里使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u003e\u003c/code\u003e重定向输出到host的文件。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e还原\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这里使用host机器上的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecollections.archive\u003c/code\u003e文件进行还原。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edocker exec -i \u0026#x3C;CONTAINER_NAME\u003e mongorestore --archive \u0026#x3C; ./mongo/collections.archive\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e--archive\u003c/code\u003e模式导出的备份文件还原时必须也要加上\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e--archive\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emongorestore\u003c/code\u003e命令不提供源路径的话会使用标准输入，这里使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;\u003c/code\u003e重定向host的文件作为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emongorestore\u003c/code\u003e的输入。\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n![MongoDB](/images/20201204_mongodb.svg)\n\n\u003e 本文介绍如何使用两行简单的命令来执行备份和还原Docker容器中MongoDB的数据库数据。\n\n\u003c!--more--\u003e\n\n## 备份\n\n备份MongoDB有多种方法，其中比较简单的就是使用`mongodump`。\n\n```bash\ndocker exec -i \u003cCONTAINER_NAME\u003e mongodump -d \u003cDATABASE\u003e --archive \u003e ./mongo/collections.archive\n```\n\n- 以上命令会将`\u003cCONTAINER_NAME\u003e`容器中的`\u003cDATABASE\u003e`数据库dump到host机器的`collections.archive`文件中。\n- `--archive`会dump所有`collection`到一个文件。\n- `mongodump`命令不提供目标路径的话会将dump结果输出到标准输出，这里使用`\u003e`重定向输出到host的文件。\n\n## 还原\n\n这里使用host机器上的`collections.archive`文件进行还原。\n\n```bash\ndocker exec -i \u003cCONTAINER_NAME\u003e mongorestore --archive \u003c ./mongo/collections.archive\n```\n\n- `--archive`模式导出的备份文件还原时必须也要加上`--archive`\n- `mongorestore`命令不提供源路径的话会使用标准输入，这里使用`\u003c`重定向host的文件作为`mongorestore`的输入。\n\n","data":{"title":"备份和还原Docker容器中的MongoDB数据","date":"2020-12-05","tags":["Docker","MongoDB"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![MongoDB](/images/20201204_mongodb.svg)\n\n\u003e 本文介绍如何使用两行简单的命令来执行备份和还原Docker容器中MongoDB的数据库数据。\n\n"}],"page":2,"total":16},"__N_SSG":true},"page":"/blog/page/[page]","query":{"page":"2"},"buildId":"uFO1FMOoBQ2X-GM8G4ZfF","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
