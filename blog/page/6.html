<!DOCTYPE html><html lang="zh-CN"><head><meta charSet="utf-8"/><title>王郁的小站</title><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/><meta name="next-head-count" content="3"/><link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml"/><meta name="description" content="欢迎光临王郁的小站"/><meta property="og:image" content="https://og-image.vercel.app/%E7%8E%8B%E9%83%81%E7%9A%84%E5%B0%8F%E7%AB%99.png?theme=light&amp;md=0&amp;fontSize=75px&amp;images=https%3A%2F%2Fassets.vercel.com%2Fimage%2Fupload%2Ffront%2Fassets%2Fdesign%2Fnextjs-black-logo.svg"/><meta name="og:title" content="王郁的小站"/><meta name="twitter:card" content="summary_large_image"/><link rel="preload" href="/_next/static/css/8a367d4b0f561ee4.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/8a367d4b0f561ee4.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-6af0e3c12b874bb0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-467b11a89995b152.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-75bdb96a41ba80f4.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-7a9af0eb34ed0a8f.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/205-2ea451b8c35b24ac.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/889-b501beaef0bf85fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/blog/page/%5Bpage%5D-ccf448f21ff35b7f.js" defer="" crossorigin=""></script><script src="/_next/static/7YMuoTtyITfiinBiv1T76/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7YMuoTtyITfiinBiv1T76/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"comments-sql","file":"comments-sql.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://image.woshipm.com/wp-files/2018/04/QFTkYSkExyHKCzhTTl7V.jpg\" alt=\"网易云音乐\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e畅言的广告有点过于流氓，所以准备开发一套评论系统，除了博客，还能用在其它APP中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e基本需求类似网易云音乐的评论，可以对引用别人的评论回复，可以点赞。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://image.woshipm.com/wp-files/2018/04/QFTkYSkExyHKCzhTTl7V.jpg\" alt=\"网易云音乐\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e畅言的广告有点过于流氓，所以准备开发一套评论系统，除了博客，还能用在其它APP中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e基本需求类似网易云音乐的评论，可以对引用别人的评论回复，可以点赞。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e表结构\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e为了保证表结构尽可能简单的同时又支持类似网易云一样功能，同时又保证可扩展性，采用单表设计，表结构（映射实体）如下。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Entity\ndata class Comment(\n        @Id\n        @GeneratedValue(generator = \"seq_comment\")\n        @SequenceGenerator(name = \"seq_comment\", sequenceName = \"SEQ_COMMENT\", allocationSize = 1, initialValue = 1)\n        val id: Long = 0,\n        @ApiModelProperty(value = \"主题id\")\n        val topicId: String = \"\",\n        @ManyToOne\n        val app: CommentApp = CommentApp(),\n        @Column(length = 1023)\n        val content: String? = null,\n        @ApiModelProperty(value = \"评论类型，0.文字评论，1.点赞，2.图片评论\")\n        val type: Int = 0,\n        val fromUserId: String = \"\",\n        val fromUserName: String? = null,\n        val fromUserIcon: String? = null,\n        val toUserId: String? = null,\n        val toUserName: String? = null,\n        val toUserIcon: String? = null,\n        val toContent: String? = null,\n        val createTime: Date = Date(),\n        var likeCount: Int = 0)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e为了能够在多个app中使用，所以增加了一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCommentApp\u003c/code\u003e实体，里面包含一个name和accessKey，评论和app是多对一关系。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etype\u003c/code\u003e字段可以用来扩展为直接对文章点赞，以及图片的评论（\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003econtent\u003c/code\u003e为图片地址）。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e为了保持评论系统的独立，所以用户信息应该由使用评论的app提供，比如使用第三方登录。所以并不需要用户表。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里冗余引用的评论信息，就不需要考虑嵌套查询，以及实体嵌套，循环引用的问题。只保留一层引用，当然也就只支持一对一的回复了。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e页面展示上其实并不需要\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUserId\u003c/code\u003e，这里是考虑提高数据的可维护性。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e接口\u003c/h2\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e1.新增评论或点赞\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@ApiOperation(value = \"新增评论及点赞\")\n@RequestMapping(path = [\"/newComment\"], method = [RequestMethod.POST])\nfun newComment(@RequestParam accessKey: String,\n               @RequestParam appName: String,\n               @ApiParam(\"评论类型，0.文字评论，1.点赞，2.图片评论\", defaultValue = \"0\",example = \"0\",allowableValues = \"0,1,2\")\n               @RequestParam(required = false, defaultValue = \"0\") type: Int = 0,\n               @RequestParam topicId: String,\n               @RequestParam(required = false) content: String?,\n               @RequestParam fromUserId: String,\n               @RequestParam(required = false) fromUserName: String?,\n               @RequestParam(required = false) fromUserIcon: String?,\n               @RequestParam(required = false) toCommentId: Long?\n): JsonResult\u0026#x3C;Comment\u003e {\n    if (type \u0026#x3C; 0 || type \u003e 2) return JsonResult.error(\"参数错误\")\n    var contentText = content\n    //文字及图片评论内容限制\n    if (type == 0 || type == 2) {\n        if (StringUtils.isEmpty(contentText)) return JsonResult.error(\"内容不能为空\")\n        if (contentText!!.length \u003e 1023) return JsonResult.error(\"内容不能超过1000个字\")\n    }\n    val app = commentAppRepository.findByNameAndAccessKey(appName, accessKey)\n            ?: return JsonResult.error(\"app不存在，或key错误\")\n    //图片评论上传至OSS\n    if (type == 2) {\n        val file = storageService.loadTemp(contentText).toFile()\n        if (!file.exists()) {\n            return JsonResult.error(\"相片不存在\")\n        }\n        contentText = ossService.putFile(OssService.COMMENT_BUCKET_NAME, appName, file)\n                ?: return JsonResult.error(\"评论失败，请重试\")\n    }\n    //处理回复\n    var toComment: Comment? = null\n    if (toCommentId != null \u0026#x26;\u0026#x26; toCommentId \u003e 0) {\n        toComment = commentRepository.findById(toCommentId).orElse(null) ?: return JsonResult.error(\"被回复的评论不存在\")\n        if (toComment.topicId != topicId) return JsonResult.error(\"不能跨主题回复\")\n        if (toComment.type == 1) return JsonResult.error(\"不能对点赞回复\")\n        //对评论点赞，直接对点赞数+1，不保存此条评论\n        if (type == 1) {\n            toComment.likeCount++\n            return JsonResult.data(commentRepository.save(toComment))\n        }\n    }\n    //需要新增的comment\n    val comment = Comment(\n            topicId = topicId,\n            app = app,\n            content = contentText,\n            type = type,\n            fromUserId = fromUserId,\n            fromUserName = fromUserName,\n            fromUserIcon = fromUserIcon,\n            toUserId = toComment?.fromUserId,\n            toUserName = toComment?.fromUserName,\n            toUserIcon = toComment?.fromUserIcon,\n            toContent = toComment?.content)\n    log.info(\"$fromUserName 评论了 ${app.name} 的 $topicId\")\n    return JsonResult.data(commentRepository.save(comment))\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e2.获取评论列表\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@ApiOperation(value = \"获取评论列表\")\n@RequestMapping(path = [\"/getComments\"], method = [RequestMethod.GET])\nfun getComments(@RequestParam accessKey: String,\n                @RequestParam appName: String,\n                @RequestParam topicId: String): JsonResult\u0026#x3C;List\u0026#x3C;Comment\u003e\u003e {\n    commentAppRepository.findByNameAndAccessKey(appName, accessKey)\n            ?: return JsonResult.error(\"app不存在，或key错误\")\n    return JsonResult.data(commentRepository.findAllByApp_NameAndTopicIdAndDeleted(appName, topicId))\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e最终效果即为目前页面下方的评论功能。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请注明出处!\u003c/p\u003e\n","content":"\n![网易云音乐](https://image.woshipm.com/wp-files/2018/04/QFTkYSkExyHKCzhTTl7V.jpg)\n\n畅言的广告有点过于流氓，所以准备开发一套评论系统，除了博客，还能用在其它APP中。\n\n基本需求类似网易云音乐的评论，可以对引用别人的评论回复，可以点赞。\n\n\u003c!--more--\u003e\n\n## 表结构\n\n为了保证表结构尽可能简单的同时又支持类似网易云一样功能，同时又保证可扩展性，采用单表设计，表结构（映射实体）如下。\n\n```kotlin\n@Entity\ndata class Comment(\n        @Id\n        @GeneratedValue(generator = \"seq_comment\")\n        @SequenceGenerator(name = \"seq_comment\", sequenceName = \"SEQ_COMMENT\", allocationSize = 1, initialValue = 1)\n        val id: Long = 0,\n        @ApiModelProperty(value = \"主题id\")\n        val topicId: String = \"\",\n        @ManyToOne\n        val app: CommentApp = CommentApp(),\n        @Column(length = 1023)\n        val content: String? = null,\n        @ApiModelProperty(value = \"评论类型，0.文字评论，1.点赞，2.图片评论\")\n        val type: Int = 0,\n        val fromUserId: String = \"\",\n        val fromUserName: String? = null,\n        val fromUserIcon: String? = null,\n        val toUserId: String? = null,\n        val toUserName: String? = null,\n        val toUserIcon: String? = null,\n        val toContent: String? = null,\n        val createTime: Date = Date(),\n        var likeCount: Int = 0)\n```\n- 为了能够在多个app中使用，所以增加了一个`CommentApp`实体，里面包含一个name和accessKey，评论和app是多对一关系。\n- `type`字段可以用来扩展为直接对文章点赞，以及图片的评论（`content`为图片地址）。\n- 为了保持评论系统的独立，所以用户信息应该由使用评论的app提供，比如使用第三方登录。所以并不需要用户表。\n- 这里冗余引用的评论信息，就不需要考虑嵌套查询，以及实体嵌套，循环引用的问题。只保留一层引用，当然也就只支持一对一的回复了。\n- 页面展示上其实并不需要`UserId`，这里是考虑提高数据的可维护性。\n\n## 接口\n\n### 1.新增评论或点赞\n\n```kotlin\n@ApiOperation(value = \"新增评论及点赞\")\n@RequestMapping(path = [\"/newComment\"], method = [RequestMethod.POST])\nfun newComment(@RequestParam accessKey: String,\n               @RequestParam appName: String,\n               @ApiParam(\"评论类型，0.文字评论，1.点赞，2.图片评论\", defaultValue = \"0\",example = \"0\",allowableValues = \"0,1,2\")\n               @RequestParam(required = false, defaultValue = \"0\") type: Int = 0,\n               @RequestParam topicId: String,\n               @RequestParam(required = false) content: String?,\n               @RequestParam fromUserId: String,\n               @RequestParam(required = false) fromUserName: String?,\n               @RequestParam(required = false) fromUserIcon: String?,\n               @RequestParam(required = false) toCommentId: Long?\n): JsonResult\u003cComment\u003e {\n    if (type \u003c 0 || type \u003e 2) return JsonResult.error(\"参数错误\")\n    var contentText = content\n    //文字及图片评论内容限制\n    if (type == 0 || type == 2) {\n        if (StringUtils.isEmpty(contentText)) return JsonResult.error(\"内容不能为空\")\n        if (contentText!!.length \u003e 1023) return JsonResult.error(\"内容不能超过1000个字\")\n    }\n    val app = commentAppRepository.findByNameAndAccessKey(appName, accessKey)\n            ?: return JsonResult.error(\"app不存在，或key错误\")\n    //图片评论上传至OSS\n    if (type == 2) {\n        val file = storageService.loadTemp(contentText).toFile()\n        if (!file.exists()) {\n            return JsonResult.error(\"相片不存在\")\n        }\n        contentText = ossService.putFile(OssService.COMMENT_BUCKET_NAME, appName, file)\n                ?: return JsonResult.error(\"评论失败，请重试\")\n    }\n    //处理回复\n    var toComment: Comment? = null\n    if (toCommentId != null \u0026\u0026 toCommentId \u003e 0) {\n        toComment = commentRepository.findById(toCommentId).orElse(null) ?: return JsonResult.error(\"被回复的评论不存在\")\n        if (toComment.topicId != topicId) return JsonResult.error(\"不能跨主题回复\")\n        if (toComment.type == 1) return JsonResult.error(\"不能对点赞回复\")\n        //对评论点赞，直接对点赞数+1，不保存此条评论\n        if (type == 1) {\n            toComment.likeCount++\n            return JsonResult.data(commentRepository.save(toComment))\n        }\n    }\n    //需要新增的comment\n    val comment = Comment(\n            topicId = topicId,\n            app = app,\n            content = contentText,\n            type = type,\n            fromUserId = fromUserId,\n            fromUserName = fromUserName,\n            fromUserIcon = fromUserIcon,\n            toUserId = toComment?.fromUserId,\n            toUserName = toComment?.fromUserName,\n            toUserIcon = toComment?.fromUserIcon,\n            toContent = toComment?.content)\n    log.info(\"$fromUserName 评论了 ${app.name} 的 $topicId\")\n    return JsonResult.data(commentRepository.save(comment))\n}\n```\n\n### 2.获取评论列表\n\n```kotlin\n@ApiOperation(value = \"获取评论列表\")\n@RequestMapping(path = [\"/getComments\"], method = [RequestMethod.GET])\nfun getComments(@RequestParam accessKey: String,\n                @RequestParam appName: String,\n                @RequestParam topicId: String): JsonResult\u003cList\u003cComment\u003e\u003e {\n    commentAppRepository.findByNameAndAccessKey(appName, accessKey)\n            ?: return JsonResult.error(\"app不存在，或key错误\")\n    return JsonResult.data(commentRepository.findAllByApp_NameAndTopicIdAndDeleted(appName, topicId))\n}\n```\n\n最终效果即为目前页面下方的评论功能。\n\n以上，转载请注明出处!\n","data":{"title":"从0开始开发一个评论系统","date":"2019-05-21","tags":["Kotlin","SQL","Spring","JPA","Hibernate"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![网易云音乐](https://image.woshipm.com/wp-files/2018/04/QFTkYSkExyHKCzhTTl7V.jpg)\n\n畅言的广告有点过于流氓，所以准备开发一套评论系统，除了博客，还能用在其它APP中。\n\n基本需求类似网易云音乐的评论，可以对引用别人的评论回复，可以点赞。\n\n"},{"id":"travis-ci","file":"travis-ci.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.smartfile.com/blog/wp-content/uploads/2015/05/logo-travisci-wide1.jpg\" alt=\"TravisCI\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e持续集成（Continuous integration，简称CI）是一种软件开发实践。以每天小的代码改动集成替代在开发周期的末尾集成大量的代码，通过自动化的构建（包括编译，自动化测试，发布)来验证，从而尽快地发现和定位错误。让产品可以快速迭代，同时还能保持高质量。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e持续集成往往和现代化的软件开发实践相结合，例如：Git工作流、敏捷开发、自动化测试、自动化部署等。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e持续集成能够帮你：减少风险、减少重复过程、自动化生成可部署的软件、增强项目的可见性、建立团队对开发产品的信心。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章教你使用 \u003ca href=\"https://travis-ci.com\" title=\"Travis CI\" class=\"text-sky-500 hover:text-sky-400\"\u003eTravis CI\u003c/a\u003e 自动化构建和发布你的软件产品。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.smartfile.com/blog/wp-content/uploads/2015/05/logo-travisci-wide1.jpg\" alt=\"TravisCI\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e持续集成（Continuous integration，简称CI）是一种软件开发实践。以每天小的代码改动集成替代在开发周期的末尾集成大量的代码，通过自动化的构建（包括编译，自动化测试，发布)来验证，从而尽快地发现和定位错误。让产品可以快速迭代，同时还能保持高质量。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e持续集成往往和现代化的软件开发实践相结合，例如：Git工作流、敏捷开发、自动化测试、自动化部署等。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e持续集成能够帮你：减少风险、减少重复过程、自动化生成可部署的软件、增强项目的可见性、建立团队对开发产品的信心。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章教你使用 \u003ca href=\"https://travis-ci.com\" title=\"Travis CI\" class=\"text-sky-500 hover:text-sky-400\"\u003eTravis CI\u003c/a\u003e 自动化构建和发布你的软件产品。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e准备\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eTravis CI可以使用Github的OAuth登录，赋予其必要的权限，我们就能使用Github开源代码库开启构建了。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e需要注意的是：Travis CI目前有两个域名\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etravis-ci.org\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etravis-ci.com\u003c/code\u003e，推荐使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecom\u003c/code\u003e，官方已经将\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.org\u003c/code\u003e合并到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.com\u003c/code\u003e了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e配置\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eTravis CI通过读取项目根目录的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.travis.yml\u003c/code\u003e文件获取配置信息，所以需要在工程目录下配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.travis.yml\u003c/code\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-yml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e# safelist\nbranches:\n  only:\n  - master\nlanguage: node_js\nnode_js:\n  - \"8\"\nscript: ./node_modules/.bin/hexo clean \u0026#x26;\u0026#x26; ./node_modules/.bin/hexo generate\ndeploy:\n  # deploy to github pages\n  - provider: pages\n    skip_cleanup: true\n    target_branch: master\n    github_token: $GITHUB_TOKEN  # Set in the settings page of your repository, as a secure variable\n    repo: wangyucode/wangyucode.github.io\n    local_dir: public\nafter_deploy:\n  - node deploy/sftp.js $SERVER_PASSWORD\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ebranches\u003c/code\u003e可以配置需要构建的黑白名单，我这里设置了白名单，只构建\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emaster\u003c/code\u003e分支\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e语言环境选择\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enodejs\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e一个Job包含两个主要部分：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003einstall\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003escript\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e我这里指定了node版本为v8\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003einstall\u003c/code\u003e默认会执行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enpm install\u003c/code\u003e，在有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eyarn.lock\u003c/code\u003e的工程中会替代\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enpm\u003c/code\u003e为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eyarn\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003escript\u003c/code\u003e会在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003einstall\u003c/code\u003e完成后执行\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edeploy\u003c/code\u003e中我部署了github pages，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eskip_cleanup\u003c/code\u003e表示跳过cleanup因为部署时我不需要清理任何文件，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etarget_branch\u003c/code\u003e指定了要提交的分支，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003egithub_token\u003c/code\u003e因为比较敏感，所以作为变量配置在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRepository Settings\u003c/code\u003e中，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003erepo\u003c/code\u003e配置了要提交的仓库，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elocal_dir\u003c/code\u003e表示只会部署\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epublic\u003c/code\u003e中的文件\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eafter_deploy\u003c/code\u003e在部署完成之后我还会将文件部署到我的linux服务器，这里用了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esftp-sync-deploy\u003c/code\u003e开源库\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e部署\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003epush代码后即可触发集成，在Travis Dashboard可以看到如下log，说明构建及部署都成功了！\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eWorker information\nBuild system information\ndocker stop/waiting\nresolvconf stop/waiting\n$ git clone --depth=50 --branch=master https://github.com/wangyucode/wycode.cn.git wangyucode/wycode.cn\n\n...\n\nLogged in as @wangyucode (王郁)\ncd /tmp/d20190520-5677-1oocet1/work\nPreparing deploy\nDeploying application\n$ node deploy/sftp.js $SERVER_PASSWORD\n\nDone. Your build exited with 0.\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请注明出处!\u003c/p\u003e\n","content":"\n![TravisCI](https://www.smartfile.com/blog/wp-content/uploads/2015/05/logo-travisci-wide1.jpg)\n\n\u003e 持续集成（Continuous integration，简称CI）是一种软件开发实践。以每天小的代码改动集成替代在开发周期的末尾集成大量的代码，通过自动化的构建（包括编译，自动化测试，发布)来验证，从而尽快地发现和定位错误。让产品可以快速迭代，同时还能保持高质量。\n\n\u003e 持续集成往往和现代化的软件开发实践相结合，例如：Git工作流、敏捷开发、自动化测试、自动化部署等。\n\n\u003e 持续集成能够帮你：减少风险、减少重复过程、自动化生成可部署的软件、增强项目的可见性、建立团队对开发产品的信心。\n\n这篇文章教你使用 [Travis CI](https://travis-ci.com \"Travis CI\") 自动化构建和发布你的软件产品。\n\n\u003c!--more--\u003e\n\n## 准备\n\nTravis CI可以使用Github的OAuth登录，赋予其必要的权限，我们就能使用Github开源代码库开启构建了。\n\n\u003e 需要注意的是：Travis CI目前有两个域名`travis-ci.org`和`travis-ci.com`，推荐使用`com`，官方已经将`.org`合并到`.com`了。\n\n## 配置\n\nTravis CI通过读取项目根目录的`.travis.yml`文件获取配置信息，所以需要在工程目录下配置`.travis.yml`\n\n```yml\n# safelist\nbranches:\n  only:\n  - master\nlanguage: node_js\nnode_js:\n  - \"8\"\nscript: ./node_modules/.bin/hexo clean \u0026\u0026 ./node_modules/.bin/hexo generate\ndeploy:\n  # deploy to github pages\n  - provider: pages\n    skip_cleanup: true\n    target_branch: master\n    github_token: $GITHUB_TOKEN  # Set in the settings page of your repository, as a secure variable\n    repo: wangyucode/wangyucode.github.io\n    local_dir: public\nafter_deploy:\n  - node deploy/sftp.js $SERVER_PASSWORD\n```\n\n- `branches`可以配置需要构建的黑白名单，我这里设置了白名单，只构建`master`分支\n- 语言环境选择`nodejs`\n- 一个Job包含两个主要部分：`install`和`script`\n- 我这里指定了node版本为v8\n- `install`默认会执行`npm install`，在有`yarn.lock`的工程中会替代`npm`为`yarn`\n- `script`会在`install`完成后执行\n- `deploy`中我部署了github pages，`skip_cleanup`表示跳过cleanup因为部署时我不需要清理任何文件，`target_branch`指定了要提交的分支，`github_token`因为比较敏感，所以作为变量配置在`Repository Settings`中，`repo`配置了要提交的仓库，`local_dir`表示只会部署`public`中的文件\n- `after_deploy`在部署完成之后我还会将文件部署到我的linux服务器，这里用了`sftp-sync-deploy`开源库\n\n## 部署\n\npush代码后即可触发集成，在Travis Dashboard可以看到如下log，说明构建及部署都成功了！\n\n```bash\nWorker information\nBuild system information\ndocker stop/waiting\nresolvconf stop/waiting\n$ git clone --depth=50 --branch=master https://github.com/wangyucode/wycode.cn.git wangyucode/wycode.cn\n\n...\n\nLogged in as @wangyucode (王郁)\ncd /tmp/d20190520-5677-1oocet1/work\nPreparing deploy\nDeploying application\n$ node deploy/sftp.js $SERVER_PASSWORD\n\nDone. Your build exited with 0.\n```\n\n以上，转载请注明出处!\n","data":{"title":"使用TravisCI进行持续集成","date":"2019-05-20","tags":["TravisCI","Hexo","NodeJS","Linux"],"category":"CI CD"},"isEmpty":false,"excerpt":"\n![TravisCI](https://www.smartfile.com/blog/wp-content/uploads/2015/05/logo-travisci-wide1.jpg)\n\n\u003e 持续集成（Continuous integration，简称CI）是一种软件开发实践。以每天小的代码改动集成替代在开发周期的末尾集成大量的代码，通过自动化的构建（包括编译，自动化测试，发布)来验证，从而尽快地发现和定位错误。让产品可以快速迭代，同时还能保持高质量。\n\n\u003e 持续集成往往和现代化的软件开发实践相结合，例如：Git工作流、敏捷开发、自动化测试、自动化部署等。\n\n\u003e 持续集成能够帮你：减少风险、减少重复过程、自动化生成可部署的软件、增强项目的可见性、建立团队对开发产品的信心。\n\n这篇文章教你使用 [Travis CI](https://travis-ci.com \"Travis CI\") 自动化构建和发布你的软件产品。\n\n"},{"id":"nginx-redirect","file":"nginx-redirect.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://nginx.org/nginx.png\" alt=\"NGINX\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e服务器配置Https之后，我们希望同时支持http，但是80端口进来的请求直接重定向到443端口上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e有时我们会将某些网页永久迁移到别的地址，但是又不想让老用户直接无法访问，或者看到404，而是要将这些老地址的请求转发到新地址上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章教你如何配置NGINX重定向。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://nginx.org/nginx.png\" alt=\"NGINX\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e服务器配置Https之后，我们希望同时支持http，但是80端口进来的请求直接重定向到443端口上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e有时我们会将某些网页永久迁移到别的地址，但是又不想让老用户直接无法访问，或者看到404，而是要将这些老地址的请求转发到新地址上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章教你如何配置NGINX重定向。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003eNGINX安装及配置请移步这里：\u003ca href=\"/2018-06-23-nginx.html\" title=\"NGINX安装\" class=\"text-sky-500 hover:text-sky-400\"\u003eNginx安装\u003c/a\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用rewrite\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eserver {\n#...\n\trewrite (.*)$ https://wycode.cn$1 permanent;\n#...\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里将这个server的所有请求，永久定向到 \u003ca href=\"https://wycode.cn\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://wycode.cn\u003c/a\u003e 上，并将请求的path拼接在后面\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用return 301\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eserver {\n\tlisten 443 ssl;\n    listen [::]:443 ssl;\n\n    ssl_certificate /etc/nginx/cert/wycode.pem;\n    ssl_certificate_key /etc/nginx/cert/wycode.key;\n\n    server_name wycode.cn www.wycode.cn;\n\n    error_page 404 = https://wycode.cn/404.html;\n\n    location / {\n        root /var/www/wycode.cn;\n        index index.html;\n        try_files $uri $uri/ =404;\n    }\n}\nserver {\n    listen 80;\n    listen [::]:80;\n    server_name wycode.cn www.wycode.cn;\n    return 301 https://$host$request_uri;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里的第二个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eserver\u003c/code\u003e监听80端口，在下面的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereturn 301\u003c/code\u003e语句中将请求转发到第一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eserver\u003c/code\u003e中去，并且\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehost\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003erequest_uri\u003c/code\u003e不变。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请注明出处!\u003c/p\u003e\n","content":"\n![NGINX](https://nginx.org/nginx.png)\n\n\u003e 服务器配置Https之后，我们希望同时支持http，但是80端口进来的请求直接重定向到443端口上。\n\n\u003e 有时我们会将某些网页永久迁移到别的地址，但是又不想让老用户直接无法访问，或者看到404，而是要将这些老地址的请求转发到新地址上。\n\n这篇文章教你如何配置NGINX重定向。\n\n\u003c!--more--\u003e\n\nNGINX安装及配置请移步这里：[Nginx安装](/2018-06-23-nginx.html \"NGINX安装\")\n\n\n## 使用rewrite\n\n```\nserver {\n#...\n\trewrite (.*)$ https://wycode.cn$1 permanent;\n#...\n}\n```\n这里将这个server的所有请求，永久定向到 https://wycode.cn 上，并将请求的path拼接在后面\n\n## 使用return 301\n\n```\nserver {\n\tlisten 443 ssl;\n    listen [::]:443 ssl;\n\n    ssl_certificate /etc/nginx/cert/wycode.pem;\n    ssl_certificate_key /etc/nginx/cert/wycode.key;\n\n    server_name wycode.cn www.wycode.cn;\n\n    error_page 404 = https://wycode.cn/404.html;\n\n    location / {\n        root /var/www/wycode.cn;\n        index index.html;\n        try_files $uri $uri/ =404;\n    }\n}\nserver {\n    listen 80;\n    listen [::]:80;\n    server_name wycode.cn www.wycode.cn;\n    return 301 https://$host$request_uri;\n}\n```\n\n这里的第二个`server`监听80端口，在下面的`return 301`语句中将请求转发到第一个`server`中去，并且`host`和`request_uri`不变。\n\n以上，转载请注明出处!","data":{"title":"NGINX配置重定向","date":"2019-05-17","tags":["Linux","NGINX"],"category":"Linux"},"isEmpty":false,"excerpt":"\n![NGINX](https://nginx.org/nginx.png)\n\n\u003e 服务器配置Https之后，我们希望同时支持http，但是80端口进来的请求直接重定向到443端口上。\n\n\u003e 有时我们会将某些网页永久迁移到别的地址，但是又不想让老用户直接无法访问，或者看到404，而是要将这些老地址的请求转发到新地址上。\n\n这篇文章教你如何配置NGINX重定向。\n\n"},{"id":"flutter","file":"flutter.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://blog.scottlogic.com/bquinn/assets/Flutter_logo_text.png\" alt=\"Flutter\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eFlutter是由Google开发的开源的跨平台应用开发框架，支持Android、iOS开发，能够开发媲美原生的高性能应用。按照2019年的开发路线图，Flutter即将支持Web和桌面端应用的开发。这篇文章带你领略Flutter的魅力。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://blog.scottlogic.com/bquinn/assets/Flutter_logo_text.png\" alt=\"Flutter\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eFlutter是由Google开发的开源的跨平台应用开发框架，支持Android、iOS开发，能够开发媲美原生的高性能应用。按照2019年的开发路线图，Flutter即将支持Web和桌面端应用的开发。这篇文章带你领略Flutter的魅力。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e\u003ca href=\"https://flutter.dev/\" title=\"Flutter官网\" class=\"text-sky-500 hover:text-sky-400\"\u003eFlutter官网\u003c/a\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e已经有ReactNative了，为什么还要Flutter\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eReactNative已经能够做到使用一份JavaScript代码同时发布Android和iOS平台。而且其并不使用WebView，而是将React组件转换为相应的原生组件从而提高性能。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eReactNative技术看起来很美好，因为对公司而言，并不需要很多的Android和iOS开发，只需要一两个技术支持，其它业务代码都是由前端工程师完成，节约了成本（？）提高了效率（？）。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e然而，最近越来越多的公司开始放弃ReactNative而回归到原生开发，原因在于，当ReactNative实际应用到大型项目上时，面对复杂的、定制化的需求，其自带封装好的组件往往不能满足要求。为了满足这些需求，往往需要原生开发去定制相应的React组件。或者为JS提供接口。原生很简单就能实现的功能，因为要跨平台，所以必须抽象出来给React使用。此时React带来的收益和成本相比不再显得有优势了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eFlutter的优势在于，它完全抛弃了使用原生UI，而是从底层2D渲染就独立出来。使用了Google开发的叫\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSkia\u003c/code\u003e的C++渲染库。类似于游戏引擎一样，能够提供60FPS的性能。上层使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDart\u003c/code\u003e提供了一套现代的响应式布局框架。抛弃了原生组件，同时也就免去了原生组件的定制。定制UI也是在Flutter框架的范围内，不涉及原生开发。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这就是Flutter的魅力所在。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eFlutter技术架构\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://docs.flutter.dev/assets/images/docs/arch-overview/archdiagram.png\" alt=\"Flutter技术架构\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于环境搭建\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e环境搭建官网都有说明，我这里不再赘述，需要注意的是，下载并配置好Flutter之后，要执行一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eflutter doctor\u003c/code\u003e的命令，这个命令会检查本地环境，在线安装所需要的组件。由于众所周知的原因，国内使用我们需要额外配置两个类似仓库镜像的环境变量：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ export PUB_HOSTED_URL=https://pub.flutter-io.cn\n$ export FLUTTER_STORAGE_BASE_URL=https://storage.flutter-io.cn\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e然后再执行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eflutter doctor\u003c/code\u003e就能快一点了。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHello Flutter\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e创建好第一个Flutter工程后，模版代码注释非常详细，Android部分看到只有一个Activity继承自FlutterActivity，用代理模式，接管了这个Activity的所有生命周期和事件回调。这些和Unity，ReactNative的原理都一样。以下是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDart\u003c/code\u003e部分的代码：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-dart px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eimport 'package:flutter/material.dart';\n\nvoid main() =\u003e runApp(MyApp());\n\nclass MyApp extends StatelessWidget {\n  // This widget is the root of your application.\n  @override\n  Widget build(BuildContext context) {\n    return MaterialApp(\n      title: 'Flutter Demo',\n      theme: ThemeData(\n        // This is the theme of your application.\n        //\n        // Try running your application with \"flutter run\". You'll see the\n        // application has a blue toolbar. Then, without quitting the app, try\n        // changing the primarySwatch below to Colors.green and then invoke\n        // \"hot reload\" (press \"r\" in the console where you ran \"flutter run\",\n        // or simply save your changes to \"hot reload\" in a Flutter IDE).\n        // Notice that the counter didn't reset back to zero; the application\n        // is not restarted.\n        primarySwatch: Colors.blue,\n      ),\n      home: MyHomePage(title: 'Flutter Demo Home Page'),\n    );\n  }\n}\n\nclass MyHomePage extends StatefulWidget {\n  MyHomePage({Key key, this.title}) : super(key: key);\n\n  // This widget is the home page of your application. It is stateful, meaning\n  // that it has a State object (defined below) that contains fields that affect\n  // how it looks.\n\n  // This class is the configuration for the state. It holds the values (in this\n  // case the title) provided by the parent (in this case the App widget) and\n  // used by the build method of the State. Fields in a Widget subclass are\n  // always marked \"final\".\n\n  final String title;\n\n  @override\n  _MyHomePageState createState() =\u003e _MyHomePageState();\n}\n\nclass _MyHomePageState extends State\u0026#x3C;MyHomePage\u003e {\n  int _counter = 0;\n\n  void _incrementCounter() {\n    setState(() {\n      // This call to setState tells the Flutter framework that something has\n      // changed in this State, which causes it to rerun the build method below\n      // so that the display can reflect the updated values. If we changed\n      // _counter without calling setState(), then the build method would not be\n      // called again, and so nothing would appear to happen.\n      _counter++;\n    });\n  }\n\n  @override\n  Widget build(BuildContext context) {\n    // This method is rerun every time setState is called, for instance as done\n    // by the _incrementCounter method above.\n    //\n    // The Flutter framework has been optimized to make rerunning build methods\n    // fast, so that you can just rebuild anything that needs updating rather\n    // than having to individually change instances of widgets.\n    return Scaffold(\n      appBar: AppBar(\n        // Here we take the value from the MyHomePage object that was created by\n        // the App.build method, and use it to set our appbar title.\n        title: Text(widget.title),\n      ),\n      body: Center(\n        // Center is a layout widget. It takes a single child and positions it\n        // in the middle of the parent.\n        child: Column(\n          // Column is also layout widget. It takes a list of children and\n          // arranges them vertically. By default, it sizes itself to fit its\n          // children horizontally, and tries to be as tall as its parent.\n          //\n          // Invoke \"debug painting\" (press \"p\" in the console, choose the\n          // \"Toggle Debug Paint\" action from the Flutter Inspector in Android\n          // Studio, or the \"Toggle Debug Paint\" command in Visual Studio Code)\n          // to see the wireframe for each widget.\n          //\n          // Column has various properties to control how it sizes itself and\n          // how it positions its children. Here we use mainAxisAlignment to\n          // center the children vertically; the main axis here is the vertical\n          // axis because Columns are vertical (the cross axis would be\n          // horizontal).\n          mainAxisAlignment: MainAxisAlignment.center,\n          children: \u0026#x3C;Widget\u003e[\n            Text(\n              'You have pushed the button this many times:',\n            ),\n            Text(\n              '$_counter',\n              style: Theme.of(context).textTheme.display1,\n            ),\n          ],\n        ),\n      ),\n      floatingActionButton: FloatingActionButton(\n        onPressed: _incrementCounter,\n        tooltip: 'Increment',\n        child: Icon(Icons.add),\n      ), // This trailing comma makes auto-formatting nicer for build methods.\n    );\n  }\n}\n\n\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![Flutter](https://blog.scottlogic.com/bquinn/assets/Flutter_logo_text.png)\n\n\u003e Flutter是由Google开发的开源的跨平台应用开发框架，支持Android、iOS开发，能够开发媲美原生的高性能应用。按照2019年的开发路线图，Flutter即将支持Web和桌面端应用的开发。这篇文章带你领略Flutter的魅力。\n\n\n\u003c!--more--\u003e\n\n[Flutter官网](https://flutter.dev/ \"Flutter官网\")\n\n\n## 已经有ReactNative了，为什么还要Flutter\n\nReactNative已经能够做到使用一份JavaScript代码同时发布Android和iOS平台。而且其并不使用WebView，而是将React组件转换为相应的原生组件从而提高性能。\n\nReactNative技术看起来很美好，因为对公司而言，并不需要很多的Android和iOS开发，只需要一两个技术支持，其它业务代码都是由前端工程师完成，节约了成本（？）提高了效率（？）。\n\n然而，最近越来越多的公司开始放弃ReactNative而回归到原生开发，原因在于，当ReactNative实际应用到大型项目上时，面对复杂的、定制化的需求，其自带封装好的组件往往不能满足要求。为了满足这些需求，往往需要原生开发去定制相应的React组件。或者为JS提供接口。原生很简单就能实现的功能，因为要跨平台，所以必须抽象出来给React使用。此时React带来的收益和成本相比不再显得有优势了。\n\nFlutter的优势在于，它完全抛弃了使用原生UI，而是从底层2D渲染就独立出来。使用了Google开发的叫`Skia`的C++渲染库。类似于游戏引擎一样，能够提供60FPS的性能。上层使用`Dart`提供了一套现代的响应式布局框架。抛弃了原生组件，同时也就免去了原生组件的定制。定制UI也是在Flutter框架的范围内，不涉及原生开发。\n\n这就是Flutter的魅力所在。\n\n## Flutter技术架构\n\n![Flutter技术架构](https://docs.flutter.dev/assets/images/docs/arch-overview/archdiagram.png)\n\n## 关于环境搭建\n\n环境搭建官网都有说明，我这里不再赘述，需要注意的是，下载并配置好Flutter之后，要执行一个`flutter doctor`的命令，这个命令会检查本地环境，在线安装所需要的组件。由于众所周知的原因，国内使用我们需要额外配置两个类似仓库镜像的环境变量：\n\n```bash\n$ export PUB_HOSTED_URL=https://pub.flutter-io.cn\n$ export FLUTTER_STORAGE_BASE_URL=https://storage.flutter-io.cn\n```\n\n然后再执行`flutter doctor`就能快一点了。\n\n\n## Hello Flutter\n\n创建好第一个Flutter工程后，模版代码注释非常详细，Android部分看到只有一个Activity继承自FlutterActivity，用代理模式，接管了这个Activity的所有生命周期和事件回调。这些和Unity，ReactNative的原理都一样。以下是`Dart`部分的代码：\n\n\n\n```dart\nimport 'package:flutter/material.dart';\n\nvoid main() =\u003e runApp(MyApp());\n\nclass MyApp extends StatelessWidget {\n  // This widget is the root of your application.\n  @override\n  Widget build(BuildContext context) {\n    return MaterialApp(\n      title: 'Flutter Demo',\n      theme: ThemeData(\n        // This is the theme of your application.\n        //\n        // Try running your application with \"flutter run\". You'll see the\n        // application has a blue toolbar. Then, without quitting the app, try\n        // changing the primarySwatch below to Colors.green and then invoke\n        // \"hot reload\" (press \"r\" in the console where you ran \"flutter run\",\n        // or simply save your changes to \"hot reload\" in a Flutter IDE).\n        // Notice that the counter didn't reset back to zero; the application\n        // is not restarted.\n        primarySwatch: Colors.blue,\n      ),\n      home: MyHomePage(title: 'Flutter Demo Home Page'),\n    );\n  }\n}\n\nclass MyHomePage extends StatefulWidget {\n  MyHomePage({Key key, this.title}) : super(key: key);\n\n  // This widget is the home page of your application. It is stateful, meaning\n  // that it has a State object (defined below) that contains fields that affect\n  // how it looks.\n\n  // This class is the configuration for the state. It holds the values (in this\n  // case the title) provided by the parent (in this case the App widget) and\n  // used by the build method of the State. Fields in a Widget subclass are\n  // always marked \"final\".\n\n  final String title;\n\n  @override\n  _MyHomePageState createState() =\u003e _MyHomePageState();\n}\n\nclass _MyHomePageState extends State\u003cMyHomePage\u003e {\n  int _counter = 0;\n\n  void _incrementCounter() {\n    setState(() {\n      // This call to setState tells the Flutter framework that something has\n      // changed in this State, which causes it to rerun the build method below\n      // so that the display can reflect the updated values. If we changed\n      // _counter without calling setState(), then the build method would not be\n      // called again, and so nothing would appear to happen.\n      _counter++;\n    });\n  }\n\n  @override\n  Widget build(BuildContext context) {\n    // This method is rerun every time setState is called, for instance as done\n    // by the _incrementCounter method above.\n    //\n    // The Flutter framework has been optimized to make rerunning build methods\n    // fast, so that you can just rebuild anything that needs updating rather\n    // than having to individually change instances of widgets.\n    return Scaffold(\n      appBar: AppBar(\n        // Here we take the value from the MyHomePage object that was created by\n        // the App.build method, and use it to set our appbar title.\n        title: Text(widget.title),\n      ),\n      body: Center(\n        // Center is a layout widget. It takes a single child and positions it\n        // in the middle of the parent.\n        child: Column(\n          // Column is also layout widget. It takes a list of children and\n          // arranges them vertically. By default, it sizes itself to fit its\n          // children horizontally, and tries to be as tall as its parent.\n          //\n          // Invoke \"debug painting\" (press \"p\" in the console, choose the\n          // \"Toggle Debug Paint\" action from the Flutter Inspector in Android\n          // Studio, or the \"Toggle Debug Paint\" command in Visual Studio Code)\n          // to see the wireframe for each widget.\n          //\n          // Column has various properties to control how it sizes itself and\n          // how it positions its children. Here we use mainAxisAlignment to\n          // center the children vertically; the main axis here is the vertical\n          // axis because Columns are vertical (the cross axis would be\n          // horizontal).\n          mainAxisAlignment: MainAxisAlignment.center,\n          children: \u003cWidget\u003e[\n            Text(\n              'You have pushed the button this many times:',\n            ),\n            Text(\n              '$_counter',\n              style: Theme.of(context).textTheme.display1,\n            ),\n          ],\n        ),\n      ),\n      floatingActionButton: FloatingActionButton(\n        onPressed: _incrementCounter,\n        tooltip: 'Increment',\n        child: Icon(Icons.add),\n      ), // This trailing comma makes auto-formatting nicer for build methods.\n    );\n  }\n}\n\n\n```","data":{"title":"使用Flutter开发跨平台应用","date":"2019-03-28","tags":["Flutter","Dart","Android","iOS"],"category":"Android"},"isEmpty":false,"excerpt":"\n![Flutter](https://blog.scottlogic.com/bquinn/assets/Flutter_logo_text.png)\n\n\u003e Flutter是由Google开发的开源的跨平台应用开发框架，支持Android、iOS开发，能够开发媲美原生的高性能应用。按照2019年的开发路线图，Flutter即将支持Web和桌面端应用的开发。这篇文章带你领略Flutter的魅力。\n\n\n"},{"id":"netty-function","file":"netty-function.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20181023_liucheng.jpg\" alt=\"流程\" title=\"流程\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e函数计算（Function Compute）是事件驱动的全托管计算服务。函数计算无需租用和管理24小时运行的服务器(Serverless)，无需搭建复杂的服务器环境，只需编写代码并上传就可以了，只需要为代码实际运行消耗的资源付费，非常便宜。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e函数计算可以选择运行区域，也就是说，我们可以将函数运行的服务器区域选择到香港或者是美国，如此会带来什么样的好处，只可意会，不可言传。那么能否利用云函数写一个Proxy软件呢？请看本文！\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20181023_liucheng.jpg\" alt=\"流程\" title=\"流程\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e函数计算（Function Compute）是事件驱动的全托管计算服务。函数计算无需租用和管理24小时运行的服务器(Serverless)，无需搭建复杂的服务器环境，只需编写代码并上传就可以了，只需要为代码实际运行消耗的资源付费，非常便宜。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e函数计算可以选择运行区域，也就是说，我们可以将函数运行的服务器区域选择到香港或者是美国，如此会带来什么样的好处，只可意会，不可言传。那么能否利用云函数写一个Proxy软件呢？请看本文！\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e在阿里云上新建函数计算\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e我们需要建立一个云函数，和一个HTTP触发器。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此过程请参考阿里云官网，我就不详细赘述。\u003ca href=\"https://www.aliyun.com/product/fc\" title=\"官网在此\" class=\"text-sky-500 hover:text-sky-400\"\u003e官网在此\u003c/a\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eNetty服务端Handle代码\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode.lambda.proxy.inbound\n\nimport cn.wycode.lambda.proxy.config.AliyunConfig\nimport cn.wycode.lambda.proxy.outbound.ProxyOutboundInitializer\nimport io.netty.bootstrap.Bootstrap\nimport io.netty.buffer.ByteBuf\nimport io.netty.buffer.Unpooled\nimport io.netty.channel.*\nimport io.netty.handler.codec.http.*\nimport io.netty.util.CharsetUtil\n\nclass ProxyInboundHandler(val aliyunConfig: AliyunConfig) : SimpleChannelInboundHandler\u0026#x3C;ByteBuf\u003e() {\n\n\n    // As we use inboundChannel.eventLoop() when building the Bootstrap this does not need to be volatile as\n    // the outboundChannel will use the same EventLoop (and therefore Thread) as the inboundChannel.\n    private var outboundChannel: Channel? = null\n\n    override fun channelRead0(ctx: ChannelHandlerContext, msg: ByteBuf) {\n        println(\"ProxyInboundHandler\u0026#x3C;\u0026#x3C;\u0026#x3C;\" + msg.toString(CharsetUtil.UTF_8))\n//        val headers = msg.headers()\n//        val headerMap = HashMap\u0026#x3C;String, String\u003e(headers.size())\n//        headers.forEach { headerMap[it.key] = it.value }\n//        val outboundBody = Request(msg.method().name(), msg.uri(), msg.protocolVersion().text(), headerMap)\n//        val outboundJson = JSON.toJSONString(outboundBody)\n        val request = DefaultFullHttpRequest(HttpVersion.HTTP_1_1, HttpMethod.POST, aliyunConfig.path)\n        request.headers().set(HttpHeaderNames.HOST, aliyunConfig.host)\n        request.headers().set(HttpHeaderNames.CONNECTION, HttpHeaderValues.CLOSE)\n        request.headers().set(HttpHeaderNames.CONTENT_TYPE, HttpHeaderValues.APPLICATION_JSON)\n        request.headers().set(HttpHeaderNames.CONTENT_LENGTH, msg.writerIndex())\n//        request.content().writeCharSequence(outboundJson, CharsetUtil.UTF_8)\n        request.content().writeBytes(msg)\n//\n        if (outboundChannel!!.isActive) {\n            println(\"ProxyInboundHandler\u003e\u003e\u003e${request.content().toString(CharsetUtil.UTF_8)}\")\n            outboundChannel!!.writeAndFlush(request).addListener(object : ChannelFutureListener {\n                override fun operationComplete(future: ChannelFuture) {\n                    if (future.isSuccess) {\n                        // was able to flush out data, start to read the next chunk\n                        ctx.channel().read()\n                    } else {\n                        future.channel().close()\n                    }\n                }\n            })\n        }\n    }\n\n\n    override fun channelActive(ctx: ChannelHandlerContext) {\n        val inboundChannel = ctx.channel()\n        // Start the connection attempt.\n        val outboundClient = Bootstrap()\n        outboundClient.group(inboundChannel.eventLoop())\n                .channel(inboundChannel.javaClass)\n                .handler(ProxyOutboundInitializer(inboundChannel))\n                .option(ChannelOption.AUTO_READ, false)\n\n        val f = outboundClient.connect(aliyunConfig.host, aliyunConfig.port)\n        outboundChannel = f.channel()\n        f.addListener { future -\u003e\n            if (future.isSuccess) {\n                // connection complete start to read first data\n                inboundChannel.read()\n            } else {\n                // Close the connection if the connection attempt has failed.\n                inboundChannel.close()\n            }\n        }\n    }\n\n\n    override fun channelInactive(ctx: ChannelHandlerContext) {\n        if (outboundChannel != null) {\n            closeOnFlush(outboundChannel!!)\n        }\n    }\n\n    override fun exceptionCaught(ctx: ChannelHandlerContext, cause: Throwable) {\n        cause.printStackTrace()\n        closeOnFlush(ctx.channel())\n    }\n\n    companion object {\n        fun closeOnFlush(ch: Channel) {\n            if (ch.isActive) {\n                ch.writeAndFlush(Unpooled.EMPTY_BUFFER).addListener(ChannelFutureListener.CLOSE)\n            }\n        }\n    }\n\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eNetty客户端Handle代码\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode.lambda.proxy.outbound\n\nimport cn.wycode.lambda.proxy.inbound.ProxyInboundHandler\nimport io.netty.channel.*\nimport io.netty.handler.codec.http.FullHttpResponse\nimport io.netty.util.CharsetUtil\n\nclass ProxyOutboundHandler(private val inboundChannel: Channel) : SimpleChannelInboundHandler\u0026#x3C;FullHttpResponse\u003e() {\n\n    override fun channelActive(ctx: ChannelHandlerContext) {\n        println(\"ProxyOutBoundHandle==\")\n        ctx.read()\n    }\n\n    override fun channelRead0(ctx: ChannelHandlerContext, msg: FullHttpResponse) {\n        println(\"ProxyOutBoundHandle\u0026#x3C;\u0026#x3C;\u0026#x3C;$msg\")\n        val body = msg.content().toString(CharsetUtil.UTF_8)\n        println(\"ProxyOutBoundHandle body\u0026#x3C;\u0026#x3C;\u0026#x3C;$body\")\n//        val proxyResponse = try {\n//            JSON.parseObject(body, Response::class.java)\n//        } catch (e: Exception) {\n//            e.printStackTrace()\n//            msg.retain()\n//            inboundChannel.writeAndFlush(msg).addListener(object : ChannelFutureListener {\n//                override fun operationComplete(future: ChannelFuture) {\n//                    if (future.isSuccess) {\n//                        // was able to flush out data, start to read the next chunk\n//                        ctx.channel().read()\n//                    } else {\n//                        future.channel().close()\n//                    }\n//                }\n//            })\n//            return\n//        }\n//        val headers = CombinedHttpHeaders(true)\n//        var outBytes:ByteArray? = null\n//        if (proxyResponse.error == null) {\n//            for (header in proxyResponse.headers!!) {\n//                headers[header.key] = header.value\n//            }\n//            outBytes = Base64.getDecoder().decode(proxyResponse.content)\n//        }else{\n//            outBytes = proxyResponse.error.toByteArray()\n//        }\n//        val response = DefaultFullHttpResponse(HttpVersion.HTTP_1_1,\n//                HttpResponseStatus.valueOf(proxyResponse.code),\n//                Unpooled.wrappedBuffer(outBytes),\n//                headers, DefaultHttpHeaders())\n        msg.retain()\n        inboundChannel.writeAndFlush(msg.content()).addListener(object : ChannelFutureListener {\n            override fun operationComplete(future: ChannelFuture) {\n                if (future.isSuccess) {\n                    // was able to flush out data, start to read the next chunk\n                    ctx.channel().read()\n                } else {\n                    future.channel().close()\n                }\n            }\n        })\n    }\n\n    override fun channelInactive(ctx: ChannelHandlerContext) {\n        println(\"ProxyOutBoundHandle!=\")\n        ProxyInboundHandler.closeOnFlush(inboundChannel)\n    }\n\n    override fun exceptionCaught(ctx: ChannelHandlerContext, cause: Throwable) {\n        cause.printStackTrace()\n        ProxyInboundHandler.closeOnFlush(ctx.channel())\n    }\n\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e云函数代码\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode.lambda;\n\nimport com.aliyun.fc.runtime.Context;\nimport com.aliyun.fc.runtime.FunctionComputeLogger;\nimport com.aliyun.fc.runtime.StreamRequestHandler;\n\nimport java.io.*;\nimport java.net.Socket;\nimport java.net.URL;\nimport java.nio.charset.StandardCharsets;\n\npublic class Lambda implements StreamRequestHandler {\n\n\n    @Override\n    public void handleRequest(InputStream input, OutputStream output, Context context) throws IOException {\n        FunctionComputeLogger logger = context.getLogger();\n        StringBuilder sb = new StringBuilder();\n        byte[] buffer = new byte[1024];\n        int n;\n        while ((n = input.read(buffer)) != -1) {\n            sb.append(new String(buffer, 0, n, StandardCharsets.UTF_8));\n        }\n        logger.info(\"handleRequest\u003e\u003e\u003e\" + sb.toString());\n\n        String firstLine = new BufferedReader(new StringReader(sb.toString())).readLine();\n        String host;\n        int port;\n        try {\n            if (firstLine.startsWith(\"CONNECT \")) {\n                String[] urlArray = firstLine.split(\" \")[1].split(\":\");\n                host = urlArray[0];\n                port = Integer.parseInt(urlArray[1]);\n            } else {\n                URL url = new URL(firstLine.split(\" \")[1]);\n                host = url.getHost();\n                port = url.getPort();\n\n                if (port == -1) {\n                    if (url.getProtocol().equalsIgnoreCase(\"http\")) {\n                        port = 80;\n                    } else if (url.getProtocol().equalsIgnoreCase(\"https\")) {\n                        port = 443;\n                    } else {\n                        throw new IllegalArgumentException(\"端口无法解析\");\n                    }\n                }\n            }\n        } catch (Exception e) {\n            logger.error(\"url解析错误:\" + e.getMessage());\n            return;\n        }\n        logger.info(\"host-\u003e\" + host);\n        logger.info(\"port-\u003e\" + port);\n\n        Socket s = new Socket(host, port);\n        if (firstLine.startsWith(\"CONNECT \")) {\n            String response = \"HTTP/1.1 200 Connection Established\";\n            output.write(response.getBytes(StandardCharsets.UTF_8));\n            output.flush();\n            sb.setLength(0);\n            while ((n = input.read(buffer)) != -1) {\n                sb.append(new String(buffer, 0, n, StandardCharsets.UTF_8));\n            }\n            logger.info(\"handleRequest\u003e\u003e\u003e\" + sb.toString());\n        }\n\n        OutputStream httpOutputStream = s.getOutputStream();\n        httpOutputStream.write(sb.toString().getBytes(StandardCharsets.UTF_8));\n\n        InputStream httpInputStream = s.getInputStream();\n        sb.setLength(0);\n        while ((n = httpInputStream.read(buffer)) != -1) {\n            output.write(buffer, 0, n);\n            sb.append(new String(buffer, 0, n, StandardCharsets.UTF_8));\n        }\n        httpInputStream.close();\n        httpOutputStream.close();\n\n        s.close();\n        input.close();\n        output.close();\n        logger.info(\"handleRequest\u0026#x3C;\u0026#x3C;\u0026#x3C;\" + sb.toString());\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e遗留问题\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eHTTP请求代理测试通过\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e可以在Netty客户端发送请求时，对请求体进行二进制加密，函数端解密；函数端收到真实响应加密，Netty客户端收到请求后解密。从而提高安全性\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e对于HTTP请求头为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eConnection:keep-alive\u003c/code\u003e的请求，函数端在读取真实响应时，会阻塞在流末尾的read方法而无法返回结果，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eConnection:close\u003c/code\u003e的请求正常\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eHTTPS请求在有代理的情况下，浏览器会先发送一个HTTP CONNECT请求，以建立TSL通道。目前因为read阻塞问题还没有解决。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e附：本项目全部源码地址：\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eNetty端：\u003ca href=\"https://github.com/wangyucode/lambda-cross-java\" title=\"github\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/lambda-cross-java\u003c/a\u003e\n函数端：\u003ca href=\"https://github.com/wangyucode/aliyun-lambda\" title=\"github\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/aliyun-lambda\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请联系作者!\u003c/p\u003e\n","content":"\n![流程](/images/20181023_liucheng.jpg \"流程\")\n\n\u003e 函数计算（Function Compute）是事件驱动的全托管计算服务。函数计算无需租用和管理24小时运行的服务器(Serverless)，无需搭建复杂的服务器环境，只需编写代码并上传就可以了，只需要为代码实际运行消耗的资源付费，非常便宜。\n\n\u003e 函数计算可以选择运行区域，也就是说，我们可以将函数运行的服务器区域选择到香港或者是美国，如此会带来什么样的好处，只可意会，不可言传。那么能否利用云函数写一个Proxy软件呢？请看本文！\n\n\u003c!--more--\u003e\n\n## 在阿里云上新建函数计算\n\n我们需要建立一个云函数，和一个HTTP触发器。\n\n此过程请参考阿里云官网，我就不详细赘述。[官网在此](https://www.aliyun.com/product/fc \"官网在此\")\n\n\n## Netty服务端Handle代码\n\n```kotlin\npackage cn.wycode.lambda.proxy.inbound\n\nimport cn.wycode.lambda.proxy.config.AliyunConfig\nimport cn.wycode.lambda.proxy.outbound.ProxyOutboundInitializer\nimport io.netty.bootstrap.Bootstrap\nimport io.netty.buffer.ByteBuf\nimport io.netty.buffer.Unpooled\nimport io.netty.channel.*\nimport io.netty.handler.codec.http.*\nimport io.netty.util.CharsetUtil\n\nclass ProxyInboundHandler(val aliyunConfig: AliyunConfig) : SimpleChannelInboundHandler\u003cByteBuf\u003e() {\n\n\n    // As we use inboundChannel.eventLoop() when building the Bootstrap this does not need to be volatile as\n    // the outboundChannel will use the same EventLoop (and therefore Thread) as the inboundChannel.\n    private var outboundChannel: Channel? = null\n\n    override fun channelRead0(ctx: ChannelHandlerContext, msg: ByteBuf) {\n        println(\"ProxyInboundHandler\u003c\u003c\u003c\" + msg.toString(CharsetUtil.UTF_8))\n//        val headers = msg.headers()\n//        val headerMap = HashMap\u003cString, String\u003e(headers.size())\n//        headers.forEach { headerMap[it.key] = it.value }\n//        val outboundBody = Request(msg.method().name(), msg.uri(), msg.protocolVersion().text(), headerMap)\n//        val outboundJson = JSON.toJSONString(outboundBody)\n        val request = DefaultFullHttpRequest(HttpVersion.HTTP_1_1, HttpMethod.POST, aliyunConfig.path)\n        request.headers().set(HttpHeaderNames.HOST, aliyunConfig.host)\n        request.headers().set(HttpHeaderNames.CONNECTION, HttpHeaderValues.CLOSE)\n        request.headers().set(HttpHeaderNames.CONTENT_TYPE, HttpHeaderValues.APPLICATION_JSON)\n        request.headers().set(HttpHeaderNames.CONTENT_LENGTH, msg.writerIndex())\n//        request.content().writeCharSequence(outboundJson, CharsetUtil.UTF_8)\n        request.content().writeBytes(msg)\n//\n        if (outboundChannel!!.isActive) {\n            println(\"ProxyInboundHandler\u003e\u003e\u003e${request.content().toString(CharsetUtil.UTF_8)}\")\n            outboundChannel!!.writeAndFlush(request).addListener(object : ChannelFutureListener {\n                override fun operationComplete(future: ChannelFuture) {\n                    if (future.isSuccess) {\n                        // was able to flush out data, start to read the next chunk\n                        ctx.channel().read()\n                    } else {\n                        future.channel().close()\n                    }\n                }\n            })\n        }\n    }\n\n\n    override fun channelActive(ctx: ChannelHandlerContext) {\n        val inboundChannel = ctx.channel()\n        // Start the connection attempt.\n        val outboundClient = Bootstrap()\n        outboundClient.group(inboundChannel.eventLoop())\n                .channel(inboundChannel.javaClass)\n                .handler(ProxyOutboundInitializer(inboundChannel))\n                .option(ChannelOption.AUTO_READ, false)\n\n        val f = outboundClient.connect(aliyunConfig.host, aliyunConfig.port)\n        outboundChannel = f.channel()\n        f.addListener { future -\u003e\n            if (future.isSuccess) {\n                // connection complete start to read first data\n                inboundChannel.read()\n            } else {\n                // Close the connection if the connection attempt has failed.\n                inboundChannel.close()\n            }\n        }\n    }\n\n\n    override fun channelInactive(ctx: ChannelHandlerContext) {\n        if (outboundChannel != null) {\n            closeOnFlush(outboundChannel!!)\n        }\n    }\n\n    override fun exceptionCaught(ctx: ChannelHandlerContext, cause: Throwable) {\n        cause.printStackTrace()\n        closeOnFlush(ctx.channel())\n    }\n\n    companion object {\n        fun closeOnFlush(ch: Channel) {\n            if (ch.isActive) {\n                ch.writeAndFlush(Unpooled.EMPTY_BUFFER).addListener(ChannelFutureListener.CLOSE)\n            }\n        }\n    }\n\n}\n\n```\n\n## Netty客户端Handle代码\n\n```kotlin\npackage cn.wycode.lambda.proxy.outbound\n\nimport cn.wycode.lambda.proxy.inbound.ProxyInboundHandler\nimport io.netty.channel.*\nimport io.netty.handler.codec.http.FullHttpResponse\nimport io.netty.util.CharsetUtil\n\nclass ProxyOutboundHandler(private val inboundChannel: Channel) : SimpleChannelInboundHandler\u003cFullHttpResponse\u003e() {\n\n    override fun channelActive(ctx: ChannelHandlerContext) {\n        println(\"ProxyOutBoundHandle==\")\n        ctx.read()\n    }\n\n    override fun channelRead0(ctx: ChannelHandlerContext, msg: FullHttpResponse) {\n        println(\"ProxyOutBoundHandle\u003c\u003c\u003c$msg\")\n        val body = msg.content().toString(CharsetUtil.UTF_8)\n        println(\"ProxyOutBoundHandle body\u003c\u003c\u003c$body\")\n//        val proxyResponse = try {\n//            JSON.parseObject(body, Response::class.java)\n//        } catch (e: Exception) {\n//            e.printStackTrace()\n//            msg.retain()\n//            inboundChannel.writeAndFlush(msg).addListener(object : ChannelFutureListener {\n//                override fun operationComplete(future: ChannelFuture) {\n//                    if (future.isSuccess) {\n//                        // was able to flush out data, start to read the next chunk\n//                        ctx.channel().read()\n//                    } else {\n//                        future.channel().close()\n//                    }\n//                }\n//            })\n//            return\n//        }\n//        val headers = CombinedHttpHeaders(true)\n//        var outBytes:ByteArray? = null\n//        if (proxyResponse.error == null) {\n//            for (header in proxyResponse.headers!!) {\n//                headers[header.key] = header.value\n//            }\n//            outBytes = Base64.getDecoder().decode(proxyResponse.content)\n//        }else{\n//            outBytes = proxyResponse.error.toByteArray()\n//        }\n//        val response = DefaultFullHttpResponse(HttpVersion.HTTP_1_1,\n//                HttpResponseStatus.valueOf(proxyResponse.code),\n//                Unpooled.wrappedBuffer(outBytes),\n//                headers, DefaultHttpHeaders())\n        msg.retain()\n        inboundChannel.writeAndFlush(msg.content()).addListener(object : ChannelFutureListener {\n            override fun operationComplete(future: ChannelFuture) {\n                if (future.isSuccess) {\n                    // was able to flush out data, start to read the next chunk\n                    ctx.channel().read()\n                } else {\n                    future.channel().close()\n                }\n            }\n        })\n    }\n\n    override fun channelInactive(ctx: ChannelHandlerContext) {\n        println(\"ProxyOutBoundHandle!=\")\n        ProxyInboundHandler.closeOnFlush(inboundChannel)\n    }\n\n    override fun exceptionCaught(ctx: ChannelHandlerContext, cause: Throwable) {\n        cause.printStackTrace()\n        ProxyInboundHandler.closeOnFlush(ctx.channel())\n    }\n\n}\n\n```\n\n## 云函数代码\n\n```java\npackage cn.wycode.lambda;\n\nimport com.aliyun.fc.runtime.Context;\nimport com.aliyun.fc.runtime.FunctionComputeLogger;\nimport com.aliyun.fc.runtime.StreamRequestHandler;\n\nimport java.io.*;\nimport java.net.Socket;\nimport java.net.URL;\nimport java.nio.charset.StandardCharsets;\n\npublic class Lambda implements StreamRequestHandler {\n\n\n    @Override\n    public void handleRequest(InputStream input, OutputStream output, Context context) throws IOException {\n        FunctionComputeLogger logger = context.getLogger();\n        StringBuilder sb = new StringBuilder();\n        byte[] buffer = new byte[1024];\n        int n;\n        while ((n = input.read(buffer)) != -1) {\n            sb.append(new String(buffer, 0, n, StandardCharsets.UTF_8));\n        }\n        logger.info(\"handleRequest\u003e\u003e\u003e\" + sb.toString());\n\n        String firstLine = new BufferedReader(new StringReader(sb.toString())).readLine();\n        String host;\n        int port;\n        try {\n            if (firstLine.startsWith(\"CONNECT \")) {\n                String[] urlArray = firstLine.split(\" \")[1].split(\":\");\n                host = urlArray[0];\n                port = Integer.parseInt(urlArray[1]);\n            } else {\n                URL url = new URL(firstLine.split(\" \")[1]);\n                host = url.getHost();\n                port = url.getPort();\n\n                if (port == -1) {\n                    if (url.getProtocol().equalsIgnoreCase(\"http\")) {\n                        port = 80;\n                    } else if (url.getProtocol().equalsIgnoreCase(\"https\")) {\n                        port = 443;\n                    } else {\n                        throw new IllegalArgumentException(\"端口无法解析\");\n                    }\n                }\n            }\n        } catch (Exception e) {\n            logger.error(\"url解析错误:\" + e.getMessage());\n            return;\n        }\n        logger.info(\"host-\u003e\" + host);\n        logger.info(\"port-\u003e\" + port);\n\n        Socket s = new Socket(host, port);\n        if (firstLine.startsWith(\"CONNECT \")) {\n            String response = \"HTTP/1.1 200 Connection Established\";\n            output.write(response.getBytes(StandardCharsets.UTF_8));\n            output.flush();\n            sb.setLength(0);\n            while ((n = input.read(buffer)) != -1) {\n                sb.append(new String(buffer, 0, n, StandardCharsets.UTF_8));\n            }\n            logger.info(\"handleRequest\u003e\u003e\u003e\" + sb.toString());\n        }\n\n        OutputStream httpOutputStream = s.getOutputStream();\n        httpOutputStream.write(sb.toString().getBytes(StandardCharsets.UTF_8));\n\n        InputStream httpInputStream = s.getInputStream();\n        sb.setLength(0);\n        while ((n = httpInputStream.read(buffer)) != -1) {\n            output.write(buffer, 0, n);\n            sb.append(new String(buffer, 0, n, StandardCharsets.UTF_8));\n        }\n        httpInputStream.close();\n        httpOutputStream.close();\n\n        s.close();\n        input.close();\n        output.close();\n        logger.info(\"handleRequest\u003c\u003c\u003c\" + sb.toString());\n    }\n}\n\n```\n\n\n## 遗留问题\n\n- HTTP请求代理测试通过\n- 可以在Netty客户端发送请求时，对请求体进行二进制加密，函数端解密；函数端收到真实响应加密，Netty客户端收到请求后解密。从而提高安全性\n- 对于HTTP请求头为`Connection:keep-alive`的请求，函数端在读取真实响应时，会阻塞在流末尾的read方法而无法返回结果，`Connection:close`的请求正常\n- HTTPS请求在有代理的情况下，浏览器会先发送一个HTTP CONNECT请求，以建立TSL通道。目前因为read阻塞问题还没有解决。\n\n\n附：本项目全部源码地址：\n\nNetty端：[https://github.com/wangyucode/lambda-cross-java](https://github.com/wangyucode/lambda-cross-java \"github\")\n函数端：[https://github.com/wangyucode/aliyun-lambda](https://github.com/wangyucode/aliyun-lambda \"github\")\n\n以上，转载请联系作者!","data":{"title":"使用Netty和阿里云函数写一个低成本的“梯子”","date":"2018-10-23","tags":["Netty","HTTP"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![流程](/images/20181023_liucheng.jpg \"流程\")\n\n\u003e 函数计算（Function Compute）是事件驱动的全托管计算服务。函数计算无需租用和管理24小时运行的服务器(Serverless)，无需搭建复杂的服务器环境，只需编写代码并上传就可以了，只需要为代码实际运行消耗的资源付费，非常便宜。\n\n\u003e 函数计算可以选择运行区域，也就是说，我们可以将函数运行的服务器区域选择到香港或者是美国，如此会带来什么样的好处，只可意会，不可言传。那么能否利用云函数写一个Proxy软件呢？请看本文！\n\n"}],"page":6,"total":15},"__N_SSG":true},"page":"/blog/page/[page]","query":{"page":"6"},"buildId":"7YMuoTtyITfiinBiv1T76","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
