<!DOCTYPE html><html lang="zh-CN"><head><meta charSet="utf-8"/><title>王郁的小站</title><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/><meta name="next-head-count" content="3"/><link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml"/><meta name="description" content="欢迎光临王郁的小站"/><meta property="og:image" content="https://og-image.vercel.app/%E7%8E%8B%E9%83%81%E7%9A%84%E5%B0%8F%E7%AB%99.png?theme=light&amp;md=0&amp;fontSize=75px&amp;images=https%3A%2F%2Fassets.vercel.com%2Fimage%2Fupload%2Ffront%2Fassets%2Fdesign%2Fnextjs-black-logo.svg"/><meta name="og:title" content="王郁的小站"/><meta name="twitter:card" content="summary_large_image"/><link rel="preload" href="/_next/static/css/804786de35d6ea9b.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/804786de35d6ea9b.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-6af0e3c12b874bb0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-e14092e0d084b50d.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-bc0074f0f8514a28.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-f249e8934ba43001.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/358-09e70898ee89de63.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/673-dd16adde3fc920b7.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/blog/page/%5Bpage%5D-e21fb4b89312bc0e.js" defer="" crossorigin=""></script><script src="/_next/static/NDkQWnMtEcy0IDQqDGEkS/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/NDkQWnMtEcy0IDQqDGEkS/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"data-structures02","file":"data-structures02.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg\" alt=\"浙江大学\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e线性结构的基础是数组和链表，由数组和链表可以扩展出堆栈和队列。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg\" alt=\"浙江大学\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e线性结构的基础是数组和链表，由数组和链表可以扩展出堆栈和队列。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e实验1：计算表达式的值\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e将中缀表达式转换为后缀表达式，并计算表达式的值。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eimport java.util.Stack;\n\npublic class Test05 {\n\n    public static void main(String[] args) {\n        String s = \"2*(6/3+4)-5\";\n        System.out.println(\"中缀表达式：\"+s);\n        s= covert(s);\n        System.out.println(\"转换为后缀表达式：\"+s);\n        int i = calculate(s);\n        System.out.println(\"计算后缀表达式：\"+i);\n\n    }\n\n    private static int calculate(String s) {\n\n        Stack\u0026#x3C;Integer\u003e stack = new Stack\u0026#x3C;\u003e();\n        for (char c : s.toCharArray()) { //从左到右遍历，如果是数字压入堆栈，如果是操作符，从堆栈中pop出两个数字计算，并将结果压入堆栈\n            if(c=='+') {\n                stack.push(stack.pop() + stack.pop());\n            }else if(c=='*') {\n                stack.push(stack.pop() * stack.pop());\n            }else if(c=='-') {\n                int b = stack.pop();\n                int a = stack.pop();\n                stack.push(a - b);\n            }else if(c=='/'){\n                int b = stack.pop();\n                int a = stack.pop();\n                stack.push(a / b);\n            }else{\n                stack.push(Character.getNumericValue(c));\n            }\n        }\n\n        return stack.pop(); //循环结束时，栈顶的数字就是后缀表达式结果\n\n    }\n\n    private static String covert(String s) {\n        StringBuilder sb = new StringBuilder();\n        Stack\u0026#x3C;Character\u003e stack = new Stack\u0026#x3C;\u003e();\n        for (char c : s.toCharArray()) {\n            if (c \u003e= '0' \u0026#x26;\u0026#x26; c \u0026#x3C;= '9') { //如果是数字直接输出\n                sb.append(c);\n            } else if (c == '(') { //如果是左括号，压入操作堆栈\n                stack.push(c);\n            } else if (c == ')') { //如果是右括号\n                while (true) { //寻找左括号\n                    c = stack.pop();\n                    if (c == '(') { //找到直接结束循环\n                        break;\n                    } else { //不是左括号直接输出操作符\n                        sb.append(c);\n                    }\n                }\n            } else { //如果是+ - * /\n\n                while (true) {  //寻找栈顶比当前操作优先级低的操作符\n                    if (stack.isEmpty()) { //如果是空栈，直接压入操作符\n                        stack.push(c);\n                        break;\n                    }\n                    char cInStack = stack.peek();\n                    if (isStackPriority(cInStack, c)) { //如果栈顶操作符优先级高或相同，直接出栈并输出\n                        sb.append(stack.pop());\n                    } else {\n                        stack.push(c); //找到优先级低的地方，把当前操作符push进去\n                        break;\n                    }\n                }\n            }\n            //System.out.println(stack.size());\n        }\n        while (!stack.isEmpty()){ //最后将栈里的操作符全部输出\n            sb.append(stack.pop());\n        }\n        return sb.toString();\n    }\n\n    private static boolean isStackPriority(char cInStack, char c2) {\n        return cInStack != '(' \u0026#x26;\u0026#x26; (cInStack == '*' || cInStack == '/' || c2 != '*' \u0026#x26;\u0026#x26; c2 != '/');\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e输出：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e中缀表达式：2*(6/3+4)-5\n转换为后缀表达式：263/4+*5-\n计算后缀表达式：7\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结:\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e利用堆栈可以很优雅的解决表达式运算的问题\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e以上程序有3个缺陷：不能计算小数；不能计算负数；只能计算个位数的运算\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e改进方向：使用浮点型计算；后缀转换时要添加对于多位数、小数、负数的处理；将结果直接保存到堆栈里，堆栈内保存数字和操作符\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业1：一元多项式的乘法与加法运算（20 分）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e设计函数分别求两个一元多项式的乘积与和。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输入格式:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输入分2行，每行分别先给出多项式非零项的个数，再以指数递降方式输入一个多项式非零项系数和指数（绝对值均为不超过1000的整数）。数字间以空格分隔。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输出格式:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输出分2行，分别以指数递降方式输出乘积多项式以及和多项式非零项的系数和指数。数字间以空格分隔，但结尾不能有多余空格。零多项式应输出0 0。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输入样例:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e5 3 4 -5 2  6 1  -2 0 0 0\n5 5 20  -7 4  3 1 0 0 3 0\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e输出样例:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e15 24 -25 22 30 21 -10 20 -21 8 35 6 -33 5 14 4 -15 3 18 2 -6 1\n5 20 -4 4 -5 2 9 1 -2 0\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epublic class Main {\n\n    public static void main(String[] args) {\n        Scanner scanner = new Scanner(System.in);\n        PolyNode first1 = getInput(scanner);\n        PolyNode first2 = getInput(scanner);\n        PolyNode result1 = add(first1, first2);\n        PolyNode result2 = multiply(first1, first2);\n        print(result2);\n        print(result1);\n\n    }\n\n    /**\n     * 逐项插入算法\n     *\n     * @param first1\n     * @param first2\n     * @return\n     */\n    private static PolyNode multiply(PolyNode first1, PolyNode first2) {\n        PolyNode p1 = first1;\n        PolyNode p2 = first2;\n\n        PolyNode first = new PolyNode(); //结果，先构造一个空的头节点\n        PolyNode rear = first; //将尾部指向这个头\n        while (p2 != null) { //先用第一项乘以p2构造一个初始多项式\n            PolyNode next = new PolyNode(); //构造一个新节点\n            next.coef = p1.coef * p2.coef; //系数相乘\n            next.expon = p1.expon + p2.expon; //指数相加\n            rear.next = next; //尾部指针指向新的节点\n            rear = next; //新尾部等于新添加的节点\n            p2 = p2.next; //移动p2指针\n        }\n        p1 = p1.next; //把p1指针向后挪1位\n        while (p1 != null) {\n            p2 = first2; //将p2指针归位\n            rear = first; //尾部指针归位\n            while (p2 != null) {\n                int e = p1.expon + p2.expon; //指数相加\n                int c = p1.coef * p2.coef; //系数相乘\n                while (rear.next != null \u0026#x26;\u0026#x26; rear.next.expon \u003e e) { //寻找比当前指数小或者等的位置\n                    rear = rear.next; //rear 往后挪\n                }\n                if (rear.next != null \u0026#x26;\u0026#x26; rear.next.expon == e) { //挪了之后如果下一项存在，且指数相等，则合并系数\n                    if (rear.next.coef + c == 0) { //和下一项系数相加等于0，则删掉这一项\n                        rear.next = rear.next.next;\n                    } else { //系数相加不为0，就要合并系数\n                        rear.next.coef += c;\n                    }\n                } else { //指数不等，需要创建一个新节点插入\n                    PolyNode newPoly = new PolyNode(); //构造一个新节点\n                    newPoly.coef = c;\n                    newPoly.expon = e;\n                    newPoly.next = rear.next;//新插入的节点下一个=当前尾部的下一个\n                    rear.next = newPoly; //当前尾部的下一个等于新节点\n                }\n\n                p2 = p2.next;//p2处理完毕，将p2挪到下一个\n            }\n            p1 = p1.next;//p2遍历完毕，将p1往后挪\n        }\n        first = first.next; //将头部挪到真实的头部位置，Java会自动回收没有引用的头节点\n\n        return first;\n    }\n\n    private static void print(PolyNode result) {\n        PolyNode p = result;\n        StringBuilder sb = new StringBuilder();\n        if (p == null) { //零多项式输出0 0\n            sb.append(\"0 0\");\n        }\n        boolean isFirst = true;\n        while (p != null) {\n            if (!isFirst)\n                sb.append(' ');\n            sb.append(p.coef);\n            sb.append(' ');\n            sb.append(p.expon);\n            p = p.next;\n            isFirst = false;\n        }\n        System.out.println(sb.toString());\n    }\n\n    private static PolyNode add(PolyNode first1, PolyNode first2) {\n        PolyNode p1 = first1;\n        PolyNode p2 = first2;\n\n        PolyNode first = new PolyNode(); //结果，先构造一个空的头节点\n        PolyNode rear = first; //将尾部指向这个头\n        while (p1 != null \u0026#x26;\u0026#x26; p2 != null) { //当两个指针都不为空时\n            if (p1.coef == 0) { //系数为0,直接省略\n                p1 = p1.next;\n            } else if (p2.coef == 0) {\n                p2 = p2.next;\n            } else if (p1.expon == p2.expon) { //指数相等，则系数相加后串到后面\n                int coef = p1.coef + p2.coef;  //系数相加\n                if (coef != 0) {\n                    PolyNode next = new PolyNode(); //构造一个新节点\n                    next.coef = coef;\n                    next.expon = p1.expon;\n                    rear.next = next; //尾部指针指向新的节点\n                    rear = next; //新尾部等于新添加的节点\n                }\n                p1 = p1.next; //移动指针\n                p2 = p2.next;\n            } else if (p1.expon \u003e p2.expon) {//指数大的串到后面\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p1.coef;\n                next.expon = p1.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n                p1 = p1.next; //移动指针\n            } else {\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p2.coef;\n                next.expon = p2.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n                p2 = p2.next; //移动指针\n            }\n        }\n\n        while (p1 != null) { //p1没完，把所有p1追加到后面\n            if (p1.coef != 0) { //系数不为0才，添加，否则继续找因为后面可以能还有系数不为0的\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p1.coef;\n                next.expon = p1.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n            }\n            p1 = p1.next; //移动指针\n        }\n\n        while (p2 != null \u0026#x26;\u0026#x26; p2.coef != 0) { //p2没完，把所有p2追加到后面\n            if (p2.coef != 0) { //系数不为0才，添加，否则继续找因为后面可以能还有系数不为0的\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p2.coef;\n                next.expon = p2.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n            }\n            p2 = p2.next; //移动指针\n        }\n        first = first.next; //将头部挪到真实的头部位置，Java会自动回收没有引用的头节点\n        return first;\n    }\n\n    private static PolyNode getInput(Scanner scanner) {\n        int count = scanner.nextInt(); //得到总项数\n        PolyNode first = new PolyNode(); //构造一个空的头\n        PolyNode rear = first; //构造一个尾部的指针\n        while (count \u003e 0) {\n            PolyNode next = new PolyNode(); //读取一个节点\n            next.coef = scanner.nextInt();\n            next.expon = scanner.nextInt();\n            rear.next = next; //将尾部的指针指向读到的这个节点\n            rear = next; //将尾部指针挪到新添加的节点\n            count--; //循环\n        }\n        first = first.next; //将头部挪到真实的头部位置，Java会自动回收没有引用的头节点\n        return first;\n    }\n\n\n    static class PolyNode {\n        int coef;\n        int expon;\n        PolyNode next;\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结：\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e逐项插值算法；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e单个对象保存一个当前类的引用可以当作链表来使用；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e原输入的链表不要取修改它的内部对象引用或者变量值；\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业1：Reversing Linked List（25 分）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eGiven a constant K and a singly linked list L, you are supposed to reverse the links of every K elements on L. For example, given L being 1→2→3→4→5→6, if K=3, then you must output 3→2→1→6→5→4; if K=4, you must output 4→3→2→1→5→6.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eInput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eEach input file contains one test case. For each case, the first line contains the address of the first node, a positive N (≤10\n​5\n​​ ) which is the total number of nodes, and a positive K (≤N) which is the length of the sublist to be reversed. The address of a node is a 5-digit nonnegative integer, and NULL is represented by -1.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eThen N lines follow, each describes a node in the format:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAddress Data Next\u003c/code\u003e\nwhere \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAddress\u003c/code\u003e is the position of the node, \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eData\u003c/code\u003e is an integer, and \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNext\u003c/code\u003e is the position of the next node.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eOutput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eFor each case, output the resulting ordered linked list. Each node occupies a line, and is printed in the same format as in the input.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eSample Input:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e00100 8 4\n00000 4 99999\n00100 1 12309\n68237 6 77777\n33218 3 00000\n77777 7 88888\n99999 5 68237\n12309 2 33218\n88888 8 -1\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003eSample Output:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e00000 4 33218\n33218 3 12309\n12309 2 00100\n00100 1 99999\n99999 5 68237\n68237 6 -1\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode;\n\nimport java.io.BufferedReader;\nimport java.io.InputStreamReader;\nimport java.util.ArrayList;\nimport java.util.LinkedList;\nimport java.util.Objects;\nimport java.util.Stack;\n\npublic class Main {\n    public static void main(String args[]) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n        //读第一行\n        String[] line1Array = getStringArray(reader);\n        String firstAddress = line1Array[0];\n        int count = Integer.parseInt(line1Array[1]);\n        int k = Integer.parseInt(line1Array[2]);\n\n        //读取所有节点\n        ArrayList\u0026#x3C;Node\u003e nodes = new ArrayList\u0026#x3C;\u003e(count);\n        for (int i = 0; i \u0026#x3C; count; i++) {\n            String[] lineArray = getStringArray(reader);\n            Node node = new Node();\n            node.address = lineArray[0];\n            node.data = Integer.parseInt(lineArray[1]);\n            node.nextAddress = lineArray[2];\n            nodes.add(node);\n        }\n\n\n        //按链表顺序加入队列\n        LinkedList\u0026#x3C;Node\u003e queue = new LinkedList\u0026#x3C;\u003e();\n        String address = firstAddress;\n        while (!address.equals(\"-1\")) {\n            for (int i = 0; i \u0026#x3C; nodes.size(); i++) { //循环匹配地址\n                Node n = nodes.get(i);\n                if (Objects.equals(address, n.address)) { //找到则加入队列\n                    queue.add(n);\n                    address = n.nextAddress; //查找地址赋值为当前节点的下一个地址\n                    nodes.remove(n); //处理完的移出节点数组，减少循环量\n                    break;\n                }\n            }\n        }\n\n        Stack\u0026#x3C;Node\u003e stack = new Stack\u0026#x3C;\u003e();\n        boolean isCanConvert = queue.size() \u003e= k; //是否够反转\n        while (!queue.isEmpty()) { //循环出队列\n            Node n = queue.remove();\n            if (isCanConvert) { //够反转则压入堆栈\n                stack.push(n);\n                if (stack.size() == k) { //压够反转数量就全部输出\n                    isCanConvert = queue.size() \u003e= k; //再次检查是否够反转\n                    while (!stack.isEmpty()) {\n                        //重新赋值next\n                        Node nStack = stack.pop();\n                        if (stack.isEmpty()) { //如果栈里没了，地址就等于队列的下一个\n                            if (queue.isEmpty()) { //队列也没了，地址等于-1\n                                nStack.nextAddress = \"-1\";\n                            } else {\n                                //如果剩下的还能反转\n                                if (isCanConvert) {\n                                    nStack.nextAddress = queue.get(k - 1).address;\n                                } else {\n                                    nStack.nextAddress = queue.peek().address;\n                                }\n                            }\n                        } else {\n                            nStack.nextAddress = stack.peek().address;\n                        }\n                        print(nStack);\n                    }\n                }\n            } else { //不够反转 直接输出节点\n                print(n);\n            }\n        }\n\n    }\n\n\n    private static void print(Node n) {\n        System.out.println(n.address + \" \" + n.data + \" \" + n.nextAddress);\n    }\n\n    private static String[] getStringArray(BufferedReader reader) {\n        String line1 = null;\n        try {\n            line1 = reader.readLine();\n        } catch (Exception ignore) {\n        }\n        return line1.split(\" \");\n    }\n\n    static class Node {\n        String address;\n        int data;\n        String nextAddress;\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结：\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e利用队列和栈解决顺序问题\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业2：Pop Sequence（25 分）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eGiven a stack which can keep M numbers at most. Push N numbers in the order of 1, 2, 3, ..., N and pop randomly. You are supposed to tell if a given sequence of numbers is a possible pop sequence of the stack. For example, if M is 5 and N is 7, we can obtain 1, 2, 3, 4, 5, 6, 7 from the stack, but not 3, 2, 1, 7, 5, 6, 4.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eInput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eEach input file contains one test case. For each case, the first line contains 3 numbers (all no more than 1000): M (the maximum capacity of the stack), N (the length of push sequence), and K (the number of pop sequences to be checked). Then K lines follow, each contains a pop sequence of N numbers. All the numbers in a line are separated by a space.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eOutput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eFor each pop sequence, print in one line \"YES\" if it is indeed a possible pop sequence of the stack, or \"NO\" if not.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eSample Input:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e5 7 5\n1 2 3 4 5 6 7\n3 2 1 7 5 6 4\n7 6 5 4 3 2 1\n5 6 4 3 7 2 1\n1 7 6 5 4 3 2\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003eSample Output:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eYES\nNO\nNO\nYES\nNO\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![浙江大学](https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg)\n\n\u003e 线性结构的基础是数组和链表，由数组和链表可以扩展出堆栈和队列。\n\n\n\u003c!--more--\u003e\n\n## 实验1：计算表达式的值\n\n将中缀表达式转换为后缀表达式，并计算表达式的值。\n\n- 实现：\n\n```java\nimport java.util.Stack;\n\npublic class Test05 {\n\n    public static void main(String[] args) {\n        String s = \"2*(6/3+4)-5\";\n        System.out.println(\"中缀表达式：\"+s);\n        s= covert(s);\n        System.out.println(\"转换为后缀表达式：\"+s);\n        int i = calculate(s);\n        System.out.println(\"计算后缀表达式：\"+i);\n\n    }\n\n    private static int calculate(String s) {\n\n        Stack\u003cInteger\u003e stack = new Stack\u003c\u003e();\n        for (char c : s.toCharArray()) { //从左到右遍历，如果是数字压入堆栈，如果是操作符，从堆栈中pop出两个数字计算，并将结果压入堆栈\n            if(c=='+') {\n                stack.push(stack.pop() + stack.pop());\n            }else if(c=='*') {\n                stack.push(stack.pop() * stack.pop());\n            }else if(c=='-') {\n                int b = stack.pop();\n                int a = stack.pop();\n                stack.push(a - b);\n            }else if(c=='/'){\n                int b = stack.pop();\n                int a = stack.pop();\n                stack.push(a / b);\n            }else{\n                stack.push(Character.getNumericValue(c));\n            }\n        }\n\n        return stack.pop(); //循环结束时，栈顶的数字就是后缀表达式结果\n\n    }\n\n    private static String covert(String s) {\n        StringBuilder sb = new StringBuilder();\n        Stack\u003cCharacter\u003e stack = new Stack\u003c\u003e();\n        for (char c : s.toCharArray()) {\n            if (c \u003e= '0' \u0026\u0026 c \u003c= '9') { //如果是数字直接输出\n                sb.append(c);\n            } else if (c == '(') { //如果是左括号，压入操作堆栈\n                stack.push(c);\n            } else if (c == ')') { //如果是右括号\n                while (true) { //寻找左括号\n                    c = stack.pop();\n                    if (c == '(') { //找到直接结束循环\n                        break;\n                    } else { //不是左括号直接输出操作符\n                        sb.append(c);\n                    }\n                }\n            } else { //如果是+ - * /\n\n                while (true) {  //寻找栈顶比当前操作优先级低的操作符\n                    if (stack.isEmpty()) { //如果是空栈，直接压入操作符\n                        stack.push(c);\n                        break;\n                    }\n                    char cInStack = stack.peek();\n                    if (isStackPriority(cInStack, c)) { //如果栈顶操作符优先级高或相同，直接出栈并输出\n                        sb.append(stack.pop());\n                    } else {\n                        stack.push(c); //找到优先级低的地方，把当前操作符push进去\n                        break;\n                    }\n                }\n            }\n            //System.out.println(stack.size());\n        }\n        while (!stack.isEmpty()){ //最后将栈里的操作符全部输出\n            sb.append(stack.pop());\n        }\n        return sb.toString();\n    }\n\n    private static boolean isStackPriority(char cInStack, char c2) {\n        return cInStack != '(' \u0026\u0026 (cInStack == '*' || cInStack == '/' || c2 != '*' \u0026\u0026 c2 != '/');\n    }\n}\n```\n\n\n\n- 输出：\n\n```bash\n中缀表达式：2*(6/3+4)-5\n转换为后缀表达式：263/4+*5-\n计算后缀表达式：7\n```\n\n- 总结:\n\n1. 利用堆栈可以很优雅的解决表达式运算的问题\n2. 以上程序有3个缺陷：不能计算小数；不能计算负数；只能计算个位数的运算\n3. 改进方向：使用浮点型计算；后缀转换时要添加对于多位数、小数、负数的处理；将结果直接保存到堆栈里，堆栈内保存数字和操作符\n\n## 作业1：一元多项式的乘法与加法运算（20 分）\n\n设计函数分别求两个一元多项式的乘积与和。\n\n输入格式:\n\n输入分2行，每行分别先给出多项式非零项的个数，再以指数递降方式输入一个多项式非零项系数和指数（绝对值均为不超过1000的整数）。数字间以空格分隔。\n\n输出格式:\n\n输出分2行，分别以指数递降方式输出乘积多项式以及和多项式非零项的系数和指数。数字间以空格分隔，但结尾不能有多余空格。零多项式应输出0 0。\n\n输入样例:\n```bash\n5 3 4 -5 2  6 1  -2 0 0 0\n5 5 20  -7 4  3 1 0 0 3 0\n```\n输出样例:\n```bash\n15 24 -25 22 30 21 -10 20 -21 8 35 6 -33 5 14 4 -15 3 18 2 -6 1\n5 20 -4 4 -5 2 9 1 -2 0\n```\n\n- 实现：\n\n```java\npublic class Main {\n\n    public static void main(String[] args) {\n        Scanner scanner = new Scanner(System.in);\n        PolyNode first1 = getInput(scanner);\n        PolyNode first2 = getInput(scanner);\n        PolyNode result1 = add(first1, first2);\n        PolyNode result2 = multiply(first1, first2);\n        print(result2);\n        print(result1);\n\n    }\n\n    /**\n     * 逐项插入算法\n     *\n     * @param first1\n     * @param first2\n     * @return\n     */\n    private static PolyNode multiply(PolyNode first1, PolyNode first2) {\n        PolyNode p1 = first1;\n        PolyNode p2 = first2;\n\n        PolyNode first = new PolyNode(); //结果，先构造一个空的头节点\n        PolyNode rear = first; //将尾部指向这个头\n        while (p2 != null) { //先用第一项乘以p2构造一个初始多项式\n            PolyNode next = new PolyNode(); //构造一个新节点\n            next.coef = p1.coef * p2.coef; //系数相乘\n            next.expon = p1.expon + p2.expon; //指数相加\n            rear.next = next; //尾部指针指向新的节点\n            rear = next; //新尾部等于新添加的节点\n            p2 = p2.next; //移动p2指针\n        }\n        p1 = p1.next; //把p1指针向后挪1位\n        while (p1 != null) {\n            p2 = first2; //将p2指针归位\n            rear = first; //尾部指针归位\n            while (p2 != null) {\n                int e = p1.expon + p2.expon; //指数相加\n                int c = p1.coef * p2.coef; //系数相乘\n                while (rear.next != null \u0026\u0026 rear.next.expon \u003e e) { //寻找比当前指数小或者等的位置\n                    rear = rear.next; //rear 往后挪\n                }\n                if (rear.next != null \u0026\u0026 rear.next.expon == e) { //挪了之后如果下一项存在，且指数相等，则合并系数\n                    if (rear.next.coef + c == 0) { //和下一项系数相加等于0，则删掉这一项\n                        rear.next = rear.next.next;\n                    } else { //系数相加不为0，就要合并系数\n                        rear.next.coef += c;\n                    }\n                } else { //指数不等，需要创建一个新节点插入\n                    PolyNode newPoly = new PolyNode(); //构造一个新节点\n                    newPoly.coef = c;\n                    newPoly.expon = e;\n                    newPoly.next = rear.next;//新插入的节点下一个=当前尾部的下一个\n                    rear.next = newPoly; //当前尾部的下一个等于新节点\n                }\n\n                p2 = p2.next;//p2处理完毕，将p2挪到下一个\n            }\n            p1 = p1.next;//p2遍历完毕，将p1往后挪\n        }\n        first = first.next; //将头部挪到真实的头部位置，Java会自动回收没有引用的头节点\n\n        return first;\n    }\n\n    private static void print(PolyNode result) {\n        PolyNode p = result;\n        StringBuilder sb = new StringBuilder();\n        if (p == null) { //零多项式输出0 0\n            sb.append(\"0 0\");\n        }\n        boolean isFirst = true;\n        while (p != null) {\n            if (!isFirst)\n                sb.append(' ');\n            sb.append(p.coef);\n            sb.append(' ');\n            sb.append(p.expon);\n            p = p.next;\n            isFirst = false;\n        }\n        System.out.println(sb.toString());\n    }\n\n    private static PolyNode add(PolyNode first1, PolyNode first2) {\n        PolyNode p1 = first1;\n        PolyNode p2 = first2;\n\n        PolyNode first = new PolyNode(); //结果，先构造一个空的头节点\n        PolyNode rear = first; //将尾部指向这个头\n        while (p1 != null \u0026\u0026 p2 != null) { //当两个指针都不为空时\n            if (p1.coef == 0) { //系数为0,直接省略\n                p1 = p1.next;\n            } else if (p2.coef == 0) {\n                p2 = p2.next;\n            } else if (p1.expon == p2.expon) { //指数相等，则系数相加后串到后面\n                int coef = p1.coef + p2.coef;  //系数相加\n                if (coef != 0) {\n                    PolyNode next = new PolyNode(); //构造一个新节点\n                    next.coef = coef;\n                    next.expon = p1.expon;\n                    rear.next = next; //尾部指针指向新的节点\n                    rear = next; //新尾部等于新添加的节点\n                }\n                p1 = p1.next; //移动指针\n                p2 = p2.next;\n            } else if (p1.expon \u003e p2.expon) {//指数大的串到后面\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p1.coef;\n                next.expon = p1.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n                p1 = p1.next; //移动指针\n            } else {\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p2.coef;\n                next.expon = p2.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n                p2 = p2.next; //移动指针\n            }\n        }\n\n        while (p1 != null) { //p1没完，把所有p1追加到后面\n            if (p1.coef != 0) { //系数不为0才，添加，否则继续找因为后面可以能还有系数不为0的\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p1.coef;\n                next.expon = p1.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n            }\n            p1 = p1.next; //移动指针\n        }\n\n        while (p2 != null \u0026\u0026 p2.coef != 0) { //p2没完，把所有p2追加到后面\n            if (p2.coef != 0) { //系数不为0才，添加，否则继续找因为后面可以能还有系数不为0的\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p2.coef;\n                next.expon = p2.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n            }\n            p2 = p2.next; //移动指针\n        }\n        first = first.next; //将头部挪到真实的头部位置，Java会自动回收没有引用的头节点\n        return first;\n    }\n\n    private static PolyNode getInput(Scanner scanner) {\n        int count = scanner.nextInt(); //得到总项数\n        PolyNode first = new PolyNode(); //构造一个空的头\n        PolyNode rear = first; //构造一个尾部的指针\n        while (count \u003e 0) {\n            PolyNode next = new PolyNode(); //读取一个节点\n            next.coef = scanner.nextInt();\n            next.expon = scanner.nextInt();\n            rear.next = next; //将尾部的指针指向读到的这个节点\n            rear = next; //将尾部指针挪到新添加的节点\n            count--; //循环\n        }\n        first = first.next; //将头部挪到真实的头部位置，Java会自动回收没有引用的头节点\n        return first;\n    }\n\n\n    static class PolyNode {\n        int coef;\n        int expon;\n        PolyNode next;\n    }\n}\n\n```\n\n- 总结：\n\n1. 逐项插值算法；\n2. 单个对象保存一个当前类的引用可以当作链表来使用；\n3. 原输入的链表不要取修改它的内部对象引用或者变量值；\n\n## 作业1：Reversing Linked List（25 分）\n\nGiven a constant K and a singly linked list L, you are supposed to reverse the links of every K elements on L. For example, given L being 1→2→3→4→5→6, if K=3, then you must output 3→2→1→6→5→4; if K=4, you must output 4→3→2→1→5→6.\n\nInput Specification:\n\nEach input file contains one test case. For each case, the first line contains the address of the first node, a positive N (≤10\n​5\n​​ ) which is the total number of nodes, and a positive K (≤N) which is the length of the sublist to be reversed. The address of a node is a 5-digit nonnegative integer, and NULL is represented by -1.\n\nThen N lines follow, each describes a node in the format:\n\n`Address Data Next`\nwhere `Address` is the position of the node, `Data` is an integer, and `Next` is the position of the next node.\n\nOutput Specification:\n\nFor each case, output the resulting ordered linked list. Each node occupies a line, and is printed in the same format as in the input.\n\nSample Input:\n```bash\n00100 8 4\n00000 4 99999\n00100 1 12309\n68237 6 77777\n33218 3 00000\n77777 7 88888\n99999 5 68237\n12309 2 33218\n88888 8 -1\n```\nSample Output:\n```bash\n00000 4 33218\n33218 3 12309\n12309 2 00100\n00100 1 99999\n99999 5 68237\n68237 6 -1\n```\n\n- 实现：\n\n```java\npackage cn.wycode;\n\nimport java.io.BufferedReader;\nimport java.io.InputStreamReader;\nimport java.util.ArrayList;\nimport java.util.LinkedList;\nimport java.util.Objects;\nimport java.util.Stack;\n\npublic class Main {\n    public static void main(String args[]) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n        //读第一行\n        String[] line1Array = getStringArray(reader);\n        String firstAddress = line1Array[0];\n        int count = Integer.parseInt(line1Array[1]);\n        int k = Integer.parseInt(line1Array[2]);\n\n        //读取所有节点\n        ArrayList\u003cNode\u003e nodes = new ArrayList\u003c\u003e(count);\n        for (int i = 0; i \u003c count; i++) {\n            String[] lineArray = getStringArray(reader);\n            Node node = new Node();\n            node.address = lineArray[0];\n            node.data = Integer.parseInt(lineArray[1]);\n            node.nextAddress = lineArray[2];\n            nodes.add(node);\n        }\n\n\n        //按链表顺序加入队列\n        LinkedList\u003cNode\u003e queue = new LinkedList\u003c\u003e();\n        String address = firstAddress;\n        while (!address.equals(\"-1\")) {\n            for (int i = 0; i \u003c nodes.size(); i++) { //循环匹配地址\n                Node n = nodes.get(i);\n                if (Objects.equals(address, n.address)) { //找到则加入队列\n                    queue.add(n);\n                    address = n.nextAddress; //查找地址赋值为当前节点的下一个地址\n                    nodes.remove(n); //处理完的移出节点数组，减少循环量\n                    break;\n                }\n            }\n        }\n\n        Stack\u003cNode\u003e stack = new Stack\u003c\u003e();\n        boolean isCanConvert = queue.size() \u003e= k; //是否够反转\n        while (!queue.isEmpty()) { //循环出队列\n            Node n = queue.remove();\n            if (isCanConvert) { //够反转则压入堆栈\n                stack.push(n);\n                if (stack.size() == k) { //压够反转数量就全部输出\n                    isCanConvert = queue.size() \u003e= k; //再次检查是否够反转\n                    while (!stack.isEmpty()) {\n                        //重新赋值next\n                        Node nStack = stack.pop();\n                        if (stack.isEmpty()) { //如果栈里没了，地址就等于队列的下一个\n                            if (queue.isEmpty()) { //队列也没了，地址等于-1\n                                nStack.nextAddress = \"-1\";\n                            } else {\n                                //如果剩下的还能反转\n                                if (isCanConvert) {\n                                    nStack.nextAddress = queue.get(k - 1).address;\n                                } else {\n                                    nStack.nextAddress = queue.peek().address;\n                                }\n                            }\n                        } else {\n                            nStack.nextAddress = stack.peek().address;\n                        }\n                        print(nStack);\n                    }\n                }\n            } else { //不够反转 直接输出节点\n                print(n);\n            }\n        }\n\n    }\n\n\n    private static void print(Node n) {\n        System.out.println(n.address + \" \" + n.data + \" \" + n.nextAddress);\n    }\n\n    private static String[] getStringArray(BufferedReader reader) {\n        String line1 = null;\n        try {\n            line1 = reader.readLine();\n        } catch (Exception ignore) {\n        }\n        return line1.split(\" \");\n    }\n\n    static class Node {\n        String address;\n        int data;\n        String nextAddress;\n    }\n}\n\n```\n\n\n- 总结：\n\n1. 利用队列和栈解决顺序问题\n\n## 作业2：Pop Sequence（25 分）\n\n\nGiven a stack which can keep M numbers at most. Push N numbers in the order of 1, 2, 3, ..., N and pop randomly. You are supposed to tell if a given sequence of numbers is a possible pop sequence of the stack. For example, if M is 5 and N is 7, we can obtain 1, 2, 3, 4, 5, 6, 7 from the stack, but not 3, 2, 1, 7, 5, 6, 4.\n\nInput Specification:\n\nEach input file contains one test case. For each case, the first line contains 3 numbers (all no more than 1000): M (the maximum capacity of the stack), N (the length of push sequence), and K (the number of pop sequences to be checked). Then K lines follow, each contains a pop sequence of N numbers. All the numbers in a line are separated by a space.\n\nOutput Specification:\n\nFor each pop sequence, print in one line \"YES\" if it is indeed a possible pop sequence of the stack, or \"NO\" if not.\n\nSample Input:\n```bash\n5 7 5\n1 2 3 4 5 6 7\n3 2 1 7 5 6 4\n7 6 5 4 3 2 1\n5 6 4 3 7 2 1\n1 7 6 5 4 3 2\n```\nSample Output:\n```bash\nYES\nNO\nNO\nYES\nNO\n```","data":{"title":"数据结构与算法学习笔记02","date":"2018-03-16","tags":["C"],"category":"Computer Science"},"isEmpty":false,"excerpt":"\n![浙江大学](https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg)\n\n\u003e 线性结构的基础是数组和链表，由数组和链表可以扩展出堆栈和队列。\n\n\n"},{"id":"data-structures01","file":"data-structures01.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg\" alt=\"浙江大学\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e程序=数据结构+算法。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e浙江大学数据结构是国家精品课程，于2018年3月开学，2018年6月学期结束。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg\" alt=\"浙江大学\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e程序=数据结构+算法。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e浙江大学数据结构是国家精品课程，于2018年3月开学，2018年6月学期结束。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e实验1：给出数字N，要求程序输出1~N的整数\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用Java测试：输出10000次，for循环耗时114ms，递归耗时61ms！100000次递归栈溢出崩溃，for循环耗时900ms。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\npublic class Main {\n\n    public static void main(String[] args) {\n   \t\t// write your code here\n        Main m = new Main();\n        long time = System.currentTimeMillis();\n        m.printN(10000);\n        System.out.println(\"time=\"+(System.currentTimeMillis()-time));\n        time = System.currentTimeMillis();\n        m.printNR(10000);\n        System.out.println(\"time=\"+(System.currentTimeMillis()-time));\n    }\n\n    private void printNR(int n) {\n        if(n\u003e0) {\n            printNR(n - 1);\n            System.out.println(n);\n        }\n    }\n\n    private void printN(int n){\n        for(int i= 1;i\u0026#x3C;=n;i++){\n            System.out.println(i);\n        }\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e用C测试：输出100000次，for循环耗时149ms，递归耗时148ms，100000次递归耗时150ms，100万次\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-C px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e#include \u0026#x3C;stdio.h\u003e\n#include \u0026#x3C;time.h\u003e\n\n\nvoid printN(int n);\nvoid printNC(int n);\n\nint main(){\n    clock_t startTime = clock();\n    printN(100000);\n    //double diff = ;\n    printf(\"%f seconds\\n\",difftime(clock(),startTime)/CLOCKS_PER_SEC);\n    \n    \n}\n\nvoid printN(int n){\n    for(int i=1;i\u0026#x3C;=n;i++){\n        printf(\"%d\\n\",i);\n    }\n}\n\n\nvoid printNC(int n){\n    if(n){\n        printNC(n-1);\n        printf(\"%d\\n\",n);\n    }\n\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结:\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003cdel\u003eC语言程序运行效率至少在Java的10倍以上\u003c/del\u003e（C程序计时不准，需要重新测试）\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e递归的空间效率很差，容易堆栈溢出崩溃。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eJava环境递归耗时是for循环的1/2。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eC语言环境递归耗时和for循环差不多。\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e实验2：计算多项式的值\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180313_data_structure.png\" alt=\"多项式\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epublic class Test02 {\n\n    public static void main(String[] args) {\n        // write your code here\n        Test02 t = new Test02();\n        long time = System.currentTimeMillis();\n        for(int i=0;i\u0026#x3C;100000;i++) {\n            t.f1(1.1);\n        }\n        System.out.println(\"time=\" + (System.currentTimeMillis() - time));\n        time = System.currentTimeMillis();\n        for(int i=0;i\u0026#x3C;100000;i++) {\n            t.f2(1.1);\n        }\n        System.out.println(\"time=\" + (System.currentTimeMillis() - time));\n    }\n\n    private double f1(double x) {\n        double v = 1f;\n        for (int i = 1; i \u0026#x3C;= 100; i++) {\n            v += Math.pow(x,i) / i;\n        }\n        return v;\n    }\n\n    //f(x) = 1+x(1/1+x(1/2+x(1/3+....x(1/100))))\n\n    private double f2(double x) {\n        double v = x/100;\n        int i = 100;\n        while (i\u003e1) {\n            v = x*(1f/(i-1)+v);\n            i--;\n        }\n        return v+1;\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结：\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e循环10万次测试，方法1，耗时1016ms，方法2耗时16ms。约100倍的效率差距\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e计算时一定要注意，整形和浮点型\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ev = x*(1f/(i-1)+v);\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e方法1，慢就慢在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epow\u003c/code\u003e函数上\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e替换pow函数为计数循环\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ex *=x\u003c/code\u003e耗时500ms，差距缩小至约20倍。\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业1\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e01-复杂度1 最大子列和问题（20 分）\n给定K个整数组成的序列{ N​1, N2, ..., NK}，“连续子列”被定义为{ N​i, Ni+1, ..., N​j}，其中 1≤i≤j≤K。\n“最大子列和”则被定义为所有连续子列元素的和中最大者。\n例如给定序列{ -2, 11, -4, 13, -5, -2 }，其连续子列{ 11, -4, 13 }有最大的和20。\n现要求你编写程序，计算给定整数序列的最大子列和。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本题旨在测试各种不同的算法在各种数据情况下的表现。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e各组测试数据特点如下：\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e数据1：与样例等价，测试基本正确性；\n数据2：102个随机整数；\n数据3：103个随机整数；\n数据4：104个随机整数；\n数据5：105个随机整数；\n输入格式:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输入第1行给出正整数K (≤100000)；第2行给出K个整数，其间以空格分隔。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输出格式:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在一行中输出最大子列和。如果序列中所有整数皆为负数，则输出0。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输入样例:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e 6\n -2 11 -4 13 -5 -2\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e输出样例:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e 20\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e实现：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eimport java.util.Scanner;\n\n\npublic class Main{\n\n    public static void main(String args[]) {\n        Scanner scanner = new Scanner(System.in);\n        int k = scanner.nextInt();\n        int[] n = new int[k];\n        for (int i = 0; i \u0026#x3C; k; i++) {\n            if (scanner.hasNext()) {\n                n[i] = scanner.nextInt();\n            }\n        }\n        System.out.println(maximumSubsequenceSum(n));\n    }\n\n    /**\n     * 在线处理算法，任意时刻给出的都是当前最大子数列和\n     * @param n\n     * @return\n     */\n    private static int maximumSubsequenceSum(int[] n) {\n        int thisMax = 0;\n        int maxSum = 0;\n        for (int i = 0; i \u0026#x3C; n.length; i++) {\n            thisMax += n[i];\n\n            if (thisMax \u0026#x3C; 0) {\n                thisMax = 0;\n            } else if (thisMax \u003e maxSum) {\n                maxSum = thisMax;\n            }\n        }\n        return maxSum;\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业2\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e01-复杂度2 Maximum Subsequence Sum（25 分）\nGiven a sequence of K integers { N1, N2, ..., NK}. A continuous subsequence is defined to be { Ni, Ni+1, ..., Nj } where 1≤i≤j≤K. The Maximum Subsequence is the continuous subsequence which has the largest sum of its elements. For example, given sequence { -2, 11, -4, 13, -5, -2 }, its maximum subsequence is { 11, -4, 13 } with the largest sum being 20.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eNow you are supposed to find the largest sum, together with the first and the last numbers of the maximum subsequence.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eInput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eEach input file contains one test case. Each case occupies two lines. The first line contains a positive integer K (≤10000). The second line contains K numbers, separated by a space.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eOutput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eFor each test case, output in one line the largest sum, together with the first and the last numbers of the maximum subsequence. The numbers must be separated by one space, but there must be no extra space at the end of a line. In case that the maximum subsequence is not unique, output the one with the smallest indices i and j (as shown by the sample case). If all the K numbers are negative, then its maximum sum is defined to be 0, and you are supposed to output the first and the last numbers of the whole sequence.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eSample Input:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e10\n-10 1 2 3 4 -5 -23 3 7 -21\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003eSample Output:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e10 1 4\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epublic class Main {\n    public static void main(String[] args) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n        String countString = null;\n        String numbersString =null;\n        try {\n            countString = reader.readLine();\n            numbersString = reader.readLine();\n        }catch (Exception ignored){\n\n        }\n        int[] n = new int[Integer.parseInt(countString)];\n        String[] numbersStringArray = numbersString.split(\" \");\n\n        for (int i = 0; i \u0026#x3C; n.length; i++) {\n            n[i] = Integer.parseInt(numbersStringArray[i]);\n        }\n\n\n//        Scanner scanner = new Scanner(System.in);\n//        int k = scanner.nextInt();\n//        int[] n = new int[k];\n//\n//        for (int i = 0; i \u0026#x3C; k; i++) {\n//            n[i] = scanner.nextInt();\n//        }\n\n        maximumSubsequenceSum(n);\n\n    }\n\n    /**\n     * 在线处理算法，任意时刻给出的都是当前最大子数列和\n     *\n     * @param n\n     * @return\n     */\n    private static void maximumSubsequenceSum(int[] n) {\n        int thisMax = 0;\n        int maxSum = 0;\n\n        int startI = 0;\n        int endI = n.length - 1;\n        int temp = 0;\n        boolean isMaxStart = true;\n        for (int i = 0; i \u0026#x3C; n.length; i++) {\n            thisMax += n[i];\n\n            if (thisMax \u0026#x3C; 0) {\n                thisMax = 0;\n                temp = 0;\n                isMaxStart = true;\n            } else {\n\n                if(isMaxStart){\n                    temp = i;\n                    isMaxStart = false;\n                }\n\n                if (thisMax \u003e maxSum) {\n\n                    maxSum = thisMax;\n                    endI = i;\n                    startI = temp;\n                }\n\n                if(maxSum==0){\n                    startI =temp;\n                    endI = i;\n                }\n            }\n        }\n\n\n        System.out.println(maxSum + \" \" + n[startI] + \" \" + n[endI]);\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e这题所有case要求在200ms内执行完毕，其中一个case比较大的N导致执行超时,调查发现Scanner这个东西贼慢...换成BufferReader就好了。\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业3\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e01-复杂度3 二分查找（20 分）\n本题要求实现二分查找算法。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e函数接口定义：\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ePosition BinarySearch( List L, ElementType X );\u003c/code\u003e\n其中List结构定义如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-c px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003etypedef int Position;\ntypedef struct LNode *List;\nstruct LNode {\n    ElementType Data[MAXSIZE];\n    Position Last; /* 保存线性表中最后一个元素的位置 */\n};\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003eL是用户传入的一个线性表，其中ElementType元素可以通过\u003e、==、\u0026#x3C;进行比较，并且题目保证传入的数据是递增有序的。函数BinarySearch要查找X在Data中的位置，即数组下标（注意：元素从下标1开始存储）。找到则返回下标，否则返回一个特殊的失败标记NotFound。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e裁判测试程序样例：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-c px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e#include \u0026#x3C;stdio.h\u003e\n#include \u0026#x3C;stdlib.h\u003e\n\n#define MAXSIZE 10\n#define NotFound 0\ntypedef int ElementType;\n\ntypedef int Position;\ntypedef struct LNode *List;\nstruct LNode {\n    ElementType Data[MAXSIZE];\n    Position Last; /* 保存线性表中最后一个元素的位置 */\n};\n\nList ReadInput(); /* 裁判实现，细节不表。元素从下标1开始存储 */\nPosition BinarySearch( List L, ElementType X );\n\nint main()\n{\n    List L;\n    ElementType X;\n    Position P;\n\n    L = ReadInput();\n    scanf(\"%d\", \u0026#x26;X);\n    P = BinarySearch( L, X );\n    printf(\"%d\\n\", P);\n\n    return 0;\n}\n\n/* 你的代码将被嵌在这里 */\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e输入样例1：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e5\n12 31 55 89 101\n31\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e输出样例1：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e2\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e输入样例2：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e3\n26 78 233\n31\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e输出样例2：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e0\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n![浙江大学](https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg)\n\n\u003e 程序=数据结构+算法。\n\n浙江大学数据结构是国家精品课程，于2018年3月开学，2018年6月学期结束。\n\n\u003c!--more--\u003e\n\n## 实验1：给出数字N，要求程序输出1~N的整数\n\n使用Java测试：输出10000次，for循环耗时114ms，递归耗时61ms！100000次递归栈溢出崩溃，for循环耗时900ms。\n\n```java\n\npublic class Main {\n\n    public static void main(String[] args) {\n   \t\t// write your code here\n        Main m = new Main();\n        long time = System.currentTimeMillis();\n        m.printN(10000);\n        System.out.println(\"time=\"+(System.currentTimeMillis()-time));\n        time = System.currentTimeMillis();\n        m.printNR(10000);\n        System.out.println(\"time=\"+(System.currentTimeMillis()-time));\n    }\n\n    private void printNR(int n) {\n        if(n\u003e0) {\n            printNR(n - 1);\n            System.out.println(n);\n        }\n    }\n\n    private void printN(int n){\n        for(int i= 1;i\u003c=n;i++){\n            System.out.println(i);\n        }\n    }\n}\n```\n\n用C测试：输出100000次，for循环耗时149ms，递归耗时148ms，100000次递归耗时150ms，100万次\n\n```C\n#include \u003cstdio.h\u003e\n#include \u003ctime.h\u003e\n\n\nvoid printN(int n);\nvoid printNC(int n);\n\nint main(){\n    clock_t startTime = clock();\n    printN(100000);\n    //double diff = ;\n    printf(\"%f seconds\\n\",difftime(clock(),startTime)/CLOCKS_PER_SEC);\n    \n    \n}\n\nvoid printN(int n){\n    for(int i=1;i\u003c=n;i++){\n        printf(\"%d\\n\",i);\n    }\n}\n\n\nvoid printNC(int n){\n    if(n){\n        printNC(n-1);\n        printf(\"%d\\n\",n);\n    }\n\n}\n\n```\n\n- 总结:\n\n1. ~~C语言程序运行效率至少在Java的10倍以上~~（C程序计时不准，需要重新测试）\n2. 递归的空间效率很差，容易堆栈溢出崩溃。\n3. Java环境递归耗时是for循环的1/2。\n4. C语言环境递归耗时和for循环差不多。\n\n## 实验2：计算多项式的值\n\n![多项式](/images/20180313_data_structure.png)\n\n```java\npublic class Test02 {\n\n    public static void main(String[] args) {\n        // write your code here\n        Test02 t = new Test02();\n        long time = System.currentTimeMillis();\n        for(int i=0;i\u003c100000;i++) {\n            t.f1(1.1);\n        }\n        System.out.println(\"time=\" + (System.currentTimeMillis() - time));\n        time = System.currentTimeMillis();\n        for(int i=0;i\u003c100000;i++) {\n            t.f2(1.1);\n        }\n        System.out.println(\"time=\" + (System.currentTimeMillis() - time));\n    }\n\n    private double f1(double x) {\n        double v = 1f;\n        for (int i = 1; i \u003c= 100; i++) {\n            v += Math.pow(x,i) / i;\n        }\n        return v;\n    }\n\n    //f(x) = 1+x(1/1+x(1/2+x(1/3+....x(1/100))))\n\n    private double f2(double x) {\n        double v = x/100;\n        int i = 100;\n        while (i\u003e1) {\n            v = x*(1f/(i-1)+v);\n            i--;\n        }\n        return v+1;\n    }\n}\n\n```\n\n- 总结：\n1. 循环10万次测试，方法1，耗时1016ms，方法2耗时16ms。约100倍的效率差距\n2. 计算时一定要注意，整形和浮点型`v = x*(1f/(i-1)+v);`\n3. 方法1，慢就慢在`pow`函数上\n4. 替换pow函数为计数循环`x *=x`耗时500ms，差距缩小至约20倍。\n\n## 作业1\n\n01-复杂度1 最大子列和问题（20 分）\n给定K个整数组成的序列{ N​1, N2, ..., NK}，“连续子列”被定义为{ N​i, Ni+1, ..., N​j}，其中 1≤i≤j≤K。\n“最大子列和”则被定义为所有连续子列元素的和中最大者。\n例如给定序列{ -2, 11, -4, 13, -5, -2 }，其连续子列{ 11, -4, 13 }有最大的和20。\n现要求你编写程序，计算给定整数序列的最大子列和。\n\n本题旨在测试各种不同的算法在各种数据情况下的表现。\n\n各组测试数据特点如下：\n\n 数据1：与样例等价，测试基本正确性；\n 数据2：102个随机整数；\n 数据3：103个随机整数；\n 数据4：104个随机整数；\n 数据5：105个随机整数；\n输入格式:\n\n 输入第1行给出正整数K (≤100000)；第2行给出K个整数，其间以空格分隔。\n\n输出格式:\n\n 在一行中输出最大子列和。如果序列中所有整数皆为负数，则输出0。\n\n输入样例:\n```\n 6\n -2 11 -4 13 -5 -2\n```\n输出样例:\n```\n 20\n```\n\n实现：\n\n```java\nimport java.util.Scanner;\n\n\npublic class Main{\n\n    public static void main(String args[]) {\n        Scanner scanner = new Scanner(System.in);\n        int k = scanner.nextInt();\n        int[] n = new int[k];\n        for (int i = 0; i \u003c k; i++) {\n            if (scanner.hasNext()) {\n                n[i] = scanner.nextInt();\n            }\n        }\n        System.out.println(maximumSubsequenceSum(n));\n    }\n\n    /**\n     * 在线处理算法，任意时刻给出的都是当前最大子数列和\n     * @param n\n     * @return\n     */\n    private static int maximumSubsequenceSum(int[] n) {\n        int thisMax = 0;\n        int maxSum = 0;\n        for (int i = 0; i \u003c n.length; i++) {\n            thisMax += n[i];\n\n            if (thisMax \u003c 0) {\n                thisMax = 0;\n            } else if (thisMax \u003e maxSum) {\n                maxSum = thisMax;\n            }\n        }\n        return maxSum;\n    }\n}\n```\n\n## 作业2\n\n01-复杂度2 Maximum Subsequence Sum（25 分）\nGiven a sequence of K integers { N1, N2, ..., NK}. A continuous subsequence is defined to be { Ni, Ni+1, ..., Nj } where 1≤i≤j≤K. The Maximum Subsequence is the continuous subsequence which has the largest sum of its elements. For example, given sequence { -2, 11, -4, 13, -5, -2 }, its maximum subsequence is { 11, -4, 13 } with the largest sum being 20.\n\nNow you are supposed to find the largest sum, together with the first and the last numbers of the maximum subsequence.\n\nInput Specification:\n\nEach input file contains one test case. Each case occupies two lines. The first line contains a positive integer K (≤10000). The second line contains K numbers, separated by a space.\n\nOutput Specification:\n\nFor each test case, output in one line the largest sum, together with the first and the last numbers of the maximum subsequence. The numbers must be separated by one space, but there must be no extra space at the end of a line. In case that the maximum subsequence is not unique, output the one with the smallest indices i and j (as shown by the sample case). If all the K numbers are negative, then its maximum sum is defined to be 0, and you are supposed to output the first and the last numbers of the whole sequence.\n\nSample Input:\n```\n10\n-10 1 2 3 4 -5 -23 3 7 -21\n```\nSample Output:\n```\n10 1 4\n```\n\n- 实现：\n\n```java\npublic class Main {\n    public static void main(String[] args) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n        String countString = null;\n        String numbersString =null;\n        try {\n            countString = reader.readLine();\n            numbersString = reader.readLine();\n        }catch (Exception ignored){\n\n        }\n        int[] n = new int[Integer.parseInt(countString)];\n        String[] numbersStringArray = numbersString.split(\" \");\n\n        for (int i = 0; i \u003c n.length; i++) {\n            n[i] = Integer.parseInt(numbersStringArray[i]);\n        }\n\n\n//        Scanner scanner = new Scanner(System.in);\n//        int k = scanner.nextInt();\n//        int[] n = new int[k];\n//\n//        for (int i = 0; i \u003c k; i++) {\n//            n[i] = scanner.nextInt();\n//        }\n\n        maximumSubsequenceSum(n);\n\n    }\n\n    /**\n     * 在线处理算法，任意时刻给出的都是当前最大子数列和\n     *\n     * @param n\n     * @return\n     */\n    private static void maximumSubsequenceSum(int[] n) {\n        int thisMax = 0;\n        int maxSum = 0;\n\n        int startI = 0;\n        int endI = n.length - 1;\n        int temp = 0;\n        boolean isMaxStart = true;\n        for (int i = 0; i \u003c n.length; i++) {\n            thisMax += n[i];\n\n            if (thisMax \u003c 0) {\n                thisMax = 0;\n                temp = 0;\n                isMaxStart = true;\n            } else {\n\n                if(isMaxStart){\n                    temp = i;\n                    isMaxStart = false;\n                }\n\n                if (thisMax \u003e maxSum) {\n\n                    maxSum = thisMax;\n                    endI = i;\n                    startI = temp;\n                }\n\n                if(maxSum==0){\n                    startI =temp;\n                    endI = i;\n                }\n            }\n        }\n\n\n        System.out.println(maxSum + \" \" + n[startI] + \" \" + n[endI]);\n    }\n}\n\n```\n\n- 总结\n\n1. 这题所有case要求在200ms内执行完毕，其中一个case比较大的N导致执行超时,调查发现Scanner这个东西贼慢...换成BufferReader就好了。\n\n## 作业3\n\n\n01-复杂度3 二分查找（20 分）\n本题要求实现二分查找算法。\n\n函数接口定义：\n\n`Position BinarySearch( List L, ElementType X );`\n其中List结构定义如下：\n```c\ntypedef int Position;\ntypedef struct LNode *List;\nstruct LNode {\n    ElementType Data[MAXSIZE];\n    Position Last; /* 保存线性表中最后一个元素的位置 */\n};\n```\nL是用户传入的一个线性表，其中ElementType元素可以通过\u003e、==、\u003c进行比较，并且题目保证传入的数据是递增有序的。函数BinarySearch要查找X在Data中的位置，即数组下标（注意：元素从下标1开始存储）。找到则返回下标，否则返回一个特殊的失败标记NotFound。\n\n裁判测试程序样例：\n```c\n#include \u003cstdio.h\u003e\n#include \u003cstdlib.h\u003e\n\n#define MAXSIZE 10\n#define NotFound 0\ntypedef int ElementType;\n\ntypedef int Position;\ntypedef struct LNode *List;\nstruct LNode {\n    ElementType Data[MAXSIZE];\n    Position Last; /* 保存线性表中最后一个元素的位置 */\n};\n\nList ReadInput(); /* 裁判实现，细节不表。元素从下标1开始存储 */\nPosition BinarySearch( List L, ElementType X );\n\nint main()\n{\n    List L;\n    ElementType X;\n    Position P;\n\n    L = ReadInput();\n    scanf(\"%d\", \u0026X);\n    P = BinarySearch( L, X );\n    printf(\"%d\\n\", P);\n\n    return 0;\n}\n\n/* 你的代码将被嵌在这里 */\n```\n输入样例1：\n```\n5\n12 31 55 89 101\n31\n```\n输出样例1：\n```\n2\n```\n输入样例2：\n```\n3\n26 78 233\n31\n```\n输出样例2：\n```\n0\n```\n\n\n- 实现：\n\n\n\n","data":{"title":"数据结构与算法学习笔记01","date":"2018-03-14","tags":["C"],"category":"Computer Science"},"isEmpty":false,"excerpt":"\n![浙江大学](https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg)\n\n\u003e 程序=数据结构+算法。\n\n浙江大学数据结构是国家精品课程，于2018年3月开学，2018年6月学期结束。\n\n"},{"id":"opencv","file":"opencv.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180308_OpenCV.png\" alt=\"OpenCV\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eOpenCV是一个开源的计算机视觉库，广泛应用于各种图像处理，人脸识别，图像分析，自动驾驶等领域。目前最新版是3.4.1，本文基于最新版编写。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003eOpenCV使用C++编写，采用了模块化的结构，本文将逐个介绍每个模块的主要功能，并将介绍如何使用Java调用OpenCV库。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180308_OpenCV.png\" alt=\"OpenCV\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eOpenCV是一个开源的计算机视觉库，广泛应用于各种图像处理，人脸识别，图像分析，自动驾驶等领域。目前最新版是3.4.1，本文基于最新版编写。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003eOpenCV使用C++编写，采用了模块化的结构，本文将逐个介绍每个模块的主要功能，并将介绍如何使用Java调用OpenCV库。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1.模块\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eCore functionality\u003c/strong\u003e：\u003cstrong\u003e核心功能\u003c/strong\u003e,定义了一些其它模块需要使用的基本功能，以及包括多维数组\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMat\u003c/code\u003e在内的众多数据结构。OpenCV的图像处理主要就是针对\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMat\u003c/code\u003e对象。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eImage processing\u003c/strong\u003e：\u003cstrong\u003e图像处理\u003c/strong\u003e,包括线性和非线性图像滤波，几何图像转换（调整大小，仿射和透视变形，通用基于表格的重新映射），色彩空间转换，直方图等。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eimgcodecs\u003c/strong\u003e：\u003cstrong\u003e图片读写\u003c/strong\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003ecalib3d\u003c/strong\u003e：\u003cstrong\u003e3D处理\u003c/strong\u003e,基本多视图几何算法，单个和立体相机校准，对象姿态估计，立体对应算法以及三维重建元素。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003efeatures2d\u003c/strong\u003e：\u003cstrong\u003e特征点处理\u003c/strong\u003e,显着特征检测器，描述符和描述符匹配器。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eobjdetect\u003c/strong\u003e：\u003cstrong\u003e物体检测\u003c/strong\u003e,物体检测和预定义的类别（例如，脸部，眼睛，杯子，人物，汽车等）。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003ehighgui\u003c/strong\u003e：\u003cstrong\u003eUI\u003c/strong\u003e,一个简单易用的UI接口。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eVideo I/O\u003c/strong\u003e：\u003cstrong\u003e视频IO\u003c/strong\u003e,一个简单易用的视频捕捉和视频编解码器接口。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003egpu\u003c/strong\u003e：\u003cstrong\u003eGPU加速\u003c/strong\u003e,不同OpenCV模块的GPU加速算法。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003ednn\u003c/strong\u003e：\u003cstrong\u003e深度神经网络\u003c/strong\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eml\u003c/strong\u003e：\u003cstrong\u003e机器学习\u003c/strong\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eflann\u003c/strong\u003e：\u003cstrong\u003e多维聚类和搜索\u003c/strong\u003e。包含大数据集中的快速最近邻搜索和高维特征而优化的算法集合。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003ephoto\u003c/strong\u003e：\u003cstrong\u003e照片处理\u003c/strong\u003e，降噪，HDR，无缝克隆，细节增强等。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003estitching\u003c/strong\u003e：\u003cstrong\u003e图像拼接\u003c/strong\u003e，降噪，HDR，无缝克隆，细节增强等。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eshape\u003c/strong\u003e：\u003cstrong\u003e形状\u003c/strong\u003e，形状距离和匹配。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003esuperres\u003c/strong\u003e：\u003cstrong\u003e超分辨率\u003c/strong\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003evideostab\u003c/strong\u003e：\u003cstrong\u003e视频防抖\u003c/strong\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eviz\u003c/strong\u003e：\u003cstrong\u003e3D虚拟化\u003c/strong\u003e。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e还有一些其它扩展模块。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e2.配置Java开发环境\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e下载Windows版OpenCV\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e解压后在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ebuild\u003c/code\u003e文件夹中找到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ejava\u003c/code\u003e文件夹，复制到Java工程的libs文件夹里\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e对\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eopencv-341.jar\u003c/code\u003e添加依赖\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eVM option 添加本地库配置：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e-Djava.library.path=./libs/x64\u003c/code\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e3.Hello OpenCV\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\nMat mat = Imgcodecs.imread(file.getAbsolutePath());\nImgproc.cvtColor(mat, mat, Imgproc.COLOR_BGR2GRAY);\nImgproc.Canny(mat, mat, 5, 20);\nImage img = Utils.mat2Image(mat);\ncontroller.setImage(img);\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e运行结果如图：\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180309_opencv_test.png\" alt=\"OpenCV\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","content":"\n![OpenCV](/images/20180308_OpenCV.png)\n\n\u003e OpenCV是一个开源的计算机视觉库，广泛应用于各种图像处理，人脸识别，图像分析，自动驾驶等领域。目前最新版是3.4.1，本文基于最新版编写。\n\n\nOpenCV使用C++编写，采用了模块化的结构，本文将逐个介绍每个模块的主要功能，并将介绍如何使用Java调用OpenCV库。\n\n\u003c!--more--\u003e\n\n## 1.模块\n\n\n- **Core functionality**：**核心功能**,定义了一些其它模块需要使用的基本功能，以及包括多维数组`Mat`在内的众多数据结构。OpenCV的图像处理主要就是针对`Mat`对象。\n- **Image processing**：**图像处理**,包括线性和非线性图像滤波，几何图像转换（调整大小，仿射和透视变形，通用基于表格的重新映射），色彩空间转换，直方图等。\n- **imgcodecs**：**图片读写**。\n- **calib3d**：**3D处理**,基本多视图几何算法，单个和立体相机校准，对象姿态估计，立体对应算法以及三维重建元素。\n- **features2d**：**特征点处理**,显着特征检测器，描述符和描述符匹配器。\n- **objdetect**：**物体检测**,物体检测和预定义的类别（例如，脸部，眼睛，杯子，人物，汽车等）。\n- **highgui**：**UI**,一个简单易用的UI接口。\n- **Video I/O**：**视频IO**,一个简单易用的视频捕捉和视频编解码器接口。\n- **gpu**：**GPU加速**,不同OpenCV模块的GPU加速算法。\n- **dnn**：**深度神经网络**。\n- **ml**：**机器学习**。\n- **flann**：**多维聚类和搜索**。包含大数据集中的快速最近邻搜索和高维特征而优化的算法集合。\n- **photo**：**照片处理**，降噪，HDR，无缝克隆，细节增强等。\n- **stitching**：**图像拼接**，降噪，HDR，无缝克隆，细节增强等。\n- **shape**：**形状**，形状距离和匹配。\n- **superres**：**超分辨率**。\n- **videostab**：**视频防抖**。\n- **viz**：**3D虚拟化**。\n\n还有一些其它扩展模块。\n\n## 2.配置Java开发环境\n\n1. 下载Windows版OpenCV\n2. 解压后在`build`文件夹中找到`java`文件夹，复制到Java工程的libs文件夹里\n3. 对`opencv-341.jar`添加依赖\n4. VM option 添加本地库配置：`-Djava.library.path=./libs/x64`\n\n\n## 3.Hello OpenCV\n\n```java\n\nMat mat = Imgcodecs.imread(file.getAbsolutePath());\nImgproc.cvtColor(mat, mat, Imgproc.COLOR_BGR2GRAY);\nImgproc.Canny(mat, mat, 5, 20);\nImage img = Utils.mat2Image(mat);\ncontroller.setImage(img);\n```\n\n运行结果如图：\n\n\n![OpenCV](/images/20180309_opencv_test.png)","data":{"title":"OpenCV入门","date":"2018-03-08","tags":["OpenCV","Java"],"category":"AI"},"isEmpty":false,"excerpt":"\n![OpenCV](/images/20180308_OpenCV.png)\n\n\u003e OpenCV是一个开源的计算机视觉库，广泛应用于各种图像处理，人脸识别，图像分析，自动驾驶等领域。目前最新版是3.4.1，本文基于最新版编写。\n\n\nOpenCV使用C++编写，采用了模块化的结构，本文将逐个介绍每个模块的主要功能，并将介绍如何使用Java调用OpenCV库。\n\n"},{"id":"clipboard-react","file":"clipboard-react.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将用React实现一个跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e通常我们会遇到将手机上的文字发送到电脑上，或者反过来，或者是记录一些网址，你懂得。这时我们会用到一些云笔记之类的产品，或者干脆使用微信或QQ，它们都太重了，用起来没那么方便，还要登录注册啥的。我们使用React来开发一款手机和电脑上都能访问，并且无需注册登录的云便签应用。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将用React实现一个跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e通常我们会遇到将手机上的文字发送到电脑上，或者反过来，或者是记录一些网址，你懂得。这时我们会用到一些云笔记之类的产品，或者干脆使用微信或QQ，它们都太重了，用起来没那么方便，还要登录注册啥的。我们使用React来开发一款手机和电脑上都能访问，并且无需注册登录的云便签应用。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1.使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecreate-react-app\u003c/code\u003e创建工程\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpm install -g create-react-app\ncreate-react-app my-app\n\ncd my-app\nnpm start\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e2.编写模版\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003erender() {\n        return (\n            \u0026#x3C;div\u003e\n                \u0026#x3C;Header/\u003e\n                \u0026#x3C;div className=\"Clipboard container\"\u003e\n                    \u0026#x3C;input placeholder=\"查询码\"\n                           type=\"number\"\n                           className=\"input-query-number form-control form-group\"\n                           value={this.state.queryNumber \u003e 0 ? this.state.queryNumber : ''}\n                           disabled={this.state.isShowResult}\n                           onChange={this.handleNumberChange}/\u003e\n                    {this.state.isShowResult ? null : \u0026#x3C;button onClick={this.handleQuery}\n                                                              className=\"btn-query btn btn-primary form-control form-group\"\u003e查询\u0026#x3C;/button\u003e}\n\n                    {this.state.isShowResult ? null :\n                        \u0026#x3C;button onClick={this.handleNew}\n                                className=\"btn-new btn btn-primary form-control form-group\"\u003e新建\u0026#x3C;/button\u003e}\n\n                    {this.state.isShowResult ? \u0026#x3C;textarea onChange={this.handleTextChange} value={this.state.text}\n                                                         className=\"textarea-text form-control form-group\"/\u003e : null}\n\n                    {this.state.isShowResult ? \u0026#x3C;button onClick={this.handleSave}\n                                                       className=\"btn-save btn btn-success form-control  form-group\"\u003e保存\u0026#x3C;/button\u003e : null}\n                \u0026#x3C;/div\u003e\n            \u0026#x3C;/div\u003e\n        );\n    }\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul clas
