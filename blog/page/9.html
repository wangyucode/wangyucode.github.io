-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"opencv","file":"opencv.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180308_OpenCV.png\" alt=\"OpenCV\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eOpenCV是一个开源的计算机视觉库，广泛应用于各种图像处理，人脸识别，图像分析，自动驾驶等领域。目前最新版是3.4.1，本文基于最新版编写。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003eOpenCV使用C++编写，采用了模块化的结构，本文将逐个介绍每个模块的主要功能，并将介绍如何使用Java调用OpenCV库。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180308_OpenCV.png\" alt=\"OpenCV\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eOpenCV是一个开源的计算机视觉库，广泛应用于各种图像处理，人脸识别，图像分析，自动驾驶等领域。目前最新版是3.4.1，本文基于最新版编写。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003eOpenCV使用C++编写，采用了模块化的结构，本文将逐个介绍每个模块的主要功能，并将介绍如何使用Java调用OpenCV库。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1.模块\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eCore functionality\u003c/strong\u003e：\u003cstrong\u003e核心功能\u003c/strong\u003e,定义了一些其它模块需要使用的基本功能，以及包括多维数组\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMat\u003c/code\u003e在内的众多数据结构。OpenCV的图像处理主要就是针对\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMat\u003c/code\u003e对象。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eImage processing\u003c/strong\u003e：\u003cstrong\u003e图像处理\u003c/strong\u003e,包括线性和非线性图像滤波，几何图像转换（调整大小，仿射和透视变形，通用基于表格的重新映射），色彩空间转换，直方图等。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eimgcodecs\u003c/strong\u003e：\u003cstrong\u003e图片读写\u003c/strong\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003ecalib3d\u003c/strong\u003e：\u003cstrong\u003e3D处理\u003c/strong\u003e,基本多视图几何算法，单个和立体相机校准，对象姿态估计，立体对应算法以及三维重建元素。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003efeatures2d\u003c/strong\u003e：\u003cstrong\u003e特征点处理\u003c/strong\u003e,显着特征检测器，描述符和描述符匹配器。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eobjdetect\u003c/strong\u003e：\u003cstrong\u003e物体检测\u003c/strong\u003e,物体检测和预定义的类别（例如，脸部，眼睛，杯子，人物，汽车等）。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003ehighgui\u003c/strong\u003e：\u003cstrong\u003eUI\u003c/strong\u003e,一个简单易用的UI接口。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eVideo I/O\u003c/strong\u003e：\u003cstrong\u003e视频IO\u003c/strong\u003e,一个简单易用的视频捕捉和视频编解码器接口。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003egpu\u003c/strong\u003e：\u003cstrong\u003eGPU加速\u003c/strong\u003e,不同OpenCV模块的GPU加速算法。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003ednn\u003c/strong\u003e：\u003cstrong\u003e深度神经网络\u003c/strong\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eml\u003c/strong\u003e：\u003cstrong\u003e机器学习\u003c/strong\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eflann\u003c/strong\u003e：\u003cstrong\u003e多维聚类和搜索\u003c/strong\u003e。包含大数据集中的快速最近邻搜索和高维特征而优化的算法集合。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003ephoto\u003c/strong\u003e：\u003cstrong\u003e照片处理\u003c/strong\u003e，降噪，HDR，无缝克隆，细节增强等。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003estitching\u003c/strong\u003e：\u003cstrong\u003e图像拼接\u003c/strong\u003e，降噪，HDR，无缝克隆，细节增强等。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eshape\u003c/strong\u003e：\u003cstrong\u003e形状\u003c/strong\u003e，形状距离和匹配。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003esuperres\u003c/strong\u003e：\u003cstrong\u003e超分辨率\u003c/strong\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003evideostab\u003c/strong\u003e：\u003cstrong\u003e视频防抖\u003c/strong\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eviz\u003c/strong\u003e：\u003cstrong\u003e3D虚拟化\u003c/strong\u003e。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e还有一些其它扩展模块。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e2.配置Java开发环境\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e下载Windows版OpenCV\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e解压后在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ebuild\u003c/code\u003e文件夹中找到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ejava\u003c/code\u003e文件夹，复制到Java工程的libs文件夹里\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e对\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eopencv-341.jar\u003c/code\u003e添加依赖\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eVM option 添加本地库配置：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e-Djava.library.path=./libs/x64\u003c/code\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e3.Hello OpenCV\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\nMat mat = Imgcodecs.imread(file.getAbsolutePath());\nImgproc.cvtColor(mat, mat, Imgproc.COLOR_BGR2GRAY);\nImgproc.Canny(mat, mat, 5, 20);\nImage img = Utils.mat2Image(mat);\ncontroller.setImage(img);\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e运行结果如图：\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180309_opencv_test.png\" alt=\"OpenCV\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","content":"\n![OpenCV](/images/20180308_OpenCV.png)\n\n\u003e OpenCV是一个开源的计算机视觉库，广泛应用于各种图像处理，人脸识别，图像分析，自动驾驶等领域。目前最新版是3.4.1，本文基于最新版编写。\n\n\nOpenCV使用C++编写，采用了模块化的结构，本文将逐个介绍每个模块的主要功能，并将介绍如何使用Java调用OpenCV库。\n\n\u003c!--more--\u003e\n\n## 1.模块\n\n\n- **Core functionality**：**核心功能**,定义了一些其它模块需要使用的基本功能，以及包括多维数组`Mat`在内的众多数据结构。OpenCV的图像处理主要就是针对`Mat`对象。\n- **Image processing**：**图像处理**,包括线性和非线性图像滤波，几何图像转换（调整大小，仿射和透视变形，通用基于表格的重新映射），色彩空间转换，直方图等。\n- **imgcodecs**：**图片读写**。\n- **calib3d**：**3D处理**,基本多视图几何算法，单个和立体相机校准，对象姿态估计，立体对应算法以及三维重建元素。\n- **features2d**：**特征点处理**,显着特征检测器，描述符和描述符匹配器。\n- **objdetect**：**物体检测**,物体检测和预定义的类别（例如，脸部，眼睛，杯子，人物，汽车等）。\n- **highgui**：**UI**,一个简单易用的UI接口。\n- **Video I/O**：**视频IO**,一个简单易用的视频捕捉和视频编解码器接口。\n- **gpu**：**GPU加速**,不同OpenCV模块的GPU加速算法。\n- **dnn**：**深度神经网络**。\n- **ml**：**机器学习**。\n- **flann**：**多维聚类和搜索**。包含大数据集中的快速最近邻搜索和高维特征而优化的算法集合。\n- **photo**：**照片处理**，降噪，HDR，无缝克隆，细节增强等。\n- **stitching**：**图像拼接**，降噪，HDR，无缝克隆，细节增强等。\n- **shape**：**形状**，形状距离和匹配。\n- **superres**：**超分辨率**。\n- **videostab**：**视频防抖**。\n- **viz**：**3D虚拟化**。\n\n还有一些其它扩展模块。\n\n## 2.配置Java开发环境\n\n1. 下载Windows版OpenCV\n2. 解压后在`build`文件夹中找到`java`文件夹，复制到Java工程的libs文件夹里\n3. 对`opencv-341.jar`添加依赖\n4. VM option 添加本地库配置：`-Djava.library.path=./libs/x64`\n\n\n## 3.Hello OpenCV\n\n```java\n\nMat mat = Imgcodecs.imread(file.getAbsolutePath());\nImgproc.cvtColor(mat, mat, Imgproc.COLOR_BGR2GRAY);\nImgproc.Canny(mat, mat, 5, 20);\nImage img = Utils.mat2Image(mat);\ncontroller.setImage(img);\n```\n\n运行结果如图：\n\n\n![OpenCV](/images/20180309_opencv_test.png)","data":{"title":"OpenCV入门","date":"2018-03-08","tags":["OpenCV","Java"],"category":"AI"},"isEmpty":false,"excerpt":"\n![OpenCV](/images/20180308_OpenCV.png)\n\n\u003e OpenCV是一个开源的计算机视觉库，广泛应用于各种图像处理，人脸识别，图像分析，自动驾驶等领域。目前最新版是3.4.1，本文基于最新版编写。\n\n\nOpenCV使用C++编写，采用了模块化的结构，本文将逐个介绍每个模块的主要功能，并将介绍如何使用Java调用OpenCV库。\n\n"},{"id":"clipboard-react","file":"clipboard-react.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将用React实现一个跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e通常我们会遇到将手机上的文字发送到电脑上，或者反过来，或者是记录一些网址，你懂得。这时我们会用到一些云笔记之类的产品，或者干脆使用微信或QQ，它们都太重了，用起来没那么方便，还要登录注册啥的。我们使用React来开发一款手机和电脑上都能访问，并且无需注册登录的云便签应用。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将用React实现一个跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e通常我们会遇到将手机上的文字发送到电脑上，或者反过来，或者是记录一些网址，你懂得。这时我们会用到一些云笔记之类的产品，或者干脆使用微信或QQ，它们都太重了，用起来没那么方便，还要登录注册啥的。我们使用React来开发一款手机和电脑上都能访问，并且无需注册登录的云便签应用。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1.使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecreate-react-app\u003c/code\u003e创建工程\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpm install -g create-react-app\ncreate-react-app my-app\n\ncd my-app\nnpm start\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e2.编写模版\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003erender() {\n        return (\n            \u0026#x3C;div\u003e\n                \u0026#x3C;Header/\u003e\n                \u0026#x3C;div className=\"Clipboard container\"\u003e\n                    \u0026#x3C;input placeholder=\"查询码\"\n                           type=\"number\"\n                           className=\"input-query-number form-control form-group\"\n                           value={this.state.queryNumber \u003e 0 ? this.state.queryNumber : ''}\n                           disabled={this.state.isShowResult}\n                           onChange={this.handleNumberChange}/\u003e\n                    {this.state.isShowResult ? null : \u0026#x3C;button onClick={this.handleQuery}\n                                                              className=\"btn-query btn btn-primary form-control form-group\"\u003e查询\u0026#x3C;/button\u003e}\n\n                    {this.state.isShowResult ? null :\n                        \u0026#x3C;button onClick={this.handleNew}\n                                className=\"btn-new btn btn-primary form-control form-group\"\u003e新建\u0026#x3C;/button\u003e}\n\n                    {this.state.isShowResult ? \u0026#x3C;textarea onChange={this.handleTextChange} value={this.state.text}\n                                                         className=\"textarea-text form-control form-group\"/\u003e : null}\n\n                    {this.state.isShowResult ? \u0026#x3C;button onClick={this.handleSave}\n                                                       className=\"btn-save btn btn-success form-control  form-group\"\u003e保存\u0026#x3C;/button\u003e : null}\n                \u0026#x3C;/div\u003e\n            \u0026#x3C;/div\u003e\n        );\n    }\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003erender()\u003c/code\u003e返回的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJSX\u003c/code\u003e只能有一个组件，当需要多个组件时，需要用一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ediv\u003c/code\u003e包起来；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里通过state的自定义属性\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eisShowResult\u003c/code\u003e实现对控件的隐藏和显示；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e界面使用Bootstrap框架做移动端适配\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eonClick={this.handleSave}\u003c/code\u003e,\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eonChange={this.handleTextChange}\u003c/code\u003e等属性绑定函数，构造函数里还要写\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis.handleBack = this.handleBack.bind(this);\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e3.构造方法\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-JavaScript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003econstructor(props) {\n        super(props);\n        this.state = {\n            queryNumber: -1,\n            isShowResult: false,\n            text: ''\n        };\n\n        this.handleNumberChange = this.handleNumberChange.bind(this);\n        this.handleTextChange = this.handleTextChange.bind(this);\n        this.handleQuery = this.handleQuery.bind(this);\n        this.handleNew = this.handleNew.bind(this);\n        this.handleSave = this.handleSave.bind(this);\n        this.handleBack = this.handleBack.bind(this);\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estate\u003c/code\u003e中维护了页面状态，这里只需要3个参数：查询码，是否显示查询结果，剪切板文字\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e4.逻辑\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-JavaScript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e handleNumberChange(event) {\n        this.setState({queryNumber: event.target.value});\n    }\n\n    handleTextChange(event) {\n        this.setState({text: event.target.value});\n    }\n\n    handleBack(event){\n        this.setState({isShowResult: false});\n    }\n\n    handleQuery(event) {\n        if(this.state.queryNumber\u0026#x3C;=0){\n            alert('查询码不正确！');\n            return\n        }\n        let data = {\n            params: {\n                id: this.state.queryNumber\n            }\n        };\n        axios.get('https://wycode.cn/web/api/public/clipboard/query',data)\n            .then((response) =\u003e{\n                if(response.status!==200||response.data.data==null){\n                    throw '查询码不正确！'\n                }\n                this.setState({\n                    isShowResult: true,\n                    queryNumber: response.data.data.id,\n                    text: response.data.data.content\n                })\n            })\n            .catch((error) =\u003e alert(error));\n    }\n\n    handleNew(event) {\n        axios.post('https://wycode.cn/web/api/public/clipboard/create')\n            .then((response) =\u003e this.setState({\n                isShowResult: true,\n                queryNumber: response.data.data.id,\n                text: response.data.data.content\n            }))\n            .catch((error) =\u003e alert(error));\n    }\n\n    handleSave(event) {\n        let data = new FormData();\n        data.append('id',this.state.queryNumber);\n        data.append('content',this.state.text);\n        axios.post('https://wycode.cn/web/api/public/clipboard/save',data)\n            .then((response) =\u003e this.setState({\n                isShowResult: false,\n                queryNumber: response.data.data.id,\n                text: response.data.data.content\n            }))\n            .catch((error) =\u003e alert(error));\n    }\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis.setState({});\u003c/code\u003e更改页面状态\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAxios\u003c/code\u003e做网络请求。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAxios\u003c/code\u003e是一个js网络请求库。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e在网络请求返回函数里 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis\u003c/code\u003e做作用域是当前对象，会发生错误，使用箭头符=\u003e，即lambda表达式就没有问题。或者在外部创建一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis\u003c/code\u003e的引用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elet that = this;\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e至此大功告成！访问 \u003ca href=\"https://wycode.cn/clipboard/\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://wycode.cn/clipboard/\u003c/a\u003e 查看示例\n访问 \u003ca href=\"https://github.com/wangyucode/React-Learning\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/React-Learning\u003c/a\u003e 查看完整源码\u003c/p\u003e\n","content":"\n![React](/images/20180213_react.png)\n\n\u003e 这篇文章我们将用React实现一个跨平台剪切板。\n\n\n通常我们会遇到将手机上的文字发送到电脑上，或者反过来，或者是记录一些网址，你懂得。这时我们会用到一些云笔记之类的产品，或者干脆使用微信或QQ，它们都太重了，用起来没那么方便，还要登录注册啥的。我们使用React来开发一款手机和电脑上都能访问，并且无需注册登录的云便签应用。\n\n\u003c!--more--\u003e\n\n## 1.使用`create-react-app`创建工程\n\n```bash\nnpm install -g create-react-app\ncreate-react-app my-app\n\ncd my-app\nnpm start\n```\n\n## 2.编写模版\n\n```html\nrender() {\n        return (\n            \u003cdiv\u003e\n                \u003cHeader/\u003e\n                \u003cdiv className=\"Clipboard container\"\u003e\n                    \u003cinput placeholder=\"查询码\"\n                           type=\"number\"\n                           className=\"input-query-number form-control form-group\"\n                           value={this.state.queryNumber \u003e 0 ? this.state.queryNumber : ''}\n                           disabled={this.state.isShowResult}\n                           onChange={this.handleNumberChange}/\u003e\n                    {this.state.isShowResult ? null : \u003cbutton onClick={this.handleQuery}\n                                                              className=\"btn-query btn btn-primary form-control form-group\"\u003e查询\u003c/button\u003e}\n\n                    {this.state.isShowResult ? null :\n                        \u003cbutton onClick={this.handleNew}\n                                className=\"btn-new btn btn-primary form-control form-group\"\u003e新建\u003c/button\u003e}\n\n                    {this.state.isShowResult ? \u003ctextarea onChange={this.handleTextChange} value={this.state.text}\n                                                         className=\"textarea-text form-control form-group\"/\u003e : null}\n\n                    {this.state.isShowResult ? \u003cbutton onClick={this.handleSave}\n                                                       className=\"btn-save btn btn-success form-control  form-group\"\u003e保存\u003c/button\u003e : null}\n                \u003c/div\u003e\n            \u003c/div\u003e\n        );\n    }\n\n```\n\n- `render()`返回的`JSX`只能有一个组件，当需要多个组件时，需要用一个`div`包起来；\n- 这里通过state的自定义属性`isShowResult`实现对控件的隐藏和显示；\n- 界面使用Bootstrap框架做移动端适配\n- 通过`onClick={this.handleSave}`,`onChange={this.handleTextChange}`等属性绑定函数，构造函数里还要写`this.handleBack = this.handleBack.bind(this);`\n\n## 3.构造方法\n\n```JavaScript\nconstructor(props) {\n        super(props);\n        this.state = {\n            queryNumber: -1,\n            isShowResult: false,\n            text: ''\n        };\n\n        this.handleNumberChange = this.handleNumberChange.bind(this);\n        this.handleTextChange = this.handleTextChange.bind(this);\n        this.handleQuery = this.handleQuery.bind(this);\n        this.handleNew = this.handleNew.bind(this);\n        this.handleSave = this.handleSave.bind(this);\n        this.handleBack = this.handleBack.bind(this);\n    }\n```\n\n- `state`中维护了页面状态，这里只需要3个参数：查询码，是否显示查询结果，剪切板文字\n\n## 4.逻辑\n\n```JavaScript\n handleNumberChange(event) {\n        this.setState({queryNumber: event.target.value});\n    }\n\n    handleTextChange(event) {\n        this.setState({text: event.target.value});\n    }\n\n    handleBack(event){\n        this.setState({isShowResult: false});\n    }\n\n    handleQuery(event) {\n        if(this.state.queryNumber\u003c=0){\n            alert('查询码不正确！');\n            return\n        }\n        let data = {\n            params: {\n                id: this.state.queryNumber\n            }\n        };\n        axios.get('https://wycode.cn/web/api/public/clipboard/query',data)\n            .then((response) =\u003e{\n                if(response.status!==200||response.data.data==null){\n                    throw '查询码不正确！'\n                }\n                this.setState({\n                    isShowResult: true,\n                    queryNumber: response.data.data.id,\n                    text: response.data.data.content\n                })\n            })\n            .catch((error) =\u003e alert(error));\n    }\n\n    handleNew(event) {\n        axios.post('https://wycode.cn/web/api/public/clipboard/create')\n            .then((response) =\u003e this.setState({\n                isShowResult: true,\n                queryNumber: response.data.data.id,\n                text: response.data.data.content\n            }))\n            .catch((error) =\u003e alert(error));\n    }\n\n    handleSave(event) {\n        let data = new FormData();\n        data.append('id',this.state.queryNumber);\n        data.append('content',this.state.text);\n        axios.post('https://wycode.cn/web/api/public/clipboard/save',data)\n            .then((response) =\u003e this.setState({\n                isShowResult: false,\n                queryNumber: response.data.data.id,\n                text: response.data.data.content\n            }))\n            .catch((error) =\u003e alert(error));\n    }\n\n```\n\n- 使用`this.setState({});`更改页面状态\n- 这里使用`Axios`做网络请求。`Axios`是一个js网络请求库。\n- 在网络请求返回函数里 `this`做作用域是当前对象，会发生错误，使用箭头符=\u003e，即lambda表达式就没有问题。或者在外部创建一个`this`的引用`let that = this;`\n\n\n至此大功告成！访问 https://wycode.cn/clipboard/ 查看示例\n访问 https://github.com/wangyucode/React-Learning 查看完整源码","data":{"title":"用React做一个跨平台剪切板","date":"2018-02-13","tags":["React","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![React](/images/20180213_react.png)\n\n\u003e 这篇文章我们将用React实现一个跨平台剪切板。\n\n\n通常我们会遇到将手机上的文字发送到电脑上，或者反过来，或者是记录一些网址，你懂得。这时我们会用到一些云笔记之类的产品，或者干脆使用微信或QQ，它们都太重了，用起来没那么方便，还要登录注册啥的。我们使用React来开发一款手机和电脑上都能访问，并且无需注册登录的云便签应用。\n\n"},{"id":"clipboard-wechatapp","file":"clipboard-wechatapp.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_clipboard.jpg\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将开发一个微信小程序版的跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e书接上文，我们已经用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_clipboard.jpg\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将开发一个微信小程序版的跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e书接上文，我们已经用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1.app.json\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\n{\n  \"pages\": [\n    \"pages/index/index\"\n  ],\n  \"window\": {\n    \"backgroundTextStyle\": \"light\",\n    \"navigationBarBackgroundColor\": \"#379392\",\n    \"navigationBarTitleText\": \"跨平台剪切板\",\n    \"navigationBarTextStyle\": \"white\"\n  },\n  \"debug\": true\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapp.json\u003c/code\u003e中描述了小程序相关的全局配置信息，所有的页面需要配置在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epage\u003c/code\u003e属性中。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里还能配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etabbar\u003c/code\u003e，为了跨平台剪切板的简洁，我去掉了tab，把它做成了一个单页面的极简APP\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e2.模板\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\n\u0026#x3C;!--index.wxml--\u003e\n\u0026#x3C;view class=\"container\"\u003e\n  \u0026#x3C;input type='number' placeholder=\"查询码\" value='{{queryNumber\u003e0?queryNumber:\"\"}}' bindinput='bindInput' disabled='{{isShowResult}}'\u003e\u0026#x3C;/input\u003e\n  \u0026#x3C;button type='primary' wx:if=\"{{!isShowResult}}\" bindtap='query'\u003e查询\u0026#x3C;/button\u003e\n  \u0026#x3C;button wx:if=\"{{!isShowResult}}\" bindtap='create'\u003e新建\u0026#x3C;/button\u003e\n  \u0026#x3C;textarea wx:if='{{isShowResult}}' value='{{text}}' bindinput='bindInputText'\u003e\u0026#x3C;/textarea\u003e\n  \u0026#x3C;button type= 'primary' wx:if = \"{{isShowResult}}\" bindtap='save'\u003e保存\u0026#x3C;/button\u003e\n  \u0026#x3C;button wx:if = \"{{isShowResult}}\" bindtap='back'\u003e返回\u0026#x3C;/button\u003e\n\u0026#x3C;/view\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.wxml\u003c/code\u003e后缀的是小程序的布局（模板）文件。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e属性没什么好解释的，看一下就懂了。参考React版的教程就知道每个属性的详细用途。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e3.样式表\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-css px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e/**index.wxss**/\n\ninput {\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n}\n\nbutton {\n  margin-top: 24rpx;\n  width: 100%;\n}\n\ntextarea{\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n  margin-top: 24rpx;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e就是传统的CSS层叠样式表\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里rpx是dpi无关的单位，保证不同分辨率的相同观感\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e4.逻辑\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e//index.js\n//获取应用实例\nconst app = getApp()\n\nPage({\n  data: {\n    queryNumber: -1,\n    isShowResult: false,\n    text: ''\n  },\n\n  onLoad: function () {\n\n  },\n\n  bindInput: function (e) {\n    this.setData({\n      queryNumber: e.detail.value\n    })\n  },\n\n  bindInputText: function (e) {\n    this.setData({\n      text: e.detail.value\n    })\n  },\n\n  query: function () {\n    if (this.data.queryNumber \u0026#x3C;= 0) {\n      wx.showToast({\n        title: '查询码不正确！',\n        icon: 'none'\n      });\n      return\n    }\n\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/query',\n      data: { 'id': this.data.queryNumber },\n      success: function (res) {\n        if (!res.data.success || res.data.data == null) {\n          wx.showToast({\n            title: '查询码不正确！',\n            icon: 'none'\n          });\n        } else {\n          that.setData({\n            isShowResult: true,\n            queryNumber: res.data.data.id,\n            text: res.data.data.content\n          });\n        }\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n\n  },\n\n  create: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/create',\n      method: 'POST',\n      success: function (res) {\n\n        that.setData({\n          isShowResult: true,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n  },\n\n  save: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/save',\n      method: 'POST',\n      data:{\n        id: that.data.queryNumber,\n        content: that.data.text\n      },\n      header: {\n        'content-type': 'application/x-www-form-urlencoded'\n      },\n      success: function (res) {\n\n        that.setData({\n          isShowResult: false,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n        wx.showToast({\n          title: '保存成功！',\n          icon: 'success'\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete: function () {\n        wx.hideLoading();\n      }\n    });\n  },\n\n  back: function () {\n    this.setData({\n      isShowResult: false\n    })\n  }\n\n})\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e小程序的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edata\u003c/code\u003e，就是React的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estate\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e小程序通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis.setData()\u003c/code\u003e刷新页面状态，如同React的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis.setState()\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.request()\u003c/code\u003e做http请求\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.showToast()\u003c/code\u003e显示一个提示\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.showLoading()\u003c/code\u003e显示Loading\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里发现一个小程序的bug，在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.hideLoading()\u003c/code\u003e会将Toast也消失掉。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e至此大功告成！打开微信扫一扫文章开头的小程序码即可使用。\n访问 \u003ca href=\"https://github.com/wangyucode/Clipboard\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/Clipboard\u003c/a\u003e 查看完整源码\u003c/p\u003e\n","content":"\n![React](/images/20180213_clipboard.jpg)\n\n\u003e 这篇文章我们将开发一个微信小程序版的跨平台剪切板。\n\n\n书接上文，我们已经用`React`开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\n\n如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\n\n\u003c!--more--\u003e\n\n## 1.app.json\n\n```json\n\n{\n  \"pages\": [\n    \"pages/index/index\"\n  ],\n  \"window\": {\n    \"backgroundTextStyle\": \"light\",\n    \"navigationBarBackgroundColor\": \"#379392\",\n    \"navigationBarTitleText\": \"跨平台剪切板\",\n    \"navigationBarTextStyle\": \"white\"\n  },\n  \"debug\": true\n}\n```\n\n- `app.json`中描述了小程序相关的全局配置信息，所有的页面需要配置在`page`属性中。\n- 这里还能配置`tabbar`，为了跨平台剪切板的简洁，我去掉了tab，把它做成了一个单页面的极简APP\n\n## 2.模板\n\n```html\n\n\u003c!--index.wxml--\u003e\n\u003cview class=\"container\"\u003e\n  \u003cinput type='number' placeholder=\"查询码\" value='{{queryNumber\u003e0?queryNumber:\"\"}}' bindinput='bindInput' disabled='{{isShowResult}}'\u003e\u003c/input\u003e\n  \u003cbutton type='primary' wx:if=\"{{!isShowResult}}\" bindtap='query'\u003e查询\u003c/button\u003e\n  \u003cbutton wx:if=\"{{!isShowResult}}\" bindtap='create'\u003e新建\u003c/button\u003e\n  \u003ctextarea wx:if='{{isShowResult}}' value='{{text}}' bindinput='bindInputText'\u003e\u003c/textarea\u003e\n  \u003cbutton type= 'primary' wx:if = \"{{isShowResult}}\" bindtap='save'\u003e保存\u003c/button\u003e\n  \u003cbutton wx:if = \"{{isShowResult}}\" bindtap='back'\u003e返回\u003c/button\u003e\n\u003c/view\u003e\n```\n\n- `.wxml`后缀的是小程序的布局（模板）文件。\n- 属性没什么好解释的，看一下就懂了。参考React版的教程就知道每个属性的详细用途。\n\n## 3.样式表\n\n```css\n/**index.wxss**/\n\ninput {\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n}\n\nbutton {\n  margin-top: 24rpx;\n  width: 100%;\n}\n\ntextarea{\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n  margin-top: 24rpx;\n}\n```\n\n- 就是传统的CSS层叠样式表\n- 这里rpx是dpi无关的单位，保证不同分辨率的相同观感\n\n\n## 4.逻辑\n\n```javascript\n//index.js\n//获取应用实例\nconst app = getApp()\n\nPage({\n  data: {\n    queryNumber: -1,\n    isShowResult: false,\n    text: ''\n  },\n\n  onLoad: function () {\n\n  },\n\n  bindInput: function (e) {\n    this.setData({\n      queryNumber: e.detail.value\n    })\n  },\n\n  bindInputText: function (e) {\n    this.setData({\n      text: e.detail.value\n    })\n  },\n\n  query: function () {\n    if (this.data.queryNumber \u003c= 0) {\n      wx.showToast({\n        title: '查询码不正确！',\n        icon: 'none'\n      });\n      return\n    }\n\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/query',\n      data: { 'id': this.data.queryNumber },\n      success: function (res) {\n        if (!res.data.success || res.data.data == null) {\n          wx.showToast({\n            title: '查询码不正确！',\n            icon: 'none'\n          });\n        } else {\n          that.setData({\n            isShowResult: true,\n            queryNumber: res.data.data.id,\n            text: res.data.data.content\n          });\n        }\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n\n  },\n\n  create: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/create',\n      method: 'POST',\n      success: function (res) {\n\n        that.setData({\n          isShowResult: true,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n  },\n\n  save: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/save',\n      method: 'POST',\n      data:{\n        id: that.data.queryNumber,\n        content: that.data.text\n      },\n      header: {\n        'content-type': 'application/x-www-form-urlencoded'\n      },\n      success: function (res) {\n\n        that.setData({\n          isShowResult: false,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n        wx.showToast({\n          title: '保存成功！',\n          icon: 'success'\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete: function () {\n        wx.hideLoading();\n      }\n    });\n  },\n\n  back: function () {\n    this.setData({\n      isShowResult: false\n    })\n  }\n\n})\n\n```\n\n- 小程序的`data`，就是React的`state`\n- 小程序通过`this.setData()`刷新页面状态，如同React的`this.setState()`\n- 使用`wx.request()`做http请求\n- 使用`wx.showToast()`显示一个提示\n- 使用`wx.showLoading()`显示Loading\n- 这里发现一个小程序的bug，在`wx.hideLoading()`会将Toast也消失掉。\n\n\n至此大功告成！打开微信扫一扫文章开头的小程序码即可使用。\n访问 https://github.com/wangyucode/Clipboard 查看完整源码","data":{"title":"微信小程序入门","date":"2018-02-13","tags":["Wechat","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![React](/images/20180213_clipboard.jpg)\n\n\u003e 这篇文章我们将开发一个微信小程序版的跨平台剪切板。\n\n\n书接上文，我们已经用`React`开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\n\n如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\n\n"},{"id":"home-deus","file":"home-deus.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180129_homo_deus.jpg\" alt=\"未来简史\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1%的精英和99%的无用的人\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e人类将失去在经济和军事上的用途，因此经济和政治制度可能将不再继续认同人类有太多价值。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e21世纪经济学最重要的问题，可能就是多余的人能有什么用？一旦拥有高度智能的算法接手几乎一切工作，而且能比人类做的更好时，人类还能做什么？\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e前段时间看到一个TED演讲，未来世界各地可能像某些北欧国家一样，发基础工资，所有人都有基本工资来消费，而经济的马车由机器拉动。我们看到现在国家在搞扶贫，其实就是发社会基本工资。只不过还够不上发达国家而已。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e社会的贫富差距会加大。绝大多数人将会沦为无用的人。我们看到整个社会逐渐淘汰了一些简单的工作。例如扫马路、看守停车场。不幸的是，从事这些岗位的恰恰是低收入者。这些事情都在身边真实发生。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e除了计算机互联网的发展、另外一个进步巨大，却又常常被忽视的领域是生物科技，被称为上帝剪刀的基因编辑可能因为法律和伦理问题还需时日。但基于基因组测序和大数据做癌症筛查是现在的精英阶层已经流行的。由此超人类可能和传统的人产生历史上从未发生的\u003cstrong\u003e生理差距\u003c/strong\u003e。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180129_homo_deus.jpg\" alt=\"未来简史\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1%的精英和99%的无用的人\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e人类将失去在经济和军事上的用途，因此经济和政治制度可能将不再继续认同人类有太多价值。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e21世纪经济学最重要的问题，可能就是多余的人能有什么用？一旦拥有高度智能的算法接手几乎一切工作，而且能比人类做的更好时，人类还能做什么？\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e前段时间看到一个TED演讲，未来世界各地可能像某些北欧国家一样，发基础工资，所有人都有基本工资来消费，而经济的马车由机器拉动。我们看到现在国家在搞扶贫，其实就是发社会基本工资。只不过还够不上发达国家而已。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e社会的贫富差距会加大。绝大多数人将会沦为无用的人。我们看到整个社会逐渐淘汰了一些简单的工作。例如扫马路、看守停车场。不幸的是，从事这些岗位的恰恰是低收入者。这些事情都在身边真实发生。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e除了计算机互联网的发展、另外一个进步巨大，却又常常被忽视的领域是生物科技，被称为上帝剪刀的基因编辑可能因为法律和伦理问题还需时日。但基于基因组测序和大数据做癌症筛查是现在的精英阶层已经流行的。由此超人类可能和传统的人产生历史上从未发生的\u003cstrong\u003e生理差距\u003c/strong\u003e。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e饥荒、瘟疫和战争\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e就在几十年前，饥荒、瘟疫和战争是人类的头号敌人。但是，到了今天：\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e2010年，饥饿和营养不良合计夺走了约100万人的生命，但肥胖却让300万人丧命。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e虽然我们不敢保证绝不会爆发新一波埃博拉或未知流感病毒疫情，横扫全球造成数百万人死亡，但至少我们不会认为这是不可避免的自然灾害。相反，我们会认为这是一个不可原谅的认为疏忽，要有人为此负起责任。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e2012年，全球约有5600万人死亡，其中62万人死于暴力（战争致死12万，犯罪致死50万），相较之下，自杀的有80万，死于糖尿病的更是有150万。现在，糖比火药更致命。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e生命就是算法\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e人类历史就是数据处理过程。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e人不仅在处理数据，还在产生数据。你每天都在看新闻，刷微博，同时也在发微博，发朋友圈，记录、上传和分享。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e如今，各种微博，朋友圈，公众号，头条，推送。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以前，价值来源于获取信息的能力。现在，价值来源于过滤信息的能力。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e意识与智能分离\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e任何一匹马，不论是嗅觉、爱的能力、认人的能力、跳过栅栏的能力或是其他上千件事情上，绝对都远高于历史上首款平民汽车福特T型车，或是价值千万的兰博基尼。然而马还是被汽车取代，原因在于汽车在社会系统真正需要的少数几个领域胜出。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e事实证明高度的智能并不需要意识的参与。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e大数据和人工智能将比我们更加了解自己\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e当机器的选择比我们更好时，我们还有自己的独立人格吗，亦或是裹挟在数据浪潮中的一小片涟漪。\u003c/p\u003e\n","content":"\n![未来简史](/images/20180129_homo_deus.jpg)\n\n## 1%的精英和99%的无用的人\n\n\u003e 人类将失去在经济和军事上的用途，因此经济和政治制度可能将不再继续认同人类有太多价值。\n\n\u003e 21世纪经济学最重要的问题，可能就是多余的人能有什么用？一旦拥有高度智能的算法接手几乎一切工作，而且能比人类做的更好时，人类还能做什么？\n\n\n前段时间看到一个TED演讲，未来世界各地可能像某些北欧国家一样，发基础工资，所有人都有基本工资来消费，而经济的马车由机器拉动。我们看到现在国家在搞扶贫，其实就是发社会基本工资。只不过还够不上发达国家而已。\n\n社会的贫富差距会加大。绝大多数人将会沦为无用的人。我们看到整个社会逐渐淘汰了一些简单的工作。例如扫马路、看守停车场。不幸的是，从事这些岗位的恰恰是低收入者。这些事情都在身边真实发生。\n\n除了计算机互联网的发展、另外一个进步巨大，却又常常被忽视的领域是生物科技，被称为上帝剪刀的基因编辑可能因为法律和伦理问题还需时日。但基于基因组测序和大数据做癌症筛查是现在的精英阶层已经流行的。由此超人类可能和传统的人产生历史上从未发生的**生理差距**。\n\n\u003c!--more--\u003e\n\n## 饥荒、瘟疫和战争\n\n就在几十年前，饥荒、瘟疫和战争是人类的头号敌人。但是，到了今天：\n\n\u003e 2010年，饥饿和营养不良合计夺走了约100万人的生命，但肥胖却让300万人丧命。\n\n\u003e 虽然我们不敢保证绝不会爆发新一波埃博拉或未知流感病毒疫情，横扫全球造成数百万人死亡，但至少我们不会认为这是不可避免的自然灾害。相反，我们会认为这是一个不可原谅的认为疏忽，要有人为此负起责任。\n\n\u003e 2012年，全球约有5600万人死亡，其中62万人死于暴力（战争致死12万，犯罪致死50万），相较之下，自杀的有80万，死于糖尿病的更是有150万。现在，糖比火药更致命。\n\n\n## 生命就是算法\n\n\u003e 人类历史就是数据处理过程。\n\n人不仅在处理数据，还在产生数据。你每天都在看新闻，刷微博，同时也在发微博，发朋友圈，记录、上传和分享。\n\n如今，各种微博，朋友圈，公众号，头条，推送。\n\n以前，价值来源于获取信息的能力。现在，价值来源于过滤信息的能力。\n\n\n\n## 意识与智能分离\n\n\u003e 任何一匹马，不论是嗅觉、爱的能力、认人的能力、跳过栅栏的能力或是其他上千件事情上，绝对都远高于历史上首款平民汽车福特T型车，或是价值千万的兰博基尼。然而马还是被汽车取代，原因在于汽车在社会系统真正需要的少数几个领域胜出。\n\n事实证明高度的智能并不需要意识的参与。\n\n## 大数据和人工智能将比我们更加了解自己\n\n当机器的选择比我们更好时，我们还有自己的独立人格吗，亦或是裹挟在数据浪潮中的一小片涟漪。\n\n\n\n","data":{"title":"《未来简史》读书笔记","date":"2018-01-29","tags":null,"category":"Story"},"isEmpty":false,"excerpt":"\n![未来简史](/images/20180129_homo_deus.jpg)\n\n## 1%的精英和99%的无用的人\n\n\u003e 人类将失去在经济和军事上的用途，因此经济和政治制度可能将不再继续认同人类有太多价值。\n\n\u003e 21世纪经济学最重要的问题，可能就是多余的人能有什么用？一旦拥有高度智能的算法接手几乎一切工作，而且能比人类做的更好时，人类还能做什么？\n\n\n前段时间看到一个TED演讲，未来世界各地可能像某些北欧国家一样，发基础工资，所有人都有基本工资来消费，而经济的马车由机器拉动。我们看到现在国家在搞扶贫，其实就是发社会基本工资。只不过还够不上发达国家而已。\n\n社会的贫富差距会加大。绝大多数人将会沦为无用的人。我们看到整个社会逐渐淘汰了一些简单的工作。例如扫马路、看守停车场。不幸的是，从事这些岗位的恰恰是低收入者。这些事情都在身边真实发生。\n\n除了计算机互联网的发展、另外一个进步巨大，却又常常被忽视的领域是生物科技，被称为上帝剪刀的基因编辑可能因为法律和伦理问题还需时日。但基于基因组测序和大数据做癌症筛查是现在的精英阶层已经流行的。由此超人类可能和传统的人产生历史上从未发生的**生理差距**。\n\n"},{"id":"rxjava","file":"rxjava.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eRxJava是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e的Java分支，除了Java版，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e响应式编程\u003c/code\u003e，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLambda\u003c/code\u003e表达式和链式编程，让程序变得更加简洁优雅。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eRxJava是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e的Java分支，除了Java版，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e响应式编程\u003c/code\u003e，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLambda\u003c/code\u003e表达式和链式编程，让程序变得更加简洁优雅。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e看完了RactiveX的简介，觉得用它来封装一个网络请求框架应该是再好不过了，但是当我真正开始封装网络请求时，我发现：RxJava给的答案是，你并不需要去封装，而是\u003cstrong\u003e直接使用\u003c/strong\u003e就好了。实例代码如下。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHello RxJava\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\tpublic void onClick(View v) {\n        Observable.create((ObservableOnSubscribe\u0026#x3C;String\u003e) emitter -\u003e emitter.onNext(httpRequest()))  //1.\n                .subscribeOn(Schedulers.io())  //2.\n                .observeOn(AndroidSchedulers.mainThread())  //3.\n                .subscribe(s -\u003e textView.setText(s));  //4.\n    }\n    \n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e核心代码就是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOnClick\u003c/code\u003e方法中的四行。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e步骤如下：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecreate\u003c/code\u003e函数创建\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eObservable\u003c/code\u003e对象\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e订阅调度到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSchedulers.io()\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eio\u003c/code\u003e是一个有线程缓存的新线程调度器\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e将事件消费调度到Android的主线程上\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e消费者（观察者）代码\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttpRequest()\u003c/code\u003e没用到任何复杂的框架，就用原生的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHttpURLConnection\u003c/code\u003e做一个网络请求，返回请求结果的String，代码如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\tprivate String httpRequest() throws Exception {\n        URL url = new URL(\"http://wycode.cn/\");\n        HttpURLConnection urlConnection = (HttpURLConnection) url.openConnection();\n        String result;\n        try {\n            BufferedInputStream in = new BufferedInputStream(urlConnection.getInputStream());\n            result = readStream(in);\n        } finally {\n            urlConnection.disconnect();\n        }\n        return result;\n    }\n\n    private String readStream(BufferedInputStream in) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(in));\n        StringBuilder sb = new StringBuilder();\n        String line;\n        try {\n            while ((line = reader.readLine()) != null) {\n                sb.append(line).append(\"\\n\");\n            }\n        } catch (IOException e) {\n            e.printStackTrace();\n        } finally {\n            try {\n                in.close();\n            } catch (IOException e) {\n                e.printStackTrace();\n            }\n        }\n        return sb.toString();\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e变换操作\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通常的，我们在请求网络后要对服务器返回的字符串进行解析，这时我们可以使用RxJava的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTransforming\u003c/code\u003e操作，在返回前将JSON String转为实体类。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eObservable.create((ObservableOnSubscribe\u0026#x3C;String\u003e) emitter -\u003e emitter.onNext(httpRequest(\"https://wycode.cn/web/api/public/hello?message=Hello\"))) //1.\n                .map(s -\u003e JSON.parseObject(s,Message.class)) //解析JSON\n                .subscribeOn(Schedulers.io()) //2.\n                .observeOn(AndroidSchedulers.mainThread()) //3.\n                .subscribe(message -\u003e textView.setText(message.message)); //4.\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e可以看到在原有代码几乎没变的情况下，加上1行代码就实现了将Json转为实体再处理的需求。这就是RxJava的魅力。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e完整源码在这里：\u003ca href=\"https://github.com/wangyucode/rxjava\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/rxjava\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而以上也仅仅用到了RxJava的冰山一角，还有各种各样的函数来满足各种各样的需求。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e函数列表在这里：\u003ca href=\"http://reactivex.io/documentation/operators.html\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttp://reactivex.io/documentation/operators.html\u003c/a\u003e\u003c/p\u003e\n","content":"\n\u003e RxJava是`ReactiveX`的Java分支，除了Java版，`ReactiveX`还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\n\n\n\u003e ReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为`响应式编程`，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上`Lambda`表达式和链式编程，让程序变得更加简洁优雅。\n\n\u003c!--more--\u003e\n\n\n看完了RactiveX的简介，觉得用它来封装一个网络请求框架应该是再好不过了，但是当我真正开始封装网络请求时，我发现：RxJava给的答案是，你并不需要去封装，而是**直接使用**就好了。实例代码如下。\n\n## Hello RxJava\n\n```Java\n\tpublic void onClick(View v) {\n        Observable.create((ObservableOnSubscribe\u003cString\u003e) emitter -\u003e emitter.onNext(httpRequest()))  //1.\n                .subscribeOn(Schedulers.io())  //2.\n                .observeOn(AndroidSchedulers.mainThread())  //3.\n                .subscribe(s -\u003e textView.setText(s));  //4.\n    }\n    \n```\n\n核心代码就是`OnClick`方法中的四行。\n\n步骤如下：\n\n\n1. 通过`create`函数创建`Observable`对象\n2. 订阅调度到`Schedulers.io()`，`io`是一个有线程缓存的新线程调度器\n3. 将事件消费调度到Android的主线程上\n4. 消费者（观察者）代码\n\n`httpRequest()`没用到任何复杂的框架，就用原生的`HttpURLConnection`做一个网络请求，返回请求结果的String，代码如下：\n\n```Java\n\tprivate String httpRequest() throws Exception {\n        URL url = new URL(\"http://wycode.cn/\");\n        HttpURLConnection urlConnection = (HttpURLConnection) url.openConnection();\n        String result;\n        try {\n            BufferedInputStream in = new BufferedInputStream(urlConnection.getInputStream());\n            result = readStream(in);\n        } finally {\n            urlConnection.disconnect();\n        }\n        return result;\n    }\n\n    private String readStream(BufferedInputStream in) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(in));\n        StringBuilder sb = new StringBuilder();\n        String line;\n        try {\n            while ((line = reader.readLine()) != null) {\n                sb.append(line).append(\"\\n\");\n            }\n        } catch (IOException e) {\n            e.printStackTrace();\n        } finally {\n            try {\n                in.close();\n            } catch (IOException e) {\n                e.printStackTrace();\n            }\n        }\n        return sb.toString();\n    }\n```\n\n## 变换操作\n\n通常的，我们在请求网络后要对服务器返回的字符串进行解析，这时我们可以使用RxJava的`Transforming`操作，在返回前将JSON String转为实体类。\n\n```Java\nObservable.create((ObservableOnSubscribe\u003cString\u003e) emitter -\u003e emitter.onNext(httpRequest(\"https://wycode.cn/web/api/public/hello?message=Hello\"))) //1.\n                .map(s -\u003e JSON.parseObject(s,Message.class)) //解析JSON\n                .subscribeOn(Schedulers.io()) //2.\n                .observeOn(AndroidSchedulers.mainThread()) //3.\n                .subscribe(message -\u003e textView.setText(message.message)); //4.\n```\n\n可以看到在原有代码几乎没变的情况下，加上1行代码就实现了将Json转为实体再处理的需求。这就是RxJava的魅力。\n\n完整源码在这里：https://github.com/wangyucode/rxjava\n\n而以上也仅仅用到了RxJava的冰山一角，还有各种各样的函数来满足各种各样的需求。\n\n函数列表在这里：http://reactivex.io/documentation/operators.html\n","data":{"title":"RxJava入门","date":"2018-01-20","tags":["RxJava","Java"],"category":"Languages"},"isEmpty":false,"excerpt":"\n\u003e RxJava是`ReactiveX`的Java分支，除了Java版，`ReactiveX`还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\n\n\n\u003e ReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为`响应式编程`，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上`Lambda`表达式和链式编程，让程序变得更加简洁优雅。\n\n"}],"page":9,"total":15},"__N_SSG":true},"page":"/blog/page/[page]","query":{"page":"9"},"buildId":"7YMuoTtyITfiinBiv1T76","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
