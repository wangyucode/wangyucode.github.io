-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"clipboard-wechatapp","file":"clipboard-wechatapp.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_clipboard.jpg\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将开发一个微信小程序版的跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e书接上文，我们已经用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_clipboard.jpg\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将开发一个微信小程序版的跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e书接上文，我们已经用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1.app.json\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\n{\n  \"pages\": [\n    \"pages/index/index\"\n  ],\n  \"window\": {\n    \"backgroundTextStyle\": \"light\",\n    \"navigationBarBackgroundColor\": \"#379392\",\n    \"navigationBarTitleText\": \"跨平台剪切板\",\n    \"navigationBarTextStyle\": \"white\"\n  },\n  \"debug\": true\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapp.json\u003c/code\u003e中描述了小程序相关的全局配置信息，所有的页面需要配置在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epage\u003c/code\u003e属性中。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里还能配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etabbar\u003c/code\u003e，为了跨平台剪切板的简洁，我去掉了tab，把它做成了一个单页面的极简APP\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e2.模板\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\n\u0026#x3C;!--index.wxml--\u003e\n\u0026#x3C;view class=\"container\"\u003e\n  \u0026#x3C;input type='number' placeholder=\"查询码\" value='{{queryNumber\u003e0?queryNumber:\"\"}}' bindinput='bindInput' disabled='{{isShowResult}}'\u003e\u0026#x3C;/input\u003e\n  \u0026#x3C;button type='primary' wx:if=\"{{!isShowResult}}\" bindtap='query'\u003e查询\u0026#x3C;/button\u003e\n  \u0026#x3C;button wx:if=\"{{!isShowResult}}\" bindtap='create'\u003e新建\u0026#x3C;/button\u003e\n  \u0026#x3C;textarea wx:if='{{isShowResult}}' value='{{text}}' bindinput='bindInputText'\u003e\u0026#x3C;/textarea\u003e\n  \u0026#x3C;button type= 'primary' wx:if = \"{{isShowResult}}\" bindtap='save'\u003e保存\u0026#x3C;/button\u003e\n  \u0026#x3C;button wx:if = \"{{isShowResult}}\" bindtap='back'\u003e返回\u0026#x3C;/button\u003e\n\u0026#x3C;/view\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.wxml\u003c/code\u003e后缀的是小程序的布局（模板）文件。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e属性没什么好解释的，看一下就懂了。参考React版的教程就知道每个属性的详细用途。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e3.样式表\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-css px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e/**index.wxss**/\n\ninput {\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n}\n\nbutton {\n  margin-top: 24rpx;\n  width: 100%;\n}\n\ntextarea{\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n  margin-top: 24rpx;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e就是传统的CSS层叠样式表\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里rpx是dpi无关的单位，保证不同分辨率的相同观感\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e4.逻辑\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e//index.js\n//获取应用实例\nconst app = getApp()\n\nPage({\n  data: {\n    queryNumber: -1,\n    isShowResult: false,\n    text: ''\n  },\n\n  onLoad: function () {\n\n  },\n\n  bindInput: function (e) {\n    this.setData({\n      queryNumber: e.detail.value\n    })\n  },\n\n  bindInputText: function (e) {\n    this.setData({\n      text: e.detail.value\n    })\n  },\n\n  query: function () {\n    if (this.data.queryNumber \u0026#x3C;= 0) {\n      wx.showToast({\n        title: '查询码不正确！',\n        icon: 'none'\n      });\n      return\n    }\n\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/query',\n      data: { 'id': this.data.queryNumber },\n      success: function (res) {\n        if (!res.data.success || res.data.data == null) {\n          wx.showToast({\n            title: '查询码不正确！',\n            icon: 'none'\n          });\n        } else {\n          that.setData({\n            isShowResult: true,\n            queryNumber: res.data.data.id,\n            text: res.data.data.content\n          });\n        }\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n\n  },\n\n  create: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/create',\n      method: 'POST',\n      success: function (res) {\n\n        that.setData({\n          isShowResult: true,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n  },\n\n  save: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/save',\n      method: 'POST',\n      data:{\n        id: that.data.queryNumber,\n        content: that.data.text\n      },\n      header: {\n        'content-type': 'application/x-www-form-urlencoded'\n      },\n      success: function (res) {\n\n        that.setData({\n          isShowResult: false,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n        wx.showToast({\n          title: '保存成功！',\n          icon: 'success'\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete: function () {\n        wx.hideLoading();\n      }\n    });\n  },\n\n  back: function () {\n    this.setData({\n      isShowResult: false\n    })\n  }\n\n})\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e小程序的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edata\u003c/code\u003e，就是React的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estate\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e小程序通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis.setData()\u003c/code\u003e刷新页面状态，如同React的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis.setState()\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.request()\u003c/code\u003e做http请求\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.showToast()\u003c/code\u003e显示一个提示\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.showLoading()\u003c/code\u003e显示Loading\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里发现一个小程序的bug，在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.hideLoading()\u003c/code\u003e会将Toast也消失掉。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e至此大功告成！打开微信扫一扫文章开头的小程序码即可使用。\n访问 \u003ca href=\"https://github.com/wangyucode/Clipboard\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/Clipboard\u003c/a\u003e 查看完整源码\u003c/p\u003e\n","content":"\n![React](/images/20180213_clipboard.jpg)\n\n\u003e 这篇文章我们将开发一个微信小程序版的跨平台剪切板。\n\n\n书接上文，我们已经用`React`开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\n\n如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\n\n\u003c!--more--\u003e\n\n## 1.app.json\n\n```json\n\n{\n  \"pages\": [\n    \"pages/index/index\"\n  ],\n  \"window\": {\n    \"backgroundTextStyle\": \"light\",\n    \"navigationBarBackgroundColor\": \"#379392\",\n    \"navigationBarTitleText\": \"跨平台剪切板\",\n    \"navigationBarTextStyle\": \"white\"\n  },\n  \"debug\": true\n}\n```\n\n- `app.json`中描述了小程序相关的全局配置信息，所有的页面需要配置在`page`属性中。\n- 这里还能配置`tabbar`，为了跨平台剪切板的简洁，我去掉了tab，把它做成了一个单页面的极简APP\n\n## 2.模板\n\n```html\n\n\u003c!--index.wxml--\u003e\n\u003cview class=\"container\"\u003e\n  \u003cinput type='number' placeholder=\"查询码\" value='{{queryNumber\u003e0?queryNumber:\"\"}}' bindinput='bindInput' disabled='{{isShowResult}}'\u003e\u003c/input\u003e\n  \u003cbutton type='primary' wx:if=\"{{!isShowResult}}\" bindtap='query'\u003e查询\u003c/button\u003e\n  \u003cbutton wx:if=\"{{!isShowResult}}\" bindtap='create'\u003e新建\u003c/button\u003e\n  \u003ctextarea wx:if='{{isShowResult}}' value='{{text}}' bindinput='bindInputText'\u003e\u003c/textarea\u003e\n  \u003cbutton type= 'primary' wx:if = \"{{isShowResult}}\" bindtap='save'\u003e保存\u003c/button\u003e\n  \u003cbutton wx:if = \"{{isShowResult}}\" bindtap='back'\u003e返回\u003c/button\u003e\n\u003c/view\u003e\n```\n\n- `.wxml`后缀的是小程序的布局（模板）文件。\n- 属性没什么好解释的，看一下就懂了。参考React版的教程就知道每个属性的详细用途。\n\n## 3.样式表\n\n```css\n/**index.wxss**/\n\ninput {\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n}\n\nbutton {\n  margin-top: 24rpx;\n  width: 100%;\n}\n\ntextarea{\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n  margin-top: 24rpx;\n}\n```\n\n- 就是传统的CSS层叠样式表\n- 这里rpx是dpi无关的单位，保证不同分辨率的相同观感\n\n\n## 4.逻辑\n\n```javascript\n//index.js\n//获取应用实例\nconst app = getApp()\n\nPage({\n  data: {\n    queryNumber: -1,\n    isShowResult: false,\n    text: ''\n  },\n\n  onLoad: function () {\n\n  },\n\n  bindInput: function (e) {\n    this.setData({\n      queryNumber: e.detail.value\n    })\n  },\n\n  bindInputText: function (e) {\n    this.setData({\n      text: e.detail.value\n    })\n  },\n\n  query: function () {\n    if (this.data.queryNumber \u003c= 0) {\n      wx.showToast({\n        title: '查询码不正确！',\n        icon: 'none'\n      });\n      return\n    }\n\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/query',\n      data: { 'id': this.data.queryNumber },\n      success: function (res) {\n        if (!res.data.success || res.data.data == null) {\n          wx.showToast({\n            title: '查询码不正确！',\n            icon: 'none'\n          });\n        } else {\n          that.setData({\n            isShowResult: true,\n            queryNumber: res.data.data.id,\n            text: res.data.data.content\n          });\n        }\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n\n  },\n\n  create: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/create',\n      method: 'POST',\n      success: function (res) {\n\n        that.setData({\n          isShowResult: true,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n  },\n\n  save: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/save',\n      method: 'POST',\n      data:{\n        id: that.data.queryNumber,\n        content: that.data.text\n      },\n      header: {\n        'content-type': 'application/x-www-form-urlencoded'\n      },\n      success: function (res) {\n\n        that.setData({\n          isShowResult: false,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n        wx.showToast({\n          title: '保存成功！',\n          icon: 'success'\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete: function () {\n        wx.hideLoading();\n      }\n    });\n  },\n\n  back: function () {\n    this.setData({\n      isShowResult: false\n    })\n  }\n\n})\n\n```\n\n- 小程序的`data`，就是React的`state`\n- 小程序通过`this.setData()`刷新页面状态，如同React的`this.setState()`\n- 使用`wx.request()`做http请求\n- 使用`wx.showToast()`显示一个提示\n- 使用`wx.showLoading()`显示Loading\n- 这里发现一个小程序的bug，在`wx.hideLoading()`会将Toast也消失掉。\n\n\n至此大功告成！打开微信扫一扫文章开头的小程序码即可使用。\n访问 https://github.com/wangyucode/Clipboard 查看完整源码","data":{"title":"微信小程序入门","date":"2018-02-13","tags":["Wechat","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![React](/images/20180213_clipboard.jpg)\n\n\u003e 这篇文章我们将开发一个微信小程序版的跨平台剪切板。\n\n\n书接上文，我们已经用`React`开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\n\n如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\n\n"},{"id":"home-deus","file":"home-deus.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180129_homo_deus.jpg\" alt=\"未来简史\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1%的精英和99%的无用的人\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e人类将失去在经济和军事上的用途，因此经济和政治制度可能将不再继续认同人类有太多价值。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e21世纪经济学最重要的问题，可能就是多余的人能有什么用？一旦拥有高度智能的算法接手几乎一切工作，而且能比人类做的更好时，人类还能做什么？\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e前段时间看到一个TED演讲，未来世界各地可能像某些北欧国家一样，发基础工资，所有人都有基本工资来消费，而经济的马车由机器拉动。我们看到现在国家在搞扶贫，其实就是发社会基本工资。只不过还够不上发达国家而已。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e社会的贫富差距会加大。绝大多数人将会沦为无用的人。我们看到整个社会逐渐淘汰了一些简单的工作。例如扫马路、看守停车场。不幸的是，从事这些岗位的恰恰是低收入者。这些事情都在身边真实发生。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e除了计算机互联网的发展、另外一个进步巨大，却又常常被忽视的领域是生物科技，被称为上帝剪刀的基因编辑可能因为法律和伦理问题还需时日。但基于基因组测序和大数据做癌症筛查是现在的精英阶层已经流行的。由此超人类可能和传统的人产生历史上从未发生的\u003cstrong\u003e生理差距\u003c/strong\u003e。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180129_homo_deus.jpg\" alt=\"未来简史\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1%的精英和99%的无用的人\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e人类将失去在经济和军事上的用途，因此经济和政治制度可能将不再继续认同人类有太多价值。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e21世纪经济学最重要的问题，可能就是多余的人能有什么用？一旦拥有高度智能的算法接手几乎一切工作，而且能比人类做的更好时，人类还能做什么？\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e前段时间看到一个TED演讲，未来世界各地可能像某些北欧国家一样，发基础工资，所有人都有基本工资来消费，而经济的马车由机器拉动。我们看到现在国家在搞扶贫，其实就是发社会基本工资。只不过还够不上发达国家而已。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e社会的贫富差距会加大。绝大多数人将会沦为无用的人。我们看到整个社会逐渐淘汰了一些简单的工作。例如扫马路、看守停车场。不幸的是，从事这些岗位的恰恰是低收入者。这些事情都在身边真实发生。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e除了计算机互联网的发展、另外一个进步巨大，却又常常被忽视的领域是生物科技，被称为上帝剪刀的基因编辑可能因为法律和伦理问题还需时日。但基于基因组测序和大数据做癌症筛查是现在的精英阶层已经流行的。由此超人类可能和传统的人产生历史上从未发生的\u003cstrong\u003e生理差距\u003c/strong\u003e。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e饥荒、瘟疫和战争\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e就在几十年前，饥荒、瘟疫和战争是人类的头号敌人。但是，到了今天：\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e2010年，饥饿和营养不良合计夺走了约100万人的生命，但肥胖却让300万人丧命。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e虽然我们不敢保证绝不会爆发新一波埃博拉或未知流感病毒疫情，横扫全球造成数百万人死亡，但至少我们不会认为这是不可避免的自然灾害。相反，我们会认为这是一个不可原谅的认为疏忽，要有人为此负起责任。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e2012年，全球约有5600万人死亡，其中62万人死于暴力（战争致死12万，犯罪致死50万），相较之下，自杀的有80万，死于糖尿病的更是有150万。现在，糖比火药更致命。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e生命就是算法\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e人类历史就是数据处理过程。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e人不仅在处理数据，还在产生数据。你每天都在看新闻，刷微博，同时也在发微博，发朋友圈，记录、上传和分享。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e如今，各种微博，朋友圈，公众号，头条，推送。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以前，价值来源于获取信息的能力。现在，价值来源于过滤信息的能力。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e意识与智能分离\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e任何一匹马，不论是嗅觉、爱的能力、认人的能力、跳过栅栏的能力或是其他上千件事情上，绝对都远高于历史上首款平民汽车福特T型车，或是价值千万的兰博基尼。然而马还是被汽车取代，原因在于汽车在社会系统真正需要的少数几个领域胜出。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e事实证明高度的智能并不需要意识的参与。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e大数据和人工智能将比我们更加了解自己\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e当机器的选择比我们更好时，我们还有自己的独立人格吗，亦或是裹挟在数据浪潮中的一小片涟漪。\u003c/p\u003e\n","content":"\n![未来简史](/images/20180129_homo_deus.jpg)\n\n## 1%的精英和99%的无用的人\n\n\u003e 人类将失去在经济和军事上的用途，因此经济和政治制度可能将不再继续认同人类有太多价值。\n\n\u003e 21世纪经济学最重要的问题，可能就是多余的人能有什么用？一旦拥有高度智能的算法接手几乎一切工作，而且能比人类做的更好时，人类还能做什么？\n\n\n前段时间看到一个TED演讲，未来世界各地可能像某些北欧国家一样，发基础工资，所有人都有基本工资来消费，而经济的马车由机器拉动。我们看到现在国家在搞扶贫，其实就是发社会基本工资。只不过还够不上发达国家而已。\n\n社会的贫富差距会加大。绝大多数人将会沦为无用的人。我们看到整个社会逐渐淘汰了一些简单的工作。例如扫马路、看守停车场。不幸的是，从事这些岗位的恰恰是低收入者。这些事情都在身边真实发生。\n\n除了计算机互联网的发展、另外一个进步巨大，却又常常被忽视的领域是生物科技，被称为上帝剪刀的基因编辑可能因为法律和伦理问题还需时日。但基于基因组测序和大数据做癌症筛查是现在的精英阶层已经流行的。由此超人类可能和传统的人产生历史上从未发生的**生理差距**。\n\n\u003c!--more--\u003e\n\n## 饥荒、瘟疫和战争\n\n就在几十年前，饥荒、瘟疫和战争是人类的头号敌人。但是，到了今天：\n\n\u003e 2010年，饥饿和营养不良合计夺走了约100万人的生命，但肥胖却让300万人丧命。\n\n\u003e 虽然我们不敢保证绝不会爆发新一波埃博拉或未知流感病毒疫情，横扫全球造成数百万人死亡，但至少我们不会认为这是不可避免的自然灾害。相反，我们会认为这是一个不可原谅的认为疏忽，要有人为此负起责任。\n\n\u003e 2012年，全球约有5600万人死亡，其中62万人死于暴力（战争致死12万，犯罪致死50万），相较之下，自杀的有80万，死于糖尿病的更是有150万。现在，糖比火药更致命。\n\n\n## 生命就是算法\n\n\u003e 人类历史就是数据处理过程。\n\n人不仅在处理数据，还在产生数据。你每天都在看新闻，刷微博，同时也在发微博，发朋友圈，记录、上传和分享。\n\n如今，各种微博，朋友圈，公众号，头条，推送。\n\n以前，价值来源于获取信息的能力。现在，价值来源于过滤信息的能力。\n\n\n\n## 意识与智能分离\n\n\u003e 任何一匹马，不论是嗅觉、爱的能力、认人的能力、跳过栅栏的能力或是其他上千件事情上，绝对都远高于历史上首款平民汽车福特T型车，或是价值千万的兰博基尼。然而马还是被汽车取代，原因在于汽车在社会系统真正需要的少数几个领域胜出。\n\n事实证明高度的智能并不需要意识的参与。\n\n## 大数据和人工智能将比我们更加了解自己\n\n当机器的选择比我们更好时，我们还有自己的独立人格吗，亦或是裹挟在数据浪潮中的一小片涟漪。\n\n\n\n","data":{"title":"《未来简史》读书笔记","date":"2018-01-29","tags":null,"category":"Story"},"isEmpty":false,"excerpt":"\n![未来简史](/images/20180129_homo_deus.jpg)\n\n## 1%的精英和99%的无用的人\n\n\u003e 人类将失去在经济和军事上的用途，因此经济和政治制度可能将不再继续认同人类有太多价值。\n\n\u003e 21世纪经济学最重要的问题，可能就是多余的人能有什么用？一旦拥有高度智能的算法接手几乎一切工作，而且能比人类做的更好时，人类还能做什么？\n\n\n前段时间看到一个TED演讲，未来世界各地可能像某些北欧国家一样，发基础工资，所有人都有基本工资来消费，而经济的马车由机器拉动。我们看到现在国家在搞扶贫，其实就是发社会基本工资。只不过还够不上发达国家而已。\n\n社会的贫富差距会加大。绝大多数人将会沦为无用的人。我们看到整个社会逐渐淘汰了一些简单的工作。例如扫马路、看守停车场。不幸的是，从事这些岗位的恰恰是低收入者。这些事情都在身边真实发生。\n\n除了计算机互联网的发展、另外一个进步巨大，却又常常被忽视的领域是生物科技，被称为上帝剪刀的基因编辑可能因为法律和伦理问题还需时日。但基于基因组测序和大数据做癌症筛查是现在的精英阶层已经流行的。由此超人类可能和传统的人产生历史上从未发生的**生理差距**。\n\n"},{"id":"rxjava","file":"rxjava.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eRxJava是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e的Java分支，除了Java版，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e响应式编程\u003c/code\u003e，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLambda\u003c/code\u003e表达式和链式编程，让程序变得更加简洁优雅。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eRxJava是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e的Java分支，除了Java版，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e响应式编程\u003c/code\u003e，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLambda\u003c/code\u003e表达式和链式编程，让程序变得更加简洁优雅。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e看完了RactiveX的简介，觉得用它来封装一个网络请求框架应该是再好不过了，但是当我真正开始封装网络请求时，我发现：RxJava给的答案是，你并不需要去封装，而是\u003cstrong\u003e直接使用\u003c/strong\u003e就好了。实例代码如下。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHello RxJava\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\tpublic void onClick(View v) {\n        Observable.create((ObservableOnSubscribe\u0026#x3C;String\u003e) emitter -\u003e emitter.onNext(httpRequest()))  //1.\n                .subscribeOn(Schedulers.io())  //2.\n                .observeOn(AndroidSchedulers.mainThread())  //3.\n                .subscribe(s -\u003e textView.setText(s));  //4.\n    }\n    \n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e核心代码就是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOnClick\u003c/code\u003e方法中的四行。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e步骤如下：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecreate\u003c/code\u003e函数创建\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eObservable\u003c/code\u003e对象\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e订阅调度到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSchedulers.io()\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eio\u003c/code\u003e是一个有线程缓存的新线程调度器\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e将事件消费调度到Android的主线程上\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e消费者（观察者）代码\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttpRequest()\u003c/code\u003e没用到任何复杂的框架，就用原生的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHttpURLConnection\u003c/code\u003e做一个网络请求，返回请求结果的String，代码如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\tprivate String httpRequest() throws Exception {\n        URL url = new URL(\"http://wycode.cn/\");\n        HttpURLConnection urlConnection = (HttpURLConnection) url.openConnection();\n        String result;\n        try {\n            BufferedInputStream in = new BufferedInputStream(urlConnection.getInputStream());\n            result = readStream(in);\n        } finally {\n            urlConnection.disconnect();\n        }\n        return result;\n    }\n\n    private String readStream(BufferedInputStream in) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(in));\n        StringBuilder sb = new StringBuilder();\n        String line;\n        try {\n            while ((line = reader.readLine()) != null) {\n                sb.append(line).append(\"\\n\");\n            }\n        } catch (IOException e) {\n            e.printStackTrace();\n        } finally {\n            try {\n                in.close();\n            } catch (IOException e) {\n                e.printStackTrace();\n            }\n        }\n        return sb.toString();\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e变换操作\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通常的，我们在请求网络后要对服务器返回的字符串进行解析，这时我们可以使用RxJava的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTransforming\u003c/code\u003e操作，在返回前将JSON String转为实体类。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eObservable.create((ObservableOnSubscribe\u0026#x3C;String\u003e) emitter -\u003e emitter.onNext(httpRequest(\"https://wycode.cn/web/api/public/hello?message=Hello\"))) //1.\n                .map(s -\u003e JSON.parseObject(s,Message.class)) //解析JSON\n                .subscribeOn(Schedulers.io()) //2.\n                .observeOn(AndroidSchedulers.mainThread()) //3.\n                .subscribe(message -\u003e textView.setText(message.message)); //4.\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e可以看到在原有代码几乎没变的情况下，加上1行代码就实现了将Json转为实体再处理的需求。这就是RxJava的魅力。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e完整源码在这里：\u003ca href=\"https://github.com/wangyucode/rxjava\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/rxjava\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而以上也仅仅用到了RxJava的冰山一角，还有各种各样的函数来满足各种各样的需求。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e函数列表在这里：\u003ca href=\"http://reactivex.io/documentation/operators.html\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttp://reactivex.io/documentation/operators.html\u003c/a\u003e\u003c/p\u003e\n","content":"\n\u003e RxJava是`ReactiveX`的Java分支，除了Java版，`ReactiveX`还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\n\n\n\u003e ReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为`响应式编程`，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上`Lambda`表达式和链式编程，让程序变得更加简洁优雅。\n\n\u003c!--more--\u003e\n\n\n看完了RactiveX的简介，觉得用它来封装一个网络请求框架应该是再好不过了，但是当我真正开始封装网络请求时，我发现：RxJava给的答案是，你并不需要去封装，而是**直接使用**就好了。实例代码如下。\n\n## Hello RxJava\n\n```Java\n\tpublic void onClick(View v) {\n        Observable.create((ObservableOnSubscribe\u003cString\u003e) emitter -\u003e emitter.onNext(httpRequest()))  //1.\n                .subscribeOn(Schedulers.io())  //2.\n                .observeOn(AndroidSchedulers.mainThread())  //3.\n                .subscribe(s -\u003e textView.setText(s));  //4.\n    }\n    \n```\n\n核心代码就是`OnClick`方法中的四行。\n\n步骤如下：\n\n\n1. 通过`create`函数创建`Observable`对象\n2. 订阅调度到`Schedulers.io()`，`io`是一个有线程缓存的新线程调度器\n3. 将事件消费调度到Android的主线程上\n4. 消费者（观察者）代码\n\n`httpRequest()`没用到任何复杂的框架，就用原生的`HttpURLConnection`做一个网络请求，返回请求结果的String，代码如下：\n\n```Java\n\tprivate String httpRequest() throws Exception {\n        URL url = new URL(\"http://wycode.cn/\");\n        HttpURLConnection urlConnection = (HttpURLConnection) url.openConnection();\n        String result;\n        try {\n            BufferedInputStream in = new BufferedInputStream(urlConnection.getInputStream());\n            result = readStream(in);\n        } finally {\n            urlConnection.disconnect();\n        }\n        return result;\n    }\n\n    private String readStream(BufferedInputStream in) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(in));\n        StringBuilder sb = new StringBuilder();\n        String line;\n        try {\n            while ((line = reader.readLine()) != null) {\n                sb.append(line).append(\"\\n\");\n            }\n        } catch (IOException e) {\n            e.printStackTrace();\n        } finally {\n            try {\n                in.close();\n            } catch (IOException e) {\n                e.printStackTrace();\n            }\n        }\n        return sb.toString();\n    }\n```\n\n## 变换操作\n\n通常的，我们在请求网络后要对服务器返回的字符串进行解析，这时我们可以使用RxJava的`Transforming`操作，在返回前将JSON String转为实体类。\n\n```Java\nObservable.create((ObservableOnSubscribe\u003cString\u003e) emitter -\u003e emitter.onNext(httpRequest(\"https://wycode.cn/web/api/public/hello?message=Hello\"))) //1.\n                .map(s -\u003e JSON.parseObject(s,Message.class)) //解析JSON\n                .subscribeOn(Schedulers.io()) //2.\n                .observeOn(AndroidSchedulers.mainThread()) //3.\n                .subscribe(message -\u003e textView.setText(message.message)); //4.\n```\n\n可以看到在原有代码几乎没变的情况下，加上1行代码就实现了将Json转为实体再处理的需求。这就是RxJava的魅力。\n\n完整源码在这里：https://github.com/wangyucode/rxjava\n\n而以上也仅仅用到了RxJava的冰山一角，还有各种各样的函数来满足各种各样的需求。\n\n函数列表在这里：http://reactivex.io/documentation/operators.html\n","data":{"title":"RxJava入门","date":"2018-01-20","tags":["RxJava","Java"],"category":"Languages"},"isEmpty":false,"excerpt":"\n\u003e RxJava是`ReactiveX`的Java分支，除了Java版，`ReactiveX`还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\n\n\n\u003e ReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为`响应式编程`，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上`Lambda`表达式和链式编程，让程序变得更加简洁优雅。\n\n"},{"id":"react","file":"react.md","excerptHtml":"","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eReact框架的整体思路是将DOM元素彻底改为由JS代码渲染，通过组件(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e)的层层嵌套，最终由\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactDOM.render()\u003c/code\u003e渲染到页面上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003eReact框架的核心概念：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e元素(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eElement\u003c/code\u003e) Recat认为元素是不可变的，创建后不能修改。React使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJSX\u003c/code\u003e技术将HTML代码直接作为常量使用。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e组件(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e) 组件是对元素的封装。拥有自身的生命周期函数。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e属性(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eProps\u003c/code\u003e) 属性可以看作常量，用于构建特定的组件。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e状态(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eState\u003c/code\u003e) 组件通过状态维护自身变化。组件通过调用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esetState()\u003c/code\u003e方法重新渲染。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eReact的理念是采取\u003ca href=\"https://en.wikipedia.org/wiki/Single_responsibility_principle\" title=\"Wiki\" class=\"text-sky-500 hover:text-sky-400\"\u003e单一责任原则\u003c/a\u003e，自顶向下设计，一层层的拆分成只做一件事的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在做一个实际的项目时，采取先使用假数据画页面的方式，这个过程中只需要关心数据模型和页面。而不去关心逻辑交互。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e为什么要分成\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eProps\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eState\u003c/code\u003e就显而易见了，做页面时只关心\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eProps\u003c/code\u003e，做交互时只关心\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eState\u003c/code\u003e。\u003c/p\u003e\n","content":"\n![React](/images/20180213_react.png)\n\n\u003e React框架的整体思路是将DOM元素彻底改为由JS代码渲染，通过组件(`Component`)的层层嵌套，最终由`ReactDOM.render()`渲染到页面上。\n\nReact框架的核心概念：\n\n- 元素(`Element`) Recat认为元素是不可变的，创建后不能修改。React使用`JSX`技术将HTML代码直接作为常量使用。\n- 组件(`Component`) 组件是对元素的封装。拥有自身的生命周期函数。\n- 属性(`Props`) 属性可以看作常量，用于构建特定的组件。\n- 状态(`State`) 组件通过状态维护自身变化。组件通过调用`setState()`方法重新渲染。\n\nReact的理念是采取[单一责任原则](https://en.wikipedia.org/wiki/Single_responsibility_principle \"Wiki\")，自顶向下设计，一层层的拆分成只做一件事的`Component`。\n\n在做一个实际的项目时，采取先使用假数据画页面的方式，这个过程中只需要关心数据模型和页面。而不去关心逻辑交互。\n\n此时`Component`为什么要分成`Props`和`State`就显而易见了，做页面时只关心`Props`，做交互时只关心`State`。","data":{"title":"React框架原理的思考","date":"2018-01-06","tags":["React","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":""},{"id":"angular","file":"angular.md","excerptHtml":"","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eAngular框架的整体思路，很像Spring这样的后台框架。一层层的分解、解耦，天下框架莫不如此。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003eAngular有3个重要概念：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e模块(Module)\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e组件(Component)\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e路由(Router)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eAngular通过将大型项目分割成一个个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e模块\u003c/code\u003e，松耦合，便于扩展和维护。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e所谓\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e组件\u003c/code\u003e，就是一个MVC块，每个模块会有很多组件，组件代表了一个页面，可以嵌套，因此可以更加细分下去，通过元数据做双向绑定。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e所谓\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e路由\u003c/code\u003e，就是一个分发器，不同的路径加载不同的模块或组件即可。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e所谓\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e元数据\u003c/code\u003e，就是Java注解。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eSpring那套，控制反转（IOC）依赖注入（DI）也被引入进来。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e将业务逻辑封装到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eService\u003c/code\u003e里，然后注入到各个组件中使用。业务代码就彻底被隔离到Service里了，不会侵入框架整体设计。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e关于Webpack：Webpack在打包Web工程时，可以找到资源之间的引用，最小化压缩合并CSS，JavaScript文件。\u003c/p\u003e\n","content":"\n\u003e Angular框架的整体思路，很像Spring这样的后台框架。一层层的分解、解耦，天下框架莫不如此。\n\nAngular有3个重要概念：\n\n- 模块(Module)\n- 组件(Component)\n- 路由(Router)\n\nAngular通过将大型项目分割成一个个`模块`，松耦合，便于扩展和维护。\n\n所谓`组件`，就是一个MVC块，每个模块会有很多组件，组件代表了一个页面，可以嵌套，因此可以更加细分下去，通过元数据做双向绑定。\n\n所谓`路由`，就是一个分发器，不同的路径加载不同的模块或组件即可。\n\n所谓`元数据`，就是Java注解。\n\nSpring那套，控制反转（IOC）依赖注入（DI）也被引入进来。\n\n将业务逻辑封装到`Service`里，然后注入到各个组件中使用。业务代码就彻底被隔离到Service里了，不会侵入框架整体设计。\n\n关于Webpack：Webpack在打包Web工程时，可以找到资源之间的引用，最小化压缩合并CSS，JavaScript文件。","data":{"title":"Angular框架原理的思考","date":"2017-12-28","tags":["Angular","TypeScript","HTML"],"category":"Frontend"},"isEmpty":false,"excerpt":""}],"page":9,"total":15},"__N_SSG":true},"page":"/blog/page/[page]","query":{"page":"9"},"buildId":"KYANdil3ljfaQ9_rbwOmo","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
