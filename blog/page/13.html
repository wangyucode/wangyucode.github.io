-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"spring-properties","file":"spring-properties.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eSpring框架在运行时会自动查找\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e配置文件，在这个文件中进行项目相关配置属性，例如数据库地址密码等。当然也支持自定义属性。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eSpring框架在运行时会自动查找\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e配置文件，在这个文件中进行项目相关配置属性，例如数据库地址密码等。当然也支持自定义属性。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e位置\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e可以放置在以下目录\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e当前目录下的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/config\u003c/code\u003e目录中\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e当前目录\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eclasspath下的 /config包\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eclasspath\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eresource文件夹\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e自定义属性的使用\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e添加自定义属性\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emyProperties = myValue\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@Value\u003c/code\u003e注解即可注入使用\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e    @Value(\"${myProperties}\")\n    String value; //value = \"myValue\";\n\u003c/code\u003e\u003c/pre\u003e\n\u003col start=\"3\" class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e还可以使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ConfigurationProperties(\"foo\")\u003c/code\u003e注入POJO实体\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@ConfigurationProperties(\"foo\")\npublic class Foo｛\n    private boolean enabled;\n    public boolean isEnabled() { ... }\n    public void setEnabled(boolean enabled) { ... }\n｝\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e添加属性\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003efoo.enabled = true\u003c/code\u003e即可\u003c/p\u003e\n","content":"\n\u003e Spring框架在运行时会自动查找`application.properties`配置文件，在这个文件中进行项目相关配置属性，例如数据库地址密码等。当然也支持自定义属性。\n\n\u003c!--more--\u003e\n\n## 位置\n`application.properties`可以放置在以下目录\n\n- 当前目录下的`/config`目录中\n- 当前目录\n- classpath下的 /config包\n- classpath\n- **resource文件夹**\n\n## 自定义属性的使用\n\n1. 在`application.properties`添加自定义属性`myProperties = myValue`\n2. 使用`@Value`注解即可注入使用\n```java\n    @Value(\"${myProperties}\")\n    String value; //value = \"myValue\";\n```\n3. 还可以使用`@ConfigurationProperties(\"foo\")`注入POJO实体\n```java\n@ConfigurationProperties(\"foo\")\npublic class Foo｛\n    private boolean enabled;\n    public boolean isEnabled() { ... }\n    public void setEnabled(boolean enabled) { ... }\n｝\n```\n在`application.properties`添加属性`foo.enabled = true`即可\n","data":{"title":"Spring中的application.properties","date":"2017-07-11","tags":["Spring","Java"],"category":"Backend"},"isEmpty":false,"excerpt":"\n\u003e Spring框架在运行时会自动查找`application.properties`配置文件，在这个文件中进行项目相关配置属性，例如数据库地址密码等。当然也支持自定义属性。\n\n"},{"id":"unity-lifecycle","file":"unity-lifecycle.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eUnity脚本的生命周期，协程、各关键函数的调用顺序如下图所示：\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eUnity脚本的生命周期，协程、各关键函数的调用顺序如下图所示：\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170707_monobehaviour_flowchart.svg\" alt=\"Unity脚本生命周期\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","content":"\n\u003e Unity脚本的生命周期，协程、各关键函数的调用顺序如下图所示：\n\n\u003c!--more--\u003e\ \n","content":"\n\u003e Unity 平台的判断包含编译时判断和运行时判断，总结如下：\n\n\u003c!--more--\u003e\n\n## 编译时\n\n```csharp\n    #if UNITY_EDITOR\n      Debug.Log(\"Unity Editor\");\n    #endif\n\n    #if UNITY_IOS\n      Debug.Log(\"Iphone\");\n    #endif\n\n    #if UNITY_STANDALONE_OSX\n    Debug.Log(\"Stand Alone OSX\");\n    #endif\n\n    #if UNITY_STANDALONE_WIN\n      Debug.Log(\"Stand Alone Windows\");\n    #endif\n```\n可以使用`||`和`\u0026\u0026`进行组合\n\n### 平台定义\n- UNITY_EDITOR\n- UNITY_EDITOR_WIN\n- UNITY_EDITOR_OSX\n- UNITY_STANDALONE_OSX\n- UNITY_STANDALONE_WIN\n- UNITY_STANDALONE_LINUX\n- UNITY_STANDALONE\n- UNITY_WII\n- UNITY_IOS\n- UNITY_IPHONE\n- UNITY_ANDROID\n- UNITY_PS4\n- UNITY_SAMSUNGTV\n- UNITY_XBOXONE\n- UNITY_TIZEN\n- UNITY_TVOS\n- UNITY_WP_8_1\n- UNITY_WSA\n- UNITY_WSA_8_1\n- UNITY_WSA_10_0\n- UNITY_WINRT\n- UNITY_WINRT_8_1\n- UNITY_WINRT_10_0\n- UNITY_WEBGL\n- UNITY_ADS\n- UNITY_ANALYTICS\n- UNITY_ASSERTIONS\n\n官方文档:[https://docs.unity3d.com/Manual/PlatformDependentCompilation.html](https://docs.unity3d.com/Manual/PlatformDependentCompilation.html \"https://docs.unity3d.com/Manual/PlatformDependentCompilation.html\")\n\n## 运行时\n\n```csharp\nif(Application.platform == RuntimePlatform.WindowsWebPlayer)\n{\n   Debug.Log(\"Windows Web Player\");\n}\n```\n\n### 平台枚举\n\n- OSXEditor\n- OSXPlayer\n- WindowsPlayer\n- OSXDashboardPlayer\n- WindowsEditor\n- IPhonePlayer\n- Android\n- LinuxPlayer\n- LinuxEditor\n- WebGLPlayer\n- WSAPlayerX86\n- WSAPlayerX64\n- WSAPlayerARM\n- TizenPlayer\n- PSP2\n- PS4\n- XboxOne\n- SamsungTVPlayer\n- WiiU\n- tvOS\n- Switch\n\n官方文档:[https://docs.unity3d.com/ScriptReference/RuntimePlatform.html](https://docs.unity3d.com/ScriptReference/RuntimePlatform.html \"https://docs.unity3d.com/ScriptReference/RuntimePlatform.html\")","data":{"title":"Unity平台判断","date":"2017-06-27","tags":["Unity","CSharp"],"category":"Unity"},"isEmpty":false,"excerpt":"\n\u003e Unity 平台的判断包含编译时判断和运行时判断，总结如下：\n\n"},{"id":"linux-vi","file":"linux-vi.md","excerptHtml":"\u003c
