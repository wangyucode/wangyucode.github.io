-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"comments","file":"comments.md","excerptHtml":"\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e解决方案\u003c/h2\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e动态自建\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e需要数据库存储，后台接口，以及前端页面等都自己实现。\n\u003cstrong\u003e优点\u003c/strong\u003e：所有技术和数据都在自己手中，可控性强，安全。\n\u003cstrong\u003e缺点\u003c/strong\u003e：细节很多，包括表结构，顶和踩计数、还有评论的评论（盖楼）、排序、敏感词过滤、审核等等。还是挺大的一个系统\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e静态集成第三方\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e目前流行的有以下几种:\n【\u003ca href=\"https://disqus.com/\" title=\"Disqus\" class=\"text-sky-500 hover:text-sky-400\"\u003eDisqus\u003c/a\u003e】：国外的，因为众所周知的原因，可能被墙。\n【多说】：之前很多人在用，不过已经停止服务了，他们的代码开源在\u003ca href=\"https://github.com/duoshuo\" title=\"github.com/duoshuo\" class=\"text-sky-500 hover:text-sky-400\"\u003egithub.com/duoshuo\u003c/a\u003e，有兴趣可以参考。\n【\u003ca href=\"https://changyan.kuaizhan.com/\" title=\"畅言\" class=\"text-sky-500 hover:text-sky-400\"\u003e畅言\u003c/a\u003e】：搜狐出品。\n【\u003ca href=\"https://gentie.163.com/\" title=\"网易云跟帖\" class=\"text-sky-500 hover:text-sky-400\"\u003e网易云跟帖\u003c/a\u003e】：网易出品。\u003c/p\u003e\n","contentHtml":"\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e解决方案\u003c/h2\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e动态自建\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e需要数据库存储，后台接口，以及前端页面等都自己实现。\n\u003cstrong\u003e优点\u003c/strong\u003e：所有技术和数据都在自己手中，可控性强，安全。\n\u003cstrong\u003e缺点\u003c/strong\u003e：细节很多，包括表结构，顶和踩计数、还有评论的评论（盖楼）、排序、敏感词过滤、审核等等。还是挺大的一个系统\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e静态集成第三方\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e目前流行的有以下几种:\n【\u003ca href=\"https://disqus.com/\" title=\"Disqus\" class=\"text-sky-500 hover:text-sky-400\"\u003eDisqus\u003c/a\u003e】：国外的，因为众所周知的原因，可能被墙。\n【多说】：之前很多人在用，不过已经停止服务了，他们的代码开源在\u003ca href=\"https://github.com/duoshuo\" title=\"github.com/duoshuo\" class=\"text-sky-500 hover:text-sky-400\"\u003egithub.com/duoshuo\u003c/a\u003e，有兴趣可以参考。\n【\u003ca href=\"https://changyan.kuaizhan.com/\" title=\"畅言\" class=\"text-sky-500 hover:text-sky-400\"\u003e畅言\u003c/a\u003e】：搜狐出品。\n【\u003ca href=\"https://gentie.163.com/\" title=\"网易云跟帖\" class=\"text-sky-500 hover:text-sky-400\"\u003e网易云跟帖\u003c/a\u003e】：网易出品。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e选择\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e不想耗费太多精力，也不想重复造轮子，所以选择集成网易云跟帖，也是因为一直对网易的产品比较有好感。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e过程\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003e使用网易账号登陆云跟帖后台；\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003e填写基本信息和相关信息：\n\u003cimg src=\"/images/20170609_pinglun_01.jpg\" alt=\"\" class=\"mx-auto max-h-80\"\u003e\n【图1】\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003e然后就可以获取代码集成了：\n\u003cimg src=\"/images/20170609_pinglun_02.jpg\" alt=\"\" class=\"mx-auto max-h-80\"\u003e\n【图2】\n代码如下：\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;div id=\"cloud-tie-wrapper\" class=\"cloud-tie-wrapper\"\u003e\u0026#x3C;/div\u003e\n\u0026#x3C;script src=\"https://img1.cache.netease.com/f2e/tie/yun/sdk/loader.js\"\u003e\u0026#x3C;/script\u003e\n\u0026#x3C;script\u003e\nvar cloudTieConfig = {\n  url: document.location.href,\n  sourceId: \"\",\n  productKey: \"32b5a020f7eb416280e9317a050982ac\",\n  target: \"cloud-tie-wrapper\"\n};\nvar yunManualLoad = true;\nTie.loader(\"aHR0cHM6Ly9hcGkuZ2VudGllLjE2My5jb20vcGMvbGl2ZXNjcmlwdC5odG1s\", true);\n\u0026#x3C;/script\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e云跟帖通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eurl\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esourceId\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eproductKey\u003c/code\u003e这三个参数确定唯一的一个网页，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eproductKey\u003c/code\u003e一定要替换成你自己的；\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e因为我在\u003ca href=\"https://wangyucode.github.io\" title=\"wangyucode.github.io\" class=\"text-sky-500 hover:text-sky-400\"\u003ewangyucode.github.io\u003c/a\u003e和\u003ca href=\"http://wycode.cn\" title=\"wycode.cn\" class=\"text-sky-500 hover:text-sky-400\"\u003ewycode.cn\u003c/a\u003e都部署了一样的网页，所以我把\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eurl: document.location.href\u003c/code\u003e，替换为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eurl: \"http://wycode.cn/about.html\"\u003c/code\u003e，使github和我自己的服务器上拥有一样的数据。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e后续\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e云跟帖支持数据审核，敏感词过滤等，你可以自主选择显示哪些评论。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e云跟帖支持数据导出，以后要做迁移可以导出数据\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e还支持评论时回推数据到你指定的地址，此功能结合api可以做到产生评论立即推送一条消息到自己的手机，做到消息秒回！\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n## 解决方案\n\n### 动态自建\n需要数据库存储，后台接口，以及前端页面等都自己实现。\n**优点**：所有技术和数据都在自己手中，可控性强，安全。\n**缺点**：细节很多，包括表结构，顶和踩计数、还有评论的评论（盖楼）、排序、敏感词过滤、审核等等。还是挺大的一个系统\n\n### 静态集成第三方\n目前流行的有以下几种:\n【[Disqus](https://disqus.com/ \"Disqus\")】：国外的，因为众所周知的原因，可能被墙。\n【多说】：之前很多人在用，不过已经停止服务了，他们的代码开源在[github.com/duoshuo](https://github.com/duoshuo \"github.com/duoshuo\")，有兴趣可以参考。\n【[畅言](https://changyan.kuaizhan.com/ \"畅言\")】：搜狐出品。\n【[网易云跟帖](https://gentie.163.com/ \"网易云跟帖\")】：网易出品。\n\n\u003c!--more--\u003e\n\n## 选择\n\n不想耗费太多精力，也不想重复造轮子，所以选择集成网易云跟帖，也是因为一直对网易的产品比较有好感。\n\n## 过程\n\n1.  使用网易账号登陆云跟帖后台；\n\n2.  填写基本信息和相关信息：\n![](/images/20170609_pinglun_01.jpg)\n【图1】\n3.  然后就可以获取代码集成了：\n![](/images/20170609_pinglun_02.jpg)\n【图2】\n 代码如下：\n```html\n\u003cdiv id=\"cloud-tie-wrapper\" class=\"cloud-tie-wrapper\"\u003e\u003c/div\u003e\n\u003cscript src=\"https://img1.cache.netease.com/f2e/tie/yun/sdk/loader.js\"\u003e\u003c/script\u003e\n\u003cscript\u003e\nvar cloudTieConfig = {\n  url: document.location.href,\n  sourceId: \"\",\n  productKey: \"32b5a020f7eb416280e9317a050982ac\",\n  target: \"cloud-tie-wrapper\"\n};\nvar yunManualLoad = true;\nTie.loader(\"aHR0cHM6Ly9hcGkuZ2VudGllLjE2My5jb20vcGMvbGl2ZXNjcmlwdC5odG1s\", true);\n\u003c/script\u003e\n```\n云跟帖通过`url`、`sourceId`、`productKey`这三个参数确定唯一的一个网页，`productKey`一定要替换成你自己的；\n\n因为我在[wangyucode.github.io](https://wangyucode.github.io \"wangyucode.github.io\")和[wycode.cn](http://wycode.cn \"wycode.cn\")都部署了一样的网页，所以我把`url: document.location.href`，替换为`url: \"http://wycode.cn/about.html\"`，使github和我自己的服务器上拥有一样的数据。\n\n## 后续\n- 云跟帖支持数据审核，敏感词过滤等，你可以自主选择显示哪些评论。\n- 云跟帖支持数据导出，以后要做迁移可以导出数据\n- 还支持评论时回推数据到你指定的地址，此功能结合api可以做到产生评论立即推送一条消息到自己的手机，做到消息秒回！\n","data":{"title":"给自己的网站添加评论功能","date":"2017-06-09","tags":["HTML","CSS","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n## 解决方案\n\n### 动态自建\n需要数据库存储，后台接口，以及前端页面等都自己实现。\n**优点**：所有技术和数据都在自己手中，可控性强，安全。\n**缺点**：细节很多，包括表结构，顶和踩计数、还有评论的评论（盖楼）、排序、敏感词过滤、审核等等。还是挺大的一个系统\n\n### 静态集成第三方\n目前流行的有以下几种:\n【[Disqus](https://disqus.com/ \"Disqus\")】：国外的，因为众所周知的原因，可能被墙。\n【多说】：之前很多人在用，不过已经停止服务了，他们的代码开源在[github.com/duoshuo](https://github.com/duoshuo \"github.com/duoshuo\")，有兴趣可以参考。\n【[畅言](https://changyan.kuaizhan.com/ \"畅言\")】：搜狐出品。\n【[网易云跟帖](https://gentie.163.com/ \"网易云跟帖\")】：网易出品。\n\n"},{"id":"why-blog","file":"why-blog.md","excerptHtml":"\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于目的\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e奥威尔说作家写作的四大动机：纯粹的自我中心、审美方面的热情、历史方面的冲动以及政治方面的目的。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e说起目的，作家们的目的都太大了，按照奥威尔的说法，我的目的可能就只是停留在第一种，纯粹的自我中心吧。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我觉得，就单纯第一种也有不一样的层次和境界，目前我的需求只是记录自己，沉淀技术，而希望有一天我写的东西能够帮助到自己，或者帮助到别人。最终有一天能够成为自我实现的必要条件。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e有人问一位登山家为什么要去登山——谁都知道登山这件事既危险，又没什么实际的好处，他回答道：“因为那座山峰在那里。”\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于目的\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e奥威尔说作家写作的四大动机：纯粹的自我中心、审美方面的热情、历史方面的冲动以及政治方面的目的。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e说起目的，作家们的目的都太大了，按照奥威尔的说法，我的目的可能就只是停留在第一种，纯粹的自我中心吧。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我觉得，就单纯第一种也有不一样的层次和境界，目前我的需求只是记录自己，沉淀技术，而希望有一天我写的东西能够帮助到自己，或者帮助到别人。最终有一天能够成为自我实现的必要条件。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e有人问一位登山家为什么要去登山——谁都知道登山这件事既危险，又没什么实际的好处，他回答道：“因为那座山峰在那里。”\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于技术\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e以前总是不屑于写博客，觉得CSDN上鱼龙混杂，有很多误人子弟的文章。一方面怕自己学书浅薄，一方面也是太懒，觉得搜索比写作效率高太多。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e为了逐渐形成自己的一套知识体系，构建自己的技能树，不断的增加枝叶，又不脱落的一个重要方式就是写作总结。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e智慧又不失敏捷的方式只有一个：永远不要停止学习。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e后记\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e万事开头难，以后会慢慢将自己学到的东西记录下来。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eIdeas worth spreading\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e接下来的计划\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e1.自定义博客主题\n2.为博客和网站添加评论功能\n3.在博客中记录以上过程\u003c/p\u003e\n","content":"\n\n## 关于目的\n\u003e 奥威尔说作家写作的四大动机：纯粹的自我中心、审美方面的热情、历史方面的冲动以及政治方面的目的。\n\n说起目的，作家们的目的都太大了，按照奥威尔的说法，我的目的可能就只是停留在第一种，纯粹的自我中心吧。\n\n我觉得，就单纯第一种也有不一样的层次和境界，目前我的需求只是记录自己，沉淀技术，而希望有一天我写的东西能够帮助到自己，或者帮助到别人。最终有一天能够成为自我实现的必要条件。\n\n\u003e 有人问一位登山家为什么要去登山——谁都知道登山这件事既危险，又没什么实际的好处，他回答道：“因为那座山峰在那里。”\n\n\u003c!--more--\u003e\n\n## 关于技术\n以前总是不屑于写博客，觉得CSDN上鱼龙混杂，有很多误人子弟的文章。一方面怕自己学书浅薄，一方面也是太懒，觉得搜索比写作效率高太多。\n\n为了逐渐形成自己的一套知识体系，构建自己的技能树，不断的增加枝叶，又不脱落的一个重要方式就是写作总结。\n\n\u003e 智慧又不失敏捷的方式只有一个：永远不要停止学习。\n\n## 后记\n万事开头难，以后会慢慢将自己学到的东西记录下来。\n\u003e Ideas worth spreading\n\n### 接下来的计划\n1.自定义博客主题\n2.为博客和网站添加评论功能\n3.在博客中记录以上过程","data":{"title":"我为什么开始写博客了？","date":"2017-06-08","tags":null,"category":"Story"},"isEmpty":false,"excerpt":"\n\n## 关于目的\n\u003e 奥威尔说作家写作的四大动机：纯粹的自我中心、审美方面的热情、历史方面的冲动以及政治方面的目的。\n\n说起目的，作家们的目的都太大了，按照奥威尔的说法，我的目的可能就只是停留在第一种，纯粹的自我中心吧。\n\n我觉得，就单纯第一种也有不一样的层次和境界，目前我的需求只是记录自己，沉淀技术，而希望有一天我写的东西能够帮助到自己，或者帮助到别人。最终有一天能够成为自我实现的必要条件。\n\n\u003e 有人问一位登山家为什么要去登山——谁都知道登山这件事既危险，又没什么实际的好处，他回答道：“因为那座山峰在那里。”\n\n"},{"id":"git-error","file":"git-error.md","excerptHtml":"\u003ch1\u003e解决 invalid format \u003ca href=\"mailto:git@github.com\" class=\"text-sky-500 hover:text-sky-400\"\u003egit@github.com\u003c/a\u003e: Permission denied (publickey).\u003c/h1\u003e\n\u003cp class=\"mb-4\"\u003egit在远端pull或者push时报：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003einvalid format git@github.com: Permission denied (publickey).\n\u003c/code\u003e\u003c/pre\u003e\n","contentHtml":"\u003ch1\u003e解决 invalid format \u003ca href=\"mailto:git@github.com\" class=\"text-sky-500 hover:text-sky-400\"\u003egit@github.com\u003c/a\u003e: Permission denied (publickey).\u003c/h1\u003e\n\u003cp class=\"mb-4\"\u003egit在远端pull或者push时报：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003einvalid format git@github.com: Permission denied (publickey).\n\u003c/code\u003e\u003c/pre\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e问题场景：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003ewindows上把private key的内容复制到文本编辑器时会出现\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e根本原因：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e私钥的换行是单字符\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLF\u003c/code\u003e，但windows的默认换行符是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCRLF\u003c/code\u003e，所以导致git读取私钥报格式错误。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e解决办法：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用文本编辑器修改换行符，例如VSCODE中状态栏点击\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCRLF\u003c/code\u003e，然后切换成\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLF\u003c/code\u003e。\u003c/p\u003e\n","content":"\n# 解决 invalid format git@github.com: Permission denied (publickey).\n\ngit在远端pull或者push时报：\n\n```\ninvalid format git@github.com: Permission denied (publickey).\n```\n\n\u003c!--more--\u003e\n\n## 问题场景：\n\nwindows上把private key的内容复制到文本编辑器时会出现\n\n## 根本原因：\n\n私钥的换行是单字符`LF`，但windows的默认换行符是`CRLF`，所以导致git读取私钥报格式错误。\n\n## 解决办法：\n\n使用文本编辑器修改换行符，例如VSCODE中状态栏点击`CRLF`，然后切换成`LF`。\n","data":{"title":"从0开始开发一个评论系统","date":"2015-05-21","tags":["Git"],"category":"Backend"},"isEmpty":false,"excerpt":"\n# 解决 invalid format git@github.com: Permission denied (publickey).\n\ngit在远端pull或者push时报：\n\n```\ninvalid format git@github.com: Permission denied (publickey).\n```\n\n"}],"page":15,"total":15},"__N_SSG":true},"page":"/blog/page/[page]","query":{"page":"15"},"buildId":"KYANdil3ljfaQ9_rbwOmo","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
