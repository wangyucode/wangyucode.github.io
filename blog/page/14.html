late-700 rounded-md text-sm font-mono\"\u003eq!\u003c/code\u003e\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e强制退出（不保存）\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ej\u003c/code\u003e\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e光标向下\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ek\u003c/code\u003e\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e光标向上\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eh\u003c/code\u003e\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e光标向左\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003el\u003c/code\u003e\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e光标向右\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e0\u003c/code\u003e\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e移动光标到行首\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e$\u003c/code\u003e\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e移动光标到行末\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eu\u003c/code\u003e\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e撤销\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ex\u003c/code\u003e\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e删除单个字符\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edd\u003c/code\u003e\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e删除整行\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eyy\u003c/code\u003e\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e复制整行\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ep\u003c/code\u003e\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e粘贴\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n","content":"\n![vim](https://tse1-mm.cn.bing.net/th/id/OIP-C.S7PWetAEkXIKI3Fgncz96wHaFF?pid=ImgDet\u0026rs=1)\n\n## vi特性\n- vi编辑器包含两种模式，命令模式和输入模式\n- 刚进入vi编辑器时是出于命令模式下\n- 命令模式下的按键是对文件的命令\n- 按`i`进入输入模式\n- 按`Esc`退回到命令模式\n\n\u003c!--more--\u003e\n\n## 常用命令\n\n| 命令 | 作用 |\n| ------------ | ------------ |\n| `q` |  退出vi |\n| `wq` | 保存并退出  |\n| `q!` |  强制退出（不保存） |\n| `j` | 光标向下 |\n| `k` |  光标向上 |\n| `h` | 光标向左 |\n| `l` |  光标向右 |\n| `0` | 移动光标到行首 |\n| `$` | 移动光标到行末 |\n| `u` | 撤销 |\n| `x` | 删除单个字符 |\n| `dd` | 删除整行 |\n| `yy` | 复制整行 |\n| `p` | 粘贴 |","data":{"title":"可能是史上最简单的vi/vim教程","date":"2017-06-21","tags":["Linux","vi"],"category":"Linux"},"isEmpty":false,"excerpt":"\n![vim](https://tse1-mm.cn.bing.net/th/id/OIP-C.S7PWetAEkXIKI3Fgncz96wHaFF?pid=ImgDet\u0026rs=1)\n\n## vi特性\n- vi编辑器包含两种模式，命令模式和输入模式\n- 刚进入vi编辑器时是出于命令模式下\n- 命令模式下的按键是对文件的命令\n- 按`i`进入输入模式\n- 按`Esc`退回到命令模式\n\n"},{"id":"SEO","file":"SEO.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍SEO相关知识和实践\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍SEO相关知识和实践\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e如何对搜索引擎的爬虫友好引导是关键\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003erobots.txt\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这个文件告诉爬虫，哪里可以去，哪里不能去。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eSitemap\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e直接给爬虫一张地图，不用费劲乱爬了\u003c/p\u003e\n","content":"\n\u003e 本文介绍SEO相关知识和实践\n\n\u003c!--more--\u003e\n如何对搜索引擎的爬虫友好引导是关键\n\n## robots.txt\n这个文件告诉爬虫，哪里可以去，哪里不能去。\n\n## Sitemap\n直接给爬虫一张地图，不用费劲乱爬了\n","data":{"title":"SEO：优化网站排名","date":"2017-06-19","tags":["SEO"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n\u003e 本文介绍SEO相关知识和实践\n\n"},{"id":"Share","file":"Share.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何为Android应用添加分享功能。包含通过原生\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIntent\u003c/code\u003e和利用第三方SDK。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何为Android应用添加分享功能。包含通过原生\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIntent\u003c/code\u003e和利用第三方SDK。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e原生Intent方式\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e大多平台都支持隐式Intent方式发起分享。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e创建隐式 Intent 时，Android 系统通过将 Intent 的内容与在设备上其他应用的清单文件中声明的 Intent 过滤器进行比较，从而找到要启动的相应组件。 如果 Intent 与 Intent 过滤器匹配，则系统将启动该组件，并向其传递 Intent 对象。 如果多个 Intent 过滤器兼容，则系统会显示一个对话框，支持用户选取要使用的应用。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eIntent sendIntent = new Intent();\nsendIntent.setAction(Intent.ACTION_SEND);\nsendIntent.putExtra(Intent.EXTRA_TEXT, textMessage);\nsendIntent.setType(\"text/plain\");\nIntent chooser = Intent.createChooser(sendIntent, \"title\");\nif (sendIntent.resolveActivity(getPackageManager()) != null) {\n    startActivity(chooser);\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里Action设置为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIntent.ACTION_SEND\u003c/code\u003e就是分享（发送）的方式。\n然后通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eputExtra()\u003c/code\u003e 方式传递附加信息，可以是文本、图片等。\n为了每次分享时都选择平台，需要为Intent包装一个Chooser。\n然后就可以启动Activity分享了。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e单独集成第三方（微信、微博）SDK\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e不同的平台有所不同，一般都包括以下流程\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e注册开发者账号\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e填写应用信息，获取应用ID，Key等\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e导入相关SDK依赖\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e集成分享代码\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e集成ShareSDK\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e集成ShareSDK的好处是，提供了统一的接口，抹平了不同平台间API的差异，集成更简单，维护也方便。特别是当你需要集成很多平台的时候。\n但是上面单独集成的前两步还是不可缺少。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e集成微信分享的一些注意事项\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e有时会遇到错误\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e{\"req\":\"e\",\"errCode\":-6,\"transaction\":\"webpage1498805832655\"}\u003c/code\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e微信分享需要经过签名才可以\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e微信Android应用信息的签名那一栏需要填入签名的\u003cstrong\u003eMD5\u003c/strong\u003e值，通过以下命令获取\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003ekeytool -list -v -keystore \u0026#x3C;你的keystore路径\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ekeytool\u003c/code\u003e 是jdk的自带一个命令，类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ejavac\u003c/code\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e签名的\u003cstrong\u003eMD5\u003c/strong\u003e值必须全部小写，并去掉冒号\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e可以在gradle文件中配置以下属性，让开发版本也使用正式签名\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eandroid {\n    ***\n    signingConfigs {\n        debug{\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"keyPassword\"\n        }\n        release {\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"你的keyPassword\"\n        }\n    }\n    ***\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e有时会遇到错误\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003echeckArgs fail, thumbData is invalid\u003c/code\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e图片太大，可以获取缩略图\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eBitmap bmp = BitmapFactory.decodeResource(getResources(),R.drawable.app_icon);\nBitmap thumb = Bitmap.createScaledBitmap(bmp,THUMB_SIZE,THUMB_SIZE,true);\nbmp.recycle();\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e 本文介绍如何为Android应用添加分享功能。包含通过原生`Intent`和利用第三方SDK。\n\n\u003c!--more--\u003e\n## 原生Intent方式\n\n大多平台都支持隐式Intent方式发起分享。\n\n\u003e 创建隐式 Intent 时，Android 系统通过将 Intent 的内容与在设备上其他应用的清单文件中声明的 Intent 过滤器进行比较，从而找到要启动的相应组件。 如果 Intent 与 Intent 过滤器匹配，则系统将启动该组件，并向其传递 Intent 对象。 如果多个 Intent 过滤器兼容，则系统会显示一个对话框，支持用户选取要使用的应用。\n\n```java\nIntent sendIntent = new Intent();\nsendIntent.setAction(Intent.ACTION_SEND);\nsendIntent.putExtra(Intent.EXTRA_TEXT, textMessage);\nsendIntent.setType(\"text/plain\");\nIntent chooser = Intent.createChooser(sendIntent, \"title\");\nif (sendIntent.resolveActivity(getPackageManager()) != null) {\n    startActivity(chooser);\n}\n```\n这里Action设置为`Intent.ACTION_SEND`就是分享（发送）的方式。\n然后通过`putExtra()` 方式传递附加信息，可以是文本、图片等。\n为了每次分享时都选择平台，需要为Intent包装一个Chooser。\n然后就可以启动Activity分享了。\n\n## 单独集成第三方（微信、微博）SDK\n\n不同的平台有所不同，一般都包括以下流程\n- 注册开发者账号\n- 填写应用信息，获取应用ID，Key等\n- 导入相关SDK依赖\n- 集成分享代码\n\n## 集成ShareSDK\n\n集成ShareSDK的好处是，提供了统一的接口，抹平了不同平台间API的差异，集成更简单，维护也方便。特别是当你需要集成很多平台的时候。\n但是上面单独集成的前两步还是不可缺少。\n\n## 集成微信分享的一些注意事项\n\n有时会遇到错误`{\"req\":\"e\",\"errCode\":-6,\"transaction\":\"webpage1498805832655\"}`\n- 微信分享需要经过签名才可以\n- 微信Android应用信息的签名那一栏需要填入签名的**MD5**值，通过以下命令获取\n\n```bash\nkeytool -list -v -keystore \u003c你的keystore路径\u003e\n```\n\n\u003e`keytool` 是jdk的自带一个命令，类似`javac`\n\n- 签名的**MD5**值必须全部小写，并去掉冒号\n- 可以在gradle文件中配置以下属性，让开发版本也使用正式签名\n\n```\nandroid {\n    ***\n    signingConfigs {\n        debug{\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"keyPassword\"\n        }\n        release {\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"你的keyPassword\"\n        }\n    }\n    ***\n}\n```\n\n有时会遇到错误`checkArgs fail, thumbData is invalid`\n\n- 图片太大，可以获取缩略图\n```java\nBitmap bmp = BitmapFactory.decodeResource(getResources(),R.drawable.app_icon);\nBitmap thumb = Bitmap.createScaledBitmap(bmp,THUMB_SIZE,THUMB_SIZE,true);\nbmp.recycle();\n```","data":{"title":"Android原生分享及第三方分享","date":"2017-06-16","tags":["Android","Wechat"],"category":"Android"},"isEmpty":false,"excerpt":"\n\u003e 本文介绍如何为Android应用添加分享功能。包含通过原生`Intent`和利用第三方SDK。\n\n"},{"id":"gitignore","file":"gitignore.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://res.cloudinary.com/practicaldev/image/fetch/s--DoWbGaGG--/c_imagga_scale,f_auto,fl_progressive,h_420,q_auto,w_1000/https://dev-to-uploads.s3.amazonaws.com/i/gqvc4folezic8qvkjbca.png\" alt=\"gitignore\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件快速配置自动忽略，教程同时适用于Git和SVN。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://res.cloudinary.com/practicaldev/image/fetch/s--DoWbGaGG--/c_imagga_scale,f_auto,fl_progressive,h_420,q_auto,w_1000/https://dev-to-uploads.s3.amazonaws.com/i/gqvc4folezic8qvkjbca.png\" alt=\"gitignore\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件快速配置自动忽略，教程同时适用于Git和SVN。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e应该忽略的文件：\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e*.iml\n.gradle\n/local.properties\n/.idea\n.DS_Store\n**/build\n/captures\n.externalNativeBuild\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.iml\u003c/code\u003e是IDEA的module描述文件，和工程配置相关，在每一个module都有，需要忽略。*表示忽略所有的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.iml\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e使用gitignore\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e这是最简单的方式\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在项目根目录下创建\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件，将上面应该忽略的文件，内容复制到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e用Android Studio打开\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件时会在右上角弹出安装gitignore插件，点击安装即可，安装完成后就自动设置好忽略了，如果要添加忽略文件，只需要在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e中添加文件路径即可。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e自己设置忽略\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e右键点击相应文件，选择相应VCS操作即可。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003egitignore\u003c/code\u003e的官方模板仓库\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e此外github官方提供了一个仓库，里面包含了绝大多数平台，语言的gitignore模板\n\u003ca href=\"https://github.com/github/gitignore\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/github/gitignore\u003c/a\u003e\u003c/p\u003e\n","content":"\n![gitignore](https://res.cloudinary.com/practicaldev/image/fetch/s--DoWbGaGG--/c_imagga_scale,f_auto,fl_progressive,h_420,q_auto,w_1000/https://dev-to-uploads.s3.amazonaws.com/i/gqvc4folezic8qvkjbca.png)\n\n\u003e 本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用`.gitignore`文件快速配置自动忽略，教程同时适用于Git和SVN。\n\n\u003c!--more--\u003e\n\n## 应该忽略的文件：\n```\n*.iml\n.gradle\n/local.properties\n/.idea\n.DS_Store\n**/build\n/captures\n.externalNativeBuild\n```\n- `.iml`是IDEA的module描述文件，和工程配置相关，在每一个module都有，需要忽略。*表示忽略所有的`.iml`\n\n### 使用gitignore\n这是最简单的方式\n\n在项目根目录下创建`.gitignore`文件，将上面应该忽略的文件，内容复制到`.gitignore`中。\n\n用Android Studio打开`.gitignore`文件时会在右上角弹出安装gitignore插件，点击安装即可，安装完成后就自动设置好忽略了，如果要添加忽略文件，只需要在`.gitignore`中添加文件路径即可。\n\n### 自己设置忽略\n\n右键点击相应文件，选择相应VCS操作即可。\n\n### `gitignore`的官方模板仓库\n\n此外github官方提供了一个仓库，里面包含了绝大多数平台，语言的gitignore模板\nhttps://github.com/github/gitignore","data":{"title":"Android Studio工程应该忽略的文件及如何使用gitignore","date":"2017-06-16","tags":["Android","Git","SVN"],"category":"Android"},"isEmpty":false,"excerpt":"\n![gitignore](https://res.cloudinary.com/practicaldev/image/fetch/s--DoWbGaGG--/c_imagga_scale,f_auto,fl_progressive,h_420,q_auto,w_1000/https://dev-to-uploads.s3.amazonaws.com/i/gqvc4folezic8qvkjbca.png)\n\n\u003e 本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用`.gitignore`文件快速配置自动忽略，教程同时适用于Git和SVN。\n\n"}],"page":14,"total":16},"__N_SSG":true},"page":"/blog/page/[page]","query":{"page":"14"},"buildId":"uFO1FMOoBQ2X-GM8G4ZfF","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
