k:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ep\u003c/code\u003e\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e粘贴\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n","content":"\n## vi特性\n- vi编辑器包含两种模式，命令模式和输入模式\n- 刚进入vi编辑器时是出于命令模式下\n- 命令模式下的按键是对文件的命令\n- 按`i`进入输入模式\n- 按`Esc`退回到命令模式\n\n\u003c!--more--\u003e\n\n## 常用命令\n\n| 命令 | 作用 |\n| ------------ | ------------ |\n| `q` |  退出vi |\n| `wq` | 保存并退出  |\n| `q!` |  强制退出（不保存） |\n| `j` | 光标向下 |\n| `k` |  光标向上 |\n| `h` | 光标向左 |\n| `l` |  光标向右 |\n| `0` | 移动光标到行首 |\n| `$` | 移动光标到行末 |\n| `u` | 撤销 |\n| `x` | 删除单个字符 |\n| `dd` | 删除整行 |\n| `yy` | 复制整行 |\n| `p` | 粘贴 |","data":{"title":"可能是史上最简单的vi教程","date":"2017-06-21","tags":["Linux","vi"],"category":"Linux"},"isEmpty":false,"excerpt":"\n## vi特性\n- vi编辑器包含两种模式，命令模式和输入模式\n- 刚进入vi编辑器时是出于命令模式下\n- 命令模式下的按键是对文件的命令\n- 按`i`进入输入模式\n- 按`Esc`退回到命令模式\n\n"},{"id":"SEO","file":"SEO.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍SEO相关知识和实践\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍SEO相关知识和实践\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e如何对搜索引擎的爬虫友好引导是关键\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003erobots.txt\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这个文件告诉爬虫，哪里可以去，哪里不能去。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eSitemap\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e直接给爬虫一张地图，不用费劲乱爬了\u003c/p\u003e\n","content":"\n\u003e 本文介绍SEO相关知识和实践\n\n\u003c!--more--\u003e\n如何对搜索引擎的爬虫友好引导是关键\n\n## robots.txt\n这个文件告诉爬虫，哪里可以去，哪里不能去。\n\n## Sitemap\n直接给爬虫一张地图，不用费劲乱爬了\n","data":{"title":"SEO：优化网站排名","date":"2017-06-19","tags":["SEO"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n\u003e 本文介绍SEO相关知识和实践\n\n"},{"id":"Share","file":"Share.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何为Android应用添加分享功能。包含通过原生\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIntent\u003c/code\u003e和利用第三方SDK。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何为Android应用添加分享功能。包含通过原生\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIntent\u003c/code\u003e和利用第三方SDK。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e原生Intent方式\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e大多平台都支持隐式Intent方式发起分享。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e创建隐式 Intent 时，Android 系统通过将 Intent 的内容与在设备上其他应用的清单文件中声明的 Intent 过滤器进行比较，从而找到要启动的相应组件。 如果 Intent 与 Intent 过滤器匹配，则系统将启动该组件，并向其传递 Intent 对象。 如果多个 Intent 过滤器兼容，则系统会显示一个对话框，支持用户选取要使用的应用。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eIntent sendIntent = new Intent();\nsendIntent.setAction(Intent.ACTION_SEND);\nsendIntent.putExtra(Intent.EXTRA_TEXT, textMessage);\nsendIntent.setType(\"text/plain\");\nIntent chooser = Intent.createChooser(sendIntent, \"title\");\nif (sendIntent.resolveActivity(getPackageManager()) != null) {\n    startActivity(chooser);\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里Action设置为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIntent.ACTION_SEND\u003c/code\u003e就是分享（发送）的方式。\n然后通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eputExtra()\u003c/code\u003e 方式传递附加信息，可以是文本、图片等。\n为了每次分享时都选择平台，需要为Intent包装一个Chooser。\n然后就可以启动Activity分享了。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e单独集成第三方（微信、微博）SDK\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e不同的平台有所不同，一般都包括以下流程\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e注册开发者账号\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e填写应用信息，获取应用ID，Key等\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e导入相关SDK依赖\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e集成分享代码\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e集成ShareSDK\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e集成ShareSDK的好处是，提供了统一的接口，抹平了不同平台间API的差异，集成更简单，维护也方便。特别是当你需要集成很多平台的时候。\n但是上面单独集成的前两步还是不可缺少。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e集成微信分享的一些注意事项\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e有时会遇到错误\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e{\"req\":\"e\",\"errCode\":-6,\"transaction\":\"webpage1498805832655\"}\u003c/code\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e微信分享需要经过签名才可以\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e微信Android应用信息的签名那一栏需要填入签名的\u003cstrong\u003eMD5\u003c/strong\u003e值，通过以下命令获取\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003ekeytool -list -v -keystore \u0026#x3C;你的keystore路径\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ekeytool\u003c/code\u003e 是jdk的自带一个命令，类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ejavac\u003c/code\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e签名的\u003cstrong\u003eMD5\u003c/strong\u003e值必须全部小写，并去掉冒号\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e可以在gradle文件中配置以下属性，让开发版本也使用正式签名\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eandroid {\n    ***\n    signingConfigs {\n        debug{\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"keyPassword\"\n        }\n        release {\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"你的keyPassword\"\n        }\n    }\n    ***\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e有时会遇到错误\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003echeckArgs fail, thumbData is invalid\u003c/code\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e图片太大，可以获取缩略图\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eBitmap bmp = BitmapFactory.decodeResource(getResources(),R.drawable.app_icon);\nBitmap thumb = Bitmap.createScaledBitmap(bmp,THUMB_SIZE,THUMB_SIZE,true);\nbmp.recycle();\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e 本文介绍如何为Android应用添加分享功能。包含通过原生`Intent`和利用第三方SDK。\n\n\u003c!--more--\u003e\n## 原生Intent方式\n\n大多平台都支持隐式Intent方式发起分享。\n\n\u003e 创建隐式 Intent 时，Android 系统通过将 Intent 的内容与在设备上其他应用的清单文件中声明的 Intent 过滤器进行比较，从而找到要启动的相应组件。 如果 Intent 与 Intent 过滤器匹配，则系统将启动该组件，并向其传递 Intent 对象。 如果多个 Intent 过滤器兼容，则系统会显示一个对话框，支持用户选取要使用的应用。\n\n```java\nIntent sendIntent = new Intent();\nsendIntent.setAction(Intent.ACTION_SEND);\nsendIntent.putExtra(Intent.EXTRA_TEXT, textMessage);\nsendIntent.setType(\"text/plain\");\nIntent chooser = Intent.createChooser(sendIntent, \"title\");\nif (sendIntent.resolveActivity(getPackageManager()) != null) {\n    startActivity(chooser);\n}\n```\n这里Action设置为`Intent.ACTION_SEND`就是分享（发送）的方式。\n然后通过`putExtra()` 方式传递附加信息，可以是文本、图片等。\n为了每次分享时都选择平台，需要为Intent包装一个Chooser。\n然后就可以启动Activity分享了。\n\n## 单独集成第三方（微信、微博）SDK\n\n不同的平台有所不同，一般都包括以下流程\n- 注册开发者账号\n- 填写应用信息，获取应用ID，Key等\n- 导入相关SDK依赖\n- 集成分享代码\n\n## 集成ShareSDK\n\n集成ShareSDK的好处是，提供了统一的接口，抹平了不同平台间API的差异，集成更简单，维护也方便。特别是当你需要集成很多平台的时候。\n但是上面单独集成的前两步还是不可缺少。\n\n## 集成微信分享的一些注意事项\n\n有时会遇到错误`{\"req\":\"e\",\"errCode\":-6,\"transaction\":\"webpage1498805832655\"}`\n- 微信分享需要经过签名才可以\n- 微信Android应用信息的签名那一栏需要填入签名的**MD5**值，通过以下命令获取\n\n```bash\nkeytool -list -v -keystore \u003c你的keystore路径\u003e\n```\n\n\u003e`keytool` 是jdk的自带一个命令，类似`javac`\n\n- 签名的**MD5**值必须全部小写，并去掉冒号\n- 可以在gradle文件中配置以下属性，让开发版本也使用正式签名\n\n```\nandroid {\n    ***\n    signingConfigs {\n        debug{\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"keyPassword\"\n        }\n        release {\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"你的keyPassword\"\n        }\n    }\n    ***\n}\n```\n\n有时会遇到错误`checkArgs fail, thumbData is invalid`\n\n- 图片太大，可以获取缩略图\n```java\nBitmap bmp = BitmapFactory.decodeResource(getResources(),R.drawable.app_icon);\nBitmap thumb = Bitmap.createScaledBitmap(bmp,THUMB_SIZE,THUMB_SIZE,true);\nbmp.recycle();\n```","data":{"title":"Android原生分享及第三方分享","date":"2017-06-16","tags":["Android","Wechat"],"category":"Android"},"isEmpty":false,"excerpt":"\n\u003e 本文介绍如何为Android应用添加分享功能。包含通过原生`Intent`和利用第三方SDK。\n\n"},{"id":"gitignore","file":"gitignore.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件快速配置自动忽略，教程同时适用于Git和SVN。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件快速配置自动忽略，教程同时适用于Git和SVN。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e应该忽略的文件：\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e*.iml\n.gradle\n/local.properties\n/.idea\n.DS_Store\n**/build\n/captures\n.externalNativeBuild\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.iml\u003c/code\u003e是IDEA的module描述文件，和工程配置相关，在每一个module都有，需要忽略。*表示忽略所有的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.iml\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e使用gitignore\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e这是最简单的方式\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在项目根目录下创建\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件，将上面应该忽略的文件，内容复制到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e用Android Studio打开\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件时会在右上角弹出安装gitignore插件，点击安装即可，安装完成后就自动设置好忽略了，如果要添加忽略文件，只需要在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e中添加文件路径即可。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e自己设置忽略\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e右键点击相应文件，选择相应VCS操作即可。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003egitignore\u003c/code\u003e的官方模板仓库\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e此外github官方提供了一个仓库，里面包含了绝大多数平台，语言的gitignore模板\n\u003ca href=\"https://github.com/github/gitignore\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/github/gitignore\u003c/a\u003e\u003c/p\u003e\n","content":"\n\u003e 本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用`.gitignore`文件快速配置自动忽略，教程同时适用于Git和SVN。\n\n\u003c!--more--\u003e\n\n## 应该忽略的文件：\n```\n*.iml\n.gradle\n/local.properties\n/.idea\n.DS_Store\n**/build\n/captures\n.externalNativeBuild\n```\n- `.iml`是IDEA的module描述文件，和工程配置相关，在每一个module都有，需要忽略。*表示忽略所有的`.iml`\n\n### 使用gitignore\n这是最简单的方式\n\n在项目根目录下创建`.gitignore`文件，将上面应该忽略的文件，内容复制到`.gitignore`中。\n\n用Android Studio打开`.gitignore`文件时会在右上角弹出安装gitignore插件，点击安装即可，安装完成后就自动设置好忽略了，如果要添加忽略文件，只需要在`.gitignore`中添加文件路径即可。\n\n### 自己设置忽略\n\n右键点击相应文件，选择相应VCS操作即可。\n\n### `gitignore`的官方模板仓库\n\n此外github官方提供了一个仓库，里面包含了绝大多数平台，语言的gitignore模板\nhttps://github.com/github/gitignore","data":{"title":"Android Studio工程应该忽略的文件及如何使用gitignore","date":"2017-06-16","tags":["Android","Git","SVN"],"category":"Android"},"isEmpty":false,"excerpt":"\n\u003e 本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用`.gitignore`文件快速配置自动忽略，教程同时适用于Git和SVN。\n\n"},{"id":"search","file":"search.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何利用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehexo-generator-search\u003c/code\u003e插件为Hexo博客添加本地全文搜索\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e原理\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehexo-generator-search\u003c/code\u003e实际上是根据网页内容生成了一个数据文件，格式是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eXML\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJSON\u003c/code\u003e。然后通过JS代码去匹配这个文件的内容，从而达到搜索的目的。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e最终效果\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170616_search_01.png\" alt=\"最终效果\" title=\"最终效果\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何利用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehexo-generator-search\u003c/code\u003e插件为Hexo博客添加本地全文搜索\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e原理\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehexo-generator-search\u003c/code\u003e实际上是根据网页内容生成了一个数据文件，格式是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eXML\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJSON\u003c/code\u003e。然后通过JS代码去匹配这个文件的内容，从而达到搜索的目的。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e最终效果\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170616_search_01.png\" alt=\"最终效果\" title=\"最终效果\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e步骤\u003c/h2\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e安装 hexo-generator-search\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ npm install hexo-generator-search --save\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e配置\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e_config.yml\u003c/code\u003e中添加\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-yaml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003esearch:\n  path: search.xml\n  field: post\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e使用\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e再次生成博客，就会发现\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epublic\u003c/code\u003e根目录下多了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esearch.xml\u003c/code\u003e文件。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e写一个搜索框：\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBootstrap\u003c/code\u003e框架的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodal\u003c/code\u003e应该是极好的。\n修改Hexo主题，（对此不了解的可以查看我的自定义Hexo主题的相关内容），在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elayout.ejs\u003c/code\u003e中添加一个modal：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;%- partial('_partial/search-modal') %\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e根据Bootstrap文档，modal需要尽量作为 body 标签的直接子元素。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esearch-modal.ejs\u003c/code\u003e的代码如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;div class=\"modal fade\" id=\"searchModal\"\u003e\n    \u0026#x3C;div class=\"modal-dialog modal-lg\" role=\"document\"\u003e\n        \u0026#x3C;div class=\"modal-content\"\u003e\n            \u0026#x3C;div class=\"modal-body\"\u003e\n                \u0026#x3C;i class=\"fa fa-search\" aria-hidden=\"true\"\u003e\u0026#x3C;/i\u003e 搜索\n                \u0026#x3C;input type=\"text\" class=\"form-control\" id=\"searchInput\" placeholder=\"Keyword\"\u003e\n                \u0026#x3C;div class=\"search-content\" id=\"searchResult\"\u003e\u0026#x3C;/div\u003e\n            \u0026#x3C;/div\u003e\n        \u0026#x3C;/div\u003e\n    \u0026#x3C;/div\u003e\n\u0026#x3C;/div\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e链接加上\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edata-toggle=\"modal\"  href=\"#searchModal\"\u003c/code\u003e属性即可实现modal的展开\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e搜索代码：\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e// A local search script with the help of [hexo-generator-search](https://github.com/PaicHyperionDev/hexo-generator-search)\n// Copyright (C) 2015\n// Joseph Pan \u0026#x3C;http://github.com/wzpan\u003e\n// Shuhao Mao \u0026#x3C;http://github.com/maoshuhao\u003e\n// This library is free software; you can redistribute it and/or modify\n// it under the terms of the GNU Lesser General Public License as\n// published by the Free Software Foundation; either version 2.1 of the\n// License, or (at your option) any later version.\n//\n// This library is distributed in the hope that it will be useful, but\n// WITHOUT ANY WARRANTY; without even the implied warranty of\n// MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.  See the GNU\n// Lesser General Public License for more details.\n//\n// You should have received a copy of the GNU Lesser General Public\n// License along with this library; if not, write to the Free Software\n// Foundation, Inc., 51 Franklin Street, Fifth Floor, Boston, MA\n// 02110-1301 USA\n//\n\nvar searchFunc = function(path, search_id, content_id) {\n    'use strict';\n    $.ajax({\n        url: path,\n        dataType: \"xml\",\n        success: function( xmlResponse ) {\n            // get the contents from search data\n            var datas = $( \"entry\", xmlResponse ).map(function() {\n                return {\n                    title: $( \"title\", this ).text(),\n                    content: $(\"content\",this).text(),\n                    url: $( \"url\" , this).text()\n                };\n            }).get();\n\n            var $input = document.getElementById(search_id);\n            var $resultContent = document.getElementById(content_id);\n\n            $input.addEventListener('input', function(){\n                var str='\u0026#x3C;ul class=\\\"search-result-list\\\"\u003e';\n                var keywords = this.value.trim().toLowerCase().split(/[\\s\\-]+/);\n                $resultContent.innerHTML = \"\";\n                if (this.value.trim().length \u0026#x3C;= 0) {\n                    return;\n                }\n                // perform local searching\n                datas.forEach(function(data) {\n                    var isMatch = true;\n                    var content_index = [];\n                    if (!data.title || data.title.trim() === '') {\n                        data.title = \"Untitled\";\n                    }\n                    var data_title = data.title.trim().toLowerCase();\n                    var data_content = data.content.trim().replace(/\u0026#x3C;[^\u003e]+\u003e/g,\"\").toLowerCase();\n                    var data_url = data.url;\n                    var index_title = -1;\n                    var index_content = -1;\n                    var first_occur = -1;\n                    // only match artiles with not empty contents\n                    if (data_content !== '') {\n                        keywords.forEach(function(keyword, i) {\n                            index_title = data_title.indexOf(keyword);\n                            index_content = data_content.indexOf(keyword);\n\n                            if( index_title \u0026#x3C; 0 \u0026#x26;\u0026#x26; index_content \u0026#x3C; 0 ){\n                                isMatch = false;\n                            } else {\n                                if (index_content \u0026#x3C; 0) {\n                                    index_content = 0;\n                                }\n                                if (i == 0) {\n                                    first_occur = index_content;\n                                }\n                                // content_index.push({index_content:index_content, keyword_len:keyword_len});\n                            }\n                        });\n                    } else {\n                        isMatch = false;\n                    }\n                    // show search results\n                    if (isMatch) {\n                        str += \"\u0026#x3C;li\u003e\u0026#x3C;a href='\"+ data_url +\"' class='search-result-title'\u003e\"+ data_title +\"\u0026#x3C;/a\u003e\";\n                        var content = data.content.trim().replace(/\u0026#x3C;[^\u003e]+\u003e/g,\"\");\n                        if (first_occur \u003e= 0) {\n                            // cut out 100 characters\n                            var start = first_occur - 20;\n                            var end = first_occur + 80;\n\n                            if(start \u0026#x3C; 0){\n                                start = 0;\n                            }\n\n                            if(start == 0){\n                                end = 100;\n                            }\n\n                            if(end \u003e content.length){\n                                end = content.length;\n                            }\n\n                            var match_content = content.substr(start, end);\n\n                            // highlight all keywords\n                            keywords.forEach(function(keyword){\n                                var regS = new RegExp(keyword, \"gi\");\n                                match_content = match_content.replace(regS, \"\u0026#x3C;em class=\\\"search-keyword\\\"\u003e\"+keyword+\"\u0026#x3C;/em\u003e\");\n                            });\n\n                            str += \"\u0026#x3C;p class=\\\"search-result\\\"\u003e\" + match_content +\"...\u0026#x3C;/p\u003e\"\n                        }\n                        str += \"\u0026#x3C;/li\u003e\";\n                    }\n                });\n                str += \"\u0026#x3C;/ul\u003e\";\n                $resultContent.innerHTML = str;\n            });\n        }\n    });\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e添加链接\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;%- js('js/search') %\u003e\n\u0026#x3C;script\u003esearchFunc('\u0026#x3C;%= url_for('search.xml') %\u003e', 'searchInput', 'searchResult');\u0026#x3C;/script\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e高亮关键词\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003ekeywords.forEach(function(keyword){\n                            var regS = new RegExp(keyword, \"gi\");\n                            data_title = data_title.replace(regS, \"\u0026#x3C;em class=\\\"search-keyword\\\"\u003e\"+keyword+\"\u0026#x3C;/em\u003e\");\n                        });\n\u003c/code\u003e\u003c/pre\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-css px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e.search-keyword{\n    color: #c7254e;\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e 本文介绍如何利用`hexo-generator-search`插件为Hexo博客添加本地全文搜索\n\n## 原理\n`hexo-generator-search`实际上是根据网页内容生成了一个数据文件，格式是`XML`或者`JSON`。然后通过JS代码去匹配这个文件的内容，从而达到搜索的目的。\n\n## 最终效果\n![最终效果](/images/20170616_search_01.png \"最终效果\")\n\u003c!--more--\u003e\n## 步骤\n\n### 安装 hexo-generator-search\n\n```bash\n$ npm install hexo-generator-search --save\n```\n### 配置\n\n在`_config.yml`中添加\n\n```yaml\nsearch:\n  path: search.xml\n  field: post\n```\n### 使用\n再次生成博客，就会发现`public`根目录下多了`search.xml`文件。\n\n### 写一个搜索框：\n使用`Bootstrap`框架的`modal`应该是极好的。\n修改Hexo主题，（对此不了解的可以查看我的自定义Hexo主题的相关内容），在`layout.ejs`中添加一个modal：\n\n```html\n\u003c%- partial('_partial/search-modal') %\u003e\n```\n\n\u003e 根据Bootstrap文档，modal需要尽量作为 body 标签的直接子元素。\n\n`search-modal.ejs`的代码如下：\n```html\n\u003cdiv class=\"modal fade\" id=\"searchModal\"\u003e\n    \u003cdiv class=\"modal-dialog modal-lg\" role=\"document\"\u003e\n        \u003cdiv class=\"modal-content\"\u003e\n            \u003cdiv class=\"modal-body\"\u003e\n                \u003ci class=\"fa fa-search\" aria-hidden=\"true\"\u003e\u003c/i\u003e 搜索\n                \u003cinput type=\"text\" class=\"form-control\" id=\"searchInput\" placeholder=\"Keyword\"\u003e\n                \u003cdiv class=\"search-content\" id=\"searchResult\"\u003e\u003c/div\u003e\n            \u003c/div\u003e\n        \u003c/div\u003e\n    \u003c/div\u003e\n\u003c/div\u003e\n```\n\n\u003e 链接加上`data-toggle=\"modal\"  href=\"#searchModal\"`属性即可实现modal的展开\n\n### 搜索代码：\n```javascript\n// A local search script with the help of [hexo-generator-search](https://github.com/PaicHyperionDev/hexo-generator-search)\n// Copyright (C) 2015\n// Joseph Pan \u003chttp://github.com/wzpan\u003e\n// Shuhao Mao \u003chttp://github.com/maoshuhao\u003e\n// This library is free software; you can redistribute it and/or modify\n// it under the terms of the GNU Lesser General Public License as\n// published by the Free Software Foundation; either version 2.1 of the\n// License, or (at your option) any later version.\n//\n// This library is distributed in the hope that it will be useful, but\n// WITHOUT ANY WARRANTY; without even the implied warranty of\n// MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.  See the GNU\n// Lesser General Public License for more details.\n//\n// You should have received a copy of the GNU Lesser General Public\n// License along with this library; if not, write to the Free Software\n// Foundation, Inc., 51 Franklin Street, Fifth Floor, Boston, MA\n// 02110-1301 USA\n//\n\nvar searchFunc = function(path, search_id, content_id) {\n    'use strict';\n    $.ajax({\n        url: path,\n        dataType: \"xml\",\n        success: function( xmlResponse ) {\n            // get the contents from search data\n            var datas = $( \"entry\", xmlResponse ).map(function() {\n                return {\n                    title: $( \"title\", this ).text(),\n                    content: $(\"content\",this).text(),\n                    url: $( \"url\" , this).text()\n                };\n            }).get();\n\n            var $input = document.getElementById(search_id);\n            var $resultContent = document.getElementById(content_id);\n\n            $input.addEventListener('input', function(){\n                var str='\u003cul class=\\\"search-result-list\\\"\u003e';\n                var keywords = this.value.trim().toLowerCase().split(/[\\s\\-]+/);\n                $resultContent.innerHTML = \"\";\n                if (this.value.trim().length \u003c= 0) {\n                    return;\n                }\n                // perform local searching\n                datas.forEach(function(data) {\n                    var isMatch = true;\n                    var content_index = [];\n                    if (!data.title || data.title.trim() === '') {\n                        data.title = \"Untitled\";\n                    }\n                    var data_title = data.title.trim().toLowerCase();\n                    var data_content = data.content.trim().replace(/\u003c[^\u003e]+\u003e/g,\"\").toLowerCase();\n                    var data_url = data.url;\n                    var index_title = -1;\n                    var index_content = -1;\n                    var first_occur = -1;\n                    // only match artiles with not empty contents\n                    if (data_content !== '') {\n                        keywords.forEach(function(keyword, i) {\n                            index_title = data_title.indexOf(keyword);\n                            index_content = data_content.indexOf(keyword);\n\n                            if( index_title \u003c 0 \u0026\u0026 index_content \u003c 0 ){\n                                isMatch = false;\n                            } else {\n                                if (index_content \u003c 0) {\n                                    index_content = 0;\n                                }\n                                if (i == 0) {\n                                    first_occur = index_content;\n                                }\n                                // content_index.push({index_content:index_content, keyword_len:keyword_len});\n                            }\n                        });\n                    } else {\n                        isMatch = false;\n                    }\n                    // show search results\n                    if (isMatch) {\n                        str += \"\u003cli\u003e\u003ca href='\"+ data_url +\"' class='search-result-title'\u003e\"+ data_title +\"\u003c/a\u003e\";\n                        var content = data.content.trim().replace(/\u003c[^\u003e]+\u003e/g,\"\");\n                        if (first_occur \u003e= 0) {\n                            // cut out 100 characters\n                            var start = first_occur - 20;\n                            var end = first_occur + 80;\n\n                            if(start \u003c 0){\n                                start = 0;\n                            }\n\n                            if(start == 0){\n                                end = 100;\n                            }\n\n                            if(end \u003e content.length){\n                                end = content.length;\n                            }\n\n                            var match_content = content.substr(start, end);\n\n                            // highlight all keywords\n                            keywords.forEach(function(keyword){\n                                var regS = new RegExp(keyword, \"gi\");\n                                match_content = match_content.replace(regS, \"\u003cem class=\\\"search-keyword\\\"\u003e\"+keyword+\"\u003c/em\u003e\");\n                            });\n\n                            str += \"\u003cp class=\\\"search-result\\\"\u003e\" + match_content +\"...\u003c/p\u003e\"\n                        }\n                        str += \"\u003c/li\u003e\";\n                    }\n                });\n                str += \"\u003c/ul\u003e\";\n                $resultContent.innerHTML = str;\n            });\n        }\n    });\n}\n```\n\n### 添加链接\n```html\n\u003c%- js('js/search') %\u003e\n\u003cscript\u003esearchFunc('\u003c%= url_for('search.xml') %\u003e', 'searchInput', 'searchResult');\u003c/script\u003e\n```\n\n### 高亮关键词\n```javascript\nkeywords.forEach(function(keyword){\n                            var regS = new RegExp(keyword, \"gi\");\n                            data_title = data_title.replace(regS, \"\u003cem class=\\\"search-keyword\\\"\u003e\"+keyword+\"\u003c/em\u003e\");\n                        });\n```\n```css\n.search-keyword{\n    color: #c7254e;\n}\n```\n","data":{"title":"为Hexo博客添加全文搜索","date":"2017-06-15","tags":["XML","jQuery","Ajax","Hexo","Bootstrap"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n\u003e 本文介绍如何利用`hexo-generator-search`插件为Hexo博客添加本地全文搜索\n\n## 原理\n`hexo-generator-search`实际上是根据网页内容生成了一个数据文件，格式是`XML`或者`JSON`。然后通过JS代码去匹配这个文件的内容，从而达到搜索的目的。\n\n## 最终效果\n![最终效果](/images/20170616_search_01.png \"最终效果\")\n"}],"page":14,"total":15},"__N_SSG":true},"page":"/blog/page/[pa
