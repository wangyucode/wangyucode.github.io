cript><script src="/_next/static/uFO1FMOoBQ2X-GM8G4ZfF/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"post":{"id":"tomcat","file":"tomcat.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://pic.baike.soso.com/ugc/baikepic2/18363/cut-20181002011705-1203719514_jpg_267_214_8556.jpg/300\" alt=\"Tomcat\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://pic.baike.soso.com/ugc/baikepic2/18363/cut-20181002011705-1203719514_jpg_267_214_8556.jpg/300\" alt=\"Tomcat\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eTomcat的Server配置\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eTomcat\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003econf\u003c/code\u003e目录下的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eserver.xml\u003c/code\u003e（Linux系统可能在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/etc/tomcat/\u003c/code\u003e下）定义了服务器的相关配置信息。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e根据官方文档，这里的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eServer\u003c/code\u003e指的是整个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCatalina servlet\u003c/code\u003e容器。它的属性代表整个servlet容器的特性。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e常见的如：服务器端口，根项目路径等。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eConnector属性\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e除了配置端口，协议版本，还可以配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eURIEncoding\u003c/code\u003e，默认值是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eISO8859-1\u003c/code\u003e所以不支持中文，我们改成\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUTF-8\u003c/code\u003e即可。即：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-xml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;Connector port=\"80\" protocol=\"HTTP/1.1\"\n               connectionTimeout=\"20000\"\n               redirectPort=\"443\"\n\t           URIEncoding=\"UTF-8\"/\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHTTPS\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通常在配置了HTTPS的服务器上，我们会把80端口转发到443端口上，此时我们要对443端口的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eConnector\u003c/code\u003e也配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eURIEncoding=\"UTF-8\"\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我的问题就出在这。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以上...\u003c/p\u003e\n","content":"\n![Tomcat](https://pic.baike.soso.com/ugc/baikepic2/18363/cut-20181002011705-1203719514_jpg_267_214_8556.jpg/300)\n\n\u003e 今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\n\n\u003c!--more--\u003e\n\n## Tomcat的Server配置\n\nTomcat`conf`目录下的`server.xml`（Linux系统可能在`/etc/tomcat/`下）定义了服务器的相关配置信息。\n\n根据官方文档，这里的`Server`指的是整个`Catalina servlet`容器。它的属性代表整个servlet容器的特性。\n\n常见的如：服务器端口，根项目路径等。\n\n## Connector属性\n\n除了配置端口，协议版本，还可以配置`URIEncoding`，默认值是`ISO8859-1`所以不支持中文，我们改成`UTF-8`即可。即：\n\n```xml\n\u003cConnector port=\"80\" protocol=\"HTTP/1.1\"\n               connectionTimeout=\"20000\"\n               redirectPort=\"443\"\n\t           URIEncoding=\"UTF-8\"/\u003e\n```\n\n## HTTPS\n\n通常在配置了HTTPS的服务器上，我们会把80端口转发到443端口上，此时我们要对443端口的`Connector`也配置`URIEncoding=\"UTF-8\"`\n\n\n我的问题就出在这。\n\n\n以上...\n\n\n\n\n\n","data":{"title":"SwaggerUI GET请求中文乱码问题解决","date":"2018-04-11","tags":["Swagger","Spring","Tomcat"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![Tomcat](https://pic.baike.soso.com/ugc/baikepic2/18363/cut-20181002011705-1203719514_jpg_267_214_8556.jpg/300)\n\n\u003e 今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\n\n"}},"__N_SSG":true},"page":"/blog/[pid]","query":{"pid":"tomcat"},"buildId":"uFO1FMOoBQ2X-GM8G4ZfF","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
