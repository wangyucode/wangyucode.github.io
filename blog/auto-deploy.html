cript><script src="/_next/static/NDkQWnMtEcy0IDQqDGEkS/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"post":{"id":"auto-deploy","file":"auto-deploy.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20200512_auto_deploy.png\" alt=\"flow\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e之前写过一篇文章关于\u003ca href=\"/2020-10-28-github-action.html\" class=\"text-sky-500 hover:text-sky-400\"\u003e使用Github Action进行持续集成\u003c/a\u003e。\n但是如何将构建好的软件包，分发到运行环境？托付给自动化服务后如何保证服务器安全？Docker化部署的话，服务器上的Docker引擎如何自动检查、拉取、运行最新的镜像？\n本文介绍如何解决这些问题。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20200512_auto_deploy.png\" alt=\"flow\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e之前写过一篇文章关于\u003ca href=\"/2020-10-28-github-action.html\" class=\"text-sky-500 hover:text-sky-400\"\u003e使用Github Action进行持续集成\u003c/a\u003e。\n但是如何将构建好的软件包，分发到运行环境？托付给自动化服务后如何保证服务器安全？Docker化部署的话，服务器上的Docker引擎如何自动检查、拉取、运行最新的镜像？\n本文介绍如何解决这些问题。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e镜像分发\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e对于Docker构建的镜像，我们可以将其推送到Docker hub之类的镜像仓库。\n然后在服务器上运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edocker pull \u0026#x3C;Image Name\u003e\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edocker-compose pull \u0026#x3C;Service\u003e\u003c/code\u003e就可以将镜像拉下来。\n然后再重新运行就可以了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这种方式解决了服务器的安全问题。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e但是如何将这一套流程自动化呢。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e自动检查镜像更新和重新运行\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e一个思路就是专门写一个守护程序，在接收到某种API请求时，执行以上的操作。但是这样它就脱离了Docker的管理，而且其本身也是需要维护和部署的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e但是如果将它也作为Docker镜像的话，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eContainer\u003c/code\u003e又如何控制宿主机中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDocker Engine\u003c/code\u003e呢？\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这也有办法，我们只需要将\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHost\u003c/code\u003e的Docker域套接字(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUNIX domain socket\u003c/code\u003e)，挂载到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eContainer\u003c/code\u003e中：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edocker run ... -v /var/run/docker.sock:/var/run/docker.sock\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e因为Docker是CS模式，这样\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eContainer\u003c/code\u003e就可以控制宿主机的Docker引擎，以实现上述操作了。有人将其称为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDocker in Docker\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而以上这个思路已经有人造好轮子了。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eWatchtower\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eWatchtower本身就是一个Docker镜像，支持定时、或者API Hook等方式触发检查，在发现有更新的镜像时，它会停止当前运行的容器，自动拉取镜像，重新以之前运行的参数重启容器，完美解决我们的需求。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e最终的流程参考文章开头的流程图。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这样一来，我们只需要push代码，Github Action会自动构建Docker镜像并push到Docker hub，然后curl一下我们的watchtower，它就会自动帮我们拉取并运行最新的镜像了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e省了不少时间，最重要的：\u003cstrong\u003e不要内卷，要work-life balance\u003c/strong\u003e\u003c/p\u003e\n","content":"\n![flow](/images/20200512_auto_deploy.png)\n\n\u003e 之前写过一篇文章关于[使用Github Action进行持续集成](/2020-10-28-github-action.html)。\n但是如何将构建好的软件包，分发到运行环境？托付给自动化服务后如何保证服务器安全？Docker化部署的话，服务器上的Docker引擎如何自动检查、拉取、运行最新的镜像？\n本文介绍如何解决这些问题。\n\n\u003c!--more--\u003e\n\n## 镜像分发\n\n对于Docker构建的镜像，我们可以将其推送到Docker hub之类的镜像仓库。\n然后在服务器上运行`docker pull \u003cImage Name\u003e`或者`docker-compose pull \u003cService\u003e`就可以将镜像拉下来。\n然后再重新运行就可以了。\n\n这种方式解决了服务器的安全问题。\n\n但是如何将这一套流程自动化呢。\n\n## 自动检查镜像更新和重新运行\n\n一个思路就是专门写一个守护程序，在接收到某种API请求时，执行以上的操作。但是这样它就脱离了Docker的管理，而且其本身也是需要维护和部署的。\n\n但是如果将它也作为Docker镜像的话，`Container`又如何控制宿主机中的`Docker Engine`呢？\n\n这也有办法，我们只需要将`Host`的Docker域套接字(`UNIX domain socket`)，挂载到`Container`中：\n\n```bash\ndocker run ... -v /var/run/docker.sock:/var/run/docker.sock\n```\n\n因为Docker是CS模式，这样`Container`就可以控制宿主机的Docker引擎，以实现上述操作了。有人将其称为`Docker in Docker`。\n\n而以上这个思路已经有人造好轮子了。\n\n## Watchtower\n\nWatchtower本身就是一个Docker镜像，支持定时、或者API Hook等方式触发检查，在发现有更新的镜像时，它会停止当前运行的容器，自动拉取镜像，重新以之前运行的参数重启容器，完美解决我们的需求。\n\n最终的流程参考文章开头的流程图。\n\n这样一来，我们只需要push代码，Github Action会自动构建Docker镜像并push到Docker hub，然后curl一下我们的watchtower，它就会自动帮我们拉取并运行最新的镜像了。\n\n省了不少时间，最重要的：**不要内卷，要work-life balance**\n","data":{"title":"基于Docker的自动化部署","date":"2021-05-09","tags":["Watchtower","Docker","NodeJS"],"category":"CI CD"},"isEmpty":false,"excerpt":"\n![flow](/images/20200512_auto_deploy.png)\n\n\u003e 之前写过一篇文章关于[使用Github Action进行持续集成](/2020-10-28-github-action.html)。\n但是如何将构建好的软件包，分发到运行环境？托付给自动化服务后如何保证服务器安全？Docker化部署的话，服务器上的Docker引擎如何自动检查、拉取、运行最新的镜像？\n本文介绍如何解决这些问题。\n\n"}},"__N_SSG":true},"page":"/blog/[pid]","query":{"pid":"auto-deploy"},"buildId":"NDkQWnMtEcy0IDQqDGEkS","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
