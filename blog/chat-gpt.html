cript><script src="/_next/static/7YMuoTtyITfiinBiv1T76/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"post":{"id":"chat-gpt","file":"chat-gpt.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://cdn.openai.com/chatgpt/draft-20221129c/ChatGPT_Diagram.svg\" alt=\"ChatGPT\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eChatGPT是OpenAI在2022年11月推出的新一代由人工智能技术推动的自然语言处理模型。ChatGPT公布没多久，各大搜索引擎厂商都宣布正在开发自己的新版NPL模型，也是因为他们感受到了来自ChatGPT的压力。它能够理解并生成人类语言，能够回答问题，撰写文案，写诗歌，编故事，写代码，做Excel表格，它拥有上下文对话能力，在典型的使用场景下难以分辨是真人还是机器。ChatGPT被认为是下一代的搜索引，将会引起新一轮的技术革新浪潮。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本文介绍ChatGPT背后的工作原理和训练过程。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://cdn.openai.com/chatgpt/draft-20221129c/ChatGPT_Diagram.svg\" alt=\"ChatGPT\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eChatGPT是OpenAI在2022年11月推出的新一代由人工智能技术推动的自然语言处理模型。ChatGPT公布没多久，各大搜索引擎厂商都宣布正在开发自己的新版NPL模型，也是因为他们感受到了来自ChatGPT的压力。它能够理解并生成人类语言，能够回答问题，撰写文案，写诗歌，编故事，写代码，做Excel表格，它拥有上下文对话能力，在典型的使用场景下难以分辨是真人还是机器。ChatGPT被认为是下一代的搜索引，将会引起新一轮的技术革新浪潮。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本文介绍ChatGPT背后的工作原理和训练过程。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e罗马不是一天建成的\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eChatGPT脱胎于InstructGPT，而InstructGPT的前身是GPT-3，GPT-3的诞生就已经引起了业界的轰动，它的模型参数达到了1750亿，这比谷歌的BERT模型3.7亿参数大了400多倍。并且GPT-3可以使用很小的数据集来训练。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eGPT-3的缺陷：由于GPT-3使用使用互联网上巨大的数据集训练来预测下一个词，而不是去符合用户的期待，所以它难免会输出不可信的，或者有害的信息，负面的情绪等。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eInstructGPT的改进：通过基于人类反馈的强化学习（RLHF - reinforcement learning from human feedback），通过人类对模型的输出进行评分反馈来优化模型的行为。这使得模型更倾向于听人话而不是胡说八道。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eInstructGPT的训练过程\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e使用人工生成的示例 + 监督学习 + GPT-3训练一个模型出来\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e然后不同模型生成多种输出 + 人工标记 训练一个奖励模型\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e通过奖励模型 + 强化学习 + PPO算法 训练一开始的模型\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e由于步骤2要使用人工标记，这与预训练的模型数据量相比还不到2%，尽管对比GPT-3已经有了很大改进，InstructGPT也并不是完全安全的，它仍然会生成有偏见的输出，撒谎，输出有毒的内容。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eOpenAI也提到，目前训练的数据基于讲英语的社会价值观，最终需要更负责任和包容的选择。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eChatGPT更进一步\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eChatGPT的基础模型来自于训练GPT-3.5, 这个GPT-3.5是由一个代码补全模型，经InstructGPT优化而来。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e训练人员通过扮演用户和AI助手来生成模板对话，并将这些数据混合到InstructGPT的数据集中，然后将模型变成了一种对话的格式。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e和InstructGPT一样地，通过对模型的输出进行随机采样和人工评分。然后用得到的奖励模型，使用强化学习对初始模型进行训练。并对这个过程进行数次迭代。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e持续进化\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eChatGPT也不是完美的，但是它在持续进化，OpenAI做了一个网页聊天室\u003ca href=\"https://chat.openai.com/\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://chat.openai.com/\u003c/a\u003e，让ChatGPT接受来自更多用户的测试和评价。\n此外集成了ChatGPT的新版Bing在公测中。\nOpenAI肯定会基于收集的大量测试数据和用户反馈来升级和更新模型。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e真正的通用人工智能，或是有自由意识的人工智能还有多远，我们拭目以待。\u003c/p\u003e\n","content":"\n![ChatGPT](https://cdn.openai.com/chatgpt/draft-20221129c/ChatGPT_Diagram.svg)\n\nChatGPT是OpenAI在2022年11月推出的新一代由人工智能技术推动的自然语言处理模型。ChatGPT公布没多久，各大搜索引擎厂商都宣布正在开发自己的新版NPL模型，也是因为他们感受到了来自ChatGPT的压力。它能够理解并生成人类语言，能够回答问题，撰写文案，写诗歌，编故事，写代码，做Excel表格，它拥有上下文对话能力，在典型的使用场景下难以分辨是真人还是机器。ChatGPT被认为是下一代的搜索引，将会引起新一轮的技术革新浪潮。\n\n本文介绍ChatGPT背后的工作原理和训练过程。\n\n\u003c!--more--\u003e\n\n## 罗马不是一天建成的\n\nChatGPT脱胎于InstructGPT，而InstructGPT的前身是GPT-3，GPT-3的诞生就已经引起了业界的轰动，它的模型参数达到了1750亿，这比谷歌的BERT模型3.7亿参数大了400多倍。并且GPT-3可以使用很小的数据集来训练。\n\nGPT-3的缺陷：由于GPT-3使用使用互联网上巨大的数据集训练来预测下一个词，而不是去符合用户的期待，所以它难免会输出不可信的，或者有害的信息，负面的情绪等。\n\nInstructGPT的改进：通过基于人类反馈的强化学习（RLHF - reinforcement learning from human feedback），通过人类对模型的输出进行评分反馈来优化模型的行为。这使得模型更倾向于听人话而不是胡说八道。\n\n## InstructGPT的训练过程\n\n1. 使用人工生成的示例 + 监督学习 + GPT-3训练一个模型出来\n2. 然后不同模型生成多种输出 + 人工标记 训练一个奖励模型\n3. 通过奖励模型 + 强化学习 + PPO算法 训练一开始的模型\n\n由于步骤2要使用人工标记，这与预训练的模型数据量相比还不到2%，尽管对比GPT-3已经有了很大改进，InstructGPT也并不是完全安全的，它仍然会生成有偏见的输出，撒谎，输出有毒的内容。\n\nOpenAI也提到，目前训练的数据基于讲英语的社会价值观，最终需要更负责任和包容的选择。\n\n## ChatGPT更进一步\n\n- ChatGPT的基础模型来自于训练GPT-3.5, 这个GPT-3.5是由一个代码补全模型，经InstructGPT优化而来。\n- 训练人员通过扮演用户和AI助手来生成模板对话，并将这些数据混合到InstructGPT的数据集中，然后将模型变成了一种对话的格式。\n- 和InstructGPT一样地，通过对模型的输出进行随机采样和人工评分。然后用得到的奖励模型，使用强化学习对初始模型进行训练。并对这个过程进行数次迭代。\n\n## 持续进化\n\nChatGPT也不是完美的，但是它在持续进化，OpenAI做了一个网页聊天室\u003chttps://chat.openai.com/\u003e，让ChatGPT接受来自更多用户的测试和评价。\n此外集成了ChatGPT的新版Bing在公测中。\nOpenAI肯定会基于收集的大量测试数据和用户反馈来升级和更新模型。\n\n真正的通用人工智能，或是有自由意识的人工智能还有多远，我们拭目以待。\n\n\n\n\n","data":{"title":"ChatGPT是如何被训练出来的","date":"2022-12-01","tags":["ChatGPT"],"category":"AI"},"isEmpty":false,"excerpt":"\n![ChatGPT](https://cdn.openai.com/chatgpt/draft-20221129c/ChatGPT_Diagram.svg)\n\nChatGPT是OpenAI在2022年11月推出的新一代由人工智能技术推动的自然语言处理模型。ChatGPT公布没多久，各大搜索引擎厂商都宣布正在开发自己的新版NPL模型，也是因为他们感受到了来自ChatGPT的压力。它能够理解并生成人类语言，能够回答问题，撰写文案，写诗歌，编故事，写代码，做Excel表格，它拥有上下文对话能力，在典型的使用场景下难以分辨是真人还是机器。ChatGPT被认为是下一代的搜索引，将会引起新一轮的技术革新浪潮。\n\n本文介绍ChatGPT背后的工作原理和训练过程。\n\n"}},"__N_SSG":true},"page":"/blog/[pid]","query":{"pid":"chat-gpt"},"buildId":"7YMuoTtyITfiinBiv1T76","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
