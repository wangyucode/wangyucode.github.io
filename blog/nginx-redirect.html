cript><script src="/_next/static/7YMuoTtyITfiinBiv1T76/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"post":{"id":"nginx-redirect","file":"nginx-redirect.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://nginx.org/nginx.png\" alt=\"NGINX\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e服务器配置Https之后，我们希望同时支持http，但是80端口进来的请求直接重定向到443端口上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e有时我们会将某些网页永久迁移到别的地址，但是又不想让老用户直接无法访问，或者看到404，而是要将这些老地址的请求转发到新地址上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章教你如何配置NGINX重定向。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://nginx.org/nginx.png\" alt=\"NGINX\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e服务器配置Https之后，我们希望同时支持http，但是80端口进来的请求直接重定向到443端口上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e有时我们会将某些网页永久迁移到别的地址，但是又不想让老用户直接无法访问，或者看到404，而是要将这些老地址的请求转发到新地址上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章教你如何配置NGINX重定向。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003eNGINX安装及配置请移步这里：\u003ca href=\"/2018-06-23-nginx.html\" title=\"NGINX安装\" class=\"text-sky-500 hover:text-sky-400\"\u003eNginx安装\u003c/a\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用rewrite\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eserver {\n#...\n\trewrite (.*)$ https://wycode.cn$1 permanent;\n#...\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里将这个server的所有请求，永久定向到 \u003ca href=\"https://wycode.cn\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://wycode.cn\u003c/a\u003e 上，并将请求的path拼接在后面\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用return 301\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eserver {\n\tlisten 443 ssl;\n    listen [::]:443 ssl;\n\n    ssl_certificate /etc/nginx/cert/wycode.pem;\n    ssl_certificate_key /etc/nginx/cert/wycode.key;\n\n    server_name wycode.cn www.wycode.cn;\n\n    error_page 404 = https://wycode.cn/404.html;\n\n    location / {\n        root /var/www/wycode.cn;\n        index index.html;\n        try_files $uri $uri/ =404;\n    }\n}\nserver {\n    listen 80;\n    listen [::]:80;\n    server_name wycode.cn www.wycode.cn;\n    return 301 https://$host$request_uri;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里的第二个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eserver\u003c/code\u003e监听80端口，在下面的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereturn 301\u003c/code\u003e语句中将请求转发到第一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eserver\u003c/code\u003e中去，并且\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehost\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003erequest_uri\u003c/code\u003e不变。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请注明出处!\u003c/p\u003e\n","content":"\n![NGINX](https://nginx.org/nginx.png)\n\n\u003e 服务器配置Https之后，我们希望同时支持http，但是80端口进来的请求直接重定向到443端口上。\n\n\u003e 有时我们会将某些网页永久迁移到别的地址，但是又不想让老用户直接无法访问，或者看到404，而是要将这些老地址的请求转发到新地址上。\n\n这篇文章教你如何配置NGINX重定向。\n\n\u003c!--more--\u003e\n\nNGINX安装及配置请移步这里：[Nginx安装](/2018-06-23-nginx.html \"NGINX安装\")\n\n\n## 使用rewrite\n\n```\nserver {\n#...\n\trewrite (.*)$ https://wycode.cn$1 permanent;\n#...\n}\n```\n这里将这个server的所有请求，永久定向到 https://wycode.cn 上，并将请求的path拼接在后面\n\n## 使用return 301\n\n```\nserver {\n\tlisten 443 ssl;\n    listen [::]:443 ssl;\n\n    ssl_certificate /etc/nginx/cert/wycode.pem;\n    ssl_certificate_key /etc/nginx/cert/wycode.key;\n\n    server_name wycode.cn www.wycode.cn;\n\n    error_page 404 = https://wycode.cn/404.html;\n\n    location / {\n        root /var/www/wycode.cn;\n        index index.html;\n        try_files $uri $uri/ =404;\n    }\n}\nserver {\n    listen 80;\n    listen [::]:80;\n    server_name wycode.cn www.wycode.cn;\n    return 301 https://$host$request_uri;\n}\n```\n\n这里的第二个`server`监听80端口，在下面的`return 301`语句中将请求转发到第一个`server`中去，并且`host`和`request_uri`不变。\n\n以上，转载请注明出处!","data":{"title":"NGINX配置重定向","date":"2019-05-17","tags":["Linux","NGINX"],"category":"Linux"},"isEmpty":false,"excerpt":"\n![NGINX](https://nginx.org/nginx.png)\n\n\u003e 服务器配置Https之后，我们希望同时支持http，但是80端口进来的请求直接重定向到443端口上。\n\n\u003e 有时我们会将某些网页永久迁移到别的地址，但是又不想让老用户直接无法访问，或者看到404，而是要将这些老地址的请求转发到新地址上。\n\n这篇文章教你如何配置NGINX重定向。\n\n"}},"__N_SSG":true},"page":"/blog/[pid]","query":{"pid":"nginx-redirect"},"buildId":"7YMuoTtyITfiinBiv1T76","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
