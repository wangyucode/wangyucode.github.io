\"ml-8\"\u003e当前目录下的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/config\u003c/code\u003e目录中\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e当前目录\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eclasspath下的 /config包\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eclasspath\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eresource文件夹\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e自定义属性的使用\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e添加自定义属性\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emyProperties = myValue\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@Value\u003c/code\u003e注解即可注入使用\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e    @Value(\"${myProperties}\")\n    String value; //value = \"myValue\";\n\u003c/code\u003e\u003c/pre\u003e\n\u003col start=\"3\" class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e还可以使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ConfigurationProperties(\"foo\")\u003c/code\u003e注入POJO实体\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@ConfigurationProperties(\"foo\")\npublic class Foo｛\n    private boolean enabled;\n    public boolean isEnabled() { ... }\n    public void setEnabled(boolean enabled) { ... }\n｝\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e添加属性\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003efoo.enabled = true\u003c/code\u003e即可\u003c/p\u003e\n","content":"\n![Spring](https://tse3-mm.cn.bing.net/th/id/OIP-C.X0Up2Pdq1ZDskAe51Uac4gHaE8?pid=ImgDet\u0026rs=1)\n\n\u003e Spring框架在运行时会自动查找`application.properties`配置文件，在这个文件中进行项目相关配置属性，例如数据库地址密码等。当然也支持自定义属性。\n\n\u003c!--more--\u003e\n\n## 位置\n`application.properties`可以放置在以下目录\n\n- 当前目录下的`/config`目录中\n- 当前目录\n- classpath下的 /config包\n- classpath\n- **resource文件夹**\n\n## 自定义属性的使用\n\n1. 在`application.properties`添加自定义属性`myProperties = myValue`\n2. 使用`@Value`注解即可注入使用\n```java\n    @Value(\"${myProperties}\")\n    String value; //value = \"myValue\";\n```\n3. 还可以使用`@ConfigurationProperties(\"foo\")`注入POJO实体\n```java\n@ConfigurationProperties(\"foo\")\npublic class Foo｛\n    private boolean enabled;\n    public boolean isEnabled() { ... }\n    public void setEnabled(boolean enabled) { ... }\n｝\n```\n在`application.properties`添加属性`foo.enabled = true`即可\n","data":{"title":"Spring中的application.properties","date":"2017-07-11","tags":["Spring","Java"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![Spring](https://tse3-mm.cn.bing.net/th/id/OIP-C.X0Up2Pdq1ZDskAe51Uac4gHaE8?pid=ImgDet\u0026rs=1)\n\n\u003e Spring框架在运行时会自动查找`application.properties`配置文件，在这个文件中进行项目相关配置属性，例如数据库地址密码等。当然也支持自定义属性。\n\n"}},"__N_SSG":true},"page":"/blog/[pid]","query":{"pid":"spring-properties"},"buildId":"NDkQWnMtEcy0IDQqDGEkS","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
