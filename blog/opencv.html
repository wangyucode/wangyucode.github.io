cript><script src="/_next/static/7YMuoTtyITfiinBiv1T76/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"post":{"id":"opencv","file":"opencv.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180308_OpenCV.png\" alt=\"OpenCV\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eOpenCV是一个开源的计算机视觉库，广泛应用于各种图像处理，人脸识别，图像分析，自动驾驶等领域。目前最新版是3.4.1，本文基于最新版编写。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003eOpenCV使用C++编写，采用了模块化的结构，本文将逐个介绍每个模块的主要功能，并将介绍如何使用Java调用OpenCV库。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180308_OpenCV.png\" alt=\"OpenCV\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eOpenCV是一个开源的计算机视觉库，广泛应用于各种图像处理，人脸识别，图像分析，自动驾驶等领域。目前最新版是3.4.1，本文基于最新版编写。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003eOpenCV使用C++编写，采用了模块化的结构，本文将逐个介绍每个模块的主要功能，并将介绍如何使用Java调用OpenCV库。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1.模块\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eCore functionality\u003c/strong\u003e：\u003cstrong\u003e核心功能\u003c/strong\u003e,定义了一些其它模块需要使用的基本功能，以及包括多维数组\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMat\u003c/code\u003e在内的众多数据结构。OpenCV的图像处理主要就是针对\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMat\u003c/code\u003e对象。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eImage processing\u003c/strong\u003e：\u003cstrong\u003e图像处理\u003c/strong\u003e,包括线性和非线性图像滤波，几何图像转换（调整大小，仿射和透视变形，通用基于表格的重新映射），色彩空间转换，直方图等。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eimgcodecs\u003c/strong\u003e：\u003cstrong\u003e图片读写\u003c/strong\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003ecalib3d\u003c/strong\u003e：\u003cstrong\u003e3D处理\u003c/strong\u003e,基本多视图几何算法，单个和立体相机校准，对象姿态估计，立体对应算法以及三维重建元素。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003efeatures2d\u003c/strong\u003e：\u003cstrong\u003e特征点处理\u003c/strong\u003e,显着特征检测器，描述符和描述符匹配器。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eobjdetect\u003c/strong\u003e：\u003cstrong\u003e物体检测\u003c/strong\u003e,物体检测和预定义的类别（例如，脸部，眼睛，杯子，人物，汽车等）。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003ehighgui\u003c/strong\u003e：\u003cstrong\u003eUI\u003c/strong\u003e,一个简单易用的UI接口。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eVideo I/O\u003c/strong\u003e：\u003cstrong\u003e视频IO\u003c/strong\u003e,一个简单易用的视频捕捉和视频编解码器接口。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003egpu\u003c/strong\u003e：\u003cstrong\u003eGPU加速\u003c/strong\u003e,不同OpenCV模块的GPU加速算法。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003ednn\u003c/strong\u003e：\u003cstrong\u003e深度神经网络\u003c/strong\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eml\u003c/strong\u003e：\u003cstrong\u003e机器学习\u003c/strong\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eflann\u003c/strong\u003e：\u003cstrong\u003e多维聚类和搜索\u003c/strong\u003e。包含大数据集中的快速最近邻搜索和高维特征而优化的算法集合。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003ephoto\u003c/strong\u003e：\u003cstrong\u003e照片处理\u003c/strong\u003e，降噪，HDR，无缝克隆，细节增强等。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003estitching\u003c/strong\u003e：\u003cstrong\u003e图像拼接\u003c/strong\u003e，降噪，HDR，无缝克隆，细节增强等。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eshape\u003c/strong\u003e：\u003cstrong\u003e形状\u003c/strong\u003e，形状距离和匹配。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003esuperres\u003c/strong\u003e：\u003cstrong\u003e超分辨率\u003c/strong\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003evideostab\u003c/strong\u003e：\u003cstrong\u003e视频防抖\u003c/strong\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eviz\u003c/strong\u003e：\u003cstrong\u003e3D虚拟化\u003c/strong\u003e。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e还有一些其它扩展模块。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e2.配置Java开发环境\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e下载Windows版OpenCV\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e解压后在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ebuild\u003c/code\u003e文件夹中找到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ejava\u003c/code\u003e文件夹，复制到Java工程的libs文件夹里\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e对\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eopencv-341.jar\u003c/code\u003e添加依赖\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eVM option 添加本地库配置：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e-Djava.library.path=./libs/x64\u003c/code\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e3.Hello OpenCV\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\nMat mat = Imgcodecs.imread(file.getAbsolutePath());\nImgproc.cvtColor(mat, mat, Imgproc.COLOR_BGR2GRAY);\nImgproc.Canny(mat, mat, 5, 20);\nImage img = Utils.mat2Image(mat);\ncontroller.setImage(img);\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e运行结果如图：\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180309_opencv_test.png\" alt=\"OpenCV\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","content":"\n![OpenCV](/images/20180308_OpenCV.png)\n\n\u003e OpenCV是一个开源的计算机视觉库，广泛应用于各种图像处理，人脸识别，图像分析，自动驾驶等领域。目前最新版是3.4.1，本文基于最新版编写。\n\n\nOpenCV使用C++编写，采用了模块化的结构，本文将逐个介绍每个模块的主要功能，并将介绍如何使用Java调用OpenCV库。\n\n\u003c!--more--\u003e\n\n## 1.模块\n\n\n- **Core functionality**：**核心功能**,定义了一些其它模块需要使用的基本功能，以及包括多维数组`Mat`在内的众多数据结构。OpenCV的图像处理主要就是针对`Mat`对象。\n- **Image processing**：**图像处理**,包括线性和非线性图像滤波，几何图像转换（调整大小，仿射和透视变形，通用基于表格的重新映射），色彩空间转换，直方图等。\n- **imgcodecs**：**图片读写**。\n- **calib3d**：**3D处理**,基本多视图几何算法，单个和立体相机校准，对象姿态估计，立体对应算法以及三维重建元素。\n- **features2d**：**特征点处理**,显着特征检测器，描述符和描述符匹配器。\n- **objdetect**：**物体检测**,物体检测和预定义的类别（例如，脸部，眼睛，杯子，人物，汽车等）。\n- **highgui**：**UI**,一个简单易用的UI接口。\n- **Video I/O**：**视频IO**,一个简单易用的视频捕捉和视频编解码器接口。\n- **gpu**：**GPU加速**,不同OpenCV模块的GPU加速算法。\n- **dnn**：**深度神经网络**。\n- **ml**：**机器学习**。\n- **flann**：**多维聚类和搜索**。包含大数据集中的快速最近邻搜索和高维特征而优化的算法集合。\n- **photo**：**照片处理**，降噪，HDR，无缝克隆，细节增强等。\n- **stitching**：**图像拼接**，降噪，HDR，无缝克隆，细节增强等。\n- **shape**：**形状**，形状距离和匹配。\n- **superres**：**超分辨率**。\n- **videostab**：**视频防抖**。\n- **viz**：**3D虚拟化**。\n\n还有一些其它扩展模块。\n\n## 2.配置Java开发环境\n\n1. 下载Windows版OpenCV\n2. 解压后在`build`文件夹中找到`java`文件夹，复制到Java工程的libs文件夹里\n3. 对`opencv-341.jar`添加依赖\n4. VM option 添加本地库配置：`-Djava.library.path=./libs/x64`\n\n\n## 3.Hello OpenCV\n\n```java\n\nMat mat = Imgcodecs.imread(file.getAbsolutePath());\nImgproc.cvtColor(mat, mat, Imgproc.COLOR_BGR2GRAY);\nImgproc.Canny(mat, mat, 5, 20);\nImage img = Utils.mat2Image(mat);\ncontroller.setImage(img);\n```\n\n运行结果如图：\n\n\n![OpenCV](/images/20180309_opencv_test.png)","data":{"title":"OpenCV入门","date":"2018-03-08","tags":["OpenCV","Java"],"category":"AI"},"isEmpty":false,"excerpt":"\n![OpenCV](/images/20180308_OpenCV.png)\n\n\u003e OpenCV是一个开源的计算机视觉库，广泛应用于各种图像处理，人脸识别，图像分析，自动驾驶等领域。目前最新版是3.4.1，本文基于最新版编写。\n\n\nOpenCV使用C++编写，采用了模块化的结构，本文将逐个介绍每个模块的主要功能，并将介绍如何使用Java调用OpenCV库。\n\n"}},"__N_SSG":true},"page":"/blog/[pid]","query":{"pid":"opencv"},"buildId":"7YMuoTtyITfiinBiv1T76","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
