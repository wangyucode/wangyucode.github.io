cript><script src="/_next/static/NDkQWnMtEcy0IDQqDGEkS/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"post":{"id":"rxjava","file":"rxjava.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://cdn-ssl-devio-img.classmethod.jp/wp-content/uploads/2021/08/ReactoveX.png\" alt=\"ReactiveX\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eRxJava是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e的Java分支，除了Java版，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e响应式编程\u003c/code\u003e，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLambda\u003c/code\u003e表达式和链式编程，让程序变得更加简洁优雅。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://cdn-ssl-devio-img.classmethod.jp/wp-content/uploads/2021/08/ReactoveX.png\" alt=\"ReactiveX\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eRxJava是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e的Java分支，除了Java版，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e响应式编程\u003c/code\u003e，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLambda\u003c/code\u003e表达式和链式编程，让程序变得更加简洁优雅。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e看完了RactiveX的简介，觉得用它来封装一个网络请求框架应该是再好不过了，但是当我真正开始封装网络请求时，我发现：RxJava给的答案是，你并不需要去封装，而是\u003cstrong\u003e直接使用\u003c/strong\u003e就好了。实例代码如下。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHello RxJava\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\tpublic void onClick(View v) {\n        Observable.create((ObservableOnSubscribe\u0026#x3C;String\u003e) emitter -\u003e emitter.onNext(httpRequest()))  //1.\n                .subscribeOn(Schedulers.io())  //2.\n                .observeOn(AndroidSchedulers.mainThread())  //3.\n                .subscribe(s -\u003e textView.setText(s));  //4.\n    }\n    \n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e核心代码就是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOnClick\u003c/code\u003e方法中的四行。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e步骤如下：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecreate\u003c/code\u003e函数创建\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eObservable\u003c/code\u003e对象\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e订阅调度到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSchedulers.io()\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eio\u003c/code\u003e是一个有线程缓存的新线程调度器\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e将事件消费调度到Android的主线程上\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e消费者（观察者）代码\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttpRequest()\u003c/code\u003e没用到任何复杂的框架，就用原生的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHttpURLConnection\u003c/code\u003e做一个网络请求，返回请求结果的String，代码如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\tprivate String httpRequest() throws Exception {\n        URL url = new URL(\"http://wycode.cn/\");\n        HttpURLConnection urlConnection = (HttpURLConnection) url.openConnection();\n        String result;\n        try {\n            BufferedInputStream in = new BufferedInputStream(urlConnection.getInputStream());\n            result = readStream(in);\n        } finally {\n            urlConnection.disconnect();\n        }\n        return result;\n    }\n\n    private String readStream(BufferedInputStream in) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(in));\n        StringBuilder sb = new StringBuilder();\n        String line;\n        try {\n            while ((line = reader.readLine()) != null) {\n                sb.append(line).append(\"\\n\");\n            }\n        } catch (IOException e) {\n            e.printStackTrace();\n        } finally {\n            try {\n                in.close();\n            } catch (IOException e) {\n                e.printStackTrace();\n            }\n        }\n        return sb.toString();\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e变换操作\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通常的，我们在请求网络后要对服务器返回的字符串进行解析，这时我们可以使用RxJava的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTransforming\u003c/code\u003e操作，在返回前将JSON String转为实体类。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eObservable.create((ObservableOnSubscribe\u0026#x3C;String\u003e) emitter -\u003e emitter.onNext(httpRequest(\"https://wycode.cn/web/api/public/hello?message=Hello\"))) //1.\n                .map(s -\u003e JSON.parseObject(s,Message.class)) //解析JSON\n                .subscribeOn(Schedulers.io()) //2.\n                .observeOn(AndroidSchedulers.mainThread()) //3.\n                .subscribe(message -\u003e textView.setText(message.message)); //4.\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e可以看到在原有代码几乎没变的情况下，加上1行代码就实现了将Json转为实体再处理的需求。这就是RxJava的魅力。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e完整源码在这里：\u003ca href=\"https://github.com/wangyucode/rxjava\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/rxjava\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而以上也仅仅用到了RxJava的冰山一角，还有各种各样的函数来满足各种各样的需求。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e函数列表在这里：\u003ca href=\"http://reactivex.io/documentation/operators.html\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttp://reactivex.io/documentation/operators.html\u003c/a\u003e\u003c/p\u003e\n","content":"\n![ReactiveX](https://cdn-ssl-devio-img.classmethod.jp/wp-content/uploads/2021/08/ReactoveX.png)\n\n\u003e RxJava是`ReactiveX`的Java分支，除了Java版，`ReactiveX`还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\n\n\n\u003e ReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为`响应式编程`，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上`Lambda`表达式和链式编程，让程序变得更加简洁优雅。\n\n\u003c!--more--\u003e\n\n\n看完了RactiveX的简介，觉得用它来封装一个网络请求框架应该是再好不过了，但是当我真正开始封装网络请求时，我发现：RxJava给的答案是，你并不需要去封装，而是**直接使用**就好了。实例代码如下。\n\n## Hello RxJava\n\n```Java\n\tpublic void onClick(View v) {\n        Observable.create((ObservableOnSubscribe\u003cString\u003e) emitter -\u003e emitter.onNext(httpRequest()))  //1.\n                .subscribeOn(Schedulers.io())  //2.\n                .observeOn(AndroidSchedulers.mainThread())  //3.\n                .subscribe(s -\u003e textView.setText(s));  //4.\n    }\n    \n```\n\n核心代码就是`OnClick`方法中的四行。\n\n步骤如下：\n\n\n1. 通过`create`函数创建`Observable`对象\n2. 订阅调度到`Schedulers.io()`，`io`是一个有线程缓存的新线程调度器\n3. 将事件消费调度到Android的主线程上\n4. 消费者（观察者）代码\n\n`httpRequest()`没用到任何复杂的框架，就用原生的`HttpURLConnection`做一个网络请求，返回请求结果的String，代码如下：\n\n```Java\n\tprivate String httpRequest() throws Exception {\n        URL url = new URL(\"http://wycode.cn/\");\n        HttpURLConnection urlConnection = (HttpURLConnection) url.openConnection();\n        String result;\n        try {\n            BufferedInputStream in = new BufferedInputStream(urlConnection.getInputStream());\n            result = readStream(in);\n        } finally {\n            urlConnection.disconnect();\n        }\n        return result;\n    }\n\n    private String readStream(BufferedInputStream in) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(in));\n        StringBuilder sb = new StringBuilder();\n        String line;\n        try {\n            while ((line = reader.readLine()) != null) {\n                sb.append(line).append(\"\\n\");\n            }\n        } catch (IOException e) {\n            e.printStackTrace();\n        } finally {\n            try {\n                in.close();\n            } catch (IOException e) {\n                e.printStackTrace();\n            }\n        }\n        return sb.toString();\n    }\n```\n\n## 变换操作\n\n通常的，我们在请求网络后要对服务器返回的字符串进行解析，这时我们可以使用RxJava的`Transforming`操作，在返回前将JSON String转为实体类。\n\n```Java\nObservable.create((ObservableOnSubscribe\u003cString\u003e) emitter -\u003e emitter.onNext(httpRequest(\"https://wycode.cn/web/api/public/hello?message=Hello\"))) //1.\n                .map(s -\u003e JSON.parseObject(s,Message.class)) //解析JSON\n                .subscribeOn(Schedulers.io()) //2.\n                .observeOn(AndroidSchedulers.mainThread()) //3.\n                .subscribe(message -\u003e textView.setText(message.message)); //4.\n```\n\n可以看到在原有代码几乎没变的情况下，加上1行代码就实现了将Json转为实体再处理的需求。这就是RxJava的魅力。\n\n完整源码在这里：https://github.com/wangyucode/rxjava\n\n而以上也仅仅用到了RxJava的冰山一角，还有各种各样的函数来满足各种各样的需求。\n\n函数列表在这里：http://reactivex.io/documentation/operators.html\n","data":{"title":"RxJava入门","date":"2018-01-20","tags":["RxJava","Java"],"category":"Languages"},"isEmpty":false,"excerpt":"\n![ReactiveX](https://cdn-ssl-devio-img.classmethod.jp/wp-content/uploads/2021/08/ReactoveX.png)\n\n\u003e RxJava是`ReactiveX`的Java分支，除了Java版，`ReactiveX`还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\n\n\n\u003e ReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为`响应式编程`，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上`Lambda`表达式和链式编程，让程序变得更加简洁优雅。\n\n"}},"__N_SSG":true},"page":"/blog/[pid]","query":{"pid":"rxjava"},"buildId":"NDkQWnMtEcy0IDQqDGEkS","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
