00"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"netty-function","file":"netty-function.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20181023_liucheng.jpg\" alt=\"流程\" title=\"流程\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e函数计算（Function Compute）是事件驱动的全托管计算服务。函数计算无需租用和管理24小时运行的服务器(Serverless)，无需搭建复杂的服务器环境，只需编写代码并上传就可以了，只需要为代码实际运行消耗的资源付费，非常便宜。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e函数计算可以选择运行区域，也就是说，我们可以将函数运行的服务器区域选择到香港或者是美国，如此会带来什么样的好处，只可意会，不可言传。那么能否利用云函数写一个Proxy软件呢？请看本文！\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20181023_liucheng.jpg\" alt=\"流程\" title=\"流程\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e函数计算（Function Compute）是事件驱动的全托管计算服务。函数计算无需租用和管理24小时运行的服务器(Serverless)，无需搭建复杂的服务器环境，只需编写代码并上传就可以了，只需要为代码实际运行消耗的资源付费，非常便宜。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e函数计算可以选择运行区域，也就是说，我们可以将函数运行的服务器区域选择到香港或者是美国，如此会带来什么样的好处，只可意会，不可言传。那么能否利用云函数写一个Proxy软件呢？请看本文！\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e在阿里云上新建函数计算\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e我们需要建立一个云函数，和一个HTTP触发器。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此过程请参考阿里云官网，我就不详细赘述。\u003ca href=\"https://www.aliyun.com/product/fc\" title=\"官网在此\" class=\"text-sky-500 hover:text-sky-400\"\u003e官网在此\u003c/a\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eNetty服务端Handle代码\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode.lambda.proxy.inbound\n\nimport cn.wycode.lambda.proxy.config.AliyunConfig\nimport cn.wycode.lambda.proxy.outbound.ProxyOutboundInitializer\nimport io.netty.bootstrap.Bootstrap\nimport io.netty.buffer.ByteBuf\nimport io.netty.buffer.Unpooled\nimport io.netty.channel.*\nimport io.netty.handler.codec.http.*\nimport io.netty.util.CharsetUtil\n\nclass ProxyInboundHandler(val aliyunConfig: AliyunConfig) : SimpleChannelInboundHandler\u0026#x3C;ByteBuf\u003e() {\n\n\n    // As we use inboundChannel.eventLoop() when building the Bootstrap this does not need to be volatile as\n    // the outboundChannel will use the same EventLoop (and therefore Thread) as the inboundChannel.\n    private var outboundChannel: Channel? = null\n\n    override fun channelRead0(ctx: ChannelHandlerContext, msg: ByteBuf) {\n        println(\"ProxyInboundHandler\u0026#x3C;\u0026#x3C;\u0026#x3C;\" + msg.toString(CharsetUtil.UTF_8))\n//        val headers = msg.headers()\n//        val headerMap = HashMap\u0026#x3C;String, String\u003e(headers.size())\n//        headers.forEach { headerMap[it.key] = it.value }\n//        val outboundBody = Request(msg.method().name(), msg.uri(), msg.protocolVersion().text(), headerMap)\n//        val outboundJson = JSON.toJSONString(outboundBody)\n        val request = DefaultFullHttpRequest(HttpVersion.HTTP_1_1, HttpMethod.POST, aliyunConfig.path)\n        request.headers().set(HttpHeaderNames.HOST, aliyunConfig.host)\n        request.headers().set(HttpHeaderNames.CONNECTION, HttpHeaderValues.CLOSE)\n        request.headers().set(HttpHeaderNames.CONTENT_TYPE, HttpHeaderValues.APPLICATION_JSON)\n        request.headers().set(HttpHeaderNames.CONTENT_LENGTH, msg.writerIndex())\n//        request.content().writeCharSequence(outboundJson, CharsetUtil.UTF_8)\n        request.content().writeBytes(msg)\n//\n        if (outboundChannel!!.isActive) {\n            println(\"ProxyInboundHandler\u003e\u003e\u003e${request.content().toString(CharsetUtil.UTF_8)}\")\n            outboundChannel!!.writeAndFlush(request).addListener(object : ChannelFutureListener {\n                override fun operationComplete(future: ChannelFuture) {\n                    if (future.isSuccess) {\n                        // was able to flush out data, start to read the next chunk\n                        ctx.channel().read()\n                    } else {\n                        future.channel().close()\n                    }\n                }\n            })\n        }\n    }\n\n\n    override fun channelActive(ctx: ChannelHandlerContext) {\n        val inboundChannel = ctx.channel()\n        // Start the connection attempt.\n        val outboundClient = Bootstrap()\n        outboundClient.group(inboundChannel.eventLoop())\n                .channel(inboundChannel.javaClass)\n                .handler(ProxyOutboundInitializer(inboundChannel))\n                .option(ChannelOption.AUTO_READ, false)\n\n        val f = outboundClient.connect(aliyunConfig.host, aliyunConfig.port)\n        outboundChannel = f.channel()\n        f.addListener { future -\u003e\n            if (future.isSuccess) {\n                // connection complete start to read first data\n                inboundChannel.read()\n            } else {\n                // Close the connection if the connection attempt has failed.\n                inboundChannel.close()\n            }\n        }\n    }\n\n\n    override fun channelInactive(ctx: ChannelHandlerContext) {\n        if (outboundChannel != null) {\n            closeOnFlush(outboundChannel!!)\n        }\n    }\n\n    override fun exceptionCaught(ctx: ChannelHandlerContext, cause: Throwable) {\n        cause.printStackTrace()\n        closeOnFlush(ctx.channel())\n    }\n\n    companion object {\n        fun closeOnFlush(ch: Channel) {\n            if (ch.isActive) {\n                ch.writeAndFlush(Unpooled.EMPTY_BUFFER).addListener(ChannelFutureListener.CLOSE)\n            }\n        }\n    }\n\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eNetty客户端Handle代码\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode.lambda.proxy.outbound\n\nimport cn.wycode.lambda.proxy.inbound.ProxyInboundHandler\nimport io.netty.channel.*\nimport io.netty.handler.codec.http.FullHttpResponse\nimport io.netty.util.CharsetUtil\n\nclass ProxyOutboundHandler(private val inboundChannel: Channel) : SimpleChannelInboundHandler\u0026#x3C;FullHttpResponse\u003e() {\n\n    override fun channelActive(ctx: ChannelHandlerContext) {\n        println(\"ProxyOutBoundHandle==\")\n        ctx.read()\n    }\n\n    override fun channelRead0(ctx: ChannelHandlerContext, msg: FullHttpResponse) {\n        println(\"ProxyOutBoundHandle\u0026#x3C;\u0026#x3C;\u0026#x3C;$msg\")\n        val body = msg.content().toString(CharsetUtil.UTF_8)\n        println(\"ProxyOutBoundHandle body\u0026#x3C;\u0026#x3C;\u0026#x3C;$body\")\n//        val proxyResponse = try {\n//            JSON.parseObject(body, Response::class.java)\n//        } catch (e: Exception) {\n//            e.printStackTrace()\n//            msg.retain()\n//            inboundChannel.writeAndFlush(msg).addListener(object : ChannelFutureListener {\n//                override fun operationComplete(future: ChannelFuture) {\n//                    if (future.isSuccess) {\n//                        // was able to flush out data, start to read the next chunk\n//                        ctx.channel().read()\n//                    } else {\n//                        future.channel().close()\n//                    }\n//                }\n//            })\n//            return\n//        }\n//        val headers = CombinedHttpHeaders(true)\n//        var outBytes:ByteArray? = null\n//        if (proxyResponse.error == null) {\n//            for (header in proxyResponse.headers!!) {\n//                headers[header.key] = header.value\n//            }\n//            outBytes = Base64.getDecoder().decode(proxyResponse.content)\n//        }else{\n//            outBytes = proxyResponse.error.toByteArray()\n//        }\n//        val response = DefaultFullHttpResponse(HttpVersion.HTTP_1_1,\n//                HttpResponseStatus.valueOf(proxyResponse.code),\n//                Unpooled.wrappedBuffer(outBytes),\n//                headers, DefaultHttpHeaders())\n        msg.retain()\n        inboundChannel.writeAndFlush(msg.content()).addListener(object : ChannelFutureListener {\n            override fun operationComplete(future: ChannelFuture) {\n                if (future.isSuccess) {\n                    // was able to flush out data, start to read the next chunk\n                    ctx.channel().read()\n                } else {\n                    future.channel().close()\n                }\n            }\n        })\n    }\n\n    override fun channelInactive(ctx: ChannelHandlerContext) {\n        println(\"ProxyOutBoundHandle!=\")\n        ProxyInboundHandler.closeOnFlush(inboundChannel)\n    }\n\n    override fun exceptionCaught(ctx: ChannelHandlerContext, cause: Throwable) {\n        cause.printStackTrace()\n        ProxyInboundHandler.closeOnFlush(ctx.channel())\n    }\n\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e云函数代码\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode.lambda;\n\nimport com.aliyun.fc.runtime.Context;\nimport com.aliyun.fc.runtime.FunctionComputeLogger;\nimport com.aliyun.fc.runtime.StreamRequestHandler;\n\nimport java.io.*;\nimport java.net.Socket;\nimport java.net.URL;\nimport java.nio.charset.StandardCharsets;\n\npublic class Lambda implements StreamRequestHandler {\n\n\n    @Override\n    public void handleRequest(InputStream input, OutputStream output, Context context) throws IOException {\n        FunctionComputeLogger logger = context.getLogger();\n        StringBuilder sb = new StringBuilder();\n        byte[] buffer = new byte[1024];\n        int n;\n        while ((n = input.read(buffer)) != -1) {\n            sb.append(new String(buffer, 0, n, StandardCharsets.UTF_8));\n        }\n        logger.info(\"handleRequest\u003e\u003e\u003e\" + sb.toString());\n\n        String firstLine = new BufferedReader(new StringReader(sb.toString())).readLine();\n        String host;\n        int port;\n        try {\n            if (firstLine.startsWith(\"CONNECT \")) {\n                String[] urlArray = firstLine.split(\" \")[1].split(\":\");\n                host = urlArray[0];\n                port = Integer.parseInt(urlArray[1]);\n            } else {\n                URL url = new URL(firstLine.split(\" \")[1]);\n                host = url.getHost();\n                port = url.getPort();\n\n                if (port == -1) {\n                    if (url.getProtocol().equalsIgnoreCase(\"http\")) {\n                        port = 80;\n                    } else if (url.getProtocol().equalsIgnoreCase(\"https\")) {\n                        port = 443;\n                    } else {\n                        throw new IllegalArgumentException(\"端口无法解析\");\n                    }\n                }\n            }\n        } catch (Exception e) {\n            logger.error(\"url解析错误:\" + e.getMessage());\n            return;\n        }\n        logger.info(\"host-\u003e\" + host);\n        logger.info(\"port-\u003e\" + port);\n\n        Socket s = new Socket(host, port);\n        if (firstLine.startsWith(\"CONNECT \")) {\n            String response = \"HTTP/1.1 200 Connection Established\";\n            output.write(response.getBytes(StandardCharsets.UTF_8));\n            output.flush();\n            sb.setLength(0);\n            while ((n = input.read(buffer)) != -1) {\n                sb.append(new String(buffer, 0, n, StandardCharsets.UTF_8));\n            }\n            logger.info(\"handleRequest\u003e\u003e\u003e\" + sb.toString());\n        }\n\n        OutputStream httpOutputStream = s.getOutputStream();\n        httpOutputStream.write(sb.toString().getBytes(StandardCharsets.UTF_8));\n\n        InputStream httpInputStream = s.getInputStream();\n        sb.setLength(0);\n        while ((n = httpInputStream.read(buffer)) != -1) {\n            output.write(buffer, 0, n);\n            sb.append(new String(buffer, 0, n, StandardCharsets.UTF_8));\n        }\n        httpInputStream.close();\n        httpOutputStream.close();\n\n        s.close();\n        input.close();\n        output.close();\n        logger.info(\"handleRequest\u0026#x3C;\u0026#x3C;\u0026#x3C;\" + sb.toString());\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e遗留问题\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eHTTP请求代理测试通过\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e可以在Netty客户端发送请求时，对请求体进行二进制加密，函数端解密；函数端收到真实响应加密，Netty客户端收到请求后解密。从而提高安全性\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e对于HTTP请求头为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eConnection:keep-alive\u003c/code\u003e的请求，函数端在读取真实响应时，会阻塞在流末尾的read方法而无法返回结果，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eConnection:close\u003c/code\u003e的请求正常\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eHTTPS请求在有代理的情况下，浏览器会先发送一个HTTP CONNECT请求，以建立TSL通道。目前因为read阻塞问题还没有解决。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e附：本项目全部源码地址：\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eNetty端：\u003ca href=\"https://github.com/wangyucode/lambda-cross-java\" title=\"github\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/lambda-cross-java\u003c/a\u003e\n函数端：\u003ca href=\"https://github.com/wangyucode/aliyun-lambda\" title=\"github\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/aliyun-lambda\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请联系作者!\u003c/p\u003e\n","content":"\n![流程](/images/20181023_liucheng.jpg \"流程\")\n\n\u003e 函数计算（Function Compute）是事件驱动的全托管计算服务。函数计算无需租用和管理24小时运行的服务器(Serverless)，无需搭建复杂的服务器环境，只需编写代码并上传就可以了，只需要为代码实际运行消耗的资源付费，非常便宜。\n\n\u003e 函数计算可以选择运行区域，也就是说，我们可以将函数运行的服务器区域选择到香港或者是美国，如此会带来什么样的好处，只可意会，不可言传。那么能否利用云函数写一个Proxy软件呢？请看本文！\n\n\u003c!--more--\u003e\n\n## 在阿里云上新建函数计算\n\n我们需要建立一个云函数，和一个HTTP触发器。\n\n此过程请参考阿里云官网，我就不详细赘述。[官网在此](https://www.aliyun.com/product/fc \"官网在此\")\n\n\n## Netty服务端Handle代码\n\n```kotlin\npackage cn.wycode.lambda.proxy.inbound\n\nimport cn.wycode.lambda.proxy.config.AliyunConfig\nimport cn.wycode.lambda.proxy.outbound.ProxyOutboundInitializer\nimport io.netty.bootstrap.Bootstrap\nimport io.netty.buffer.ByteBuf\nimport io.netty.buffer.Unpooled\nimport io.netty.channel.*\nimport io.netty.handler.codec.http.*\nimport io.netty.util.CharsetUtil\n\nclass ProxyInboundHandler(val aliyunConfig: AliyunConfig) : SimpleChannelInboundHandler\u003cByteBuf\u003e() {\n\n\n    // As we use inboundChannel.eventLoop() when building the Bootstrap this does not need to be volatile as\n    // the outboundChannel will use the same EventLoop (and therefore Thread) as the inboundChannel.\n    private var outboundChannel: Channel? = null\n\n    override fun channelRead0(ctx: ChannelHandlerContext, msg: ByteBuf) {\n        println(\"ProxyInboundHandler\u003c\u003c\u003c\" + msg.toString(CharsetUtil.UTF_8))\n//        val headers = msg.headers()\n//        val headerMap = HashMap\u003cString, String\u003e(headers.size())\n//        headers.forEach { headerMap[it.key] = it.value }\n//        val outboundBody = Request(msg.method().name(), msg.uri(), msg.protocolVersion().text(), headerMap)\n//        val outboundJson = JSON.toJSONString(outboundBody)\n        val request = DefaultFullHttpRequest(HttpVersion.HTTP_1_1, HttpMethod.POST, aliyunConfig.path)\n        request.headers().set(HttpHeaderNames.HOST, aliyunConfig.host)\n        request.headers().set(HttpHeaderNames.CONNECTION, HttpHeaderValues.CLOSE)\n        request.headers().set(HttpHeaderNames.CONTENT_TYPE, HttpHeaderValues.APPLICATION_JSON)\n        request.headers().set(HttpHeaderNames.CONTENT_LENGTH, msg.writerIndex())\n//        request.content().writeCharSequence(outboundJson, CharsetUtil.UTF_8)\n        request.content().writeBytes(msg)\n//\n        if (outboundChannel!!.isActive) {\n            println(\"ProxyInboundHandler\u003e\u003e\u003e${request.content().toString(CharsetUtil.UTF_8)}\")\n            outboundChannel!!.writeAndFlush(request).addListener(object : ChannelFutureListener {\n                override fun operationComplete(future: ChannelFuture) {\n                    if (future.isSuccess) {\n                        // was able to flush out data, start to read the next chunk\n                        ctx.channel().read()\n                    } else {\n                        future.channel().close()\n                    }\n                }\n            })\n        }\n    }\n\n\n    override fun channelActive(ctx: ChannelHandlerContext) {\n        val inboundChannel = ctx.channel()\n        // Start the connection attempt.\n        val outboundClient = Bootstrap()\n        outboundClient.group(inboundChannel.eventLoop())\n                .channel(inboundChannel.javaClass)\n                .handler(ProxyOutboundInitializer(inboundChannel))\n                .option(ChannelOption.AUTO_READ, false)\n\n        val f = outboundClient.connect(aliyunConfig.host, aliyunConfig.port)\n        outboundChannel = f.channel()\n        f.addListener { future -\u003e\n            if (future.isSuccess) {\n                // connection complete start to read first data\n                inboundChannel.read()\n            } else {\n                // Close the connection if the connection attempt has failed.\n                inboundChannel.close()\n            }\n        }\n    }\n\n\n    override fun channelInactive(ctx: ChannelHandlerContext) {\n        if (outboundChannel != null) {\n            closeOnFlush(outboundChannel!!)\n        }\n    }\n\n    override fun exceptionCaught(ctx: ChannelHandlerContext, cause: Throwable) {\n        cause.printStackTrace()\n        closeOnFlush(ctx.channel())\n    }\n\n    companion object {\n        fun closeOnFlush(ch: Channel) {\n            if (ch.isActive) {\n                ch.writeAndFlush(Unpooled.EMPTY_BUFFER).addListener(ChannelFutureListener.CLOSE)\n            }\n        }\n    }\n\n}\n\n```\n\n## Netty客户端Handle代码\n\n```kotlin\npackage cn.wycode.lambda.proxy.outbound\n\nimport cn.wycode.lambda.proxy.inbound.ProxyInboundHandler\nimport io.netty.channel.*\nimport io.netty.handler.codec.http.FullHttpResponse\nimport io.netty.util.CharsetUtil\n\nclass ProxyOutboundHandler(private val inboundChannel: Channel) : SimpleChannelInboundHandler\u003cFullHttpResponse\u003e() {\n\n    override fun channelActive(ctx: ChannelHandlerContext) {\n        println(\"ProxyOutBoundHandle==\")\n        ctx.read()\n    }\n\n    override fun channelRead0(ctx: ChannelHandlerContext, msg: FullHttpResponse) {\n        println(\"ProxyOutBoundHandle\u003c\u003c\u003c$msg\")\n        val body = msg.content().toString(CharsetUtil.UTF_8)\n        println(\"ProxyOutBoundHandle body\u003c\u003c\u003c$body\")\n//        val proxyResponse = try {\n//            JSON.parseObject(body, Response::class.java)\n//        } catch (e: Exception) {\n//            e.printStackTrace()\n//            msg.retain()\n//            inboundChannel.writeAndFlush(msg).addListener(object : ChannelFutureListener {\n//                override fun operationComplete(future: ChannelFuture) {\n//                    if (future.isSuccess) {\n//                        // was able to flush out data, start to read the next chunk\n//                        ctx.channel().read()\n//                    } else {\n//                        future.channel().close()\n//                    }\n//                }\n//            })\n//            return\n//        }\n//        val headers = CombinedHttpHeaders(true)\n//        var outBytes:ByteArray? = null\n//        if (proxyResponse.error == null) {\n//            for (header in proxyResponse.headers!!) {\n//                headers[header.key] = header.value\n//            }\n//            outBytes = Base64.getDecoder().decode(proxyResponse.content)\n//        }else{\n//            outBytes = proxyResponse.error.toByteArray()\n//        }\n//        val response = DefaultFullHttpResponse(HttpVersion.HTTP_1_1,\n//                HttpResponseStatus.valueOf(proxyResponse.code),\n//                Unpooled.wrappedBuffer(outBytes),\n//                headers, DefaultHttpHeaders())\n        msg.retain()\n        inboundChannel.writeAndFlush(msg.content()).addListener(object : ChannelFutureListener {\n            override fun operationComplete(future: ChannelFuture) {\n                if (future.isSuccess) {\n                    // was able to flush out data, start to read the next chunk\n                    ctx.channel().read()\n                } else {\n                    future.channel().close()\n                }\n            }\n        })\n    }\n\n    override fun channelInactive(ctx: ChannelHandlerContext) {\n        println(\"ProxyOutBoundHandle!=\")\n        ProxyInboundHandler.closeOnFlush(inboundChannel)\n    }\n\n    override fun exceptionCaught(ctx: ChannelHandlerContext, cause: Throwable) {\n        cause.printStackTrace()\n        ProxyInboundHandler.closeOnFlush(ctx.channel())\n    }\n\n}\n\n```\n\n## 云函数代码\n\n```java\npackage cn.wycode.lambda;\n\nimport com.aliyun.fc.runtime.Context;\nimport com.aliyun.fc.runtime.FunctionComputeLogger;\nimport com.aliyun.fc.runtime.StreamRequestHandler;\n\nimport java.io.*;\nimport java.net.Socket;\nimport java.net.URL;\nimport java.nio.charset.StandardCharsets;\n\npublic class Lambda implements StreamRequestHandler {\n\n\n    @Override\n    public void handleRequest(InputStream input, OutputStream output, Context context) throws IOException {\n        FunctionComputeLogger logger = context.getLogger();\n        StringBuilder sb = new StringBuilder();\n        byte[] buffer = new byte[1024];\n        int n;\n        while ((n = input.read(buffer)) != -1) {\n            sb.append(new String(buffer, 0, n, StandardCharsets.UTF_8));\n        }\n        logger.info(\"handleRequest\u003e\u003e\u003e\" + sb.toString());\n\n        String firstLine = new BufferedReader(new StringReader(sb.toString())).readLine();\n        String host;\n        int port;\n        try {\n            if (firstLine.startsWith(\"CONNECT \")) {\n                String[] urlArray = firstLine.split(\" \")[1].split(\":\");\n                host = urlArray[0];\n                port = Integer.parseInt(urlArray[1]);\n            } else {\n                URL url = new URL(firstLine.split(\" \")[1]);\n                host = url.getHost();\n                port = url.getPort();\n\n                if (port == -1) {\n                    if (url.getProtocol().equalsIgnoreCase(\"http\")) {\n                        port = 80;\n                    } else if (url.getProtocol().equalsIgnoreCase(\"https\")) {\n                        port = 443;\n                    } else {\n                        throw new IllegalArgumentException(\"端口无法解析\");\n                    }\n                }\n            }\n        } catch (Exception e) {\n            logger.error(\"url解析错误:\" + e.getMessage());\n            return;\n        }\n        logger.info(\"host-\u003e\" + host);\n        logger.info(\"port-\u003e\" + port);\n\n        Socket s = new Socket(host, port);\n        if (firstLine.startsWith(\"CONNECT \")) {\n            String response = \"HTTP/1.1 200 Connection Established\";\n            output.write(response.getBytes(StandardCharsets.UTF_8));\n            output.flush();\n            sb.setLength(0);\n            while ((n = input.read(buffer)) != -1) {\n                sb.append(new String(buffer, 0, n, StandardCharsets.UTF_8));\n            }\n            logger.info(\"handleRequest\u003e\u003e\u003e\" + sb.toString());\n        }\n\n        OutputStream httpOutputStream = s.getOutputStream();\n        httpOutputStream.write(sb.toString().getBytes(StandardCharsets.UTF_8));\n\n        InputStream httpInputStream = s.getInputStream();\n        sb.setLength(0);\n        while ((n = httpInputStream.read(buffer)) != -1) {\n            output.write(buffer, 0, n);\n            sb.append(new String(buffer, 0, n, StandardCharsets.UTF_8));\n        }\n        httpInputStream.close();\n        httpOutputStream.close();\n\n        s.close();\n        input.close();\n        output.close();\n        logger.info(\"handleRequest\u003c\u003c\u003c\" + sb.toString());\n    }\n}\n\n```\n\n\n## 遗留问题\n\n- HTTP请求代理测试通过\n- 可以在Netty客户端发送请求时，对请求体进行二进制加密，函数端解密；函数端收到真实响应加密，Netty客户端收到请求后解密。从而提高安全性\n- 对于HTTP请求头为`Connection:keep-alive`的请求，函数端在读取真实响应时，会阻塞在流末尾的read方法而无法返回结果，`Connection:close`的请求正常\n- HTTPS请求在有代理的情况下，浏览器会先发送一个HTTP CONNECT请求，以建立TSL通道。目前因为read阻塞问题还没有解决。\n\n\n附：本项目全部源码地址：\n\nNetty端：[https://github.com/wangyucode/lambda-cross-java](https://github.com/wangyucode/lambda-cross-java \"github\")\n函数端：[https://github.com/wangyucode/aliyun-lambda](https://github.com/wangyucode/aliyun-lambda \"github\")\n\n以上，转载请联系作者!","data":{"title":"使用Netty和阿里云函数写一个低成本的“梯子”","date":"2018-10-23","tags":["Netty","HTTP"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![流程](/images/20181023_liucheng.jpg \"流程\")\n\n\u003e 函数计算（Function Compute）是事件驱动的全托管计算服务。函数计算无需租用和管理24小时运行的服务器(Serverless)，无需搭建复杂的服务器环境，只需编写代码并上传就可以了，只需要为代码实际运行消耗的资源付费，非常便宜。\n\n\u003e 函数计算可以选择运行区域，也就是说，我们可以将函数运行的服务器区域选择到香港或者是美国，如此会带来什么样的好处，只可意会，不可言传。那么能否利用云函数写一个Proxy软件呢？请看本文！\n\n"},{"id":"netty","file":"netty.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://issues.jboss.org/secure/attachment/12345694/netty_logo_600px.png\" alt=\"Netty\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eNetty是一个基于异步NIO（non-blocking IO）模型的，事件驱动的网络应用程序框架。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e不同于传统阻塞IO，非阻塞IO通常使用更少的线程，从而提高并发性能。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eNetty的灵活设计使得它能够开发几乎所有基于二进制流、文本应用协议的Web应用\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章将简单介绍如何使用Netty开发一个HTTP服务器\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://issues.jboss.org/secure/attachment/12345694/netty_logo_600px.png\" alt=\"Netty\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eNetty是一个基于异步NIO（non-blocking IO）模型的，事件驱动的网络应用程序框架。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e不同于传统阻塞IO，非阻塞IO通常使用更少的线程，从而提高并发性能。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eNetty的灵活设计使得它能够开发几乎所有基于二进制流、文本应用协议的Web应用\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章将简单介绍如何使用Netty开发一个HTTP服务器\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e导入Netty\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这里使用Gradle导入4.1.30.Final版本\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edependencies {\n\tcompile \"io.netty:netty-all:4.1.30.Final\"\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e编写服务器\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eclass Server(val port: Int) {\n\n    @Throws(Exception::class)\n    fun run() {\n        val bossGroup = NioEventLoopGroup(1)\n        val workerGroup = NioEventLoopGroup()\n        try {\n            val b = ServerBootstrap()\n            b.group(bossGroup, workerGroup)\n                    .channel(NioServerSocketChannel::class.java)\n                    .handler(LoggingHandler(LogLevel.INFO))\n                    .childHandler(ServerInitializer())\n            val ch = b.bind(port).sync().channel()\n            println(\"server start on $port\")\n            ch.closeFuture().sync()\n        } finally {\n            bossGroup.shutdownGracefully()\n            workerGroup.shutdownGracefully()\n        }\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e这里\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ebossGroup\u003c/code\u003e是用来接受连接的父线程池，可以是单线程，也可以是多线程（推荐是CPU核心数的倍数）\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e因为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ebossGroup\u003c/code\u003e接受连接后会立即返回，不会阻塞，所以即使单线程也能够处理并发（类似Node.JS）\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eworkerGroup\u003c/code\u003e是工作线程\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003echannel()\u003c/code\u003e设置构建NIO Channel的类型\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehandle()\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003echildHandle()\u003c/code\u003e分别设置主处理，和子处理对象\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e配置子处理流程\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eclass ServerInitializer : ChannelInitializer\u0026#x3C;SocketChannel\u003e() {\n    override fun initChannel(ch: SocketChannel) {\n        val p = ch.pipeline()\n        p.addLast(HttpRequestDecoder())\n        // Uncomment the following line if you don't want to handle HttpChunks.\n        //p.addLast(new HttpObjectAggregator(1048576));\n        p.addLast(HttpResponseEncoder())\n        // Remove the following line if you don't want automatic content compression.\n        //p.addLast(new HttpContentCompressor());\n        p.addLast(HttpServerHandler())\n    }\n\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eNetty自带了很多的编解码器，上面的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHttpRequestDecoder\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHttpResponseEncoder\u003c/code\u003e用于HTTP协议的编解码\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e经过编解码后我们的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHttpServerHandler\u003c/code\u003e将会实际处理HTTP请求\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e处理HTTP请求\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eclass HttpServerHandler : SimpleChannelInboundHandler\u0026#x3C;Any\u003e() {\n\n    val sb = StringBuilder()\n\n    lateinit var request: HttpRequest\n\n    override fun channelRead0(ctx: ChannelHandlerContext, msg: Any) {\n        if (msg is HttpRequest) {\n            if (HttpUtil.is100ContinueExpected(msg)) {\n                ctx.write(DefaultFullHttpResponse(HttpVersion.HTTP_1_1, HttpResponseStatus.CONTINUE))\n            }\n            request = msg\n\n\n            sb.setLength(0)\n\n            sb.append(\"Welcome\\r\\n\")\n            sb.append(\"=====================\\r\\n\")\n            sb.append(\"VERSION: \").append(msg.protocolVersion()).append(\"\\r\\n\")\n            sb.append(\"HOSTNAME: \").append(msg.headers().get(HttpHeaderNames.HOST, \"unknown\")).append(\"\\r\\n\")\n            sb.append(\"REQUEST_URI: \").append(msg.uri()).append(\"\\r\\n\\r\\n\")\n\n            val headers = msg.headers()\n            if (!headers.isEmpty) {\n                for (h in headers) {\n                    sb.append(\"HEADER: \").append(h.key).append(\" = \").append(h.value).append(\"\\r\\n\")\n                }\n                sb.append(\"\\r\\n\")\n            }\n\n            val queryStringDecoder = QueryStringDecoder(msg.uri())\n            val params = queryStringDecoder.parameters()\n            if (!params.isEmpty()) {\n                for (p in params) {\n                    val vals = p.value\n                    for (value in vals) {\n                        sb.append(\"PARAM: \").append(p.key).append(\" = \").append(value).append(\"\\r\\n\")\n                    }\n                }\n                sb.append(\"\\r\\n\")\n            }\n\n            appendDecoderResult(sb, msg)\n        }\n\n        if (msg is HttpContent) {\n            val content = msg.content()\n\n            if (content.isReadable) {\n                sb.append(\"CONTENT: \")\n                sb.append(content.toString(CharsetUtil.UTF_8))\n                sb.append(\"\\r\\n\")\n                appendDecoderResult(sb, msg)\n            }\n\n            if (msg is LastHttpContent) {\n                sb.append(\"END OF CONTENT\\r\\n\")\n\n                if (!msg.trailingHeaders().isEmpty) {\n                    sb.append(\"\\r\\n\")\n                    for (name in msg.trailingHeaders().names()) {\n                        for (value in msg.trailingHeaders().getAll(name)) {\n                            sb.append(\"TRAILING HEADER: \")\n                            sb.append(name).append(\" = \").append(value).append(\"\\r\\n\")\n                        }\n                    }\n                    sb.append(\"\\r\\n\")\n                }\n\n                // Decide whether to close the connection or not.\n                if (writeResponse(msg, ctx)) {\n                    // If keep-alive is off, close the connection once the content is fully written.\n                    ctx.writeAndFlush(Unpooled.EMPTY_BUFFER).addListener(ChannelFutureListener.CLOSE)\n                }\n            }\n        }\n\n    }\n\n    override fun channelReadComplete(ctx: ChannelHandlerContext) {\n        ctx.flush()\n    }\n\n    private fun writeResponse(currentObj: HttpObject, ctx: ChannelHandlerContext): Boolean {\n        val keepAlive = HttpUtil.isKeepAlive(request)\n        // Build the response object.\n        val status = if (currentObj.decoderResult().isSuccess) {\n            HttpResponseStatus.OK\n        } else {\n            HttpResponseStatus.BAD_REQUEST\n        }\n        val response = DefaultFullHttpResponse(\n                HttpVersion.HTTP_1_1, status,\n                Unpooled.copiedBuffer(sb.toString(), CharsetUtil.UTF_8))\n\n        response.headers().set(HttpHeaderNames.CONTENT_TYPE, \"${HttpHeaderValues.TEXT_PLAIN}; charset=UTF-8\")\n\n        if (keepAlive) {\n            // Add 'Content-Length' header only for a keep-alive connection.\n            response.headers().setInt(HttpHeaderNames.CONTENT_LENGTH, response.content().readableBytes())\n            // Add keep alive header as per:\n            // - http://www.w3.org/Protocols/HTTP/1.1/draft-ietf-http-v11-spec-01.html#Connection\n            response.headers().set(HttpHeaderNames.CONNECTION, HttpHeaderValues.KEEP_ALIVE)\n        }\n        // Encode the cookie.\n        val cookieString = request.headers().get(HttpHeaderNames.COOKIE)\n        if (cookieString != null) {\n            val cookies = ServerCookieDecoder.STRICT.decode(cookieString)\n            if (!cookies.isEmpty()) {\n                // Reset the cookies if necessary.\n                for (cookie in cookies) {\n                    response.headers().add(HttpHeaderNames.SET_COOKIE, ServerCookieEncoder.STRICT.encode(cookie))\n\n                }\n\n            }\n\n        } else {\n            // Browser sent no cookie.  Add some.\n            response.headers().add(HttpHeaderNames.SET_COOKIE, ServerCookieEncoder.STRICT.encode(\"key1\", \"value1\"));\n            response.headers().add(HttpHeaderNames.SET_COOKIE, ServerCookieEncoder.STRICT.encode(\"key2\", \"value2\"));\n\n        }\n\n        // Write the response.\n        ctx.write(response)\n\n        return keepAlive\n    }\n\n\n    override fun exceptionCaught(ctx: ChannelHandlerContext, cause: Throwable) {\n        cause.printStackTrace()\n        ctx.close()\n    }\n\n    companion object {\n        fun appendDecoderResult(sb: StringBuilder, httpObj: HttpObject) {\n            val result = httpObj.decoderResult()\n            if (result.isSuccess) {\n                return\n            }\n\n            sb.append(\".. WITH DECODER FAILURE: \")\n            sb.append(result.cause())\n            sb.append(\"\\r\\n\")\n        }\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e如果构造流程时没有使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHttpObjectAggregator\u003c/code\u003e类，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003echannelRead()\u003c/code\u003e会调用很多次，每次传入的对象为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHttpRequest\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHttpContent\u003c/code\u003e,\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLastHttpContent\u003c/code\u003e的子类，他们分别有方法可以读取到HTTP请求的内容。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请联系作者!\u003c/p\u003e\n","content":"\n![Netty](https://issues.jboss.org/secure/attachment/12345694/netty_logo_600px.png)\n\n\u003e Netty是一个基于异步NIO（non-blocking IO）模型的，事件驱动的网络应用程序框架。\n\n\u003e 不同于传统阻塞IO，非阻塞IO通常使用更少的线程，从而提高并发性能。\n\n\u003e Netty的灵活设计使得它能够开发几乎所有基于二进制流、文本应用协议的Web应用\n\n这篇文章将简单介绍如何使用Netty开发一个HTTP服务器\n\n\u003c!--more--\u003e\n\n## 导入Netty\n\n这里使用Gradle导入4.1.30.Final版本\n\n```json\ndependencies {\n\tcompile \"io.netty:netty-all:4.1.30.Final\"\n}\n```\n\n## 编写服务器\n\n```kotlin\nclass Server(val port: Int) {\n\n    @Throws(Exception::class)\n    fun run() {\n        val bossGroup = NioEventLoopGroup(1)\n        val workerGroup = NioEventLoopGroup()\n        try {\n            val b = ServerBootstrap()\n            b.group(bossGroup, workerGroup)\n                    .channel(NioServerSocketChannel::class.java)\n                    .handler(LoggingHandler(LogLevel.INFO))\n                    .childHandler(ServerInitializer())\n            val ch = b.bind(port).sync().channel()\n            println(\"server start on $port\")\n            ch.closeFuture().sync()\n        } finally {\n            bossGroup.shutdownGracefully()\n            workerGroup.shutdownGracefully()\n        }\n    }\n}\n```\n\n- 这里`bossGroup`是用来接受连接的父线程池，可以是单线程，也可以是多线程（推荐是CPU核心数的倍数）\n- 因为`bossGroup`接受连接后会立即返回，不会阻塞，所以即使单线程也能够处理并发（类似Node.JS）\n- `workerGroup`是工作线程\n- `channel()`设置构建NIO Channel的类型\n- `handle()`和`childHandle()`分别设置主处理，和子处理对象\n\n\n## 配置子处理流程\n\n```kotlin\nclass ServerInitializer : ChannelInitializer\u003cSocketChannel\u003e() {\n    override fun initChannel(ch: SocketChannel) {\n        val p = ch.pipeline()\n        p.addLast(HttpRequestDecoder())\n        // Uncomment the following line if you don't want to handle HttpChunks.\n        //p.addLast(new HttpObjectAggregator(1048576));\n        p.addLast(HttpResponseEncoder())\n        // Remove the following line if you don't want automatic content compression.\n        //p.addLast(new HttpContentCompressor());\n        p.addLast(HttpServerHandler())\n    }\n\n}\n```\n- Netty自带了很多的编解码器，上面的`HttpRequestDecoder`和`HttpResponseEncoder`用于HTTP协议的编解码\n- 经过编解码后我们的`HttpServerHandler`将会实际处理HTTP请求\n\n\n## 处理HTTP请求\n\n```kotlin\nclass HttpServerHandler : SimpleChannelInboundHandler\u003cAny\u003e() {\n\n    val sb = StringBuilder()\n\n    lateinit var request: HttpRequest\n\n    override fun channelRead0(ctx: ChannelHandlerContext, msg: Any) {\n        if (msg is HttpRequest) {\n            if (HttpUtil.is100ContinueExpected(msg)) {\n                ctx.write(DefaultFullHttpResponse(HttpVersion.HTTP_1_1, HttpResponseStatus.CONTINUE))\n            }\n            request = msg\n\n\n            sb.setLength(0)\n\n            sb.append(\"Welcome\\r\\n\")\n            sb.append(\"=====================\\r\\n\")\n            sb.append(\"VERSION: \").append(msg.protocolVersion()).append(\"\\r\\n\")\n            sb.append(\"HOSTNAME: \").append(msg.headers().get(HttpHeaderNames.HOST, \"unknown\")).append(\"\\r\\n\")\n            sb.append(\"REQUEST_URI: \").append(msg.uri()).append(\"\\r\\n\\r\\n\")\n\n            val headers = msg.headers()\n            if (!headers.isEmpty) {\n                for (h in headers) {\n                    sb.append(\"HEADER: \").append(h.key).append(\" = \").append(h.value).append(\"\\r\\n\")\n                }\n                sb.append(\"\\r\\n\")\n            }\n\n            val queryStringDecoder = QueryStringDecoder(msg.uri())\n            val params = queryStringDecoder.parameters()\n            if (!params.isEmpty()) {\n                for (p in params) {\n                    val vals = p.value\n                    for (value in vals) {\n                        sb.append(\"PARAM: \").append(p.key).append(\" = \").append(value).append(\"\\r\\n\")\n                    }\n                }\n                sb.append(\"\\r\\n\")\n            }\n\n            appendDecoderResult(sb, msg)\n        }\n\n        if (msg is HttpContent) {\n            val content = msg.content()\n\n            if (content.isReadable) {\n                sb.append(\"CONTENT: \")\n                sb.append(content.toString(CharsetUtil.UTF_8))\n                sb.append(\"\\r\\n\")\n                appendDecoderResult(sb, msg)\n            }\n\n            if (msg is LastHttpContent) {\n                sb.append(\"END OF CONTENT\\r\\n\")\n\n                if (!msg.trailingHeaders().isEmpty) {\n                    sb.append(\"\\r\\n\")\n                    for (name in msg.trailingHeaders().names()) {\n                        for (value in msg.trailingHeaders().getAll(name)) {\n                            sb.append(\"TRAILING HEADER: \")\n                            sb.append(name).append(\" = \").append(value).append(\"\\r\\n\")\n                        }\n                    }\n                    sb.append(\"\\r\\n\")\n                }\n\n                // Decide whether to close the connection or not.\n                if (writeResponse(msg, ctx)) {\n                    // If keep-alive is off, close the connection once the content is fully written.\n                    ctx.writeAndFlush(Unpooled.EMPTY_BUFFER).addListener(ChannelFutureListener.CLOSE)\n                }\n            }\n        }\n\n    }\n\n    override fun channelReadComplete(ctx: ChannelHandlerContext) {\n        ctx.flush()\n    }\n\n    private fun writeResponse(currentObj: HttpObject, ctx: ChannelHandlerContext): Boolean {\n        val keepAlive = HttpUtil.isKeepAlive(request)\n        // Build the response object.\n        val status = if (currentObj.decoderResult().isSuccess) {\n            HttpResponseStatus.OK\n        } else {\n            HttpResponseStatus.BAD_REQUEST\n        }\n        val response = DefaultFullHttpResponse(\n                HttpVersion.HTTP_1_1, status,\n                Unpooled.copiedBuffer(sb.toString(), CharsetUtil.UTF_8))\n\n        response.headers().set(HttpHeaderNames.CONTENT_TYPE, \"${HttpHeaderValues.TEXT_PLAIN}; charset=UTF-8\")\n\n        if (keepAlive) {\n            // Add 'Content-Length' header only for a keep-alive connection.\n            response.headers().setInt(HttpHeaderNames.CONTENT_LENGTH, response.content().readableBytes())\n            // Add keep alive header as per:\n            // - http://www.w3.org/Protocols/HTTP/1.1/draft-ietf-http-v11-spec-01.html#Connection\n            response.headers().set(HttpHeaderNames.CONNECTION, HttpHeaderValues.KEEP_ALIVE)\n        }\n        // Encode the cookie.\n        val cookieString = request.headers().get(HttpHeaderNames.COOKIE)\n        if (cookieString != null) {\n            val cookies = ServerCookieDecoder.STRICT.decode(cookieString)\n            if (!cookies.isEmpty()) {\n                // Reset the cookies if necessary.\n                for (cookie in cookies) {\n                    response.headers().add(HttpHeaderNames.SET_COOKIE, ServerCookieEncoder.STRICT.encode(cookie))\n\n                }\n\n            }\n\n        } else {\n            // Browser sent no cookie.  Add some.\n            response.headers().add(HttpHeaderNames.SET_COOKIE, ServerCookieEncoder.STRICT.encode(\"key1\", \"value1\"));\n            response.headers().add(HttpHeaderNames.SET_COOKIE, ServerCookieEncoder.STRICT.encode(\"key2\", \"value2\"));\n\n        }\n\n        // Write the response.\n        ctx.write(response)\n\n        return keepAlive\n    }\n\n\n    override fun exceptionCaught(ctx: ChannelHandlerContext, cause: Throwable) {\n        cause.printStackTrace()\n        ctx.close()\n    }\n\n    companion object {\n        fun appendDecoderResult(sb: StringBuilder, httpObj: HttpObject) {\n            val result = httpObj.decoderResult()\n            if (result.isSuccess) {\n                return\n            }\n\n            sb.append(\".. WITH DECODER FAILURE: \")\n            sb.append(result.cause())\n            sb.append(\"\\r\\n\")\n        }\n    }\n}\n```\n\n- 如果构造流程时没有使用`HttpObjectAggregator`类，`channelRead()`会调用很多次，每次传入的对象为`HttpRequest`，`HttpContent`,`LastHttpContent`的子类，他们分别有方法可以读取到HTTP请求的内容。\n\n以上，转载请联系作者!","data":{"title":"使用Netty开发高性能的网络服务应用","date":"2018-10-16","tags":["Netty","HTTP"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![Netty](https://issues.jboss.org/secure/attachment/12345694/netty_logo_600px.png)\n\n\u003e Netty是一个基于异步NIO（non-blocking IO）模型的，事件驱动的网络应用程序框架。\n\n\u003e 不同于传统阻塞IO，非阻塞IO通常使用更少的线程，从而提高并发性能。\n\n\u003e Netty的灵活设计使得它能够开发几乎所有基于二进制流、文本应用协议的Web应用\n\n这篇文章将简单介绍如何使用Netty开发一个HTTP服务器\n\n"}],"cid":"netty"},"__N_SSG":true},"page":"/blog/tag/[cid]","query":{"cid":"netty"},"buildId":"KYANdil3ljfaQ9_rbwOmo","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
