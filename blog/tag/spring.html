00"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"swagger-auth","file":"swagger-auth.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://swagger.io/swagger/media/assets/images/swagger_logo.svg\" alt=\"swagger\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当API添加了鉴权后，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eswagger\u003c/code\u003e如何进行调试呢，比如需要在请求头\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eheader\u003c/code\u003e中添加类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etoken\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAuthorization\u003c/code\u003e之类的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring\u003c/code\u003e中进行如下简单的配置就可以了。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://swagger.io/swagger/media/assets/images/swagger_logo.svg\" alt=\"swagger\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当API添加了鉴权后，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eswagger\u003c/code\u003e如何进行调试呢，比如需要在请求头\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eheader\u003c/code\u003e中添加类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etoken\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAuthorization\u003c/code\u003e之类的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring\u003c/code\u003e中进行如下简单的配置就可以了。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\n@EnableSwagger2\nclass SwaggerConfig {\n\n    @Bean\n    fun generateDocket(): Docket {\n        return Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .apis(RequestHandlerSelectors.withClassAnnotation(Api::class.java))\n                .build()\n                .securityContexts(listOf(securityContext())) // #1\n                .securitySchemes(listOf(apiKey())) // #2\n                .apiInfo(apiInfo())\n    }\n\n    private fun securityContext(): SecurityContext {\n        return SecurityContext.builder()\n                .securityReferences(defaultAuth())\n                .forPaths(PathSelectors.regex(\"/api/public/admin/.*\"))\n                .build()\n    }\n\n    fun defaultAuth(): List\u0026#x3C;SecurityReference\u003e {\n        val authorizationScope = AuthorizationScope(\"global\", \"accessEverything\")\n        val authorizationScopes = arrayOf(authorizationScope)\n        return listOf(SecurityReference(\"token\", authorizationScopes))\n    }\n\n\n    fun apiKey(): ApiKey {\n        return ApiKey(\"token\", \"X-Auth-Token\", \"header\")\n    }\n\n\n    private fun apiInfo(): ApiInfo {\n        return ApiInfo(\"王郁的API文档\",\n                \"用于App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                Contact(\"王郁\", \"wycode.cn\", \"wangyu@wycode.cn\"),\n                \"wycode.cn All Right Reserved\",\n                \"https://wycode.cn\",\n                emptyList())\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e关键配置就是上面包含#1和#2注释的两行配置\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e配置安全上下文，我这里配置了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/api/public/admin/.*\u003c/code\u003e下的接口需要添加。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e配置鉴权类型，我这里使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eApiKey\u003c/code\u003e。\u003c/li\u003e\n\u003c/ol\u003e\n","content":"\n![swagger](https://swagger.io/swagger/media/assets/images/swagger_logo.svg)\n\n当API添加了鉴权后，`swagger`如何进行调试呢，比如需要在请求头`header`中添加类似`token`或者`Authorization`之类的。\n\n在`Spring`中进行如下简单的配置就可以了。\n\n\u003c!--more--\u003e\n\n```kotlin\n@Configuration\n@EnableSwagger2\nclass SwaggerConfig {\n\n    @Bean\n    fun generateDocket(): Docket {\n        return Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .apis(RequestHandlerSelectors.withClassAnnotation(Api::class.java))\n                .build()\n                .securityContexts(listOf(securityContext())) // #1\n                .securitySchemes(listOf(apiKey())) // #2\n                .apiInfo(apiInfo())\n    }\n\n    private fun securityContext(): SecurityContext {\n        return SecurityContext.builder()\n                .securityReferences(defaultAuth())\n                .forPaths(PathSelectors.regex(\"/api/public/admin/.*\"))\n                .build()\n    }\n\n    fun defaultAuth(): List\u003cSecurityReference\u003e {\n        val authorizationScope = AuthorizationScope(\"global\", \"accessEverything\")\n        val authorizationScopes = arrayOf(authorizationScope)\n        return listOf(SecurityReference(\"token\", authorizationScopes))\n    }\n\n\n    fun apiKey(): ApiKey {\n        return ApiKey(\"token\", \"X-Auth-Token\", \"header\")\n    }\n\n\n    private fun apiInfo(): ApiInfo {\n        return ApiInfo(\"王郁的API文档\",\n                \"用于App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                Contact(\"王郁\", \"wycode.cn\", \"wangyu@wycode.cn\"),\n                \"wycode.cn All Right Reserved\",\n                \"https://wycode.cn\",\n                emptyList())\n    }\n}\n\n```\n关键配置就是上面包含#1和#2注释的两行配置\n\n1. 配置安全上下文，我这里配置了`/api/public/admin/.*`下的接口需要添加。\n2. 配置鉴权类型，我这里使用`ApiKey`。","data":{"title":"SpringBoot工程为SwaggerUI添加认证","date":"2019-07-19","tags":["OAuth","Java","Kotlin","Spring","Swagger"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![swagger](https://swagger.io/swagger/media/assets/images/swagger_logo.svg)\n\n当API添加了鉴权后，`swagger`如何进行调试呢，比如需要在请求头`header`中添加类似`token`或者`Authorization`之类的。\n\n在`Spring`中进行如下简单的配置就可以了。\n\n"},{"id":"spring-error","file":"spring-error.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180623_springboot.jpg\" alt=\"springboot\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e通常我们为了统一，和前端方便处理，写的API返回JSON会有固定的结构，比如下面这种：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n    \"code\":200,\n    \"message\":\"hello world!\",\n    \"data\":{\n        \"user\":{}\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e但是当返回码为非200时，比如接口不存在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e404\u003c/code\u003e，服务器错误\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e500\u003c/code\u003e，Spring默认会返回一个类似这样的结构：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n  \"timestamp\": \"2019-07-19 10:23:47\",\n  \"status\": 403,\n  \"error\": \"Forbidden\",\n  \"message\": \"没有权限\",\n  \"path\": \"/web/api/public/admin/dota/version\"\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e下面进行简单配置即可实现这个JSON结构的自定义：\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180623_springboot.jpg\" alt=\"springboot\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e通常我们为了统一，和前端方便处理，写的API返回JSON会有固定的结构，比如下面这种：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n    \"code\":200,\n    \"message\":\"hello world!\",\n    \"data\":{\n        \"user\":{}\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e但是当返回码为非200时，比如接口不存在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e404\u003c/code\u003e，服务器错误\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e500\u003c/code\u003e，Spring默认会返回一个类似这样的结构：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n  \"timestamp\": \"2019-07-19 10:23:47\",\n  \"status\": 403,\n  \"error\": \"Forbidden\",\n  \"message\": \"没有权限\",\n  \"path\": \"/web/api/public/admin/dota/version\"\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e下面进行简单配置即可实现这个JSON结构的自定义：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eimport cn.wycode.web.DEV\nimport org.springframework.boot.web.servlet.error.DefaultErrorAttributes\nimport org.springframework.stereotype.Component\nimport org.springframework.web.context.request.WebRequest\n\n@Component\nclass WyErrorAttributes : DefaultErrorAttributes(DEV) { // #1\n    override fun getErrorAttributes(webRequest: WebRequest?, includeStackTrace: Boolean): MutableMap\u0026#x3C;String, Any\u003e {\n        val errorAttributes = super.getErrorAttributes(webRequest, includeStackTrace) // #2\n        errorAttributes[\"success\"] = false // #3\n        errorAttributes[\"error\"] = errorAttributes[\"message\"] // #4\n        errorAttributes[\"data\"] = errorAttributes[\"exception\"]  // #5\n        return errorAttributes\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003eSpring默认的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDefaultErrorAttributes\u003c/code\u003e就写的挺好，我们继承并扩展一下就可以了，当然你也可以删除或者完全替换里面的结构。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e先使用默认的方法构建一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eerrorAttributes\u003c/code\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esuccess\u003c/code\u003e属性，既然是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eErrorAttributes\u003c/code\u003e当然是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003efalse\u003c/code\u003e了。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e覆盖\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eerror\u003c/code\u003e属性，改为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emessage\u003c/code\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edata\u003c/code\u003e属性，在DEV环境时会添加错误的类信息。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e做了这个配置之后，错误信息的JSON会变成下面这样：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n  \"timestamp\": \"2019-07-19 16:56:41\",\n  \"status\": 500,\n  \"error\": \"/ by zero\",\n  \"exception\": \"java.lang.ArithmeticException\",\n  \"message\": \"/ by zero\",\n  \"path\": \"/web/api/public/admin/dota/version\",\n  \"success\": false,\n  \"data\": \"java.lang.ArithmeticException\"\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![springboot](/images/20180623_springboot.jpg)\n\n通常我们为了统一，和前端方便处理，写的API返回JSON会有固定的结构，比如下面这种：\n```json\n{\n    \"code\":200,\n    \"message\":\"hello world!\",\n    \"data\":{\n        \"user\":{}\n    }\n}\n```\n但是当返回码为非200时，比如接口不存在`404`，服务器错误`500`，Spring默认会返回一个类似这样的结构：\n\n```json\n{\n  \"timestamp\": \"2019-07-19 10:23:47\",\n  \"status\": 403,\n  \"error\": \"Forbidden\",\n  \"message\": \"没有权限\",\n  \"path\": \"/web/api/public/admin/dota/version\"\n}\n```\n\n下面进行简单配置即可实现这个JSON结构的自定义：\n\u003c!--more--\u003e\n\n```kotlin\nimport cn.wycode.web.DEV\nimport org.springframework.boot.web.servlet.error.DefaultErrorAttributes\nimport org.springframework.stereotype.Component\nimport org.springframework.web.context.request.WebRequest\n\n@Component\nclass WyErrorAttributes : DefaultErrorAttributes(DEV) { // #1\n    override fun getErrorAttributes(webRequest: WebRequest?, includeStackTrace: Boolean): MutableMap\u003cString, Any\u003e {\n        val errorAttributes = super.getErrorAttributes(webRequest, includeStackTrace) // #2\n        errorAttributes[\"success\"] = false // #3\n        errorAttributes[\"error\"] = errorAttributes[\"message\"] // #4\n        errorAttributes[\"data\"] = errorAttributes[\"exception\"]  // #5\n        return errorAttributes\n    }\n}\n```\n\n1. Spring默认的`DefaultErrorAttributes`就写的挺好，我们继承并扩展一下就可以了，当然你也可以删除或者完全替换里面的结构。\n2. 先使用默认的方法构建一个`errorAttributes`。\n3. 添加一个`success`属性，既然是`ErrorAttributes`当然是`false`了。\n4. 覆盖`error`属性，改为`message`。\n5. 添加`data`属性，在DEV环境时会添加错误的类信息。\n\n做了这个配置之后，错误信息的JSON会变成下面这样：\n\n```json\n{\n  \"timestamp\": \"2019-07-19 16:56:41\",\n  \"status\": 500,\n  \"error\": \"/ by zero\",\n  \"exception\": \"java.lang.ArithmeticException\",\n  \"message\": \"/ by zero\",\n  \"path\": \"/web/api/public/admin/dota/version\",\n  \"success\": false,\n  \"data\": \"java.lang.ArithmeticException\"\n}\n```","data":{"title":"SpringBoot工程自定义错误JSON字段","date":"2019-07-15","tags":["Java","Kotlin","Spring"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![springboot](/images/20180623_springboot.jpg)\n\n通常我们为了统一，和前端方便处理，写的API返回JSON会有固定的结构，比如下面这种：\n```json\n{\n    \"code\":200,\n    \"message\":\"hello world!\",\n    \"data\":{\n        \"user\":{}\n    }\n}\n```\n但是当返回码为非200时，比如接口不存在`404`，服务器错误`500`，Spring默认会返回一个类似这样的结构：\n\n```json\n{\n  \"timestamp\": \"2019-07-19 10:23:47\",\n  \"status\": 403,\n  \"error\": \"Forbidden\",\n  \"message\": \"没有权限\",\n  \"path\": \"/web/api/public/admin/dota/version\"\n}\n```\n\n下面进行简单配置即可实现这个JSON结构的自定义：\n"},{"id":"email","file":"email.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://cms-assets.tutsplus.com/uploads/users/23/posts/26357/preview_image/professional-email-signature-icon.jpg\" alt=\"email\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当需要后台发送通知的时候，Email是一个比较好的选择，因为它免费啊！\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章介绍如何使用SpringBoot发送邮件。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://cms-assets.tutsplus.com/uploads/users/23/posts/26357/preview_image/professional-email-signature-icon.jpg\" alt=\"email\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当需要后台发送通知的时候，Email是一个比较好的选择，因为它免费啊！\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章介绍如何使用SpringBoot发送邮件。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e添加依赖\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e如同其它\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estarter\u003c/code\u003e工具一样。SpringBoot为我们提供了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003espring-boot-starter-mail\u003c/code\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e    compile('org.springframework.boot:spring-boot-starter-mail')\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e配置\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e添加如下配置\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003espring.mail.host=smtp.exmail.qq.com\nspring.mail.username=wangyu@wycode.cn\nspring.mail.password=*********\nspring.mail.properties.mail.smtp.auth=true\nspring.mail.properties.mail.smtp.starttls.enable=true\nspring.mail.properties.mail.smtp.starttls.required=true\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003esmtp域名，用户名，密码，根据自己的填写。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e创建Service\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode.web.service\n\nimport org.apache.commons.logging.LogFactory\nimport org.springframework.mail.SimpleMailMessage\nimport org.springframework.mail.javamail.JavaMailSender\nimport org.springframework.scheduling.annotation.Async\nimport org.springframework.stereotype.Service\n\n@Service\nclass MailService(private val mailSender: JavaMailSender) {\n\n    private val log = LogFactory.getLog(this.javaClass)\n\n    @Async\n    fun sendSimpleMail(sendTo: String, subject: String, content: String) {\n        val message = SimpleMailMessage()\n        message.setFrom(\"wangyu@wycode.cn\")\n        message.setTo(sendTo)\n        message.setSubject(subject)\n        message.setText(content)\n        try {\n            mailSender.send(message)\n            log.error(\"已发送邮件 $subject 到 $sendTo\")\n        } catch (e: Exception) {\n            log.error(\"邮件发送失败！\", e)\n        }\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJavaMailSender\u003c/code\u003e由Spring自动注入\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@Async\u003c/code\u003e发送邮件这里采用异步方式，启用异步需要在Application使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@EnableAsync\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于SSL及发送端口\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCould not connect to SMTP host: smtp.163.com, port: 25\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本地运行ok，但是发布到阿里云ECS上就无法连接服务，这里是因为阿里云接上级通知禁用了25端口，客服建议使用安全的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e465\u003c/code\u003e端口。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e网上的教程很复杂，其实对于正规的SMTP服务器，我们只需添加如下两个属性就好了。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003espring.mail.port=465\nspring.mail.properties.mail.smtp.ssl.enable=true\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e端口改为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e465\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e启用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSSL\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请注明出处!\u003c/p\u003e\n","content":"\n![email](https://cms-assets.tutsplus.com/uploads/users/23/posts/26357/preview_image/professional-email-signature-icon.jpg)\n\n当需要后台发送通知的时候，Email是一个比较好的选择，因为它免费啊！\n\n这篇文章介绍如何使用SpringBoot发送邮件。\n\n\u003c!--more--\u003e\n\n## 添加依赖\n\n如同其它`starter`工具一样。SpringBoot为我们提供了`spring-boot-starter-mail`\n\n```js\n    compile('org.springframework.boot:spring-boot-starter-mail')\n```\n\n## 配置\n\n在`application.properties`添加如下配置\n\n```js\nspring.mail.host=smtp.exmail.qq.com\nspring.mail.username=wangyu@wycode.cn\nspring.mail.password=*********\nspring.mail.properties.mail.smtp.auth=true\nspring.mail.properties.mail.smtp.starttls.enable=true\nspring.mail.properties.mail.smtp.starttls.required=true\n```\n- smtp域名，用户名，密码，根据自己的填写。\n\n## 创建Service\n\n```kotlin\npackage cn.wycode.web.service\n\nimport org.apache.commons.logging.LogFactory\nimport org.springframework.mail.SimpleMailMessage\nimport org.springframework.mail.javamail.JavaMailSender\nimport org.springframework.scheduling.annotation.Async\nimport org.springframework.stereotype.Service\n\n@Service\nclass MailService(private val mailSender: JavaMailSender) {\n\n    private val log = LogFactory.getLog(this.javaClass)\n\n    @Async\n    fun sendSimpleMail(sendTo: String, subject: String, content: String) {\n        val message = SimpleMailMessage()\n        message.setFrom(\"wangyu@wycode.cn\")\n        message.setTo(sendTo)\n        message.setSubject(subject)\n        message.setText(content)\n        try {\n            mailSender.send(message)\n            log.error(\"已发送邮件 $subject 到 $sendTo\")\n        } catch (e: Exception) {\n            log.error(\"邮件发送失败！\", e)\n        }\n    }\n}\n```\n- `JavaMailSender`由Spring自动注入\n- `@Async`发送邮件这里采用异步方式，启用异步需要在Application使用`@EnableAsync`\n\n\n## 关于SSL及发送端口\n\n`Could not connect to SMTP host: smtp.163.com, port: 25`\n\n本地运行ok，但是发布到阿里云ECS上就无法连接服务，这里是因为阿里云接上级通知禁用了25端口，客服建议使用安全的`465`端口。\n\n网上的教程很复杂，其实对于正规的SMTP服务器，我们只需添加如下两个属性就好了。\n\n```js\nspring.mail.port=465\nspring.mail.properties.mail.smtp.ssl.enable=true\n```\n- 端口改为`465`\n- 启用`SSL`\n\n以上，转载请注明出处!","data":{"title":"使用SpringBoot发送SSL邮件","date":"2019-06-07","tags":["Kotlin","Spring","Java"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![email](https://cms-assets.tutsplus.com/uploads/users/23/posts/26357/preview_image/professional-email-signature-icon.jpg)\n\n当需要后台发送通知的时候，Email是一个比较好的选择，因为它免费啊！\n\n这篇文章介绍如何使用SpringBoot发送邮件。\n\n"},{"id":"comments-sql","file":"comments-sql.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://image.woshipm.com/wp-files/2018/04/QFTkYSkExyHKCzhTTl7V.jpg\" alt=\"网易云音乐\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e畅言的广告有点过于流氓，所以准备开发一套评论系统，除了博客，还能用在其它APP中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e基本需求类似网易云音乐的评论，可以对引用别人的评论回复，可以点赞。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://image.woshipm.com/wp-files/2018/04/QFTkYSkExyHKCzhTTl7V.jpg\" alt=\"网易云音乐\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e畅言的广告有点过于流氓，所以准备开发一套评论系统，除了博客，还能用在其它APP中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e基本需求类似网易云音乐的评论，可以对引用别人的评论回复，可以点赞。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e表结构\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e为了保证表结构尽可能简单的同时又支持类似网易云一样功能，同时又保证可扩展性，采用单表设计，表结构（映射实体）如下。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Entity\ndata class Comment(\n        @Id\n        @GeneratedValue(generator = \"seq_comment\")\n        @SequenceGenerator(name = \"seq_comment\", sequenceName = \"SEQ_COMMENT\", allocationSize = 1, initialValue = 1)\n        val id: Long = 0,\n        @ApiModelProperty(value = \"主题id\")\n        val topicId: String = \"\",\n        @ManyToOne\n        val app: CommentApp = CommentApp(),\n        @Column(length = 1023)\n        val content: String? = null,\n        @ApiModelProperty(value = \"评论类型，0.文字评论，1.点赞，2.图片评论\")\n        val type: Int = 0,\n        val fromUserId: String = \"\",\n        val fromUserName: String? = null,\n        val fromUserIcon: String? = null,\n        val toUserId: String? = null,\n        val toUserName: String? = null,\n        val toUserIcon: String? = null,\n        val toContent: String? = null,\n        val createTime: Date = Date(),\n        var likeCount: Int = 0)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e为了能够在多个app中使用，所以增加了一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCommentApp\u003c/code\u003e实体，里面包含一个name和accessKey，评论和app是多对一关系。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etype\u003c/code\u003e字段可以用来扩展为直接对文章点赞，以及图片的评论（\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003econtent\u003c/code\u003e为图片地址）。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e为了保持评论系统的独立，所以用户信息应该由使用评论的app提供，比如使用第三方登录。所以并不需要用户表。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里冗余引用的评论信息，就不需要考虑嵌套查询，以及实体嵌套，循环引用的问题。只保留一层引用，当然也就只支持一对一的回复了。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e页面展示上其实并不需要\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUserId\u003c/code\u003e，这里是考虑提高数据的可维护性。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e接口\u003c/h2\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e1.新增评论或点赞\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@ApiOperation(value = \"新增评论及点赞\")\n@RequestMapping(path = [\"/newComment\"], method = [RequestMethod.POST])\nfun newComment(@RequestParam accessKey: String,\n               @RequestParam appName: String,\n               @ApiParam(\"评论类型，0.文字评论，1.点赞，2.图片评论\", defaultValue = \"0\",example = \"0\",allowableValues = \"0,1,2\")\n               @RequestParam(required = false, defaultValue = \"0\") type: Int = 0,\n               @RequestParam topicId: String,\n               @RequestParam(required = false) content: String?,\n               @RequestParam fromUserId: String,\n               @RequestParam(required = false) fromUserName: String?,\n               @RequestParam(required = false) fromUserIcon: String?,\n               @RequestParam(required = false) toCommentId: Long?\n): JsonResult\u0026#x3C;Comment\u003e {\n    if (type \u0026#x3C; 0 || type \u003e 2) return JsonResult.error(\"参数错误\")\n    var contentText = content\n    //文字及图片评论内容限制\n    if (type == 0 || type == 2) {\n        if (StringUtils.isEmpty(contentText)) return JsonResult.error(\"内容不能为空\")\n        if (contentText!!.length \u003e 1023) return JsonResult.error(\"内容不能超过1000个字\")\n    }\n    val app = commentAppRepository.findByNameAndAccessKey(appName, accessKey)\n            ?: return JsonResult.error(\"app不存在，或key错误\")\n    //图片评论上传至OSS\n    if (type == 2) {\n        val file = storageService.loadTemp(contentText).toFile()\n        if (!file.exists()) {\n            return JsonResult.error(\"相片不存在\")\n        }\n        contentText = ossService.putFile(OssService.COMMENT_BUCKET_NAME, appName, file)\n                ?: return JsonResult.error(\"评论失败，请重试\")\n    }\n    //处理回复\n    var toComment: Comment? = null\n    if (toCommentId != null \u0026#x26;\u0026#x26; toCommentId \u003e 0) {\n        toComment = commentRepository.findById(toCommentId).orElse(null) ?: return JsonResult.error(\"被回复的评论不存在\")\n        if (toComment.topicId != topicId) return JsonResult.error(\"不能跨主题回复\")\n        if (toComment.type == 1) return JsonResult.error(\"不能对点赞回复\")\n        //对评论点赞，直接对点赞数+1，不保存此条评论\n        if (type == 1) {\n            toComment.likeCount++\n            return JsonResult.data(commentRepository.save(toComment))\n        }\n    }\n    //需要新增的comment\n    val comment = Comment(\n            topicId = topicId,\n            app = app,\n            content = contentText,\n            type = type,\n            fromUserId = fromUserId,\n            fromUserName = fromUserName,\n            fromUserIcon = fromUserIcon,\n            toUserId = toComment?.fromUserId,\n            toUserName = toComment?.fromUserName,\n            toUserIcon = toComment?.fromUserIcon,\n            toContent = toComment?.content)\n    log.info(\"$fromUserName 评论了 ${app.name} 的 $topicId\")\n    return JsonResult.data(commentRepository.save(comment))\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e2.获取评论列表\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@ApiOperation(value = \"获取评论列表\")\n@RequestMapping(path = [\"/getComments\"], method = [RequestMethod.GET])\nfun getComments(@RequestParam accessKey: String,\n                @RequestParam appName: String,\n                @RequestParam topicId: String): JsonResult\u0026#x3C;List\u0026#x3C;Comment\u003e\u003e {\n    commentAppRepository.findByNameAndAccessKey(appName, accessKey)\n            ?: return JsonResult.error(\"app不存在，或key错误\")\n    return JsonResult.data(commentRepository.findAllByApp_NameAndTopicIdAndDeleted(appName, topicId))\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e最终效果即为目前页面下方的评论功能。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请注明出处!\u003c/p\u003e\n","content":"\n![网易云音乐](https://image.woshipm.com/wp-files/2018/04/QFTkYSkExyHKCzhTTl7V.jpg)\n\n畅言的广告有点过于流氓，所以准备开发一套评论系统，除了博客，还能用在其它APP中。\n\n基本需求类似网易云音乐的评论，可以对引用别人的评论回复，可以点赞。\n\n\u003c!--more--\u003e\n\n## 表结构\n\n为了保证表结构尽可能简单的同时又支持类似网易云一样功能，同时又保证可扩展性，采用单表设计，表结构（映射实体）如下。\n\n```kotlin\n@Entity\ndata class Comment(\n        @Id\n        @GeneratedValue(generator = \"seq_comment\")\n        @SequenceGenerator(name = \"seq_comment\", sequenceName = \"SEQ_COMMENT\", allocationSize = 1, initialValue = 1)\n        val id: Long = 0,\n        @ApiModelProperty(value = \"主题id\")\n        val topicId: String = \"\",\n        @ManyToOne\n        val app: CommentApp = CommentApp(),\n        @Column(length = 1023)\n        val content: String? = null,\n        @ApiModelProperty(value = \"评论类型，0.文字评论，1.点赞，2.图片评论\")\n        val type: Int = 0,\n        val fromUserId: String = \"\",\n        val fromUserName: String? = null,\n        val fromUserIcon: String? = null,\n        val toUserId: String? = null,\n        val toUserName: String? = null,\n        val toUserIcon: String? = null,\n        val toContent: String? = null,\n        val createTime: Date = Date(),\n        var likeCount: Int = 0)\n```\n- 为了能够在多个app中使用，所以增加了一个`CommentApp`实体，里面包含一个name和accessKey，评论和app是多对一关系。\n- `type`字段可以用来扩展为直接对文章点赞，以及图片的评论（`content`为图片地址）。\n- 为了保持评论系统的独立，所以用户信息应该由使用评论的app提供，比如使用第三方登录。所以并不需要用户表。\n- 这里冗余引用的评论信息，就不需要考虑嵌套查询，以及实体嵌套，循环引用的问题。只保留一层引用，当然也就只支持一对一的回复了。\n- 页面展示上其实并不需要`UserId`，这里是考虑提高数据的可维护性。\n\n## 接口\n\n### 1.新增评论或点赞\n\n```kotlin\n@ApiOperation(value = \"新增评论及点赞\")\n@RequestMapping(path = [\"/newComment\"], method = [RequestMethod.POST])\nfun newComment(@RequestParam accessKey: String,\n               @RequestParam appName: String,\n               @ApiParam(\"评论类型，0.文字评论，1.点赞，2.图片评论\", defaultValue = \"0\",example = \"0\",allowableValues = \"0,1,2\")\n               @RequestParam(required = false, defaultValue = \"0\") type: Int = 0,\n               @RequestParam topicId: String,\n               @RequestParam(required = false) content: String?,\n               @RequestParam fromUserId: String,\n               @RequestParam(required = false) fromUserName: String?,\n               @RequestParam(required = false) fromUserIcon: String?,\n               @RequestParam(required = false) toCommentId: Long?\n): JsonResult\u003cComment\u003e {\n    if (type \u003c 0 || type \u003e 2) return JsonResult.error(\"参数错误\")\n    var contentText = content\n    //文字及图片评论内容限制\n    if (type == 0 || type == 2) {\n        if (StringUtils.isEmpty(contentText)) return JsonResult.error(\"内容不能为空\")\n        if (contentText!!.length \u003e 1023) return JsonResult.error(\"内容不能超过1000个字\")\n    }\n    val app = commentAppRepository.findByNameAndAccessKey(appName, accessKey)\n            ?: return JsonResult.error(\"app不存在，或key错误\")\n    //图片评论上传至OSS\n    if (type == 2) {\n        val file = storageService.loadTemp(contentText).toFile()\n        if (!file.exists()) {\n            return JsonResult.error(\"相片不存在\")\n        }\n        contentText = ossService.putFile(OssService.COMMENT_BUCKET_NAME, appName, file)\n                ?: return JsonResult.error(\"评论失败，请重试\")\n    }\n    //处理回复\n    var toComment: Comment? = null\n    if (toCommentId != null \u0026\u0026 toCommentId \u003e 0) {\n        toComment = commentRepository.findById(toCommentId).orElse(null) ?: return JsonResult.error(\"被回复的评论不存在\")\n        if (toComment.topicId != topicId) return JsonResult.error(\"不能跨主题回复\")\n        if (toComment.type == 1) return JsonResult.error(\"不能对点赞回复\")\n        //对评论点赞，直接对点赞数+1，不保存此条评论\n        if (type == 1) {\n            toComment.likeCount++\n            return JsonResult.data(commentRepository.save(toComment))\n        }\n    }\n    //需要新增的comment\n    val comment = Comment(\n            topicId = topicId,\n            app = app,\n            content = contentText,\n            type = type,\n            fromUserId = fromUserId,\n            fromUserName = fromUserName,\n            fromUserIcon = fromUserIcon,\n            toUserId = toComment?.fromUserId,\n            toUserName = toComment?.fromUserName,\n            toUserIcon = toComment?.fromUserIcon,\n            toContent = toComment?.content)\n    log.info(\"$fromUserName 评论了 ${app.name} 的 $topicId\")\n    return JsonResult.data(commentRepository.save(comment))\n}\n```\n\n### 2.获取评论列表\n\n```kotlin\n@ApiOperation(value = \"获取评论列表\")\n@RequestMapping(path = [\"/getComments\"], method = [RequestMethod.GET])\nfun getComments(@RequestParam accessKey: String,\n                @RequestParam appName: String,\n                @RequestParam topicId: String): JsonResult\u003cList\u003cComment\u003e\u003e {\n    commentAppRepository.findByNameAndAccessKey(appName, accessKey)\n            ?: return JsonResult.error(\"app不存在，或key错误\")\n    return JsonResult.data(commentRepository.findAllByApp_NameAndTopicIdAndDeleted(appName, topicId))\n}\n```\n\n最终效果即为目前页面下方的评论功能。\n\n以上，转载请注明出处!\n","data":{"title":"从0开始开发一个评论系统","date":"2019-05-21","tags":["Kotlin","SQL","Spring","JPA","Hibernate"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![网易云音乐](https://image.woshipm.com/wp-files/2018/04/QFTkYSkExyHKCzhTTl7V.jpg)\n\n畅言的广告有点过于流氓，所以准备开发一套评论系统，除了博客，还能用在其它APP中。\n\n基本需求类似网易云音乐的评论，可以对引用别人的评论回复，可以点赞。\n\n"},{"id":"web-flux","file":"web-flux.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180720_diagram-boot-reactor.svg\" alt=\"Spring Boot\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring Boot 2.0\u003c/code\u003e 带来了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring Framework 5\u003c/code\u003e 中的新的WebFlux技术，WebFlux是基于响应式非阻塞IO编程模型的技术栈。从而能够使用不同于以往基于Servlet API的阻塞式IO处理的新方式编写后台应用。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e相比以往阻塞式IO编程，响应式编程能够获得更小的开销。因为它直接处理流，而不是单个数据。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e响应式编程最早由 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.NET\u003c/code\u003e 平台上的 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactive Extensions (Rx)\u003c/code\u003e 库来实现。后来迁移到 Java 平台之后就产生了著名的 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava\u003c/code\u003e 库，并产生了很多其他编程语言上的对应实现。在这些实现的基础上产生了后来的响应式流（\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactive Streams\u003c/code\u003e）规范。该规范定义了响应式流的相关接口，并将集成到 Java 9 中。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180720_diagram-boot-reactor.svg\" alt=\"Spring Boot\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring Boot 2.0\u003c/code\u003e 带来了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring Framework 5\u003c/code\u003e 中的新的WebFlux技术，WebFlux是基于响应式非阻塞IO编程模型的技术栈。从而能够使用不同于以往基于Servlet API的阻塞式IO处理的新方式编写后台应用。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e相比以往阻塞式IO编程，响应式编程能够获得更小的开销。因为它直接处理流，而不是单个数据。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e响应式编程最早由 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.NET\u003c/code\u003e 平台上的 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactive Extensions (Rx)\u003c/code\u003e 库来实现。后来迁移到 Java 平台之后就产生了著名的 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava\u003c/code\u003e 库，并产生了很多其他编程语言上的对应实现。在这些实现的基础上产生了后来的响应式流（\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactive Streams\u003c/code\u003e）规范。该规范定义了响应式流的相关接口，并将集成到 Java 9 中。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e为什么要用响应式\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e在传统的编程范式中，我们一般通过迭代器（\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIterator\u003c/code\u003e）模式来遍历一个序列。这种遍历方式是由调用者来控制节奏的，采用的是拉的方式。每次由调用者通过 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enext()\u003c/code\u003e方法来获取序列中的下一个值。使用响应式流时采用的则是推的方式，即常见的发布者-订阅者模式。当发布者有新的数据产生时，这些数据会被推送到订阅者来进行处理。在响应式流上可以添加各种不同的操作来对数据进行处理，形成数据处理链。这个以声明式的方式添加的处理链只在订阅者进行订阅操作时才会真正执行。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e响应类型不是为了让你更快地处理请求或数据，实际上与常规阻塞处理相比，它们会带来更小的开销。 它们的优势在于它们能够同时提供更多请求，以及处理延迟操作，例如更有效地从远程服务器请求数据，或者处理来自客户端的请求。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e它们允许你通过本地处理时间和延迟来提供更好的服务质量和可预测的容量规划，而无需消耗更多资源。与等待结果时阻止当前线程的传统处理不同，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactive\u003c/code\u003e API没有等待成本，仅请求它能够处理的数据量并提供立刻返回，因为它处理数据流，而不仅仅是单个元素。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e为什么使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactor\u003c/code\u003e而不是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava\u003c/code\u003e\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava\u003c/code\u003e 库是 JVM 上响应式编程的先驱，也是响应式流规范的基础。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava 2\u003c/code\u003e 在 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava\u003c/code\u003e 的基础上做了很多的更新。不过 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava\u003c/code\u003e 库也有其不足的地方。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava\u003c/code\u003e 产生于响应式流规范之前，虽然可以和响应式流的接口进行转换，但是由于底层实现的原因，使用起来并不是很直观。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava 2\u003c/code\u003e 在设计和实现时考虑到了与规范的整合，不过为了保持与 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava\u003c/code\u003e 的兼容性，很多地方在使用时也并不直观。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactor\u003c/code\u003e 则是完全基于响应式流规范设计和实现的库，没有 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava\u003c/code\u003e 那样的历史包袱，在使用上更加的直观易懂。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactor\u003c/code\u003e 也是 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring 5\u003c/code\u003e 中响应式编程的基础。学习和掌握 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactor\u003c/code\u003e 可以更好地理解 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring 5\u003c/code\u003e 中的相关概念。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eReactive Streams\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactor\u003c/code\u003e建立在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactive Streams\u003c/code\u003e规范之上。 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactive Streams\u003c/code\u003e由4个简单的Java接口（\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ePublisher\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSubscriber\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSubscription\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eProcessor\u003c/code\u003e），文本规范和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTCK\u003c/code\u003e组成。它是每个现代Reactive库的基石，也是互操作性的必备条件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e响应式流中第一个重要概念是背压（backpressure）。在基本的消息推送模式中，当消息发布者产生数据的速度过快时，会使得消息订阅者的处理速度无法跟上产生的速度，从而给订阅者造成很大的压力。当压力过大时，有可能造成订阅者本身的奔溃，所产生的级联效应甚至可能造成整个系统的瘫痪。背压的作用在于提供一种从订阅者到生产者的反馈渠道。订阅者可以通过 request()方法来声明其一次所能处理的消息数量，而生产者就只会产生相应数量的消息，直到下一次 request()方法调用。这实际上变成了推拉结合的模式。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e例如，当HTTP连接速度太慢时，在从数据库扩展到HTTP响应的被动组件的管道中，数据存储库也可以减速或完全停止，直到网络容量释放为止。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJava 9在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ejava.util.concurrent.Flow\u003c/code\u003e容器类中包含了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactive Streams\u003c/code\u003e接口\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFlux\u003c/code\u003e 和 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMono\u003c/code\u003e\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFlux\u003c/code\u003e 和 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMono\u003c/code\u003e 是 Reactor 中的两个基本概念。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFlux\u003c/code\u003e 表示的是包含 0 到 N 个元素的异步序列。在该序列中可以包含三种不同类型的消息通知：正常的包含元素的消息、序列结束的消息和序列出错的消息。当消息通知产生时，订阅者中对应的方法 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eonNext()\u003c/code\u003e, \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eonComplete()\u003c/code\u003e和 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eonError()\u003c/code\u003e会被调用。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMono\u003c/code\u003e 表示的是包含 0 或者 1 个元素的异步序列。该序列中同样可以包含与 Flux 相同的三种类型的消息通知。Flux 和 Mono 之间可以进行转换。对一个 Flux 序列进行计数操作，得到的结果是一个 Mono\u003clong\u003e对象。把两个 Mono 序列合并在一起，得到的是一个 Flux 对象。\u003c/long\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e参考文献：\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e1.\u003ca href=\"https://docs.spring.io/spring-framework/docs/5.0.0.BUILD-SNAPSHOT/spring-framework-reference/html/web-reactive.html\" title=\"Spring官方WebFlux文档\" class=\"text-sky-500 hover:text-sky-400\"\u003eSpring官方WebFlux文档\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e2.\u003ca href=\"https://spring.io/blog/2016/04/19/understanding-reactive-types\" title=\"Understanding Reactive types\" class=\"text-sky-500 hover:text-sky-400\"\u003eUnderstanding Reactive types\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e3.\u003ca href=\"https://www.ibm.com/developerworks/cn/java/j-cn-with-reactor-response-encode/index.html\" title=\"使用 Reactor 进行反应式编程\" class=\"text-sky-500 hover:text-sky-400\"\u003e使用 Reactor 进行反应式编程\u003c/a\u003e\u003c/p\u003e\n","content":"\n![Spring Boot](/images/20180720_diagram-boot-reactor.svg)\n\n\u003e `Spring Boot 2.0` 带来了`Spring Framework 5` 中的新的WebFlux技术，WebFlux是基于响应式非阻塞IO编程模型的技术栈。从而能够使用不同于以往基于Servlet API的阻塞式IO处理的新方式编写后台应用。\n\n\u003e 相比以往阻塞式IO编程，响应式编程能够获得更小的开销。因为它直接处理流，而不是单个数据。\n\n\u003e 响应式编程最早由 `.NET` 平台上的 `Reactive Extensions (Rx)` 库来实现。后来迁移到 Java 平台之后就产生了著名的 `RxJava` 库，并产生了很多其他编程语言上的对应实现。在这些实现的基础上产生了后来的响应式流（`Reactive Streams`）规范。该规范定义了响应式流的相关接口，并将集成到 Java 9 中。\n\n\u003c!--more--\u003e\n\n## 为什么要用响应式\n\n在传统的编程范式中，我们一般通过迭代器（`Iterator`）模式来遍历一个序列。这种遍历方式是由调用者来控制节奏的，采用的是拉的方式。每次由调用者通过 `next()`方法来获取序列中的下一个值。使用响应式流时采用的则是推的方式，即常见的发布者-订阅者模式。当发布者有新的数据产生时，这些数据会被推送到订阅者来进行处理。在响应式流上可以添加各种不同的操作来对数据进行处理，形成数据处理链。这个以声明式的方式添加的处理链只在订阅者进行订阅操作时才会真正执行。\n\n响应类型不是为了让你更快地处理请求或数据，实际上与常规阻塞处理相比，它们会带来更小的开销。 它们的优势在于它们能够同时提供更多请求，以及处理延迟操作，例如更有效地从远程服务器请求数据，或者处理来自客户端的请求。\n\n它们允许你通过本地处理时间和延迟来提供更好的服务质量和可预测的容量规划，而无需消耗更多资源。与等待结果时阻止当前线程的传统处理不同，`Reactive` API没有等待成本，仅请求它能够处理的数据量并提供立刻返回，因为它处理数据流，而不仅仅是单个元素。\n\n\n## 为什么使用`Reactor`而不是`RxJava`\n\n`RxJava` 库是 JVM 上响应式编程的先驱，也是响应式流规范的基础。`RxJava 2` 在 `RxJava` 的基础上做了很多的更新。不过 `RxJava` 库也有其不足的地方。`RxJava` 产生于响应式流规范之前，虽然可以和响应式流的接口进行转换，但是由于底层实现的原因，使用起来并不是很直观。`RxJava 2` 在设计和实现时考虑到了与规范的整合，不过为了保持与 `RxJava` 的兼容性，很多地方在使用时也并不直观。`Reactor` 则是完全基于响应式流规范设计和实现的库，没有 `RxJava` 那样的历史包袱，在使用上更加的直观易懂。`Reactor` 也是 `Spring 5` 中响应式编程的基础。学习和掌握 `Reactor` 可以更好地理解 `Spring 5` 中的相关概念。\n\n## Reactive Streams\n\n`Reactor`建立在`Reactive Streams`规范之上。 `Reactive Streams`由4个简单的Java接口（`Publisher`，`Subscriber`，`Subscription`和`Processor`），文本规范和`TCK`组成。它是每个现代Reactive库的基石，也是互操作性的必备条件。\n\n响应式流中第一个重要概念是背压（backpressure）。在基本的消息推送模式中，当消息发布者产生数据的速度过快时，会使得消息订阅者的处理速度无法跟上产生的速度，从而给订阅者造成很大的压力。当压力过大时，有可能造成订阅者本身的奔溃，所产生的级联效应甚至可能造成整个系统的瘫痪。背压的作用在于提供一种从订阅者到生产者的反馈渠道。订阅者可以通过 request()方法来声明其一次所能处理的消息数量，而生产者就只会产生相应数量的消息，直到下一次 request()方法调用。这实际上变成了推拉结合的模式。\n\n例如，当HTTP连接速度太慢时，在从数据库扩展到HTTP响应的被动组件的管道中，数据存储库也可以减速或完全停止，直到网络容量释放为止。\n\n\u003e Java 9在`java.util.concurrent.Flow`容器类中包含了`Reactive Streams`接口\n\n\n\n## `Flux` 和 `Mono`\n\n`Flux` 和 `Mono` 是 Reactor 中的两个基本概念。\n\n`Flux` 表示的是包含 0 到 N 个元素的异步序列。在该序列中可以包含三种不同类型的消息通知：正常的包含元素的消息、序列结束的消息和序列出错的消息。当消息通知产生时，订阅者中对应的方法 `onNext()`, `onComplete()`和 `onError()`会被调用。\n\n`Mono` 表示的是包含 0 或者 1 个元素的异步序列。该序列中同样可以包含与 Flux 相同的三种类型的消息通知。Flux 和 Mono 之间可以进行转换。对一个 Flux 序列进行计数操作，得到的结果是一个 Mono\u003cLong\u003e对象。把两个 Mono 序列合并在一起，得到的是一个 Flux 对象。\n\n参考文献：\n\n1.[Spring官方WebFlux文档](https://docs.spring.io/spring-framework/docs/5.0.0.BUILD-SNAPSHOT/spring-framework-reference/html/web-reactive.html \"Spring官方WebFlux文档\")\n\n2.[Understanding Reactive types](https://spring.io/blog/2016/04/19/understanding-reactive-types \"Understanding Reactive types\")\n\n3.[使用 Reactor 进行反应式编程](https://www.ibm.com/developerworks/cn/java/j-cn-with-reactor-response-encode/index.html \"使用 Reactor 进行反应式编程\")","data":{"title":"理解Spring WebFlux框架中的响应式类型","date":"2018-07-20","tags":["Spring","RxJava","WebFlux","Java","Kotlin"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![Spring Boot](/images/20180720_diagram-boot-reactor.svg)\n\n\u003e `Spring Boot 2.0` 带来了`Spring Framework 5` 中的新的WebFlux技术，WebFlux是基于响应式非阻塞IO编程模型的技术栈。从而能够使用不同于以往基于Servlet API的阻塞式IO处理的新方式编写后台应用。\n\n\u003e 相比以往阻塞式IO编程，响应式编程能够获得更小的开销。因为它直接处理流，而不是单个数据。\n\n\u003e 响应式编程最早由 `.NET` 平台上的 `Reactive Extensions (Rx)` 库来实现。后来迁移到 Java 平台之后就产生了著名的 `RxJava` 库，并产生了很多其他编程语言上的对应实现。在这些实现的基础上产生了后来的响应式流（`Reactive Streams`）规范。该规范定义了响应式流的相关接口，并将集成到 Java 9 中。\n\n"},{"id":"springboot-static-content","file":"springboot-static-content.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180623_springboot.jpg\" alt=\"springboot\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e我们知道SpringBoot内置了tomcat服务器，从而一个jar包就能实现web服务。但有时我们又想像传统tomcat那样部署一些外部的静态资源，虽然静态资源放在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eresource\u003c/code\u003e文件夹的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estatic\u003c/code\u003e就能解决问题，但是static文件夹的内容会作为jar的一部分，要替换的话只能替换整个jar包，极为不便。能不能配置jar包外部的文件夹作为静态资源目录呢。当然是可以的...\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e以下示例代码基于SpringBoot 2.0.3，采用Kotlin语言实现：\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180623_springboot.jpg\" alt=\"springboot\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e我们知道SpringBoot内置了tomcat服务器，从而一个jar包就能实现web服务。但有时我们又想像传统tomcat那样部署一些外部的静态资源，虽然静态资源放在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eresource\u003c/code\u003e文件夹的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estatic\u003c/code\u003e就能解决问题，但是static文件夹的内容会作为jar的一部分，要替换的话只能替换整个jar包，极为不便。能不能配置jar包外部的文件夹作为静态资源目录呢。当然是可以的...\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e以下示例代码基于SpringBoot 2.0.3，采用Kotlin语言实现：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eWebMvcConfigurer\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e新版Spring利用了Java8新特性，interface可以有default关键字，从而接口方法不用全部实现。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\nclass WebConfiguration : WebMvcConfigurer {\n\n    override fun addResourceHandlers(registry: ResourceHandlerRegistry) {\n        super.addResourceHandlers(registry)\n        registry.addResourceHandler(\"/**\")\n                .addResourceLocations(\"file:static/\")\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@Configuration\u003c/code\u003e注解表明这是一个配置类，会被Spring框架识别并管理。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebConfiguration\u003c/code\u003e类实现\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebMvcConfigurer\u003c/code\u003e接口，并复写\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eaddResourceHandlers\u003c/code\u003e方法。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eaddResourceHandler(\"/**\")\u003c/code\u003e添加路由到服务器根目录。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.addResourceLocations(\"file:static/\")\u003c/code\u003e添加外部静态资源，这里路径表示和jar包同目录的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estatic\u003c/code\u003e文件夹。这样能想tomcat一样在static文件夹中部署静态资源了。而且不用重启SpringBoot服务\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n![springboot](/images/20180623_springboot.jpg)\n\n\u003e 我们知道SpringBoot内置了tomcat服务器，从而一个jar包就能实现web服务。但有时我们又想像传统tomcat那样部署一些外部的静态资源，虽然静态资源放在`resource`文件夹的`static`就能解决问题，但是static文件夹的内容会作为jar的一部分，要替换的话只能替换整个jar包，极为不便。能不能配置jar包外部的文件夹作为静态资源目录呢。当然是可以的...\n\n以下示例代码基于SpringBoot 2.0.3，采用Kotlin语言实现：\n\n\u003c!--more--\u003e\n\n## WebMvcConfigurer\n\n\u003e 新版Spring利用了Java8新特性，interface可以有default关键字，从而接口方法不用全部实现。\n\n```kotlin\n@Configuration\nclass WebConfiguration : WebMvcConfigurer {\n\n    override fun addResourceHandlers(registry: ResourceHandlerRegistry) {\n        super.addResourceHandlers(registry)\n        registry.addResourceHandler(\"/**\")\n                .addResourceLocations(\"file:static/\")\n    }\n}\n```\n\n- `@Configuration`注解表明这是一个配置类，会被Spring框架识别并管理。\n- `WebConfiguration`类实现`WebMvcConfigurer`接口，并复写`addResourceHandlers`方法。\n- `addResourceHandler(\"/**\")`添加路由到服务器根目录。\n- `.addResourceLocations(\"file:static/\")`添加外部静态资源，这里路径表示和jar包同目录的`static`文件夹。这样能想tomcat一样在static文件夹中部署静态资源了。而且不用重启SpringBoot服务\n","data":{"title":"SpringBoot配置Jar外部静态资源","date":"2018-06-23","tags":["Spring","Java"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![springboot](/images/20180623_springboot.jpg)\n\n\u003e 我们知道SpringBoot内置了tomcat服务器，从而一个jar包就能实现web服务。但有时我们又想像传统tomcat那样部署一些外部的静态资源，虽然静态资源放在`resource`文件夹的`static`就能解决问题，但是static文件夹的内容会作为jar的一部分，要替换的话只能替换整个jar包，极为不便。能不能配置jar包外部的文件夹作为静态资源目录呢。当然是可以的...\n\n以下示例代码基于SpringBoot 2.0.3，采用Kotlin语言实现：\n\n"},{"id":"many-to-many","file":"many-to-many.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://tse3-mm.cn.bing.net/th/id/OIP-C.BJ09SzSPlUf5QzF_EryfdwAAAA?pid=ImgDet\u0026#x26;rs=1\" alt=\"Spring JPA\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJPA是Java Persistence API的简称是Java的ORM规范，实现这个规范的有著名的Hibernate等ORM框架。JDK 5.0注解或XML描述对象－关系表的映射关系，并将运行期的实体对象持久化到数据库中。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e多对多关系是关联关系中最复杂的。本文使用Spring JPA框架总结多对多关系及\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e注解的详细使用。明白了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e,其它\n\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@OneToMany\u003c/code\u003e 和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@OneToOne\u003c/code\u003e就简单很多了。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://tse3-mm.cn.bing.net/th/id/OIP-C.BJ09SzSPlUf5QzF_EryfdwAAAA?pid=ImgDet\u0026#x26;rs=1\" alt=\"Spring JPA\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJPA是Java Persistence API的简称是Java的ORM规范，实现这个规范的有著名的Hibernate等ORM框架。JDK 5.0注解或XML描述对象－关系表的映射关系，并将运行期的实体对象持久化到数据库中。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e多对多关系是关联关系中最复杂的。本文使用Spring JPA框架总结多对多关系及\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e注解的详细使用。明白了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e,其它\n\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@OneToMany\u003c/code\u003e 和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@OneToOne\u003c/code\u003e就简单很多了。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eJava和JPA中的多对多关系\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e根据维基百科定义：Java中的多对多关系是指源对象具有目标对象集合的属性，并且（如果存在的话）这个目标对象与原对象具有反向关系，则它也将成为多对多关系。需要注意的是：Java和JPA中的所有关系都是单向的，因为存在源对象引用目标对象的情况下，也不能保证目标对象也与原对象有关系。这与关系数据库不同，在关系数据库中，通过外键定义并查询，使得反向查询总是存在的。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJPA还定义了一个OneToMany关系，它与ManyToMany关系类似，但反向关系（如果已定义）是ManyToOne关系。 OneToMany与JPA中ManyToMany关系的主要区别在于，ManyToMany总是使用中间关系连接表来存储关系，OneToMany可以使用连接表或者目标对象的表引用中的外键源对象表的主键。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e传统项目开发，会有一个设计表的过程，然后由DBA写一大堆\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecreate table ***\u003c/code\u003e。很麻烦也很慢。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eJPA框架在运行时，会根据实体定义自动创建表，自动更新表字段，使用JPA可以说一行SQL都不用写，甚至不用关心底层数据库到底是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMySQL\u003c/code\u003e还是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOracle\u003c/code\u003e还是其它。以下例子中我不定义表名，列名，所以没有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@Column\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@Table\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@JoinTable\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@JoinColumn\u003c/code\u003e等。由JPA框架自动根据实体名称生成表名，列名。我觉得Hibernate生成的表名和列名挺好也符合规范。就不多此一举了。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e@ManyToMany 注解\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e在JPA中使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e注解表示多对多关系。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e学生和老师，典型的多对多关系:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Entity\npublic class Student {\n    @Id\n    private String id;\n    @ManyToMany\n    private List\u0026#x3C;Teacher\u003e teachers;\n}\n\n@Entity\npublic class Teacher {\n    @Id\n    private String id;\n    @ManyToMany\n    private List\u0026#x3C;Student\u003e students;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e上面例子中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e即表示了老师和学生的多对多关系。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e注解可以用在字段或方法上。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e但这样做是有问题的，生成的中间表有两个，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTEACHER_STUDENTS\u003c/code\u003e表和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSTUDENT_TEACHERS\u003c/code\u003e。原因是这里的多对多关系正是维基百科提到的单向原则。老师和学生虽然分别定义了自己的多对多关系，但这个关系都是单向的，要使关系成为双向。就需要下面的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emappedBy\u003c/code\u003e属性。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003emappedBy 属性\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emappedBy\u003c/code\u003e是OneToOne、OneToMany和ManyToMany这三种关联关系的属性。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e用来标注\u003cstrong\u003e拥有\u003c/strong\u003e这种关系的字段。 除非关系是单向的，否则是必需的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e那么什么叫拥有关联关系呢，假设是双向一对一的话，那么拥有关系的这一方有建立、解除和更新与另一方关系的能力。而另一方没有，只能被动管理。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e由于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJoinTable\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJoinColumn\u003c/code\u003e一般定义在拥有关系的这一端，而\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emappedBy\u003c/code\u003e一定是定义在关系的被拥有方（the owned side），也就是跟定义\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJoinTable\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJoinColumn\u003c/code\u003e互斥的一方，它的值指向拥有方中关于被拥有方的字段，可能是一个对象（\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOneToMany\u003c/code\u003e），也可能是一个对象集合（\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eManyToMany\u003c/code\u003e）。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e上面的例子中，维护老师和学生的多对多关系，明显只需要一张中间表就可以了，我们假设老师是维护关系（拥有关系）的一端，则实体定义修改如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Entity\npublic class Student {\n    @Id\n    private String id;\n    @ManyToMany(mappedBy = \"students\")\n    private List\u0026#x3C;Teacher\u003e teachers;\n}\n\n@Entity\npublic class Teacher {\n    @Id\n    private String id;\n    @ManyToMany\n    private List\u0026#x3C;Student\u003e students;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这时中间表只有一张\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTEACHER_STUDENTS\u003c/code\u003e，关联关系也变成了我们想要的双向关系。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eCascade 级联关系\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e实际业务中，我们通常会遇到以下情况：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e用户和用户的收货地址是一对多关系，当用户被删除时，这个用户的所有收货地址也应该一并删除。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e订单和订单中的商品也是一对多关系，但订单被删除时，订单所关联的商品肯定不能被删除。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e此时只要配置正确的级联关系，就能达到想要的效果。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e级联关系类型：\u003c/h3\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eCascadeType.REFRESH：级联刷新，当多个用户同时作操作一个实体，为了用户取到的数据是实时的，在用实体中的数据之前就可以调用一下refresh()方法\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eCascadeType.REMOVE：级联删除，当调用remove()方法删除Order实体时会先级联删除OrderItem的相关数据\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eCascadeType.MERGE：级联更新，当调用了Merge()方法，如果Order中的数据改变了会相应的更新OrderItem中的数据\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eCascadeType.ALL：包含以上所有级联属性\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eCascadeType.PERSIST：级联保存，当调用了Persist() 方法，会级联保存相应的数据\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e需要注意的是，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCascadeType.ALL\u003c/code\u003e要谨慎使用，为了达到数据同步，很多人喜欢用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCascadeType.ALL\u003c/code\u003e来实现。但上面订单和商品的例子就不适用。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e以上\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e未经同意禁止转载！\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e不对的地方欢迎指正！\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n![Spring JPA](https://tse3-mm.cn.bing.net/th/id/OIP-C.BJ09SzSPlUf5QzF_EryfdwAAAA?pid=ImgDet\u0026rs=1)\n\n\u003e JPA是Java Persistence API的简称是Java的ORM规范，实现这个规范的有著名的Hibernate等ORM框架。JDK 5.0注解或XML描述对象－关系表的映射关系，并将运行期的实体对象持久化到数据库中。\n\n多对多关系是关联关系中最复杂的。本文使用Spring JPA框架总结多对多关系及`@ManyToMany`注解的详细使用。明白了`@ManyToMany`,其它\n`@OneToMany` 和`@OneToOne`就简单很多了。\n\n\u003c!--more--\u003e\n\n## Java和JPA中的多对多关系\n\n\u003e 根据维基百科定义：Java中的多对多关系是指源对象具有目标对象集合的属性，并且（如果存在的话）这个目标对象与原对象具有反向关系，则它也将成为多对多关系。需要注意的是：Java和JPA中的所有关系都是单向的，因为存在源对象引用目标对象的情况下，也不能保证目标对象也与原对象有关系。这与关系数据库不同，在关系数据库中，通过外键定义并查询，使得反向查询总是存在的。\n\n\u003e JPA还定义了一个OneToMany关系，它与ManyToMany关系类似，但反向关系（如果已定义）是ManyToOne关系。 OneToMany与JPA中ManyToMany关系的主要区别在于，ManyToMany总是使用中间关系连接表来存储关系，OneToMany可以使用连接表或者目标对象的表引用中的外键源对象表的主键。\n\n传统项目开发，会有一个设计表的过程，然后由DBA写一大堆`create table ***`。很麻烦也很慢。\n\nJPA框架在运行时，会根据实体定义自动创建表，自动更新表字段，使用JPA可以说一行SQL都不用写，甚至不用关心底层数据库到底是`MySQL`还是`Oracle`还是其它。以下例子中我不定义表名，列名，所以没有`@Column`、`@Table`、`@JoinTable`、`@JoinColumn`等。由JPA框架自动根据实体名称生成表名，列名。我觉得Hibernate生成的表名和列名挺好也符合规范。就不多此一举了。\n\n## @ManyToMany 注解\n\n在JPA中使用`@ManyToMany`注解表示多对多关系。\n\n学生和老师，典型的多对多关系:\n\n```java\n@Entity\npublic class Student {\n    @Id\n    private String id;\n    @ManyToMany\n    private List\u003cTeacher\u003e teachers;\n}\n\n@Entity\npublic class Teacher {\n    @Id\n    private String id;\n    @ManyToMany\n    private List\u003cStudent\u003e students;\n}\n```\n\n上面例子中的`@ManyToMany`即表示了老师和学生的多对多关系。`@ManyToMany`注解可以用在字段或方法上。\n\n但这样做是有问题的，生成的中间表有两个，`TEACHER_STUDENTS`表和`STUDENT_TEACHERS`。原因是这里的多对多关系正是维基百科提到的单向原则。老师和学生虽然分别定义了自己的多对多关系，但这个关系都是单向的，要使关系成为双向。就需要下面的`mappedBy`属性。\n\n## mappedBy 属性\n\n`mappedBy`是OneToOne、OneToMany和ManyToMany这三种关联关系的属性。\n\n用来标注**拥有**这种关系的字段。 除非关系是单向的，否则是必需的。\n\n那么什么叫拥有关联关系呢，假设是双向一对一的话，那么拥有关系的这一方有建立、解除和更新与另一方关系的能力。而另一方没有，只能被动管理。\n\n由于`JoinTable`和`JoinColumn`一般定义在拥有关系的这一端，而`mappedBy`一定是定义在关系的被拥有方（the owned side），也就是跟定义`JoinTable`和`JoinColumn`互斥的一方，它的值指向拥有方中关于被拥有方的字段，可能是一个对象（`OneToMany`），也可能是一个对象集合（`ManyToMany`）。\n\n上面的例子中，维护老师和学生的多对多关系，明显只需要一张中间表就可以了，我们假设老师是维护关系（拥有关系）的一端，则实体定义修改如下：\n\n```java\n@Entity\npublic class Student {\n    @Id\n    private String id;\n    @ManyToMany(mappedBy = \"students\")\n    private List\u003cTeacher\u003e teachers;\n}\n\n@Entity\npublic class Teacher {\n    @Id\n    private String id;\n    @ManyToMany\n    private List\u003cStudent\u003e students;\n}\n```\n\n这时中间表只有一张`TEACHER_STUDENTS`，关联关系也变成了我们想要的双向关系。\n\n## Cascade 级联关系\n\n实际业务中，我们通常会遇到以下情况：\n\n1. 用户和用户的收货地址是一对多关系，当用户被删除时，这个用户的所有收货地址也应该一并删除。\n2. 订单和订单中的商品也是一对多关系，但订单被删除时，订单所关联的商品肯定不能被删除。\n\n此时只要配置正确的级联关系，就能达到想要的效果。\n\n### 级联关系类型：\n\n- CascadeType.REFRESH：级联刷新，当多个用户同时作操作一个实体，为了用户取到的数据是实时的，在用实体中的数据之前就可以调用一下refresh()方法\n- CascadeType.REMOVE：级联删除，当调用remove()方法删除Order实体时会先级联删除OrderItem的相关数据\n- CascadeType.MERGE：级联更新，当调用了Merge()方法，如果Order中的数据改变了会相应的更新OrderItem中的数据\n- CascadeType.ALL：包含以上所有级联属性\n- CascadeType.PERSIST：级联保存，当调用了Persist() 方法，会级联保存相应的数据\n\n需要注意的是，`CascadeType.ALL`要谨慎使用，为了达到数据同步，很多人喜欢用`CascadeType.ALL`来实现。但上面订单和商品的例子就不适用。\n\n## 以上\n\n- 未经同意禁止转载！\n- 不对的地方欢迎指正！\n","data":{"title":"Spring JPA框架中的@ManyToMany多对多关系的理解和使用","date":"2018-04-19","tags":["Spring","JPA","Java"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![Spring JPA](https://tse3-mm.cn.bing.net/th/id/OIP-C.BJ09SzSPlUf5QzF_EryfdwAAAA?pid=ImgDet\u0026rs=1)\n\n\u003e JPA是Java Persistence API的简称是Java的ORM规范，实现这个规范的有著名的Hibernate等ORM框架。JDK 5.0注解或XML描述对象－关系表的映射关系，并将运行期的实体对象持久化到数据库中。\n\n多对多关系是关联关系中最复杂的。本文使用Spring JPA框架总结多对多关系及`@ManyToMany`注解的详细使用。明白了`@ManyToMany`,其它\n`@OneToMany` 和`@OneToOne`就简单很多了。\n\n"},{"id":"tomcat","file":"tomcat.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://pic.baike.soso.com/ugc/baikepic2/18363/cut-20181002011705-1203719514_jpg_267_214_8556.jpg/300\" alt=\"Tomcat\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://pic.baike.soso.com/ugc/baikepic2/18363/cut-20181002011705-1203719514_jpg_267_214_8556.jpg/300\" alt=\"Tomcat\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eTomcat的Server配置\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eTomcat\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003econf\u003c/code\u003e目录下的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eserver.xml\u003c/code\u003e（Linux系统可能在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/etc/tomcat/\u003c/code\u003e下）定义了服务器的相关配置信息。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e根据官方文档，这里的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eServer\u003c/code\u003e指的是整个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCatalina servlet\u003c/code\u003e容器。它的属性代表整个servlet容器的特性。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e常见的如：服务器端口，根项目路径等。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eConnector属性\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e除了配置端口，协议版本，还可以配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eURIEncoding\u003c/code\u003e，默认值是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eISO8859-1\u003c/code\u003e所以不支持中文，我们改成\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUTF-8\u003c/code\u003e即可。即：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-xml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;Connector port=\"80\" protocol=\"HTTP/1.1\"\n               connectionTimeout=\"20000\"\n               redirectPort=\"443\"\n\t           URIEncoding=\"UTF-8\"/\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHTTPS\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通常在配置了HTTPS的服务器上，我们会把80端口转发到443端口上，此时我们要对443端口的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eConnector\u003c/code\u003e也配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eURIEncoding=\"UTF-8\"\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我的问题就出在这。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以上...\u003c/p\u003e\n","content":"\n![Tomcat](https://pic.baike.soso.com/ugc/baikepic2/18363/cut-20181002011705-1203719514_jpg_267_214_8556.jpg/300)\n\n\u003e 今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\n\n\u003c!--more--\u003e\n\n## Tomcat的Server配置\n\nTomcat`conf`目录下的`server.xml`（Linux系统可能在`/etc/tomcat/`下）定义了服务器的相关配置信息。\n\n根据官方文档，这里的`Server`指的是整个
