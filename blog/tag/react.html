00"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"vite","file":"vite.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://vitejs.cn/vite3-cn/logo-with-shadow.png\" alt=\"Vite\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch1\u003e使用 Vite 构建 React 项目\u003c/h1\u003e\n\u003cp class=\"mb-4\"\u003e在前端开发领域，构建工具一直是不可或缺的一部分。Vite 是一个快速、简单的构建工具，它可以帮助我们快速搭建 React 项目并提供出色的开发体验。本文将介绍如何使用 Vite 构建 React 项目，包括 Vite 的简介、项目搭建步骤以及适配老版本浏览器的方法。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://vitejs.cn/vite3-cn/logo-with-shadow.png\" alt=\"Vite\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch1\u003e使用 Vite 构建 React 项目\u003c/h1\u003e\n\u003cp class=\"mb-4\"\u003e在前端开发领域，构建工具一直是不可或缺的一部分。Vite 是一个快速、简单的构建工具，它可以帮助我们快速搭建 React 项目并提供出色的开发体验。本文将介绍如何使用 Vite 构建 React 项目，包括 Vite 的简介、项目搭建步骤以及适配老版本浏览器的方法。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e什么是 Vite\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ca href=\"https://vitejs.dev/\" class=\"text-sky-500 hover:text-sky-400\"\u003eVite\u003c/a\u003e 是一个由 Evan You（Vue.js 的创始人）创建的构建工具，它的目标是提供快速的开发体验。Vite 不仅支持 Vue.js，还可以用于构建 React、Preact，Svelte 和其他前端框架的项目。它采用了 ES 模块的方式加载模块，因此在开发过程中非常快速。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e项目搭建步骤\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e要使用 Vite 构建 React 项目，首先确保你已经安装了 \u003ca href=\"https://nodejs.org/\" class=\"text-sky-500 hover:text-sky-400\"\u003eNode.js\u003c/a\u003e。接下来，按照以下步骤进行操作：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003e初始化项目\u003c/strong\u003e：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enpm create vite@latest web-vite --template react\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003e进入项目文件夹\u003c/strong\u003e: \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecd web-vite\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003e安装依赖\u003c/strong\u003e: \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enpm install\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003e启动开发服务器\u003c/strong\u003e: \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enpm run dev\u003c/code\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e至此，你可以在代码编辑器中修改 React 组件并实时查看更改。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e构建发布项目：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e当项目准备好发布时，运行以下命令构建项目：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enpm run build\u003c/code\u003e, 构建后的文件将存储在 dist 文件夹中，可以用于部署到生产环境。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e配置静态资源公共基础路径\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e为了让build可以在任何目录下部署，这里将资源路径改为相对路径\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eexport default defineConfig({\n    base: \"./\",\n});\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e适配老版本浏览器\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e默认情况下，Vite 构建的项目将会生成适用于现代浏览器的代码。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eChrome \u003e=87\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eFirefox \u003e=78\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eSafari \u003e=14\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eEdge \u003e=88\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e如果你需要支持老版本浏览器，你可以按照以下步骤进行操作：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003e安装插件\u003c/strong\u003e: \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enpm i -D @vitejs/plugin-legacy\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003e配置插件\u003c/strong\u003e:\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e这里假设需要支持chrome52\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eimport { defineConfig } from \"vite\";\nimport react from \"@vitejs/plugin-react\";\nimport legacy from \"@vitejs/plugin-legacy\";\n\n// https://vitejs.dev/config/\nexport default defineConfig({\n  base: \"./\",\n  plugins: [\n    react(),\n    legacy({\n      targets: [\"chrome 52\"],\n    }),\n  ]\n});\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e现在，你的 Vite React 项目应该可以在老版本浏览器中正常运行了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e使用 Vite 构建 React 项目是一种快速而愉快的开发体验，同时还能够通过简单的配置适配老版本浏览器。希望这篇博客对你有所帮助，让你更轻松地开始构建 React 应用程序。\u003c/p\u003e\n","content":"\n![Vite](https://vitejs.cn/vite3-cn/logo-with-shadow.png)\n\n\n# 使用 Vite 构建 React 项目\n\n在前端开发领域，构建工具一直是不可或缺的一部分。Vite 是一个快速、简单的构建工具，它可以帮助我们快速搭建 React 项目并提供出色的开发体验。本文将介绍如何使用 Vite 构建 React 项目，包括 Vite 的简介、项目搭建步骤以及适配老版本浏览器的方法。\n\n\u003c!--more--\u003e\n\n## 什么是 Vite\n\n[Vite](https://vitejs.dev/) 是一个由 Evan You（Vue.js 的创始人）创建的构建工具，它的目标是提供快速的开发体验。Vite 不仅支持 Vue.js，还可以用于构建 React、Preact，Svelte 和其他前端框架的项目。它采用了 ES 模块的方式加载模块，因此在开发过程中非常快速。\n\n## 项目搭建步骤\n\n要使用 Vite 构建 React 项目，首先确保你已经安装了 [Node.js](https://nodejs.org/)。接下来，按照以下步骤进行操作：\n\n1. **初始化项目**：`npm create vite@latest web-vite --template react`\n2. **进入项目文件夹**: `cd web-vite`\n3. **安装依赖**: `npm install`\n4. **启动开发服务器**: `npm run dev`\n\n至此，你可以在代码编辑器中修改 React 组件并实时查看更改。\n\n## 构建发布项目：\n\n当项目准备好发布时，运行以下命令构建项目：`npm run build`, 构建后的文件将存储在 dist 文件夹中，可以用于部署到生产环境。\n\n## 配置静态资源公共基础路径\n\n为了让build可以在任何目录下部署，这里将资源路径改为相对路径\n\n```js\nexport default defineConfig({\n    base: \"./\",\n});\n\n```\n\n## 适配老版本浏览器\n\n默认情况下，Vite 构建的项目将会生成适用于现代浏览器的代码。\n\n- Chrome \u003e=87\n- Firefox \u003e=78\n- Safari \u003e=14\n- Edge \u003e=88\n\n如果你需要支持老版本浏览器，你可以按照以下步骤进行操作：\n\n1. **安装插件**: `npm i -D @vitejs/plugin-legacy`\n2. **配置插件**:\n\n这里假设需要支持chrome52\n\n```js\nimport { defineConfig } from \"vite\";\nimport react from \"@vitejs/plugin-react\";\nimport legacy from \"@vitejs/plugin-legacy\";\n\n// https://vitejs.dev/config/\nexport default defineConfig({\n  base: \"./\",\n  plugins: [\n    react(),\n    legacy({\n      targets: [\"chrome 52\"],\n    }),\n  ]\n});\n```\n\n现在，你的 Vite React 项目应该可以在老版本浏览器中正常运行了。\n\n使用 Vite 构建 React 项目是一种快速而愉快的开发体验，同时还能够通过简单的配置适配老版本浏览器。希望这篇博客对你有所帮助，让你更轻松地开始构建 React 应用程序。\n\n\n\n\n","data":{"title":"使用Vite构建React项目","date":"2023-11-11","tags":["React","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![Vite](https://vitejs.cn/vite3-cn/logo-with-shadow.png)\n\n\n# 使用 Vite 构建 React 项目\n\n在前端开发领域，构建工具一直是不可或缺的一部分。Vite 是一个快速、简单的构建工具，它可以帮助我们快速搭建 React 项目并提供出色的开发体验。本文将介绍如何使用 Vite 构建 React 项目，包括 Vite 的简介、项目搭建步骤以及适配老版本浏览器的方法。\n\n"},{"id":"ant-design-pro","file":"ant-design-pro.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg\" alt=\"ant-design\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design\u003c/strong\u003e由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e和 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAngular\u003c/code\u003e组件实现，用于开发和服务于企业级中后台产品。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design-Pro\u003c/strong\u003e是基于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAnt-Design\u003c/code\u003e的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e：现代化的JavaScript界面库\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edva\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRedux\u003c/code\u003e的数据流、状态管理框架\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUmiJS\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enextJS\u003c/code\u003e的react应用框架\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e本文从基础使用开始，逐步解析里面用到的技术细节。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg\" alt=\"ant-design\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design\u003c/strong\u003e由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e和 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAngular\u003c/code\u003e组件实现，用于开发和服务于企业级中后台产品。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design-Pro\u003c/strong\u003e是基于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAnt-Design\u003c/code\u003e的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e：现代化的JavaScript界面库\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edva\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRedux\u003c/code\u003e的数据流、状态管理框架\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUmiJS\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enextJS\u003c/code\u003e的react应用框架\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e本文从基础使用开始，逐步解析里面用到的技术细节。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e安装及启动在官网有说明，生成的基础工程目录结结构如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e├── config                   # umi 配置，包含路由，构建等配置\n├── mock                     # 本地模拟数据\n├── public                   # 公共资源目录\n│   └── favicon.png          # Favicon\n├── src                      # 代码目录\n│   ├── assets               # 本地静态资源\n│   ├── components           # 业务通用组件\n│   ├── e2e                  # 集成测试用例\n│   ├── layouts              # 通用布局\n│   ├── models               # 全局 dva model\n│   ├── pages                # 业务页面入口和常用模板\n│   ├── services             # 后台接口服务\n│   ├── utils                # 工具库\n│   ├── locales              # 国际化资源\n│   ├── global.less          # 全局样式\n│   └── global.js            # 全局 JS\n├── tests                    # 测试工具\n├── README.md                # readme\n└── package.json             # npm管理的清单\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于哈希路由\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e现代的前端框架都是单页面的(single-page application)，即用户访问的永远是根目录的index.html，这时网页地址如何展现就是一个问题。解决方案有2个：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e前端解决：使用哈希路由，即用户看到的地址栏URL是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e#\u003c/code\u003e分割的，如\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttps://wycode.cn/admin/#/users/123\u003c/code\u003e，实际访问仍然是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUmiJS\u003c/code\u003e配置如下\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eexport default {\n    ···\n    history: 'hash'\n    ···\n} as IConfig;  \n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e后端解决：使用重定向，即访问index以外的其它地址，都重定向到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enginx\u003c/code\u003e配置如下:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-nginx px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003elocation / {\n    try_files $uri $uri/ /index.html;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eUmiJS非根目录部署\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e如果工程不是部署在根目录，UmiJS的config做如下配置即可：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eexport default {\n    ···\n    base: 'admin'\n    ···\n} as IConfig;  \n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e**但是：**当配置为hash路由时且非根目录部署时，有可能你希望的首页是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttps://wycode.cn/admin/#/\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/users\u003c/code\u003e页是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttps://wycode.cn/admin/#/users\u003c/code\u003e则需要进行如下配置：\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eexport default {\n    ···\n    history: 'hash',\n    publicPath: '/admin/'\n    ···\n} as IConfig;\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于HTML模版\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eumi默认使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esrc/pages/document.ejs\u003c/code\u003e这个模版，采用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eEJS\u003c/code\u003e渲染，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFavicon\u003c/code\u003e的路径改为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;%= context.publicPath %\u003efavicon.png\u003c/code\u003e可以修复Favicon路径不对的问题。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于区块\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eblock\u003c/code\u003e\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e区块可以理解为页面模板，这个模板是在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eant-design-pro\u003c/code\u003e的预览网站中，如果你看中了某个功能，（默认创建的工程是空白的，只有一个Welcome页面）点击右下角的下载按钮，会弹出一个命令，执行这个命令就能将这个页面加入到你自己的工程中，非常方便。其实质是执行了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003egit clone\u003c/code\u003e克隆预览工程的部分文件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e比如：添加一个类似预览工程的404页面\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpx umi block add Exception404  --path=/exception/404\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e经过尝试，我发现目前区块引入时，并不是合并文件，而是创建一个目录，里面包括了这个页面用到的所有组件，甚至是国际化文本都是单独的一套。不管你工程内有没有这些组件，它都会重新创建一套。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e比如刚加入了404页面又想加入403页面，本已经存在的Exception组件，会在403文件夹再创建一份一模一样的副本，这点，我觉得是不可接受的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这样的话我更倾向与参考block的实现手动加入需要的文件，而不是使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eumi block add\u003c/code\u003e功能，官方的block在这里：\u003ca href=\"https://github.com/ant-design/pro-blocks\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/ant-design/pro-blocks\u003c/a\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e菜单处理\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e菜单是由路由自动生成，刚刚引入的404页面出现在了菜单栏，它是一个异常页，并不需要在菜单展示，我们只需在路由配置中加入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehideInMenu: true\u003c/code\u003e，即可隐藏。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e404页面\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e输入一个不存在的地址，并不能跳转到刚刚加入的404页面。\n我们需要将在路由配置中将404的其它配置项删除，仅保留\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecomponent: './exception/404'\u003c/code\u003e，并将其挪到数组的最后，这样当路由无法匹配时，就会加载404这个组件了。\u003c/p\u003e\n","content":"\n![ant-design](https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg)\n\n**Ant-Design**由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量`React`和 `Angular`组件实现，用于开发和服务于企业级中后台产品。\n\n**Ant-Design-Pro**是基于`Ant-Design`的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\n\n- `React`：现代化的JavaScript界面库\n- `dva`：类似`Redux`的数据流、状态管理框架\n- `UmiJS`：类似`nextJS`的react应用框架\n\n本文从基础使用开始，逐步解析里面用到的技术细节。\n\n\u003c!--more--\u003e\n\n安装及启动在官网有说明，生成的基础工程目录结结构如下：\n\n```\n├── config                   # umi 配置，包含路由，构建等配置\n├── mock                     # 本地模拟数据\n├── public                   # 公共资源目录\n│   └── favicon.png          # Favicon\n├── src                      # 代码目录\n│   ├── assets               # 本地静态资源\n│   ├── components           # 业务通用组件\n│   ├── e2e                  # 集成测试用例\n│   ├── layouts              # 通用布局\n│   ├── models               # 全局 dva model\n│   ├── pages                # 业务页面入口和常用模板\n│   ├── services             # 后台接口服务\n│   ├── utils                # 工具库\n│   ├── locales              # 国际化资源\n│   ├── global.less          # 全局样式\n│   └── global.js            # 全局 JS\n├── tests                    # 测试工具\n├── README.md                # readme\n└── package.json             # npm管理的清单\n```\n\n## 关于哈希路由\n\n现代的前端框架都是单页面的(single-page application)，即用户访问的永远是根目录的index.html，这时网页地址如何展现就是一个问题。解决方案有2个：\n\n- 前端解决：使用哈希路由，即用户看到的地址栏URL是`#`分割的，如`https://wycode.cn/admin/#/users/123`，实际访问仍然是`index.html`。`UmiJS`配置如下\n\n```js\nexport default {\n    ···\n    history: 'hash'\n    ···\n} as IConfig;  \n```\n\n- 后端解决：使用重定向，即访问index以外的其它地址，都重定向到`index.html`。`nginx`配置如下:\n\n```nginx\nlocation / {\n    try_files $uri $uri/ /index.html;\n}\n```\n## UmiJS非根目录部署\n\n如果工程不是部署在根目录，UmiJS的config做如下配置即可：\n\n```js\nexport default {\n    ···\n    base: 'admin'\n    ···\n} as IConfig;  \n```\n\n\u003e **但是：**当配置为hash路由时且非根目录部署时，有可能你希望的首页是`https://wycode.cn/admin/#/`，`/users`页是`https://wycode.cn/admin/#/users`则需要进行如下配置：\n\n```js\nexport default {\n    ···\n    history: 'hash',\n    publicPath: '/admin/'\n    ···\n} as IConfig;\n```\n\n## 关于HTML模版\n\numi默认使用`src/pages/document.ejs`这个模版，采用`EJS`渲染，`Favicon`的路径改为`\u003c%= context.publicPath %\u003efavicon.png`可以修复Favicon路径不对的问题。\n\n\n## 关于区块`block`\n\n区块可以理解为页面模板，这个模板是在`ant-design-pro`的预览网站中，如果你看中了某个功能，（默认创建的工程是空白的，只有一个Welcome页面）点击右下角的下载按钮，会弹出一个命令，执行这个命令就能将这个页面加入到你自己的工程中，非常方便。其实质是执行了`git clone`克隆预览工程的部分文件。\n\n比如：添加一个类似预览工程的404页面\n\n```bash\nnpx umi block add Exception404  --path=/exception/404\n```\n\n经过尝试，我发现目前区块引入时，并不是合并文件，而是创建一个目录，里面包括了这个页面用到的所有组件，甚至是国际化文本都是单独的一套。不管你工程内有没有这些组件，它都会重新创建一套。\n\n比如刚加入了404页面又想加入403页面，本已经存在的Exception组件，会在403文件夹再创建一份一模一样的副本，这点，我觉得是不可接受的。\n\n这样的话我更倾向与参考block的实现手动加入需要的文件，而不是使用`umi block add`功能，官方的block在这里：https://github.com/ant-design/pro-blocks\n\n## 菜单处理\n\n菜单是由路由自动生成，刚刚引入的404页面出现在了菜单栏，它是一个异常页，并不需要在菜单展示，我们只需在路由配置中加入`hideInMenu: true`，即可隐藏。\n\n## 404页面\n\n输入一个不存在的地址，并不能跳转到刚刚加入的404页面。\n我们需要将在路由配置中将404的其它配置项删除，仅保留`component: './exception/404'`，并将其挪到数组的最后，这样当路由无法匹配时，就会加载404这个组件了。\n\n","data":{"title":"学习和拆解Ant-Design-Pro","date":"2019-06-09","tags":["TypeScript","JavaScript","NodeJS","React"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![ant-design](https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg)\n\n**Ant-Design**由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量`React`和 `Angular`组件实现，用于开发和服务于企业级中后台产品。\n\n**Ant-Design-Pro**是基于`Ant-Design`的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\n\n- `React`：现代化的JavaScript界面库\n- `dva`：类似`Redux`的数据流、状态管理框架\n- `UmiJS`：类似`nextJS`的react应用框架\n\n本文从基础使用开始，逐步解析里面用到的技术细节。\n\n"},{"id":"react-native","file":"react-native.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eFacebook的React Native是比基于WebView更先进的跨平台解决方案。实现了只编写一次JavaScript代码即可同时生成Android及iOS应用，并且同时拥有原生控件的性能。此篇文章我将从React Native Android端源码中探究它到底是如何做到的。以及实现的思路，架构的设计等。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eFacebook的React Native是比基于WebView更先进的跨平台解决方案。实现了只编写一次JavaScript代码即可同时生成Android及iOS应用，并且同时拥有原生控件的性能。此篇文章我将从React Native Android端源码中探究它到底是如何做到的。以及实现的思路，架构的设计等。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e核心类ReactActivity\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereact-native-cli\u003c/code\u003e生成工程文件，打开工程目录，发现有一个入口Activity：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMainActivity\u003c/code\u003e继承自\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactActivity\u003c/code\u003e抽象类。这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactActivity\u003c/code\u003e是React Native项目的唯一一个Activity，可以猜想其采用了单Activity的架构。回想Unity,LibGDX这样的游戏引擎，也是采用了这样的模式。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e...\n\n/**\n * Base Activity for React Native applications.\n */\npublic abstract class ReactActivity extends Activity\n    implements DefaultHardwareBackBtnHandler, PermissionAwareActivity {\n\n  private final ReactActivityDelegate mDelegate;\n\n  protected ReactActivity() {\n    mDelegate = createReactActivityDelegate();\n  }\n\n  ...\n\n  @Override\n  protected void onCreate(Bundle savedInstanceState) {\n    super.onCreate(savedInstanceState);\n    mDelegate.onCreate(savedInstanceState);\n  }\n...\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e可以发现在Android框架创建\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactActivity\u003c/code\u003e实例的同时会创建一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactActivityDelegate\u003c/code\u003e对象。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e然后\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactActivity\u003c/code\u003e将Activity的生命周期方法和一些回调方法注入到这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactActivityDelegate\u003c/code\u003e对象中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e看看这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactActivityDelegate\u003c/code\u003e都在干啥。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e核心类ReactActivityDelegate\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e...\n\n/**\n * Delegate class for {@link ReactActivity} and {@link ReactFragmentActivity}. You can subclass this\n * to provide custom implementations for e.g. {@link #getReactNativeHost()}, if your Application\n * class doesn't implement {@link ReactApplication}.\n */\npublic class ReactActivityDelegate {\n\n  ···\n\n  private @Nullable ReactRootView mReactRootView;\n\n  ...\n\n  protected void onCreate(Bundle savedInstanceState) {\n    if (mMainComponentName != null) {\n      loadApp(mMainComponentName);\n    }\n    mDoubleTapReloadRecognizer = new DoubleTapReloadRecognizer();\n  }\n\n  protected void loadApp(String appKey) {\n    if (mReactRootView != null) {\n      throw new IllegalStateException(\"Cannot loadApp while app is already running.\");\n    }\n    mReactRootView = createRootView();\n    mReactRootView.startReactApplication(\n      getReactNativeHost().getReactInstanceManager(),\n      appKey,\n      getLaunchOptions());\n    getPlainActivity().setContentView(mReactRootView);\n  }\n\n  ...\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactActivityDelegate\u003c/code\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOnCreate\u003c/code\u003e方法中调用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eloadApp\u003c/code\u003e方法，然后创建了一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactRootView\u003c/code\u003e,并调用了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactRootView\u003c/code\u003e的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estartReactApplication\u003c/code\u003e方法，最后将这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactRootView\u003c/code\u003e作为Activity的根View显示。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e继续看这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactRootView\u003c/code\u003e。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e核心类ReactRootView\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\n···\n\npublic class ReactRootView extends SizeMonitoringFrameLayout\n    implements RootView, MeasureSpecProvider {\n\n  ···\n\n  /**\n   * Schedule rendering of the react component rendered by the JS application from the given JS\n   * module (@{param moduleName}) using provided {@param reactInstanceManager} to attach to the\n   * JS context of that manager. Extra parameter {@param launchOptions} can be used to pass initial\n   * properties for the react component.\n   */\n  public void startReactApplication(\n      ReactInstanceManager reactInstanceManager,\n      String moduleName,\n      @Nullable Bundle initialProperties) {\n      \n      ···\n\n      if (!mReactInstanceManager.hasStartedCreatingInitialContext()) {\n        mReactInstanceManager.createReactContextInBackground();\n      }\n      \n      ···\n  }\n\n  ···\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estartReactApplication()\u003c/code\u003e方法，最终调用了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactInstanceManager\u003c/code\u003e对象的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecreateReactContextInBackground()\u003c/code\u003e方法。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e继续追这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactInstanceManager\u003c/code\u003e。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e核心类ReactInstanceManager\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e···\n\n@ThreadSafe\npublic class ReactInstanceManager {\n\n  ···\n\n  @ThreadConfined(UI)\n  public void createReactContextInBackground() {\n    ···\n    recreateReactContextInBackgroundInner();\n  }\n\n  ···\n\n  \n  @ThreadConfined(UI)\n  public void recreateReactContextInBackground() {\n    ···\n    recreateReactContextInBackgroundInner();\n  }\n\n  @ThreadConfined(UI)\n  private void recreateReactContextInBackgroundInner() {\n    ···\n    recreateReactContextInBackgroundFromBundleLoader();\n  }\n\n  @ThreadConfined(UI)\n  private void recreateReactContextInBackgroundFromBundleLoader() {\n    ···\n    recreateReactContextInBackground(mJavaScriptExecutorFactory, mBundleLoader);\n  }\n\n  ···\n\n  @ThreadConfined(UI)\n  private void recreateReactContextInBackground(\n    JavaScriptExecutorFactory jsExecutorFactory,\n    JSBundleLoader jsBundleLoader) {\n    ···\n      runCreateReactContextOnNewThread(initParams);\n    ···\n  }\n\n  @ThreadConfined(UI)\n  private void runCreateReactContextOnNewThread(final ReactContextInitParams initParams) {\n    ···\n    mCreateReactContextThread =\n        new Thread(\n            new Runnable() {\n              @Override\n              public void run() {\n                ···\n                \n                  final ReactApplicationContext reactApplicationContext =\n                      createReactContext(\n                          initParams.getJsExecutorFactory().create(),\n                          initParams.getJsBundleLoader());\n\n                 ···\n                  Runnable setupReactContextRunnable =\n                      new Runnable() {\n                        @Override\n                        public void run() {\n                          try {\n                            setupReactContext(reactApplicationContext);\n                          } catch (Exception e) {\n                            mDevSupportManager.handleException(e);\n                          }\n                        }\n                      };\n\n                  reactApplicationContext.runOnNativeModulesQueueThread(setupReactContextRunnable);\n                 ···\n              }\n            });\n    ···\n    mCreateReactContextThread.start();\n  }\n\n  ···\n\n  /**\n   * @return instance of {@link ReactContext} configured a {@link CatalystInstance} set\n   */\n  private ReactApplicationContext createReactContext(\n      JavaScriptExecutor jsExecutor,\n      JSBundleLoader jsBundleLoader) {\n    ···\n    final ReactApplicationContext reactContext = new ReactApplicationContext(mApplicationContext);\n\n    ···\n    CatalystInstanceImpl.Builder catalystInstanceBuilder = new CatalystInstanceImpl.Builder()\n      .setReactQueueConfigurationSpec(ReactQueueConfigurationSpec.createDefault())\n      .setJSExecutor(jsExecutor)\n      .setRegistry(nativeModuleRegistry)\n      .setJSBundleLoader(jsBundleLoader)\n      .setNativeModuleCallExceptionHandler(exceptionHandler);\n\n    ···\n      catalystInstance = catalystInstanceBuilder.build();\n    \n    ···\n    catalystInstance.runJSBundle();\n    reactContext.initializeWithInstance(catalystInstance);\n\n    return reactContext;\n  }\n\n  ···\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactInstanceManager\u003c/code\u003e有点长，通过一系列方法调用，最后通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecreateReactContext()\u003c/code\u003e方法创建了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactApplicationContext\u003c/code\u003e的实例，并创建了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCatalystInstance\u003c/code\u003e用于初始化\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereactContext\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在初始化\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereactContext\u003c/code\u003e之前又调用了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecatalystInstance.runJSBundle();\u003c/code\u003e，猜想这里是调用JS代码的入口，这里的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCatalystInstance\u003c/code\u003e是个接口，我们要查看\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCatalystInstanceImpl\u003c/code\u003e来看看具体实现。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e核心类CatalystInstanceImpl\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\n···\n\n/**\n * This provides an implementation of the public CatalystInstance instance.  It is public because\n * it is built by XReactInstanceManager which is in a different package.\n */\n@DoNotStrip\npublic class CatalystInstanceImpl implements CatalystInstance {\n  \n  ···\n\n  public static class PendingJSCall {\n\n    ···\n\n    void call(CatalystInstanceImpl catalystInstance) {\n      NativeArray arguments = mArguments != null ? mArguments : new WritableNativeArray();\n      catalystInstance.jniCallJSFunction(mModule, mMethod, arguments);\n    }\n\n    ···\n  }\n\n  ···\n\n  private native void jniSetSourceURL(String sourceURL);\n  private native void jniRegisterSegment(int segmentId, String path);\n  private native void jniLoadScriptFromAssets(AssetManager assetManager, String assetURL, boolean loadSynchronously);\n  private native void jniLoadScriptFromFile(String fileName, String sourceURL, boolean loadSynchronously);\n\n  @Override\n  public void runJSBundle() {\n    static {\n      ReactBridge.staticInit();\n    }\n    ···\n    mJSBundleLoader.loadScript(CatalystInstanceImpl.this);\n\n    synchronized (mJSCallsPendingInitLock) {\n\n      // Loading the bundle is queued on the JS thread, but may not have\n      // run yet.  It's safe to set this here, though, since any work it\n      // gates will be queued on the JS thread behind the load.\n      mAcceptCalls = true;\n\n      for (PendingJSCall function : mJSCallsPendingInit) {\n        function.call(this);\n      }\n      mJSCallsPendingInit.clear();\n      mJSBundleHasLoaded = true;\n    }\n\n    ···\n  }\n\n  private native void jniCallJSFunction(\n    String module,\n    String method,\n    NativeArray arguments);\n\n  ···\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emJSBundleLoader.loadScript()\u003c/code\u003e去加载js，然后把js函数构建为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ePendingJSCall\u003c/code\u003e放到一个列表里逐个执行，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ePendingJSCall\u003c/code\u003e的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecall()\u003c/code\u003e方法最终调用了C++层的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ejniCallJSFunction()\u003c/code\u003e函数。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e文件开头使用静态代码块\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactBridge.staticInit()\u003c/code\u003e装载了名为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereactnativejni\u003c/code\u003e的so文件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e至此java层源码就追完了，我们接着看c++层源码\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eC++层\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-c++ px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e···\n\nnamespace facebook {\nnamespace react {\n\n···\n\nvoid CatalystInstanceImpl::initializeBridge(\n    jni::alias_ref\u0026#x3C;ReactCallback::javaobject\u003e callback,\n    // This executor is actually a factory holder.\n    JavaScriptExecutorHolder* jseh,\n    jni::alias_ref\u0026#x3C;JavaMessageQueueThread::javaobject\u003e jsQueue,\n    jni::alias_ref\u0026#x3C;JavaMessageQueueThread::javaobject\u003e nativeModulesQueue,\n    jni::alias_ref\u0026#x3C;jni::JCollection\u0026#x3C;JavaModuleWrapper::javaobject\u003e::javaobject\u003e javaModules,\n    jni::alias_ref\u0026#x3C;jni::JCollection\u0026#x3C;ModuleHolder::javaobject\u003e::javaobject\u003e cxxModules) {\n  // TODO mhorowitz: how to assert here?\n  // Assertions.assertCondition(mBridge == null, \"initializeBridge should be called once\");\n  moduleMessageQueue_ = std::make_shared\u0026#x3C;JMessageQueueThread\u003e(nativeModulesQueue);\n\n  // This used to be:\n  //\n  // Java CatalystInstanceImpl -\u003e C++ CatalystInstanceImpl -\u003e Bridge -\u003e Bridge::Callback\n  // --weak--\u003e ReactCallback -\u003e Java CatalystInstanceImpl\n  //\n  // Now the weak ref is a global ref.  So breaking the loop depends on\n  // CatalystInstanceImpl#destroy() calling mHybridData.resetNative(), which\n  // should cause all the C++ pointers to be cleaned up (except C++\n  // CatalystInstanceImpl might be kept alive for a short time by running\n  // callbacks). This also means that all native calls need to be pre-checked\n  // to avoid NPE.\n\n  // See the comment in callJSFunction.  Once js calls switch to strings, we\n  // don't need jsModuleDescriptions any more, all the way up and down the\n  // stack.\n\n  moduleRegistry_ = std::make_shared\u0026#x3C;ModuleRegistry\u003e(\n    buildNativeModuleList(\n       std::weak_ptr\u0026#x3C;Instance\u003e(instance_),\n       javaModules,\n       cxxModules,\n       moduleMessageQueue_));\n\n  instance_-\u003einitializeBridge(\n    folly::make_unique\u0026#x3C;JInstanceCallback\u003e(\n    callback,\n    moduleMessageQueue_),\n    jseh-\u003egetExecutorFactory(),\n    folly::make_unique\u0026#x3C;JMessageQueueThread\u003e(jsQueue),\n    moduleRegistry_);\n}\n\n···\n\nvoid CatalystInstanceImpl::jniCallJSFunction(std::string module, std::string method, NativeArray* arguments) {\n  // We want to share the C++ code, and on iOS, modules pass module/method\n  // names as strings all the way through to JS, and there's no way to do\n  // string -\u003e id mapping on the objc side.  So on Android, we convert the\n  // number to a string, here which gets passed as-is to JS.  There, they they\n  // used as ids if isFinite(), which handles this case, and looked up as\n  // strings otherwise.  Eventually, we'll probably want to modify the stack\n  // from the JS proxy through here to use strings, too.\n  instance_-\u003ecallJSFunction(std::move(module),\n                            std::move(method),\n                            arguments-\u003econsume());\n}\n\n···\n\n}}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e在这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCatalystInstanceImpl.cpp\u003c/code\u003e中可以发现c++对于js的调用。以及非常棒的两段注释。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eReact Navtive 通过C++层去解释执行JS，从而达到一个比较好的性能。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e总结\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通过此文算是搞明白了，Android系统是怎么样去执行JavaScript代码的。\n但React Native又是如何将JS中的组件渲染成Android原生组件的仍然是个疑问。\n以后再研究吧...\u003c/p\u003e\n","content":"\n![React](/images/20180213_react.png)\n\n\u003e Facebook的React Native是比基于WebView更先进的跨平台解决方案。实现了只编写一次JavaScript代码即可同时生成Android及iOS应用，并且同时拥有原生控件的性能。此篇文章我将从React Native Android端源码中探究它到底是如何做到的。以及实现的思路，架构的设计等。\n\n\n\u003c!--more--\u003e\n\n## 核心类ReactActivity\n\n使用`react-native-cli`生成工程文件，打开工程目录，发现有一个入口Activity：`MainActivity`继承自`ReactActivity`抽象类。这个`ReactActivity`是React Native项目的唯一一个Activity，可以猜想其采用了单Activity的架构。回想Unity,LibGDX这样的游戏引擎，也是采用了这样的模式。\n\n```java\n...\n\n/**\n * Base Activity for React Native applications.\n */\npublic abstract class ReactActivity extends Activity\n    implements DefaultHardwareBackBtnHandler, PermissionAwareActivity {\n\n  private final ReactActivityDelegate mDelegate;\n\n  protected ReactActivity() {\n    mDelegate = createReactActivityDelegate();\n  }\n\n  ...\n\n  @Override\n  protected void onCreate(Bundle savedInstanceState) {\n    super.onCreate(savedInstanceState);\n    mDelegate.onCreate(savedInstanceState);\n  }\n...\n```\n\n可以发现在Android框架创建`ReactActivity`实例的同时会创建一个`ReactActivityDelegate`对象。\n\n然后`ReactActivity`将Activity的生命周期方法和一些回调方法注入到这个`ReactActivityDelegate`对象中。\n\n看看这个`ReactActivityDelegate`都在干啥。\n\n\n## 核心类ReactActivityDelegate\n\n```java\n...\n\n/**\n * Delegate class for {@link ReactActivity} and {@link ReactFragmentActivity}. You can subclass this\n * to provide custom implementations for e.g. {@link #getReactNativeHost()}, if your Application\n * class doesn't implement {@link ReactApplication}.\n */\npublic class ReactActivityDelegate {\n\n  ···\n\n  private @Nullable ReactRootView mReactRootView;\n\n  ...\n\n  protected void onCreate(Bundle savedInstanceState) {\n    if (mMainComponentName != null) {\n      loadApp(mMainComponentName);\n    }\n    mDoubleTapReloadRecognizer = new DoubleTapReloadRecognizer();\n  }\n\n  protected void loadApp(String appKey) {\n    if (mReactRootView != null) {\n      throw new IllegalStateException(\"Cannot loadApp while app is already running.\");\n    }\n    mReactRootView = createRootView();\n    mReactRootView.startReactApplication(\n      getReactNativeHost().getReactInstanceManager(),\n      appKey,\n      getLaunchOptions());\n    getPlainActivity().setContentView(mReactRootView);\n  }\n\n  ...\n}\n\n```\n\n\n`ReactActivityDelegate`在`OnCreate`方法中调用`loadApp`方法，然后创建了一个`ReactRootView`,并调用了`ReactRootView`的`startReactApplication`方法，最后将这个`ReactRootView`作为Activity的根View显示。\n\n继续看这个`ReactRootView`。\n\n## 核心类ReactRootView\n\n```java\n\n···\n\npublic class ReactRootView extends SizeMonitoringFrameLayout\n    implements RootView, MeasureSpecProvider {\n\n  ···\n\n  /**\n   * Schedule rendering of the react component rendered by the JS application from the given JS\n   * module (@{param moduleName}) using provided {@param reactInstanceManager} to attach to the\n   * JS context of that manager. Extra parameter {@param launchOptions} can be used to pass initial\n   * properties for the react component.\n   */\n  public void startReactApplication(\n      ReactInstanceManager reactInstanceManager,\n      String moduleName,\n      @Nullable Bundle initialProperties) {\n      \n      ···\n\n      if (!mReactInstanceManager.hasStartedCreatingInitialContext()) {\n        mReactInstanceManager.createReactContextInBackground();\n      }\n      \n      ···\n  }\n\n  ···\n}\n\n```\n\n这个`startReactApplication()`方法，最终调用了`ReactInstanceManager`对象的`createReactContextInBackground()`方法。\n\n继续追这个`ReactInstanceManager`。\n\n## 核心类ReactInstanceManager\n\n```java\n···\n\n@ThreadSafe\npublic class ReactInstanceManager {\n\n  ···\n\n  @ThreadConfined(UI)\n  public void createReactContextInBackground() {\n    ···\n    recreateReactContextInBackgroundInner();\n  }\n\n  ···\n\n  \n  @ThreadConfined(UI)\n  public void recreateReactContextInBackground() {\n    ···\n    recreateReactContextInBackgroundInner();\n  }\n\n  @ThreadConfined(UI)\n  private void recreateReactContextInBackgroundInner() {\n    ···\n    recreateReactContextInBackgroundFromBundleLoader();\n  }\n\n  @ThreadConfined(UI)\n  private void recreateReactContextInBackgroundFromBundleLoader() {\n    ···\n    recreateReactContextInBackground(mJavaScriptExecutorFactory, mBundleLoader);\n  }\n\n  ···\n\n  @ThreadConfined(UI)\n  private void recreateReactContextInBackground(\n    JavaScriptExecutorFactory jsExecutorFactory,\n    JSBundleLoader jsBundleLoader) {\n    ···\n      runCreateReactContextOnNewThread(initParams);\n    ···\n  }\n\n  @ThreadConfined(UI)\n  private void runCreateReactContextOnNewThread(final ReactContextInitParams initParams) {\n    ···\n    mCreateReactContextThread =\n        new Thread(\n            new Runnable() {\n              @Override\n              public void run() {\n                ···\n                \n                  final ReactApplicationContext reactApplicationContext =\n                      createReactContext(\n                          initParams.getJsExecutorFactory().create(),\n                          initParams.getJsBundleLoader());\n\n                 ···\n                  Runnable setupReactContextRunnable =\n                      new Runnable() {\n                        @Override\n                        public void run() {\n                          try {\n                            setupReactContext(reactApplicationContext);\n                          } catch (Exception e) {\n                            mDevSupportManager.handleException(e);\n                          }\n                        }\n                      };\n\n                  reactApplicationContext.runOnNativeModulesQueueThread(setupReactContextRunnable);\n                 ···\n              }\n            });\n    ···\n    mCreateReactContextThread.start();\n  }\n\n  ···\n\n  /**\n   * @return instance of {@link ReactContext} configured a {@link CatalystInstance} set\n   */\n  private ReactApplicationContext createReactContext(\n      JavaScriptExecutor jsExecutor,\n      JSBundleLoader jsBundleLoader) {\n    ···\n    final ReactApplicationContext reactContext = new ReactApplicationContext(mApplicationContext);\n\n    ···\n    CatalystInstanceImpl.Builder catalystInstanceBuilder = new CatalystInstanceImpl.Builder()\n      .setReactQueueConfigurationSpec(ReactQueueConfigurationSpec.createDefault())\n      .setJSExecutor(jsExecutor)\n      .setRegistry(nativeModuleRegistry)\n      .setJSBundleLoader(jsBundleLoader)\n      .setNativeModuleCallExceptionHandler(exceptionHandler);\n\n    ···\n      catalystInstance = catalystInstanceBuilder.build();\n    \n    ···\n    catalystInstance.runJSBundle();\n    reactContext.initializeWithInstance(catalystInstance);\n\n    return reactContext;\n  }\n\n  ···\n}\n\n```\n\n这个`ReactInstanceManager`有点长，通过一系列方法调用，最后通过`createReactContext()`方法创建了`ReactApplicationContext`的实例，并创建了`CatalystInstance`用于初始化`reactContext`。\n\n在初始化`reactContext`之前又调用了`catalystInstance.runJSBundle();`，猜想这里是调用JS代码的入口，这里的`CatalystInstance`是个接口，我们要查看`CatalystInstanceImpl`来看看具体实现。\n\n## 核心类CatalystInstanceImpl\n\n```java\n\n···\n\n/**\n * This provides an implementation of the public CatalystInstance instance.  It is public because\n * it is built by XReactInstanceManager which is in a different package.\n */\n@DoNotStrip\npublic class CatalystInstanceImpl implements CatalystInstance {\n  \n  ···\n\n  public static class PendingJSCall {\n\n    ···\n\n    void call(CatalystInstanceImpl catalystInstance) {\n      NativeArray arguments = mArguments != null ? mArguments : new WritableNativeArray();\n      catalystInstance.jniCallJSFunction(mModule, mMethod, arguments);\n    }\n\n    ···\n  }\n\n  ···\n\n  private native void jniSetSourceURL(String sourceURL);\n  private native void jniRegisterSegment(int segmentId, String path);\n  private native void jniLoadScriptFromAssets(AssetManager assetManager, String assetURL, boolean loadSynchronously);\n  private native void jniLoadScriptFromFile(String fileName, String sourceURL, boolean loadSynchronously);\n\n  @Override\n  public void runJSBundle() {\n    static {\n      ReactBridge.staticInit();\n    }\n    ···\n    mJSBundleLoader.loadScript(CatalystInstanceImpl.this);\n\n    synchronized (mJSCallsPendingInitLock) {\n\n      // Loading the bundle is queued on the JS thread, but may not have\n      // run yet.  It's safe to set this here, though, since any work it\n      // gates will be queued on the JS thread behind the load.\n      mAcceptCalls = true;\n\n      for (PendingJSCall function : mJSCallsPendingInit) {\n        function.call(this);\n      }\n      mJSCallsPendingInit.clear();\n      mJSBundleHasLoaded = true;\n    }\n\n    ···\n  }\n\n  private native void jniCallJSFunction(\n    String module,\n    String method,\n    NativeArray arguments);\n\n  ···\n}\n\n```\n\n这里通过`mJSBundleLoader.loadScript()`去加载js，然后把js函数构建为`PendingJSCall`放到一个列表里逐个执行，`PendingJSCall`的`call()`方法最终调用了C++层的`jniCallJSFunction()`函数。\n\n文件开头使用静态代码块`ReactBridge.staticInit()`装载了名为`reactnativejni`的so文件。\n\n至此java层源码就追完了，我们接着看c++层源码\n\n## C++层\n\n```c++\n···\n\nnamespace facebook {\nnamespace react {\n\n···\n\nvoid CatalystInstanceImpl::initializeBridge(\n    jni::alias_ref\u003cReactCallback::javaobject\u003e callback,\n    // This executor is actually a factory holder.\n    JavaScriptExecutorHolder* jseh,\n    jni::alias_ref\u003cJavaMessageQueueThread::javaobject\u003e jsQueue,\n    jni::alias_ref\u003cJavaMessageQueueThread::javaobject\u003e nativeModulesQueue,\n    jni::alias_ref\u003cjni::JCollection\u003cJavaModuleWrapper::javaobject\u003e::javaobject\u003e javaModules,\n    jni::alias_ref\u003cjni::JCollection\u003cModuleHolder::javaobject\u003e::javaobject\u003e cxxModules) {\n  // TODO mhorowitz: how to assert here?\n  // Assertions.assertCondition(mBridge == null, \"initializeBridge should be called once\");\n  moduleMessageQueue_ = std::make_shared\u003cJMessageQueueThread\u003e(nativeModulesQueue);\n\n  // This used to be:\n  //\n  // Java CatalystInstanceImpl -\u003e C++ CatalystInstanceImpl -\u003e Bridge -\u003e Bridge::Callback\n  // --weak--\u003e ReactCallback -\u003e Java CatalystInstanceImpl\n  //\n  // Now the weak ref is a global ref.  So breaking the loop depends on\n  // CatalystInstanceImpl#destroy() calling mHybridData.resetNative(), which\n  // should cause all the C++ pointers to be cleaned up (except C++\n  // CatalystInstanceImpl might be kept alive for a short time by running\n  // callbacks). This also means that all native calls need to be pre-checked\n  // to avoid NPE.\n\n  // See the comment in callJSFunction.  Once js calls switch to strings, we\n  // don't need jsModuleDescriptions any more, all the way up and down the\n  // stack.\n\n  moduleRegistry_ = std::make_shared\u003cModuleRegistry\u003e(\n    buildNativeModuleList(\n       std::weak_ptr\u003cInstance\u003e(instance_),\n       javaModules,\n       cxxModules,\n       moduleMessageQueue_));\n\n  instance_-\u003einitializeBridge(\n    folly::make_unique\u003cJInstanceCallback\u003e(\n    callback,\n    moduleMessageQueue_),\n    jseh-\u003egetExecutorFactory(),\n    folly::make_unique\u003cJMessageQueueThread\u003e(jsQueue),\n    moduleRegistry_);\n}\n\n···\n\nvoid CatalystInstanceImpl::jniCallJSFunction(std::string module, std::string method, NativeArray* arguments) {\n  // We want to share the C++ code, and on iOS, modules pass module/method\n  // names as strings all the way through to JS, and there's no way to do\n  // string -\u003e id mapping on the objc side.  So on Android, we convert the\n  // number to a string, here which gets passed as-is to JS.  There, they they\n  // used as ids if isFinite(), which handles this case, and looked up as\n  // strings otherwise.  Eventually, we'll probably want to modify the stack\n  // from the JS proxy through here to use strings, too.\n  instance_-\u003ecallJSFunction(std::move(module),\n                            std::move(method),\n                            arguments-\u003econsume());\n}\n\n···\n\n}}\n\n```\n\n在这个`CatalystInstanceImpl.cpp`中可以发现c++对于js的调用。以及非常棒的两段注释。\n\nReact Navtive 通过C++层去解释执行JS，从而达到一个比较好的性能。\n\n\n## 总结\n\n通过此文算是搞明白了，Android系统是怎么样去执行JavaScript代码的。\n但React Native又是如何将JS中的组件渲染成Android原生组件的仍然是个疑问。\n以后再研究吧...","data":{"title":"React Native源码解析（Android篇）","date":"2018-03-19","tags":["Android","React Native","React","iOS"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![React](/images/20180213_react.png)\n\n\u003e Facebook的React Native是比基于WebView更先进的跨平台解决方案。实现了只编写一次JavaScript代码即可同时生成Android及iOS应用，并且同时拥有原生控件的性能。此篇文章我将从React Native Android端源码中探究它到底是如何做到的。以及实现的思路，架构的设计等。\n\n\n"},{"id":"clipboard-react","file":"clipboard-react.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将用React实现一个跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e通常我们会遇到将手机上的文字发送到电脑上，或者反过来，或者是记录一些网址，你懂得。这时我们会用到一些云笔记之类的产品，或者干脆使用微信或QQ，它们都太重了，用起来没那么方便，还要登录注册啥的。我们使用React来开发一款手机和电脑上都能访问，并且无需注册登录的云便签应用。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将用React实现一个跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e通常我们会遇到将手机上的文字发送到电脑上，或者反过来，或者是记录一些网址，你懂得。这时我们会用到一些云笔记之类的产品，或者干脆使用微信或QQ，它们都太重了，用起来没那么方便，还要登录注册啥的。我们使用React来开发一款手机和电脑上都能访问，并且无需注册登录的云便签应用。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1.使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecreate-react-app\u003c/code\u003e创建工程\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpm install -g create-react-app\ncreate-react-app my-app\n\ncd my-app\nnpm start\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e2.编写模版\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003erender() {\n        return (\n            \u0026#x3C;div\u003e\n                \u0026#x3C;Header/\u003e\n                \u0026#x3C;div className=\"Clipboard container\"\u003e\n                    \u0026#x3C;input placeholder=\"查询码\"\n                           type=\"number\"\n                           className=\"input-query-number form-control form-group\"\n                           value={this.state.queryNumber \u003e 0 ? this.state.queryNumber : ''}\n                           disabled={this.state.isShowResult}\n                           onChange={this.handleNumberChange}/\u003e\n                    {this.state.isShowResult ? null : \u0026#x3C;button onClick={this.handleQuery}\n                                                              className=\"btn-query btn btn-primary form-control form-group\"\u003e查询\u0026#x3C;/button\u003e}\n\n                    {this.state.isShowResult ? null :\n                        \u0026#x3C;button onClick={this.handleNew}\n                                className=\"btn-new btn btn-primary form-control form-group\"\u003e新建\u0026#x3C;/button\u003e}\n\n                    {this.state.isShowResult ? \u0026#x3C;textarea onChange={this.handleTextChange} value={this.state.text}\n                                                         className=\"textarea-text form-control form-group\"/\u003e : null}\n\n                    {this.state.isShowResult ? \u0026#x3C;button onClick={this.handleSave}\n                                                       className=\"btn-save btn btn-success form-control  form-group\"\u003e保存\u0026#x3C;/button\u003e : null}\n                \u0026#x3C;/div\u003e\n            \u0026#x3C;/div\u003e\n        );\n    }\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003erender()\u003c/code\u003e返回的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJSX\u003c/code\u003e只能有一个组件，当需要多个组件时，需要用一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ediv\u003c/code\u003e包起来；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里通过state的自定义属性\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eisShowResult\u003c/code\u003e实现对控件的隐藏和显示；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e界面使用Bootstrap框架做移动端适配\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eonClick={this.handleSave}\u003c/code\u003e,\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eonChange={this.handleTextChange}\u003c/code\u003e等属性绑定函数，构造函数里还要写\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis.handleBack = this.handleBack.bind(this);\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e3.构造方法\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-JavaScript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003econstructor(props) {\n        super(props);\n        this.state = {\n            queryNumber: -1,\n            isShowResult: false,\n            text: ''\n        };\n\n        this.handleNumberChange = this.handleNumberChange.bind(this);\n        this.handleTextChange = this.handleTextChange.bind(this);\n        this.handleQuery = this.handleQuery.bind(this);\n        this.handleNew = this.handleNew.bind(this);\n        this.handleSave = this.handleSave.bind(this);\n        this.handleBack = this.handleBack.bind(this);\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estate\u003c/code\u003e中维护了页面状态，这里只需要3个参数：查询码，是否显示查询结果，剪切板文字\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e4.逻辑\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-JavaScript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e handleNumberChange(event) {\n        this.setState({queryNumber: event.target.value});\n    }\n\n    handleTextChange(event) {\n        this.setState({text: event.target.value});\n    }\n\n    handleBack(event){\n        this.setState({isShowResult: false});\n    }\n\n    handleQuery(event) {\n        if(this.state.queryNumber\u0026#x3C;=0){\n            alert('查询码不正确！');\n            return\n        }\n        let data = {\n            params: {\n                id: this.state.queryNumber\n            }\n        };\n        axios.get('https://wycode.cn/web/api/public/clipboard/query',data)\n            .then((response) =\u003e{\n                if(response.status!==200||response.data.data==null){\n                    throw '查询码不正确！'\n                }\n                this.setState({\n                    isShowResult: true,\n                    queryNumber: response.data.data.id,\n                    text: response.data.data.content\n                })\n            })\n            .catch((error) =\u003e alert(error));\n    }\n\n    handleNew(event) {\n        axios.post('https://wycode.cn/web/api/public/clipboard/create')\n            .then((response) =\u003e this.setState({\n                isShowResult: true,\n                queryNumber: response.data.data.id,\n                text: response.data.data.content\n            }))\n            .catch((error) =\u003e alert(error));\n    }\n\n    handleSave(event) {\n        let data = new FormData();\n        data.append('id',this.state.queryNumber);\n        data.append('content',this.state.text);\n        axios.post('https://wycode.cn/web/api/public/clipboard/save',data)\n            .then((response) =\u003e this.setState({\n                isShowResult: false,\n                queryNumber: response.data.data.id,\n                text: response.data.data.content\n            }))\n            .catch((error) =\u003e alert(error));\n    }\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis.setState({});\u003c/code\u003e更改页面状态\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAxios\u003c/code\u003e做网络请求。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAxios\u003c/code\u003e是一个js网络请求库。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e在网络请求返回函数里 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis\u003c/code\u003e做作用域是当前对象，会发生错误，使用箭头符=\u003e，即lambda表达式就没有问题。或者在外部创建一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis\u003c/code\u003e的引用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elet that = this;\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e至此大功告成！访问 \u003ca href=\"https://wycode.cn/clipboard/\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://wycode.cn/clipboard/\u003c/a\u003e 查看示例\n访问 \u003ca href=\"https://github.com/wangyucode/React-Learning\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/React-Learning\u003c/a\u003e 查看完整源码\u003c/p\u003e\n","content":"\n![React](/images/20180213_react.png)\n\n\u003e 这篇文章我们将用React实现一个跨平台剪切板。\n\n\n通常我们会遇到将手机上的文字发送到电脑上，或者反过来，或者是记录一些网址，你懂得。这时我们会用到一些云笔记之类的产品，或者干脆使用微信或QQ，它们都太重了，用起来没那么方便，还要登录注册啥的。我们使用React来开发一款手机和电脑上都能访问，并且无需注册登录的云便签应用。\n\n\u003c!--more--\u003e\n\n## 1.使用`create-react-app`创建工程\n\n```bash\nnpm install -g create-react-app\ncreate-react-app my-app\n\ncd my-app\nnpm start\n```\n\n## 2.编写模版\n\n```html\nrender() {\n        return (\n            \u003cdiv\u003e\n                \u003cHeader/\u003e\n                \u003cdiv className=\"Clipboard container\"\u003e\n                    \u003cinput placeholder=\"查询码\"\n                           type=\"number\"\n                           className=\"input-query-number form-control form-group\"\n                           value={this.state.queryNumber \u003e 0 ? this.state.queryNumber : ''}\n                           disabled={this.state.isShowResult}\n                           onChange={this.handleNumberChange}/\u003e\n                    {this.state.isShowResult ? null : \u003cbutton onClick={this.handleQuery}\n                                                              className=\"btn-query btn btn-primary form-control form-group\"\u003e查询\u003c/button\u003e}\n\n                    {this.state.isShowResult ? null :\n                        \u003cbutton onClick={this.handleNew}\n                                className=\"btn-new btn btn-primary form-control form-group\"\u003e新建\u003c/button\u003e}\n\n                    {this.state.isShowResult ? \u003ctextarea onChange={this.handleTextChange} value={this.state.text}\n                                                         className=\"textarea-text form-control form-group\"/\u003e : null}\n\n                    {this.state.isShowResult ? \u003cbutton onClick={this.handleSave}\n                                                       className=\"btn-save btn btn-success form-control  form-group\"\u003e保存\u003c/button\u003e : null}\n                \u003c/div\u003e\n            \u003c/div\u003e\n        );\n    }\n\n```\n\n- `render()`返回的`JSX`只能有一个组件，当需要多个组件时，需要用一个`div`包起来；\n- 这里通过state的自定义属性`isShowResult`实现对控件的隐藏和显示；\n- 界面使用Bootstrap框架做移动端适配\n- 通过`onClick={this.handleSave}`,`onChange={this.handleTextChange}`等属性绑定函数，构造函数里还要写`this.handleBack = this.handleBack.bind(this);`\n\n## 3.构造方法\n\n```JavaScript\nconstructor(props) {\n        super(props);\n        this.state = {\n            queryNumber: -1,\n            isShowResult: false,\n            text: ''\n        };\n\n        this.handleNumberChange = this.handleNumberChange.bind(this);\n        this.handleTextChange = this.handleTextChange.bind(this);\n        this.handleQuery = this.handleQuery.bind(this);\n        this.handleNew = this.handleNew.bind(this);\n        this.handleSave = this.handleSave.bind(this);\n        this.handleBack = this.handleBack.bind(this);\n    }\n```\n\n- `state`中维护了页面状态，这里只需要3个参数：查询码，是否显示查询结果，剪切板文字\n\n## 4.逻辑\n\n```JavaScript\n handleNumberChange(event) {\n        this.setState({queryNumber: event.target.value});\n    }\n\n    handleTextChange(event) {\n        this.setState({text: event.target.value});\n    }\n\n    handleBack(event){\n        this.setState({isShowResult: false});\n    }\n\n    handleQuery(event) {\n        if(this.state.queryNumber\u003c=0){\n            alert('查询码不正确！');\n            return\n        }\n        let data = {\n            params: {\n                id: this.state.queryNumber\n            }\n        };\n        axios.get('https://wycode.cn/web/api/public/clipboard/query',data)\n            .then((response) =\u003e{\n                if(response.status!==200||response.data.data==null){\n                    throw '查询码不正确！'\n                }\n                this.setState({\n                    isShowResult: true,\n                    queryNumber: response.data.data.id,\n                    text: response.data.data.content\n                })\n            })\n            .catch((error) =\u003e alert(error));\n    }\n\n    handleNew(event) {\n        axios.post('https://wycode.cn/web/api/public/clipboard/create')\n            .then((response) =\u003e this.setState({\n                isShowResult: true,\n                queryNumber: response.data.data.id,\n                text: response.data.data.content\n            }))\n            .catch((error) =\u003e alert(error));\n    }\n\n    handleSave(event) {\n        let data = new FormData();\n        data.append('id',this.state.queryNumber);\n        data.append('content',this.state.text);\n        axios.post('https://wycode.cn/web/api/public/clipboard/save',data)\n            .then((response) =\u003e this.setState({\n                isShowResult: false,\n                queryNumber: response.data.data.id,\n                text: response.data.data.content\n            }))\n            .catch((error) =\u003e alert(error));\n    }\n\n```\n\n- 使用`this.setState({});`更改页面状态\n- 这里使用`Axios`做网络请求。`Axios`是一个js网络请求库。\n- 在网络请求返回函数里 `this`做作用域是当前对象，会发生错误，使用箭头符=\u003e，即lambda表达式就没有问题。或者在外部创建一个`this`的引用`let that = this;`\n\n\n至此大功告成！访问 https://wycode.cn/clipboard/ 查看示例\n访问 https://github.com/wangyucode/React-Learning 查看完整源码","data":{"title":"用React做一个跨平台剪切板","date":"2018-02-13","tags":["React","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![React](/images/20180213_react.png)\n\n\u003e 这篇文章我们将用React实现一个跨平台剪切板。\n\n\n通常我们会遇到将手机上的文字发送到电脑上，或者反过来，或者是记录一些网址，你懂得。这时我们会用到一些云笔记之类的产品，或者干脆使用微信或QQ，它们都太重了，用起来没那么方便，还要登录注册啥的。我们使用React来开发一款手机和电脑上都能访问，并且无需注册登录的云便签应用。\n\n"},{"id":"react","file":"react.md","excerptHtml":"","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eReact框架的整体思路是将DOM元素彻底改为由JS代码渲染，通过组件(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e)的层层嵌套，最终由\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactDOM.render()\u003c/code\u003e渲染到页面上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003eReact框架的核心概念：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e元素(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eElement\u003c/code\u003e) Recat认为元素是不可变的，创建后不能修改。React使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJSX\u003c/code\u003e技术将HTML代码直接作为常量使用。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e组件(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e) 组件是对元素的封装。拥有自身的生命周期函数。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e属性(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eProps\u003c/code\u003e) 属性可以看作常量，用于构建特定的组件。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e状态(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eState\u003c/code\u003e) 组件通过状态维护自身变化。组件通过调用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esetState()\u003c/code\u003e方法重新渲染。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eReact的理念是采取\u003ca href=\"https://en.wikipedia.org/wiki/Single_responsibility_principle\" title=\"Wiki\" class=\"text-sky-500 hover:text-sky-400\"\u003e单一责任原则\u003c/a\u003e，自顶向下设计，一层层的拆分成只做一件事的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在做一个实际的项目时，采取先使用假数据画页面的方式，这个过程中只需要关心数据模型和页面。而不去关心逻辑交互。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e为什么要分成\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eProps\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eState\u003c/code\u003e就显而易见了，做页面时只关心\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eProps\u003c/code\u003e，做交互时只关心\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eState\u003c/code\u003e。\u003c/p\u003e\n","content":"\n![React](/images/20180213_react.png)\n\n\u003e React框架的整体思路是将DOM元素彻底改为由JS代码渲染，通过组件(`Component`)的层层嵌套，最终由`ReactDOM.render()`渲染到页面上。\n\nReact框架的核心概念：\n\n- 元素(`Element`) Recat认为元素是不可变的，创建后不能修改。React使用`JSX`技术将HTML代码直接作为常量使用。\n- 组件(`Component`) 组件是对元素的封装。拥有自身的生命周期函数。\n- 属性(`Props`) 属性可以看作常量，用于构建特定的组件。\n- 状态(`State`) 组件通过状态维护自身变化。组件通过调用`setState()`方法重新渲染。\n\nReact的理念是采取[单一责任原则](https://en.wikipedia.org/wiki/Single_responsibility_principle \"Wiki\")，自顶向下设计，一层层的拆分成只做一件事的`Component`。\n\n在做一个实际的项目时，采取先使用假数据画页面的方式，这个过程中只需要关心数据模型和页面。而不去关心逻辑交互。\n\n此时`Component`为什么要分成`Props`和`State`就显而易见了，做页面时只关心`Props`，做交互时只关心`State`。","data":{"title":"React框架原理的思考","date":"2018-01-06","tags":["React","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":""}],"cid":"react"},"__N_SSG":true},"page":"/blog/tag/[cid]","query":{"cid":"react"},"buildId":"NDkQWnMtEcy0IDQqDGEkS","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
