00"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"gradle-build","file":"gradle-build.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://ts1.cn.mm.bing.net/th/id/R-C.da7d3edf2afaf378bff91a21e6385091?rik=kWTVUo%2be2O8bbg\u0026#x26;riu=http%3a%2f%2ftheeye.pe.kr%2fwp-content%2fuploads%2f2014%2f02%2fgradle.png\u0026#x26;ehk=5NJHqrr5W7rLhp4CEUQIadjJ83TfKvlokTsc%2bzFFiLo%3d\u0026#x26;risl=\u0026#x26;pid=ImgRaw\u0026#x26;r=0\" alt=\"Gradle\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e构建变体是 Gradle 按照特定规则集合进行打包，以生成适应不同需求的Apk包。\n例如，需要生成dev版，测试版、以及release版，它们的服务器地址，版本号，图标各不相同，以及多渠道打包等等。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://ts1.cn.mm.bing.net/th/id/R-C.da7d3edf2afaf378bff91a21e6385091?rik=kWTVUo%2be2O8bbg\u0026#x26;riu=http%3a%2f%2ftheeye.pe.kr%2fwp-content%2fuploads%2f2014%2f02%2fgradle.png\u0026#x26;ehk=5NJHqrr5W7rLhp4CEUQIadjJ83TfKvlokTsc%2bzFFiLo%3d\u0026#x26;risl=\u0026#x26;pid=ImgRaw\u0026#x26;r=0\" alt=\"Gradle\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e构建变体是 Gradle 按照特定规则集合进行打包，以生成适应不同需求的Apk包。\n例如，需要生成dev版，测试版、以及release版，它们的服务器地址，版本号，图标各不相同，以及多渠道打包等等。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eproductFlavors\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e可以定义多个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eproductFlavors\u003c/code\u003e版本，其继承覆盖所有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edefaultConfig\u003c/code\u003e中的字段\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e主要的使用手段有一下几种\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e覆盖\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edefaultConfig\u003c/code\u003e默认字段(包名、版本名等)\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e往\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAndroidManifast.xml\u003c/code\u003e文件注入编译变量\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e修改包名，支持前后缀\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ebuildConfigField\u003c/code\u003e动态改变编译时常量\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eresValue\u003c/code\u003e动态注入字符串资源\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e示例\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eandroid {\n    ...\n    defaultConfig {\n        versionCode 200\n        versionName 'V2.0.0'\n        manifestPlaceholders = [\n                scheme: \"FindAR\"\n                id    : \"1565483848\"\n        ]\n        buildConfigField \"String\", \"ROOT_FOLDER_NAME\", '\"FindAR\"'\n    }\n\n    productFlavors{\n       dev{\n           versionName 'V2.0.0 Dev'\n           resValue \"string\", \"user_id\", \"001\" //user id\n       }\n\n       production{\n           versionName 'V2.0.0 Release'\n           resValue \"string\", \"user_id\", \"002\" //user id\n       }\n   }\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![Gradle](https://ts1.cn.mm.bing.net/th/id/R-C.da7d3edf2afaf378bff91a21e6385091?rik=kWTVUo%2be2O8bbg\u0026riu=http%3a%2f%2ftheeye.pe.kr%2fwp-content%2fuploads%2f2014%2f02%2fgradle.png\u0026ehk=5NJHqrr5W7rLhp4CEUQIadjJ83TfKvlokTsc%2bzFFiLo%3d\u0026risl=\u0026pid=ImgRaw\u0026r=0)\n\n\u003e 构建变体是 Gradle 按照特定规则集合进行打包，以生成适应不同需求的Apk包。\n例如，需要生成dev版，测试版、以及release版，它们的服务器地址，版本号，图标各不相同，以及多渠道打包等等。\n\n\u003c!--more--\u003e\n## productFlavors\n\n可以定义多个`productFlavors`版本，其继承覆盖所有`defaultConfig`中的字段\n\n主要的使用手段有一下几种\n\n- 覆盖`defaultConfig`默认字段(包名、版本名等)\n- 往`AndroidManifast.xml`文件注入编译变量\n- 修改包名，支持前后缀\n- 使用`buildConfigField`动态改变编译时常量\n- 使用`resValue`动态注入字符串资源\n\n\n## 示例\n```\nandroid {\n    ...\n    defaultConfig {\n        versionCode 200\n        versionName 'V2.0.0'\n        manifestPlaceholders = [\n                scheme: \"FindAR\"\n                id    : \"1565483848\"\n        ]\n        buildConfigField \"String\", \"ROOT_FOLDER_NAME\", '\"FindAR\"'\n    }\n\n    productFlavors{\n       dev{\n           versionName 'V2.0.0 Dev'\n           resValue \"string\", \"user_id\", \"001\" //user id\n       }\n\n       production{\n           versionName 'V2.0.0 Release'\n           resValue \"string\", \"user_id\", \"002\" //user id\n       }\n   }\n}\n```\n","data":{"title":"Gradle构建变种版本（多渠道打包）","date":"2017-09-04","tags":["Gradle","Android"],"category":"Android"},"isEmpty":false,"excerpt":"\n![Gradle](https://ts1.cn.mm.bing.net/th/id/R-C.da7d3edf2afaf378bff91a21e6385091?rik=kWTVUo%2be2O8bbg\u0026riu=http%3a%2f%2ftheeye.pe.kr%2fwp-content%2fuploads%2f2014%2f02%2fgradle.png\u0026ehk=5NJHqrr5W7rLhp4CEUQIadjJ83TfKvlokTsc%2bzFFiLo%3d\u0026risl=\u0026pid=ImgRaw\u0026r=0)\n\n\u003e 构建变体是 Gradle 按照特定规则集合进行打包，以生成适应不同需求的Apk包。\n例如，需要生成dev版，测试版、以及release版，它们的服务器地址，版本号，图标各不相同，以及多渠道打包等等。\n\n"}],"cid":"gradle"},"__N_SSG":true},"page":"/blog/tag/[cid]","query":{"cid":"gradle"},"buildId":"NDkQWnMtEcy0IDQqDGEkS","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
