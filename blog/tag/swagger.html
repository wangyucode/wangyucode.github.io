00"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"swagger-auth","file":"swagger-auth.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://swagger.io/swagger/media/assets/images/swagger_logo.svg\" alt=\"swagger\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当API添加了鉴权后，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eswagger\u003c/code\u003e如何进行调试呢，比如需要在请求头\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eheader\u003c/code\u003e中添加类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etoken\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAuthorization\u003c/code\u003e之类的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring\u003c/code\u003e中进行如下简单的配置就可以了。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://swagger.io/swagger/media/assets/images/swagger_logo.svg\" alt=\"swagger\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当API添加了鉴权后，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eswagger\u003c/code\u003e如何进行调试呢，比如需要在请求头\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eheader\u003c/code\u003e中添加类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etoken\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAuthorization\u003c/code\u003e之类的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring\u003c/code\u003e中进行如下简单的配置就可以了。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\n@EnableSwagger2\nclass SwaggerConfig {\n\n    @Bean\n    fun generateDocket(): Docket {\n        return Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .apis(RequestHandlerSelectors.withClassAnnotation(Api::class.java))\n                .build()\n                .securityContexts(listOf(securityContext())) // #1\n                .securitySchemes(listOf(apiKey())) // #2\n                .apiInfo(apiInfo())\n    }\n\n    private fun securityContext(): SecurityContext {\n        return SecurityContext.builder()\n                .securityReferences(defaultAuth())\n                .forPaths(PathSelectors.regex(\"/api/public/admin/.*\"))\n                .build()\n    }\n\n    fun defaultAuth(): List\u0026#x3C;SecurityReference\u003e {\n        val authorizationScope = AuthorizationScope(\"global\", \"accessEverything\")\n        val authorizationScopes = arrayOf(authorizationScope)\n        return listOf(SecurityReference(\"token\", authorizationScopes))\n    }\n\n\n    fun apiKey(): ApiKey {\n        return ApiKey(\"token\", \"X-Auth-Token\", \"header\")\n    }\n\n\n    private fun apiInfo(): ApiInfo {\n        return ApiInfo(\"王郁的API文档\",\n                \"用于App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                Contact(\"王郁\", \"wycode.cn\", \"wangyu@wycode.cn\"),\n                \"wycode.cn All Right Reserved\",\n                \"https://wycode.cn\",\n                emptyList())\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e关键配置就是上面包含#1和#2注释的两行配置\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e配置安全上下文，我这里配置了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/api/public/admin/.*\u003c/code\u003e下的接口需要添加。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e配置鉴权类型，我这里使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eApiKey\u003c/code\u003e。\u003c/li\u003e\n\u003c/ol\u003e\n","content":"\n![swagger](https://swagger.io/swagger/media/assets/images/swagger_logo.svg)\n\n当API添加了鉴权后，`swagger`如何进行调试呢，比如需要在请求头`header`中添加类似`token`或者`Authorization`之类的。\n\n在`Spring`中进行如下简单的配置就可以了。\n\n\u003c!--more--\u003e\n\n```kotlin\n@Configuration\n@EnableSwagger2\nclass SwaggerConfig {\n\n    @Bean\n    fun generateDocket(): Docket {\n        return Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .apis(RequestHandlerSelectors.withClassAnnotation(Api::class.java))\n                .build()\n                .securityContexts(listOf(securityContext())) // #1\n                .securitySchemes(listOf(apiKey())) // #2\n                .apiInfo(apiInfo())\n    }\n\n    private fun securityContext(): SecurityContext {\n        return SecurityContext.builder()\n                .securityReferences(defaultAuth())\n                .forPaths(PathSelectors.regex(\"/api/public/admin/.*\"))\n                .build()\n    }\n\n    fun defaultAuth(): List\u003cSecurityReference\u003e {\n        val authorizationScope = AuthorizationScope(\"global\", \"accessEverything\")\n        val authorizationScopes = arrayOf(authorizationScope)\n        return listOf(SecurityReference(\"token\", authorizationScopes))\n    }\n\n\n    fun apiKey(): ApiKey {\n        return ApiKey(\"token\", \"X-Auth-Token\", \"header\")\n    }\n\n\n    private fun apiInfo(): ApiInfo {\n        return ApiInfo(\"王郁的API文档\",\n                \"用于App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                Contact(\"王郁\", \"wycode.cn\", \"wangyu@wycode.cn\"),\n                \"wycode.cn All Right Reserved\",\n                \"https://wycode.cn\",\n                emptyList())\n    }\n}\n\n```\n关键配置就是上面包含#1和#2注释的两行配置\n\n1. 配置安全上下文，我这里配置了`/api/public/admin/.*`下的接口需要添加。\n2. 配置鉴权类型，我这里使用`ApiKey`。","data":{"title":"SpringBoot工程为SwaggerUI添加认证","date":"2019-07-19","tags":["OAuth","Java","Kotlin","Spring","Swagger"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![swagger](https://swagger.io/swagger/media/assets/images/swagger_logo.svg)\n\n当API添加了鉴权后，`swagger`如何进行调试呢，比如需要在请求头`header`中添加类似`token`或者`Authorization`之类的。\n\n在`Spring`中进行如下简单的配置就可以了。\n\n"},{"id":"tomcat","file":"tomcat.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://pic.baike.soso.com/ugc/baikepic2/18363/cut-20181002011705-1203719514_jpg_267_214_8556.jpg/300\" alt=\"Tomcat\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://pic.baike.soso.com/ugc/baikepic2/18363/cut-20181002011705-1203719514_jpg_267_214_8556.jpg/300\" alt=\"Tomcat\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eTomcat的Server配置\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eTomcat\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003econf\u003c/code\u003e目录下的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eserver.xml\u003c/code\u003e（Linux系统可能在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/etc/tomcat/\u003c/code\u003e下）定义了服务器的相关配置信息。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e根据官方文档，这里的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eServer\u003c/code\u003e指的是整个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCatalina servlet\u003c/code\u003e容器。它的属性代表整个servlet容器的特性。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e常见的如：服务器端口，根项目路径等。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eConnector属性\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e除了配置端口，协议版本，还可以配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eURIEncoding\u003c/code\u003e，默认值是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eISO8859-1\u003c/code\u003e所以不支持中文，我们改成\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUTF-8\u003c/code\u003e即可。即：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-xml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;Connector port=\"80\" protocol=\"HTTP/1.1\"\n               connectionTimeout=\"20000\"\n               redirectPort=\"443\"\n\t           URIEncoding=\"UTF-8\"/\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHTTPS\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通常在配置了HTTPS的服务器上，我们会把80端口转发到443端口上，此时我们要对443端口的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eConnector\u003c/code\u003e也配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eURIEncoding=\"UTF-8\"\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我的问题就出在这。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以上...\u003c/p\u003e\n","content":"\n![Tomcat](https://pic.baike.soso.com/ugc/baikepic2/18363/cut-20181002011705-1203719514_jpg_267_214_8556.jpg/300)\n\n\u003e 今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\n\n\u003c!--more--\u003e\n\n## Tomcat的Server配置\n\nTomcat`conf`目录下的`server.xml`（Linux系统可能在`/etc/tomcat/`下）定义了服务器的相关配置信息。\n\n根据官方文档，这里的`Server`指的是整个`Catalina servlet`容器。它的属性代表整个servlet容器的特性。\n\n常见的如：服务器端口，根项目路径等。\n\n## Connector属性\n\n除了配置端口，协议版本，还可以配置`URIEncoding`，默认值是`ISO8859-1`所以不支持中文，我们改成`UTF-8`即可。即：\n\n```xml\n\u003cConnector port=\"80\" protocol=\"HTTP/1.1\"\n               connectionTimeout=\"20000\"\n               redirectPort=\"443\"\n\t           URIEncoding=\"UTF-8\"/\u003e\n```\n\n## HTTPS\n\n通常在配置了HTTPS的服务器上，我们会把80端口转发到443端口上，此时我们要对443端口的`Connector`也配置`URIEncoding=\"UTF-8\"`\n\n\n我的问题就出在这。\n\n\n以上...\n\n\n\n\n\n","data":{"title":"SwaggerUI GET请求中文乱码问题解决","date":"2018-04-11","tags":["Swagger","Spring","Tomcat"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![Tomcat](https://pic.baike.soso.com/ugc/baikepic2/18363/cut-20181002011705-1203719514_jpg_267_214_8556.jpg/300)\n\n\u003e 今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\n\n"},{"id":"swagger","file":"swagger.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://tse4-mm.cn.bing.net/th/id/OIP-C.7iaXjYojG6kWxLTZaW1x4QHaCn?pid=ImgDet\u0026#x26;rs=1\" alt=\"Swagger\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://tse4-mm.cn.bing.net/th/id/OIP-C.7iaXjYojG6kWxLTZaW1x4QHaCn?pid=ImgDet\u0026#x26;rs=1\" alt=\"Swagger\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e创建SwaggerUI渲染需要的JSON\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e首先为项目添加生成JSON的库：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edependencies {\n    compile \"io.springfox:springfox-swagger2:2.7.0\"\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSwaggerConfig\u003c/code\u003e类\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\n@EnableSwagger2\npublic class SwaggerConfig {\n\n    @Bean\n    public Docket generateDocket(){\n        return new Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .paths(paths()) // and by paths\n                .build()\n                .apiInfo(apiInfo());\n    }\n\n\n    //Here is an example where we select any api that matches one of these paths\n    private Predicate\u0026#x3C;String\u003e paths() {\n        return input -\u003e input.matches(\".api.*\");\n    }\n\n\n    private ApiInfo apiInfo() {\n        return new ApiInfo(\"王郁的API文档\",\n                \"提供App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                new Contact(\"王郁\",\"wycode.cn\",\"wangyu0503@gmail.com\"),\n                \"wycode.cn All Right Reserved\",\n                \"http://wycode.cn\",\n                new ArrayList\u0026#x3C;\u003e());\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e访问\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttp://localhost:8080/v2/api-docs\u003c/code\u003e可以看到JSON即说明配置成功：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-JSON px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n    \"swagger\": \"2.0\",\n    \"info\": {\n        \"description\": \"提供App测试及独立APP研发\",\n        \"version\": \"2.0\",\n        \"title\": \"王郁的API文档\",\n        \"termsOfService\": \"http://wycode.cn\",\n        \"contact\": {},\n        \"license\": {}\n    },\n    \"host\": \"localhost:8080\",\n    \"basePath\": \"/\",\n    \"tags\": [],\n    \"paths\": {\n        \"/api/hello\": {\n            \"get\": {},\n            \"head\": {},\n            \"post\": {},\n            \"put\": {},\n            \"delete\": {},\n            \"options\": {},\n            \"patch\": {}\n        }\n    },\n    \"definitions\": {}\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e添加SwaggerUI包\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e从\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSwaggerUI\u003c/code\u003e的github上下载最新版，将里面的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edist\u003c/code\u003e文件夹，放入我们工程的静态页面目录\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e因为我们要修改\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e，所以不能使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewebjars\u003c/code\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e对\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e的常量\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eui\u003c/code\u003e做如下更改\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-JavaScript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e// Build a system\n  const ui = SwaggerUIBundle({\n    url: \"/v2/api-docs\", //API的JSON地址\n    dom_id: '#swagger-ui',\n    deepLinking: true,\n    presets: [\n      SwaggerUIBundle.presets.apis,\n      SwaggerUIStandalonePreset\n    ],\n    plugins: [\n      SwaggerUIBundle.plugins.DownloadUrl\n    ],\n    layout: \"StandaloneLayout\"\n  })\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e大功告成！\u003c/h2\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e添加文档注释\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实体注解\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@ApiModel(value = \"Hello 消息\",description = \"Hello接口返回的消息实体\")\npublic class Hello {\n\n    @ApiModelProperty(\"消息\")\n    private String message;\n\n    ...\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e接口注解\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Api(value = \"Hello\", description = \"第一个api\",tags = \"Hello\")\n@RestController\npublic class HelloController {\n\n    @ApiOperation(value = \"Say Hello\", produces = \"application/json \")\n    @RequestMapping(\"/api/hello\")\n    public Hello hello(@ApiParam(value = \"消息\",defaultValue = \"Hello World!\") @RequestParam(name = \"message\",defaultValue = \"Hello World!\")String message){\n        return  new Hello(\"message is : \"+ message);\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![Swagger](https://tse4-mm.cn.bing.net/th/id/OIP-C.7iaXjYojG6kWxLTZaW1x4QHaCn?pid=ImgDet\u0026rs=1)\n\n\u003e 本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\n\n\u003c!--more--\u003e\n## 创建SwaggerUI渲染需要的JSON\n- 首先为项目添加生成JSON的库：\n\n```\ndependencies {\n    compile \"io.springfox:springfox-swagger2:2.7.0\"\n}\n```\n\n- 添加`SwaggerConfig`类\n\n```java\n@Configuration\n@EnableSwagger2\npublic class SwaggerConfig {\n\n    @Bean\n    public Docket generateDocket(){\n        return new Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .paths(paths()) // and by paths\n                .build()\n                .apiInfo(apiInfo());\n    }\n\n\n    //Here is an example where we select any api that matches one of these paths\n    private Predicate\u003cString\u003e paths() {\n        return input -\u003e input.matches(\".api.*\");\n    }\n\n\n    private ApiInfo apiInfo() {\n        return new ApiInfo(\"王郁的API文档\",\n                \"提供App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                new Contact(\"王郁\",\"wycode.cn\",\"wangyu0503@gmail.com\"),\n                \"wycode.cn All Right Reserved\",\n                \"http://wycode.cn\",\n                new ArrayList\u003c\u003e());\n    }\n}\n```\n\n- 访问`http://localhost:8080/v2/api-docs`可以看到JSON即说明配置成功：\n\n```JSON\n{\n    \"swagger\": \"2.0\",\n    \"info\": {\n        \"description\": \"提供App测试及独立APP研发\",\n        \"version\": \"2.0\",\n        \"title\": \"王郁的API文档\",\n        \"termsOfService\": \"http://wycode.cn\",\n        \"contact\": {},\n        \"license\": {}\n    },\n    \"host\": \"localhost:8080\",\n    \"basePath\": \"/\",\n    \"tags\": [],\n    \"paths\": {\n        \"/api/hello\": {\n            \"get\": {},\n            \"head\": {},\n            \"post\": {},\n            \"put\": {},\n            \"delete\": {},\n            \"options\": {},\n            \"patch\": {}\n        }\n    },\n    \"definitions\": {}\n}\n```\n\n- 添加SwaggerUI包\n\n从`SwaggerUI`的github上下载最新版，将里面的`dist`文件夹，放入我们工程的静态页面目录\n\n\u003e 因为我们要修改`index.html`，所以不能使用`webjars`\n\n对`index.html`的常量`ui`做如下更改\n\n```JavaScript\n// Build a system\n  const ui = SwaggerUIBundle({\n    url: \"/v2/api-docs\", //API的JSON地址\n    dom_id: '#swagger-ui',\n    deepLinking: true,\n    presets: [\n      SwaggerUIBundle.presets.apis,\n      SwaggerUIStandalonePreset\n    ],\n    plugins: [\n      SwaggerUIBundle.plugins.DownloadUrl\n    ],\n    layout: \"StandaloneLayout\"\n  })\n```\n\n\n## 大功告成！\n\n## 添加文档注释\n\n- 实体注解\n\n```Java\n@ApiModel(value = \"Hello 消息\",description = \"Hello接口返回的消息实体\")\npublic class Hello {\n\n    @ApiModelProperty(\"消息\")\n    private String message;\n\n    ...\n}\n```\n\n- 接口注解\n\n```java\n@Api(value = \"Hello\", description = \"第一个api\",tags = \"Hello\")\n@RestController\npublic class HelloController {\n\n    @ApiOperation(value = \"Say Hello\", produces = \"application/json \")\n    @RequestMapping(\"/api/hello\")\n    public Hello hello(@ApiParam(value = \"消息\",defaultValue = \"Hello World!\") @RequestParam(name = \"message\",defaultValue = \"Hello World!\")String message){\n        return  new Hello(\"message is : \"+ message);\n    }\n}\n```\n","data":{"title":"使用swagger为Spring REST API生成在线文档","date":"2017-10-23","tags":["Spring","Java","Swagger","JavaScript"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![Swagger](https://tse4-mm.cn.bing.net/th/id/OIP-C.7iaXjYojG6kWxLTZaW1x4QHaCn?pid=ImgDet\u0026rs=1)\n\n\u003e 本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\n\n"}],"cid":"swagger"},"__N_SSG":true},"page":"/blog/tag/[cid]","query":{"cid":"swagger"},"buildId":"uFO1FMOoBQ2X-GM8G4ZfF","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
