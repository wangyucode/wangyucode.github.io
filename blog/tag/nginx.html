<!DOCTYPE html><html lang="zh-CN"><head><meta charSet="utf-8"/><title>王郁的小站</title><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/><meta name="next-head-count" content="3"/><link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml"/><meta name="description" content="欢迎光临王郁的小站"/><meta property="og:image" content="https://og-image.vercel.app/%E7%8E%8B%E9%83%81%E7%9A%84%E5%B0%8F%E7%AB%99.png?theme=light&amp;md=0&amp;fontSize=75px&amp;images=https%3A%2F%2Fassets.vercel.com%2Fimage%2Fupload%2Ffront%2Fassets%2Fdesign%2Fnextjs-black-logo.svg"/><meta name="og:title" content="王郁的小站"/><meta name="twitter:card" content="summary_large_image"/><link rel="preload" href="/_next/static/css/8a367d4b0f561ee4.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/8a367d4b0f561ee4.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-6af0e3c12b874bb0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-467b11a89995b152.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-75bdb96a41ba80f4.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-7a9af0eb34ed0a8f.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/205-2ea451b8c35b24ac.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/889-b501beaef0bf85fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/blog/tag/%5Bcid%5D-9dc0c01f6fcfe393.js" defer="" crossorigin=""></script><script src="/_next/static/7YMuoTtyITfiinBiv1T76/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7YMuoTtyITfiinBiv1T76/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"http3","file":"http3.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://quic.nginx.org/static/img/quic.svg\" alt=\"quic\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e基于UDP的HTTP/3协议规范\u003ca href=\"https://datatracker.ietf.org/doc/html/rfc9114\" class=\"text-sky-500 hover:text-sky-400\"\u003eRFC 9114\u003c/a\u003e于2022年6月发表。而HTTP/2协议规范\u003ca href=\"https://httpwg.org/specs/rfc7540.html\" class=\"text-sky-500 hover:text-sky-400\"\u003eRFC 7540\u003c/a\u003e早在2015年5月发表。但是仍然有很多网站在使用更加古老的HTTP1.1。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eHTTP/2通过多路复用（multiplexing）和头部压缩，能够有效降低延迟。同时还提供了不同于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebScoket\u003c/code\u003e协议的服务端推送的新方法。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eHTTP3则使用基于UDP的QUIC协议，从根本上解决头部阻塞的问题，特别适用于移动网络不稳定情况下的网络效率改善。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本文介绍HTTP2，HTTP3协议的新特性，以及通过NGINX升级到HTTP2和HTTP3的方法。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://quic.nginx.org/static/img/quic.svg\" alt=\"quic\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e基于UDP的HTTP/3协议规范\u003ca href=\"https://datatracker.ietf.org/doc/html/rfc9114\" class=\"text-sky-500 hover:text-sky-400\"\u003eRFC 9114\u003c/a\u003e于2022年6月发表。而HTTP/2协议规范\u003ca href=\"https://httpwg.org/specs/rfc7540.html\" class=\"text-sky-500 hover:text-sky-400\"\u003eRFC 7540\u003c/a\u003e早在2015年5月发表。但是仍然有很多网站在使用更加古老的HTTP1.1。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eHTTP/2通过多路复用（multiplexing）和头部压缩，能够有效降低延迟。同时还提供了不同于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebScoket\u003c/code\u003e协议的服务端推送的新方法。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eHTTP3则使用基于UDP的QUIC协议，从根本上解决头部阻塞的问题，特别适用于移动网络不稳定情况下的网络效率改善。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本文介绍HTTP2，HTTP3协议的新特性，以及通过NGINX升级到HTTP2和HTTP3的方法。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e回顾HTTP/1.0和HTTP/1.1\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eHTTP/1.0每发送一个请求，就要建立一个新的TCP连接。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eHTTP/1.1加入了请求流水线（request pipelining），和持久连接。但多数情况下仍然会对不同的请求建立多个连接。由于TCP的特性，阻塞控制无法在多个连接之间共享，且浏览器限制了同服务器的总连接数。所以网络效率仍然较低。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e此外HTTP/1.1和1.0都使用明文，用空格和回车进行字段分割，这导致了解析的复杂性和对不同变体的容忍度提升。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHTTP2\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eHTTP/2引入了二进制帧和多路复用来改善延迟，但它没有修改传输层（TCP），由于TCP严格按照顺序发送数据包，当数据包发生丢失时，TCP协议会重发数据包，所以在丢包率较高的情况下多路复用的机制反而会变慢。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHTTP3\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eHTTP/3使用基于UDP的QUIC协议，拥有HTTP2所有的优良特性，并且由于UDP天生无需握手，且在网络环境发生变化时无需重新建立连接，例如切换移动网络到WIFI。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e升级到HTTP2\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eNGINX默认使用HTTP/1.1, 我们只需简单的添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttp2\u003c/code\u003e到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elisten\u003c/code\u003e指令即可无痛升级到HTTP2：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-nginx px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e...\nserver {\n    listen 443 ssl http2;\n    ...\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e升级到HTTP3\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e截止到今天（2022年10月1日），NGINX对HTTP3的支持还在开发中（nginx-quic分支），官方还没有发布基于此分支的docker镜像，这里我使用民间编译的镜像\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edasskelett/nginx-quic\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e修改配置:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-nginx px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e...\nserver {\n    listen 443 ssl http2;\n    listen 443 http3 reuseport;\n    ...\n    ssl_early_data on;\n\n    add_header Alt-Svc 'h3=\":443\"; ma=86400';\n    add_header QUIC-Status $http3;\n    ...\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e至此本站已全面支持HTTP3。\u003c/p\u003e\n","content":"\n![quic](https://quic.nginx.org/static/img/quic.svg)\n\n基于UDP的HTTP/3协议规范[RFC 9114](https://datatracker.ietf.org/doc/html/rfc9114)于2022年6月发表。而HTTP/2协议规范[RFC 7540](https://httpwg.org/specs/rfc7540.html)早在2015年5月发表。但是仍然有很多网站在使用更加古老的HTTP1.1。\n\nHTTP/2通过多路复用（multiplexing）和头部压缩，能够有效降低延迟。同时还提供了不同于`WebScoket`协议的服务端推送的新方法。\n\nHTTP3则使用基于UDP的QUIC协议，从根本上解决头部阻塞的问题，特别适用于移动网络不稳定情况下的网络效率改善。\n\n本文介绍HTTP2，HTTP3协议的新特性，以及通过NGINX升级到HTTP2和HTTP3的方法。\n\n\u003c!--more--\u003e\n\n## 回顾HTTP/1.0和HTTP/1.1\n\n- HTTP/1.0每发送一个请求，就要建立一个新的TCP连接。\n- HTTP/1.1加入了请求流水线（request pipelining），和持久连接。但多数情况下仍然会对不同的请求建立多个连接。由于TCP的特性，阻塞控制无法在多个连接之间共享，且浏览器限制了同服务器的总连接数。所以网络效率仍然较低。\n- 此外HTTP/1.1和1.0都使用明文，用空格和回车进行字段分割，这导致了解析的复杂性和对不同变体的容忍度提升。\n\n## HTTP2\n\nHTTP/2引入了二进制帧和多路复用来改善延迟，但它没有修改传输层（TCP），由于TCP严格按照顺序发送数据包，当数据包发生丢失时，TCP协议会重发数据包，所以在丢包率较高的情况下多路复用的机制反而会变慢。\n\n## HTTP3\n\nHTTP/3使用基于UDP的QUIC协议，拥有HTTP2所有的优良特性，并且由于UDP天生无需握手，且在网络环境发生变化时无需重新建立连接，例如切换移动网络到WIFI。\n\n## 升级到HTTP2\n\nNGINX默认使用HTTP/1.1, 我们只需简单的添加`http2`到`listen`指令即可无痛升级到HTTP2：\n\n```nginx\n...\nserver {\n    listen 443 ssl http2;\n    ...\n}\n```\n## 升级到HTTP3\n\n截止到今天（2022年10月1日），NGINX对HTTP3的支持还在开发中（nginx-quic分支），官方还没有发布基于此分支的docker镜像，这里我使用民间编译的镜像`dasskelett/nginx-quic`。\n\n修改配置:\n\n```nginx\n...\nserver {\n    listen 443 ssl http2;\n    listen 443 http3 reuseport;\n    ...\n    ssl_early_data on;\n\n    add_header Alt-Svc 'h3=\":443\"; ma=86400';\n    add_header QUIC-Status $http3;\n    ...\n}\n```\n\n至此本站已全面支持HTTP3。\n\n\n\n\n","data":{"title":"升级到HTTP3","date":"2022-09-29","tags":["HTTP","NGINX"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![quic](https://quic.nginx.org/static/img/quic.svg)\n\n基于UDP的HTTP/3协议规范[RFC 9114](https://datatracker.ietf.org/doc/html/rfc9114)于2022年6月发表。而HTTP/2协议规范[RFC 7540](https://httpwg.org/specs/rfc7540.html)早在2015年5月发表。但是仍然有很多网站在使用更加古老的HTTP1.1。\n\nHTTP/2通过多路复用（multiplexing）和头部压缩，能够有效降低延迟。同时还提供了不同于`WebScoket`协议的服务端推送的新方法。\n\nHTTP3则使用基于UDP的QUIC协议，从根本上解决头部阻塞的问题，特别适用于移动网络不稳定情况下的网络效率改善。\n\n本文介绍HTTP2，HTTP3协议的新特性，以及通过NGINX升级到HTTP2和HTTP3的方法。\n\n"},{"id":"nginx-redirect","file":"nginx-redirect.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://nginx.org/nginx.png\" alt=\"NGINX\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e服务器配置Https之后，我们希望同时支持http，但是80端口进来的请求直接重定向到443端口上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e有时我们会将某些网页永久迁移到别的地址，但是又不想让老用户直接无法访问，或者看到404，而是要将这些老地址的请求转发到新地址上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章教你如何配置NGINX重定向。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://nginx.org/nginx.png\" alt=\"NGINX\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e服务器配置Https之后，我们希望同时支持http，但是80端口进来的请求直接重定向到443端口上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e有时我们会将某些网页永久迁移到别的地址，但是又不想让老用户直接无法访问，或者看到404，而是要将这些老地址的请求转发到新地址上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章教你如何配置NGINX重定向。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003eNGINX安装及配置请移步这里：\u003ca href=\"/2018-06-23-nginx.html\" title=\"NGINX安装\" class=\"text-sky-500 hover:text-sky-400\"\u003eNginx安装\u003c/a\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用rewrite\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eserver {\n#...\n\trewrite (.*)$ https://wycode.cn$1 permanent;\n#...\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里将这个server的所有请求，永久定向到 \u003ca href=\"https://wycode.cn\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://wycode.cn\u003c/a\u003e 上，并将请求的path拼接在后面\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用return 301\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eserver {\n\tlisten 443 ssl;\n    listen [::]:443 ssl;\n\n    ssl_certificate /etc/nginx/cert/wycode.pem;\n    ssl_certificate_key /etc/nginx/cert/wycode.key;\n\n    server_name wycode.cn www.wycode.cn;\n\n    error_page 404 = https://wycode.cn/404.html;\n\n    location / {\n        root /var/www/wycode.cn;\n        index index.html;\n        try_files $uri $uri/ =404;\n    }\n}\nserver {\n    listen 80;\n    listen [::]:80;\n    server_name wycode.cn www.wycode.cn;\n    return 301 https://$host$request_uri;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里的第二个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eserver\u003c/code\u003e监听80端口，在下面的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereturn 301\u003c/code\u003e语句中将请求转发到第一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eserver\u003c/code\u003e中去，并且\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehost\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003erequest_uri\u003c/code\u003e不变。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请注明出处!\u003c/p\u003e\n","content":"\n![NGINX](https://nginx.org/nginx.png)\n\n\u003e 服务器配置Https之后，我们希望同时支持http，但是80端口进来的请求直接重定向到443端口上。\n\n\u003e 有时我们会将某些网页永久迁移到别的地址，但是又不想让老用户直接无法访问，或者看到404，而是要将这些老地址的请求转发到新地址上。\n\n这篇文章教你如何配置NGINX重定向。\n\n\u003c!--more--\u003e\n\nNGINX安装及配置请移步这里：[Nginx安装](/2018-06-23-nginx.html \"NGINX安装\")\n\n\n## 使用rewrite\n\n```\nserver {\n#...\n\trewrite (.*)$ https://wycode.cn$1 permanent;\n#...\n}\n```\n这里将这个server的所有请求，永久定向到 https://wycode.cn 上，并将请求的path拼接在后面\n\n## 使用return 301\n\n```\nserver {\n\tlisten 443 ssl;\n    listen [::]:443 ssl;\n\n    ssl_certificate /etc/nginx/cert/wycode.pem;\n    ssl_certificate_key /etc/nginx/cert/wycode.key;\n\n    server_name wycode.cn www.wycode.cn;\n\n    error_page 404 = https://wycode.cn/404.html;\n\n    location / {\n        root /var/www/wycode.cn;\n        index index.html;\n        try_files $uri $uri/ =404;\n    }\n}\nserver {\n    listen 80;\n    listen [::]:80;\n    server_name wycode.cn www.wycode.cn;\n    return 301 https://$host$request_uri;\n}\n```\n\n这里的第二个`server`监听80端口，在下面的`return 301`语句中将请求转发到第一个`server`中去，并且`host`和`request_uri`不变。\n\n以上，转载请注明出处!","data":{"title":"NGINX配置重定向","date":"2019-05-17","tags":["Linux","NGINX"],"category":"Linux"},"isEmpty":false,"excerpt":"\n![NGINX](https://nginx.org/nginx.png)\n\n\u003e 服务器配置Https之后，我们希望同时支持http，但是80端口进来的请求直接重定向到443端口上。\n\n\u003e 有时我们会将某些网页永久迁移到别的地址，但是又不想让老用户直接无法访问，或者看到404，而是要将这些老地址的请求转发到新地址上。\n\n这篇文章教你如何配置NGINX重定向。\n\n"},{"id":"nginx","file":"nginx.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://nginx.org/nginx.png\" alt=\"NGINX\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当我们需要在Ubuntu上部署SpringBoot服务时，通常正式环境需要将监听端口切换到80端口，或443端口，但是Ubuntu为了安全起见，普通用户是不能监听1024以下端口的。另外我们需要同时支持HTTP和HTTPS，貌似SpringBoot只支持监听1个端口，这时有很多解决方案。比如使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esudo\u003c/code\u003e提升运行权限，也可以通过Linux防火墙iptables配置端口转发，把80端口转发到8080端口上等方式。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e但是...这都不是最优的解决方案，既然用到了端口转发，不如直接安装一个NGINX服务器，做反向代理，同时也能提供静态服务能力，未来还能简单地配置升级到集群，做负载均衡。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eNGINX是一款高性能Web服务器。配置简单，易扩展，并发能力强，可用于Web服务器，反向代理，负载均衡，邮件等。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://nginx.org/nginx.png\" alt=\"NGINX\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当我们需要在Ubuntu上部署SpringBoot服务时，通常正式环境需要将监听端口切换到80端口，或443端口，但是Ubuntu为了安全起见，普通用户是不能监听1024以下端口的。另外我们需要同时支持HTTP和HTTPS，貌似SpringBoot只支持监听1个端口，这时有很多解决方案。比如使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esudo\u003c/code\u003e提升运行权限，也可以通过Linux防火墙iptables配置端口转发，把80端口转发到8080端口上等方式。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e但是...这都不是最优的解决方案，既然用到了端口转发，不如直接安装一个NGINX服务器，做反向代理，同时也能提供静态服务能力，未来还能简单地配置升级到集群，做负载均衡。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eNGINX是一款高性能Web服务器。配置简单，易扩展，并发能力强，可用于Web服务器，反向代理，负载均衡，邮件等。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e安装NGINX\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$sudo apt install nginx\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e使用这一行命令，其实就可以了。\n这时直接访问我们的服务器ip，能看到NGINX的欢迎页面，就说明安装成功。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e配置nginx\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/etc/nginx/\u003c/code\u003e目录下有这么几个重要文件\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003enginx.conf 是NGINX的配置文件，里面有一些基本配置，网上很多教程是直接修改这个文件配置服务什么的，看这个文件结构include了conf.d目录的所有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.conf\u003c/code\u003e文件，我们自定义的配置应该写在conf.d目录中\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003esite-enabled 是当前启用的服务配置文件，里面有个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edefault\u003c/code\u003e链接到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esite-available\u003c/code\u003e目录里。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003esite-available 是备选的服务器配置文件\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e从注释和目录结构，我们可以看到其良苦用心，不应该直接修改nginx.conf文件，而是将需要添加的服务器配置文件放到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esite-available\u003c/code\u003e目录中。然后在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esite-enabled\u003c/code\u003e目录创建要启用服务的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esymbolic link\u003c/code\u003e到刚刚创建的配置文件。这样配置才能更方便，更具扩展性。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e示例\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e我这里配置了\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e静态网站服务：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eserver {\n\tlisten 80;\n\tlisten [::]:80;\n\n\tserver_name wycode.cn www.wycode.cn;\n\n\troot /var/www/wycode.cn;\n\tindex index.html;\n\n\tlocation / {\n\t\ttry_files $uri $uri/ =404;\n\t}\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003eSpringBoot 后台api反向代理\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eserver {\n\tlisten 80;\n\tlisten [::]:80;\n\n\tserver_name wycode.cn www.wycode.cn;\n\n\tlocation /api {\n\t\tproxy_pass http://127.0.0.1:8080/api/;\n\t\tproxy_set_header   Host             $host;\n\t\tproxy_set_header   X-Real-IP        $remote_addr;\n\t\tproxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;\n\t}\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请联系作者!\u003c/p\u003e\n","content":"\n![NGINX](https://nginx.org/nginx.png)\n\n当我们需要在Ubuntu上部署SpringBoot服务时，通常正式环境需要将监听端口切换到80端口，或443端口，但是Ubuntu为了安全起见，普通用户是不能监听1024以下端口的。另外我们需要同时支持HTTP和HTTPS，貌似SpringBoot只支持监听1个端口，这时有很多解决方案。比如使用`sudo`提升运行权限，也可以通过Linux防火墙iptables配置端口转发，把80端口转发到8080端口上等方式。\n\n但是...这都不是最优的解决方案，既然用到了端口转发，不如直接安装一个NGINX服务器，做反向代理，同时也能提供静态服务能力，未来还能简单地配置升级到集群，做负载均衡。\n\n\u003e NGINX是一款高性能Web服务器。配置简单，易扩展，并发能力强，可用于Web服务器，反向代理，负载均衡，邮件等。\n\n\u003c!--more--\u003e\n\n## 安装NGINX\n\n```bash\n$sudo apt install nginx\n```\n\n使用这一行命令，其实就可以了。\n这时直接访问我们的服务器ip，能看到NGINX的欢迎页面，就说明安装成功。\n\n\n## 配置nginx\n\n`/etc/nginx/`目录下有这么几个重要文件\n\n- nginx.conf 是NGINX的配置文件，里面有一些基本配置，网上很多教程是直接修改这个文件配置服务什么的，看这个文件结构include了conf.d目录的所有`.conf`文件，我们自定义的配置应该写在conf.d目录中\n\n- site-enabled 是当前启用的服务配置文件，里面有个`default`链接到`site-available`目录里。\n\n- site-available 是备选的服务器配置文件\n\n从注释和目录结构，我们可以看到其良苦用心，不应该直接修改nginx.conf文件，而是将需要添加的服务器配置文件放到`site-available`目录中。然后在`site-enabled`目录创建要启用服务的`symbolic link`到刚刚创建的配置文件。这样配置才能更方便，更具扩展性。\n\n## 示例\n\n我这里配置了\n\n静态网站服务：\n\n```\nserver {\n\tlisten 80;\n\tlisten [::]:80;\n\n\tserver_name wycode.cn www.wycode.cn;\n\n\troot /var/www/wycode.cn;\n\tindex index.html;\n\n\tlocation / {\n\t\ttry_files $uri $uri/ =404;\n\t}\n}\n```\nSpringBoot 后台api反向代理\n\n\n```\nserver {\n\tlisten 80;\n\tlisten [::]:80;\n\n\tserver_name wycode.cn www.wycode.cn;\n\n\tlocation /api {\n\t\tproxy_pass http://127.0.0.1:8080/api/;\n\t\tproxy_set_header   Host             $host;\n\t\tproxy_set_header   X-Real-IP        $remote_addr;\n\t\tproxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;\n\t}\n}\n```\n\n\n以上，转载请联系作者!","data":{"title":"Ubuntu16.04安装配置NGINX服务","date":"2018-06-23","tags":["Linux","NGINX"],"category":"Linux"},"isEmpty":false,"excerpt":"\n![NGINX](https://nginx.org/nginx.png)\n\n当我们需要在Ubuntu上部署SpringBoot服务时，通常正式环境需要将监听端口切换到80端口，或443端口，但是Ubuntu为了安全起见，普通用户是不能监听1024以下端口的。另外我们需要同时支持HTTP和HTTPS，貌似SpringBoot只支持监听1个端口，这时有很多解决方案。比如使用`sudo`提升运行权限，也可以通过Linux防火墙iptables配置端口转发，把80端口转发到8080端口上等方式。\n\n但是...这都不是最优的解决方案，既然用到了端口转发，不如直接安装一个NGINX服务器，做反向代理，同时也能提供静态服务能力，未来还能简单地配置升级到集群，做负载均衡。\n\n\u003e NGINX是一款高性能Web服务器。配置简单，易扩展，并发能力强，可用于Web服务器，反向代理，负载均衡，邮件等。\n\n"}],"cid":"nginx"},"__N_SSG":true},"page":"/blog/tag/[cid]","query":{"cid":"nginx"},"buildId":"7YMuoTtyITfiinBiv1T76","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
