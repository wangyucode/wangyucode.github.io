/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003exhdpi\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e320\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e2.0\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e200 x 200\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003ehdpi\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e240\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1.5\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e150 x 150\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003emdpi\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e160\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1.0\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e100 x 100\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eScaleable pixels (sp)\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003esp和dp差不多只是用于字体\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e14sp为标准大小\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170904_sp.png\" alt=\"sp\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ctable class=\"mb-4\"\u003e\n\u003cthead class=\"bg-sky-200 dark:bg-sky-900\"\u003e\n\u003ctr\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003exx_small\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003ex_small\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003esmall\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003emedium\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003elarge\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003ex_large\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003exx_large\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003exxx_large\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e8sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e10sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e12sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e14sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e16sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e18sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e20sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e22sp\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e基准网络\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e所有组件都与间隔为 8dp 的基准网格对齐。排版/文字（Type）与间隔为 4dp 的基准网格对齐。在工具条中的图标同样与间隔为 4dp 的基准网格对齐。这些规则适用于移动设备、平板设备以及桌面应用程序。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170905_layout-metrics-baselinegrids.png\" alt=\"baselinegrids\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","content":"\n![Android](https://ts1.cn.mm.bing.net/th/id/R-C.7cb65108f9538f876d1e6e6409983bd1?rik=LMm7A%2fLgPkQDLA\u0026riu=http%3a%2f%2flogoju.cn%2fwp-content%2fuploads%2f2019%2f08%2fAndroid1.png\u0026ehk=ON%2fcvarPr2AWztVNbv7o6Y92N%2fiAIMjQtIIBEIGAhtE%3d\u0026risl=\u0026pid=ImgRaw\u0026r=0)\n\n\u003e 有关dpi、dp、px、sp、设计规范等等。\n\n\u003c!--more--\u003e\n## Pixel density (dpi)\n\n像素密度，表示每英寸的长度上有多少像素\n\n`dpi = sqrt(像素宽度^2+像素高度^2)/屏幕尺寸`\n\n以下是常见手机的dpi\n\n|  屏幕尺寸 | 720*1280  | 1080*1920  |  1440*2560 |\n| :------------: | :------------: | :------------: | :------------: |\n| 5寸  | 293.7  |  440.6 |  587.4|\n| 5.5寸  | 267.0  | 400.5  |  534.0 |\n| 6寸 | 244.8  |  367.2 |  489.5 |\n\n## Density-independent pixels (dp)\n\n引入dpi的概念就是为了使用像素无关的单位`dp`，从而使不同分辨率和尺寸的手机上达到一样的观感\n\n`dp = 像素*160/dpi`\n\n160dpi的手机上，1px=1dp\n\n### 图片缩放\n\n|Screen resolution |dpi|Pixel ratio|Image size (pixels)|\n| :------------: | :------------: |:------------: | :------------:|\n|xxxhdpi|640|4.0|400 x 400|\n|xxhdpi|480|3.0|300 x 300|\n|xhdpi|320|2.0|200 x 200|\n|hdpi|240|1.5|150 x 150|\n|mdpi|160|1.0|100 x 100|\n\n## Scaleable pixels (sp)\n\nsp和dp差不多只是用于字体\n\n14sp为标准大小\n\n![sp](/images/20170904_sp.png)\n\n|xx_small |x_small|small|medium|large|x_large|xx_large|xxx_large|\n| :------------: | :------------:| :------------:| :------------:|:------------:|:------------:|:------------:|:------------:|\n|8sp|10sp|12sp|14sp|16sp|18sp|20sp|22sp|\n\n## 基准网络\n\n所有组件都与间隔为 8dp 的基准网格对齐。排版/文字（Type）与间隔为 4dp 的基准网格对齐。在工具条中的图标同样与间隔为 4dp 的基准网格对齐。这些规则适用于移动设备、平板设备以及桌面应用程序。\n\n![baselinegrids](/images/20170905_layout-metrics-baselinegrids.png)\n","data":{"title":"Android度量设计规范","date":"2017-09-04","tags":["Android","Material Design"],"category":"Android"},"isEmpty":false,"excerpt":"\n![Android](https://ts1.cn.mm.bing.net/th/id/R-C.7cb65108f9538f876d1e6e6409983bd1?rik=LMm7A%2fLgPkQDLA\u0026riu=http%3a%2f%2flogoju.cn%2fwp-content%2fuploads%2f2019%2f08%2fAndroid1.png\u0026ehk=ON%2fcvarPr2AWztVNbv7o6Y92N%2fiAIMjQtIIBEIGAhtE%3d\u0026risl=\u0026pid=ImgRaw\u0026r=0)\n\n\u003e 有关dpi、dp、px、sp、设计规范等等。\n\n"},{"id":"gradle-build","file":"gradle-build.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://ts1.cn.mm.bing.net/th/id/R-C.da7d3edf2afaf378bff91a21e6385091?rik=kWTVUo%2be2O8bbg\u0026#x26;riu=http%3a%2f%2ftheeye.pe.kr%2fwp-content%2fuploads%2f2014%2f02%2fgradle.png\u0026#x26;ehk=5NJHqrr5W7rLhp4CEUQIadjJ83TfKvlokTsc%2bzFFiLo%3d\u0026#x26;risl=\u0026#x26;pid=ImgRaw\u0026#x26;r=0\" alt=\"Gradle\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e构建变体是 Gradle 按照特定规则集合进行打包，以生成适应不同需求的Apk包。\n例如，需要生成dev版，测试版、以及release版，它们的服务器地址，版本号，图标各不相同，以及多渠道打包等等。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://ts1.cn.mm.bing.net/th/id/R-C.da7d3edf2afaf378bff91a21e6385091?rik=kWTVUo%2be2O8bbg\u0026#x26;riu=http%3a%2f%2ftheeye.pe.kr%2fwp-content%2fuploads%2f2014%2f02%2fgradle.png\u0026#x26;ehk=5NJHqrr5W7rLhp4CEUQIadjJ83TfKvlokTsc%2bzFFiLo%3d\u0026#x26;risl=\u0026#x26;pid=ImgRaw\u0026#x26;r=0\" alt=\"Gradle\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e构建变体是 Gradle 按照特定规则集合进行打包，以生成适应不同需求的Apk包。\n例如，需要生成dev版，测试版、以及release版，它们的服务器地址，版本号，图标各不相同，以及多渠道打包等等。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eproductFlavors\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e可以定义多个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eproductFlavors\u003c/code\u003e版本，其继承覆盖所有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edefaultConfig\u003c/code\u003e中的字段\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e主要的使用手段有一下几种\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e覆盖\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edefaultConfig\u003c/code\u003e默认字段(包名、版本名等)\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e往\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAndroidManifast.xml\u003c/code\u003e文件注入编译变量\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e修改包名，支持前后缀\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ebuildConfigField\u003c/code\u003e动态改变编译时常量\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eresValue\u003c/code\u003e动态注入字符串资源\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e示例\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eandroid {\n    ...\n    defaultConfig {\n        versionCode 200\n        versionName 'V2.0.0'\n        manifestPlaceholders = [\n                scheme: \"FindAR\"\n                id    : \"1565483848\"\n        ]\n        buildConfigField \"String\", \"ROOT_FOLDER_NAME\", '\"FindAR\"'\n    }\n\n    productFlavors{\n       dev{\n           versionName 'V2.0.0 Dev'\n           resValue \"string\", \"user_id\", \"001\" //user id\n       }\n\n       production{\n           versionName 'V2.0.0 Release'\n           resValue \"string\", \"user_id\", \"002\" //user id\n       }\n   }\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![Gradle](https://ts1.cn.mm.bing.net/th/id/R-C.da7d3edf2afaf378bff91a21e6385091?rik=kWTVUo%2be2O8bbg\u0026riu=http%3a%2f%2ftheeye.pe.kr%2fwp-content%2fuploads%2f2014%2f02%2fgradle.png\u0026ehk=5NJHqrr5W7rLhp4CEUQIadjJ83TfKvlokTsc%2bzFFiLo%3d\u0026risl=\u0026pid=ImgRaw\u0026r=0)\n\n\u003e 构建变体是 Gradle 按照特定规则集合进行打包，以生成适应不同需求的Apk包。\n例如，需要生成dev版，测试版、以及release版，它们的服务器地址，版本号，图标各不相同，以及多渠道打包等等。\n\n\u003c!--more--\u003e\n## productFlavors\n\n可以定义多个`productFlavors`版本，其继承覆盖所有`defaultConfig`中的字段\n\n主要的使用手段有一下几种\n\n- 覆盖`defaultConfig`默认字段(包名、版本名等)\n- 往`AndroidManifast.xml`文件注入编译变量\n- 修改包名，支持前后缀\n- 使用`buildConfigField`动态改变编译时常量\n- 使用`resValue`动态注入字符串资源\n\n\n## 示例\n```\nandroid {\n    ...\n    defaultConfig {\n        versionCode 200\n        versionName 'V2.0.0'\n        manifestPlaceholders = [\n                scheme: \"FindAR\"\n                id    : \"1565483848\"\n        ]\n        buildConfigField \"String\", \"ROOT_FOLDER_NAME\", '\"FindAR\"'\n    }\n\n    productFlavors{\n       dev{\n           versionName 'V2.0.0 Dev'\n           resValue \"string\", \"user_id\", \"001\" //user id\n       }\n\n       production{\n           versionName 'V2.0.0 Release'\n           resValue \"string\", \"user_id\", \"002\" //user id\n       }\n   }\n}\n```\n","data":{"title":"Gradle构建变种版本（多渠道打包）","date":"2017-09-04","tags":["Gradle","Android"],"category":"Android"},"isEmpty":false,"excerpt":"\n![Gradle](https://ts1.cn.mm.bing.net/th/id/R-C.da7d3edf2afaf378bff91a21e6385091?rik=kWTVUo%2be2O8bbg\u0026riu=http%3a%2f%2ftheeye.pe.kr%2fwp-content%2fuploads%2f2014%2f02%2fgradle.png\u0026ehk=5NJHqrr5W7rLhp4CEUQIadjJ83TfKvlokTsc%2bzFFiLo%3d\u0026risl=\u0026pid=ImgRaw\u0026r=0)\n\n\u003e 构建变体是 Gradle 按照特定规则集合进行打包，以生成适应不同需求的Apk包。\n例如，需要生成dev版，测试版、以及release版，它们的服务器地址，版本号，图标各不相同，以及多渠道打包等等。\n\n"},{"id":"unity2android","file":"unity2android.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://tse1-mm.cn.bing.net/th/id/OIP-C.TPnSpv0PowWa1j_0SdXeWQHaEM?pid=ImgDet\u0026#x26;rs=1\" alt=\"Unity\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e在某些情况下，我们需要使用原生代码来做一些事，比如集成一些第三方原生SDK，\n以下这种方式介绍了如何将Unity导出成Android Studio工程，从而添加Android代码。\n之后的教程中我还将介绍如何将Android写好的代码导回到Unity工程中。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://tse1-mm.cn.bing.net/th/id/OIP-C.TPnSpv0PowWa1j_0SdXeWQHaEM?pid=ImgDet\u0026#x26;rs=1\" alt=\"Unity\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e在某些情况下，我们需要使用原生代码来做一些事，比如集成一些第三方原生SDK，\n以下这种方式介绍了如何将Unity导出成Android Studio工程，从而添加Android代码。\n之后的教程中我还将介绍如何将Android写好的代码导回到Unity工程中。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eUnity工程导出为Android工程\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e在Unity菜单中选择：File——Build Settings\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e为了能在Android Studio中更好的运行，构建系统选择Gradle\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e选中Export Project选项\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e选择你喜欢的目录导出\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eUnity发生了改动时，只需导出后替换asset文件夹内容即可\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170726_export.png\" alt=\"Export\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eUnity调用Android方法\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-csharp px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eprivate void sendMessageToAndroid(string method,params object[] args)\n    {\n        AndroidJavaClass jc = new AndroidJavaClass(\"com.unity3d.player.UnityPlayer\");\n        AndroidJavaObject jo = jc.GetStatic\u0026#x3C;AndroidJavaObject\u003e(\"currentActivity\");\n        jo.Call(method, args);\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e在UnityPlayerActivity中准备好Unity要调用的方法\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e调用上面的方法，传入方法名（不带括号），及参数（多参，也可不传）即可。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eAndroid调用Unity方法\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eUnityPlayer.UnitySendMessage(\"GameObject\", \"message\", \"args\");\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e相当于调用了Unity中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esendMessage()\u003c/code\u003e。\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n![Unity](https://tse1-mm.cn.bing.net/th/id/OIP-C.TPnSpv0PowWa1j_0SdXeWQHaEM?pid=ImgDet\u0026rs=1)\n\n\u003e 在某些情况下，我们需要使用原生代码来做一些事，比如集成一些第三方原生SDK，\n以下这种方式介绍了如何将Unity导出成Android Studio工程，从而添加Android代码。\n之后的教程中我还将介绍如何将Android写好的代码导回到Unity工程中。\n\n\u003c!--more--\u003e\n\n## Unity工程导出为Android工程\n\n1. 在Unity菜单中选择：File——Build Settings\n2. 为了能在Android Studio中更好的运行，构建系统选择Gradle\n3. 选中Export Project选项\n4. 选择你喜欢的目录导出\n5. Unity发生了改动时，只需导出后替换asset文件夹内容即可\n\n![Export](/images/20170726_export.png)\n\n## Unity调用Android方法\n\n```csharp\nprivate void sendMessageToAndroid(string method,params object[] args)\n    {\n        AndroidJavaClass jc = new AndroidJavaClass(\"com.unity3d.player.UnityPlayer\");\n        AndroidJavaObject jo = jc.GetStatic\u003cAndroidJavaObject\u003e(\"currentActivity\");\n        jo.Call(method, args);\n    }\n```\n\n- 在UnityPlayerActivity中准备好Unity要调用的方法\n- 调用上面的方法，传入方法名（不带括号），及参数（多参，也可不传）即可。\n\n## Android调用Unity方法\n\n```java\nUnityPlayer.UnitySendMessage(\"GameObject\", \"message\", \"args\");\n```\n\n- 相当于调用了Unity中的`sendMessage()`。","data":{"title":"在Unity中使用Android原生代码","date":"2017-07-26","tags":["Android","Unity"],"category":"Unity"},"isEmpty":false,"excerpt":"\n![Unity](https://tse1-mm.cn.bing.net/th/id/OIP-C.TPnSpv0PowWa1j_0SdXeWQHaEM?pid=ImgDet\u0026rs=1)\n\n\u003e 在某些情况下，我们需要使用原生代码来做一些事，比如集成一些第三方原生SDK，\n以下这种方式介绍了如何将Unity导出成Android Studio工程，从而添加Android代码。\n之后的教程中我还将介绍如何将Android写好的代码导回到Unity工程中。\n\n"},{"id":"wave-progress","file":"wave-progress.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天碰到个需求，要求以波浪进度填充自定义透明形状，废话不多说，直接上最终效果图\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170724_wave_progress.gif\" alt=\"波浪效果\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天碰到个需求，要求以波浪进度填充自定义透明形状，废话不多说，直接上最终效果图\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170724_wave_progress.gif\" alt=\"波浪效果\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e思路\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通过判断\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBitmap\u003c/code\u003e对象的像素颜色，对非透明像素进行颜色更改。波浪曲线采用sin曲线π到2π区间段，和将时间取余并和x坐标相加得到波浪y轴坐标，再加上百分比*Bitmap高度。核心算法如下:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170724_sin.png\" alt=\"sin\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e    private int getWaveY(int x) {\n        double sinX = Math.PI + (((((System.currentTimeMillis() / (1000 / waveSpeed)) + x) % waveLength)) / (double) waveLength * Math.PI);\n        int waveHeight = (int) (waveHeightMax * (Math.sin(sinX) + 1));\n        int y = (int) ((100 - progress) / 100f * bitmap.getHeight());\n        y -= waveHeight;\n        return y;\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewaveSpeed\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewaveLength\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewaveHeightMax\u003c/code\u003e均定义成全局变量，可以很方便的定制波浪移动速度、波浪长度、波浪高度。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用SurfaceView\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e为了达到比较好的性能，使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSurfaceView\u003c/code\u003e在子线程绘图。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e性能优化\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e因为这里涉及逐个像素操作，所以遍历的运算量很大，一定要对遍历的量进行控制，否则会很卡。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我这里采用控制图片大小的方式\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e***\n    bitmap = setBitmapSize(bitmap, calculateSize * bitmap.getWidth() / bitmap.getHeight(), calculateSize);\n\n***\n    /**\n     * 缩放图片\n     *\n     * @param bitmap    原图片\n     * @param newWidth\n     * @param newHeight\n     * @return\n     */\n    private Bitmap setBitmapSize(Bitmap bitmap, int newWidth, int newHeight) {\n        int width = bitmap.getWidth();\n        int height = bitmap.getHeight();\n        float scaleWidth = (newWidth * 1.0f) / width;\n        float scaleHeight = (newHeight * 1.0f) / height;\n        Matrix matrix = new Matrix();\n        matrix.postScale(scaleWidth, scaleHeight);\n        return Bitmap.createBitmap(bitmap, 0, 0, width, height, matrix, true);\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecalculateSize\u003c/code\u003e控制循环次数在有限的范围内，并在最终绘制Bitmap时使用区域绘制函数：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e    private void draw() {\n        Canvas canvas = mHolder.lockCanvas();\n        canvas.drawBitmap(bitmap, rectBitmap, rectCanvas, mPaint);\n        mHolder.unlockCanvasAndPost(canvas);\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e注意事项\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e为了达到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSurfaceView\u003c/code\u003e透明效果，需要加入以下两句代码\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003esetZOrderOnTop(true);\nmHolder.setFormat(TRANSLUCENT);\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e从\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDrawable\u003c/code\u003e中得到的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBitmap\u003c/code\u003e不能直接\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esetPixel()\u003c/code\u003e，必须重新\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBitmap.createBitmap()\u003c/code\u003e，或\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBitmap.copy()\u003c/code\u003e，使得\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eisMutable\u003c/code\u003e属性为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etrue\u003c/code\u003e，得到新的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBitmap\u003c/code\u003e对象才能操作像素，否则会报\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIllegalStateException\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e完整源码:\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ca href=\"https://github.com/wangyucode/WaveProgress\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/WaveProgress\u003c/a\u003e\u003c/p\u003e\n","content":"\n\u003e 今天碰到个需求，要求以波浪进度填充自定义透明形状，废话不多说，直接上最终效果图\n\n![波浪效果](/images/20170724_wave_progress.gif)\n\n\u003c!--more--\u003e\n\n## 思路\n\n通过判断`Bitmap`对象的像素颜色，对非透明像素进行颜色更改。波浪曲线采用sin曲线π到2π区间段，和将时间取余并和x坐标相加得到波浪y轴坐标，再加上百分比*Bitmap高度。核心算法如下:\n\n![sin](/images/20170724_sin.png)\n\n```java\n    private int getWaveY(int x) {\n        double sinX = Math.PI + (((((System.currentTimeMillis() / (1000 / waveSpeed)) + x) % waveLength)) / (double) waveLength * Math.PI);\n        int waveHeight = (int) (waveHeightMax * (Math.sin(sinX) + 1));\n        int y = (int) ((100 - progress) / 100f * bitmap.getHeight());\n        y -= waveHeight;\n        return y;\n    }\n```\n这里的`waveSpeed`、`waveLength`、`waveHeightMax`均定义成全局变量，可以很方便的定制波浪移动速度、波浪长度、波浪高度。\n\n\n## 使用SurfaceView\n\n为了达到比较好的性能，使用`SurfaceView`在子线程绘图。\n\n## 性能优化\n\n因为这里涉及逐个像素操作，所以遍历的运算量很大，一定要对遍历的量进行控制，否则会很卡。\n\n我这里采用控制图片大小的方式\n```java\n***\n    bitmap = setBitmapSize(bitmap, calculateSize * bitmap.getWidth() / bitmap.getHeight(), calculateSize);\n\n***\n    /**\n     * 缩放图片\n     *\n     * @param bitmap    原图片\n     * @param newWidth\n     * @param newHeight\n     * @return\n     */\n    private Bitmap setBitmapSize(Bitmap bitmap, int newWidth, int newHeight) {\n        int width = bitmap.getWidth();\n        int height = bitmap.getHeight();\n        float scaleWidth = (newWidth * 1.0f) / width;\n        float scaleHeight = (newHeight * 1.0f) / height;\n        Matrix matrix = new Matrix();\n        matrix.postScale(scaleWidth, scaleHeight);\n        return Bitmap.createBitmap(bitmap, 0, 0, width, height, matrix, true);\n    }\n```\n\n\n通过`calculateSize`控制循环次数在有限的范围内，并在最终绘制Bitmap时使用区域绘制函数：\n\n```java\n    private void draw() {\n        Canvas canvas = mHolder.lockCanvas();\n        canvas.drawBitmap(bitmap, rectBitmap, rectCanvas, mPaint);\n        mHolder.unlockCanvasAndPost(canvas);\n    }\n```\n\n## 注意事项\n\n- 为了达到`SurfaceView`透明效果，需要加入以下两句代码\n```java\nsetZOrderOnTop(true);\nmHolder.setFormat(TRANSLUCENT);\n```\n\n- 从`Drawable`中得到的`Bitmap`不能直接`setPixel()`，必须重新`Bitmap.createBitmap()`，或`Bitmap.copy()`，使得`isMutable`属性为`true`，得到新的`Bitmap`对象才能操作像素，否则会报`IllegalStateException`\n\n\n## 完整源码:\n\n[https://github.com/wangyucode/WaveProgress](https://github.com/wangyucode/WaveProgress)\n","data":{"title":"自定义形状波浪进度","date":"2017-07-24","tags":["Android"],"category":"Android"},"isEmpty":false,"excerpt":"\n\u003e 今天碰到个需求，要求以波浪进度填充自定义透明形状，废话不多说，直接上最终效果图\n\n![波浪效果](/images/20170724_wave_progress.gif)\n\n"},{"id":"Share","file":"Share.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何为Android应用添加分享功能。包含通过原生\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIntent\u003c/code\u003e和利用第三方SDK。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何为Android应用添加分享功能。包含通过原生\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIntent\u003c/code\u003e和利用第三方SDK。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e原生Intent方式\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e大多平台都支持隐式Intent方式发起分享。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e创建隐式 Intent 时，Android 系统通过将 Intent 的内容与在设备上其他应用的清单文件中声明的 Intent 过滤器进行比较，从而找到要启动的相应组件。 如果 Intent 与 Intent 过滤器匹配，则系统将启动该组件，并向其传递 Intent 对象。 如果多个 Intent 过滤器兼容，则系统会显示一个对话框，支持用户选取要使用的应用。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eIntent sendIntent = new Intent();\nsendIntent.setAction(Intent.ACTION_SEND);\nsendIntent.putExtra(Intent.EXTRA_TEXT, textMessage);\nsendIntent.setType(\"text/plain\");\nIntent chooser = Intent.createChooser(sendIntent, \"title\");\nif (sendIntent.resolveActivity(getPackageManager()) != null) {\n    startActivity(chooser);\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里Action设置为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIntent.ACTION_SEND\u003c/code\u003e就是分享（发送）的方式。\n然后通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eputExtra()\u003c/code\u003e 方式传递附加信息，可以是文本、图片等。\n为了每次分享时都选择平台，需要为Intent包装一个Chooser。\n然后就可以启动Activity分享了。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e单独集成第三方（微信、微博）SDK\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e不同的平台有所不同，一般都包括以下流程\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e注册开发者账号\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e填写应用信息，获取应用ID，Key等\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e导入相关SDK依赖\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e集成分享代码\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e集成ShareSDK\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e集成ShareSDK的好处是，提供了统一的接口，抹平了不同平台间API的差异，集成更简单，维护也方便。特别是当你需要集成很多平台的时候。\n但是上面单独集成的前两步还是不可缺少。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e集成微信分享的一些注意事项\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e有时会遇到错误\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e{\"req\":\"e\",\"errCode\":-6,\"transaction\":\"webpage1498805832655\"}\u003c/code\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e微信分享需要经过签名才可以\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e微信Android应用信息的签名那一栏需要填入签名的\u003cstrong\u003eMD5\u003c/strong\u003e值，通过以下命令获取\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003ekeytool -list -v -keystore \u0026#x3C;你的keystore路径\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ekeytool\u003c/code\u003e 是jdk的自带一个命令，类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ejavac\u003c/code\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e签名的\u003cstrong\u003eMD5\u003c/strong\u003e值必须全部小写，并去掉冒号\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e可以在gradle文件中配置以下属性，让开发版本也使用正式签名\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eandroid {\n    ***\n    signingConfigs {\n        debug{\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"keyPassword\"\n        }\n        release {\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"你的keyPassword\"\n        }\n    }\n    ***\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e有时会遇到错误\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003echeckArgs fail, thumbData is invalid\u003c/code\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e图片太大，可以获取缩略图\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eBitmap bmp = BitmapFactory.decodeResource(getResources(),R.drawable.app_icon);\nBitmap thumb = Bitmap.createScaledBitmap(bmp,THUMB_SIZE,THUMB_SIZE,true);\nbmp.recycle();\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e 本文介绍如何为Android应用添加分享功能。包含通过原生`Intent`和利用第三方SDK。\n\n\u003c!--more--\u003e\n## 原生Intent方式\n\n大多平台都支持隐式Intent方式发起分享。\n\n\u003e 创建隐式 Intent 时，Android 系统通过将 Intent 的内容与在设备上其他应用的清单文件中声明的 Intent 过滤器进行比较，从而找到要启动的相应组件。 如果 Intent 与 Intent 过滤器匹配，则系统将启动该组件，并向其传递 Intent 对象。 如果多个 Intent 过滤器兼容，则系统会显示一个对话框，支持用户选取要使用的应用。\n\n```java\nIntent sendIntent = new Intent();\nsendIntent.setAction(Intent.ACTION_SEND);\nsendIntent.putExtra(Intent.EXTRA_TEXT, textMessage);\nsendIntent.setType(\"text/plain\");\nIntent chooser = Intent.createChooser(sendIntent, \"title\");\nif (sendIntent.resolveActivity(getPackageManager()) != null) {\n    startActivity(chooser);\n}\n```\n这里Action设置为`Intent.ACTION_SEND`就是分享（发送）的方式。\n然后通过`putExtra()` 方式传递附加信息，可以是文本、图片等。\n为了每次分享时都选择平台，需要为Intent包装一个Chooser。\n然后就可以启动Activity分享了。\n\n## 单独集成第三方（微信、微博）SDK\n\n不同的平台有所不同，一般都包括以下流程\n- 注册开发者账号\n- 填写应用信息，获取应用ID，Key等\n- 导入相关SDK依赖\n- 集成分享代码\n\n## 集成ShareSDK\n\n集成ShareSDK的好处是，提供了统一的接口，抹平了不同平台间API的差异，集成更简单，维护也方便。特别是当你需要集成很多平台的时候。\n但是上面单独集成的前两步还是不可缺少。\n\n## 集成微信分享的一些注意事项\n\n有时会遇到错误`{\"req\":\"e\",\"errCode\":-6,\"transaction\":\"webpage1498805832655\"}`\n- 微信分享需要经过签名才可以\n- 微信Android应用信息的签名那一栏需要填入签名的**MD5**值，通过以下命令获取\n\n```bash\nkeytool -list -v -keystore \u003c你的keystore路径\u003e\n```\n\n\u003e`keytool` 是jdk的自带一个命令，类似`javac`\n\n- 签名的**MD5**值必须全部小写，并去掉冒号\n- 可以在gradle文件中配置以下属性，让开发版本也使用正式签名\n\n```\nandroid {\n    ***\n    signingConfigs {\n        debug{\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"keyPassword\"\n        }\n        release {\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"你的keyPassword\"\n        }\n    }\n    ***\n}\n```\n\n有时会遇到错误`checkArgs fail, thumbData is invalid`\n\n- 图片太大，可以获取缩略图\n```java\nBitmap bmp = BitmapFactory.decodeResource(getResources(),R.drawable.app_icon);\nBitmap thumb = Bitmap.createScaledBitmap(bmp,THUMB_SIZE,THUMB_SIZE,true);\nbmp.recycle();\n```","data":{"title":"Android原生分享及第三方分享","date":"2017-06-16","tags":["Android","Wechat"],"category":"Android"},"isEmpty":false,"excerpt":"\n\u003e 本文介绍如何为Android应用添加分享功能。包含通过原生`Intent`和利用第三方SDK。\n\n"},{"id":"gitignore","file":"gitignore.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://res.cloudinary.com/practicaldev/image/fetch/s--DoWbGaGG--/c_imagga_scale,f_auto,fl_progressive,h_420,q_auto,w_1000/https://dev-to-uploads.s3.amazonaws.com/i/gqvc4folezic8qvkjbca.png\" alt=\"gitignore\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件快速配置自动忽略，教程同时适用于Git和SVN。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://res.cloudinary.com/practicaldev/image/fetch/s--DoWbGaGG--/c_imagga_scale,f_auto,fl_progressive,h_420,q_auto,w_1000/https://dev-to-uploads.s3.amazonaws.com/i/gqvc4folezic8qvkjbca.png\" alt=\"gitignore\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件快速配置自动忽略，教程同时适用于Git和SVN。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e应该忽略的文件：\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e*.iml\n.gradle\n/local.properties\n/.idea\n.DS_Store\n**/build\n/captures\n.externalNativeBuild\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.iml\u003c/code\u003e是IDEA的module描述文件，和工程配置相关，在每一个module都有，需要忽略。*表示忽略所有的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.iml\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e使用gitignore\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e这是最简单的方式\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在项目根目录下创建\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件，将上面应该忽略的文件，内容复制到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e用Android Studio打开\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件时会在右上角弹出安装gitignore插件，点击安装即可，安装完成后就自动设置好忽略了，如果要添加忽略文件，只需要在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e中添加文件路径即可。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e自己设置忽略\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e右键点击相应文件，选择相应VCS操作即可。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003egitignore\u003c/code\u003e的官方模板仓库\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e此外github官方提供了一个仓库，里面包含了绝大多数平台，语言的gitignore模板\n\u003ca href=\"https://github.com/github/gitignore\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/github/gitignore\u003c/a\u003e\u003c/p\u003e\n","content":"\n![gitignore](https://res.cloudinary.com/practicaldev/image/fetch/s--DoWbGaGG--/c_imagga_scale,f_auto,fl_progressive,h_420,q_auto,w_1000/https://dev-to-uploads.s3.amazonaws.com/i/gqvc4folezic8qvkjbca.png)\n\n\u003e 本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用`.gitignore`文件快速配置自动忽略，教程同时适用于Git和SVN。\n\n\u003c!--more--\u003e\n\n## 应该忽略的文件：\n```\n*.iml\n.gradle\n/local.properties\n/.idea\n.DS_Store\n**/build\n/captures\n.externalNativeBuild\n```\n- `.iml`是IDEA的module描述文件，和工程配置相关，在每一个module都有，需要忽略。*表示忽略所有的`.iml`\n\n### 使用gitignore\n这是最简单的方式\n\n在项目根目录下创建`.gitignore`文件，将上面应该忽略的文件，内容复制到`.gitignore`中。\n\n用Android Studio打开`.gitignore`文件时会在右上角弹出安装gitignore插件，点击安装即可，安装完成后就自动设置好忽略了，如果要添加忽略文件，只需要在`.gitignore`中添加文件路径即可。\n\n### 自己设置忽略\n\n右键点击相应文件，选择相应VCS操作即可。\n\n### `gitignore`的官方模板仓库\n\n此外github官方提供了一个仓库，里面包含了绝大多数平台，语言的gitignore模板\nhttps://github.com/github/gitignore","data":{"title":"Android Studio工程应该忽略的文件及如何使用gitignore","date":"2017-06-16","tags":["Android","Git","SVN"],"category":"Android"},"isEmpty":false,"excerpt":"\n![gitignore](https://res.cloudinary.com/practicaldev/image/fetch/s--DoWbGaGG--/c_imagga_scale,f_auto,fl_progressive,h_420,q_auto,w_1000/https://dev-to-uploads.s3.amazonaws.com/i/gqvc4folezic8qvkjbca.png)\n\n\u003e 本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用`.gitignore`文件快速配置自动忽略，教程同时适用于Git和SVN。\n\n"}],"cid":"android"},"__N_SSG":true},"page":"/blog/tag/[cid]","query":{"cid":"android"},"buildId":"NDkQWnMtEcy0IDQqDGEkS","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
