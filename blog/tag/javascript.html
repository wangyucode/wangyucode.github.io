ul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e添加SwaggerUI包\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e从\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSwaggerUI\u003c/code\u003e的github上下载最新版，将里面的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edist\u003c/code\u003e文件夹，放入我们工程的静态页面目录\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e因为我们要修改\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e，所以不能使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewebjars\u003c/code\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e对\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e的常量\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eui\u003c/code\u003e做如下更改\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-JavaScript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e// Build a system\n  const ui = SwaggerUIBundle({\n    url: \"/v2/api-docs\", //API的JSON地址\n    dom_id: '#swagger-ui',\n    deepLinking: true,\n    presets: [\n      SwaggerUIBundle.presets.apis,\n      SwaggerUIStandalonePreset\n    ],\n    plugins: [\n      SwaggerUIBundle.plugins.DownloadUrl\n    ],\n    layout: \"StandaloneLayout\"\n  })\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e大功告成！\u003c/h2\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e添加文档注释\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实体注解\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@ApiModel(value = \"Hello 消息\",description = \"Hello接口返回的消息实体\")\npublic class Hello {\n\n    @ApiModelProperty(\"消息\")\n    private String message;\n\n    ...\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e接口注解\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Api(value = \"Hello\", description = \"第一个api\",tags = \"Hello\")\n@RestController\npublic class HelloController {\n\n    @ApiOperation(value = \"Say Hello\", produces = \"application/json \")\n    @RequestMapping(\"/api/hello\")\n    public Hello hello(@ApiParam(value = \"消息\",defaultValue = \"Hello World!\") @RequestParam(name = \"message\",defaultValue = \"Hello World!\")String message){\n        return  new Hello(\"message is : \"+ message);\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e 本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\n\n\u003c!--more--\u003e\n## 创建SwaggerUI渲染需要的JSON\n- 首先为项目添加生成JSON的库：\n\n```\ndependencies {\n    compile \"io.springfox:springfox-swagger2:2.7.0\"\n}\n```\n- 添加`SwaggerConfig`类\n\n```java\n@Configuration\n@EnableSwagger2\npublic class SwaggerConfig {\n\n    @Bean\n    public Docket generateDocket(){\n        return new Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .paths(paths()) // and by paths\n                .build()\n                .apiInfo(apiInfo());\n    }\n\n\n    //Here is an example where we select any api that matches one of these paths\n    private Predicate\u003cString\u003e paths() {\n        return input -\u003e input.matches(\".api.*\");\n    }\n\n\n    private ApiInfo apiInfo() {\n        return new ApiInfo(\"王郁的API文档\",\n                \"提供App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                new Contact(\"王郁\",\"wycode.cn\",\"wangyu0503@gmail.com\"),\n                \"wycode.cn All Right Reserved\",\n                \"http://wycode.cn\",\n                new ArrayList\u003c\u003e());\n    }\n}\n```\n\n- 访问`http://localhost:8080/v2/api-docs`可以看到JSON即说明配置成功：\n\n```JSON\n{\n    \"swagger\": \"2.0\",\n    \"info\": {\n        \"description\": \"提供App测试及独立APP研发\",\n        \"version\": \"2.0\",\n        \"title\": \"王郁的API文档\",\n        \"termsOfService\": \"http://wycode.cn\",\n        \"contact\": {},\n        \"license\": {}\n    },\n    \"host\": \"localhost:8080\",\n    \"basePath\": \"/\",\n    \"tags\": [],\n    \"paths\": {\n        \"/api/hello\": {\n            \"get\": {},\n            \"head\": {},\n            \"post\": {},\n            \"put\": {},\n            \"delete\": {},\n            \"options\": {},\n            \"patch\": {}\n        }\n    },\n    \"definitions\": {}\n}\n```\n\n- 添加SwaggerUI包\n\n从`SwaggerUI`的github上下载最新版，将里面的`dist`文件夹，放入我们工程的静态页面目录\n\n\u003e 因为我们要修改`index.html`，所以不能使用`webjars`\n\n对`index.html`的常量`ui`做如下更改\n\n```JavaScript\n// Build a system\n  const ui = SwaggerUIBundle({\n    url: \"/v2/api-docs\", //API的JSON地址\n    dom_id: '#swagger-ui',\n    deepLinking: true,\n    presets: [\n      SwaggerUIBundle.presets.apis,\n      SwaggerUIStandalonePreset\n    ],\n    plugins: [\n      SwaggerUIBundle.plugins.DownloadUrl\n    ],\n    layout: \"StandaloneLayout\"\n  })\n```\n\n\n## 大功告成！\n\n## 添加文档注释\n\n- 实体注解\n\n```Java\n@ApiModel(value = \"Hello 消息\",description = \"Hello接口返回的消息实体\")\npublic class Hello {\n\n    @ApiModelProperty(\"消息\")\n    private String message;\n\n    ...\n}\n```\n\n- 接口注解\n\n```java\n@Api(value = \"Hello\", description = \"第一个api\",tags = \"Hello\")\n@RestController\npublic class HelloController {\n\n    @ApiOperation(value = \"Say Hello\", produces = \"application/json \")\n    @RequestMapping(\"/api/hello\")\n    public Hello hello(@ApiParam(value = \"消息\",defaultValue = \"Hello World!\") @RequestParam(name = \"message\",defaultValue = \"Hello World!\")String message){\n        return  new Hello(\"message is : \"+ message);\n    }\n}\n```\n","data":{"title":"使用swagger为Spring REST API生成在线文档","date":"2017-10-23","tags":["Spring","Java","Swagger","JavaScript"],"category":"Backend"},"isEmpty":false,"excerpt":"\n\u003e 本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\n\n"},{"id":"highlight","file":"highlight.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eHexo 默认对于代码高亮的处理过于粗暴，改变了其原有的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;pre\u003e\u0026#x3C;code\u003e\u003c/code\u003e标签形式，而且并没有达到良好的效果，所以尝试自己添加语法高亮功能。此文档也适用于其它HTML文档中代码的语法高亮显示。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003e我这里使用highlight.js进行添加语法高亮\u003c/strong\u003e\u003c/p\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eHexo 默认对于代码高亮的处理过于粗暴，改变了其原有的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;pre\u003e\u0026#x3C;code\u003e\u003c/code\u003e标签形式，而且并没有达到良好的效果，所以尝试自己添加语法高亮功能。此文档也适用于其它HTML文档中代码的语法高亮显示。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003e我这里使用highlight.js进行添加语法高亮\u003c/strong\u003e\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003ehighlight.js优势：\u003c/h3\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e176 languages and 79 styles\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eautomatic language detection\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003emulti-language code highlighting\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eavailable for node.js\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eworks with any markup\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003ecompatible with any js framework\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e下面开始集成\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e添加引用：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;link rel=\"stylesheet\" href=\"/path/to/styles/monokai-sublime.css\"\u003e\n\u0026#x3C;script src=\"/path/to/highlight.pack.js\"\u003e\u0026#x3C;/script\u003e\n\u0026#x3C;script\u003ehljs.initHighlightingOnLoad();\u0026#x3C;/script\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e以上第一行是风格样式，我这里使用了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emonokai-sublime\u003c/code\u003e样式；\n第二行是highlight的JS库；\n第三行在文档加载时自动检测\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;pre\u003e\u0026#x3C;code\u003e\u003c/code\u003e标签进行格式化。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003ehighlight.js\u003c/strong\u003e虽然支持100多种语言，但默认并不包含所有，在下载页提供了语言选择，建议自己选择下载，毕竟每个人心目中的热门语言都不同，个人需要在页面中使用的语言也不同。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当然你也可以使用一些静态CDN库进行加速。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我的博客就是使用了这个库，以下是一段Java代码示例：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e/******************************************************************************\n *  Compilation:  javac HelloWorld.java\n *  Execution:    java HelloWorld\n *\n *  Prints \"Hello, World\". By tradition, this is everyone's first program.\n *\n *  % java HelloWorld\n *  Hello, World\n *\n ******************************************************************************/\n\npublic class HelloWorld {\n\n    public static void main(String[] args) {\n        // Prints \"Hello, World\" to the terminal window.\n        System.out.println(\"Hello, World\");\n    }\n\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e Hexo 默认对于代码高亮的处理过于粗暴，改变了其原有的`\u003cpre\u003e\u003ccode\u003e`标签形式，而且并没有达到良好的效果，所以尝试自己添加语法高亮功能。此文档也适用于其它HTML文档中代码的语法高亮显示。\n\n**我这里使用highlight.js进行添加语法高亮**\n\u003c!--more--\u003e\n### highlight.js优势：\n\n- 176 languages and 79 styles\n- automatic language detection\n- multi-language code highlighting\n- available for node.js\n- works with any markup\n- compatible with any js framework\n\n## 下面开始集成\n添加引用：\n```html\n\u003clink rel=\"stylesheet\" href=\"/path/to/styles/monokai-sublime.css\"\u003e\n\u003cscript src=\"/path/to/highlight.pack.js\"\u003e\u003c/script\u003e\n\u003cscript\u003ehljs.initHighlightingOnLoad();\u003c/script\u003e\n```\n以上第一行是风格样式，我这里使用了`monokai-sublime`样式；\n第二行是highlight的JS库；\n第三行在文档加载时自动检测`\u003cpre\u003e\u003ccode\u003e`标签进行格式化。\n\n**highlight.js**虽然支持100多种语言，但默认并不包含所有，在下载页提供了语言选择，建议自己选择下载，毕竟每个人心目中的热门语言都不同，个人需要在页面中使用的语言也不同。\n\n当然你也可以使用一些静态CDN库进行加速。\n\n我的博客就是使用了这个库，以下是一段Java代码示例：\n```java\n/******************************************************************************\n *  Compilation:  javac HelloWorld.java\n *  Execution:    java HelloWorld\n *\n *  Prints \"Hello, World\". By tradition, this is everyone's first program.\n *\n *  % java HelloWorld\n *  Hello, World\n *\n ******************************************************************************/\n\npublic class HelloWorld {\n\n    public static void main(String[] args) {\n        // Prints \"Hello, World\" to the terminal window.\n        System.out.println(\"Hello, World\");\n    }\n\n}\n```\n","data":{"title":"为HTML中的代码添加语法高亮","date":"2017-06-14","tags":["HTML","CSS","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n\u003e Hexo 默认对于代码高亮的处理过于粗暴，改变了其原有的`\u003cpre\u003e\u003ccode\u003e`标签形式，而且并没有达到良好的效果，所以尝试自己添加语法高亮功能。此文档也适用于其它HTML文档中代码的语法高亮显示。\n\n**我这里使用highlight.js进行添加语法高亮**\n"},{"id":"comments","file":"comments.md","excerptHtml":"\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e解决方案\u003c/h2\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e动态自建\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e需要数据库存储，后台接口，以及前端页面等都自己实现。\n\u003cstrong\u003e优点\u003c/strong\u003e：所有技术和数据都在自己手中，可控性强，安全。\n\u003cstrong\u003e缺点\u003c/strong\u003e：细节很多，包括表结构，顶和踩计数、还有评论的评论（盖楼）、排序、敏感词过滤、审核等等。还是挺大的一个系统\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e静态集成第三方\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e目前流行的有以下几种:\n【\u003ca href=\"https://disqus.com/\" title=\"Disqus\" class=\"text-sky-500 hover:text-sky-400\"\u003eDisqus\u003c/a\u003e】：国外的，因为众所周知的原因，可能被墙。\n【多说】：之前很多人在用，不过已经停止服务了，他们的代码开源在\u003ca href=\"https://github.com/duoshuo\" title=\"github.com/duoshuo\" class=\"text-sky-500 hover:text-sky-400\"\u003egithub.com/duoshuo\u003c/a\u003e，有兴趣可以参考。\n【\u003ca href=\"https://changyan.kuaizhan.com/\" title=\"畅言\" class=\"text-sky-500 hover:text-sky-400\"\u003e畅言\u003c/a \u003e\n\u003cp class=\"mb-4\"\u003e然后就可以获取代码集成了：\n\u003cimg src=\"/images/20170609_pinglun_02.jpg\" alt=\"\" class=\"mx-auto max-h-80\"\u003e\n【图2】\n代码如下：\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;div id=\"cloud-tie-wrapper\" class=\"cloud-tie-wrapper\"\u003e\u0026#x3C;/div\u003e\n\u0026#x3C;script src=\"https://img1.cache.netease.com/f2e/tie/yun/sdk/loader.js\"\u003e\u0026#x3C;/script\u003e\n\u0026#x3C;script\u003e\nvar cloudTieConfig = {\n  url: document.location.href,\n  sourceId: \"\",\n  productKey: \"32b5a020f7eb416280e9317a050982ac\",\n  target: \"cloud-tie-wrapper\"\n};\nvar yunManualLoad = true;\nTie.loader(\"aHR0cHM6Ly9hcGkuZ2VudGllLjE2My5jb20vcGMvbGl2ZXNjcmlwdC5odG1s\", true);\n\u0026#x3C;/script\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e云跟帖通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eurl\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esourceId\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eproductKey\u003c/code\u003e这三个参数确定唯一的一个网页，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eproductKey\u003c/code\u003e一定要替换成你自己的；\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e因为我在\u003ca href=\"https://wangyucode.github.io\" title=\"wangyucode.github.io\" class=\"text-sky-500 hover:text-sky-400\"\u003ewangyucode.github.io\u003c/a\u003e和\u003ca href=\"http://wycode.cn\" title=\"wycode.cn\" class=\"text-sky-500 hover:text-sky-400\"\u003ewycode.cn\u003c/a\u003e都部署了一样的网页，所以我把\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eurl: document.location.href\u003c/code\u003e，替换为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eurl: \"http://wycode.cn/about.html\"\u003c/code\u003e，使github和我自己的服务器上拥有一样的数据。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e后续\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e云跟帖支持数据审核，敏感词过滤等，你可以自主选择显示哪些评论。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e云跟帖支持数据导出，以后要做迁移可以导出数据\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e还支持评论时回推数据到你指定的地址，此功能结合api可以做到产生评论立即推送一条消息到自己的手机，做到消息秒回！\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n## 解决方案\n\n### 动态自建\n需要数据库存储，后台接口，以及前端页面等都自己实现。\n**优点**：所有技术和数据都在自己手中，可控性强，安全。\n**缺点**：细节很多，包括表结构，顶和踩计数、还有评论的评论（盖楼）、排序、敏感词过滤、审核等等。还是挺大的一个系统\n\n### 静态集成第三方\n目前流行的有以下几种:\n【[Disqus](https://disqus.com/ \"Disqus\")】：国外的，因为众所周知的原因，可能被墙。\n【多说】：之前很多人在用，不过已经停止服务了，他们的代码开源在[github.com/duoshuo](https://github.com/duoshuo \"github.com/duoshuo\")，有兴趣可以参考。\n【[畅言](https://changyan.kuaizhan.com/ \"畅言\")】：搜狐出品。\n【[网易云跟帖](https://gentie.163.com/ \"网易云跟帖\")】：网易出品。\n\n\u003c!--more--\u003e\n\n## 选择\n\n不想耗费太多精力，也不想重复造轮子，所以选择集成网易云跟帖，也是因为一直对网易的产品比较有好感。\n\n## 过程\n\n1.  使用网易账号登陆云跟帖后台；\n\n2.  填写基本信息和相关信息：\n![](/images/20170609_pinglun_01.jpg)\n【图1】\n3.  然后就可以获取代码集成了：\n![](/images/20170609_pinglun_02.jpg)\n【图2】\n 代码如下：\n```html\n\u003cdiv id=\"cloud-tie-wrapper\" class=\"cloud-tie-wrapper\"\u003e\u003c/div\u003e\n\u003cscript src=\"https://img1.cache.netease.com/f2e/tie/yun/sdk/loader.js\"\u003e\u003c/script\u003e\n\u003cscript\u003e\nvar cloudTieConfig = {\n  url: document.location.href,\n  sourceId: \"\",\n  productKey: \"32b5a020f7eb416280e9317a050982ac\",\n  target: \"cloud-tie-wrapper\"\n};\nvar yunManualLoad = true;\nTie.loader(\"aHR0cHM6Ly9hcGkuZ2VudGllLjE2My5jb20vcGMvbGl2ZXNjcmlwdC5odG1s\", true);\n\u003c/script\u003e\n```\n云跟帖通过`url`、`sourceId`、`productKey`这三个参数确定唯一的一个网页，`productKey`一定要替换成你自己的；\n\n因为我在[wangyucode.github.io](https://wangyucode.github.io \"wangyucode.github.io\")和[wycode.cn](http://wycode.cn \"wycode.cn\")都部署了一样的网页，所以我把`url: document.location.href`，替换为`url: \"http://wycode.cn/about.html\"`，使github和我自己的服务器上拥有一样的数据。\n\n## 后续\n- 云跟帖支持数据审核，敏感词过滤等，你可以自主选择显示哪些评论。\n- 云跟帖支持数据导出，以后要做迁移可以导出数据\n- 还支持评论时回推数据到你指定的地址，此功能结合api可以做到产生评论立即推送一条消息到自己的手机，做到消息秒回！\n","data":{"title":"给自己的网站添加评论功能","date":"2017-06-09","tags":["HTML","CSS","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n## 解决方案\n\n### 动态自建\n需要数据库存储，后台接口，以及前端页面等都自己实现。\n**优点**：所有技术和数据都在自己手中，可控性强，安全。\n**缺点**：细节很多，包括表结构，顶和踩计数、还有评论的评论（盖楼）、排序、敏感词过滤、审核等等。还是挺大的一个系统\n\n### 静态集成第三方\n目前流行的有以下几种:\n【[Disqus](https://disqus.com/ \"Disqus\")】：国外的，因为众所周知的原因，可能被墙。\n【多说】：之前很多人在用，不过已经停止服务了，他们的代码开源在[github.com/duoshuo](https://github.com/duoshuo \"github.com/duoshuo\")，有兴趣可以参考。\n【[畅言](https://changyan.kuaizhan.com/ \"畅言\")】：搜狐出品。\n【[网易云跟帖](https://gentie.163.com/ \"网易云跟帖\")】：网易出品。\n\n"}],"cid":"javascript"},"__N_SSG":true},"page":"/blog/tag/[cid]","query":{"cid":"javascript"},"buildId":"KYANdil3ljfaQ9_rbwOmo","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
