<!DOCTYPE html><html lang="zh-CN"><head><meta charSet="utf-8"/><title>王郁的小站</title><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/><meta name="next-head-count" content="3"/><link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml"/><meta name="description" content="欢迎光临王郁的小站"/><meta property="og:image" content="https://og-image.vercel.app/%E7%8E%8B%E9%83%81%E7%9A%84%E5%B0%8F%E7%AB%99.png?theme=light&amp;md=0&amp;fontSize=75px&amp;images=https%3A%2F%2Fassets.vercel.com%2Fimage%2Fupload%2Ffront%2Fassets%2Fdesign%2Fnextjs-black-logo.svg"/><meta name="og:title" content="王郁的小站"/><meta name="twitter:card" content="summary_large_image"/><link rel="preload" href="/_next/static/css/8a367d4b0f561ee4.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/8a367d4b0f561ee4.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-6af0e3c12b874bb0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-467b11a89995b152.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-75bdb96a41ba80f4.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-7a9af0eb34ed0a8f.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/205-2ea451b8c35b24ac.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/889-b501beaef0bf85fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/blog/tag/%5Bcid%5D-9dc0c01f6fcfe393.js" defer="" crossorigin=""></script><script src="/_next/static/KYANdil3ljfaQ9_rbwOmo/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/KYANdil3ljfaQ9_rbwOmo/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"esm-node-ts","file":"esm-node-ts.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.w3cschool.cn/attachments/image/20170808/1502178281486445.png\" alt=\"nodejs\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eJavaScript的模块化方案经历了长时间的发展，最终于2015年在ES6实现了语言层面的标准化，即esModule（以下简称esm）, 现在JS社区开始拥抱esm，很多npm包仅采用esm发布。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而NodeJS一直依赖采用CommonJS的模块化方案，在最近发布的版本中也开始支持ems, 由于巨大的历史包袱，NodeJS并没有抛弃CommonJS，所以在NodeJS中实际支持两种模块化方式，esm和CommonJS.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此外，现在很多前端工程使用TypeScript开发，而TS的模块解析方式也需要进行一些配置，在这3者结合的过程中有很多坑，本文介绍将三者完美结合的最佳实践。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.w3cschool.cn/attachments/image/20170808/1502178281486445.png\" alt=\"nodejs\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eJavaScript的模块化方案经历了长时间的发展，最终于2015年在ES6实现了语言层面的标准化，即esModule（以下简称esm）, 现在JS社区开始拥抱esm，很多npm包仅采用esm发布。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而NodeJS一直依赖采用CommonJS的模块化方案，在最近发布的版本中也开始支持ems, 由于巨大的历史包袱，NodeJS并没有抛弃CommonJS，所以在NodeJS中实际支持两种模块化方式，esm和CommonJS.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此外，现在很多前端工程使用TypeScript开发，而TS的模块解析方式也需要进行一些配置，在这3者结合的过程中有很多坑，本文介绍将三者完美结合的最佳实践。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e同时引入CommonJS包和ESM包\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e为了测试我们同时引入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elodash\u003c/code\u003e的CommonJS版本和ESM版本\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpm i lodash-es lodash\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e在NodeJS中，模块作者除非显示指定使用esm方式加载模块：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.mjs\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epackage.json\u003c/code\u003e中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etype\u003c/code\u003e字段指定为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodule\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e--input-type\u003c/code\u003e标记\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e否则默认加载方式为CommonJS。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而上面的例子中\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elodash-es\u003c/code\u003e的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epackage.json\u003c/code\u003e中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etype\u003c/code\u003e就是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodule\u003c/code\u003e。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用CommonJS包\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e创建一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.js\u003c/code\u003e文件：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003econst _ = require('lodash');\nconsole.log(_.VERSION); // print '4.17.21'\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e以上是CommonJS的写法，很习以为常，能够正确打印。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用esm包\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e创建一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eesm.js\u003c/code\u003e文件：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eimport _ from 'lodash-es';\nconsole.log(_.VERSION);\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e第1个坑出现了, 报语法错误：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSyntaxError: Cannot use import statement outside a module\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e说无法在模块外部使用import语句，一旦一个文件有顶级(top-level)的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eimport\u003c/code\u003e或\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eexport\u003c/code\u003e，它会被当作一个模块，否则是一个脚本文件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e所以我们需要把这个文件变成esm，两种方式：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e重命名文件，修改扩展名为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.mjs\u003c/code\u003e;\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epackage.json\u003c/code\u003e中添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\"type\": \"module\"\u003c/code\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e但如果采用选项2，第2个坑就会出现了, 回去运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.js\u003c/code\u003e报错：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReferenceError: require is not defined in ES module scope, you can use import instead\u003c/code\u003e。\n说\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003erequire\u003c/code\u003e在esm中不支持，此时可以重命名\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.js\u003c/code\u003e后缀为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.cjs\u003c/code\u003e，告诉模块加载器，此文件以CommonJS加载。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e引入Typescript\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e安装TS：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpm i typescript ts-node -D\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003ets-node 可以在nodejs中直接运行ts文件而无需编译\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e然后将刚才的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eesm.js\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.cjs\u003c/code\u003e扩展名改为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.ts\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ets-node\u003c/code\u003e命令直接运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eesm.ts\u003c/code\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpx ts-node esm.ts\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e第3个坑出现了，扩展名不支持：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTypeError [ERR_UNKNOWN_FILE_EXTENSION]: Unknown file extension \".ts\" for xxx\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这是因为esm的默认扩展名是js而不是ts，此时我们需要：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ets-node --esm\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\"ts-node\": {\"esm\": true}\u003c/code\u003e到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etsconfig.json\u003c/code\u003e。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e如果采用方案1，第4个坑出现了，无法找到模块：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eerror TS7016: Could not find a declaration file for module 'lodash-es'\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时添加配置: \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\"esModuleInterop\": true\u003c/code\u003e到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etsconfig.json\u003c/code\u003e的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecompilerOptions\u003c/code\u003e中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e添加完成后第5个坑出现了，引用错误：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReferenceError: exports is not defined in ES module scope\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时添加配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodule\": \"ESNext\"\u003c/code\u003e到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etsconfig.json\u003c/code\u003e的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecompilerOptions\u003c/code\u003e中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e添加完成后第6个坑出现了，找不到模块：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReferenceError: exports is not defined in ES module scope\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时配置模块的解析方式为最新的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\"moduleResolution\": \"Node16\"\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e到此终于可以成功运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eesm.ts\u003c/code\u003e了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e返回去运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.ts\u003c/code\u003e:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpx ts-node common-js.ts\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e第7个坑出现了，它把我们的CommonJS模块当esm了：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReferenceError: require is not defined in ES module scope, you can use import instead\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时处于鱼和熊掌不可兼得，因为我们设置了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodule\": \"ESNext\"\u003c/code\u003e， 所以ts的编译结果会添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eexport {}\u003c/code\u003e，所以如果要在纯esm的工程中仍然要使用CommonJS，则使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.cjs\u003c/code\u003e作为扩展名即可。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e完整的代码在这里：\u003ca href=\"https://github.com/wangyucode/esm-node-ts\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/esm-node-ts\u003c/a\u003e\u003c/p\u003e\n","content":"\n![nodejs](https://www.w3cschool.cn/attachments/image/20170808/1502178281486445.png)\n\nJavaScript的模块化方案经历了长时间的发展，最终于2015年在ES6实现了语言层面的标准化，即esModule（以下简称esm）, 现在JS社区开始拥抱esm，很多npm包仅采用esm发布。\n\n而NodeJS一直依赖采用CommonJS的模块化方案，在最近发布的版本中也开始支持ems, 由于巨大的历史包袱，NodeJS并没有抛弃CommonJS，所以在NodeJS中实际支持两种模块化方式，esm和CommonJS.\n\n此外，现在很多前端工程使用TypeScript开发，而TS的模块解析方式也需要进行一些配置，在这3者结合的过程中有很多坑，本文介绍将三者完美结合的最佳实践。\n\n\u003c!--more--\u003e\n\n## 同时引入CommonJS包和ESM包\n\n为了测试我们同时引入`lodash`的CommonJS版本和ESM版本\n\n```bash\nnpm i lodash-es lodash\n```\n\n在NodeJS中，模块作者除非显示指定使用esm方式加载模块：\n\n- 使用`.mjs`\n- 在`package.json`中的`type`字段指定为`module`\n- 使用`--input-type`标记\n\n否则默认加载方式为CommonJS。\n\n而上面的例子中`lodash-es`的`package.json`中的`type`就是`module`。\n\n## 使用CommonJS包\n\n创建一个`common-js.js`文件：\n\n```javascript\nconst _ = require('lodash');\nconsole.log(_.VERSION); // print '4.17.21'\n```\n\n以上是CommonJS的写法，很习以为常，能够正确打印。\n\n## 使用esm包\n\n创建一个`esm.js`文件：\n\n```javascript\nimport _ from 'lodash-es';\nconsole.log(_.VERSION);\n```\n\n第1个坑出现了, 报语法错误：`SyntaxError: Cannot use import statement outside a module`\n\n说无法在模块外部使用import语句，一旦一个文件有顶级(top-level)的`import`或`export`，它会被当作一个模块，否则是一个脚本文件。\n\n所以我们需要把这个文件变成esm，两种方式：\n\n1. 重命名文件，修改扩展名为`.mjs`;\n2. 在`package.json`中添加`\"type\": \"module\"`\n\n但如果采用选项2，第2个坑就会出现了, 回去运行`common-js.js`报错：`ReferenceError: require is not defined in ES module scope, you can use import instead`。\n说`require`在esm中不支持，此时可以重命名`common-js.js`后缀为`.cjs`，告诉模块加载器，此文件以CommonJS加载。\n\n## 引入Typescript\n\n安装TS：\n\n```bash\nnpm i typescript ts-node -D\n```\n\n\u003e ts-node 可以在nodejs中直接运行ts文件而无需编译\n\n然后将刚才的`esm.js`和`common-js.cjs`扩展名改为`.ts`\n\n使用`ts-node`命令直接运行`esm.ts`\n\n```bash\nnpx ts-node esm.ts\n```\n\n第3个坑出现了，扩展名不支持：`TypeError [ERR_UNKNOWN_FILE_EXTENSION]: Unknown file extension \".ts\" for xxx`\n\n这是因为esm的默认扩展名是js而不是ts，此时我们需要：\n\n1. `ts-node --esm`\n2. 添加 `\"ts-node\": {\"esm\": true}`到`tsconfig.json`。\n\n如果采用方案1，第4个坑出现了，无法找到模块：`error TS7016: Could not find a declaration file for module 'lodash-es'`。\n\n此时添加配置: `\"esModuleInterop\": true`到`tsconfig.json`的`compilerOptions`中。\n\n添加完成后第5个坑出现了，引用错误：`ReferenceError: exports is not defined in ES module scope`\n\n此时添加配置`module\": \"ESNext\"`到`tsconfig.json`的`compilerOptions`中。\n\n添加完成后第6个坑出现了，找不到模块：`ReferenceError: exports is not defined in ES module scope`\n\n此时配置模块的解析方式为最新的`\"moduleResolution\": \"Node16\"`。\n\n到此终于可以成功运行`esm.ts`了。\n\n返回去运行`common-js.ts`:\n\n```bash\nnpx ts-node common-js.ts\n```\n\n第7个坑出现了，它把我们的CommonJS模块当esm了：`ReferenceError: require is not defined in ES module scope, you can use import instead`\n\n此时处于鱼和熊掌不可兼得，因为我们设置了`module\": \"ESNext\"`， 所以ts的编译结果会添加`export {}`，所以如果要在纯esm的工程中仍然要使用CommonJS，则使用`.cjs`作为扩展名即可。\n\n完整的代码在这里：https://github.com/wangyucode/esm-node-ts","data":{"title":"esModule + NodeJS + TypeScript 的工程配置","date":"2022-09-22","tags":["JavaScript","TypeScript","NodeJS"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![nodejs](https://www.w3cschool.cn/attachments/image/20170808/1502178281486445.png)\n\nJavaScript的模块化方案经历了长时间的发展，最终于2015年在ES6实现了语言层面的标准化，即esModule（以下简称esm）, 现在JS社区开始拥抱esm，很多npm包仅采用esm发布。\n\n而NodeJS一直依赖采用CommonJS的模块化方案，在最近发布的版本中也开始支持ems, 由于巨大的历史包袱，NodeJS并没有抛弃CommonJS，所以在NodeJS中实际支持两种模块化方式，esm和CommonJS.\n\n此外，现在很多前端工程使用TypeScript开发，而TS的模块解析方式也需要进行一些配置，在这3者结合的过程中有很多坑，本文介绍将三者完美结合的最佳实践。\n\n"},{"id":"ant-design-pro","file":"ant-design-pro.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg\" alt=\"ant-design\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design\u003c/strong\u003e由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e和 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAngular\u003c/code\u003e组件实现，用于开发和服务于企业级中后台产品。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design-Pro\u003c/strong\u003e是基于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAnt-Design\u003c/code\u003e的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e：现代化的JavaScript界面库\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edva\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRedux\u003c/code\u003e的数据流、状态管理框架\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUmiJS\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enextJS\u003c/code\u003e的react应用框架\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e本文从基础使用开始，逐步解析里面用到的技术细节。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg\" alt=\"ant-design\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design\u003c/strong\u003e由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e和 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAngular\u003c/code\u003e组件实现，用于开发和服务于企业级中后台产品。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design-Pro\u003c/strong\u003e是基于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAnt-Design\u003c/code\u003e的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e：现代化的JavaScript界面库\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edva\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRedux\u003c/code\u003e的数据流、状态管理框架\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUmiJS\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enextJS\u003c/code\u003e的react应用框架\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e本文从基础使用开始，逐步解析里面用到的技术细节。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e安装及启动在官网有说明，生成的基础工程目录结结构如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e├── config                   # umi 配置，包含路由，构建等配置\n├── mock                     # 本地模拟数据\n├── public                   # 公共资源目录\n│   └── favicon.png          # Favicon\n├── src                      # 代码目录\n│   ├── assets               # 本地静态资源\n│   ├── components           # 业务通用组件\n│   ├── e2e                  # 集成测试用例\n│   ├── layouts              # 通用布局\n│   ├── models               # 全局 dva model\n│   ├── pages                # 业务页面入口和常用模板\n│   ├── services             # 后台接口服务\n│   ├── utils                # 工具库\n│   ├── locales              # 国际化资源\n│   ├── global.less          # 全局样式\n│   └── global.js            # 全局 JS\n├── tests                    # 测试工具\n├── README.md                # readme\n└── package.json             # npm管理的清单\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于哈希路由\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e现代的前端框架都是单页面的(single-page application)，即用户访问的永远是根目录的index.html，这时网页地址如何展现就是一个问题。解决方案有2个：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e前端解决：使用哈希路由，即用户看到的地址栏URL是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e#\u003c/code\u003e分割的，如\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttps://wycode.cn/admin/#/users/123\u003c/code\u003e，实际访问仍然是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUmiJS\u003c/code\u003e配置如下\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eexport default {\n    ···\n    history: 'hash'\n    ···\n} as IConfig;  \n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e后端解决：使用重定向，即访问index以外的其它地址，都重定向到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enginx\u003c/code\u003e配置如下:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-nginx px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003elocation / {\n    try_files $uri $uri/ /index.html;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eUmiJS非根目录部署\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e如果工程不是部署在根目录，UmiJS的config做如下配置即可：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eexport default {\n    ···\n    base: 'admin'\n    ···\n} as IConfig;  \n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e**但是：**当配置为hash路由时且非根目录部署时，有可能你希望的首页是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttps://wycode.cn/admin/#/\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/users\u003c/code\u003e页是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttps://wycode.cn/admin/#/users\u003c/code\u003e则需要进行如下配置：\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eexport default {\n    ···\n    history: 'hash',\n    publicPath: '/admin/'\n    ···\n} as IConfig;\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于HTML模版\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eumi默认使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esrc/pages/document.ejs\u003c/code\u003e这个模版，采用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eEJS\u003c/code\u003e渲染，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFavicon\u003c/code\u003e的路径改为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;%= context.publicPath %\u003efavicon.png\u003c/code\u003e可以修复Favicon路径不对的问题。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于区块\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eblock\u003c/code\u003e\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e区块可以理解为页面模板，这个模板是在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eant-design-pro\u003c/code\u003e的预览网站中，如果你看中了某个功能，（默认创建的工程是空白的，只有一个Welcome页面）点击右下角的下载按钮，会弹出一个命令，执行这个命令就能将这个页面加入到你自己的工程中，非常方便。其实质是执行了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003egit clone\u003c/code\u003e克隆预览工程的部分文件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e比如：添加一个类似预览工程的404页面\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpx umi block add Exception404  --path=/exception/404\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e经过尝试，我发现目前区块引入时，并不是合并文件，而是创建一个目录，里面包括了这个页面用到的所有组件，甚至是国际化文本都是单独的一套。不管你工程内有没有这些组件，它都会重新创建一套。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e比如刚加入了404页面又想加入403页面，本已经存在的Exception组件，会在403文件夹再创建一份一模一样的副本，这点，我觉得是不可接受的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这样的话我更倾向与参考block的实现手动加入需要的文件，而不是使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eumi block add\u003c/code\u003e功能，官方的block在这里：\u003ca href=\"https://github.com/ant-design/pro-blocks\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/ant-design/pro-blocks\u003c/a\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e菜单处理\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e菜单是由路由自动生成，刚刚引入的404页面出现在了菜单栏，它是一个异常页，并不需要在菜单展示，我们只需在路由配置中加入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehideInMenu: true\u003c/code\u003e，即可隐藏。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e404页面\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e输入一个不存在的地址，并不能跳转到刚刚加入的404页面。\n我们需要将在路由配置中将404的其它配置项删除，仅保留\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecomponent: './exception/404'\u003c/code\u003e，并将其挪到数组的最后，这样当路由无法匹配时，就会加载404这个组件了。\u003c/p\u003e\n","content":"\n![ant-design](https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg)\n\n**Ant-Design**由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量`React`和 `Angular`组件实现，用于开发和服务于企业级中后台产品。\n\n**Ant-Design-Pro**是基于`Ant-Design`的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\n\n- `React`：现代化的JavaScript界面库\n- `dva`：类似`Redux`的数据流、状态管理框架\n- `UmiJS`：类似`nextJS`的react应用框架\n\n本文从基础使用开始，逐步解析里面用到的技术细节。\n\n\u003c!--more--\u003e\n\n安装及启动在官网有说明，生成的基础工程目录结结构如下：\n\n```\n├── config                   # umi 配置，包含路由，构建等配置\n├── mock                     # 本地模拟数据\n├── public                   # 公共资源目录\n│   └── favicon.png          # Favicon\n├── src                      # 代码目录\n│   ├── assets               # 本地静态资源\n│   ├── components           # 业务通用组件\n│   ├── e2e                  # 集成测试用例\n│   ├── layouts              # 通用布局\n│   ├── models               # 全局 dva model\n│   ├── pages                # 业务页面入口和常用模板\n│   ├── services             # 后台接口服务\n│   ├── utils                # 工具库\n│   ├── locales              # 国际化资源\n│   ├── global.less          # 全局样式\n│   └── global.js            # 全局 JS\n├── tests                    # 测试工具\n├── README.md                # readme\n└── package.json             # npm管理的清单\n```\n\n## 关于哈希路由\n\n现代的前端框架都是单页面的(single-page application)，即用户访问的永远是根目录的index.html，这时网页地址如何展现就是一个问题。解决方案有2个：\n\n- 前端解决：使用哈希路由，即用户看到的地址栏URL是`#`分割的，如`https://wycode.cn/admin/#/users/123`，实际访问仍然是`index.html`。`UmiJS`配置如下\n\n```js\nexport default {\n    ···\n    history: 'hash'\n    ···\n} as IConfig;  \n```\n\n- 后端解决：使用重定向，即访问index以外的其它地址，都重定向到`index.html`。`nginx`配置如下:\n\n```nginx\nlocation / {\n    try_files $uri $uri/ /index.html;\n}\n```\n## UmiJS非根目录部署\n\n如果工程不是部署在根目录，UmiJS的config做如下配置即可：\n\n```js\nexport default {\n    ···\n    base: 'admin'\n    ···\n} as IConfig;  \n```\n\n\u003e **但是：**当配置为hash路由时且非根目录部署时，有可能你希望的首页是`https://wycode.cn/admin/#/`，`/users`页是`https://wycode.cn/admin/#/users`则需要进行如下配置：\n\n```js\nexport default {\n    ···\n    history: 'hash',\n    publicPath: '/admin/'\n    ···\n} as IConfig;\n```\n\n## 关于HTML模版\n\numi默认使用`src/pages/document.ejs`这个模版，采用`EJS`渲染，`Favicon`的路径改为`\u003c%= context.publicPath %\u003efavicon.png`可以修复Favicon路径不对的问题。\n\n\n## 关于区块`block`\n\n区块可以理解为页面模板，这个模板是在`ant-design-pro`的预览网站中，如果你看中了某个功能，（默认创建的工程是空白的，只有一个Welcome页面）点击右下角的下载按钮，会弹出一个命令，执行这个命令就能将这个页面加入到你自己的工程中，非常方便。其实质是执行了`git clone`克隆预览工程的部分文件。\n\n比如：添加一个类似预览工程的404页面\n\n```bash\nnpx umi block add Exception404  --path=/exception/404\n```\n\n经过尝试，我发现目前区块引入时，并不是合并文件，而是创建一个目录，里面包括了这个页面用到的所有组件，甚至是国际化文本都是单独的一套。不管你工程内有没有这些组件，它都会重新创建一套。\n\n比如刚加入了404页面又想加入403页面，本已经存在的Exception组件，会在403文件夹再创建一份一模一样的副本，这点，我觉得是不可接受的。\n\n这样的话我更倾向与参考block的实现手动加入需要的文件，而不是使用`umi block add`功能，官方的block在这里：https://github.com/ant-design/pro-blocks\n\n## 菜单处理\n\n菜单是由路由自动生成，刚刚引入的404页面出现在了菜单栏，它是一个异常页，并不需要在菜单展示，我们只需在路由配置中加入`hideInMenu: true`，即可隐藏。\n\n## 404页面\n\n输入一个不存在的地址，并不能跳转到刚刚加入的404页面。\n我们需要将在路由配置中将404的其它配置项删除，仅保留`component: './exception/404'`，并将其挪到数组的最后，这样当路由无法匹配时，就会加载404这个组件了。\n\n","data":{"title":"学习和拆解Ant-Design-Pro","date":"2019-06-09","tags":["TypeScript","JavaScript","NodeJS","React"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![ant-design](https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg)\n\n**Ant-Design**由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量`React`和 `Angular`组件实现，用于开发和服务于企业级中后台产品。\n\n**Ant-Design-Pro**是基于`Ant-Design`的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\n\n- `React`：现代化的JavaScript界面库\n- `dva`：类似`Redux`的数据流、状态管理框架\n- `UmiJS`：类似`nextJS`的react应用框架\n\n本文从基础使用开始，逐步解析里面用到的技术细节。\n\n"},{"id":"clipboard-react","file":"clipboard-react.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将用React实现一个跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e通常我们会遇到将手机上的文字发送到电脑上，或者反过来，或者是记录一些网址，你懂得。这时我们会用到一些云笔记之类的产品，或者干脆使用微信或QQ，它们都太重了，用起来没那么方便，还要登录注册啥的。我们使用React来开发一款手机和电脑上都能访问，并且无需注册登录的云便签应用。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将用React实现一个跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e通常我们会遇到将手机上的文字发送到电脑上，或者反过来，或者是记录一些网址，你懂得。这时我们会用到一些云笔记之类的产品，或者干脆使用微信或QQ，它们都太重了，用起来没那么方便，还要登录注册啥的。我们使用React来开发一款手机和电脑上都能访问，并且无需注册登录的云便签应用。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1.使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecreate-react-app\u003c/code\u003e创建工程\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpm install -g create-react-app\ncreate-react-app my-app\n\ncd my-app\nnpm start\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e2.编写模版\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003erender() {\n        return (\n            \u0026#x3C;div\u003e\n                \u0026#x3C;Header/\u003e\n                \u0026#x3C;div className=\"Clipboard container\"\u003e\n                    \u0026#x3C;input placeholder=\"查询码\"\n                           type=\"number\"\n                           className=\"input-query-number form-control form-group\"\n                           value={this.state.queryNumber \u003e 0 ? this.state.queryNumber : ''}\n                           disabled={this.state.isShowResult}\n                           onChange={this.handleNumberChange}/\u003e\n                    {this.state.isShowResult ? null : \u0026#x3C;button onClick={this.handleQuery}\n                                                              className=\"btn-query btn btn-primary form-control form-group\"\u003e查询\u0026#x3C;/button\u003e}\n\n                    {this.state.isShowResult ? null :\n                        \u0026#x3C;button onClick={this.handleNew}\n                                className=\"btn-new btn btn-primary form-control form-group\"\u003e新建\u0026#x3C;/button\u003e}\n\n                    {this.state.isShowResult ? \u0026#x3C;textarea onChange={this.handleTextChange} value={this.state.text}\n                                                         className=\"textarea-text form-control form-group\"/\u003e : null}\n\n                    {this.state.isShowResult ? \u0026#x3C;button onClick={this.handleSave}\n                                                       className=\"btn-save btn btn-success form-control  form-group\"\u003e保存\u0026#x3C;/button\u003e : null}\n                \u0026#x3C;/div\u003e\n            \u0026#x3C;/div\u003e\n        );\n    }\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003erender()\u003c/code\u003e返回的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJSX\u003c/code\u003e只能有一个组件，当需要多个组件时，需要用一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ediv\u003c/code\u003e包起来；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里通过state的自定义属性\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eisShowResult\u003c/code\u003e实现对控件的隐藏和显示；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e界面使用Bootstrap框架做移动端适配\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eonClick={this.handleSave}\u003c/code\u003e,\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eonChange={this.handleTextChange}\u003c/code\u003e等属性绑定函数，构造函数里还要写\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis.handleBack = this.handleBack.bind(this);\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e3.构造方法\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-JavaScript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003econstructor(props) {\n        super(props);\n        this.state = {\n            queryNumber: -1,\n            isShowResult: false,\n            text: ''\n        };\n\n        this.handleNumberChange = this.handleNumberChange.bind(this);\n        this.handleTextChange = this.handleTextChange.bind(this);\n        this.handleQuery = this.handleQuery.bind(this);\n        this.handleNew = this.handleNew.bind(this);\n        this.handleSave = this.handleSave.bind(this);\n        this.handleBack = this.handleBack.bind(this);\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estate\u003c/code\u003e中维护了页面状态，这里只需要3个参数：查询码，是否显示查询结果，剪切板文字\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e4.逻辑\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-JavaScript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e handleNumberChange(event) {\n        this.setState({queryNumber: event.target.value});\n    }\n\n    handleTextChange(event) {\n        this.setState({text: event.target.value});\n    }\n\n    handleBack(event){\n        this.setState({isShowResult: false});\n    }\n\n    handleQuery(event) {\n        if(this.state.queryNumber\u0026#x3C;=0){\n            alert('查询码不正确！');\n            return\n        }\n        let data = {\n            params: {\n                id: this.state.queryNumber\n            }\n        };\n        axios.get('https://wycode.cn/web/api/public/clipboard/query',data)\n            .then((response) =\u003e{\n                if(response.status!==200||response.data.data==null){\n                    throw '查询码不正确！'\n                }\n                this.setState({\n                    isShowResult: true,\n                    queryNumber: response.data.data.id,\n                    text: response.data.data.content\n                })\n            })\n            .catch((error) =\u003e alert(error));\n    }\n\n    handleNew(event) {\n        axios.post('https://wycode.cn/web/api/public/clipboard/create')\n            .then((response) =\u003e this.setState({\n                isShowResult: true,\n                queryNumber: response.data.data.id,\n                text: response.data.data.content\n            }))\n            .catch((error) =\u003e alert(error));\n    }\n\n    handleSave(event) {\n        let data = new FormData();\n        data.append('id',this.state.queryNumber);\n        data.append('content',this.state.text);\n        axios.post('https://wycode.cn/web/api/public/clipboard/save',data)\n            .then((response) =\u003e this.setState({\n                isShowResult: false,\n                queryNumber: response.data.data.id,\n                text: response.data.data.content\n            }))\n            .catch((error) =\u003e alert(error));\n    }\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis.setState({});\u003c/code\u003e更改页面状态\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAxios\u003c/code\u003e做网络请求。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAxios\u003c/code\u003e是一个js网络请求库。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e在网络请求返回函数里 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis\u003c/code\u003e做作用域是当前对象，会发生错误，使用箭头符=\u003e，即lambda表达式就没有问题。或者在外部创建一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis\u003c/code\u003e的引用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elet that = this;\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e至此大功告成！访问 \u003ca href=\"https://wycode.cn/clipboard/\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://wycode.cn/clipboard/\u003c/a\u003e 查看示例\n访问 \u003ca href=\"https://github.com/wangyucode/React-Learning\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/React-Learning\u003c/a\u003e 查看完整源码\u003c/p\u003e\n","content":"\n![React](/images/20180213_react.png)\n\n\u003e 这篇文章我们将用React实现一个跨平台剪切板。\n\n\n通常我们会遇到将手机上的文字发送到电脑上，或者反过来，或者是记录一些网址，你懂得。这时我们会用到一些云笔记之类的产品，或者干脆使用微信或QQ，它们都太重了，用起来没那么方便，还要登录注册啥的。我们使用React来开发一款手机和电脑上都能访问，并且无需注册登录的云便签应用。\n\n\u003c!--more--\u003e\n\n## 1.使用`create-react-app`创建工程\n\n```bash\nnpm install -g create-react-app\ncreate-react-app my-app\n\ncd my-app\nnpm start\n```\n\n## 2.编写模版\n\n```html\nrender() {\n        return (\n            \u003cdiv\u003e\n                \u003cHeader/\u003e\n                \u003cdiv className=\"Clipboard container\"\u003e\n                    \u003cinput placeholder=\"查询码\"\n                           type=\"number\"\n                           className=\"input-query-number form-control form-group\"\n                           value={this.state.queryNumber \u003e 0 ? this.state.queryNumber : ''}\n                           disabled={this.state.isShowResult}\n                           onChange={this.handleNumberChange}/\u003e\n                    {this.state.isShowResult ? null : \u003cbutton onClick={this.handleQuery}\n                                                              className=\"btn-query btn btn-primary form-control form-group\"\u003e查询\u003c/button\u003e}\n\n                    {this.state.isShowResult ? null :\n                        \u003cbutton onClick={this.handleNew}\n                                className=\"btn-new btn btn-primary form-control form-group\"\u003e新建\u003c/button\u003e}\n\n                    {this.state.isShowResult ? \u003ctextarea onChange={this.handleTextChange} value={this.state.text}\n                                                         className=\"textarea-text form-control form-group\"/\u003e : null}\n\n                    {this.state.isShowResult ? \u003cbutton onClick={this.handleSave}\n                                                       className=\"btn-save btn btn-success form-control  form-group\"\u003e保存\u003c/button\u003e : null}\n                \u003c/div\u003e\n            \u003c/div\u003e\n        );\n    }\n\n```\n\n- `render()`返回的`JSX`只能有一个组件，当需要多个组件时，需要用一个`div`包起来；\n- 这里通过state的自定义属性`isShowResult`实现对控件的隐藏和显示；\n- 界面使用Bootstrap框架做移动端适配\n- 通过`onClick={this.handleSave}`,`onChange={this.handleTextChange}`等属性绑定函数，构造函数里还要写`this.handleBack = this.handleBack.bind(this);`\n\n## 3.构造方法\n\n```JavaScript\nconstructor(props) {\n        super(props);\n        this.state = {\n            queryNumber: -1,\n            isShowResult: false,\n            text: ''\n        };\n\n        this.handleNumberChange = this.handleNumberChange.bind(this);\n        this.handleTextChange = this.handleTextChange.bind(this);\n        this.handleQuery = this.handleQuery.bind(this);\n        this.handleNew = this.handleNew.bind(this);\n        this.handleSave = this.handleSave.bind(this);\n        this.handleBack = this.handleBack.bind(this);\n    }\n```\n\n- `state`中维护了页面状态，这里只需要3个参数：查询码，是否显示查询结果，剪切板文字\n\n## 4.逻辑\n\n```JavaScript\n handleNumberChange(event) {\n        this.setState({queryNumber: event.target.value});\n    }\n\n    handleTextChange(event) {\n        this.setState({text: event.target.value});\n    }\n\n    handleBack(event){\n        this.setState({isShowResult: false});\n    }\n\n    handleQuery(event) {\n        if(this.state.queryNumber\u003c=0){\n            alert('查询码不正确！');\n            return\n        }\n        let data = {\n            params: {\n                id: this.state.queryNumber\n            }\n        };\n        axios.get('https://wycode.cn/web/api/public/clipboard/query',data)\n            .then((response) =\u003e{\n                if(response.status!==200||response.data.data==null){\n                    throw '查询码不正确！'\n                }\n                this.setState({\n                    isShowResult: true,\n                    queryNumber: response.data.data.id,\n                    text: response.data.data.content\n                })\n            })\n            .catch((error) =\u003e alert(error));\n    }\n\n    handleNew(event) {\n        axios.post('https://wycode.cn/web/api/public/clipboard/create')\n            .then((response) =\u003e this.setState({\n                isShowResult: true,\n                queryNumber: response.data.data.id,\n                text: response.data.data.content\n            }))\n            .catch((error) =\u003e alert(error));\n    }\n\n    handleSave(event) {\n        let data = new FormData();\n        data.append('id',this.state.queryNumber);\n        data.append('content',this.state.text);\n        axios.post('https://wycode.cn/web/api/public/clipboard/save',data)\n            .then((response) =\u003e this.setState({\n                isShowResult: false,\n                queryNumber: response.data.data.id,\n                text: response.data.data.content\n            }))\n            .catch((error) =\u003e alert(error));\n    }\n\n```\n\n- 使用`this.setState({});`更改页面状态\n- 这里使用`Axios`做网络请求。`Axios`是一个js网络请求库。\n- 在网络请求返回函数里 `this`做作用域是当前对象，会发生错误，使用箭头符=\u003e，即lambda表达式就没有问题。或者在外部创建一个`this`的引用`let that = this;`\n\n\n至此大功告成！访问 https://wycode.cn/clipboard/ 查看示例\n访问 https://github.com/wangyucode/React-Learning 查看完整源码","data":{"title":"用React做一个跨平台剪切板","date":"2018-02-13","tags":["React","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![React](/images/20180213_react.png)\n\n\u003e 这篇文章我们将用React实现一个跨平台剪切板。\n\n\n通常我们会遇到将手机上的文字发送到电脑上，或者反过来，或者是记录一些网址，你懂得。这时我们会用到一些云笔记之类的产品，或者干脆使用微信或QQ，它们都太重了，用起来没那么方便，还要登录注册啥的。我们使用React来开发一款手机和电脑上都能访问，并且无需注册登录的云便签应用。\n\n"},{"id":"clipboard-wechatapp","file":"clipboard-wechatapp.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_clipboard.jpg\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将开发一个微信小程序版的跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e书接上文，我们已经用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_clipboard.jpg\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将开发一个微信小程序版的跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e书接上文，我们已经用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1.app.json\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\n{\n  \"pages\": [\n    \"pages/index/index\"\n  ],\n  \"window\": {\n    \"backgroundTextStyle\": \"light\",\n    \"navigationBarBackgroundColor\": \"#379392\",\n    \"navigationBarTitleText\": \"跨平台剪切板\",\n    \"navigationBarTextStyle\": \"white\"\n  },\n  \"debug\": true\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapp.json\u003c/code\u003e中描述了小程序相关的全局配置信息，所有的页面需要配置在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epage\u003c/code\u003e属性中。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里还能配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etabbar\u003c/code\u003e，为了跨平台剪切板的简洁，我去掉了tab，把它做成了一个单页面的极简APP\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e2.模板\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\n\u0026#x3C;!--index.wxml--\u003e\n\u0026#x3C;view class=\"container\"\u003e\n  \u0026#x3C;input type='number' placeholder=\"查询码\" value='{{queryNumber\u003e0?queryNumber:\"\"}}' bindinput='bindInput' disabled='{{isShowResult}}'\u003e\u0026#x3C;/input\u003e\n  \u0026#x3C;button type='primary' wx:if=\"{{!isShowResult}}\" bindtap='query'\u003e查询\u0026#x3C;/button\u003e\n  \u0026#x3C;button wx:if=\"{{!isShowResult}}\" bindtap='create'\u003e新建\u0026#x3C;/button\u003e\n  \u0026#x3C;textarea wx:if='{{isShowResult}}' value='{{text}}' bindinput='bindInputText'\u003e\u0026#x3C;/textarea\u003e\n  \u0026#x3C;button type= 'primary' wx:if = \"{{isShowResult}}\" bindtap='save'\u003e保存\u0026#x3C;/button\u003e\n  \u0026#x3C;button wx:if = \"{{isShowResult}}\" bindtap='back'\u003e返回\u0026#x3C;/button\u003e\n\u0026#x3C;/view\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.wxml\u003c/code\u003e后缀的是小程序的布局（模板）文件。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e属性没什么好解释的，看一下就懂了。参考React版的教程就知道每个属性的详细用途。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e3.样式表\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-css px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e/**index.wxss**/\n\ninput {\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n}\n\nbutton {\n  margin-top: 24rpx;\n  width: 100%;\n}\n\ntextarea{\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n  margin-top: 24rpx;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e就是传统的CSS层叠样式表\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里rpx是dpi无关的单位，保证不同分辨率的相同观感\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e4.逻辑\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e//index.js\n//获取应用实例\nconst app = getApp()\n\nPage({\n  data: {\n    queryNumber: -1,\n    isShowResult: false,\n    text: ''\n  },\n\n  onLoad: function () {\n\n  },\n\n  bindInput: function (e) {\n    this.setData({\n      queryNumber: e.detail.value\n    })\n  },\n\n  bindInputText: function (e) {\n    this.setData({\n      text: e.detail.value\n    })\n  },\n\n  query: function () {\n    if (this.data.queryNumber \u0026#x3C;= 0) {\n      wx.showToast({\n        title: '查询码不正确！',\n        icon: 'none'\n      });\n      return\n    }\n\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/query',\n      data: { 'id': this.data.queryNumber },\n      success: function (res) {\n        if (!res.data.success || res.data.data == null) {\n          wx.showToast({\n            title: '查询码不正确！',\n            icon: 'none'\n          });\n        } else {\n          that.setData({\n            isShowResult: true,\n            queryNumber: res.data.data.id,\n            text: res.data.data.content\n          });\n        }\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n\n  },\n\n  create: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/create',\n      method: 'POST',\n      success: function (res) {\n\n        that.setData({\n          isShowResult: true,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n  },\n\n  save: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/save',\n      method: 'POST',\n      data:{\n        id: that.data.queryNumber,\n        content: that.data.text\n      },\n      header: {\n        'content-type': 'application/x-www-form-urlencoded'\n      },\n      success: function (res) {\n\n        that.setData({\n          isShowResult: false,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n        wx.showToast({\n          title: '保存成功！',\n          icon: 'success'\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete: function () {\n        wx.hideLoading();\n      }\n    });\n  },\n\n  back: function () {\n    this.setData({\n      isShowResult: false\n    })\n  }\n\n})\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e小程序的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edata\u003c/code\u003e，就是React的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estate\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e小程序通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis.setData()\u003c/code\u003e刷新页面状态，如同React的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis.setState()\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.request()\u003c/code\u003e做http请求\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.showToast()\u003c/code\u003e显示一个提示\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.showLoading()\u003c/code\u003e显示Loading\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里发现一个小程序的bug，在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.hideLoading()\u003c/code\u003e会将Toast也消失掉。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e至此大功告成！打开微信扫一扫文章开头的小程序码即可使用。\n访问 \u003ca href=\"https://github.com/wangyucode/Clipboard\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/Clipboard\u003c/a\u003e 查看完整源码\u003c/p\u003e\n","content":"\n![React](/images/20180213_clipboard.jpg)\n\n\u003e 这篇文章我们将开发一个微信小程序版的跨平台剪切板。\n\n\n书接上文，我们已经用`React`开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\n\n如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\n\n\u003c!--more--\u003e\n\n## 1.app.json\n\n```json\n\n{\n  \"pages\": [\n    \"pages/index/index\"\n  ],\n  \"window\": {\n    \"backgroundTextStyle\": \"light\",\n    \"navigationBarBackgroundColor\": \"#379392\",\n    \"navigationBarTitleText\": \"跨平台剪切板\",\n    \"navigationBarTextStyle\": \"white\"\n  },\n  \"debug\": true\n}\n```\n\n- `app.json`中描述了小程序相关的全局配置信息，所有的页面需要配置在`page`属性中。\n- 这里还能配置`tabbar`，为了跨平台剪切板的简洁，我去掉了tab，把它做成了一个单页面的极简APP\n\n## 2.模板\n\n```html\n\n\u003c!--index.wxml--\u003e\n\u003cview class=\"container\"\u003e\n  \u003cinput type='number' placeholder=\"查询码\" value='{{queryNumber\u003e0?queryNumber:\"\"}}' bindinput='bindInput' disabled='{{isShowResult}}'\u003e\u003c/input\u003e\n  \u003cbutton type='primary' wx:if=\"{{!isShowResult}}\" bindtap='query'\u003e查询\u003c/button\u003e\n  \u003cbutton wx:if=\"{{!isShowResult}}\" bindtap='create'\u003e新建\u003c/button\u003e\n  \u003ctextarea wx:if='{{isShowResult}}' value='{{text}}' bindinput='bindInputText'\u003e\u003c/textarea\u003e\n  \u003cbutton type= 'primary' wx:if = \"{{isShowResult}}\" bindtap='save'\u003e保存\u003c/button\u003e\n  \u003cbutton wx:if = \"{{isShowResult}}\" bindtap='back'\u003e返回\u003c/button\u003e\n\u003c/view\u003e\n```\n\n- `.wxml`后缀的是小程序的布局（模板）文件。\n- 属性没什么好解释的，看一下就懂了。参考React版的教程就知道每个属性的详细用途。\n\n## 3.样式表\n\n```css\n/**index.wxss**/\n\ninput {\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n}\n\nbutton {\n  margin-top: 24rpx;\n  width: 100%;\n}\n\ntextarea{\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n  margin-top: 24rpx;\n}\n```\n\n- 就是传统的CSS层叠样式表\n- 这里rpx是dpi无关的单位，保证不同分辨率的相同观感\n\n\n## 4.逻辑\n\n```javascript\n//index.js\n//获取应用实例\nconst app = getApp()\n\nPage({\n  data: {\n    queryNumber: -1,\n    isShowResult: false,\n    text: ''\n  },\n\n  onLoad: function () {\n\n  },\n\n  bindInput: function (e) {\n    this.setData({\n      queryNumber: e.detail.value\n    })\n  },\n\n  bindInputText: function (e) {\n    this.setData({\n      text: e.detail.value\n    })\n  },\n\n  query: function () {\n    if (this.data.queryNumber \u003c= 0) {\n      wx.showToast({\n        title: '查询码不正确！',\n        icon: 'none'\n      });\n      return\n    }\n\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/query',\n      data: { 'id': this.data.queryNumber },\n      success: function (res) {\n        if (!res.data.success || res.data.data == null) {\n          wx.showToast({\n            title: '查询码不正确！',\n            icon: 'none'\n          });\n        } else {\n          that.setData({\n            isShowResult: true,\n            queryNumber: res.data.data.id,\n            text: res.data.data.content\n          });\n        }\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n\n  },\n\n  create: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/create',\n      method: 'POST',\n      success: function (res) {\n\n        that.setData({\n          isShowResult: true,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n  },\n\n  save: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/save',\n      method: 'POST',\n      data:{\n        id: that.data.queryNumber,\n        content: that.data.text\n      },\n      header: {\n        'content-type': 'application/x-www-form-urlencoded'\n      },\n      success: function (res) {\n\n        that.setData({\n          isShowResult: false,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n        wx.showToast({\n          title: '保存成功！',\n          icon: 'success'\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete: function () {\n        wx.hideLoading();\n      }\n    });\n  },\n\n  back: function () {\n    this.setData({\n      isShowResult: false\n    })\n  }\n\n})\n\n```\n\n- 小程序的`data`，就是React的`state`\n- 小程序通过`this.setData()`刷新页面状态，如同React的`this.setState()`\n- 使用`wx.request()`做http请求\n- 使用`wx.showToast()`显示一个提示\n- 使用`wx.showLoading()`显示Loading\n- 这里发现一个小程序的bug，在`wx.hideLoading()`会将Toast也消失掉。\n\n\n至此大功告成！打开微信扫一扫文章开头的小程序码即可使用。\n访问 https://github.com/wangyucode/Clipboard 查看完整源码","data":{"title":"微信小程序入门","date":"2018-02-13","tags":["Wechat","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![React](/images/20180213_clipboard.jpg)\n\n\u003e 这篇文章我们将开发一个微信小程序版的跨平台剪切板。\n\n\n书接上文，我们已经用`React`开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\n\n如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\n\n"},{"id":"react","file":"react.md","excerptHtml":"","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eReact框架的整体思路是将DOM元素彻底改为由JS代码渲染，通过组件(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e)的层层嵌套，最终由\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactDOM.render()\u003c/code\u003e渲染到页面上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003eReact框架的核心概念：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e元素(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eElement\u003c/code\u003e) Recat认为元素是不可变的，创建后不能修改。React使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJSX\u003c/code\u003e技术将HTML代码直接作为常量使用。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e组件(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e) 组件是对元素的封装。拥有自身的生命周期函数。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e属性(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eProps\u003c/code\u003e) 属性可以看作常量，用于构建特定的组件。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e状态(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eState\u003c/code\u003e) 组件通过状态维护自身变化。组件通过调用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esetState()\u003c/code\u003e方法重新渲染。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eReact的理念是采取\u003ca href=\"https://en.wikipedia.org/wiki/Single_responsibility_principle\" title=\"Wiki\" class=\"text-sky-500 hover:text-sky-400\"\u003e单一责任原则\u003c/a\u003e，自顶向下设计，一层层的拆分成只做一件事的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在做一个实际的项目时，采取先使用假数据画页面的方式，这个过程中只需要关心数据模型和页面。而不去关心逻辑交互。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e为什么要分成\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eProps\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eState\u003c/code\u003e就显而易见了，做页面时只关心\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eProps\u003c/code\u003e，做交互时只关心\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eState\u003c/code\u003e。\u003c/p\u003e\n","content":"\n![React](/images/20180213_react.png)\n\n\u003e React框架的整体思路是将DOM元素彻底改为由JS代码渲染，通过组件(`Component`)的层层嵌套，最终由`ReactDOM.render()`渲染到页面上。\n\nReact框架的核心概念：\n\n- 元素(`Element`) Recat认为元素是不可变的，创建后不能修改。React使用`JSX`技术将HTML代码直接作为常量使用。\n- 组件(`Component`) 组件是对元素的封装。拥有自身的生命周期函数。\n- 属性(`Props`) 属性可以看作常量，用于构建特定的组件。\n- 状态(`State`) 组件通过状态维护自身变化。组件通过调用`setState()`方法重新渲染。\n\nReact的理念是采取[单一责任原则](https://en.wikipedia.org/wiki/Single_responsibility_principle \"Wiki\")，自顶向下设计，一层层的拆分成只做一件事的`Component`。\n\n在做一个实际的项目时，采取先使用假数据画页面的方式，这个过程中只需要关心数据模型和页面。而不去关心逻辑交互。\n\n此时`Component`为什么要分成`Props`和`State`就显而易见了，做页面时只关心`Props`，做交互时只关心`State`。","data":{"title":"React框架原理的思考","date":"2018-01-06","tags":["React","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":""},{"id":"nodejs","file":"nodejs.md","excerptHtml":"","contentHtml":"\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eLinux平台\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用cURL:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ curl https://raw.github.com/creationix/nvm/master/install.sh | sh\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e使用Wget:(Ubuntu默认没有安装cURL,推荐使用Wget)\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ wget -qO- https://raw.github.com/creationix/nvm/master/install.sh | sh\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e安装完成后，重启终端并执行下列命令即可安装 Node.js。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ nvm install stable\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eWindows平台\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e建议使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.msi\u003c/code\u003e安装程序进行安装。推荐勾选\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAdd to PATH\u003c/code\u003e可以自动添加到环境变量，方便全局使用相关命令。\u003c/p\u003e\n","content":"\n## Linux平台\n\n使用cURL:\n\n```bash\n$ curl https://raw.github.com/creationix/nvm/master/install.sh | sh\n```\n\n使用Wget:(Ubuntu默认没有安装cURL,推荐使用Wget)\n\n```bash\n$ wget -qO- https://raw.github.com/creationix/nvm/master/install.sh | sh\n```\n\n安装完成后，重启终端并执行下列命令即可安装 Node.js。\n\n```bash\n$ nvm install stable\n```\n\n## Windows平台\n\n建议使用`.msi`安装程序进行安装。推荐勾选`Add to PATH`可以自动添加到环境变量，方便全局使用相关命令。\n","data":{"title":"安装Node.js和npm的最佳实践","date":"2017-11-14","tags":["NodeJS","JavaScript","Linux","Ubuntu"],"category":"Frontend"},"isEmpty":false,"excerpt":""},{"id":"swagger","file":"swagger.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e创建SwaggerUI渲染需要的JSON\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e首先为项目添加生成JSON的库：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edependencies {\n    compile \"io.springfox:springfox-swagger2:2.7.0\"\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSwaggerConfig\u003c/code\u003e类\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\n@EnableSwagger2\npublic class SwaggerConfig {\n\n    @Bean\n    public Docket generateDocket(){\n        return new Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .paths(paths()) // and by paths\n                .build()\n                .apiInfo(apiInfo());\n    }\n\n\n    //Here is an example where we select any api that matches one of these paths\n    private Predicate\u0026#x3C;String\u003e paths() {\n        return input -\u003e input.matches(\".api.*\");\n    }\n\n\n    private ApiInfo apiInfo() {\n        return new ApiInfo(\"王郁的API文档\",\n                \"提供App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                new Contact(\"王郁\",\"wycode.cn\",\"wangyu0503@gmail.com\"),\n                \"wycode.cn All Right Reserved\",\n                \"http://wycode.cn\",\n                new ArrayList\u0026#x3C;\u003e());\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e访问\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttp://localhost:8080/v2/api-docs\u003c/code\u003e可以看到JSON即说明配置成功：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-JSON px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n    \"swagger\": \"2.0\",\n    \"info\": {\n        \"description\": \"提供App测试及独立APP研发\",\n        \"version\": \"2.0\",\n        \"title\": \"王郁的API文档\",\n        \"termsOfService\": \"http://wycode.cn\",\n        \"contact\": {},\n        \"license\": {}\n    },\n    \"host\": \"localhost:8080\",\n    \"basePath\": \"/\",\n    \"tags\": [],\n    \"paths\": {\n        \"/api/hello\": {\n            \"get\": {},\n            \"head\": {},\n            \"post\": {},\n            \"put\": {},\n            \"delete\": {},\n            \"options\": {},\n            \"patch\": {}\n        }\n    },\n    \"definitions\": {}\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003c
