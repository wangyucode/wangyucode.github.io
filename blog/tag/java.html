m in = new BufferedInputStream(urlConnection.getInputStream());\n            result = readStream(in);\n        } finally {\n            urlConnection.disconnect();\n        }\n        return result;\n    }\n\n    private String readStream(BufferedInputStream in) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(in));\n        StringBuilder sb = new StringBuilder();\n        String line;\n        try {\n            while ((line = reader.readLine()) != null) {\n                sb.append(line).append(\"\\n\");\n            }\n        } catch (IOException e) {\n            e.printStackTrace();\n        } finally {\n            try {\n                in.close();\n            } catch (IOException e) {\n                e.printStackTrace();\n            }\n        }\n        return sb.toString();\n    }\n```\n\n## 变换操作\n\n通常的，我们在请求网络后要对服务器返回的字符串进行解析，这时我们可以使用RxJava的`Transforming`操作，在返回前将JSON String转为实体类。\n\n```Java\nObservable.create((ObservableOnSubscribe\u003cString\u003e) emitter -\u003e emitter.onNext(httpRequest(\"https://wycode.cn/web/api/public/hello?message=Hello\"))) //1.\n                .map(s -\u003e JSON.parseObject(s,Message.class)) //解析JSON\n                .subscribeOn(Schedulers.io()) //2.\n                .observeOn(AndroidSchedulers.mainThread()) //3.\n                .subscribe(message -\u003e textView.setText(message.message)); //4.\n```\n\n可以看到在原有代码几乎没变的情况下，加上1行代码就实现了将Json转为实体再处理的需求。这就是RxJava的魅力。\n\n完整源码在这里：https://github.com/wangyucode/rxjava\n\n而以上也仅仅用到了RxJava的冰山一角，还有各种各样的函数来满足各种各样的需求。\n\n函数列表在这里：http://reactivex.io/documentation/operators.html\n","data":{"title":"RxJava入门","date":"2018-01-20","tags":["RxJava","Java"],"category":"Languages"},"isEmpty":false,"excerpt":"\n\u003e RxJava是`ReactiveX`的Java分支，除了Java版，`ReactiveX`还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\n\n\n\u003e ReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为`响应式编程`，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上`Lambda`表达式和链式编程，让程序变得更加简洁优雅。\n\n"},{"id":"web-framework","file":"web-framework.md","excerptHtml":"\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eSpring Boot能够创建独立的Spring应用程序，在云计算，分布式流行的今天，它提供了一种非常契合目前web开发需求的解决方案，是Java开发web应用的不二选择。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eSpring Security是一款功能强大，可定制的身份验证和访问控制框架。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eH2数据库是一个轻量级的数据库引擎，开源，快速，它可以嵌入到Java程序中，作为内存数据库，也可以持久化，并提供了一个web程序，可以可视化操作数据。使用H2的还有一个重要原因是我的服务器只有512M内存，我无法使用MySQL这样的重量级数据库。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eThymeleaf是一个后台模版引擎，它是JSP的完美替代品，在快速渲染网页的基础上，它不会改变HTML代码结构，从而前端工程师仍然可以用假数据预览。Demo页面可以给后台人员直接使用。（当然并没有前端工程师，不过后期我会使用Vue做一个前后端分离的系统）\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n","contentHtml":"\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eSpring Boot能够创建独立的Spring应用程序，在云计算，分布式流行的今天，它提供了一种非常契合目前web开发需求的解决方案，是Java开发web应用的不二选择。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eSpring Security是一款功能强大，可定制的身份验证和访问控制框架。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eH2数据库是一个轻量级的数据库引擎，开源，快速，它可以嵌入到Java程序中，作为内存数据库，也可以持久化，并提供了一个web程序，可以可视化操作数据。使用H2的还有一个重要原因是我的服务器只有512M内存，我无法使用MySQL这样的重量级数据库。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eThymeleaf是一个后台模版引擎，它是JSP的完美替代品，在快速渲染网页的基础上，它不会改变HTML代码结构，从而前端工程师仍然可以用假数据预览。Demo页面可以给后台人员直接使用。（当然并没有前端工程师，不过后期我会使用Vue做一个前后端分离的系统）\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e先偷个懒吧，直接上github仓库。。。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ca href=\"https://github.com/wangyucode/WebFramework\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/WebFramework\u003c/a\u003e\u003c/p\u003e\n","content":"\n- Spring Boot能够创建独立的Spring应用程序，在云计算，分布式流行的今天，它提供了一种非常契合目前web开发需求的解决方案，是Java开发web应用的不二选择。\n\n- Spring Security是一款功能强大，可定制的身份验证和访问控制框架。\n\n- H2数据库是一个轻量级的数据库引擎，开源，快速，它可以嵌入到Java程序中，作为内存数据库，也可以持久化，并提供了一个web程序，可以可视化操作数据。使用H2的还有一个重要原因是我的服务器只有512M内存，我无法使用MySQL这样的重量级数据库。\n\n- Thymeleaf是一个后台模版引擎，它是JSP的完美替代品，在快速渲染网页的基础上，它不会改变HTML代码结构，从而前端工程师仍然可以用假数据预览。Demo页面可以给后台人员直接使用。（当然并没有前端工程师，不过后期我会使用Vue做一个前后端分离的系统）\n\n\u003c!--more--\u003e\n\n\n先偷个懒吧，直接上github仓库。。。\n\n[https://github.com/wangyucode/WebFramework](https://github.com/wangyucode/WebFramework)\n","data":{"title":"Spring Boot + Spring Security + H2 + Thymeleaf做一个后台管理系统","date":"2017-10-26","tags":["Spring","Java","Thymeleaf"],"category":"Backend"},"isEmpty":false,"excerpt":"\n- Spring Boot能够创建独立的Spring应用程序，在云计算，分布式流行的今天，它提供了一种非常契合目前web开发需求的解决方案，是Java开发web应用的不二选择。\n\n- Spring Security是一款功能强大，可定制的身份验证和访问控制框架。\n\n- H2数据库是一个轻量级的数据库引擎，开源，快速，它可以嵌入到Java程序中，作为内存数据库，也可以持久化，并提供了一个web程序，可以可视化操作数据。使用H2的还有一个重要原因是我的服务器只有512M内存，我无法使用MySQL这样的重量级数据库。\n\n- Thymeleaf是一个后台模版引擎，它是JSP的完美替代品，在快速渲染网页的基础上，它不会改变HTML代码结构，从而前端工程师仍然可以用假数据预览。Demo页面可以给后台人员直接使用。（当然并没有前端工程师，不过后期我会使用Vue做一个前后端分离的系统）\n\n"},{"id":"swagger","file":"swagger.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e创建SwaggerUI渲染需要的JSON\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e首先为项目添加生成JSON的库：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edependencies {\n    compile \"io.springfox:springfox-swagger2:2.7.0\"\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSwaggerConfig\u003c/code\u003e类\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\n@EnableSwagger2\npublic class SwaggerConfig {\n\n    @Bean\n    public Docket generateDocket(){\n        return new Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .paths(paths()) // and by paths\n                .build()\n                .apiInfo(apiInfo());\n    }\n\n\n    //Here is an example where we select any api that matches one of these paths\n    private Predicate\u0026#x3C;String\u003e paths() {\n        return input -\u003e input.matches(\".api.*\");\n    }\n\n\n    private ApiInfo apiInfo() {\n        return new ApiInfo(\"王郁的API文档\",\n                \"提供App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                new Contact(\"王郁\",\"wycode.cn\",\"wangyu0503@gmail.com\"),\n                \"wycode.cn All Right Reserved\",\n                \"http://wycode.cn\",\n                new ArrayList\u0026#x3C;\u003e());\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e访问\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttp://localhost:8080/v2/api-docs\u003c/code\u003e可以看到JSON即说明配置成功：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-JSON px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n    \"swagger\": \"2.0\",\n    \"info\": {\n        \"description\": \"提供App测试及独立APP研发\",\n        \"version\": \"2.0\",\n        \"title\": \"王郁的API文档\",\n        \"termsOfService\": \"http://wycode.cn\",\n        \"contact\": {},\n        \"license\": {}\n    },\n    \"host\": \"localhost:8080\",\n    \"basePath\": \"/\",\n    \"tags\": [],\n    \"paths\": {\n        \"/api/hello\": {\n            \"get\": {},\n            \"head\": {},\n            \"post\": {},\n            \"put\": {},\n            \"delete\": {},\n            \"options\": {},\n            \"patch\": {}\n        }\n    },\n    \"definitions\": {}\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e添加SwaggerUI包\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e从\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSwaggerUI\u003c/code\u003e的github上下载最新版，将里面的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edist\u003c/code\u003e文件夹，放入我们工程的静态页面目录\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e因为我们要修改\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e，所以不能使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewebjars\u003c/code\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e对\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e的常量\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eui\u003c/code\u003e做如下更改\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-JavaScript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e// Build a system\n  const ui = SwaggerUIBundle({\n    url: \"/v2/api-docs\", //API的JSON地址\n    dom_id: '#swagger-ui',\n    deepLinking: true,\n    presets: [\n      SwaggerUIBundle.presets.apis,\n      SwaggerUIStandalonePreset\n    ],\n    plugins: [\n      SwaggerUIBundle.plugins.DownloadUrl\n    ],\n    layout: \"StandaloneLayout\"\n  })\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e大功告成！\u003c/h2\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e添加文档注释\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实体注解\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@ApiModel(value = \"Hello 消息\",description = \"Hello接口返回的消息实体\")\npublic class Hello {\n\n    @ApiModelProperty(\"消息\")\n    private String message;\n\n    ...\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e接口注解\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Api(value = \"Hello\", description = \"第一个api\",tags = \"Hello\")\n@RestController\npublic class HelloController {\n\n    @ApiOperation(value = \"Say Hello\", produces = \"application/json \")\n    @RequestMapping(\"/api/hello\")\n    public Hello hello(@ApiParam(value = \"消息\",defaultValue = \"Hello World!\") @RequestParam(name = \"message\",defaultValue = \"Hello World!\")String message){\n        return  new Hello(\"message is : \"+ message);\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e 本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\n\n\u003c!--more--\u003e\n## 创建SwaggerUI渲染需要的JSON\n- 首先为项目添加生成JSON的库：\n\n```\ndependencies {\n    compile \"io.springfox:springfox-swagger2:2.7.0\"\n}\n```\n- 添加`SwaggerConfig`类\n\n```java\n@Configuration\n@EnableSwagger2\npublic class SwaggerConfig {\n\n    @Bean\n    public Docket generateDocket(){\n        return new Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .paths(paths()) // and by paths\n                .build()\n                .apiInfo(apiInfo());\n    }\n\n\n    //Here is an example where we select any api that matches one of these paths\n    private Predicate\u003cString\u003e paths() {\n        return input -\u003e input.matches(\".api.*\");\n    }\n\n\n    private ApiInfo apiInfo() {\n        return new ApiInfo(\"王郁的API文档\",\n                \"提供App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                new Contact(\"王郁\",\"wycode.cn\",\"wangyu0503@gmail.com\"),\n                \"wycode.cn All Right Reserved\",\n                \"http://wycode.cn\",\n                new ArrayList\u003c\u003e());\n    }\n}\n```\n\n- 访问`http://localhost:8080/v2/api-docs`可以看到JSON即说明配置成功：\n\n```JSON\n{\n    \"swagger\": \"2.0\",\n    \"info\": {\n        \"description\": \"提供App测试及独立APP研发\",\n        \"version\": \"2.0\",\n        \"title\": \"王郁的API文档\",\n        \"termsOfService\": \"http://wycode.cn\",\n        \"contact\": {},\n        \"license\": {}\n    },\n    \"host\": \"localhost:8080\",\n    \"basePath\": \"/\",\n    \"tags\": [],\n    \"paths\": {\n        \"/api/hello\": {\n            \"get\": {},\n            \"head\": {},\n            \"post\": {},\n            \"put\": {},\n            \"delete\": {},\n            \"options\": {},\n            \"patch\": {}\n        }\n    },\n    \"definitions\": {}\n}\n```\n\n- 添加SwaggerUI包\n\n从`SwaggerUI`的github上下载最新版，将里面的`dist`文件夹，放入我们工程的静态页面目录\n\n\u003e 因为我们要修改`index.html`，所以不能使用`webjars`\n\n对`index.html`的常量`ui`做如下更改\n\n```JavaScript\n// Build a system\n  const ui = SwaggerUIBundle({\n    url: \"/v2/api-docs\", //API的JSON地址\n    dom_id: '#swagger-ui',\n    deepLinking: true,\n    presets: [\n      SwaggerUIBundle.presets.apis,\n      SwaggerUIStandalonePreset\n    ],\n    plugins: [\n      SwaggerUIBundle.plugins.DownloadUrl\n    ],\n    layout: \"StandaloneLayout\"\n  })\n```\n\n\n## 大功告成！\n\n## 添加文档注释\n\n- 实体注解\n\n```Java\n@ApiModel(value = \"Hello 消息\",description = \"Hello接口返回的消息实体\")\npublic class Hello {\n\n    @ApiModelProperty(\"消息\")\n    private String message;\n\n    ...\n}\n```\n\n- 接口注解\n\n```java\n@Api(value = \"Hello\", description = \"第一个api\",tags = \"Hello\")\n@RestController\npublic class HelloController {\n\n    @ApiOperation(value = \"Say Hello\", produces = \"application/json \")\n    @RequestMapping(\"/api/hello\")\n    public Hello hello(@ApiParam(value = \"消息\",defaultValue = \"Hello World!\") @RequestParam(name = \"message\",defaultValue = \"Hello World!\")String message){\n        return  new Hello(\"message is : \"+ message);\n    }\n}\n```\n","data":{"title":"使用swagger为Spring REST API生成在线文档","date":"2017-10-23","tags":["Spring","Java","Swagger","JavaScript"],"category":"Backend"},"isEmpty":false,"excerpt":"\n\u003e 本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\n\n"},{"id":"spring-cors","file":"spring-cors.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJavaScript在跨域请求时会碰到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNo 'Access-Control-Allow-Origin' header is present on the requested resource.\u003c/code\u003e。是因为服务器不支持\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCross-origin resource sharing (CORS)\u003c/code\u003e这篇教程教你如何为Java Spring后台配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCORS\u003c/code\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJavaScript在跨域请求时会碰到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNo 'Access-Control-Allow-Origin' header is present on the requested resource.\u003c/code\u003e。是因为服务器不支持\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCross-origin resource sharing (CORS)\u003c/code\u003e这篇教程教你如何为Java Spring后台配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCORS\u003c/code\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@CrossOrigin\u003c/code\u003e注解\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e注解相关方法即可。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e全局配置\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\npublic class MyConfiguration {\n\n    @Bean\n    public WebMvcConfigurer corsConfigurer() {\n        return new WebMvcConfigurerAdapter() {\n            @Override\n            public void addCorsMappings(CorsRegistry registry) {\n                registry.addMapping(\"/api/**\");\n            }\n        };\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e JavaScript在跨域请求时会碰到`No 'Access-Control-Allow-Origin' header is present on the requested resource.`。是因为服务器不支持`Cross-origin resource sharing (CORS)`这篇教程教你如何为Java Spring后台配置`CORS`\n\n\u003c!--more--\u003e\n\n## 使用`@CrossOrigin`注解\n\n注解相关方法即可。\n\n## 全局配置\n\n```java\n@Configuration\npublic class MyConfiguration {\n\n    @Bean\n    public WebMvcConfigurer corsConfigurer() {\n        return new WebMvcConfigurerAdapter() {\n            @Override\n            public void addCorsMappings(CorsRegistry registry) {\n                registry.addMapping(\"/api/**\");\n            }\n        };\n    }\n}\n```\n","data":{"title":"Spring中启用CORS","date":"2017-07-27","tags":["Spring","Java","CORS"],"category":"Backend"},"isEmpty":false,"excerpt":"\n\u003e JavaScript在跨域请求时会碰到`No 'Access-Control-Allow-Origin' header is present on the requested resource.`。是因为服务器不支持`Cross-origin resource sharing (CORS)`这篇教程教你如何为Java Spring后台配置`CORS`\n\n"},{"id":"spring-jpa","file":"spring-jpa.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eSpring JPA框架提供了非常强大的数据库持久化方案，仅仅通过定义接口就能实现很多查询功能，甚至不用写具体实现代码。通过接口定义的抽象方法Spring JPA就知道该做什么了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e下面将基本的使用总结如下：\u003c/p\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eSpring JPA框架提供了非常强大的数据库持久化方案，仅仅通过定义接口就能实现很多查询功能，甚至不用写具体实现代码。通过接口定义的抽象方法Spring JPA就知道该做什么了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e下面将基本的使用总结如下：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e接口能力\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e定义接口继承\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCrudRepository\u0026#x3C;T, ID\u003e\u003c/code\u003e即可获得增删改查能力；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e定义接口继承\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ePagingAndSortingRepository\u0026#x3C;T, ID\u003e\u003c/code\u003e获得增删改查能力的同时增加分页查询能力；\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e声明后可以直接使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@Autowired\u003c/code\u003e注入使用，无需实现。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关键词\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003efind…By\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecount…By\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDistinct\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIgnoreCase\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAllIgnoreCase\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAnd\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOr\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBetween\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLessThan\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGreaterThan\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLike \u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOrderBy\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAsc\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDesc\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOrderBy\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e一些例子\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e//简单示例\nList\u0026#x3C;Person\u003e findByEmailAddressAndLastname(EmailAddress emailAddress, String lastname);\n\n// 去重标志\nList\u0026#x3C;Person\u003e findDistinctPeopleByLastnameOrFirstname(String lastname, String firstname);\nList\u0026#x3C;Person\u003e findPeopleDistinctByLastnameOrFirstname(String lastname, String firstname);\n\n// 对某个字段忽略大小写\nList\u0026#x3C;Person\u003e findByLastnameIgnoreCase(String lastname);\n\n// 对所有字段忽略大小写\nList\u0026#x3C;Person\u003e findByLastnameAndFirstnameAllIgnoreCase(String lastname, String firstname);\n\n// 静态 ORDER BY 查询\nList\u0026#x3C;Person\u003e findByLastnameOrderByFirstnameAsc(String lastname);\nList\u0026#x3C;Person\u003e findByLastnameOrderByFirstnameDesc(String lastname);\n\n//分页\nPage\u0026#x3C;User\u003e findByLastname(String lastname, Pageable pageable);\nSlice\u0026#x3C;User\u003e findByLastname(String lastname, Pageable pageable);\nList\u0026#x3C;User\u003e findByLastname(String lastname, Sort sort);\nList\u0026#x3C;User\u003e findByLastname(String lastname, Pageable pageable);\n\n//限制查询结果\nUser findFirstByOrderByLastnameAsc();\nUser findTopByOrderByAgeDesc();\nPage\u0026#x3C;User\u003e queryFirst10ByLastname(String lastname, Pageable pageable);\nSlice\u0026#x3C;User\u003e findTop3ByLastname(String lastname, Pageable pageable);\nList\u0026#x3C;User\u003e findFirst10ByLastname(String lastname, Sort sort);\nList\u0026#x3C;User\u003e findTop10ByLastname(String lastname, Pageable pageable);\n\n//通过userId和gameId查询GameScore实体\nGameScore findByUserIdAndGameId(String userId,int gameId);\n//通过gameId查询分页数据，并根据score字段倒序排序\nList\u0026#x3C;GameScore\u003e findByGameIdOrderByScoreDesc(int gameId,Pageable page);\n//通过gameId计数，条件是大于传入的score\nint countByGameIdAndScoreGreaterThan(int gameId,long score);\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e Spring JPA框架提供了非常强大的数据库持久化方案，仅仅通过定义接口就能实现很多查询功能，甚至不用写具体实现代码。通过接口定义的抽象方法Spring JPA就知道该做什么了。\n\n下面将基本的使用总结如下：\n\n\u003c!--more--\u003e\n## 接口能力\n\n- 定义接口继承`CrudRepository\u003cT, ID\u003e`即可获得增删改查能力；\n- 定义接口继承`PagingAndSortingRepository\u003cT, ID\u003e`获得增删改查能力的同时增加分页查询能力；\n\n声明后可以直接使用`@Autowired`注入使用，无需实现。\n\n## 关键词\n- `find…By`\n- `count…By`\n- `Distinct`\n- `IgnoreCase`\n- `AllIgnoreCase`\n- `And`\n- `Or`\n- `Between`\n- `LessThan`\n- `GreaterThan`\n- `Like `\n- `OrderBy`\n- `Asc`\n- `Desc`\n- `OrderBy`\n\n## 一些例子\n\n```java\n//简单示例\nList\u003cPerson\u003e findByEmailAddressAndLastname(EmailAddress emailAddress, String lastname);\n\n// 去重标志\nList\u003cPerson\u003e findDistinctPeopleByLastnameOrFirstname(String lastname, String firstname);\nList\u003cPerson\u003e findPeopleDistinctByLastnameOrFirstname(String lastname, String firstname);\n\n// 对某个字段忽略大小写\nList\u003cPerson\u003e findByLastnameIgnoreCase(String lastname);\n\n// 对所有字段忽略大小写\nList\u003cPerson\u003e findByLastnameAndFirstnameAllIgnoreCase(String lastname, String firstname);\n\n// 静态 ORDER BY 查询\nList\u003cPerson\u003e findByLastnameOrderByFirstnameAsc(String lastname);\nList\u003cPerson\u003e findByLastnameOrderByFirstnameDesc(String lastname);\n\n//分页\nPage\u003cUser\u003e findByLastname(String lastname, Pageable pageable);\nSlice\u003cUser\u003e findByLastname(String lastname, Pageable pageable);\nList\u003cUser\u003e findByLastname(String lastname, Sort sort);\nList\u003cUser\u003e findByLastname(String lastname, Pageable pageable);\n\n//限制查询结果\nUser findFirstByOrderByLastnameAsc();\nUser findTopByOrderByAgeDesc();\nPage\u003cUser\u003e queryFirst10ByLastname(String lastname, Pageable pageable);\nSlice\u003cUser\u003e findTop3ByLastname(String lastname, Pageable pageable);\nList\u003cUser\u003e findFirst10ByLastname(String lastname, Sort sort);\nList\u003cUser\u003e findTop10ByLastname(String lastname, Pageable pageable);\n\n//通过userId和gameId查询GameScore实体\nGameScore findByUserIdAndGameId(String userId,int gameId);\n//通过gameId查询分页数据，并根据score字段倒序排序\nList\u003cGameScore\u003e findByGameIdOrderByScoreDesc(int gameId,Pageable page);\n//通过gameId计数，条件是大于传入的score\nint countByGameIdAndScoreGreaterThan(int gameId,long score);\n```\n","data":{"title":"使用SpringJPA框架","date":"2017-07-11","tags":["Spring","JPA","Java"],"category":"Backend"},"isEmpty":false,"excerpt":"\n\u003e Spring JPA框架提供了非常强大的数据库持久化方案，仅仅通过定义接口就能实现很多查询功能，甚至不用写具体实现代码。通过接口定义的抽象方法Spring JPA就知道该做什么了。\n\n下面将基本的使用总结如下：\n\n"},{"id":"spring-properties","file":"spring-properties.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eSpring框架在运行时会自动查找\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e配置文件，在这个文件中进行项目相关配置属性，例如数据库地址密码等。当然也支持自定义属性。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eSpring框架在运行时会自动查找\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e配置文件，在这个文件中进行项目相关配置属性，例如数据库地址密码等。当然也支持自定义属性。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e位置\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e可以放置在以下目录\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e当前目录下的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/config\u003c/code\u003e目录中\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e当前目录\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eclasspath下的 /config包\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eclasspath\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eresource文件夹\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e自定义属性的使用\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e添加自定义属性\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emyProperties = myValue\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@Value\u003c/code\u003e注解即可注入使用\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e    @Value(\"${myProperties}\")\n    String value; //value = \"myValue\";\n\u003c/code\u003e\u003c/pre\u003e\n\u003col start=\"3\" class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e还可以使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ConfigurationProperties(\"foo\")\u003c/code\u003e注入POJO实体\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@ConfigurationProperties(\"foo\")\npublic class Foo｛\n    private boolean enabled;\n    public boolean isEnabled() { ... }\n    public void setEnabled(boolean enabled) { ... }\n｝\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e添加属性\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003efoo.enabled = true\u003c/code\u003e即可\u003c/p\u003e\n","content":"\n\u003e Spring框架在运行时会自动查找`application.properties`配置文件，在这个文件中进行项目相关配置属性，例如数据库地址密码等。当然也支持自定义属性。\n\n\u003c!--more--\u003e\n\n## 位置\n`application.properties`可以放置在以下目录\n\n- 当前目录下的`/config`目录中\n- 当前目录\n- classpath下的 /config包\n- classpath\n- **resource文件夹**\n\n## 自定义属性的使用\n\n1. 在`application.properties`添加自定义属性`myProperties = myValue`\n2. 使用`@Value`注解即可注入使用\n```java\n    @Value(\"${myProperties}\")\n    String value; //value = \"myValue\";\n```\n3. 还可以使用`@ConfigurationProperties(\"foo\")`注入POJO实体\n```java\n@ConfigurationProperties(\"foo\")\npublic class Foo｛\n    private boolean enabled;\n    public boolean isEnabled() { ... }\n    public void setEnabled(boolean enabled) { ... }\n｝\n```\n在`application.properties`添加属性`foo.enabled = true`即可\n","data":{"title":"Spring中的application.properties","date":"2017-07-11","tags":["Spring","Java"],"category":"Backend"},"isEmpty":false,"excerpt":"\n\u003e Spring框架在运行时会自动查找`application.properties`配置文件，在这个文件中进行项目相关配置属性，例如数据库地址密码等。当然也支持自定义属性。\n\n"}],"cid":"java"},"__N_SSG":true},"page":"/blog/tag/[cid]","query":{"cid":"java"},"buildId":"7YMuoTtyITfiinBiv1T76","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
