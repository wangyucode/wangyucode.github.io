 l: Int = if (b != null) b.length else -1\n//可以简写为 ?: （Elvis Operator）后面也可以跟reture和throw语句\nval l = b?.length ?: -1\n\n//安全转型\nval aInt: Int? = a as? Int\n\n//可以为空的数组，以及非空筛选\nval nullableList: List\u0026#x3C;Int?\u003e = listOf(1, 2, null, 4)\nval intList: List\u0026#x3C;Int\u003e = nullableList.filterNotNull()\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003e基础数据类型没有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCharacter\u003c/code\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eChar\u003c/code\u003e被单独处理，不是数字，不能和数字进行比较，可以使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etoInt()\u003c/code\u003e函数\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003e没有8进制\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003e数组类型不可变，不能将\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eArray\u0026#x3C;String\u003e\u003c/code\u003e赋给\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eArray\u0026#x3C;Any\u003e\u003c/code\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003e以下是位运算，只支持\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eInt\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLong\u003c/code\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eshl(bits) – signed shift left (Java's \u0026#x3C;\u0026#x3C;)\nshr(bits) – signed shift right (Java's \u003e\u003e)\nushr(bits) – unsigned shift right (Java's \u003e\u003e\u003e)\nand(bits) – bitwise and\nor(bits) – bitwise or\nxor(bits) – bitwise xor\ninv() – bitwise inversion\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e没有静态方法，可以使用 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eobject declaration\u003c/code\u003e替代\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n\u003e 在Google I/O 2017上Google正式宣布Kotlin成为Android开发的官方新语言，Kotlin得到了Google的背书，随着Android O和Android Studio3.0的正式发布，Kotlin语言的春天可能马上就要来临了。\n\n![Kotlin](/images/20170815_kotlin.png)\n\n\u003c!--more--\u003e\n\n## Kotlin\n\nKotlin是基于JVM，静态类型的跨平台语言，在Java语言的基础上引入了很多现代语言的新特性。支持后台Server端、JavaScript前后端、及移动Android端开发。\n\n## 新特性\n\n- Null Safety\n\nKotlin解决了Java错误量最多的`NullPointerException`\n\n```\nvar a: String = \"abc\"\na = null // error！对于常量，编译时就不能为空，否则编译出错\n\nvar b: String? = \"abc\" //String? 可为空的 String 类型\nb = null // ok！\n\nval l = b.length // error: variable 'b' can be null\n\n//除了传统的if(b!=null)判空后再调用之外还有安全引用方式\n\nb?.length //\n\n//对于以下操作\nval l: Int = if (b != null) b.length else -1\n//可以简写为 ?: （Elvis Operator）后面也可以跟reture和throw语句\nval l = b?.length ?: -1\n\n//安全转型\nval aInt: Int? = a as? Int\n\n//可以为空的数组，以及非空筛选\nval nullableList: List\u003cInt?\u003e = listOf(1, 2, null, 4)\nval intList: List\u003cInt\u003e = nullableList.filterNotNull()\n```\n\n- 基础数据类型没有`Character`\n\n- `Char`被单独处理，不是数字，不能和数字进行比较，可以使用`toInt()`函数\n\n- 没有8进制\n\n- 数组类型不可变，不能将`Array\u003cString\u003e`赋给`Array\u003cAny\u003e`\n\n- 以下是位运算，只支持`Int`和`Long`\n\n```kotlin\nshl(bits) – signed shift left (Java's \u003c\u003c)\nshr(bits) – signed shift right (Java's \u003e\u003e)\nushr(bits) – unsigned shift right (Java's \u003e\u003e\u003e)\nand(bits) – bitwise and\nor(bits) – bitwise or\nxor(bits) – bitwise xor\ninv() – bitwise inversion\n```\n- 没有静态方法，可以使用 `object declaration`替代\n","data":{"title":"Kotlin入门","date":"2017-07-27","tags":["Kotlin"],"category":"Languages"},"isEmpty":false,"excerpt":"\n\u003e 在Google I/O 2017上Google正式宣布Kotlin成为Android开发的官方新语言，Kotlin得到了Google的背书，随着Android O和Android Studio3.0的正式发布，Kotlin语言的春天可能马上就要来临了。\n\n![Kotlin](/images/20170815_kotlin.png)\n\n"}],"cid":"kotlin"},"__N_SSG":true},"page":"/blog/tag/[cid]","query":{"cid":"kotlin"},"buildId":"NDkQWnMtEcy0IDQqDGEkS","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
