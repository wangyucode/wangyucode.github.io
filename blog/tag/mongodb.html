text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;DATABASE\u003e\u003c/code\u003e数据库dump到host机器的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecollections.archive\u003c/code\u003e文件中。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e--archive\u003c/code\u003e会dump所有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecollection\u003c/code\u003e到一个文件。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emongodump\u003c/code\u003e命令不提供目标路径的话会将dump结果输出到标准输出，这里使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u003e\u003c/code\u003e重定向输出到host的文件。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e还原\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这里使用host机器上的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecollections.archive\u003c/code\u003e文件进行还原。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edocker exec -i \u0026#x3C;CONTAINER_NAME\u003e mongorestore --archive \u0026#x3C; ./mongo/collections.archive\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e--archive\u003c/code\u003e模式导出的备份文件还原时必须也要加上\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e--archive\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emongorestore\u003c/code\u003e命令不提供源路径的话会使用标准输入，这里使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;\u003c/code\u003e重定向host的文件作为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emongorestore\u003c/code\u003e的输入。\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n![MongoDB](/images/20201204_mongodb.svg)\n\n\u003e 本文介绍如何使用两行简单的命令来执行备份和还原Docker容器中MongoDB的数据库数据。\n\n\u003c!--more--\u003e\n\n## 备份\n\n备份MongoDB有多种方法，其中比较简单的就是使用`mongodump`。\n\n```bash\ndocker exec -i \u003cCONTAINER_NAME\u003e mongodump -d \u003cDATABASE\u003e --archive \u003e ./mongo/collections.archive\n```\n\n- 以上命令会将`\u003cCONTAINER_NAME\u003e`容器中的`\u003cDATABASE\u003e`数据库dump到host机器的`collections.archive`文件中。\n- `--archive`会dump所有`collection`到一个文件。\n- `mongodump`命令不提供目标路径的话会将dump结果输出到标准输出，这里使用`\u003e`重定向输出到host的文件。\n\n## 还原\n\n这里使用host机器上的`collections.archive`文件进行还原。\n\n```bash\ndocker exec -i \u003cCONTAINER_NAME\u003e mongorestore --archive \u003c ./mongo/collections.archive\n```\n\n- `--archive`模式导出的备份文件还原时必须也要加上`--archive`\n- `mongorestore`命令不提供源路径的话会使用标准输入，这里使用`\u003c`重定向host的文件作为`mongorestore`的输入。\n\n","data":{"title":"备份和还原Docker容器中的MongoDB数据","date":"2020-12-05","tags":["Docker","MongoDB"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![MongoDB](/images/20201204_mongodb.svg)\n\n\u003e 本文介绍如何使用两行简单的命令来执行备份和还原Docker容器中MongoDB的数据库数据。\n\n"}],"cid":"mongodb"},"__N_SSG":true},"page":"/blog/tag/[cid]","query":{"cid":"mongodb"},"buildId":"7YMuoTtyITfiinBiv1T76","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
