<!DOCTYPE html><html lang="zh-CN"><head><meta charSet="utf-8"/><title>王郁的小站</title><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/><meta name="next-head-count" content="3"/><link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml"/><meta name="description" content="欢迎光临王郁的小站"/><meta property="og:image" content="https://og-image.vercel.app/%E7%8E%8B%E9%83%81%E7%9A%84%E5%B0%8F%E7%AB%99.png?theme=light&amp;md=0&amp;fontSize=75px&amp;images=https%3A%2F%2Fassets.vercel.com%2Fimage%2Fupload%2Ffront%2Fassets%2Fdesign%2Fnextjs-black-logo.svg"/><meta name="og:title" content="王郁的小站"/><meta name="twitter:card" content="summary_large_image"/><link rel="preload" href="/_next/static/css/804786de35d6ea9b.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/804786de35d6ea9b.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-6af0e3c12b874bb0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-e14092e0d084b50d.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-bc0074f0f8514a28.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-80e5bb06d977ddb5.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/358-09e70898ee89de63.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/889-d516db97bb2485e1.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/blog/tag/%5Bcid%5D-9128515199082d83.js" defer="" crossorigin=""></script><script src="/_next/static/uFO1FMOoBQ2X-GM8G4ZfF/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/uFO1FMOoBQ2X-GM8G4ZfF/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"esm-node-ts","file":"esm-node-ts.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.w3cschool.cn/attachments/image/20170808/1502178281486445.png\" alt=\"nodejs\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eJavaScript的模块化方案经历了长时间的发展，最终于2015年在ES6实现了语言层面的标准化，即esModule（以下简称esm）, 现在JS社区开始拥抱esm，很多npm包仅采用esm发布。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而NodeJS一直依赖采用CommonJS的模块化方案，在最近发布的版本中也开始支持ems, 由于巨大的历史包袱，NodeJS并没有抛弃CommonJS，所以在NodeJS中实际支持两种模块化方式，esm和CommonJS.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此外，现在很多前端工程使用TypeScript开发，而TS的模块解析方式也需要进行一些配置，在这3者结合的过程中有很多坑，本文介绍将三者完美结合的最佳实践。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.w3cschool.cn/attachments/image/20170808/1502178281486445.png\" alt=\"nodejs\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eJavaScript的模块化方案经历了长时间的发展，最终于2015年在ES6实现了语言层面的标准化，即esModule（以下简称esm）, 现在JS社区开始拥抱esm，很多npm包仅采用esm发布。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而NodeJS一直依赖采用CommonJS的模块化方案，在最近发布的版本中也开始支持ems, 由于巨大的历史包袱，NodeJS并没有抛弃CommonJS，所以在NodeJS中实际支持两种模块化方式，esm和CommonJS.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此外，现在很多前端工程使用TypeScript开发，而TS的模块解析方式也需要进行一些配置，在这3者结合的过程中有很多坑，本文介绍将三者完美结合的最佳实践。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e同时引入CommonJS包和ESM包\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e为了测试我们同时引入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elodash\u003c/code\u003e的CommonJS版本和ESM版本\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpm i lodash-es lodash\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e在NodeJS中，模块作者除非显示指定使用esm方式加载模块：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.mjs\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epackage.json\u003c/code\u003e中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etype\u003c/code\u003e字段指定为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodule\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e--input-type\u003c/code\u003e标记\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e否则默认加载方式为CommonJS。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而上面的例子中\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elodash-es\u003c/code\u003e的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epackage.json\u003c/code\u003e中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etype\u003c/code\u003e就是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodule\u003c/code\u003e。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用CommonJS包\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e创建一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.js\u003c/code\u003e文件：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003econst _ = require('lodash');\nconsole.log(_.VERSION); // print '4.17.21'\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e以上是CommonJS的写法，很习以为常，能够正确打印。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用esm包\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e创建一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eesm.js\u003c/code\u003e文件：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eimport _ from 'lodash-es';\nconsole.log(_.VERSION);\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e第1个坑出现了, 报语法错误：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSyntaxError: Cannot use import statement outside a module\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e说无法在模块外部使用import语句，一旦一个文件有顶级(top-level)的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eimport\u003c/code\u003e或\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eexport\u003c/code\u003e，它会被当作一个模块，否则是一个脚本文件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e所以我们需要把这个文件变成esm，两种方式：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e重命名文件，修改扩展名为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.mjs\u003c/code\u003e;\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epackage.json\u003c/code\u003e中添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\"type\": \"module\"\u003c/code\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e但如果采用选项2，第2个坑就会出现了, 回去运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.js\u003c/code\u003e报错：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReferenceError: require is not defined in ES module scope, you can use import instead\u003c/code\u003e。\n说\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003erequire\u003c/code\u003e在esm中不支持，此时可以重命名\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.js\u003c/code\u003e后缀为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.cjs\u003c/code\u003e，告诉模块加载器，此文件以CommonJS加载。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e引入Typescript\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e安装TS：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpm i typescript ts-node -D\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003ets-node 可以在nodejs中直接运行ts文件而无需编译\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e然后将刚才的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eesm.js\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.cjs\u003c/code\u003e扩展名改为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.ts\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ets-node\u003c/code\u003e命令直接运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eesm.ts\u003c/code\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpx ts-node esm.ts\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e第3个坑出现了，扩展名不支持：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTypeError [ERR_UNKNOWN_FILE_EXTENSION]: Unknown file extension \".ts\" for xxx\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这是因为esm的默认扩展名是js而不是ts，此时我们需要：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ets-node --esm\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\"ts-node\": {\"esm\": true}\u003c/code\u003e到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etsconfig.json\u003c/code\u003e。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e如果采用方案1，第4个坑出现了，无法找到模块：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eerror TS7016: Could not find a declaration file for module 'lodash-es'\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时添加配置: \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\"esModuleInterop\": true\u003c/code\u003e到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etsconfig.json\u003c/code\u003e的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecompilerOptions\u003c/code\u003e中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e添加完成后第5个坑出现了，引用错误：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReferenceError: exports is not defined in ES module scope\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时添加配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodule\": \"ESNext\"\u003c/code\u003e到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etsconfig.json\u003c/code\u003e的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecompilerOptions\u003c/code\u003e中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e添加完成后第6个坑出现了，找不到模块：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReferenceError: exports is not defined in ES module scope\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时配置模块的解析方式为最新的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\"moduleResolution\": \"Node16\"\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e到此终于可以成功运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eesm.ts\u003c/code\u003e了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e返回去运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.ts\u003c/code\u003e:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpx ts-node common-js.ts\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e第7个坑出现了，它把我们的CommonJS模块当esm了：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReferenceError: require is not defined in ES module scope, you can use import instead\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时处于鱼和熊掌不可兼得，因为我们设置了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodule\": \"ESNext\"\u003c/code\u003e， 所以ts的编译结果会添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eexport {}\u003c/code\u003e，所以如果要在纯esm的工程中仍然要使用CommonJS，则使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.cjs\u003c/code\u003e作为扩展名即可。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e完整的代码在这里：\u003ca href=\"https://github.com/wangyucode/esm-node-ts\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/esm-node-ts\u003c/a\u003e\u003c/p\u003e\n","content":"\n![nodejs](https://www.w3cschool.cn/attachments/image/20170808/1502178281486445.png)\n\nJavaScript的模块化方案经历了长时间的发展，最终于2015年在ES6实现了语言层面的标准化，即esModule（以下简称esm）, 现在JS社区开始拥抱esm，很多npm包仅采用esm发布。\n\n而NodeJS一直依赖采用CommonJS的模块化方案，在最近发布的版本中也开始支持ems, 由于巨大的历史包袱，NodeJS并没有抛弃CommonJS，所以在NodeJS中实际支持两种模块化方式，esm和CommonJS.\n\n此外，现在很多前端工程使用TypeScript开发，而TS的模块解析方式也需要进行一些配置，在这3者结合的过程中有很多坑，本文介绍将三者完美结合的最佳实践。\n\n\u003c!--more--\u003e\n\n## 同时引入CommonJS包和ESM包\n\n为了测试我们同时引入`lodash`的CommonJS版本和ESM版本\n\n```bash\nnpm i lodash-es lodash\n```\n\n在NodeJS中，模块作者除非显示指定使用esm方式加载模块：\n\n- 使用`.mjs`\n- 在`package.json`中的`type`字段指定为`module`\n- 使用`--input-type`标记\n\n否则默认加载方式为CommonJS。\n\n而上面的例子中`lodash-es`的`package.json`中的`type`就是`module`。\n\n## 使用CommonJS包\n\n创建一个`common-js.js`文件：\n\n```javascript\nconst _ = require('lodash');\nconsole.log(_.VERSION); // print '4.17.21'\n```\n\n以上是CommonJS的写法，很习以为常，能够正确打印。\n\n## 使用esm包\n\n创建一个`esm.js`文件：\n\n```javascript\nimport _ from 'lodash-es';\nconsole.log(_.VERSION);\n```\n\n第1个坑出现了, 报语法错误：`SyntaxError: Cannot use import statement outside a module`\n\n说无法在模块外部使用import语句，一旦一个文件有顶级(top-level)的`import`或`export`，它会被当作一个模块，否则是一个脚本文件。\n\n所以我们需要把这个文件变成esm，两种方式：\n\n1. 重命名文件，修改扩展名为`.mjs`;\n2. 在`package.json`中添加`\"type\": \"module\"`\n\n但如果采用选项2，第2个坑就会出现了, 回去运行`common-js.js`报错：`ReferenceError: require is not defined in ES module scope, you can use import instead`。\n说`require`在esm中不支持，此时可以重命名`common-js.js`后缀为`.cjs`，告诉模块加载器，此文件以CommonJS加载。\n\n## 引入Typescript\n\n安装TS：\n\n```bash\nnpm i typescript ts-node -D\n```\n\n\u003e ts-node 可以在nodejs中直接运行ts文件而无需编译\n\n然后将刚才的`esm.js`和`common-js.cjs`扩展名改为`.ts`\n\n使用`ts-node`命令直接运行`esm.ts`\n\n```bash\nnpx ts-node esm.ts\n```\n\n第3个坑出现了，扩展名不支持：`TypeError [ERR_UNKNOWN_FILE_EXTENSION]: Unknown file extension \".ts\" for xxx`\n\n这是因为esm的默认扩展名是js而不是ts，此时我们需要：\n\n1. `ts-node --esm`\n2. 添加 `\"ts-node\": {\"esm\": true}`到`tsconfig.json`。\n\n如果采用方案1，第4个坑出现了，无法找到模块：`error TS7016: Could not find a declaration file for module 'lodash-es'`。\n\n此时添加配置: `\"esModuleInterop\": true`到`tsconfig.json`的`compilerOptions`中。\n\n添加完成后第5个坑出现了，引用错误：`ReferenceError: exports is not defined in ES module scope`\n\n此时添加配置`module\": \"ESNext\"`到`tsconfig.json`的`compilerOptions`中。\n\n添加完成后第6个坑出现了，找不到模块：`ReferenceError: exports is not defined in ES module scope`\n\n此时配置模块的解析方式为最新的`\"moduleResolution\": \"Node16\"`。\n\n到此终于可以成功运行`esm.ts`了。\n\n返回去运行`common-js.ts`:\n\n```bash\nnpx ts-node common-js.ts\n```\n\n第7个坑出现了，它把我们的CommonJS模块当esm了：`ReferenceError: require is not defined in ES module scope, you can use import instead`\n\n此时处于鱼和熊掌不可兼得，因为我们设置了`module\": \"ESNext\"`， 所以ts的编译结果会添加`export {}`，所以如果要在纯esm的工程中仍然要使用CommonJS，则使用`.cjs`作为扩展名即可。\n\n完整的代码在这里：https://github.com/wangyucode/esm-node-ts","data":{"title":"esModule + NodeJS + TypeScript 的工程配置","date":"2022-09-22","tags":["JavaScript","TypeScript","NodeJS"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![nodejs](https://www.w3cschool.cn/attachments/image/20170808/1502178281486445.png)\n\nJavaScript的模块化方案经历了长时间的发展，最终于2015年在ES6实现了语言层面的标准化，即esModule（以下简称esm）, 现在JS社区开始拥抱esm，很多npm包仅采用esm发布。\n\n而NodeJS一直依赖采用CommonJS的模块化方案，在最近发布的版本中也开始支持ems, 由于巨大的历史包袱，NodeJS并没有抛弃CommonJS，所以在NodeJS中实际支持两种模块化方式，esm和CommonJS.\n\n此外，现在很多前端工程使用TypeScript开发，而TS的模块解析方式也需要进行一些配置，在这3者结合的过程中有很多坑，本文介绍将三者完美结合的最佳实践。\n\n"},{"id":"ant-design-pro","file":"ant-design-pro.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg\" alt=\"ant-design\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design\u003c/strong\u003e由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e和 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAngular\u003c/code\u003e组件实现，用于开发和服务于企业级中后台产品。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design-Pro\u003c/strong\u003e是基于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAnt-Design\u003c/code\u003e的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e：现代化的JavaScript界面库\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edva\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRedux\u003c/code\u003e的数据流、状态管理框架\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUmiJS\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enextJS\u003c/code\u003e的react应用框架\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e本文从基础使用开始，逐步解析里面用到的技术细节。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg\" alt=\"ant-design\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design\u003c/strong\u003e由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e和 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAngular\u003c/code\u003e组件实现，用于开发和服务于企业级中后台产品。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design-Pro\u003c/strong\u003e是基于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAnt-Design\u003c/code\u003e的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e：现代化的JavaScript界面库\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edva\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRedux\u003c/code\u003e的数据流、状态管理框架\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUmiJS\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enextJS\u003c/code\u003e的react应用框架\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e本文从基础使用开始，逐步解析里面用到的技术细节。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e安装及启动在官网有说明，生成的基础工程目录结结构如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e├── config                   # umi 配置，包含路由，构建等配置\n├── mock                     # 本地模拟数据\n├── public                   # 公共资源目录\n│   └── favicon.png          # Favicon\n├── src                      # 代码目录\n│   ├── assets               # 本地静态资源\n│   ├── components           # 业务通用组件\n│   ├── e2e                  # 集成测试用例\n│   ├── layouts              # 通用布局\n│   ├── models               # 全局 dva model\n│   ├── pages                # 业务页面入口和常用模板\n│   ├── services             # 后台接口服务\n│   ├── utils                # 工具库\n│   ├── locales              # 国际化资源\n│   ├── global.less          # 全局样式\n│   └── global.js            # 全局 JS\n├── tests                    # 测试工具\n├── README.md                # readme\n└── package.json             # npm管理的清单\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于哈希路由\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e现代的前端框架都是单页面的(single-page application)，即用户访问的永远是根目录的index.html，这时网页地址如何展现就是一个问题。解决方案有2个：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e前端解决：使用哈希路由，即用户看到的地址栏URL是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e#\u003c/code\u003e分割的，如\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttps://wycode.cn/admin/#/users/123\u003c/code\u003e，实际访问仍然是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUmiJS\u003c/code\u003e配置如下\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eexport default {\n    ···\n    history: 'hash'\n    ···\n} as IConfig;  \n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e后端解决：使用重定向，即访问index以外的其它地址，都重定向到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enginx\u003c/code\u003e配置如下:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-nginx px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003elocation / {\n    try_files $uri $uri/ /index.html;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eUmiJS非根目录部署\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e如果工程不是部署在根目录，UmiJS的config做如下配置即可：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eexport default {\n    ···\n    base: 'admin'\n    ···\n} as IConfig;  \n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e**但是：**当配置为hash路由时且非根目录部署时，有可能你希望的首页是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttps://wycode.cn/admin/#/\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/users\u003c/code\u003e页是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttps://wycode.cn/admin/#/users\u003c/code\u003e则需要进行如下配置：\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eexport default {\n    ···\n    history: 'hash',\n    publicPath: '/admin/'\n    ···\n} as IConfig;\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于HTML模版\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eumi默认使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esrc/pages/document.ejs\u003c/code\u003e这个模版，采用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eEJS\u003c/code\u003e渲染，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFavicon\u003c/code\u003e的路径改为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;%= context.publicPath %\u003efavicon.png\u003c/code\u003e可以修复Favicon路径不对的问题。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于区块\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eblock\u003c/code\u003e\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e区块可以理解为页面模板，这个模板是在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eant-design-pro\u003c/code\u003e的预览网站中，如果你看中了某个功能，（默认创建的工程是空白的，只有一个Welcome页面）点击右下角的下载按钮，会弹出一个命令，执行这个命令就能将这个页面加入到你自己的工程中，非常方便。其实质是执行了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003egit clone\u003c/code\u003e克隆预览工程的部分文件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e比如：添加一个类似预览工程的404页面\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpx umi block add Exception404  --path=/exception/404\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e经过尝试，我发现目前区块引入时，并不是合并文件，而是创建一个目录，里面包括了这个页面用到的所有组件，甚至是国际化文本都是单独的一套。不管你工程内有没有这些组件，它都会重新创建一套。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e比如刚加入了404页面又想加入403页面，本已经存在的Exception组件，会在403文件夹再创建一份一模一样的副本，这点，我觉得是不可接受的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这样的话我更倾向与参考block的实现手动加入需要的文件，而不是使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eumi block add\u003c/code\u003e功能，官方的block在这里：\u003ca href=\"https://github.com/ant-design/pro-blocks\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/ant-design/pro-blocks\u003c/a\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e菜单处理\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e菜单是由路由自动生成，刚刚引入的404页面出现在了菜单栏，它是一个异常页，并不需要在菜单展示，我们只需在路由配置中加入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehideInMenu: true\u003c/code\u003e，即可隐藏。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e404页面\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e输入一个不存在的地址，并不能跳转到刚刚加入的404页面。\n我们需要将在路由配置中将404的其它配置项删除，仅保留\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecomponent: './exception/404'\u003c/code\u003e，并将其挪到数组的最后，这样当路由无法匹配时，就会加载404这个组件了。\u003c/p\u003e\n","content":"\n![ant-design](https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg)\n\n**Ant-Design**由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量`React`和 `Angular`组件实现，用于开发和服务于企业级中后台产品。\n\n**Ant-Design-Pro**是基于`Ant-Design`的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\n\n- `React`：现代化的JavaScript界面库\n- `dva`：类似`Redux`的数据流、状态管理框架\n- `UmiJS`：类似`nextJS`的react应用框架\n\n本文从基础使用开始，逐步解析里面用到的技术细节。\n\n\u003c!--more--\u003e\n\n安装及启动在官网有说明，生成的基础工程目录结结构如下：\n\n```\n├── config                   # umi 配置，包含路由，构建等配置\n├── mock                     # 本地模拟数据\n├── public                   # 公共资源目录\n│   └── favicon.png          # Favicon\n├── src                      # 代码目录\n│   ├── assets               # 本地静态资源\n│   ├── components           # 业务通用组件\n│   ├── e2e                  # 集成测试用例\n│   ├── layouts              # 通用布局\n│   ├── models               # 全局 dva model\n│   ├── pages                # 业务页面入口和常用模板\n│   ├── services             # 后台接口服务\n│   ├── utils                # 工具库\n│   ├── locales              # 国际化资源\n│   ├── global.less          # 全局样式\n│   └── global.js            # 全局 JS\n├── tests                    # 测试工具\n├── README.md                # readme\n└── package.json             # npm管理的清单\n```\n\n## 关于哈希路由\n\n现代的前端框架都是单页面的(single-page application)，即用户访问的永远是根目录的index.html，这时网页地址如何展现就是一个问题。解决方案有2个：\n\n- 前端解决：使用哈希路由，即用户看到的地址栏URL是`#`分割的，如`https://wycode.cn/admin/#/users/123`，实际访问仍然是`index.html`。`UmiJS`配置如下\n\n```js\nexport default {\n    ···\n    history: 'hash'\n    ···\n} as IConfig;  \n```\n\n- 后端解决：使用重定向，即访问index以外的其它地址，都重定向到`index.html`。`nginx`配置如下:\n\n```nginx\nlocation / {\n    try_files $uri $uri/ /index.html;\n}\n```\n## UmiJS非根目录部署\n\n如果工程不是部署在根目录，UmiJS的config做如下配置即可：\n\n```js\nexport default {\n    ···\n    base: 'admin'\n    ···\n} as IConfig;  \n```\n\n\u003e **但是：**当配置为hash路由时且非根目录部署时，有可能你希望的首页是`https://wycode.cn/admin/#/`，`/users`页是`https://wycode.cn/admin/#/users`则需要进行如下配置：\n\n```js\nexport default {\n    ···\n    history: 'hash',\n    publicPath: '/admin/'\n    ···\n} as IConfig;\n```\n\n## 关于HTML模版\n\numi默认使用`src/pages/document.ejs`这个模版，采用`EJS`渲染，`Favicon`的路径改为`\u003c%= context.publicPath %\u003efavicon.png`可以修复Favicon路径不对的问题。\n\n\n## 关于区块`block`\n\n区块可以理解为页面模板，这个模板是在`ant-design-pro`的预览网站中，如果你看中了某个功能，（默认创建的工程是空白的，只有一个Welcome页面）点击右下角的下载按钮，会弹出一个命令，执行这个命令就能将这个页面加入到你自己的工程中，非常方便。其实质是执行了`git clone`克隆预览工程的部分文件。\n\n比如：添加一个类似预览工程的404页面\n\n```bash\nnpx umi block add Exception404  --path=/exception/404\n```\n\n经过尝试，我发现目前区块引入时，并不是合并文件，而是创建一个目录，里面包括了这个页面用到的所有组件，甚至是国际化文本都是单独的一套。不管你工程内有没有这些组件，它都会重新创建一套。\n\n比如刚加入了404页面又想加入403页面，本已经存在的Exception组件，会在403文件夹再创建一份一模一样的副本，这点，我觉得是不可接受的。\n\n这样的话我更倾向与参考block的实现手动加入需要的文件，而不是使用`umi block add`功能，官方的block在这里：https://github.com/ant-design/pro-blocks\n\n## 菜单处理\n\n菜单是由路由自动生成，刚刚引入的404页面出现在了菜单栏，它是一个异常页，并不需要在菜单展示，我们只需在路由配置中加入`hideInMenu: true`，即可隐藏。\n\n## 404页面\n\n输入一个不存在的地址，并不能跳转到刚刚加入的404页面。\n我们需要将在路由配置中将404的其它配置项删除，仅保留`component: './exception/404'`，并将其挪到数组的最后，这样当路由无法匹配时，就会加载404这个组件了。\n\n","data":{"title":"学习和拆解Ant-Design-Pro","date":"2019-06-09","tags":["TypeScript","JavaScript","NodeJS","React"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![ant-design](https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg)\n\n**Ant-Design**由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量`React`和 `Angular`组件实现，用于开发和服务于企业级中后台产品。\n\n**Ant-Design-Pro**是基于`Ant-Design`的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\n\n- `React`：现代化的JavaScript界面库\n- `dva`：类似`Redux`的数据流、状态管理框架\n- `UmiJS`：类似`nextJS`的react应用框架\n\n本文从基础使用开始，逐步解析里面用到的技术细节。\n\n"},{"id":"angular","file":"angular.md","excerptHtml":"","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.brunobrito.net.br/content/images/2018/07/angular-logo-1.png\" alt=\"Angular\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eAngular框架的整体思路，很像Spring这样的后台框架。一层层的分解、解耦，天下框架莫不如此。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003eAngular有3个重要概念：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e模块(Module)\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e组件(Component)\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e路由(Router)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eAngular通过将大型项目分割成一个个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e模块\u003c/code\u003e，松耦合，便于扩展和维护。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e所谓\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e组件\u003c/code\u003e，就是一个MVC块，每个模块会有很多组件，组件代表了一个页面，可以嵌套，因此可以更加细分下去，通过元数据做双向绑定。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e所谓\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e路由\u003c/code\u003e，就是一个分发器，不同的路径加载不同的模块或组件即可。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e所谓\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e元数据\u003c/code\u003e，就是Java注解。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eSpring那套，控制反转（IOC）依赖注入（DI）也被引入进来。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e将业务逻辑封装到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eService\u003c/code\u003e里，然后注入到各个组件中使用。业务代码就彻底被隔离到Service里了，不会侵入框架整体设计。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e关于Webpack：Webpack在打包Web工程时，可以找到资源之间的引用，最小化压缩合并CSS，JavaScript文件。\u003c/p\u003e\n","content":"\n![Angular](https://www.brunobrito.net.br/content/images/2018/07/angular-logo-1.png)\n\n\u003e Angular框架的整体思路，很像Spring这样的后台框架。一层层的分解、解耦，天下框架莫不如此。\n\nAngular有3个重要概念：\n\n- 模块(Module)\n- 组件(Component)\n- 路由(Router)\n\nAngular通过将大型项目分割成一个个`模块`，松耦合，便于扩展和维护。\n\n所谓`组件`，就是一个MVC块，每个模块会有很多组件，组件代表了一个页面，可以嵌套，因此可以更加细分下去，通过元数据做双向绑定。\n\n所谓`路由`，就是一个分发器，不同的路径加载不同的模块或组件即可。\n\n所谓`元数据`，就是Java注解。\n\nSpring那套，控制反转（IOC）依赖注入（DI）也被引入进来。\n\n将业务逻辑封装到`Service`里，然后注入到各个组件中使用。业务代码就彻底被隔离到Service里了，不会侵入框架整体设计。\n\n关于Webpack：Webpack在打包Web工程时，可以找到资源之间的引用，最小化压缩合并CSS，JavaScript文件。","data":{"title":"Angular框架原理的思考","date":"2017-12-28","tags":["Angular","TypeScript","HTML"],"category":"Frontend"},"isEmpty":false,"excerpt":""}],"cid":"typescript"},"__N_SSG":true},"page":"/blog/tag/[cid]","query":{"cid":"typescript"},"buildId":"uFO1FMOoBQ2X-GM8G4ZfF","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
