00"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"travis-ci","file":"travis-ci.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.smartfile.com/blog/wp-content/uploads/2015/05/logo-travisci-wide1.jpg\" alt=\"TravisCI\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e持续集成（Continuous integration，简称CI）是一种软件开发实践。以每天小的代码改动集成替代在开发周期的末尾集成大量的代码，通过自动化的构建（包括编译，自动化测试，发布)来验证，从而尽快地发现和定位错误。让产品可以快速迭代，同时还能保持高质量。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e持续集成往往和现代化的软件开发实践相结合，例如：Git工作流、敏捷开发、自动化测试、自动化部署等。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e持续集成能够帮你：减少风险、减少重复过程、自动化生成可部署的软件、增强项目的可见性、建立团队对开发产品的信心。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章教你使用 \u003ca href=\"https://travis-ci.com\" title=\"Travis CI\" class=\"text-sky-500 hover:text-sky-400\"\u003eTravis CI\u003c/a\u003e 自动化构建和发布你的软件产品。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.smartfile.com/blog/wp-content/uploads/2015/05/logo-travisci-wide1.jpg\" alt=\"TravisCI\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e持续集成（Continuous integration，简称CI）是一种软件开发实践。以每天小的代码改动集成替代在开发周期的末尾集成大量的代码，通过自动化的构建（包括编译，自动化测试，发布)来验证，从而尽快地发现和定位错误。让产品可以快速迭代，同时还能保持高质量。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e持续集成往往和现代化的软件开发实践相结合，例如：Git工作流、敏捷开发、自动化测试、自动化部署等。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e持续集成能够帮你：减少风险、减少重复过程、自动化生成可部署的软件、增强项目的可见性、建立团队对开发产品的信心。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章教你使用 \u003ca href=\"https://travis-ci.com\" title=\"Travis CI\" class=\"text-sky-500 hover:text-sky-400\"\u003eTravis CI\u003c/a\u003e 自动化构建和发布你的软件产品。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e准备\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eTravis CI可以使用Github的OAuth登录，赋予其必要的权限，我们就能使用Github开源代码库开启构建了。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e需要注意的是：Travis CI目前有两个域名\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etravis-ci.org\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etravis-ci.com\u003c/code\u003e，推荐使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecom\u003c/code\u003e，官方已经将\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.org\u003c/code\u003e合并到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.com\u003c/code\u003e了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e配置\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eTravis CI通过读取项目根目录的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.travis.yml\u003c/code\u003e文件获取配置信息，所以需要在工程目录下配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.travis.yml\u003c/code\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-yml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e# safelist\nbranches:\n  only:\n  - master\nlanguage: node_js\nnode_js:\n  - \"8\"\nscript: ./node_modules/.bin/hexo clean \u0026#x26;\u0026#x26; ./node_modules/.bin/hexo generate\ndeploy:\n  # deploy to github pages\n  - provider: pages\n    skip_cleanup: true\n    target_branch: master\n    github_token: $GITHUB_TOKEN  # Set in the settings page of your repository, as a secure variable\n    repo: wangyucode/wangyucode.github.io\n    local_dir: public\nafter_deploy:\n  - node deploy/sftp.js $SERVER_PASSWORD\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ebranches\u003c/code\u003e可以配置需要构建的黑白名单，我这里设置了白名单，只构建\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emaster\u003c/code\u003e分支\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e语言环境选择\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enodejs\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e一个Job包含两个主要部分：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003einstall\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003escript\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e我这里指定了node版本为v8\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003einstall\u003c/code\u003e默认会执行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enpm install\u003c/code\u003e，在有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eyarn.lock\u003c/code\u003e的工程中会替代\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enpm\u003c/code\u003e为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eyarn\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003escript\u003c/code\u003e会在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003einstall\u003c/code\u003e完成后执行\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edeploy\u003c/code\u003e中我部署了github pages，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eskip_cleanup\u003c/code\u003e表示跳过cleanup因为部署时我不需要清理任何文件，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etarget_branch\u003c/code\u003e指定了要提交的分支，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003egithub_token\u003c/code\u003e因为比较敏感，所以作为变量配置在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRepository Settings\u003c/code\u003e中，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003erepo\u003c/code\u003e配置了要提交的仓库，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elocal_dir\u003c/code\u003e表示只会部署\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epublic\u003c/code\u003e中的文件\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eafter_deploy\u003c/code\u003e在部署完成之后我还会将文件部署到我的linux服务器，这里用了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esftp-sync-deploy\u003c/code\u003e开源库\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e部署\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003epush代码后即可触发集成，在Travis Dashboard可以看到如下log，说明构建及部署都成功了！\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eWorker information\nBuild system information\ndocker stop/waiting\nresolvconf stop/waiting\n$ git clone --depth=50 --branch=master https://github.com/wangyucode/wycode.cn.git wangyucode/wycode.cn\n\n...\n\nLogged in as @wangyucode (王郁)\ncd /tmp/d20190520-5677-1oocet1/work\nPreparing deploy\nDeploying application\n$ node deploy/sftp.js $SERVER_PASSWORD\n\nDone. Your build exited with 0.\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请注明出处!\u003c/p\u003e\n","content":"\n![TravisCI](https://www.smartfile.com/blog/wp-content/uploads/2015/05/logo-travisci-wide1.jpg)\n\n\u003e 持续集成（Continuous integration，简称CI）是一种软件开发实践。以每天小的代码改动集成替代在开发周期的末尾集成大量的代码，通过自动化的构建（包括编译，自动化测试，发布)来验证，从而尽快地发现和定位错误。让产品可以快速迭代，同时还能保持高质量。\n\n\u003e 持续集成往往和现代化的软件开发实践相结合，例如：Git工作流、敏捷开发、自动化测试、自动化部署等。\n\n\u003e 持续集成能够帮你：减少风险、减少重复过程、自动化生成可部署的软件、增强项目的可见性、建立团队对开发产品的信心。\n\n这篇文章教你使用 [Travis CI](https://travis-ci.com \"Travis CI\") 自动化构建和发布你的软件产品。\n\n\u003c!--more--\u003e\n\n## 准备\n\nTravis CI可以使用Github的OAuth登录，赋予其必要的权限，我们就能使用Github开源代码库开启构建了。\n\n\u003e 需要注意的是：Travis CI目前有两个域名`travis-ci.org`和`travis-ci.com`，推荐使用`com`，官方已经将`.org`合并到`.com`了。\n\n## 配置\n\nTravis CI通过读取项目根目录的`.travis.yml`文件获取配置信息，所以需要在工程目录下配置`.travis.yml`\n\n```yml\n# safelist\nbranches:\n  only:\n  - master\nlanguage: node_js\nnode_js:\n  - \"8\"\nscript: ./node_modules/.bin/hexo clean \u0026\u0026 ./node_modules/.bin/hexo generate\ndeploy:\n  # deploy to github pages\n  - provider: pages\n    skip_cleanup: true\n    target_branch: master\n    github_token: $GITHUB_TOKEN  # Set in the settings page of your repository, as a secure variable\n    repo: wangyucode/wangyucode.github.io\n    local_dir: public\nafter_deploy:\n  - node deploy/sftp.js $SERVER_PASSWORD\n```\n\n- `branches`可以配置需要构建的黑白名单，我这里设置了白名单，只构建`master`分支\n- 语言环境选择`nodejs`\n- 一个Job包含两个主要部分：`install`和`script`\n- 我这里指定了node版本为v8\n- `install`默认会执行`npm install`，在有`yarn.lock`的工程中会替代`npm`为`yarn`\n- `script`会在`install`完成后执行\n- `deploy`中我部署了github pages，`skip_cleanup`表示跳过cleanup因为部署时我不需要清理任何文件，`target_branch`指定了要提交的分支，`github_token`因为比较敏感，所以作为变量配置在`Repository Settings`中，`repo`配置了要提交的仓库，`local_dir`表示只会部署`public`中的文件\n- `after_deploy`在部署完成之后我还会将文件部署到我的linux服务器，这里用了`sftp-sync-deploy`开源库\n\n## 部署\n\npush代码后即可触发集成，在Travis Dashboard可以看到如下log，说明构建及部署都成功了！\n\n```bash\nWorker information\nBuild system information\ndocker stop/waiting\nresolvconf stop/waiting\n$ git clone --depth=50 --branch=master https://github.com/wangyucode/wycode.cn.git wangyucode/wycode.cn\n\n...\n\nLogged in as @wangyucode (王郁)\ncd /tmp/d20190520-5677-1oocet1/work\nPreparing deploy\nDeploying application\n$ node deploy/sftp.js $SERVER_PASSWORD\n\nDone. Your build exited with 0.\n```\n\n以上，转载请注明出处!\n","data":{"title":"使用TravisCI进行持续集成","date":"2019-05-20","tags":["TravisCI","Hexo","NodeJS","Linux"],"category":"CI CD"},"isEmpty":false,"excerpt":"\n![TravisCI](https://www.smartfile.com/blog/wp-content/uploads/2015/05/logo-travisci-wide1.jpg)\n\n\u003e 持续集成（Continuous integration，简称CI）是一种软件开发实践。以每天小的代码改动集成替代在开发周期的末尾集成大量的代码，通过自动化的构建（包括编译，自动化测试，发布)来验证，从而尽快地发现和定位错误。让产品可以快速迭代，同时还能保持高质量。\n\n\u003e 持续集成往往和现代化的软件开发实践相结合，例如：Git工作流、敏捷开发、自动化测试、自动化部署等。\n\n\u003e 持续集成能够帮你：减少风险、减少重复过程、自动化生成可部署的软件、增强项目的可见性、建立团队对开发产品的信心。\n\n这篇文章教你使用 [Travis CI](https://travis-ci.com \"Travis CI\") 自动化构建和发布你的软件产品。\n\n"},{"id":"search","file":"search.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何利用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehexo-generator-search\u003c/code\u003e插件为Hexo博客添加本地全文搜索\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e原理\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehexo-generator-search\u003c/code\u003e实际上是根据网页内容生成了一个数据文件，格式是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eXML\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJSON\u003c/code\u003e。然后通过JS代码去匹配这个文件的内容，从而达到搜索的目的。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e最终效果\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170616_search_01.png\" alt=\"最终效果\" title=\"最终效果\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何利用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehexo-generator-search\u003c/code\u003e插件为Hexo博客添加本地全文搜索\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e原理\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehexo-generator-search\u003c/code\u003e实际上是根据网页内容生成了一个数据文件，格式是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eXML\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJSON\u003c/code\u003e。然后通过JS代码去匹配这个文件的内容，从而达到搜索的目的。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e最终效果\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170616_search_01.png\" alt=\"最终效果\" title=\"最终效果\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e步骤\u003c/h2\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e安装 hexo-generator-search\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ npm install hexo-generator-search --save\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e配置\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e_config.yml\u003c/code\u003e中添加\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-yaml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003esearch:\n  path: search.xml\n  field: post\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e使用\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e再次生成博客，就会发现\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epublic\u003c/code\u003e根目录下多了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esearch.xml\u003c/code\u003e文件。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e写一个搜索框：\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBootstrap\u003c/code\u003e框架的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodal\u003c/code\u003e应该是极好的。\n修改Hexo主题，（对此不了解的可以查看我的自定义Hexo主题的相关内容），在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elayout.ejs\u003c/code\u003e中添加一个modal：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;%- partial('_partial/search-modal') %\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e根据Bootstrap文档，modal需要尽量作为 body 标签的直接子元素。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esearch-modal.ejs\u003c/code\u003e的代码如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;div class=\"modal fade\" id=\"searchModal\"\u003e\n    \u0026#x3C;div class=\"modal-dialog modal-lg\" role=\"document\"\u003e\n        \u0026#x3C;div class=\"modal-content\"\u003e\n            \u0026#x3C;div class=\"modal-body\"\u003e\n                \u0026#x3C;i class=\"fa fa-search\" aria-hidden=\"true\"\u003e\u0026#x3C;/i\u003e 搜索\n                \u0026#x3C;input type=\"text\" class=\"form-control\" id=\"searchInput\" placeholder=\"Keyword\"\u003e\n                \u0026#x3C;div class=\"search-content\" id=\"searchResult\"\u003e\u0026#x3C;/div\u003e\n            \u0026#x3C;/div\u003e\n        \u0026#x3C;/div\u003e\n    \u0026#x3C;/div\u003e\n\u0026#x3C;/div\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e链接加上\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edata-toggle=\"modal\"  href=\"#searchModal\"\u003c/code\u003e属性即可实现modal的展开\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e搜索代码：\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e// A local search script with the help of [hexo-generator-search](https://github.com/PaicHyperionDev/hexo-generator-search)\n// Copyright (C) 2015\n// Joseph Pan \u0026#x3C;http://github.com/wzpan\u003e\n// Shuhao Mao \u0026#x3C;http://github.com/maoshuhao\u003e\n// This library is free software; you can redistribute it and/or modify\n// it under the terms of the GNU Lesser General Public License as\n// published by the Free Software Foundation; either version 2.1 of the\n// License, or (at your option) any later version.\n//\n// This library is distributed in the hope that it will be useful, but\n// WITHOUT ANY WARRANTY; without even the implied warranty of\n// MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.  See the GNU\n// Lesser General Public License for more details.\n//\n// You should have received a copy of the GNU Lesser General Public\n// License along with this library; if not, write to the Free Software\n// Foundation, Inc., 51 Franklin Street, Fifth Floor, Boston, MA\n// 02110-1301 USA\n//\n\nvar searchFunc = function(path, search_id, content_id) {\n    'use strict';\n    $.ajax({\n        url: path,\n        dataType: \"xml\",\n        success: function( xmlResponse ) {\n            // get the contents from search data\n            var datas = $( \"entry\", xmlResponse ).map(function() {\n                return {\n                    title: $( \"title\", this ).text(),\n                    content: $(\"content\",this).text(),\n                    url: $( \"url\" , this).text()\n                };\n            }).get();\n\n            var $input = document.getElementById(search_id);\n            var $resultContent = document.getElementById(content_id);\n\n            $input.addEventListener('input', function(){\n                var str='\u0026#x3C;ul class=\\\"search-result-list\\\"\u003e';\n                var keywords = this.value.trim().toLowerCase().split(/[\\s\\-]+/);\n                $resultContent.innerHTML = \"\";\n                if (this.value.trim().length \u0026#x3C;= 0) {\n                    return;\n                }\n                // perform local searching\n                datas.forEach(function(data) {\n                    var isMatch = true;\n                    var content_index = [];\n                    if (!data.title || data.title.trim() === '') {\n                        data.title = \"Untitled\";\n                    }\n                    var data_title = data.title.trim().toLowerCase();\n                    var data_content = data.content.trim().replace(/\u0026#x3C;[^\u003e]+\u003e/g,\"\").toLowerCase();\n                    var data_url = data.url;\n                    var index_title = -1;\n                    var index_content = -1;\n                    var first_occur = -1;\n                    // only match artiles with not empty contents\n                    if (data_content !== '') {\n                        keywords.forEach(function(keyword, i) {\n                            index_title = data_title.indexOf(keyword);\n                            index_content = data_content.indexOf(keyword);\n\n                            if( index_title \u0026#x3C; 0 \u0026#x26;\u0026#x26; index_content \u0026#x3C; 0 ){\n                                isMatch = false;\n                            } else {\n                                if (index_content \u0026#x3C; 0) {\n                                    index_content = 0;\n                                }\n                                if (i == 0) {\n                                    first_occur = index_content;\n                                }\n                                // content_index.push({index_content:index_content, keyword_len:keyword_len});\n                            }\n                        });\n                    } else {\n                        isMatch = false;\n                    }\n                    // show search results\n                    if (isMatch) {\n                        str += \"\u0026#x3C;li\u003e\u0026#x3C;a href='\"+ data_url +\"' class='search-result-title'\u003e\"+ data_title +\"\u0026#x3C;/a\u003e\";\n                        var content = data.content.trim().replace(/\u0026#x3C;[^\u003e]+\u003e/g,\"\");\n                        if (first_occur \u003e= 0) {\n                            // cut out 100 characters\n                            var start = first_occur - 20;\n                            var end = first_occur + 80;\n\n                            if(start \u0026#x3C; 0){\n                                start = 0;\n                            }\n\n                            if(start == 0){\n                                end = 100;\n                            }\n\n                            if(end \u003e content.length){\n                                end = content.length;\n                            }\n\n                            var match_content = content.substr(start, end);\n\n                            // highlight all keywords\n                            keywords.forEach(function(keyword){\n                                var regS = new RegExp(keyword, \"gi\");\n                                match_content = match_content.replace(regS, \"\u0026#x3C;em class=\\\"search-keyword\\\"\u003e\"+keyword+\"\u0026#x3C;/em\u003e\");\n                            });\n\n                            str += \"\u0026#x3C;p class=\\\"search-result\\\"\u003e\" + match_content +\"...\u0026#x3C;/p\u003e\"\n                        }\n                        str += \"\u0026#x3C;/li\u003e\";\n                    }\n                });\n                str += \"\u0026#x3C;/ul\u003e\";\n                $resultContent.innerHTML = str;\n            });\n        }\n    });\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e添加链接\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;%- js('js/search') %\u003e\n\u0026#x3C;script\u003esearchFunc('\u0026#x3C;%= url_for('search.xml') %\u003e', 'searchInput', 'searchResult');\u0026#x3C;/script\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e高亮关键词\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003ekeywords.forEach(function(keyword){\n                            var regS = new RegExp(keyword, \"gi\");\n                            data_title = data_title.replace(regS, \"\u0026#x3C;em class=\\\"search-keyword\\\"\u003e\"+keyword+\"\u0026#x3C;/em\u003e\");\n                        });\n\u003c/code\u003e\u003c/pre\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-css px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e.search-keyword{\n    color: #c7254e;\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e 本文介绍如何利用`hexo-generator-search`插件为Hexo博客添加本地全文搜索\n\n## 原理\n`hexo-generator-search`实际上是根据网页内容生成了一个数据文件，格式是`XML`或者`JSON`。然后通过JS代码去匹配这个文件的内容，从而达到搜索的目的。\n\n## 最终效果\n![最终效果](/images/20170616_search_01.png \"最终效果\")\n\u003c!--more--\u003e\n## 步骤\n\n### 安装 hexo-generator-search\n\n```bash\n$ npm install hexo-generator-search --save\n```\n### 配置\n\n在`_config.yml`中添加\n\n```yaml\nsearch:\n  path: search.xml\n  field: post\n```\n### 使用\n再次生成博客，就会发现`public`根目录下多了`search.xml`文件。\n\n### 写一个搜索框：\n使用`Bootstrap`框架的`modal`应该是极好的。\n修改Hexo主题，（对此不了解的可以查看我的自定义Hexo主题的相关内容），在`layout.ejs`中添加一个modal：\n\n```html\n\u003c%- partial('_partial/search-modal') %\u003e\n```\n\n\u003e 根据Bootstrap文档，modal需要尽量作为 body 标签的直接子元素。\n\n`search-modal.ejs`的代码如下：\n```html\n\u003cdiv class=\"modal fade\" id=\"searchModal\"\u003e\n    \u003cdiv class=\"modal-dialog modal-lg\" role=\"document\"\u003e\n        \u003cdiv class=\"modal-content\"\u003e\n            \u003cdiv class=\"modal-body\"\u003e\n                \u003ci class=\"fa fa-search\" aria-hidden=\"true\"\u003e\u003c/i\u003e 搜索\n                \u003cinput type=\"text\" class=\"form-control\" id=\"searchInput\" placeholder=\"Keyword\"\u003e\n                \u003cdiv class=\"search-content\" id=\"searchResult\"\u003e\u003c/div\u003e\n            \u003c/div\u003e\n        \u003c/div\u003e\n    \u003c/div\u003e\n\u003c/div\u003e\n```\n\n\u003e 链接加上`data-toggle=\"modal\"  href=\"#searchModal\"`属性即可实现modal的展开\n\n### 搜索代码：\n```javascript\n// A local search script with the help of [hexo-generator-search](https://github.com/PaicHyperionDev/hexo-generator-search)\n// Copyright (C) 2015\n// Joseph Pan \u003chttp://github.com/wzpan\u003e\n// Shuhao Mao \u003chttp://github.com/maoshuhao\u003e\n// This library is free software; you can redistribute it and/or modify\n// it under the terms of the GNU Lesser General Public License as\n// published by the Free Software Foundation; either version 2.1 of the\n// License, or (at your option) any later version.\n//\n// This library is distributed in the hope that it will be useful, but\n// WITHOUT ANY WARRANTY; without even the implied warranty of\n// MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.  See the GNU\n// Lesser General Public License for more details.\n//\n// You should have received a copy of the GNU Lesser General Public\n// License along with this library; if not, write to the Free Software\n// Foundation, Inc., 51 Franklin Street, Fifth Floor, Boston, MA\n// 02110-1301 USA\n//\n\nvar searchFunc = function(path, search_id, content_id) {\n    'use strict';\n    $.ajax({\n        url: path,\n        dataType: \"xml\",\n        success: function( xmlResponse ) {\n            // get the contents from search data\n            var datas = $( \"entry\", xmlResponse ).map(function() {\n                return {\n                    title: $( \"title\", this ).text(),\n                    content: $(\"content\",this).text(),\n                    url: $( \"url\" , this).text()\n                };\n            }).get();\n\n            var $input = document.getElementById(search_id);\n            var $resultContent = document.getElementById(content_id);\n\n            $input.addEventListener('input', function(){\n                var str='\u003cul class=\\\"search-result-list\\\"\u003e';\n                var keywords = this.value.trim().toLowerCase().split(/[\\s\\-]+/);\n                $resultContent.innerHTML = \"\";\n                if (this.value.trim().length \u003c= 0) {\n                    return;\n                }\n                // perform local searching\n                datas.forEach(function(data) {\n                    var isMatch = true;\n                    var content_index = [];\n                    if (!data.title || data.title.trim() === '') {\n                        data.title = \"Untitled\";\n                    }\n                    var data_title = data.title.trim().toLowerCase();\n                    var data_content = data.content.trim().replace(/\u003c[^\u003e]+\u003e/g,\"\").toLowerCase();\n                    var data_url = data.url;\n                    var index_title = -1;\n                    var index_content = -1;\n                    var first_occur = -1;\n                    // only match artiles with not empty contents\n                    if (data_content !== '') {\n                        keywords.forEach(function(keyword, i) {\n                            index_title = data_title.indexOf(keyword);\n                            index_content = data_content.indexOf(keyword);\n\n                            if( index_title \u003c 0 \u0026\u0026 index_content \u003c 0 ){\n                                isMatch = false;\n                            } else {\n                                if (index_content \u003c 0) {\n                                    index_content = 0;\n                                }\n                                if (i == 0) {\n                                    first_occur = index_content;\n                                }\n                                // content_index.push({index_content:index_content, keyword_len:keyword_len});\n                            }\n                        });\n                    } else {\n                        isMatch = false;\n                    }\n                    // show search results\n                    if (isMatch) {\n                        str += \"\u003cli\u003e\u003ca href='\"+ data_url +\"' class='search-result-title'\u003e\"+ data_title +\"\u003c/a\u003e\";\n                        var content = data.content.trim().replace(/\u003c[^\u003e]+\u003e/g,\"\");\n                        if (first_occur \u003e= 0) {\n                            // cut out 100 characters\n                            var start = first_occur - 20;\n                            var end = first_occur + 80;\n\n                            if(start \u003c 0){\n                                start = 0;\n                            }\n\n                            if(start == 0){\n                                end = 100;\n                            }\n\n                            if(end \u003e content.length){\n                                end = content.length;\n                            }\n\n                            var match_content = content.substr(start, end);\n\n                            // highlight all keywords\n                            keywords.forEach(function(keyword){\n                                var regS = new RegExp(keyword, \"gi\");\n                                match_content = match_content.replace(regS, \"\u003cem class=\\\"search-keyword\\\"\u003e\"+keyword+\"\u003c/em\u003e\");\n                            });\n\n                            str += \"\u003cp class=\\\"search-result\\\"\u003e\" + match_content +\"...\u003c/p\u003e\"\n                        }\n                        str += \"\u003c/li\u003e\";\n                    }\n                });\n                str += \"\u003c/ul\u003e\";\n                $resultContent.innerHTML = str;\n            });\n        }\n    });\n}\n```\n\n### 添加链接\n```html\n\u003c%- js('js/search') %\u003e\n\u003cscript\u003esearchFunc('\u003c%= url_for('search.xml') %\u003e', 'searchInput', 'searchResult');\u003c/script\u003e\n```\n\n### 高亮关键词\n```javascript\nkeywords.forEach(function(keyword){\n                            var regS = new RegExp(keyword, \"gi\");\n                            data_title = data_title.replace(regS, \"\u003cem class=\\\"search-keyword\\\"\u003e\"+keyword+\"\u003c/em\u003e\");\n                        });\n```\n```css\n.search-keyword{\n    color: #c7254e;\n}\n```\n","data":{"title":"为Hexo博客添加全文搜索","date":"2017-06-15","tags":["XML","jQuery","Ajax","Hexo","Bootstrap"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n\u003e 本文介绍如何利用`hexo-generator-search`插件为Hexo博客添加本地全文搜索\n\n## 原理\n`hexo-generator-search`实际上是根据网页内容生成了一个数据文件，格式是`XML`或者`JSON`。然后通过JS代码去匹配这个文件的内容，从而达到搜索的目的。\n\n## 最终效果\n![最终效果](/images/20170616_search_01.png \"最终效果\")\n"},{"id":"theme","file":"theme.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://ts1.cn.mm.bing.net/th/id/R-C.15156de8ecdaca0e208f755572b5217b?rik=SCL92Je0wYHVXg\u0026#x26;riu=http%3a%2f%2fheibanbai.com.cn%2fimg%2fhexo.png\u0026#x26;ehk=VywdH%2f1oS1u8iXWWEm11T%2bm0ntJ9pczrqS%2bktzxU3Mo%3d\u0026#x26;risl=\u0026#x26;pid=ImgRaw\u0026#x26;r=0\" alt=\"Hexo\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e刚刚完成了Hexo博客主题的自定义，现在总结如下，让我们一起来看看如何打造一款属于自己的Hexo主题。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e如何创建一个新主题以及如何切换主题在官网的\u003ca href=\"https://hexo.io/zh-cn/docs/themes.html\" title=\"doc\" class=\"text-sky-500 hover:text-sky-400\"\u003edoc\u003c/a\u003e中有说明，这里我们只讨论如何打造一个新的属于自己的模版。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e方法\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eHexo使用了\u003cstrong\u003e模版\u003c/strong\u003e进行渲染的方式来实现网页风格的自定义。其核心是一种嵌套、引用的风格实现对网页内容模块化管理。所以我也采取从外向里，抽丝剥茧，剥洋葱式的一层层展开来看其中的原理及如何去自定义。此文需要基本的HTML知识。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://ts1.cn.mm.bing.net/th/id/R-C.15156de8ecdaca0e208f755572b5217b?rik=SCL92Je0wYHVXg\u0026#x26;riu=http%3a%2f%2fheibanbai.com.cn%2fimg%2fhexo.png\u0026#x26;ehk=VywdH%2f1oS1u8iXWWEm11T%2bm0ntJ9pczrqS%2bktzxU3Mo%3d\u0026#x26;risl=\u0026#x26;pid=ImgRaw\u0026#x26;r=0\" alt=\"Hexo\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e刚刚完成了Hexo博客主题的自定义，现在总结如下，让我们一起来看看如何打造一款属于自己的Hexo主题。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e如何创建一个新主题以及如何切换主题在官网的\u003ca href=\"https://hexo.io/zh-cn/docs/themes.html\" title=\"doc\" class=\"text-sky-500 hover:text-sky-400\"\u003edoc\u003c/a\u003e中有说明，这里我们只讨论如何打造一个新的属于自己的模版。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e方法\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eHexo使用了\u003cstrong\u003e模版\u003c/strong\u003e进行渲染的方式来实现网页风格的自定义。其核心是一种嵌套、引用的风格实现对网页内容模块化管理。所以我也采取从外向里，抽丝剥茧，剥洋葱式的一层层展开来看其中的原理及如何去自定义。此文需要基本的HTML知识。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e模版文件\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e所有的模版文件都放置在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elayout\u003c/code\u003e文件夹中，所有用到的资源（CSS，JavaScript，图片等）都放置在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esource\u003c/code\u003e文件夹中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e模版的根入口文件是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elayout\u003c/code\u003e下的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elayout.ejs\u003c/code\u003e文件。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这里的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.ejs\u003c/code\u003e是模版采用的引擎，除了EJS，还有Haml和Jade，我大概看过Jade，比EJS更简洁，EJS更像HTML，我自己选择了EJS，原因是无需新学规则，还有就是官方提供的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elandscape\u003c/code\u003e也是采用的EJS，我的模版就是根据官方的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elandscape\u003c/code\u003e修改而来。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003elayout.ejs\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e我们先来看看这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elayout.ejs\u003c/code\u003e的内容：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;!DOCTYPE html\u003e\n\u0026#x3C;html\u003e\n\u0026#x3C;%- partial('_partial/head') %\u003e\n\u0026#x3C;body\u003e\n\u0026#x3C;%- partial('_partial/wycode-nav') %\u003e\n\u0026#x3C;%- partial('_partial/blog-nav') %\u003e\n\u0026#x3C;div class=\"container\"\u003e\n    \u0026#x3C;div class=\"row\"\u003e\n        \u0026#x3C;div class=\"content\"\u003e\u0026#x3C;%- body %\u003e\u0026#x3C;/div\u003e\n    \u0026#x3C;/div\u003e\n\u0026#x3C;/div\u003e\n\u0026#x3C;%- partial('_partial/footer', null, {cache: !config.relative_link}) %\u003e\n\u0026#x3C;%- partial('_partial/after-footer') %\u003e\n\u0026#x3C;/body\u003e\n\u0026#x3C;/html\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e可以看到以上就是典型的HTML文件框架。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e重点来了：\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e这里唯一的区别就是多了很多\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;%- %\u003e\u003c/code\u003e，凡是在这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;%- %\u003e\u003c/code\u003e里面的部分就是EJS模版的代码部分，而\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epartial('_partial/head')\u003c/code\u003e的意思就是引用了一个模块，位置是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e_partial\u003c/code\u003e文件夹的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehead.ejs\u003c/code\u003e。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003ehead.ejs\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e然后我们看看这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehead.ejs\u003c/code\u003e的内容：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;head\u003e\n    \u0026#x3C;meta charset=\"utf-8\"\u003e\n    \u0026#x3C;meta http-equiv=\"X-UA-Compatible\" content=\"IE=edge\"\u003e\n    \u0026#x3C;%\n    var title = page.title;\n\n    if (is_archive()) {\n        title = __('archive_a');\n\n        if (is_month()) {\n            title += ': ' + page.year + '/' + page.month;\n        } else if (is_year()) {\n            title += ': ' + page.year;\n        }\n    } else if (is_category()) {\n        title = __('category') + ': ' + page.category;\n    } else if (is_tag()) {\n        title = __('tag') + ': ' + page.tag;\n    }\n    %\u003e\n    \u0026#x3C;title\u003e\n        \u0026#x3C;% if (title){ %\u003e\n        \u0026#x3C;%= title %\u003e |\n        \u0026#x3C;% } %\u003e\n        \u0026#x3C;%= config.title %\u003e\u0026#x3C;/title\u003e\n    \u0026#x3C;meta name=\"viewport\" content=\"width=device-width, initial-scale=1, maximum-scale=1\"\u003e\n    \u0026#x3C;% if (theme.rss){ %\u003e\n    \u0026#x3C;link rel=\"alternate\" href=\"\u0026#x3C;%- theme.rss %\u003e\" title=\"\u0026#x3C;%= config.title %\u003e\" type=\"application/atom+xml\"\u003e\n    \u0026#x3C;% } %\u003e\n    \u0026#x3C;% if (theme.favicon){ %\u003e\n    \u0026#x3C;link rel=\"icon\" href=\"\u0026#x3C;%- url_for(theme.favicon) %\u003e\"\u003e\n    \u0026#x3C;% } %\u003e\n    \u0026#x3C;!-- Bootstrap --\u003e\n    \u0026#x3C;%- css('flat/dist/css/vendor/bootstrap.min.css') %\u003e\n    \u0026#x3C;%- css('flat/dist/css/flat-ui.min') %\u003e\n    \u0026#x3C;%- css('font-awesome-4.7.0/css/font-awesome.min') %\u003e\n    \u0026#x3C;%- css('highlight/styles/monokai-sublime') %\u003e\n    \u0026#x3C;%- css('css/blog') %\u003e\n\n    \u0026#x3C;!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries --\u003e\n    \u0026#x3C;!-- WARNING: Respond.js doesn't work if you view the page via file:// --\u003e\n    \u0026#x3C;!--[if lt IE 9]\u003e\n    \u0026#x3C;%- js('flat/dist/js/vendor/html5shiv') %\u003e\n    \u0026#x3C;%- js('flat/dist/js/vendor/respond.min') %\u003e\n    \u0026#x3C;![endif]--\u003e\n\u0026#x3C;/head\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e可以看到这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehead.ejs\u003c/code\u003e就是HTML中\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;head\u003e\u0026#x3C;/head\u003e\u003c/code\u003e标签的内容，这里我替换了原有的CSS，使用了\u003ca href=\"http://www.bootcss.com/\" title=\"Bootstrap\" class=\"text-sky-500 hover:text-sky-400\"\u003eBootstrap\u003c/a\u003e框架。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e剩下的就是依次类推了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e附：layout文件结构\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003elayout\n│  archive.ejs\n│  category.ejs\n│  index.ejs\n│  layout.ejs\n│  page.ejs\n│  post.ejs\n│  tag.ejs\n│\n├─_partial\n│  │  after-footer.ejs\n│  │  archive-post.ejs\n│  │  archive.ejs\n│  │  article.ejs\n│  │  blog-nav.ejs\n│  │  footer.ejs\n│  │  head.ejs\n│  │  sidebar.ejs\n│  │  wycode-nav.ejs\n│  │\n│  └─post\n│          category.ejs\n│          date.ejs\n│          nav.ejs\n│          tag.ejs\n│          title.ejs\n│\n└─_widget\n        archive.ejs\n        category.ejs\n        recent_posts.ejs\n        tag.ejs\n        tagcloud.ejs\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![Hexo](https://ts1.cn.mm.bing.net/th/id/R-C.15156de8ecdaca0e208f755572b5217b?rik=SCL92Je0wYHVXg\u0026riu=http%3a%2f%2fheibanbai.com.cn%2fimg%2fhexo.png\u0026ehk=VywdH%2f1oS1u8iXWWEm11T%2bm0ntJ9pczrqS%2bktzxU3Mo%3d\u0026risl=\u0026pid=ImgRaw\u0026r=0)\n\n\u003e 刚刚完成了Hexo博客主题的自定义，现在总结如下，让我们一起来看看如何打造一款属于自己的Hexo主题。\n\n如何创建一个新主题以及如何切换主题在官网的[doc](https://hexo.io/zh-cn/docs/themes.html \"doc\")中有说明，这里我们只讨论如何打造一个新的属于自己的模版。\n## 方法\n\u003e Hexo使用了**模版**进行渲染的方式来实现网页风格的自定义。其核心是一种嵌套、引用的风格实现对网页内容模块化管理。所以我也采取从外向里，抽丝剥茧，剥洋葱式的一层层展开来看其中的原理及如何去自定义。此文需要基本的HTML知识。\n\n\u003c!--more--\u003e\n## 模版文件\n所有的模版文件都放置在`layout`文件夹中，所有用到的资源（CSS，JavaScript，图片等）都放置在`source`文件夹中。\n\n模版的根入口文件是`layout`下的`layout.ejs`文件。\n\n\u003e 这里的`.ejs`是模版采用的引擎，除了EJS，还有Haml和Jade，我大概看过Jade，比EJS更简洁，EJS更像HTML，我自己选择了EJS，原因是无需新学规则，还有就是官方提供的`landscape`也是采用的EJS，我的模版就是根据官方的`landscape`修改而来。\n\n## layout.ejs\n我们先来看看这个`layout.ejs`的内容：\n```html\n\u003c!DOCTYPE html\u003e\n\u003chtml\u003e\n\u003c%- partial('_partial/head') %\u003e\n\u003cbody\u003e\n\u003c%- partial('_partial/wycode-nav') %\u003e\n\u003c%- partial('_partial/blog-nav') %\u003e\n\u003cdiv class=\"container\"\u003e\n    \u003cdiv class=\"row\"\u003e\n        \u003cdiv class=\"content\"\u003e\u003c%- body %\u003e\u003c/div\u003e\n    \u003c/div\u003e\n\u003c/div\u003e\n\u003c%- partial('_partial/footer', null, {cache: !config.relative_link}) %\u003e\n\u003c%- partial('_partial/after-footer') %\u003e\n\u003c/body\u003e\n\u003c/html\u003e\n```\n可以看到以上就是典型的HTML文件框架。\n### 重点来了：\n这里唯一的区别就是多了很多`\u003c%- %\u003e`，凡是在这个`\u003c%- %\u003e`里面的部分就是EJS模版的代码部分，而`partial('_partial/head')`的意思就是引用了一个模块，位置是`_partial`文件夹的`head.ejs`。\n\n## head.ejs\n然后我们看看这个`head.ejs`的内容：\n```html\n\u003chead\u003e\n    \u003cmeta charset=\"utf-8\"\u003e\n    \u003cmeta http-equiv=\"X-UA-Compatible\" content=\"IE=edge\"\u003e\n    \u003c%\n    var title = page.title;\n\n    if (is_archive()) {\n        title = __('archive_a');\n\n        if (is_month()) {\n            title += ': ' + page.year + '/' + page.month;\n        } else if (is_year()) {\n            title += ': ' + page.year;\n        }\n    } else if (is_category()) {\n        title = __('category') + ': ' + page.category;\n    } else if (is_tag()) {\n        title = __('tag') + ': ' + page.tag;\n    }\n    %\u003e\n    \u003ctitle\u003e\n        \u003c% if (title){ %\u003e\n        \u003c%= title %\u003e |\n        \u003c% } %\u003e\n        \u003c%= config.title %\u003e\u003c/title\u003e\n    \u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1, maximum-scale=1\"\u003e\n    \u003c% if (theme.rss){ %\u003e\n    \u003clink rel=\"alternate\" href=\"\u003c%- theme.rss %\u003e\" title=\"\u003c%= config.title %\u003e\" type=\"application/atom+xml\"\u003e\n    \u003c% } %\u003e\n    \u003c% if (theme.favicon){ %\u003e\n    \u003clink rel=\"icon\" href=\"\u003c%- url_for(theme.favicon) %\u003e\"\u003e\n    \u003c% } %\u003e\n    \u003c!-- Bootstrap --\u003e\n    \u003c%- css('flat/dist/css/vendor/bootstrap.min.css') %\u003e\n    \u003c%- css('flat/dist/css/flat-ui.min') %\u003e\n    \u003c%- css('font-awesome-4.7.0/css/font-awesome.min') %\u003e\n    \u003c%- css('highlight/styles/monokai-sublime') %\u003e\n    \u003c%- css('css/blog') %\u003e\n\n    \u003c!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries --\u003e\n    \u003c!-- WARNING: Respond.js doesn't work if you view the page via file:// --\u003e\n    \u003c!--[if lt IE 9]\u003e\n    \u003c%- js('flat/dist/js/vendor/html5shiv') %\u003e\n    \u003c%- js('flat/dist/js/vendor/respond.min') %\u003e\n    \u003c![endif]--\u003e\n\u003c/head\u003e\n```\n可以看到这个`head.ejs`就是HTML中`\u003chead\u003e\u003c/head\u003e`标签的内容，这里我替换了原有的CSS，使用了[Bootstrap](http://www.bootcss.com/ \"Bootstrap\")框架。\n\n剩下的就是依次类推了。\n\n附：layout文件结构\n```\nlayout\n│  archive.ejs\n│  category.ejs\n│  index.ejs\n│  layout.ejs\n│  page.ejs\n│  post.ejs\n│  tag.ejs\n│\n├─_partial\n│  │  after-footer.ejs\n│  │  archive-post.ejs\n│  │  archive.ejs\n│  │  article.ejs\n│  │  blog-nav.ejs\n│  │  footer.ejs\n│  │  head.ejs\n│  │  sidebar.ejs\n│  │  wycode-nav.ejs\n│  │\n│  └─post\n│          category.ejs\n│          date.ejs\n│          nav.ejs\n│          tag.ejs\n│          title.ejs\n│\n└─_widget\n        archive.ejs\n        category.ejs\n        recent_posts.ejs\n        tag.ejs\n        tagcloud.ejs\n```\n","data":{"title":"自定义Hexo主题","date":"2017-06-15","tags":["Hexo","Bootstrap","HTML"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![Hexo](https://ts1.cn.mm.bing.net/th/id/R-C.15156de8ecdaca0e208f755572b5217b?rik=SCL92Je0wYHVXg\u0026riu=http%3a%2f%2fheibanbai.com.cn%2fimg%2fhexo.png\u0026ehk=VywdH%2f1oS1u8iXWWEm11T%2bm0ntJ9pczrqS%2bktzxU3Mo%3d\u0026risl=\u0026pid=ImgRaw\u0026r=0)\n\n\u003e 刚刚完成了Hexo博客主题的自定义，现在总结如下，让我们一起来看看如何打造一款属于自己的Hexo主题。\n\n如何创建一个新主题以及如何切换主题在官网的[doc](https://hexo.io/zh-cn/docs/themes.html \"doc\")中有说明，这里我们只讨论如何打造一个新的属于自己的模版。\n## 方法\n\u003e Hexo使用了**模版**进行渲染的方式来实现网页风格的自定义。其核心是一种嵌套、引用的风格实现对网页内容模块化管理。所以我也采取从外向里，抽丝剥茧，剥洋葱式的一层层展开来看其中的原理及如何去自定义。此文需要基本的HTML知识。\n\n"}],"cid":"hexo"},"__N_SSG":true},"page":"/blog/tag/[cid]","query":{"cid":"hexo"},"buildId":"uFO1FMOoBQ2X-GM8G4ZfF","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
