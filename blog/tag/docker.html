<!DOCTYPE html><html lang="zh-CN"><head><meta charSet="utf-8"/><title>王郁的小站</title><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/><meta name="next-head-count" content="3"/><link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml"/><meta name="description" content="欢迎光临王郁的小站"/><meta property="og:image" content="https://og-image.vercel.app/%E7%8E%8B%E9%83%81%E7%9A%84%E5%B0%8F%E7%AB%99.png?theme=light&amp;md=0&amp;fontSize=75px&amp;images=https%3A%2F%2Fassets.vercel.com%2Fimage%2Fupload%2Ffront%2Fassets%2Fdesign%2Fnextjs-black-logo.svg"/><meta name="og:title" content="王郁的小站"/><meta name="twitter:card" content="summary_large_image"/><link rel="preload" href="/_next/static/css/8a367d4b0f561ee4.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/8a367d4b0f561ee4.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-6af0e3c12b874bb0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-467b11a89995b152.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-75bdb96a41ba80f4.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-7a9af0eb34ed0a8f.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/205-2ea451b8c35b24ac.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/889-b501beaef0bf85fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/blog/tag/%5Bcid%5D-9dc0c01f6fcfe393.js" defer="" crossorigin=""></script><script src="/_next/static/7YMuoTtyITfiinBiv1T76/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7YMuoTtyITfiinBiv1T76/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"caddy","file":"caddy.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://caddyserver.com/resources/images/logo-dark.svg\" alt=\"Caddy\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e之前一直使用Nginx作为反向代理和静态网站服务，Caddy作为替代，有诸多好处，比如：配置简单，支持API，Caddyfile, JSON多种配置方式；支持自动HTTPS，自动更新TLS证书；内置支持HTTP1, HTTP2, HTTP3, Websocket。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章安装和配置Caddy的全流程\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://caddyserver.com/resources/images/logo-dark.svg\" alt=\"Caddy\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e之前一直使用Nginx作为反向代理和静态网站服务，Caddy作为替代，有诸多好处，比如：配置简单，支持API，Caddyfile, JSON多种配置方式；支持自动HTTPS，自动更新TLS证书；内置支持HTTP1, HTTP2, HTTP3, Websocket。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章安装和配置Caddy的全流程\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e安装Caddy\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e当前安装最简单的方式当然是通过Docker了，这是docker-compose文件\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-yml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eservices:\n  caddy:\n    image: caddy:2.8\n    container_name: caddy\n    restart: unless-stopped\n    ports:\n      - \"80:80\"\n      - \"443:443\"\n      - \"443:443/udp\"\n    volumes:\n      -./caddy/Caddyfile:/etc/caddy/Caddyfile:ro\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edocker compose up -d\u003c/code\u003e命令启动容器即可\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e配置Caddy\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e以下是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewycode.cn\u003c/code\u003e 的 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCaddyfile\u003c/code\u003e 配置。可以看到比nginx的配置简单了很多。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003ewycode.cn {\n\n    encode zstd gzip\n\n    handle_path /upload/* {\n        root * /srv/upload\n        file_server browse\n    }\n\n    handle_path /swagger-ui/* {\n        root * /srv/swagger-ui\n        file_server\n    }\n\n    handle /api/v1/* {\n        reverse_proxy \"http://deno:8083\"\n    }\n\n    handle /mongo/* {\n        reverse_proxy \"http://mongo-express:8081\"\n    }\n\n    handle {\n        root * /srv/wycode\n        try_files {path} /{path}.html {path}/ /404.html\n        file_server\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eHTTP Content压缩：\u003c/strong\u003e \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eencode zstd gzip\u003c/code\u003e 启用zstd和gzip压缩\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eupload目录：\u003c/strong\u003e \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehandle_path /upload/*\u003c/code\u003e 配置静态文件服务，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eroot * /srv/upload\u003c/code\u003e 表示将 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/upload\u003c/code\u003e 目录映射到 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/srv/upload\u003c/code\u003e 目录\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eSwagger UI：\u003c/strong\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehandle_path /swagger-ui/*\u003c/code\u003e 配置静态文件服务，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eroot * /srv/swagger-ui\u003c/code\u003e 表示将 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/swagger-ui\u003c/code\u003e 目录映射到 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/srv/swagger-ui\u003c/code\u003e 目录\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eDeno API：\u003c/strong\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehandle /api/v1/*\u003c/code\u003e 配置反向代理，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereverse_proxy \"http://deno:8083\"\u003c/code\u003e 表示将 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/api/v1\u003c/code\u003e 映射到 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttp://deno:8083\u003c/code\u003e 服务\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eMongoDB WebUI：\u003c/strong\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehandle /mongo/*\u003c/code\u003e 配置反向代理，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereverse_proxy \"http://mongo-express:8081\"\u003c/code\u003e 表示将 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/mongo\u003c/code\u003e 映射到 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttp://mongo-express:8081\u003c/code\u003e 服务\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eNextJs主站：\u003c/strong\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehandle\u003c/code\u003e 配置静态文件服务，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eroot * /srv/wycode\u003c/code\u003e 表示将 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/\u003c/code\u003e 目录映射到 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/srv/wycode\u003c/code\u003e 目录，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etry_files {path} /{path}.html {path}/ /404.html\u003c/code\u003e 表示如果请求的路径不存在，则尝试查找 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/\u003c/code\u003e 目录下的文件，如果文件不存在，则返回 404 错误。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e本文原始发表于 \u003ca href=\"https://wycode.cn/blog/caddy\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://wycode.cn/blog/caddy\u003c/a\u003e，转载请注明出处\u003c/p\u003e\n","content":"\n![Caddy](https://caddyserver.com/resources/images/logo-dark.svg)\n\n\u003e 之前一直使用Nginx作为反向代理和静态网站服务，Caddy作为替代，有诸多好处，比如：配置简单，支持API，Caddyfile, JSON多种配置方式；支持自动HTTPS，自动更新TLS证书；内置支持HTTP1, HTTP2, HTTP3, Websocket。\n\n这篇文章安装和配置Caddy的全流程\n\n\u003c!--more--\u003e\n\n## 安装Caddy\n\n当前安装最简单的方式当然是通过Docker了，这是docker-compose文件\n\n```yml\nservices:\n  caddy:\n    image: caddy:2.8\n    container_name: caddy\n    restart: unless-stopped\n    ports:\n      - \"80:80\"\n      - \"443:443\"\n      - \"443:443/udp\"\n    volumes:\n      -./caddy/Caddyfile:/etc/caddy/Caddyfile:ro\n```\n\n通过`docker compose up -d`命令启动容器即可\n\n\n## 配置Caddy\n\n以下是`wycode.cn` 的 `Caddyfile` 配置。可以看到比nginx的配置简单了很多。\n\n```\nwycode.cn {\n\n    encode zstd gzip\n\n    handle_path /upload/* {\n        root * /srv/upload\n        file_server browse\n    }\n\n    handle_path /swagger-ui/* {\n        root * /srv/swagger-ui\n        file_server\n    }\n\n    handle /api/v1/* {\n        reverse_proxy \"http://deno:8083\"\n    }\n\n    handle /mongo/* {\n        reverse_proxy \"http://mongo-express:8081\"\n    }\n\n    handle {\n        root * /srv/wycode\n        try_files {path} /{path}.html {path}/ /404.html\n        file_server\n    }\n}\n```\n\n- **HTTP Content压缩：** `encode zstd gzip` 启用zstd和gzip压缩\n- **upload目录：** `handle_path /upload/*` 配置静态文件服务，`root * /srv/upload` 表示将 `/upload` 目录映射到 `/srv/upload` 目录\n- **Swagger UI：**`handle_path /swagger-ui/*` 配置静态文件服务，`root * /srv/swagger-ui` 表示将 `/swagger-ui` 目录映射到 `/srv/swagger-ui` 目录\n- **Deno API：**`handle /api/v1/*` 配置反向代理，`reverse_proxy \"http://deno:8083\"` 表示将 `/api/v1` 映射到 `http://deno:8083` 服务\n- **MongoDB WebUI：**`handle /mongo/*` 配置反向代理，`reverse_proxy \"http://mongo-express:8081\"` 表示将 `/mongo` 映射到 `http://mongo-express:8081` 服务\n- **NextJs主站：**`handle` 配置静态文件服务，`root * /srv/wycode` 表示将 `/` 目录映射到 `/srv/wycode` 目录，`try_files {path} /{path}.html {path}/ /404.html` 表示如果请求的路径不存在，则尝试查找 `/` 目录下的文件，如果文件不存在，则返回 404 错误。\n\n本文原始发表于 \u003chttps://wycode.cn/blog/caddy\u003e，转载请注明出处","data":{"title":"Caddy的安装和使用","date":"2024-09-24","tags":["Linux","Docker"],"category":"Linux"},"isEmpty":false,"excerpt":"\n![Caddy](https://caddyserver.com/resources/images/logo-dark.svg)\n\n\u003e 之前一直使用Nginx作为反向代理和静态网站服务，Caddy作为替代，有诸多好处，比如：配置简单，支持API，Caddyfile, JSON多种配置方式；支持自动HTTPS，自动更新TLS证书；内置支持HTTP1, HTTP2, HTTP3, Websocket。\n\n这篇文章安装和配置Caddy的全流程\n\n"},{"id":"auto-deploy","file":"auto-deploy.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20200512_auto_deploy.png\" alt=\"flow\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e之前写过一篇文章关于\u003ca href=\"/2020-10-28-github-action.html\" class=\"text-sky-500 hover:text-sky-400\"\u003e使用Github Action进行持续集成\u003c/a\u003e。\n但是如何将构建好的软件包，分发到运行环境？托付给自动化服务后如何保证服务器安全？Docker化部署的话，服务器上的Docker引擎如何自动检查、拉取、运行最新的镜像？\n本文介绍如何解决这些问题。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20200512_auto_deploy.png\" alt=\"flow\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e之前写过一篇文章关于\u003ca href=\"/2020-10-28-github-action.html\" class=\"text-sky-500 hover:text-sky-400\"\u003e使用Github Action进行持续集成\u003c/a\u003e。\n但是如何将构建好的软件包，分发到运行环境？托付给自动化服务后如何保证服务器安全？Docker化部署的话，服务器上的Docker引擎如何自动检查、拉取、运行最新的镜像？\n本文介绍如何解决这些问题。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e镜像分发\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e对于Docker构建的镜像，我们可以将其推送到Docker hub之类的镜像仓库。\n然后在服务器上运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edocker pull \u0026#x3C;Image Name\u003e\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edocker-compose pull \u0026#x3C;Service\u003e\u003c/code\u003e就可以将镜像拉下来。\n然后再重新运行就可以了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这种方式解决了服务器的安全问题。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e但是如何将这一套流程自动化呢。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e自动检查镜像更新和重新运行\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e一个思路就是专门写一个守护程序，在接收到某种API请求时，执行以上的操作。但是这样它就脱离了Docker的管理，而且其本身也是需要维护和部署的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e但是如果将它也作为Docker镜像的话，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eContainer\u003c/code\u003e又如何控制宿主机中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDocker Engine\u003c/code\u003e呢？\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这也有办法，我们只需要将\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHost\u003c/code\u003e的Docker域套接字(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUNIX domain socket\u003c/code\u003e)，挂载到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eContainer\u003c/code\u003e中：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edocker run ... -v /var/run/docker.sock:/var/run/docker.sock\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e因为Docker是CS模式，这样\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eContainer\u003c/code\u003e就可以控制宿主机的Docker引擎，以实现上述操作了。有人将其称为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDocker in Docker\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而以上这个思路已经有人造好轮子了。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eWatchtower\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eWatchtower本身就是一个Docker镜像，支持定时、或者API Hook等方式触发检查，在发现有更新的镜像时，它会停止当前运行的容器，自动拉取镜像，重新以之前运行的参数重启容器，完美解决我们的需求。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e最终的流程参考文章开头的流程图。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这样一来，我们只需要push代码，Github Action会自动构建Docker镜像并push到Docker hub，然后curl一下我们的watchtower，它就会自动帮我们拉取并运行最新的镜像了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e省了不少时间，最重要的：\u003cstrong\u003e不要内卷，要work-life balance\u003c/strong\u003e\u003c/p\u003e\n","content":"\n![flow](/images/20200512_auto_deploy.png)\n\n\u003e 之前写过一篇文章关于[使用Github Action进行持续集成](/2020-10-28-github-action.html)。\n但是如何将构建好的软件包，分发到运行环境？托付给自动化服务后如何保证服务器安全？Docker化部署的话，服务器上的Docker引擎如何自动检查、拉取、运行最新的镜像？\n本文介绍如何解决这些问题。\n\n\u003c!--more--\u003e\n\n## 镜像分发\n\n对于Docker构建的镜像，我们可以将其推送到Docker hub之类的镜像仓库。\n然后在服务器上运行`docker pull \u003cImage Name\u003e`或者`docker-compose pull \u003cService\u003e`就可以将镜像拉下来。\n然后再重新运行就可以了。\n\n这种方式解决了服务器的安全问题。\n\n但是如何将这一套流程自动化呢。\n\n## 自动检查镜像更新和重新运行\n\n一个思路就是专门写一个守护程序，在接收到某种API请求时，执行以上的操作。但是这样它就脱离了Docker的管理，而且其本身也是需要维护和部署的。\n\n但是如果将它也作为Docker镜像的话，`Container`又如何控制宿主机中的`Docker Engine`呢？\n\n这也有办法，我们只需要将`Host`的Docker域套接字(`UNIX domain socket`)，挂载到`Container`中：\n\n```bash\ndocker run ... -v /var/run/docker.sock:/var/run/docker.sock\n```\n\n因为Docker是CS模式，这样`Container`就可以控制宿主机的Docker引擎，以实现上述操作了。有人将其称为`Docker in Docker`。\n\n而以上这个思路已经有人造好轮子了。\n\n## Watchtower\n\nWatchtower本身就是一个Docker镜像，支持定时、或者API Hook等方式触发检查，在发现有更新的镜像时，它会停止当前运行的容器，自动拉取镜像，重新以之前运行的参数重启容器，完美解决我们的需求。\n\n最终的流程参考文章开头的流程图。\n\n这样一来，我们只需要push代码，Github Action会自动构建Docker镜像并push到Docker hub，然后curl一下我们的watchtower，它就会自动帮我们拉取并运行最新的镜像了。\n\n省了不少时间，最重要的：**不要内卷，要work-life balance**\n","data":{"title":"基于Docker的自动化部署","date":"2021-05-09","tags":["Watchtower","Docker","NodeJS"],"category":"CI CD"},"isEmpty":false,"excerpt":"\n![flow](/images/20200512_auto_deploy.png)\n\n\u003e 之前写过一篇文章关于[使用Github Action进行持续集成](/2020-10-28-github-action.html)。\n但是如何将构建好的软件包，分发到运行环境？托付给自动化服务后如何保证服务器安全？Docker化部署的话，服务器上的Docker引擎如何自动检查、拉取、运行最新的镜像？\n本文介绍如何解决这些问题。\n\n"},{"id":"docker-mongodb","file":"docker-mongodb.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20201204_mongodb.svg\" alt=\"MongoDB\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何使用两行简单的命令来执行备份和还原Docker容器中MongoDB的数据库数据。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20201204_mongodb.svg\" alt=\"MongoDB\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何使用两行简单的命令来执行备份和还原Docker容器中MongoDB的数据库数据。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e备份\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e备份MongoDB有多种方法，其中比较简单的就是使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emongodump\u003c/code\u003e。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edocker exec -i \u0026#x3C;CONTAINER_NAME\u003e mongodump -d \u0026#x3C;DATABASE\u003e --archive \u003e ./mongo/collections.archive\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e以上命令会将\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;CONTAINER_NAME\u003e\u003c/code\u003e容器中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;DATABASE\u003e\u003c/code\u003e数据库dump到host机器的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecollections.archive\u003c/code\u003e文件中。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e--archive\u003c/code\u003e会dump所有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecollection\u003c/code\u003e到一个文件。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emongodump\u003c/code\u003e命令不提供目标路径的话会将dump结果输出到标准输出，这里使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u003e\u003c/code\u003e重定向输出到host的文件。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e还原\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这里使用host机器上的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecollections.archive\u003c/code\u003e文件进行还原。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edocker exec -i \u0026#x3C;CONTAINER_NAME\u003e mongorestore --archive \u0026#x3C; ./mongo/collections.archive\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e--archive\u003c/code\u003e模式导出的备份文件还原时必须也要加上\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e--archive\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emongorestore\u003c/code\u003e命令不提供源路径的话会使用标准输入，这里使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;\u003c/code\u003e重定向host的文件作为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emongorestore\u003c/code\u003e的输入。\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n![MongoDB](/images/20201204_mongodb.svg)\n\n\u003e 本文介绍如何使用两行简单的命令来执行备份和还原Docker容器中MongoDB的数据库数据。\n\n\u003c!--more--\u003e\n\n## 备份\n\n备份MongoDB有多种方法，其中比较简单的就是使用`mongodump`。\n\n```bash\ndocker exec -i \u003cCONTAINER_NAME\u003e mongodump -d \u003cDATABASE\u003e --archive \u003e ./mongo/collections.archive\n```\n\n- 以上命令会将`\u003cCONTAINER_NAME\u003e`容器中的`\u003cDATABASE\u003e`数据库dump到host机器的`collections.archive`文件中。\n- `--archive`会dump所有`collection`到一个文件。\n- `mongodump`命令不提供目标路径的话会将dump结果输出到标准输出，这里使用`\u003e`重定向输出到host的文件。\n\n## 还原\n\n这里使用host机器上的`collections.archive`文件进行还原。\n\n```bash\ndocker exec -i \u003cCONTAINER_NAME\u003e mongorestore --archive \u003c ./mongo/collections.archive\n```\n\n- `--archive`模式导出的备份文件还原时必须也要加上`--archive`\n- `mongorestore`命令不提供源路径的话会使用标准输入，这里使用`\u003c`重定向host的文件作为`mongorestore`的输入。\n\n","data":{"title":"备份和还原Docker容器中的MongoDB数据","date":"2020-12-05","tags":["Docker","MongoDB"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![MongoDB](/images/20201204_mongodb.svg)\n\n\u003e 本文介绍如何使用两行简单的命令来执行备份和还原Docker容器中MongoDB的数据库数据。\n\n"},{"id":"docker-spring","file":"docker-spring.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://d1q6f0aelx0por.cloudfront.net/product-logos/644d2f15-c5db-4731-a353-ace6235841fa-registry.png\" alt=\"docker\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eDocker容器化技术，使得部署变得平滑。再也不需要维护软件运行所需的复杂环境。Docker和现代化的微服务，敏捷开发，快速迭代和交付的要求非常匹配。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章实践从安装Docker开始，到将一个SpringBoot项目部署到Docker容器中。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://d1q6f0aelx0por.cloudfront.net/product-logos/644d2f15-c5db-4731-a353-ace6235841fa-registry.png\" alt=\"docker\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eDocker容器化技术，使得部署变得平滑。再也不需要维护软件运行所需的复杂环境。Docker和现代化的微服务，敏捷开发，快速迭代和交付的要求非常匹配。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章实践从安装Docker开始，到将一个SpringBoot项目部署到Docker容器中。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e安装Docker CE(Community edition)\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e我这里使用的环境是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUbuntu18.04\u003c/code\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ curl -fsSL https://get.docker.com -o get-docker.sh\n$ sudo sh get-docker.sh\n$ systemctl enable docker\n$ systemctl start docker\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e准备SpringBoot工程\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这里我使用Spring官方的Docker示例项目\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003egit clone https://github.com/spring-guides/gs-spring-boot-docker.git\u003c/code\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eDockerfile\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eSpringBoot的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDockerfile\u003c/code\u003e有两种\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e简单版的如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eFROM openjdk:8-jdk-alpine\nVOLUME /tmp\nARG JAR_FILE\nCOPY ${JAR_FILE} app.jar\nENTRYPOINT [\"java\",\"-jar\",\"/app.jar\"]\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这是典型的SpringBoot项目启动方式\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e复杂版的如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eFROM openjdk:8-jdk-alpine\nVOLUME /tmp\nARG DEPENDENCY=target/dependency\nCOPY ${DEPENDENCY}/BOOT-INF/lib /app/lib\nCOPY ${DEPENDENCY}/META-INF /app/META-INF\nCOPY ${DEPENDENCY}/BOOT-INF/classes /app\nENTRYPOINT [\"java\",\"-cp\",\"app:app/lib/*\",\"hello.Application\"]\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这是将lib和src分离的方式，有点像展开的jar\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我这里选择上面简单版的，简洁和性能之间我选简洁！\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e基于maven构建Docker镜像\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用Maven的话有Spotify构建的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edockerfile-maven-plugin\u003c/code\u003e插件\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-xml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;!-- tag::plugin[] --\u003e\n\u0026#x3C;plugin\u003e\n    \u0026#x3C;groupId\u003ecom.spotify\u0026#x3C;/groupId\u003e\n    \u0026#x3C;artifactId\u003edockerfile-maven-plugin\u0026#x3C;/artifactId\u003e\n    \u0026#x3C;version\u003e1.4.9\u0026#x3C;/version\u003e\n    \u0026#x3C;executions\u003e\n        \u0026#x3C;execution\u003e\n            \u0026#x3C;id\u003edefault\u0026#x3C;/id\u003e\n            \u0026#x3C;phase\u003einstall\u0026#x3C;/phase\u003e\n            \u0026#x3C;goals\u003e\n                \u0026#x3C;goal\u003ebuild\u0026#x3C;/goal\u003e\n                \u0026#x3C;goal\u003epush\u0026#x3C;/goal\u003e\n            \u0026#x3C;/goals\u003e\n        \u0026#x3C;/execution\u003e\n    \u0026#x3C;/executions\u003e\n    \u0026#x3C;configuration\u003e\n        \u0026#x3C;repository\u003e${docker.image.prefix}/${project.artifactId}\u0026#x3C;/repository\u003e\n        \u0026#x3C;buildArgs\u003e\n            \u0026#x3C;JAR_FILE\u003e${project.build.finalName}.jar\u0026#x3C;/JAR_FILE\u003e\n        \u0026#x3C;/buildArgs\u003e\n    \u0026#x3C;/configuration\u003e\n\u0026#x3C;/plugin\u003e\n\u0026#x3C;!-- end::plugin[] --\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e添加了两个maven任务，build用户构建docker镜像，push用于推送docker镜像。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加了构建参数\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ebuildArgs\u003c/code\u003e\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJAR_FILE\u003c/code\u003e传递给Dockerfile。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加了版本号作为镜像tag\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e打包Docker镜像本身是需要docker环境的，于是有一种方法是开启remote API\n到这里其实就已经可以发布程序到DockerHub了，但实际项目中，我们不想发布私人镜像到DockerHub，那么我们需要建立私人的Docker仓库。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e开启remote API远程构建镜像\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eDocker是CS模式，Docker的服务是支持通过Http远程访问的。通过开启remote API即可远程进行访问。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eExecStart=/usr/bin/dockerd -H fd:// -H tcp://0.0.0.0:2376\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e但要注意的remote API是需要进行TSL加密的。否则存在未授权访问漏洞，会被黑客利用，植入挖矿程序（别问我怎么知道的）。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e建立Docker私人仓库（Docker Registry）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e具体方式是添加一个仓库镜像\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ docker run -d -p 5000:5000 --restart always --name registry registry:2\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e然后就可以：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ docker pull ubuntu\n$ docker tag ubuntu localhost:5000/ubuntu\n$ docker push localhost:5000/ubuntu\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e为了安全，创建的私有仓库也要添加Https\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e总结\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用docker部署SpringBoot工程时，正规的流程应该是：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e为工程编写Dockerfile\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加Docker插件，构建Docker镜像\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003epush到公共或私有Docker仓库\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e拉取最新镜像并运行\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e本地无法构建时，应使用某种持续集成方法让编译机去负责出包和推送，不应该使用remote API这不是常规做法，而且有安全风险。\n此外Docker官方提供了安全的私有Docker仓库，少量使用是免费的。\u003c/p\u003e\n","content":"\n![docker](https://d1q6f0aelx0por.cloudfront.net/product-logos/644d2f15-c5db-4731-a353-ace6235841fa-registry.png)\n\nDocker容器化技术，使得部署变得平滑。再也不需要维护软件运行所需的复杂环境。Docker和现代化的微服务，敏捷开发，快速迭代和交付的要求非常匹配。\n\n这篇文章实践从安装Docker开始，到将一个SpringBoot项目部署到Docker容器中。\n\n\u003c!--more--\u003e\n\n## 安装Docker CE(Community edition)\n\n我这里使用的环境是`Ubuntu18.04`\n\n```bash\n$ curl -fsSL https://get.docker.com -o get-docker.sh\n$ sudo sh get-docker.sh\n$ systemctl enable docker\n$ systemctl start docker\n```\n\n## 准备SpringBoot工程\n\n这里我使用Spring官方的Docker示例项目\n\n`git clone https://github.com/spring-guides/gs-spring-boot-docker.git`\n\n## Dockerfile\n\nSpringBoot的`Dockerfile`有两种\n\n简单版的如下：\n```\nFROM openjdk:8-jdk-alpine\nVOLUME /tmp\nARG JAR_FILE\nCOPY ${JAR_FILE} app.jar\nENTRYPOINT [\"java\",\"-jar\",\"/app.jar\"]\n```\n这是典型的SpringBoot项目启动方式\n\n复杂版的如下：\n```\nFROM openjdk:8-jdk-alpine\nVOLUME /tmp\nARG DEPENDENCY=target/dependency\nCOPY ${DEPENDENCY}/BOOT-INF/lib /app/lib\nCOPY ${DEPENDENCY}/META-INF /app/META-INF\nCOPY ${DEPENDENCY}/BOOT-INF/classes /app\nENTRYPOINT [\"java\",\"-cp\",\"app:app/lib/*\",\"hello.Application\"]\n```\n这是将lib和src分离的方式，有点像展开的jar\n\n我这里选择上面简单版的，简洁和性能之间我选简洁！\n\n## 基于maven构建Docker镜像\n\n使用Maven的话有Spotify构建的`dockerfile-maven-plugin`插件\n```xml\n\u003c!-- tag::plugin[] --\u003e\n\u003cplugin\u003e\n    \u003cgroupId\u003ecom.spotify\u003c/groupId\u003e\n    \u003cartifactId\u003edockerfile-maven-plugin\u003c/artifactId\u003e\n    \u003cversion\u003e1.4.9\u003c/version\u003e\n    \u003cexecutions\u003e\n        \u003cexecution\u003e\n            \u003cid\u003edefault\u003c/id\u003e\n            \u003cphase\u003einstall\u003c/phase\u003e\n            \u003cgoals\u003e\n                \u003cgoal\u003ebuild\u003c/goal\u003e\n                \u003cgoal\u003epush\u003c/goal\u003e\n            \u003c/goals\u003e\n        \u003c/execution\u003e\n    \u003c/executions\u003e\n    \u003cconfiguration\u003e\n        \u003crepository\u003e${docker.image.prefix}/${project.artifactId}\u003c/repository\u003e\n        \u003cbuildArgs\u003e\n            \u003cJAR_FILE\u003e${project.build.finalName}.jar\u003c/JAR_FILE\u003e\n        \u003c/buildArgs\u003e\n    \u003c/configuration\u003e\n\u003c/plugin\u003e\n\u003c!-- end::plugin[] --\u003e\n```\n\n- 添加了两个maven任务，build用户构建docker镜像，push用于推送docker镜像。\n- 添加了构建参数`buildArgs`\u003e`JAR_FILE`传递给Dockerfile。\n- 添加了版本号作为镜像tag\n\n\u003e 打包Docker镜像本身是需要docker环境的，于是有一种方法是开启remote API\n\u003e 到这里其实就已经可以发布程序到DockerHub了，但实际项目中，我们不想发布私人镜像到DockerHub，那么我们需要建立私人的Docker仓库。\n\n## 开启remote API远程构建镜像\n\nDocker是CS模式，Docker的服务是支持通过Http远程访问的。通过开启remote API即可远程进行访问。\n```\nExecStart=/usr/bin/dockerd -H fd:// -H tcp://0.0.0.0:2376\n```\n但要注意的remote API是需要进行TSL加密的。否则存在未授权访问漏洞，会被黑客利用，植入挖矿程序（别问我怎么知道的）。\n\n## 建立Docker私人仓库（Docker Registry）\n\n具体方式是添加一个仓库镜像\n\n```bash\n$ docker run -d -p 5000:5000 --restart always --name registry registry:2\n```\n\n然后就可以：\n\n```bash\n$ docker pull ubuntu\n$ docker tag ubuntu localhost:5000/ubuntu\n$ docker push localhost:5000/ubuntu\n```\n\n\u003e 为了安全，创建的私有仓库也要添加Https\n\n## 总结\n\n使用docker部署SpringBoot工程时，正规的流程应该是：\n1. 为工程编写Dockerfile\n2. 添加Docker插件，构建Docker镜像\n3. push到公共或私有Docker仓库\n4. 拉取最新镜像并运行\n\n本地无法构建时，应使用某种持续集成方法让编译机去负责出包和推送，不应该使用remote API这不是常规做法，而且有安全风险。\n此外Docker官方提供了安全的私有Docker仓库，少量使用是免费的。","data":{"title":"使用Docker容器部署SpringBoot项目","date":"2019-11-20","tags":["Linux","Docker","Spring Boot"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![docker](https://d1q6f0aelx0por.cloudfront.net/product-logos/644d2f15-c5db-4731-a353-ace6235841fa-registry.png)\n\nDocker容器化技术，使得部署变得平滑。再也不需要维护软件运行所需的复杂环境。Docker和现代化的微服务，敏捷开发，快速迭代和交付的要求非常匹配。\n\n这篇文章实践从安装Docker开始，到将一个SpringBoot项目部署到Docker容器中。\n\n"}],"cid":"docker"},"__N_SSG":true},"page":"/blog/tag/[cid]","query":{"cid":"docker"},"buildId":"7YMuoTtyITfiinBiv1T76","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
