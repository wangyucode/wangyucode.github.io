Node();\n            node.address = lineArray[0];\n            node.data = Integer.parseInt(lineArray[1]);\n            node.nextAddress = lineArray[2];\n            nodes.add(node);\n        }\n\n\n        //按链表顺序加入队列\n        LinkedList\u003cNode\u003e queue = new LinkedList\u003c\u003e();\n        String address = firstAddress;\n        while (!address.equals(\"-1\")) {\n            for (int i = 0; i \u003c nodes.size(); i++) { //循环匹配地址\n                Node n = nodes.get(i);\n                if (Objects.equals(address, n.address)) { //找到则加入队列\n                    queue.add(n);\n                    address = n.nextAddress; //查找地址赋值为当前节点的下一个地址\n                    nodes.remove(n); //处理完的移出节点数组，减少循环量\n                    break;\n                }\n            }\n        }\n\n        Stack\u003cNode\u003e stack = new Stack\u003c\u003e();\n        boolean isCanConvert = queue.size() \u003e= k; //是否够反转\n        while (!queue.isEmpty()) { //循环出队列\n            Node n = queue.remove();\n            if (isCanConvert) { //够反转则压入堆栈\n                stack.push(n);\n                if (stack.size() == k) { //压够反转数量就全部输出\n                    isCanConvert = queue.size() \u003e= k; //再次检查是否够反转\n                    while (!stack.isEmpty()) {\n                        //重新赋值next\n                        Node nStack = stack.pop();\n                        if (stack.isEmpty()) { //如果栈里没了，地址就等于队列的下一个\n                            if (queue.isEmpty()) { //队列也没了，地址等于-1\n                                nStack.nextAddress = \"-1\";\n                            } else {\n                                //如果剩下的还能反转\n                                if (isCanConvert) {\n                                    nStack.nextAddress = queue.get(k - 1).address;\n                                } else {\n                                    nStack.nextAddress = queue.peek().address;\n                                }\n                            }\n                        } else {\n                            nStack.nextAddress = stack.peek().address;\n                        }\n                        print(nStack);\n                    }\n                }\n            } else { //不够反转 直接输出节点\n                print(n);\n            }\n        }\n\n    }\n\n\n    private static void print(Node n) {\n        System.out.println(n.address + \" \" + n.data + \" \" + n.nextAddress);\n    }\n\n    private static String[] getStringArray(BufferedReader reader) {\n        String line1 = null;\n        try {\n            line1 = reader.readLine();\n        } catch (Exception ignore) {\n        }\n        return line1.split(\" \");\n    }\n\n    static class Node {\n        String address;\n        int data;\n        String nextAddress;\n    }\n}\n\n```\n\n\n- 总结：\n\n1. 利用队列和栈解决顺序问题\n\n## 作业2：Pop Sequence（25 分）\n\n\nGiven a stack which can keep M numbers at most. Push N numbers in the order of 1, 2, 3, ..., N and pop randomly. You are supposed to tell if a given sequence of numbers is a possible pop sequence of the stack. For example, if M is 5 and N is 7, we can obtain 1, 2, 3, 4, 5, 6, 7 from the stack, but not 3, 2, 1, 7, 5, 6, 4.\n\nInput Specification:\n\nEach input file contains one test case. For each case, the first line contains 3 numbers (all no more than 1000): M (the maximum capacity of the stack), N (the length of push sequence), and K (the number of pop sequences to be checked). Then K lines follow, each contains a pop sequence of N numbers. All the numbers in a line are separated by a space.\n\nOutput Specification:\n\nFor each pop sequence, print in one line \"YES\" if it is indeed a possible pop sequence of the stack, or \"NO\" if not.\n\nSample Input:\n```bash\n5 7 5\n1 2 3 4 5 6 7\n3 2 1 7 5 6 4\n7 6 5 4 3 2 1\n5 6 4 3 7 2 1\n1 7 6 5 4 3 2\n```\nSample Output:\n```bash\nYES\nNO\nNO\nYES\nNO\n```","data":{"title":"数据结构与算法学习笔记02","date":"2018-03-16","tags":["C"],"category":"Computer Science"},"isEmpty":false,"excerpt":"\n![浙江大学](https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg)\n\n\u003e 线性结构的基础是数组和链表，由数组和链表可以扩展出堆栈和队列。\n\n\n"},{"id":"data-structures01","file":"data-structures01.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg\" alt=\"浙江大学\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e程序=数据结构+算法。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e浙江大学数据结构是国家精品课程，于2018年3月开学，2018年6月学期结束。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg\" alt=\"浙江大学\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e程序=数据结构+算法。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e浙江大学数据结构是国家精品课程，于2018年3月开学，2018年6月学期结束。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e实验1：给出数字N，要求程序输出1~N的整数\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用Java测试：输出10000次，for循环耗时114ms，递归耗时61ms！100000次递归栈溢出崩溃，for循环耗时900ms。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\npublic class Main {\n\n    public static void main(String[] args) {\n   \t\t// write your code here\n        Main m = new Main();\n        long time = System.currentTimeMillis();\n        m.printN(10000);\n        System.out.println(\"time=\"+(System.currentTimeMillis()-time));\n        time = System.currentTimeMillis();\n        m.printNR(10000);\n        System.out.println(\"time=\"+(System.currentTimeMillis()-time));\n    }\n\n    private void printNR(int n) {\n        if(n\u003e0) {\n            printNR(n - 1);\n            System.out.println(n);\n        }\n    }\n\n    private void printN(int n){\n        for(int i= 1;i\u0026#x3C;=n;i++){\n            System.out.println(i);\n        }\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e用C测试：输出100000次，for循环耗时149ms，递归耗时148ms，100000次递归耗时150ms，100万次\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-C px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e#include \u0026#x3C;stdio.h\u003e\n#include \u0026#x3C;time.h\u003e\n\n\nvoid printN(int n);\nvoid printNC(int n);\n\nint main(){\n    clock_t startTime = clock();\n    printN(100000);\n    //double diff = ;\n    printf(\"%f seconds\\n\",difftime(clock(),startTime)/CLOCKS_PER_SEC);\n    \n    \n}\n\nvoid printN(int n){\n    for(int i=1;i\u0026#x3C;=n;i++){\n        printf(\"%d\\n\",i);\n    }\n}\n\n\nvoid printNC(int n){\n    if(n){\n        printNC(n-1);\n        printf(\"%d\\n\",n);\n    }\n\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结:\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003cdel\u003eC语言程序运行效率至少在Java的10倍以上\u003c/del\u003e（C程序计时不准，需要重新测试）\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e递归的空间效率很差，容易堆栈溢出崩溃。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eJava环境递归耗时是for循环的1/2。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eC语言环境递归耗时和for循环差不多。\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e实验2：计算多项式的值\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180313_data_structure.png\" alt=\"多项式\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epublic class Test02 {\n\n    public static void main(String[] args) {\n        // write your code here\n        Test02 t = new Test02();\n        long time = System.currentTimeMillis();\n        for(int i=0;i\u0026#x3C;100000;i++) {\n            t.f1(1.1);\n        }\n        System.out.println(\"time=\" + (System.currentTimeMillis() - time));\n        time = System.currentTimeMillis();\n        for(int i=0;i\u0026#x3C;100000;i++) {\n            t.f2(1.1);\n        }\n        System.out.println(\"time=\" + (System.currentTimeMillis() - time));\n    }\n\n    private double f1(double x) {\n        double v = 1f;\n        for (int i = 1; i \u0026#x3C;= 100; i++) {\n            v += Math.pow(x,i) / i;\n        }\n        return v;\n    }\n\n    //f(x) = 1+x(1/1+x(1/2+x(1/3+....x(1/100))))\n\n    private double f2(double x) {\n        double v = x/100;\n        int i = 100;\n        while (i\u003e1) {\n            v = x*(1f/(i-1)+v);\n            i--;\n        }\n        return v+1;\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结：\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e循环10万次测试，方法1，耗时1016ms，方法2耗时16ms。约100倍的效率差距\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e计算时一定要注意，整形和浮点型\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ev = x*(1f/(i-1)+v);\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e方法1，慢就慢在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epow\u003c/code\u003e函数上\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e替换pow函数为计数循环\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ex *=x\u003c/code\u003e耗时500ms，差距缩小至约20倍。\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业1\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e01-复杂度1 最大子列和问题（20 分）\n给定K个整数组成的序列{ N​1, N2, ..., NK}，“连续子列”被定义为{ N​i, Ni+1, ..., N​j}，其中 1≤i≤j≤K。\n“最大子列和”则被定义为所有连续子列元素的和中最大者。\n例如给定序列{ -2, 11, -4, 13, -5, -2 }，其连续子列{ 11, -4, 13 }有最大的和20。\n现要求你编写程序，计算给定整数序列的最大子列和。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本题旨在测试各种不同的算法在各种数据情况下的表现。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e各组测试数据特点如下：\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e数据1：与样例等价，测试基本正确性；\n数据2：102个随机整数；\n数据3：103个随机整数；\n数据4：104个随机整数；\n数据5：105个随机整数；\n输入格式:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输入第1行给出正整数K (≤100000)；第2行给出K个整数，其间以空格分隔。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输出格式:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在一行中输出最大子列和。如果序列中所有整数皆为负数，则输出0。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输入样例:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e 6\n -2 11 -4 13 -5 -2\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e输出样例:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e 20\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e实现：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eimport java.util.Scanner;\n\n\npublic class Main{\n\n    public static void main(String args[]) {\n        Scanner scanner = new Scanner(System.in);\n        int k = scanner.nextInt();\n        int[] n = new int[k];\n        for (int i = 0; i \u0026#x3C; k; i++) {\n            if (scanner.hasNext()) {\n                n[i] = scanner.nextInt();\n            }\n        }\n        System.out.println(maximumSubsequenceSum(n));\n    }\n\n    /**\n     * 在线处理算法，任意时刻给出的都是当前最大子数列和\n     * @param n\n     * @return\n     */\n    private static int maximumSubsequenceSum(int[] n) {\n        int thisMax = 0;\n        int maxSum = 0;\n        for (int i = 0; i \u0026#x3C; n.length; i++) {\n            thisMax += n[i];\n\n            if (thisMax \u0026#x3C; 0) {\n                thisMax = 0;\n            } else if (thisMax \u003e maxSum) {\n                maxSum = thisMax;\n            }\n        }\n        return maxSum;\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业2\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e01-复杂度2 Maximum Subsequence Sum（25 分）\nGiven a sequence of K integers { N1, N2, ..., NK}. A continuous subsequence is defined to be { Ni, Ni+1, ..., Nj } where 1≤i≤j≤K. The Maximum Subsequence is the continuous subsequence which has the largest sum of its elements. For example, given sequence { -2, 11, -4, 13, -5, -2 }, its maximum subsequence is { 11, -4, 13 } with the largest sum being 20.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eNow you are supposed to find the largest sum, together with the first and the last numbers of the maximum subsequence.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eInput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eEach input file contains one test case. Each case occupies two lines. The first line contains a positive integer K (≤10000). The second line contains K numbers, separated by a space.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eOutput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eFor each test case, output in one line the largest sum, together with the first and the last numbers of the maximum subsequence. The numbers must be separated by one space, but there must be no extra space at the end of a line. In case that the maximum subsequence is not unique, output the one with the smallest indices i and j (as shown by the sample case). If all the K numbers are negative, then its maximum sum is defined to be 0, and you are supposed to output the first and the last numbers of the whole sequence.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eSample Input:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e10\n-10 1 2 3 4 -5 -23 3 7 -21\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003eSample Output:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e10 1 4\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epublic class Main {\n    public static void main(String[] args) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n        String countString = null;\n        String numbersString =null;\n        try {\n            countString = reader.readLine();\n            numbersString = reader.readLine();\n        }catch (Exception ignored){\n\n        }\n        int[] n = new int[Integer.parseInt(countString)];\n        String[] numbersStringArray = numbersString.split(\" \");\n\n        for (int i = 0; i \u0026#x3C; n.length; i++) {\n            n[i] = Integer.parseInt(numbersStringArray[i]);\n        }\n\n\n//        Scanner scanner = new Scanner(System.in);\n//        int k = scanner.nextInt();\n//        int[] n = new int[k];\n//\n//        for (int i = 0; i \u0026#x3C; k; i++) {\n//            n[i] = scanner.nextInt();\n//        }\n\n        maximumSubsequenceSum(n);\n\n    }\n\n    /**\n     * 在线处理算法，任意时刻给出的都是当前最大子数列和\n     *\n     * @param n\n     * @return\n     */\n    private static void maximumSubsequenceSum(int[] n) {\n        int thisMax = 0;\n        int maxSum = 0;\n\n        int startI = 0;\n        int endI = n.length - 1;\n        int temp = 0;\n        boolean isMaxStart = true;\n        for (int i = 0; i \u0026#x3C; n.length; i++) {\n            thisMax += n[i];\n\n            if (thisMax \u0026#x3C; 0) {\n                thisMax = 0;\n                temp = 0;\n                isMaxStart = true;\n            } else {\n\n                if(isMaxStart){\n                    temp = i;\n                    isMaxStart = false;\n                }\n\n                if (thisMax \u003e maxSum) {\n\n                    maxSum = thisMax;\n                    endI = i;\n                    startI = temp;\n                }\n\n                if(maxSum==0){\n                    startI =temp;\n                    endI = i;\n                }\n            }\n        }\n\n\n        System.out.println(maxSum + \" \" + n[startI] + \" \" + n[endI]);\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e这题所有case要求在200ms内执行完毕，其中一个case比较大的N导致执行超时,调查发现Scanner这个东西贼慢...换成BufferReader就好了。\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业3\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e01-复杂度3 二分查找（20 分）\n本题要求实现二分查找算法。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e函数接口定义：\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ePosition BinarySearch( List L, ElementType X );\u003c/code\u003e\n其中List结构定义如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-c px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003etypedef int Position;\ntypedef struct LNode *List;\nstruct LNode {\n    ElementType Data[MAXSIZE];\n    Position Last; /* 保存线性表中最后一个元素的位置 */\n};\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003eL是用户传入的一个线性表，其中ElementType元素可以通过\u003e、==、\u0026#x3C;进行比较，并且题目保证传入的数据是递增有序的。函数BinarySearch要查找X在Data中的位置，即数组下标（注意：元素从下标1开始存储）。找到则返回下标，否则返回一个特殊的失败标记NotFound。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e裁判测试程序样例：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-c px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e#include \u0026#x3C;stdio.h\u003e\n#include \u0026#x3C;stdlib.h\u003e\n\n#define MAXSIZE 10\n#define NotFound 0\ntypedef int ElementType;\n\ntypedef int Position;\ntypedef struct LNode *List;\nstruct LNode {\n    ElementType Data[MAXSIZE];\n    Position Last; /* 保存线性表中最后一个元素的位置 */\n};\n\nList ReadInput(); /* 裁判实现，细节不表。元素从下标1开始存储 */\nPosition BinarySearch( List L, ElementType X );\n\nint main()\n{\n    List L;\n    ElementType X;\n    Position P;\n\n    L = ReadInput();\n    scanf(\"%d\", \u0026#x26;X);\n    P = BinarySearch( L, X );\n    printf(\"%d\\n\", P);\n\n    return 0;\n}\n\n/* 你的代码将被嵌在这里 */\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e输入样例1：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e5\n12 31 55 89 101\n31\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e输出样例1：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e2\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e输入样例2：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e3\n26 78 233\n31\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e输出样例2：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e0\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n![浙江大学](https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg)\n\n\u003e 程序=数据结构+算法。\n\n浙江大学数据结构是国家精品课程，于2018年3月开学，2018年6月学期结束。\n\n\u003c!--more--\u003e\n\n## 实验1：给出数字N，要求程序输出1~N的整数\n\n使用Java测试：输出10000次，for循环耗时114ms，递归耗时61ms！100000次递归栈溢出崩溃，for循环耗时900ms。\n\n```java\n\npublic class Main {\n\n    public static void main(String[] args) {\n   \t\t// write your code here\n        Main m = new Main();\n        long time = System.currentTimeMillis();\n        m.printN(10000);\n        System.out.println(\"time=\"+(System.currentTimeMillis()-time));\n        time = System.currentTimeMillis();\n        m.printNR(10000);\n        System.out.println(\"time=\"+(System.currentTimeMillis()-time));\n    }\n\n    private void printNR(int n) {\n        if(n\u003e0) {\n            printNR(n - 1);\n            System.out.println(n);\n        }\n    }\n\n    private void printN(int n){\n        for(int i= 1;i\u003c=n;i++){\n            System.out.println(i);\n        }\n    }\n}\n```\n\n用C测试：输出100000次，for循环耗时149ms，递归耗时148ms，100000次递归耗时150ms，100万次\n\n```C\n#include \u003cstdio.h\u003e\n#include \u003ctime.h\u003e\n\n\nvoid printN(int n);\nvoid printNC(int n);\n\nint main(){\n    clock_t startTime = clock();\n    printN(100000);\n    //double diff = ;\n    printf(\"%f seconds\\n\",difftime(clock(),startTime)/CLOCKS_PER_SEC);\n    \n    \n}\n\nvoid printN(int n){\n    for(int i=1;i\u003c=n;i++){\n        printf(\"%d\\n\",i);\n    }\n}\n\n\nvoid printNC(int n){\n    if(n){\n        printNC(n-1);\n        printf(\"%d\\n\",n);\n    }\n\n}\n\n```\n\n- 总结:\n\n1. ~~C语言程序运行效率至少在Java的10倍以上~~（C程序计时不准，需要重新测试）\n2. 递归的空间效率很差，容易堆栈溢出崩溃。\n3. Java环境递归耗时是for循环的1/2。\n4. C语言环境递归耗时和for循环差不多。\n\n## 实验2：计算多项式的值\n\n![多项式](/images/20180313_data_structure.png)\n\n```java\npublic class Test02 {\n\n    public static void main(String[] args) {\n        // write your code here\n        Test02 t = new Test02();\n        long time = System.currentTimeMillis();\n        for(int i=0;i\u003c100000;i++) {\n            t.f1(1.1);\n        }\n        System.out.println(\"time=\" + (System.currentTimeMillis() - time));\n        time = System.currentTimeMillis();\n        for(int i=0;i\u003c100000;i++) {\n            t.f2(1.1);\n        }\n        System.out.println(\"time=\" + (System.currentTimeMillis() - time));\n    }\n\n    private double f1(double x) {\n        double v = 1f;\n        for (int i = 1; i \u003c= 100; i++) {\n            v += Math.pow(x,i) / i;\n        }\n        return v;\n    }\n\n    //f(x) = 1+x(1/1+x(1/2+x(1/3+....x(1/100))))\n\n    private double f2(double x) {\n        double v = x/100;\n        int i = 100;\n        while (i\u003e1) {\n            v = x*(1f/(i-1)+v);\n            i--;\n        }\n        return v+1;\n    }\n}\n\n```\n\n- 总结：\n1. 循环10万次测试，方法1，耗时1016ms，方法2耗时16ms。约100倍的效率差距\n2. 计算时一定要注意，整形和浮点型`v = x*(1f/(i-1)+v);`\n3. 方法1，慢就慢在`pow`函数上\n4. 替换pow函数为计数循环`x *=x`耗时500ms，差距缩小至约20倍。\n\n## 作业1\n\n01-复杂度1 最大子列和问题（20 分）\n给定K个整数组成的序列{ N​1, N2, ..., NK}，“连续子列”被定义为{ N​i, Ni+1, ..., N​j}，其中 1≤i≤j≤K。\n“最大子列和”则被定义为所有连续子列元素的和中最大者。\n例如给定序列{ -2, 11, -4, 13, -5, -2 }，其连续子列{ 11, -4, 13 }有最大的和20。\n现要求你编写程序，计算给定整数序列的最大子列和。\n\n本题旨在测试各种不同的算法在各种数据情况下的表现。\n\n各组测试数据特点如下：\n\n 数据1：与样例等价，测试基本正确性；\n 数据2：102个随机整数；\n 数据3：103个随机整数；\n 数据4：104个随机整数；\n 数据5：105个随机整数；\n输入格式:\n\n 输入第1行给出正整数K (≤100000)；第2行给出K个整数，其间以空格分隔。\n\n输出格式:\n\n 在一行中输出最大子列和。如果序列中所有整数皆为负数，则输出0。\n\n输入样例:\n```\n 6\n -2 11 -4 13 -5 -2\n```\n输出样例:\n```\n 20\n```\n\n实现：\n\n```java\nimport java.util.Scanner;\n\n\npublic class Main{\n\n    public static void main(String args[]) {\n        Scanner scanner = new Scanner(System.in);\n        int k = scanner.nextInt();\n        int[] n = new int[k];\n        for (int i = 0; i \u003c k; i++) {\n            if (scanner.hasNext()) {\n                n[i] = scanner.nextInt();\n            }\n        }\n        System.out.println(maximumSubsequenceSum(n));\n    }\n\n    /**\n     * 在线处理算法，任意时刻给出的都是当前最大子数列和\n     * @param n\n     * @return\n     */\n    private static int maximumSubsequenceSum(int[] n) {\n        int thisMax = 0;\n        int maxSum = 0;\n        for (int i = 0; i \u003c n.length; i++) {\n            thisMax += n[i];\n\n            if (thisMax \u003c 0) {\n                thisMax = 0;\n            } else if (thisMax \u003e maxSum) {\n                maxSum = thisMax;\n            }\n        }\n        return maxSum;\n    }\n}\n```\n\n## 作业2\n\n01-复杂度2 Maximum Subsequence Sum（25 分）\nGiven a sequence of K integers { N1, N2, ..., NK}. A continuous subsequence is defined to be { Ni, Ni+1, ..., Nj } where 1≤i≤j≤K. The Maximum Subsequence is the continuous subsequence which has the largest sum of its elements. For example, given sequence { -2, 11, -4, 13, -5, -2 }, its maximum subsequence is { 11, -4, 13 } with the largest sum being 20.\n\nNow you are supposed to find the largest sum, together with the first and the last numbers of the maximum subsequence.\n\nInput Specification:\n\nEach input file contains one test case. Each case occupies two lines. The first line contains a positive integer K (≤10000). The second line contains K numbers, separated by a space.\n\nOutput Specification:\n\nFor each test case, output in one line the largest sum, together with the first and the last numbers of the maximum subsequence. The numbers must be separated by one space, but there must be no extra space at the end of a line. In case that the maximum subsequence is not unique, output the one with the smallest indices i and j (as shown by the sample case). If all the K numbers are negative, then its maximum sum is defined to be 0, and you are supposed to output the first and the last numbers of the whole sequence.\n\nSample Input:\n```\n10\n-10 1 2 3 4 -5 -23 3 7 -21\n```\nSample Output:\n```\n10 1 4\n```\n\n- 实现：\n\n```java\npublic class Main {\n    public static void main(String[] args) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n        String countString = null;\n        String numbersString =null;\n        try {\n            countString = reader.readLine();\n            numbersString = reader.readLine();\n        }catch (Exception ignored){\n\n        }\n        int[] n = new int[Integer.parseInt(countString)];\n        String[] numbersStringArray = numbersString.split(\" \");\n\n        for (int i = 0; i \u003c n.length; i++) {\n            n[i] = Integer.parseInt(numbersStringArray[i]);\n        }\n\n\n//        Scanner scanner = new Scanner(System.in);\n//        int k = scanner.nextInt();\n//        int[] n = new int[k];\n//\n//        for (int i = 0; i \u003c k; i++) {\n//            n[i] = scanner.nextInt();\n//        }\n\n        maximumSubsequenceSum(n);\n\n    }\n\n    /**\n     * 在线处理算法，任意时刻给出的都是当前最大子数列和\n     *\n     * @param n\n     * @return\n     */\n    private static void maximumSubsequenceSum(int[] n) {\n        int thisMax = 0;\n        int maxSum = 0;\n\n        int startI = 0;\n        int endI = n.length - 1;\n        int temp = 0;\n        boolean isMaxStart = true;\n        for (int i = 0; i \u003c n.length; i++) {\n            thisMax += n[i];\n\n            if (thisMax \u003c 0) {\n                thisMax = 0;\n                temp = 0;\n                isMaxStart = true;\n            } else {\n\n                if(isMaxStart){\n                    temp = i;\n                    isMaxStart = false;\n                }\n\n                if (thisMax \u003e maxSum) {\n\n                    maxSum = thisMax;\n                    endI = i;\n                    startI = temp;\n                }\n\n                if(maxSum==0){\n                    startI =temp;\n                    endI = i;\n                }\n            }\n        }\n\n\n        System.out.println(maxSum + \" \" + n[startI] + \" \" + n[endI]);\n    }\n}\n\n```\n\n- 总结\n\n1. 这题所有case要求在200ms内执行完毕，其中一个case比较大的N导致执行超时,调查发现Scanner这个东西贼慢...换成BufferReader就好了。\n\n## 作业3\n\n\n01-复杂度3 二分查找（20 分）\n本题要求实现二分查找算法。\n\n函数接口定义：\n\n`Position BinarySearch( List L, ElementType X );`\n其中List结构定义如下：\n```c\ntypedef int Position;\ntypedef struct LNode *List;\nstruct LNode {\n    ElementType Data[MAXSIZE];\n    Position Last; /* 保存线性表中最后一个元素的位置 */\n};\n```\nL是用户传入的一个线性表，其中ElementType元素可以通过\u003e、==、\u003c进行比较，并且题目保证传入的数据是递增有序的。函数BinarySearch要查找X在Data中的位置，即数组下标（注意：元素从下标1开始存储）。找到则返回下标，否则返回一个特殊的失败标记NotFound。\n\n裁判测试程序样例：\n```c\n#include \u003cstdio.h\u003e\n#include \u003cstdlib.h\u003e\n\n#define MAXSIZE 10\n#define NotFound 0\ntypedef int ElementType;\n\ntypedef int Position;\ntypedef struct LNode *List;\nstruct LNode {\n    ElementType Data[MAXSIZE];\n    Position Last; /* 保存线性表中最后一个元素的位置 */\n};\n\nList ReadInput(); /* 裁判实现，细节不表。元素从下标1开始存储 */\nPosition BinarySearch( List L, ElementType X );\n\nint main()\n{\n    List L;\n    ElementType X;\n    Position P;\n\n    L = ReadInput();\n    scanf(\"%d\", \u0026X);\n    P = BinarySearch( L, X );\n    printf(\"%d\\n\", P);\n\n    return 0;\n}\n\n/* 你的代码将被嵌在这里 */\n```\n输入样例1：\n```\n5\n12 31 55 89 101\n31\n```\n输出样例1：\n```\n2\n```\n输入样例2：\n```\n3\n26 78 233\n31\n```\n输出样例2：\n```\n0\n```\n\n\n- 实现：\n\n\n\n","data":{"title":"数据结构与算法学习笔记01","date":"2018-03-14","tags":["C"],"category":"Computer Science"},"isEmpty":false,"excerpt":"\n![浙江大学](https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg)\n\n\u003e 程序=数据结构+算法。\n\n浙江大学数据结构是国家精品课程，于2018年3月开学，2018年6月学期结束。\n\n"}],"cid":"c"},"__N_SSG":true},"page":"/blog/tag/[cid]","query":{"cid":"c"},"buildId":"uFO1FMOoBQ2X-GM8G4ZfF","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
