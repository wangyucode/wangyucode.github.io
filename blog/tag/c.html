00"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"data-structures03","file":"data-structures03.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg\" alt=\"浙江大学\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e树状结构的基础是二叉树，二叉树即度为2的树。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e二叉树的链表结构\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-c px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003etypedef struct TNode *Position;\ntypedef Position BinTree; /* 二叉树类型 */\nstruct TNode{ /* 树结点定义 */\n    ElementType Data; /* 结点数据 */\n    BinTree Left;     /* 指向左子树 */\n    BinTree Right;    /* 指向右子树 */\n};\n\u003c/code\u003e\u003c/pre\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg\" alt=\"浙江大学\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e树状结构的基础是二叉树，二叉树即度为2的树。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e二叉树的链表结构\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-c px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003etypedef struct TNode *Position;\ntypedef Position BinTree; /* 二叉树类型 */\nstruct TNode{ /* 树结点定义 */\n    ElementType Data; /* 结点数据 */\n    BinTree Left;     /* 指向左子树 */\n    BinTree Right;    /* 指向右子树 */\n};\n\u003c/code\u003e\u003c/pre\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业1：树的同构\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e给定两棵树T1和T2。如果T1可以通过若干次左右孩子互换就变成T2，则我们称两棵树是“同构”的。例如图1给出的两棵树就是同构的，因为我们把其中一棵树的结点A、B、G的左右孩子互换后，就得到另外一棵树。而图2就不是同构的。\n图1：\n\u003cimg src=\"/images/20180326_data_structures03_1.png\" alt=\"图1\" class=\"mx-auto max-h-80\"\u003e\n图2：\n\u003cimg src=\"/images/20180326_data_structures03_2.png\" alt=\"图2\" class=\"mx-auto max-h-80\"\u003e\n现给定两棵树，请你判断它们是否是同构的。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e输入格式:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e输入给出2棵二叉树树的信息。对于每棵树，首先在一行中给出一个非负整数N (≤10)，即该树的结点数（此时假设结点从0到N−1编号）；随后N行，第i行对应编号第i个结点，给出该结点中存储的1个英文大写字母、其左孩子结点的编号、右孩子结点的编号。如果孩子结点为空，则在相应位置上给出\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e-\u003c/code\u003e。给出的数据间用一个空格分隔。注意：题目保证每个结点中存储的字母是不同的。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e输出格式:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e如果两棵树是同构的，输出\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eYes\u003c/code\u003e，否则输出\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNo\u003c/code\u003e。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e输入样例1（对应图1）：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e8\nA 1 2\nB 3 4\nC 5 -\nD - -\nE 6 -\nG 7 -\nF - -\nH - -\n8\nG - 4\nB 7 6\nF - -\nA 5 1\nH - -\nC 0 -\nD - -\nE 2 -\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e输出样例1:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eYes\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e输入样例2（对应图2）：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e8\nB 5 7\nF - -\nA 0 3\nC 6 -\nH - -\nD - -\nG 4 -\nE 1 -\n8\nD 6 -\nB 5 -\nE - -\nH - -\nC 0 2\nG - 3\nF - -\nA 1 4\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e输出样例2:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eNo\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epublic class Main {\n    public static void main(String args[]) throws IOException {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n        //读第一个树节点\n        int n_a = 0;\n        n_a = Integer.parseInt(reader.readLine());\n\n        String[] inputs_a = new String[n_a];\n        List\u0026#x3C;Node\u003e nodes_a = new ArrayList\u0026#x3C;\u003e(n_a);\n\n        for (int i = 0; i \u0026#x3C; n_a; i++) {\n            inputs_a[i] = reader.readLine();\n        }\n\n\n        int n_b = 0;\n        n_b = Integer.parseInt(reader.readLine());\n\n        String[] inputs_b = new String[n_b];\n        List\u0026#x3C;Node\u003e nodes_b = new ArrayList\u0026#x3C;\u003e(n_b);\n\n        for (int i = 0; i \u0026#x3C; n_b; i++) {\n            inputs_b[i] = reader.readLine();\n        }\n\n        if (n_a != n_b) {\n            System.out.println(\"No\");\n            return;\n        }\n\n        addNodes(inputs_a, nodes_a);\n        addNodes(inputs_b, nodes_b);\n\n        if(inputs_a.length==1\u0026#x26;\u0026#x26;!Objects.equals(nodes_a.get(0).data,nodes_b.get(0).data)){\n            System.out.println(\"No\");\n            return;\n        }\n\n        for (Node node_a : nodes_a) {\n            for (Node node_b : nodes_b) {\n                if (Objects.equals(node_a.data, node_b.data)) {\n                    if (!((Objects.equals(node_a.left, node_b.left) \u0026#x26;\u0026#x26; Objects.equals(node_a.right, node_b.right))\n                            || (Objects.equals(node_a.left, node_b.right) \u0026#x26;\u0026#x26; Objects.equals(node_a.right, node_b.left)))) {\n                        System.out.println(\"No\");\n                        return;\n                    }\n                }\n            }\n        }\n\n        System.out.println(\"Yes\");\n    }\n\n\n    private static void addNodes(String[] inputs, List\u0026#x3C;Node\u003e nodes) {\n        for (String input : inputs) {\n            Node n = new Node();\n            String[] lineArg = input.split(\" \");\n            n.data = lineArg[0];\n            if (!Objects.equals(\"-\", lineArg[1])) {\n                int left_num = Integer.parseInt(lineArg[1]);\n                n.left = inputs[left_num].split(\" \")[0];\n            }\n            if (!Objects.equals(\"-\", lineArg[2])) {\n                int right_num = Integer.parseInt(lineArg[2]);\n                n.right = inputs[right_num].split(\" \")[0];\n            }\n            nodes.add(n);\n        }\n    }\n\n    static class Node {\n        String data;\n        String left;\n        String right;\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结:\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e利用二叉树的数据结构可以解决这个问题。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里我采用了投机取巧的办法，并没有建立树状结构，而是把每个节点进行比较，唯一需要处理的特例就是同唯一父节点值不同的情况。\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业2：List Leaves（25 分）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eGiven a tree, you are supposed to list all the leaves in the order of top down, and left to right.\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eInput Specification:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eEach input file contains one test case. For each case, the first line gives a positive integer N (≤10) which is the total number of nodes in the tree -- and hence the nodes are numbered from 0 to N−1. Then N lines follow, each corresponds to a node, and gives the indices of the left and right children of the node. If the child does not exist, a \"-\" will be put at the position. Any pair of children are separated by a space.\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eOutput Specification:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eFor each test case, print in one line all the leaves' indices in the order of top down, and left to right. There must be exactly one space between any adjacent numbers, and no extra space at the end of the line.\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eSample Input:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e8\n1 -\n- -\n0 -\n2 7\n- -\n- -\n5 -\n4 6\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003eSample Output:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e4 1 5\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epublic class Main {\n    public static void main(String args[]) throws IOException {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n\n        int sum;\n        sum = Integer.parseInt(reader.readLine());\n\n        String[] inputs = new String[sum];\n\n        for (int i = 0; i \u0026#x3C; sum; i++) {\n            inputs[i] = reader.readLine();\n        }\n\n        int root_num = findRoot(inputs);\n        StringBuilder sb = new StringBuilder();\n        Queue\u0026#x3C;Node\u003e nodes = new LinkedList\u0026#x3C;\u003e();\n\n        Node root =  getNode(root_num,inputs[root_num]);\n        nodes.add(root);\n        checkTree(nodes, sb, inputs);\n        if (sb.length() \u003e 0) {\n            sb.deleteCharAt(sb.length() - 1);\n        }\n        System.out.println(sb.toString());\n    }\n\n    private static Node getNode(int root_num, String input) {\n        Node node = new Node();\n        node.data = root_num;\n        String[] lineArg = input.split(\" \");\n        if (!Objects.equals(\"-\", lineArg[0])) {\n            node.left = Integer.parseInt(lineArg[0]);\n        }\n        if (!Objects.equals(\"-\", lineArg[1])) {\n            node.right = Integer.parseInt(lineArg[1]);\n        }\n        return node;\n    }\n\n    private static void checkTree(Queue\u0026#x3C;Node\u003e nodes, StringBuilder sb, String[] inputs) {\n        while (!nodes.isEmpty()) {\n            Node node = nodes.poll();\n            if (node.left\u0026#x3C;0 \u0026#x26;\u0026#x26; node.right\u0026#x3C;0) {\n                sb.append(node.data);\n                sb.append(' ');\n            }\n            if (node.left\u003e=0) {\n                Node n_l = getNode(node.left,inputs[node.left]);\n                nodes.add(n_l);\n            }\n            if (node.right\u003e=0) {\n                Node n_r = getNode(node.right,inputs[node.right]);\n                nodes.add(n_r);\n            }\n        }\n    }\n\n\n    private static int findRoot(String[] inputs) {\n        int[] link = new int[inputs.length];\n        for (String input : inputs) {\n            String[] lineArg = input.split(\" \");\n            if (!Objects.equals(\"-\", lineArg[0])) {\n                int left_num = Integer.parseInt(lineArg[0]);\n                link[left_num] = 1;\n            }\n            if (!Objects.equals(\"-\", lineArg[1])) {\n                int right_num = Integer.parseInt(lineArg[1]);\n                link[right_num] = 1;\n            }\n        }\n        int i;\n        for (i = 0; i \u0026#x3C; link.length; i++) {\n            if (link[i] == 0) {\n                break;\n            }\n        }\n\n        return i;\n    }\n\n    static class Node{\n        int data =-1;\n        int left = -1;\n        int right = -1;\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结：\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e树的遍历最基本的方法是采用递归；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用堆栈可以免递归遍历树，每个对象有3次访问机会，调整访问时机可以分别实现前序、中序及后序遍历；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e采用队列可以层级遍历树，此题采用层级遍历。\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业3：Tree Traversals Again（25 分）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eAn inorder binary tree traversal can be implemented in a non-recursive way with a stack. For example, suppose that when a 6-node binary tree (with the keys numbered from 1 to 6) is traversed, the stack operations are: push(1); push(2); push(3); pop(); pop(); push(4); pop(); pop(); push(5); push(6); pop(); pop(). Then a unique binary tree (shown in Figure 1) can be generated from this sequence of operations. Your task is to give the postorder traversal sequence of this tree.\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eFigure 1\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180327_data_structures03_3.png\" alt=\"Figure 1\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eInput Specification:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eEach input file contains one test case. For each case, the first line contains a positive integer N (≤30) which is the total number of nodes in a tree (and hence the nodes are numbered from 1 to N). Then 2N lines follow, each describes a stack operation in the format: \"Push X\" where X is the index of the node being pushed onto the stack; or \"Pop\" meaning to pop one node from the stack.\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eOutput Specification:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eFor each test case, print the postorder traversal sequence of the corresponding tree in one line. A solution is guaranteed to exist. All the numbers must be separated by exactly one space, and there must be no extra space at the end of the line.\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eSample Input:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e6\nPush 1\nPush 2\nPush 3\nPop\nPop\nPush 4\nPop\nPop\nPush 5\nPush 6\nPop\nPop\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eSample Output:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e3 4 2 6 5 1\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode;\n\nimport java.io.BufferedReader;\nimport java.io.InputStreamReader;\nimport java.util.ArrayList;\nimport java.util.LinkedList;\nimport java.util.Objects;\nimport java.util.Stack;\n\npublic class Main {\n    public static void main(String args[]) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n        //读第一行\n        String[] line1Array = getStringArray(reader);\n        String firstAddress = line1Array[0];\n        int count = Integer.parseInt(line1Array[1]);\n        int k = Integer.parseInt(line1Array[2]);\n\n        //读取所有节点\n        ArrayList\u0026#x3C;Node\u003e nodes = new ArrayList\u0026#x3C;\u003e(count);\n        for (int i = 0; i \u0026#x3C; count; i++) {\n            String[] lineArray = getStringArray(reader);\n            Node node = new Node();\n            node.address = lineArray[0];\n            node.data = Integer.parseInt(lineArray[1]);\n            node.nextAddress = lineArray[2];\n            nodes.add(node);\n        }\n\n\n        //按链表顺序加入队列\n        LinkedList\u0026#x3C;Node\u003e queue = new LinkedList\u0026#x3C;\u003e();\n        String address = firstAddress;\n        while (!address.equals(\"-1\")) {\n            for (int i = 0; i \u0026#x3C; nodes.size(); i++) { //循环匹配地址\n                Node n = nodes.get(i);\n                if (Objects.equals(address, n.address)) { //找到则加入队列\n                    queue.add(n);\n                    address = n.nextAddress; //查找地址赋值为当前节点的下一个地址\n                    nodes.remove(n); //处理完的移出节点数组，减少循环量\n                    break;\n                }\n            }\n        }\n\n        Stack\u0026#x3C;Node\u003e stack = new Stack\u0026#x3C;\u003e();\n        boolean isCanConvert = queue.size() \u003e= k; //是否够反转\n        while (!queue.isEmpty()) { //循环出队列\n            Node n = queue.remove();\n            if (isCanConvert) { //够反转则压入堆栈\n                stack.push(n);\n                if (stack.size() == k) { //压够反转数量就全部输出\n                    isCanConvert = queue.size() \u003e= k; //再次检查是否够反转\n                    while (!stack.isEmpty()) {\n                        //重新赋值next\n                        Node nStack = stack.pop();\n                        if (stack.isEmpty()) { //如果栈里没了，地址就等于队列的下一个\n                            if (queue.isEmpty()) { //队列也没了，地址等于-1\n                                nStack.nextAddress = \"-1\";\n                            } else {\n                                //如果剩下的还能反转\n                                if (isCanConvert) {\n                                    nStack.nextAddress = queue.get(k - 1).address;\n                                } else {\n                                    nStack.nextAddress = queue.peek().address;\n                                }\n                            }\n                        } else {\n                            nStack.nextAddress = stack.peek().address;\n                        }\n                        print(nStack);\n                    }\n                }\n            } else { //不够反转 直接输出节点\n                print(n);\n            }\n        }\n\n    }\n\n\n    private static void print(Node n) {\n        System.out.println(n.address + \" \" + n.data + \" \" + n.nextAddress);\n    }\n\n    private static String[] getStringArray(BufferedReader reader) {\n        String line1 = null;\n        try {\n            line1 = reader.readLine();\n        } catch (Exception ignore) {\n        }\n        return line1.split(\" \");\n    }\n\n    static class Node {\n        String address;\n        int data;\n        String nextAddress;\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结：\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e利用队列和栈解决顺序问题\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业2：Pop Sequence（25 分）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eGiven a stack which can keep M numbers at most. Push N numbers in the order of 1, 2, 3, ..., N and pop randomly. You are supposed to tell if a given sequence of numbers is a possible pop sequence of the stack. For example, if M is 5 and N is 7, we can obtain 1, 2, 3, 4, 5, 6, 7 from the stack, but not 3, 2, 1, 7, 5, 6, 4.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eInput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eEach input file contains one test case. For each case, the first line contains 3 numbers (all no more than 1000): M (the maximum capacity of the stack), N (the length of push sequence), and K (the number of pop sequences to be checked). Then K lines follow, each contains a pop sequence of N numbers. All the numbers in a line are separated by a space.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eOutput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eFor each pop sequence, print in one line \"YES\" if it is indeed a possible pop sequence of the stack, or \"NO\" if not.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eSample Input:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e5 7 5\n1 2 3 4 5 6 7\n3 2 1 7 5 6 4\n7 6 5 4 3 2 1\n5 6 4 3 7 2 1\n1 7 6 5 4 3 2\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003eSample Output:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eYES\nNO\nNO\nYES\nNO\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epublic class Main {\n    public static void main(String args[]) throws IOException {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n\n        int sum;\n        sum = Integer.parseInt(reader.readLine());\n\n        String[] inputs = new String[sum*2];\n\n        for (int i = 0; i \u0026#x3C; inputs.length; i++) {\n            inputs[i] = reader.readLine();\n        }\n\n        StringBuilder sb = new StringBuilder();\n\n        //Build Tree\n        Node root = buildTree(inputs);\n        //后序遍历打印\n        traversalsTree(root,sb);\n        \n\n        if (sb.length() \u003e 0) {\n            sb.deleteCharAt(sb.length() - 1);\n        }\n        System.out.println(sb.toString());\n    }\n\n\n    private static Node buildTree(String[] inputs) {\n        Node root =null;\n\n        Stack\u0026#x3C;Node\u003e nodes = new Stack\u0026#x3C;\u003e();\n        final String PUSH = \"Push\";\n        final String POP = \"Pop\";\n        Node lastPush = null;\n        Node lastPop = null;\n        String lastOperation = null;\n        int level = 0;\n        for (String input : inputs) {\n            String[] lineArg = input.split(\" \");\n            if (Objects.equals(lineArg[0], PUSH)) {\n                Node node = new Node();\n                node.data = Integer.parseInt(lineArg[1]);\n                node.level = level;\n                nodes.push(node);\n                if (lastOperation == null) {\n                    root = node;\n                } else if (Objects.equals(lastOperation, PUSH)) {\n                    lastPush.left = node;\n                } else if (Objects.equals(lastOperation, POP)) {\n                    lastPop.right = node;\n                }\n                lastPush = node;\n                lastOperation = PUSH;\n                level++;\n            } else {\n                lastPop = nodes.pop();\n                lastOperation = POP;\n                level--;\n            }\n        }\n        return root;\n    }\n\n    private static void traversalsTree(Node root, StringBuilder sb) {\n            if(root!=null) {\n                traversalsTree(root.left, sb);\n                traversalsTree(root.right, sb);\n                sb.append(root.data);\n                sb.append(' ');\n            }\n    }\n\n    static class Node {\n        int data = -1;\n        Node left;\n        Node right;\n        int level = 0;\n\n        @Override\n        public String toString() {\n            return \"Node{\" +\n                    \"data=\" + data +\n                    \", left=\" + (left==null?\"null\":left.data) +\n                    \", right=\" + (right==null?\"null\":right.data)+\n                    \", level=\" + level +\n                    '}';\n        }\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结：\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e通过先构建出原始树再后序遍历的方法解决了问题。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e优化方向：将后序遍历的递归方式改为非递归方式。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e此题应该可以在构建树时直接输出正确答案。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e非递归算法核心：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e首先要搞清楚先序、中序、后序的非递归算法共同之处：用栈来保存先前走过的路径，以便可以在访问完子树后,可以利用栈中的信息,回退到当前节点的双亲节点,进行下一步操作。\n后序遍历的非递归算法是三种顺序中最复杂的，原因在于，后序遍历是先访问左、右子树,再访问根节点，而在非递归算法中，利用栈回退到时，并不知道是从左子树回退到根节点，还是从右子树回退到根节点，如果从左子树回退到根节点，此时就应该去访问右子树，而如果从右子树回退到根节点，此时就应该访问根节点。所以相比前序和后序，必须得在压栈时添加信息，以便在退栈时可以知道是从左子树返回，还是从右子树返回进而决定下一步的操作。\u003c/p\u003e\n","content":"\n![浙江大学](https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg)\n\n\u003e 树状结构的基础是二叉树，二叉树即度为2的树。\n\n## 二叉树的链表结构\n\n```c\ntypedef struct TNode *Position;\ntypedef Position BinTree; /* 二叉树类型 */\nstruct TNode{ /* 树结点定义 */\n    ElementType Data; /* 结点数据 */\n    BinTree Left;     /* 指向左子树 */\n    BinTree Right;    /* 指向右子树 */\n};\n```\n\n\n\u003c!--more--\u003e\n\n## 作业1：树的同构\n\n给定两棵树T1和T2。如果T1可以通过若干次左右孩子互换就变成T2，则我们称两棵树是“同构”的。例如图1给出的两棵树就是同构的，因为我们把其中一棵树的结点A、B、G的左右孩子互换后，就得到另外一棵树。而图2就不是同构的。\n图1：\n![图1](/images/20180326_data_structures03_1.png)\n图2：\n![图2](/images/20180326_data_structures03_2.png)\n现给定两棵树，请你判断它们是否是同构的。\n\n- 输入格式:\n\n输入给出2棵二叉树树的信息。对于每棵树，首先在一行中给出一个非负整数N (≤10)，即该树的结点数（此时假设结点从0到N−1编号）；随后N行，第i行对应编号第i个结点，给出该结点中存储的1个英文大写字母、其左孩子结点的编号、右孩子结点的编号。如果孩子结点为空，则在相应位置上给出`-`。给出的数据间用一个空格分隔。注意：题目保证每个结点中存储的字母是不同的。\n\n- 输出格式:\n\n如果两棵树是同构的，输出`Yes`，否则输出`No`。\n\n- 输入样例1（对应图1）：\n\n```bash\n8\nA 1 2\nB 3 4\nC 5 -\nD - -\nE 6 -\nG 7 -\nF - -\nH - -\n8\nG - 4\nB 7 6\nF - -\nA 5 1\nH - -\nC 0 -\nD - -\nE 2 -\n```\n\n- 输出样例1:\n\n```bash\nYes\n```\n- 输入样例2（对应图2）：\n\n```bash\n8\nB 5 7\nF - -\nA 0 3\nC 6 -\nH - -\nD - -\nG 4 -\nE 1 -\n8\nD 6 -\nB 5 -\nE - -\nH - -\nC 0 2\nG - 3\nF - -\nA 1 4\n```\n- 输出样例2:\n\n```bash\nNo\n```\n\n- 实现：\n\n```java\npublic class Main {\n    public static void main(String args[]) throws IOException {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n        //读第一个树节点\n        int n_a = 0;\n        n_a = Integer.parseInt(reader.readLine());\n\n        String[] inputs_a = new String[n_a];\n        List\u003cNode\u003e nodes_a = new ArrayList\u003c\u003e(n_a);\n\n        for (int i = 0; i \u003c n_a; i++) {\n            inputs_a[i] = reader.readLine();\n        }\n\n\n        int n_b = 0;\n        n_b = Integer.parseInt(reader.readLine());\n\n        String[] inputs_b = new String[n_b];\n        List\u003cNode\u003e nodes_b = new ArrayList\u003c\u003e(n_b);\n\n        for (int i = 0; i \u003c n_b; i++) {\n            inputs_b[i] = reader.readLine();\n        }\n\n        if (n_a != n_b) {\n            System.out.println(\"No\");\n            return;\n        }\n\n        addNodes(inputs_a, nodes_a);\n        addNodes(inputs_b, nodes_b);\n\n        if(inputs_a.length==1\u0026\u0026!Objects.equals(nodes_a.get(0).data,nodes_b.get(0).data)){\n            System.out.println(\"No\");\n            return;\n        }\n\n        for (Node node_a : nodes_a) {\n            for (Node node_b : nodes_b) {\n                if (Objects.equals(node_a.data, node_b.data)) {\n                    if (!((Objects.equals(node_a.left, node_b.left) \u0026\u0026 Objects.equals(node_a.right, node_b.right))\n                            || (Objects.equals(node_a.left, node_b.right) \u0026\u0026 Objects.equals(node_a.right, node_b.left)))) {\n                        System.out.println(\"No\");\n                        return;\n                    }\n                }\n            }\n        }\n\n        System.out.println(\"Yes\");\n    }\n\n\n    private static void addNodes(String[] inputs, List\u003cNode\u003e nodes) {\n        for (String input : inputs) {\n            Node n = new Node();\n            String[] lineArg = input.split(\" \");\n            n.data = lineArg[0];\n            if (!Objects.equals(\"-\", lineArg[1])) {\n                int left_num = Integer.parseInt(lineArg[1]);\n                n.left = inputs[left_num].split(\" \")[0];\n            }\n            if (!Objects.equals(\"-\", lineArg[2])) {\n                int right_num = Integer.parseInt(lineArg[2]);\n                n.right = inputs[right_num].split(\" \")[0];\n            }\n            nodes.add(n);\n        }\n    }\n\n    static class Node {\n        String data;\n        String left;\n        String right;\n    }\n}\n\n```\n\n- 总结:\n\n1. 利用二叉树的数据结构可以解决这个问题。\n2. 这里我采用了投机取巧的办法，并没有建立树状结构，而是把每个节点进行比较，唯一需要处理的特例就是同唯一父节点值不同的情况。\n\n## 作业2：List Leaves（25 分）\n\nGiven a tree, you are supposed to list all the leaves in the order of top down, and left to right.\n\n- Input Specification:\n\nEach input file contains one test case. For each case, the first line gives a positive integer N (≤10) which is the total number of nodes in the tree -- and hence the nodes are numbered from 0 to N−1. Then N lines follow, each corresponds to a node, and gives the indices of the left and right children of the node. If the child does not exist, a \"-\" will be put at the position. Any pair of children are separated by a space.\n\n- Output Specification:\n\nFor each test case, print in one line all the leaves' indices in the order of top down, and left to right. There must be exactly one space between any adjacent numbers, and no extra space at the end of the line.\n\n- Sample Input:\n\n```bash\n8\n1 -\n- -\n0 -\n2 7\n- -\n- -\n5 -\n4 6\n```\nSample Output:\n\n\n```bash\n4 1 5\n```\n\n- 实现：\n\n```java\npublic class Main {\n    public static void main(String args[]) throws IOException {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n\n        int sum;\n        sum = Integer.parseInt(reader.readLine());\n\n        String[] inputs = new String[sum];\n\n        for (int i = 0; i \u003c sum; i++) {\n            inputs[i] = reader.readLine();\n        }\n\n        int root_num = findRoot(inputs);\n        StringBuilder sb = new StringBuilder();\n        Queue\u003cNode\u003e nodes = new LinkedList\u003c\u003e();\n\n        Node root =  getNode(root_num,inputs[root_num]);\n        nodes.add(root);\n        checkTree(nodes, sb, inputs);\n        if (sb.length() \u003e 0) {\n            sb.deleteCharAt(sb.length() - 1);\n        }\n        System.out.println(sb.toString());\n    }\n\n    private static Node getNode(int root_num, String input) {\n        Node node = new Node();\n        node.data = root_num;\n        String[] lineArg = input.split(\" \");\n        if (!Objects.equals(\"-\", lineArg[0])) {\n            node.left = Integer.parseInt(lineArg[0]);\n        }\n        if (!Objects.equals(\"-\", lineArg[1])) {\n            node.right = Integer.parseInt(lineArg[1]);\n        }\n        return node;\n    }\n\n    private static void checkTree(Queue\u003cNode\u003e nodes, StringBuilder sb, String[] inputs) {\n        while (!nodes.isEmpty()) {\n            Node node = nodes.poll();\n            if (node.left\u003c0 \u0026\u0026 node.right\u003c0) {\n                sb.append(node.data);\n                sb.append(' ');\n            }\n            if (node.left\u003e=0) {\n                Node n_l = getNode(node.left,inputs[node.left]);\n                nodes.add(n_l);\n            }\n            if (node.right\u003e=0) {\n                Node n_r = getNode(node.right,inputs[node.right]);\n                nodes.add(n_r);\n            }\n        }\n    }\n\n\n    private static int findRoot(String[] inputs) {\n        int[] link = new int[inputs.length];\n        for (String input : inputs) {\n            String[] lineArg = input.split(\" \");\n            if (!Objects.equals(\"-\", lineArg[0])) {\n                int left_num = Integer.parseInt(lineArg[0]);\n                link[left_num] = 1;\n            }\n            if (!Objects.equals(\"-\", lineArg[1])) {\n                int right_num = Integer.parseInt(lineArg[1]);\n                link[right_num] = 1;\n            }\n        }\n        int i;\n        for (i = 0; i \u003c link.length; i++) {\n            if (link[i] == 0) {\n                break;\n            }\n        }\n\n        return i;\n    }\n\n    static class Node{\n        int data =-1;\n        int left = -1;\n        int right = -1;\n    }\n}\n\n```\n\n- 总结：\n\n1. 树的遍历最基本的方法是采用递归；\n2. 使用堆栈可以免递归遍历树，每个对象有3次访问机会，调整访问时机可以分别实现前序、中序及后序遍历；\n3. 采用队列可以层级遍历树，此题采用层级遍历。\n\n## 作业3：Tree Traversals Again（25 分）\n\nAn inorder binary tree traversal can be implemented in a non-recursive way with a stack. For example, suppose that when a 6-node binary tree (with the keys numbered from 1 to 6) is traversed, the stack operations are: push(1); push(2); push(3); pop(); pop(); push(4); pop(); pop(); push(5); push(6); pop(); pop(). Then a unique binary tree (shown in Figure 1) can be generated from this sequence of operations. Your task is to give the postorder traversal sequence of this tree.\n\n- Figure 1\n\n![Figure 1](/images/20180327_data_structures03_3.png)\n\n- Input Specification:\n\nEach input file contains one test case. For each case, the first line contains a positive integer N (≤30) which is the total number of nodes in a tree (and hence the nodes are numbered from 1 to N). Then 2N lines follow, each describes a stack operation in the format: \"Push X\" where X is the index of the node being pushed onto the stack; or \"Pop\" meaning to pop one node from the stack.\n\n- Output Specification:\n\nFor each test case, print the postorder traversal sequence of the corresponding tree in one line. A solution is guaranteed to exist. All the numbers must be separated by exactly one space, and there must be no extra space at the end of the line.\n\n- Sample Input:\n\n```bash\n6\nPush 1\nPush 2\nPush 3\nPop\nPop\nPush 4\nPop\nPop\nPush 5\nPush 6\nPop\nPop\n```\n- Sample Output:\n\n```bash\n3 4 2 6 5 1\n```\n\n- 实现：\n\n```java\npackage cn.wycode;\n\nimport java.io.BufferedReader;\nimport java.io.InputStreamReader;\nimport java.util.ArrayList;\nimport java.util.LinkedList;\nimport java.util.Objects;\nimport java.util.Stack;\n\npublic class Main {\n    public static void main(String args[]) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n        //读第一行\n        String[] line1Array = getStringArray(reader);\n        String firstAddress = line1Array[0];\n        int count = Integer.parseInt(line1Array[1]);\n        int k = Integer.parseInt(line1Array[2]);\n\n        //读取所有节点\n        ArrayList\u003cNode\u003e nodes = new ArrayList\u003c\u003e(count);\n        for (int i = 0; i \u003c count; i++) {\n            String[] lineArray = getStringArray(reader);\n            Node node = new Node();\n            node.address = lineArray[0];\n            node.data = Integer.parseInt(lineArray[1]);\n            node.nextAddress = lineArray[2];\n            nodes.add(node);\n        }\n\n\n        //按链表顺序加入队列\n        LinkedList\u003cNode\u003e queue = new LinkedList\u003c\u003e();\n        String address = firstAddress;\n        while (!address.equals(\"-1\")) {\n            for (int i = 0; i \u003c nodes.size(); i++) { //循环匹配地址\n                Node n = nodes.get(i);\n                if (Objects.equals(address, n.address)) { //找到则加入队列\n                    queue.add(n);\n                    address = n.nextAddress; //查找地址赋值为当前节点的下一个地址\n                    nodes.remove(n); //处理完的移出节点数组，减少循环量\n                    break;\n                }\n            }\n        }\n\n        Stack\u003cNode\u003e stack = new Stack\u003c\u003e();\n        boolean isCanConvert = queue.size() \u003e= k; //是否够反转\n        while (!queue.isEmpty()) { //循环出队列\n            Node n = queue.remove();\n            if (isCanConvert) { //够反转则压入堆栈\n                stack.push(n);\n                if (stack.size() == k) { //压够反转数量就全部输出\n                    isCanConvert = queue.size() \u003e= k; //再次检查是否够反转\n                    while (!stack.isEmpty()) {\n                        //重新赋值next\n                        Node nStack = stack.pop();\n                        if (stack.isEmpty()) { //如果栈里没了，地址就等于队列的下一个\n                            if (queue.isEmpty()) { //队列也没了，地址等于-1\n                                nStack.nextAddress = \"-1\";\n                            } else {\n                                //如果剩下的还能反转\n                                if (isCanConvert) {\n                                    nStack.nextAddress = queue.get(k - 1).address;\n                                } else {\n                                    nStack.nextAddress = queue.peek().address;\n                                }\n                            }\n                        } else {\n                            nStack.nextAddress = stack.peek().address;\n                        }\n                        print(nStack);\n                    }\n                }\n            } else { //不够反转 直接输出节点\n                print(n);\n            }\n        }\n\n    }\n\n\n    private static void print(Node n) {\n        System.out.println(n.address + \" \" + n.data + \" \" + n.nextAddress);\n    }\n\n    private static String[] getStringArray(BufferedReader reader) {\n        String line1 = null;\n        try {\n            line1 = reader.readLine();\n        } catch (Exception ignore) {\n        }\n        return line1.split(\" \");\n    }\n\n    static class Node {\n        String address;\n        int data;\n        String nextAddress;\n    }\n}\n\n```\n\n\n- 总结：\n\n1. 利用队列和栈解决顺序问题\n\n## 作业2：Pop Sequence（25 分）\n\n\nGiven a stack which can keep M numbers at most. Push N numbers in the order of 1, 2, 3, ..., N and pop randomly. You are supposed to tell if a given sequence of numbers is a possible pop sequence of the stack. For example, if M is 5 and N is 7, we can obtain 1, 2, 3, 4, 5, 6, 7 from the stack, but not 3, 2, 1, 7, 5, 6, 4.\n\nInput Specification:\n\nEach input file contains one test case. For each case, the first line contains 3 numbers (all no more than 1000): M (the maximum capacity of the stack), N (the length of push sequence), and K (the number of pop sequences to be checked). Then K lines follow, each contains a pop sequence of N numbers. All the numbers in a line are separated by a space.\n\nOutput Specification:\n\nFor each pop sequence, print in one line \"YES\" if it is indeed a possible pop sequence of the stack, or \"NO\" if not.\n\nSample Input:\n```bash\n5 7 5\n1 2 3 4 5 6 7\n3 2 1 7 5 6 4\n7 6 5 4 3 2 1\n5 6 4 3 7 2 1\n1 7 6 5 4 3 2\n```\nSample Output:\n```bash\nYES\nNO\nNO\nYES\nNO\n```\n\n- 实现\n\n```java\npublic class Main {\n    public static void main(String args[]) throws IOException {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n\n        int sum;\n        sum = Integer.parseInt(reader.readLine());\n\n        String[] inputs = new String[sum*2];\n\n        for (int i = 0; i \u003c inputs.length; i++) {\n            inputs[i] = reader.readLine();\n        }\n\n        StringBuilder sb = new StringBuilder();\n\n        //Build Tree\n        Node root = buildTree(inputs);\n        //后序遍历打印\n        traversalsTree(root,sb);\n        \n\n        if (sb.length() \u003e 0) {\n            sb.deleteCharAt(sb.length() - 1);\n        }\n        System.out.println(sb.toString());\n    }\n\n\n    private static Node buildTree(String[] inputs) {\n        Node root =null;\n\n        Stack\u003cNode\u003e nodes = new Stack\u003c\u003e();\n        final String PUSH = \"Push\";\n        final String POP = \"Pop\";\n        Node lastPush = null;\n        Node lastPop = null;\n        String lastOperation = null;\n        int level = 0;\n        for (String input : inputs) {\n            String[] lineArg = input.split(\" \");\n            if (Objects.equals(lineArg[0], PUSH)) {\n                Node node = new Node();\n                node.data = Integer.parseInt(lineArg[1]);\n                node.level = level;\n                nodes.push(node);\n                if (lastOperation == null) {\n                    root = node;\n                } else if (Objects.equals(lastOperation, PUSH)) {\n                    lastPush.left = node;\n                } else if (Objects.equals(lastOperation, POP)) {\n                    lastPop.right = node;\n                }\n                lastPush = node;\n                lastOperation = PUSH;\n                level++;\n            } else {\n                lastPop = nodes.pop();\n                lastOperation = POP;\n                level--;\n            }\n        }\n        return root;\n    }\n\n    private static void traversalsTree(Node root, StringBuilder sb) {\n            if(root!=null) {\n                traversalsTree(root.left, sb);\n                traversalsTree(root.right, sb);\n                sb.append(root.data);\n                sb.append(' ');\n            }\n    }\n\n    static class Node {\n        int data = -1;\n        Node left;\n        Node right;\n        int level = 0;\n\n        @Override\n        public String toString() {\n            return \"Node{\" +\n                    \"data=\" + data +\n                    \", left=\" + (left==null?\"null\":left.data) +\n                    \", right=\" + (right==null?\"null\":right.data)+\n                    \", level=\" + level +\n                    '}';\n        }\n    }\n}\n\n```\n\n- 总结：\n\n1. 通过先构建出原始树再后序遍历的方法解决了问题。\n2. 优化方向：将后序遍历的递归方式改为非递归方式。\n3. 此题应该可以在构建树时直接输出正确答案。\n\n- 非递归算法核心：\n\n首先要搞清楚先序、中序、后序的非递归算法共同之处：用栈来保存先前走过的路径，以便可以在访问完子树后,可以利用栈中的信息,回退到当前节点的双亲节点,进行下一步操作。\n后序遍历的非递归算法是三种顺序中最复杂的，原因在于，后序遍历是先访问左、右子树,再访问根节点，而在非递归算法中，利用栈回退到时，并不知道是从左子树回退到根节点，还是从右子树回退到根节点，如果从左子树回退到根节点，此时就应该去访问右子树，而如果从右子树回退到根节点，此时就应该访问根节点。所以相比前序和后序，必须得在压栈时添加信息，以便在退栈时可以知道是从左子树返回，还是从右子树返回进而决定下一步的操作。","data":{"title":"数据结构与算法学习笔记03","date":"2018-03-26","tags":["C"],"category":"Computer Science"},"isEmpty":false,"excerpt":"\n![浙江大学](https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg)\n\n\u003e 树状结构的基础是二叉树，二叉树即度为2的树。\n\n## 二叉树的链表结构\n\n```c\ntypedef struct TNode *Position;\ntypedef Position BinTree; /* 二叉树类型 */\nstruct TNode{ /* 树结点定义 */\n    ElementType Data; /* 结点数据 */\n    BinTree Left;     /* 指向左子树 */\n    BinTree Right;    /* 指向右子树 */\n};\n```\n\n\n"},{"id":"data-structures02","file":"data-structures02.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg\" alt=\"浙江大学\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e线性结构的基础是数组和链表，由数组和链表可以扩展出堆栈和队列。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg\" alt=\"浙江大学\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e线性结构的基础是数组和链表，由数组和链表可以扩展出堆栈和队列。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e实验1：计算表达式的值\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e将中缀表达式转换为后缀表达式，并计算表达式的值。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eimport java.util.Stack;\n\npublic class Test05 {\n\n    public static void main(String[] args) {\n        String s = \"2*(6/3+4)-5\";\n        System.out.println(\"中缀表达式：\"+s);\n        s= covert(s);\n        System.out.println(\"转换为后缀表达式：\"+s);\n        int i = calculate(s);\n        System.out.println(\"计算后缀表达式：\"+i);\n\n    }\n\n    private static int calculate(String s) {\n\n        Stack\u0026#x3C;Integer\u003e stack = new Stack\u0026#x3C;\u003e();\n        for (char c : s.toCharArray()) { //从左到右遍历，如果是数字压入堆栈，如果是操作符，从堆栈中pop出两个数字计算，并将结果压入堆栈\n            if(c=='+') {\n                stack.push(stack.pop() + stack.pop());\n            }else if(c=='*') {\n                stack.push(stack.pop() * stack.pop());\n            }else if(c=='-') {\n                int b = stack.pop();\n                int a = stack.pop();\n                stack.push(a - b);\n            }else if(c=='/'){\n                int b = stack.pop();\n                int a = stack.pop();\n                stack.push(a / b);\n            }else{\n                stack.push(Character.getNumericValue(c));\n            }\n        }\n\n        return stack.pop(); //循环结束时，栈顶的数字就是后缀表达式结果\n\n    }\n\n    private static String covert(String s) {\n        StringBuilder sb = new StringBuilder();\n        Stack\u0026#x3C;Character\u003e stack = new Stack\u0026#x3C;\u003e();\n        for (char c : s.toCharArray()) {\n            if (c \u003e= '0' \u0026#x26;\u0026#x26; c \u0026#x3C;= '9') { //如果是数字直接输出\n                sb.append(c);\n            } else if (c == '(') { //如果是左括号，压入操作堆栈\n                stack.push(c);\n            } else if (c == ')') { //如果是右括号\n                while (true) { //寻找左括号\n                    c = stack.pop();\n                    if (c == '(') { //找到直接结束循环\n                        break;\n                    } else { //不是左括号直接输出操作符\n                        sb.append(c);\n                    }\n                }\n            } else { //如果是+ - * /\n\n                while (true) {  //寻找栈顶比当前操作优先级低的操作符\n                    if (stack.isEmpty()) { //如果是空栈，直接压入操作符\n                        stack.push(c);\n                        break;\n                    }\n                    char cInStack = stack.peek();\n                    if (isStackPriority(cInStack, c)) { //如果栈顶操作符优先级高或相同，直接出栈并输出\n                        sb.append(stack.pop());\n                    } else {\n                        stack.push(c); //找到优先级低的地方，把当前操作符push进去\n                        break;\n                    }\n                }\n            }\n            //System.out.println(stack.size());\n        }\n        while (!stack.isEmpty()){ //最后将栈里的操作符全部输出\n            sb.append(stack.pop());\n        }\n        return sb.toString();\n    }\n\n    private static boolean isStackPriority(char cInStack, char c2) {\n        return cInStack != '(' \u0026#x26;\u0026#x26; (cInStack == '*' || cInStack == '/' || c2 != '*' \u0026#x26;\u0026#x26; c2 != '/');\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e输出：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e中缀表达式：2*(6/3+4)-5\n转换为后缀表达式：263/4+*5-\n计算后缀表达式：7\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结:\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e利用堆栈可以很优雅的解决表达式运算的问题\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e以上程序有3个缺陷：不能计算小数；不能计算负数；只能计算个位数的运算\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e改进方向：使用浮点型计算；后缀转换时要添加对于多位数、小数、负数的处理；将结果直接保存到堆栈里，堆栈内保存数字和操作符\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业1：一元多项式的乘法与加法运算（20 分）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e设计函数分别求两个一元多项式的乘积与和。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输入格式:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输入分2行，每行分别先给出多项式非零项的个数，再以指数递降方式输入一个多项式非零项系数和指数（绝对值均为不超过1000的整数）。数字间以空格分隔。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输出格式:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输出分2行，分别以指数递降方式输出乘积多项式以及和多项式非零项的系数和指数。数字间以空格分隔，但结尾不能有多余空格。零多项式应输出0 0。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e输入样例:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e5 3 4 -5 2  6 1  -2 0 0 0\n5 5 20  -7 4  3 1 0 0 3 0\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e输出样例:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e15 24 -25 22 30 21 -10 20 -21 8 35 6 -33 5 14 4 -15 3 18 2 -6 1\n5 20 -4 4 -5 2 9 1 -2 0\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epublic class Main {\n\n    public static void main(String[] args) {\n        Scanner scanner = new Scanner(System.in);\n        PolyNode first1 = getInput(scanner);\n        PolyNode first2 = getInput(scanner);\n        PolyNode result1 = add(first1, first2);\n        PolyNode result2 = multiply(first1, first2);\n        print(result2);\n        print(result1);\n\n    }\n\n    /**\n     * 逐项插入算法\n     *\n     * @param first1\n     * @param first2\n     * @return\n     */\n    private static PolyNode multiply(PolyNode first1, PolyNode first2) {\n        PolyNode p1 = first1;\n        PolyNode p2 = first2;\n\n        PolyNode first = new PolyNode(); //结果，先构造一个空的头节点\n        PolyNode rear = first; //将尾部指向这个头\n        while (p2 != null) { //先用第一项乘以p2构造一个初始多项式\n            PolyNode next = new PolyNode(); //构造一个新节点\n            next.coef = p1.coef * p2.coef; //系数相乘\n            next.expon = p1.expon + p2.expon; //指数相加\n            rear.next = next; //尾部指针指向新的节点\n            rear = next; //新尾部等于新添加的节点\n            p2 = p2.next; //移动p2指针\n        }\n        p1 = p1.next; //把p1指针向后挪1位\n        while (p1 != null) {\n            p2 = first2; //将p2指针归位\n            rear = first; //尾部指针归位\n            while (p2 != null) {\n                int e = p1.expon + p2.expon; //指数相加\n                int c = p1.coef * p2.coef; //系数相乘\n                while (rear.next != null \u0026#x26;\u0026#x26; rear.next.expon \u003e e) { //寻找比当前指数小或者等的位置\n                    rear = rear.next; //rear 往后挪\n                }\n                if (rear.next != null \u0026#x26;\u0026#x26; rear.next.expon == e) { //挪了之后如果下一项存在，且指数相等，则合并系数\n                    if (rear.next.coef + c == 0) { //和下一项系数相加等于0，则删掉这一项\n                        rear.next = rear.next.next;\n                    } else { //系数相加不为0，就要合并系数\n                        rear.next.coef += c;\n                    }\n                } else { //指数不等，需要创建一个新节点插入\n                    PolyNode newPoly = new PolyNode(); //构造一个新节点\n                    newPoly.coef = c;\n                    newPoly.expon = e;\n                    newPoly.next = rear.next;//新插入的节点下一个=当前尾部的下一个\n                    rear.next = newPoly; //当前尾部的下一个等于新节点\n                }\n\n                p2 = p2.next;//p2处理完毕，将p2挪到下一个\n            }\n            p1 = p1.next;//p2遍历完毕，将p1往后挪\n        }\n        first = first.next; //将头部挪到真实的头部位置，Java会自动回收没有引用的头节点\n\n        return first;\n    }\n\n    private static void print(PolyNode result) {\n        PolyNode p = result;\n        StringBuilder sb = new StringBuilder();\n        if (p == null) { //零多项式输出0 0\n            sb.append(\"0 0\");\n        }\n        boolean isFirst = true;\n        while (p != null) {\n            if (!isFirst)\n                sb.append(' ');\n            sb.append(p.coef);\n            sb.append(' ');\n            sb.append(p.expon);\n            p = p.next;\n            isFirst = false;\n        }\n        System.out.println(sb.toString());\n    }\n\n    private static PolyNode add(PolyNode first1, PolyNode first2) {\n        PolyNode p1 = first1;\n        PolyNode p2 = first2;\n\n        PolyNode first = new PolyNode(); //结果，先构造一个空的头节点\n        PolyNode rear = first; //将尾部指向这个头\n        while (p1 != null \u0026#x26;\u0026#x26; p2 != null) { //当两个指针都不为空时\n            if (p1.coef == 0) { //系数为0,直接省略\n                p1 = p1.next;\n            } else if (p2.coef == 0) {\n                p2 = p2.next;\n            } else if (p1.expon == p2.expon) { //指数相等，则系数相加后串到后面\n                int coef = p1.coef + p2.coef;  //系数相加\n                if (coef != 0) {\n                    PolyNode next = new PolyNode(); //构造一个新节点\n                    next.coef = coef;\n                    next.expon = p1.expon;\n                    rear.next = next; //尾部指针指向新的节点\n                    rear = next; //新尾部等于新添加的节点\n                }\n                p1 = p1.next; //移动指针\n                p2 = p2.next;\n            } else if (p1.expon \u003e p2.expon) {//指数大的串到后面\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p1.coef;\n                next.expon = p1.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n                p1 = p1.next; //移动指针\n            } else {\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p2.coef;\n                next.expon = p2.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n                p2 = p2.next; //移动指针\n            }\n        }\n\n        while (p1 != null) { //p1没完，把所有p1追加到后面\n            if (p1.coef != 0) { //系数不为0才，添加，否则继续找因为后面可以能还有系数不为0的\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p1.coef;\n                next.expon = p1.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n            }\n            p1 = p1.next; //移动指针\n        }\n\n        while (p2 != null \u0026#x26;\u0026#x26; p2.coef != 0) { //p2没完，把所有p2追加到后面\n            if (p2.coef != 0) { //系数不为0才，添加，否则继续找因为后面可以能还有系数不为0的\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p2.coef;\n                next.expon = p2.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n            }\n            p2 = p2.next; //移动指针\n        }\n        first = first.next; //将头部挪到真实的头部位置，Java会自动回收没有引用的头节点\n        return first;\n    }\n\n    private static PolyNode getInput(Scanner scanner) {\n        int count = scanner.nextInt(); //得到总项数\n        PolyNode first = new PolyNode(); //构造一个空的头\n        PolyNode rear = first; //构造一个尾部的指针\n        while (count \u003e 0) {\n            PolyNode next = new PolyNode(); //读取一个节点\n            next.coef = scanner.nextInt();\n            next.expon = scanner.nextInt();\n            rear.next = next; //将尾部的指针指向读到的这个节点\n            rear = next; //将尾部指针挪到新添加的节点\n            count--; //循环\n        }\n        first = first.next; //将头部挪到真实的头部位置，Java会自动回收没有引用的头节点\n        return first;\n    }\n\n\n    static class PolyNode {\n        int coef;\n        int expon;\n        PolyNode next;\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结：\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e逐项插值算法；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e单个对象保存一个当前类的引用可以当作链表来使用；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e原输入的链表不要取修改它的内部对象引用或者变量值；\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业1：Reversing Linked List（25 分）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eGiven a constant K and a singly linked list L, you are supposed to reverse the links of every K elements on L. For example, given L being 1→2→3→4→5→6, if K=3, then you must output 3→2→1→6→5→4; if K=4, you must output 4→3→2→1→5→6.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eInput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eEach input file contains one test case. For each case, the first line contains the address of the first node, a positive N (≤10\n​5\n​​ ) which is the total number of nodes, and a positive K (≤N) which is the length of the sublist to be reversed. The address of a node is a 5-digit nonnegative integer, and NULL is represented by -1.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eThen N lines follow, each describes a node in the format:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAddress Data Next\u003c/code\u003e\nwhere \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAddress\u003c/code\u003e is the position of the node, \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eData\u003c/code\u003e is an integer, and \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNext\u003c/code\u003e is the position of the next node.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eOutput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eFor each case, output the resulting ordered linked list. Each node occupies a line, and is printed in the same format as in the input.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eSample Input:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e00100 8 4\n00000 4 99999\n00100 1 12309\n68237 6 77777\n33218 3 00000\n77777 7 88888\n99999 5 68237\n12309 2 33218\n88888 8 -1\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003eSample Output:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e00000 4 33218\n33218 3 12309\n12309 2 00100\n00100 1 99999\n99999 5 68237\n68237 6 -1\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实现：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode;\n\nimport java.io.BufferedReader;\nimport java.io.InputStreamReader;\nimport java.util.ArrayList;\nimport java.util.LinkedList;\nimport java.util.Objects;\nimport java.util.Stack;\n\npublic class Main {\n    public static void main(String args[]) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n        //读第一行\n        String[] line1Array = getStringArray(reader);\n        String firstAddress = line1Array[0];\n        int count = Integer.parseInt(line1Array[1]);\n        int k = Integer.parseInt(line1Array[2]);\n\n        //读取所有节点\n        ArrayList\u0026#x3C;Node\u003e nodes = new ArrayList\u0026#x3C;\u003e(count);\n        for (int i = 0; i \u0026#x3C; count; i++) {\n            String[] lineArray = getStringArray(reader);\n            Node node = new Node();\n            node.address = lineArray[0];\n            node.data = Integer.parseInt(lineArray[1]);\n            node.nextAddress = lineArray[2];\n            nodes.add(node);\n        }\n\n\n        //按链表顺序加入队列\n        LinkedList\u0026#x3C;Node\u003e queue = new LinkedList\u0026#x3C;\u003e();\n        String address = firstAddress;\n        while (!address.equals(\"-1\")) {\n            for (int i = 0; i \u0026#x3C; nodes.size(); i++) { //循环匹配地址\n                Node n = nodes.get(i);\n                if (Objects.equals(address, n.address)) { //找到则加入队列\n                    queue.add(n);\n                    address = n.nextAddress; //查找地址赋值为当前节点的下一个地址\n                    nodes.remove(n); //处理完的移出节点数组，减少循环量\n                    break;\n                }\n            }\n        }\n\n        Stack\u0026#x3C;Node\u003e stack = new Stack\u0026#x3C;\u003e();\n        boolean isCanConvert = queue.size() \u003e= k; //是否够反转\n        while (!queue.isEmpty()) { //循环出队列\n            Node n = queue.remove();\n            if (isCanConvert) { //够反转则压入堆栈\n                stack.push(n);\n                if (stack.size() == k) { //压够反转数量就全部输出\n                    isCanConvert = queue.size() \u003e= k; //再次检查是否够反转\n                    while (!stack.isEmpty()) {\n                        //重新赋值next\n                        Node nStack = stack.pop();\n                        if (stack.isEmpty()) { //如果栈里没了，地址就等于队列的下一个\n                            if (queue.isEmpty()) { //队列也没了，地址等于-1\n                                nStack.nextAddress = \"-1\";\n                            } else {\n                                //如果剩下的还能反转\n                                if (isCanConvert) {\n                                    nStack.nextAddress = queue.get(k - 1).address;\n                                } else {\n                                    nStack.nextAddress = queue.peek().address;\n                                }\n                            }\n                        } else {\n                            nStack.nextAddress = stack.peek().address;\n                        }\n                        print(nStack);\n                    }\n                }\n            } else { //不够反转 直接输出节点\n                print(n);\n            }\n        }\n\n    }\n\n\n    private static void print(Node n) {\n        System.out.println(n.address + \" \" + n.data + \" \" + n.nextAddress);\n    }\n\n    private static String[] getStringArray(BufferedReader reader) {\n        String line1 = null;\n        try {\n            line1 = reader.readLine();\n        } catch (Exception ignore) {\n        }\n        return line1.split(\" \");\n    }\n\n    static class Node {\n        String address;\n        int data;\n        String nextAddress;\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e总结：\u003c/li\u003e\n\u003c/ul\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e利用队列和栈解决顺序问题\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e作业2：Pop Sequence（25 分）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eGiven a stack which can keep M numbers at most. Push N numbers in the order of 1, 2, 3, ..., N and pop randomly. You are supposed to tell if a given sequence of numbers is a possible pop sequence of the stack. For example, if M is 5 and N is 7, we can obtain 1, 2, 3, 4, 5, 6, 7 from the stack, but not 3, 2, 1, 7, 5, 6, 4.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eInput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eEach input file contains one test case. For each case, the first line contains 3 numbers (all no more than 1000): M (the maximum capacity of the stack), N (the length of push sequence), and K (the number of pop sequences to be checked). Then K lines follow, each contains a pop sequence of N numbers. All the numbers in a line are separated by a space.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eOutput Specification:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eFor each pop sequence, print in one line \"YES\" if it is indeed a possible pop sequence of the stack, or \"NO\" if not.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eSample Input:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e5 7 5\n1 2 3 4 5 6 7\n3 2 1 7 5 6 4\n7 6 5 4 3 2 1\n5 6 4 3 7 2 1\n1 7 6 5 4 3 2\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003eSample Output:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eYES\nNO\nNO\nYES\nNO\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![浙江大学](https://www.smpg888.com/resource/images/19b3b5c5671f44a4b9f4320dd8fcc734_34.jpg)\n\n\u003e 线性结构的基础是数组和链表，由数组和链表可以扩展出堆栈和队列。\n\n\n\u003c!--more--\u003e\n\n## 实验1：计算表达式的值\n\n将中缀表达式转换为后缀表达式，并计算表达式的值。\n\n- 实现：\n\n```java\nimport java.util.Stack;\n\npublic class Test05 {\n\n    public static void main(String[] args) {\n        String s = \"2*(6/3+4)-5\";\n        System.out.println(\"中缀表达式：\"+s);\n        s= covert(s);\n        System.out.println(\"转换为后缀表达式：\"+s);\n        int i = calculate(s);\n        System.out.println(\"计算后缀表达式：\"+i);\n\n    }\n\n    private static int calculate(String s) {\n\n        Stack\u003cInteger\u003e stack = new Stack\u003c\u003e();\n        for (char c : s.toCharArray()) { //从左到右遍历，如果是数字压入堆栈，如果是操作符，从堆栈中pop出两个数字计算，并将结果压入堆栈\n            if(c=='+') {\n                stack.push(stack.pop() + stack.pop());\n            }else if(c=='*') {\n                stack.push(stack.pop() * stack.pop());\n            }else if(c=='-') {\n                int b = stack.pop();\n                int a = stack.pop();\n                stack.push(a - b);\n            }else if(c=='/'){\n                int b = stack.pop();\n                int a = stack.pop();\n                stack.push(a / b);\n            }else{\n                stack.push(Character.getNumericValue(c));\n            }\n        }\n\n        return stack.pop(); //循环结束时，栈顶的数字就是后缀表达式结果\n\n    }\n\n    private static String covert(String s) {\n        StringBuilder sb = new StringBuilder();\n        Stack\u003cCharacter\u003e stack = new Stack\u003c\u003e();\n        for (char c : s.toCharArray()) {\n            if (c \u003e= '0' \u0026\u0026 c \u003c= '9') { //如果是数字直接输出\n                sb.append(c);\n            } else if (c == '(') { //如果是左括号，压入操作堆栈\n                stack.push(c);\n            } else if (c == ')') { //如果是右括号\n                while (true) { //寻找左括号\n                    c = stack.pop();\n                    if (c == '(') { //找到直接结束循环\n                        break;\n                    } else { //不是左括号直接输出操作符\n                        sb.append(c);\n                    }\n                }\n            } else { //如果是+ - * /\n\n                while (true) {  //寻找栈顶比当前操作优先级低的操作符\n                    if (stack.isEmpty()) { //如果是空栈，直接压入操作符\n                        stack.push(c);\n                        break;\n                    }\n                    char cInStack = stack.peek();\n                    if (isStackPriority(cInStack, c)) { //如果栈顶操作符优先级高或相同，直接出栈并输出\n                        sb.append(stack.pop());\n                    } else {\n                        stack.push(c); //找到优先级低的地方，把当前操作符push进去\n                        break;\n                    }\n                }\n            }\n            //System.out.println(stack.size());\n        }\n        while (!stack.isEmpty()){ //最后将栈里的操作符全部输出\n            sb.append(stack.pop());\n        }\n        return sb.toString();\n    }\n\n    private static boolean isStackPriority(char cInStack, char c2) {\n        return cInStack != '(' \u0026\u0026 (cInStack == '*' || cInStack == '/' || c2 != '*' \u0026\u0026 c2 != '/');\n    }\n}\n```\n\n\n\n- 输出：\n\n```bash\n中缀表达式：2*(6/3+4)-5\n转换为后缀表达式：263/4+*5-\n计算后缀表达式：7\n```\n\n- 总结:\n\n1. 利用堆栈可以很优雅的解决表达式运算的问题\n2. 以上程序有3个缺陷：不能计算小数；不能计算负数；只能计算个位数的运算\n3. 改进方向：使用浮点型计算；后缀转换时要添加对于多位数、小数、负数的处理；将结果直接保存到堆栈里，堆栈内保存数字和操作符\n\n## 作业1：一元多项式的乘法与加法运算（20 分）\n\n设计函数分别求两个一元多项式的乘积与和。\n\n输入格式:\n\n输入分2行，每行分别先给出多项式非零项的个数，再以指数递降方式输入一个多项式非零项系数和指数（绝对值均为不超过1000的整数）。数字间以空格分隔。\n\n输出格式:\n\n输出分2行，分别以指数递降方式输出乘积多项式以及和多项式非零项的系数和指数。数字间以空格分隔，但结尾不能有多余空格。零多项式应输出0 0。\n\n输入样例:\n```bash\n5 3 4 -5 2  6 1  -2 0 0 0\n5 5 20  -7 4  3 1 0 0 3 0\n```\n输出样例:\n```bash\n15 24 -25 22 30 21 -10 20 -21 8 35 6 -33 5 14 4 -15 3 18 2 -6 1\n5 20 -4 4 -5 2 9 1 -2 0\n```\n\n- 实现：\n\n```java\npublic class Main {\n\n    public static void main(String[] args) {\n        Scanner scanner = new Scanner(System.in);\n        PolyNode first1 = getInput(scanner);\n        PolyNode first2 = getInput(scanner);\n        PolyNode result1 = add(first1, first2);\n        PolyNode result2 = multiply(first1, first2);\n        print(result2);\n        print(result1);\n\n    }\n\n    /**\n     * 逐项插入算法\n     *\n     * @param first1\n     * @param first2\n     * @return\n     */\n    private static PolyNode multiply(PolyNode first1, PolyNode first2) {\n        PolyNode p1 = first1;\n        PolyNode p2 = first2;\n\n        PolyNode first = new PolyNode(); //结果，先构造一个空的头节点\n        PolyNode rear = first; //将尾部指向这个头\n        while (p2 != null) { //先用第一项乘以p2构造一个初始多项式\n            PolyNode next = new PolyNode(); //构造一个新节点\n            next.coef = p1.coef * p2.coef; //系数相乘\n            next.expon = p1.expon + p2.expon; //指数相加\n            rear.next = next; //尾部指针指向新的节点\n            rear = next; //新尾部等于新添加的节点\n            p2 = p2.next; //移动p2指针\n        }\n        p1 = p1.next; //把p1指针向后挪1位\n        while (p1 != null) {\n            p2 = first2; //将p2指针归位\n            rear = first; //尾部指针归位\n            while (p2 != null) {\n                int e = p1.expon + p2.expon; //指数相加\n                int c = p1.coef * p2.coef; //系数相乘\n                while (rear.next != null \u0026\u0026 rear.next.expon \u003e e) { //寻找比当前指数小或者等的位置\n                    rear = rear.next; //rear 往后挪\n                }\n                if (rear.next != null \u0026\u0026 rear.next.expon == e) { //挪了之后如果下一项存在，且指数相等，则合并系数\n                    if (rear.next.coef + c == 0) { //和下一项系数相加等于0，则删掉这一项\n                        rear.next = rear.next.next;\n                    } else { //系数相加不为0，就要合并系数\n                        rear.next.coef += c;\n                    }\n                } else { //指数不等，需要创建一个新节点插入\n                    PolyNode newPoly = new PolyNode(); //构造一个新节点\n                    newPoly.coef = c;\n                    newPoly.expon = e;\n                    newPoly.next = rear.next;//新插入的节点下一个=当前尾部的下一个\n                    rear.next = newPoly; //当前尾部的下一个等于新节点\n                }\n\n                p2 = p2.next;//p2处理完毕，将p2挪到下一个\n            }\n            p1 = p1.next;//p2遍历完毕，将p1往后挪\n        }\n        first = first.next; //将头部挪到真实的头部位置，Java会自动回收没有引用的头节点\n\n        return first;\n    }\n\n    private static void print(PolyNode result) {\n        PolyNode p = result;\n        StringBuilder sb = new StringBuilder();\n        if (p == null) { //零多项式输出0 0\n            sb.append(\"0 0\");\n        }\n        boolean isFirst = true;\n        while (p != null) {\n            if (!isFirst)\n                sb.append(' ');\n            sb.append(p.coef);\n            sb.append(' ');\n            sb.append(p.expon);\n            p = p.next;\n            isFirst = false;\n        }\n        System.out.println(sb.toString());\n    }\n\n    private static PolyNode add(PolyNode first1, PolyNode first2) {\n        PolyNode p1 = first1;\n        PolyNode p2 = first2;\n\n        PolyNode first = new PolyNode(); //结果，先构造一个空的头节点\n        PolyNode rear = first; //将尾部指向这个头\n        while (p1 != null \u0026\u0026 p2 != null) { //当两个指针都不为空时\n            if (p1.coef == 0) { //系数为0,直接省略\n                p1 = p1.next;\n            } else if (p2.coef == 0) {\n                p2 = p2.next;\n            } else if (p1.expon == p2.expon) { //指数相等，则系数相加后串到后面\n                int coef = p1.coef + p2.coef;  //系数相加\n                if (coef != 0) {\n                    PolyNode next = new PolyNode(); //构造一个新节点\n                    next.coef = coef;\n                    next.expon = p1.expon;\n                    rear.next = next; //尾部指针指向新的节点\n                    rear = next; //新尾部等于新添加的节点\n                }\n                p1 = p1.next; //移动指针\n                p2 = p2.next;\n            } else if (p1.expon \u003e p2.expon) {//指数大的串到后面\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p1.coef;\n                next.expon = p1.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n                p1 = p1.next; //移动指针\n            } else {\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p2.coef;\n                next.expon = p2.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n                p2 = p2.next; //移动指针\n            }\n        }\n\n        while (p1 != null) { //p1没完，把所有p1追加到后面\n            if (p1.coef != 0) { //系数不为0才，添加，否则继续找因为后面可以能还有系数不为0的\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p1.coef;\n                next.expon = p1.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n            }\n            p1 = p1.next; //移动指针\n        }\n\n        while (p2 != null \u0026\u0026 p2.coef != 0) { //p2没完，把所有p2追加到后面\n            if (p2.coef != 0) { //系数不为0才，添加，否则继续找因为后面可以能还有系数不为0的\n                PolyNode next = new PolyNode(); //构造一个新节点\n                next.coef = p2.coef;\n                next.expon = p2.expon;\n                rear.next = next; //尾部指针指向新的节点\n                rear = next; //新尾部等于新添加的节点\n            }\n            p2 = p2.next; //移动指针\n        }\n        first = first.next; //将头部挪到真实的头部位置，Java会自动回收没有引用的头节点\n        return first;\n    }\n\n    private static PolyNode getInput(Scanner scanner) {\n        int count = scanner.nextInt(); //得到总项数\n        PolyNode first = new PolyNode(); //构造一个空的头\n        PolyNode rear = first; //构造一个尾部的指针\n        while (count \u003e 0) {\n            PolyNode next = new PolyNode(); //读取一个节点\n            next.coef = scanner.nextInt();\n            next.expon = scanner.nextInt();\n            rear.next = next; //将尾部的指针指向读到的这个节点\n            rear = next; //将尾部指针挪到新添加的节点\n            count--; //循环\n        }\n        first = first.next; //将头部挪到真实的头部位置，Java会自动回收没有引用的头节点\n        return first;\n    }\n\n\n    static class PolyNode {\n        int coef;\n        int expon;\n        PolyNode next;\n    }\n}\n\n```\n\n- 总结：\n\n1. 逐项插值算法；\n2. 单个对象保存一个当前类的引用可以当作链表来使用；\n3. 原输入的链表不要取修改它的内部对象引用或者变量值；\n\n## 作业1：Reversing Linked List（25 分）\n\nGiven a constant K and a singly linked list L, you are supposed to reverse the links of every K elements on L. For example, given L being 1→2→3→4→5→6, if K=3, then you must output 3→2→1→6→5→4; if K=4, you must output 4→3→2→1→5→6.\n\nInput Specification:\n\nEach input file contains one test case. For each case, the first line contains the address of the first node, a positive N (≤10\n​5\n​​ ) which is the total number of nodes, and a positive K (≤N) which is the length of the sublist to be reversed. The address of a node is a 5-digit nonnegative integer, and NULL is represented by -1.\n\nThen N lines follow, each describes a node in the format:\n\n`Address Data Next`\nwhere `Address` is the position of the node, `Data` is an integer, and `Next` is the position of the next node.\n\nOutput Specification:\n\nFor each case, output the resulting ordered linked list. Each node occupies a line, and is printed in the same format as in the input.\n\nSample Input:\n```bash\n00100 8 4\n00000 4 99999\n00100 1 12309\n68237 6 77777\n33218 3 00000\n77777 7 88888\n99999 5 68237\n12309 2 33218\n88888 8 -1\n```\nSample Output:\n```bash\n00000 4 33218\n33218 3 12309\n12309 2 00100\n00100 1 99999\n99999 5 68237\n68237 6 -1\n```\n\n- 实现：\n\n```java\npackage cn.wycode;\n\nimport java.io.BufferedReader;\nimport java.io.InputStreamReader;\nimport java.util.ArrayList;\nimport java.util.LinkedList;\nimport java.util.Objects;\nimport java.util.Stack;\n\npublic class Main {\n    public static void main(String args[]) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(System.in));\n        //读第一行\n        String[] line1Array = getStringArray(reader);\n        String firstAddress = line1Array[0];\n        int count = Integer.parseInt(line1Array[1]);\n        int k = Integer.parseInt(line1Array[2]);\n\n        //读取所有节点\n        ArrayList\u003cNode\u003e nodes = new ArrayList\u003c\u003e(count);\n        for (int i = 0; i \u003c count; i++) {\n            String[] lineArray = getStringArray(reader);\n            Node node = new
