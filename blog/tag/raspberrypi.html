<!DOCTYPE html><html lang="zh-CN"><head><meta charSet="utf-8"/><title>王郁的小站</title><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/><meta name="next-head-count" content="3"/><link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml"/><meta name="description" content="欢迎光临王郁的小站"/><meta property="og:image" content="https://og-image.vercel.app/%E7%8E%8B%E9%83%81%E7%9A%84%E5%B0%8F%E7%AB%99.png?theme=light&amp;md=0&amp;fontSize=75px&amp;images=https%3A%2F%2Fassets.vercel.com%2Fimage%2Fupload%2Ffront%2Fassets%2Fdesign%2Fnextjs-black-logo.svg"/><meta name="og:title" content="王郁的小站"/><meta name="twitter:card" content="summary_large_image"/><link rel="preload" href="/_next/static/css/8a367d4b0f561ee4.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/8a367d4b0f561ee4.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-6af0e3c12b874bb0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-467b11a89995b152.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-75bdb96a41ba80f4.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-7a9af0eb34ed0a8f.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/205-2ea451b8c35b24ac.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/889-b501beaef0bf85fc.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/blog/tag/%5Bcid%5D-9dc0c01f6fcfe393.js" defer="" crossorigin=""></script><script src="/_next/static/7YMuoTtyITfiinBiv1T76/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/7YMuoTtyITfiinBiv1T76/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"raspberrypi-fish","file":"raspberrypi-fish.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e因为最近要出门一段时间，鱼缸没人照顾，树莓派的第一个实用需求出现了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e准备做一个液位报警仪，当鱼缸水位低于报警水位，发一封邮件给我，我就能在微信上收到通知，从而远程控制给鱼缸加水，防止鱼缸循环泵烧坏。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cvideo src=\"/images/20190807_raspberrypi_fish.mp4\" controls width=\"70%\" style=\"margin:24px auto;display: block;\"\u003e\u003c/video\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e使用GPIO接口控制硬件和接收传感器的数据，实现过程如下：\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e因为最近要出门一段时间，鱼缸没人照顾，树莓派的第一个实用需求出现了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e准备做一个液位报警仪，当鱼缸水位低于报警水位，发一封邮件给我，我就能在微信上收到通知，从而远程控制给鱼缸加水，防止鱼缸循环泵烧坏。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cvideo src=\"/images/20190807_raspberrypi_fish.mp4\" controls width=\"70%\" style=\"margin:24px auto;display: block;\"\u003e\u003c/video\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e使用GPIO接口控制硬件和接收传感器的数据，实现过程如下：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eGPIO介绍\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e树莓派的一个强大功能是沿着电路板顶部边缘的一排\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGPIO\u003c/code\u003e（general-purpose input/output）引脚。 树莓派4B板上有一排40针GPIO接头。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://technicalustad.com/wp-content/uploads/2018/02/Raspberry-Pi-GPIO-Explained.png\" alt=\"GPIO\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e主板上有两个5V引脚和两个3V3引脚，以及一些不可配置的接地引脚（0V）。 其余引脚均为通用3V3引脚，意味着输出设置为3V3，输入为3V3容差。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e输出\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e指定为输出引脚的GPIO引脚可以设置为高（3V3）或低（0V）。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e输入\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e指定为输入引脚的GPIO引脚可以读为高（3V3）或低（0V）。 使用内部上拉或下拉电阻可以更轻松地实现这一点。 引脚GPIO2和GPIO3具有固定的上拉电阻，但对于其他引脚，可以使用软件配置。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e其它\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e除了简单的输入和输出设备外，GPIO引脚还可以使用多种替代功能，一些可用于所有引脚，另一些则可用于特定引脚。如：PWM、SPI、I2C、串行\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e装备\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e面包板：用于免焊接线，边上两排是竖向连接的，中间是横向连接的。用杜邦线插入孔中就可以便捷接线了。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"http://www.taichi-maker.com/wp-content/uploads/2017/03/breadboard.jpg\" alt=\"面包板\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eGPIO扩展版：可以方便地将所有GPIO接到面包板上\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"http://g.search1.alicdn.com/img/bao/uploaded/i4/i3/TB1jpt3LXXXXXbnXpXXXXXXXXXX_!!0-item_pic.jpg_200x200.jpg\" alt=\"面包板\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eLED二极管：用于展示状态\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"http://file.youboy.com/a/83/81/74/5/9777755.jpg\" alt=\"二极管\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e干簧管液位计：用于监测液位，其原理是浮球中有磁铁，可以磁化干簧管，从而短路电路\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"http://i01.yizimg.com/uploads_old/351305/2015112223270383_old.jpg\" alt=\"液位计\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e接线\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eLED一端接GPIO17号引脚，一端接地。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e液位开关一端接GPIO2号引脚，一端接地。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20190807_fish.jpg\" alt=\"接线\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e编程\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这里我使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGPIO Zero\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这是一个Python的GPIO库，树莓派默认已经安装了，可以直接使用。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e核心脚本如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-python px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003efrom gpiozero import LED\nfrom gpiozero import Button\nfrom time import sleep\n\nled = LED(17) #1\nbutton = Button(2) #2\nwhile True:\n    sleep(0.5) #3\n    if button.is_pressed: #4\n        led.on()\n    else:\n        led.off()\n\u003c/code\u003e\u003c/pre\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e创建一个LED模式的GPIO口用于展示状态\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e创建一个Button模式的GPIO口\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e每0.5秒检测一次\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e开关打开则点亮LED，否则关闭LED\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003ePython发送邮件\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-python px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e#coding=utf-8\nfrom email.mime.text import MIMEText\nfrom email.header import Header\nfrom smtplib import SMTP_SSL\nimport time\n\n\n#邮箱smtp服务器\nhost_server = 'smtp.exmail.qq.com'\n#sender用户名\nsender_user = 'wangyu@wycode.cn'\n#邮箱登录密码\nsender_pwd = '**********'\n#发件人的邮箱\nsender_mail = sender_user\n#收件人邮箱\nreceiver = sender_user\n\n#邮件的正文内容\nmail_content = '【水位警报】过低\\n时间：'+time.strftime( '%Y-%m-%d %X', time.localtime())\n#邮件标题\nmail_title = '【水位警报】过低'\n\n#ssl登录\nsmtp = SMTP_SSL(host_server)\n#set_debuglevel()是用来调试的。参数值为1表示开启调试模式，参数值为0关闭调试模式\nsmtp.set_debuglevel(1)\nsmtp.ehlo(host_server)\nsmtp.login(sender_user, sender_pwd)\n\nmsg = MIMEText(mail_content, \"plain\", 'utf-8')\nmsg[\"Subject\"] = Header(mail_title, 'utf-8')\nmsg[\"From\"] = sender_mail\nmsg[\"To\"] = receiver\nsmtp.sendmail(sender_mail, receiver, msg.as_string())\nsmtp.quit()\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n因为最近要出门一段时间，鱼缸没人照顾，树莓派的第一个实用需求出现了。\n\n准备做一个液位报警仪，当鱼缸水位低于报警水位，发一封邮件给我，我就能在微信上收到通知，从而远程控制给鱼缸加水，防止鱼缸循环泵烧坏。\n\n\u003cvideo src=\"/images/20190807_raspberrypi_fish.mp4\" controls=\"controls\"  width=\"70%\" style=\"margin:24px auto;display: block;\"\u003e\u003c/video\u003e\n\n使用GPIO接口控制硬件和接收传感器的数据，实现过程如下：\n\u003c!--more--\u003e\n\n## GPIO介绍\n\n树莓派的一个强大功能是沿着电路板顶部边缘的一排`GPIO`（general-purpose input/output）引脚。 树莓派4B板上有一排40针GPIO接头。\n\n![GPIO](https://technicalustad.com/wp-content/uploads/2018/02/Raspberry-Pi-GPIO-Explained.png)\n\n主板上有两个5V引脚和两个3V3引脚，以及一些不可配置的接地引脚（0V）。 其余引脚均为通用3V3引脚，意味着输出设置为3V3，输入为3V3容差。\n\n### 输出\n\n指定为输出引脚的GPIO引脚可以设置为高（3V3）或低（0V）。\n\n### 输入\n\n指定为输入引脚的GPIO引脚可以读为高（3V3）或低（0V）。 使用内部上拉或下拉电阻可以更轻松地实现这一点。 引脚GPIO2和GPIO3具有固定的上拉电阻，但对于其他引脚，可以使用软件配置。\n\n### 其它\n\n除了简单的输入和输出设备外，GPIO引脚还可以使用多种替代功能，一些可用于所有引脚，另一些则可用于特定引脚。如：PWM、SPI、I2C、串行\n\n## 装备\n\n- 面包板：用于免焊接线，边上两排是竖向连接的，中间是横向连接的。用杜邦线插入孔中就可以便捷接线了。\n\n![面包板](http://www.taichi-maker.com/wp-content/uploads/2017/03/breadboard.jpg)\n\n- GPIO扩展版：可以方便地将所有GPIO接到面包板上\n\n![面包板](http://g.search1.alicdn.com/img/bao/uploaded/i4/i3/TB1jpt3LXXXXXbnXpXXXXXXXXXX_!!0-item_pic.jpg_200x200.jpg)\n\n- LED二极管：用于展示状态\n\n![二极管](http://file.youboy.com/a/83/81/74/5/9777755.jpg)\n\n- 干簧管液位计：用于监测液位，其原理是浮球中有磁铁，可以磁化干簧管，从而短路电路\n\n![液位计](http://i01.yizimg.com/uploads_old/351305/2015112223270383_old.jpg)\n\n## 接线\n\nLED一端接GPIO17号引脚，一端接地。\n\n液位开关一端接GPIO2号引脚，一端接地。\n\n![接线](/images/20190807_fish.jpg)\n\n## 编程\n\n这里我使用`GPIO Zero`\n\n这是一个Python的GPIO库，树莓派默认已经安装了，可以直接使用。\n\n核心脚本如下：\n\n```python\nfrom gpiozero import LED\nfrom gpiozero import Button\nfrom time import sleep\n\nled = LED(17) #1\nbutton = Button(2) #2\nwhile True:\n    sleep(0.5) #3\n    if button.is_pressed: #4\n        led.on()\n    else:\n        led.off()\n```\n1. 创建一个LED模式的GPIO口用于展示状态\n2. 创建一个Button模式的GPIO口\n3. 每0.5秒检测一次\n4. 开关打开则点亮LED，否则关闭LED\n\n## Python发送邮件\n\n```python\n#coding=utf-8\nfrom email.mime.text import MIMEText\nfrom email.header import Header\nfrom smtplib import SMTP_SSL\nimport time\n\n\n#邮箱smtp服务器\nhost_server = 'smtp.exmail.qq.com'\n#sender用户名\nsender_user = 'wangyu@wycode.cn'\n#邮箱登录密码\nsender_pwd = '**********'\n#发件人的邮箱\nsender_mail = sender_user\n#收件人邮箱\nreceiver = sender_user\n\n#邮件的正文内容\nmail_content = '【水位警报】过低\\n时间：'+time.strftime( '%Y-%m-%d %X', time.localtime())\n#邮件标题\nmail_title = '【水位警报】过低'\n\n#ssl登录\nsmtp = SMTP_SSL(host_server)\n#set_debuglevel()是用来调试的。参数值为1表示开启调试模式，参数值为0关闭调试模式\nsmtp.set_debuglevel(1)\nsmtp.ehlo(host_server)\nsmtp.login(sender_user, sender_pwd)\n\nmsg = MIMEText(mail_content, \"plain\", 'utf-8')\nmsg[\"Subject\"] = Header(mail_title, 'utf-8')\nmsg[\"From\"] = sender_mail\nmsg[\"To\"] = receiver\nsmtp.sendmail(sender_mail, receiver, msg.as_string())\nsmtp.quit()\n```\n\n","data":{"title":"用树莓派4B做一个鱼缸水位报警","date":"2019-08-07","tags":["RaspberryPi","Linux","Python"],"category":"Linux"},"isEmpty":false,"excerpt":"\n因为最近要出门一段时间，鱼缸没人照顾，树莓派的第一个实用需求出现了。\n\n准备做一个液位报警仪，当鱼缸水位低于报警水位，发一封邮件给我，我就能在微信上收到通知，从而远程控制给鱼缸加水，防止鱼缸循环泵烧坏。\n\n\u003cvideo src=\"/images/20190807_raspberrypi_fish.mp4\" controls=\"controls\"  width=\"70%\" style=\"margin:24px auto;display: block;\"\u003e\u003c/video\u003e\n\n使用GPIO接口控制硬件和接收传感器的数据，实现过程如下：\n"},{"id":"raspberrypi","file":"raspberrypi.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e开启吃派之旅！\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://s3.ifanr.com/wp-content/uploads/2019/06/mousse-68.jpg!720\" alt=\"树莓派4B\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e2019年6月25日树莓派基金会发布了全新的Raspberry Pi 4 「树莓派4 代」。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e相比上一代升级了很多，价格依旧250元（1G版），配置如下：\u003c/p\u003e\n\u003ctable class=\"mb-4\"\u003e\n\u003cthead class=\"bg-sky-200 dark:bg-sky-900\"\u003e\n\u003ctr\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e项目\u003c/th\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e配置\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eCPU\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e巴龙BCM2711, 4核 Cortex-A72 (ARM v8) 64位  主频1.5GHz\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e内存\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e1GB/2GB/4GB LPDDR4-2400 SDRAM\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e有线网络\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e千兆以太网\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e无线网络\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e2.4 GHz/5.0 GHz IEEE 802.11ac无线，蓝牙5.0，支持低功耗蓝牙\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e显示接口\u003c/td\u003e\n\u003ctd class=\  border border-slate-400/30\"\u003eGPIO\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e40pin兼容以前版本\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e电源\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e5V0.3A通过USB type-C 或 GPIO接口\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e存储\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eMicro-SD加载操作系统和数据存储\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章带你安装和配置树莓派：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e烧录镜像\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e为了给树莓派安装操作系统，我们需要一张Micro-SD卡，然后将系统写进去。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e根据官网介绍，有两个推荐的下载连接，一个是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNOOBS\u003c/code\u003e，一个是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRaspbian\u003c/code\u003e。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNOOBS\u003c/code\u003e是一个操作系统安装程序，它已经包含了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRaspbian\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLiberELEC\u003c/code\u003e，也可以通过网络安装其它操作系统。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRaspbian\u003c/code\u003e是树莓派基金会基于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDebian buster\u003c/code\u003e开发的官方操作系统。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e我开始尝试使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNOOBS\u003c/code\u003e时，树莓派无法启动。官网说可能是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSPI EEPROM\u003c/code\u003e，可以下载bootloader重新启动。\n但我没有再折腾这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNOOBS\u003c/code\u003e，而是采用了第二种，直接写入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRaspbian\u003c/code\u003e镜像的方式，然后我就正常启动了树莓派系统。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20190807_raspberrypi.jpg\" alt=\"Raspbian\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e鼠标速度慢\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e系统启动后发现移动速度很慢，图形界面调了也没用\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e解决方案：\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e手动修改鼠标的轮询间隔：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ sudo nano /boot/cmdline.txt\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e然后在最后添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eusbhid.mousepoll=0\u003c/code\u003e。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ reboot\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e重启树莓派，鼠标终于可以正常使用了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e参考地址：\u003ca href=\"https://whoisnian.com/2017/10/26/Raspberry%E5%9B%BE%E5%BD%A2%E7%95%8C%E9%9D%A2%E4%B8%8B%E9%BC%A0%E6%A0%87%E7%A7%BB%E5%8A%A8%E7%BC%93%E6%85%A2/\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://whoisnian.com/2017/10/26/Raspberry图形界面下鼠标移动缓慢/\u003c/a\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e远程连接\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRaspberry Pi Configuration\u003c/code\u003e里打开\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSSH\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eVNC\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e然后我们就可以通过局域网\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSSH\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eVNC Viewer\u003c/code\u003e远程访问树莓派了\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eVNC \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCannot currently show the desktop\u003c/code\u003e\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eVNC Viewer\u003c/code\u003e远程连接时显示\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCannot currently show the desktop\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e解决方案:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ cd /boot/\n$ sudo nano config.txt\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e取消注释以下3行\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-yml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e# uncomment if hdmi display is not detected and composite is being output\nhdmi_force_hotplug=1\n\n# uncomment to force a specific HDMI mode (this will force VGA)\nhdmi_group=1\nhdmi_mode=1\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e什么？你想要通过互联网远程访问？那么我们需要\u003cstrong\u003e内网穿透\u003c/strong\u003e这门技术。下篇文章我们来搞这个。\u003c/p\u003e\n","content":"\n开启吃派之旅！\n\n![树莓派4B](https://s3.ifanr.com/wp-content/uploads/2019/06/mousse-68.jpg!720)\n\n2019年6月25日树莓派基金会发布了全新的Raspberry Pi 4 「树莓派4 代」。\n\n相比上一代升级了很多，价格依旧250元（1G版），配置如下：\n\n| 项目 | 配置 |\n| --- | --- |\n| CPU  | 巴龙BCM2711, 4核 Cortex-A72 (ARM v8) 64位  主频1.5GHz |\n| 内存 | 1GB/2GB/4GB LPDDR4-2400 SDRAM |\n| 有线网络 | 千兆以太网 |\n| 无线网络 | 2.4 GHz/5.0 GHz IEEE 802.11ac无线，蓝牙5.0，支持低功耗蓝牙 |\n| 显示接口 | 双micro HDMI，最高支持4K60Hz |\n| USB | 2个USB3.0+2个USB2.0 |\n| GPIO | 40pin兼容以前版本 |\n| 电源 | 5V0.3A通过USB type-C 或 GPIO接口 |\n| 存储 | Micro-SD加载操作系统和数据存储 |\n\n这篇文章带你安装和配置树莓派：\n\u003c!--more--\u003e\n\n## 烧录镜像\n\n为了给树莓派安装操作系统，我们需要一张Micro-SD卡，然后将系统写进去。\n\n根据官网介绍，有两个推荐的下载连接，一个是`NOOBS`，一个是`Raspbian`。\n\n- `NOOBS`是一个操作系统安装程序，它已经包含了`Raspbian`和`LiberELEC`，也可以通过网络安装其它操作系统。\n- `Raspbian`是树莓派基金会基于`Debian buster`开发的官方操作系统。\n\n我开始尝试使用`NOOBS`时，树莓派无法启动。官网说可能是`SPI EEPROM`，可以下载bootloader重新启动。\n但我没有再折腾这个`NOOBS`，而是采用了第二种，直接写入`Raspbian`镜像的方式，然后我就正常启动了树莓派系统。\n\n![Raspbian](/images/20190807_raspberrypi.jpg)\n\n## 鼠标速度慢\n\n系统启动后发现移动速度很慢，图形界面调了也没用\n\n解决方案：\n\n手动修改鼠标的轮询间隔：\n```bash\n$ sudo nano /boot/cmdline.txt\n```\n然后在最后添加`usbhid.mousepoll=0`。\n```bash\n$ reboot\n```\n重启树莓派，鼠标终于可以正常使用了。\n\n参考地址：https://whoisnian.com/2017/10/26/Raspberry图形界面下鼠标移动缓慢/\n\n## 远程连接\n\n在`Raspberry Pi Configuration`里打开`SSH`和`VNC`\n\n然后我们就可以通过局域网`SSH`或者`VNC Viewer`远程访问树莓派了\n\n## VNC `Cannot currently show the desktop`\n\n使用`VNC Viewer`远程连接时显示`Cannot currently show the desktop`\n\n解决方案:\n\n```bash\n$ cd /boot/\n$ sudo nano config.txt\n```\n取消注释以下3行\n\n```yml\n# uncomment if hdmi display is not detected and composite is being output\nhdmi_force_hotplug=1\n\n# uncomment to force a specific HDMI mode (this will force VGA)\nhdmi_group=1\nhdmi_mode=1\n```\n\n什么？你想要通过互联网远程访问？那么我们需要**内网穿透**这门技术。下篇文章我们来搞这个。","data":{"title":"树莓派4B系统安装及配置","date":"2019-08-07","tags":["RaspberryPi","Linux"],"category":"Linux"},"isEmpty":false,"excerpt":"\n开启吃派之旅！\n\n![树莓派4B](https://s3.ifanr.com/wp-content/uploads/2019/06/mousse-68.jpg!720)\n\n2019年6月25日树莓派基金会发布了全新的Raspberry Pi 4 「树莓派4 代」。\n\n相比上一代升级了很多，价格依旧250元（1G版），配置如下：\n\n| 项目 | 配置 |\n| --- | --- |\n| CPU  | 巴龙BCM2711, 4核 Cortex-A72 (ARM v8) 64位  主频1.5GHz |\n| 内存 | 1GB/2GB/4GB LPDDR4-2400 SDRAM |\n| 有线网络 | 千兆以太网 |\n| 无线网络 | 2.4 GHz/5.0 GHz IEEE 802.11ac无线，蓝牙5.0，支持低功耗蓝牙 |\n| 显示接口 | 双micro HDMI，最高支持4K60Hz |\n| USB | 2个USB3.0+2个USB2.0 |\n| GPIO | 40pin兼容以前版本 |\n| 电源 | 5V0.3A通过USB type-C 或 GPIO接口 |\n| 存储 | Micro-SD加载操作系统和数据存储 |\n\n这篇文章带你安装和配置树莓派：\n"}],"cid":"raspberrypi"},"__N_SSG":true},"page":"/blog/tag/[cid]","query":{"cid":"raspberrypi"},"buildId":"7YMuoTtyITfiinBiv1T76","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
