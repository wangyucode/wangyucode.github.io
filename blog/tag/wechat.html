00"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"clipboard-wechatapp","file":"clipboard-wechatapp.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_clipboard.jpg\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将开发一个微信小程序版的跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e书接上文，我们已经用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_clipboard.jpg\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将开发一个微信小程序版的跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e书接上文，我们已经用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1.app.json\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\n{\n  \"pages\": [\n    \"pages/index/index\"\n  ],\n  \"window\": {\n    \"backgroundTextStyle\": \"light\",\n    \"navigationBarBackgroundColor\": \"#379392\",\n    \"navigationBarTitleText\": \"跨平台剪切板\",\n    \"navigationBarTextStyle\": \"white\"\n  },\n  \"debug\": true\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapp.json\u003c/code\u003e中描述了小程序相关的全局配置信息，所有的页面需要配置在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epage\u003c/code\u003e属性中。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里还能配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etabbar\u003c/code\u003e，为了跨平台剪切板的简洁，我去掉了tab，把它做成了一个单页面的极简APP\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e2.模板\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\n\u0026#x3C;!--index.wxml--\u003e\n\u0026#x3C;view class=\"container\"\u003e\n  \u0026#x3C;input type='number' placeholder=\"查询码\" value='{{queryNumber\u003e0?queryNumber:\"\"}}' bindinput='bindInput' disabled='{{isShowResult}}'\u003e\u0026#x3C;/input\u003e\n  \u0026#x3C;button type='primary' wx:if=\"{{!isShowResult}}\" bindtap='query'\u003e查询\u0026#x3C;/button\u003e\n  \u0026#x3C;button wx:if=\"{{!isShowResult}}\" bindtap='create'\u003e新建\u0026#x3C;/button\u003e\n  \u0026#x3C;textarea wx:if='{{isShowResult}}' value='{{text}}' bindinput='bindInputText'\u003e\u0026#x3C;/textarea\u003e\n  \u0026#x3C;button type= 'primary' wx:if = \"{{isShowResult}}\" bindtap='save'\u003e保存\u0026#x3C;/button\u003e\n  \u0026#x3C;button wx:if = \"{{isShowResult}}\" bindtap='back'\u003e返回\u0026#x3C;/button\u003e\n\u0026#x3C;/view\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.wxml\u003c/code\u003e后缀的是小程序的布局（模板）文件。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e属性没什么好解释的，看一下就懂了。参考React版的教程就知道每个属性的详细用途。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e3.样式表\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-css px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e/**index.wxss**/\n\ninput {\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n}\n\nbutton {\n  margin-top: 24rpx;\n  width: 100%;\n}\n\ntextarea{\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n  margin-top: 24rpx;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e就是传统的CSS层叠样式表\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里rpx是dpi无关的单位，保证不同分辨率的相同观感\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e4.逻辑\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e//index.js\n//获取应用实例\nconst app = getApp()\n\nPage({\n  data: {\n    queryNumber: -1,\n    isShowResult: false,\n    text: ''\n  },\n\n  onLoad: function () {\n\n  },\n\n  bindInput: function (e) {\n    this.setData({\n      queryNumber: e.detail.value\n    })\n  },\n\n  bindInputText: function (e) {\n    this.setData({\n      text: e.detail.value\n    })\n  },\n\n  query: function () {\n    if (this.data.queryNumber \u0026#x3C;= 0) {\n      wx.showToast({\n        title: '查询码不正确！',\n        icon: 'none'\n      });\n      return\n    }\n\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/query',\n      data: { 'id': this.data.queryNumber },\n      success: function (res) {\n        if (!res.data.success || res.data.data == null) {\n          wx.showToast({\n            title: '查询码不正确！',\n            icon: 'none'\n          });\n        } else {\n          that.setData({\n            isShowResult: true,\n            queryNumber: res.data.data.id,\n            text: res.data.data.content\n          });\n        }\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n\n  },\n\n  create: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/create',\n      method: 'POST',\n      success: function (res) {\n\n        that.setData({\n          isShowResult: true,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n  },\n\n  save: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/save',\n      method: 'POST',\n      data:{\n        id: that.data.queryNumber,\n        content: that.data.text\n      },\n      header: {\n        'content-type': 'application/x-www-form-urlencoded'\n      },\n      success: function (res) {\n\n        that.setData({\n          isShowResult: false,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n        wx.showToast({\n          title: '保存成功！',\n          icon: 'success'\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete: function () {\n        wx.hideLoading();\n      }\n    });\n  },\n\n  back: function () {\n    this.setData({\n      isShowResult: false\n    })\n  }\n\n})\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e小程序的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edata\u003c/code\u003e，就是React的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estate\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e小程序通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis.setData()\u003c/code\u003e刷新页面状态，如同React的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis.setState()\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.request()\u003c/code\u003e做http请求\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.showToast()\u003c/code\u003e显示一个提示\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.showLoading()\u003c/code\u003e显示Loading\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里发现一个小程序的bug，在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.hideLoading()\u003c/code\u003e会将Toast也消失掉。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e至此大功告成！打开微信扫一扫文章开头的小程序码即可使用。\n访问 \u003ca href=\"https://github.com/wangyucode/Clipboard\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/Clipboard\u003c/a\u003e 查看完整源码\u003c/p\u003e\n","content":"\n![React](/images/20180213_clipboard.jpg)\n\n\u003e 这篇文章我们将开发一个微信小程序版的跨平台剪切板。\n\n\n书接上文，我们已经用`React`开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\n\n如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\n\n\u003c!--more--\u003e\n\n## 1.app.json\n\n```json\n\n{\n  \"pages\": [\n    \"pages/index/index\"\n  ],\n  \"window\": {\n    \"backgroundTextStyle\": \"light\",\n    \"navigationBarBackgroundColor\": \"#379392\",\n    \"navigationBarTitleText\": \"跨平台剪切板\",\n    \"navigationBarTextStyle\": \"white\"\n  },\n  \"debug\": true\n}\n```\n\n- `app.json`中描述了小程序相关的全局配置信息，所有的页面需要配置在`page`属性中。\n- 这里还能配置`tabbar`，为了跨平台剪切板的简洁，我去掉了tab，把它做成了一个单页面的极简APP\n\n## 2.模板\n\n```html\n\n\u003c!--index.wxml--\u003e\n\u003cview class=\"container\"\u003e\n  \u003cinput type='number' placeholder=\"查询码\" value='{{queryNumber\u003e0?queryNumber:\"\"}}' bindinput='bindInput' disabled='{{isShowResult}}'\u003e\u003c/input\u003e\n  \u003cbutton type='primary' wx:if=\"{{!isShowResult}}\" bindtap='query'\u003e查询\u003c/button\u003e\n  \u003cbutton wx:if=\"{{!isShowResult}}\" bindtap='create'\u003e新建\u003c/button\u003e\n  \u003ctextarea wx:if='{{isShowResult}}' value='{{text}}' bindinput='bindInputText'\u003e\u003c/textarea\u003e\n  \u003cbutton type= 'primary' wx:if = \"{{isShowResult}}\" bindtap='save'\u003e保存\u003c/button\u003e\n  \u003cbutton wx:if = \"{{isShowResult}}\" bindtap='back'\u003e返回\u003c/button\u003e\n\u003c/view\u003e\n```\n\n- `.wxml`后缀的是小程序的布局（模板）文件。\n- 属性没什么好解释的，看一下就懂了。参考React版的教程就知道每个属性的详细用途。\n\n## 3.样式表\n\n```css\n/**index.wxss**/\n\ninput {\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n}\n\nbutton {\n  margin-top: 24rpx;\n  width: 100%;\n}\n\ntextarea{\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n  margin-top: 24rpx;\n}\n```\n\n- 就是传统的CSS层叠样式表\n- 这里rpx是dpi无关的单位，保证不同分辨率的相同观感\n\n\n## 4.逻辑\n\n```javascript\n//index.js\n//获取应用实例\nconst app = getApp()\n\nPage({\n  data: {\n    queryNumber: -1,\n    isShowResult: false,\n    text: ''\n  },\n\n  onLoad: function () {\n\n  },\n\n  bindInput: function (e) {\n    this.setData({\n      queryNumber: e.detail.value\n    })\n  },\n\n  bindInputText: function (e) {\n    this.setData({\n      text: e.detail.value\n    })\n  },\n\n  query: function () {\n    if (this.data.queryNumber \u003c= 0) {\n      wx.showToast({\n        title: '查询码不正确！',\n        icon: 'none'\n      });\n      return\n    }\n\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/query',\n      data: { 'id': this.data.queryNumber },\n      success: function (res) {\n        if (!res.data.success || res.data.data == null) {\n          wx.showToast({\n            title: '查询码不正确！',\n            icon: 'none'\n          });\n        } else {\n          that.setData({\n            isShowResult: true,\n            queryNumber: res.data.data.id,\n            text: res.data.data.content\n          });\n        }\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n\n  },\n\n  create: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/create',\n      method: 'POST',\n      success: function (res) {\n\n        that.setData({\n          isShowResult: true,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n  },\n\n  save: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/save',\n      method: 'POST',\n      data:{\n        id: that.data.queryNumber,\n        content: that.data.text\n      },\n      header: {\n        'content-type': 'application/x-www-form-urlencoded'\n      },\n      success: function (res) {\n\n        that.setData({\n          isShowResult: false,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n        wx.showToast({\n          title: '保存成功！',\n          icon: 'success'\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete: function () {\n        wx.hideLoading();\n      }\n    });\n  },\n\n  back: function () {\n    this.setData({\n      isShowResult: false\n    })\n  }\n\n})\n\n```\n\n- 小程序的`data`，就是React的`state`\n- 小程序通过`this.setData()`刷新页面状态，如同React的`this.setState()`\n- 使用`wx.request()`做http请求\n- 使用`wx.showToast()`显示一个提示\n- 使用`wx.showLoading()`显示Loading\n- 这里发现一个小程序的bug，在`wx.hideLoading()`会将Toast也消失掉。\n\n\n至此大功告成！打开微信扫一扫文章开头的小程序码即可使用。\n访问 https://github.com/wangyucode/Clipboard 查看完整源码","data":{"title":"微信小程序入门","date":"2018-02-13","tags":["Wechat","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![React](/images/20180213_clipboard.jpg)\n\n\u003e 这篇文章我们将开发一个微信小程序版的跨平台剪切板。\n\n\n书接上文，我们已经用`React`开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\n\n如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\n\n"},{"id":"Share","file":"Share.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何为Android应用添加分享功能。包含通过原生\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIntent\u003c/code\u003e和利用第三方SDK。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何为Android应用添加分享功能。包含通过原生\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIntent\u003c/code\u003e和利用第三方SDK。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e原生Intent方式\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e大多平台都支持隐式Intent方式发起分享。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e创建隐式 Intent 时，Android 系统通过将 Intent 的内容与在设备上其他应用的清单文件中声明的 Intent 过滤器进行比较，从而找到要启动的相应组件。 如果 Intent 与 Intent 过滤器匹配，则系统将启动该组件，并向其传递 Intent 对象。 如果多个 Intent 过滤器兼容，则系统会显示一个对话框，支持用户选取要使用的应用。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eIntent sendIntent = new Intent();\nsendIntent.setAction(Intent.ACTION_SEND);\nsendIntent.putExtra(Intent.EXTRA_TEXT, textMessage);\nsendIntent.setType(\"text/plain\");\nIntent chooser = Intent.createChooser(sendIntent, \"title\");\nif (sendIntent.resolveActivity(getPackageManager()) != null) {\n    startActivity(chooser);\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里Action设置为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIntent.ACTION_SEND\u003c/code\u003e就是分享（发送）的方式。\n然后通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eputExtra()\u003c/code\u003e 方式传递附加信息，可以是文本、图片等。\n为了每次分享时都选择平台，需要为Intent包装一个Chooser。\n然后就可以启动Activity分享了。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e单独集成第三方（微信、微博）SDK\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e不同的平台有所不同，一般都包括以下流程\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e注册开发者账号\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e填写应用信息，获取应用ID，Key等\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e导入相关SDK依赖\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e集成分享代码\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e集成ShareSDK\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e集成ShareSDK的好处是，提供了统一的接口，抹平了不同平台间API的差异，集成更简单，维护也方便。特别是当你需要集成很多平台的时候。\n但是上面单独集成的前两步还是不可缺少。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e集成微信分享的一些注意事项\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e有时会遇到错误\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e{\"req\":\"e\",\"errCode\":-6,\"transaction\":\"webpage1498805832655\"}\u003c/code\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e微信分享需要经过签名才可以\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e微信Android应用信息的签名那一栏需要填入签名的\u003cstrong\u003eMD5\u003c/strong\u003e值，通过以下命令获取\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003ekeytool -list -v -keystore \u0026#x3C;你的keystore路径\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ekeytool\u003c/code\u003e 是jdk的自带一个命令，类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ejavac\u003c/code\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e签名的\u003cstrong\u003eMD5\u003c/strong\u003e值必须全部小写，并去掉冒号\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e可以在gradle文件中配置以下属性，让开发版本也使用正式签名\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eandroid {\n    ***\n    signingConfigs {\n        debug{\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"keyPassword\"\n        }\n        release {\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"你的keyPassword\"\n        }\n    }\n    ***\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e有时会遇到错误\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003echeckArgs fail, thumbData is invalid\u003c/code\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e图片太大，可以获取缩略图\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eBitmap bmp = BitmapFactory.decodeResource(getResources(),R.drawable.app_icon);\nBitmap thumb = Bitmap.createScaledBitmap(bmp,THUMB_SIZE,THUMB_SIZE,true);\nbmp.recycle();\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e 本文介绍如何为Android应用添加分享功能。包含通过原生`Intent`和利用第三方SDK。\n\n\u003c!--more--\u003e\n## 原生Intent方式\n\n大多平台都支持隐式Intent方式发起分享。\n\n\u003e 创建隐式 Intent 时，Android 系统通过将 Intent 的内容与在设备上其他应用的清单文件中声明的 Intent 过滤器进行比较，从而找到要启动的相应组件。 如果 Intent 与 Intent 过滤器匹配，则系统将启动该组件，并向其传递 Intent 对象。 如果多个 Intent 过滤器兼容，则系统会显示一个对话框，支持用户选取要使用的应用。\n\n```java\nIntent sendIntent = new Intent();\nsendIntent.setAction(Intent.ACTION_SEND);\nsendIntent.putExtra(Intent.EXTRA_TEXT, textMessage);\nsendIntent.setType(\"text/plain\");\nIntent chooser = Intent.createChooser(sendIntent, \"title\");\nif (sendIntent.resolveActivity(getPackageManager()) != null) {\n    startActivity(chooser);\n}\n```\n这里Action设置为`Intent.ACTION_SEND`就是分享（发送）的方式。\n然后通过`putExtra()` 方式传递附加信息，可以是文本、图片等。\n为了每次分享时都选择平台，需要为Intent包装一个Chooser。\n然后就可以启动Activity分享了。\n\n## 单独集成第三方（微信、微博）SDK\n\n不同的平台有所不同，一般都包括以下流程\n- 注册开发者账号\n- 填写应用信息，获取应用ID，Key等\n- 导入相关SDK依赖\n- 集成分享代码\n\n## 集成ShareSDK\n\n集成ShareSDK的好处是，提供了统一的接口，抹平了不同平台间API的差异，集成更简单，维护也方便。特别是当你需要集成很多平台的时候。\n但是上面单独集成的前两步还是不可缺少。\n\n## 集成微信分享的一些注意事项\n\n有时会遇到错误`{\"req\":\"e\",\"errCode\":-6,\"transaction\":\"webpage1498805832655\"}`\n- 微信分享需要经过签名才可以\n- 微信Android应用信息的签名那一栏需要填入签名的**MD5**值，通过以下命令获取\n\n```bash\nkeytool -list -v -keystore \u003c你的keystore路径\u003e\n```\n\n\u003e`keytool` 是jdk的自带一个命令，类似`javac`\n\n- 签名的**MD5**值必须全部小写，并去掉冒号\n- 可以在gradle文件中配置以下属性，让开发版本也使用正式签名\n\n```\nandroid {\n    ***\n    signingConfigs {\n        debug{\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"keyPassword\"\n        }\n        release {\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"你的keyPassword\"\n        }\n    }\n    ***\n}\n```\n\n有时会遇到错误`checkArgs fail, thumbData is invalid`\n\n- 图片太大，可以获取缩略图\n```java\nBitmap bmp = BitmapFactory.decodeResource(getResources(),R.drawable.app_icon);\nBitmap thumb = Bitmap.createScaledBitmap(bmp,THUMB_SIZE,THUMB_SIZE,true);\nbmp.recycle();\n```","data":{"title":"Android原生分享及第三方分享","date":"2017-06-16","tags":["Android","Wechat"],"category":"Android"},"isEmpty":false,"excerpt":"\n\u003e 本文介绍如何为Android应用添加分享功能。包含通过原生`Intent`和利用第三方SDK。\n\n"}],"cid":"wechat"},"__N_SSG":true},"page":"/blog/tag/[cid]","query":{"cid":"wechat"},"buildId":"uFO1FMOoBQ2X-GM8G4ZfF","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
