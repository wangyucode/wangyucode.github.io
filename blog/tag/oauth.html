00"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"swagger-auth","file":"swagger-auth.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://swagger.io/swagger/media/assets/images/swagger_logo.svg\" alt=\"swagger\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当API添加了鉴权后，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eswagger\u003c/code\u003e如何进行调试呢，比如需要在请求头\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eheader\u003c/code\u003e中添加类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etoken\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAuthorization\u003c/code\u003e之类的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring\u003c/code\u003e中进行如下简单的配置就可以了。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://swagger.io/swagger/media/assets/images/swagger_logo.svg\" alt=\"swagger\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当API添加了鉴权后，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eswagger\u003c/code\u003e如何进行调试呢，比如需要在请求头\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eheader\u003c/code\u003e中添加类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etoken\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAuthorization\u003c/code\u003e之类的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring\u003c/code\u003e中进行如下简单的配置就可以了。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\n@EnableSwagger2\nclass SwaggerConfig {\n\n    @Bean\n    fun generateDocket(): Docket {\n        return Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .apis(RequestHandlerSelectors.withClassAnnotation(Api::class.java))\n                .build()\n                .securityContexts(listOf(securityContext())) // #1\n                .securitySchemes(listOf(apiKey())) // #2\n                .apiInfo(apiInfo())\n    }\n\n    private fun securityContext(): SecurityContext {\n        return SecurityContext.builder()\n                .securityReferences(defaultAuth())\n                .forPaths(PathSelectors.regex(\"/api/public/admin/.*\"))\n                .build()\n    }\n\n    fun defaultAuth(): List\u0026#x3C;SecurityReference\u003e {\n        val authorizationScope = AuthorizationScope(\"global\", \"accessEverything\")\n        val authorizationScopes = arrayOf(authorizationScope)\n        return listOf(SecurityReference(\"token\", authorizationScopes))\n    }\n\n\n    fun apiKey(): ApiKey {\n        return ApiKey(\"token\", \"X-Auth-Token\", \"header\")\n    }\n\n\n    private fun apiInfo(): ApiInfo {\n        return ApiInfo(\"王郁的API文档\",\n                \"用于App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                Contact(\"王郁\", \"wycode.cn\", \"wangyu@wycode.cn\"),\n                \"wycode.cn All Right Reserved\",\n                \"https://wycode.cn\",\n                emptyList())\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e关键配置就是上面包含#1和#2注释的两行配置\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e配置安全上下文，我这里配置了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/api/public/admin/.*\u003c/code\u003e下的接口需要添加。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e配置鉴权类型，我这里使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eApiKey\u003c/code\u003e。\u003c/li\u003e\n\u003c/ol\u003e\n","content":"\n![swagger](https://swagger.io/swagger/media/assets/images/swagger_logo.svg)\n\n当API添加了鉴权后，`swagger`如何进行调试呢，比如需要在请求头`header`中添加类似`token`或者`Authorization`之类的。\n\n在`Spring`中进行如下简单的配置就可以了。\n\n\u003c!--more--\u003e\n\n```kotlin\n@Configuration\n@EnableSwagger2\nclass SwaggerConfig {\n\n    @Bean\n    fun generateDocket(): Docket {\n        return Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .apis(RequestHandlerSelectors.withClassAnnotation(Api::class.java))\n                .build()\n                .securityContexts(listOf(securityContext())) // #1\n                .securitySchemes(listOf(apiKey())) // #2\n                .apiInfo(apiInfo())\n    }\n\n    private fun securityContext(): SecurityContext {\n        return SecurityContext.builder()\n                .securityReferences(defaultAuth())\n                .forPaths(PathSelectors.regex(\"/api/public/admin/.*\"))\n                .build()\n    }\n\n    fun defaultAuth(): List\u003cSecurityReference\u003e {\n        val authorizationScope = AuthorizationScope(\"global\", \"accessEverything\")\n        val authorizationScopes = arrayOf(authorizationScope)\n        return listOf(SecurityReference(\"token\", authorizationScopes))\n    }\n\n\n    fun apiKey(): ApiKey {\n        return ApiKey(\"token\", \"X-Auth-Token\", \"header\")\n    }\n\n\n    private fun apiInfo(): ApiInfo {\n        return ApiInfo(\"王郁的API文档\",\n                \"用于App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                Contact(\"王郁\", \"wycode.cn\", \"wangyu@wycode.cn\"),\n                \"wycode.cn All Right Reserved\",\n                \"https://wycode.cn\",\n                emptyList())\n    }\n}\n\n```\n关键配置就是上面包含#1和#2注释的两行配置\n\n1. 配置安全上下文，我这里配置了`/api/public/admin/.*`下的接口需要添加。\n2. 配置鉴权类型，我这里使用`ApiKey`。","data":{"title":"SpringBoot工程为SwaggerUI添加认证","date":"2019-07-19","tags":["OAuth","Java","Kotlin","Spring","Swagger"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![swagger](https://swagger.io/swagger/media/assets/images/swagger_logo.svg)\n\n当API添加了鉴权后，`swagger`如何进行调试呢，比如需要在请求头`header`中添加类似`token`或者`Authorization`之类的。\n\n在`Spring`中进行如下简单的配置就可以了。\n\n"},{"id":"oauth","file":"oauth.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e关于认证和授权，最权威的流程就是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOAuth2.0\u003c/code\u003e了，涵盖了用户认证授权的方方面面，现代的大型网站几乎都是基于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOauth2.0\u003c/code\u003e协议开发认证鉴权功能。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOAuth2.0\u003c/code\u003e被写入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRFC6749\u003c/code\u003e，RFC中的流程图看了还是不明白的话，可以看看下面这张图，展示了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOAuth2.0\u003c/code\u003e四种模式的完整流程。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e关于认证和授权，最权威的流程就是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOAuth2.0\u003c/code\u003e了，涵盖了用户认证授权的方方面面，现代的大型网站几乎都是基于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOauth2.0\u003c/code\u003e协议开发认证鉴权功能。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOAuth2.0\u003c/code\u003e被写入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRFC6749\u003c/code\u003e，RFC中的流程图看了还是不明白的话，可以看看下面这张图，展示了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOAuth2.0\u003c/code\u003e四种模式的完整流程。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20190614_oauth.png\" alt=\"OAuth\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","content":"\n关于认证和授权，最权威的流程就是`OAuth2.0`了，涵盖了用户认证授权的方方面面，现代的大型网站几乎都是基于`Oauth2.0`协议开发认证鉴权功能。\n\n`OAuth2.0`被写入`RFC6749`，RFC中的流程图看了还是不明白的话，可以看看下面这张图，展示了`OAuth2.0`四种模式的完整流程。\n\n\u003c!--more--\u003e\n\n![OAuth](/images/20190614_oauth.png)\n\n","data":{"title":"OAuth2.0四种模式完整时序图","date":"2019-06-14","tags":["OAuth"],"category":"Backend"},"isEmpty":false,"excerpt":"\n关于认证和授权，最权威的流程就是`OAuth2.0`了，涵盖了用户认证授权的方方面面，现代的大型网站几乎都是基于`Oauth2.0`协议开发认证鉴权功能。\n\n`OAuth2.0`被写入`RFC6749`，RFC中的流程图看了还是不明白的话，可以看看下面这张图，展示了`OAuth2.0`四种模式的完整流程。\n\n"},{"id":"jwt","file":"jwt.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://ts1.cn.mm.bing.net/th/id/R-C.db4d0c221a205b33b6296fe6412bfe91?rik=%2fIH2gS%2fgcubddQ\u0026#x26;riu=http%3a%2f%2fordina-jworks.github.io%2fimg%2fJWT%2fjwt-logo.png\u0026#x26;ehk=jeV7Iwj5nNSP9Pl927GxkmOei90QHBPvQtKMY5A0KrM%3d\u0026#x26;risl=\u0026#x26;pid=ImgRaw\u0026#x26;r=0\u0026#x26;sres=1\u0026#x26;sresct=1\" alt=\"jwt\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e为使用前后端分离的后端管理框架做准备，使用JWT目前看来是最佳选择。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e知其然\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e无状态\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e服务化\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e移动、web统统支持，后端提供相关接口即可\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e知其所以然\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e认证：通过调用登录接口，服务器颁发一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJWT\u003c/code\u003e（JSON Web Token）给客户端。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e鉴权：客户端每个请求携带\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJWT\u003c/code\u003e，后端使用一个请求过滤器，从请求头中解析\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJWT\u003c/code\u003e，为本次请求授予相关权限\u003c/li\u003e\n\u003c/ol\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://ts1.cn.mm.bing.net/th/id/R-C.db4d0c221a205b33b6296fe6412bfe91?rik=%2fIH2gS%2fgcubddQ\u0026#x26;riu=http%3a%2f%2fordina-jworks.github.io%2fimg%2fJWT%2fjwt-logo.png\u0026#x26;ehk=jeV7Iwj5nNSP9Pl927GxkmOei90QHBPvQtKMY5A0KrM%3d\u0026#x26;risl=\u0026#x26;pid=ImgRaw\u0026#x26;r=0\u0026#x26;sres=1\u0026#x26;sresct=1\" alt=\"jwt\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e为使用前后端分离的后端管理框架做准备，使用JWT目前看来是最佳选择。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e知其然\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e无状态\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e服务化\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e移动、web统统支持，后端提供相关接口即可\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e知其所以然\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e认证：通过调用登录接口，服务器颁发一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJWT\u003c/code\u003e（JSON Web Token）给客户端。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e鉴权：客户端每个请求携带\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJWT\u003c/code\u003e，后端使用一个请求过滤器，从请求头中解析\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJWT\u003c/code\u003e，为本次请求授予相关权限\u003c/li\u003e\n\u003c/ol\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e导入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eio.jsonwebtoken:jjwt\u003c/code\u003e\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ejjwt\u003c/code\u003e提供了JWT主要功能的Java版本实现，目前版本是0.9.0\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edependencies {\n    compile 'io.jsonwebtoken:jjwt:0.9.0'\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e生成token\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eprivate String generateToken(Map\u0026#x3C;String, Object\u003e claims) {\n        return Jwts.builder()\n                .setClaims(claims) //自定义声明\n                .setExpiration(generateExpirationDate()) //过期时间\n                .signWith(SignatureAlgorithm.HS512, secret) //加密\n                .compact();\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e解析token\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eprivate Claims getClaimsFromToken(String token) {\n        Claims claims;\n        try {\n            claims = Jwts.parser()\n                    .setSigningKey(secret)\n                    .parseClaimsJws(token)\n                    .getBody();\n        } catch (Exception e) {\n            claims = null;\n        }\n        return claims;\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e鉴权过滤器\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode.web.config.security;\n\nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.beans.factory.annotation.Value;\nimport org.springframework.security.authentication.UsernamePasswordAuthenticationToken;\nimport org.springframework.security.core.context.SecurityContextHolder;\nimport org.springframework.security.core.userdetails.UserDetails;\nimport org.springframework.security.core.userdetails.UserDetailsService;\nimport org.springframework.security.web.authentication.WebAuthenticationDetailsSource;\nimport org.springframework.stereotype.Component;\nimport org.springframework.web.filter.OncePerRequestFilter;\n\nimport javax.servlet.FilterChain;\nimport javax.servlet.ServletException;\nimport javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\nimport java.io.IOException;\n\n\n@Component\npublic class JwtAuthenticationTokenFilter extends OncePerRequestFilter {\n\n    @Autowired\n    private UserDetailsService userDetailsService;\n\n    @Autowired\n    private JwtTokenUtil jwtTokenUtil;\n\n    @Value(\"${jwt.header}\")\n    private String tokenHeader;\n\n    @Value(\"${jwt.tokenHead}\")\n    private String tokenHead;\n\n    @Override\n    protected void doFilterInternal(\n            HttpServletRequest request,\n            HttpServletResponse response,\n            FilterChain chain) throws ServletException, IOException {\n\n        String authHeader = request.getHeader(this.tokenHeader);\n        if (authHeader != null \u0026#x26;\u0026#x26; authHeader.startsWith(tokenHead)) {\n            final String authToken = authHeader.substring(tokenHead.length()); // The part after \"Bearer \"\n            String account = jwtTokenUtil.getUsernameFromToken(authToken);\n\n            logger.info(\"checking authentication \" + account);\n\n            if (account != null \u0026#x26;\u0026#x26; SecurityContextHolder.getContext().getAuthentication() == null) {\n                UserDetails userDetails = this.userDetailsService.loadUserByUsername(account);\n\n                if (jwtTokenUtil.validateToken(authToken, userDetails)) {\n                    UsernamePasswordAuthenticationToken authentication = new UsernamePasswordAuthenticationToken(\n                            userDetails, null, userDetails.getAuthorities());\n                    authentication.setDetails(new WebAuthenticationDetailsSource().buildDetails(\n                            request));\n                    logger.info(\"authenticated user \" + account + \", setting security context\");\n                    SecurityContextHolder.getContext().setAuthentication(authentication);\n                }\n            }\n        }\n\n        chain.doFilter(request, response);\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e配置Spring security\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e    httpSecurity.addFilterBefore(authenticationTokenFilterBean(),UsernamePasswordAuthenticationFilter.class);\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![jwt](https://ts1.cn.mm.bing.net/th/id/R-C.db4d0c221a205b33b6296fe6412bfe91?rik=%2fIH2gS%2fgcubddQ\u0026riu=http%3a%2f%2fordina-jworks.github.io%2fimg%2fJWT%2fjwt-logo.png\u0026ehk=jeV7Iwj5nNSP9Pl927GxkmOei90QHBPvQtKMY5A0KrM%3d\u0026risl=\u0026pid=ImgRaw\u0026r=0\u0026sres=1\u0026sresct=1)\n\n为使用前后端分离的后端管理框架做准备，使用JWT目前看来是最佳选择。\n\n## 知其然\n\n- 无状态\n- 服务化\n- 移动、web统统支持，后端提供相关接口即可\n\n## 知其所以然\n\n1. 认证：通过调用登录接口，服务器颁发一个`JWT`（JSON Web Token）给客户端。\n2. 鉴权：客户端每个请求携带`JWT`，后端使用一个请求过滤器，从请求头中解析`JWT`，为本次请求授予相关权限\n\n\u003c!--more--\u003e\n\n## 导入`io.jsonwebtoken:jjwt`\n\n`jjwt`提供了JWT主要功能的Java版本实现，目前版本是0.9.0\n\n```json\ndependencies {\n    compile 'io.jsonwebtoken:jjwt:0.9.0'\n}\n```\n\n### 生成token\n\n```java\nprivate String generateToken(Map\u003cString, Object\u003e claims) {\n        return Jwts.builder()\n                .setClaims(claims) //自定义声明\n                .setExpiration(generateExpirationDate()) //过期时间\n                .signWith(SignatureAlgorithm.HS512, secret) //加密\n                .compact();\n    }\n```\n\n### 解析token\n\n```java\nprivate Claims getClaimsFromToken(String token) {\n        Claims claims;\n        try {\n            claims = Jwts.parser()\n                    .setSigningKey(secret)\n                    .parseClaimsJws(token)\n                    .getBody();\n        } catch (Exception e) {\n            claims = null;\n        }\n        return claims;\n    }\n```\n\n\n## 鉴权过滤器\n\n```java\npackage cn.wycode.web.config.security;\n\nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.beans.factory.annotation.Value;\nimport org.springframework.security.authentication.UsernamePasswordAuthenticationToken;\nimport org.springframework.security.core.context.SecurityContextHolder;\nimport org.springframework.security.core.userdetails.UserDetails;\nimport org.springframework.security.core.userdetails.UserDetailsService;\nimport org.springframework.security.web.authentication.WebAuthenticationDetailsSource;\nimport org.springframework.stereotype.Component;\nimport org.springframework.web.filter.OncePerRequestFilter;\n\nimport javax.servlet.FilterChain;\nimport javax.servlet.ServletException;\nimport javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\nimport java.io.IOException;\n\n\n@Component\npublic class JwtAuthenticationTokenFilter extends OncePerRequestFilter {\n\n    @Autowired\n    private UserDetailsService userDetailsService;\n\n    @Autowired\n    private JwtTokenUtil jwtTokenUtil;\n\n    @Value(\"${jwt.header}\")\n    private String tokenHeader;\n\n    @Value(\"${jwt.tokenHead}\")\n    private String tokenHead;\n\n    @Override\n    protected void doFilterInternal(\n            HttpServletRequest request,\n            HttpServletResponse response,\n            FilterChain chain) throws ServletException, IOException {\n\n        String authHeader = request.getHeader(this.tokenHeader);\n        if (authHeader != null \u0026\u0026 authHeader.startsWith(tokenHead)) {\n            final String authToken = authHeader.substring(tokenHead.length()); // The part after \"Bearer \"\n            String account = jwtTokenUtil.getUsernameFromToken(authToken);\n\n            logger.info(\"checking authentication \" + account);\n\n            if (account != null \u0026\u0026 SecurityContextHolder.getContext().getAuthentication() == null) {\n                UserDetails userDetails = this.userDetailsService.loadUserByUsername(account);\n\n                if (jwtTokenUtil.validateToken(authToken, userDetails)) {\n                    UsernamePasswordAuthenticationToken authentication = new UsernamePasswordAuthenticationToken(\n                            userDetails, null, userDetails.getAuthorities());\n                    authentication.setDetails(new WebAuthenticationDetailsSource().buildDetails(\n                            request));\n                    logger.info(\"authenticated user \" + account + \", setting security context\");\n                    SecurityContextHolder.getContext().setAuthentication(authentication);\n                }\n            }\n        }\n\n        chain.doFilter(request, response);\n    }\n}\n```\n\n### 配置Spring security\n\n```java\n    httpSecurity.addFilterBefore(authenticationTokenFilterBean(),UsernamePasswordAuthenticationFilter.class);\n```\n","data":{"title":"使用JWT和Spring Security结合开发一套认证鉴权系统","date":"2017-11-17","tags":["Spring","JWT","JSON","OAuth"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![jwt](https://ts1.cn.mm.bing.net/th/id/R-C.db4d0c221a205b33b6296fe6412bfe91?rik=%2fIH2gS%2fgcubddQ\u0026riu=http%3a%2f%2fordina-jworks.github.io%2fimg%2fJWT%2fjwt-logo.png\u0026ehk=jeV7Iwj5nNSP9Pl927GxkmOei90QHBPvQtKMY5A0KrM%3d\u0026risl=\u0026pid=ImgRaw\u0026r=0\u0026sres=1\u0026sresct=1)\n\n为使用前后端分离的后端管理框架做准备，使用JWT目前看来是最佳选择。\n\n## 知其然\n\n- 无状态\n- 服务化\n- 移动、web统统支持，后端提供相关接口即可\n\n## 知其所以然\n\n1. 认证：通过调用登录接口，服务器颁发一个`JWT`（JSON Web Token）给客户端。\n2. 鉴权：客户端每个请求携带`JWT`，后端使用一个请求过滤器，从请求头中解析`JWT`，为本次请求授予相关权限\n\n"}],"cid":"oauth"},"__N_SSG":true},"page":"/blog/tag/[cid]","query":{"cid":"oauth"},"buildId":"NDkQWnMtEcy0IDQqDGEkS","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
