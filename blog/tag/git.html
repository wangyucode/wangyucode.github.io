00"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"gitignore","file":"gitignore.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件快速配置自动忽略，教程同时适用于Git和SVN。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件快速配置自动忽略，教程同时适用于Git和SVN。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e应该忽略的文件：\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e*.iml\n.gradle\n/local.properties\n/.idea\n.DS_Store\n**/build\n/captures\n.externalNativeBuild\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.iml\u003c/code\u003e是IDEA的module描述文件，和工程配置相关，在每一个module都有，需要忽略。*表示忽略所有的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.iml\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e使用gitignore\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e这是最简单的方式\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在项目根目录下创建\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件，将上面应该忽略的文件，内容复制到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e用Android Studio打开\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件时会在右上角弹出安装gitignore插件，点击安装即可，安装完成后就自动设置好忽略了，如果要添加忽略文件，只需要在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e中添加文件路径即可。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e自己设置忽略\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e右键点击相应文件，选择相应VCS操作即可。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003egitignore\u003c/code\u003e的官方模板仓库\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e此外github官方提供了一个仓库，里面包含了绝大多数平台，语言的gitignore模板\n\u003ca href=\"https://github.com/github/gitignore\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/github/gitignore\u003c/a\u003e\u003c/p\u003e\n","content":"\n\u003e 本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用`.gitignore`文件快速配置自动忽略，教程同时适用于Git和SVN。\n\n\u003c!--more--\u003e\n\n## 应该忽略的文件：\n```\n*.iml\n.gradle\n/local.properties\n/.idea\n.DS_Store\n**/build\n/captures\n.externalNativeBuild\n```\n- `.iml`是IDEA的module描述文件，和工程配置相关，在每一个module都有，需要忽略。*表示忽略所有的`.iml`\n\n### 使用gitignore\n这是最简单的方式\n\n在项目根目录下创建`.gitignore`文件，将上面应该忽略的文件，内容复制到`.gitignore`中。\n\n用Android Studio打开`.gitignore`文件时会在右上角弹出安装gitignore插件，点击安装即可，安装完成后就自动设置好忽略了，如果要添加忽略文件，只需要在`.gitignore`中添加文件路径即可。\n\n### 自己设置忽略\n\n右键点击相应文件，选择相应VCS操作即可。\n\n### `gitignore`的官方模板仓库\n\n此外github官方提供了一个仓库，里面包含了绝大多数平台，语言的gitignore模板\nhttps://github.com/github/gitignore","data":{"title":"Android Studio工程应该忽略的文件及如何使用gitignore","date":"2017-06-16","tags":["Android","Git","SVN"],"category":"Android"},"isEmpty":false,"excerpt":"\n\u003e 本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用`.gitignore`文件快速配置自动忽略，教程同时适用于Git和SVN。\n\n"},{"id":"git-error","file":"git-error.md","excerptHtml":"\u003ch1\u003e解决 invalid format \u003ca href=\"mailto:git@github.com\" class=\"text-sky-500 hover:text-sky-400\"\u003egit@github.com\u003c/a\u003e: Permission denied (publickey).\u003c/h1\u003e\n\u003cp class=\"mb-4\"\u003egit在远端pull或者push时报：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003einvalid format git@github.com: Permission denied (publickey).\n\u003c/code\u003e\u003c/pre\u003e\n","contentHtml":"\u003ch1\u003e解决 invalid format \u003ca href=\"mailto:git@github.com\" class=\"text-sky-500 hover:text-sky-400\"\u003egit@github.com\u003c/a\u003e: Permission denied (publickey).\u003c/h1\u003e\n\u003cp class=\"mb-4\"\u003egit在远端pull或者push时报：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003einvalid format git@github.com: Permission denied (publickey).\n\u003c/code\u003e\u003c/pre\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e问题场景：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003ewindows上把private key的内容复制到文本编辑器时会出现\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e根本原因：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e私钥的换行是单字符\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLF\u003c/code\u003e，但windows的默认换行符是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCRLF\u003c/code\u003e，所以导致git读取私钥报格式错误。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e解决办法：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用文本编辑器修改换行符，例如VSCODE中状态栏点击\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCRLF\u003c/code\u003e，然后切换成\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLF\u003c/code\u003e。\u003c/p\u003e\n","content":"\n# 解决 invalid format git@github.com: Permission denied (publickey).\n\ngit在远端pull或者push时报：\n\n```\ninvalid format git@github.com: Permission denied (publickey).\n```\n\n\u003c!--more--\u003e\n\n## 问题场景：\n\nwindows上把private key的内容复制到文本编辑器时会出现\n\n## 根本原因：\n\n私钥的换行是单字符`LF`，但windows的默认换行符是`CRLF`，所以导致git读取私钥报格式错误。\n\n## 解决办法：\n\n使用文本编辑器修改换行符，例如VSCODE中状态栏点击`CRLF`，然后切换成`LF`。\n","data":{"title":"从0开始开发一个评论系统","date":"2015-05-21","tags":["Git"],"category":"Backend"},"isEmpty":false,"excerpt":"\n# 解决 invalid format git@github.com: Permission denied (publickey).\n\ngit在远端pull或者push时报：\n\n```\ninvalid format git@github.com: Permission denied (publickey).\n```\n\n"}],"cid":"git"},"__N_SSG":true},"page":"/blog/tag/[cid]","query":{"cid":"git"},"buildId":"7YMuoTtyITfiinBiv1T76","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
