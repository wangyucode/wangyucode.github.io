r.loadScript(CatalystInstanceImpl.this);\n\n    synchronized (mJSCallsPendingInitLock) {\n\n      // Loading the bundle is queued on the JS thread, but may not have\n      // run yet.  It's safe to set this here, though, since any work it\n      // gates will be queued on the JS thread behind the load.\n      mAcceptCalls = true;\n\n      for (PendingJSCall function : mJSCallsPendingInit) {\n        function.call(this);\n      }\n      mJSCallsPendingInit.clear();\n      mJSBundleHasLoaded = true;\n    }\n\n    ···\n  }\n\n  private native void jniCallJSFunction(\n    String module,\n    String method,\n    NativeArray arguments);\n\n  ···\n}\n\n```\n\n这里通过`mJSBundleLoader.loadScript()`去加载js，然后把js函数构建为`PendingJSCall`放到一个列表里逐个执行，`PendingJSCall`的`call()`方法最终调用了C++层的`jniCallJSFunction()`函数。\n\n文件开头使用静态代码块`ReactBridge.staticInit()`装载了名为`reactnativejni`的so文件。\n\n至此java层源码就追完了，我们接着看c++层源码\n\n## C++层\n\n```c++\n···\n\nnamespace facebook {\nnamespace react {\n\n···\n\nvoid CatalystInstanceImpl::initializeBridge(\n    jni::alias_ref\u003cReactCallback::javaobject\u003e callback,\n    // This executor is actually a factory holder.\n    JavaScriptExecutorHolder* jseh,\n    jni::alias_ref\u003cJavaMessageQueueThread::javaobject\u003e jsQueue,\n    jni::alias_ref\u003cJavaMessageQueueThread::javaobject\u003e nativeModulesQueue,\n    jni::alias_ref\u003cjni::JCollection\u003cJavaModuleWrapper::javaobject\u003e::javaobject\u003e javaModules,\n    jni::alias_ref\u003cjni::JCollection\u003cModuleHolder::javaobject\u003e::javaobject\u003e cxxModules) {\n  // TODO mhorowitz: how to assert here?\n  // Assertions.assertCondition(mBridge == null, \"initializeBridge should be called once\");\n  moduleMessageQueue_ = std::make_shared\u003cJMessageQueueThread\u003e(nativeModulesQueue);\n\n  // This used to be:\n  //\n  // Java CatalystInstanceImpl -\u003e C++ CatalystInstanceImpl -\u003e Bridge -\u003e Bridge::Callback\n  // --weak--\u003e ReactCallback -\u003e Java CatalystInstanceImpl\n  //\n  // Now the weak ref is a global ref.  So breaking the loop depends on\n  // CatalystInstanceImpl#destroy() calling mHybridData.resetNative(), which\n  // should cause all the C++ pointers to be cleaned up (except C++\n  // CatalystInstanceImpl might be kept alive for a short time by running\n  // callbacks). This also means that all native calls need to be pre-checked\n  // to avoid NPE.\n\n  // See the comment in callJSFunction.  Once js calls switch to strings, we\n  // don't need jsModuleDescriptions any more, all the way up and down the\n  // stack.\n\n  moduleRegistry_ = std::make_shared\u003cModuleRegistry\u003e(\n    buildNativeModuleList(\n       std::weak_ptr\u003cInstance\u003e(instance_),\n       javaModules,\n       cxxModules,\n       moduleMessageQueue_));\n\n  instance_-\u003einitializeBridge(\n    folly::make_unique\u003cJInstanceCallback\u003e(\n    callback,\n    moduleMessageQueue_),\n    jseh-\u003egetExecutorFactory(),\n    folly::make_unique\u003cJMessageQueueThread\u003e(jsQueue),\n    moduleRegistry_);\n}\n\n···\n\nvoid CatalystInstanceImpl::jniCallJSFunction(std::string module, std::string method, NativeArray* arguments) {\n  // We want to share the C++ code, and on iOS, modules pass module/method\n  // names as strings all the way through to JS, and there's no way to do\n  // string -\u003e id mapping on the objc side.  So on Android, we convert the\n  // number to a string, here which gets passed as-is to JS.  There, they they\n  // used as ids if isFinite(), which handles this case, and looked up as\n  // strings otherwise.  Eventually, we'll probably want to modify the stack\n  // from the JS proxy through here to use strings, too.\n  instance_-\u003ecallJSFunction(std::move(module),\n                            std::move(method),\n                            arguments-\u003econsume());\n}\n\n···\n\n}}\n\n```\n\n在这个`CatalystInstanceImpl.cpp`中可以发现c++对于js的调用。以及非常棒的两段注释。\n\nReact Navtive 通过C++层去解释执行JS，从而达到一个比较好的性能。\n\n\n## 总结\n\n通过此文算是搞明白了，Android系统是怎么样去执行JavaScript代码的。\n但React Native又是如何将JS中的组件渲染成Android原生组件的仍然是个疑问。\n以后再研究吧...","data":{"title":"React Native源码解析（Android篇）","date":"2018-03-19","tags":["Android","React Native","React","iOS"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![React](/images/20180213_react.png)\n\n\u003e Facebook的React Native是比基于WebView更先进的跨平台解决方案。实现了只编写一次JavaScript代码即可同时生成Android及iOS应用，并且同时拥有原生控件的性能。此篇文章我将从React Native Android端源码中探究它到底是如何做到的。以及实现的思路，架构的设计等。\n\n\n"},{"id":"clipboard-react","file":"clipboard-react.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将用React实现一个跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e通常我们会遇到将手机上的文字发送到电脑上，或者反过来，或者是记录一些网址，你懂得。这时我们会用到一些云笔记之类的产品，或者干脆使用微信或QQ，它们都太重了，用起来没那么方便，还要登录注册啥的。我们使用React来开发一款手机和电脑上都能访问，并且无需注册登录的云便签应用。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将用React实现一个跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e通常我们会遇到将手机上的文字发送到电脑上，或者反过来，或者是记录一些网址，你懂得。这时我们会用到一些云笔记之类的产品，或者干脆使用微信或QQ，它们都太重了，用起来没那么方便，还要登录注册啥的。我们使用React来开发一款手机和电脑上都能访问，并且无需注册登录的云便签应用。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1.使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecreate-react-app\u003c/code\u003e创建工程\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpm install -g create-react-app\ncreate-react-app my-app\n\ncd my-app\nnpm start\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e2.编写模版\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003erender() {\n        return (\n            \u0026#x3C;div\u003e\n                \u0026#x3C;Header/\u003e\n                \u0026#x3C;div className=\"Clipboard container\"\u003e\n                    \u0026#x3C;input placeholder=\"查询码\"\n                           type=\"number\"\n                           className=\"input-query-number form-control form-group\"\n                           value={this.state.queryNumber \u003e 0 ? this.state.queryNumber : ''}\n                           disabled={this.state.isShowResult}\n                           onChange={this.handleNumberChange}/\u003e\n                    {this.state.isShowResult ? null : \u0026#x3C;button onClick={this.handleQuery}\n                                                              className=\"btn-query btn btn-primary form-control form-group\"\u003e查询\u0026#x3C;/button\u003e}\n\n                    {this.state.isShowResult ? null :\n                        \u0026#x3C;button onClick={this.handleNew}\n                                className=\"btn-new btn btn-primary form-control form-group\"\u003e新建\u0026#x3C;/button\u003e}\n\n                    {this.state.isShowResult ? \u0026#x3C;textarea onChange={this.handleTextChange} value={this.state.text}\n                                                         className=\"textarea-text form-control form-group\"/\u003e : null}\n\n                    {this.state.isShowResult ? \u0026#x3C;button onClick={this.handleSave}\n                                                       className=\"btn-save btn btn-success form-control  form-group\"\u003e保存\u0026#x3C;/button\u003e : null}\n                \u0026#x3C;/div\u003e\n            \u0026#x3C;/div\u003e\n        );\n    }\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003erender()\u003c/code\u003e返回的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJSX\u003c/code\u003e只能有一个组件，当需要多个组件时，需要用一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ediv\u003c/code\u003e包起来；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里通过state的自定义属性\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eisShowResult\u003c/code\u003e实现对控件的隐藏和显示；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e界面使用Bootstrap框架做移动端适配\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eonClick={this.handleSave}\u003c/code\u003e,\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eonChange={this.handleTextChange}\u003c/code\u003e等属性绑定函数，构造函数里还要写\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis.handleBack = this.handleBack.bind(this);\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e3.构造方法\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-JavaScript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003econstructor(props) {\n        super(props);\n        this.state = {\n            queryNumber: -1,\n            isShowResult: false,\n            text: ''\n        };\n\n        this.handleNumberChange = this.handleNumberChange.bind(this);\n        this.handleTextChange = this.handleTextChange.bind(this);\n        this.handleQuery = this.handleQuery.bind(this);\n        this.handleNew = this.handleNew.bind(this);\n        this.handleSave = this.handleSave.bind(this);\n        this.handleBack = this.handleBack.bind(this);\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estate\u003c/code\u003e中维护了页面状态，这里只需要3个参数：查询码，是否显示查询结果，剪切板文字\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e4.逻辑\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-JavaScript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e handleNumberChange(event) {\n        this.setState({queryNumber: event.target.value});\n    }\n\n    handleTextChange(event) {\n        this.setState({text: event.target.value});\n    }\n\n    handleBack(event){\n        this.setState({isShowResult: false});\n    }\n\n    handleQuery(event) {\n        if(this.state.queryNumber\u0026#x3C;=0){\n            alert('查询码不正确！');\n            return\n        }\n        let data = {\n            params: {\n                id: this.state.queryNumber\n            }\n        };\n        axios.get('https://wycode.cn/web/api/public/clipboard/query',data)\n            .then((response) =\u003e{\n                if(response.status!==200||response.data.data==null){\n                    throw '查询码不正确！'\n                }\n                this.setState({\n                    isShowResult: true,\n                    queryNumber: response.data.data.id,\n                    text: response.data.data.content\n                })\n            })\n            .catch((error) =\u003e alert(error));\n    }\n\n    handleNew(event) {\n        axios.post('https://wycode.cn/web/api/public/clipboard/create')\n            .then((response) =\u003e this.setState({\n                isShowResult: true,\n                queryNumber: response.data.data.id,\n                text: response.data.data.content\n            }))\n            .catch((error) =\u003e alert(error));\n    }\n\n    handleSave(event) {\n        let data = new FormData();\n        data.append('id',this.state.queryNumber);\n        data.append('content',this.state.text);\n        axios.post('https://wycode.cn/web/api/public/clipboard/save',data)\n            .then((response) =\u003e this.setState({\n                isShowResult: false,\n                queryNumber: response.data.data.id,\n                text: response.data.data.content\n            }))\n            .catch((error) =\u003e alert(error));\n    }\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis.setState({});\u003c/code\u003e更改页面状态\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAxios\u003c/code\u003e做网络请求。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAxios\u003c/code\u003e是一个js网络请求库。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e在网络请求返回函数里 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis\u003c/code\u003e做作用域是当前对象，会发生错误，使用箭头符=\u003e，即lambda表达式就没有问题。或者在外部创建一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis\u003c/code\u003e的引用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elet that = this;\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e至此大功告成！访问 \u003ca href=\"https://wycode.cn/clipboard/\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://wycode.cn/clipboard/\u003c/a\u003e 查看示例\n访问 \u003ca href=\"https://github.com/wangyucode/React-Learning\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/React-Learning\u003c/a\u003e 查看完整源码\u003c/p\u003e\n","content":"\n![React](/images/20180213_react.png)\n\n\u003e 这篇文章我们将用React实现一个跨平台剪切板。\n\n\n通常我们会遇到将手机上的文字发送到电脑上，或者反过来，或者是记录一些网址，你懂得。这时我们会用到一些云笔记之类的产品，或者干脆使用微信或QQ，它们都太重了，用起来没那么方便，还要登录注册啥的。我们使用React来开发一款手机和电脑上都能访问，并且无需注册登录的云便签应用。\n\n\u003c!--more--\u003e\n\n## 1.使用`create-react-app`创建工程\n\n```bash\nnpm install -g create-react-app\ncreate-react-app my-app\n\ncd my-app\nnpm start\n```\n\n## 2.编写模版\n\n```html\nrender() {\n        return (\n            \u003cdiv\u003e\n                \u003cHeader/\u003e\n                \u003cdiv className=\"Clipboard container\"\u003e\n                    \u003cinput placeholder=\"查询码\"\n                           type=\"number\"\n                           className=\"input-query-number form-control form-group\"\n                           value={this.state.queryNumber \u003e 0 ? this.state.queryNumber : ''}\n                           disabled={this.state.isShowResult}\n                           onChange={this.handleNumberChange}/\u003e\n                    {this.state.isShowResult ? null : \u003cbutton onClick={this.handleQuery}\n                                                              className=\"btn-query btn btn-primary form-control form-group\"\u003e查询\u003c/button\u003e}\n\n                    {this.state.isShowResult ? null :\n                        \u003cbutton onClick={this.handleNew}\n                                className=\"btn-new btn btn-primary form-control form-group\"\u003e新建\u003c/button\u003e}\n\n                    {this.state.isShowResult ? \u003ctextarea onChange={this.handleTextChange} value={this.state.text}\n                                                         className=\"textarea-text form-control form-group\"/\u003e : null}\n\n                    {this.state.isShowResult ? \u003cbutton onClick={this.handleSave}\n                                                       className=\"btn-save btn btn-success form-control  form-group\"\u003e保存\u003c/button\u003e : null}\n                \u003c/div\u003e\n            \u003c/div\u003e\n        );\n    }\n\n```\n\n- `render()`返回的`JSX`只能有一个组件，当需要多个组件时，需要用一个`div`包起来；\n- 这里通过state的自定义属性`isShowResult`实现对控件的隐藏和显示；\n- 界面使用Bootstrap框架做移动端适配\n- 通过`onClick={this.handleSave}`,`onChange={this.handleTextChange}`等属性绑定函数，构造函数里还要写`this.handleBack = this.handleBack.bind(this);`\n\n## 3.构造方法\n\n```JavaScript\nconstructor(props) {\n        super(props);\n        this.state = {\n            queryNumber: -1,\n            isShowResult: false,\n            text: ''\n        };\n\n        this.handleNumberChange = this.handleNumberChange.bind(this);\n        this.handleTextChange = this.handleTextChange.bind(this);\n        this.handleQuery = this.handleQuery.bind(this);\n        this.handleNew = this.handleNew.bind(this);\n        this.handleSave = this.handleSave.bind(this);\n        this.handleBack = this.handleBack.bind(this);\n    }\n```\n\n- `state`中维护了页面状态，这里只需要3个参数：查询码，是否显示查询结果，剪切板文字\n\n## 4.逻辑\n\n```JavaScript\n handleNumberChange(event) {\n        this.setState({queryNumber: event.target.value});\n    }\n\n    handleTextChange(event) {\n        this.setState({text: event.target.value});\n    }\n\n    handleBack(event){\n        this.setState({isShowResult: false});\n    }\n\n    handleQuery(event) {\n        if(this.state.queryNumber\u003c=0){\n            alert('查询码不正确！');\n            return\n        }\n        let data = {\n            params: {\n                id: this.state.queryNumber\n            }\n        };\n        axios.get('https://wycode.cn/web/api/public/clipboard/query',data)\n            .then((response) =\u003e{\n                if(response.status!==200||response.data.data==null){\n                    throw '查询码不正确！'\n                }\n                this.setState({\n                    isShowResult: true,\n                    queryNumber: response.data.data.id,\n                    text: response.data.data.content\n                })\n            })\n            .catch((error) =\u003e alert(error));\n    }\n\n    handleNew(event) {\n        axios.post('https://wycode.cn/web/api/public/clipboard/create')\n            .then((response) =\u003e this.setState({\n                isShowResult: true,\n                queryNumber: response.data.data.id,\n                text: response.data.data.content\n            }))\n            .catch((error) =\u003e alert(error));\n    }\n\n    handleSave(event) {\n        let data = new FormData();\n        data.append('id',this.state.queryNumber);\n        data.append('content',this.state.text);\n        axios.post('https://wycode.cn/web/api/public/clipboard/save',data)\n            .then((response) =\u003e this.setState({\n                isShowResult: false,\n                queryNumber: response.data.data.id,\n                text: response.data.data.content\n            }))\n            .catch((error) =\u003e alert(error));\n    }\n\n```\n\n- 使用`this.setState({});`更改页面状态\n- 这里使用`Axios`做网络请求。`Axios`是一个js网络请求库。\n- 在网络请求返回函数里 `this`做作用域是当前对象，会发生错误，使用箭头符=\u003e，即lambda表达式就没有问题。或者在外部创建一个`this`的引用`let that = this;`\n\n\n至此大功告成！访问 https://wycode.cn/clipboard/ 查看示例\n访问 https://github.com/wangyucode/React-Learning 查看完整源码","data":{"title":"用React做一个跨平台剪切板","date":"2018-02-13","tags":["React","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![React](/images/20180213_react.png)\n\n\u003e 这篇文章我们将用React实现一个跨平台剪切板。\n\n\n通常我们会遇到将手机上的文字发送到电脑上，或者反过来，或者是记录一些网址，你懂得。这时我们会用到一些云笔记之类的产品，或者干脆使用微信或QQ，它们都太重了，用起来没那么方便，还要登录注册啥的。我们使用React来开发一款手机和电脑上都能访问，并且无需注册登录的云便签应用。\n\n"},{"id":"clipboard-wechatapp","file":"clipboard-wechatapp.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_clipboard.jpg\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将开发一个微信小程序版的跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e书接上文，我们已经用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_clipboard.jpg\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这篇文章我们将开发一个微信小程序版的跨平台剪切板。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e书接上文，我们已经用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1.app.json\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\n{\n  \"pages\": [\n    \"pages/index/index\"\n  ],\n  \"window\": {\n    \"backgroundTextStyle\": \"light\",\n    \"navigationBarBackgroundColor\": \"#379392\",\n    \"navigationBarTitleText\": \"跨平台剪切板\",\n    \"navigationBarTextStyle\": \"white\"\n  },\n  \"debug\": true\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapp.json\u003c/code\u003e中描述了小程序相关的全局配置信息，所有的页面需要配置在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epage\u003c/code\u003e属性中。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里还能配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etabbar\u003c/code\u003e，为了跨平台剪切板的简洁，我去掉了tab，把它做成了一个单页面的极简APP\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e2.模板\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\n\u0026#x3C;!--index.wxml--\u003e\n\u0026#x3C;view class=\"container\"\u003e\n  \u0026#x3C;input type='number' placeholder=\"查询码\" value='{{queryNumber\u003e0?queryNumber:\"\"}}' bindinput='bindInput' disabled='{{isShowResult}}'\u003e\u0026#x3C;/input\u003e\n  \u0026#x3C;button type='primary' wx:if=\"{{!isShowResult}}\" bindtap='query'\u003e查询\u0026#x3C;/button\u003e\n  \u0026#x3C;button wx:if=\"{{!isShowResult}}\" bindtap='create'\u003e新建\u0026#x3C;/button\u003e\n  \u0026#x3C;textarea wx:if='{{isShowResult}}' value='{{text}}' bindinput='bindInputText'\u003e\u0026#x3C;/textarea\u003e\n  \u0026#x3C;button type= 'primary' wx:if = \"{{isShowResult}}\" bindtap='save'\u003e保存\u0026#x3C;/button\u003e\n  \u0026#x3C;button wx:if = \"{{isShowResult}}\" bindtap='back'\u003e返回\u0026#x3C;/button\u003e\n\u0026#x3C;/view\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.wxml\u003c/code\u003e后缀的是小程序的布局（模板）文件。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e属性没什么好解释的，看一下就懂了。参考React版的教程就知道每个属性的详细用途。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e3.样式表\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-css px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e/**index.wxss**/\n\ninput {\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n}\n\nbutton {\n  margin-top: 24rpx;\n  width: 100%;\n}\n\ntextarea{\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n  margin-top: 24rpx;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e就是传统的CSS层叠样式表\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里rpx是dpi无关的单位，保证不同分辨率的相同观感\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e4.逻辑\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e//index.js\n//获取应用实例\nconst app = getApp()\n\nPage({\n  data: {\n    queryNumber: -1,\n    isShowResult: false,\n    text: ''\n  },\n\n  onLoad: function () {\n\n  },\n\n  bindInput: function (e) {\n    this.setData({\n      queryNumber: e.detail.value\n    })\n  },\n\n  bindInputText: function (e) {\n    this.setData({\n      text: e.detail.value\n    })\n  },\n\n  query: function () {\n    if (this.data.queryNumber \u0026#x3C;= 0) {\n      wx.showToast({\n        title: '查询码不正确！',\n        icon: 'none'\n      });\n      return\n    }\n\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/query',\n      data: { 'id': this.data.queryNumber },\n      success: function (res) {\n        if (!res.data.success || res.data.data == null) {\n          wx.showToast({\n            title: '查询码不正确！',\n            icon: 'none'\n          });\n        } else {\n          that.setData({\n            isShowResult: true,\n            queryNumber: res.data.data.id,\n            text: res.data.data.content\n          });\n        }\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n\n  },\n\n  create: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/create',\n      method: 'POST',\n      success: function (res) {\n\n        that.setData({\n          isShowResult: true,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n  },\n\n  save: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/save',\n      method: 'POST',\n      data:{\n        id: that.data.queryNumber,\n        content: that.data.text\n      },\n      header: {\n        'content-type': 'application/x-www-form-urlencoded'\n      },\n      success: function (res) {\n\n        that.setData({\n          isShowResult: false,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n        wx.showToast({\n          title: '保存成功！',\n          icon: 'success'\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete: function () {\n        wx.hideLoading();\n      }\n    });\n  },\n\n  back: function () {\n    this.setData({\n      isShowResult: false\n    })\n  }\n\n})\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e小程序的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edata\u003c/code\u003e，就是React的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estate\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e小程序通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis.setData()\u003c/code\u003e刷新页面状态，如同React的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ethis.setState()\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.request()\u003c/code\u003e做http请求\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.showToast()\u003c/code\u003e显示一个提示\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.showLoading()\u003c/code\u003e显示Loading\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里发现一个小程序的bug，在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewx.hideLoading()\u003c/code\u003e会将Toast也消失掉。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e至此大功告成！打开微信扫一扫文章开头的小程序码即可使用。\n访问 \u003ca href=\"https://github.com/wangyucode/Clipboard\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/Clipboard\u003c/a\u003e 查看完整源码\u003c/p\u003e\n","content":"\n![React](/images/20180213_clipboard.jpg)\n\n\u003e 这篇文章我们将开发一个微信小程序版的跨平台剪切板。\n\n\n书接上文，我们已经用`React`开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\n\n如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\n\n\u003c!--more--\u003e\n\n## 1.app.json\n\n```json\n\n{\n  \"pages\": [\n    \"pages/index/index\"\n  ],\n  \"window\": {\n    \"backgroundTextStyle\": \"light\",\n    \"navigationBarBackgroundColor\": \"#379392\",\n    \"navigationBarTitleText\": \"跨平台剪切板\",\n    \"navigationBarTextStyle\": \"white\"\n  },\n  \"debug\": true\n}\n```\n\n- `app.json`中描述了小程序相关的全局配置信息，所有的页面需要配置在`page`属性中。\n- 这里还能配置`tabbar`，为了跨平台剪切板的简洁，我去掉了tab，把它做成了一个单页面的极简APP\n\n## 2.模板\n\n```html\n\n\u003c!--index.wxml--\u003e\n\u003cview class=\"container\"\u003e\n  \u003cinput type='number' placeholder=\"查询码\" value='{{queryNumber\u003e0?queryNumber:\"\"}}' bindinput='bindInput' disabled='{{isShowResult}}'\u003e\u003c/input\u003e\n  \u003cbutton type='primary' wx:if=\"{{!isShowResult}}\" bindtap='query'\u003e查询\u003c/button\u003e\n  \u003cbutton wx:if=\"{{!isShowResult}}\" bindtap='create'\u003e新建\u003c/button\u003e\n  \u003ctextarea wx:if='{{isShowResult}}' value='{{text}}' bindinput='bindInputText'\u003e\u003c/textarea\u003e\n  \u003cbutton type= 'primary' wx:if = \"{{isShowResult}}\" bindtap='save'\u003e保存\u003c/button\u003e\n  \u003cbutton wx:if = \"{{isShowResult}}\" bindtap='back'\u003e返回\u003c/button\u003e\n\u003c/view\u003e\n```\n\n- `.wxml`后缀的是小程序的布局（模板）文件。\n- 属性没什么好解释的，看一下就懂了。参考React版的教程就知道每个属性的详细用途。\n\n## 3.样式表\n\n```css\n/**index.wxss**/\n\ninput {\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n}\n\nbutton {\n  margin-top: 24rpx;\n  width: 100%;\n}\n\ntextarea{\n  border: 1px solid;\n  border-radius: 10rpx;\n  border-color: #ddd;\n  padding: 10rpx;\n  width: 96%;\n  margin-top: 24rpx;\n}\n```\n\n- 就是传统的CSS层叠样式表\n- 这里rpx是dpi无关的单位，保证不同分辨率的相同观感\n\n\n## 4.逻辑\n\n```javascript\n//index.js\n//获取应用实例\nconst app = getApp()\n\nPage({\n  data: {\n    queryNumber: -1,\n    isShowResult: false,\n    text: ''\n  },\n\n  onLoad: function () {\n\n  },\n\n  bindInput: function (e) {\n    this.setData({\n      queryNumber: e.detail.value\n    })\n  },\n\n  bindInputText: function (e) {\n    this.setData({\n      text: e.detail.value\n    })\n  },\n\n  query: function () {\n    if (this.data.queryNumber \u003c= 0) {\n      wx.showToast({\n        title: '查询码不正确！',\n        icon: 'none'\n      });\n      return\n    }\n\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/query',\n      data: { 'id': this.data.queryNumber },\n      success: function (res) {\n        if (!res.data.success || res.data.data == null) {\n          wx.showToast({\n            title: '查询码不正确！',\n            icon: 'none'\n          });\n        } else {\n          that.setData({\n            isShowResult: true,\n            queryNumber: res.data.data.id,\n            text: res.data.data.content\n          });\n        }\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n\n  },\n\n  create: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/create',\n      method: 'POST',\n      success: function (res) {\n\n        that.setData({\n          isShowResult: true,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete:function(){\n        wx.hideLoading();\n      }\n    });\n  },\n\n  save: function () {\n    var that = this;\n    wx.showLoading({\n      title: '请稍后...',\n    })\n    wx.request({\n      url: 'https://wycode.cn/web/api/public/clipboard/save',\n      method: 'POST',\n      data:{\n        id: that.data.queryNumber,\n        content: that.data.text\n      },\n      header: {\n        'content-type': 'application/x-www-form-urlencoded'\n      },\n      success: function (res) {\n\n        that.setData({\n          isShowResult: false,\n          queryNumber: res.data.data.id,\n          text: res.data.data.content\n        });\n        wx.showToast({\n          title: '保存成功！',\n          icon: 'success'\n        });\n\n      },\n      fail: function (res) {\n        wx.showToast({\n          title: res.errMsg,\n          icon: 'none'\n        });\n      },\n      complete: function () {\n        wx.hideLoading();\n      }\n    });\n  },\n\n  back: function () {\n    this.setData({\n      isShowResult: false\n    })\n  }\n\n})\n\n```\n\n- 小程序的`data`，就是React的`state`\n- 小程序通过`this.setData()`刷新页面状态，如同React的`this.setState()`\n- 使用`wx.request()`做http请求\n- 使用`wx.showToast()`显示一个提示\n- 使用`wx.showLoading()`显示Loading\n- 这里发现一个小程序的bug，在`wx.hideLoading()`会将Toast也消失掉。\n\n\n至此大功告成！打开微信扫一扫文章开头的小程序码即可使用。\n访问 https://github.com/wangyucode/Clipboard 查看完整源码","data":{"title":"微信小程序入门","date":"2018-02-13","tags":["Wechat","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![React](/images/20180213_clipboard.jpg)\n\n\u003e 这篇文章我们将开发一个微信小程序版的跨平台剪切板。\n\n\n书接上文，我们已经用`React`开发了一个跨平台剪切板。开发微信小程序的时候，我发现微信小程序正是借鉴了React框架的核心。很多React中的代码，稍微修改就可以用在微信小程序中。\n\n如何申请账号，创建项目在官方文档中已经有详细说明，我们这里重点解释一下代码。找到微信小程序背后的核心技术。\n\n"},{"id":"react","file":"react.md","excerptHtml":"","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eReact框架的整体思路是将DOM元素彻底改为由JS代码渲染，通过组件(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e)的层层嵌套，最终由\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactDOM.render()\u003c/code\u003e渲染到页面上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003eReact框架的核心概念：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e元素(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eElement\u003c/code\u003e) Recat认为元素是不可变的，创建后不能修改。React使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJSX\u003c/code\u003e技术将HTML代码直接作为常量使用。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e组件(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e) 组件是对元素的封装。拥有自身的生命周期函数。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e属性(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eProps\u003c/code\u003e) 属性可以看作常量，用于构建特定的组件。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e状态(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eState\u003c/code\u003e) 组件通过状态维护自身变化。组件通过调用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esetState()\u003c/code\u003e方法重新渲染。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eReact的理念是采取\u003ca href=\"https://en.wikipedia.org/wiki/Single_responsibility_principle\" title=\"Wiki\" class=\"text-sky-500 hover:text-sky-400\"\u003e单一责任原则\u003c/a\u003e，自顶向下设计，一层层的拆分成只做一件事的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在做一个实际的项目时，采取先使用假数据画页面的方式，这个过程中只需要关心数据模型和页面。而不去关心逻辑交互。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eComponent\u003c/code\u003e为什么要分成\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eProps\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eState\u003c/code\u003e就显而易见了，做页面时只关心\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eProps\u003c/code\u003e，做交互时只关心\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eState\u003c/code\u003e。\u003c/p\u003e\n","content":"\n![React](/images/20180213_react.png)\n\n\u003e React框架的整体思路是将DOM元素彻底改为由JS代码渲染，通过组件(`Component`)的层层嵌套，最终由`ReactDOM.render()`渲染到页面上。\n\nReact框架的核心概念：\n\n- 元素(`Element`) Recat认为元素是不可变的，创建后不能修改。React使用`JSX`技术将HTML代码直接作为常量使用。\n- 组件(`Component`) 组件是对元素的封装。拥有自身的生命周期函数。\n- 属性(`Props`) 属性可以看作常量，用于构建特定的组件。\n- 状态(`State`) 组件通过状态维护自身变化。组件通过调用`setState()`方法重新渲染。\n\nReact的理念是采取[单一责任原则](https://en.wikipedia.org/wiki/Single_responsibility_principle \"Wiki\")，自顶向下设计，一层层的拆分成只做一件事的`Component`。\n\n在做一个实际的项目时，采取先使用假数据画页面的方式，这个过程中只需要关心数据模型和页面。而不去关心逻辑交互。\n\n此时`Component`为什么要分成`Props`和`State`就显而易见了，做页面时只关心`Props`，做交互时只关心`State`。","data":{"title":"React框架原理的思考","date":"2018-01-06","tags":["React","JavaScript"],"category":"Frontend"},"isEmpty":false,"excerpt":""},{"id":"angular","file":"angular.md","excerptHtml":"","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eAngular框架的整体思路，很像Spring这样的后台框架。一层层的分解、解耦，天下框架莫不如此。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003eAngular有3个重要概念：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e模块(Module)\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e组件(Component)\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e路由(Router)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eAngular通过将大型项目分割成一个个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e模块\u003c/code\u003e，松耦合，便于扩展和维护。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e所谓\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e组件\u003c/code\u003e，就是一个MVC块，每个模块会有很多组件，组件代表了一个页面，可以嵌套，因此可以更加细分下去，通过元数据做双向绑定。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e所谓\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e路由\u003c/code\u003e，就是一个分发器，不同的路径加载不同的模块或组件即可。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e所谓\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e元数据\u003c/code\u003e，就是Java注解。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eSpring那套，控制反转（IOC）依赖注入（DI）也被引入进来。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e将业务逻辑封装到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eService\u003c/code\u003e里，然后注入到各个组件中使用。业务代码就彻底被隔离到Service里了，不会侵入框架整体设计。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e关于Webpack：Webpack在打包Web工程时，可以找到资源之间的引用，最小化压缩合并CSS，JavaScript文件。\u003c/p\u003e\n","content":"\n\u003e Angular框架的整体思路，很像Spring这样的后台框架。一层层的分解、解耦，天下框架莫不如此。\n\nAngular有3个重要概念：\n\n- 模块(Module)\n- 组件(Component)\n- 路由(Router)\n\nAngular通过将大型项目分割成一个个`模块`，松耦合，便于扩展和维护。\n\n所谓`组件`，就是一个MVC块，每个模块会有很多组件，组件代表了一个页面，可以嵌套，因此可以更加细分下去，通过元数据做双向绑定。\n\n所谓`路由`，就是一个分发器，不同的路径加载不同的模块或组件即可。\n\n所谓`元数据`，就是Java注解。\n\nSpring那套，控制反转（IOC）依赖注入（DI）也被引入进来。\n\n将业务逻辑封装到`Service`里，然后注入到各个组件中使用。业务代码就彻底被隔离到Service里了，不会侵入框架整体设计。\n\n关于Webpack：Webpack在打包Web工程时，可以找到资源之间的引用，最小化压缩合并CSS，JavaScript文件。","data":{"title":"Angular框架原理的思考","date":"2017-12-28","tags":["Angular","TypeScript","HTML"],"category":"Frontend"},"isEmpty":false,"excerpt":""},{"id":"vue","file":"vue.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e选择往往比努力更加重要。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e准备做一个前后端分离的Web管理系统。\u003c/p\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e选择往往比努力更加重要。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e准备做一个前后端分离的Web管理系统。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eGetting Started\u003c/h2\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e从\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003evue-cli\u003c/code\u003e开始\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e# 全局安装 vue-cli\n$ npm install --global vue-cli\n# 创建一个基于 webpack 模板的新项目\n$ vue init webpack my-project\n# 安装依赖，走你\n$ cd my-project\n$ npm install\n$ npm run dev\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\u003e选择往往比努力更加重要。\n\n准备做一个前后端分离的Web管理系统。\n\n\u003c!--more--\u003e\n\n## Getting Started\n\n### 从`vue-cli`开始\n\n```bash\n# 全局安装 vue-cli\n$ npm install --global vue-cli\n# 创建一个基于 webpack 模板的新项目\n$ vue init webpack my-project\n# 安装依赖，走你\n$ cd my-project\n$ npm install\n$ npm run dev\n```\n","data":{"title":"使用Vue搭建一个后台管理系统","date":"2017-11-16","tags":["Vue"],"category":"Frontend"},"isEmpty":false,"excerpt":"\u003e选择往往比努力更加重要。\n\n准备做一个前后端分离的Web管理系统。\n\n"},{"id":"nodejs","file":"nodejs.md","excerptHtml":"","contentHtml":"\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eLinux平台\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用cURL:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ curl https://raw.github.com/creationix/nvm/master/install.sh | sh\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e使用Wget:(Ubuntu默认没有安装cURL,推荐使用Wget)\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ wget -qO- https://raw.github.com/creationix/nvm/master/install.sh | sh\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e安装完成后，重启终端并执行下列命令即可安装 Node.js。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ nvm install stable\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eWindows平台\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e建议使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.msi\u003c/code\u003e安装程序进行安装。推荐勾选\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAdd to PATH\u003c/code\u003e可以自动添加到环境变量，方便全局使用相关命令。\u003c/p\u003e\n","content":"\n## Linux平台\n\n使用cURL:\n\n```bash\n$ curl https://raw.github.com/creationix/nvm/master/install.sh | sh\n```\n\n使用Wget:(Ubuntu默认没有安装cURL,推荐使用Wget)\n\n```bash\n$ wget -qO- https://raw.github.com/creationix/nvm/master/install.sh | sh\n```\n\n安装完成后，重启终端并执行下列命令即可安装 Node.js。\n\n```bash\n$ nvm install stable\n```\n\n## Windows平台\n\n建议使用`.msi`安装程序进行安装。推荐勾选`Add to PATH`可以自动添加到环境变量，方便全局使用相关命令。\n","data":{"title":"安装Node.js和npm的最佳实践","date":"2017-11-14","tags":["NodeJS","JavaScript","Linux","Ubuntu"],"category":"Frontend"},"isEmpty":false,"excerpt":""},{"id":"SEO","file":"SEO.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍SEO相关知识和实践\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍SEO相关知识和实践\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e如何对搜索引擎的爬虫友好引导是关键\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003erobots.txt\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这个文件告诉爬虫，哪里可以去，哪里不能去。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eSitemap\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e直接给爬虫一张地图，不用费劲乱爬了\u003c/p\u003e\n","content":"\n\u003e 本文介绍SEO相关知识和实践\n\n\u003c!--more--\u003e\n如何对搜索引擎的爬虫友好引导是关键\n\n## robots.txt\n这个文件告诉爬虫，哪里可以去，哪里不能去。\n\n## Sitemap\n直接给爬虫一张地图，不用费劲乱爬了\n","data":{"title":"SEO：优化网站排名","date":"2017-06-19","tags":["SEO"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n\u003e 本文介绍SEO相关知识和实践\n\n"},{"id":"search","file":"search.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何利用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehexo-generator-search\u003c/code\u003e插件为Hexo博客添加本地全文搜索\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e原理\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehexo-generator-search\u003c/code\u003e实际上是根据网页内容生成了一个数据文件，格式是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eXML\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJSON\u003c/code\u003e。然后通过JS代码去匹配这个文件的内容，从而达到搜索的目的。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e最终效果\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170616_search_01.png\" alt=\"最终效果\" title=\"最终效果\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何利用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehexo-generator-search\u003c/code\u003e插件为Hexo博客添加本地全文搜索\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e原理\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehexo-generator-search\u003c/code\u003e实际上是根据网页内容生成了一个数据文件，格式是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eXML\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJSON\u003c/code\u003e。然后通过JS代码去匹配这个文件的内容，从而达到搜索的目的。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e最终效果\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170616_search_01.png\" alt=\"最终效果\" title=\"最终效果\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e步骤\u003c/h2\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e安装 hexo-generator-search\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ npm install hexo-generator-search --save\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e配置\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e_config.yml\u003c/code\u003e中添加\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-yaml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003esearch:\n  path: search.xml\n  field: post\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e使用\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e再次生成博客，就会发现\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epublic\u003c/code\u003e根目录下多了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esearch.xml\u003c/code\u003e文件。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e写一个搜索框：\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBootstrap\u003c/code\u003e框架的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodal\u003c/code\u003e应该是极好的。\n修改Hexo主题，（对此不了解的可以查看我的自定义Hexo主题的相关内容），在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elayout.ejs\u003c/code\u003e中添加一个modal：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;%- partial('_partial/search-modal') %\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e根据Bootstrap文档，modal需要尽量作为 body 标签的直接子元素。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esearch-modal.ejs\u003c/code\u003e的代码如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;div class=\"modal fade\" id=\"searchModal\"\u003e\n    \u0026#x3C;div class=\"modal-dialog modal-lg\" role=\"document\"\u003e\n        \u0026#x3C;div class=\"modal-content\"\u003e\n            \u0026#x3C;div class=\"modal-body\"\u003e\n                \u0026#x3C;i class=\"fa fa-search\" aria-hidden=\"true\"\u003e\u0026#x3C;/i\u003e 搜索\n                \u0026#x3C;input type=\"text\" class=\"form-control\" id=\"searchInput\" placeholder=\"Keyword\"\u003e\n                \u0026#x3C;div class=\"search-content\" id=\"searchResult\"\u003e\u0026#x3C;/div\u003e\n            \u0026#x3C;/div\u003e\n        \u0026#x3C;/div\u003e\n    \u0026#x3C;/div\u003e\n\u0026#x3C;/div\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e链接加上\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edata-toggle=\"modal\"  href=\"#searchModal\"\u003c/code\u003e属性即可实现modal的展开\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e搜索代码：\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e// A local search script with the help of [hexo-generator-search](https://github.com/PaicHyperionDev/hexo-generator-search)\n// Copyright (C) 2015\n// Joseph Pan \u0026#x3C;http://github.com/wzpan\u003e\n// Shuhao Mao \u0026#x3C;http://github.com/maoshuhao\u003e\n// This library is free software; you can redistribute it and/or modify\n// it under the terms of the GNU Lesser General Public License as\n// published by the Free Software Foundation; either version 2.1 of the\n// License, or (at your option) any later version.\n//\n// This library is distributed in the hope that it will be useful, but\n// WITHOUT ANY WARRANTY; without even the implied warranty of\n// MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.  See the GNU\n// Lesser General Public License for more details.\n//\n// You should have received a copy of the GNU Lesser General Public\n// License along with this library; if not, write to the Free Software\n// Foundation, Inc., 51 Franklin Street, Fifth Floor, Boston, MA\n// 02110-1301 USA\n//\n\nvar searchFunc = function(path, search_id, content_id) {\n    'use strict';\n    $.ajax({\n        url: path,\n        dataType: \"xml\",\n        success: function( xmlResponse ) {\n            // get the contents from search data\n            var datas = $( \"entry\", xmlResponse ).map(function() {\n                return {\n                    title: $( \"title\", this ).text(),\n                    content: $(\"content\",this).text(),\n                    url: $( \"url\" , this).text()\n                };\n            }).get();\n\n            var $input = document.getElementById(search_id);\n            var $resultContent = document.getElementById(content_id);\n\n            $input.addEventListener('input', function(){\n                var str='\u0026#x3C;ul class=\\\"search-result-list\\\"\u003e';\n                var keywords = this.value.trim().toLowerCase().split(/[\\s\\-]+/);\n                $resultContent.innerHTML = \"\";\n                if (this.value.trim().length \u0026#x3C;= 0) {\n                    return;\n                }\n                // perform local searching\n                datas.forEach(function(data) {\n                    var isMatch = true;\n                    var content_index = [];\n                    if (!data.title || data.title.trim() === '') {\n                        data.title = \"Untitled\";\n                    }\n                    var data_title = data.title.trim().toLowerCase();\n                    var data_content = data.content.trim().replace(/\u0026#x3C;[^\u003e]+\u003e/g,\"\").toLowerCase();\n                    var data_url = data.url;\n                    var index_title = -1;\n                    var index_content = -1;\n                    var first_occur = -1;\n                    // only match artiles with not empty contents\n                    if (data_content !== '') {\n                        keywords.forEach(function(keyword, i) {\n                            index_title = data_title.indexOf(keyword);\n                            index_content = data_content.indexOf(keyword);\n\n                            if( index_title \u0026#x3C; 0 \u0026#x26;\u0026#x26; index_content \u0026#x3C; 0 ){\n                                isMatch = false;\n                            } else {\n                                if (index_content \u0026#x3C; 0) {\n                                    index_content = 0;\n                                }\n                                if (i == 0) {\n                                    first_occur = index_content;\n                                }\n                                // content_index.push({index_content:index_content, keyword_len:keyword_len});\n                            }\n                        });\n                    } else {\n                        isMatch = false;\n                    }\n                    // show search results\n                    if (isMatch) {\n                        str += \"\u0026#x3C;li\u003e\u0026#x3C;a href='\"+ data_url +\"' class='search-result-title'\u003e\"+ data_title +\"\u0026#x3C;/a\u003e\";\n                        var content = data.content.trim().replace(/\u0026#x3C;[^\u003e]+\u003e/g,\"\");\n                        if (first_occur \u003e= 0) {\n                            // cut out 100 characters\n                            var start = first_occur - 20;\n                            var end = first_occur + 80;\n\n                            if(start \u0026#x3C; 0){\n                                start = 0;\n                            }\n\n                            if(start == 0){\n                                end = 100;\n                            }\n\n                            if(end \u003e content.length){\n                                end = content.length;\n                            }\n\n                            var match_content = content.substr(start, end);\n\n                            // highlight all keywords\n                            keywords.forEach(function(keyword){\n                                var regS = new RegExp(keyword, \"gi\");\n                                match_content = match_content.replace(regS, \"\u0026#x3C;em class=\\\"search-keyword\\\"\u003e\"+keyword+\"\u0026#x3C;/em\u003e\");\n                            });\n\n                            str += \"\u0026#x3C;p class=\\\"search-result\\\"\u003e\" + match_content +\"...\u0026#x3C;/p\u003e\"\n                        }\n                        str += \"\u0026#x3C;/li\u003e\";\n                    }\n                });\n                str += \"\u0026#x3C;/ul\u003e\";\n                $resultContent.innerHTML = str;\n            });\n        }\n    });\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e添加链接\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;%- js('js/search') %\u003e\n\u0026#x3C;script\u003esearchFunc('\u0026#x3C;%= url_for('search.xml') %\u003e', 'searchInput', 'searchResult');\u0026#x3C;/script\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e高亮关键词\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003ekeywords.forEach(function(keyword){\n                            var regS = new RegExp(keyword, \"gi\");\n                            data_title = data_title.replace(regS, \"\u0026#x3C;em class=\\\"search-keyword\\\"\u003e\"+keyword+\"\u0026#x3C;/em\u003e\");\n                        });\n\u003c/code\u003e\u003c/pre\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-css px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e.search-keyword{\n    color: #c7254e;\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e 本文介绍如何利用`hexo-generator-search`插件为Hexo博客添加本地全文搜索\n\n## 原理\n`hexo-generator-search`实际上是根据网页内容生成了一个数据文件，格式是`XML`或者`JSON`。然后通过JS代码去匹配这个文件的内容，从而达到搜索的目的。\n\n## 最终效果\n![最终效果](/images/20170616_search_01.png \"最终效果\")\n\u003c!--more--\u003e\n## 步骤\n\n### 安装 hexo-generator-search\n\n```bash\n$ npm install hexo-generator-search --save\n```\n### 配置\n\n在`_config.yml`中添加\n\n```yaml\nsearch:\n  path: search.xml\n  field: post\n```\n### 使用\n再次生成博客，就会发现`public`根目录下多了`search.xml`文件。\n\n### 写一个搜索框：\n使用`Bootstrap`框架的`modal`应该是极好的。\n修改Hexo主题，（对此不了解的可以查看我的自定义Hexo主题的相关内容），在`layout.ejs`中添加一个modal：\n\n```html\n\u003c%- partial('_partial/search-modal') %\u003e\n```\n\n\u003e 根据Bootstrap文档，modal需要尽量作为 body 标签的直接子元素。\n\n`search-modal.ejs`的代码如下：\n```html\n\u003cdiv class=\"modal fade\" id=\"searchModal\"\u003e\n    \u003cdiv class=\"modal-dialog modal-lg\" role=\"document\"\u003e\n        \u003cdiv class=\"modal-content\"\u003e\n            \u003cdiv class=\"modal-body\"\u003e\n                \u003ci class=\"fa fa-search\" aria-hidden=\"true\"\u003e\u003c/i\u003e 搜索\n                \u003cinput type=\"text\" class=\"form-control\" id=\"searchInput\" placeholder=\"Keyword\"\u003e\n                \u003cdiv class=\"search-content\" id=\"searchResult\"\u003e\u003c/div\u003e\n            \u003c/div\u003e\n        \u003c/div\u003e\n    \u003c/div\u003e\n\u003c/div\u003e\n```\n\n\u003e 链接加上`data-toggle=\"modal\"  href=\"#searchModal\"`属性即可实现modal的展开\n\n### 搜索代码：\n```javascript\n// A local search script with the help of [hexo-generator-search](https://github.com/PaicHyperionDev/hexo-generator-search)\n// Copyright (C) 2015\n// Joseph Pan \u003chttp://github.com/wzpan\u003e\n// Shuhao Mao \u003chttp://github.com/maoshuhao\u003e\n// This library is free software; you can redistribute it and/or modify\n// it under the terms of the GNU Lesser General Public License as\n// published by the Free Software Foundation; either version 2.1 of the\n// License, or (at your option) any later version.\n//\n// This library is distributed in the hope that it will be useful, but\n// WITHOUT ANY WARRANTY; without even the implied warranty of\n// MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.  See the GNU\n// Lesser General Public License for more details.\n//\n// You should have received a copy of the GNU Lesser General Public\n// License along with this library; if not, write to the Free Software\n// Foundation, Inc., 51 Franklin Street, Fifth Floor, Boston, MA\n// 02110-1301 USA\n//\n\nvar searchFunc = function(path, search_id, content_id) {\n    'use strict';\n    $.ajax({\n        url: path,\n        dataType: \"xml\",\n        success: function( xmlResponse ) {\n            // get the contents from search data\n            var datas = $( \"entry\", xmlResponse ).map(function() {\n                return {\n                    title: $( \"title\", this ).text(),\n                    content: $(\"content\",this).text(),\n                    url: $( \"url\" , this).text()\n                };\n            }).get();\n\n            var $input = document.getElementById(search_id);\n            var $resultContent = document.getElementById(content_id);\n\n            $input.addEventListener('input', function(){\n                var str='\u003cul class=\\\"search-result-list\\\"\u003e';\n                var keywords = this.value.trim().toLowerCase().split(/[\\s\\-]+/);\n                $resultContent.innerHTML = \"\";\n                if (this.value.trim().length \u003c= 0) {\n                    return;\n                }\n                // perform local searching\n                datas.forEach(function(data) {\n                    var isMatch = true;\n                    var content_index = [];\n                    if (!data.title || data.title.trim() === '') {\n                        data.title = \"Untitled\";\n                    }\n                    var data_title = data.title.trim().toLowerCase();\n                    var data_content = data.content.trim().replace(/\u003c[^\u003e]+\u003e/g,\"\").toLowerCase();\n                    var data_url = data.url;\n                    var index_title = -1;\n                    var index_content = -1;\n                    var first_occur = -1;\n                    // only match artiles with not empty contents\n                    if (data_content !== '') {\n                        keywords.forEach(function(keyword, i) {\n                            index_title = data_title.indexOf(keyword);\n                            index_content = data_content.indexOf(keyword);\n\n                            if( index_title \u003c 0 \u0026\u0026 index_content \u003c 0 ){\n                                isMatch = false;\n                            } else {\n                                if (index_content \u003c 0) {\n                                    index_content = 0;\n                                }\n                                if (i == 0) {\n                                    first_occur = index_content;\n                                }\n                                // content_index.push({index_content:index_content, keyword_len:keyword_len});\n                            }\n                        });\n                    } else {\n                        isMatch = false;\n                    }\n                    // show search results\n                    if (isMatch) {\n                        str += \"\u003cli\u003e\u003ca href='\"+ data_url +\"' class='search-result-title'\u003e\"+ data_title +\"\u003c/a\u003e\";\n                        var content = data.content.trim().replace(/\u003c[^\u003e]+\u003e/g,\"\");\n                        if (first_occur \u003e= 0) {\n                            // cut out 100 characters\n                            var start = first_occur - 20;\n                            var end = first_occur + 80;\n\n                            if(start \u003c 0){\n                                start = 0;\n                            }\n\n                            if(start == 0){\n                                end = 100;\n                            }\n\n                            if(end \u003e content.length){\n                                end = content.length;\n                            }\n\n                            var match_content = content.substr(start, end);\n\n                            // highlight all keywords\n                            keywords.forEach(function(keyword){\n                                var regS = new RegExp(keyword, \"gi\");\n                                match_content = match_content.replace(regS, \"\u003cem class=\\\"search-keyword\\\"\u003e\"+keyword+\"\u003c/em\u003e\");\n                            });\n\n                            str += \"\u003cp class=\\\"search-result\\\"\u003e\" + match_content +\"...\u003c/p\u003e\"\n                        }\n                        str += \"\u003c/li\u003e\";\n                    }\n                });\n                str += \"\u003c/ul\u003e\";\n                $resultContent.innerHTML = str;\n            });\n        }\n    });\n}\n```\n\n### 添加链接\n```html\n\u003c%- js('js/search') %\u003e\n\u003cscript\u003esearchFunc('\u003c%= url_for('search.xml') %\u003e', 'searchInput', 'searchResult');\u003c/script\u003e\n```\n\n### 高亮关键词\n```javascript\nkeywords.forEach(function(keyword){\n                            var regS = new RegExp(keyword, \"gi\");\n                            data_title = data_title.replace(regS, \"\u003cem class=\\\"search-keyword\\\"\u003e\"+keyword+\"\u003c/em\u003e\");\n                        });\n```\n```css\n.search-keyword{\n    color: #c7254e;\n}\n```\n","data":{"title":"为Hexo博客添加全文搜索","date":"2017-06-15","tags":["XML","jQuery","Ajax","Hexo","Bootstrap"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n\u003e 本文介绍如何利用`hexo-generator-search`插件为Hexo博客添加本地全文搜索\n\n## 原理\n`hexo-generator-search`实际上是根据网页内容生成了一个数据文件，格式是`XML`或者`JSON`。然后通过JS代码去匹配这个文件的内容，从而达到搜索的目的。\n\n## 最终效果\n![最终效果](/images/20170616_search_01.png \"最终效果\")\n"},{"id":"theme","file":"theme.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e刚刚完成了Hexo博客主题的自定义，现在总结如下，让我们一起来看看如何打造一款属于自己的Hexo主题。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e如何创建一个新主题以及如何切换主题在官网的\u003ca href=\"https://hexo.io/zh-cn/docs/themes.html\" title=\"doc\" class=\"text-sky-500 hover:text-sky-400\"\u003edoc\u003c/a\u003e中有说明，这里我们只讨论如何打造一个新的属于自己的模版。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e方法\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eHexo使用了\u003cstrong\u003e模版\u003c/strong\u003e进行渲染的方式来实现网页风格的自定义。其核心是一种嵌套、引用的风格实现对网页内容模块化管理。所以我也采取从外向里，抽丝剥茧，剥洋葱式的一层层展开来看其中的原理及如何去自定义。此文需要基本的HTML知识。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e刚刚完成了Hexo博客主题的自定义，现在总结如下，让我们一起来看看如何打造一款属于自己的Hexo主题。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e如何创建一个新主题以及如何切换主题在官网的\u003ca href=\"https://hexo.io/zh-cn/docs/themes.html\" title=\"doc\" class=\"text-sky-500 hover:text-sky-400\"\u003edoc\u003c/a\u003e中有说明，这里我们只讨论如何打造一个新的属于自己的模版。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e方法\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eHexo使用了\u003cstrong\u003e模版\u003c/strong\u003e进行渲染的方式来实现网页风格的自定义。其核心是一种嵌套、引用的风格实现对网页内容模块化管理。所以我也采取从外向里，抽丝剥茧，剥洋葱式的一层层展开来看其中的原理及如何去自定义。此文需要基本的HTML知识。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e模版文件\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e所有的模版文件都放置在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elayout\u003c/code\u003e文件夹中，所有用到的资源（CSS，JavaScript，图片等）都放置在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esource\u003c/code\u003e文件夹中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e模版的根入口文件是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elayout\u003c/code\u003e下的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elayout.ejs\u003c/code\u003e文件。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这里的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.ejs\u003c/code\u003e是模版采用的引擎，除了EJS，还有Haml和Jade，我大概看过Jade，比EJS更简洁，EJS更像HTML，我自己选择了EJS，原因是无需新学规则，还有就是官方提供的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elandscape\u003c/code\u003e也是采用的EJS，我的模版就是根据官方的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elandscape\u003c/code\u003e修改而来。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003elayout.ejs\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e我们先来看看这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elayout.ejs\u003c/code\u003e的内容：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;!DOCTYPE html\u003e\n\u0026#x3C;html\u003e\n\u0026#x3C;%- partial('_partial/head') %\u003e\n\u0026#x3C;body\u003e\n\u0026#x3C;%- partial('_partial/wycode-nav') %\u003e\n\u0026#x3C;%- partial('_partial/blog-nav') %\u003e\n\u0026#x3C;div class=\"container\"\u003e\n    \u0026#x3C;div class=\"row\"\u003e\n        \u0026#x3C;div class=\"content\"\u003e\u0026#x3C;%- body %\u003e\u0026#x3C;/div\u003e\n    \u0026#x3C;/div\u003e\n\u0026#x3C;/div\u003e\n\u0026#x3C;%- partial('_partial/footer', null, {cache: !config.relative_link}) %\u003e\n\u0026#x3C;%- partial('_partial/after-footer') %\u003e\n\u0026#x3C;/body\u003e\n\u0026#x3C;/html\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e可以看到以上就是典型的HTML文件框架。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e重点来了：\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e这里唯一的区别就是多了很多\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;%- %\u003e\u003c/code\u003e，凡是在这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;%- %\u003e\u003c/code\u003e里面的部分就是EJS模版的代码部分，而\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epartial('_partial/head')\u003c/code\u003e的意思就是引用了一个模块，位置是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e_partial\u003c/code\u003e文件夹的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehead.ejs\u003c/code\u003e。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003ehead.ejs\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e然后我们看看这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehead.ejs\u003c/code\u003e的内容：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-html px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;head\u003e\n    \u0026#x3C;meta charset=\"utf-8\"\u003e\n    \u0026#x3C;meta http-equiv=\"X-UA-Compatible\" content=\"IE=edge\"\u003e\n    \u0026#x3C;%\n    var title = page.title;\n\n    if (is_archive()) {\n        title = __('archive_a');\n\n        if (is_month()) {\n            title += ': ' + page.year + '/' + page.month;\n        } else if (is_year()) {\n            title += ': ' + page.year;\n        }\n    } else if (is_category()) {\n        title = __('category') + ': ' + page.category;\n    } else if (is_tag()) {\n        title = __('tag') + ': ' + page.tag;\n    }\n    %\u003e\n    \u0026#x3C;title\u003e\n        \u0026#x3C;% if (title){ %\u003e\n        \u0026#x3C;%= title %\u003e |\n        \u0026#x3C;% } %\u003e\n        \u0026#x3C;%= config.title %\u003e\u0026#x3C;/title\u003e\n    \u0026#x3C;meta name=\"viewport\" content=\"width=device-width, initial-scale=1, maximum-scale=1\"\u003e\n    \u0026#x3C;% if (theme.rss){ %\u003e\n    \u0026#x3C;link rel=\"alternate\" href=\"\u0026#x3C;%- theme.rss %\u003e\" title=\"\u0026#x3C;%= config.title %\u003e\" type=\"application/atom+xml\"\u003e\n    \u0026#x3C;% } %\u003e\n    \u0026#x3C;% if (theme.favicon){ %\u003e\n    \u0026#x3C;link rel=\"icon\" href=\"\u0026#x3C;%- url_for(theme.favicon) %\u003e\"\u003e\n    \u0026#x3C;% } %\u003e\n    \u0026#x3C;!-- Bootstrap --\u003e\n    \u0026#x3C;%- css('flat/dist/css/vendor/bootstrap.mi
