ion-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"http3","file":"http3.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://quic.nginx.org/static/img/quic.svg\" alt=\"quic\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e基于UDP的HTTP/3协议规范\u003ca href=\"https://datatracker.ietf.org/doc/html/rfc9114\" class=\"text-sky-500 hover:text-sky-400\"\u003eRFC 9114\u003c/a\u003e于2022年6月发表。而HTTP/2协议规范\u003ca href=\"https://httpwg.org/specs/rfc7540.html\" class=\"text-sky-500 hover:text-sky-400\"\u003eRFC 7540\u003c/a\u003e早在2015年5月发表。但是仍然有很多网站在使用更加古老的HTTP1.1。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eHTTP/2通过多路复用（multiplexing）和头部压缩，能够有效降低延迟。同时还提供了不同于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebScoket\u003c/code\u003e协议的服务端推送的新方法。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eHTTP3则使用基于UDP的QUIC协议，从根本上解决头部阻塞的问题，特别适用于移动网络不稳定情况下的网络效率改善。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本文介绍HTTP2，HTTP3协议的新特性，以及通过NGINX升级到HTTP2和HTTP3的方法。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://quic.nginx.org/static/img/quic.svg\" alt=\"quic\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e基于UDP的HTTP/3协议规范\u003ca href=\"https://datatracker.ietf.org/doc/html/rfc9114\" class=\"text-sky-500 hover:text-sky-400\"\u003eRFC 9114\u003c/a\u003e于2022年6月发表。而HTTP/2协议规范\u003ca href=\"https://httpwg.org/specs/rfc7540.html\" class=\"text-sky-500 hover:text-sky-400\"\u003eRFC 7540\u003c/a\u003e早在2015年5月发表。但是仍然有很多网站在使用更加古老的HTTP1.1。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eHTTP/2通过多路复用（multiplexing）和头部压缩，能够有效降低延迟。同时还提供了不同于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebScoket\u003c/code\u003e协议的服务端推送的新方法。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eHTTP3则使用基于UDP的QUIC协议，从根本上解决头部阻塞的问题，特别适用于移动网络不稳定情况下的网络效率改善。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本文介绍HTTP2，HTTP3协议的新特性，以及通过NGINX升级到HTTP2和HTTP3的方法。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e回顾HTTP/1.0和HTTP/1.1\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eHTTP/1.0每发送一个请求，就要建立一个新的TCP连接。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eHTTP/1.1加入了请求流水线（request pipelining），和持久连接。但多数情况下仍然会对不同的请求建立多个连接。由于TCP的特性，阻塞控制无法在多个连接之间共享，且浏览器限制了同服务器的总连接数。所以网络效率仍然较低。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e此外HTTP/1.1和1.0都使用明文，用空格和回车进行字段分割，这导致了解析的复杂性和对不同变体的容忍度提升。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHTTP2\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eHTTP/2引入了二进制帧和多路复用来改善延迟，但它没有修改传输层（TCP），由于TCP严格按照顺序发送数据包，当数据包发生丢失时，TCP协议会重发数据包，所以在丢包率较高的情况下多路复用的机制反而会变慢。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHTTP3\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eHTTP/3使用基于UDP的QUIC协议，拥有HTTP2所有的优良特性，并且由于UDP天生无需握手，且在网络环境发生变化时无需重新建立连接，例如切换移动网络到WIFI。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e升级到HTTP2\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eNGINX默认使用HTTP/1.1, 我们只需简单的添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttp2\u003c/code\u003e到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elisten\u003c/code\u003e指令即可无痛升级到HTTP2：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-nginx px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e...\nserver {\n    listen 443 ssl http2;\n    ...\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e升级到HTTP3\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e截止到今天（2022年10月1日），NGINX对HTTP3的支持还在开发中（nginx-quic分支），官方还没有发布基于此分支的docker镜像，这里我使用民间编译的镜像\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edasskelett/nginx-quic\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e修改配置:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-nginx px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e...\nserver {\n    listen 443 ssl http2;\n    listen 443 http3 reuseport;\n    ...\n    ssl_early_data on;\n\n    add_header Alt-Svc 'h3=\":443\"; ma=86400';\n    add_header QUIC-Status $http3;\n    ...\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e至此本站已全面支持HTTP3。\u003c/p\u003e\n","content":"\n![quic](https://quic.nginx.org/static/img/quic.svg)\n\n基于UDP的HTTP/3协议规范[RFC 9114](https://datatracker.ietf.org/doc/html/rfc9114)于2022年6月发表。而HTTP/2协议规范[RFC 7540](https://httpwg.org/specs/rfc7540.html)早在2015年5月发表。但是仍然有很多网站在使用更加古老的HTTP1.1。\n\nHTTP/2通过多路复用（multiplexing）和头部压缩，能够有效降低延迟。同时还提供了不同于`WebScoket`协议的服务端推送的新方法。\n\nHTTP3则使用基于UDP的QUIC协议，从根本上解决头部阻塞的问题，特别适用于移动网络不稳定情况下的网络效率改善。\n\n本文介绍HTTP2，HTTP3协议的新特性，以及通过NGINX升级到HTTP2和HTTP3的方法。\n\n\u003c!--more--\u003e\n\n## 回顾HTTP/1.0和HTTP/1.1\n\n- HTTP/1.0每发送一个请求，就要建立一个新的TCP连接。\n- HTTP/1.1加入了请求流水线（request pipelining），和持久连接。但多数情况下仍然会对不同的请求建立多个连接。由于TCP的特性，阻塞控制无法在多个连接之间共享，且浏览器限制了同服务器的总连接数。所以网络效率仍然较低。\n- 此外HTTP/1.1和1.0都使用明文，用空格和回车进行字段分割，这导致了解析的复杂性和对不同变体的容忍度提升。\n\n## HTTP2\n\nHTTP/2引入了二进制帧和多路复用来改善延迟，但它没有修改传输层（TCP），由于TCP严格按照顺序发送数据包，当数据包发生丢失时，TCP协议会重发数据包，所以在丢包率较高的情况下多路复用的机制反而会变慢。\n\n## HTTP3\n\nHTTP/3使用基于UDP的QUIC协议，拥有HTTP2所有的优良特性，并且由于UDP天生无需握手，且在网络环境发生变化时无需重新建立连接，例如切换移动网络到WIFI。\n\n## 升级到HTTP2\n\nNGINX默认使用HTTP/1.1, 我们只需简单的添加`http2`到`listen`指令即可无痛升级到HTTP2：\n\n```nginx\n...\nserver {\n    listen 443 ssl http2;\n    ...\n}\n```\n## 升级到HTTP3\n\n截止到今天（2022年10月1日），NGINX对HTTP3的支持还在开发中（nginx-quic分支），官方还没有发布基于此分支的docker镜像，这里我使用民间编译的镜像`dasskelett/nginx-quic`。\n\n修改配置:\n\n```nginx\n...\nserver {\n    listen 443 ssl http2;\n    listen 443 http3 reuseport;\n    ...\n    ssl_early_data on;\n\n    add_header Alt-Svc 'h3=\":443\"; ma=86400';\n    add_header QUIC-Status $http3;\n    ...\n}\n```\n\n至此本站已全面支持HTTP3。\n\n\n\n\n","data":{"title":"升级到HTTP3","date":"2022-09-29","tags":["HTTP","NGINX"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![quic](https://quic.nginx.org/static/img/quic.svg)\n\n基于UDP的HTTP/3协议规范[RFC 9114](https://datatracker.ietf.org/doc/html/rfc9114)于2022年6月发表。而HTTP/2协议规范[RFC 7540](https://httpwg.org/specs/rfc7540.html)早在2015年5月发表。但是仍然有很多网站在使用更加古老的HTTP1.1。\n\nHTTP/2通过多路复用（multiplexing）和头部压缩，能够有效降低延迟。同时还提供了不同于`WebScoket`协议的服务端推送的新方法。\n\nHTTP3则使用基于UDP的QUIC协议，从根本上解决头部阻塞的问题，特别适用于移动网络不稳定情况下的网络效率改善。\n\n本文介绍HTTP2，HTTP3协议的新特性，以及通过NGINX升级到HTTP2和HTTP3的方法。\n\n"},{"id":"esm-node-ts","file":"esm-node-ts.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.w3cschool.cn/attachments/image/20170808/1502178281486445.png\" alt=\"nodejs\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eJavaScript的模块化方案经历了长时间的发展，最终于2015年在ES6实现了语言层面的标准化，即esModule（以下简称esm）, 现在JS社区开始拥抱esm，很多npm包仅采用esm发布。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而NodeJS一直依赖采用CommonJS的模块化方案，在最近发布的版本中也开始支持ems, 由于巨大的历史包袱，NodeJS并没有抛弃CommonJS，所以在NodeJS中实际支持两种模块化方式，esm和CommonJS.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此外，现在很多前端工程使用TypeScript开发，而TS的模块解析方式也需要进行一些配置，在这3者结合的过程中有很多坑，本文介绍将三者完美结合的最佳实践。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.w3cschool.cn/attachments/image/20170808/1502178281486445.png\" alt=\"nodejs\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eJavaScript的模块化方案经历了长时间的发展，最终于2015年在ES6实现了语言层面的标准化，即esModule（以下简称esm）, 现在JS社区开始拥抱esm，很多npm包仅采用esm发布。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而NodeJS一直依赖采用CommonJS的模块化方案，在最近发布的版本中也开始支持ems, 由于巨大的历史包袱，NodeJS并没有抛弃CommonJS，所以在NodeJS中实际支持两种模块化方式，esm和CommonJS.\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此外，现在很多前端工程使用TypeScript开发，而TS的模块解析方式也需要进行一些配置，在这3者结合的过程中有很多坑，本文介绍将三者完美结合的最佳实践。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e同时引入CommonJS包和ESM包\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e为了测试我们同时引入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elodash\u003c/code\u003e的CommonJS版本和ESM版本\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpm i lodash-es lodash\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e在NodeJS中，模块作者除非显示指定使用esm方式加载模块：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.mjs\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epackage.json\u003c/code\u003e中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etype\u003c/code\u003e字段指定为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodule\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e--input-type\u003c/code\u003e标记\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e否则默认加载方式为CommonJS。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而上面的例子中\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003elodash-es\u003c/code\u003e的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epackage.json\u003c/code\u003e中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etype\u003c/code\u003e就是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodule\u003c/code\u003e。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用CommonJS包\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e创建一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.js\u003c/code\u003e文件：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003econst _ = require('lodash');\nconsole.log(_.VERSION); // print '4.17.21'\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e以上是CommonJS的写法，很习以为常，能够正确打印。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用esm包\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e创建一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eesm.js\u003c/code\u003e文件：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-javascript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eimport _ from 'lodash-es';\nconsole.log(_.VERSION);\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e第1个坑出现了, 报语法错误：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSyntaxError: Cannot use import statement outside a module\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e说无法在模块外部使用import语句，一旦一个文件有顶级(top-level)的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eimport\u003c/code\u003e或\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eexport\u003c/code\u003e，它会被当作一个模块，否则是一个脚本文件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e所以我们需要把这个文件变成esm，两种方式：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e重命名文件，修改扩展名为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.mjs\u003c/code\u003e;\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epackage.json\u003c/code\u003e中添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\"type\": \"module\"\u003c/code\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e但如果采用选项2，第2个坑就会出现了, 回去运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.js\u003c/code\u003e报错：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReferenceError: require is not defined in ES module scope, you can use import instead\u003c/code\u003e。\n说\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003erequire\u003c/code\u003e在esm中不支持，此时可以重命名\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.js\u003c/code\u003e后缀为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.cjs\u003c/code\u003e，告诉模块加载器，此文件以CommonJS加载。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e引入Typescript\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e安装TS：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpm i typescript ts-node -D\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003ets-node 可以在nodejs中直接运行ts文件而无需编译\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e然后将刚才的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eesm.js\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.cjs\u003c/code\u003e扩展名改为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.ts\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ets-node\u003c/code\u003e命令直接运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eesm.ts\u003c/code\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpx ts-node esm.ts\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e第3个坑出现了，扩展名不支持：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTypeError [ERR_UNKNOWN_FILE_EXTENSION]: Unknown file extension \".ts\" for xxx\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这是因为esm的默认扩展名是js而不是ts，此时我们需要：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ets-node --esm\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\"ts-node\": {\"esm\": true}\u003c/code\u003e到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etsconfig.json\u003c/code\u003e。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e如果采用方案1，第4个坑出现了，无法找到模块：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eerror TS7016: Could not find a declaration file for module 'lodash-es'\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时添加配置: \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\"esModuleInterop\": true\u003c/code\u003e到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etsconfig.json\u003c/code\u003e的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecompilerOptions\u003c/code\u003e中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e添加完成后第5个坑出现了，引用错误：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReferenceError: exports is not defined in ES module scope\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时添加配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodule\": \"ESNext\"\u003c/code\u003e到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etsconfig.json\u003c/code\u003e的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecompilerOptions\u003c/code\u003e中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e添加完成后第6个坑出现了，找不到模块：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReferenceError: exports is not defined in ES module scope\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时配置模块的解析方式为最新的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\"moduleResolution\": \"Node16\"\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e到此终于可以成功运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eesm.ts\u003c/code\u003e了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e返回去运行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecommon-js.ts\u003c/code\u003e:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpx ts-node common-js.ts\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e第7个坑出现了，它把我们的CommonJS模块当esm了：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReferenceError: require is not defined in ES module scope, you can use import instead\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此时处于鱼和熊掌不可兼得，因为我们设置了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emodule\": \"ESNext\"\u003c/code\u003e， 所以ts的编译结果会添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eexport {}\u003c/code\u003e，所以如果要在纯esm的工程中仍然要使用CommonJS，则使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.cjs\u003c/code\u003e作为扩展名即可。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e完整的代码在这里：\u003ca href=\"https://github.com/wangyucode/esm-node-ts\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/esm-node-ts\u003c/a\u003e\u003c/p\u003e\n","content":"\n![nodejs](https://www.w3cschool.cn/attachments/image/20170808/1502178281486445.png)\n\nJavaScript的模块化方案经历了长时间的发展，最终于2015年在ES6实现了语言层面的标准化，即esModule（以下简称esm）, 现在JS社区开始拥抱esm，很多npm包仅采用esm发布。\n\n而NodeJS一直依赖采用CommonJS的模块化方案，在最近发布的版本中也开始支持ems, 由于巨大的历史包袱，NodeJS并没有抛弃CommonJS，所以在NodeJS中实际支持两种模块化方式，esm和CommonJS.\n\n此外，现在很多前端工程使用TypeScript开发，而TS的模块解析方式也需要进行一些配置，在这3者结合的过程中有很多坑，本文介绍将三者完美结合的最佳实践。\n\n\u003c!--more--\u003e\n\n## 同时引入CommonJS包和ESM包\n\n为了测试我们同时引入`lodash`的CommonJS版本和ESM版本\n\n```bash\nnpm i lodash-es lodash\n```\n\n在NodeJS中，模块作者除非显示指定使用esm方式加载模块：\n\n- 使用`.mjs`\n- 在`package.json`中的`type`字段指定为`module`\n- 使用`--input-type`标记\n\n否则默认加载方式为CommonJS。\n\n而上面的例子中`lodash-es`的`package.json`中的`type`就是`module`。\n\n## 使用CommonJS包\n\n创建一个`common-js.js`文件：\n\n```javascript\nconst _ = require('lodash');\nconsole.log(_.VERSION); // print '4.17.21'\n```\n\n以上是CommonJS的写法，很习以为常，能够正确打印。\n\n## 使用esm包\n\n创建一个`esm.js`文件：\n\n```javascript\nimport _ from 'lodash-es';\nconsole.log(_.VERSION);\n```\n\n第1个坑出现了, 报语法错误：`SyntaxError: Cannot use import statement outside a module`\n\n说无法在模块外部使用import语句，一旦一个文件有顶级(top-level)的`import`或`export`，它会被当作一个模块，否则是一个脚本文件。\n\n所以我们需要把这个文件变成esm，两种方式：\n\n1. 重命名文件，修改扩展名为`.mjs`;\n2. 在`package.json`中添加`\"type\": \"module\"`\n\n但如果采用选项2，第2个坑就会出现了, 回去运行`common-js.js`报错：`ReferenceError: require is not defined in ES module scope, you can use import instead`。\n说`require`在esm中不支持，此时可以重命名`common-js.js`后缀为`.cjs`，告诉模块加载器，此文件以CommonJS加载。\n\n## 引入Typescript\n\n安装TS：\n\n```bash\nnpm i typescript ts-node -D\n```\n\n\u003e ts-node 可以在nodejs中直接运行ts文件而无需编译\n\n然后将刚才的`esm.js`和`common-js.cjs`扩展名改为`.ts`\n\n使用`ts-node`命令直接运行`esm.ts`\n\n```bash\nnpx ts-node esm.ts\n```\n\n第3个坑出现了，扩展名不支持：`TypeError [ERR_UNKNOWN_FILE_EXTENSION]: Unknown file extension \".ts\" for xxx`\n\n这是因为esm的默认扩展名是js而不是ts，此时我们需要：\n\n1. `ts-node --esm`\n2. 添加 `\"ts-node\": {\"esm\": true}`到`tsconfig.json`。\n\n如果采用方案1，第4个坑出现了，无法找到模块：`error TS7016: Could not find a declaration file for module 'lodash-es'`。\n\n此时添加配置: `\"esModuleInterop\": true`到`tsconfig.json`的`compilerOptions`中。\n\n添加完成后第5个坑出现了，引用错误：`ReferenceError: exports is not defined in ES module scope`\n\n此时添加配置`module\": \"ESNext\"`到`tsconfig.json`的`compilerOptions`中。\n\n添加完成后第6个坑出现了，找不到模块：`ReferenceError: exports is not defined in ES module scope`\n\n此时配置模块的解析方式为最新的`\"moduleResolution\": \"Node16\"`。\n\n到此终于可以成功运行`esm.ts`了。\n\n返回去运行`common-js.ts`:\n\n```bash\nnpx ts-node common-js.ts\n```\n\n第7个坑出现了，它把我们的CommonJS模块当esm了：`ReferenceError: require is not defined in ES module scope, you can use import instead`\n\n此时处于鱼和熊掌不可兼得，因为我们设置了`module\": \"ESNext\"`， 所以ts的编译结果会添加`export {}`，所以如果要在纯esm的工程中仍然要使用CommonJS，则使用`.cjs`作为扩展名即可。\n\n完整的代码在这里：https://github.com/wangyucode/esm-node-ts","data":{"title":"esModule + NodeJS + TypeScript 的工程配置","date":"2022-09-22","tags":["JavaScript","TypeScript","NodeJS"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![nodejs](https://www.w3cschool.cn/attachments/image/20170808/1502178281486445.png)\n\nJavaScript的模块化方案经历了长时间的发展，最终于2015年在ES6实现了语言层面的标准化，即esModule（以下简称esm）, 现在JS社区开始拥抱esm，很多npm包仅采用esm发布。\n\n而NodeJS一直依赖采用CommonJS的模块化方案，在最近发布的版本中也开始支持ems, 由于巨大的历史包袱，NodeJS并没有抛弃CommonJS，所以在NodeJS中实际支持两种模块化方式，esm和CommonJS.\n\n此外，现在很多前端工程使用TypeScript开发，而TS的模块解析方式也需要进行一些配置，在这3者结合的过程中有很多坑，本文介绍将三者完美结合的最佳实践。\n\n"},{"id":"flutter-web","file":"flutter-web.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://flutter.dev/assets/flutter-lockup-4cb0ee072ab312e59784d9fbf4fb7ad42688a7fdaea1270ccf6bbf4f34b7e03f.svg\" alt=\"flutter\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在Google IO 2019开发者大会上，Flutter和Dart发表了超越移动端，为iOS，Android，ChromeOS和Web构建应用的主题演讲。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e时至今日，想必Flutter已经可以开发Web应用了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我们知道Flutter是使用叫\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSkia\u003c/code\u003e的C++库来渲染UI，但是Web上是使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDom\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCanvas\u003c/code\u003e，以及\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebGL\u003c/code\u003e，那么Flutter到底会采用哪种方式呢？\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章带你对Flutter for web做一个了解和实践：\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://flutter.dev/assets/flutter-lockup-4cb0ee072ab312e59784d9fbf4fb7ad42688a7fdaea1270ccf6bbf4f34b7e03f.svg\" alt=\"flutter\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在Google IO 2019开发者大会上，Flutter和Dart发表了超越移动端，为iOS，Android，ChromeOS和Web构建应用的主题演讲。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e时至今日，想必Flutter已经可以开发Web应用了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我们知道Flutter是使用叫\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSkia\u003c/code\u003e的C++库来渲染UI，但是Web上是使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDom\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCanvas\u003c/code\u003e，以及\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebGL\u003c/code\u003e，那么Flutter到底会采用哪种方式呢？\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章带你对Flutter for web做一个了解和实践：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e架构设计\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://flutter.dev/images/Dart-framework-v-browser-framework.png\" alt=\"Architecture\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e原理\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e目前联合了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDOM\u003c/code\u003e, \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCanvas\u003c/code\u003e, \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCSS\u003c/code\u003e来进行渲染，将\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDart\u003c/code\u003e代码编译为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJavaScript\u003c/code\u003e来执行，这跟\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTypescript\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eKotlin\u003c/code\u003e都是一样的。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e目前进度\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e截至今天（2019年7月25日）Flutter for Web还处于技术预览的阶段，还很不稳定。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e开发团队创建了一个\u003ca href=\"https://github.com/flutter/flutter_web\" class=\"text-sky-500 hover:text-sky-400\"\u003eFrok\u003c/a\u003e，但最终这些代码将会被merge到\u003ca href=\"https://github.com/flutter/flutter\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/flutter/flutter\u003c/a\u003e中。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e环境安装\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003cdel\u003e安装\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDart\u003c/code\u003e\u003c/del\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e安装\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFlutter\u003c/code\u003e，Flutter 1.5 以上就可以支持以web作为target平台，我这里安装的是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e1.7.8\u003c/code\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e安装\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewebdev\u003c/code\u003e，通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eflutter pub global active webdev\u003c/code\u003e全局安装\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewebdev\u003c/code\u003e工具包。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e为了能够全局执行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewebdev\u003c/code\u003e命令，建议将\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eflutter/.pub-cache/bin\u003c/code\u003e目录添加到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003epath\u003c/code\u003e环境变量中。\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHello World\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e克隆\u003ca href=\"https://github.com/flutter/flutter_web\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/flutter/flutter_web\u003c/a\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$cd examples/hello_world/\n$flutter pub upgrade\n$webdev serve\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e打开\u003ca href=\"http://localhost:8080\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttp://localhost:8080\u003c/a\u003e，你就能看到红色的HelloWorld\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e经过测试，在Edge浏览器会报错，目前只在Chrome中支持比较好。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e新建一个项目\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e虽然未来的目标是用同一套代码来生成移动端和Web端，但目前的开发使用了不同的命名空间，所以还无法同时进行移动端和web端开发。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e新建的Flutter工程最简单的方式是使用IDE\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eVScode： 使用View-\u003eCommand Paltte-\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFlutter: New Web Project\u003c/code\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eIntelliJ：新建Dart项目，选择\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFlutter for web\u003c/code\u003e模板。\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n![flutter](https://flutter.dev/assets/flutter-lockup-4cb0ee072ab312e59784d9fbf4fb7ad42688a7fdaea1270ccf6bbf4f34b7e03f.svg)\n\n在Google IO 2019开发者大会上，Flutter和Dart发表了超越移动端，为iOS，Android，ChromeOS和Web构建应用的主题演讲。\n\n时至今日，想必Flutter已经可以开发Web应用了。\n\n我们知道Flutter是使用叫`Skia`的C++库来渲染UI，但是Web上是使用`Dom`，`Canvas`，以及`WebGL`，那么Flutter到底会采用哪种方式呢？\n\n这篇文章带你对Flutter for web做一个了解和实践：\n\u003c!--more--\u003e\n\n## 架构设计\n\n![Architecture](https://flutter.dev/images/Dart-framework-v-browser-framework.png)\n\n## 原理\n\n目前联合了`DOM`, `Canvas`, `CSS`来进行渲染，将`Dart`代码编译为`JavaScript`来执行，这跟`Typescript`，`Kotlin`都是一样的。\n\n## 目前进度\n\n截至今天（2019年7月25日）Flutter for Web还处于技术预览的阶段，还很不稳定。\n\n开发团队创建了一个[Frok](https://github.com/flutter/flutter_web)，但最终这些代码将会被merge到\u003chttps://github.com/flutter/flutter\u003e中。\n\n## 环境安装\n\n1. ~~安装`Dart`~~\n2. 安装`Flutter`，Flutter 1.5 以上就可以支持以web作为target平台，我这里安装的是`1.7.8`。\n3. 安装`webdev`，通过`flutter pub global active webdev`全局安装`webdev`工具包。\n4. 为了能够全局执行`webdev`命令，建议将`flutter/.pub-cache/bin`目录添加到`path`环境变量中。\n\n## Hello World\n\n克隆\u003chttps://github.com/flutter/flutter_web\u003e\n\n```bash\n$cd examples/hello_world/\n$flutter pub upgrade\n$webdev serve\n```\n\n打开\u003chttp://localhost:8080\u003e，你就能看到红色的HelloWorld\n\n经过测试，在Edge浏览器会报错，目前只在Chrome中支持比较好。\n\n## 新建一个项目\n\n虽然未来的目标是用同一套代码来生成移动端和Web端，但目前的开发使用了不同的命名空间，所以还无法同时进行移动端和web端开发。\n\n新建的Flutter工程最简单的方式是使用IDE\n\n- VScode： 使用View-\u003eCommand Paltte-\u003e`Flutter: New Web Project`。\n- IntelliJ：新建Dart项目，选择`Flutter for web`模板。","data":{"title":"使用Flutter开发Web应用","date":"2019-07-25","tags":["Flutter","Dart"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![flutter](https://flutter.dev/assets/flutter-lockup-4cb0ee072ab312e59784d9fbf4fb7ad42688a7fdaea1270ccf6bbf4f34b7e03f.svg)\n\n在Google IO 2019开发者大会上，Flutter和Dart发表了超越移动端，为iOS，Android，ChromeOS和Web构建应用的主题演讲。\n\n时至今日，想必Flutter已经可以开发Web应用了。\n\n我们知道Flutter是使用叫`Skia`的C++库来渲染UI，但是Web上是使用`Dom`，`Canvas`，以及`WebGL`，那么Flutter到底会采用哪种方式呢？\n\n这篇文章带你对Flutter for web做一个了解和实践：\n"},{"id":"ant-design-pro","file":"ant-design-pro.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg\" alt=\"ant-design\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design\u003c/strong\u003e由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e和 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAngular\u003c/code\u003e组件实现，用于开发和服务于企业级中后台产品。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design-Pro\u003c/strong\u003e是基于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAnt-Design\u003c/code\u003e的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e：现代化的JavaScript界面库\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edva\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRedux\u003c/code\u003e的数据流、状态管理框架\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUmiJS\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enextJS\u003c/code\u003e的react应用框架\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e本文从基础使用开始，逐步解析里面用到的技术细节。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg\" alt=\"ant-design\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design\u003c/strong\u003e由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e和 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAngular\u003c/code\u003e组件实现，用于开发和服务于企业级中后台产品。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cstrong\u003eAnt-Design-Pro\u003c/strong\u003e是基于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAnt-Design\u003c/code\u003e的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReact\u003c/code\u003e：现代化的JavaScript界面库\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edva\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRedux\u003c/code\u003e的数据流、状态管理框架\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUmiJS\u003c/code\u003e：类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enextJS\u003c/code\u003e的react应用框架\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e本文从基础使用开始，逐步解析里面用到的技术细节。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e安装及启动在官网有说明，生成的基础工程目录结结构如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e├── config                   # umi 配置，包含路由，构建等配置\n├── mock                     # 本地模拟数据\n├── public                   # 公共资源目录\n│   └── favicon.png          # Favicon\n├── src                      # 代码目录\n│   ├── assets               # 本地静态资源\n│   ├── components           # 业务通用组件\n│   ├── e2e                  # 集成测试用例\n│   ├── layouts              # 通用布局\n│   ├── models               # 全局 dva model\n│   ├── pages                # 业务页面入口和常用模板\n│   ├── services             # 后台接口服务\n│   ├── utils                # 工具库\n│   ├── locales              # 国际化资源\n│   ├── global.less          # 全局样式\n│   └── global.js            # 全局 JS\n├── tests                    # 测试工具\n├── README.md                # readme\n└── package.json             # npm管理的清单\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于哈希路由\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e现代的前端框架都是单页面的(single-page application)，即用户访问的永远是根目录的index.html，这时网页地址如何展现就是一个问题。解决方案有2个：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e前端解决：使用哈希路由，即用户看到的地址栏URL是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e#\u003c/code\u003e分割的，如\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttps://wycode.cn/admin/#/users/123\u003c/code\u003e，实际访问仍然是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUmiJS\u003c/code\u003e配置如下\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eexport default {\n    ···\n    history: 'hash'\n    ···\n} as IConfig;  \n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e后端解决：使用重定向，即访问index以外的其它地址，都重定向到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enginx\u003c/code\u003e配置如下:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-nginx px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003elocation / {\n    try_files $uri $uri/ /index.html;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eUmiJS非根目录部署\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e如果工程不是部署在根目录，UmiJS的config做如下配置即可：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eexport default {\n    ···\n    base: 'admin'\n    ···\n} as IConfig;  \n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e**但是：**当配置为hash路由时且非根目录部署时，有可能你希望的首页是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttps://wycode.cn/admin/#/\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/users\u003c/code\u003e页是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttps://wycode.cn/admin/#/users\u003c/code\u003e则需要进行如下配置：\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eexport default {\n    ···\n    history: 'hash',\n    publicPath: '/admin/'\n    ···\n} as IConfig;\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于HTML模版\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eumi默认使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esrc/pages/document.ejs\u003c/code\u003e这个模版，采用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eEJS\u003c/code\u003e渲染，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFavicon\u003c/code\u003e的路径改为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;%= context.publicPath %\u003efavicon.png\u003c/code\u003e可以修复Favicon路径不对的问题。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于区块\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eblock\u003c/code\u003e\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e区块可以理解为页面模板，这个模板是在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eant-design-pro\u003c/code\u003e的预览网站中，如果你看中了某个功能，（默认创建的工程是空白的，只有一个Welcome页面）点击右下角的下载按钮，会弹出一个命令，执行这个命令就能将这个页面加入到你自己的工程中，非常方便。其实质是执行了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003egit clone\u003c/code\u003e克隆预览工程的部分文件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e比如：添加一个类似预览工程的404页面\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003enpx umi block add Exception404  --path=/exception/404\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e经过尝试，我发现目前区块引入时，并不是合并文件，而是创建一个目录，里面包括了这个页面用到的所有组件，甚至是国际化文本都是单独的一套。不管你工程内有没有这些组件，它都会重新创建一套。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e比如刚加入了404页面又想加入403页面，本已经存在的Exception组件，会在403文件夹再创建一份一模一样的副本，这点，我觉得是不可接受的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这样的话我更倾向与参考block的实现手动加入需要的文件，而不是使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eumi block add\u003c/code\u003e功能，官方的block在这里：\u003ca href=\"https://github.com/ant-design/pro-blocks\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/ant-design/pro-blocks\u003c/a\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e菜单处理\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e菜单是由路由自动生成，刚刚引入的404页面出现在了菜单栏，它是一个异常页，并不需要在菜单展示，我们只需在路由配置中加入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehideInMenu: true\u003c/code\u003e，即可隐藏。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e404页面\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e输入一个不存在的地址，并不能跳转到刚刚加入的404页面。\n我们需要将在路由配置中将404的其它配置项删除，仅保留\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecomponent: './exception/404'\u003c/code\u003e，并将其挪到数组的最后，这样当路由无法匹配时，就会加载404这个组件了。\u003c/p\u003e\n","content":"\n![ant-design](https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg)\n\n**Ant-Design**由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量`React`和 `Angular`组件实现，用于开发和服务于企业级中后台产品。\n\n**Ant-Design-Pro**是基于`Ant-Design`的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\n\n- `React`：现代化的JavaScript界面库\n- `dva`：类似`Redux`的数据流、状态管理框架\n- `UmiJS`：类似`nextJS`的react应用框架\n\n本文从基础使用开始，逐步解析里面用到的技术细节。\n\n\u003c!--more--\u003e\n\n安装及启动在官网有说明，生成的基础工程目录结结构如下：\n\n```\n├── config                   # umi 配置，包含路由，构建等配置\n├── mock                     # 本地模拟数据\n├── public                   # 公共资源目录\n│   └── favicon.png          # Favicon\n├── src                      # 代码目录\n│   ├── assets               # 本地静态资源\n│   ├── components           # 业务通用组件\n│   ├── e2e                  # 集成测试用例\n│   ├── layouts              # 通用布局\n│   ├── models               # 全局 dva model\n│   ├── pages                # 业务页面入口和常用模板\n│   ├── services             # 后台接口服务\n│   ├── utils                # 工具库\n│   ├── locales              # 国际化资源\n│   ├── global.less          # 全局样式\n│   └── global.js            # 全局 JS\n├── tests                    # 测试工具\n├── README.md                # readme\n└── package.json             # npm管理的清单\n```\n\n## 关于哈希路由\n\n现代的前端框架都是单页面的(single-page application)，即用户访问的永远是根目录的index.html，这时网页地址如何展现就是一个问题。解决方案有2个：\n\n- 前端解决：使用哈希路由，即用户看到的地址栏URL是`#`分割的，如`https://wycode.cn/admin/#/users/123`，实际访问仍然是`index.html`。`UmiJS`配置如下\n\n```js\nexport default {\n    ···\n    history: 'hash'\n    ···\n} as IConfig;  \n```\n\n- 后端解决：使用重定向，即访问index以外的其它地址，都重定向到`index.html`。`nginx`配置如下:\n\n```nginx\nlocation / {\n    try_files $uri $uri/ /index.html;\n}\n```\n## UmiJS非根目录部署\n\n如果工程不是部署在根目录，UmiJS的config做如下配置即可：\n\n```js\nexport default {\n    ···\n    base: 'admin'\n    ···\n} as IConfig;  \n```\n\n\u003e **但是：**当配置为hash路由时且非根目录部署时，有可能你希望的首页是`https://wycode.cn/admin/#/`，`/users`页是`https://wycode.cn/admin/#/users`则需要进行如下配置：\n\n```js\nexport default {\n    ···\n    history: 'hash',\n    publicPath: '/admin/'\n    ···\n} as IConfig;\n```\n\n## 关于HTML模版\n\numi默认使用`src/pages/document.ejs`这个模版，采用`EJS`渲染，`Favicon`的路径改为`\u003c%= context.publicPath %\u003efavicon.png`可以修复Favicon路径不对的问题。\n\n\n## 关于区块`block`\n\n区块可以理解为页面模板，这个模板是在`ant-design-pro`的预览网站中，如果你看中了某个功能，（默认创建的工程是空白的，只有一个Welcome页面）点击右下角的下载按钮，会弹出一个命令，执行这个命令就能将这个页面加入到你自己的工程中，非常方便。其实质是执行了`git clone`克隆预览工程的部分文件。\n\n比如：添加一个类似预览工程的404页面\n\n```bash\nnpx umi block add Exception404  --path=/exception/404\n```\n\n经过尝试，我发现目前区块引入时，并不是合并文件，而是创建一个目录，里面包括了这个页面用到的所有组件，甚至是国际化文本都是单独的一套。不管你工程内有没有这些组件，它都会重新创建一套。\n\n比如刚加入了404页面又想加入403页面，本已经存在的Exception组件，会在403文件夹再创建一份一模一样的副本，这点，我觉得是不可接受的。\n\n这样的话我更倾向与参考block的实现手动加入需要的文件，而不是使用`umi block add`功能，官方的block在这里：https://github.com/ant-design/pro-blocks\n\n## 菜单处理\n\n菜单是由路由自动生成，刚刚引入的404页面出现在了菜单栏，它是一个异常页，并不需要在菜单展示，我们只需在路由配置中加入`hideInMenu: true`，即可隐藏。\n\n## 404页面\n\n输入一个不存在的地址，并不能跳转到刚刚加入的404页面。\n我们需要将在路由配置中将404的其它配置项删除，仅保留`component: './exception/404'`，并将其挪到数组的最后，这样当路由无法匹配时，就会加载404这个组件了。\n\n","data":{"title":"学习和拆解Ant-Design-Pro","date":"2019-06-09","tags":["TypeScript","JavaScript","NodeJS","React"],"category":"Frontend"},"isEmpty":false,"excerpt":"\n![ant-design](https://gw.alipayobjects.com/zos/rmsportal/KDpgvguMpGfqaHPjicRK.svg)\n\n**Ant-Design**由阿里巴巴旗下蚂蚁金服团队设计开发，服务于企业级产品的设计体系，基于确定和自然的设计价值观上的模块化解决方案。除了交互设计，还提供了开箱即用的高质量`React`和 `Angular`组件实现，用于开发和服务于企业级中后台产品。\n\n**Ant-Design-Pro**是基于`Ant-Design`的功能完备的企业级中后台前端项目，里面可以学习和借鉴的内容很多。其核心基于以下几个技术集成。\n\n- `React`：现代化的JavaScript界面库\n- `dva`：类似`Redux`的数据流、状态管理框架\n- `UmiJS`：类似`nextJS`的react应用框架\n\n本文从基础使用开始，逐步解析里面用到的技术细节。\n\n"},{"id":"react-native","file":"react-native.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eFacebook的React Native是比基于WebView更先进的跨平台解决方案。实现了只编写一次JavaScript代码即可同时生成Android及iOS应用，并且同时拥有原生控件的性能。此篇文章我将从React Native Android端源码中探究它到底是如何做到的。以及实现的思路，架构的设计等。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180213_react.png\" alt=\"React\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eFacebook的React Native是比基于WebView更先进的跨平台解决方案。实现了只编写一次JavaScript代码即可同时生成Android及iOS应用，并且同时拥有原生控件的性能。此篇文章我将从React Native Android端源码中探究它到底是如何做到的。以及实现的思路，架构的设计等。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e核心类ReactActivity\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereact-native-cli\u003c/code\u003e生成工程文件，打开工程目录，发现有一个入口Activity：\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMainActivity\u003c/code\u003e继承自\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactActivity\u003c/code\u003e抽象类。这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactActivity\u003c/code\u003e是React Native项目的唯一一个Activity，可以猜想其采用了单Activity的架构。回想Unity,LibGDX这样的游戏引擎，也是采用了这样的模式。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e...\n\n/**\n * Base Activity for React Native applications.\n */\npublic abstract class ReactActivity extends Activity\n    implements DefaultHardwareBackBtnHandler, PermissionAwareActivity {\n\n  private final ReactActivityDelegate mDelegate;\n\n  protected ReactActivity() {\n    mDelegate = createReactActivityDelegate();\n  }\n\n  ...\n\n  @Override\n  protected void onCreate(Bundle savedInstanceState) {\n    super.onCreate(savedInstanceState);\n    mDelegate.onCreate(savedInstanceState);\n  }\n...\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e可以发现在Android框架创建\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactActivity\u003c/code\u003e实例的同时会创建一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactActivityDelegate\u003c/code\u003e对象。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e然后\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactActivity\u003c/code\u003e将Activity的生命周期方法和一些回调方法注入到这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactActivityDelegate\u003c/code\u003e对象中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e看看这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactActivityDelegate\u003c/code\u003e都在干啥。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e核心类ReactActivityDelegate\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e...\n\n/**\n * Delegate class for {@link ReactActivity} and {@link ReactFragmentActivity}. You can subclass this\n * to provide custom implementations for e.g. {@link #getReactNativeHost()}, if your Application\n * class doesn't implement {@link ReactApplication}.\n */\npublic class ReactActivityDelegate {\n\n  ···\n\n  private @Nullable ReactRootView mReactRootView;\n\n  ...\n\n  protected void onCreate(Bundle savedInstanceState) {\n    if (mMainComponentName != null) {\n      loadApp(mMainComponentName);\n    }\n    mDoubleTapReloadRecognizer = new DoubleTapReloadRecognizer();\n  }\n\n  protected void loadApp(String appKey) {\n    if (mReactRootView != null) {\n      throw new IllegalStateException(\"Cannot loadApp while app is already running.\");\n    }\n    mReactRootView = createRootView();\n    mReactRootView.startReactApplication(\n      getReactNativeHost().getReactInstanceManager(),\n      appKey,\n      getLaunchOptions());\n    getPlainActivity().setContentView(mReactRootView);\n  }\n\n  ...\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactActivityDelegate\u003c/code\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOnCreate\u003c/code\u003e方法中调用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eloadApp\u003c/code\u003e方法，然后创建了一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactRootView\u003c/code\u003e,并调用了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactRootView\u003c/code\u003e的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estartReactApplication\u003c/code\u003e方法，最后将这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactRootView\u003c/code\u003e作为Activity的根View显示。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e继续看这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactRootView\u003c/code\u003e。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e核心类ReactRootView\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\n···\n\npublic class ReactRootView extends SizeMonitoringFrameLayout\n    implements RootView, MeasureSpecProvider {\n\n  ···\n\n  /**\n   * Schedule rendering of the react component rendered by the JS application from the given JS\n   * module (@{param moduleName}) using provided {@param reactInstanceManager} to attach to the\n   * JS context of that manager. Extra parameter {@param launchOptions} can be used to pass initial\n   * properties for the react component.\n   */\n  public void startReactApplication(\n      ReactInstanceManager reactInstanceManager,\n      String moduleName,\n      @Nullable Bundle initialProperties) {\n      \n      ···\n\n      if (!mReactInstanceManager.hasStartedCreatingInitialContext()) {\n        mReactInstanceManager.createReactContextInBackground();\n      }\n      \n      ···\n  }\n\n  ···\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estartReactApplication()\u003c/code\u003e方法，最终调用了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactInstanceManager\u003c/code\u003e对象的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecreateReactContextInBackground()\u003c/code\u003e方法。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e继续追这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactInstanceManager\u003c/code\u003e。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e核心类ReactInstanceManager\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e···\n\n@ThreadSafe\npublic class ReactInstanceManager {\n\n  ···\n\n  @ThreadConfined(UI)\n  public void createReactContextInBackground() {\n    ···\n    recreateReactContextInBackgroundInner();\n  }\n\n  ···\n\n  \n  @ThreadConfined(UI)\n  public void recreateReactContextInBackground() {\n    ···\n    recreateReactContextInBackgroundInner();\n  }\n\n  @ThreadConfined(UI)\n  private void recreateReactContextInBackgroundInner() {\n    ···\n    recreateReactContextInBackgroundFromBundleLoader();\n  }\n\n  @ThreadConfined(UI)\n  private void recreateReactContextInBackgroundFromBundleLoader() {\n    ···\n    recreateReactContextInBackground(mJavaScriptExecutorFactory, mBundleLoader);\n  }\n\n  ···\n\n  @ThreadConfined(UI)\n  private void recreateReactContextInBackground(\n    JavaScriptExecutorFactory jsExecutorFactory,\n    JSBundleLoader jsBundleLoader) {\n    ···\n      runCreateReactContextOnNewThread(initParams);\n    ···\n  }\n\n  @ThreadConfined(UI)\n  private void runCreateReactContextOnNewThread(final ReactContextInitParams initParams) {\n    ···\n    mCreateReactContextThread =\n        new Thread(\n            new Runnable() {\n              @Override\n              public void run() {\n                ···\n                \n                  final ReactApplicationContext reactApplicationContext =\n                      createReactContext(\n                          initParams.getJsExecutorFactory().create(),\n                          initParams.getJsBundleLoader());\n\n                 ···\n                  Runnable setupReactContextRunnable =\n                      new Runnable() {\n                        @Override\n                        public void run() {\n                          try {\n                            setupReactContext(reactApplicationContext);\n                          } catch (Exception e) {\n                            mDevSupportManager.handleException(e);\n                          }\n                        }\n                      };\n\n                  reactApplicationContext.runOnNativeModulesQueueThread(setupReactContextRunnable);\n                 ···\n              }\n            });\n    ···\n    mCreateReactContextThread.start();\n  }\n\n  ···\n\n  /**\n   * @return instance of {@link ReactContext} configured a {@link CatalystInstance} set\n   */\n  private ReactApplicationContext createReactContext(\n      JavaScriptExecutor jsExecutor,\n      JSBundleLoader jsBundleLoader) {\n    ···\n    final ReactApplicationContext reactContext = new ReactApplicationContext(mApplicationContext);\n\n    ···\n    CatalystInstanceImpl.Builder catalystInstanceBuilder = new CatalystInstanceImpl.Builder()\n      .setReactQueueConfigurationSpec(ReactQueueConfigurationSpec.createDefault())\n      .setJSExecutor(jsExecutor)\n      .setRegistry(nativeModuleRegistry)\n      .setJSBundleLoader(jsBundleLoader)\n      .setNativeModuleCallExceptionHandler(exceptionHandler);\n\n    ···\n      catalystInstance = catalystInstanceBuilder.build();\n    \n    ···\n    catalystInstance.runJSBundle();\n    reactContext.initializeWithInstance(catalystInstance);\n\n    return reactContext;\n  }\n\n  ···\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactInstanceManager\u003c/code\u003e有点长，通过一系列方法调用，最后通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecreateReactContext()\u003c/code\u003e方法创建了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactApplicationContext\u003c/code\u003e的实例，并创建了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCatalystInstance\u003c/code\u003e用于初始化\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereactContext\u003c/code\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在初始化\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereactContext\u003c/code\u003e之前又调用了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecatalystInstance.runJSBundle();\u003c/code\u003e，猜想这里是调用JS代码的入口，这里的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCatalystInstance\u003c/code\u003e是个接口，我们要查看\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCatalystInstanceImpl\u003c/code\u003e来看看具体实现。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e核心类CatalystInstanceImpl\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\n···\n\n/**\n * This provides an implementation of the public CatalystInstance instance.  It is public because\n * it is built by XReactInstanceManager which is in a different package.\n */\n@DoNotStrip\npublic class CatalystInstanceImpl implements CatalystInstance {\n  \n  ···\n\n  public static class PendingJSCall {\n\n    ···\n\n    void call(CatalystInstanceImpl catalystInstance) {\n      NativeArray arguments = mArguments != null ? mArguments : new WritableNativeArray();\n      catalystInstance.jniCallJSFunction(mModule, mMethod, arguments);\n    }\n\n    ···\n  }\n\n  ···\n\n  private native void jniSetSourceURL(String sourceURL);\n  private native void jniRegisterSegment(int segmentId, String path);\n  private native void jniLoadScriptFromAssets(AssetManager assetManager, String assetURL, boolean loadSynchronously);\n  private native void jniLoadScriptFromFile(String fileName, String sourceURL, boolean loadSynchronously);\n\n  @Override\n  public void runJSBundle() {\n    static {\n      ReactBridge.staticInit();\n    }\n    ···\n    mJSBundleLoader.loadScript(CatalystInstanceImpl.this);\n\n    synchronized (mJSCallsPendingInitLock) {\n\n      // Loading the bundle is queued on the JS thread, but may not have\n      // run -slate-400/30\"\u003eC++层\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-c++ px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e···\n\nnamespace facebook {\nnamespace react {\n\n···\n\nvoid CatalystInstanceImpl::initializeBridge(\n    jni::alias_ref\u0026#x3C;ReactCallback::javaobject\u003e callback,\n    // This executor is actually a factory holder.\n    JavaScriptExecutorHolder* jseh,\n    jni::alias_ref\u0026#x3C;JavaMessageQueueThread::javaobject\u003e jsQueue,\n    jni::alias_ref\u0026#x3C;JavaMessageQueueThread::javaobject\u003e nativeModulesQueue,\n    jni::alias_ref\u0026#x3C;jni::JCollection\u0026#x3C;JavaModuleWrapper::javaobject\u003e::javaobject\u003e javaModules,\n    jni::alias_ref\u0026#x3C;jni::JCollection\u0026#x3C;ModuleHolder::javaobject\u003e::javaobject\u003e cxxModules) {\n  // TODO mhorowitz: how to assert here?\n  // Assertions.assertCondition(mBridge == null, \"initializeBridge should be called once\");\n  moduleMessageQueue_ = std::make_shared\u0026#x3C;JMessageQueueThread\u003e(nativeModulesQueue);\n\n  // This used to be:\n  //\n  // Java CatalystInstanceImpl -\u003e C++ CatalystInstanceImpl -\u003e Bridge -\u003e Bridge::Callback\n  // --weak--\u003e ReactCallback -\u003e Java CatalystInstanceImpl\n  //\n  // Now the weak ref is a global ref.  So breaking the loop depends on\n  // CatalystInstanceImpl#destroy() calling mHybridData.resetNative(), which\n  // should cause all the C++ pointers to be cleaned up (except C++\n  // CatalystInstanceImpl might be kept alive for a short time by running\n  // callbacks). This also means that all native calls need to be pre-checked\n  // to avoid NPE.\n\n  // See the comment in callJSFunction.  Once js calls switch to strings, we\n  // don't need jsModuleDescriptions any more, all the way up and down the\n  // stack.\n\n  moduleRegistry_ = std::make_shared\u0026#x3C;ModuleRegistry\u003e(\n    buildNativeModuleList(\n       std::weak_ptr\u0026#x3C;Instance\u003e(instance_),\n       javaModules,\n       cxxModules,\n       moduleMessageQueue_));\n\n  instance_-\u003einitializeBridge(\n    folly::make_unique\u0026#x3C;JInstanceCallback\u003e(\n    callback,\n    moduleMessageQueue_),\n    jseh-\u003egetExecutorFactory(),\n    folly::make_unique\u0026#x3C;JMessageQueueThread\u003e(jsQueue),\n    moduleRegistry_);\n}\n\n···\n\nvoid CatalystInstanceImpl::jniCallJSFunction(std::string module, std::string method, NativeArray* arguments) {\n  // We want to share the C++ code, and on iOS, modules pass module/method\n  // names as strings all the way through to JS, and there's no way to do\n  // string -\u003e id mapping on the objc side.  So on Android, we convert the\n  // number to a string, here which gets passed as-is to JS.  There, they they\n  // used as ids if isFinite(), which handles this case, and looked up as\n  // strings otherwise.  Eventually, we'll probably want to modify the stack\n  // from the JS proxy through here to use strings, too.\n  instance_-\u003ecallJSFunction(std::move(module),\n                            std::move(method),\n                            arguments-\u003econsume());\n}\n\n···\n\n}}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e在这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCatalystInstanceImpl.cpp\u003c/code\u003e中可以发现c++对于js的调用。以及非常棒的两段注释。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eReact Navtive 通过C++层去解释执行JS，从而达到一个比较好的性能。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e总结\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通过此文算是搞明白了，Android系统是怎么样去执行JavaScript代码的。\n但React Native又是如何将JS中的组件渲染成Android原生组件的仍然是个疑问。\n以后再研究吧...\u003c/p\u003e\n","content":"\n![React](/images/20180213_react.png)\n\n\u003e Facebook的React Native是比基于WebView更先进的跨平台解决方案。实现了只编写一次JavaScript代码即可同时生成Android及iOS应用，并且同时拥有原生控件的性能。此篇文章我将从React Native Android端源码中探究它到底是如何做到的。以及实现的思路，架构的设计等。\n\n\n\u003c!--more--\u003e\n\n## 核心类ReactActivity\n\n使用`react-native-cli`生成工程文件，打开工程目录，发现有一个入口Activity：`MainActivity`继承自`ReactActivity`抽象类。这个`ReactActivity`是React Native项目的唯一一个Activity，可以猜想其采用了单Activity的架构。回想Unity,LibGDX这样的游戏引擎，也是采用了这样的模式。\n\n```java\n...\n\n/**\n * Base Activity for React Native applications.\n */\npublic abstract class ReactActivity extends Activity\n    implements DefaultHardwareBackBtnHandler, PermissionAwareActivity {\n\n  private final ReactActivityDelegate mDelegate;\n\n  protected ReactActivity() {\n    mDelegate = createReactActivityDelegate();\n  }\n\n  ...\n\n  @Override\n  protected void onCreate(Bundle savedInstanceState) {\n    super.onCreate(savedInstanceState);\n    mDelegate.onCreate(savedInstanceState);\n  }\n...\n```\n\n可以发现在Android框架创建`ReactActivity`实例的同时会创建一个`ReactActivityDelegate`对象。\n\n然后`ReactActivity`将Activity的生命周期方法和一些回调方法注入到这个`ReactActivityDelegate`对象中。\n\n看看这个`ReactActivityDelegate`都在干啥。\n\n\n## 核心类ReactActivityDelegate\n\n```java\n...\n\n/**\n * Delegate class for {@link ReactActivity} and {@link ReactFragmentActivity}. You can subclass this\n * to provide custom implementations for e.g. {@link #getReactNativeHost()}, if your Application\n * class doesn't implement {@link ReactApplication}.\n */\npublic class ReactActivityDelegate {\n\n  ···\n\n  private @Nullable ReactRootView mReactRootView;\n\n  ...\n\n  protected void onCreate(Bundle savedInstanceState) {\n    if (mMainComponentName != null) {\n      loadApp(mMainComponentName);\n    }\n    mDoubleTapReloadRecognizer = new DoubleTapReloadRecognizer();\n  }\n\n  protected void loadApp(String appKey) {\n    if (mReactRootView != null) {\n      throw new IllegalStateException(\"Cannot loadApp while app is already running.\");\n    }\n    mReactRootView = createRootView();\n    mReactRootView.startReactApplication(\n      getReactNativeHost().getReactInstanceManager(),\n      appKey,\n      getLaunchOptions());\n    getPlainActivity().setContentView(mReactRootView);\n  }\n\n  ...\n}\n\n```\n\n\n`ReactActivityDelegate`在`OnCreate`方法中调用`loadApp`方法，然后创建了一个`ReactRootView`,并调用了`ReactRootView`的`startReactApplication`方法，最后将这个`ReactRootView`作为Activity的根View显示。\n\n继续看这个`ReactRootView`。\n\n## 核心类ReactRootView\n\n```java\n\n···\n\npublic class ReactRootView extends SizeMonitoringFrameLayout\n    implements RootView, MeasureSpecProvider {\n\n  ···\n\n  /**\n   * Schedule rendering of the react component rendered by the JS application from the given JS\n   * module (@{param moduleName}) using provided {@param reactInstanceManager} to attach to the\n   * JS context of that manager. Extra parameter {@param launchOptions} can be used to pass initial\n   * properties for the react component.\n   */\n  public void startReactApplication(\n      ReactInstanceManager reactInstanceManager,\n      String moduleName,\n      @Nullable Bundle initialProperties) {\n      \n      ···\n\n      if (!mReactInstanceManager.hasStartedCreatingInitialContext()) {\n        mReactInstanceManager.createReactContextInBackground();\n      }\n      \n      ···\n  }\n\n  ···\n}\n\n```\n\n这个`startReactApplication()`方法，最终调用了`ReactInstanceManager`对象的`createReactContextInBackground()`方法。\n\n继续追这个`ReactInstanceManager`。\n\n## 核心类ReactInstanceManager\n\n```java\n···\n\n@ThreadSafe\npublic class ReactInstanceManager {\n\n  ···\n\n  @ThreadConfined(UI)\n  public void createReactContextInBackground() {\n    ···\n    recreateReactContextInBackgroundInner();\n  }\n\n  ···\n\n  \n  @ThreadConfined(UI)\n  public void recreateReactContextInBackground() {\n    ···\n    recreateReactContextInBackgroundInner();\n  }\n\n  @ThreadConfined(UI)\n  private void recreateReactContextInBackgroundInner() {\n    ···\n    recreateReactContextInBackgroundFromBundleLoader();\n  }\n\n  @ThreadConfined(UI)\n  private void recreateReactContextInBackgroundFromBundleLoader() {\n    ···\n    recreateReactContextInBackground(mJavaScriptExecutorFactory, mBundleLoader);\n  }\n\n  ···\n\n  @ThreadConfined(UI)\n  private void recreateReactContextInBackground(\n    JavaScriptExecutorFactory jsExecutorFactory,\n    JSBundleLoader jsBundleLoader) {\n    ···\n      runCreateReactContextOnNewThread(initParams);\n    ···\n  }\n\n  @ThreadConfined(UI)\n  private void runCreateReactContextOnNewThread(final ReactContextInitParams initParams) {\n    ···\n    mCreateReactContextThread =\n        new Thread(\n            new Runnable() {\n              @Override\n              public void run() {\n                ···\n                \n                  final ReactApplicationContext reactApplicationContext =\n                      createReactContext(\n                          initParams.getJsExecutorFactory().create(),\n                          initParams.getJsBundleLoader());\n\n                 ···\n                  Runnable setupReactContextRunnable =\n                      new Runnable() {\n                        @Override\n                        public void run() {\n                          try {\n                            setupReactContext(reactApplicationContext);\n                          } catch (Exception e) {\n                            mDevSupportManager.handleException(e);\n                          }\n                        }\n                      };\n\n                  reactApplicationContext.runOnNativeModulesQueueThread(setupReactContextRunnable);\n                 ···\n              }\n            });\n    ···\n    mCreateReactContextThread.start();\n  }\n\n  ···\n\n  /**\n   * @return instance of {@link ReactContext} configured a {@link CatalystInstance} set\n   */\n  private ReactApplicationContext createReactContext(\n      JavaScriptExecutor jsExecutor,\n      JSBundleLoader jsBundleLoader) {\n    ···\n    final ReactApplicationContext reactContext = new ReactApplicationContext(mApplicationContext);\n\n    ···\n    CatalystInstanceImpl.Builder catalystInstanceBuilder = new CatalystInstanceImpl.Builder()\n      .setReactQueueConfigurationSpec(ReactQueueConfigurationSpec.createDefault())\n      .setJSExecutor(jsExecutor)\n      .setRegistry(nativeModuleRegistry)\n      .setJSBundleLoader(jsBundleLoader)\n      .setNativeModuleCallExceptionHandler(exceptionHandler);\n\n    ···\n      catalystInstance = catalystInstanceBuilder.build();\n    \n    ···\n    catalystInstance.runJSBundle();\n    reactContext.initializeWithInstance(catalystInstance);\n\n    return reactContext;\n  }\n\n  ···\n}\n\n```\n\n这个`ReactInstanceManager`有点长，通过一系列方法调用，最后通过`createReactContext()`方法创建了`ReactApplicationContext`的实例，并创建了`CatalystInstance`用于初始化`reactContext`。\n\n在初始化`reactContext`之前又调用了`catalystInstance.runJSBundle();`，猜想这里是调用JS代码的入口，这里的`CatalystInstance`是个接口，我们要查看`CatalystInstanceImpl`来看看具体实现。\n\n## 核心类CatalystInstanceImpl\n\n```java\n\n···\n\n/**\n * This provides an implementation of the public CatalystInstance instance.  It is public because\n * it is built by XReactInstanceManager which is in a different package.\n */\n@DoNotStrip\npublic class CatalystInstanceImpl implements CatalystInstance {\n  \n  ···\n\n  public static class PendingJSCall {\n\n    ···\n\n    void call(CatalystInstanceImpl catalystInstance) {\n      NativeArray arguments = mArguments != null ? mArguments : new WritableNativeArray();\n      catalystInstance.jniCallJSFunction(mModule, mMethod, arguments);\n    }\n\n    ···\n  }\n\n  ···\n\n  private native void jniSetSourceURL(String sourceURL);\n  private native void jniRegisterSegment(int segmentId, String path);\n  private native void jniLoadScriptFromAssets(AssetManager assetManager, String assetURL, boolean loadSynchronously);\n  private native void jniLoadScriptFromFile(String fileName, String sourceURL, boolean loadSynchronously);\n\n  @Override\n  public void runJSBundle() {\n    static {\n      ReactBridge.staticInit();\n    }\n    ···\n    mJSBundleLoade
