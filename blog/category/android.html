ion-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"flutter","file":"flutter.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://blog.scottlogic.com/bquinn/assets/Flutter_logo_text.png\" alt=\"Flutter\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eFlutter是由Google开发的开源的跨平台应用开发框架，支持Android、iOS开发，能够开发媲美原生的高性能应用。按照2019年的开发路线图，Flutter即将支持Web和桌面端应用的开发。这篇文章带你领略Flutter的魅力。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://blog.scottlogic.com/bquinn/assets/Flutter_logo_text.png\" alt=\"Flutter\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eFlutter是由Google开发的开源的跨平台应用开发框架，支持Android、iOS开发，能够开发媲美原生的高性能应用。按照2019年的开发路线图，Flutter即将支持Web和桌面端应用的开发。这篇文章带你领略Flutter的魅力。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e\u003ca href=\"https://flutter.dev/\" title=\"Flutter官网\" class=\"text-sky-500 hover:text-sky-400\"\u003eFlutter官网\u003c/a\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e已经有ReactNative了，为什么还要Flutter\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eReactNative已经能够做到使用一份JavaScript代码同时发布Android和iOS平台。而且其并不使用WebView，而是将React组件转换为相应的原生组件从而提高性能。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eReactNative技术看起来很美好，因为对公司而言，并不需要很多的Android和iOS开发，只需要一两个技术支持，其它业务代码都是由前端工程师完成，节约了成本（？）提高了效率（？）。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e然而，最近越来越多的公司开始放弃ReactNative而回归到原生开发，原因在于，当ReactNative实际应用到大型项目上时，面对复杂的、定制化的需求，其自带封装好的组件往往不能满足要求。为了满足这些需求，往往需要原生开发去定制相应的React组件。或者为JS提供接口。原生很简单就能实现的功能，因为要跨平台，所以必须抽象出来给React使用。此时React带来的收益和成本相比不再显得有优势了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eFlutter的优势在于，它完全抛弃了使用原生UI，而是从底层2D渲染就独立出来。使用了Google开发的叫\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSkia\u003c/code\u003e的C++渲染库。类似于游戏引擎一样，能够提供60FPS的性能。上层使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDart\u003c/code\u003e提供了一套现代的响应式布局框架。抛弃了原生组件，同时也就免去了原生组件的定制。定制UI也是在Flutter框架的范围内，不涉及原生开发。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这就是Flutter的魅力所在。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eFlutter技术架构\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://docs.flutter.dev/assets/images/docs/arch-overview/archdiagram.png\" alt=\"Flutter技术架构\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于环境搭建\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e环境搭建官网都有说明，我这里不再赘述，需要注意的是，下载并配置好Flutter之后，要执行一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eflutter doctor\u003c/code\u003e的命令，这个命令会检查本地环境，在线安装所需要的组件。由于众所周知的原因，国内使用我们需要额外配置两个类似仓库镜像的环境变量：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ export PUB_HOSTED_URL=https://pub.flutter-io.cn\n$ export FLUTTER_STORAGE_BASE_URL=https://storage.flutter-io.cn\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e然后再执行\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eflutter doctor\u003c/code\u003e就能快一点了。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHello Flutter\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e创建好第一个Flutter工程后，模版代码注释非常详细，Android部分看到只有一个Activity继承自FlutterActivity，用代理模式，接管了这个Activity的所有生命周期和事件回调。这些和Unity，ReactNative的原理都一样。以下是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDart\u003c/code\u003e部分的代码：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-dart px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eimport 'package:flutter/material.dart';\n\nvoid main() =\u003e runApp(MyApp());\n\nclass MyApp extends StatelessWidget {\n  // This widget is the root of your application.\n  @override\n  Widget build(BuildContext context) {\n    return MaterialApp(\n      title: 'Flutter Demo',\n      theme: ThemeData(\n        // This is the theme of your application.\n        //\n        // Try running your application with \"flutter run\". You'll see the\n        // application has a blue toolbar. Then, without quitting the app, try\n        // changing the primarySwatch below to Colors.green and then invoke\n        // \"hot reload\" (press \"r\" in the console where you ran \"flutter run\",\n        // or simply save your changes to \"hot reload\" in a Flutter IDE).\n        // Notice that the counter didn't reset back to zero; the application\n        // is not restarted.\n        primarySwatch: Colors.blue,\n      ),\n      home: MyHomePage(title: 'Flutter Demo Home Page'),\n    );\n  }\n}\n\nclass MyHomePage extends StatefulWidget {\n  MyHomePage({Key key, this.title}) : super(key: key);\n\n  // This widget is the home page of your application. It is stateful, meaning\n  // that it has a State object (defined below) that contains fields that affect\n  // how it looks.\n\n  // This class is the configuration for the state. It holds the values (in this\n  // case the title) provided by the parent (in this case the App widget) and\n  // used by the build method of the State. Fields in a Widget subclass are\n  // always marked \"final\".\n\n  final String title;\n\n  @override\n  _MyHomePageState createState() =\u003e _MyHomePageState();\n}\n\nclass _MyHomePageState extends State\u0026#x3C;MyHomePage\u003e {\n  int _counter = 0;\n\n  void _incrementCounter() {\n    setState(() {\n      // This call to setState tells the Flutter framework that something has\n      // changed in this State, which causes it to rerun the build method below\n      // so that the display can reflect the updated values. If we changed\n      // _counter without calling setState(), then the build method would not be\n      // called again, and so nothing would appear to happen.\n      _counter++;\n    });\n  }\n\n  @override\n  Widget build(BuildContext context) {\n    // This method is rerun every time setState is called, for instance as done\n    // by the _incrementCounter method above.\n    //\n    // The Flutter framework has been optimized to make rerunning build methods\n    // fast, so that you can just rebuild anything that needs updating rather\n    // than having to individually change instances of widgets.\n    return Scaffold(\n      appBar: AppBar(\n        // Here we take the value from the MyHomePage object that was created by\n        // the App.build method, and use it to set our appbar title.\n        title: Text(widget.title),\n      ),\n      body: Center(\n        // Center is a layout widget. It takes a single child and positions it\n        // in the middle of the parent.\n        child: Column(\n          // Column is also layout widget. It takes a list of children and\n          // arranges them vertically. By default, it sizes itself to fit its\n          // children horizontally, and tries to be as tall as its parent.\n          //\n          // Invoke \"debug painting\" (press \"p\" in the console, choose the\n          // \"Toggle Debug Paint\" action from the Flutter Inspector in Android\n          // Studio, or the \"Toggle Debug Paint\" command in Visual Studio Code)\n          // to see the wireframe for each widget.\n          //\n          // Column has various properties to control how it sizes itself and\n          // how it positions its children. Here we use mainAxisAlignment to\n          // center the children vertically; the main axis here is the vertical\n          // axis because Columns are vertical (the cross axis would be\n          // horizontal).\n          mainAxisAlignment: MainAxisAlignment.center,\n          children: \u0026#x3C;Widget\u003e[\n            Text(\n              'You have pushed the button this many times:',\n            ),\n            Text(\n              '$_counter',\n              style: Theme.of(context).textTheme.display1,\n            ),\n          ],\n        ),\n      ),\n      floatingActionButton: FloatingActionButton(\n        onPressed: _incrementCounter,\n        tooltip: 'Increment',\n        child: Icon(Icons.add),\n      ), // This trailing comma makes auto-formatting nicer for build methods.\n    );\n  }\n}\n\n\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![Flutter](https://blog.scottlogic.com/bquinn/assets/Flutter_logo_text.png)\n\n\u003e Flutter是由Google开发的开源的跨平台应用开发框架，支持Android、iOS开发，能够开发媲美原生的高性能应用。按照2019年的开发路线图，Flutter即将支持Web和桌面端应用的开发。这篇文章带你领略Flutter的魅力。\n\n\n\u003c!--more--\u003e\n\n[Flutter官网](https://flutter.dev/ \"Flutter官网\")\n\n\n## 已经有ReactNative了，为什么还要Flutter\n\nReactNative已经能够做到使用一份JavaScript代码同时发布Android和iOS平台。而且其并不使用WebView，而是将React组件转换为相应的原生组件从而提高性能。\n\nReactNative技术看起来很美好，因为对公司而言，并不需要很多的Android和iOS开发，只需要一两个技术支持，其它业务代码都是由前端工程师完成，节约了成本（？）提高了效率（？）。\n\n然而，最近越来越多的公司开始放弃ReactNative而回归到原生开发，原因在于，当ReactNative实际应用到大型项目上时，面对复杂的、定制化的需求，其自带封装好的组件往往不能满足要求。为了满足这些需求，往往需要原生开发去定制相应的React组件。或者为JS提供接口。原生很简单就能实现的功能，因为要跨平台，所以必须抽象出来给React使用。此时React带来的收益和成本相比不再显得有优势了。\n\nFlutter的优势在于，它完全抛弃了使用原生UI，而是从底层2D渲染就独立出来。使用了Google开发的叫`Skia`的C++渲染库。类似于游戏引擎一样，能够提供60FPS的性能。上层使用`Dart`提供了一套现代的响应式布局框架。抛弃了原生组件，同时也就免去了原生组件的定制。定制UI也是在Flutter框架的范围内，不涉及原生开发。\n\n这就是Flutter的魅力所在。\n\n## Flutter技术架构\n\n![Flutter技术架构](https://docs.flutter.dev/assets/images/docs/arch-overview/archdiagram.png)\n\n## 关于环境搭建\n\n环境搭建官网都有说明，我这里不再赘述，需要注意的是，下载并配置好Flutter之后，要执行一个`flutter doctor`的命令，这个命令会检查本地环境，在线安装所需要的组件。由于众所周知的原因，国内使用我们需要额外配置两个类似仓库镜像的环境变量：\n\n```bash\n$ export PUB_HOSTED_URL=https://pub.flutter-io.cn\n$ export FLUTTER_STORAGE_BASE_URL=https://storage.flutter-io.cn\n```\n\n然后再执行`flutter doctor`就能快一点了。\n\n\n## Hello Flutter\n\n创建好第一个Flutter工程后，模版代码注释非常详细，Android部分看到只有一个Activity继承自FlutterActivity，用代理模式，接管了这个Activity的所有生命周期和事件回调。这些和Unity，ReactNative的原理都一样。以下是`Dart`部分的代码：\n\n\n\n```dart\nimport 'package:flutter/material.dart';\n\nvoid main() =\u003e runApp(MyApp());\n\nclass MyApp extends StatelessWidget {\n  // This widget is the root of your application.\n  @override\n  Widget build(BuildContext context) {\n    return MaterialApp(\n      title: 'Flutter Demo',\n      theme: ThemeData(\n        // This is the theme of your application.\n        //\n        // Try running your application with \"flutter run\". You'll see the\n        // application has a blue toolbar. Then, without quitting the app, try\n        // changing the primarySwatch below to Colors.green and then invoke\n        // \"hot reload\" (press \"r\" in the console where you ran \"flutter run\",\n        // or simply save your changes to \"hot reload\" in a Flutter IDE).\n        // Notice that the counter didn't reset back to zero; the application\n        // is not restarted.\n        primarySwatch: Colors.blue,\n      ),\n      home: MyHomePage(title: 'Flutter Demo Home Page'),\n    );\n  }\n}\n\nclass MyHomePage extends StatefulWidget {\n  MyHomePage({Key key, this.title}) : super(key: key);\n\n  // This widget is the home page of your application. It is stateful, meaning\n  // that it has a State object (defined below) that contains fields that affect\n  // how it looks.\n\n  // This class is the configuration for the state. It holds the values (in this\n  // case the title) provided by the parent (in this case the App widget) and\n  // used by the build method of the State. Fields in a Widget subclass are\n  // always marked \"final\".\n\n  final String title;\n\n  @override\n  _MyHomePageState createState() =\u003e _MyHomePageState();\n}\n\nclass _MyHomePageState extends State\u003cMyHomePage\u003e {\n  int _counter = 0;\n\n  void _incrementCounter() {\n    setState(() {\n      // This call to setState tells the Flutter framework that something has\n      // changed in this State, which causes it to rerun the build method below\n      // so that the display can reflect the updated values. If we changed\n      // _counter without calling setState(), then the build method would not be\n      // called again, and so nothing would appear to happen.\n      _counter++;\n    });\n  }\n\n  @override\n  Widget build(BuildContext context) {\n    // This method is rerun every time setState is called, for instance as done\n    // by the _incrementCounter method above.\n    //\n    // The Flutter framework has been optimized to make rerunning build methods\n    // fast, so that you can just rebuild anything that needs updating rather\n    // than having to individually change instances of widgets.\n    return Scaffold(\n      appBar: AppBar(\n        // Here we take the value from the MyHomePage object that was created by\n        // the App.build method, and use it to set our appbar title.\n        title: Text(widget.title),\n      ),\n      body: Center(\n        // Center is a layout widget. It takes a single child and positions it\n        // in the middle of the parent.\n        child: Column(\n          // Column is also layout widget. It takes a list of children and\n          // arranges them vertically. By default, it sizes itself to fit its\n          // children horizontally, and tries to be as tall as its parent.\n          //\n          // Invoke \"debug painting\" (press \"p\" in the console, choose the\n          // \"Toggle Debug Paint\" action from the Flutter Inspector in Android\n          // Studio, or the \"Toggle Debug Paint\" command in Visual Studio Code)\n          // to see the wireframe for each widget.\n          //\n          // Column has various properties to control how it sizes itself and\n          // how it positions its children. Here we use mainAxisAlignment to\n          // center the children vertically; the main axis here is the vertical\n          // axis because Columns are vertical (the cross axis would be\n          // horizontal).\n          mainAxisAlignment: MainAxisAlignment.center,\n          children: \u003cWidget\u003e[\n            Text(\n              'You have pushed the button this many times:',\n            ),\n            Text(\n              '$_counter',\n              style: Theme.of(context).textTheme.display1,\n            ),\n          ],\n        ),\n      ),\n      floatingActionButton: FloatingActionButton(\n        onPressed: _incrementCounter,\n        tooltip: 'Increment',\n        child: Icon(Icons.add),\n      ), // This trailing comma makes auto-formatting nicer for build methods.\n    );\n  }\n}\n\n\n```","data":{"title":"使用Flutter开发跨平台应用","date":"2019-03-28","tags":["Flutter","Dart","Android","iOS"],"category":"Android"},"isEmpty":false,"excerpt":"\n![Flutter](https://blog.scottlogic.com/bquinn/assets/Flutter_logo_text.png)\n\n\u003e Flutter是由Google开发的开源的跨平台应用开发框架，支持Android、iOS开发，能够开发媲美原生的高性能应用。按照2019年的开发路线图，Flutter即将支持Web和桌面端应用的开发。这篇文章带你领略Flutter的魅力。\n\n\n"},{"id":"android-dp","file":"android-dp.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://ts1.cn.mm.bing.net/th/id/R-C.7cb65108f9538f876d1e6e6409983bd1?rik=LMm7A%2fLgPkQDLA\u0026#x26;riu=http%3a%2f%2flogoju.cn%2fwp-content%2fuploads%2f2019%2f08%2fAndroid1.png\u0026#x26;ehk=ON%2fcvarPr2AWztVNbv7o6Y92N%2fiAIMjQtIIBEIGAhtE%3d\u0026#x26;risl=\u0026#x26;pid=ImgRaw\u0026# c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e160dpi的手机上，1px=1dp\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e图片缩放\u003c/h3\u003e\n\u003ctable class=\"mb-4\"\u003e\n\u003cthead class=\"bg-sky-200 dark:bg-sky-900\"\u003e\n\u003ctr\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003eScreen resolution\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003edpi\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003ePixel ratio\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003eImage size (pixels)\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003exxxhdpi\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e640\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e4.0\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e400 x 400\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003exxhdpi\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e480\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e3.0\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e300 x 300\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003exhdpi\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e320\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e2.0\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e200 x 200\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003ehdpi\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e240\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1.5\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e150 x 150\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003emdpi\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e160\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1.0\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e100 x 100\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eScaleable pixels (sp)\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003esp和dp差不多只是用于字体\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e14sp为标准大小\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170904_sp.png\" alt=\"sp\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ctable class=\"mb-4\"\u003e\n\u003cthead class=\"bg-sky-200 dark:bg-sky-900\"\u003e\n\u003ctr\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003exx_small\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003ex_small\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003esmall\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003emedium\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003elarge\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003ex_large\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003exx_large\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003exxx_large\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e8sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e10sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e12sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e14sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e16sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e18sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e20sp\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e22sp\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e基准网络\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e所有组件都与间隔为 8dp 的基准网格对齐。排版/文字（Type）与间隔为 4dp 的基准网格对齐。在工具条中的图标同样与间隔为 4dp 的基准网格对齐。这些规则适用于移动设备、平板设备以及桌面应用程序。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170905_layout-metrics-baselinegrids.png\" alt=\"baselinegrids\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","content":"\n![Android](https://ts1.cn.mm.bing.net/th/id/R-C.7cb65108f9538f876d1e6e6409983bd1?rik=LMm7A%2fLgPkQDLA\u0026riu=http%3a%2f%2flogoju.cn%2fwp-content%2fuploads%2f2019%2f08%2fAndroid1.png\u0026ehk=ON%2fcvarPr2AWztVNbv7o6Y92N%2fiAIMjQtIIBEIGAhtE%3d\u0026risl=\u0026pid=ImgRaw\u0026r=0)\n\n\u003e 有关dpi、dp、px、sp、设计规范等等。\n\n\u003c!--more--\u003e\n## Pixel density (dpi)\n\n像素密度，表示每英寸的长度上有多少像素\n\n`dpi = sqrt(像素宽度^2+像素高度^2)/屏幕尺寸`\n\n以下是常见手机的dpi\n\n|  屏幕尺寸 | 720*1280  | 1080*1920  |  1440*2560 |\n| :------------: | :------------: | :------------: | :------------: |\n| 5寸  | 293.7  |  440.6 |  587.4|\n| 5.5寸  | 267.0  | 400.5  |  534.0 |\n| 6寸 | 244.8  |  367.2 |  489.5 |\n\n## Density-independent pixels (dp)\n\n引入dpi的概念就是为了使用像素无关的单位`dp`，从而使不同分辨率和尺寸的手机上达到一样的观感\n\n`dp = 像素*160/dpi`\n\n160dpi的手机上，1px=1dp\n\n### 图片缩放\n\n|Screen resolution |dpi|Pixel ratio|Image size (pixels)|\n| :------------: | :------------: |:------------: | :------------:|\n|xxxhdpi|640|4.0|400 x 400|\n|xxhdpi|480|3.0|300 x 300|\n|xhdpi|320|2.0|200 x 200|\n|hdpi|240|1.5|150 x 150|\n|mdpi|160|1.0|100 x 100|\n\n## Scaleable pixels (sp)\n\nsp和dp差不多只是用于字体\n\n14sp为标准大小\n\n![sp](/images/20170904_sp.png)\n\n|xx_small |x_small|small|medium|large|x_large|xx_large|xxx_large|\n| :------------: | :------------:| :------------:| :------------:|:------------:|:------------:|:------------:|:------------:|\n|8sp|10sp|12sp|14sp|16sp|18sp|20sp|22sp|\n\n## 基准网络\n\n所有组件都与间隔为 8dp 的基准网格对齐。排版/文字（Type）与间隔为 4dp 的基准网格对齐。在工具条中的图标同样与间隔为 4dp 的基准网格对齐。这些规则适用于移动设备、平板设备以及桌面应用程序。\n\n![baselinegrids](/images/20170905_layout-metrics-baselinegrids.png)\n","data":{"title":"Android度量设计规范","date":"2017-09-04","tags":["Android","Material Design"],"category":"Android"},"isEmpty":false,"excerpt":"\n![Android](https://ts1.cn.mm.bing.net/th/id/R-C.7cb65108f9538f876d1e6e6409983bd1?rik=LMm7A%2fLgPkQDLA\u0026riu=http%3a%2f%2flogoju.cn%2fwp-content%2fuploads%2f2019%2f08%2fAndroid1.png\u0026ehk=ON%2fcvarPr2AWztVNbv7o6Y92N%2fiAIMjQtIIBEIGAhtE%3d\u0026risl=\u0026pid=ImgRaw\u0026r=0)\n\n\u003e 有关dpi、dp、px、sp、设计规范等等。\n\n"},{"id":"gradle-build","file":"gradle-build.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://ts1.cn.mm.bing.net/th/id/R-C.da7d3edf2afaf378bff91a21e6385091?rik=kWTVUo%2be2O8bbg\u0026#x26;riu=http%3a%2f%2ftheeye.pe.kr%2fwp-content%2fuploads%2f2014%2f02%2fgradle.png\u0026#x26;ehk=5NJHqrr5W7rLhp4CEUQIadjJ83TfKvlokTsc%2bzFFiLo%3d\u0026#x26;risl=\u0026#x26;pid=ImgRaw\u0026#x26;r=0\" alt=\"Gradle\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e构建变体是 Gradle 按照特定规则集合进行打包，以生成适应不同需求的Apk包。\n例如，需要生成dev版，测试版、以及release版，它们的服务器地址，版本号，图标各不相同，以及多渠道打包等等。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://ts1.cn.mm.bing.net/th/id/R-C.da7d3edf2afaf378bff91a21e6385091?rik=kWTVUo%2be2O8bbg\u0026#x26;riu=http%3a%2f%2ftheeye.pe.kr%2fwp-content%2fuploads%2f2014%2f02%2fgradle.png\u0026#x26;ehk=5NJHqrr5W7rLhp4CEUQIadjJ83TfKvlokTsc%2bzFFiLo%3d\u0026#x26;risl=\u0026#x26;pid=ImgRaw\u0026#x26;r=0\" alt=\"Gradle\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e构建变体是 Gradle 按照特定规则集合进行打包，以生成适应不同需求的Apk包。\n例如，需要生成dev版，测试版、以及release版，它们的服务器地址，版本号，图标各不相同，以及多渠道打包等等。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eproductFlavors\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e可以定义多个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eproductFlavors\u003c/code\u003e版本，其继承覆盖所有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edefaultConfig\u003c/code\u003e中的字段\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e主要的使用手段有一下几种\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e覆盖\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edefaultConfig\u003c/code\u003e默认字段(包名、版本名等)\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e往\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAndroidManifast.xml\u003c/code\u003e文件注入编译变量\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e修改包名，支持前后缀\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ebuildConfigField\u003c/code\u003e动态改变编译时常量\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eresValue\u003c/code\u003e动态注入字符串资源\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e示例\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eandroid {\n    ...\n    defaultConfig {\n        versionCode 200\n        versionName 'V2.0.0'\n        manifestPlaceholders = [\n                scheme: \"FindAR\"\n                id    : \"1565483848\"\n        ]\n        buildConfigField \"String\", \"ROOT_FOLDER_NAME\", '\"FindAR\"'\n    }\n\n    productFlavors{\n       dev{\n           versionName 'V2.0.0 Dev'\n           resValue \"string\", \"user_id\", \"001\" //user id\n       }\n\n       production{\n           versionName 'V2.0.0 Release'\n           resValue \"string\", \"user_id\", \"002\" //user id\n       }\n   }\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![Gradle](https://ts1.cn.mm.bing.net/th/id/R-C.da7d3edf2afaf378bff91a21e6385091?rik=kWTVUo%2be2O8bbg\u0026riu=http%3a%2f%2ftheeye.pe.kr%2fwp-content%2fuploads%2f2014%2f02%2fgradle.png\u0026ehk=5NJHqrr5W7rLhp4CEUQIadjJ83TfKvlokTsc%2bzFFiLo%3d\u0026risl=\u0026pid=ImgRaw\u0026r=0)\n\n\u003e 构建变体是 Gradle 按照特定规则集合进行打包，以生成适应不同需求的Apk包。\n例如，需要生成dev版，测试版、以及release版，它们的服务器地址，版本号，图标各不相同，以及多渠道打包等等。\n\n\u003c!--more--\u003e\n## productFlavors\n\n可以定义多个`productFlavors`版本，其继承覆盖所有`defaultConfig`中的字段\n\n主要的使用手段有一下几种\n\n- 覆盖`defaultConfig`默认字段(包名、版本名等)\n- 往`AndroidManifast.xml`文件注入编译变量\n- 修改包名，支持前后缀\n- 使用`buildConfigField`动态改变编译时常量\n- 使用`resValue`动态注入字符串资源\n\n\n## 示例\n```\nandroid {\n    ...\n    defaultConfig {\n        versionCode 200\n        versionName 'V2.0.0'\n        manifestPlaceholders = [\n                scheme: \"FindAR\"\n                id    : \"1565483848\"\n        ]\n        buildConfigField \"String\", \"ROOT_FOLDER_NAME\", '\"FindAR\"'\n    }\n\n    productFlavors{\n       dev{\n           versionName 'V2.0.0 Dev'\n           resValue \"string\", \"user_id\", \"001\" //user id\n       }\n\n       production{\n           versionName 'V2.0.0 Release'\n           resValue \"string\", \"user_id\", \"002\" //user id\n       }\n   }\n}\n```\n","data":{"title":"Gradle构建变种版本（多渠道打包）","date":"2017-09-04","tags":["Gradle","Android"],"category":"Android"},"isEmpty":false,"excerpt":"\n![Gradle](https://ts1.cn.mm.bing.net/th/id/R-C.da7d3edf2afaf378bff91a21e6385091?rik=kWTVUo%2be2O8bbg\u0026riu=http%3a%2f%2ftheeye.pe.kr%2fwp-content%2fuploads%2f2014%2f02%2fgradle.png\u0026ehk=5NJHqrr5W7rLhp4CEUQIadjJ83TfKvlokTsc%2bzFFiLo%3d\u0026risl=\u0026pid=ImgRaw\u0026r=0)\n\n\u003e 构建变体是 Gradle 按照特定规则集合进行打包，以生成适应不同需求的Apk包。\n例如，需要生成dev版，测试版、以及release版，它们的服务器地址，版本号，图标各不相同，以及多渠道打包等等。\n\n"},{"id":"wave-progress","file":"wave-progress.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天碰到个需求，要求以波浪进度填充自定义透明形状，废话不多说，直接上最终效果图\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170724_wave_progress.gif\" alt=\"波浪效果\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天碰到个需求，要求以波浪进度填充自定义透明形状，废话不多说，直接上最终效果图\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170724_wave_progress.gif\" alt=\"波浪效果\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e思路\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通过判断\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBitmap\u003c/code\u003e对象的像素颜色，对非透明像素进行颜色更改。波浪曲线采用sin曲线π到2π区间段，和将时间取余并和x坐标相加得到波浪y轴坐标，再加上百分比*Bitmap高度。核心算法如下:\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170724_sin.png\" alt=\"sin\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e    private int getWaveY(int x) {\n        double sinX = Math.PI + (((((System.currentTimeMillis() / (1000 / waveSpeed)) + x) % waveLength)) / (double) waveLength * Math.PI);\n        int waveHeight = (int) (waveHeightMax * (Math.sin(sinX) + 1));\n        int y = (int) ((100 - progress) / 100f * bitmap.getHeight());\n        y -= waveHeight;\n        return y;\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewaveSpeed\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewaveLength\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewaveHeightMax\u003c/code\u003e均定义成全局变量，可以很方便的定制波浪移动速度、波浪长度、波浪高度。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用SurfaceView\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e为了达到比较好的性能，使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSurfaceView\u003c/code\u003e在子线程绘图。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e性能优化\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e因为这里涉及逐个像素操作，所以遍历的运算量很大，一定要对遍历的量进行控制，否则会很卡。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我这里采用控制图片大小的方式\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e***\n    bitmap = setBitmapSize(bitmap, calculateSize * bitmap.getWidth() / bitmap.getHeight(), calculateSize);\n\n***\n    /**\n     * 缩放图片\n     *\n     * @param bitmap    原图片\n     * @param newWidth\n     * @param newHeight\n     * @return\n     */\n    private Bitmap setBitmapSize(Bitmap bitmap, int newWidth, int newHeight) {\n        int width = bitmap.getWidth();\n        int height = bitmap.getHeight();\n        float scaleWidth = (newWidth * 1.0f) / width;\n        float scaleHeight = (newHeight * 1.0f) / height;\n        Matrix matrix = new Matrix();\n        matrix.postScale(scaleWidth, scaleHeight);\n        return Bitmap.createBitmap(bitmap, 0, 0, width, height, matrix, true);\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecalculateSize\u003c/code\u003e控制循环次数在有限的范围内，并在最终绘制Bitmap时使用区域绘制函数：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e    private void draw() {\n        Canvas canvas = mHolder.lockCanvas();\n        canvas.drawBitmap(bitmap, rectBitmap, rectCanvas, mPaint);\n        mHolder.unlockCanvasAndPost(canvas);\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e注意事项\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e为了达到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSurfaceView\u003c/code\u003e透明效果，需要加入以下两句代码\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003esetZOrderOnTop(true);\nmHolder.setFormat(TRANSLUCENT);\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e从\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDrawable\u003c/code\u003e中得到的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBitmap\u003c/code\u003e不能直接\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esetPixel()\u003c/code\u003e，必须重新\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBitmap.createBitmap()\u003c/code\u003e，或\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBitmap.copy()\u003c/code\u003e，使得\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eisMutable\u003c/code\u003e属性为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etrue\u003c/code\u003e，得到新的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBitmap\u003c/code\u003e对象才能操作像素，否则会报\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIllegalStateException\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e完整源码:\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ca href=\"https://github.com/wangyucode/WaveProgress\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/WaveProgress\u003c/a\u003e\u003c/p\u003e\n","content":"\n\u003e 今天碰到个需求，要求以波浪进度填充自定义透明形状，废话不多说，直接上最终效果图\n\n![波浪效果](/images/20170724_wave_progress.gif)\n\n\u003c!--more--\u003e\n\n## 思路\n\n通过判断`Bitmap`对象的像素颜色，对非透明像素进行颜色更改。波浪曲线采用sin曲线π到2π区间段，和将时间取余并和x坐标相加得到波浪y轴坐标，再加上百分比*Bitmap高度。核心算法如下:\n\n![sin](/images/20170724_sin.png)\n\n```java\n    private int getWaveY(int x) {\n        double sinX = Math.PI + (((((System.currentTimeMillis() / (1000 / waveSpeed)) + x) % waveLength)) / (double) waveLength * Math.PI);\n        int waveHeight = (int) (waveHeightMax * (Math.sin(sinX) + 1));\n        int y = (int) ((100 - progress) / 100f * bitmap.getHeight());\n        y -= waveHeight;\n        return y;\n    }\n```\n这里的`waveSpeed`、`waveLength`、`waveHeightMax`均定义成全局变量，可以很方便的定制波浪移动速度、波浪长度、波浪高度。\n\n\n## 使用SurfaceView\n\n为了达到比较好的性能，使用`SurfaceView`在子线程绘图。\n\n## 性能优化\n\n因为这里涉及逐个像素操作，所以遍历的运算量很大，一定要对遍历的量进行控制，否则会很卡。\n\n我这里采用控制图片大小的方式\n```java\n***\n    bitmap = setBitmapSize(bitmap, calculateSize * bitmap.getWidth() / bitmap.getHeight(), calculateSize);\n\n***\n    /**\n     * 缩放图片\n     *\n     * @param bitmap    原图片\n     * @param newWidth\n     * @param newHeight\n     * @return\n     */\n    private Bitmap setBitmapSize(Bitmap bitmap, int newWidth, int newHeight) {\n        int width = bitmap.getWidth();\n        int height = bitmap.getHeight();\n        float scaleWidth = (newWidth * 1.0f) / width;\n        float scaleHeight = (newHeight * 1.0f) / height;\n        Matrix matrix = new Matrix();\n        matrix.postScale(scaleWidth, scaleHeight);\n        return Bitmap.createBitmap(bitmap, 0, 0, width, height, matrix, true);\n    }\n```\n\n\n通过`calculateSize`控制循环次数在有限的范围内，并在最终绘制Bitmap时使用区域绘制函数：\n\n```java\n    private void draw() {\n        Canvas canvas = mHolder.lockCanvas();\n        canvas.drawBitmap(bitmap, rectBitmap, rectCanvas, mPaint);\n        mHolder.unlockCanvasAndPost(canvas);\n    }\n```\n\n## 注意事项\n\n- 为了达到`SurfaceView`透明效果，需要加入以下两句代码\n```java\nsetZOrderOnTop(true);\nmHolder.setFormat(TRANSLUCENT);\n```\n\n- 从`Drawable`中得到的`Bitmap`不能直接`setPixel()`，必须重新`Bitmap.createBitmap()`，或`Bitmap.copy()`，使得`isMutable`属性为`true`，得到新的`Bitmap`对象才能操作像素，否则会报`IllegalStateException`\n\n\n## 完整源码:\n\n[https://github.com/wangyucode/WaveProgress](https://github.com/wangyucode/WaveProgress)\n","data":{"title":"自定义形状波浪进度","date":"2017-07-24","tags":["Android"],"category":"Android"},"isEmpty":false,"excerpt":"\n\u003e 今天碰到个需求，要求以波浪进度填充自定义透明形状，废话不多说，直接上最终效果图\n\n![波浪效果](/images/20170724_wave_progress.gif)\n\n"},{"id":"Share","file":"Share.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何为Android应用添加分享功能。包含通过原生\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIntent\u003c/code\u003e和利用第三方SDK。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何为Android应用添加分享功能。包含通过原生\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIntent\u003c/code\u003e和利用第三方SDK。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e原生Intent方式\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e大多平台都支持隐式Intent方式发起分享。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e创建隐式 Intent 时，Android 系统通过将 Intent 的内容与在设备上其他应用的清单文件中声明的 Intent 过滤器进行比较，从而找到要启动的相应组件。 如果 Intent 与 Intent 过滤器匹配，则系统将启动该组件，并向其传递 Intent 对象。 如果多个 Intent 过滤器兼容，则系统会显示一个对话框，支持用户选取要使用的应用。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eIntent sendIntent = new Intent();\nsendIntent.setAction(Intent.ACTION_SEND);\nsendIntent.putExtra(Intent.EXTRA_TEXT, textMessage);\nsendIntent.setType(\"text/plain\");\nIntent chooser = Intent.createChooser(sendIntent, \"title\");\nif (sendIntent.resolveActivity(getPackageManager()) != null) {\n    startActivity(chooser);\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里Action设置为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIntent.ACTION_SEND\u003c/code\u003e就是分享（发送）的方式。\n然后通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eputExtra()\u003c/code\u003e 方式传递附加信息，可以是文本、图片等。\n为了每次分享时都选择平台，需要为Intent包装一个Chooser。\n然后就可以启动Activity分享了。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e单独集成第三方（微信、微博）SDK\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e不同的平台有所不同，一般都包括以下流程\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e注册开发者账号\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e填写应用信息，获取应用ID，Key等\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e导入相关SDK依赖\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e集成分享代码\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e集成ShareSDK\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e集成ShareSDK的好处是，提供了统一的接口，抹平了不同平台间API的差异，集成更简单，维护也方便。特别是当你需要集成很多平台的时候。\n但是上面单独集成的前两步还是不可缺少。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e集成微信分享的一些注意事项\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e有时会遇到错误\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e{\"req\":\"e\",\"errCode\":-6,\"transaction\":\"webpage1498805832655\"}\u003c/code\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e微信分享需要经过签名才可以\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e微信Android应用信息的签名那一栏需要填入签名的\u003cstrong\u003eMD5\u003c/strong\u003e值，通过以下命令获取\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003ekeytool -list -v -keystore \u0026#x3C;你的keystore路径\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ekeytool\u003c/code\u003e 是jdk的自带一个命令，类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ejavac\u003c/code\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e签名的\u003cstrong\u003eMD5\u003c/strong\u003e值必须全部小写，并去掉冒号\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e可以在gradle文件中配置以下属性，让开发版本也使用正式签名\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eandroid {\n    ***\n    signingConfigs {\n        debug{\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"keyPassword\"\n        }\n        release {\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"你的keyPassword\"\n        }\n    }\n    ***\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e有时会遇到错误\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003echeckArgs fail, thumbData is invalid\u003c/code\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e图片太大，可以获取缩略图\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eBitmap bmp = BitmapFactory.decodeResource(getResources(),R.drawable.app_icon);\nBitmap thumb = Bitmap.createScaledBitmap(bmp,THUMB_SIZE,THUMB_SIZE,true);\nbmp.recycle();\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e 本文介绍如何为Android应用添加分享功能。包含通过原生`Intent`和利用第三方SDK。\n\n\u003c!--more--\u003e\n## 原生Intent方式\n\n大多平台都支持隐式Intent方式发起分享。\n\n\u003e 创建隐式 Intent 时，Android 系统通过将 Intent 的内容与在设备上其他应用的清单文件中声明的 Intent 过滤器进行比较，从而找到要启动的相应组件。 如果 Intent 与 Intent 过滤器匹配，则系统将启动该组件，并向其传递 Intent 对象。 如果多个 Intent 过滤器兼容，则系统会显示一个对话框，支持用户选取要使用的应用。\n\n```java\nIntent sendIntent = new Intent();\nsendIntent.setAction(Intent.ACTION_SEND);\nsendIntent.putExtra(Intent.EXTRA_TEXT, textMessage);\nsendIntent.setType(\"text/plain\");\nIntent chooser = Intent.createChooser(sendIntent, \"title\");\nif (sendIntent.resolveActivity(getPackageManager()) != null) {\n    startActivity(chooser);\n}\n```\n这里Action设置为`Intent.ACTION_SEND`就是分享（发送）的方式。\n然后通过`putExtra()` 方式传递附加信息，可以是文本、图片等。\n为了每次分享时都选择平台，需要为Intent包装一个Chooser。\n然后就可以启动Activity分享了。\n\n## 单独集成第三方（微信、微博）SDK\n\n不同的平台有所不同，一般都包括以下流程\n- 注册开发者账号\n- 填写应用信息，获取应用ID，Key等\n- 导入相关SDK依赖\n- 集成分享代码\n\n## 集成ShareSDK\n\n集成ShareSDK的好处是，提供了统一的接口，抹平了不同平台间API的差异，集成更简单，维护也方便。特别是当你需要集成很多平台的时候。\n但是上面单独集成的前两步还是不可缺少。\n\n## 集成微信分享的一些注意事项\n\n有时会遇到错误`{\"req\":\"e\",\"errCode\":-6,\"transaction\":\"webpage1498805832655\"}`\n- 微信分享需要经过签名才可以\n- 微信Android应用信息的签名那一栏需要填入签名的**MD5**值，通过以下命令获取\n\n```bash\nkeytool -list -v -keystore \u003c你的keystore路径\u003e\n```\n\n\u003e`keytool` 是jdk的自带一个命令，类似`javac`\n\n- 签名的**MD5**值必须全部小写，并去掉冒号\n- 可以在gradle文件中配置以下属性，让开发版本也使用正式签名\n\n```\nandroid {\n    ***\n    signingConfigs {\n        debug{\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"keyPassword\"\n        }\n        release {\n            storeFile file(\"你的keystore路径\")\n            storePassword \"你的storePassword\"\n            keyAlias \"你的keyAlias\"\n            keyPassword \"你的keyPassword\"\n        }\n    }\n    ***\n}\n```\n\n有时会遇到错误`checkArgs fail, thumbData is invalid`\n\n- 图片太大，可以获取缩略图\n```java\nBitmap bmp = BitmapFactory.decodeResource(getResources(),R.drawable.app_icon);\nBitmap thumb = Bitmap.createScaledBitmap(bmp,THUMB_SIZE,THUMB_SIZE,true);\nbmp.recycle();\n```","data":{"title":"Android原生分享及第三方分享","date":"2017-06-16","tags":["Android","Wechat"],"category":"Android"},"isEmpty":false,"excerpt":"\n\u003e 本文介绍如何为Android应用添加分享功能。包含通过原生`Intent`和利用第三方SDK。\n\n"},{"id":"gitignore","file":"gitignore.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://res.cloudinary.com/practicaldev/image/fetch/s--DoWbGaGG--/c_imagga_scale,f_auto,fl_progressive,h_420,q_auto,w_1000/https://dev-to-uploads.s3.amazonaws.com/i/gqvc4folezic8qvkjbca.png\" alt=\"gitignore\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件快速配置自动忽略，教程同时适用于Git和SVN。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://res.cloudinary.com/practicaldev/image/fetch/s--DoWbGaGG--/c_imagga_scale,f_auto,fl_progressive,h_420,q_auto,w_1000/https://dev-to-uploads.s3.amazonaws.com/i/gqvc4folezic8qvkjbca.png\" alt=\"gitignore\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件快速配置自动忽略，教程同时适用于Git和SVN。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e应该忽略的文件：\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e*.iml\n.gradle\n/local.properties\n/.idea\n.DS_Store\n**/build\n/captures\n.externalNativeBuild\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.iml\u003c/code\u003e是IDEA的module描述文件，和工程配置相关，在每一个module都有，需要忽略。*表示忽略所有的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.iml\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e使用gitignore\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e这是最简单的方式\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在项目根目录下创建\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件，将上面应该忽略的文件，内容复制到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e用Android Studio打开\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e文件时会在右上角弹出安装gitignore插件，点击安装即可，安装完成后就自动设置好忽略了，如果要添加忽略文件，只需要在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.gitignore\u003c/code\u003e中添加文件路径即可。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e自己设置忽略\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e右键点击相应文件，选择相应VCS操作即可。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003egitignore\u003c/code\u003e的官方模板仓库\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e此外github官方提供了一个仓库，里面包含了绝大多数平台，语言的gitignore模板\n\u003ca href=\"https://github.com/github/gitignore\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/github/gitignore\u003c/a\u003e\u003c/p\u003e\n","content":"\n![gitignore](https://res.cloudinary.com/practicaldev/image/fetch/s--DoWbGaGG--/c_imagga_scale,f_auto,fl_progressive,h_420,q_auto,w_1000/https://dev-to-uploads.s3.amazonaws.com/i/gqvc4folezic8qvkjbca.png)\n\n\u003e 本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用`.gitignore`文件快速配置自动忽略，教程同时适用于Git和SVN。\n\n\u003c!--more--\u003e\n\n## 应该忽略的文件：\n```\n*.iml\n.gradle\n/local.properties\n/.idea\n.DS_Store\n**/build\n/captures\n.externalNativeBuild\n```\n- `.iml`是IDEA的module描述文件，和工程配置相关，在每一个module都有，需要忽略。*表示忽略所有的`.iml`\n\n### 使用gitignore\n这是最简单的方式\n\n在项目根目录下创建`.gitignore`文件，将上面应该忽略的文件，内容复制到`.gitignore`中。\n\n用Android Studio打开`.gitignore`文件时会在右上角弹出安装gitignore插件，点击安装即可，安装完成后就自动设置好忽略了，如果要添加忽略文件，只需要在`.gitignore`中添加文件路径即可。\n\n### 自己设置忽略\n\n右键点击相应文件，选择相应VCS操作即可。\n\n### `gitignore`的官方模板仓库\n\n此外github官方提供了一个仓库，里面包含了绝大多数平台，语言的gitignore模板\nhttps://github.com/github/gitignore","data":{"title":"Android Studio工程应该忽略的文件及如何使用gitignore","date":"2017-06-16","tags":["Android","Git","SVN"],"category":"Android"},"isEmpty":false,"excerpt":"\n![gitignore](https://res.cloudinary.com/practicaldev/image/fetch/s--DoWbGaGG--/c_imagga_scale,f_auto,fl_progressive,h_420,q_auto,w_1000/https://dev-to-uploads.s3.amazonaws.com/i/gqvc4folezic8qvkjbca.png)\n\n\u003e 本文介绍版本控制中，Android Studio工程应该忽略的文件，以及如何使用`.gitignore`文件快速配置自动忽略，教程同时适用于Git和SVN。\n\n"}]},"__N_SSG":true},"page":"/blog/category/[cid]","query":{"cid":"android"},"buildId":"NDkQWnMtEcy0IDQqDGEkS","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
