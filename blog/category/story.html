ion-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"ai","file":"ai.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://assets.datamation.com/uploads/2023/05/dm-how-to-use-chatgpt-696x464.png\" alt=\"chatgpt\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天是2024年10月30日，自从ChatGPT在2022年11月发布以来，人工智能（以下简称AI）的热度持续上升，它被认为是第四次工业革命的重要推动力。但也有人说AI是泡沫，做到实质性落地并且收益的公司屈指可数。这篇文章会结合历史，最新的前沿进展，分享一下目前我自己的观察和思考。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://assets.datamation.com/uploads/2023/05/dm-how-to-use-chatgpt-696x464.png\" alt=\"chatgpt\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天是2024年10月30日，自从ChatGPT在2022年11月发布以来，人工智能（以下简称AI）的热度持续上升，它被认为是第四次工业革命的重要推动力。但也有人说AI是泡沫，做到实质性落地并且收益的公司屈指可数。这篇文章会结合历史，最新的前沿进展，分享一下目前我自己的观察和思考。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e回顾历史\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e历史总是惊人的相似\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e目前的AI浪潮，和20世纪90年代末的互联网浪潮非常相似。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e90年代互联网浪潮\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e90年代互联网开始商业化，经济方面1994年到1995年，为了防止经济过热，美联储连续加息7次，将联邦利率提高至6%，然而在这样的背景下，1995年到1998年，纳斯达克指数上涨了168%，这里面的重要原因就是互联网的出现。如今的互联网巨头都是在那个时候创立的，谷歌亚马逊是1995年左右，百度，腾讯，阿里99年左右。随后的2000年互联网泡沫破裂，大量公司破产倒闭，行业重新洗牌。普通人站在当时1999年的时间点上，也是看不清未来互联网能做什么。但是现在我们知道这些互联网公司不仅活下来了，而且成为了目前市值最高的互联网巨头。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当时的互联网，可以落地的应用并不多，无非就是浏览器，电子邮件。直到2000年互联网泡沫破裂后，我们才真正看清了互联网能做什么。2002年，我还在上学，当时的同班同学谁会注册QQ，谁就是交际花。2003年《梦幻西游》发布，2004年《魔兽世界》发布，2005年QQ空间发布。这时候互联网才开始真正进入大众视野。随着2007年，乔布斯掏出初代Iphone，又开启了移动互联网时代，互联网创造了无数新的工作岗位并实现了生产力的巨大飞跃。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e再看看现在的AI，和90年代末的互联网非常相似。经济方面，美联储从2022年3月到2023年6月加息11次，但是以英伟达为首的科技巨头股价却屡创新高。站在当下的时间点上，目前的AI和2000年的搜索引擎非常相似。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e人工智能和搜索引擎\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e现在的人工智能应用还处于非常早期的阶段，目前使用最普遍的还是聊天机器人，比如\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eChatGPT\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGemini\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eClaude\u003c/code\u003e, \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e文心一言\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e通义千问\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e豆包\u003c/code\u003e等等。他们都很强，但是对于很多人而言，你把ChatGPT摆到他面前，他也问不出什么有价值的问题，这个问题或者叫提示词（prompt）的质量决定了AI给你回复的质量，这个和早些年的搜索引擎其实是一样的，会百度一下，和Google一下, 以及关键词的选取，得到的结果质量是完全不同的。也说句不好听的，人与人之间使用搜索引擎的能力差距比人和猴子的差距还大。放到AI的时代还是一样。AI和搜索引擎都是8个字\u003cstrong\u003e遇强则强，遇弱则弱\u003c/strong\u003e。当然了，搜索引擎不是互联网的全部，聊天机器人也不是AI应用的全部。未来肯定会有更多面向更大众化的应用。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eAI能否替代程序员\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e先说结论，AI无法代替程序员，但是会让很多程序员失业。从最早的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGithub Copilot\u003c/code\u003e以及国内的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBaidu Comate\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMarscode\u003c/code\u003e, \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTONGYI lingma\u003c/code\u003e到现在的AI 编辑器\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCursor\u003c/code\u003e, 对于效率的提升是非常明显的。第一次使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGithub Copilot\u003c/code\u003e，看到它真的明白我的业务，和并且给出符合我自己风格的代码提示的时候，让我有种“伯牙摔琴”，找到知己的感觉。这感觉是直冲天灵盖的那种震撼。这样的工具对于一些CURD工程师，调库侠，是巨大的威胁。特别是当你使用的语言和框架比较老而且非常普遍的话，这种冲击会更加明显。但是，如果你做的是真正的前沿创新，更高一级的抽象，大型应用的架构设计，AI永远无法替代你。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e目前的状态\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20241030_mmlu.png\" alt=\"mmlu\" class=\"mx-auto max-h-80\"\u003e\n从目前的趋势来看，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eScaling Law\u003c/code\u003e没有问题，大模型就是参数越大，能力越强。但是由于大模型训练的算力需求巨大，可以预见的未来都是少数巨头和独角兽公司有能力自己训练，比如谷歌，meta，百度，阿里，OpenAI，月之暗面，清华智谱等。所以普通人小公司就没有机会了吗？并不是。先看下大模型的缺陷和痛点。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003etoB的痛点\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e目前大模型无法解决以下问题：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e知识局限性：通用的模型对于实时的，未公开的，私域的，离线的，无能为力。因为大模型一旦训练好它的知识库就锁定了。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e复杂业务场景： 现实中的业务场景非常复杂，比如金融，医疗，法律，教育等特定领域。它们往往拥有已经在使用的传统系统，目前的对话大模型无法对接这些复杂的系统和业务场景。\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003eRAG和Agent\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e解决大模型的以上两个问题我们需要：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003eRAG（Retrieval Augmented Generation） 检索增强生成。原理就是给大模型外挂一个数据库，让它从数据库中检索出相关的信息。再总结生成回答。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eAgent：类似与中间层，通过一个或多个Agent来构建一个workflow连接现有系统构和大模型。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e基于以上的方向，目前看到的toC的应用是\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e知识库管理系统，例如Google的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNotebookLM\u003c/code\u003e， \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eObsidian\u003c/code\u003e等。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e问答引擎：例如\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ePerplexity\u003c/code\u003e等。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e这些东西目前还都是一些极客在用，离大众化还有很长一段路要走。其实和所有的技术革新浪潮一样，刚出来的时候都是比较“小众”。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eAI和智能手机\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003etoC很重要的一个方向就是智能手机和AI的结合，目前的大模型和现有的智能手机还在进一步融合，将来AI一定是系统级的，可以在任何时候无感使用。而不是像现在一样，需要安装一个APP然后尬聊。所以可以预见的将来，还会有新一波的换机潮，现在的所谓“智能手机”在和AI高度集成的手机面前，就跟以前的诺基亚一样。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e学术研究的进展\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eAI在学术领域的帮助，可以说是带来了一种全新的研究范式。为什么这么说呢？自从2017年那片神级的论文“Attention is all you need”，基于Transformer的新发现层出不穷，2024年诺贝尔物理学奖颁给人工神经网络，化学奖颁给了Deepmind用人工神经网络破解蛋白质结构的团队。在这之前还有研究团队用机器学习取得了在可控核聚变领域的进展，最近这几天还有团队利用Transformer发现了16万种新病毒。以前的学术研究是先提出设想，排除其它干扰做实验验证，然后得出结论。而结合AI的学术研究是直接面对混沌的现实世界得出理论和规律。这种改变是根本性的，并且跨学科的。而且未来的新技术还能和AI结合，例如量子计算，元宇宙，机器人，Web3.0。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e那么回到开头的问题，你还怀疑AI是泡沫吗？\u003c/p\u003e\n","content":"\n![chatgpt](https://assets.datamation.com/uploads/2023/05/dm-how-to-use-chatgpt-696x464.png)\n\n\u003e 今天是2024年10月30日，自从ChatGPT在2022年11月发布以来，人工智能（以下简称AI）的热度持续上升，它被认为是第四次工业革命的重要推动力。但也有人说AI是泡沫，做到实质性落地并且收益的公司屈指可数。这篇文章会结合历史，最新的前沿进展，分享一下目前我自己的观察和思考。\n\n\u003c!--more--\u003e\n## 回顾历史\n\n\u003e 历史总是惊人的相似\n\n目前的AI浪潮，和20世纪90年代末的互联网浪潮非常相似。\n\n### 90年代互联网浪潮\n\n90年代互联网开始商业化，经济方面1994年到1995年，为了防止经济过热，美联储连续加息7次，将联邦利率提高至6%，然而在这样的背景下，1995年到1998年，纳斯达克指数上涨了168%，这里面的重要原因就是互联网的出现。如今的互联网巨头都是在那个时候创立的，谷歌亚马逊是1995年左右，百度，腾讯，阿里99年左右。随后的2000年互联网泡沫破裂，大量公司破产倒闭，行业重新洗牌。普通人站在当时1999年的时间点上，也是看不清未来互联网能做什么。但是现在我们知道这些互联网公司不仅活下来了，而且成为了目前市值最高的互联网巨头。\n\n当时的互联网，可以落地的应用并不多，无非就是浏览器，电子邮件。直到2000年互联网泡沫破裂后，我们才真正看清了互联网能做什么。2002年，我还在上学，当时的同班同学谁会注册QQ，谁就是交际花。2003年《梦幻西游》发布，2004年《魔兽世界》发布，2005年QQ空间发布。这时候互联网才开始真正进入大众视野。随着2007年，乔布斯掏出初代Iphone，又开启了移动互联网时代，互联网创造了无数新的工作岗位并实现了生产力的巨大飞跃。\n\n再看看现在的AI，和90年代末的互联网非常相似。经济方面，美联储从2022年3月到2023年6月加息11次，但是以英伟达为首的科技巨头股价却屡创新高。站在当下的时间点上，目前的AI和2000年的搜索引擎非常相似。\n\n## 人工智能和搜索引擎\n\n现在的人工智能应用还处于非常早期的阶段，目前使用最普遍的还是聊天机器人，比如`ChatGPT`，`Gemini`，`Claude`, `文心一言`，`通义千问`，`豆包`等等。他们都很强，但是对于很多人而言，你把ChatGPT摆到他面前，他也问不出什么有价值的问题，这个问题或者叫提示词（prompt）的质量决定了AI给你回复的质量，这个和早些年的搜索引擎其实是一样的，会百度一下，和Google一下, 以及关键词的选取，得到的结果质量是完全不同的。也说句不好听的，人与人之间使用搜索引擎的能力差距比人和猴子的差距还大。放到AI的时代还是一样。AI和搜索引擎都是8个字**遇强则强，遇弱则弱**。当然了，搜索引擎不是互联网的全部，聊天机器人也不是AI应用的全部。未来肯定会有更多面向更大众化的应用。\n\n## AI能否替代程序员\n\n先说结论，AI无法代替程序员，但是会让很多程序员失业。从最早的`Github Copilot`以及国内的`Baidu Comate`，`Marscode`, `TONGYI lingma`到现在的AI 编辑器`Cursor`, 对于效率的提升是非常明显的。第一次使用`Github Copilot`，看到它真的明白我的业务，和并且给出符合我自己风格的代码提示的时候，让我有种“伯牙摔琴”，找到知己的感觉。这感觉是直冲天灵盖的那种震撼。这样的工具对于一些CURD工程师，调库侠，是巨大的威胁。特别是当你使用的语言和框架比较老而且非常普遍的话，这种冲击会更加明显。但是，如果你做的是真正的前沿创新，更高一级的抽象，大型应用的架构设计，AI永远无法替代你。\n\n## 目前的状态\n\n![mmlu](/images/20241030_mmlu.png)\n从目前的趋势来看，`Scaling Law`没有问题，大模型就是参数越大，能力越强。但是由于大模型训练的算力需求巨大，可以预见的未来都是少数巨头和独角兽公司有能力自己训练，比如谷歌，meta，百度，阿里，OpenAI，月之暗面，清华智谱等。所以普通人小公司就没有机会了吗？并不是。先看下大模型的缺陷和痛点。\n\n### toB的痛点\n\n目前大模型无法解决以下问题：\n\n1. 知识局限性：通用的模型对于实时的，未公开的，私域的，离线的，无能为力。因为大模型一旦训练好它的知识库就锁定了。\n2. 复杂业务场景： 现实中的业务场景非常复杂，比如金融，医疗，法律，教育等特定领域。它们往往拥有已经在使用的传统系统，目前的对话大模型无法对接这些复杂的系统和业务场景。\n\n### RAG和Agent\n\n解决大模型的以上两个问题我们需要：\n1. RAG（Retrieval Augmented Generation） 检索增强生成。原理就是给大模型外挂一个数据库，让它从数据库中检索出相关的信息。再总结生成回答。\n2. Agent：类似与中间层，通过一个或多个Agent来构建一个workflow连接现有系统构和大模型。\n\n基于以上的方向，目前看到的toC的应用是\n\n- 知识库管理系统，例如Google的`NotebookLM`， `Obsidian`等。\n- 问答引擎：例如`Perplexity`等。\n\n这些东西目前还都是一些极客在用，离大众化还有很长一段路要走。其实和所有的技术革新浪潮一样，刚出来的时候都是比较“小众”。\n\n## AI和智能手机\n\ntoC很重要的一个方向就是智能手机和AI的结合，目前的大模型和现有的智能手机还在进一步融合，将来AI一定是系统级的，可以在任何时候无感使用。而不是像现在一样，需要安装一个APP然后尬聊。所以可以预见的将来，还会有新一波的换机潮，现在的所谓“智能手机”在和AI高度集成的手机面前，就跟以前的诺基亚一样。\n\n## 学术研究的进展\n\nAI在学术领域的帮助，可以说是带来了一种全新的研究范式。为什么这么说呢？自从2017年那片神级的论文“Attention is all you need”，基于Transformer的新发现层出不穷，2024年诺贝尔物理学奖颁给人工神经网络，化学奖颁给了Deepmind用人工神经网络破解蛋白质结构的团队。在这之前还有研究团队用机器学习取得了在可控核聚变领域的进展，最近这几天还有团队利用Transformer发现了16万种新病毒。以前的学术研究是先提出设想，排除其它干扰做实验验证，然后得出结论。而结合AI的学术研究是直接面对混沌的现实世界得出理论和规律。这种改变是根本性的，并且跨学科的。而且未来的新技术还能和AI结合，例如量子计算，元宇宙，机器人，Web3.0。\n\n那么回到开头的问题，你还怀疑AI是泡沫吗？\n","data":{"title":"这一波AI浪潮是否是泡沫？","date":"2024-10-30","tags":["AI"],"category":"Story"},"isEmpty":false,"excerpt":"\n![chatgpt](https://assets.datamation.com/uploads/2023/05/dm-how-to-use-chatgpt-696x464.png)\n\n\u003e 今天是2024年10月30日，自从ChatGPT在2022年11月发布以来，人工智能（以下简称AI）的热度持续上升，它被认为是第四次工业革命的重要推动力。但也有人说AI是泡沫，做到实质性落地并且收益的公司屈指可数。这篇文章会结合历史，最新的前沿进展，分享一下目前我自己的观察和思考。\n\n"},{"id":"the-crowd","file":"the-crowd.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://p1.qhimg.com/t016f1e762c0161d220.jpg\" alt=\"The Crowd\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e闻有吏虽乱而有独善之民，不闻有乱民而有独治之吏\n—《韩非子·外储说》\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e《乌合之众：大众心理研究》是一本研究大众心理学的著作。是法国社会心理学家古斯塔夫·勒庞创作的社会心理学著作，首次出版于1895年。勒庞指出：个人一旦融入群体，他们的个性将会被湮灭，群体的思想便会占据统治地位，而与此同时群体的行为也会变现为排斥异议、极端化、情绪化低智商化等特点，进而对社会产生破坏性的影响。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e读了此书，你会明白过去、现在、以及将来全世界发生的各种群体事件背后的直接原因。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本文摘抄了《乌合之众：大众心理研究》在Kindle电子书中的热门标注：\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://p1.qhimg.com/t016f1e762c0161d220.jpg\" alt=\"The Crowd\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e闻有吏虽乱而有独善之民，不闻有乱民而有独治之吏\n—《韩非子·外储说》\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e《乌合之众：大众心理研究》是一本研究大众心理学的著作。是法国社会心理学家古斯塔夫·勒庞创作的社会心理学著作，首次出版于1895年。勒庞指出：个人一旦融入群体，他们的个性将会被湮灭，群体的思想便会占据统治地位，而与此同时群体的行为也会变现为排斥异议、极端化、情绪化低智商化等特点，进而对社会产生破坏性的影响。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e读了此书，你会明白过去、现在、以及将来全世界发生的各种群体事件背后的直接原因。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本文摘抄了《乌合之众：大众心理研究》在Kindle电子书中的热门标注：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e热门标注\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e自觉的个性的消失，以及感情和思想转向一个不同的方向，就是要变成组织化群体的人所表现出的首要特征。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e无意识现象不但在有机体的生活中，而且在智力活动中，都发挥着一种完全压倒性的作用。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体在智力上总是低于孤立的个人，但是感情及其激起的行动这个角度看，群体可以比个人表现的更好或更差，全看环境如何。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e孤立的个人具有主宰自己的反应的能力，群体则缺乏这种能力。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e大凡能够成就大业的领袖人物，他最重要的品质不是博学多识，而是必须“具备强大而持久的意志力”，这是一种“极为罕见、极为强大的品质，它足以征服一切。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体要想成为历史变迁的主角，它必须多多少少“为信仰而战”，也就是说，它的形成必须是为了某些简单而明确的信仰。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e在观念简单化效应的作用下，凡是有抱着怀疑的精神、相信在政治和社会问题上极不易发现“确定性真理”的人，尤其是一个习惯于用推理和讨论的方式说明问题的人，在群体中是没有地位的；当面对群情激奋时，他尤其会生出苍白无力的感觉：因为他意识到他要与之作对的，不仅仅是一种错误的行为，而且还有“多数的力量”，还有贯彻这种行为时的偏执态度。我们更能理解，所谓专业精英，不管他智力多么高强，他陈明利害得失的理性努力，面对被空洞的观念冲昏了头脑的群体，反而会产生一种自己十分迂腐的无聊感觉。更为可悲的是，面对群众的荒谬与狂热，明智之士更有可能根本不会作出这样的努力，而是同群体一起陷入其中，事后又惊叹于自己连常识都已忘却的愚蠢。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e因此在同人类的各种作为文明动力的感情——“譬如尊严、自我牺牲、宗教信仰、爱国主义以及对荣誉的爱”——的对抗中，理性在大多数时候都不是赢家。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体只知道简单而极端的感情；提供给他们的各种意见、想法和信念，他们或者全盘接受，或者一概拒绝；将其视为绝对真理或绝对谬论。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e进入了群体的个人，在“集体潜意识”机制的作用下，在心理上会产生一种本质性的变化。就像“动物、痴呆、社会主义者、幼儿和原始人”一样，这样的个人会不由自主地失去自我意识，完全变成另一种智力水平十分低下的生物。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e自法国大革命以来，由领袖、意识形态和勒庞意义上的群体所组成的这种新的三位一体，便取代了宗教与皇权，成为一切民主宪政架构之外政治合法性运动的要件，尤其在勒庞之后的一百年里，这种新的三位一体更是上演了一幕幕规模宏大而惨烈的悲剧。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e社会组织就像一切生命有机体一样复杂，我们还不具备强迫它们在突然之间发生深刻变革的智力”。因此他反对一个民族热衷于重大的政治和社会变革，他认为，这种变革的计划从理论上说无论多么出色，都不会使民族气质即刻出现变化（因为“只有时间具备这样的力量”）。采用激进的方式，借助于抽象的原则贯彻一种社会改造的蓝图，只会“使一个高度精致的文明倒退到社会进化更早期的阶段”\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e人们在智力上差异最大，但他们却有着非常相似的本能和情感。在属于情感领域的每一种事情上——宗教、政治、道德、爱憎等等，最杰出的人士很少能比凡夫俗子高明多少。从智力上说，一个伟大的数学家和他的鞋匠之间可能有天壤之别，但是从性格的角度看，他们可能差别甚微或根本没有差别。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e在集体心理中，个人的才智被削弱了，从而他们的个性也被削弱了。异质性被同质性所吞没，无意识的品质占了上风。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体是个无名氏，因此也不必承担责任。这样一来，总是约束着个人的责任感便彻底消失了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e有意识人格的消失，无意识人格的得势，思想和感情因暗示和相互传染作用而转向一个共同的方向，以及立刻把暗示的观念转化为行动的倾向，是组成群体的个人所表现出来的主要特点。他不再是他自己，他变成了一个不再受自己意志支配的玩偶。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体中的个人不但在行动上和他本人有着本质的差别，甚至在完全失去独立性之前，他的思想和感情就已经发生了变化，这种变化是如此深刻，它可以让一个守财奴变得挥霍无度，把怀疑论者改造成信徒，把老实人变成罪犯，把懦夫变成豪杰。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体可以转瞬之间就从最血腥的狂热变成最极端的宽宏大量和英雄主义。群体很容易做出刽子手的举动，同样也很容易慷慨赴义。正是群体，为每一种信仰的胜利而不惜血流成河。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体因为夸大自己的感情，因此它只会被极端感情所打动。希望感动群体的演说家，必须出言不逊，信誓旦旦。夸大其辞、言之凿凿、不断重复，绝对不以说理的方式证明任何事情\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体只知道简单而极端的感情；提供给他们的各种意见、想法和信念，他们或者全盘接受，或者一概拒绝；将其视为绝对真理或绝对谬论。用暗示的办法加以诱导而不是作出合理解释的信念，历来都是如此。与宗教信仰有关的偏执及其对人们的头脑实行的专制统治，早就为大家所知。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e在公众集会上，演说者哪怕作出最轻微的反驳，立刻就会招来怒吼和粗野的叫骂。在一片嘘声和驱逐声中，演说者很快就会败下阵来。当然，假如现场缺少当权者的代表这种约束性因素，反驳者往往会被打死。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体可以杀人放火，无恶不作，但是也能表现出极崇高的献身、牺牲和不计名利的举动，即孤立的个人根本做不到的极崇高的行为。以名誉、光荣和爱国主义作为号召，最有可能影响到组成群体的个人，而且经常可以达到使他慷慨赴死的地步。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e群体推理的特点，是把彼此不同、只在表面上相似的事物搅在一起，并且立刻把具体的事物普遍化。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e影响民众想象力的，并不是事实本身，而是它们发生和引起注意的方式。如果让我表明看法的话，我会说，必须对它们进行浓缩加工，它们才会形成一种令人瞠目结舌的惊人形象。掌握了影响群众想象力的艺术，也就掌握了统治他们的艺术。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e一切政治、神学或社会信条，要想在群众中扎根，都必须采取宗教的形式——能够把危险的讨论排除在外的形式。即便有可能使群众接受无神论，这种信念也会表现出宗教情感中所有的偏执狂，它很快就会表现为一种崇拜。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e词语的威力与它们所唤醒的形象有关，同时又独立于它们的真实含义。最不明确的词语，有时反而影响最大。例如像民主、社会主义、平等、自由等等，它们的含义极为模糊，即使一大堆专著也不足以确定它们的所指。然而这区区几个词语的确有着神奇的威力，它们似乎是解决一切问题的灵丹妙药。各种极不相同的潜意识中的抱负及其实现的希望，全被它们集于一身。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e信徒们总是穷凶极恶地打碎他们以前神灵的塑像。\u003c/p\u003e\n\u003c/blockquote\u003e\n","content":"\n![The Crowd](https://p1.qhimg.com/t016f1e762c0161d220.jpg)\n\n\u003e 闻有吏虽乱而有独善之民，不闻有乱民而有独治之吏 \n                    —《韩非子·外储说》\n\n《乌合之众：大众心理研究》是一本研究大众心理学的著作。是法国社会心理学家古斯塔夫·勒庞创作的社会心理学著作，首次出版于1895年。勒庞指出：个人一旦融入群体，他们的个性将会被湮灭，群体的思想便会占据统治地位，而与此同时群体的行为也会变现为排斥异议、极端化、情绪化低智商化等特点，进而对社会产生破坏性的影响。\n\n读了此书，你会明白过去、现在、以及将来全世界发生的各种群体事件背后的直接原因。\n\n本文摘抄了《乌合之众：大众心理研究》在Kindle电子书中的热门标注：\n\n\u003c!--more--\u003e\n\n## 热门标注\n\n\u003e 自觉的个性的消失，以及感情和思想转向一个不同的方向，就是要变成组织化群体的人所表现出的首要特征。\n\n\u003e 无意识现象不但在有机体的生活中，而且在智力活动中，都发挥着一种完全压倒性的作用。\n\n\u003e 群体在智力上总是低于孤立的个人，但是感情及其激起的行动这个角度看，群体可以比个人表现的更好或更差，全看环境如何。\n\n\u003e 孤立的个人具有主宰自己的反应的能力，群体则缺乏这种能力。\n\n\u003e 大凡能够成就大业的领袖人物，他最重要的品质不是博学多识，而是必须“具备强大而持久的意志力”，这是一种“极为罕见、极为强大的品质，它足以征服一切。\n\n\u003e 群体要想成为历史变迁的主角，它必须多多少少“为信仰而战”，也就是说，它的形成必须是为了某些简单而明确的信仰。\n\n\u003e 在观念简单化效应的作用下，凡是有抱着怀疑的精神、相信在政治和社会问题上极不易发现“确定性真理”的人，尤其是一个习惯于用推理和讨论的方式说明问题的人，在群体中是没有地位的；当面对群情激奋时，他尤其会生出苍白无力的感觉：因为他意识到他要与之作对的，不仅仅是一种错误的行为，而且还有“多数的力量”，还有贯彻这种行为时的偏执态度。我们更能理解，所谓专业精英，不管他智力多么高强，他陈明利害得失的理性努力，面对被空洞的观念冲昏了头脑的群体，反而会产生一种自己十分迂腐的无聊感觉。更为可悲的是，面对群众的荒谬与狂热，明智之士更有可能根本不会作出这样的努力，而是同群体一起陷入其中，事后又惊叹于自己连常识都已忘却的愚蠢。\n\n\u003e 因此在同人类的各种作为文明动力的感情——“譬如尊严、自我牺牲、宗教信仰、爱国主义以及对荣誉的爱”——的对抗中，理性在大多数时候都不是赢家。\n\n\u003e 群体只知道简单而极端的感情；提供给他们的各种意见、想法和信念，他们或者全盘接受，或者一概拒绝；将其视为绝对真理或绝对谬论。\n\n\u003e 进入了群体的个人，在“集体潜意识”机制的作用下，在心理上会产生一种本质性的变化。就像“动物、痴呆、社会主义者、幼儿和原始人”一样，这样的个人会不由自主地失去自我意识，完全变成另一种智力水平十分低下的生物。\n\n\u003e 自法国大革命以来，由领袖、意识形态和勒庞意义上的群体所组成的这种新的三位一体，便取代了宗教与皇权，成为一切民主宪政架构之外政治合法性运动的要件，尤其在勒庞之后的一百年里，这种新的三位一体更是上演了一幕幕规模宏大而惨烈的悲剧。\n\n\u003e 社会组织就像一切生命有机体一样复杂，我们还不具备强迫它们在突然之间发生深刻变革的智力”。因此他反对一个民族热衷于重大的政治和社会变革，他认为，这种变革的计划从理论上说无论多么出色，都不会使民族气质即刻出现变化（因为“只有时间具备这样的力量”）。采用激进的方式，借助于抽象的原则贯彻一种社会改造的蓝图，只会“使一个高度精致的文明倒退到社会进化更早期的阶段”\n\n\u003e 人们在智力上差异最大，但他们却有着非常相似的本能和情感。在属于情感领域的每一种事情上——宗教、政治、道德、爱憎等等，最杰出的人士很少能比凡夫俗子高明多少。从智力上说，一个伟大的数学家和他的鞋匠之间可能有天壤之别，但是从性格的角度看，他们可能差别甚微或根本没有差别。\n\n\u003e 在集体心理中，个人的才智被削弱了，从而他们的个性也被削弱了。异质性被同质性所吞没，无意识的品质占了上风。\n\n\u003e 群体是个无名氏，因此也不必承担责任。这样一来，总是约束着个人的责任感便彻底消失了。\n\n\u003e 有意识人格的消失，无意识人格的得势，思想和感情因暗示和相互传染作用而转向一个共同的方向，以及立刻把暗示的观念转化为行动的倾向，是组成群体的个人所表现出来的主要特点。他不再是他自己，他变成了一个不再受自己意志支配的玩偶。\n\n\u003e 群体中的个人不但在行动上和他本人有着本质的差别，甚至在完全失去独立性之前，他的思想和感情就已经发生了变化，这种变化是如此深刻，它可以让一个守财奴变得挥霍无度，把怀疑论者改造成信徒，把老实人变成罪犯，把懦夫变成豪杰。\n\n\u003e 群体可以转瞬之间就从最血腥的狂热变成最极端的宽宏大量和英雄主义。群体很容易做出刽子手的举动，同样也很容易慷慨赴义。正是群体，为每一种信仰的胜利而不惜血流成河。\n\n\u003e 群体因为夸大自己的感情，因此它只会被极端感情所打动。希望感动群体的演说家，必须出言不逊，信誓旦旦。夸大其辞、言之凿凿、不断重复，绝对不以说理的方式证明任何事情\n\n\u003e 群体只知道简单而极端的感情；提供给他们的各种意见、想法和信念，他们或者全盘接受，或者一概拒绝；将其视为绝对真理或绝对谬论。用暗示的办法加以诱导而不是作出合理解释的信念，历来都是如此。与宗教信仰有关的偏执及其对人们的头脑实行的专制统治，早就为大家所知。\n\n\u003e 在公众集会上，演说者哪怕作出最轻微的反驳，立刻就会招来怒吼和粗野的叫骂。在一片嘘声和驱逐声中，演说者很快就会败下阵来。当然，假如现场缺少当权者的代表这种约束性因素，反驳者往往会被打死。\n\n\u003e 群体可以杀人放火，无恶不作，但是也能表现出极崇高的献身、牺牲和不计名利的举动，即孤立的个人根本做不到的极崇高的行为。以名誉、光荣和爱国主义作为号召，最有可能影响到组成群体的个人，而且经常可以达到使他慷慨赴死的地步。\n\n\u003e 群体推理的特点，是把彼此不同、只在表面上相似的事物搅在一起，并且立刻把具体的事物普遍化。\n\n\u003e 影响民众想象力的，并不是事实本身，而是它们发生和引起注意的方式。如果让我表明看法的话，我会说，必须对它们进行浓缩加工，它们才会形成一种令人瞠目结舌的惊人形象。掌握了影响群众想象力的艺术，也就掌握了统治他们的艺术。\n\n\u003e 一切政治、神学或社会信条，要想在群众中扎根，都必须采取宗教的形式——能够把危险的讨论排除在外的形式。即便有可能使群众接受无神论，这种信念也会表现出宗教情感中所有的偏执狂，它很快就会表现为一种崇拜。\n\n\u003e 词语的威力与它们所唤醒的形象有关，同时又独立于它们的真实含义。最不明确的词语，有时反而影响最大。例如像民主、社会主义、平等、自由等等，它们的含义极为模糊，即使一大堆专著也不足以确定它们的所指。然而这区区几个词语的确有着神奇的威力，它们似乎是解决一切问题的灵丹妙药。各种极不相同的潜意识中的抱负及其实现的希望，全被它们集于一身。\n\n\u003e 信徒们总是穷凶极恶地打碎他们以前神灵的塑像。\n","data":{"title":"《乌合之众：大众心理研究》热门标注","date":"2021-07-22","tags":null,"category":"Story"},"isEmpty":false,"excerpt":"\n![The Crowd](https://p1.qhimg.com/t016f1e762c0161d220.jpg)\n\n\u003e 闻有吏虽乱而有独善之民，不闻有乱民而有独治之吏 \n                    —《韩非子·外储说》\n\n《乌合之众：大众心理研究》是一本研究大众心理学的著作。是法国社会心理学家古斯塔夫·勒庞创作的社会心理学著作，首次出版于1895年。勒庞指出：个人一旦融入群体，他们的个性将会被湮灭，群体的思想便会占据统治地位，而与此同时群体的行为也会变现为排斥异议、极端化、情绪化低智商化等特点，进而对社会产生破坏性的影响。\n\n读了此书，你会明白过去、现在、以及将来全世界发生的各种群体事件背后的直接原因。\n\n本文摘抄了《乌合之众：大众心理研究》在Kindle电子书中的热门标注：\n\n"},{"id":"chicken-dinner-tesla","file":"chicken-dinner-tesla.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://game.gtimg.cn/images/gp/ingame/a20200724tslcar/intor_6.png\" alt=\"tesela\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e今天我们用数学期望来计算一下《和平精英》的特斯拉（玛莎拉蒂）到底要多少钱？怎么抽最划算？\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://game.gtimg.cn/images/gp/ingame/a20200724tslcar/intor_6.png\" alt=\"tesela\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e今天我们用数学期望来计算一下《和平精英》的特斯拉（玛莎拉蒂）到底要多少钱？怎么抽最划算？\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e规则\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e扭蛋等级概率：\u003c/p\u003e\n\u003ctable class=\"mb-4\"\u003e\n\u003cthead class=\"bg-sky-200 dark:bg-sky-900\"\u003e\n\u003ctr\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e2星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e3星\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e82%\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e17%\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1%\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp class=\"mb-4\"\u003e保护追加不会降低扭蛋等级，并且追加三次必定能提升扭蛋等级；保护追加需要消耗一定的幸运币，扭蛋等级越高，保护追加消耗的幸运币数量越多。\u003c/p\u003e\n\u003ctable class=\"mb-4\"\u003e\n\u003cthead class=\"bg-sky-200 dark:bg-sky-900\"\u003e\n\u003ctr\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e2星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e3星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e4星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e5星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e6星\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e6\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e17\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e51\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e153\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e430\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e827\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e保底法/碎片兑换\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e抽1次的碎片期望 = 12 * 82% + 36 * 17% + 54 * 1% = 16.5碎片\n兑换一辆特斯拉需要 2880 碎片\n所以需要抽 2880/16.5 ≈ 175次\n175 * 6 = 1047点劵\n紫色 * 3 = 3141点券\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e免费追加法\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e成功期望 = 20% * 82% + 20% * 17% * 2 + 20% * 1% * 3 = 0.238\n失败期望 = 80% * 75% * -1 + 80% * 75% * -2 =  -1.8\n免费追加期望为-1.56星\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e保护追加法\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e一次成功概率 = 20%\n两次成功概率 = 20% * 20% = 4%\n其余都需要3次 即 76% 需要抽3次\n每升一个星需要的次数 = 20% + 4% * 2 + 76% * 3 = 2.56次\n每次升级的星星期望 = 82% * 1 + 17% * 2 + 1% * 3 = 1.19星\n升到6星总共需要 = 5.04次 即大概率需要升星5次\n\u003c/code\u003e\u003c/pre\u003e\n\u003ctable class=\"mb-4\"\u003e\n\u003cthead class=\"bg-sky-200 dark:bg-sky-900\"\u003e\n\u003ctr\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1星→2星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e2星→3星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e3星→4星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e4星→5星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e5星→6星\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e6星→7星\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e15.36\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e43.52\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e130.56\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e391.68\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1100.8\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1681.92\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e所以6星 = 15.36 + 43.52 + 130.56 + 391.68 + 1100.8 = 1681.92点劵\n所以7星 = 15.36 + 43.52 + 130.56 + 391.68 + 1100.8 + 1681.92= 3363.84点劵\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e运气爆棚和脸最黑的情况\u003c/h2\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e保底法：\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e因为保底法需要操作175次，基本会接近期望数字。\n\u003cstrong\u003e基本不存在\u003c/strong\u003e175次全3星和175次全1星的情况（小于一亿分之一），即基本没有运气爆棚的情况，和脸黑的情况。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e免费追加法：\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e免费升星法最好的情况（6元提车）只需要操作两次，所以幸存者偏差会\u003cstrong\u003e特别大\u003c/strong\u003e。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e那么传说中6元提车的概率是多少呢：\u003c/p\u003e\n\u003ctable class=\"mb-4\"\u003e\n\u003cthead class=\"bg-sky-200 dark:bg-sky-900\"\u003e\n\u003ctr\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e可能的抽法\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e排列可能\u003c/th\u003e\n\u003cth align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e概率\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e3,3组合\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1种\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e0.0000004\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1,2,3组合\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e6种\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e0.000066912\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1,1,1,1,2组合\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e5种\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e0.00361697\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1,1,2,2组合\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e6种\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e0.00018655\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e2,2,2组合\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1种\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e0.000039304\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1,1,1,1,1,1组合\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e1种\u003c/td\u003e\n\u003ctd align=\"center\" class=\"px-2 border border-slate-400/30\"\u003e0.000019456\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp class=\"mb-4\"\u003e合计约千分之4，即你每尝试250次可能才能成功1次。\n当你尝试250次的时候 你已经花了1500点券了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e至于最坏的情况，你可能要永远转下去了。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e保护追加法：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e和免费追加一样，最好的情况只需操作2次，概率也是一样的。\n不同之处在于最坏的情况，因为有保护，不至于一直转下去：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e( 6 + 17 + 51 + 153 + 430 ) * 3 = 1971\n七星需要再 + 827 * 3 = 4452\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e总结：虽然保底法期望花费最少，但是很多人都忍不住去赌一把，原因就在于人性是喜爱赌博的。最后希望各位根据自己的实力，理性消费。\u003c/p\u003e\n\u003c/blockquote\u003e\n","content":"\n![tesela](https://game.gtimg.cn/images/gp/ingame/a20200724tslcar/intor_6.png)\n\n今天我们用数学期望来计算一下《和平精英》的特斯拉（玛莎拉蒂）到底要多少钱？怎么抽最划算？\n\n\u003c!--more--\u003e\n\n## 规则\n\n扭蛋等级概率：\n\n|  1星 | 2星  | 3星 |\n| :-: | :-: | :-: |\n| 82% | 17% | 1% |\n\n保护追加不会降低扭蛋等级，并且追加三次必定能提升扭蛋等级；保护追加需要消耗一定的幸运币，扭蛋等级越高，保护追加消耗的幸运币数量越多。\n\n|  1星 | 2星  | 3星 | 4星 | 5星 | 6星 |\n| :-: | :-: | :-: | :-: | :-: | :-: |\n| 6 | 17 | 51 | 153 | 430 | 827 |\n\n## 保底法/碎片兑换\n\n```bash\n抽1次的碎片期望 = 12 * 82% + 36 * 17% + 54 * 1% = 16.5碎片\n兑换一辆特斯拉需要 2880 碎片\n所以需要抽 2880/16.5 ≈ 175次\n175 * 6 = 1047点劵\n紫色 * 3 = 3141点券\n```\n\n## 免费追加法\n\n```bash\n成功期望 = 20% * 82% + 20% * 17% * 2 + 20% * 1% * 3 = 0.238\n失败期望 = 80% * 75% * -1 + 80% * 75% * -2 =  -1.8\n免费追加期望为-1.56星\n```\n\n## 保护追加法\n\n```bash\n一次成功概率 = 20%\n两次成功概率 = 20% * 20% = 4%\n其余都需要3次 即 76% 需要抽3次\n每升一个星需要的次数 = 20% + 4% * 2 + 76% * 3 = 2.56次\n每次升级的星星期望 = 82% * 1 + 17% * 2 + 1% * 3 = 1.19星\n升到6星总共需要 = 5.04次 即大概率需要升星5次\n```\n\n|  1星→2星 | 2星→3星 | 3星→4星 | 4星→5星 | 5星→6星 | 6星→7星 |\n| :-: | :-: | :-: | :-: | :-: | :-: |\n| 15.36 | 43.52 | 130.56 | 391.68 | 1100.8 | 1681.92 |\n\n```bash\n所以6星 = 15.36 + 43.52 + 130.56 + 391.68 + 1100.8 = 1681.92点劵\n所以7星 = 15.36 + 43.52 + 130.56 + 391.68 + 1100.8 + 1681.92= 3363.84点劵\n```\n\n## 运气爆棚和脸最黑的情况\n\n### 保底法：\n\n因为保底法需要操作175次，基本会接近期望数字。\n**基本不存在**175次全3星和175次全1星的情况（小于一亿分之一），即基本没有运气爆棚的情况，和脸黑的情况。\n\n### 免费追加法：\n\n免费升星法最好的情况（6元提车）只需要操作两次，所以幸存者偏差会**特别大**。\n\n那么传说中6元提车的概率是多少呢：\n\n| 可能的抽法 | 排列可能 | 概率 |\n| :-: | :-: | :-: |\n| 3,3组合 | 1种 | 0.0000004 |\n| 1,2,3组合 | 6种 | 0.000066912 |\n| 1,1,1,1,2组合 | 5种 | 0.00361697 |\n| 1,1,2,2组合 | 6种 | 0.00018655 |\n| 2,2,2组合 | 1种 | 0.000039304 |\n| 1,1,1,1,1,1组合 | 1种 | 0.000019456 |\n\n合计约千分之4，即你每尝试250次可能才能成功1次。\n当你尝试250次的时候 你已经花了1500点券了。\n\n至于最坏的情况，你可能要永远转下去了。\n\n## 保护追加法：\n\n和免费追加一样，最好的情况只需操作2次，概率也是一样的。\n不同之处在于最坏的情况，因为有保护，不至于一直转下去：\n\n```bash\n( 6 + 17 + 51 + 153 + 430 ) * 3 = 1971\n七星需要再 + 827 * 3 = 4452\n```\n\n\u003e 总结：虽然保底法期望花费最少，但是很多人都忍不住去赌一把，原因就在于人性是喜爱赌博的。最后希望各位根据自己的实力，理性消费。\n","data":{"title":"用数学期望计算《和平精英》特斯拉（玛莎拉蒂）到底要多少钱？","date":"2020-07-24","tags":null,"category":"Story"},"isEmpty":false,"excerpt":"\n![tesela](https://game.gtimg.cn/images/gp/ingame/a20200724tslcar/intor_6.png)\n\n今天我们用数学期望来计算一下《和平精英》的特斯拉（玛莎拉蒂）到底要多少钱？怎么抽最划算？\n\n"},{"id":"rich-dad","file":"rich-dad.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://images-cn.ssl-images-amazon.com/images/I/51mZHfA%2B-6L._SX351_BO1,204,203,200_.jpg\" alt=\"rich-dad\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e人穷穷观念，人富钱生钱。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e《富爸爸，穷爸爸》是一个真实的故事，作者罗伯特・清崎的亲生父亲和朋友的父亲对金钱的看法截然不同，这使他对认识金钱产生了兴趣，最终他接受了朋友的父亲的建议，也就是书中所说的。“富爸爸”的观念，即不要做金钱的奴隶，要让金钱为我们工作，并由此成为一名极富传奇色彩的成功的投资家。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本文摘抄了《富爸爸，穷爸爸》在Kindle电子书中的热门标注：\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://images-cn.ssl-images-amazon.com/images/I/51mZHfA%2B-6L._SX351_BO1,204,203,200_.jpg\" tegory":"Story"},"isEmpty":false,"excerpt":"\n![rich-dad](https://images-cn.ssl-images-amazon.com/images/I/51mZHfA%2B-6L._SX351_BO1,204,203,200_.jpg)\n\n\u003e 人穷穷观念，人富钱生钱。\n\n《富爸爸，穷爸爸》是一个真实的故事，作者罗伯特・清崎的亲生父亲和朋友的父亲对金钱的看法截然不同，这使他对认识金钱产生了兴趣，最终他接受了朋友的父亲的建议，也就是书中所说的。“富爸爸”的观念，即不要做金钱的奴隶，要让金钱为我们工作，并由此成为一名极富传奇色彩的成功的投资家。\n\n本文摘抄了《富爸爸，穷爸爸》在Kindle电子书中的热门标注：\n\n"},{"id":"home-deus","file":"home-deus.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180129_homo_deus.jpg\" alt=\"未来简史\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1%的精英和99%的无用的人\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e人类将失去在经济和军事上的用途，因此经济和政治制度可能将不再继续认同人类有太多价值。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e21世纪经济学最重要的问题，可能就是多余的人能有什么用？一旦拥有高度智能的算法接手几乎一切工作，而且能比人类做的更好时，人类还能做什么？\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e前段时间看到一个TED演讲，未来世界各地可能像某些北欧国家一样，发基础工资，所有人都有基本工资来消费，而经济的马车由机器拉动。我们看到现在国家在搞扶贫，其实就是发社会基本工资。只不过还够不上发达国家而已。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e社会的贫富差距会加大。绝大多数人将会沦为无用的人。我们看到整个社会逐渐淘汰了一些简单的工作。例如扫马路、看守停车场。不幸的是，从事这些岗位的恰恰是低收入者。这些事情都在身边真实发生。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e除了计算机互联网的发展、另外一个进步巨大，却又常常被忽视的领域是生物科技，被称为上帝剪刀的基因编辑可能因为法律和伦理问题还需时日。但基于基因组测序和大数据做癌症筛查是现在的精英阶层已经流行的。由此超人类可能和传统的人产生历史上从未发生的\u003cstrong\u003e生理差距\u003c/strong\u003e。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180129_homo_deus.jpg\" alt=\"未来简史\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e1%的精英和99%的无用的人\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e人类将失去在经济和军事上的用途，因此经济和政治制度可能将不再继续认同人类有太多价值。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e21世纪经济学最重要的问题，可能就是多余的人能有什么用？一旦拥有高度智能的算法接手几乎一切工作，而且能比人类做的更好时，人类还能做什么？\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e前段时间看到一个TED演讲，未来世界各地可能像某些北欧国家一样，发基础工资，所有人都有基本工资来消费，而经济的马车由机器拉动。我们看到现在国家在搞扶贫，其实就是发社会基本工资。只不过还够不上发达国家而已。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e社会的贫富差距会加大。绝大多数人将会沦为无用的人。我们看到整个社会逐渐淘汰了一些简单的工作。例如扫马路、看守停车场。不幸的是，从事这些岗位的恰恰是低收入者。这些事情都在身边真实发生。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e除了计算机互联网的发展、另外一个进步巨大，却又常常被忽视的领域是生物科技，被称为上帝剪刀的基因编辑可能因为法律和伦理问题还需时日。但基于基因组测序和大数据做癌症筛查是现在的精英阶层已经流行的。由此超人类可能和传统的人产生历史上从未发生的\u003cstrong\u003e生理差距\u003c/strong\u003e。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e饥荒、瘟疫和战争\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e就在几十年前，饥荒、瘟疫和战争是人类的头号敌人。但是，到了今天：\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e2010年，饥饿和营养不良合计夺走了约100万人的生命，但肥胖却让300万人丧命。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e虽然我们不敢保证绝不会爆发新一波埃博拉或未知流感病毒疫情，横扫全球造成数百万人死亡，但至少我们不会认为这是不可避免的自然灾害。相反，我们会认为这是一个不可原谅的认为疏忽，要有人为此负起责任。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e2012年，全球约有5600万人死亡，其中62万人死于暴力（战争致死12万，犯罪致死50万），相较之下，自杀的有80万，死于糖尿病的更是有150万。现在，糖比火药更致命。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e生命就是算法\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e人类历史就是数据处理过程。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e人不仅在处理数据，还在产生数据。你每天都在看新闻，刷微博，同时也在发微博，发朋友圈，记录、上传和分享。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e如今，各种微博，朋友圈，公众号，头条，推送。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以前，价值来源于获取信息的能力。现在，价值来源于过滤信息的能力。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e意识与智能分离\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e任何一匹马，不论是嗅觉、爱的能力、认人的能力、跳过栅栏的能力或是其他上千件事情上，绝对都远高于历史上首款平民汽车福特T型车，或是价值千万的兰博基尼。然而马还是被汽车取代，原因在于汽车在社会系统真正需要的少数几个领域胜出。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e事实证明高度的智能并不需要意识的参与。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e大数据和人工智能将比我们更加了解自己\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e当机器的选择比我们更好时，我们还有自己的独立人格吗，亦或是裹挟在数据浪潮中的一小片涟漪。\u003c/p\u003e\n","content":"\n![未来简史](/images/20180129_homo_deus.jpg)\n\n## 1%的精英和99%的无用的人\n\n\u003e 人类将失去在经济和军事上的用途，因此经济和政治制度可能将不再继续认同人类有太多价值。\n\n\u003e 21世纪经济学最重要的问题，可能就是多余的人能有什么用？一旦拥有高度智能的算法接手几乎一切工作，而且能比人类做的更好时，人类还能做什么？\n\n\n前段时间看到一个TED演讲，未来世界各地可能像某些北欧国家一样，发基础工资，所有人都有基本工资来消费，而经济的马车由机器拉动。我们看到现在国家在搞扶贫，其实就是发社会基本工资。只不过还够不上发达国家而已。\n\n社会的贫富差距会加大。绝大多数人将会沦为无用的人。我们看到整个社会逐渐淘汰了一些简单的工作。例如扫马路、看守停车场。不幸的是，从事这些岗位的恰恰是低收入者。这些事情都在身边真实发生。\n\n除了计算机互联网的发展、另外一个进步巨大，却又常常被忽视的领域是生物科技，被称为上帝剪刀的基因编辑可能因为法律和伦理问题还需时日。但基于基因组测序和大数据做癌症筛查是现在的精英阶层已经流行的。由此超人类可能和传统的人产生历史上从未发生的**生理差距**。\n\n\u003c!--more--\u003e\n\n## 饥荒、瘟疫和战争\n\n就在几十年前，饥荒、瘟疫和战争是人类的头号敌人。但是，到了今天：\n\n\u003e 2010年，饥饿和营养不良合计夺走了约100万人的生命，但肥胖却让300万人丧命。\n\n\u003e 虽然我们不敢保证绝不会爆发新一波埃博拉或未知流感病毒疫情，横扫全球造成数百万人死亡，但至少我们不会认为这是不可避免的自然灾害。相反，我们会认为这是一个不可原谅的认为疏忽，要有人为此负起责任。\n\n\u003e 2012年，全球约有5600万人死亡，其中62万人死于暴力（战争致死12万，犯罪致死50万），相较之下，自杀的有80万，死于糖尿病的更是有150万。现在，糖比火药更致命。\n\n\n## 生命就是算法\n\n\u003e 人类历史就是数据处理过程。\n\n人不仅在处理数据，还在产生数据。你每天都在看新闻，刷微博，同时也在发微博，发朋友圈，记录、上传和分享。\n\n如今，各种微博，朋友圈，公众号，头条，推送。\n\n以前，价值来源于获取信息的能力。现在，价值来源于过滤信息的能力。\n\n\n\n## 意识与智能分离\n\n\u003e 任何一匹马，不论是嗅觉、爱的能力、认人的能力、跳过栅栏的能力或是其他上千件事情上，绝对都远高于历史上首款平民汽车福特T型车，或是价值千万的兰博基尼。然而马还是被汽车取代，原因在于汽车在社会系统真正需要的少数几个领域胜出。\n\n事实证明高度的智能并不需要意识的参与。\n\n## 大数据和人工智能将比我们更加了解自己\n\n当机器的选择比我们更好时，我们还有自己的独立人格吗，亦或是裹挟在数据浪潮中的一小片涟漪。\n\n\n\n","data":{"title":"《未来简史》读书笔记","date":"2018-01-29","tags":null,"category":"Story"},"isEmpty":false,"excerpt":"\n![未来简史](/images/20180129_homo_deus.jpg)\n\n## 1%的精英和99%的无用的人\n\n\u003e 人类将失去在经济和军事上的用途，因此经济和政治制度可能将不再继续认同人类有太多价值。\n\n\u003e 21世纪经济学最重要的问题，可能就是多余的人能有什么用？一旦拥有高度智能的算法接手几乎一切工作，而且能比人类做的更好时，人类还能做什么？\n\n\n前段时间看到一个TED演讲，未来世界各地可能像某些北欧国家一样，发基础工资，所有人都有基本工资来消费，而经济的马车由机器拉动。我们看到现在国家在搞扶贫，其实就是发社会基本工资。只不过还够不上发达国家而已。\n\n社会的贫富差距会加大。绝大多数人将会沦为无用的人。我们看到整个社会逐渐淘汰了一些简单的工作。例如扫马路、看守停车场。不幸的是，从事这些岗位的恰恰是低收入者。这些事情都在身边真实发生。\n\n除了计算机互联网的发展、另外一个进步巨大，却又常常被忽视的领域是生物科技，被称为上帝剪刀的基因编辑可能因为法律和伦理问题还需时日。但基于基因组测序和大数据做癌症筛查是现在的精英阶层已经流行的。由此超人类可能和传统的人产生历史上从未发生的**生理差距**。\n\n"},{"id":"why-blog","file":"why-blog.md","excerptHtml":"\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于目的\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e奥威尔说作家写作的四大动机：纯粹的自我中心、审美方面的热情、历史方面的冲动以及政治方面的目的。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e说起目的，作家们的目的都太大了，按照奥威尔的说法，我的目的可能就只是停留在第一种，纯粹的自我中心吧。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我觉得，就单纯第一种也有不一样的层次和境界，目前我的需求只是记录自己，沉淀技术，而希望有一天我写的东西能够帮助到自己，或者帮助到别人。最终有一天能够成为自我实现的必要条件。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e有人问一位登山家为什么要去登山——谁都知道登山这件事既危险，又没什么实际的好处，他回答道：“因为那座山峰在那里。”\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于目的\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e奥威尔说作家写作的四大动机：纯粹的自我中心、审美方面的热情、历史方面的冲动以及政治方面的目的。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e说起目的，作家们的目的都太大了，按照奥威尔的说法，我的目的可能就只是停留在第一种，纯粹的自我中心吧。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我觉得，就单纯第一种也有不一样的层次和境界，目前我的需求只是记录自己，沉淀技术，而希望有一天我写的东西能够帮助到自己，或者帮助到别人。最终有一天能够成为自我实现的必要条件。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e有人问一位登山家为什么要去登山——谁都知道登山这件事既危险，又没什么实际的好处，他回答道：“因为那座山峰在那里。”\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于技术\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e以前总是不屑于写博客，觉得CSDN上鱼龙混杂，有很多误人子弟的文章。一方面怕自己学书浅薄，一方面也是太懒，觉得搜索比写作效率高太多。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e为了逐渐形成自己的一套知识体系，构建自己的技能树，不断的增加枝叶，又不脱落的一个重要方式就是写作总结。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e智慧又不失敏捷的方式只有一个：永远不要停止学习。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e后记\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e万事开头难，以后会慢慢将自己学到的东西记录下来。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eIdeas worth spreading\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e接下来的计划\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e1.自定义博客主题\n2.为博客和网站添加评论功能\n3.在博客中记录以上过程\u003c/p\u003e\n","content":"\n\n## 关于目的\n\u003e 奥威尔说作家写作的四大动机：纯粹的自我中心、审美方面的热情、历史方面的冲动以及政治方面的目的。\n\n说起目的，作家们的目的都太大了，按照奥威尔的说法，我的目的可能就只是停留在第一种，纯粹的自我中心吧。\n\n我觉得，就单纯第一种也有不一样的层次和境界，目前我的需求只是记录自己，沉淀技术，而希望有一天我写的东西能够帮助到自己，或者帮助到别人。最终有一天能够成为自我实现的必要条件。\n\n\u003e 有人问一位登山家为什么要去登山——谁都知道登山这件事既危险，又没什么实际的好处，他回答道：“因为那座山峰在那里。”\n\n\u003c!--more--\u003e\n\n## 关于技术\n以前总是不屑于写博客，觉得CSDN上鱼龙混杂，有很多误人子弟的文章。一方面怕自己学书浅薄，一方面也是太懒，觉得搜索比写作效率高太多。\n\n为了逐渐形成自己的一套知识体系，构建自己的技能树，不断的增加枝叶，又不脱落的一个重要方式就是写作总结。\n\n\u003e 智慧又不失敏捷的方式只有一个：永远不要停止学习。\n\n## 后记\n万事开头难，以后会慢慢将自己学到的东西记录下来。\n\u003e Ideas worth spreading\n\n### 接下来的计划\n1.自定义博客主题\n2.为博客和网站添加评论功能\n3.在博客中记录以上过程","data":{"title":"我为什么开始写博客了？","date":"2017-06-08","tags":null,"category":"Story"},"isEmpty":false,"excerpt":"\n\n## 关于目的\n\u003e 奥威尔说作家写作的四大动机：纯粹的自我中心、审美方面的热情、历史方面的冲动以及政治方面的目的。\n\n说起目的，作家们的目的都太大了，按照奥威尔的说法，我的目的可能就只是停留在第一种，纯粹的自我中心吧。\n\n我觉得，就单纯第一种也有不一样的层次和境界，目前我的需求只是记录自己，沉淀技术，而希望有一天我写的东西能够帮助到自己，或者帮助到别人。最终有一天能够成为自我实现的必要条件。\n\n\u003e 有人问一位登山家为什么要去登山——谁都知道登山这件事既危险，又没什么实际的好处，他回答道：“因为那座山峰在那里。”\n\n"}]},"__N_SSG":true},"page":"/blog/category/[cid]","query":{"cid":"story"},"buildId":"NDkQWnMtEcy0IDQqDGEkS","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
