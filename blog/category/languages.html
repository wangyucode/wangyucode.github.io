ion-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"rust-ownership","file":"rust-ownership.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.rust-lang.org/static/images/rust-logo-blk.svg\" alt=\"Rust\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eRust由Mozilla基金会开发，没有虚拟机和垃圾回收，却又提供了内存安全，有着媲美C/C++的性能，又同时支持命令式函数式编程以及泛型等便利。优雅（上层抽象）和高性能（底层控制）往往是鱼和熊掌不可兼得，但Rust试图挑战这一矛盾。允许你做带垃圾回收的语言（例如Java）做不到的事，比如控制底层。而同时又避免了比如空指针，野指针在内的（例如C/C++）的问题。它被用于开发浏览器引擎(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eServo\u003c/code\u003e)，操作系统(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRedox OS\u003c/code\u003e)，并且特别适合开发\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebAssembly\u003c/code\u003e和嵌入式，以及高性能的Web服务。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍Rust语言中和其它语言相比一个非常重要的特性\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e所有权(Ownership)\u003c/code\u003e以及其相关的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e借用(Borrowing)\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e引用(References)\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e切片(Slice)\u003c/code\u003e的理解和使用。这个特性保证了Rust不需要垃圾回收以及强大的内存安全，同时还能在多线程编程中带来好处。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.rust-lang.org/static/images/rust-logo-blk.svg\" alt=\"Rust\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eRust由Mozilla基金会开发，没有虚拟机和垃圾回收，却又提供了内存安全，有着媲美C/C++的性能，又同时支持命令式函数式编程以及泛型等便利。优雅（上层抽象）和高性能（底层控制）往往是鱼和熊掌不可兼得，但Rust试图挑战这一矛盾。允许你做带垃圾回收的语言（例如Java）做不到的事，比如控制底层。而同时又避免了比如空指针，野指针在内的（例如C/C++）的问题。它被用于开发浏览器引擎(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eServo\u003c/code\u003e)，操作系统(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRedox OS\u003c/code\u003e)，并且特别适合开发\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebAssembly\u003c/code\u003e和嵌入式，以及高性能的Web服务。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍Rust语言中和其它语言相比一个非常重要的特性\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e所有权(Ownership)\u003c/code\u003e以及其相关的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e借用(Borrowing)\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e引用(References)\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e切片(Slice)\u003c/code\u003e的理解和使用。这个特性保证了Rust不需要垃圾回收以及强大的内存安全，同时还能在多线程编程中带来好处。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e所有权(Ownership)\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e废话不多说，先看代码:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Rust px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003elet a = 5;\nlet b = a;\nprintln!(\"a-\u003e{}, b-\u003e{}\", a, b);\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e上面的代码会打印出\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ea-\u003e5, b-\u003e5\u003c/code\u003e，和直觉（其它语言）相同。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ea\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eb\u003c/code\u003e是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ei32\u003c/code\u003e类型，属于基础数据类型，存储在\u003cstrong\u003e栈\u003c/strong\u003e上。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e当把\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eb\u003c/code\u003e赋值给\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ea\u003c/code\u003e时，会进行拷贝。所以在栈上会有两个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e5\u003c/code\u003e。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e但是：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Rust px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003elet s1 = String::from(\"hello\");\nlet s2 = s1;\nprintln!(\"s1-\u003e{}, s2-\u003e{}\", s1, s2);\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e上面的代码无法通过编译。因为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es1\u003c/code\u003e的\u003cstrong\u003e所有权\u003c/strong\u003e发生了转移(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emove\u003c/code\u003e)。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e在把\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es1\u003c/code\u003e赋值给\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es2\u003c/code\u003e之后，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es1\u003c/code\u003e就无法再使用了。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es1\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es2\u003c/code\u003e被存储在\u003cstrong\u003e栈\u003c/strong\u003e上，但是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehello\u003c/code\u003e这个字符串存储在\u003cstrong\u003e堆\u003c/strong\u003e上\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es1\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es2\u003c/code\u003e是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eString\u003c/code\u003e类型，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eString\u003c/code\u003e类型不是基础数据类型，它是实际字符串的基本信息，包含了指向堆内存的指针、长度、容量信息。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e赋值时，栈上的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eString\u003c/code\u003e即指针，长度、容量被拷贝了，但堆上的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehello\u003c/code\u003e没有被拷贝。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这样就保证了堆上的内存始终只有一个所有者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eowner\u003c/code\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eRust会在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOwner\u003c/code\u003e离开作用域后自动释放\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDrop\u003c/code\u003e它所指向的堆内存。同时避免二次释放带来的内存问题和安全漏洞。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://doc.rust-lang.org/book/img/trpl04-04.svg\" alt=\"Move\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e引用(References)和借用(Borrowing)\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e再看一个函数的例子：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Rust px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003efn main() {\n    let s1 = String::from(\"hello\");\n    let length = get_length(s1);\n    println!(\"{}\",s1);\n}\n\nfn get_length(str: String) -\u003e usize {\n    str.len()\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e上面的代码无法通过编译，因为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es1\u003c/code\u003e的\u003cstrong\u003e所有权\u003c/strong\u003e被转移到了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eget_length\u003c/code\u003e函数里面。并在出了函数之后就被释放了。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e其中一个解决方案是让\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eget_length\u003c/code\u003e通过元组\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etuple\u003c/code\u003e同时返回\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estr\u003c/code\u003e。此时可以用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003es1\u003c/code\u003e继续接收\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estr\u003c/code\u003e，即隐藏\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eshadowing\u003c/code\u003e。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e我们也可以通过传递\u003cstrong\u003e引用\u003c/strong\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReferences\u003c/code\u003e来解决这个问题：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Rust px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003efn main() {\n    let s1 = String::from(\"hello\");\n    let len = get_length(\u0026#x26;s1);\n    println!(\"The length of '{}' is {}.\", s1, len);\n}\n\nfn get_length(str: \u0026#x26;String) -\u003e usize {\n    str.len()\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e将获取引用作为函数参数称为\u003cstrong\u003e借用\u003c/strong\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eborrowing\u003c/code\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e可变引用（Mutable References）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e如果要在函数内修改\u003cstrong\u003e借用的值\u003c/strong\u003e则必须使用可变引用：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Rust px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003efn main() {\n    let mut s = String::from(\"hello\");\n\n    change(\u0026#x26;mut s);\n}\n\nfn change(some_string: \u0026#x26;mut String) {\n    some_string.push_str(\", world\");\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eRust中所有的变量默认是不可变的，不可变代表了安全。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e同一作用域中，不可变引用可以有多个，即多个\u003cstrong\u003e读引用\u003c/strong\u003e是ok的。但是不能同时存在可变引用和不可变引用。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e同一作用域中，可变引用只能有一个，即\u003cstrong\u003e写引用\u003c/strong\u003e只能有一个。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e这些规则保证了Rust不可能出现\u003cstrong\u003e悬垂指针\u003c/strong\u003e（dangling pointer）或\u003cstrong\u003e空指针\u003c/strong\u003e（null pointer）异常。\n也减轻了多线程中的\u003cstrong\u003e竞争状态\u003c/strong\u003e（Race conditions）和\u003cstrong\u003e死锁\u003c/strong\u003e（Deadlocks）问题\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e切片(Slice)\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e三句话说清楚切片\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSlice\u003c/code\u003e：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e切片没有所有权，因为它是对数组或者字符串等集合某个区间的不可变引用。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e它的作用是，我们想使用集合中某个数据，又怕其他人对集合做了修改（比如清空了集合的元素）时能够提前发现bug。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e原理是上一节提到的，同一作用域不能同时存在可变引用和不可变引用。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eRust的缺点\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e目前发现Rust最大的缺点就是：想写一个能够编译通过的代码实在是太难了，哈哈。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e但正是因为Rust拥有强大的编译器，它能够提前把bug扼杀在摇篮里，在编译阶段就拒绝各种各样的bug，从而同时保证程序的性能和安全。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这也是为什么Typescript，敏捷开发，TDD，会火的原因了。\u003cstrong\u003e尽可能早的发现和解决问题。\u003c/strong\u003e\u003c/p\u003e\n","content":"\n![Rust](https://www.rust-lang.org/static/images/rust-logo-blk.svg)\n\n\u003e Rust由Mozilla基金会开发，没有虚拟机和垃圾回收，却又提供了内存安全，有着媲美C/C++的性能，又同时支持命令式函数式编程以及泛型等便利。优雅（上层抽象）和高性能（底层控制）往往是鱼和熊掌不可兼得，但Rust试图挑战这一矛盾。允许你做带垃圾回收的语言（例如Java）做不到的事，比如控制底层。而同时又避免了比如空指针，野指针在内的（例如C/C++）的问题。它被用于开发浏览器引擎(`Servo`)，操作系统(`Redox OS`)，并且特别适合开发`WebAssembly`和嵌入式，以及高性能的Web服务。\n\n\u003e 本文介绍Rust语言中和其它语言相比一个非常重要的特性`所有权(Ownership)`以及其相关的`借用(Borrowing)`，`引用(References)`，`切片(Slice)`的理解和使用。这个特性保证了Rust不需要垃圾回收以及强大的内存安全，同时还能在多线程编程中带来好处。\n\n\u003c!--more--\u003e\n\n## 所有权(Ownership)\n\n废话不多说，先看代码:\n\n```Rust\nlet a = 5;\nlet b = a;\nprintln!(\"a-\u003e{}, b-\u003e{}\", a, b);\n```\n- 上面的代码会打印出`a-\u003e5, b-\u003e5`，和直觉（其它语言）相同。\n- `a`和`b`是`i32`类型，属于基础数据类型，存储在**栈**上。\n- 当把`b`赋值给`a`时，会进行拷贝。所以在栈上会有两个`5`。\n\n但是：\n\n```Rust\nlet s1 = String::from(\"hello\");\nlet s2 = s1;\nprintln!(\"s1-\u003e{}, s2-\u003e{}\", s1, s2);\n```\n\n- 上面的代码无法通过编译。因为`s1`的**所有权**发生了转移(`move`)。\n- 在把`s1`赋值给`s2`之后，`s1`就无法再使用了。\n- `s1`和`s2`被存储在**栈**上，但是`hello`这个字符串存储在**堆**上\n- `s1`和`s2`是`String`类型，`String`类型不是基础数据类型，它是实际字符串的基本信息，包含了指向堆内存的指针、长度、容量信息。\n- 赋值时，栈上的`String`即指针，长度、容量被拷贝了，但堆上的`hello`没有被拷贝。\n- 这样就保证了堆上的内存始终只有一个所有者`owner`。\n- Rust会在`Owner`离开作用域后自动释放`Drop`它所指向的堆内存。同时避免二次释放带来的内存问题和安全漏洞。\n\n![Move](https://doc.rust-lang.org/book/img/trpl04-04.svg)\n\n## 引用(References)和借用(Borrowing)\n\n再看一个函数的例子：\n\n```Rust\nfn main() {\n    let s1 = String::from(\"hello\");\n    let length = get_length(s1);\n    println!(\"{}\",s1);\n}\n\nfn get_length(str: String) -\u003e usize {\n    str.len()\n}\n```\n- 上面的代码无法通过编译，因为`s1`的**所有权**被转移到了`get_length`函数里面。并在出了函数之后就被释放了。\n- 其中一个解决方案是让`get_length`通过元组`tuple`同时返回`str`。此时可以用`s1`继续接收`str`，即隐藏`shadowing`。\n\n我们也可以通过传递**引用**`References`来解决这个问题：\n\n```Rust\nfn main() {\n    let s1 = String::from(\"hello\");\n    let len = get_length(\u0026s1);\n    println!(\"The length of '{}' is {}.\", s1, len);\n}\n\nfn get_length(str: \u0026String) -\u003e usize {\n    str.len()\n}\n```\n\n将获取引用作为函数参数称为**借用**`borrowing`\n\n## 可变引用（Mutable References）\n\n如果要在函数内修改**借用的值**则必须使用可变引用：\n\n```Rust\nfn main() {\n    let mut s = String::from(\"hello\");\n\n    change(\u0026mut s);\n}\n\nfn change(some_string: \u0026mut String) {\n    some_string.push_str(\", world\");\n}\n```\n\n- Rust中所有的变量默认是不可变的，不可变代表了安全。\n- 同一作用域中，不可变引用可以有多个，即多个**读引用**是ok的。但是不能同时存在可变引用和不可变引用。\n- 同一作用域中，可变引用只能有一个，即**写引用**只能有一个。\n\n这些规则保证了Rust不可能出现**悬垂指针**（dangling pointer）或**空指针**（null pointer）异常。\n也减轻了多线程中的**竞争状态**（Race conditions）和**死锁**（Deadlocks）问题\n\n## 切片(Slice)\n\n三句话说清楚切片`Slice`：\n\n- 切片没有所有权，因为它是对数组或者字符串等集合某个区间的不可变引用。\n- 它的作用是，我们想使用集合中某个数据，又怕其他人对集合做了修改（比如清空了集合的元素）时能够提前发现bug。\n- 原理是上一节提到的，同一作用域不能同时存在可变引用和不可变引用。\n\n## Rust的缺点\n\n目前发现Rust最大的缺点就是：想写一个能够编译通过的代码实在是太难了，哈哈。\n\n但正是因为Rust拥有强大的编译器，它能够提前把bug扼杀在摇篮里，在编译阶段就拒绝各种各样的bug，从而同时保证程序的性能和安全。\n\n这也是为什么Typescript，敏捷开发，TDD，会火的原因了。**尽可能早的发现和解决问题。**\n","data":{"title":"理解Rust语言的所有权以及借用、引用、切片。","date":"2021-01-23","tags":["Rust"],"category":"Languages"},"isEmpty":false,"excerpt":"\n![Rust](https://www.rust-lang.org/static/images/rust-logo-blk.svg)\n\n\u003e Rust由Mozilla基金会开发，没有虚拟机和垃圾回收，却又提供了内存安全，有着媲美C/C++的性能，又同时支持命令式函数式编程以及泛型等便利。优雅（上层抽象）和高性能（底层控制）往往是鱼和熊掌不可兼得，但Rust试图挑战这一矛盾。允许你做带垃圾回收的语言（例如Java）做不到的事，比如控制底层。而同时又避免了比如空指针，野指针在内的（例如C/C++）的问题。它被用于开发浏览器引擎(`Servo`)，操作系统(`Redox OS`)，并且特别适合开发`WebAssembly`和嵌入式，以及高性能的Web服务。\n\n\u003e 本文介绍Rust语言中和其它语言相比一个非常重要的特性`所有权(Ownership)`以及其相关的`借用(Borrowing)`，`引用(References)`，`切片(Slice)`的理解和使用。这个特性保证了Rust不需要垃圾回收以及强大的内存安全，同时还能在多线程编程中带来好处。\n\n"},{"id":"rxjava","file":"rxjava.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eRxJava是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e的Java分支，除了Java版，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e响应式编程\u003c/code\u003e，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLambda\u003c/code\u003e表达式和链式编程，让程序变得更加简洁优雅。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eRxJava是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e的Java分支，除了Java版，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactiveX\u003c/code\u003e还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e响应式编程\u003c/code\u003e，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLambda\u003c/code\u003e表达式和链式编程，让程序变得更加简洁优雅。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e看完了RactiveX的简介，觉得用它来封装一个网络请求框架应该是再好不过了，但是当我真正开始封装网络请求时，我发现：RxJava给的答案是，你并不需要去封装，而是\u003cstrong\u003e直接使用\u003c/strong\u003e就好了。实例代码如下。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHello RxJava\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\tpublic void onClick(View v) {\n        Observable.create((ObservableOnSubscribe\u0026#x3C;String\u003e) emitter -\u003e emitter.onNext(httpRequest()))  //1.\n                .subscribeOn(Schedulers.io())  //2.\n                .observeOn(AndroidSchedulers.mainThread())  //3.\n                .subscribe(s -\u003e textView.setText(s));  //4.\n    }\n    \n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e核心代码就是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOnClick\u003c/code\u003e方法中的四行。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e步骤如下：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecreate\u003c/code\u003e函数创建\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eObservable\u003c/code\u003e对象\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e订阅调度到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSchedulers.io()\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eio\u003c/code\u003e是一个有线程缓存的新线程调度器\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e将事件消费调度到Android的主线程上\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e消费者（观察者）代码\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttpRequest()\u003c/code\u003e没用到任何复杂的框架，就用原生的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHttpURLConnection\u003c/code\u003e做一个网络请求，返回请求结果的String，代码如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\tprivate String httpRequest() throws Exception {\n        URL url = new URL(\"http://wycode.cn/\");\n        HttpURLConnection urlConnection = (HttpURLConnection) url.openConnection();\n        String result;\n        try {\n            BufferedInputStream in = new BufferedInputStream(urlConnection.getInputStream());\n            result = readStream(in);\n        } finally {\n            urlConnection.disconnect();\n        }\n        return result;\n    }\n\n    private String readStream(BufferedInputStream in) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(in));\n        StringBuilder sb = new StringBuilder();\n        String line;\n        try {\n            while ((line = reader.readLine()) != null) {\n                sb.append(line).append(\"\\n\");\n            }\n        } catch (IOException e) {\n            e.printStackTrace();\n        } finally {\n            try {\n                in.close();\n            } catch (IOException e) {\n                e.printStackTrace();\n            }\n        }\n        return sb.toString();\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e变换操作\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通常的，我们在请求网络后要对服务器返回的字符串进行解析，这时我们可以使用RxJava的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTransforming\u003c/code\u003e操作，在返回前将JSON String转为实体类。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eObservable.create((ObservableOnSubscribe\u0026#x3C;String\u003e) emitter -\u003e emitter.onNext(httpRequest(\"https://wycode.cn/web/api/public/hello?message=Hello\"))) //1.\n                .map(s -\u003e JSON.parseObject(s,Message.class)) //解析JSON\n                .subscribeOn(Schedulers.io()) //2.\n                .observeOn(AndroidSchedulers.mainThread()) //3.\n                .subscribe(message -\u003e textView.setText(message.message)); //4.\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e可以看到在原有代码几乎没变的情况下，加上1行代码就实现了将Json转为实体再处理的需求。这就是RxJava的魅力。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e完整源码在这里：\u003ca href=\"https://github.com/wangyucode/rxjava\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/rxjava\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e而以上也仅仅用到了RxJava的冰山一角，还有各种各样的函数来满足各种各样的需求。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e函数列表在这里：\u003ca href=\"http://reactivex.io/documentation/operators.html\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttp://reactivex.io/documentation/operators.html\u003c/a\u003e\u003c/p\u003e\n","content":"\n\u003e RxJava是`ReactiveX`的Java分支，除了Java版，`ReactiveX`还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\n\n\n\u003e ReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为`响应式编程`，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上`Lambda`表达式和链式编程，让程序变得更加简洁优雅。\n\n\u003c!--more--\u003e\n\n\n看完了RactiveX的简介，觉得用它来封装一个网络请求框架应该是再好不过了，但是当我真正开始封装网络请求时，我发现：RxJava给的答案是，你并不需要去封装，而是**直接使用**就好了。实例代码如下。\n\n## Hello RxJava\n\n```Java\n\tpublic void onClick(View v) {\n        Observable.create((ObservableOnSubscribe\u003cString\u003e) emitter -\u003e emitter.onNext(httpRequest()))  //1.\n                .subscribeOn(Schedulers.io())  //2.\n                .observeOn(AndroidSchedulers.mainThread())  //3.\n                .subscribe(s -\u003e textView.setText(s));  //4.\n    }\n    \n```\n\n核心代码就是`OnClick`方法中的四行。\n\n步骤如下：\n\n\n1. 通过`create`函数创建`Observable`对象\n2. 订阅调度到`Schedulers.io()`，`io`是一个有线程缓存的新线程调度器\n3. 将事件消费调度到Android的主线程上\n4. 消费者（观察者）代码\n\n`httpRequest()`没用到任何复杂的框架，就用原生的`HttpURLConnection`做一个网络请求，返回请求结果的String，代码如下：\n\n```Java\n\tprivate String httpRequest() throws Exception {\n        URL url = new URL(\"http://wycode.cn/\");\n        HttpURLConnection urlConnection = (HttpURLConnection) url.openConnection();\n        String result;\n        try {\n            BufferedInputStream in = new BufferedInputStream(urlConnection.getInputStream());\n            result = readStream(in);\n        } finally {\n            urlConnection.disconnect();\n        }\n        return result;\n    }\n\n    private String readStream(BufferedInputStream in) {\n        BufferedReader reader = new BufferedReader(new InputStreamReader(in));\n        StringBuilder sb = new StringBuilder();\n        String line;\n        try {\n            while ((line = reader.readLine()) != null) {\n                sb.append(line).append(\"\\n\");\n            }\n        } catch (IOException e) {\n            e.printStackTrace();\n        } finally {\n            try {\n                in.close();\n            } catch (IOException e) {\n                e.printStackTrace();\n            }\n        }\n        return sb.toString();\n    }\n```\n\n## 变换操作\n\n通常的，我们在请求网络后要对服务器返回的字符串进行解析，这时我们可以使用RxJava的`Transforming`操作，在返回前将JSON String转为实体类。\n\n```Java\nObservable.create((ObservableOnSubscribe\u003cString\u003e) emitter -\u003e emitter.onNext(httpRequest(\"https://wycode.cn/web/api/public/hello?message=Hello\"))) //1.\n                .map(s -\u003e JSON.parseObject(s,Message.class)) //解析JSON\n                .subscribeOn(Schedulers.io()) //2.\n                .observeOn(AndroidSchedulers.mainThread()) //3.\n                .subscribe(message -\u003e textView.setText(message.message)); //4.\n```\n\n可以看到在原有代码几乎没变的情况下，加上1行代码就实现了将Json转为实体再处理的需求。这就是RxJava的魅力。\n\n完整源码在这里：https://github.com/wangyucode/rxjava\n\n而以上也仅仅用到了RxJava的冰山一角，还有各种各样的函数来满足各种各样的需求。\n\n函数列表在这里：http://reactivex.io/documentation/operators.html\n","data":{"title":"RxJava入门","date":"2018-01-20","tags":["RxJava","Java"],"category":"Languages"},"isEmpty":false,"excerpt":"\n\u003e RxJava是`ReactiveX`的Java分支，除了Java版，`ReactiveX`还支持包括JavaScript、C#、C++、Swift、Python、Android、Unity、Kotlin、Go、PHP在内的众多平台和语言。\n\n\n\u003e ReactiveX的核心是对观察者模式的扩展，并上升到了和命令式编程完全不同的编程方式的高度，称为`响应式编程`，优势在于处理异步、基于事件的应用程序。可以将数据或是事件都加队列中处理，优雅地解决了以前多线程交互、IO、并发、同步、异常处理这种编程的老大难问题。再加上`Lambda`表达式和链式编程，让程序变得更加简洁优雅。\n\n"},{"id":"kotlin-learn","file":"kotlin-learn.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e在Google I/O 2017上Google正式宣布Kotlin成为Android开发的官方新语言，Kotlin得到了Google的背书，随着Android O和Android Studio3.0的正式发布，Kotlin语言的春天可能马上就要来临了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170815_kotlin.png\" alt=\"Kotlin\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e在Google I/O 2017上Google正式宣布Kotlin成为Android开发的官方新语言，Kotlin得到了Google的背书，随着Android O和Android Studio3.0的正式发布，Kotlin语言的春天可能马上就要来临了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20170815_kotlin.png\" alt=\"Kotlin\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eKotlin\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eKotlin是基于JVM，静态类型的跨平台语言，在Java语言的基础上引入了很多现代语言的新特性。支持后台Server端、JavaScript前后端、及移动Android端开发。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e新特性\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eNull Safety\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003eKotlin解决了Java错误量最多的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNullPointerException\u003c/code\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003evar a: String = \"abc\"\na = null // error！对于常量，编译时就不能为空，否则编译出错\n\nvar b: String? = \"abc\" //String? 可为空的 String 类型\nb = null // ok！\n\nval l = b.length // error: variable 'b' can be null\n\n//除了传统的if(b!=null)判空后再调用之外还有安全引用方式\n\nb?.length //\n\n//对于以下操作\nval l: Int = if (b != null) b.length else -1\n//可以简写为 ?: （Elvis Operator）后面也可以跟reture和throw语句\nval l = b?.length ?: -1\n\n//安全转型\nval aInt: Int? = a as? Int\n\n//可以为空的数组，以及非空筛选\nval nullableList: List\u0026#x3C;Int?\u003e = listOf(1, 2, null, 4)\nval intList: List\u0026#x3C;Int\u003e = nullableList.filterNotNull()\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003e基础数据类型没有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCharacter\u003c/code\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eChar\u003c/code\u003e被单独处理，不是数字，不能和数字进行比较，可以使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etoInt()\u003c/code\u003e函数\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003e没有8进制\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003e数组类型不可变，不能将\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eArray\u0026#x3C;String\u003e\u003c/code\u003e赋给\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eArray\u0026#x3C;Any\u003e\u003c/code\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003e以下是位运算，只支持\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eInt\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLong\u003c/code\u003e\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eshl(bits) – signed shift left (Java's \u0026#x3C;\u0026#x3C;)\nshr(bits) – signed shift right (Java's \u003e\u003e)\nushr(bits) – unsigned shift right (Java's \u003e\u003e\u003e)\nand(bits) – bitwise and\nor(bits) – bitwise or\nxor(bits) – bitwise xor\ninv() – bitwise inversion\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e没有静态方法，可以使用 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eobject declaration\u003c/code\u003e替代\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n\u003e 在Google I/O 2017上Google正式宣布Kotlin成为Android开发的官方新语言，Kotlin得到了Google的背书，随着Android O和Android Studio3.0的正式发布，Kotlin语言的春天可能马上就要来临了。\n\n![Kotlin](/images/20170815_kotlin.png)\n\n\u003c!--more--\u003e\n\n## Kotlin\n\nKotlin是基于JVM，静态类型的跨平台语言，在Java语言的基础上引入了很多现代语言的新特性。支持后台Server端、JavaScript前后端、及移动Android端开发。\n\n## 新特性\n\n- Null Safety\n\nKotlin解决了Java错误量最多的`NullPointerException`\n\n```\nvar a: String = \"abc\"\na = null // error！对于常量，编译时就不能为空，否则编译出错\n\nvar b: String? = \"abc\" //String? 可为空的 String 类型\nb = null // ok！\n\nval l = b.length // error: variable 'b' can be null\n\n//除了传统的if(b!=null)判空后再调用之外还有安全引用方式\n\nb?.length //\n\n//对于以下操作\nval l: Int = if (b != null) b.length else -1\n//可以简写为 ?: （Elvis Operator）后面也可以跟reture和throw语句\nval l = b?.length ?: -1\n\n//安全转型\nval aInt: Int? = a as? Int\n\n//可以为空的数组，以及非空筛选\nval nullableList: List\u003cInt?\u003e = listOf(1, 2, null, 4)\nval intList: List\u003cInt\u003e = nullableList.filterNotNull()\n```\n\n- 基础数据类型没有`Character`\n\n- `Char`被单独处理，不是数字，不能和数字进行比较，可以使用`toInt()`函数\n\n- 没有8进制\n\n- 数组类型不可变，不能将`Array\u003cString\u003e`赋给`Array\u003cAny\u003e`\n\n- 以下是位运算，只支持`Int`和`Long`\n\n```kotlin\nshl(bits) – signed shift left (Java's \u003c\u003c)\nshr(bits) – signed shift right (Java's \u003e\u003e)\nushr(bits) – unsigned shift right (Java's \u003e\u003e\u003e)\nand(bits) – bitwise and\nor(bits) – bitwise or\nxor(bits) – bitwise xor\ninv() – bitwise inversion\n```\n- 没有静态方法，可以使用 `object declaration`替代\n","data":{"title":"Kotlin入门","date":"2017-07-27","tags":["Kotlin"],"category":"Languages"},"isEmpty":false,"excerpt":"\n\u003e 在Google I/O 2017上Google正式宣布Kotlin成为Android开发的官方新语言，Kotlin得到了Google的背书，随着Android O和Android Studio3.0的正式发布，Kotlin语言的春天可能马上就要来临了。\n\n![Kotlin](/images/20170815_kotlin.png)\n\n"}]},"__N_SSG":true},"page":"/blog/category/[cid]","query":{"cid":"languages"},"buildId":"KYANdil3ljfaQ9_rbwOmo","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
