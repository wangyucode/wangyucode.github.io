<!DOCTYPE html><html lang="zh-CN"><head><meta charSet="utf-8"/><title>王郁的小站</title><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/><meta name="next-head-count" content="3"/><link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml"/><meta name="description" content="欢迎光临王郁的小站"/><meta property="og:image" content="https://og-image.vercel.app/%E7%8E%8B%E9%83%81%E7%9A%84%E5%B0%8F%E7%AB%99.png?theme=light&amp;md=0&amp;fontSize=75px&amp;images=https%3A%2F%2Fassets.vercel.com%2Fimage%2Fupload%2Ffront%2Fassets%2Fdesign%2Fnextjs-black-logo.svg"/><meta name="og:title" content="王郁的小站"/><meta name="twitter:card" content="summary_large_image"/><link rel="preload" href="/_next/static/css/804786de35d6ea9b.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/804786de35d6ea9b.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-6af0e3c12b874bb0.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-e14092e0d084b50d.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-bc0074f0f8514a28.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-f249e8934ba43001.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/358-09e70898ee89de63.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/673-dd16adde3fc920b7.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/blog/category/%5Bcid%5D-70b04bc76d149f91.js" defer="" crossorigin=""></script><script src="/_next/static/NDkQWnMtEcy0IDQqDGEkS/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/NDkQWnMtEcy0IDQqDGEkS/_ssgManifest.js" defer="" crossorigin=""></script></head><body class="bg-white dark:bg-slate-900 transition-colors duration-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"caddy","file":"caddy.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://caddyserver.com/old/resources/images/caddy-logo.svg\" alt=\"Caddy\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e之前一直使用Nginx作为反向代理和静态网站服务，Caddy作为替代，有诸多好处，比如：配置简单，支持API，Caddyfile, JSON多种配置方式；支持自动HTTPS，自动更新TLS证书；内置支持HTTP1, HTTP2, HTTP3, Websocket。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章安装和配置Caddy的全流程\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://caddyserver.com/old/resources/images/caddy-logo.svg\" alt=\"Caddy\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e之前一直使用Nginx作为反向代理和静态网站服务，Caddy作为替代，有诸多好处，比如：配置简单，支持API，Caddyfile, JSON多种配置方式；支持自动HTTPS，自动更新TLS证书；内置支持HTTP1, HTTP2, HTTP3, Websocket。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章安装和配置Caddy的全流程\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e安装Caddy\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e当前安装最简单的方式当然是通过Docker了，这是docker-compose文件\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-yml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eservices:\n  caddy:\n    image: caddy:2.8\n    container_name: caddy\n    restart: unless-stopped\n    ports:\n      - \"80:80\"\n      - \"443:443\"\n      - \"443:443/udp\"\n    volumes:\n      -./caddy/Caddyfile:/etc/caddy/Caddyfile:ro\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edocker compose up -d\u003c/code\u003e命令启动容器即可\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e配置Caddy\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e以下是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewycode.cn\u003c/code\u003e 的 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCaddyfile\u003c/code\u003e 配置。可以看到比nginx的配置简单了很多。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003ewycode.cn {\n\n    encode zstd gzip\n\n    handle_path /upload/* {\n        root * /srv/upload\n        file_server browse\n    }\n\n    handle_path /swagger-ui/* {\n        root * /srv/swagger-ui\n        file_server\n    }\n\n    handle /api/v1/* {\n        reverse_proxy \"http://deno:8083\"\n    }\n\n    handle /mongo/* {\n        reverse_proxy \"http://mongo-express:8081\"\n    }\n\n    handle {\n        root * /srv/wycode\n        try_files {path} /{path}.html {path}/ /404.html\n        file_server\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eHTTP Content压缩：\u003c/strong\u003e \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eencode zstd gzip\u003c/code\u003e 启用zstd和gzip压缩\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eupload目录：\u003c/strong\u003e \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehandle_path /upload/*\u003c/code\u003e 配置静态文件服务，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eroot * /srv/upload\u003c/code\u003e 表示将 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/upload\u003c/code\u003e 目录映射到 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/srv/upload\u003c/code\u003e 目录\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eSwagger UI：\u003c/strong\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehandle_path /swagger-ui/*\u003c/code\u003e 配置静态文件服务，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eroot * /srv/swagger-ui\u003c/code\u003e 表示将 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/swagger-ui\u003c/code\u003e 目录映射到 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/srv/swagger-ui\u003c/code\u003e 目录\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eDeno API：\u003c/strong\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehandle /api/v1/*\u003c/code\u003e 配置反向代理，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereverse_proxy \"http://deno:8083\"\u003c/code\u003e 表示将 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/api/v1\u003c/code\u003e 映射到 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttp://deno:8083\u003c/code\u003e 服务\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eMongoDB WebUI：\u003c/strong\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehandle /mongo/*\u003c/code\u003e 配置反向代理，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereverse_proxy \"http://mongo-express:8081\"\u003c/code\u003e 表示将 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/mongo\u003c/code\u003e 映射到 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttp://mongo-express:8081\u003c/code\u003e 服务\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eNextJs主站：\u003c/strong\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehandle\u003c/code\u003e 配置静态文件服务，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eroot * /srv/wycode\u003c/code\u003e 表示将 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/\u003c/code\u003e 目录映射到 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/srv/wycode\u003c/code\u003e 目录，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etry_files {path} /{path}.html {path}/ /404.html\u003c/code\u003e 表示如果请求的路径不存在，则尝试查找 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/\u003c/code\u003e 目录下的文件，如果文件不存在，则返回 404 错误。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e本文原始发表于 \u003ca href=\"https://wycode.cn/blog/caddy\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://wycode.cn/blog/caddy\u003c/a\u003e，转载请注明出处\u003c/p\u003e\n","content":"\n![Caddy](https://caddyserver.com/old/resources/images/caddy-logo.svg)\n\n\u003e 之前一直使用Nginx作为反向代理和静态网站服务，Caddy作为替代，有诸多好处，比如：配置简单，支持API，Caddyfile, JSON多种配置方式；支持自动HTTPS，自动更新TLS证书；内置支持HTTP1, HTTP2, HTTP3, Websocket。\n\n这篇文章安装和配置Caddy的全流程\n\n\u003c!--more--\u003e\n\n## 安装Caddy\n\n当前安装最简单的方式当然是通过Docker了，这是docker-compose文件\n\n```yml\nservices:\n  caddy:\n    image: caddy:2.8\n    container_name: caddy\n    restart: unless-stopped\n    ports:\n      - \"80:80\"\n      - \"443:443\"\n      - \"443:443/udp\"\n    volumes:\n      -./caddy/Caddyfile:/etc/caddy/Caddyfile:ro\n```\n\n通过`docker compose up -d`命令启动容器即可\n\n\n## 配置Caddy\n\n以下是`wycode.cn` 的 `Caddyfile` 配置。可以看到比nginx的配置简单了很多。\n\n```\nwycode.cn {\n\n    encode zstd gzip\n\n    handle_path /upload/* {\n        root * /srv/upload\n        file_server browse\n    }\n\n    handle_path /swagger-ui/* {\n        root * /srv/swagger-ui\n        file_server\n    }\n\n    handle /api/v1/* {\n        reverse_proxy \"http://deno:8083\"\n    }\n\n    handle /mongo/* {\n        reverse_proxy \"http://mongo-express:8081\"\n    }\n\n    handle {\n        root * /srv/wycode\n        try_files {path} /{path}.html {path}/ /404.html\n        file_server\n    }\n}\n```\n\n- **HTTP Content压缩：** `encode zstd gzip` 启用zstd和gzip压缩\n- **upload目录：** `handle_path /upload/*` 配置静态文件服务，`root * /srv/upload` 表示将 `/upload` 目录映射到 `/srv/upload` 目录\n- **Swagger UI：**`handle_path /swagger-ui/*` 配置静态文件服务，`root * /srv/swagger-ui` 表示将 `/swagger-ui` 目录映射到 `/srv/swagger-ui` 目录\n- **Deno API：**`handle /api/v1/*` 配置反向代理，`reverse_proxy \"http://deno:8083\"` 表示将 `/api/v1` 映射到 `http://deno:8083` 服务\n- **MongoDB WebUI：**`handle /mongo/*` 配置反向代理，`reverse_proxy \"http://mongo-express:8081\"` 表示将 `/mongo` 映射到 `http://mongo-express:8081` 服务\n- **NextJs主站：**`handle` 配置静态文件服务，`root * /srv/wycode` 表示将 `/` 目录映射到 `/srv/wycode` 目录，`try_files {path} /{path}.html {path}/ /404.html` 表示如果请求的路径不存在，则尝试查找 `/` 目录下的文件，如果文件不存在，则返回 404 错误。\n\n本文原始发表于 \u003chttps://wycode.cn/blog/caddy\u003e，转载请注明出处","data":{"title":"Caddy的安装和使用","date":"2024-09-24","tags":["Linux","Docker"],"category":"Linux"},"isEmpty":false,"excerpt":"\n![Caddy](https://caddyserver.com/old/resources/images/caddy-logo.svg)\n\n\u003e 之前一直使用Nginx作为反向代理和静态网站服务，Caddy作为替代，有诸多好处，比如：配置简单，支持API，Caddyfile, JSON多种配置方式；支持自动HTTPS，自动更新TLS证书；内置支持HTTP1, HTTP2, HTTP3, Websocket。\n\n这篇文章安装和配置Caddy的全流程\n\n"},{"id":"ssh-key","file":"ssh-key.md","excerptHtml":"","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://1000marcas.net/wp-content/uploads/2021/06/Git-Logo-1280x800.png\" alt=\"git\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003egit在远端pull或者push时报：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003einvalid format git@github.com: Permission denied (publickey).\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e问题场景：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003ewindows上把private key的内容复制到文本编辑器时会出现。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e根本原因：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e私钥的换行是单字符\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLF\u003c/code\u003e，但windows的默认换行符是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCRLF\u003c/code\u003e，所以导致git读取私钥报格式错误。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e解决办法：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用文本编辑器修改换行符，例如VSCODE中状态栏点击\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCRLF\u003c/code\u003e，然后切换成\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLF\u003c/code\u003e。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e笔记：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通过\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003essh -vT git@github.com\u003c/code\u003e 可以查看详细的ssh log，来排查ssh的问题。\n出现如下log说明ssh key已经正常配置：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eHi wangyucode! You've successfully authenticated, but GitHub does not provide shell access.\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![git](https://1000marcas.net/wp-content/uploads/2021/06/Git-Logo-1280x800.png)\n\ngit在远端pull或者push时报：\n\n```\ninvalid format git@github.com: Permission denied (publickey).\n```\n\n## 问题场景：\n\nwindows上把private key的内容复制到文本编辑器时会出现。\n\n## 根本原因：\n\n私钥的换行是单字符`LF`，但windows的默认换行符是`CRLF`，所以导致git读取私钥报格式错误。\n\n## 解决办法：\n\n使用文本编辑器修改换行符，例如VSCODE中状态栏点击`CRLF`，然后切换成`LF`。\n\n## 笔记：\n\n通过`ssh -vT git@github.com` 可以查看详细的ssh log，来排查ssh的问题。\n出现如下log说明ssh key已经正常配置：\n```\nHi wangyucode! You've successfully authenticated, but GitHub does not provide shell access.\n```\n","data":{"title":"解决 invalid format git@github.com: Permission denied (publickey).","date":"2023-09-11","tags":["Linux","Git"],"category":"Linux"},"isEmpty":false,"excerpt":""},{"id":"virtualbox-network","file":"virtualbox-network.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.virtualbox.org/graphics/vbox_logo2_gradient.png\" alt=\"virtual-box\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eVirtualBox是著名的开源虚拟机软件，最初由Sun公司出品。后来Sun公司被Oracle收购。Sun公司的包括Java和VirtualBox，现在都是Oracle公司的软件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e配置虚拟机时，对于如何选择网络类型一直是一头雾水，这篇文章将VirtualBox的7种网络模式全部都总结一下。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e不同模式的原理，也适用于VMWare。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.virtualbox.org/graphics/vbox_logo2_gradient.png\" alt=\"virtual-box\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eVirtualBox是著名的开源虚拟机软件，最初由Sun公司出品。后来Sun公司被Oracle收购。Sun公司的包括Java和VirtualBox，现在都是Oracle公司的软件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e配置虚拟机时，对于如何选择网络类型一直是一头雾水，这篇文章将VirtualBox的7种网络模式全部都总结一下。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e不同模式的原理，也适用于VMWare。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eNot attached\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这个模式会向虚拟机报告有网卡，但没有物理连接。\n就像拔网线一个效果。\n对于通知虚拟机重新配置网络很有用。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eNetwork Address Translation (NAT)\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e如果你只是想在虚拟机内访问互联网，这个模式就足够了。\n这种模式有很多限制，比如无法ping通。不支持UDP广播。除了TCP和UDP之外的协议不支持。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eNAT Network\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e和NAT差不多，NAT网络就像虚拟机在一个路由器后面一样。外部访问需要设置端口转发。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eBridged Networking\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e即桥接，虚拟机将直接链接某个宿主机物理网卡，而不用通过宿主机操作系统的网络。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eInternal networking\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这种网络仅在虚拟机内部可见，宿主机及外部不可见。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHost-only networking\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这种可以创建一个虚拟的网络组，包含宿主机和虚拟机，宿主机上会有一个虚拟的网卡，提供和虚拟机之间的连接。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eGeneric networking\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这种相当于自定义，可以自由选择网卡驱动，一般情况下用不着这个。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e各种模式可访问性：\u003c/h2\u003e\n\u003ctable class=\"mb-4\"\u003e\n\u003cthead class=\"bg-sky-200 dark:bg-sky-900\"\u003e\n\u003ctr\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e模式\u003c/th\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e虚拟机→宿主机\u003c/th\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e宿主机→虚拟机\u003c/th\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e虚拟机A→虚拟机B\u003c/th\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e虚拟机→互联网\u003c/th\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e互联网→虚拟机\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eHost-only\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eInternal\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eBridged\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eNAT\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e端口转发\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eX\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e端口转发\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eNATservice\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e端口转发\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e√\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e端口转发\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e总结\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e绝大多数情况下，我们需要虚拟机可以上网，这时设置一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNAT\u003c/code\u003e的模式。\n然后我们还需要主机可以访问虚拟机的服务，这时我们可以为虚拟机再加一个网卡设置为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHost-only\u003c/code\u003e模式。\u003c/p\u003e\n","content":"\n![virtual-box](https://www.virtualbox.org/graphics/vbox_logo2_gradient.png)\n\nVirtualBox是著名的开源虚拟机软件，最初由Sun公司出品。后来Sun公司被Oracle收购。Sun公司的包括Java和VirtualBox，现在都是Oracle公司的软件。\n\n配置虚拟机时，对于如何选择网络类型一直是一头雾水，这篇文章将VirtualBox的7种网络模式全部都总结一下。\n\n不同模式的原理，也适用于VMWare。\n\n\u003c!--more--\u003e\n\n## Not attached\n\n这个模式会向虚拟机报告有网卡，但没有物理连接。\n就像拔网线一个效果。\n对于通知虚拟机重新配置网络很有用。\n\n## Network Address Translation (NAT)\n\n如果你只是想在虚拟机内访问互联网，这个模式就足够了。\n这种模式有很多限制，比如无法ping通。不支持UDP广播。除了TCP和UDP之外的协议不支持。\n\n## NAT Network\n\n和NAT差不多，NAT网络就像虚拟机在一个路由器后面一样。外部访问需要设置端口转发。\n\n## Bridged Networking\n\n即桥接，虚拟机将直接链接某个宿主机物理网卡，而不用通过宿主机操作系统的网络。\n\n## Internal networking\n\n这种网络仅在虚拟机内部可见，宿主机及外部不可见。\n\n## Host-only networking\n\n这种可以创建一个虚拟的网络组，包含宿主机和虚拟机，宿主机上会有一个虚拟的网卡，提供和虚拟机之间的连接。\n\n## Generic networking\n\n这种相当于自定义，可以自由选择网卡驱动，一般情况下用不着这个。\n\n## 各种模式可访问性：\n\n| 模式 | 虚拟机→宿主机 | 宿主机→虚拟机 | 虚拟机A→虚拟机B | 虚拟机→互联网 | 互联网→虚拟机 |\n| ------ | ------------ | ------------ | -------------- | ------------ | ------------ |\n| Host-only | √ | √ | √ | X | X |\n| Internal | X | X | √ | X | X |\n| Bridged | √ | √ | √ | √ | √ |\n| NAT | √ | 端口转发 | X | √ | 端口转发 |\n| NATservice | √ | 端口转发 | √ | √ | 端口转发 |\n\n## 总结\n\n绝大多数情况下，我们需要虚拟机可以上网，这时设置一个`NAT`的模式。\n然后我们还需要主机可以访问虚拟机的服务，这时我们可以为虚拟机再加一个网卡设置为`Host-only`模式。","data":{"title":"VirtualBox的虚拟机网络配置","date":"2019-09-20","tags":["VirtualBox"],"category":"Linux"},"isEmpty":false,"excerpt":"\n![virtual-box](https://www.virtualbox.org/graphics/vbox_logo2_gradient.png)\n\nVirtualBox是著名的开源虚拟机软件，最初由Sun公司出品。后来Sun公司被Oracle收购。Sun公司的包括Java和VirtualBox，现在都是Oracle公司的软件。\n\n配置虚拟机时，对于如何选择网络类型一直是一头雾水，这篇文章将VirtualBox的7种网络模式全部都总结一下。\n\n不同模式的原理，也适用于VMWare。\n\n"},{"id":"ngrok","file":"ngrok.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.howtogeek.com/thumbcache/2/200/b47f24b18abd7d5411b75447849e04ff/wp-content/uploads/2017/03/why-is-a-network-tunnel-called-a-tunnel-00.jpg\" alt=\"Network\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当我们需要在外网访问处于内网的服务时，就需要内网穿透这个技术了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本文介绍实现内网穿透的多种方式\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.howtogeek.com/thumbcache/2/200/b47f24b18abd7d5411b75447849e04ff/wp-content/uploads/2017/03/why-is-a-network-tunnel-called-a-tunnel-00.jpg\" alt=\"Network\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当我们需要在外网访问处于内网的服务时，就需要内网穿透这个技术了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本文介绍实现内网穿透的多种方式\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e有外网IP\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e如果你的宽带接入是有外网IP的，那很简单，只需要设置路由器的端口转发就可以了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e查看自己是不是有外网IP也很简单，查看路由器获取到的IP和真实的外网IP是否一致就知道了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e真实外网IP，通过搜索引擎搜索IP即可获取。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e由于现在小区宽带都是接入到服务商的大路由上，IPV4的资源也很珍贵，所以基本都是没有外网IP的，本文重点讨论没有外网IP的情况。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e付费方案\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ca href=\"https://www.oray.com\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://www.oray.com\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e花生壳提供软件解决方案，同时他们也提供能够实现穿透的硬件方案。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当然还有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNAT123\u003c/code\u003e，但是他们的官网就像是上个世纪的网站，还是算了吧。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003engrok\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://camo.githubusercontent.com/f2d698991e6a0411680413ebcc15a6460b8beda3/68747470733a2f2f6e67726f6b2e636f6d2f7374617469632f696d672f6f766572766965772e706e67\" alt=\"Network\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003engrok1.x是开源的，地址在这：\u003ca href=\"https://github.com/inconshreveable/ngrok\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/inconshreveable/ngrok\u003c/a\u003e\nngrok2.x是闭源的，官网在这：\u003ca href=\"https://ngrok.com\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://ngrok.com\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003engrok商业化之后估计1.x就很少维护了，2.x目前是有限制的免费。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003efrp\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://github.com/fatedier/frp/raw/master/doc/pic/architecture.png\" alt=\"Network\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003efrp\u003c/code\u003e是一个开源的内网穿透的反向代理应用，支持 tcp, udp 协议。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ca href=\"https://github.com/fatedier/frp\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/fatedier/frp\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e用户通过访问一个装有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003efrps\u003c/code\u003e的公网服务器，由服务器代理访问处于内网，并安装了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003efrpc\u003c/code\u003e的内网服务\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e配置方式，请参考他们的github仓库\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003ev2ray\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ev2ray\u003c/code\u003e通常用于科学上网，但是由于一个 V2Ray 进程可并发支持多个入站和出站协议，所以它也可以用于内网穿透。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e反向代理的大致工作原理如下:\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e假设在主机 A 中有一个网页服务器，这台主机没有公网 IP，无法在公网上直接访问。另有一台主机 B，它可以由公网访问。现在我们需要把 B 作为入口，把流量从 B 转发到 A。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e在主机 A 中配置一个 V2Ray，称为bridge，在 B 中也配置一个 V2Ray，称为portal。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003ebridge会向portal主动建立连接，此连接的目标地址可以自行设定。portal会收到两种连接，一是由bridge发来的连接，二是公网用户发来的连接。portal会自动将两类连接合并。于是bridge就可以收到公网流量了。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003ebridge在收到公网流量之后，会将其原封不动地发给主机 A 中的网页服务器。当然，这一步需要路由的协作。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003ebridge会根据流量的大小进行动态的负载均衡。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e具体配置请参考官网及github\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ca href=\"https://www.v2ray.com\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://www.v2ray.com\u003c/a\u003e\n\u003ca href=\"https://github.com/V2Ray/v2ray-core\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/V2Ray/v2ray-core\u003c/a\u003e\u003c/p\u003e\n","content":"\n![Network](https://www.howtogeek.com/thumbcache/2/200/b47f24b18abd7d5411b75447849e04ff/wp-content/uploads/2017/03/why-is-a-network-tunnel-called-a-tunnel-00.jpg)\n\n当我们需要在外网访问处于内网的服务时，就需要内网穿透这个技术了。\n\n本文介绍实现内网穿透的多种方式\n\n\u003c!--more--\u003e\n\n## 有外网IP\n\n如果你的宽带接入是有外网IP的，那很简单，只需要设置路由器的端口转发就可以了。\n\n查看自己是不是有外网IP也很简单，查看路由器获取到的IP和真实的外网IP是否一致就知道了。\n\n真实外网IP，通过搜索引擎搜索IP即可获取。\n\n由于现在小区宽带都是接入到服务商的大路由上，IPV4的资源也很珍贵，所以基本都是没有外网IP的，本文重点讨论没有外网IP的情况。\n\n## 付费方案\n\n[https://www.oray.com](https://www.oray.com)\n\n花生壳提供软件解决方案，同时他们也提供能够实现穿透的硬件方案。\n\n当然还有`NAT123`，但是他们的官网就像是上个世纪的网站，还是算了吧。\n\n## ngrok\n\n![Network](https://camo.githubusercontent.com/f2d698991e6a0411680413ebcc15a6460b8beda3/68747470733a2f2f6e67726f6b2e636f6d2f7374617469632f696d672f6f766572766965772e706e67)\n\nngrok1.x是开源的，地址在这：[https://github.com/inconshreveable/ngrok](https://github.com/inconshreveable/ngrok)\nngrok2.x是闭源的，官网在这：[https://ngrok.com](https://ngrok.com)\n\nngrok商业化之后估计1.x就很少维护了，2.x目前是有限制的免费。\n\n## frp\n\n![Network](https://github.com/fatedier/frp/raw/master/doc/pic/architecture.png)\n\n`frp`是一个开源的内网穿透的反向代理应用，支持 tcp, udp 协议。\n\n[https://github.com/fatedier/frp](https://github.com/fatedier/frp)\n\n用户通过访问一个装有`frps`的公网服务器，由服务器代理访问处于内网，并安装了`frpc`的内网服务\n\n配置方式，请参考他们的github仓库\n\n## v2ray\n\n`v2ray`通常用于科学上网，但是由于一个 V2Ray 进程可并发支持多个入站和出站协议，所以它也可以用于内网穿透。\n\n反向代理的大致工作原理如下:\n\n- 假设在主机 A 中有一个网页服务器，这台主机没有公网 IP，无法在公网上直接访问。另有一台主机 B，它可以由公网访问。现在我们需要把 B 作为入口，把流量从 B 转发到 A。\n- 在主机 A 中配置一个 V2Ray，称为bridge，在 B 中也配置一个 V2Ray，称为portal。\n- bridge会向portal主动建立连接，此连接的目标地址可以自行设定。portal会收到两种连接，一是由bridge发来的连接，二是公网用户发来的连接。portal会自动将两类连接合并。于是bridge就可以收到公网流量了。\n- bridge在收到公网流量之后，会将其原封不动地发给主机 A 中的网页服务器。当然，这一步需要路由的协作。\n- bridge会根据流量的大小进行动态的负载均衡。\n\n具体配置请参考官网及github\n\n[https://www.v2ray.com](https://www.v2ray.com)\n[https://github.com/V2Ray/v2ray-core](https://github.com/V2Ray/v2ray-core)","data":{"title":"实现内网穿透的最新姿势","date":"2019-09-02","tags":["Linux"],"category":"Linux"},"isEmpty":false,"excerpt":"\n![Network](https://www.howtogeek.com/thumbcache/2/200/b47f24b18abd7d5411b75447849e04ff/wp-content/uploads/2017/03/why-is-a-network-tunnel-called-a-tunnel-00.jpg)\n\n当我们需要在外网访问处于内网的服务时，就需要内网穿透这个技术了。\n\n本文介绍实现内网穿透的多种方式\n\n"},{"id":"raspberrypi-fish","file":"raspberrypi-fish.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e因为最近要出门一段时间，鱼缸没人照顾，树莓派的第一个实用需求出现了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e准备做一个液位报警仪，当鱼缸水位低于报警水位，发一封邮件给我，我就能在微信上收到通知，从而远程控制给鱼缸加水，防止鱼缸循环泵烧坏。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cvideo src=\"/images/20190807_raspberrypi_fish.mp4\" controls width=\"70%\" style=\"margin:24px auto;display: block;\"\u003e\u003c/video\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e使用GPIO接口控制硬件和接收传感器的数据，实现过程如下：\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e因为最近要出门一段时间，鱼缸没人照顾，树莓派的第一个实用需求出现了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e准备做一个液位报警仪，当鱼缸水位低于报警水位，发一封邮件给我，我就能在微信上收到通知，从而远程控制给鱼缸加水，防止鱼缸循环泵烧坏。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cvideo src=\"/images/20190807_raspberrypi_fish.mp4\" controls width=\"70%\" style=\"margin:24px auto;display: block;\"\u003e\u003c/video\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e使用GPIO接口控制硬件和接收传感器的数据，实现过程如下：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eGPIO介绍\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e树莓派的一个强大功能是沿着电路板顶部边缘的一排\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGPIO\u003c/code\u003e（general-purpose input/output）引脚。 树莓派4B板上有一排40针GPIO接头。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://technicalustad.com/wp-content/uploads/2018/02/Raspberry-Pi-GPIO-Explained.png\" alt=\"GPIO\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e主板上有两个5V引脚和两个3V3引脚，以及一些不可配置的接地引脚（0V）。 其余引脚均为通用3V3引脚，意味着输出设置为3V3，输入为3V3容差。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e输出\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e指定为输出引脚的GPIO引脚可以设置为高（3V3）或低（0V）。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e输入\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e指定为输入引脚的GPIO引脚可以读为高（3V3）或低（0V）。 使用内部上拉或下拉电阻可以更轻松地实现这一点。 引脚GPIO2和GPIO3具有固定的上拉电阻，但对于其他引脚，可以使用软件配置。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e其它\u003c/h3\u003e\n\u003cp class=\"mb-4\"\u003e除了简单的输入和输出设备外，GPIO引脚还可以使用多种替代功能，一些可用于所有引脚，另一些则可用于特定引脚。如：PWM、SPI、I2C、串行\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e装备\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e面包板：用于免焊接线，边上两排是竖向连接的，中间是横向连接的。用杜邦线插入孔中就可以便捷接线了。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"http://www.taichi-maker.com/wp-content/uploads/2017/03/breadboard.jpg\" alt=\"面包板\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eGPIO扩展版：可以方便地将所有GPIO接到面包板上\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"http://g.search1.alicdn.com/img/bao/uploaded/i4/i3/TB1jpt3LXXXXXbnXpXXXXXXXXXX_!!0-item_pic.jpg_200x200.jpg\" alt=\"面包板\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eLED二极管：用于展示状态\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"http://file.youboy.com/a/83/81/74/5/9777755.jpg\" alt=\"二极管\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e干簧管液位计：用于监测液位，其原理是浮球中有磁铁，可以磁化干簧管，从而短路电路\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"http://i01.yizimg.com/uploads_old/351305/2015112223270383_old.jpg\" alt=\"液位计\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e接线\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eLED一端接GPIO17号引脚，一端接地。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e液位开关一端接GPIO2号引脚，一端接地。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20190807_fish.jpg\" alt=\"接线\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e编程\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这里我使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGPIO Zero\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这是一个Python的GPIO库，树莓派默认已经安装了，可以直接使用。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e核心脚本如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-python px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003efrom gpiozero import LED\nfrom gpiozero import Button\nfrom time import sleep\n\nled = LED(17) #1\nbutton = Button(2) #2\nwhile True:\n    sleep(0.5) #3\n    if button.is_pressed: #4\n        led.on()\n    else:\n        led.off()\n\u003c/code\u003e\u003c/pre\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e创建一个LED模式的GPIO口用于展示状态\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e创建一个Button模式的GPIO口\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e每0.5秒检测一次\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e开关打开则点亮LED，否则关闭LED\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003ePython发送邮件\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-python px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e#coding=utf-8\nfrom email.mime.text import MIMEText\nfrom email.header import Header\nfrom smtplib import SMTP_SSL\nimport time\n\n\n#邮箱smtp服务器\nhost_server = 'smtp.exmail.qq.com'\n#sender用户名\nsender_user = 'wangyu@wycode.cn'\n#邮箱登录密码\nsender_pwd = '**********'\n#发件人的邮箱\nsender_mail = sender_user\n#收件人邮箱\nreceiver = sender_user\n\n#邮件的正文内容\nmail_content = '【水位警报】过低\\n时间：'+time.strftime( '%Y-%m-%d %X', time.localtime())\n#邮件标题\nmail_title = '【水位警报】过低'\n\n#ssl登录\nsmtp = SMTP_SSL(host_server)\n#set_debuglevel()是用来调试的。参数值为1表示开启调试模式，参数值为0关闭调试模式\nsmtp.set_debuglevel(1)\nsmtp.ehlo(host_server)\nsmtp.login(sender_user, sender_pwd)\n\nmsg = MIMEText(mail_content, \"plain\", 'utf-8')\nmsg[\"Subject\"] = Header(mail_title, 'utf-8')\nmsg[\"From\"] = sender_mail\nmsg[\"To\"] = receiver\nsmtp.sendmail(sender_mail, receiver, msg.as_string())\nsmtp.quit()\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n因为最近要出门一段时间，鱼缸没人照顾，树莓派的第一个实用需求出现了。\n\n准备做一个液位报警仪，当鱼缸水位低于报警水位，发一封邮件给我，我就能在微信上收到通知，从而远程控制给鱼缸加水，防止鱼缸循环泵烧坏。\n\n\u003cvideo src=\"/images/20190807_raspberrypi_fish.mp4\" controls=\"controls\"  width=\"70%\" style=\"margin:24px auto;display: block;\"\u003e\u003c/video\u003e\n\n使用GPIO接口控制硬件和接收传感器的数据，实现过程如下：\n\u003c!--more--\u003e\n\n## GPIO介绍\n\n树莓派的一个强大功能是沿着电路板顶部边缘的一排`GPIO`（general-purpose input/output）引脚。 树莓派4B板上有一排40针GPIO接头。\n\n![GPIO](https://technicalustad.com/wp-content/uploads/2018/02/Raspberry-Pi-GPIO-Explained.png)\n\n主板上有两个5V引脚和两个3V3引脚，以及一些不可配置的接地引脚（0V）。 其余引脚均为通用3V3引脚，意味着输出设置为3V3，输入为3V3容差。\n\n### 输出\n\n指定为输出引脚的GPIO引脚可以设置为高（3V3）或低（0V）。\n\n### 输入\n\n指定为输入引脚的GPIO引脚可以读为高（3V3）或低（0V）。 使用内部上拉或下拉电阻可以更轻松地实现这一点。 引脚GPIO2和GPIO3具有固定的上拉电阻，但对于其他引脚，可以使用软件配置。\n\n### 其它\n\n除了简单的输入和输出设备外，GPIO引脚还可以使用多种替代功能，一些可用于所有引脚，另一些则可用于特定引脚。如：PWM、SPI、I2C、串行\n\n## 装备\n\n- 面包板：用于免焊接线，边上两排是竖向连接的，中间是横向连接的。用杜邦线插入孔中就可以便捷接线了。\n\n![面包板](http://www.taichi-maker.com/wp-content/uploads/2017/03/breadboard.jpg)\n\n- GPIO扩展版：可以方便地将所有GPIO接到面包板上\n\n![面包板](http://g.search1.alicdn.com/img/bao/uploaded/i4/i3/TB1jpt3LXXXXXbnXpXXXXXXXXXX_!!0-item_pic.jpg_200x200.jpg)\n\n- LED二极管：用于展示状态\n\n![二极管](http://file.youboy.com/a/83/81/74/5/9777755.jpg)\n\n- 干簧管液位计：用于监测液位，其原理是浮球中有磁铁，可以磁化干簧管，从而短路电路\n\n![液位计](http://i01.yizimg.com/uploads_old/351305/2015112223270383_old.jpg)\n\n## 接线\n\nLED一端接GPIO17号引脚，一端接地。\n\n液位开关一端接GPIO2号引脚，一端接地。\n\n![接线](/images/20190807_fish.jpg)\n\n## 编程\n\n这里我使用`GPIO Zero`\n\n这是一个Python的GPIO库，树莓派默认已经安装了，可以直接使用。\n\n核心脚本如下：\n\n```python\nfrom gpiozero import LED\nfrom gpiozero import Button\nfrom time import sleep\n\nled = LED(17) #1\nbutton = Button(2) #2\nwhile True:\n    sleep(0.5) #3\n    if button.is_pressed: #4\n        led.on()\n    else:\n        led.off()\n```\n1. 创建一个LED模式的GPIO口用于展示状态\n2. 创建一个Button模式的GPIO口\n3. 每0.5秒检测一次\n4. 开关打开则点亮LED，否则关闭LED\n\n## Python发送邮件\n\n```python\n#coding=utf-8\nfrom email.mime.text import MIMEText\nfrom email.header import Header\nfrom smtplib import SMTP_SSL\nimport time\n\n\n#邮箱smtp服务器\nhost_server = 'smtp.exmail.qq.com'\n#sender用户名\nsender_user = 'wangyu@wycode.cn'\n#邮箱登录密码\nsender_pwd = '**********'\n#发件人的邮箱\nsender_mail = sender_user\n#收件人邮箱\nreceiver = sender_user\n\n#邮件的正文内容\nmail_content = '【水位警报】过低\\n时间：'+time.strftime( '%Y-%m-%d %X', time.localtime())\n#邮件标题\nmail_title = '【水位警报】过低'\n\n#ssl登录\nsmtp = SMTP_SSL(host_server)\n#set_debuglevel()是用来调试的。参数值为1表示开启调试模式，参数值为0关闭调试模式\nsmtp.set_debuglevel(1)\nsmtp.ehlo(host_server)\nsmtp.login(sender_user, sender_pwd)\n\nmsg = MIMEText(mail_content, \"plain\", 'utf-8')\nmsg[\"Subject\"] = Header(mail_title, 'utf-8')\nmsg[\"From\"] = sender_mail\nmsg[\"To\"] = receiver\nsmtp.sendmail(sender_mail, receiver, msg.as_string())\nsmtp.quit()\n```\n\n","data":{"title":"用树莓派4B做一个鱼缸水位报警","date":"2019-08-07","tags":["RaspberryPi","Linux","Python"],"category":"Linux"},"isEmpty":false,"excerpt":"\n因为最近要出门一段时间，鱼缸没人照顾，树莓派的第一个实用需求出现了。\n\n准备做一个液位报警仪，当鱼缸水位低于报警水位，发一封邮件给我，我就能在微信上收到通知，从而远程控制给鱼缸加水，防止鱼缸循环泵烧坏。\n\n\u003cvideo src=\"/images/20190807_raspberrypi_fish.mp4\" controls=\"controls\"  width=\"70%\" style=\"margin:24px auto;display: block;\"\u003e\u003c/video\u003e\n\n使用GPIO接口控制硬件和接收传感器的数据，实现过程如下：\n"},{"id":"raspberrypi","file":"raspberrypi.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e开启吃派之旅！\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://s3.ifanr.com/wp-content/uploads/2019/06/mousse-68.jpg!720\" alt=\"树莓派4B\" class=\"mx-auto max-h-80\"\ \"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eCPU\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e巴龙BCM2711, 4核 Cortex-A72 (ARM v8) 64位  主频1.5GHz\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e内存\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e1GB/2GB/4GB LPDDR4-2400 SDRAM\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e有线网络\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e千兆以太网\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e无线网络\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e2.4 GHz/5.0 GHz IEEE 802.11ac无线，蓝牙5.0，支持低功耗蓝牙\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e显示接口\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e双micro HDMI，最高支持4K60Hz\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eUSB\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e2个USB3.0+2个USB2.0\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eGPIO\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e40pin兼容以前版本\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e电源\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e5V0.3A通过USB type-C 或 GPIO接口\u003c/td\u003e\n\u003c/tr\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even:bg-slate-300 even:dark:bg-slate-700\"\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003e存储\u003c/td\u003e\n\u003ctd class=\"px-2 border border-slate-400/30\"\u003eMicro-SD加载操作系统和数据存储\u003c/td\u003e\n\u003c/tr\u003e\n\u003c/tbody\u003e\n\u003c/table\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章带你安装和配置树莓派：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e烧录镜像\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e为了给树莓派安装操作系统，我们需要一张Micro-SD卡，然后将系统写进去。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e根据官网介绍，有两个推荐的下载连接，一个是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNOOBS\u003c/code\u003e，一个是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRaspbian\u003c/code\u003e。\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNOOBS\u003c/code\u003e是一个操作系统安装程序，它已经包含了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRaspbian\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLiberELEC\u003c/code\u003e，也可以通过网络安装其它操作系统。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRaspbian\u003c/code\u003e是树莓派基金会基于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDebian buster\u003c/code\u003e开发的官方操作系统。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e我开始尝试使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNOOBS\u003c/code\u003e时，树莓派无法启动。官网说可能是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSPI EEPROM\u003c/code\u003e，可以下载bootloader重新启动。\n但我没有再折腾这个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNOOBS\u003c/code\u003e，而是采用了第二种，直接写入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRaspbian\u003c/code\u003e镜像的方式，然后我就正常启动了树莓派系统。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20190807_raspberrypi.jpg\" alt=\"Raspbian\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e鼠标速度慢\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e系统启动后发现移动速度很慢，图形界面调了也没用\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e解决方案：\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e手动修改鼠标的轮询间隔：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ sudo nano /boot/cmdline.txt\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e然后在最后添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eusbhid.mousepoll=0\u003c/code\u003e。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ reboot\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e重启树莓派，鼠标终于可以正常使用了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e参考地址：\u003ca href=\"https://whoisnian.com/2017/10/26/Raspberry%E5%9B%BE%E5%BD%A2%E7%95%8C%E9%9D%A2%E4%B8%8B%E9%BC%A0%E6%A0%87%E7%A7%BB%E5%8A%A8%E7%BC%93%E6%85%A2/\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://whoisnian.com/2017/10/26/Raspberry图形界面下鼠标移动缓慢/\u003c/a\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e远程连接\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRaspberry Pi Configuration\u003c/code\u003e里打开\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSSH\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eVNC\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e然后我们就可以通过局域网\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSSH\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eVNC Viewer\u003c/code\u003e远程访问树莓派了\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eVNC \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCannot currently show the desktop\u003c/code\u003e\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eVNC Viewer\u003c/code\u003e远程连接时显示\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCannot currently show the desktop\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e解决方案:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ cd /boot/\n$ sudo nano config.txt\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e取消注释以下3行\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-yml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e# uncomment if hdmi display is not detected and composite is being output\nhdmi_force_hotplug=1\n\n# uncomment to force a specific HDMI mode (this will force VGA)\nhdmi_group=1\nhdmi_mode=1\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e什么？你想要通过互联网远程访问？那么我们需要\u003cstrong\u003e内网穿透\u003c/strong\u003e这门技术。下篇文章我们来搞这个。\u003c/p\u003e\n","content":"\n开启吃派之旅！\n\n![树莓派4B](https://s3.ifanr.com/wp-content/uploads/2019/06/mousse-68.jpg!720)\n\n2019年6月25日树莓派基金会发布了全新的Raspberry Pi 4 「树莓派4 代」。\n\n相比上一代升级了很多，价格依旧250元（1G版），配置如下：\n\n| 项目 | 配置 |\n| --- | --- |\n| CPU  | 巴龙BCM2711, 4核 Cortex-A72 (ARM v8) 64位  主频1.5GHz |\n| 内存 | 1GB/2GB/4GB LPDDR4-2400 SDRAM |\n| 有线网络 | 千兆以太网 |\n| 无线网络 | 2.4 GHz/5.0 GHz IEEE 802.11ac无线，蓝牙5.0，支持低功耗蓝牙 |\n| 显示接口 | 双micro HDMI，最高支持4K60Hz |\n| USB | 2个USB3.0+2个USB2.0 |\n| GPIO | 40pin兼容以前版本 |\n| 电源 | 5V0.3A通过USB type-C 或 GPIO接口 |\n| 存储 | Micro-SD加载操作系统和数据存储 |\n\n这篇文章带你安装和配置树莓派：\n\u003c!--more--\u003e\n\n## 烧录镜像\n\n为了给树莓派安装操作系统，我们需要一张Micro-SD卡，然后将系统写进去。\n\n根据官网介绍，有两个推荐的下载连接，一个是`NOOBS`，一个是`Raspbian`。\n\n- `NOOBS`是一个操作系统安装程序，它已经包含了`Raspbian`和`LiberELEC`，也可以通过网络安装其它操作系统。\n- `Raspbian`是树莓派基金会基于`Debian buster`开发的官方操作系统。\n\n我开始尝试使用`NOOBS`时，树莓派无法启动。官网说可能是`SPI EEPROM`，可以下载bootloader重新启动。\n但我没有再折腾这个`NOOBS`，而是采用了第二种，直接写入`Raspbian`镜像的方式，然后我就正常启动了树莓派系统。\n\n![Raspbian](/images/20190807_raspberrypi.jpg)\n\n## 鼠标速度慢\n\n系统启动后发现移动速度很慢，图形界面调了也没用\n\n解决方案：\n\n手动修改鼠标的轮询间隔：\n```bash\n$ sudo nano /boot/cmdline.txt\n```\n然后在最后添加`usbhid.mousepoll=0`。\n```bash\n$ reboot\n```\n重启树莓派，鼠标终于可以正常使用了。\n\n参考地址：https://whoisnian.com/2017/10/26/Raspberry图形界面下鼠标移动缓慢/\n\n## 远程连接\n\n在`Raspberry Pi Configuration`里打开`SSH`和`VNC`\n\n然后我们就可以通过局域网`SSH`或者`VNC Viewer`远程访问树莓派了\n\n## VNC `Cannot currently show the desktop`\n\n使用`VNC Viewer`远程连接时显示`Cannot currently show the desktop`\n\n解决方案:\n\n```bash\n$ cd /boot/\n$ sudo nano config.txt\n```\n取消注释以下3行\n\n```yml\n# uncomment if hdmi display is not detected and composite is being output\nhdmi_force_hotplug=1\n\n# uncomment to force a specific HDMI mode (this will force VGA)\nhdmi_group=1\nhdmi_mode=1\n```\n\n什么？你想要通过互联网远程访问？那么我们需要**内网穿透**这门技术。下篇文章我们来搞这个。","data":{"title":"树莓派4B系统安装及配置","date":"2019-08-07","tags":["RaspberryPi","Linux"],"category":"Linux"},"isEmpty":false,"excerpt":"\n开启吃派之旅！\n\n![树莓派4B](https://s3.ifanr.com/wp-content/uploads/2019/06/mousse-68.jpg!720)\n\n2019年6月25日树莓派基金会发布了全新的Raspberry Pi 4 「树莓派4 代」。\n\n相比上一代升级了很多，价格依旧250元（1G版），配置如下：\n\n| 项目 | 配置 |\n| --- | --- |\n| CPU  | 巴龙BCM2711, 4核 Cortex-A72 (ARM v8) 64位  主频1.5GHz |\n| 内存 | 1GB/2GB/4GB LPDDR4-2400 SDRAM |\n| 有线网络 | 千兆以太网 |\n| 无线网络 | 2.4 GHz/5.0 GHz IEEE 802.11ac无线，蓝牙5.0，支持低功耗蓝牙 |\n| 显示接口 | 双micro HDMI，最高支持4K60Hz |\n| USB | 2个USB3.0+2个USB2.0 |\n| GPIO | 40pin兼容以前版本 |\n| 电源 | 5V0.3A通过USB type-C 或 GPIO接口 |\n| 存储 | Micro-SD加载操作系统和数据存储 |\n\n这篇文章带你安装和配置树莓派：\n"},{"id":"nginx-redirect","file":"nginx-redirect.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://nginx.org/nginx.png\" alt=\"NGINX\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e服务器配置Https之后，我们希望同时支持http，但是80端口进来的请求直接重定向到443端口上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e有时我们会将某些网页永久迁移到别的地址，但是又不想让老用户直接无法访问，或者看到404，而是要将这些老地址的请求转发到新地址上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章教你如何配置NGINX重定向。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://nginx.org/nginx.png\" alt=\"NGINX\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e服务器配置Https之后，我们希望同时支持http，但是80端口进来的请求直接重定向到443端口上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e有时我们会将某些网页永久迁移到别的地址，但是又不想让老用户直接无法访问，或者看到404，而是要将这些老地址的请求转发到新地址上。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章教你如何配置NGINX重定向。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003eNGINX安装及配置请移步这里：\u003ca href=\"/2018-06-23-nginx.html\" title=\"NGINX安装\" class=\"text-sky-500 hover:text-sky-400\"\u003eNginx安装\u003c/a\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用rewrite\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eserver {\n#...\n\trewrite (.*)$ https://wycode.cn$1 permanent;\n#...\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里将这个server的所有请求，永久定向到 \u003ca href=\"https://wycode.cn\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://wycode.cn\u003c/a\u003e 上，并将请求的path拼接在后面\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用return 301\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eserver {\n\tlisten 443 ssl;\n    listen [::]:443 ssl;\n\n    ssl_certificate /etc/nginx/cert/wycode.pem;\n    ssl_certificate_key /etc/nginx/cert/wycode.key;\n\n    server_name wycode.cn www.wycode.cn;\n\n    error_page 404 = https://wycode.cn/404.html;\n\n    location / {\n        root /var/www/wycode.cn;\n        index index.html;\n        try_files $uri $uri/ =404;\n    }\n}\nserver {\n    listen 80;\n    listen [::]:80;\n    server_name wycode.cn www.wycode.cn;\n    return 301 https://$host$request_uri;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里的第二个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eserver\u003c/code\u003e监听80端口，在下面的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ereturn 301\u003c/code\u003e语句中将请求转发到第一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eserver\u003c/code\u003e中去，并且\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehost\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003erequest_uri\u003c/code\u003e不变。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请注明出处!\u003c/p\u003e\n","content":"\n![NGINX](https://nginx.org/nginx.png)\n\n\u003e 服务器配置Https之后，我们希望同时支持http，但是80端口进来的请求直接重定向到443端口上。\n\n\u003e 有时我们会将某些网页永久迁移到别的地址，但是又不想让老用户直接无法访问，或者看到404，而是要将这些老地址的请求转发到新地址上。\n\n这篇文章教你如何配置NGINX重定向。\n\n\u003c!--more--\u003e\n\nNGINX安装及配置请移步这里：[Nginx安装](/2018-06-23-nginx.html \"NGINX安装\")\n\n\n## 使用rewrite\n\n```\nserver {\n#...\n\trewrite (.*)$ https://wycode.cn$1 permanent;\n#...\n}\n```\n这里将这个server的所有请求，永久定向到 https://wycode.cn 上，并将请求的path拼接在后面\n\n## 使用return 301\n\n```\nserver {\n\tlisten 443 ssl;\n    listen [::]:443 ssl;\n\n    ssl_certificate /etc/nginx/cert/wycode.pem;\n    ssl_certificate_key /etc/nginx/cert/wycode.key;\n\n    server_name wycode.cn www.wycode.cn;\n\n    error_page 404 = https://wycode.cn/404.html;\n\n    location / {\n        root /var/www/wycode.cn;\n        index index.html;\n        try_files $uri $uri/ =404;\n    }\n}\nserver {\n    listen 80;\n    listen [::]:80;\n    server_name wycode.cn www.wycode.cn;\n    return 301 https://$host$request_uri;\n}\n```\n\n这里的第二个`server`监听80端口，在下面的`return 301`语句中将请求转发到第一个`server`中去，并且`host`和`request_uri`不变。\n\n以上，转载请注明出处!","data":{"title":"NGINX配置重定向","date":"2019-05-17","tags":["Linux","NGINX"],"category":"Linux"},"isEmpty":false,"excerpt":"\n![NGINX](https://nginx.org/nginx.png)\n\n\u003e 服务器配置Https之后，我们希望同时支持http，但是80端口进来的请求直接重定向到443端口上。\n\n\u003e 有时我们会将某些网页永久迁移到别的地址，但是又不想让老用户直接无法访问，或者看到404，而是要将这些老地址的请求转发到新地址上。\n\n这篇文章教你如何配置NGINX重定向。\n\n"},{"id":"nginx","file":"nginx.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://nginx.org/nginx.png\" alt=\"NGINX\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当我们需要在Ubuntu上部署SpringBoot服务时，通常正式环境需要将监听端口切换到80端口，或443端口，但是Ubuntu为了安全起见，普通用户是不能监听1024以下端口的。另外我们需要同时支持HTTP和HTTPS，貌似SpringBoot只支持监听1个端口，这时有很多解决方案。比如使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esudo\u003c/code\u003e提升运行权限，也可以通过Linux防火墙iptables配置端口转发，把80端口转发到8080端口上等方式。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e但是...这都不是最优的解决方案，既然用到了端口转发，不如直接安装一个NGINX服务器，做反向代理，同时也能提供静态服务能力，未来还能简单地配置升级到集群，做负载均衡。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eNGINX是一款高性能Web服务器。配置简单，易扩展，并发能力强，可用于Web服务器，反向代理，负载均衡，邮件等。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://nginx.org/nginx.png\" alt=\"NGINX\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当我们需要在Ubuntu上部署SpringBoot服务时，通常正式环境需要将监听端口切换到80端口，或443端口，但是Ubuntu为了安全起见，普通用户是不能监听1024以下端口的。另外我们需要同时支持HTTP和HTTPS，貌似SpringBoot只支持监听1个端口，这时有很多解决方案。比如使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esudo\u003c/code\u003e提升运行权限，也可以通过Linux防火墙iptables配置端口转发，把80端口转发到8080端口上等方式。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e但是...这都不是最优的解决方案，既然用到了端口转发，不如直接安装一个NGINX服务器，做反向代理，同时也能提供静态服务能力，未来还能简单地配置升级到集群，做负载均衡。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eNGINX是一款高性能Web服务器。配置简单，易扩展，并发能力强，可用于Web服务器，反向代理，负载均衡，邮件等。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e安装NGINX\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$sudo apt install nginx\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e使用这一行命令，其实就可以了。\n这时直接访问我们的服务器ip，能看到NGINX的欢迎页面，就说明安装成功。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e配置nginx\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/etc/nginx/\u003c/code\u003e目录下有这么几个重要文件\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003enginx.conf 是NGINX的配置文件，里面有一些基本配置，网上很多教程是直接修改这个文件配置服务什么的，看这个文件结构include了conf.d目录的所有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.conf\u003c/code\u003e文件，我们自定义的配置应该写在conf.d目录中\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003esite-enabled 是当前启用的服务配置文件，里面有个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edefault\u003c/code\u003e链接到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esite-available\u003c/code\u003e目录里。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003esite-available 是备选的服务器配置文件\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e从注释和目录结构，我们可以看到其良苦用心，不应该直接修改nginx.conf文件，而是将需要添加的服务器配置文件放到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esite-available\u003c/code\u003e目录中。然后在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esite-enabled\u003c/code\u003e目录创建要启用服务的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esymbolic link\u003c/code\u003e到刚刚创建的配置文件。这样配置才能更方便，更具扩展性。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e示例\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e我这里配置了\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e静态网站服务：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eserver {\n\tlisten 80;\n\tlisten [::]:80;\n\n\tserver_name wycode.cn www.wycode.cn;\n\n\troot /var/www/wycode.cn;\n\tindex index.html;\n\n\tlocation / {\n\t\ttry_files $uri $uri/ =404;\n\t}\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003eSpringBoot 后台api反向代理\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eserver {\n\tlisten 80;\n\tlisten [::]:80;\n\n\tserver_name wycode.cn www.wycode.cn;\n\n\tlocation /api {\n\t\tproxy_pass http://127.0.0.1:8080/api/;\n\t\tproxy_set_header   Host             $host;\n\t\tproxy_set_header   X-Real-IP        $remote_addr;\n\t\tproxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;\n\t}\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请联系作者!\u003c/p\u003e\n","content":"\n![NGINX](https://nginx.org/nginx.png)\n\n当我们需要在Ubuntu上部署SpringBoot服务时，通常正式环境需要将监听端口切换到80端口，或443端口，但是Ubuntu为了安全起见，普通用户是不能监听1024以下端口的。另外我们需要同时支持HTTP和HTTPS，貌似SpringBoot只支持监听1个端口，这时有很多解决方案。比如使用`sudo`提升运行权限，也可以通过Linux防火墙iptables配置端口转发，把80端口转发到8080端口上等方式。\n\n但是...这都不是最优的解决方案，既然用到了端口转发，不如直接安装一个NGINX服务器，做反向代理，同时也能提供静态服务能力，未来还能简单地配置升级到集群，做负载均衡。\n\n\u003e NGINX是一款高性能Web服务器。配置简单，易扩展，并发能力强，可用于Web服务器，反向代理，负载均衡，邮件等。\n\n\u003c!--more--\u003e\n\n## 安装NGINX\n\n```bash\n$sudo apt install nginx\n```\n\n使用这一行命令，其实就可以了。\n这时直接访问我们的服务器ip，能看到NGINX的欢迎页面，就说明安装成功。\n\n\n## 配置nginx\n\n`/etc/nginx/`目录下有这么几个重要文件\n\n- nginx.conf 是NGINX的配置文件，里面有一些基本配置，网上很多教程是直接修改这个文件配置服务什么的，看这个文件结构include了conf.d目录的所有`.conf`文件，我们自定义的配置应该写在conf.d目录中\n\n- site-enabled 是当前启用的服务配置文件，里面有个`default`链接到`site-available`目录里。\n\n- site-available 是备选的服务器配置文件\n\n从注释和目录结构，我们可以看到其良苦用心，不应该直接修改nginx.conf文件，而是将需要添加的服务器配置文件放到`site-available`目录中。然后在`site-enabled`目录创建要启用服务的`symbolic link`到刚刚创建的配置文件。这样配置才能更方便，更具扩展性。\n\n## 示例\n\n我这里配置了\n\n静态网站服务：\n\n```\nserver {\n\tlisten 80;\n\tlisten [::]:80;\n\n\tserver_name wycode.cn www.wycode.cn;\n\n\troot /var/www/wycode.cn;\n\tindex index.html;\n\n\tlocation / {\n\t\ttry_files $uri $uri/ =404;\n\t}\n}\n```\nSpringBoot 后台api反向代理\n\n\n```\nserver {\n\tlisten 80;\n\tlisten [::]:80;\n\n\tserver_name wycode.cn www.wycode.cn;\n\n\tlocation /api {\n\t\tproxy_pass http://127.0.0.1:8080/api/;\n\t\tproxy_set_header   Host             $host;\n\t\tproxy_set_header   X-Real-IP        $remote_addr;\n\t\tproxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;\n\t}\n}\n```\n\n\n以上，转载请联系作者!","data":{"title":"Ubuntu16.04安装配置NGINX服务","date":"2018-06-23","tags":["Linux","NGINX"],"category":"Linux"},"isEmpty":false,"excerpt":"\n![NGINX](https://nginx.org/nginx.png)\n\n当我们需要在Ubuntu上部署SpringBoot服务时，通常正式环境需要将监听端口切换到80端口，或443端口，但是Ubuntu为了安全起见，普通用户是不能监听1024以下端口的。另外我们需要同时支持HTTP和HTTPS，貌似SpringBoot只支持监听1个端口，这时有很多解决方案。比如使用`sudo`提升运行权限，也可以通过Linux防火墙iptables配置端口转发，把80端口转发到8080端口上等方式。\n\n但是...这都不是最优的解决方案，既然用到了端口转发，不如直接安装一个NGINX服务器，做反向代理，同时也能提供静态服务能力，未来还能简单地配置升级到集群，做负载均衡。\n\n\u003e NGINX是一款高性能Web服务器。配置简单，易扩展，并发能力强，可用于Web服务器，反向代理，负载均衡，邮件等。\n\n"},{"id":"linux-vi","file":"linux-vi.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://tse1-mm.cn.bing.net/th/id/OIP-C.S7PWetAEkXIKI3Fgncz96wHaFF?pid=ImgDet\u0026#x26;rs=1\" alt=\"vim\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003evi特性\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003evi编辑器包含两种模式，命令模式和输入模式\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e刚进入vi编辑器时是出于命令模式下\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e命令模式下的按键是对文件的命令\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e按\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ei\u003c/code\u003e进入输入模式\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e按\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eEsc\u003c/code\u003e退回到命令模式\u003c/li\u003e\n\u003c/ul\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://tse1-mm.cn.bing.net/th/id/OIP-C.S7PWetAEkXIKI3Fgncz96wHaFF?pid=ImgDet\u0026#x26;rs=1\" alt=\"vim\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003evi特性\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003evi编辑器包含两种模式，命令模式和输入模式\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e刚进入vi编辑器时是出于命令模式下\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e命令模式下的按键是对文件的命令\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e按\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ei\u003c/code\u003e进入输入模式\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e按\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eEsc\u003c/code\u003e退回到命令模式\u003c/li\u003e\n\u003c/ul\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e常用命令\u003c/h2\u003e\n\u003ctable class=\"mb-4\"\u003e\n\u003cthead class=\"bg-sky-200 dark:bg-sky-900\"\u003e\n\u003ctr\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e命令\u003c/th\u003e\n\u003cth class=\"px-2 border border-slate-400/30\"\u003e作用\u003c/th\u003e\n\u003c/tr\u003e\n\u003c/thead\u003e\n\u003ctbody\u003e\n\u003ctr class=\"odd:bg-slate-200 odd:dark:bg-slate-800 even
