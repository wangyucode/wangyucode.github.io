00 rounded-md text-sm font-mono\"\u003eJoinTable\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJoinColumn\u003c/code\u003e一般定义在拥有关系的这一端，而\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emappedBy\u003c/code\u003e一定是定义在关系的被拥有方（the owned side），也就是跟定义\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJoinTable\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJoinColumn\u003c/code\u003e互斥的一方，它的值指向拥有方中关于被拥有方的字段，可能是一个对象（\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOneToMany\u003c/code\u003e），也可能是一个对象集合（\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eManyToMany\u003c/code\u003e）。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e上面的例子中，维护老师和学生的多对多关系，明显只需要一张中间表就可以了，我们假设老师是维护关系（拥有关系）的一端，则实体定义修改如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Entity\npublic class Student {\n    @Id\n    private String id;\n    @ManyToMany(mappedBy = \"students\")\n    private List\u0026#x3C;Teacher\u003e teachers;\n}\n\n@Entity\npublic class Teacher {\n    @Id\n    private String id;\n    @ManyToMany\n    private List\u0026#x3C;Student\u003e students;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这时中间表只有一张\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTEACHER_STUDENTS\u003c/code\u003e，关联关系也变成了我们想要的双向关系。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eCascade 级联关系\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e实际业务中，我们通常会遇到以下情况：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e用户和用户的收货地址是一对多关系，当用户被删除时，这个用户的所有收货地址也应该一并删除。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e订单和订单中的商品也是一对多关系，但订单被删除时，订单所关联的商品肯定不能被删除。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e此时只要配置正确的级联关系，就能达到想要的效果。\u003c/p\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e级联关系类型：\u003c/h3\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eCascadeType.REFRESH：级联刷新，当多个用户同时作操作一个实体，为了用户取到的数据是实时的，在用实体中的数据之前就可以调用一下refresh()方法\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eCascadeType.REMOVE：级联删除，当调用remove()方法删除Order实体时会先级联删除OrderItem的相关数据\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eCascadeType.MERGE：级联更新，当调用了Merge()方法，如果Order中的数据改变了会相应的更新OrderItem中的数据\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eCascadeType.ALL：包含以上所有级联属性\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eCascadeType.PERSIST：级联保存，当调用了Persist() 方法，会级联保存相应的数据\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e需要注意的是，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCascadeType.ALL\u003c/code\u003e要谨慎使用，为了达到数据同步，很多人喜欢用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCascadeType.ALL\u003c/code\u003e来实现。但上面订单和商品的例子就不适用。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e以上\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e未经同意禁止转载！\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e不对的地方欢迎指正！\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n\u003e JPA是Java Persistence API的简称是Java的ORM规范，实现这个规范的有著名的Hibernate等ORM框架。JDK 5.0注解或XML描述对象－关系表的映射关系，并将运行期的实体对象持久化到数据库中。\n\n![Spring](/images/20180419_spring_framework.svg)\n\n多对多关系是关联关系中最复杂的。本文使用Spring JPA框架总结多对多关系及`@ManyToMany`注解的详细使用。明白了`@ManyToMany`,其它\n`@OneToMany` 和`@OneToOne`就简单很多了。\n\n\u003c!--more--\u003e\n\n## Java和JPA中的多对多关系\n\n\u003e 根据维基百科定义：Java中的多对多关系是指源对象具有目标对象集合的属性，并且（如果存在的话）这个目标对象与原对象具有反向关系，则它也将成为多对多关系。需要注意的是：Java和JPA中的所有关系都是单向的，因为存在源对象引用目标对象的情况下，也不能保证目标对象也与原对象有关系。这与关系数据库不同，在关系数据库中，通过外键定义并查询，使得反向查询总是存在的。\n\n\u003e JPA还定义了一个OneToMany关系，它与ManyToMany关系类似，但反向关系（如果已定义）是ManyToOne关系。 OneToMany与JPA中ManyToMany关系的主要区别在于，ManyToMany总是使用中间关系连接表来存储关系，OneToMany可以使用连接表或者目标对象的表引用中的外键源对象表的主键。\n\n传统项目开发，会有一个设计表的过程，然后由DBA写一大堆`create table ***`。很麻烦也很慢。\n\nJPA框架在运行时，会根据实体定义自动创建表，自动更新表字段，使用JPA可以说一行SQL都不用写，甚至不用关心底层数据库到底是`MySQL`还是`Oracle`还是其它。以下例子中我不定义表名，列名，所以没有`@Column`、`@Table`、`@JoinTable`、`@JoinColumn`等。由JPA框架自动根据实体名称生成表名，列名。我觉得Hibernate生成的表名和列名挺好也符合规范。就不多此一举了。\n\n## @ManyToMany 注解\n\n在JPA中使用`@ManyToMany`注解表示多对多关系。\n\n学生和老师，典型的多对多关系:\n\n```java\n@Entity\npublic class Student {\n    @Id\n    private String id;\n    @ManyToMany\n    private List\u003cTeacher\u003e teachers;\n}\n\n@Entity\npublic class Teacher {\n    @Id\n    private String id;\n    @ManyToMany\n    private List\u003cStudent\u003e students;\n}\n```\n\n上面例子中的`@ManyToMany`即表示了老师和学生的多对多关系。`@ManyToMany`注解可以用在字段或方法上。\n\n但这样做是有问题的，生成的中间表有两个，`TEACHER_STUDENTS`表和`STUDENT_TEACHERS`。原因是这里的多对多关系正是维基百科提到的单向原则。老师和学生虽然分别定义了自己的多对多关系，但这个关系都是单向的，要使关系成为双向。就需要下面的`mappedBy`属性。\n\n## mappedBy 属性\n\n`mappedBy`是OneToOne、OneToMany和ManyToMany这三种关联关系的属性。\n\n用来标注**拥有**这种关系的字段。 除非关系是单向的，否则是必需的。\n\n那么什么叫拥有关联关系呢，假设是双向一对一的话，那么拥有关系的这一方有建立、解除和更新与另一方关系的能力。而另一方没有，只能被动管理。\n\n由于`JoinTable`和`JoinColumn`一般定义在拥有关系的这一端，而`mappedBy`一定是定义在关系的被拥有方（the owned side），也就是跟定义`JoinTable`和`JoinColumn`互斥的一方，它的值指向拥有方中关于被拥有方的字段，可能是一个对象（`OneToMany`），也可能是一个对象集合（`ManyToMany`）。\n\n上面的例子中，维护老师和学生的多对多关系，明显只需要一张中间表就可以了，我们假设老师是维护关系（拥有关系）的一端，则实体定义修改如下：\n\n```java\n@Entity\npublic class Student {\n    @Id\n    private String id;\n    @ManyToMany(mappedBy = \"students\")\n    private List\u003cTeacher\u003e teachers;\n}\n\n@Entity\npublic class Teacher {\n    @Id\n    private String id;\n    @ManyToMany\n    private List\u003cStudent\u003e students;\n}\n```\n\n这时中间表只有一张`TEACHER_STUDENTS`，关联关系也变成了我们想要的双向关系。\n\n## Cascade 级联关系\n\n实际业务中，我们通常会遇到以下情况：\n\n1. 用户和用户的收货地址是一对多关系，当用户被删除时，这个用户的所有收货地址也应该一并删除。\n2. 订单和订单中的商品也是一对多关系，但订单被删除时，订单所关联的商品肯定不能被删除。\n\n此时只要配置正确的级联关系，就能达到想要的效果。\n\n### 级联关系类型：\n\n- CascadeType.REFRESH：级联刷新，当多个用户同时作操作一个实体，为了用户取到的数据是实时的，在用实体中的数据之前就可以调用一下refresh()方法\n- CascadeType.REMOVE：级联删除，当调用remove()方法删除Order实体时会先级联删除OrderItem的相关数据\n- CascadeType.MERGE：级联更新，当调用了Merge()方法，如果Order中的数据改变了会相应的更新OrderItem中的数据\n- CascadeType.ALL：包含以上所有级联属性\n- CascadeType.PERSIST：级联保存，当调用了Persist() 方法，会级联保存相应的数据\n\n需要注意的是，`CascadeType.ALL`要谨慎使用，为了达到数据同步，很多人喜欢用`CascadeType.ALL`来实现。但上面订单和商品的例子就不适用。\n\n## 以上\n\n- 未经同意禁止转载！\n- 不对的地方欢迎指正！\n","data":{"title":"Spring JPA框架中的@ManyToMany多对多关系的理解和使用","date":"2018-04-19","tags":["Spring","JPA","Java"],"category":"Backend"},"isEmpty":false,"excerpt":"\n\u003e JPA是Java Persistence API的简称是Java的ORM规范，实现这个规范的有著名的Hibernate等ORM框架。JDK 5.0注解或XML描述对象－关系表的映射关系，并将运行期的实体对象持久化到数据库中。\n\n![Spring](/images/20180419_spring_framework.svg)\n\n多对多关系是关联关系中最复杂的。本文使用Spring JPA框架总结多对多关系及`@ManyToMany`注解的详细使用。明白了`@ManyToMany`,其它\n`@OneToMany` 和`@OneToOne`就简单很多了。\n\n"},{"id":"tomcat","file":"tomcat.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180411_tomcat.png\" alt=\"Tomcat\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180411_tomcat.png\" alt=\"Tomcat\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eTomcat的Server配置\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eTomcat\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003econf\u003c/code\u003e目录下的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eserver.xml\u003c/code\u003e（Linux系统可能在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/etc/tomcat/\u003c/code\u003e下）定义了服务器的相关配置信息。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e根据官方文档，这里的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eServer\u003c/code\u003e指的是整个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCatalina servlet\u003c/code\u003e容器。它的属性代表整个servlet容器的特性。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e常见的如：服务器端口，根项目路径等。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eConnector属性\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e除了配置端口，协议版本，还可以配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eURIEncoding\u003c/code\u003e，默认值是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eISO8859-1\u003c/code\u003e所以不支持中文，我们改成\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUTF-8\u003c/code\u003e即可。即：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-xml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;Connector port=\"80\" protocol=\"HTTP/1.1\"\n               connectionTimeout=\"20000\"\n               redirectPort=\"443\"\n\t           URIEncoding=\"UTF-8\"/\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eHTTPS\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e通常在配置了HTTPS的服务器上，我们会把80端口转发到443端口上，此时我们要对443端口的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eConnector\u003c/code\u003e也配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eURIEncoding=\"UTF-8\"\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我的问题就出在这。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以上...\u003c/p\u003e\n","content":"\n\n\u003e 今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\n\n![Tomcat](/images/20180411_tomcat.png)\n\n\u003c!--more--\u003e\n\n## Tomcat的Server配置\n\nTomcat`conf`目录下的`server.xml`（Linux系统可能在`/etc/tomcat/`下）定义了服务器的相关配置信息。\n\n根据官方文档，这里的`Server`指的是整个`Catalina servlet`容器。它的属性代表整个servlet容器的特性。\n\n常见的如：服务器端口，根项目路径等。\n\n## Connector属性\n\n除了配置端口，协议版本，还可以配置`URIEncoding`，默认值是`ISO8859-1`所以不支持中文，我们改成`UTF-8`即可。即：\n\n```xml\n\u003cConnector port=\"80\" protocol=\"HTTP/1.1\"\n               connectionTimeout=\"20000\"\n               redirectPort=\"443\"\n\t           URIEncoding=\"UTF-8\"/\u003e\n```\n\n## HTTPS\n\n通常在配置了HTTPS的服务器上，我们会把80端口转发到443端口上，此时我们要对443端口的`Connector`也配置`URIEncoding=\"UTF-8\"`\n\n\n我的问题就出在这。\n\n\n以上...\n\n\n\n\n\n","data":{"title":"SwaggerUI GET请求中文乱码问题解决","date":"2018-04-11","tags":["Swagger","Spring","Tomcat"],"category":"Backend"},"isEmpty":false,"excerpt":"\n\n\u003e 今天又一次遇到了中文乱码问题。SwaggerUI上直接测试接口时本地LocalHost是OK的，部署到Linux服务器上就乱码了，查来查去很多文章都没说到点子上。既然是用了Spring，Tomcat等，肯定是哪里配置不对，改代码的方式解决是太low了。\n\n![Tomcat](/images/20180411_tomcat.png)\n\n"},{"id":"jwt","file":"jwt.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e为使用前后端分离的后端管理框架做准备，使用JWT目前看来是最佳选择。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e知其然\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e无状态\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e服务化\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e移动、web统统支持，后端提供相关接口即可\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e知其所以然\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e认证：通过调用登录接口，服务器颁发一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJWT\u003c/code\u003e（JSON Web Token）给客户端。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e鉴权：客户端每个请求携带\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJWT\u003c/code\u003e，后端使用一个请求过滤器，从请求头中解析\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJWT\u003c/code\u003e，为本次请求授予相关权限\u003c/li\u003e\n\u003c/ol\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e为使用前后端分离的后端管理框架做准备，使用JWT目前看来是最佳选择。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e知其然\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e无状态\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e服务化\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e移动、web统统支持，后端提供相关接口即可\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e知其所以然\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e认证：通过调用登录接口，服务器颁发一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJWT\u003c/code\u003e（JSON Web Token）给客户端。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e鉴权：客户端每个请求携带\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJWT\u003c/code\u003e，后端使用一个请求过滤器，从请求头中解析\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJWT\u003c/code\u003e，为本次请求授予相关权限\u003c/li\u003e\n\u003c/ol\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e导入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eio.jsonwebtoken:jjwt\u003c/code\u003e\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ejjwt\u003c/code\u003e提供了JWT主要功能的Java版本实现，目前版本是0.9.0\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edependencies {\n    compile 'io.jsonwebtoken:jjwt:0.9.0'\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e生成token\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eprivate String generateToken(Map\u0026#x3C;String, Object\u003e claims) {\n        return Jwts.builder()\n                .setClaims(claims) //自定义声明\n                .setExpiration(generateExpirationDate()) //过期时间\n                .signWith(SignatureAlgorithm.HS512, secret) //加密\n                .compact();\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e解析token\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eprivate Claims getClaimsFromToken(String token) {\n        Claims claims;\n        try {\n            claims = Jwts.parser()\n                    .setSigningKey(secret)\n                    .parseClaimsJws(token)\n                    .getBody();\n        } catch (Exception e) {\n            claims = null;\n        }\n        return claims;\n    }\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e鉴权过滤器\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode.web.config.security;\n\nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.beans.factory.annotation.Value;\nimport org.springframework.security.authentication.UsernamePasswordAuthenticationToken;\nimport org.springframework.security.core.context.SecurityContextHolder;\nimport org.springframework.security.core.userdetails.UserDetails;\nimport org.springframework.security.core.userdetails.UserDetailsService;\nimport org.springframework.security.web.authentication.WebAuthenticationDetailsSource;\nimport org.springframework.stereotype.Component;\nimport org.springframework.web.filter.OncePerRequestFilter;\n\nimport javax.servlet.FilterChain;\nimport javax.servlet.ServletException;\nimport javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\nimport java.io.IOException;\n\n\n@Component\npublic class JwtAuthenticationTokenFilter extends OncePerRequestFilter {\n\n    @Autowired\n    private UserDetailsService userDetailsService;\n\n    @Autowired\n    private JwtTokenUtil jwtTokenUtil;\n\n    @Value(\"${jwt.header}\")\n    private String tokenHeader;\n\n    @Value(\"${jwt.tokenHead}\")\n    private String tokenHead;\n\n    @Override\n    protected void doFilterInternal(\n            HttpServletRequest request,\n            HttpServletResponse response,\n            FilterChain chain) throws ServletException, IOException {\n\n        String authHeader = request.getHeader(this.tokenHeader);\n        if (authHeader != null \u0026#x26;\u0026#x26; authHeader.startsWith(tokenHead)) {\n            final String authToken = authHeader.substring(tokenHead.length()); // The part after \"Bearer \"\n            String account = jwtTokenUtil.getUsernameFromToken(authToken);\n\n            logger.info(\"checking authentication \" + account);\n\n            if (account != null \u0026#x26;\u0026#x26; SecurityContextHolder.getContext().getAuthentication() == null) {\n                UserDetails userDetails = this.userDetailsService.loadUserByUsername(account);\n\n                if (jwtTokenUtil.validateToken(authToken, userDetails)) {\n                    UsernamePasswordAuthenticationToken authentication = new UsernamePasswordAuthenticationToken(\n                            userDetails, null, userDetails.getAuthorities());\n                    authentication.setDetails(new WebAuthenticationDetailsSource().buildDetails(\n                            request));\n                    logger.info(\"authenticated user \" + account + \", setting security context\");\n                    SecurityContextHolder.getContext().setAuthentication(authentication);\n                }\n            }\n        }\n\n        chain.doFilter(request, response);\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e配置Spring security\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e    httpSecurity.addFilterBefore(authenticationTokenFilterBean(),UsernamePasswordAuthenticationFilter.class);\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n为使用前后端分离的后端管理框架做准备，使用JWT目前看来是最佳选择。\n\n## 知其然\n\n- 无状态\n- 服务化\n- 移动、web统统支持，后端提供相关接口即可\n\n## 知其所以然\n\n1. 认证：通过调用登录接口，服务器颁发一个`JWT`（JSON Web Token）给客户端。\n2. 鉴权：客户端每个请求携带`JWT`，后端使用一个请求过滤器，从请求头中解析`JWT`，为本次请求授予相关权限\n\n\u003c!--more--\u003e\n\n## 导入`io.jsonwebtoken:jjwt`\n\n`jjwt`提供了JWT主要功能的Java版本实现，目前版本是0.9.0\n\n```json\ndependencies {\n    compile 'io.jsonwebtoken:jjwt:0.9.0'\n}\n```\n\n### 生成token\n\n```java\nprivate String generateToken(Map\u003cString, Object\u003e claims) {\n        return Jwts.builder()\n                .setClaims(claims) //自定义声明\n                .setExpiration(generateExpirationDate()) //过期时间\n                .signWith(SignatureAlgorithm.HS512, secret) //加密\n                .compact();\n    }\n```\n\n### 解析token\n\n```java\nprivate Claims getClaimsFromToken(String token) {\n        Claims claims;\n        try {\n            claims = Jwts.parser()\n                    .setSigningKey(secret)\n                    .parseClaimsJws(token)\n                    .getBody();\n        } catch (Exception e) {\n            claims = null;\n        }\n        return claims;\n    }\n```\n\n\n## 鉴权过滤器\n\n```java\npackage cn.wycode.web.config.security;\n\nimport org.springframework.beans.factory.annotation.Autowired;\nimport org.springframework.beans.factory.annotation.Value;\nimport org.springframework.security.authentication.UsernamePasswordAuthenticationToken;\nimport org.springframework.security.core.context.SecurityContextHolder;\nimport org.springframework.security.core.userdetails.UserDetails;\nimport org.springframework.security.core.userdetails.UserDetailsService;\nimport org.springframework.security.web.authentication.WebAuthenticationDetailsSource;\nimport org.springframework.stereotype.Component;\nimport org.springframework.web.filter.OncePerRequestFilter;\n\nimport javax.servlet.FilterChain;\nimport javax.servlet.ServletException;\nimport javax.servlet.http.HttpServletRequest;\nimport javax.servlet.http.HttpServletResponse;\nimport java.io.IOException;\n\n\n@Component\npublic class JwtAuthenticationTokenFilter extends OncePerRequestFilter {\n\n    @Autowired\n    private UserDetailsService userDetailsService;\n\n    @Autowired\n    private JwtTokenUtil jwtTokenUtil;\n\n    @Value(\"${jwt.header}\")\n    private String tokenHeader;\n\n    @Value(\"${jwt.tokenHead}\")\n    private String tokenHead;\n\n    @Override\n    protected void doFilterInternal(\n            HttpServletRequest request,\n            HttpServletResponse response,\n            FilterChain chain) throws ServletException, IOException {\n\n        String authHeader = request.getHeader(this.tokenHeader);\n        if (authHeader != null \u0026\u0026 authHeader.startsWith(tokenHead)) {\n            final String authToken = authHeader.substring(tokenHead.length()); // The part after \"Bearer \"\n            String account = jwtTokenUtil.getUsernameFromToken(authToken);\n\n            logger.info(\"checking authentication \" + account);\n\n            if (account != null \u0026\u0026 SecurityContextHolder.getContext().getAuthentication() == null) {\n                UserDetails userDetails = this.userDetailsService.loadUserByUsername(account);\n\n                if (jwtTokenUtil.validateToken(authToken, userDetails)) {\n                    UsernamePasswordAuthenticationToken authentication = new UsernamePasswordAuthenticationToken(\n                            userDetails, null, userDetails.getAuthorities());\n                    authentication.setDetails(new WebAuthenticationDetailsSource().buildDetails(\n                            request));\n                    logger.info(\"authenticated user \" + account + \", setting security context\");\n                    SecurityContextHolder.getContext().setAuthentication(authentication);\n                }\n            }\n        }\n\n        chain.doFilter(request, response);\n    }\n}\n```\n\n### 配置Spring security\n\n```java\n    httpSecurity.addFilterBefore(authenticationTokenFilterBean(),UsernamePasswordAuthenticationFilter.class);\n```\n","data":{"title":"使用JWT和Spring Security结合开发一套认证鉴权系统","date":"2017-11-17","tags":["Spring","JWT","JSON","OAuth"],"category":"Backend"},"isEmpty":false,"excerpt":"\n为使用前后端分离的后端管理框架做准备，使用JWT目前看来是最佳选择。\n\n## 知其然\n\n- 无状态\n- 服务化\n- 移动、web统统支持，后端提供相关接口即可\n\n## 知其所以然\n\n1. 认证：通过调用登录接口，服务器颁发一个`JWT`（JSON Web Token）给客户端。\n2. 鉴权：客户端每个请求携带`JWT`，后端使用一个请求过滤器，从请求头中解析`JWT`，为本次请求授予相关权限\n\n"},{"id":"web-framework","file":"web-framework.md","excerptHtml":"\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eSpring Boot能够创建独立的Spring应用程序，在云计算，分布式流行的今天，它提供了一种非常契合目前web开发需求的解决方案，是Java开发web应用的不二选择。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eSpring Security是一款功能强大，可定制的身份验证和访问控制框架。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eH2数据库是一个轻量级的数据库引擎，开源，快速，它可以嵌入到Java程序中，作为内存数据库，也可以持久化，并提供了一个web程序，可以可视化操作数据。使用H2的还有一个重要原因是我的服务器只有512M内存，我无法使用MySQL这样的重量级数据库。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eThymeleaf是一个后台模版引擎，它是JSP的完美替代品，在快速渲染网页的基础上，它不会改变HTML代码结构，从而前端工程师仍然可以用假数据预览。Demo页面可以给后台人员直接使用。（当然并没有前端工程师，不过后期我会使用Vue做一个前后端分离的系统）\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n","contentHtml":"\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eSpring Boot能够创建独立的Spring应用程序，在云计算，分布式流行的今天，它提供了一种非常契合目前web开发需求的解决方案，是Java开发web应用的不二选择。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eSpring Security是一款功能强大，可定制的身份验证和访问控制框架。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eH2数据库是一个轻量级的数据库引擎，开源，快速，它可以嵌入到Java程序中，作为内存数据库，也可以持久化，并提供了一个web程序，可以可视化操作数据。使用H2的还有一个重要原因是我的服务器只有512M内存，我无法使用MySQL这样的重量级数据库。\u003c/p\u003e\n\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\n\u003cp class=\"mb-4\"\u003eThymeleaf是一个后台模版引擎，它是JSP的完美替代品，在快速渲染网页的基础上，它不会改变HTML代码结构，从而前端工程师仍然可以用假数据预览。Demo页面可以给后台人员直接使用。（当然并没有前端工程师，不过后期我会使用Vue做一个前后端分离的系统）\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e先偷个懒吧，直接上github仓库。。。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ca href=\"https://github.com/wangyucode/WebFramework\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/WebFramework\u003c/a\u003e\u003c/p\u003e\n","content":"\n- Spring Boot能够创建独立的Spring应用程序，在云计算，分布式流行的今天，它提供了一种非常契合目前web开发需求的解决方案，是Java开发web应用的不二选择。\n\n- Spring Security是一款功能强大，可定制的身份验证和访问控制框架。\n\n- H2数据库是一个轻量级的数据库引擎，开源，快速，它可以嵌入到Java程序中，作为内存数据库，也可以持久化，并提供了一个web程序，可以可视化操作数据。使用H2的还有一个重要原因是我的服务器只有512M内存，我无法使用MySQL这样的重量级数据库。\n\n- Thymeleaf是一个后台模版引擎，它是JSP的完美替代品，在快速渲染网页的基础上，它不会改变HTML代码结构，从而前端工程师仍然可以用假数据预览。Demo页面可以给后台人员直接使用。（当然并没有前端工程师，不过后期我会使用Vue做一个前后端分离的系统）\n\n\u003c!--more--\u003e\n\n\n先偷个懒吧，直接上github仓库。。。\n\n[https://github.com/wangyucode/WebFramework](https://github.com/wangyucode/WebFramework)\n","data":{"title":"Spring Boot + Spring Security + H2 + Thymeleaf做一个后台管理系统","date":"2017-10-26","tags":["Spring","Java","Thymeleaf"],"category":"Backend"},"isEmpty":false,"excerpt":"\n- Spring Boot能够创建独立的Spring应用程序，在云计算，分布式流行的今天，它提供了一种非常契合目前web开发需求的解决方案，是Java开发web应用的不二选择。\n\n- Spring Security是一款功能强大，可定制的身份验证和访问控制框架。\n\n- H2数据库是一个轻量级的数据库引擎，开源，快速，它可以嵌入到Java程序中，作为内存数据库，也可以持久化，并提供了一个web程序，可以可视化操作数据。使用H2的还有一个重要原因是我的服务器只有512M内存，我无法使用MySQL这样的重量级数据库。\n\n- Thymeleaf是一个后台模版引擎，它是JSP的完美替代品，在快速渲染网页的基础上，它不会改变HTML代码结构，从而前端工程师仍然可以用假数据预览。Demo页面可以给后台人员直接使用。（当然并没有前端工程师，不过后期我会使用Vue做一个前后端分离的系统）\n\n"},{"id":"swagger","file":"swagger.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e创建SwaggerUI渲染需要的JSON\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e首先为项目添加生成JSON的库：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edependencies {\n    compile \"io.springfox:springfox-swagger2:2.7.0\"\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSwaggerConfig\u003c/code\u003e类\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\n@EnableSwagger2\npublic class SwaggerConfig {\n\n    @Bean\n    public Docket generateDocket(){\n        return new Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .paths(paths()) // and by paths\n                .build()\n                .apiInfo(apiInfo());\n    }\n\n\n    //Here is an example where we select any api that matches one of these paths\n    private Predicate\u0026#x3C;String\u003e paths() {\n        return input -\u003e input.matches(\".api.*\");\n    }\n\n\n    private ApiInfo apiInfo() {\n        return new ApiInfo(\"王郁的API文档\",\n                \"提供App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                new Contact(\"王郁\",\"wycode.cn\",\"wangyu0503@gmail.com\"),\n                \"wycode.cn All Right Reserved\",\n                \"http://wycode.cn\",\n                new ArrayList\u0026#x3C;\u003e());\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e访问\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehttp://localhost:8080/v2/api-docs\u003c/code\u003e可以看到JSON即说明配置成功：\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-JSON px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n    \"swagger\": \"2.0\",\n    \"info\": {\n        \"description\": \"提供App测试及独立APP研发\",\n        \"version\": \"2.0\",\n        \"title\": \"王郁的API文档\",\n        \"termsOfService\": \"http://wycode.cn\",\n        \"contact\": {},\n        \"license\": {}\n    },\n    \"host\": \"localhost:8080\",\n    \"basePath\": \"/\",\n    \"tags\": [],\n    \"paths\": {\n        \"/api/hello\": {\n            \"get\": {},\n            \"head\": {},\n            \"post\": {},\n            \"put\": {},\n            \"delete\": {},\n            \"options\": {},\n            \"patch\": {}\n        }\n    },\n    \"definitions\": {}\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e添加SwaggerUI包\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e从\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSwaggerUI\u003c/code\u003e的github上下载最新版，将里面的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edist\u003c/code\u003e文件夹，放入我们工程的静态页面目录\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e因为我们要修改\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e，所以不能使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ewebjars\u003c/code\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e对\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eindex.html\u003c/code\u003e的常量\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eui\u003c/code\u003e做如下更改\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-JavaScript px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e// Build a system\n  const ui = SwaggerUIBundle({\n    url: \"/v2/api-docs\", //API的JSON地址\n    dom_id: '#swagger-ui',\n    deepLinking: true,\n    presets: [\n      SwaggerUIBundle.presets.apis,\n      SwaggerUIStandalonePreset\n    ],\n    plugins: [\n      SwaggerUIBundle.plugins.DownloadUrl\n    ],\n    layout: \"StandaloneLayout\"\n  })\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e大功告成！\u003c/h2\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e添加文档注释\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e实体注解\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-Java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@ApiModel(value = \"Hello 消息\",description = \"Hello接口返回的消息实体\")\npublic class Hello {\n\n    @ApiModelProperty(\"消息\")\n    private String message;\n\n    ...\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e接口注解\u003c/li\u003e\n\u003c/ul\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Api(value = \"Hello\", description = \"第一个api\",tags = \"Hello\")\n@RestController\npublic class HelloController {\n\n    @ApiOperation(value = \"Say Hello\", produces = \"application/json \")\n    @RequestMapping(\"/api/hello\")\n    public Hello hello(@ApiParam(value = \"消息\",defaultValue = \"Hello World!\") @RequestParam(name = \"message\",defaultValue = \"Hello World!\")String message){\n        return  new Hello(\"message is : \"+ message);\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e 本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\n\n\u003c!--more--\u003e\n## 创建SwaggerUI渲染需要的JSON\n- 首先为项目添加生成JSON的库：\n\n```\ndependencies {\n    compile \"io.springfox:springfox-swagger2:2.7.0\"\n}\n```\n- 添加`SwaggerConfig`类\n\n```java\n@Configuration\n@EnableSwagger2\npublic class SwaggerConfig {\n\n    @Bean\n    public Docket generateDocket(){\n        return new Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .paths(paths()) // and by paths\n                .build()\n                .apiInfo(apiInfo());\n    }\n\n\n    //Here is an example where we select any api that matches one of these paths\n    private Predicate\u003cString\u003e paths() {\n        return input -\u003e input.matches(\".api.*\");\n    }\n\n\n    private ApiInfo apiInfo() {\n        return new ApiInfo(\"王郁的API文档\",\n                \"提供App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                new Contact(\"王郁\",\"wycode.cn\",\"wangyu0503@gmail.com\"),\n                \"wycode.cn All Right Reserved\",\n                \"http://wycode.cn\",\n                new ArrayList\u003c\u003e());\n    }\n}\n```\n\n- 访问`http://localhost:8080/v2/api-docs`可以看到JSON即说明配置成功：\n\n```JSON\n{\n    \"swagger\": \"2.0\",\n    \"info\": {\n        \"description\": \"提供App测试及独立APP研发\",\n        \"version\": \"2.0\",\n        \"title\": \"王郁的API文档\",\n        \"termsOfService\": \"http://wycode.cn\",\n        \"contact\": {},\n        \"license\": {}\n    },\n    \"host\": \"localhost:8080\",\n    \"basePath\": \"/\",\n    \"tags\": [],\n    \"paths\": {\n        \"/api/hello\": {\n            \"get\": {},\n            \"head\": {},\n            \"post\": {},\n            \"put\": {},\n            \"delete\": {},\n            \"options\": {},\n            \"patch\": {}\n        }\n    },\n    \"definitions\": {}\n}\n```\n\n- 添加SwaggerUI包\n\n从`SwaggerUI`的github上下载最新版，将里面的`dist`文件夹，放入我们工程的静态页面目录\n\n\u003e 因为我们要修改`index.html`，所以不能使用`webjars`\n\n对`index.html`的常量`ui`做如下更改\n\n```JavaScript\n// Build a system\n  const ui = SwaggerUIBundle({\n    url: \"/v2/api-docs\", //API的JSON地址\n    dom_id: '#swagger-ui',\n    deepLinking: true,\n    presets: [\n      SwaggerUIBundle.presets.apis,\n      SwaggerUIStandalonePreset\n    ],\n    plugins: [\n      SwaggerUIBundle.plugins.DownloadUrl\n    ],\n    layout: \"StandaloneLayout\"\n  })\n```\n\n\n## 大功告成！\n\n## 添加文档注释\n\n- 实体注解\n\n```Java\n@ApiModel(value = \"Hello 消息\",description = \"Hello接口返回的消息实体\")\npublic class Hello {\n\n    @ApiModelProperty(\"消息\")\n    private String message;\n\n    ...\n}\n```\n\n- 接口注解\n\n```java\n@Api(value = \"Hello\", description = \"第一个api\",tags = \"Hello\")\n@RestController\npublic class HelloController {\n\n    @ApiOperation(value = \"Say Hello\", produces = \"application/json \")\n    @RequestMapping(\"/api/hello\")\n    public Hello hello(@ApiParam(value = \"消息\",defaultValue = \"Hello World!\") @RequestParam(name = \"message\",defaultValue = \"Hello World!\")String message){\n        return  new Hello(\"message is : \"+ message);\n    }\n}\n```\n","data":{"title":"使用swagger为Spring REST API生成在线文档","date":"2017-10-23","tags":["Spring","Java","Swagger","JavaScript"],"category":"Backend"},"isEmpty":false,"excerpt":"\n\u003e 本文介绍如何使用swaggerUI为Spring Boot项目创建动态的、从代码生成的REST API文档\n\n"},{"id":"spring-cors","file":"spring-cors.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJavaScript在跨域请求时会碰到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNo 'Access-Control-Allow-Origin' header is present on the requested resource.\u003c/code\u003e。是因为服务器不支持\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCross-origin resource sharing (CORS)\u003c/code\u003e这篇教程教你如何为Java Spring后台配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCORS\u003c/code\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJavaScript在跨域请求时会碰到\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eNo 'Access-Control-Allow-Origin' header is present on the requested resource.\u003c/code\u003e。是因为服务器不支持\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCross-origin resource sharing (CORS)\u003c/code\u003e这篇教程教你如何为Java Spring后台配置\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCORS\u003c/code\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@CrossOrigin\u003c/code\u003e注解\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e注解相关方法即可。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e全局配置\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\npublic class MyConfiguration {\n\n    @Bean\n    public WebMvcConfigurer corsConfigurer() {\n        return new WebMvcConfigurerAdapter() {\n            @Override\n            public void addCorsMappings(CorsRegistry registry) {\n                registry.addMapping(\"/api/**\");\n            }\n        };\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e JavaScript在跨域请求时会碰到`No 'Access-Control-Allow-Origin' header is present on the requested resource.`。是因为服务器不支持`Cross-origin resource sharing (CORS)`这篇教程教你如何为Java Spring后台配置`CORS`\n\n\u003c!--more--\u003e\n\n## 使用`@CrossOrigin`注解\n\n注解相关方法即可。\n\n## 全局配置\n\n```java\n@Configuration\npublic class MyConfiguration {\n\n    @Bean\n    public WebMvcConfigurer corsConfigurer() {\n        return new WebMvcConfigurerAdapter() {\n            @Override\n            public void addCorsMappings(CorsRegistry registry) {\n                registry.addMapping(\"/api/**\");\n            }\n        };\n    }\n}\n```\n","data":{"title":"Spring中启用CORS","date":"2017-07-27","tags":["Spring","Java","CORS"],"category":"Backend"},"isEmpty":false,"excerpt":"\n\u003e JavaScript在跨域请求时会碰到`No 'Access-Control-Allow-Origin' header is present on the requested resource.`。是因为服务器不支持`Cross-origin resource sharing (CORS)`这篇教程教你如何为Java Spring后台配置`CORS`\n\n"},{"id":"spring-jpa","file":"spring-jpa.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eSpring JPA框架提供了非常强大的数据库持久化方案，仅仅通过定义接口就能实现很多查询功能，甚至不用写具体实现代码。通过接口定义的抽象方法Spring JPA就知道该做什么了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e下面将基本的使用总结如下：\u003c/p\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eSpring JPA框架提供了非常强大的数据库持久化方案，仅仅通过定义接口就能实现很多查询功能，甚至不用写具体实现代码。通过接口定义的抽象方法Spring JPA就知道该做什么了。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e下面将基本的使用总结如下：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e接口能力\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e定义接口继承\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCrudRepository\u0026#x3C;T, ID\u003e\u003c/code\u003e即可获得增删改查能力；\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e定义接口继承\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ePagingAndSortingRepository\u0026#x3C;T, ID\u003e\u003c/code\u003e获得增删改查能力的同时增加分页查询能力；\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e声明后可以直接使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@Autowired\u003c/code\u003e注入使用，无需实现。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关键词\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003efind…By\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecount…By\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDistinct\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIgnoreCase\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAllIgnoreCase\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAnd\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOr\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eBetween\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLessThan\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eGreaterThan\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLike \u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOrderBy\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAsc\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDesc\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOrderBy\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e一些例子\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e//简单示例\nList\u0026#x3C;Person\u003e findByEmailAddressAndLastname(EmailAddress emailAddress, String lastname);\n\n// 去重标志\nList\u0026#x3C;Person\u003e findDistinctPeopleByLastnameOrFirstname(String lastname, String firstname);\nList\u0026#x3C;Person\u003e findPeopleDistinctByLastnameOrFirstname(String lastname, String firstname);\n\n// 对某个字段忽略大小写\nList\u0026#x3C;Person\u003e findByLastnameIgnoreCase(String lastname);\n\n// 对所有字段忽略大小写\nList\u0026#x3C;Person\u003e findByLastnameAndFirstnameAllIgnoreCase(String lastname, String firstname);\n\n// 静态 ORDER BY 查询\nList\u0026#x3C;Person\u003e findByLastnameOrderByFirstnameAsc(String lastname);\nList\u0026#x3C;Person\u003e findByLastnameOrderByFirstnameDesc(String lastname);\n\n//分页\nPage\u0026#x3C;User\u003e findByLastname(String lastname, Pageable pageable);\nSlice\u0026#x3C;User\u003e findByLastname(String lastname, Pageable pageable);\nList\u0026#x3C;User\u003e findByLastname(String lastname, Sort sort);\nList\u0026#x3C;User\u003e findByLastname(String lastname, Pageable pageable);\n\n//限制查询结果\nUser findFirstByOrderByLastnameAsc();\nUser findTopByOrderByAgeDesc();\nPage\u0026#x3C;User\u003e queryFirst10ByLastname(String lastname, Pageable pageable);\nSlice\u0026#x3C;User\u003e findTop3ByLastname(String lastname, Pageable pageable);\nList\u0026#x3C;User\u003e findFirst10ByLastname(String lastname, Sort sort);\nList\u0026#x3C;User\u003e findTop10ByLastname(String lastname, Pageable pageable);\n\n//通过userId和gameId查询GameScore实体\nGameScore findByUserIdAndGameId(String userId,int gameId);\n//通过gameId查询分页数据，并根据score字段倒序排序\nList\u0026#x3C;GameScore\u003e findByGameIdOrderByScoreDesc(int gameId,Pageable page);\n//通过gameId计数，条件是大于传入的score\nint countByGameIdAndScoreGreaterThan(int gameId,long score);\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n\u003e Spring JPA框架提供了非常强大的数据库持久化方案，仅仅通过定义接口就能实现很多查询功能，甚至不用写具体实现代码。通过接口定义的抽象方法Spring JPA就知道该做什么了。\n\n下面将基本的使用总结如下：\n\n\u003c!--more--\u003e\n## 接口能力\n\n- 定义接口继承`CrudRepository\u003cT, ID\u003e`即可获得增删改查能力；\n- 定义接口继承`PagingAndSortingRepository\u003cT, ID\u003e`获得增删改查能力的同时增加分页查询能力；\n\n声明后可以直接使用`@Autowired`注入使用，无需实现。\n\n## 关键词\n- `find…By`\n- `count…By`\n- `Distinct`\n- `IgnoreCase`\n- `AllIgnoreCase`\n- `And`\n- `Or`\n- `Between`\n- `LessThan`\n- `GreaterThan`\n- `Like `\n- `OrderBy`\n- `Asc`\n- `Desc`\n- `OrderBy`\n\n## 一些例子\n\n```java\n//简单示例\nList\u003cPerson\u003e findByEmailAddressAndLastname(EmailAddress emailAddress, String lastname);\n\n// 去重标志\nList\u003cPerson\u003e findDistinctPeopleByLastnameOrFirstname(String lastname, String firstname);\nList\u003cPerson\u003e findPeopleDistinctByLastnameOrFirstname(String lastname, String firstname);\n\n// 对某个字段忽略大小写\nList\u003cPerson\u003e findByLastnameIgnoreCase(String lastname);\n\n// 对所有字段忽略大小写\nList\u003cPerson\u003e findByLastnameAndFirstnameAllIgnoreCase(String lastname, String firstname);\n\n// 静态 ORDER BY 查询\nList\u003cPerson\u003e findByLastnameOrderByFirstnameAsc(String lastname);\nList\u003cPerson\u003e findByLastnameOrderByFirstnameDesc(String lastname);\n\n//分页\nPage\u003cUser\u003e findByLastname(String lastname, Pageable pageable);\nSlice\u003cUser\u003e findByLastname(String lastname, Pageable pageable);\nList\u003cUser\u003e findByLastname(String lastname, Sort sort);\nList\u003cUser\u003e findByLastname(String lastname, Pageable pageable);\n\n//限制查询结果\nUser findFirstByOrderByLastnameAsc();\nUser findTopByOrderByAgeDesc();\nPage\u003cUser\u003e queryFirst10ByLastname(String lastname, Pageable pageable);\nSlice\u003cUser\u003e findTop3ByLastname(String lastname, Pageable pageable);\nList\u003cUser\u003e findFirst10ByLastname(String lastname, Sort sort);\nList\u003cUser\u003e findTop10ByLastname(String lastname, Pageable pageable);\n\n//通过userId和gameId查询GameScore实体\nGameScore findByUserIdAndGameId(String userId,int gameId);\n//通过gameId查询分页数据，并根据score字段倒序排序\nList\u003cGameScore\u003e findByGameIdOrderByScoreDesc(int gameId,Pageable page);\n//通过gameId计数，条件是大于传入的score\nint countByGameIdAndScoreGreaterThan(int gameId,long score);\n```\n","data":{"title":"使用SpringJPA框架","date":"2017-07-11","tags":["Spring","JPA","Java"],"category":"Backend"},"isEmpty":false,"excerpt":"\n\u003e Spring JPA框架提供了非常强大的数据库持久化方案，仅仅通过定义接口就能实现很多查询功能，甚至不用写具体实现代码。通过接口定义的抽象方法Spring JPA就知道该做什么了。\n\n下面将基本的使用总结如下：\n\n"},{"id":"spring-properties","file":"spring-properties.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eSpring框架在运行时会自动查找\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e配置文件，在这个文件中进行项目相关配置属性，例如数据库地址密码等。当然也支持自定义属性。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eSpring框架在运行时会自动查找\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e配置文件，在这个文件中进行项目相关配置属性，例如数据库地址密码等。当然也支持自定义属性。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e位置\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e可以放置在以下目录\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e当前目录下的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/config\u003c/code\u003e目录中\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e当前目录\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eclasspath下的 /config包\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eclasspath\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003cstrong\u003eresource文件夹\u003c/strong\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e自定义属性的使用\u003c/h2\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e添加自定义属性\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emyProperties = myValue\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@Value\u003c/code\u003e注解即可注入使用\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e    @Value(\"${myProperties}\")\n    String value; //value = \"myValue\";\n\u003c/code\u003e\u003c/pre\u003e\n\u003col start=\"3\" class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e还可以使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ConfigurationProperties(\"foo\")\u003c/code\u003e注入POJO实体\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@ConfigurationProperties(\"foo\")\npublic class Foo｛\n    private boolean enabled;\n    public boolean isEnabled() { ... }\n    public void setEnabled(boolean enabled) { ... }\n｝\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e添加属性\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003efoo.enabled = true\u003c/code\u003e即可\u003c/p\u003e\n","content":"\n\u003e Spring框架在运行时会自动查找`application.properties`配置文件，在这个文件中进行项目相关配置属性，例如数据库地址密码等。当然也支持自定义属性。\n\n\u003c!--more--\u003e\n\n## 位置\n`application.properties`可以放置在以下目录\n\n- 当前目录下的`/config`目录中\n- 当前目录\n- classpath下的 /config包\n- classpath\n- **resource文件夹**\n\n## 自定义属性的使用\n\n1. 在`application.properties`添加自定义属性`myProperties = myValue`\n2. 使用`@Value`注解即可注入使用\n```java\n    @Value(\"${myProperties}\")\n    String value; //value = \"myValue\";\n```\n3. 还可以使用`@ConfigurationProperties(\"foo\")`注入POJO实体\n```java\n@ConfigurationProperties(\"foo\")\npublic class Foo｛\n    private boolean enabled;\n    public boolean isEnabled() { ... }\n    public void setEnabled(boolean enabled) { ... }\n｝\n```\n在`application.properties`添加属性`foo.enabled = true`即可\n","data":{"title":"Spring中的application.properties","date":"2017-07-11","tags":["Spring","Java"],"category":"Backend"},"isEmpty":false,"excerpt":"\n\u003e Spring框架在运行时会自动查找`application.properties`配置文件，在这个文件中进行项目相关配置属性，例如数据库地址密码等。当然也支持自定义属性。\n\n"},{"id":"git-error","file":"git-error.md","excerptHtml":"\u003ch1\u003e解决 invalid format \u003ca href=\"mailto:git@github.com\" class=\"text-sky-500 hover:text-sky-400\"\u003egit@github.com\u003c/a\u003e: Permission denied (publickey).\u003c/h1\u003e\n\u003cp class=\"mb-4\"\u003egit在远端pull或者push时报：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003einvalid format git@github.com: Permission denied (publickey).\n\u003c/code\u003e\u003c/pre\u003e\n","contentHtml":"\u003ch1\u003e解决 invalid format \u003ca href=\"mailto:git@github.com\" class=\"text-sky-500 hover:text-sky-400\"\u003egit@github.com\u003c/a\u003e: Permission denied (publickey).\u003c/h1\u003e\n\u003cp class=\"mb-4\"\u003egit在远端pull或者push时报：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003einvalid format git@github.com: Permission denied (publickey).\n\u003c/code\u003e\u003c/pre\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e问题场景：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003ewindows上把private key的内容复制到文本编辑器时会出现\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e根本原因：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e私钥的换行是单字符\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLF\u003c/code\u003e，但windows的默认换行符是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCRLF\u003c/code\u003e，所以导致git读取私钥报格式错误。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e解决办法：\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用文本编辑器修改换行符，例如VSCODE中状态栏点击\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCRLF\u003c/code\u003e，然后切换成\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLF\u003c/code\u003e。\u003c/p\u003e\n","content":"\n# 解决 invalid format git@github.com: Permission denied (publickey).\n\ngit在远端pull或者push时报：\n\n```\ninvalid format git@github.com: Permission denied (publickey).\n```\n\n\u003c!--more--\u003e\n\n## 问题场景：\n\nwindows上把private key的内容复制到文本编辑器时会出现\n\n## 根本原因：\n\n私钥的换行是单字符`LF`，但windows的默认换行符是`CRLF`，所以导致git读取私钥报格式错误。\n\n## 解决办法：\n\n使用文本编辑器修改换行符，例如VSCODE中状态栏点击`CRLF`，然后切换成`LF`。\n","data":{"title":"从0开始开发一个评论系统","date":"2015-05-21","tags":["Git"],"category":"Backend"},"isEmpty":false,"excerpt":"\n# 解决 invalid format git@github.com: Permission denied (publickey).\n\ngit在远端pull或者push时报：\n\n```\ninvalid format git@github.com: Permission denied (publickey).\n```\n\n"}]},"__N_SSG":true},"page":"/blog/category/[cid]","query":{"cid":"backend"},"buildId":"7YMuoTtyITfiinBiv1T76","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
