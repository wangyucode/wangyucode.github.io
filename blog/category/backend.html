ion-700"><div id="__next"></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"posts":[{"id":"docker-mongodb","file":"docker-mongodb.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20201204_mongodb.svg\" alt=\"MongoDB\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何使用两行简单的命令来执行备份和还原Docker容器中MongoDB的数据库数据。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20201204_mongodb.svg\" alt=\"MongoDB\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e本文介绍如何使用两行简单的命令来执行备份和还原Docker容器中MongoDB的数据库数据。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e备份\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e备份MongoDB有多种方法，其中比较简单的就是使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emongodump\u003c/code\u003e。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edocker exec -i \u0026#x3C;CONTAINER_NAME\u003e mongodump -d \u0026#x3C;DATABASE\u003e --archive \u003e ./mongo/collections.archive\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e以上命令会将\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;CONTAINER_NAME\u003e\u003c/code\u003e容器中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;DATABASE\u003e\u003c/code\u003e数据库dump到host机器的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecollections.archive\u003c/code\u003e文件中。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e--archive\u003c/code\u003e会dump所有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecollection\u003c/code\u003e到一个文件。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emongodump\u003c/code\u003e命令不提供目标路径的话会将dump结果输出到标准输出，这里使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u003e\u003c/code\u003e重定向输出到host的文件。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e还原\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这里使用host机器上的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecollections.archive\u003c/code\u003e文件进行还原。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edocker exec -i \u0026#x3C;CONTAINER_NAME\u003e mongorestore --archive \u0026#x3C; ./mongo/collections.archive\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e--archive\u003c/code\u003e模式导出的备份文件还原时必须也要加上\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e--archive\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emongorestore\u003c/code\u003e命令不提供源路径的话会使用标准输入，这里使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e\u0026#x3C;\u003c/code\u003e重定向host的文件作为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emongorestore\u003c/code\u003e的输入。\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n![MongoDB](/images/20201204_mongodb.svg)\n\n\u003e 本文介绍如何使用两行简单的命令来执行备份和还原Docker容器中MongoDB的数据库数据。\n\n\u003c!--more--\u003e\n\n## 备份\n\n备份MongoDB有多种方法，其中比较简单的就是使用`mongodump`。\n\n```bash\ndocker exec -i \u003cCONTAINER_NAME\u003e mongodump -d \u003cDATABASE\u003e --archive \u003e ./mongo/collections.archive\n```\n\n- 以上命令会将`\u003cCONTAINER_NAME\u003e`容器中的`\u003cDATABASE\u003e`数据库dump到host机器的`collections.archive`文件中。\n- `--archive`会dump所有`collection`到一个文件。\n- `mongodump`命令不提供目标路径的话会将dump结果输出到标准输出，这里使用`\u003e`重定向输出到host的文件。\n\n## 还原\n\n这里使用host机器上的`collections.archive`文件进行还原。\n\n```bash\ndocker exec -i \u003cCONTAINER_NAME\u003e mongorestore --archive \u003c ./mongo/collections.archive\n```\n\n- `--archive`模式导出的备份文件还原时必须也要加上`--archive`\n- `mongorestore`命令不提供源路径的话会使用标准输入，这里使用`\u003c`重定向host的文件作为`mongorestore`的输入。\n\n","data":{"title":"备份和还原Docker容器中的MongoDB数据","date":"2020-12-05","tags":["Docker","MongoDB"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![MongoDB](/images/20201204_mongodb.svg)\n\n\u003e 本文介绍如何使用两行简单的命令来执行备份和还原Docker容器中MongoDB的数据库数据。\n\n"},{"id":"websocket","file":"websocket.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/lab/chat2.png\" alt=\"chat\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e有时候就想和其他人安全地聊个天，它需要有这些特征：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e基于web技术，只需一个网页，无需下载任何App，易于转发。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e无需注册，使用简单，基于邀请码加入聊天，邀请码定时刷新。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e完全匿名。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e消息只保留在内存中，超时自动删除。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e进行在线人数统计，能设置最大人数上限。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e用户上下线和邀请码刷新时有系统提示。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eWeb连接必然是不稳定的，所以断线必须能够重连。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e线上Demo演示请直接访问: \u003ca href=\"https://wycode.cn/chat/\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://wycode.cn/chat/\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e技术方面：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebSocket\u003c/code\u003e协议提供Web上的全双工通信支持。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSTOMP\u003c/code\u003e作为上层协议，它基于帧(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFrame\u003c/code\u003e)，和Http请求很类似，提供了一种发布订阅的模式，很适合需求的群聊模式。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e后端采用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eKotlin\u003c/code\u003e + \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpringBoot\u003c/code\u003e，前端采用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTypescript\u003c/code\u003e + \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAngular\u003c/code\u003e + \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAntDesign\u003c/code\u003e，均使用最新版本。\u003c/li\u003e\n\u003c/ul\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/lab/chat2.png\" alt=\"chat\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e有时候就想和其他人安全地聊个天，它需要有这些特征：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e基于web技术，只需一个网页，无需下载任何App，易于转发。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e无需注册，使用简单，基于邀请码加入聊天，邀请码定时刷新。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e完全匿名。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e消息只保留在内存中，超时自动删除。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e进行在线人数统计，能设置最大人数上限。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e用户上下线和邀请码刷新时有系统提示。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eWeb连接必然是不稳定的，所以断线必须能够重连。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e线上Demo演示请直接访问: \u003ca href=\"https://wycode.cn/chat/\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://wycode.cn/chat/\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e技术方面：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebSocket\u003c/code\u003e协议提供Web上的全双工通信支持。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSTOMP\u003c/code\u003e作为上层协议，它基于帧(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFrame\u003c/code\u003e)，和Http请求很类似，提供了一种发布订阅的模式，很适合需求的群聊模式。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e后端采用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eKotlin\u003c/code\u003e + \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpringBoot\u003c/code\u003e，前端采用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTypescript\u003c/code\u003e + \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAngular\u003c/code\u003e + \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAntDesign\u003c/code\u003e，均使用最新版本。\u003c/li\u003e\n\u003c/ul\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e准备SpringBoot工程\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e在SpringBoot中使用WebSocket和STOMP很简单，添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003espring-boot-starter-websocket\u003c/code\u003e这个starter依赖就可以开始了。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e工程基于Gradle初始化，核心的几个依赖如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eimplementation(\"org.springframework.boot:spring-boot-starter-websocket\")\nimplementation(\"org.jetbrains.kotlin:kotlin-reflect\")\nimplementation(\"org.jetbrains.kotlin:kotlin-stdlib-jdk8\")\nimplementation(\"com.fasterxml.jackson.module:jackson-module-kotlin:2.10.+\")\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e配置WebSocket和STOMP\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e添加这么一个类：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\n@EnableWebSocketMessageBroker\nclass WebSocketConfig(val chatService: ChatService, val taskScheduler: TaskScheduler) : WebSocketMessageBrokerConfigurer {\n\n\n    override fun configureMessageBroker(config: MessageBrokerRegistry) {\n        config.enableSimpleBroker(\"/topic/\", \"/queue/\") // 1.\n                .setTaskScheduler(taskScheduler) // 2.\n        config.setApplicationDestinationPrefixes(\"/app\") // 3.\n    }\n\n\n    override fun registerStompEndpoints(registry: StompEndpointRegistry) {\n        registry.addEndpoint(\"/stomp\") // 4.\n                .setAllowedOrigins(\"*\") // 5.\n    }\n\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这里配置了很多端点(\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eendpoint\u003c/code\u003e)，很多时候容易搞混：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e可以理解为是一些频道\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e用于定时心跳，设置了taskSchedule才能启用心跳（对于没有启用SockJS的项目），不开启心跳的话，不管是客户端还是服务器都很容易断开连接。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/app\u003c/code\u003e端点是应用的接收前缀，以app开头的路径会进入后端程序处理\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/stomp\u003c/code\u003e端点是用来握手的，所以前端connect时连接的是这个端点\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e启用任意远程访问，防止前端出现跨域问题，易于调试，对于生产环境，可以删除\u003c/li\u003e\n\u003c/ol\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e需要提到的是，官方文档上仍然启用了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSockJS\u003c/code\u003e，其实已经不需要了，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSockJS\u003c/code\u003e是对于不支持\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebSocket\u003c/code\u003e的Polyfill，对于现在的浏览器，其实已经不需要了，参考这个地址：\u003ca href=\"https://caniuse.com/#search=websockets\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://caniuse.com/#search=websockets\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e邀请码鉴权\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e主要思路：\u003c/p\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e配置客户端入口Channel的interceptor。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003econfigureClientInboundChannel()\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e在握手阶段，取header。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eaccessor.getNativeHeader(\"code\")\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003ecode合法就赋予一个用户。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eaccessor.user = ChatUser()\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e出错时，设置一个sessionAttributes。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eaccessor.sessionAttributes!![\"error\"] = \"邀请码错误！\"\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e这里我尝试了多种办法直接在握手阶段返回错误，但是都失败了，所以最终通过sessionAttributes来标记错误，在下一次通信时返回错误信息。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e此处除了鉴权还做了三件事\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e对于本身分配了id的用户握手时，应当视为重连，而不是新用户，这是断线重连实现的关键。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e新用户进入时要进行人数上限的判断，人满时也报错。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e因为只有进入聊天室的人才能看到邀请码，所以这里还判断了一个超级用户码，用户以超级用户码进入时，会把当前的邀请码以错误码的形式返回。这样管理员就能方便的知道当前的邀请码了。\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e主要接口\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003econtroller\u003c/code\u003e只需要两个接口\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e用来查询当前状态，用户刚进入时会调用，此时会如果有鉴权时的错误信息，会返回错误。如果正常会返回房间的基本信息，以及所有的聊天记录。同时发送系统信息。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@MessageMapping(\"/status\")\n@SendToUser(\"/queue/status\")\nfun status(accessor: SimpMessageHeaderAccessor): CommonMessage\u0026#x3C;*\u003e {\n    return if (accessor.user != null) {\n        chatService.sendSystemMessage(200, accessor.user!!.name)\n        CommonMessage.success(InitData(accessor.user!!.name.toInt(), chatService.users.size, chatService.messages, chatService.code,GEN_CODE_TIME_IN_MINUTES, REMOVE_MESSAGE_TIME_IN_MINUTES))\n    } else {\n        CommonMessage.fail(accessor.sessionAttributes!![\"error\"] as String)\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003col start=\"2\" class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e发送消息，添加到聊天记录即可。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@MessageMapping(\"/all\")\nfun all(message: String, user: Principal): CommonMessage\u0026#x3C;ChatMessage\u003e {\n    val msg = ChatMessage(user.name.toInt(), Date(), message, 0)\n    chatService.messages.add(msg)\n    return CommonMessage.success(msg)\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e定时服务及系统消息\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eChatService\u003c/code\u003e中要维护所有用户、历史消息记录、邀请码\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e所有用户是一个HashSet，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003evar users =  HashSet\u0026#x3C;ChatUser\u003e()\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eChatUser\u003c/code\u003e使用id作为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehashcode\u003c/code\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e更新邀请码的频率较高，所以会同时检查过期消息并移除\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003efun generateCode() {\n    this.code = randomString(16)\n    logger.info(\"${Date().toLocaleString()}: $code\")\n    this.sendSystemMessage(100, this.code)\n    removeOutdatedMessage()\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003col start=\"3\" class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e移除过期消息，消息列表是一个队列，如果队列头部的消息已过期，需要递归检查下一个\u003c/li\u003e\n\u003c/ol\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003efun removeOutdatedMessage() {\n    logger.info(\"${Date().toLocaleString()}: removeOutdatedMessage\")\n    if (messages.size \u003e 0) {\n        val message = messages[0]\n        if (Date().time - message.time.time \u003e REMOVE_MESSAGE_TIME_IN_MINUTES * 60L * 1000) {\n            messages.removeAt(0)\n            removeOutdatedMessage()\n        }\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e至此，后端核心技术要点已介绍完毕，最后放上github仓库，完整代码：\u003ca href=\"https://github.com/wangyucode/chatroom-spring-websocket-stomp\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/chatroom-spring-websocket-stomp\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e线上完整项目演示请直接访问: \u003ca href=\"https://wycode.cn/chat/\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://wycode.cn/chat/\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e基于Angular的前端项目将在下篇博客介绍。\u003c/p\u003e\n","content":"\n![chat](/lab/chat2.png)\n\n有时候就想和其他人安全地聊个天，它需要有这些特征：\n\n- 基于web技术，只需一个网页，无需下载任何App，易于转发。\n- 无需注册，使用简单，基于邀请码加入聊天，邀请码定时刷新。\n- 完全匿名。\n- 消息只保留在内存中，超时自动删除。\n- 进行在线人数统计，能设置最大人数上限。\n- 用户上下线和邀请码刷新时有系统提示。\n- Web连接必然是不稳定的，所以断线必须能够重连。\n\n线上Demo演示请直接访问: \u003chttps://wycode.cn/chat/\u003e\n\n技术方面：\n\n- 使用`WebSocket`协议提供Web上的全双工通信支持。\n- 使用`STOMP`作为上层协议，它基于帧(`Frame`)，和Http请求很类似，提供了一种发布订阅的模式，很适合需求的群聊模式。\n- 后端采用`Kotlin` + `SpringBoot`，前端采用`Typescript` + `Angular` + `AntDesign`，均使用最新版本。\n\n\u003c!--more--\u003e\n\n## 准备SpringBoot工程\n\n在SpringBoot中使用WebSocket和STOMP很简单，添加`spring-boot-starter-websocket`这个starter依赖就可以开始了。\n\n工程基于Gradle初始化，核心的几个依赖如下：\n\n```java\nimplementation(\"org.springframework.boot:spring-boot-starter-websocket\")\nimplementation(\"org.jetbrains.kotlin:kotlin-reflect\")\nimplementation(\"org.jetbrains.kotlin:kotlin-stdlib-jdk8\")\nimplementation(\"com.fasterxml.jackson.module:jackson-module-kotlin:2.10.+\")\n```\n\n## 配置WebSocket和STOMP\n\n添加这么一个类：\n\n```kotlin\n@Configuration\n@EnableWebSocketMessageBroker\nclass WebSocketConfig(val chatService: ChatService, val taskScheduler: TaskScheduler) : WebSocketMessageBrokerConfigurer {\n\n\n    override fun configureMessageBroker(config: MessageBrokerRegistry) {\n        config.enableSimpleBroker(\"/topic/\", \"/queue/\") // 1.\n                .setTaskScheduler(taskScheduler) // 2.\n        config.setApplicationDestinationPrefixes(\"/app\") // 3.\n    }\n\n\n    override fun registerStompEndpoints(registry: StompEndpointRegistry) {\n        registry.addEndpoint(\"/stomp\") // 4.\n                .setAllowedOrigins(\"*\") // 5.\n    }\n\n}\n```\n这里配置了很多端点(`endpoint`)，很多时候容易搞混：\n\n1. 可以理解为是一些频道\n2. 用于定时心跳，设置了taskSchedule才能启用心跳（对于没有启用SockJS的项目），不开启心跳的话，不管是客户端还是服务器都很容易断开连接。\n3. 这里`/app`端点是应用的接收前缀，以app开头的路径会进入后端程序处理\n4. 这里`/stomp`端点是用来握手的，所以前端connect时连接的是这个端点\n5. 启用任意远程访问，防止前端出现跨域问题，易于调试，对于生产环境，可以删除\n\n\u003e 需要提到的是，官方文档上仍然启用了`SockJS`，其实已经不需要了，`SockJS`是对于不支持`WebSocket`的Polyfill，对于现在的浏览器，其实已经不需要了，参考这个地址：https://caniuse.com/#search=websockets\n\n## 邀请码鉴权\n\n主要思路：\n\n- 配置客户端入口Channel的interceptor。`configureClientInboundChannel()`\n- 在握手阶段，取header。`accessor.getNativeHeader(\"code\")`\n- code合法就赋予一个用户。`accessor.user = ChatUser()`\n- 出错时，设置一个sessionAttributes。`accessor.sessionAttributes!![\"error\"] = \"邀请码错误！\"`\n\n\u003e 这里我尝试了多种办法直接在握手阶段返回错误，但是都失败了，所以最终通过sessionAttributes来标记错误，在下一次通信时返回错误信息。\n\n此处除了鉴权还做了三件事\n\n1. 对于本身分配了id的用户握手时，应当视为重连，而不是新用户，这是断线重连实现的关键。\n2. 新用户进入时要进行人数上限的判断，人满时也报错。\n3. 因为只有进入聊天室的人才能看到邀请码，所以这里还判断了一个超级用户码，用户以超级用户码进入时，会把当前的邀请码以错误码的形式返回。这样管理员就能方便的知道当前的邀请码了。\n\n## 主要接口\n\n`controller`只需要两个接口\n\n1. 用来查询当前状态，用户刚进入时会调用，此时会如果有鉴权时的错误信息，会返回错误。如果正常会返回房间的基本信息，以及所有的聊天记录。同时发送系统信息。\n\n```kotlin\n@MessageMapping(\"/status\")\n@SendToUser(\"/queue/status\")\nfun status(accessor: SimpMessageHeaderAccessor): CommonMessage\u003c*\u003e {\n    return if (accessor.user != null) {\n        chatService.sendSystemMessage(200, accessor.user!!.name)\n        CommonMessage.success(InitData(accessor.user!!.name.toInt(), chatService.users.size, chatService.messages, chatService.code,GEN_CODE_TIME_IN_MINUTES, REMOVE_MESSAGE_TIME_IN_MINUTES))\n    } else {\n        CommonMessage.fail(accessor.sessionAttributes!![\"error\"] as String)\n    }\n}\n```\n\n2. 发送消息，添加到聊天记录即可。\n\n```kotlin\n@MessageMapping(\"/all\")\nfun all(message: String, user: Principal): CommonMessage\u003cChatMessage\u003e {\n    val msg = ChatMessage(user.name.toInt(), Date(), message, 0)\n    chatService.messages.add(msg)\n    return CommonMessage.success(msg)\n}\n```\n\n## 定时服务及系统消息\n\n`ChatService`中要维护所有用户、历史消息记录、邀请码\n\n1. 所有用户是一个HashSet，`var users =  HashSet\u003cChatUser\u003e()`，`ChatUser`使用id作为`hashcode`。\n2. 更新邀请码的频率较高，所以会同时检查过期消息并移除\n\n```kotlin\nfun generateCode() {\n    this.code = randomString(16)\n    logger.info(\"${Date().toLocaleString()}: $code\")\n    this.sendSystemMessage(100, this.code)\n    removeOutdatedMessage()\n}\n```\n3. 移除过期消息，消息列表是一个队列，如果队列头部的消息已过期，需要递归检查下一个\n\n```kotlin\nfun removeOutdatedMessage() {\n    logger.info(\"${Date().toLocaleString()}: removeOutdatedMessage\")\n    if (messages.size \u003e 0) {\n        val message = messages[0]\n        if (Date().time - message.time.time \u003e REMOVE_MESSAGE_TIME_IN_MINUTES * 60L * 1000) {\n            messages.removeAt(0)\n            removeOutdatedMessage()\n        }\n    }\n}\n```\n\n至此，后端核心技术要点已介绍完毕，最后放上github仓库，完整代码：\u003chttps://github.com/wangyucode/chatroom-spring-websocket-stomp\u003e\n\n线上完整项目演示请直接访问: \u003chttps://wycode.cn/chat/\u003e\n\n基于Angular的前端项目将在下篇博客介绍。\n\n","data":{"title":"使用WebSocket和STOMP协议开发一个匿名聊天室","date":"2020-03-09","tags":["WebSocket","Spring Boot","Kotlin"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![chat](/lab/chat2.png)\n\n有时候就想和其他人安全地聊个天，它需要有这些特征：\n\n- 基于web技术，只需一个网页，无需下载任何App，易于转发。\n- 无需注册，使用简单，基于邀请码加入聊天，邀请码定时刷新。\n- 完全匿名。\n- 消息只保留在内存中，超时自动删除。\n- 进行在线人数统计，能设置最大人数上限。\n- 用户上下线和邀请码刷新时有系统提示。\n- Web连接必然是不稳定的，所以断线必须能够重连。\n\n线上Demo演示请直接访问: \u003chttps://wycode.cn/chat/\u003e\n\n技术方面：\n\n- 使用`WebSocket`协议提供Web上的全双工通信支持。\n- 使用`STOMP`作为上层协议，它基于帧(`Frame`)，和Http请求很类似，提供了一种发布订阅的模式，很适合需求的群聊模式。\n- 后端采用`Kotlin` + `SpringBoot`，前端采用`Typescript` + `Angular` + `AntDesign`，均使用最新版本。\n\n"},{"id":"docker-spring","file":"docker-spring.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://d1q6f0aelx0por.cloudfront.net/product-logos/644d2f15-c5db-4731-a353-ace6235841fa-registry.png\" alt=\"docker\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eDocker容器化技术，使得部署变得平滑。再也不需要维护软件运行所需的复杂环境。Docker和现代化的微服务，敏捷开发，快速迭代和交付的要求非常匹配。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章实践从安装Docker开始，到将一个SpringBoot项目部署到Docker容器中。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://d1q6f0aelx0por.cloudfront.net/product-logos/644d2f15-c5db-4731-a353-ace6235841fa-registry.png\" alt=\"docker\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eDocker容器化技术，使得部署变得平滑。再也不需要维护软件运行所需的复杂环境。Docker和现代化的微服务，敏捷开发，快速迭代和交付的要求非常匹配。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章实践从安装Docker开始，到将一个SpringBoot项目部署到Docker容器中。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e安装Docker CE(Community edition)\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e我这里使用的环境是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUbuntu18.04\u003c/code\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ curl -fsSL https://get.docker.com -o get-docker.sh\n$ sudo sh get-docker.sh\n$ systemctl enable docker\n$ systemctl start docker\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e准备SpringBoot工程\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这里我使用Spring官方的Docker示例项目\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003egit clone https://github.com/spring-guides/gs-spring-boot-docker.git\u003c/code\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eDockerfile\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eSpringBoot的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDockerfile\u003c/code\u003e有两种\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e简单版的如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eFROM openjdk:8-jdk-alpine\nVOLUME /tmp\nARG JAR_FILE\nCOPY ${JAR_FILE} app.jar\nENTRYPOINT [\"java\",\"-jar\",\"/app.jar\"]\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这是典型的SpringBoot项目启动方式\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e复杂版的如下：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eFROM openjdk:8-jdk-alpine\nVOLUME /tmp\nARG DEPENDENCY=target/dependency\nCOPY ${DEPENDENCY}/BOOT-INF/lib /app/lib\nCOPY ${DEPENDENCY}/META-INF /app/META-INF\nCOPY ${DEPENDENCY}/BOOT-INF/classes /app\nENTRYPOINT [\"java\",\"-cp\",\"app:app/lib/*\",\"hello.Application\"]\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e这是将lib和src分离的方式，有点像展开的jar\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e我这里选择上面简单版的，简洁和性能之间我选简洁！\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e基于maven构建Docker镜像\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用Maven的话有Spotify构建的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edockerfile-maven-plugin\u003c/code\u003e插件\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-xml px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e\u0026#x3C;!-- tag::plugin[] --\u003e\n\u0026#x3C;plugin\u003e\n    \u0026#x3C;groupId\u003ecom.spotify\u0026#x3C;/groupId\u003e\n    \u0026#x3C;artifactId\u003edockerfile-maven-plugin\u0026#x3C;/artifactId\u003e\n    \u0026#x3C;version\u003e1.4.9\u0026#x3C;/version\u003e\n    \u0026#x3C;executions\u003e\n        \u0026#x3C;execution\u003e\n            \u0026#x3C;id\u003edefault\u0026#x3C;/id\u003e\n            \u0026#x3C;phase\u003einstall\u0026#x3C;/phase\u003e\n            \u0026#x3C;goals\u003e\n                \u0026#x3C;goal\u003ebuild\u0026#x3C;/goal\u003e\n                \u0026#x3C;goal\u003epush\u0026#x3C;/goal\u003e\n            \u0026#x3C;/goals\u003e\n        \u0026#x3C;/execution\u003e\n    \u0026#x3C;/executions\u003e\n    \u0026#x3C;configuration\u003e\n        \u0026#x3C;repository\u003e${docker.image.prefix}/${project.artifactId}\u0026#x3C;/repository\u003e\n        \u0026#x3C;buildArgs\u003e\n            \u0026#x3C;JAR_FILE\u003e${project.build.finalName}.jar\u0026#x3C;/JAR_FILE\u003e\n        \u0026#x3C;/buildArgs\u003e\n    \u0026#x3C;/configuration\u003e\n\u0026#x3C;/plugin\u003e\n\u0026#x3C;!-- end::plugin[] --\u003e\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e添加了两个maven任务，build用户构建docker镜像，push用于推送docker镜像。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加了构建参数\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ebuildArgs\u003c/code\u003e\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJAR_FILE\u003c/code\u003e传递给Dockerfile。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加了版本号作为镜像tag\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e打包Docker镜像本身是需要docker环境的，于是有一种方法是开启remote API\n到这里其实就已经可以发布程序到DockerHub了，但实际项目中，我们不想发布私人镜像到DockerHub，那么我们需要建立私人的Docker仓库。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e开启remote API远程构建镜像\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003eDocker是CS模式，Docker的服务是支持通过Http远程访问的。通过开启remote API即可远程进行访问。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eExecStart=/usr/bin/dockerd -H fd:// -H tcp://0.0.0.0:2376\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e但要注意的remote API是需要进行TSL加密的。否则存在未授权访问漏洞，会被黑客利用，植入挖矿程序（别问我怎么知道的）。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e建立Docker私人仓库（Docker Registry）\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e具体方式是添加一个仓库镜像\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ docker run -d -p 5000:5000 --restart always --name registry registry:2\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e然后就可以：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-bash px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e$ docker pull ubuntu\n$ docker tag ubuntu localhost:5000/ubuntu\n$ docker push localhost:5000/ubuntu\n\u003c/code\u003e\u003c/pre\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e为了安全，创建的私有仓库也要添加Https\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e总结\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e使用docker部署SpringBoot工程时，正规的流程应该是：\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e为工程编写Dockerfile\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加Docker插件，构建Docker镜像\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003epush到公共或私有Docker仓库\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e拉取最新镜像并运行\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e本地无法构建时，应使用某种持续集成方法让编译机去负责出包和推送，不应该使用remote API这不是常规做法，而且有安全风险。\n此外Docker官方提供了安全的私有Docker仓库，少量使用是免费的。\u003c/p\u003e\n","content":"\n![docker](https://d1q6f0aelx0por.cloudfront.net/product-logos/644d2f15-c5db-4731-a353-ace6235841fa-registry.png)\n\nDocker容器化技术，使得部署变得平滑。再也不需要维护软件运行所需的复杂环境。Docker和现代化的微服务，敏捷开发，快速迭代和交付的要求非常匹配。\n\n这篇文章实践从安装Docker开始，到将一个SpringBoot项目部署到Docker容器中。\n\n\u003c!--more--\u003e\n\n## 安装Docker CE(Community edition)\n\n我这里使用的环境是`Ubuntu18.04`\n\n```bash\n$ curl -fsSL https://get.docker.com -o get-docker.sh\n$ sudo sh get-docker.sh\n$ systemctl enable docker\n$ systemctl start docker\n```\n\n## 准备SpringBoot工程\n\n这里我使用Spring官方的Docker示例项目\n\n`git clone https://github.com/spring-guides/gs-spring-boot-docker.git`\n\n## Dockerfile\n\nSpringBoot的`Dockerfile`有两种\n\n简单版的如下：\n```\nFROM openjdk:8-jdk-alpine\nVOLUME /tmp\nARG JAR_FILE\nCOPY ${JAR_FILE} app.jar\nENTRYPOINT [\"java\",\"-jar\",\"/app.jar\"]\n```\n这是典型的SpringBoot项目启动方式\n\n复杂版的如下：\n```\nFROM openjdk:8-jdk-alpine\nVOLUME /tmp\nARG DEPENDENCY=target/dependency\nCOPY ${DEPENDENCY}/BOOT-INF/lib /app/lib\nCOPY ${DEPENDENCY}/META-INF /app/META-INF\nCOPY ${DEPENDENCY}/BOOT-INF/classes /app\nENTRYPOINT [\"java\",\"-cp\",\"app:app/lib/*\",\"hello.Application\"]\n```\n这是将lib和src分离的方式，有点像展开的jar\n\n我这里选择上面简单版的，简洁和性能之间我选简洁！\n\n## 基于maven构建Docker镜像\n\n使用Maven的话有Spotify构建的`dockerfile-maven-plugin`插件\n```xml\n\u003c!-- tag::plugin[] --\u003e\n\u003cplugin\u003e\n    \u003cgroupId\u003ecom.spotify\u003c/groupId\u003e\n    \u003cartifactId\u003edockerfile-maven-plugin\u003c/artifactId\u003e\n    \u003cversion\u003e1.4.9\u003c/version\u003e\n    \u003cexecutions\u003e\n        \u003cexecution\u003e\n            \u003cid\u003edefault\u003c/id\u003e\n            \u003cphase\u003einstall\u003c/phase\u003e\n            \u003cgoals\u003e\n                \u003cgoal\u003ebuild\u003c/goal\u003e\n                \u003cgoal\u003epush\u003c/goal\u003e\n            \u003c/goals\u003e\n        \u003c/execution\u003e\n    \u003c/executions\u003e\n    \u003cconfiguration\u003e\n        \u003crepository\u003e${docker.image.prefix}/${project.artifactId}\u003c/repository\u003e\n        \u003cbuildArgs\u003e\n            \u003cJAR_FILE\u003e${project.build.finalName}.jar\u003c/JAR_FILE\u003e\n        \u003c/buildArgs\u003e\n    \u003c/configuration\u003e\n\u003c/plugin\u003e\n\u003c!-- end::plugin[] --\u003e\n```\n\n- 添加了两个maven任务，build用户构建docker镜像，push用于推送docker镜像。\n- 添加了构建参数`buildArgs`\u003e`JAR_FILE`传递给Dockerfile。\n- 添加了版本号作为镜像tag\n\n\u003e 打包Docker镜像本身是需要docker环境的，于是有一种方法是开启remote API\n\u003e 到这里其实就已经可以发布程序到DockerHub了，但实际项目中，我们不想发布私人镜像到DockerHub，那么我们需要建立私人的Docker仓库。\n\n## 开启remote API远程构建镜像\n\nDocker是CS模式，Docker的服务是支持通过Http远程访问的。通过开启remote API即可远程进行访问。\n```\nExecStart=/usr/bin/dockerd -H fd:// -H tcp://0.0.0.0:2376\n```\n但要注意的remote API是需要进行TSL加密的。否则存在未授权访问漏洞，会被黑客利用，植入挖矿程序（别问我怎么知道的）。\n\n## 建立Docker私人仓库（Docker Registry）\n\n具体方式是添加一个仓库镜像\n\n```bash\n$ docker run -d -p 5000:5000 --restart always --name registry registry:2\n```\n\n然后就可以：\n\n```bash\n$ docker pull ubuntu\n$ docker tag ubuntu localhost:5000/ubuntu\n$ docker push localhost:5000/ubuntu\n```\n\n\u003e 为了安全，创建的私有仓库也要添加Https\n\n## 总结\n\n使用docker部署SpringBoot工程时，正规的流程应该是：\n1. 为工程编写Dockerfile\n2. 添加Docker插件，构建Docker镜像\n3. push到公共或私有Docker仓库\n4. 拉取最新镜像并运行\n\n本地无法构建时，应使用某种持续集成方法让编译机去负责出包和推送，不应该使用remote API这不是常规做法，而且有安全风险。\n此外Docker官方提供了安全的私有Docker仓库，少量使用是免费的。","data":{"title":"使用Docker容器部署SpringBoot项目","date":"2019-11-20","tags":["Linux","Docker","Spring Boot"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![docker](https://d1q6f0aelx0por.cloudfront.net/product-logos/644d2f15-c5db-4731-a353-ace6235841fa-registry.png)\n\nDocker容器化技术，使得部署变得平滑。再也不需要维护软件运行所需的复杂环境。Docker和现代化的微服务，敏捷开发，快速迭代和交付的要求非常匹配。\n\n这篇文章实践从安装Docker开始，到将一个SpringBoot项目部署到Docker容器中。\n\n"},{"id":"h2-password","file":"h2-password.md","excerptHtml":"","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://www.h2database.com/html/images/h2-logo-2.png\" alt=\"H2\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e使用中的H2数据库如何修改用户名密码呢？执行下面的SQL就可以了：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-sql px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003ealter user wayne set password '*****password*****'\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![H2](https://www.h2database.com/html/images/h2-logo-2.png)\n\n使用中的H2数据库如何修改用户名密码呢？执行下面的SQL就可以了：\n\n```sql\nalter user wayne set password '*****password*****'\n```","data":{"title":"H2数据库修改密码","date":"2019-08-14","tags":["SQL"],"category":"Backend"},"isEmpty":false,"excerpt":""},{"id":"swagger-auth","file":"swagger-auth.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://swagger.io/swagger/media/assets/images/swagger_logo.svg\" alt=\"swagger\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当API添加了鉴权后，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eswagger\u003c/code\u003e如何进行调试呢，比如需要在请求头\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eheader\u003c/code\u003e中添加类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etoken\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAuthorization\u003c/code\u003e之类的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring\u003c/code\u003e中进行如下简单的配置就可以了。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://swagger.io/swagger/media/assets/images/swagger_logo.svg\" alt=\"swagger\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当API添加了鉴权后，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eswagger\u003c/code\u003e如何进行调试呢，比如需要在请求头\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eheader\u003c/code\u003e中添加类似\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etoken\u003c/code\u003e或者\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eAuthorization\u003c/code\u003e之类的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring\u003c/code\u003e中进行如下简单的配置就可以了。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\n@EnableSwagger2\nclass SwaggerConfig {\n\n    @Bean\n    fun generateDocket(): Docket {\n        return Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .apis(RequestHandlerSelectors.withClassAnnotation(Api::class.java))\n                .build()\n                .securityContexts(listOf(securityContext())) // #1\n                .securitySchemes(listOf(apiKey())) // #2\n                .apiInfo(apiInfo())\n    }\n\n    private fun securityContext(): SecurityContext {\n        return SecurityContext.builder()\n                .securityReferences(defaultAuth())\n                .forPaths(PathSelectors.regex(\"/api/public/admin/.*\"))\n                .build()\n    }\n\n    fun defaultAuth(): List\u0026#x3C;SecurityReference\u003e {\n        val authorizationScope = AuthorizationScope(\"global\", \"accessEverything\")\n        val authorizationScopes = arrayOf(authorizationScope)\n        return listOf(SecurityReference(\"token\", authorizationScopes))\n    }\n\n\n    fun apiKey(): ApiKey {\n        return ApiKey(\"token\", \"X-Auth-Token\", \"header\")\n    }\n\n\n    private fun apiInfo(): ApiInfo {\n        return ApiInfo(\"王郁的API文档\",\n                \"用于App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                Contact(\"王郁\", \"wycode.cn\", \"wangyu@wycode.cn\"),\n                \"wycode.cn All Right Reserved\",\n                \"https://wycode.cn\",\n                emptyList())\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e关键配置就是上面包含#1和#2注释的两行配置\u003c/p\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003e配置安全上下文，我这里配置了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e/api/public/admin/.*\u003c/code\u003e下的接口需要添加。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e配置鉴权类型，我这里使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eApiKey\u003c/code\u003e。\u003c/li\u003e\n\u003c/ol\u003e\n","content":"\n![swagger](https://swagger.io/swagger/media/assets/images/swagger_logo.svg)\n\n当API添加了鉴权后，`swagger`如何进行调试呢，比如需要在请求头`header`中添加类似`token`或者`Authorization`之类的。\n\n在`Spring`中进行如下简单的配置就可以了。\n\n\u003c!--more--\u003e\n\n```kotlin\n@Configuration\n@EnableSwagger2\nclass SwaggerConfig {\n\n    @Bean\n    fun generateDocket(): Docket {\n        return Docket(DocumentationType.SWAGGER_2)\n                .select()\n                .apis(RequestHandlerSelectors.withClassAnnotation(Api::class.java))\n                .build()\n                .securityContexts(listOf(securityContext())) // #1\n                .securitySchemes(listOf(apiKey())) // #2\n                .apiInfo(apiInfo())\n    }\n\n    private fun securityContext(): SecurityContext {\n        return SecurityContext.builder()\n                .securityReferences(defaultAuth())\n                .forPaths(PathSelectors.regex(\"/api/public/admin/.*\"))\n                .build()\n    }\n\n    fun defaultAuth(): List\u003cSecurityReference\u003e {\n        val authorizationScope = AuthorizationScope(\"global\", \"accessEverything\")\n        val authorizationScopes = arrayOf(authorizationScope)\n        return listOf(SecurityReference(\"token\", authorizationScopes))\n    }\n\n\n    fun apiKey(): ApiKey {\n        return ApiKey(\"token\", \"X-Auth-Token\", \"header\")\n    }\n\n\n    private fun apiInfo(): ApiInfo {\n        return ApiInfo(\"王郁的API文档\",\n                \"用于App测试及独立APP研发\",\n                \"2.0\",\n                \"http://wycode.cn\",\n                Contact(\"王郁\", \"wycode.cn\", \"wangyu@wycode.cn\"),\n                \"wycode.cn All Right Reserved\",\n                \"https://wycode.cn\",\n                emptyList())\n    }\n}\n\n```\n关键配置就是上面包含#1和#2注释的两行配置\n\n1. 配置安全上下文，我这里配置了`/api/public/admin/.*`下的接口需要添加。\n2. 配置鉴权类型，我这里使用`ApiKey`。","data":{"title":"SpringBoot工程为SwaggerUI添加认证","date":"2019-07-19","tags":["OAuth","Java","Kotlin","Spring","Swagger"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![swagger](https://swagger.io/swagger/media/assets/images/swagger_logo.svg)\n\n当API添加了鉴权后，`swagger`如何进行调试呢，比如需要在请求头`header`中添加类似`token`或者`Authorization`之类的。\n\n在`Spring`中进行如下简单的配置就可以了。\n\n"},{"id":"spring-error","file":"spring-error.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180623_springboot.jpg\" alt=\"springboot\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e通常我们为了统一，和前端方便处理，写的API返回JSON会有固定的结构，比如下面这种：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n    \"code\":200,\n    \"message\":\"hello world!\",\n    \"data\":{\n        \"user\":{}\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e但是当返回码为非200时，比如接口不存在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e404\u003c/code\u003e，服务器错误\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e500\u003c/code\u003e，Spring默认会返回一个类似这样的结构：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n  \"timestamp\": \"2019-07-19 10:23:47\",\n  \"status\": 403,\n  \"error\": \"Forbidden\",\n  \"message\": \"没有权限\",\n  \"path\": \"/web/api/public/admin/dota/version\"\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e下面进行简单配置即可实现这个JSON结构的自定义：\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180623_springboot.jpg\" alt=\"springboot\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e通常我们为了统一，和前端方便处理，写的API返回JSON会有固定的结构，比如下面这种：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n    \"code\":200,\n    \"message\":\"hello world!\",\n    \"data\":{\n        \"user\":{}\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e但是当返回码为非200时，比如接口不存在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e404\u003c/code\u003e，服务器错误\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e500\u003c/code\u003e，Spring默认会返回一个类似这样的结构：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n  \"timestamp\": \"2019-07-19 10:23:47\",\n  \"status\": 403,\n  \"error\": \"Forbidden\",\n  \"message\": \"没有权限\",\n  \"path\": \"/web/api/public/admin/dota/version\"\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e下面进行简单配置即可实现这个JSON结构的自定义：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eimport cn.wycode.web.DEV\nimport org.springframework.boot.web.servlet.error.DefaultErrorAttributes\nimport org.springframework.stereotype.Component\nimport org.springframework.web.context.request.WebRequest\n\n@Component\nclass WyErrorAttributes : DefaultErrorAttributes(DEV) { // #1\n    override fun getErrorAttributes(webRequest: WebRequest?, includeStackTrace: Boolean): MutableMap\u0026#x3C;String, Any\u003e {\n        val errorAttributes = super.getErrorAttributes(webRequest, includeStackTrace) // #2\n        errorAttributes[\"success\"] = false // #3\n        errorAttributes[\"error\"] = errorAttributes[\"message\"] // #4\n        errorAttributes[\"data\"] = errorAttributes[\"exception\"]  // #5\n        return errorAttributes\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003col class=\"mb-4 list-decimal\"\u003e\n\u003cli class=\"ml-8\"\u003eSpring默认的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eDefaultErrorAttributes\u003c/code\u003e就写的挺好，我们继承并扩展一下就可以了，当然你也可以删除或者完全替换里面的结构。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e先使用默认的方法构建一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eerrorAttributes\u003c/code\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003esuccess\u003c/code\u003e属性，既然是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eErrorAttributes\u003c/code\u003e当然是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003efalse\u003c/code\u003e了。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e覆盖\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eerror\u003c/code\u003e属性，改为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emessage\u003c/code\u003e。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e添加\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003edata\u003c/code\u003e属性，在DEV环境时会添加错误的类信息。\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp class=\"mb-4\"\u003e做了这个配置之后，错误信息的JSON会变成下面这样：\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e{\n  \"timestamp\": \"2019-07-19 16:56:41\",\n  \"status\": 500,\n  \"error\": \"/ by zero\",\n  \"exception\": \"java.lang.ArithmeticException\",\n  \"message\": \"/ by zero\",\n  \"path\": \"/web/api/public/admin/dota/version\",\n  \"success\": false,\n  \"data\": \"java.lang.ArithmeticException\"\n}\n\u003c/code\u003e\u003c/pre\u003e\n","content":"\n![springboot](/images/20180623_springboot.jpg)\n\n通常我们为了统一，和前端方便处理，写的API返回JSON会有固定的结构，比如下面这种：\n```json\n{\n    \"code\":200,\n    \"message\":\"hello world!\",\n    \"data\":{\n        \"user\":{}\n    }\n}\n```\n但是当返回码为非200时，比如接口不存在`404`，服务器错误`500`，Spring默认会返回一个类似这样的结构：\n\n```json\n{\n  \"timestamp\": \"2019-07-19 10:23:47\",\n  \"status\": 403,\n  \"error\": \"Forbidden\",\n  \"message\": \"没有权限\",\n  \"path\": \"/web/api/public/admin/dota/version\"\n}\n```\n\n下面进行简单配置即可实现这个JSON结构的自定义：\n\u003c!--more--\u003e\n\n```kotlin\nimport cn.wycode.web.DEV\nimport org.springframework.boot.web.servlet.error.DefaultErrorAttributes\nimport org.springframework.stereotype.Component\nimport org.springframework.web.context.request.WebRequest\n\n@Component\nclass WyErrorAttributes : DefaultErrorAttributes(DEV) { // #1\n    override fun getErrorAttributes(webRequest: WebRequest?, includeStackTrace: Boolean): MutableMap\u003cString, Any\u003e {\n        val errorAttributes = super.getErrorAttributes(webRequest, includeStackTrace) // #2\n        errorAttributes[\"success\"] = false // #3\n        errorAttributes[\"error\"] = errorAttributes[\"message\"] // #4\n        errorAttributes[\"data\"] = errorAttributes[\"exception\"]  // #5\n        return errorAttributes\n    }\n}\n```\n\n1. Spring默认的`DefaultErrorAttributes`就写的挺好，我们继承并扩展一下就可以了，当然你也可以删除或者完全替换里面的结构。\n2. 先使用默认的方法构建一个`errorAttributes`。\n3. 添加一个`success`属性，既然是`ErrorAttributes`当然是`false`了。\n4. 覆盖`error`属性，改为`message`。\n5. 添加`data`属性，在DEV环境时会添加错误的类信息。\n\n做了这个配置之后，错误信息的JSON会变成下面这样：\n\n```json\n{\n  \"timestamp\": \"2019-07-19 16:56:41\",\n  \"status\": 500,\n  \"error\": \"/ by zero\",\n  \"exception\": \"java.lang.ArithmeticException\",\n  \"message\": \"/ by zero\",\n  \"path\": \"/web/api/public/admin/dota/version\",\n  \"success\": false,\n  \"data\": \"java.lang.ArithmeticException\"\n}\n```","data":{"title":"SpringBoot工程自定义错误JSON字段","date":"2019-07-15","tags":["Java","Kotlin","Spring"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![springboot](/images/20180623_springboot.jpg)\n\n通常我们为了统一，和前端方便处理，写的API返回JSON会有固定的结构，比如下面这种：\n```json\n{\n    \"code\":200,\n    \"message\":\"hello world!\",\n    \"data\":{\n        \"user\":{}\n    }\n}\n```\n但是当返回码为非200时，比如接口不存在`404`，服务器错误`500`，Spring默认会返回一个类似这样的结构：\n\n```json\n{\n  \"timestamp\": \"2019-07-19 10:23:47\",\n  \"status\": 403,\n  \"error\": \"Forbidden\",\n  \"message\": \"没有权限\",\n  \"path\": \"/web/api/public/admin/dota/version\"\n}\n```\n\n下面进行简单配置即可实现这个JSON结构的自定义：\n"},{"id":"oauth","file":"oauth.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e关于认证和授权，最权威的流程就是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOAuth2.0\u003c/code\u003e了，涵盖了用户认证授权的方方面面，现代的大型网站几乎都是基于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOauth2.0\u003c/code\u003e协议开发认证鉴权功能。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOAuth2.0\u003c/code\u003e被写入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRFC6749\u003c/code\u003e，RFC中的流程图看了还是不明白的话，可以看看下面这张图，展示了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOAuth2.0\u003c/code\u003e四种模式的完整流程。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e关于认证和授权，最权威的流程就是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOAuth2.0\u003c/code\u003e了，涵盖了用户认证授权的方方面面，现代的大型网站几乎都是基于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOauth2.0\u003c/code\u003e协议开发认证鉴权功能。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOAuth2.0\u003c/code\u003e被写入\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRFC6749\u003c/code\u003e，RFC中的流程图看了还是不明白的话，可以看看下面这张图，展示了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOAuth2.0\u003c/code\u003e四种模式的完整流程。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20190614_oauth.png\" alt=\"OAuth\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n","content":"\n关于认证和授权，最权威的流程就是`OAuth2.0`了，涵盖了用户认证授权的方方面面，现代的大型网站几乎都是基于`Oauth2.0`协议开发认证鉴权功能。\n\n`OAuth2.0`被写入`RFC6749`，RFC中的流程图看了还是不明白的话，可以看看下面这张图，展示了`OAuth2.0`四种模式的完整流程。\n\n\u003c!--more--\u003e\n\n![OAuth](/images/20190614_oauth.png)\n\n","data":{"title":"OAuth2.0四种模式完整时序图","date":"2019-06-14","tags":["OAuth"],"category":"Backend"},"isEmpty":false,"excerpt":"\n关于认证和授权，最权威的流程就是`OAuth2.0`了，涵盖了用户认证授权的方方面面，现代的大型网站几乎都是基于`Oauth2.0`协议开发认证鉴权功能。\n\n`OAuth2.0`被写入`RFC6749`，RFC中的流程图看了还是不明白的话，可以看看下面这张图，展示了`OAuth2.0`四种模式的完整流程。\n\n"},{"id":"email","file":"email.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://cms-assets.tutsplus.com/uploads/users/23/posts/26357/preview_image/professional-email-signature-icon.jpg\" alt=\"email\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当需要后台发送通知的时候，Email是一个比较好的选择，因为它免费啊！\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章介绍如何使用SpringBoot发送邮件。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://cms-assets.tutsplus.com/uploads/users/23/posts/26357/preview_image/professional-email-signature-icon.jpg\" alt=\"email\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e当需要后台发送通知的时候，Email是一个比较好的选择，因为它免费啊！\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章介绍如何使用SpringBoot发送邮件。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e添加依赖\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e如同其它\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estarter\u003c/code\u003e工具一样。SpringBoot为我们提供了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003espring-boot-starter-mail\u003c/code\u003e\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e    compile('org.springframework.boot:spring-boot-starter-mail')\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e配置\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eapplication.properties\u003c/code\u003e添加如下配置\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003espring.mail.host=smtp.exmail.qq.com\nspring.mail.username=wangyu@wycode.cn\nspring.mail.password=*********\nspring.mail.properties.mail.smtp.auth=true\nspring.mail.properties.mail.smtp.starttls.enable=true\nspring.mail.properties.mail.smtp.starttls.required=true\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003esmtp域名，用户名，密码，根据自己的填写。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e创建Service\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode.web.service\n\nimport org.apache.commons.logging.LogFactory\nimport org.springframework.mail.SimpleMailMessage\nimport org.springframework.mail.javamail.JavaMailSender\nimport org.springframework.scheduling.annotation.Async\nimport org.springframework.stereotype.Service\n\n@Service\nclass MailService(private val mailSender: JavaMailSender) {\n\n    private val log = LogFactory.getLog(this.javaClass)\n\n    @Async\n    fun sendSimpleMail(sendTo: String, subject: String, content: String) {\n        val message = SimpleMailMessage()\n        message.setFrom(\"wangyu@wycode.cn\")\n        message.setTo(sendTo)\n        message.setSubject(subject)\n        message.setText(content)\n        try {\n            mailSender.send(message)\n            log.error(\"已发送邮件 $subject 到 $sendTo\")\n        } catch (e: Exception) {\n            log.error(\"邮件发送失败！\", e)\n        }\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eJavaMailSender\u003c/code\u003e由Spring自动注入\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@Async\u003c/code\u003e发送邮件这里采用异步方式，启用异步需要在Application使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@EnableAsync\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e关于SSL及发送端口\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCould not connect to SMTP host: smtp.163.com, port: 25\u003c/code\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e本地运行ok，但是发布到阿里云ECS上就无法连接服务，这里是因为阿里云接上级通知禁用了25端口，客服建议使用安全的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e465\u003c/code\u003e端口。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e网上的教程很复杂，其实对于正规的SMTP服务器，我们只需添加如下两个属性就好了。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-js px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003espring.mail.port=465\nspring.mail.properties.mail.smtp.ssl.enable=true\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e端口改为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e465\u003c/code\u003e\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e启用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSSL\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请注明出处!\u003c/p\u003e\n","content":"\n![email](https://cms-assets.tutsplus.com/uploads/users/23/posts/26357/preview_image/professional-email-signature-icon.jpg)\n\n当需要后台发送通知的时候，Email是一个比较好的选择，因为它免费啊！\n\n这篇文章介绍如何使用SpringBoot发送邮件。\n\n\u003c!--more--\u003e\n\n## 添加依赖\n\n如同其它`starter`工具一样。SpringBoot为我们提供了`spring-boot-starter-mail`\n\n```js\n    compile('org.springframework.boot:spring-boot-starter-mail')\n```\n\n## 配置\n\n在`application.properties`添加如下配置\n\n```js\nspring.mail.host=smtp.exmail.qq.com\nspring.mail.username=wangyu@wycode.cn\nspring.mail.password=*********\nspring.mail.properties.mail.smtp.auth=true\nspring.mail.properties.mail.smtp.starttls.enable=true\nspring.mail.properties.mail.smtp.starttls.required=true\n```\n- smtp域名，用户名，密码，根据自己的填写。\n\n## 创建Service\n\n```kotlin\npackage cn.wycode.web.service\n\nimport org.apache.commons.logging.LogFactory\nimport org.springframework.mail.SimpleMailMessage\nimport org.springframework.mail.javamail.JavaMailSender\nimport org.springframework.scheduling.annotation.Async\nimport org.springframework.stereotype.Service\n\n@Service\nclass MailService(private val mailSender: JavaMailSender) {\n\n    private val log = LogFactory.getLog(this.javaClass)\n\n    @Async\n    fun sendSimpleMail(sendTo: String, subject: String, content: String) {\n        val message = SimpleMailMessage()\n        message.setFrom(\"wangyu@wycode.cn\")\n        message.setTo(sendTo)\n        message.setSubject(subject)\n        message.setText(content)\n        try {\n            mailSender.send(message)\n            log.error(\"已发送邮件 $subject 到 $sendTo\")\n        } catch (e: Exception) {\n            log.error(\"邮件发送失败！\", e)\n        }\n    }\n}\n```\n- `JavaMailSender`由Spring自动注入\n- `@Async`发送邮件这里采用异步方式，启用异步需要在Application使用`@EnableAsync`\n\n\n## 关于SSL及发送端口\n\n`Could not connect to SMTP host: smtp.163.com, port: 25`\n\n本地运行ok，但是发布到阿里云ECS上就无法连接服务，这里是因为阿里云接上级通知禁用了25端口，客服建议使用安全的`465`端口。\n\n网上的教程很复杂，其实对于正规的SMTP服务器，我们只需添加如下两个属性就好了。\n\n```js\nspring.mail.port=465\nspring.mail.properties.mail.smtp.ssl.enable=true\n```\n- 端口改为`465`\n- 启用`SSL`\n\n以上，转载请注明出处!","data":{"title":"使用SpringBoot发送SSL邮件","date":"2019-06-07","tags":["Kotlin","Spring","Java"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![email](https://cms-assets.tutsplus.com/uploads/users/23/posts/26357/preview_image/professional-email-signature-icon.jpg)\n\n当需要后台发送通知的时候，Email是一个比较好的选择，因为它免费啊！\n\n这篇文章介绍如何使用SpringBoot发送邮件。\n\n"},{"id":"comments-sql","file":"comments-sql.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://image.woshipm.com/wp-files/2018/04/QFTkYSkExyHKCzhTTl7V.jpg\" alt=\"网易云音乐\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e畅言的广告有点过于流氓，所以准备开发一套评论系统，除了博客，还能用在其它APP中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e基本需求类似网易云音乐的评论，可以对引用别人的评论回复，可以点赞。\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://image.woshipm.com/wp-files/2018/04/QFTkYSkExyHKCzhTTl7V.jpg\" alt=\"网易云音乐\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e畅言的广告有点过于流氓，所以准备开发一套评论系统，除了博客，还能用在其它APP中。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e基本需求类似网易云音乐的评论，可以对引用别人的评论回复，可以点赞。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e表结构\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e为了保证表结构尽可能简单的同时又支持类似网易云一样功能，同时又保证可扩展性，采用单表设计，表结构（映射实体）如下。\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Entity\ndata class Comment(\n        @Id\n        @GeneratedValue(generator = \"seq_comment\")\n        @SequenceGenerator(name = \"seq_comment\", sequenceName = \"SEQ_COMMENT\", allocationSize = 1, initialValue = 1)\n        val id: Long = 0,\n        @ApiModelProperty(value = \"主题id\")\n        val topicId: String = \"\",\n        @ManyToOne\n        val app: CommentApp = CommentApp(),\n        @Column(length = 1023)\n        val content: String? = null,\n        @ApiModelProperty(value = \"评论类型，0.文字评论，1.点赞，2.图片评论\")\n        val type: Int = 0,\n        val fromUserId: String = \"\",\n        val fromUserName: String? = null,\n        val fromUserIcon: String? = null,\n        val toUserId: String? = null,\n        val toUserName: String? = null,\n        val toUserIcon: String? = null,\n        val toContent: String? = null,\n        val createTime: Date = Date(),\n        var likeCount: Int = 0)\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e为了能够在多个app中使用，所以增加了一个\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eCommentApp\u003c/code\u003e实体，里面包含一个name和accessKey，评论和app是多对一关系。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003etype\u003c/code\u003e字段可以用来扩展为直接对文章点赞，以及图片的评论（\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003econtent\u003c/code\u003e为图片地址）。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e为了保持评论系统的独立，所以用户信息应该由使用评论的app提供，比如使用第三方登录。所以并不需要用户表。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e这里冗余引用的评论信息，就不需要考虑嵌套查询，以及实体嵌套，循环引用的问题。只保留一层引用，当然也就只支持一对一的回复了。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e页面展示上其实并不需要\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eUserId\u003c/code\u003e，这里是考虑提高数据的可维护性。\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e接口\u003c/h2\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e1.新增评论或点赞\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@ApiOperation(value = \"新增评论及点赞\")\n@RequestMapping(path = [\"/newComment\"], method = [RequestMethod.POST])\nfun newComment(@RequestParam accessKey: String,\n               @RequestParam appName: String,\n               @ApiParam(\"评论类型，0.文字评论，1.点赞，2.图片评论\", defaultValue = \"0\",example = \"0\",allowableValues = \"0,1,2\")\n               @RequestParam(required = false, defaultValue = \"0\") type: Int = 0,\n               @RequestParam topicId: String,\n               @RequestParam(required = false) content: String?,\n               @RequestParam fromUserId: String,\n               @RequestParam(required = false) fromUserName: String?,\n               @RequestParam(required = false) fromUserIcon: String?,\n               @RequestParam(required = false) toCommentId: Long?\n): JsonResult\u0026#x3C;Comment\u003e {\n    if (type \u0026#x3C; 0 || type \u003e 2) return JsonResult.error(\"参数错误\")\n    var contentText = content\n    //文字及图片评论内容限制\n    if (type == 0 || type == 2) {\n        if (StringUtils.isEmpty(contentText)) return JsonResult.error(\"内容不能为空\")\n        if (contentText!!.length \u003e 1023) return JsonResult.error(\"内容不能超过1000个字\")\n    }\n    val app = commentAppRepository.findByNameAndAccessKey(appName, accessKey)\n            ?: return JsonResult.error(\"app不存在，或key错误\")\n    //图片评论上传至OSS\n    if (type == 2) {\n        val file = storageService.loadTemp(contentText).toFile()\n        if (!file.exists()) {\n            return JsonResult.error(\"相片不存在\")\n        }\n        contentText = ossService.putFile(OssService.COMMENT_BUCKET_NAME, appName, file)\n                ?: return JsonResult.error(\"评论失败，请重试\")\n    }\n    //处理回复\n    var toComment: Comment? = null\n    if (toCommentId != null \u0026#x26;\u0026#x26; toCommentId \u003e 0) {\n        toComment = commentRepository.findById(toCommentId).orElse(null) ?: return JsonResult.error(\"被回复的评论不存在\")\n        if (toComment.topicId != topicId) return JsonResult.error(\"不能跨主题回复\")\n        if (toComment.type == 1) return JsonResult.error(\"不能对点赞回复\")\n        //对评论点赞，直接对点赞数+1，不保存此条评论\n        if (type == 1) {\n            toComment.likeCount++\n            return JsonResult.data(commentRepository.save(toComment))\n        }\n    }\n    //需要新增的comment\n    val comment = Comment(\n            topicId = topicId,\n            app = app,\n            content = contentText,\n            type = type,\n            fromUserId = fromUserId,\n            fromUserName = fromUserName,\n            fromUserIcon = fromUserIcon,\n            toUserId = toComment?.fromUserId,\n            toUserName = toComment?.fromUserName,\n            toUserIcon = toComment?.fromUserIcon,\n            toContent = toComment?.content)\n    log.info(\"$fromUserName 评论了 ${app.name} 的 $topicId\")\n    return JsonResult.data(commentRepository.save(comment))\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch3 class=\"mb-4 text-lg font-bold\"\u003e2.获取评论列表\u003c/h3\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@ApiOperation(value = \"获取评论列表\")\n@RequestMapping(path = [\"/getComments\"], method = [RequestMethod.GET])\nfun getComments(@RequestParam accessKey: String,\n                @RequestParam appName: String,\n                @RequestParam topicId: String): JsonResult\u0026#x3C;List\u0026#x3C;Comment\u003e\u003e {\n    commentAppRepository.findByNameAndAccessKey(appName, accessKey)\n            ?: return JsonResult.error(\"app不存在，或key错误\")\n    return JsonResult.data(commentRepository.findAllByApp_NameAndTopicIdAndDeleted(appName, topicId))\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e最终效果即为目前页面下方的评论功能。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请注明出处!\u003c/p\u003e\n","content":"\n![网易云音乐](https://image.woshipm.com/wp-files/2018/04/QFTkYSkExyHKCzhTTl7V.jpg)\n\n畅言的广告有点过于流氓，所以准备开发一套评论系统，除了博客，还能用在其它APP中。\n\n基本需求类似网易云音乐的评论，可以对引用别人的评论回复，可以点赞。\n\n\u003c!--more--\u003e\n\n## 表结构\n\n为了保证表结构尽可能简单的同时又支持类似网易云一样功能，同时又保证可扩展性，采用单表设计，表结构（映射实体）如下。\n\n```kotlin\n@Entity\ndata class Comment(\n        @Id\n        @GeneratedValue(generator = \"seq_comment\")\n        @SequenceGenerator(name = \"seq_comment\", sequenceName = \"SEQ_COMMENT\", allocationSize = 1, initialValue = 1)\n        val id: Long = 0,\n        @ApiModelProperty(value = \"主题id\")\n        val topicId: String = \"\",\n        @ManyToOne\n        val app: CommentApp = CommentApp(),\n        @Column(length = 1023)\n        val content: String? = null,\n        @ApiModelProperty(value = \"评论类型，0.文字评论，1.点赞，2.图片评论\")\n        val type: Int = 0,\n        val fromUserId: String = \"\",\n        val fromUserName: String? = null,\n        val fromUserIcon: String? = null,\n        val toUserId: String? = null,\n        val toUserName: String? = null,\n        val toUserIcon: String? = null,\n        val toContent: String? = null,\n        val createTime: Date = Date(),\n        var likeCount: Int = 0)\n```\n- 为了能够在多个app中使用，所以增加了一个`CommentApp`实体，里面包含一个name和accessKey，评论和app是多对一关系。\n- `type`字段可以用来扩展为直接对文章点赞，以及图片的评论（`content`为图片地址）。\n- 为了保持评论系统的独立，所以用户信息应该由使用评论的app提供，比如使用第三方登录。所以并不需要用户表。\n- 这里冗余引用的评论信息，就不需要考虑嵌套查询，以及实体嵌套，循环引用的问题。只保留一层引用，当然也就只支持一对一的回复了。\n- 页面展示上其实并不需要`UserId`，这里是考虑提高数据的可维护性。\n\n## 接口\n\n### 1.新增评论或点赞\n\n```kotlin\n@ApiOperation(value = \"新增评论及点赞\")\n@RequestMapping(path = [\"/newComment\"], method = [RequestMethod.POST])\nfun newComment(@RequestParam accessKey: String,\n               @RequestParam appName: String,\n               @ApiParam(\"评论类型，0.文字评论，1.点赞，2.图片评论\", defaultValue = \"0\",example = \"0\",allowableValues = \"0,1,2\")\n               @RequestParam(required = false, defaultValue = \"0\") type: Int = 0,\n               @RequestParam topicId: String,\n               @RequestParam(required = false) content: String?,\n               @RequestParam fromUserId: String,\n               @RequestParam(required = false) fromUserName: String?,\n               @RequestParam(required = false) fromUserIcon: String?,\n               @RequestParam(required = false) toCommentId: Long?\n): JsonResult\u003cComment\u003e {\n    if (type \u003c 0 || type \u003e 2) return JsonResult.error(\"参数错误\")\n    var contentText = content\n    //文字及图片评论内容限制\n    if (type == 0 || type == 2) {\n        if (StringUtils.isEmpty(contentText)) return JsonResult.error(\"内容不能为空\")\n        if (contentText!!.length \u003e 1023) return JsonResult.error(\"内容不能超过1000个字\")\n    }\n    val app = commentAppRepository.findByNameAndAccessKey(appName, accessKey)\n            ?: return JsonResult.error(\"app不存在，或key错误\")\n    //图片评论上传至OSS\n    if (type == 2) {\n        val file = storageService.loadTemp(contentText).toFile()\n        if (!file.exists()) {\n            return JsonResult.error(\"相片不存在\")\n        }\n        contentText = ossService.putFile(OssService.COMMENT_BUCKET_NAME, appName, file)\n                ?: return JsonResult.error(\"评论失败，请重试\")\n    }\n    //处理回复\n    var toComment: Comment? = null\n    if (toCommentId != null \u0026\u0026 toCommentId \u003e 0) {\n        toComment = commentRepository.findById(toCommentId).orElse(null) ?: return JsonResult.error(\"被回复的评论不存在\")\n        if (toComment.topicId != topicId) return JsonResult.error(\"不能跨主题回复\")\n        if (toComment.type == 1) return JsonResult.error(\"不能对点赞回复\")\n        //对评论点赞，直接对点赞数+1，不保存此条评论\n        if (type == 1) {\n            toComment.likeCount++\n            return JsonResult.data(commentRepository.save(toComment))\n        }\n    }\n    //需要新
