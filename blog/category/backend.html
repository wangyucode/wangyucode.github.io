增的comment\n    val comment = Comment(\n            topicId = topicId,\n            app = app,\n            content = contentText,\n            type = type,\n            fromUserId = fromUserId,\n            fromUserName = fromUserName,\n            fromUserIcon = fromUserIcon,\n            toUserId = toComment?.fromUserId,\n            toUserName = toComment?.fromUserName,\n            toUserIcon = toComment?.fromUserIcon,\n            toContent = toComment?.content)\n    log.info(\"$fromUserName 评论了 ${app.name} 的 $topicId\")\n    return JsonResult.data(commentRepository.save(comment))\n}\n```\n\n### 2.获取评论列表\n\n```kotlin\n@ApiOperation(value = \"获取评论列表\")\n@RequestMapping(path = [\"/getComments\"], method = [RequestMethod.GET])\nfun getComments(@RequestParam accessKey: String,\n                @RequestParam appName: String,\n                @RequestParam topicId: String): JsonResult\u003cList\u003cComment\u003e\u003e {\n    commentAppRepository.findByNameAndAccessKey(appName, accessKey)\n            ?: return JsonResult.error(\"app不存在，或key错误\")\n    return JsonResult.data(commentRepository.findAllByApp_NameAndTopicIdAndDeleted(appName, topicId))\n}\n```\n\n最终效果即为目前页面下方的评论功能。\n\n以上，转载请注明出处!\n","data":{"title":"从0开始开发一个评论系统","date":"2019-05-21","tags":["Kotlin","SQL","Spring","JPA","Hibernate"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![网易云音乐](https://image.woshipm.com/wp-files/2018/04/QFTkYSkExyHKCzhTTl7V.jpg)\n\n畅言的广告有点过于流氓，所以准备开发一套评论系统，除了博客，还能用在其它APP中。\n\n基本需求类似网易云音乐的评论，可以对引用别人的评论回复，可以点赞。\n\n"},{"id":"netty-function","file":"netty-function.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20181023_liucheng.jpg\" alt=\"流程\" title=\"流程\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e函数计算（Function Compute）是事件驱动的全托管计算服务。函数计算无需租用和管理24小时运行的服务器(Serverless)，无需搭建复杂的服务器环境，只需编写代码并上传就可以了，只需要为代码实际运行消耗的资源付费，非常便宜。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e函数计算可以选择运行区域，也就是说，我们可以将函数运行的服务器区域选择到香港或者是美国，如此会带来什么样的好处，只可意会，不可言传。那么能否利用云函数写一个Proxy软件呢？请看本文！\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20181023_liucheng.jpg\" alt=\"流程\" title=\"流程\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e函数计算（Function Compute）是事件驱动的全托管计算服务。函数计算无需租用和管理24小时运行的服务器(Serverless)，无需搭建复杂的服务器环境，只需编写代码并上传就可以了，只需要为代码实际运行消耗的资源付费，非常便宜。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e函数计算可以选择运行区域，也就是说，我们可以将函数运行的服务器区域选择到香港或者是美国，如此会带来什么样的好处，只可意会，不可言传。那么能否利用云函数写一个Proxy软件呢？请看本文！\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e在阿里云上新建函数计算\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e我们需要建立一个云函数，和一个HTTP触发器。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e此过程请参考阿里云官网，我就不详细赘述。\u003ca href=\"https://www.aliyun.com/product/fc\" title=\"官网在此\" class=\"text-sky-500 hover:text-sky-400\"\u003e官网在此\u003c/a\u003e\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eNetty服务端Handle代码\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode.lambda.proxy.inbound\n\nimport cn.wycode.lambda.proxy.config.AliyunConfig\nimport cn.wycode.lambda.proxy.outbound.ProxyOutboundInitializer\nimport io.netty.bootstrap.Bootstrap\nimport io.netty.buffer.ByteBuf\nimport io.netty.buffer.Unpooled\nimport io.netty.channel.*\nimport io.netty.handler.codec.http.*\nimport io.netty.util.CharsetUtil\n\nclass ProxyInboundHandler(val aliyunConfig: AliyunConfig) : SimpleChannelInboundHandler\u0026#x3C;ByteBuf\u003e() {\n\n\n    // As we use inboundChannel.eventLoop() when building the Bootstrap this does not need to be volatile as\n    // the outboundChannel will use the same EventLoop (and therefore Thread) as the inboundChannel.\n    private var outboundChannel: Channel? = null\n\n    override fun channelRead0(ctx: ChannelHandlerContext, msg: ByteBuf) {\n        println(\"ProxyInboundHandler\u0026#x3C;\u0026#x3C;\u0026#x3C;\" + msg.toString(CharsetUtil.UTF_8))\n//        val headers = msg.headers()\n//        val headerMap = HashMap\u0026#x3C;String, String\u003e(headers.size())\n//        headers.forEach { headerMap[it.key] = it.value }\n//        val outboundBody = Request(msg.method().name(), msg.uri(), msg.protocolVersion().text(), headerMap)\n//        val outboundJson = JSON.toJSONString(outboundBody)\n        val request = DefaultFullHttpRequest(HttpVersion.HTTP_1_1, HttpMethod.POST, aliyunConfig.path)\n        request.headers().set(HttpHeaderNames.HOST, aliyunConfig.host)\n        request.headers().set(HttpHeaderNames.CONNECTION, HttpHeaderValues.CLOSE)\n        request.headers().set(HttpHeaderNames.CONTENT_TYPE, HttpHeaderValues.APPLICATION_JSON)\n        request.headers().set(HttpHeaderNames.CONTENT_LENGTH, msg.writerIndex())\n//        request.content().writeCharSequence(outboundJson, CharsetUtil.UTF_8)\n        request.content().writeBytes(msg)\n//\n        if (outboundChannel!!.isActive) {\n            println(\"ProxyInboundHandler\u003e\u003e\u003e${request.content().toString(CharsetUtil.UTF_8)}\")\n            outboundChannel!!.writeAndFlush(request).addListener(object : ChannelFutureListener {\n                override fun operationComplete(future: ChannelFuture) {\n                    if (future.isSuccess) {\n                        // was able to flush out data, start to read the next chunk\n                        ctx.channel().read()\n                    } else {\n                        future.channel().close()\n                    }\n                }\n            })\n        }\n    }\n\n\n    override fun channelActive(ctx: ChannelHandlerContext) {\n        val inboundChannel = ctx.channel()\n        // Start the connection attempt.\n        val outboundClient = Bootstrap()\n        outboundClient.group(inboundChannel.eventLoop())\n                .channel(inboundChannel.javaClass)\n                .handler(ProxyOutboundInitializer(inboundChannel))\n                .option(ChannelOption.AUTO_READ, false)\n\n        val f = outboundClient.connect(aliyunConfig.host, aliyunConfig.port)\n        outboundChannel = f.channel()\n        f.addListener { future -\u003e\n            if (future.isSuccess) {\n                // connection complete start to read first data\n                inboundChannel.read()\n            } else {\n                // Close the connection if the connection attempt has failed.\n                inboundChannel.close()\n            }\n        }\n    }\n\n\n    override fun channelInactive(ctx: ChannelHandlerContext) {\n        if (outboundChannel != null) {\n            closeOnFlush(outboundChannel!!)\n        }\n    }\n\n    override fun exceptionCaught(ctx: ChannelHandlerContext, cause: Throwable) {\n        cause.printStackTrace()\n        closeOnFlush(ctx.channel())\n    }\n\n    companion object {\n        fun closeOnFlush(ch: Channel) {\n            if (ch.isActive) {\n                ch.writeAndFlush(Unpooled.EMPTY_BUFFER).addListener(ChannelFutureListener.CLOSE)\n            }\n        }\n    }\n\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eNetty客户端Handle代码\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode.lambda.proxy.outbound\n\nimport cn.wycode.lambda.proxy.inbound.ProxyInboundHandler\nimport io.netty.channel.*\nimport io.netty.handler.codec.http.FullHttpResponse\nimport io.netty.util.CharsetUtil\n\nclass ProxyOutboundHandler(private val inboundChannel: Channel) : SimpleChannelInboundHandler\u0026#x3C;FullHttpResponse\u003e() {\n\n    override fun channelActive(ctx: ChannelHandlerContext) {\n        println(\"ProxyOutBoundHandle==\")\n        ctx.read()\n    }\n\n    override fun channelRead0(ctx: ChannelHandlerContext, msg: FullHttpResponse) {\n        println(\"ProxyOutBoundHandle\u0026#x3C;\u0026#x3C;\u0026#x3C;$msg\")\n        val body = msg.content().toString(CharsetUtil.UTF_8)\n        println(\"ProxyOutBoundHandle body\u0026#x3C;\u0026#x3C;\u0026#x3C;$body\")\n//        val proxyResponse = try {\n//            JSON.parseObject(body, Response::class.java)\n//        } catch (e: Exception) {\n//            e.printStackTrace()\n//            msg.retain()\n//            inboundChannel.writeAndFlush(msg).addListener(object : ChannelFutureListener {\n//                override fun operationComplete(future: ChannelFuture) {\n//                    if (future.isSuccess) {\n//                        // was able to flush out data, start to read the next chunk\n//                        ctx.channel().read()\n//                    } else {\n//                        future.channel().close()\n//                    }\n//                }\n//            })\n//            return\n//        }\n//        val headers = CombinedHttpHeaders(true)\n//        var outBytes:ByteArray? = null\n//        if (proxyResponse.error == null) {\n//            for (header in proxyResponse.headers!!) {\n//                headers[header.key] = header.value\n//            }\n//            outBytes = Base64.getDecoder().decode(proxyResponse.content)\n//        }else{\n//            outBytes = proxyResponse.error.toByteArray()\n//        }\n//        val response = DefaultFullHttpResponse(HttpVersion.HTTP_1_1,\n//                HttpResponseStatus.valueOf(proxyResponse.code),\n//                Unpooled.wrappedBuffer(outBytes),\n//                headers, DefaultHttpHeaders())\n        msg.retain()\n        inboundChannel.writeAndFlush(msg.content()).addListener(object : ChannelFutureListener {\n            override fun operationComplete(future: ChannelFuture) {\n                if (future.isSuccess) {\n                    // was able to flush out data, start to read the next chunk\n                    ctx.channel().read()\n                } else {\n                    future.channel().close()\n                }\n            }\n        })\n    }\n\n    override fun channelInactive(ctx: ChannelHandlerContext) {\n        println(\"ProxyOutBoundHandle!=\")\n        ProxyInboundHandler.closeOnFlush(inboundChannel)\n    }\n\n    override fun exceptionCaught(ctx: ChannelHandlerContext, cause: Throwable) {\n        cause.printStackTrace()\n        ProxyInboundHandler.closeOnFlush(ctx.channel())\n    }\n\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e云函数代码\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003epackage cn.wycode.lambda;\n\nimport com.aliyun.fc.runtime.Context;\nimport com.aliyun.fc.runtime.FunctionComputeLogger;\nimport com.aliyun.fc.runtime.StreamRequestHandler;\n\nimport java.io.*;\nimport java.net.Socket;\nimport java.net.URL;\nimport java.nio.charset.StandardCharsets;\n\npublic class Lambda implements StreamRequestHandler {\n\n\n    @Override\n    public void handleRequest(InputStream input, OutputStream output, Context context) throws IOException {\n        FunctionComputeLogger logger = context.getLogger();\n        StringBuilder sb = new StringBuilder();\n        byte[] buffer = new byte[1024];\n        int n;\n        while ((n = input.read(buffer)) != -1) {\n            sb.append(new String(buffer, 0, n, StandardCharsets.UTF_8));\n        }\n        logger.info(\"handleRequest\u003e\u003e\u003e\" + sb.toString());\n\n        String firstLine = new BufferedReader(new StringReader(sb.toString())).readLine();\n        String host;\n        int port;\n        try {\n            if (firstLine.startsWith(\"CONNECT \")) {\n                String[] urlArray = firstLine.split(\" \")[1].split(\":\");\n                host = urlArray[0];\n                port = Integer.parseInt(urlArray[1]);\n            } else {\n                URL url = new URL(firstLine.split(\" \")[1]);\n                host = url.getHost();\n                port = url.getPort();\n\n                if (port == -1) {\n                    if (url.getProtocol().equalsIgnoreCase(\"http\")) {\n                        port = 80;\n                    } else if (url.getProtocol().equalsIgnoreCase(\"https\")) {\n                        port = 443;\n                    } else {\n                        throw new IllegalArgumentException(\"端口无法解析\");\n                    }\n                }\n            }\n        } catch (Exception e) {\n            logger.error(\"url解析错误:\" + e.getMessage());\n            return;\n        }\n        logger.info(\"host-\u003e\" + host);\n        logger.info(\"port-\u003e\" + port);\n\n        Socket s = new Socket(host, port);\n        if (firstLine.startsWith(\"CONNECT \")) {\n            String response = \"HTTP/1.1 200 Connection Established\";\n            output.write(response.getBytes(StandardCharsets.UTF_8));\n            output.flush();\n            sb.setLength(0);\n            while ((n = input.read(buffer)) != -1) {\n                sb.append(new String(buffer, 0, n, StandardCharsets.UTF_8));\n            }\n            logger.info(\"handleRequest\u003e\u003e\u003e\" + sb.toString());\n        }\n\n        OutputStream httpOutputStream = s.getOutputStream();\n        httpOutputStream.write(sb.toString().getBytes(StandardCharsets.UTF_8));\n\n        InputStream httpInputStream = s.getInputStream();\n        sb.setLength(0);\n        while ((n = httpInputStream.read(buffer)) != -1) {\n            output.write(buffer, 0, n);\n            sb.append(new String(buffer, 0, n, StandardCharsets.UTF_8));\n        }\n        httpInputStream.close();\n        httpOutputStream.close();\n\n        s.close();\n        input.close();\n        output.close();\n        logger.info(\"handleRequest\u0026#x3C;\u0026#x3C;\u0026#x3C;\" + sb.toString());\n    }\n}\n\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e遗留问题\u003c/h2\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eHTTP请求代理测试通过\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e可以在Netty客户端发送请求时，对请求体进行二进制加密，函数端解密；函数端收到真实响应加密，Netty客户端收到请求后解密。从而提高安全性\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e对于HTTP请求头为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eConnection:keep-alive\u003c/code\u003e的请求，函数端在读取真实响应时，会阻塞在流末尾的read方法而无法返回结果，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eConnection:close\u003c/code\u003e的请求正常\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003eHTTPS请求在有代理的情况下，浏览器会先发送一个HTTP CONNECT请求，以建立TSL通道。目前因为read阻塞问题还没有解决。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e附：本项目全部源码地址：\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eNetty端：\u003ca href=\"https://github.com/wangyucode/lambda-cross-java\" title=\"github\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/lambda-cross-java\u003c/a\u003e\n函数端：\u003ca href=\"https://github.com/wangyucode/aliyun-lambda\" title=\"github\" class=\"text-sky-500 hover:text-sky-400\"\u003ehttps://github.com/wangyucode/aliyun-lambda\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请联系作者!\u003c/p\u003e\n","content":"\n![流程](/images/20181023_liucheng.jpg \"流程\")\n\n\u003e 函数计算（Function Compute）是事件驱动的全托管计算服务。函数计算无需租用和管理24小时运行的服务器(Serverless)，无需搭建复杂的服务器环境，只需编写代码并上传就可以了，只需要为代码实际运行消耗的资源付费，非常便宜。\n\n\u003e 函数计算可以选择运行区域，也就是说，我们可以将函数运行的服务器区域选择到香港或者是美国，如此会带来什么样的好处，只可意会，不可言传。那么能否利用云函数写一个Proxy软件呢？请看本文！\n\n\u003c!--more--\u003e\n\n## 在阿里云上新建函数计算\n\n我们需要建立一个云函数，和一个HTTP触发器。\n\n此过程请参考阿里云官网，我就不详细赘述。[官网在此](https://www.aliyun.com/product/fc \"官网在此\")\n\n\n## Netty服务端Handle代码\n\n```kotlin\npackage cn.wycode.lambda.proxy.inbound\n\nimport cn.wycode.lambda.proxy.config.AliyunConfig\nimport cn.wycode.lambda.proxy.outbound.ProxyOutboundInitializer\nimport io.netty.bootstrap.Bootstrap\nimport io.netty.buffer.ByteBuf\nimport io.netty.buffer.Unpooled\nimport io.netty.channel.*\nimport io.netty.handler.codec.http.*\nimport io.netty.util.CharsetUtil\n\nclass ProxyInboundHandler(val aliyunConfig: AliyunConfig) : SimpleChannelInboundHandler\u003cByteBuf\u003e() {\n\n\n    // As we use inboundChannel.eventLoop() when building the Bootstrap this does not need to be volatile as\n    // the outboundChannel will use the same EventLoop (and therefore Thread) as the inboundChannel.\n    private var outboundChannel: Channel? = null\n\n    override fun channelRead0(ctx: ChannelHandlerContext, msg: ByteBuf) {\n        println(\"ProxyInboundHandler\u003c\u003c\u003c\" + msg.toString(CharsetUtil.UTF_8))\n//        val headers = msg.headers()\n//        val headerMap = HashMap\u003cString, String\u003e(headers.size())\n//        headers.forEach { headerMap[it.key] = it.value }\n//        val outboundBody = Request(msg.method().name(), msg.uri(), msg.protocolVersion().text(), headerMap)\n//        val outboundJson = JSON.toJSONString(outboundBody)\n        val request = DefaultFullHttpRequest(HttpVersion.HTTP_1_1, HttpMethod.POST, aliyunConfig.path)\n        request.headers().set(HttpHeaderNames.HOST, aliyunConfig.host)\n        request.headers().set(HttpHeaderNames.CONNECTION, HttpHeaderValues.CLOSE)\n        request.headers().set(HttpHeaderNames.CONTENT_TYPE, HttpHeaderValues.APPLICATION_JSON)\n        request.headers().set(HttpHeaderNames.CONTENT_LENGTH, msg.writerIndex())\n//        request.content().writeCharSequence(outboundJson, CharsetUtil.UTF_8)\n        request.content().writeBytes(msg)\n//\n        if (outboundChannel!!.isActive) {\n            println(\"ProxyInboundHandler\u003e\u003e\u003e${request.content().toString(CharsetUtil.UTF_8)}\")\n            outboundChannel!!.writeAndFlush(request).addListener(object : ChannelFutureListener {\n                override fun operationComplete(future: ChannelFuture) {\n                    if (future.isSuccess) {\n                        // was able to flush out data, start to read the next chunk\n                        ctx.channel().read()\n                    } else {\n                        future.channel().close()\n                    }\n                }\n            })\n        }\n    }\n\n\n    override fun channelActive(ctx: ChannelHandlerContext) {\n        val inboundChannel = ctx.channel()\n        // Start the connection attempt.\n        val outboundClient = Bootstrap()\n        outboundClient.group(inboundChannel.eventLoop())\n                .channel(inboundChannel.javaClass)\n                .handler(ProxyOutboundInitializer(inboundChannel))\n                .option(ChannelOption.AUTO_READ, false)\n\n        val f = outboundClient.connect(aliyunConfig.host, aliyunConfig.port)\n        outboundChannel = f.channel()\n        f.addListener { future -\u003e\n            if (future.isSuccess) {\n                // connection complete start to read first data\n                inboundChannel.read()\n            } else {\n                // Close the connection if the connection attempt has failed.\n                inboundChannel.close()\n            }\n        }\n    }\n\n\n    override fun channelInactive(ctx: ChannelHandlerContext) {\n        if (outboundChannel != null) {\n            closeOnFlush(outboundChannel!!)\n        }\n    }\n\n    override fun exceptionCaught(ctx: ChannelHandlerContext, cause: Throwable) {\n        cause.printStackTrace()\n        closeOnFlush(ctx.channel())\n    }\n\n    companion object {\n        fun closeOnFlush(ch: Channel) {\n            if (ch.isActive) {\n                ch.writeAndFlush(Unpooled.EMPTY_BUFFER).addListener(ChannelFutureListener.CLOSE)\n            }\n        }\n    }\n\n}\n\n```\n\n## Netty客户端Handle代码\n\n```kotlin\npackage cn.wycode.lambda.proxy.outbound\n\nimport cn.wycode.lambda.proxy.inbound.ProxyInboundHandler\nimport io.netty.channel.*\nimport io.netty.handler.codec.http.FullHttpResponse\nimport io.netty.util.CharsetUtil\n\nclass ProxyOutboundHandler(private val inboundChannel: Channel) : SimpleChannelInboundHandler\u003cFullHttpResponse\u003e() {\n\n    override fun channelActive(ctx: ChannelHandlerContext) {\n        println(\"ProxyOutBoundHandle==\")\n        ctx.read()\n    }\n\n    override fun channelRead0(ctx: ChannelHandlerContext, msg: FullHttpResponse) {\n        println(\"ProxyOutBoundHandle\u003c\u003c\u003c$msg\")\n        val body = msg.content().toString(CharsetUtil.UTF_8)\n        println(\"ProxyOutBoundHandle body\u003c\u003c\u003c$body\")\n//        val proxyResponse = try {\n//            JSON.parseObject(body, Response::class.java)\n//        } catch (e: Exception) {\n//            e.printStackTrace()\n//            msg.retain()\n//            inboundChannel.writeAndFlush(msg).addListener(object : ChannelFutureListener {\n//                override fun operationComplete(future: ChannelFuture) {\n//                    if (future.isSuccess) {\n//                        // was able to flush out data, start to read the next chunk\n//                        ctx.channel().read()\n//                    } else {\n//                        future.channel().close()\n//                    }\n//                }\n//            })\n//            return\n//        }\n//        val headers = CombinedHttpHeaders(true)\n//        var outBytes:ByteArray? = null\n//        if (proxyResponse.error == null) {\n//            for (header in proxyResponse.headers!!) {\n//                headers[header.key] = header.value\n//            }\n//            outBytes = Base64.getDecoder().decode(proxyResponse.content)\n//        }else{\n//            outBytes = proxyResponse.error.toByteArray()\n//        }\n//        val response = DefaultFullHttpResponse(HttpVersion.HTTP_1_1,\n//                HttpResponseStatus.valueOf(proxyResponse.code),\n//                Unpooled.wrappedBuffer(outBytes),\n//                headers, DefaultHttpHeaders())\n        msg.retain()\n        inboundChannel.writeAndFlush(msg.content()).addListener(object : ChannelFutureListener {\n            override fun operationComplete(future: ChannelFuture) {\n                if (future.isSuccess) {\n                    // was able to flush out data, start to read the next chunk\n                    ctx.channel().read()\n                } else {\n                    future.channel().close()\n                }\n            }\n        })\n    }\n\n    override fun channelInactive(ctx: ChannelHandlerContext) {\n        println(\"ProxyOutBoundHandle!=\")\n        ProxyInboundHandler.closeOnFlush(inboundChannel)\n    }\n\n    override fun exceptionCaught(ctx: ChannelHandlerContext, cause: Throwable) {\n        cause.printStackTrace()\n        ProxyInboundHandler.closeOnFlush(ctx.channel())\n    }\n\n}\n\n```\n\n## 云函数代码\n\n```java\npackage cn.wycode.lambda;\n\nimport com.aliyun.fc.runtime.Context;\nimport com.aliyun.fc.runtime.FunctionComputeLogger;\nimport com.aliyun.fc.runtime.StreamRequestHandler;\n\nimport java.io.*;\nimport java.net.Socket;\nimport java.net.URL;\nimport java.nio.charset.StandardCharsets;\n\npublic class Lambda implements StreamRequestHandler {\n\n\n    @Override\n    public void handleRequest(InputStream input, OutputStream output, Context context) throws IOException {\n        FunctionComputeLogger logger = context.getLogger();\n        StringBuilder sb = new StringBuilder();\n        byte[] buffer = new byte[1024];\n        int n;\n        while ((n = input.read(buffer)) != -1) {\n            sb.append(new String(buffer, 0, n, StandardCharsets.UTF_8));\n        }\n        logger.info(\"handleRequest\u003e\u003e\u003e\" + sb.toString());\n\n        String firstLine = new BufferedReader(new StringReader(sb.toString())).readLine();\n        String host;\n        int port;\n        try {\n            if (firstLine.startsWith(\"CONNECT \")) {\n                String[] urlArray = firstLine.split(\" \")[1].split(\":\");\n                host = urlArray[0];\n                port = Integer.parseInt(urlArray[1]);\n            } else {\n                URL url = new URL(firstLine.split(\" \")[1]);\n                host = url.getHost();\n                port = url.getPort();\n\n                if (port == -1) {\n                    if (url.getProtocol().equalsIgnoreCase(\"http\")) {\n                        port = 80;\n                    } else if (url.getProtocol().equalsIgnoreCase(\"https\")) {\n                        port = 443;\n                    } else {\n                        throw new IllegalArgumentException(\"端口无法解析\");\n                    }\n                }\n            }\n        } catch (Exception e) {\n            logger.error(\"url解析错误:\" + e.getMessage());\n            return;\n        }\n        logger.info(\"host-\u003e\" + host);\n        logger.info(\"port-\u003e\" + port);\n\n        Socket s = new Socket(host, port);\n        if (firstLine.startsWith(\"CONNECT \")) {\n            String response = \"HTTP/1.1 200 Connection Established\";\n            output.write(response.getBytes(StandardCharsets.UTF_8));\n            output.flush();\n            sb.setLength(0);\n            while ((n = input.read(buffer)) != -1) {\n                sb.append(new String(buffer, 0, n, StandardCharsets.UTF_8));\n            }\n            logger.info(\"handleRequest\u003e\u003e\u003e\" + sb.toString());\n        }\n\n        OutputStream httpOutputStream = s.getOutputStream();\n        httpOutputStream.write(sb.toString().getBytes(StandardCharsets.UTF_8));\n\n        InputStream httpInputStream = s.getInputStream();\n        sb.setLength(0);\n        while ((n = httpInputStream.read(buffer)) != -1) {\n            output.write(buffer, 0, n);\n            sb.append(new String(buffer, 0, n, StandardCharsets.UTF_8));\n        }\n        httpInputStream.close();\n        httpOutputStream.close();\n\n        s.close();\n        input.close();\n        output.close();\n        logger.info(\"handleRequest\u003c\u003c\u003c\" + sb.toString());\n    }\n}\n\n```\n\n\n## 遗留问题\n\n- HTTP请求代理测试通过\n- 可以在Netty客户端发送请求时，对请求体进行二进制加密，函数端解密；函数端收到真实响应加密，Netty客户端收到请求后解密。从而提高安全性\n- 对于HTTP请求头为`Connection:keep-alive`的请求，函数端在读取真实响应时，会阻塞在流末尾的read方法而无法返回结果，`Connection:close`的请求正常\n- HTTPS请求在有代理的情况下，浏览器会先发送一个HTTP CONNECT请求，以建立TSL通道。目前因为read阻塞问题还没有解决。\n\n\n附：本项目全部源码地址：\n\nNetty端：[https://github.com/wangyucode/lambda-cross-java](https://github.com/wangyucode/lambda-cross-java \"github\")\n函数端：[https://github.com/wangyucode/aliyun-lambda](https://github.com/wangyucode/aliyun-lambda \"github\")\n\n以上，转载请联系作者!","data":{"title":"使用Netty和阿里云函数写一个低成本的“梯子”","date":"2018-10-23","tags":["Netty","HTTP"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![流程](/images/20181023_liucheng.jpg \"流程\")\n\n\u003e 函数计算（Function Compute）是事件驱动的全托管计算服务。函数计算无需租用和管理24小时运行的服务器(Serverless)，无需搭建复杂的服务器环境，只需编写代码并上传就可以了，只需要为代码实际运行消耗的资源付费，非常便宜。\n\n\u003e 函数计算可以选择运行区域，也就是说，我们可以将函数运行的服务器区域选择到香港或者是美国，如此会带来什么样的好处，只可意会，不可言传。那么能否利用云函数写一个Proxy软件呢？请看本文！\n\n"},{"id":"netty","file":"netty.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://issues.jboss.org/secure/attachment/12345694/netty_logo_600px.png\" alt=\"Netty\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eNetty是一个基于异步NIO（non-blocking IO）模型的，事件驱动的网络应用程序框架。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e不同于传统阻塞IO，非阻塞IO通常使用更少的线程，从而提高并发性能。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eNetty的灵活设计使得它能够开发几乎所有基于二进制流、文本应用协议的Web应用\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章将简单介绍如何使用Netty开发一个HTTP服务器\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"https://issues.jboss.org/secure/attachment/12345694/netty_logo_600px.png\" alt=\"Netty\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eNetty是一个基于异步NIO（non-blocking IO）模型的，事件驱动的网络应用程序框架。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e不同于传统阻塞IO，非阻塞IO通常使用更少的线程，从而提高并发性能。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eNetty的灵活设计使得它能够开发几乎所有基于二进制流、文本应用协议的Web应用\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e这篇文章将简单介绍如何使用Netty开发一个HTTP服务器\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e导入Netty\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e这里使用Gradle导入4.1.30.Final版本\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-json px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003edependencies {\n\tcompile \"io.netty:netty-all:4.1.30.Final\"\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e编写服务器\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eclass Server(val port: Int) {\n\n    @Throws(Exception::class)\n    fun run() {\n        val bossGroup = NioEventLoopGroup(1)\n        val workerGroup = NioEventLoopGroup()\n        try {\n            val b = ServerBootstrap()\n            b.group(bossGroup, workerGroup)\n                    .channel(NioServerSocketChannel::class.java)\n                    .handler(LoggingHandler(LogLevel.INFO))\n                    .childHandler(ServerInitializer())\n            val ch = b.bind(port).sync().channel()\n            println(\"server start on $port\")\n            ch.closeFuture().sync()\n        } finally {\n            bossGroup.shutdownGracefully()\n            workerGroup.shutdownGracefully()\n        }\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e这里\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ebossGroup\u003c/code\u003e是用来接受连接的父线程池，可以是单线程，也可以是多线程（推荐是CPU核心数的倍数）\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e因为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ebossGroup\u003c/code\u003e接受连接后会立即返回，不会阻塞，所以即使单线程也能够处理并发（类似Node.JS）\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eworkerGroup\u003c/code\u003e是工作线程\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003echannel()\u003c/code\u003e设置构建NIO Channel的类型\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ehandle()\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003echildHandle()\u003c/code\u003e分别设置主处理，和子处理对象\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e配置子处理流程\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eclass ServerInitializer : ChannelInitializer\u0026#x3C;SocketChannel\u003e() {\n    override fun initChannel(ch: SocketChannel) {\n        val p = ch.pipeline()\n        p.addLast(HttpRequestDecoder())\n        // Uncomment the following line if you don't want to handle HttpChunks.\n        //p.addLast(new HttpObjectAggregator(1048576));\n        p.addLast(HttpResponseEncoder())\n        // Remove the following line if you don't want automatic content compression.\n        //p.addLast(new HttpContentCompressor());\n        p.addLast(HttpServerHandler())\n    }\n\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003eNetty自带了很多的编解码器，上面的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHttpRequestDecoder\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHttpResponseEncoder\u003c/code\u003e用于HTTP协议的编解码\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e经过编解码后我们的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHttpServerHandler\u003c/code\u003e将会实际处理HTTP请求\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e处理HTTP请求\u003c/h2\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003eclass HttpServerHandler : SimpleChannelInboundHandler\u0026#x3C;Any\u003e() {\n\n    val sb = StringBuilder()\n\n    lateinit var request: HttpRequest\n\n    override fun channelRead0(ctx: ChannelHandlerContext, msg: Any) {\n        if (msg is HttpRequest) {\n            if (HttpUtil.is100ContinueExpected(msg)) {\n                ctx.write(DefaultFullHttpResponse(HttpVersion.HTTP_1_1, HttpResponseStatus.CONTINUE))\n            }\n            request = msg\n\n\n            sb.setLength(0)\n\n            sb.append(\"Welcome\\r\\n\")\n            sb.append(\"=====================\\r\\n\")\n            sb.append(\"VERSION: \").append(msg.protocolVersion()).append(\"\\r\\n\")\n            sb.append(\"HOSTNAME: \").append(msg.headers().get(HttpHeaderNames.HOST, \"unknown\")).append(\"\\r\\n\")\n            sb.append(\"REQUEST_URI: \").append(msg.uri()).append(\"\\r\\n\\r\\n\")\n\n            val headers = msg.headers()\n            if (!headers.isEmpty) {\n                for (h in headers) {\n                    sb.append(\"HEADER: \").append(h.key).append(\" = \").append(h.value).append(\"\\r\\n\")\n                }\n                sb.append(\"\\r\\n\")\n            }\n\n            val queryStringDecoder = QueryStringDecoder(msg.uri())\n            val params = queryStringDecoder.parameters()\n            if (!params.isEmpty()) {\n                for (p in params) {\n                    val vals = p.value\n                    for (value in vals) {\n                        sb.append(\"PARAM: \").append(p.key).append(\" = \").append(value).append(\"\\r\\n\")\n                    }\n                }\n                sb.append(\"\\r\\n\")\n            }\n\n            appendDecoderResult(sb, msg)\n        }\n\n        if (msg is HttpContent) {\n            val content = msg.content()\n\n            if (content.isReadable) {\n                sb.append(\"CONTENT: \")\n                sb.append(content.toString(CharsetUtil.UTF_8))\n                sb.append(\"\\r\\n\")\n                appendDecoderResult(sb, msg)\n            }\n\n            if (msg is LastHttpContent) {\n                sb.append(\"END OF CONTENT\\r\\n\")\n\n                if (!msg.trailingHeaders().isEmpty) {\n                    sb.append(\"\\r\\n\")\n                    for (name in msg.trailingHeaders().names()) {\n                        for (value in msg.trailingHeaders().getAll(name)) {\n                            sb.append(\"TRAILING HEADER: \")\n                            sb.append(name).append(\" = \").append(value).append(\"\\r\\n\")\n                        }\n                    }\n                    sb.append(\"\\r\\n\")\n                }\n\n                // Decide whether to close the connection or not.\n                if (writeResponse(msg, ctx)) {\n                    // If keep-alive is off, close the connection once the content is fully written.\n                    ctx.writeAndFlush(Unpooled.EMPTY_BUFFER).addListener(ChannelFutureListener.CLOSE)\n                }\n            }\n        }\n\n    }\n\n    override fun channelReadComplete(ctx: ChannelHandlerContext) {\n        ctx.flush()\n    }\n\n    private fun writeResponse(currentObj: HttpObject, ctx: ChannelHandlerContext): Boolean {\n        val keepAlive = HttpUtil.isKeepAlive(request)\n        // Build the response object.\n        val status = if (currentObj.decoderResult().isSuccess) {\n            HttpResponseStatus.OK\n        } else {\n            HttpResponseStatus.BAD_REQUEST\n        }\n        val response = DefaultFullHttpResponse(\n                HttpVersion.HTTP_1_1, status,\n                Unpooled.copiedBuffer(sb.toString(), CharsetUtil.UTF_8))\n\n        response.headers().set(HttpHeaderNames.CONTENT_TYPE, \"${HttpHeaderValues.TEXT_PLAIN}; charset=UTF-8\")\n\n        if (keepAlive) {\n            // Add 'Content-Length' header only for a keep-alive connection.\n            response.headers().setInt(HttpHeaderNames.CONTENT_LENGTH, response.content().readableBytes())\n            // Add keep alive header as per:\n            // - http://www.w3.org/Protocols/HTTP/1.1/draft-ietf-http-v11-spec-01.html#Connection\n            response.headers().set(HttpHeaderNames.CONNECTION, HttpHeaderValues.KEEP_ALIVE)\n        }\n        // Encode the cookie.\n        val cookieString = request.headers().get(HttpHeaderNames.COOKIE)\n        if (cookieString != null) {\n            val cookies = ServerCookieDecoder.STRICT.decode(cookieString)\n            if (!cookies.isEmpty()) {\n                // Reset the cookies if necessary.\n                for (cookie in cookies) {\n                    response.headers().add(HttpHeaderNames.SET_COOKIE, ServerCookieEncoder.STRICT.encode(cookie))\n\n                }\n\n            }\n\n        } else {\n            // Browser sent no cookie.  Add some.\n            response.headers().add(HttpHeaderNames.SET_COOKIE, ServerCookieEncoder.STRICT.encode(\"key1\", \"value1\"));\n            response.headers().add(HttpHeaderNames.SET_COOKIE, ServerCookieEncoder.STRICT.encode(\"key2\", \"value2\"));\n\n        }\n\n        // Write the response.\n        ctx.write(response)\n\n        return keepAlive\n    }\n\n\n    override fun exceptionCaught(ctx: ChannelHandlerContext, cause: Throwable) {\n        cause.printStackTrace()\n        ctx.close()\n    }\n\n    companion object {\n        fun appendDecoderResult(sb: StringBuilder, httpObj: HttpObject) {\n            val result = httpObj.decoderResult()\n            if (result.isSuccess) {\n                return\n            }\n\n            sb.append(\".. WITH DECODER FAILURE: \")\n            sb.append(result.cause())\n            sb.append(\"\\r\\n\")\n        }\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e如果构造流程时没有使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHttpObjectAggregator\u003c/code\u003e类，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003echannelRead()\u003c/code\u003e会调用很多次，每次传入的对象为\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHttpRequest\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eHttpContent\u003c/code\u003e,\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eLastHttpContent\u003c/code\u003e的子类，他们分别有方法可以读取到HTTP请求的内容。\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp class=\"mb-4\"\u003e以上，转载请联系作者!\u003c/p\u003e\n","content":"\n![Netty](https://issues.jboss.org/secure/attachment/12345694/netty_logo_600px.png)\n\n\u003e Netty是一个基于异步NIO（non-blocking IO）模型的，事件驱动的网络应用程序框架。\n\n\u003e 不同于传统阻塞IO，非阻塞IO通常使用更少的线程，从而提高并发性能。\n\n\u003e Netty的灵活设计使得它能够开发几乎所有基于二进制流、文本应用协议的Web应用\n\n这篇文章将简单介绍如何使用Netty开发一个HTTP服务器\n\n\u003c!--more--\u003e\n\n## 导入Netty\n\n这里使用Gradle导入4.1.30.Final版本\n\n```json\ndependencies {\n\tcompile \"io.netty:netty-all:4.1.30.Final\"\n}\n```\n\n## 编写服务器\n\n```kotlin\nclass Server(val port: Int) {\n\n    @Throws(Exception::class)\n    fun run() {\n        val bossGroup = NioEventLoopGroup(1)\n        val workerGroup = NioEventLoopGroup()\n        try {\n            val b = ServerBootstrap()\n            b.group(bossGroup, workerGroup)\n                    .channel(NioServerSocketChannel::class.java)\n                    .handler(LoggingHandler(LogLevel.INFO))\n                    .childHandler(ServerInitializer())\n            val ch = b.bind(port).sync().channel()\n            println(\"server start on $port\")\n            ch.closeFuture().sync()\n        } finally {\n            bossGroup.shutdownGracefully()\n            workerGroup.shutdownGracefully()\n        }\n    }\n}\n```\n\n- 这里`bossGroup`是用来接受连接的父线程池，可以是单线程，也可以是多线程（推荐是CPU核心数的倍数）\n- 因为`bossGroup`接受连接后会立即返回，不会阻塞，所以即使单线程也能够处理并发（类似Node.JS）\n- `workerGroup`是工作线程\n- `channel()`设置构建NIO Channel的类型\n- `handle()`和`childHandle()`分别设置主处理，和子处理对象\n\n\n## 配置子处理流程\n\n```kotlin\nclass ServerInitializer : ChannelInitializer\u003cSocketChannel\u003e() {\n    override fun initChannel(ch: SocketChannel) {\n        val p = ch.pipeline()\n        p.addLast(HttpRequestDecoder())\n        // Uncomment the following line if you don't want to handle HttpChunks.\n        //p.addLast(new HttpObjectAggregator(1048576));\n        p.addLast(HttpResponseEncoder())\n        // Remove the following line if you don't want automatic content compression.\n        //p.addLast(new HttpContentCompressor());\n        p.addLast(HttpServerHandler())\n    }\n\n}\n```\n- Netty自带了很多的编解码器，上面的`HttpRequestDecoder`和`HttpResponseEncoder`用于HTTP协议的编解码\n- 经过编解码后我们的`HttpServerHandler`将会实际处理HTTP请求\n\n\n## 处理HTTP请求\n\n```kotlin\nclass HttpServerHandler : SimpleChannelInboundHandler\u003cAny\u003e() {\n\n    val sb = StringBuilder()\n\n    lateinit var request: HttpRequest\n\n    override fun channelRead0(ctx: ChannelHandlerContext, msg: Any) {\n        if (msg is HttpRequest) {\n            if (HttpUtil.is100ContinueExpected(msg)) {\n                ctx.write(DefaultFullHttpResponse(HttpVersion.HTTP_1_1, HttpResponseStatus.CONTINUE))\n            }\n            request = msg\n\n\n            sb.setLength(0)\n\n            sb.append(\"Welcome\\r\\n\")\n            sb.append(\"=====================\\r\\n\")\n            sb.append(\"VERSION: \").append(msg.protocolVersion()).append(\"\\r\\n\")\n            sb.append(\"HOSTNAME: \").append(msg.headers().get(HttpHeaderNames.HOST, \"unknown\")).append(\"\\r\\n\")\n            sb.append(\"REQUEST_URI: \").append(msg.uri()).append(\"\\r\\n\\r\\n\")\n\n            val headers = msg.headers()\n            if (!headers.isEmpty) {\n                for (h in headers) {\n                    sb.append(\"HEADER: \").append(h.key).append(\" = \").append(h.value).append(\"\\r\\n\")\n                }\n                sb.append(\"\\r\\n\")\n            }\n\n            val queryStringDecoder = QueryStringDecoder(msg.uri())\n            val params = queryStringDecoder.parameters()\n            if (!params.isEmpty()) {\n                for (p in params) {\n                    val vals = p.value\n                    for (value in vals) {\n                        sb.append(\"PARAM: \").append(p.key).append(\" = \").append(value).append(\"\\r\\n\")\n                    }\n                }\n                sb.append(\"\\r\\n\")\n            }\n\n            appendDecoderResult(sb, msg)\n        }\n\n        if (msg is HttpContent) {\n            val content = msg.content()\n\n            if (content.isReadable) {\n                sb.append(\"CONTENT: \")\n                sb.append(content.toString(CharsetUtil.UTF_8))\n                sb.append(\"\\r\\n\")\n                appendDecoderResult(sb, msg)\n            }\n\n            if (msg is LastHttpContent) {\n                sb.append(\"END OF CONTENT\\r\\n\")\n\n                if (!msg.trailingHeaders().isEmpty) {\n                    sb.append(\"\\r\\n\")\n                    for (name in msg.trailingHeaders().names()) {\n                        for (value in msg.trailingHeaders().getAll(name)) {\n                            sb.append(\"TRAILING HEADER: \")\n                            sb.append(name).append(\" = \").append(value).append(\"\\r\\n\")\n                        }\n                    }\n                    sb.append(\"\\r\\n\")\n                }\n\n                // Decide whether to close the connection or not.\n                if (writeResponse(msg, ctx)) {\n                    // If keep-alive is off, close the connection once the content is fully written.\n                    ctx.writeAndFlush(Unpooled.EMPTY_BUFFER).addListener(ChannelFutureListener.CLOSE)\n                }\n            }\n        }\n\n    }\n\n    override fun channelReadComplete(ctx: ChannelHandlerContext) {\n        ctx.flush()\n    }\n\n    private fun writeResponse(currentObj: HttpObject, ctx: ChannelHandlerContext): Boolean {\n        val keepAlive = HttpUtil.isKeepAlive(request)\n        // Build the response object.\n        val status = if (currentObj.decoderResult().isSuccess) {\n            HttpResponseStatus.OK\n        } else {\n            HttpResponseStatus.BAD_REQUEST\n        }\n        val response = DefaultFullHttpResponse(\n                HttpVersion.HTTP_1_1, status,\n                Unpooled.copiedBuffer(sb.toString(), CharsetUtil.UTF_8))\n\n        response.headers().set(HttpHeaderNames.CONTENT_TYPE, \"${HttpHeaderValues.TEXT_PLAIN}; charset=UTF-8\")\n\n        if (keepAlive) {\n            // Add 'Content-Length' header only for a keep-alive connection.\n            response.headers().setInt(HttpHeaderNames.CONTENT_LENGTH, response.content().readableBytes())\n            // Add keep alive header as per:\n            // - http://www.w3.org/Protocols/HTTP/1.1/draft-ietf-http-v11-spec-01.html#Connection\n            response.headers().set(HttpHeaderNames.CONNECTION, HttpHeaderValues.KEEP_ALIVE)\n        }\n        // Encode the cookie.\n        val cookieString = request.headers().get(HttpHeaderNames.COOKIE)\n        if (cookieString != null) {\n            val cookies = ServerCookieDecoder.STRICT.decode(cookieString)\n            if (!cookies.isEmpty()) {\n                // Reset the cookies if necessary.\n                for (cookie in cookies) {\n                    response.headers().add(HttpHeaderNames.SET_COOKIE, ServerCookieEncoder.STRICT.encode(cookie))\n\n                }\n\n            }\n\n        } else {\n            // Browser sent no cookie.  Add some.\n            response.headers().add(HttpHeaderNames.SET_COOKIE, ServerCookieEncoder.STRICT.encode(\"key1\", \"value1\"));\n            response.headers().add(HttpHeaderNames.SET_COOKIE, ServerCookieEncoder.STRICT.encode(\"key2\", \"value2\"));\n\n        }\n\n        // Write the response.\n        ctx.write(response)\n\n        return keepAlive\n    }\n\n\n    override fun exceptionCaught(ctx: ChannelHandlerContext, cause: Throwable) {\n        cause.printStackTrace()\n        ctx.close()\n    }\n\n    companion object {\n        fun appendDecoderResult(sb: StringBuilder, httpObj: HttpObject) {\n            val result = httpObj.decoderResult()\n            if (result.isSuccess) {\n                return\n            }\n\n            sb.append(\".. WITH DECODER FAILURE: \")\n            sb.append(result.cause())\n            sb.append(\"\\r\\n\")\n        }\n    }\n}\n```\n\n- 如果构造流程时没有使用`HttpObjectAggregator`类，`channelRead()`会调用很多次，每次传入的对象为`HttpRequest`，`HttpContent`,`LastHttpContent`的子类，他们分别有方法可以读取到HTTP请求的内容。\n\n以上，转载请联系作者!","data":{"title":"使用Netty开发高性能的网络服务应用","date":"2018-10-16","tags":["Netty","HTTP"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![Netty](https://issues.jboss.org/secure/attachment/12345694/netty_logo_600px.png)\n\n\u003e Netty是一个基于异步NIO（non-blocking IO）模型的，事件驱动的网络应用程序框架。\n\n\u003e 不同于传统阻塞IO，非阻塞IO通常使用更少的线程，从而提高并发性能。\n\n\u003e Netty的灵活设计使得它能够开发几乎所有基于二进制流、文本应用协议的Web应用\n\n这篇文章将简单介绍如何使用Netty开发一个HTTP服务器\n\n"},{"id":"web-flux","file":"web-flux.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180720_diagram-boot-reactor.svg\" alt=\"Spring Boot\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring Boot 2.0\u003c/code\u003e 带来了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring Framework 5\u003c/code\u003e 中的新的WebFlux技术，WebFlux是基于响应式非阻塞IO编程模型的技术栈。从而能够使用不同于以往基于Servlet API的阻塞式IO处理的新方式编写后台应用。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e相比以往阻塞式IO编程，响应式编程能够获得更小的开销。因为它直接处理流，而不是单个数据。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e响应式编程最早由 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.NET\u003c/code\u003e 平台上的 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactive Extensions (Rx)\u003c/code\u003e 库来实现。后来迁移到 Java 平台之后就产生了著名的 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava\u003c/code\u003e 库，并产生了很多其他编程语言上的对应实现。在这些实现的基础上产生了后来的响应式流（\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactive Streams\u003c/code\u003e）规范。该规范定义了响应式流的相关接口，并将集成到 Java 9 中。\u003c/p\u003e\n\u003c/blockquote\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180720_diagram-boot-reactor.svg\" alt=\"Spring Boot\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring Boot 2.0\u003c/code\u003e 带来了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring Framework 5\u003c/code\u003e 中的新的WebFlux技术，WebFlux是基于响应式非阻塞IO编程模型的技术栈。从而能够使用不同于以往基于Servlet API的阻塞式IO处理的新方式编写后台应用。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e相比以往阻塞式IO编程，响应式编程能够获得更小的开销。因为它直接处理流，而不是单个数据。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e响应式编程最早由 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.NET\u003c/code\u003e 平台上的 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactive Extensions (Rx)\u003c/code\u003e 库来实现。后来迁移到 Java 平台之后就产生了著名的 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava\u003c/code\u003e 库，并产生了很多其他编程语言上的对应实现。在这些实现的基础上产生了后来的响应式流（\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactive Streams\u003c/code\u003e）规范。该规范定义了响应式流的相关接口，并将集成到 Java 9 中。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e为什么要用响应式\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e在传统的编程范式中，我们一般通过迭代器（\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eIterator\u003c/code\u003e）模式来遍历一个序列。这种遍历方式是由调用者来控制节奏的，采用的是拉的方式。每次由调用者通过 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003enext()\u003c/code\u003e方法来获取序列中的下一个值。使用响应式流时采用的则是推的方式，即常见的发布者-订阅者模式。当发布者有新的数据产生时，这些数据会被推送到订阅者来进行处理。在响应式流上可以添加各种不同的操作来对数据进行处理，形成数据处理链。这个以声明式的方式添加的处理链只在订阅者进行订阅操作时才会真正执行。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e响应类型不是为了让你更快地处理请求或数据，实际上与常规阻塞处理相比，它们会带来更小的开销。 它们的优势在于它们能够同时提供更多请求，以及处理延迟操作，例如更有效地从远程服务器请求数据，或者处理来自客户端的请求。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e它们允许你通过本地处理时间和延迟来提供更好的服务质量和可预测的容量规划，而无需消耗更多资源。与等待结果时阻止当前线程的传统处理不同，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactive\u003c/code\u003e API没有等待成本，仅请求它能够处理的数据量并提供立刻返回，因为它处理数据流，而不仅仅是单个元素。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e为什么使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactor\u003c/code\u003e而不是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava\u003c/code\u003e\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava\u003c/code\u003e 库是 JVM 上响应式编程的先驱，也是响应式流规范的基础。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava 2\u003c/code\u003e 在 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava\u003c/code\u003e 的基础上做了很多的更新。不过 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava\u003c/code\u003e 库也有其不足的地方。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava\u003c/code\u003e 产生于响应式流规范之前，虽然可以和响应式流的接口进行转换，但是由于底层实现的原因，使用起来并不是很直观。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava 2\u003c/code\u003e 在设计和实现时考虑到了与规范的整合，不过为了保持与 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava\u003c/code\u003e 的兼容性，很多地方在使用时也并不直观。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactor\u003c/code\u003e 则是完全基于响应式流规范设计和实现的库，没有 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eRxJava\u003c/code\u003e 那样的历史包袱，在使用上更加的直观易懂。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactor\u003c/code\u003e 也是 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring 5\u003c/code\u003e 中响应式编程的基础。学习和掌握 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactor\u003c/code\u003e 可以更好地理解 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSpring 5\u003c/code\u003e 中的相关概念。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eReactive Streams\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactor\u003c/code\u003e建立在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactive Streams\u003c/code\u003e规范之上。 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactive Streams\u003c/code\u003e由4个简单的Java接口（\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ePublisher\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSubscriber\u003c/code\u003e，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSubscription\u003c/code\u003e和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eProcessor\u003c/code\u003e），文本规范和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTCK\u003c/code\u003e组成。它是每个现代Reactive库的基石，也是互操作性的必备条件。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e响应式流中第一个重要概念是背压（backpressure）。在基本的消息推送模式中，当消息发布者产生数据的速度过快时，会使得消息订阅者的处理速度无法跟上产生的速度，从而给订阅者造成很大的压力。当压力过大时，有可能造成订阅者本身的奔溃，所产生的级联效应甚至可能造成整个系统的瘫痪。背压的作用在于提供一种从订阅者到生产者的反馈渠道。订阅者可以通过 request()方法来声明其一次所能处理的消息数量，而生产者就只会产生相应数量的消息，直到下一次 request()方法调用。这实际上变成了推拉结合的模式。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e例如，当HTTP连接速度太慢时，在从数据库扩展到HTTP响应的被动组件的管道中，数据存储库也可以减速或完全停止，直到网络容量释放为止。\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJava 9在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ejava.util.concurrent.Flow\u003c/code\u003e容器类中包含了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eReactive Streams\u003c/code\u003e接口\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFlux\u003c/code\u003e 和 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMono\u003c/code\u003e\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFlux\u003c/code\u003e 和 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMono\u003c/code\u003e 是 Reactor 中的两个基本概念。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eFlux\u003c/code\u003e 表示的是包含 0 到 N 个元素的异步序列。在该序列中可以包含三种不同类型的消息通知：正常的包含元素的消息、序列结束的消息和序列出错的消息。当消息通知产生时，订阅者中对应的方法 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eonNext()\u003c/code\u003e, \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eonComplete()\u003c/code\u003e和 \u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eonError()\u003c/code\u003e会被调用。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMono\u003c/code\u003e 表示的是包含 0 或者 1 个元素的异步序列。该序列中同样可以包含与 Flux 相同的三种类型的消息通知。Flux 和 Mono 之间可以进行转换。对一个 Flux 序列进行计数操作，得到的结果是一个 Mono\u003clong\u003e对象。把两个 Mono 序列合并在一起，得到的是一个 Flux 对象。\u003c/long\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e参考文献：\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e1.\u003ca href=\"https://docs.spring.io/spring-framework/docs/5.0.0.BUILD-SNAPSHOT/spring-framework-reference/html/web-reactive.html\" title=\"Spring官方WebFlux文档\" class=\"text-sky-500 hover:text-sky-400\"\u003eSpring官方WebFlux文档\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e2.\u003ca href=\"https://spring.io/blog/2016/04/19/understanding-reactive-types\" title=\"Understanding Reactive types\" class=\"text-sky-500 hover:text-sky-400\"\u003eUnderstanding Reactive types\u003c/a\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e3.\u003ca href=\"https://www.ibm.com/developerworks/cn/java/j-cn-with-reactor-response-encode/index.html\" title=\"使用 Reactor 进行反应式编程\" class=\"text-sky-500 hover:text-sky-400\"\u003e使用 Reactor 进行反应式编程\u003c/a\u003e\u003c/p\u003e\n","content":"\n![Spring Boot](/images/20180720_diagram-boot-reactor.svg)\n\n\u003e `Spring Boot 2.0` 带来了`Spring Framework 5` 中的新的WebFlux技术，WebFlux是基于响应式非阻塞IO编程模型的技术栈。从而能够使用不同于以往基于Servlet API的阻塞式IO处理的新方式编写后台应用。\n\n\u003e 相比以往阻塞式IO编程，响应式编程能够获得更小的开销。因为它直接处理流，而不是单个数据。\n\n\u003e 响应式编程最早由 `.NET` 平台上的 `Reactive Extensions (Rx)` 库来实现。后来迁移到 Java 平台之后就产生了著名的 `RxJava` 库，并产生了很多其他编程语言上的对应实现。在这些实现的基础上产生了后来的响应式流（`Reactive Streams`）规范。该规范定义了响应式流的相关接口，并将集成到 Java 9 中。\n\n\u003c!--more--\u003e\n\n## 为什么要用响应式\n\n在传统的编程范式中，我们一般通过迭代器（`Iterator`）模式来遍历一个序列。这种遍历方式是由调用者来控制节奏的，采用的是拉的方式。每次由调用者通过 `next()`方法来获取序列中的下一个值。使用响应式流时采用的则是推的方式，即常见的发布者-订阅者模式。当发布者有新的数据产生时，这些数据会被推送到订阅者来进行处理。在响应式流上可以添加各种不同的操作来对数据进行处理，形成数据处理链。这个以声明式的方式添加的处理链只在订阅者进行订阅操作时才会真正执行。\n\n响应类型不是为了让你更快地处理请求或数据，实际上与常规阻塞处理相比，它们会带来更小的开销。 它们的优势在于它们能够同时提供更多请求，以及处理延迟操作，例如更有效地从远程服务器请求数据，或者处理来自客户端的请求。\n\n它们允许你通过本地处理时间和延迟来提供更好的服务质量和可预测的容量规划，而无需消耗更多资源。与等待结果时阻止当前线程的传统处理不同，`Reactive` API没有等待成本，仅请求它能够处理的数据量并提供立刻返回，因为它处理数据流，而不仅仅是单个元素。\n\n\n## 为什么使用`Reactor`而不是`RxJava`\n\n`RxJava` 库是 JVM 上响应式编程的先驱，也是响应式流规范的基础。`RxJava 2` 在 `RxJava` 的基础上做了很多的更新。不过 `RxJava` 库也有其不足的地方。`RxJava` 产生于响应式流规范之前，虽然可以和响应式流的接口进行转换，但是由于底层实现的原因，使用起来并不是很直观。`RxJava 2` 在设计和实现时考虑到了与规范的整合，不过为了保持与 `RxJava` 的兼容性，很多地方在使用时也并不直观。`Reactor` 则是完全基于响应式流规范设计和实现的库，没有 `RxJava` 那样的历史包袱，在使用上更加的直观易懂。`Reactor` 也是 `Spring 5` 中响应式编程的基础。学习和掌握 `Reactor` 可以更好地理解 `Spring 5` 中的相关概念。\n\n## Reactive Streams\n\n`Reactor`建立在`Reactive Streams`规范之上。 `Reactive Streams`由4个简单的Java接口（`Publisher`，`Subscriber`，`Subscription`和`Processor`），文本规范和`TCK`组成。它是每个现代Reactive库的基石，也是互操作性的必备条件。\n\n响应式流中第一个重要概念是背压（backpressure）。在基本的消息推送模式中，当消息发布者产生数据的速度过快时，会使得消息订阅者的处理速度无法跟上产生的速度，从而给订阅者造成很大的压力。当压力过大时，有可能造成订阅者本身的奔溃，所产生的级联效应甚至可能造成整个系统的瘫痪。背压的作用在于提供一种从订阅者到生产者的反馈渠道。订阅者可以通过 request()方法来声明其一次所能处理的消息数量，而生产者就只会产生相应数量的消息，直到下一次 request()方法调用。这实际上变成了推拉结合的模式。\n\n例如，当HTTP连接速度太慢时，在从数据库扩展到HTTP响应的被动组件的管道中，数据存储库也可以减速或完全停止，直到网络容量释放为止。\n\n\u003e Java 9在`java.util.concurrent.Flow`容器类中包含了`Reactive Streams`接口\n\n\n\n## `Flux` 和 `Mono`\n\n`Flux` 和 `Mono` 是 Reactor 中的两个基本概念。\n\n`Flux` 表示的是包含 0 到 N 个元素的异步序列。在该序列中可以包含三种不同类型的消息通知：正常的包含元素的消息、序列结束的消息和序列出错的消息。当消息通知产生时，订阅者中对应的方法 `onNext()`, `onComplete()`和 `onError()`会被调用。\n\n`Mono` 表示的是包含 0 或者 1 个元素的异步序列。该序列中同样可以包含与 Flux 相同的三种类型的消息通知。Flux 和 Mono 之间可以进行转换。对一个 Flux 序列进行计数操作，得到的结果是一个 Mono\u003cLong\u003e对象。把两个 Mono 序列合并在一起，得到的是一个 Flux 对象。\n\n参考文献：\n\n1.[Spring官方WebFlux文档](https://docs.spring.io/spring-framework/docs/5.0.0.BUILD-SNAPSHOT/spring-framework-reference/html/web-reactive.html \"Spring官方WebFlux文档\")\n\n2.[Understanding Reactive types](https://spring.io/blog/2016/04/19/understanding-reactive-types \"Understanding Reactive types\")\n\n3.[使用 Reactor 进行反应式编程](https://www.ibm.com/developerworks/cn/java/j-cn-with-reactor-response-encode/index.html \"使用 Reactor 进行反应式编程\")","data":{"title":"理解Spring WebFlux框架中的响应式类型","date":"2018-07-20","tags":["Spring","RxJava","WebFlux","Java","Kotlin"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![Spring Boot](/images/20180720_diagram-boot-reactor.svg)\n\n\u003e `Spring Boot 2.0` 带来了`Spring Framework 5` 中的新的WebFlux技术，WebFlux是基于响应式非阻塞IO编程模型的技术栈。从而能够使用不同于以往基于Servlet API的阻塞式IO处理的新方式编写后台应用。\n\n\u003e 相比以往阻塞式IO编程，响应式编程能够获得更小的开销。因为它直接处理流，而不是单个数据。\n\n\u003e 响应式编程最早由 `.NET` 平台上的 `Reactive Extensions (Rx)` 库来实现。后来迁移到 Java 平台之后就产生了著名的 `RxJava` 库，并产生了很多其他编程语言上的对应实现。在这些实现的基础上产生了后来的响应式流（`Reactive Streams`）规范。该规范定义了响应式流的相关接口，并将集成到 Java 9 中。\n\n"},{"id":"springboot-static-content","file":"springboot-static-content.md","excerptHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180623_springboot.jpg\" alt=\"springboot\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e我们知道SpringBoot内置了tomcat服务器，从而一个jar包就能实现web服务。但有时我们又想像传统tomcat那样部署一些外部的静态资源，虽然静态资源放在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eresource\u003c/code\u003e文件夹的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estatic\u003c/code\u003e就能解决问题，但是static文件夹的内容会作为jar的一部分，要替换的话只能替换整个jar包，极为不便。能不能配置jar包外部的文件夹作为静态资源目录呢。当然是可以的...\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e以下示例代码基于SpringBoot 2.0.3，采用Kotlin语言实现：\u003c/p\u003e\n","contentHtml":"\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180623_springboot.jpg\" alt=\"springboot\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e我们知道SpringBoot内置了tomcat服务器，从而一个jar包就能实现web服务。但有时我们又想像传统tomcat那样部署一些外部的静态资源，虽然静态资源放在\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eresource\u003c/code\u003e文件夹的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estatic\u003c/code\u003e就能解决问题，但是static文件夹的内容会作为jar的一部分，要替换的话只能替换整个jar包，极为不便。能不能配置jar包外部的文件夹作为静态资源目录呢。当然是可以的...\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e以下示例代码基于SpringBoot 2.0.3，采用Kotlin语言实现：\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eWebMvcConfigurer\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e新版Spring利用了Java8新特性，interface可以有default关键字，从而接口方法不用全部实现。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-kotlin px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Configuration\nclass WebConfiguration : WebMvcConfigurer {\n\n    override fun addResourceHandlers(registry: ResourceHandlerRegistry) {\n        super.addResourceHandlers(registry)\n        registry.addResourceHandler(\"/**\")\n                .addResourceLocations(\"file:static/\")\n    }\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cul class=\"mb-4 list-disc\"\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@Configuration\u003c/code\u003e注解表明这是一个配置类，会被Spring框架识别并管理。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebConfiguration\u003c/code\u003e类实现\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eWebMvcConfigurer\u003c/code\u003e接口，并复写\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eaddResourceHandlers\u003c/code\u003e方法。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eaddResourceHandler(\"/**\")\u003c/code\u003e添加路由到服务器根目录。\u003c/li\u003e\n\u003cli class=\"ml-8\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e.addResourceLocations(\"file:static/\")\u003c/code\u003e添加外部静态资源，这里路径表示和jar包同目录的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003estatic\u003c/code\u003e文件夹。这样能想tomcat一样在static文件夹中部署静态资源了。而且不用重启SpringBoot服务\u003c/li\u003e\n\u003c/ul\u003e\n","content":"\n![springboot](/images/20180623_springboot.jpg)\n\n\u003e 我们知道SpringBoot内置了tomcat服务器，从而一个jar包就能实现web服务。但有时我们又想像传统tomcat那样部署一些外部的静态资源，虽然静态资源放在`resource`文件夹的`static`就能解决问题，但是static文件夹的内容会作为jar的一部分，要替换的话只能替换整个jar包，极为不便。能不能配置jar包外部的文件夹作为静态资源目录呢。当然是可以的...\n\n以下示例代码基于SpringBoot 2.0.3，采用Kotlin语言实现：\n\n\u003c!--more--\u003e\n\n## WebMvcConfigurer\n\n\u003e 新版Spring利用了Java8新特性，interface可以有default关键字，从而接口方法不用全部实现。\n\n```kotlin\n@Configuration\nclass WebConfiguration : WebMvcConfigurer {\n\n    override fun addResourceHandlers(registry: ResourceHandlerRegistry) {\n        super.addResourceHandlers(registry)\n        registry.addResourceHandler(\"/**\")\n                .addResourceLocations(\"file:static/\")\n    }\n}\n```\n\n- `@Configuration`注解表明这是一个配置类，会被Spring框架识别并管理。\n- `WebConfiguration`类实现`WebMvcConfigurer`接口，并复写`addResourceHandlers`方法。\n- `addResourceHandler(\"/**\")`添加路由到服务器根目录。\n- `.addResourceLocations(\"file:static/\")`添加外部静态资源，这里路径表示和jar包同目录的`static`文件夹。这样能想tomcat一样在static文件夹中部署静态资源了。而且不用重启SpringBoot服务\n","data":{"title":"SpringBoot配置Jar外部静态资源","date":"2018-06-23","tags":["Spring","Java"],"category":"Backend"},"isEmpty":false,"excerpt":"\n![springboot](/images/20180623_springboot.jpg)\n\n\u003e 我们知道SpringBoot内置了tomcat服务器，从而一个jar包就能实现web服务。但有时我们又想像传统tomcat那样部署一些外部的静态资源，虽然静态资源放在`resource`文件夹的`static`就能解决问题，但是static文件夹的内容会作为jar的一部分，要替换的话只能替换整个jar包，极为不便。能不能配置jar包外部的文件夹作为静态资源目录呢。当然是可以的...\n\n以下示例代码基于SpringBoot 2.0.3，采用Kotlin语言实现：\n\n"},{"id":"many-to-many","file":"many-to-many.md","excerptHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJPA是Java Persistence API的简称是Java的ORM规范，实现这个规范的有著名的Hibernate等ORM框架。JDK 5.0注解或XML描述对象－关系表的映射关系，并将运行期的实体对象持久化到数据库中。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180419_spring_framework.svg\" alt=\"Spring\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e多对多关系是关联关系中最复杂的。本文使用Spring JPA框架总结多对多关系及\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e注解的详细使用。明白了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e,其它\n\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@OneToMany\u003c/code\u003e 和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@OneToOne\u003c/code\u003e就简单很多了。\u003c/p\u003e\n","contentHtml":"\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJPA是Java Persistence API的简称是Java的ORM规范，实现这个规范的有著名的Hibernate等ORM框架。JDK 5.0注解或XML描述对象－关系表的映射关系，并将运行期的实体对象持久化到数据库中。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e\u003cimg src=\"/images/20180419_spring_framework.svg\" alt=\"Spring\" class=\"mx-auto max-h-80\"\u003e\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e多对多关系是关联关系中最复杂的。本文使用Spring JPA框架总结多对多关系及\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e注解的详细使用。明白了\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e,其它\n\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@OneToMany\u003c/code\u003e 和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@OneToOne\u003c/code\u003e就简单很多了。\u003c/p\u003e\n\u003c!--more--\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003eJava和JPA中的多对多关系\u003c/h2\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003e根据维基百科定义：Java中的多对多关系是指源对象具有目标对象集合的属性，并且（如果存在的话）这个目标对象与原对象具有反向关系，则它也将成为多对多关系。需要注意的是：Java和JPA中的所有关系都是单向的，因为存在源对象引用目标对象的情况下，也不能保证目标对象也与原对象有关系。这与关系数据库不同，在关系数据库中，通过外键定义并查询，使得反向查询总是存在的。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote class=\"px-4 border-l-4 border-slate-500 text-slate-500\"\u003e\n\u003cp class=\"mb-4 indent-0\"\u003eJPA还定义了一个OneToMany关系，它与ManyToMany关系类似，但反向关系（如果已定义）是ManyToOne关系。 OneToMany与JPA中ManyToMany关系的主要区别在于，ManyToMany总是使用中间关系连接表来存储关系，OneToMany可以使用连接表或者目标对象的表引用中的外键源对象表的主键。\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp class=\"mb-4\"\u003e传统项目开发，会有一个设计表的过程，然后由DBA写一大堆\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003ecreate table ***\u003c/code\u003e。很麻烦也很慢。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003eJPA框架在运行时，会根据实体定义自动创建表，自动更新表字段，使用JPA可以说一行SQL都不用写，甚至不用关心底层数据库到底是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eMySQL\u003c/code\u003e还是\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eOracle\u003c/code\u003e还是其它。以下例子中我不定义表名，列名，所以没有\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@Column\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@Table\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@JoinTable\u003c/code\u003e、\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@JoinColumn\u003c/code\u003e等。由JPA框架自动根据实体名称生成表名，列名。我觉得Hibernate生成的表名和列名挺好也符合规范。就不多此一举了。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003e@ManyToMany 注解\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e在JPA中使用\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e注解表示多对多关系。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e学生和老师，典型的多对多关系:\u003c/p\u003e\n\u003cpre class=\"mb-4 p-4 bg-slate-200 dark:bg-slate-700 rounded-md overflow-auto max-w-full\"\u003e\u003ccode class=\"language-java px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono !p-0 !m-0\"\u003e@Entity\npublic class Student {\n    @Id\n    private String id;\n    @ManyToMany\n    private List\u0026#x3C;Teacher\u003e teachers;\n}\n\n@Entity\npublic class Teacher {\n    @Id\n    private String id;\n    @ManyToMany\n    private List\u0026#x3C;Student\u003e students;\n}\n\u003c/code\u003e\u003c/pre\u003e\n\u003cp class=\"mb-4\"\u003e上面例子中的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e即表示了老师和学生的多对多关系。\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003e@ManyToMany\u003c/code\u003e注解可以用在字段或方法上。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e但这样做是有问题的，生成的中间表有两个，\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eTEACHER_STUDENTS\u003c/code\u003e表和\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003eSTUDENT_TEACHERS\u003c/code\u003e。原因是这里的多对多关系正是维基百科提到的单向原则。老师和学生虽然分别定义了自己的多对多关系，但这个关系都是单向的，要使关系成为双向。就需要下面的\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emappedBy\u003c/code\u003e属性。\u003c/p\u003e\n\u003ch2 class=\"mb-4 text-xl font-bold pb-4 border-b border-slate-400/30\"\u003emappedBy 属性\u003c/h2\u003e\n\u003cp class=\"mb-4\"\u003e\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-700 rounded-md text-sm font-mono\"\u003emappedBy\u003c/code\u003e是OneToOne、OneToMany和ManyToMany这三种关联关系的属性。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e用来标注\u003cstrong\u003e拥有\u003c/strong\u003e这种关系的字段。 除非关系是单向的，否则是必需的。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e那么什么叫拥有关联关系呢，假设是双向一对一的话，那么拥有关系的这一方有建立、解除和更新与另一方关系的能力。而另一方没有，只能被动管理。\u003c/p\u003e\n\u003cp class=\"mb-4\"\u003e由于\u003ccode class=\"px-1 py-0.5 mx-1 bg-slate-200 text-slate-800 dark:text-slate-200 dark:bg-slate-7
